system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>While they are not genetically compatible with humans, chalactans are
      otherwise fairly similar to humans. Most are also distinguished by their
      facial piercings.</p>

      <h2>Society and Culture</h2>

      <p>Chalactans are a spiritual people who are focused on meditation,
      self-control, and discipline. While they focus greatly on knowledge and
      their mind, they are more philosophical than practical. They prefer to
      teach by using riddles. On the other side of this, they are a simpler
      people who are trusting and benevolent. Their spirituality and philosophy
      often makes them not get along entirely well, especially with those who do
      not share their values. However, they are a very calm people who are
      typically cool and collected. Almost all chalactans fall into the religion
      of Chalactan Adepts. The Chalactan Adepts focus on many of the views that
      distinguish the chalactans as a whole. They are a mystical people with a
      complex philosophy. They strive constantly to receive illumination, also
      called Enlightenment. This is best defined as an understanding of the
      natural laws of the universe, which they also believe to exist in every
      single sentient person. All Adepts have a piercing near the top of their
      nose referred to as the Lesser Mark. It symbolizes their quest for
      Enlightenment. Once a Chalactan Adept has received Enlightenment, they
      receive a Greater Mark of Illumination in the lower middle of their
      forehead. Both these marks are small golden beads featuring the
      "Unclosable Eye" that are attached on by piercing.</p>

      <h2>Names</h2>

      <p>Chalactans use graceful, elegant sounding names, with familiar
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Andup, Bhrashwan, Illam,
      Koyat</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Chodrin, Omi, Param,
      Shassa</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Bachola, Dhunyur, Lehi,
      Sheja</p>
