  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The drall are being small bipeds with furry features who are descended
      from burrowing animals. Their bodies are covered with fur, and have short
      limbs with clawed hands and feet. Females are generally larger.</p>

      <h2>Society and Culture</h2>

      <p>Drall take pride in being viewed as well mannered and considerate. They
      are intelligent, reasonable, and difficult to anger. Drall are honest in
      their business dealings, and if they promise to perform a task for a
      certain payment, they always do so to the best of their ability. They
      expect others to behave in a similarly. As a species, they are methodical
      researchers, careful observers, and considered among the best theoretical
      thinkers in the galaxy. Drall are primarily interested in abstract
      concepts and accumulating knowledge for the sake of knowledge. Therefore,
      despite the advanced nature of their scholarly pursuits, the planet Drall
      trails behind the rest of the galaxy in technological achievement, and the
      drall themselves usually implement technology developed by others. Drall
      society is a clan-based combination of a matriarch and a meritocracy. No
      elected or direct hereditary leaders exist on their homeworld. Instead,
      each family heeds a "Duchess," a female drall who is deemed the most fit
      to lead. Once appointed, the Dutchess becomes the owner of all the
      family's property, and she holds the position for life or until she steps
      down and passes the title and property along to a suitable heir. Most
      drall clans follow the overall direction set by the Dutchess of the most
      prosperous and powerful of all the clans.</p>

      <h2>Names</h2>

      <p>Drall names are eloquent and specific, while still being short usually.
      Surnames are not used.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Albahan, Beggs, Mevall,
      Ritann</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Eiselia, Ennel, Fensa,
      Lanshma</p>
