system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Nuiwit, often misidentified as altorians, are a lizard-like sentient
      species from Altor 14. In contrast to Altor 14's other natives, the
      predatory avogwi, the nuiwit are strictly herbivorous. Nuiwit have evolved
      adaptations to escape predators like the avogwi, such as bulging eyes
      which give them 360 degree vision, and a tail that can be detached if
      grasped by a predator. (A detached tail can be regrown after about four
      weeks.) Nuiwit are cold-blooded, limiting their activities to the morning
      and twilight hours when the temperature is moderate. Nuiwit are generally
      quadrupedal, but can raise themselves on two legs by supporting themselves
      with their tail.</p>

      <h2>Society and Culture</h2>

      <p>The need to escape predators also drove the development of nuiwit
      society, as the need to form close-knit communities to protect themselves
      from the avogwi soon led to the development of agriculture and
      civilization. Having fully functional hands on their forelimbs, unlike the
      avogwi, the nuiwit had developed a fairly high level of technology when
      their homeworld was discovered. With more extensive contacts in the
      outside galaxy post-discovery, and relatively advanced technology, it
      would be simple for the nuiwit to conquer or even exterminate the avogwi.
      However, the nuiwit are strictly pacifistic, horrified by any kind of
      violence. As a result, they are content to wait until the avogwi are
      driven away by the ever-expanding nuiwit settlements and farms. This
      pacifism shapes every part of their society, including their politics.
      Nuiwit are led by co-operating "Councils of Elders" who make decisions by
      consensus.</p>

      <h2>Names</h2>

      <p>Nuiwit names are short and primitive, often with elongated sounds. They
      don't use surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Chessc, Erdug, Mirr,
      Sleff</p>
