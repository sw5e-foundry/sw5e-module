system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>There exists in the galaxy a sentient species that is supposedly
      half-bothan, calling themselves farfallans. The hybrid species is humanoid
      and exhibits several equine characteristics. For instance, the species is
      ungulate; that is, they walk on cloven hooves, with the hock joint high up
      the leg. Their legs are thickly furred down to the knee, and a long, hair
      tail grew from the posterior to almost to the ground. Farfallans prance,
      and can run sure-footed in even dim light. The species has pointed ears,
      and some members of the species grow two twisted, pointed horns from the
      top of their craniums.</p>

      <h2>Society and Culture</h2>

      <p>The farfallan species developed a royal lineage in the form of the
      Farfalla Bloodline, key figures in this hierarchy being the king and
      prince heir-to-be. The royal Farfalla family have distinctive
      colors—variations of yellow and red—and wear elaborate attire. Farfallan
      accessories include circlets, jewelled bracelets, and earrings. Farfallans
      wear their head hair long, often in ponytails, and their tails are often
      bound in cloth straps. In combat, farfallans wear body armor, gloves, and
      protection on the upper thighs composed of curved panels hung together by
      chain. Weaponry of choice includes axes, pikes and sabers. Farfallans are
      often considered temperamental or volatile, a characteristic that is
      attributed by some to their equine heritage. When confronted with the
      death of a peer, it is tradition for farfallans to fast ritually for the
      deceased.</p>

      <h2>Names</h2>

      <p>Farfallan names are longer and melodic, though some harsher tones do
      appear, with familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Andufa, Fafiel, Reynorel,
      Virrani</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Caibano, Endyme, Heldara,
      Jenares</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Farfalla, Gaeldres, Isinda,
      Shoraphon</p>
