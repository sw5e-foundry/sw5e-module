system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Skrillings are stocky humanoids with wrinkled skin, deep set eyes, and
      eight breather tubes in place of a nose. They have several rows of sharp
      teeth for tearing meat, a bony ridge on their skulls running from their
      forehead to the nape of their neck (used by skrilling hatchlings to break
      out of their eggs), and three-fingered hands with a vice-like grip. Their
      eight breathing tubes are among their most versatile organs. To help
      digestion, skrillings used a mild digestive acid produced in glands inside
      their breathing tubes. This acid can also be sprayed from their breathing
      tubes into the target's eyes as a defense mechanism. To make up for poor
      eyesight, skrillings rely on their keen sense of smell to discover food,
      by inhaling deeply through their breathing tubes. This produces a
      high-pitched whistle which can be heard for kilometers.</p>

      <h2>Society and Culture</h2>

      <p>They are scavengers by nature, feeding on the decayed carcasses of
      grazing herd animals. Skrillings can not digest meat that has not rotted
      for less than a week. Primitive skrillings quickly developed a complicated
      system to share carcasses with one another in order to avoid conflicts
      over the best pieces. Once they made contact with other species, this
      system of ritualized requests and appeasements translated into what seemed
      to non-skrillings as constant begging and bargaining. Skrilling wanderers
      often arrived on a planet soon after a battle, where they salvaged
      machines and corpses.</p>

      <h2>Names</h2>

      <p>Skrilling parents usually pick names on a whim, choosing to use
      surmanes on an individual basis. Names are agendered.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Dorn, Phejet, Shenra,
      Yenroth</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Enekin, Grelliet, Kefka,
      Vanescence</p>
