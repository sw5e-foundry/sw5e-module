system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Tholothians are a species of seemingly ageless humanoids native to the
      planet Tholoth. They can be distinguished from typical humans by their
      partial bluish skin pigmentation, their scaled craniums and fleshy white
      or red tendrils that sprout from their skullcaps. Most many traditional
      tholothians cover their hair in a traditional tholoth headdress, made up
      of a fabric band with delicate chains. The species is rare, but those that
      do exist are often Force-sensitive.</p>

      <h2>Society and Culture</h2>

      <p>Few can boast a legacy like the tholothians. As one of the oldest, if
      most elusive, civilizations of the Republic, the people of Tholoth had
      fully integrated into the galaxy until the Republic fell. Under the rule
      of the Empire, the planet and culture of Tholoth was drastically altered.
      Once teeming with life from across the galaxy, Imperial censors diligently
      removed all non-tholothians from the planet and worked to remove anything
      considered foreign from the culture. Given the tholothians' early
      acceptance and integration of other societies, this greatly destabilized
      their people and culture. Tholothians' long relationship with the Republic
      means continual contact with Jedi and the Jedi Order. Most obvious Jedi
      temples were razed, but smaller, more isolated refuges went unnoticed,
      blending into the overgrowth as if Tholoth itself had gone feral. A small
      cave system or single-story building once used by the Jedi might now house
      tholothians communing with the Force or organizing in opposition to the
      Empire and its censors.</p>

      <h2>Names</h2>

      <p>Tholothian names are short and elegant-sounding, with familiar
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Adesas, Fen, Nomm, Potani</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Eva, Deless, Shall, Vadi</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Eliad, Hamav, Polinus,
      Raelien</p>
