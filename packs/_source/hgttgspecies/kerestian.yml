  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Kerestians are tall and broad-shouldered with pale skin, slit-pupiled
      eyes, and twin manes of long, thick hair. The breather tubes on their
      faces were once used for long-range, high-frequency communication, but
      that ability was lost over time.</p>

      <h2>Society and Culture</h2>

      <p>At one point, the kerestians had developed a sophisticated
      civilization, complete with fusion technology and sublight space travel.
      However, disaster struck when their variable sun went into an inactive
      cycle. The sun's power was greatly reduced, and the amount of light and
      heat reaching Kerest was greatly diminished. Temperatures plunged, and the
      glaciers advanced to cover all of Kerest save a thin band around the
      equator. Their civilization descended into barbarism. The surviving
      kerestians became aggressive, determined hunters, even killing one another
      without remorse if necessary to survive, or even for sport. Over the
      centuries, the kerestian species approached extinction. Perhaps because of
      the reduction of their sun's power, kerestians developed a mythology that
      upon death, the soul of an individual is doomed for all eternity to wallow
      in the Great Darkness. Kerestians are unafraid of such a fate, instead
      embracing it and attaching it to the ritualistic significance behind their
      traditional darksticks. Before their civilization collapsed, several
      sublight colony ships were launched. The kerestians on board, when taken
      out of cryogenic suspension, prove to be a highly civilized and
      disciplined people, quite different from their savage cousins.</p>

      <h2>Names</h2>

      <p>Kerestians use exotic sounding names, with surname use depending on the
      individual's tribe.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Anzella, Meergolo, Ossune,
      Sallabas</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Fefret, Keth, Thun, Vise</p>
