system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The nimbanels are humanoid, warm-blooded reptilians with pinniped-like
      heads and stringy beards who evolved from grazing animals on the planet
      Nimban.</p>

      <h2>Society and Culture</h2>

      <p>Nimbanese evolution was driven by the need to develop problem-solving
      skills in order to get food from the traveling plants of Nimban, such as
      the puzzleflower and the boyy'lo. As their society developed, competitive
      puzzle-solving skills were used to settle clan rivalries instead of the
      open warfare used by other primitive cultures. In competitions called
      muhndees, a clan would present its rivals with a logic puzzle or
      mathematical problem to be solved within a year. This interest in
      competitive logic led the nimbanese to develop new ways to obfuscate and
      convolute meaning. Over the centuries, this led to the development of a
      highly complex bureaucracy. Rather than stockpiling weapons, rival clans
      will stockpile information and challenge one another with mountains of
      paperwork. The nimbanels, having been tested by their own complex
      bureaucracy, easily found niches in the comparatively simple systems of
      the Republic. They are best known as the only species to petition the
      hutts and voluntarily enter their service. Since becoming associates of
      the hutts, nimbanels are found throughout the galaxy as bureaucrats and
      administrators for legitimate businesses, governments, and hutt criminal
      interests.</p>

      <h2>Names</h2>

      <p>Nimbanel names are often chosen for uniquity's sake. Surnames are
      clan-based, but optional.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Entelev, Fekk, Fenep, Gharijh,
      Kal</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Beshed, Inno, Resef, Shinda,
      Umee</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Akua, Olvarak, Shin-Torr, Teff,
      Yinnef</p>
