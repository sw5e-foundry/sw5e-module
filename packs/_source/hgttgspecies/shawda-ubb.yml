  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Shawda Ubb, also known as Ubb, are diminutive, sentient amphibians with
      frog-like bodies. They have long, spindly limbs that end in three splayed
      digits each; the toes also sport yellow claws. Their skin is moist and
      elastic and covered in warts. Shawda Ubb are adapted to their moist,
      swampy homeworld, and feel physically weakened and emotionally withdrawn
      in dryer environments. They defend themselves by spitting a paralyzing
      venom, which is capable of immobilizing a human-sized mammal for up to
      fifteen minutes. Shawda Ubb are perceptive beings with a keen aptitude for
      observation. On Manpha, shawda ubb eat uncooked swamp plants and raw fish;
      they avoid cooked and processed food.</p>

      <h2>Society and Culture</h2>

      <p>Shawda Ubb are suspicious of strangers and are willing to defend
      themselves with their paralytic venom if the need arises. Accordingly,
      they prefer to live in settlements that are small enough to allow each
      inhabitant to recognize the other denizens. Such inclinations encourage
      the founding and habitation of hundreds of thousands of small towns and
      villages interspersed throughout the marshes of their homeworld's lone
      landmass. The shawda ubb economy is based on small-scale petroleum
      extraction and refining; community oil cooperatives pump fossil fuels from
      below the planetary surface and store it in barrels to be sold to national
      oil companies. Shawda Ubb are known for their indigenous musical
      instruments. For instance, the growdi, which resembles a combination of
      flute and water organ.</p>

      <h2>Names</h2>

      <p>Shawda Ubb have names with a tune, not using surnames and having
      agender names.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Bluugeras, Hippohaph,
      Jazstile, Punnki</p>
