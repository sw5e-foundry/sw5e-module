  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Duloks are a sentient species native to the swamps of the Forest Moon
      of Endor. They are gangly with sharp claws and thin, expressive, tufted
      tails. They are excellent climbers. Members of the species are covered in
      dull-looking fur. Most of a dulok's fur is relatively uniform in length
      except for a longer shock atop the head. The features of a dulok's broad
      face are screwed up into a constant scowl. A full set of teeth filled the
      mouth, and the two sharp canines jut from their lower jaw. Dulok eyes are
      sensitive to bright light, but in low-light conditions, their pupils
      narrow to vertical slits. While they groom themselves using the materials
      available to them, such as stolen ewok soap, euloks have a hard time
      keeping clean. As a result, their fur often becomes mangy, unkempt, foul
      smelling, and infested with parasitic insects.</p>

      <h2>Society and Culture</h2>

      <p>Although ewoks and duloks speak mutually intelligible dialects and
      acknowledge a common heritage, their interactions are seldom cordial. The
      duloks hate and envy the ewoks for enjoying what the duloks see as the
      better lifestyle in the bountiful forests. Most eke out a living in
      marshlands, based in villages of caves, logs, and stumps. While they
      rarely show the pluck and flair so often attributed to their forest
      cousins, duloks excel at fighting, raiding, and stealing. The dearth of
      resources in their swamp habitat give them little choice, and a preference
      for idleness and their might-makes-right culture both add to the appeal of
      such behavior. Some dulok bands range several days from their home, basing
      themselves in camps while away.</p>

      <h2>Names</h2>

      <p>Duloks typically have short, guttural, one-word names without surnames,
      tribal or otherwise.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Bumphuk, Durgat, Krugbu,
      Trugeegh</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Arob, Bulak, Rogmesh,
      Sharamph</p>
