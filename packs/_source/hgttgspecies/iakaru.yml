  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Despite their stocky builds, iakaru are a surprisingly dexterous
      species, able to rapidly scale trees and swing from branch to branch in
      the tree canopies of Iakar. Having evolved in a jungle canopy, iakaru have
      exceptional spatial awareness, aided by sensitive brow tufts. Swinging
      through the dense trees requires keen eyesight, accurate depth perception,
      and quick reflexes, all traits the iakaru possess. All of these
      adaptations, coupled with their remarkable toughness, help the iakaru
      outrun the dangerous fauna that are native to the jungles of Iakar.</p>

      <h2>Society and Culture</h2>

      <p>For most of recorded history, iakaru have been an uncommon sight in the
      galaxy, as they haven't developed hyperdrive technology. Their homeworld
      Iakar has been visited by interstellar trade for nearly centuries however.
      Pharmaceutical corporations draw valuable organic compounds from the lush
      rain forests girdling the planet. During the Clone Wars, companies set up
      major research installations on Iakar, which drove the iakaru deeper into
      the jungle and strained the tentative trading relationships the natives
      had established with the offworlders. Iakaru live together in small,
      familial tribes deep in the heart of the jungle. This was not their
      original home, as they use to be able to roam the planet freely, making
      homes on the edges of the jungles. However the constant misuse of their
      homeworld's resources by offworlders, often assisted by hostile
      militaries, pushed them deeper and deeper into the jungle.</p>

      <h2>Names</h2>

      <p>Iakaru typically have simple guttural names, without using surnames.
      Ancient iakaru used to use tribal surnames, but the practice has long
      since died out.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Bazoo, Cinipar, Pistar,
      Raffel</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Hamor, Makin, Qroket,
      Suka</p>
