system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Bravaisians are a humanoid sentient species that stand at a diminutive
      height, with blue, leathery skin. They have snouts that fade to pink at
      their end. These snouts contain a prehensile tongue as dexterous as their
      fingers. Bravaisians will alternate between using their fingers and their
      tongues. Bravaisians evolved from pack hunters, that used their tough,
      flexible snouts to dig through soil and dirt in order to find their prey,
      which were tubers and nests of insects. They would then suck up these with
      their long muscular tongues. Bravaisians are nocturnal due to the intense
      heat and lack of life on Bravais during the day. As a result, they have
      small eyes that can easily be overwhelmed by light. For this reason, most
      members of the species are rarely seen without protective goggles while
      offworld. Some even have their eyes surgically removed to combat this
      problem.</p>

      <h2>Society and Culture</h2>

      <p>Bravaisians are infamously meticulous, carefully analyzing even the
      most innocent of objects, often leading bravaisians towards appraisal jobs
      when they are found off of their homeworld. Because of this, bravaisians
      are commonly seen in merchant jobs, making them a common sight in galactic
      markets. Due to them being nocturnal, bravaisians view other species'
      insistence on doing business during daylight hours with a mix of pity and
      contempt. As a result, on planets that are dark a majority of time,
      bravaisians are much more common, as merchants or otherwise.</p>

      <h2>Names</h2>

      <p>Bravaisians use three syllable names with a distinctly melodious tone.
      Their names are agendered and they do not use surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Gongari, Kinkuto, Linteba,
      Vaniti</p>
