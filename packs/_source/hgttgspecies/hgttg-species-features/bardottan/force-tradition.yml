  description:
    value: >-
      <p><em><strong>Force Tradition.</strong></em> You have proficiency in
      Lore. Additionally, you are considered to have expertise in Intelligence
      (Lore) checks made to learn or recall something about the Force. Lastly,
      when you reach 3rd level, you can cast your choice of the heroism or sap
      vitality force power once per day. Your forcecasting ability is Wisdom or
      Charisma (depending on power alignment).</p>
