system:
  description:
    value: >-
      <p><em><strong>Call for Peace.</strong></em> As an action on your turn,
      you can emphatically demand that your foes cease fighting, thereby
      distracting them. Until the end of your next turn, your allies gain
      advantage on attack rolls against enemies within 10 feet of you that can
      see you. Once you use this trait, you can't use it again until you finish
      a short or long rest.</p>
