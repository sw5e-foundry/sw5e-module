    value: >-
      <p><em><strong>Languages.</strong></em> You can speak, read, and write
      Teek. You can understand spoken and written Galactic Basic, but your vocal
      cords do not allow you to speak it. Teek is a primitive language spoken in
      yips and chirps, with many similarities to the native Ewokese. Teeks also
      know a complex sign language used to communicate with other teeks
      silently.</p>
