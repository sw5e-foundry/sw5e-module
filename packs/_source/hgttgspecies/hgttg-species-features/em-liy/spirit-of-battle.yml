system:
  description:
    value: >-
      <p><em><strong>Spirit of Battle.</strong></em> Once per day, you can enter
      an extreme state of focus as an action. For 1 minute, or until you lose
      your concentration (as if you were concentrating on a power), you are
      immune to being frightened and gain temporary hit points equal to your
      Constitution modifier (minimum of 1) at the start of each of your turns.
      When this state ends, you lose any remaining temporary hit points from
      this feature.</p>
