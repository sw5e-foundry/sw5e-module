  description:
    value: >-
      <p><em><strong>Crude Armor Specialists.</strong></em> Sanyassans have a
      primitive technological culture, but are adept in scavenging materials to
      make their own armor. You can spend 1 hour, which you can do over the
      course of a short rest, crafting a set of improvised protective gear out
      of loose materials. While you are wearing this protection, you gain a +1
      bonus to your unarmored AC.</p>
