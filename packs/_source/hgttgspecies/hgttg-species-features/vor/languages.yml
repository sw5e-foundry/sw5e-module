system:
  description:
    value: >-
      <p><em><strong>Languages.</strong></em> You can speak, read, and write
      Galactic Basic and Vortexlex. Vortexlex, also known as Vorese, uses soft
      chirps, lilting squawks, and trilling whistles to form a melodic language
      to hear. Vortexlex has its own alphabet, using diamond shapes and swirling
      lines to represent individual letters. You can communicate with other vors
      within 30 feet without speaking through use of pheromones. Force attuned
      individuals can detect the communication but can't understand it.</p>
