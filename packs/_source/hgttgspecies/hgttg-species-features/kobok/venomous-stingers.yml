system:
  description:
    value: >-
      <p><em><strong>Venomous Stingers.</strong></em> Your retractable stingers
      are natural weapons, which you can use to make unarmed strikes.
      Additionally, your unarmed strikes deal 1d6 kinetic damage. Lastly, as a
      bonus action, you can perform a special stinger attack. On a hit, the
      target suffers the attack's normal effects, and it must make a
      Constitution saving throw (DC = 8 + your proficiency bonus + your
      Constitution modifier). On a failed save, the target is stunned until the
      end of its next turn, and you can't use this feature again until you
      complete a short or long rest.</p>
