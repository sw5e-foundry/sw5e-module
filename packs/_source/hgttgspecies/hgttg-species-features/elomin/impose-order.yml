    value: >-
      <p><em><strong>Impose Order.</strong></em> As a bonus action, you can
      command each ally within 15 feet of you to move up to half that ally's
      speed as a reaction. This movement does not provoke attacks of
      opportunity. Once you use this trait, you can't use it again until you
      finish a short or long rest.</p>
