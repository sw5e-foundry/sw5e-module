system:
  description:
    value: >-
      <p><em><strong>Tongue Lash.</strong></em> You can use your action to lash
      out your long tongue to strike at one creature of your choice that you can
      see within 15 feet of you. The target must succeed on a Strength saving
      throw (DC = 8 + your proficiency bonus + your Strength modifier) or be
      pulled up to 10 feet in a straight line toward you and then take 1d8
      poison damage if it is within 5 feet of you. This feature's damage
      increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and
      17th level (4d8).</p>
