  description:
    value: >-
      <p><em><strong>Languages.</strong></em> You can speak, read, and write
      Galactic Basic and one extra language of your choice. You also know
      Kinetic Communication, a sophisticated gestural language "spoken" through
      complex body language. Beginning as a simple battle tongue used to
      coordinate guerrilla groups, this became a sophisticated language still in
      use millennia later. You can communicate with other lorrdians within 30
      feet without speaking through use of kinetic communication.</p>
