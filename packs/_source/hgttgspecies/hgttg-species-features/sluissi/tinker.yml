system:
  description:
    value: >-
      <p><em><strong>Tinker.</strong></em> You have proficiency with tinker's
      implements. You can use these and spend 1 hour and 100 cr worth of
      materials to construct a Tiny Device (AC 5, 1 hp). You can take the Use an
      Object action to have your device cause one of the following effects:
      create a small explosion, create a repeating loud noise for 1 minute,
      create smoke for 1 minute, fly around in a circle for 1 minute. You can
      maintain a number of these devices up to your proficiency bonus at once,
      and a device stops functioning after 24 hours away from you. You can
      dismantle the device to reclaim the materials used to create it.</p>
