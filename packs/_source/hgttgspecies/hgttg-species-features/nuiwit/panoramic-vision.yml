system:
  description:
    value: >-
      <p><em><strong>Panoramic Vision.</strong></em> Nuiwit have bulging eyes
      that give them a 360-degree field of vision. Whenever you make a Wisdom
      (Perception) check related to sight, you are considered to have expertise
      in the Perception skill. Additionally, if you are surprised, you may act
      normally on your first turn. Once you've used this trait, you can't use it
      again until you finish a short or long rest.</p>
