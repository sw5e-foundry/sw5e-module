  description:
    value: >-
      <p><em><strong>Crude Weapon Specialists.</strong></em> Dantari are used to
      making do with less. You can spend 1 hour, which you can do over the
      course of a short rest, crafting a weapon out of loose materials. You can
      craft any simple kinetic weapon, but the weapon's damage suffers a -1
      penalty.</p>
