  description:
    value: >-
      <p><em><strong>Snap Senses.</strong></em> Thanks to your accelerated
      sensory input, you can sense incoming danger and react accordingly. When
      you roll for initiative, you can choose to gain advantage on the roll.
      Alternatively, if you are surprised, you may act normally on your first
      turn. Once you've used this trait, you can't use it again until you finish
      a short or long rest.</p>
