  description:
    value: >-
      <p><em><strong>Languages.</strong></em> You can communicate, read, and
      write Massan. You can understand spoken and written Galactic Basic, but
      your lack of vocal cords makes you unable to speak it. Since they have no
      vocal cords, Massan is a sign language, which, combined with telepathy,
      allow them to communicate with each other. Massan falls outside of the
      normal audio range of most species.</p>
