    value: >-
      <p><em><strong>Claws and Spikes.</strong></em> Your body is covered in
      dangerous implements, whether its your horns, your teeth, or the claws on
      your hands and feet. These are natural weapons, which you can use to make
      unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic
      damage.</p>
