system:
  description:
    value: >-
      <p><em><strong>Beast Master.</strong></em> You have the ability to
      communicate in a limited manner with beasts. They can understand the
      meaning of your words, though you have no special ability to understand
      them in return. You have advantage on all Charisma checks you make to
      influence them. Additionally, whenever you roll a 1 on a Wisdom (Animal
      Handling) check, you can reroll the die and must use the new roll. Lastly,
      once per short or long rest, you can treat a d20 roll of 9 or lower on a
      skill check towards a beast as a 10.</p>
