    value: >-
      <p><em><strong>Sharp Wit.</strong></em> Whenever you make a Charisma
      ability check, attack roll, or saving throw, you can choose to add 1d4 to
      the result. You can choose to do this after the check is rolled, but
      before the DM determines if you've passed or failed the check. You cannot
      do so again until you complete a short or long rest.</p>
