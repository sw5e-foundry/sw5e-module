system:
  description:
    value: >-
      <p><em><strong>Unarmed Combatant.</strong></em> Your unarmed strikes deal
      1d6 kinetic damage. Additionally, as a bonus action, you can perform a
      special shove attack. On a hit, the target suffers the attack's normal
      effects, and if the creature is Large or smaller, it must make a Strength
      saving throw (DC = 8 + your proficiency bonus + your Strength modifier).
      On a failed save, the target is knocked prone, and you can't use this
      feature again until you complete a short or long rest.</p>
