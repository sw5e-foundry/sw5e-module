  description:
    value: >-
      <p><em><strong>Vengeful Assault.</strong></em> When you take damage from a
      creature in range of a weapon you are wielding, you can use your reaction
      to make an attack with the weapon against that creature. You cannot use
      the burst or rapid properties of weapons with this trait. Once you use
      this trait, you can't do so again until you finish a short or long
      rest.</p>
