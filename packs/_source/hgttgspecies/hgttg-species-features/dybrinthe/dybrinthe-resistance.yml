  description:
    value: >-
      <p><em><strong>Dybrinthe Resistance.</strong></em> Dybrinthe are adapted
      to the blisteringly poisonous atmosphere of Dybrin 12. You have advantage
      on saving throws against poison and disease, and you have resistance
      against poison damage (explained in Chapter 9). Additionally, you have
      advantage on Constitution saving throws made to avoid exhaustion due to
      extreme heat.</p>
