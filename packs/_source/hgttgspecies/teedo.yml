system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Teedo are a sentient reptilian species. Although much of their body is
      covered in wrappings and a mask, they have an exposed cranial dome and
      hands and feet with three digits. Due to the limited water of their
      homeworld, Jakku, they have a system of filters and tubes which reclaim
      most of their bodies' water for recycling. They experience an unknown form
      of telepathic communication between individuals, and teedo can know things
      that were experienced by other teedo.</p>

      <h2>Society and Culture</h2>

      <p>Fiercely territorial, teedos live as scavengers, and they prowl the
      wastes of Jakku. They are secretive and suspicious of outsiders, often
      fighting with other scavengers over machinery that can be salvaged for
      sale. As scavengers, they are capable mechanics and tinkerers, and are
      gifted in finding useful things in their homeworld. They are treated with
      respectful caution by the residents of Jakku, due to their unpredictable
      nature. In order to protect themselves against Jakku's heat, teedos wear
      protective wrappings that cover much of their bodies. They make no
      distinction between individuals, and none have names, with each specific
      teedo being known as Teedo. They often ride luggabeasts, beasts of burden
      that are cybernetically enhanced for greater endurance. They live in
      trapdoor tunnel systems. They worship a goddess named R'iia, believing the
      violent storms on Jakku are her breath, or X'us'R'iia.</p>

      <h2>Names</h2>

      <p>Teedos make no distinction between individuals, and so each member of
      the species is simply named Teedo. This is exasperated by their species'
      telepathy causing memories to bleed over. However teedo are responsive to
      nicknames given by outsiders.</p>
