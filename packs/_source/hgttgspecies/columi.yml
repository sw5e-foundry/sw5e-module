system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Columi are easily recognizable due to their large cranial cavities,
      their heads taking up a third of their height. Another notable feature is
      their immense black lidless eyes with worm-like veins on their temples.
      However, their mental evolution had an impact on their physical bodies
      with their physiques deteriorated. As a result, their boneless arms and
      legs became appendages that no longer are able to support their own body
      weight, even on lower gravity worlds. Thus, their bodies became simply
      repositories for their lungs, hearts, and other invaluable bodily organs.
      This evolution also resulted in their vital organs being drawn up towards
      their cranial activity. Their brains contain four cerebrums and over one
      hundred lobes with each being dedicated to an independent function. The
      other organ that had developed in importance amongst their kind is their
      eyes, which are the only link between their highly evolved brains and the
      world around them. These developed more than being photoreceptors as they
      are able to see all the wavelengths in the electromagnetic spectrum. This
      resulted in them being able to "hear" through their eyes by detecting and
      analyzing the frequency of sound or radio waves.</p>

      <h2>Society and Culture</h2>

      <p>This devotion to mental pursuits has led to a deep disdain for physical
      activities with them holding the view that there is no dignity in any
      activity except those relating to thought. As a result, they often look
      down at races that make use of physical forms of labor, while columi use
      droids and hoverpods for such needs.</p>

      <h2>Names</h2>

      <p>Columi names often have multiple meanings, parents taking extreme pride
      in picking the perfect name. Names are agendered and surnames
      familiar.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Bygman, Padra, Telos,
      Xak'silith</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Dreth, Jobe, Klirth, Yeth</p>
