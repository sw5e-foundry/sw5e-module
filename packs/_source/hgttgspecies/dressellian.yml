system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Dressellians are a tall, thin, mammalian humanoid species with
      elongated, hairless skulls, wrinkled skin, and teal blood. Their wrinkled
      skin has earned them the callous nickname "Prune Face," to which all
      dressellians take offense.</p>

      <h2>Society and Culture</h2>

      <p>Dressellians are fiercely independent loners by nature. Originally
      dresselians were simple hunters, but by two centuries later, they'd
      evolved into a burgeoning industrial-level society with a loose coalition
      government, often in contact with the bothans, who decided to leave the
      natives low-tech alone. Dressel's isolation ended after the Galactic
      Empire took control of the system, the Imperials descending on the planet,
      moving to set up bases and exploit Dressel's natural resources. The
      dressellians, despite having only a loose political organization and
      barely industrial-level technology, formed a resistance movement. At
      first, their resistance had limited effect, but over time, dressellians
      became masters of guerrilla warfare, making the continued occupation of
      Dressel very costly for the Empire. Later, the bothans supplied the
      resistance with weapons, and mercenaries to train the dressellians. In the
      end, the Imperials decided the occupation was not worth the cost, and
      abandoned Dressel. The Imperials made a lasting impression, dressellians
      generally wary of "outlanders", besides the bothans, who they hold in high
      regard given their shared history of peace. Although self-serving and
      quick to anger, dressellians are loyal to others who have aided them,
      asking for nothing in return.</p>

      <h2>Names</h2>

      <p>Dressellian names are very simple by galactic standards, and do not
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Barriet, Cellith, Samak,
      Ulrachel</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Akijanus, Grett, Nella,
      Zillizera</p>
