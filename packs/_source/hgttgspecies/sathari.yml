system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Sathari are a humanoid species of avian ancestry native to the planet
      Arbooine. Though the sathari's ancestors were likely once capable of true
      flight, this ability disappeared millions of years ago. However, their
      avian heritage is apparent in their plumage, which varies in color and
      pattern by individual, and in their rapid, precise movements. Of
      particular note are the facial plumes of the sathari, which grow outward
      from near the beak or eye. The relatively subtle sexual variance of the
      sathari species leads to adult males frequently having four such feathers
      and adult females frequently having two, although various genetic,
      environmental, cultural, and individual factors mean that plumage, sex,
      and gender vary across a spectrum and can appear in any grouping. Sathari
      skeletons are far less dense than those of most humanoid species, allowing
      them to move more quickly and dexterously, but leaving them more
      susceptible to fractures and other damage.</p>

      <h2>Society and Culture</h2>

      <p>Sathari are rarely encountered away from their home planet, for sathari
      culture values family above all else. For sathari, to travel off-planet or
      even to leave their hometown is seen as abandoning family, so few depart.
      Sathari are fiercely loyal to their family and friends, but many sathari
      are known to harbor significant grudges against their foes.</p>

      <h2>Names</h2>

      <p>Sathari names are usually melodic in tone, first names being short and
      more. When sathari introduce themselves, they always begin with their
      familiar surname, as the secondary name is more important in sathari
      culture.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Dyr, Kae, Renn, Thoric</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Feyya, Kiraak, Leh, Nia</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Corren, Ithar, Runter,
      Shahwor</p>
