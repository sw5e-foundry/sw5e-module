system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Abednedos are a humanoid, sentient, mammalian species with fleshy nose
      slits and black eyes, which belong to sockets that protrude from the side
      of the individual's elongated head. They also possess dangling mouth
      tendrils, that are remnants of sensory organs which helped their ancestors
      to navigate underground in the dark. They can grow hair above their eyes
      and on the side and back of their heads.</p>

      <h2>Society and Culture</h2>

      <p>A gregarious and clever species, the abednedos' curiosity and
      acceptance of other species, as well as their skill with languages, make
      them a common sight in the galaxy. With this, abednedos are found in
      multiple, contrasting professions, including freight crewers, soldiers,
      bureaucrats and slicers. Because of their upbringing, abednedo are fervent
      and vocal supporters of traditional democracy, which oftentimes leads them
      into unfavorable situations in areas where democracy is unpopular or
      outlawed. The abednedos' precursors evolved underground and carved out
      tunnel-dens to create massive cathedrals housing tens of thousands of
      family units. They eventually took to living on the planet's surface and
      constructed sprawling metropolises bristling with ornamental spires,
      flagpoles, and riotously colored carvings. While these cities strike
      outlanders as chaotic, the abednedos find them endless sources of
      amusement and interest.</p>

      <h2>Names</h2>

      <p>Abednedo names are quite diverse in nature, but are generally simple to
      pronounce, with familiar surnames. Abednedo parents try not to give
      children complex names, as that would make conversation more difficult for
      them in the future.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Gouldd, Miksa, Paales,
      Skien</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Csavota, Eell, Hosta,
      Llysens</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Buuro, Comaatii, Ohtieek,
      Shul'bet</p>
