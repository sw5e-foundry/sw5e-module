system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Native to the high-pressure atmosphere of Skako, skakoans breath a
      methane-based air supply. Skakoans have skin which hangs in folds over
      their skeletons, lack hair and have sunken, beady eyes. Thin nasal slits
      allow them to detect odor, while a thin, lipless mouth allows them to
      speak. Because skakoan do not ingest solid food, they lack teeth in their
      gaping mouths. Due to the nature of their homeworld's above-average
      pressure, traveling offworld means wearing a specialized protective suit
      which maintains internal pressure and feeds methane through special
      piping. Fear of decompression or rupturing of their suits keeps most
      skakoans on their world; only those driven by a very compelling motive are
      ever seen far from Skako.</p>

      <h2>Society and Culture</h2>

      <p>Skakoans are cool and calculating beings with a strong sense of
      self-preservation. Because outsiders only see skakoans encased in their
      pressurized suits, many non-skakoans believe the race to be emotionless
      and machine-like. In spite of the misconception, the skakoans are
      extremely emotional, harboring strong xenophobia for all non-skakoans.
      Skakoans are severe and self-centered, and focus on self-preservation
      above all else. They have a deep logic which allows them to solve nearly
      any problem and driving their society towards the mathematical, scientific
      and technological professions. A deeply spiritual people, the skakoans
      developed an advanced religion centered around a beast known as the Albino
      Cyclops.</p>

      <h2>Names</h2>

      <p>Skakoan names will often uniformly use the same number of syllables,
      but this is not a hard rule. Surnames are familiar.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Bast, Gos, Hrent, Kolt, Rust,
      Vond</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Dul, Kus, Kym, Nam, Ramb,
      Wyt</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Doskos, Mantros, Nota, Tondar,
      Voskarr</p>
