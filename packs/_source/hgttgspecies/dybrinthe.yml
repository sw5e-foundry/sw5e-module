system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Dybrinthe are a bipedal humanoid species with bright skin, wide eyes,
      and a gill-like respiratory system. Due to their moon's poisonous and
      highly pressurized atmosphere, dybrinthe out of Dybrin 12 are required to
      wear large breathing apparatus that supply them with processed atmosphere
      via hoses. They also have to wear suits that simulate the higher pressure
      and temperature that they are use to. Due to spending extended periods
      underground, they developed exceptional night vision, which is noticeably
      stronger on worlds with clearer atmospheres.</p>

      <h2>Society and Culture</h2>

      <p>The species live in clans, with each clan controlling its own
      territory. Fuel, bubbling up from Dybrin 12's vast underground oceans, is
      collected by mobile refinery-cities, which will then process the fuel. It
      is commonplace for dybrinthe clans to raid and sabotage other clans,
      though this became less prevalent. However, rival clans will still tunnel
      underground and attempt to divert fuel to their own clans. Within clans,
      dybrinthe society is ordered into castes, such as engineering and
      diplomacy castes. Few dybrinthe leave their homeworld, though most of
      those who do are scientists drawn from the engineering castes, as
      technological professions are the highest in demand on nearby worlds.
      Because of this, dybrinthe of other castes tend to learn mechanical or
      computer skills when traveling off world to make themselves more appealing
      to potential employers.</p>

      <h2>Names</h2>

      <p>Dybrinthe parents assign their children personal names based unique on
      clan algorithms, additionally using clan-based surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Domaust, Chayad, Roctack,
      Trothcor</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Keats, Guuld, Thesk, Vocce</p>
