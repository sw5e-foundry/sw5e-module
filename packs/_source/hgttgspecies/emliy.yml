  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Em'liy are fairly tall and robust by human standards. Their faces have
      no visible noses and small, dark eyes. They have no body hair, though they
      do grow dark hair on their heads. This hair is styled in one to three
      topknots, depending on caste.</p>

      <h2>Society and Culture</h2>

      <p>The em'liy once had a relatively sophisticated society, though they
      were apparently not starfarers. This changed after the Galactic Empire's
      forces attacked Shalyvane. The attack left their capital city, Chinshassa,
      in ruins. After this attack, the region around the capital was ruled by
      nomadic tribes, armed with a mixture of primitive weapons and blasters.
      Em'liy are born survivors, raised to hunt for every morsel of food and
      fight for every drop of water. They take nothing for granted and tend to
      possess a fatalistic approach toward life. They expect no favors and
      express only contempt for the lazy, spoiled, or domineering. Angered
      Em'liy are dangerous foes and loyal friends. Entire wars have ended
      because one em'liy general sufficiently impressed another in the course of
      battle. Since their fail from grace, however, much of their arrogance has
      left them, replaced with feeling of loss and restlessness. Em'liy are
      deadly warriors, with a ferocity in battle unmatched by many warrior
      species. Observes have labeled this ferocity "berserker" behavior, though
      this is not entirely accurate. Warring em'liy give themselves over
      completely to a fight, letting the course of battle define their actions
      and thoughts. They control their own actions, but their so-called "spirit
      of battle" helps refine that control.</p>

      <h2>Names</h2>

      <p>Em'liy use relatively complex names, with archaic surnames that span
      back hundreds of generations.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Cir'belt, Evir'zan, Ji'kata,
      Shanzar</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Belochog, Jelevos, Neth,
      Tez'ra</p>
