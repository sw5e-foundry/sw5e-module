system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Physically, epicanthix are generally human in appearance, possessing
      faces that are somewhat longer than usual, with narrow eyes, dark hair,
      and lithe builds with powerful musculature that tends to be willowy and
      graceful due to a cultural focus on physical training and combat
      readiness. Most epicanthix possess a natural unconscious talent to shield
      their minds from Force-assisted mental tricks, influence, domination, and
      mind reading, with the talent being widespread enough that many groups
      sought out the epicanthix for use as spies.</p>

      <h2>Society and Culture</h2>

      <p>A race of warriors known for their their combination of militaristic
      mindsets and high regard for art and culture, the epicanthix train and
      hone their bodies in preparation for war - with great value being placed
      on an individual's combat readiness - while simultaneously broadening
      their minds by studying art, music, and literature. Practical yet praising
      aesthetic, the Epicanthix worked this duality into much of their way of
      life; their starships were beautiful yet lethal, their hair was tied in
      ceremonial styles that were not only attractive but practical for combat,
      and while they trained their bodies for strength they simultaneously toned
      them for beauty. Even when conquering an enemy, the Epicanthix would
      absorb their conquered subject's culture, regarding a subjugated people's
      art and culture as equally important as their material wealth.</p>

      <h2>Names</h2>

      <p>Epicanthix names are short and exotic, with surnames being
      familiar.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Taw, Vu, Yix, Zun</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Qiy, Rev, Xa, Yav</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Halber, Lanse, Poyn, Spera</p>
