system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Vratix are an insectoid species with large compound eyes, long necks,
      and six limbs sprouting from a thorax. The pair closest to their heads,
      extending from their "shoulders," are triple jointed with tridactyl hands,
      and serve as "arms," but they also sport a hook-claw near the second
      articulation to assist in climbing. The second, middle pair are massive,
      strong "legs," allowing a vratix to perform impressive leaps. The last
      pair, situated at the end of the abdomen, are vestigial. Small, thin hairs
      cover their bodies and change color to express emotion. vratix excrete
      denin, a chemical that alters the color of their skin to reflect their
      mood.</p>

      <h2>Society and Culture</h2>

      <p>Vratix used bacta for thousands of years, and were not hesitant to
      share their secret with the galaxy at large, with thriving business based
      on selling and distributing bacta. Vratix are a logical and
      straightforward species that has trouble grasping abstract concepts like
      art and music. However, they can solve a complex problem by examining
      every detail and angle. Culture is centered on the hive mentality. They
      generally refer to themselves as the plural we rather than I, and usually
      under their hive name. They are generally a sociable species, preferring
      all information to be delivered personally. The vratix kept knytix, a
      smaller insectoid species, as pets and for the creation of dwellings
      (their saliva was used to make a mud-like paste that was then dried to
      make bricks). The vratix govern themselves through a representative
      council that was led by two canirs, their elected leaders.</p>

      <h2>Names</h2>

      <p>Vratix have a hive-based surname followed by a personal name, with
      names being non-gendered.</p>

      <p>&nbsp;&nbsp;<strong>Surname.</strong> Huitzil, Klversh, Vekkov,
      Xarstun</p>

      <p>&nbsp;&nbsp;<strong>Personal Names.</strong> Fenxix, Rlek't, Sruung,
      Yek</p>
