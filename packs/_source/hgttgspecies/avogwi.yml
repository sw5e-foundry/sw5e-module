system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Avogwi, often misidentified as altorians, are sentient predatory birds
      native to Altor 14, also home to the nuiwit. Except for their muscular,
      scale-covered legs, their bodies are covered in orange feathers, which
      camouflage them against Altor's orange skies. They have three fingers at
      the joint of each wing, which serve as hands when not in flight. Avogwi
      view the nuiwit as merely another prey species, though tastier than most.
      They react violently to suggestions that the two species evolved from a
      common ancestor.</p>

      <h2>Society and Culture</h2>

      <p>Due to their entirely carnivorous diet and clumsy hands, avogwi society
      is relatively primitive, based solely on hunting and water gathering.
      Avogwi are not social, living in mated pairs which can claim about fifty
      square kilometers as their exclusive territory. They also have very little
      technology, and distrust that of other species. Despite this, they
      developed a complex philosophy based on the teachings of the legendary
      hero Toro-toral, said to be the first avogwi to fly. The basic tenets are
      that all creatures that want to live must kill, and that all creatures
      that will not kill will die so that others can live. The sayings of
      Toro-toral are repeated by the avogwi at their only large-scale
      gatherings: ceremonial duels to the death to determine the avogwi leader,
      or Avog. Avogwi refuse to trade what little they have, as they are unable
      to understand why offworlders would trade them anything useful in exchange
      for anything the avogwi owned, unless it was to make the avogwi
      weaker.</p>

      <h2>Names</h2>

      <p>Avogwi co-opt names from other humanoids, causing their names sound
      unremarkable and common.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Daven, Gishad, Nemat,
      Tolok</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Airtov, b'Nul, k'Der, Sasith</p>
