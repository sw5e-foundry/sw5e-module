  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Bardottans, also known as phuii, are a species of thin reptiles. Their
      lower legs bend backwards and end in three-toed feet; their short forearms
      ended in three fingers and a thumb. Bardottans have long, curved necks
      atop which is a pointed skull with a beak-like snout dominating their
      face. While males do not possess hair, female bardottans have thick
      feather-like fibers that cover their heads.</p>

      <h2>Society and Culture</h2>

      <p>Developing a society with a rich Force-tradition early on in their
      history, bardottans were war-like demon worshipers in their earliest
      years, led by the Frangawl Cult in worshiping Malmourral. When the Dagoyan
      Order came to power, the Frangawl religion was banned and the Dagoyan
      practices of peace, meditation, and contemplation became socially
      entrenched in the culture of Bardotta. The Dagoyan Order represents the
      religious aspects of the bardottans, while the Bahk-tov Council and the
      Monarch of Bardotta preside over the government. All education on the
      world takes place in Dagoyan schools, though belief in the tradition is
      not mandatory. Valuing knowledge and spiritual devotion, bardottans are
      scholarly and insular when it comes to outsiders and sharing their
      knowledge. Cities on Bardotta are clustered around different academic and
      religious studies, studying in their own fields and sharing with other
      cities if asked.</p>

      <h2>Names</h2>

      <p>Bardottan names are short and soft, often with names inspired by
      offworlders. Most bardottans don't use surnames, but some use personal
      ones.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Ceres, Jacob, Korvuu,
      Retett</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Hallat, Isabella, Mel,
      Vesta</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Daii, -ellet, Nowah, Van</p>
