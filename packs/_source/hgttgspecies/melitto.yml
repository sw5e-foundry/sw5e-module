  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>While humanoid, the segmented chitin visible on their heads and hairy
      forearms betray the melitto's insectile nature. Their faces are covered in
      four plates, the largest being at the top, but do not feature visible eyes
      or mouth. The small bristles lining their body are in fact specialized,
      feathery cilia that can sense vibrations and detect electrical fields.
      Additionally, these cilia give the melitto a keen sense of smell. Their
      extraordinary scent-memories not only help them navigate, but also give
      them extensive identification and tracking skills. When operating in
      atmospheres different from their own, the melitto wear breathing tubes and
      carry dispensers filled with sugary nutrient fluid.</p>

      <h2>Society and Culture</h2>

      <p>Melitto are eusocial beings who live in hives ruled by queens and their
      adolescent female servants—called myrmitrices—who in turn control their
      own stables of male workers—or myrmites—who gather food, build the
      physical hive structure, and battle other hives as soldier-myrmites.
      Whenever a hive's population increases too much for it to operate at full
      efficiency, it becomes necessary to found a new hive. The myrmitrices then
      start fighting each other with the help of their warrior followers. When a
      victor emerges, she gains the right to be queen of a new hive. The
      myrmites who have the misfortune of surviving their myrmitrix's defeat are
      cast away from their hive, becoming ronin. Most ronin leave their
      homeworld to become expert hunters and thieves.</p>

      <h2>Names</h2>

      <p>Melitto names tend to sound incomprehensible, so ronins often take
      human names. Melitto have hive-based surnames, but ronins often forsake
      them in favor of personal surnames. Melitto are responsive to nicknames
      given by outsiders.</p>
