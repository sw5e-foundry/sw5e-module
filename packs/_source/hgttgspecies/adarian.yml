  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>A humanoid species of mammalians, the adarians have elongated skulls
      made distinct by the large hole which penetrates it. Lacking ears and
      noses, their skulls are covered in fine hairs which are very sensitive to
      sound waves, and their skin is underlaid by glands that allow them to
      detect odors. Sharp, bony ridges around their mouths substitute for lips
      seen in other species. The adarians have distendable throat pouches;
      elongating them to emit a loud subsonic call which helps in communication
      over long distances, reaching over 20 kilometers.</p>

      <h2>Society and Culture</h2>

      <p>Adarian society is based around a rigid caste system known as
      sceel'sara. Their governmental headquarters is the Hall of Decisions from
      which the upper tier of society has absolute control over those in lower
      classes. Operating a corporation-like government, the adarians boast that
      their society has never suffered from civil strife. Adarians carefully
      weigh their options before reaching any decision, but once the decision is
      made, they are rarely moved to change their minds. Adarians implicitly
      trust the judgment of those of higher status, and only the most flippant
      and rebellious adarian would disregard orders or advice from a member of a
      higher caste. Adarians have keen minds for business and a natural drive to
      succeed. They devote considerable time and energy to ensure the prosperity
      of their businesses. Most adarians active in the galaxy are scouts under
      the employ of mining corporations or the adarian government, searching for
      mineral-rich planets or moons to exploit.</p>

      <h2>Names</h2>

      <p>Adarians use melodic sounding agendered names.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Ador, Denka, Luur, Zuree</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Beldune, Meekel, Nelru,
      Tenefor</p>
