system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Xamsters are a species of sentient reptiles characterized by their
      large ears and bicuspid beaks. They have scaly skin, which sport several
      spiky crests. They have formidable claws and fangs, and their brains are
      capable of quickly and efficiently processing sensory input.</p>

      <h2>Society and Culture</h2>

      <p>Xamsters live in communities deep within the fungal forests of their
      homeworld. They coexist symbiotically with the fungi: a family of xamsters
      bind themselves to a particular type of fungus known as a malvil-tree and
      treat it like a beloved pet or even a member of the family. The reptiles
      give their own malvil-tree a name and tend to its growth and feeding. In
      return, the tree permits the xamsters to take up residence inside it and
      obey simple commands, like raising or lowering its branches to afford the
      caretaker a better look at the surrounding terrain. Most importantly, the
      family is able to harvest the tree's spores. They can use these fungal
      products for diverse tasks. For example, certain spores can be used to
      coat someone's eyes, granting the ability to peer through the fog of
      spores that shrouds the surface of Xagobah. These spores also grant safe
      passage through the forest to those who coat themselves in it; otherwise,
      other hungry trees might mistake the traveler for a meal. Xamsters know of
      many useful fungi, including Xabar, which can be used to make a potent
      form of spice with the power to paralyze the user. Offworlders use it to
      simulate death and maybe gain a glimpse of the afterlife, but xamsters use
      its properties to fake death to escape enemies.</p>

      <h2>Names</h2>

      <p>Xamster use melodic names with familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Naveen, Poxak, Relass, Xenet,
      Xineen</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Fii, Korr, Shaan, Tyy, Uura</p>
