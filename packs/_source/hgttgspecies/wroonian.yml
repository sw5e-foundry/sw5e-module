  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Wroonians are a blue-skinned species of near-humans from the planet
      Wroona in the Inner Rim. Wroonians are humanoid in shape, differing from
      humans only through their blue skin and yellow eyes. This coloration
      causes them to be confused with the similarly blue-skinned pantorans, a
      misunderstanding not helped by their representation in the senate by a
      pantoran senator.</p>

      <h2>Society and Culture</h2>

      <p>Wroonian society is wealthy, fun-loving, and deeply spiritual; as a
      result, wroonians often wear ornate clothing and tattoos. Wroonians love
      travel both at sea and in space, making them a well-travelled species.
      Their society is based upon the desire for personal wealth and material
      possessions. Despite this, they are a carefree and mellow species that
      enjoy taking risks and living for the moment. Wroonians distrust all types
      of authority, thanks in part to their planetary government's near-constant
      instability. Wroonians are a boisterous people, often adventuring just to
      brag to their fellow wroonians at it's conclusion, and overexaggerating
      their importance and courage. While not bragging however, wroonians become
      far more charming and friendly, and are known to liven up any social party
      with their wit and charisma.</p>

      <h2>Names</h2>

      <p>Wroonian names are diverse, often using naming the naming traditions of
      other species. Wroonians with these kinds of offworlder names are often
      considered attractive. Surnames are familiar. As a symbol of wealth, rich
      wroonians will sometimes change their name or surname to something unique
      and exotic.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Fikseth, Res, T'kara,
      Vashan</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Dellia, Lithish, Navi,
      Oozana</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Drosou, Mackas, Ethaani,
      Fedilak</p>
