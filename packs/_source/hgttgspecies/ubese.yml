  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The ubese are near-humans who appear graceful but frail. They tend to
      have fair skin and dark hair, with eye colors of brilliant green or blue.
      They can not grow any facial hair, and their facial structure is narrow,
      with high cheekbones and eyes that appear much too large for their faces
      when compared to baseline humans. Their vocal cords cannot produce speech
      above a rasping whisper sound, so they use a highly refined form of sign
      language with other Ubese.</p>

      <h2>Society and Culture</h2>

      <p>Little is known about ubese culture. Away from their homeworld, wayward
      ubese seem to care little for other societies' laws, customs, and morals.
      They are mysterious wanderers, nomadic warriors who hide their inner
      secrets and agendas just as they hide their faces behind helmets and
      breath masks. They seem to be loyal to one another, despite nurturing a
      profound hatred toward most other members of the galactic community. They
      generally make their livings as mercenaries, bounty hunters, slavers, or
      assassins—professions where they get to vent their hatred without fear of
      retribution. Particularly vengeful "True Ubese", the survivors of their
      homeworld of Uba IV are known to hunt down yrak pootzck, a demeaning
      phrase referring to the ubese who were rescued and relocated to Ubertica,
      as part of a millennia-old blood feud. Above all else, however, ubese are
      united in their hatred toward the Jedi. They blame the "protectors of the
      galaxy" for what happened to their culture and homeworld; even ex-Jedi are
      not above their hatred.</p>

      <h2>Names</h2>

      <p>Ubese names are usually very sharp or guttural. They do not use
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Eucariss, Gunnut, Reeveth,
      Shoubo</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Arket, Fouresh, Kavaz,
      Tiat</p>
