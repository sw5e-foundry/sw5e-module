  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Frozians have an extra joint in each limb that, to most, looks like a
      breach in a bone. Their movements are perceived as off putting and their
      gait is seen as weird, partly because they trot like the animals they
      evolved from. Frozians are clumsier than humans, but they have more acute
      senses and are better abstract thinkers. Experiencing the standard gravity
      found on most inhabitable planets is particularly difficult for frozians.
      While a frozian can reach one century of age under light gravity
      conditions, eighty years of age means death to frozians under standard
      gravity. Furthermore, frozians can only breed in light gravity conditions
      and under the influence of some specific vegetables from their
      homeworld.</p>

      <h2>Society and Culture</h2>

      <p>Frozians have a well-deserved reputation for probity, honesty and
      diligence. They are proud hard-workers and respect the letter of a promise
      to death, even if the other party has already betrayed it, making them
      highly valued civil servants. A strong-willed, good-willing people,
      frozians tend to help whoever is in need, and can become worried for those
      around them. Frozians tend to make an extra effort to take care of people
      they perceive as needing it. A trait common to the species is melancholy:
      frozians tend to see the worst possible outcome of everything, resigning
      themselves to their own doom, or accepting any government ruling them,
      even if they dislike it. They have a tendency to depress, except sometimes
      when helping other people, and they have a natural skill to wreak havoc on
      the mood of anyone around them—even if the frozians would never intend or
      want that. Frozians tend to reject contact with other frozians.</p>

      <h2>Names</h2>

      <p>Frozians use longer, eloquent sounding single-names.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Carlisgontoris, Rocatrinicel,
      Scorylance</p>
