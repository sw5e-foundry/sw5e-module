  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Members of the species are generally humanoid, with round bodies
      covered in thick fur and long, spindly limbs. Nevertheless, the species
      show a great deal of genetic diversity. Some have wide, toothy mouths,
      while others have fangs. Yuzzum feet are also variable, with some groups
      having hooves, some having pawlike feet, and others claws. Some yuzzums
      have long, pointed ears, while others have no ears to speak of. Most
      yuzzums are quite tall, although shorter individuals are born
      occasionally. These dwarf yuzzums are often social outcasts.</p>

      <h2>Society and Culture</h2>

      <p>Yuzzums live in small groups that travel the plains of Endor's moon.
      They spend much of their day hunting rodents, such as ruggers, that live
      in the tall grasses. Some yuzzums have learned to domesticate the
      arachnoid rakazzak beasts as mounts to aid them in the hunt. Although a
      few yuzzums have no technology at all, other groups fashion primitive
      spears and forked lances for use in hunting and self-defense. Yuzzums are
      sometimes exported as pets, despite the fact that they are sentient. Their
      musical language make them naturals to find work as singers. Yuzzums
      sometimes encounter the ewoks (as well as the other species of Endor's
      moon), and many ewoks can understand the yuzzum language, allowing for
      communication. Nevertheless, yuzzums are not averse to eating
      woklings.</p>

      <h2>Names</h2>

      <p>Yuzzum names are simple in nature, but typically sound oddly musical,
      catching others off guard. They use familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Aal, Moh, Swav, Tob</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Feb, Gid, Smarn, Vem</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Lolven, Momwa, Wofju, Yaikes</p>
