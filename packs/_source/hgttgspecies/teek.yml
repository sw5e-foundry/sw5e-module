system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Teeks are an intelligent species of rodent with a colony on the forest
      moon of Endor. They are scruffy with thick fur covering their entire body;
      only their face and hands are devoid of fur. Teeks have an extremely fast
      metabolism, allowing them to run at speeds far faster than nearly all
      other species in the galaxy. At full speed, teeks look nothing more than a
      blur, and can often do tasks in mere seconds.</p>

      <h2>Society and Culture</h2>

      <p>Teeks are widely known as expert scavengers. They love trinkets, and
      often scavenge and steal various objects from animal nests, and
      occasionally from ewok villages as well, which they hoard together, hidden
      from outsiders. Teeks, however, do not feel as if they are thieves—they
      always leave a trinket or token behind that they feel is of similar or
      equal value to whatever they take. The original owners of whatever was
      taken, however, are rarely happy with the trade—teeks value certain items
      that others might not. Ewoks think of them as a plague, and feel that even
      seeing a teek is extremely bad luck. For these reasons, teeks are
      generally avoided, and keep to themselves. Teeks are never considered prey
      in the jungles, due to their extreme speed, which they use both to escape
      from predators and to flee from the angry victims of their thievery. They
      are generally afraid of outsiders, and often hide from them; though, after
      some time of basic contact with them, teeks usually manage to overcome
      their initial fear.</p>

      <h2>Names</h2>

      <p>Teek names are very similar to each other. Their names are spelled with
      four letters, with a double 'E' between two consonants. Teeks do not use
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Meeb, Teek, Veet, Zeeg</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Feek, Leev, Weep, Yeed</p>
