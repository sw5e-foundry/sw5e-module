system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Firrerreo had developed canine teeth, two-tone hair, and nictitating
      membranes protecting eyes that are able to see into the ultraviolet range
      of the spectrum. These membranes also protect the eyes from intense
      flashes of light, as well as flying debris. They also have tremendous
      ability to heal quickly, able to survive even a direct blaster shot if the
      damage didn't harm anything vital to the heart or brain. Firrerreo also
      possess a deceptive strength, with even a weak and starved firrerreo
      capable of surprising force. Firrerreo have gold skin, which will turn
      silver when angry or frightened, and when wounded will scar over silver.
      Firrerreo metabolism also requires high amounts of protein, and as a
      result, firrerreo often pick the meat out of their food before eating the
      rest. Firrerreo are prone to animal like behaviors, from deep growls,
      baring teeth, snarls, and animal like keening in grief. Their ears hear
      well into the upper spectrum.</p>

      <h2>Society and Culture</h2>

      <p>Firrerreo are self-sufficient and independent to a fault, incredibly
      race-centric, caring for their own race to the exclusion of all others.
      Their society is organized in clans, and members of one clan will care
      little for the well being of non-clan-members.</p>

      <h2>Names</h2>

      <p>Firrerreo believe that one can 'own' another's name, and therefore will
      almost never give out their name to another, unless it is their mate or
      close friend. "Firrerreo" is used as common pseudonym in conversation.
      Speaking another's name is considered a form of power over that
      individual, and will do so at any chance they have. They use familiar
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Athric, Huldok, Leo,
      Thalnas</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Oni, Panthera, Sovlu,
      Zellulli</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Fuln, Gubon, Nao, Surr</p>
