  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Iotrans have smooth skin with a broad, flat nose, no discernible ears,
      and two-toed feet. They have distinctive spots on their bald heads, knobby
      protrusions at their temples, and short, stubby spikes protecting their
      shoulders, elbows, and hands.</p>

      <h2>Society and Culture</h2>

      <p>Iotrans firmly believe in a strong, stable culture, and see that as
      only achievable through a strong military tradition. Even before their
      planet was unified, their nations possessed strong militaries, until these
      militaries were merged into the Iotran Police Force (IPF), which enforces
      law and provides emergency services on Iotra and throughout the Iotran
      Expanse. From an early age, iotrans are trained for military service, and
      in their fourteenth season, (approximately 18 standard years of age) they
      are inducted into the IPF for approximately six standard years. At any
      given time, nearly half of the population is part of the IPF in one form
      or another. Especially talented enlistees in the IPF often become Iotran
      Bracemen, which track down fugitives outside of the Iotran Expanse, often
      without regard for local laws or for what other species call
      "jurisdiction"; this often results in diplomatic incidents. Iotran
      technology is primitive by galactic standards, typified by slugthrowers,
      surface vehicles, and simplistic computer and droid technology. However,
      they adopted galactic standard technology for much of their defense
      industry, and most iotrans are quite at home with modern tech. Iotrans,
      though not generally respectful toward other cultures, do respect
      stability and might.</p>

      <h2>Names</h2>

      <p>Iotran names are simple yet punctual, using surnames based on the
      military division they were trained by.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Anvon, Pirim, Rova,
      Terika</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Etan, Gat, Trig, Zad</p>
