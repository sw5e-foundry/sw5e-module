system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The holwuff are large creatures believed to be distant evolutionary
      cousins of the whiphids. It is hypothesized that they are yet another
      experiment conducted millennia ago by arkanian mad geneticists. As such,
      they share the whiphids' large frame, long snout, and small tusks. Their
      skin is even thicker, and slightly less hairy.</p>

      <h2>Society and Culture</h2>

      <p>Hailing from the Outer Rim planet of Alliga, the holwuff are best known
      as driven craftsmen who relish artistically expressing themselves through
      technology. They tend to enjoy reverse engineering existing technology and
      giving it an elegance thought unachievable in the mundane. They are very
      cultured, and live lives filled with art. Their people are renowned
      throughout the galaxy as being able to craft the finest luxury technology
      items. Many of the rich among the upper class contract holwuff specialists
      to create personalized, functional works of art. These fine works range
      from items as small as commlinks to as large as star cruisers. The entire
      planet's economy is dependent on the niche market, and the holwuff people
      are masters at plying their trade. The holwuff keep a careful eye on the
      galactic exchange, paying close mind to shift not only their products, but
      their political support to whatever faction seems to control the
      market.</p>

      <h2>Names</h2>

      <p>Holwuffs use gruff sounding names, with family-based surnames. Holwuffs
      are often known to use alien naming traditions for their children, as to
      seem more innovative to other holwuffs.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Borgath, Dralga, Oldair,
      Valwort</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Corwud, Rhathok, Tulfor,
      Wyvast</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Algorah, Dalvuros, Till,
      Wavol</p>
