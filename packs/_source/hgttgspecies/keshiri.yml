  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Keshiri are a near-human species native to the planet Kesh. Powerfully
      built, they have purple skin and are typically found to be very attractive
      by human standard, although the two species are different enough to be
      biologically incapable of reproduction. Separate populations of keshiri
      exhibit slight phenotypic differences. For instance, the keshiri of the
      continent Keshtah have lower foreheads, narrower faces, and smaller and
      more narrowly set eyes in comparison to the keshiri of the Alanciar
      landmass.</p>

      <h2>Society and Culture</h2>

      <p>Keshiri have long traditions of crafting and the arts, with
      glassblowing being a particular specialty and pantomime a favorite art
      form. They are a very religious species, worshiping gods known as the
      Skyborn. A group of sith crashed onto the continent of Keshtah in their
      starship after being knocked off-course during a hyperspace jump. The
      keshiri there believed the newcomers to be the Skyborn and gave themselves
      over to lives of service to the sith. Keshiri civilization developed
      independently on at least two of Kesh's landmasses, Keshtah and Alanciar.
      Those from Keshtah were once deeply religious, but their religion
      eventually evolved to worship their sith overlords, and in more recent
      millenia, it has disappeared entirely. The Alanciari were once very
      militarized in order to protect themselves from a sith invasion, but once
      the sith encountered them, war was averted, they were manipulated into
      disarming themselves, and the sith ended up ruling both as a single
      society.</p>

      <h2>Names</h2>

      <p>Keshiri use diverse names dominated by vowels, with open sounds being
      common. Surnames are familiar.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Cayen, Rodu, Segh, Takete</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Ehvi, Idara, Kiba, Veede</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Ceelom, Faas, Yehln, Zaed</p>
