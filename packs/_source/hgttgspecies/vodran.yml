system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Vodrans are a nimble, sturdy species of warm-blooded reptiles with
      acute senses and thick fingernails. Their bodies are covered with leathery
      skin that is hard enough to offer some protection from physical damage.
      Hard skin combined with underdeveloped muscles to restrict the range of
      emotions they can transmit through facial expressions. The face is ringed
      by a ridge of horns about the temples and on the chin.</p>

      <h2>Society and Culture</h2>

      <p>Vodrans have little sense of self and thus show little individual
      personality. They instead believe in "the value of many," seeing the whole
      species as a group. The restrictions on their facial movements prompt them
      to convey wishes and emotions with only body language and vocal
      inflection. As they think of the collective before themselves, they have
      trouble with advanced social conventions such as innuendo and etiquette.
      Although vodrans established an independent culture based on settlements
      made up of huts with dianoga hunters and spinefish fishers, after contact
      with an outside species, the hutts, the vodrans served the aliens as
      slaves for millennia with unswerving loyalty, a devotion that make them
      the most dedicated of the hutts' servant species. A mythology was created
      that suggested vodrans only existed once they began service to the hutts.
      While exceptions exist, the great majority of vodrans are absolutely loyal
      to hutt institutions, mostly represented as the kajidics. Vodrans eschew
      manifestations of individuality in their species, and they prioritize the
      well-being of their hutt masters, no matter how many have to die to
      protect their superiors' way of life.</p>

      <h2>Names</h2>

      <p>Vodran names are complex, using familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Hritho, Iodine, Odiwo,
      Wiz'leza</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Plooru, Lycri, Tanuu, Yydek</p>
