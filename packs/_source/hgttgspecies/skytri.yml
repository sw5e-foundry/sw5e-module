system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The s'kytri from Skye are a species of tall, sentient mammals. In many
      respects, they look similar to humans. The most striking differences are
      their large, apparently membranous wings, their decidedly non-human
      skintones and their towering height. As they are a flying species, the
      s'kytri regard excessive body weight as both impractical and dangerous,
      which is why they are all thin and brawny. Additionally, their skeletons
      are hollow, much like a bird's, which allows them easier flight. Because
      of that and despite their exotic features, they are deemed beautiful by
      many other species in the galaxy. While most mammals give birth to live
      young, the s'kytri hatch from eggs. Any egg that is perceived to have a
      female with blue skin or a male with green, which is considered abnormal,
      is perceived as an abomination, and is thus immediately killed.</p>

      <h2>Society and Culture</h2>

      <p>The s'kytri are grouped into clans, which are themselves divided in two
      groups, the Lowland and the Highland Clans. The members of each group bare
      distinctive markings. These clans dwell in cities built in the mountains
      and are governed by a Supreme Council. The position of Patriarch, leader
      of all the s'kytri, is awarded alternately to the leader of either
      Councils. Once given the position, a clan's leader would hold it for a
      22-year-long term, after which they are required to hand the title to the
      other clan.</p>

      <h2>Names</h2>

      <p>S'kytri names are distinct from the names of other species, accents
      emphasizing certain syllables. S'kytri do not use surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Caliél, Erigh, Lalémera,
      Talris</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Gairen, Kalish, Khira,
      Vashén</p>
