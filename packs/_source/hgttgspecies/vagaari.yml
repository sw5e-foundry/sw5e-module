  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Vagaari have a large head dominated by wide eyes and small ears that
      lie flat against the skull. With their stubby limbs, vagaari are not
      capable of great speed, but they are far stronger than they look. The most
      distinctive vagaari feature is a jaw with two mouths, each studded with
      pebbly teeth. Vagaari have separate digestive and respiratory tracts. The
      upper mouth is used for breathing and speaking, and the lower mouth is
      used for eating. Thus, choking is virtually impossible, and many vagaari
      chew on stimulant-laced leather strips known as pureweed while
      conversing.</p>

      <h2>Society and Culture</h2>

      <p>The Vagaari Empire thrives on cruelty and terror. It is so effective at
      spreading fear that even other Unknown Regions Threats, such as the
      ebruchi and the rakata, flee from its forces. Arrogant speciesists,
      vagaari believe that all non-vagaari are idiotic cowards who exist only as
      resources to be farmed. Vagaari fashion is designed for maximum
      intimidation. They wear oversized fright masks that bear painted
      expressions of fury, horror, and agony. Off the battlefield, they dress in
      voluminous robes, with roomy folds to conceal hidden weapons and poisons.
      Vagaari soldiers wear body armor and decorate their full-face helmets with
      death's-heads and demon mouths. Males and females have separate but
      equally important roles within the empire. Males dominate soldiering,
      piloting, and political classes, and females make up castes responsible
      for invasion strategy, slave acquisition, and torture. Food preparation,
      sanitation, maintenance, and similar drudge work is performed by
      slaves.</p>

      <h2>Names</h2>

      <p>Vagaari have simple names, ending with 'sh', and do not use
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Balsh, Qresh, Vuulsh,
      Yalkesh</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Matesh, Nuish, Skrash,
      Tumiesh</p>
