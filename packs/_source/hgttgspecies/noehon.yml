  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Noehons have large compound eyes, with facets responsible for different
      aspects of vision; such as motion or fine details. They have mandibles,
      and a soft, bristly carapace. They have four arms for using tools or
      brachiating through the jungles of their homeworld. Since they are used to
      hanging upside-down, they are resistant to disorientation and motion
      sickness, which afflict others in zero-gravity. Every noehon has a pair of
      scent glands, one of each side of their mouth, which produce a strong,
      musky scent. Each has a unique scent, which they use to mark possessions,
      territory, and their subordinates. The scent is difficult to remove.
      Noehons are typically possessive, frequently marking items and rarely
      discarding them when they think they might be useful later. They also tend
      to organize their possessions, ensuring everything is in its proper
      place.</p>

      <h2>Society and Culture</h2>

      <p>Noehon society is based on tightly-knit communities called welds,
      containing anywhere from a few hundred to ten thousand members. Welds are
      ruled by a single dominant "alpha" male, their "harem" of females treated
      as commodities, with excess females traded to other welds for technology
      or valuables. Adolescent males in the weld are driven off by the alpha as
      soon as they come of age. Elderly leaders will usually be killed by
      younger males, who then take control of the weld. Despite the rigidity of
      gender roles, noehons do not treat female and male offworlders
      differently. Regardless, they understand society in a hierarchical way:
      bullying subordinates while fearing and trying to appease superiors.
      Noehons have a natural talent for managing others through
      intimidation.</p>

      <h2>Names</h2>

      <p>Noehons names are incredibly difficult to pronounce, without using
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Gi'kha, Ki'nakra, Ri'zat,
      Zak'r</p>
