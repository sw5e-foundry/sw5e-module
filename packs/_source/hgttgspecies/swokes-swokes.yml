system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Large, stocky creatures, they have sharp, protruding teeth, perpetually
      grinning mouths, a series of horns crowning their pallid heads, one to
      three nostrils, and no hair. Some swokes swokes have long, heavy, spiked
      tails. Swokes Swokes have the ability to regenerate lost body parts,
      although the process leaves scars. Regrowing a missing limb takes about 10
      days, provided the individual avoids exertion. Swokes Swokes cannot
      regenerate heads, so beheading kills them instantly. Nevertheless, coupled
      with their naturally damage-resistant hides and resistance to pain, their
      regenerative properties make swokes swokes fierce, relentless opponents in
      battle. Swokes Swokes biology resembles that of more primitive lifeforms,
      such as flatworms. Their nervous system was underdeveloped in comparison
      to other sentients, lacking all but the most essential pain receptors.
      This gives them a remarkable pain threshold but deadens their sense of
      touch.</p>

      <h2>Society and Culture</h2>

      <p>The swokes swokes have a reputation as merciless, unscrupulous,
      overbearing ruffians who care only for personal prestige. The view of the
      swokes swokes as brutes is reinforced by official swokes swokes
      institutions and religious doctrines. Wealth is one measure of status, and
      expensive gifts are a sure way to gain an audience with a swokes swokes. A
      popular status symbol is to have gemstones surgically embedded in the
      flesh near vital organs.</p>

      <h2>Names</h2>

      <p>Swokes Swokes names are simple, often followed by another element, like
      a region of origin or a notable feature. Notable individuals adopt a
      double name as a symbol of fame.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Hoktek, Thoola, Urduk, Zurge
      Epithets. of Bredan, the Hardy, of Thalak, the Torn</p>
