  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The krish are smooth-skinned humanoids with large, wide heads and
      muscular bodies. Their faces are dominated by bony ridges above the eyes
      and along the nose, and their mouths are filled with rows of tiny, pointed
      teeth. Krish grin widely even when only mildly amused. They also have
      short, wiry hair.</p>

      <h2>Society and Culture</h2>

      <p>Krish love games; games of any sort, as they provide a way to focus
      their aggressive psychology. They are incredibly competitive, and they
      responde well in the face of difficult puzzles or extreme adversity.
      However, when faced with easier tasks, they will often intentionally make
      it harder for themselves. Their love of games also has a distracting
      effect, so they are highly unreliable when it comes to business matters or
      other jobs they consider unexciting. Their economy and culture are based
      on gaming, and gambling, and rigorous sports. The higher the stakes, the
      more intriguing the game. Krish unabashedly scour the galaxy in search of
      danger, excitement, and new distractions. They like to incite conflict,
      take risks, and gamble with the lives of other. Such pursuits have led
      many krish to become pirates, gamblers, mercenaries, and bounty hunters.
      Although they enjoy being part of the galactic community, the species has
      contributed precious little to its advancement. The krish allow their
      preoccupation with various cultural pastimes to interfere with their work,
      and they allow self-interest to rule their lives. Krish officials are
      often corrupt, treating politics as any other game and a means to gain
      personal prestige and power.</p>

      <h2>Names</h2>

      <p>Krish use simplistic names with a lavish ring to them.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Endelor, Demralon, Lamfad,
      Ziegg</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Betros, Darvat, Gaigoc,
      Virex</p>
