system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Woostoids are slender humanoids with dark orange skin and thick red
      hair. They have large, bulbous black eyes that rarely blink. Their logical
      minds give them a natural affinity for computer technology and database
      management.</p>

      <h2>Society and Culture</h2>

      <p>Woostoids are peaceful and are known as intelligent, logical thinkers
      who disdained abbreviations and shorthand in their communications with
      others. They find even the concept of warfare frightening. Their minds
      work in such a way that they always think of situations in an orderly
      manner, trying to create logical ties between events. When presented with
      chaotic situations or facts that have no logical pattern, they become
      confused and disorientated. In the days of The Old Republic, woostoids
      were often found at the head of bureaucracies devoted to the collection
      and analyzing of data, and Woostri was the single largest repository of
      Old Republic databases apart from Coruscant itself. Since the woostoids
      are so adept at computer technology, a large portion of Woostri's
      manufacturing and other production sectors are computer controlled and
      automated. This leaves them with a substantial amount of free time, so
      large portions of their economy are devoted to recreation. The world's
      white sand beaches, its many music and holo-theater complexes, and its
      vast amusement parks are always teeming with representatives of every
      spacefaring species. The woostoids welcome them all with open arms,
      delighting in the diversity it brings to their world.</p>

      <h2>Names</h2>

      <p>Woostoid names are simple and strange sounding.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Bzan, Nizu, Shome, Wan</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Akida, Didarri, Jopol,
      Trahan</p>
