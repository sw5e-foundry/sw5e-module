  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Mrlssi are flightless avian humanoids covered in gray feathers, while
      their head is bare except for a fringe of feathers covering the back of
      their head. Their head feathers are brown in young mrlssi, but becomes
      more colorful with age. Their arms, legs, and faces are covered in scales.
      Mrlssi speak in high, piping voices.</p>

      <h2>Society and Culture</h2>

      <p>Mrlssi are quick-witted and detail-oriented beings who value knowledge
      over physical possessions. Even the richest mrlssi live modestly, although
      they often have huge libraries consisting of rare and obscure texts.
      Mrlssi are seldom impressed by shows of wealth or power, but they always
      have great respect for talented intellectuals and scientists. Mrlssi are
      natural problem-solvers, and they love mysteries and puzzles. This
      quality, coupled with keen analytical abilities, is what makes their
      engineers so good at improving upon existing designs. They can spot a
      design weakness and work at it until they have found the key to fixing the
      limitation. mrlssi enjoy intelligent conversations and tinkering with
      gadgets, and they love nothing more than friendly debates over the
      relative strengths of various starships or speeders. They also delight in
      jokes and wordplay, considering themselves among the galaxy's foremost
      humorists. However, mrlssi humor is often so dry or based on convoluted
      premises that members of other species can have a difficult time knowing
      when a mrlssi is joking.</p>

      <h2>Names</h2>

      <p>Mrlssi names are melodic in nature, despite their structure, with a
      majority of mrlssi names being dominated by double 'S's or other
      consonants. They have agendered names with familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Crlisst, Kepor, Krssibel,
      Virssl</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Dagwa, Herssek, Jasst, Waray</p>
