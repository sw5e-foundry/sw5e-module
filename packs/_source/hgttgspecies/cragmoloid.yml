  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Cragmoloids are a rare species of intimidating pachydermoids with
      massive builds, big, flat ears, and manipulative trunks. While some
      cragmoloids have only one trunk, others have two smaller, secondary trunks
      surrounding the main one. Cragmoloids also have natural tusks under the
      trunk. These can be used in combat to impale an opponent or during a
      wrath-driven charge. Some cragmoloids have two big tusks, while others
      have four smaller ones. These tusks are extremely valuable to hunters.
      When crying, each of their eyes shed half a liter of water as a tear.</p>

      <h2>Society and Culture</h2>

      <p>Cragmoloids are proud and value a promise as a bond. They consider that
      losing one's tusks is a severe humiliation. They also prefer to face
      setbacks with direct answers instead of what they consider to be
      dishonorable tricks—something that does not stop them from pursuing
      careers in organized crime. Duplicity and deception commonly exasperates
      cragmoloids, who are prone to violent attacks of rage when angered.
      Notwithstanding their physical prowess, cragmoloids believe that
      unjustified violence is barbaric and to be avoided. Their civilization is
      organized into clans. Cragmoloids are so close to their families that they
      suffer severe depressions if separated from their homes or their friends.
      A cragmoloid always prefers chatting about kinship to talking about any
      other subject, and they commonly praise their direct relatives. Aliens
      speaking with a cragmoloid sometimes resort to asking about their families
      to obtain the cragmoloid's trust—although only after enduring many minutes
      of speeches.</p>

      <h2>Names</h2>

      <p>Cragmoloids use guttural names, without surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Akoom, Darak, Nauga, Urun</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Dombar, Ormoj, Rotto,
      Vuula</p>
