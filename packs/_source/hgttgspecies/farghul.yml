  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Farghul are felinoid sentients native to Farrfin. They have claws,
      incredible strength and speed, and are covered with tawny fur and possess
      prehensile tails. Their hands feature stubby fingers with retractable,
      sharp claws.</p>

      <h2>Society and Culture</h2>

      <p>The species has a reputation for being both fearsome fighters as well
      as cunning thieves. Despite this, farghul prefer to rely on cunning and
      trickery rather than direct confrontation and force. Something has gone
      wrong somewhere along the way if a farghul ends up in a fight, and it
      takes a lot of provocation to cause one to lose his or her good humor. A
      farghul tries talk and bribery before resorting to violence. The farghul
      are also generally distrustful of politicians and are considered slightly
      xenophobic. The farghul in general have playful and mischievous
      personalities. They delight in puns, plays-on-words, sleight-of-hand
      tricks, and intellectual puzzles. They are good-natured, boisterous, and
      always ready with a wide smile and a terrible joke. Rigged games of chance
      are favorite pastimes among the farghul, and if someone ever sees through
      such a con, they willingly return any money gained and cheerfully explain
      how they fixed the game. As such, they have a reputation as a species of
      unrepentant con-artists and thieves- and as far as adventuring farghul are
      concerned, this is not far from the truth. Farghul are very conscious of
      their appearance and they are never seen in public without the highest
      quality of clothing they can afford, not to mention the latest
      fashions.</p>

      <h2>Names</h2>

      <p>Farghul names are light and flowing, and typically have a pleasing ring
      to them, forgoing surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Crelfax, Pashira, Rish,
      Terath</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Delfas, Lyrrin, Shanifer,
      Terasa</p>
