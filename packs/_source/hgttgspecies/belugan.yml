system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Belugans are an aquatic species that hail from the planet Quarzite.
      Humanoid in stature, belugans are most identifiable by their bald heads
      and four-sectioned jaws. Belugan faces are adorned with colorful
      "sideburns" which are actually fleshy extensions of their cheeks. Belugans
      have white eyes with black, vaguely star-shaped irises. Their unique,
      four-sectioned jaws, which have orange tips, hid baleen-like teeth and a
      prehensile tongue.</p>

      <h2>Society and Culture</h2>

      <p>Belugans are a technologically advanced species that share their world
      with the human-like kage species. Both species live under Quarzite's
      surface, as the planet is wracked with highly pressurized environmental
      storms that do not provide a livable atmosphere. However, a space station
      was constructed at some point by the belugans. The space station, built
      far outside the planet's atmosphere, descended under Quarzite's surface
      with a series of massive turbolifts. This allowed the belugans to travel
      between their world and the space station, and in theory, leave the
      system. In addition, the belugans also maintain a network of subtrams that
      weave through Quarzite's massive cave system. Quarzite and its inhabitants
      are ruled by the belugan dictator, who leads an elite military force from
      a fortified compound. The dictator's forces are tangled in a conflict with
      the Kage Warriors, a group of vigilante kage who oppos the dictatorship
      over Quarzite. Despite the ruler's troops best efforts, the belugan
      soldiers are ineffective against the kage.</p>

      <h2>Names</h2>

      <p>Belugans use rounded regal-sounding names, with familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Dinetta, Forreres, Otega,
      Ujeti</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Foid, Geb, Nun, Vait</p>
