system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Cyclorrians are an insectoid sentient species who live in hives
      alongside the rest of their swarm. They have antenna for navigating their
      darkened hives, compound eyes, and adhesive feet. Cyclorrians have a
      powerful sense of smell, often to their own detriment, as areas saturated
      with multiple powerful scents can overwhelm parts of a cyclorrians' brain.
      To combat this, a majority of cyclorrians wear damp 'scent-cloths' made to
      dull the smells around them.</p>

      <h2>Society and Culture</h2>

      <p>Cyclorrians live together in hives, enormous compounds made up of
      natural materials where cyclorrian swarms live. These swarms are made up
      of multiple family groups of hundreds of cyclorrians coexisting closely,
      constantly repairing and expanding the hive. The main goal of the hive is
      to expand the hive outwards, this societal obligation causing cyclorrians
      to be efficient workers when found outside of their hives. Industrious
      beings, their social structure means that behaviors others would find
      overbearing and rude are acceptable, such as a lack of personal space.
      While they are well known for working together effectively, they are also
      highly individualistic, with some members learning activities such as
      sabacc from other beings in the brief rest periods allowed.</p>

      <h2>Names</h2>

      <p>Cyclorrians names have a distinct buzzing tone to them, dominated by
      the letter 'Z' in both personal and surnames. When an egg hatches, the
      young cyclorrian is brought before a hive's 'namers.' These namers will
      then spend hours, or even days, locked in their chambers deciding on the
      perfect name for the child. Cyclorrian names are agendered, and despite
      their hive-based society, they use familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Fezzap, Kizzic, Wazzet,
      Yizzur</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Calezz, Kozzem, Riptez,
      Zeketz</p>
