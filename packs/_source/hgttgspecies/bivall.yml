  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>A thin species of aquatic ancestry, the Bivall have long limbs but are
      relatively weak. They have skin in shades of pink and light green, and
      they lack hair. Not unlike the Rakata, Bivall have a thin head with eyes
      protruding from its sides. They have a crest atop their head, and their
      somewhat beak-like mouth is covered by a thin strand of flesh drooping
      over it. They were native to Protobranch, a planet located in the Core
      Worlds. The species' lives revolved around water, but they did not need it
      to thrive and could settle far from it.</p>

      <h2>Society and Culture</h2>

      <p>Bivall are soft-spoke intellects, with a penchant for research and
      study. A Bivall might find themselves immersed in a number of different
      fields, and in their lifetime might earn degrees in most of those. Known
      mostly as academics, Bivall value knowledge above all else and tend to
      focus on understanding problems rather than solving them, so it is rare to
      see them doing work that isn't highly theoretical. Although their abstract
      way of thinking makes them excel as theoretical physicists or
      mathematicians, many of them enjoy the arts. However, their tastes are so
      incredibly abstract that their arts and literature are incomprehensible
      and bafflingly random to almost all other species. Bivall are intellects
      at their core, and most that travel offworld usually due to to expand on
      their studies.</p>

      <h2>Names</h2>

      <p>Bivall names are medium in length and typically have a melodic tinge to
      their, using surnames based on their birth-pod, biological familiarity
      meaning little.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Akoden, Ivotta, Scavei,
      Yus</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Coves, Kyrap, Ovancis,
      Vioser</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Dal, Gein, Payd, Ressi</p>
