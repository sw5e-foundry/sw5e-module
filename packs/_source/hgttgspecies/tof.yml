  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Tofs are largely human in appearance, although their skin bears a
      sickly green sheen and they tend to have massive physiques, either
      powerfully overmuscled or grossly rotund. This is evident in their slow
      movements though tofs are capable of flattening an opponent with one slap
      of their large palms.</p>

      <h2>Society and Culture</h2>

      <p>Tofs often act as if devoid of any compassion or morals, with the
      majority of their thoughts dwelling on the lust for battle. Typically,
      they are crude and enjoy rough humor, as well as pleasure in both food and
      drink. In tof society, the males dominate their culture, with females
      seldom seen and normally kept on-planet. They are typically visited only
      when a tof ship returns to port. Among the royalty, clothing tends to be
      tailored greatcoats with powdered wigs whilst soldiers carry cutlasses and
      cudgels, and prominently display their battle scars. As a tof climbs the
      military hierarchy, they begin to wear more ornate clothing. Simple
      low-ranking deckhands wear cloth shirts, leather vests and head-scarves
      while ship captains are given heavy buccaneer boots, sparkling rings on
      most fingers, and a waist sash which holds both their blaster pistol or a
      carved club. Since tofs do not bathe, they tend to cover their odor by way
      of heavy perfumes, sprayed upon their tunics and boots. Tof starships tend
      to resemble traditional sailing vessels with curved hulls and energy
      radiating sails. Since they are so immersed in their own culture, they see
      no need to understand the ways of other species.</p>

      <h2>Names</h2>

      <p>Tofs use melodic yet primitive sounding names, with some parents using
      words that represent "winning" in some way to name their children.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Cheif, Dalsenor, Final,
      Sargothad</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Absolute, Bulestan, Kelena,
      Largod</p>
