system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Nazzar are bipedal, sentient humanoids, with distinctly elongated
      equine heads, and are known to be a physically powerful and agile species
      with a thin coat of fur. The species is distinguished by long ears that
      lay limp at the sides of their heads, and strong hands. A common piece of
      a nazzar regalia is a harness-like set of straps worn around the
      muzzle.</p>

      <h2>Society and Culture</h2>

      <p>Nazzar are deeply spiritual and distant, and extremely intolerant of
      other forms of religion and belief, especially those dissimilar to their
      own. The offworld nazzar who eventually overcome their xenophobia and
      natural prejudice form friendships with many other species in the galaxy,
      and are said to make trusted and loyal companions. Nazzar follow a state
      religion, which is known as Ulizra, and the nazzar government expects
      strict adherence to the tenets of the fourteen sects, each ruled by a
      praefect of the religion. These tenets include the concepts that outsiders
      will contaminate and taint nazzar society and culture; that nazzar
      individuals should remain in seclusion from the rest of the galaxy; that
      all philosophical systems are in disagreement with Ulizra; and that the
      group is always more important than the individual. Because of these
      beliefs, it is very difficult for other species to set up trade relations
      with the nazzar, or even for nazzar to befriend those of another species.
      Although legally allowed, outsiders who stay on Nazzri usually receive a
      less than warm welcome.</p>

      <h2>Names</h2>

      <p>The Nazzar language is dominated by 'R's and other hard consonants,
      bleeding into their naming conventions. Surnames are based on a familiar
      lineage within a specific sect.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Brryg, Drrn, Kohn, Roqar,
      Vot</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Kanas, Tallak, Srrn</p>
