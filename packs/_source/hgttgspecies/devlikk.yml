  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Devlikks are a shorter avian species with unique proportions, including
      a small tail, a long neck, and stubby legs. Their bodies are accented with
      prominent lime-colored feathers, and their faces feature red eyes and a
      long beak. Their digits end in a dark claw for traction, as they often run
      on all fours to make up for their short legs. Their most unique ability is
      a sensitivity to magnetic fields, which they use for navigation, as they
      always know which way is north. They have a very short lifespan, maturing
      to adulthood in two years and typically dying before the age of ten.</p>

      <h2>Society and Culture</h2>

      <p>Although they are capable of using technology and living in advanced
      societies, devlikks have a strong preference for nature and seek to
      preserve the wetlands and bogs that they live in. The devlikk homeworld of
      Ord Radama, once a swampy one, has been overtaken by human immigrants, who
      make up the majority of the population and hold most of the wealth and
      power. It sits at a major hyperlane crossroad and plays a major role in
      galactic trade, particularly in exporting its mineral deposits and wines.
      While the biggest cities, like Livien Major and New Raido, are very
      advanced, most devlikks live in slums such as the Barrows. Their original
      architecture, mostly buried underground, is a maze-like network of small
      tunnels. While offworlders find the configuration off-putting, devlikks
      have little trouble navigating the passageways due to their innate
      magnetic sense and small size.</p>

      <h2>Names</h2>

      <p>Devlikk use short, simple, pleasant sounding names, with no distinction
      between male and female naming.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Dul, Nellida, Saiba, Ven</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Benmyd, Raeves, Tinlave,
      Wandurge</p>
