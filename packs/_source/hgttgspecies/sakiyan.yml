system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Sakiyans are resistant to extremes in temperature, able to operate
      comfortably at heat levels that might injure non-sakiyans, as well as
      frigid depths, although those are less appealing to them. Because their
      appearance is so similar to that of humans, many debate whether the
      sakiyans are a near-human species or completely unrelated. Those who argue
      for the latter cite the species' vastly different brain structure. The
      brain is nearly double the size of its human counterpart, a result of the
      organ's highly developed centers devoted to sensory input and reflexes.
      Indeed, the sakiyans reach nearly supernatural levels of sensory
      perception, surpassing even the large-brained bith in perceptual
      capabilities. The wide variety of wavelengths they see makes full-spectrum
      light seem almost like a glare. Sakiyan skin is also highly
      reflective.</p>

      <h2>Society and Culture</h2>

      <p>Sakiyan family structure separate into groups known as prides or clans.
      Each sakiyan recognize an individual known as a pride-father, and other
      individuals are known as pride elders. The sakiyans have highly developed
      concepts of honor that dictate how to respectfully treat others. In the
      case of a clan's reputation being besmirched, the members might go to
      great length to redeem their collective honor; indeed, piquing a sakiyan's
      honor even causes physiological response, such as a racing pulse.</p>

      <h2>Names</h2>

      <p>Sakiyan names are similar to those of humans, being easily translated
      into Galactic Basic. Surnames are pride based, but not always used.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Darjer, Jonbri, Kornat,
      Terphi, Zacroy</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Cecian, Emeri, Kata, Sanlen,
      Simcar</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Alliban, Cavleo, Heyros, Hinalb,
      Stalwri</p>
