system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Ongree are an amphibious sentient species characterized by yellowish or
      brownish skin and elongated, tapering heads with beaked mouths. Two
      flexible eyestalks protrude from either side of an ongree's head, allowing
      them to see an object from many angles. Their lipless mouths are located
      above four nostrils and their other facial features, giving them an
      "upside-down" facial appearance. They possess two thick fingers and an
      opposable thumb on each hand. Despite the apparent lack of dexterity
      inherent in their makeup, ongree are nevertheless able to hold even small
      objects with ease. Their natural agility is belied by their humpbacked,
      awkward appearance.</p>

      <h2>Society and Culture</h2>

      <p>Ongree are commonly seen as a diplomatic, measured species. This
      opinion is fostered by the arrangement of their eyestalks; since ongree
      can see an object from multiple angles, it is thought that this ability
      gives the species a unique mindset, allowing them to examine a situation
      from all possible perspectives. It is believed that their literal and
      figurative outlooks are linked by a psychological trait. Due to their
      unique psychologies, many members of the species are adept negotiators,
      diplomats, and politicians, though this characteristic is also exploited
      for less wholesome activities, and some are known to consort with crime
      lords and gangsters.</p>

      <h2>Names</h2>

      <p>Ongree usually take a long time to settle on names for their children,
      usually asking close friends and family for naming advice. Surnames are
      familiar.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Atrov, Betwen, Cortes, Kaiman,
      Khiroc</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Dautir, Jayman, Llij, Mutra,
      Yojaw</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> -Frek, Nivek, Oej, -Prah,
      -Troz</p>
