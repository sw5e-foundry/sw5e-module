  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Eloms are short, stocky mammalian bipeds with tough skin under a thick,
      oily pelt of dark and stringy fur. They have several layers of fat,
      evolved to capture moisture, making them equipped for life in the harsh,
      desert environment of their home. Eloms' hands and feet each have hard,
      hooked claws, perfect for digging, and prehensile toes on each foot, which
      can be used as grip tools. Their hands and feet are also covered with
      thick calluses resulting from the rigorous lives they live. Because of
      their subterranean existence, eloms have exceptional night vision.
      However, their small eyes are easily overpowered by bright light. They
      also have two hard, sharp tusks protruding from their mouths, with thick,
      pouchy jowls in which they are able to store food. Eloms evolved in a dry
      environment, and their biological systems are adapted for desert survival.
      Eloms have the ability to move quickly, even when laden down with a heavy
      load. Some eloms also have long, white tails which almost reached their
      feet.</p>

      <h2>Society and Culture</h2>

      <p>Eloms are an extremely peaceful and unsophisticated species who live
      deep beneath the surface of their homeworld. Strict herbivores, the eloms
      are content to live in their underground homes, raising their young.
      Although they are highly intelligent and ambitious, eloms often
      underestimate the capacity for wrongdoing exhibited by other species and
      therefore are often able to be manipulated by others to do their bidding.
      Eloms are generally easygoing, kind, forgiving and eager to learn.</p>

      <h2>Names</h2>

      <p>Elom names come from instinctual feelings, being sharp and to the
      point, with surnames being familiar.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Arik, Greth, Nulus, San,
      Tef</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Aijest, Brenap, Elitz, Franzep,
      Louid</p>
