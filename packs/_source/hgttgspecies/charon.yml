  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Charon resemble a cross between humanoids and arachnids, encased by a
      thick mottled carapace, with distinctly arachnoid features, such as
      spinnerets in the abdomen. They have four arms with triple-clawed hands,
      and four insectoid legs, with clawed feet. Their uppermost pair of arms is
      slightly larger than the other pair. Their multiple limbs have several
      advantages; charon are exceptional climbers, are extremely stable on their
      feet, and their claws make deadly weapons. Extremely powerful, they are
      also able to lift objects which are far too heavy for most other species.
      Charon have mandibular chelicerae at the sides of their small mouths and
      bulging eyes. Charon have a large trailing abdomen, capable of spinning
      strands of sticky webbing several times a day.</p>

      <h2>Society and Culture</h2>

      <p>Most charon are dangerous, bent on killing every other being they
      encounter. They come from a dimension known as otherspace, a region beyond
      the confines of the known galaxy, but the name of their homeworld and its
      location are mysteries yet to be solved by others who have encountered
      them. The proximity of their home to a black hole gave birth to a ruling
      death cult that believes the mission of the charon should be to destroy
      all life. The cult seeks to cast every living thing "Into the Void of
      Death." A figure known as the Prophet of the Void governs charon society.
      Just prior to the Battle of Endor, a splinter group calling themselves the
      Cult of Light secretly constructed the charon's first ever hyperdrive.
      Many disillusioned with the savage ways of the cult left to find a new
      life.</p>

      <h2>Names</h2>

      <p>Traditional charon do not have personal names. Charon defectors
      sometimes adopt names, usually after meeting other species in the known
      galaxy.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Fa'chak, H'zish, Ry'shyrr,
      Sya'kalia</p>
