system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>A bipedal mammalian species descended from hoofed ungulates, the
      yarkora evolved into a tall species with a long snout with wide nostrils,
      smooth fur, and rough tufts of hair. The yarkora possess two stomachs, one
      for digesting and the other for storing food, and multiple redundant
      organs that account for their longevity. Because of this redundancy, it is
      rare that a yarkora will die of natural causes and makes internal injury
      extremely treatable and non-life threatening. Having incredible eyesight
      and hearing abilities, some scientists believe they are also able to
      project empathetic abilities onto others, possibly identifying the species
      as highly Force-sensitive.</p>

      <h2>Society and Culture</h2>

      <p>Yakora are masters of manipulation. They are known as crafty con
      artists and scoundrels. They will masterfully dissect information from
      others, despite almost never talking about their own past, culture or
      interest. In this sense, the culture of these people remains a well-kept
      secret for centuries. Taking place over several years, mating rituals
      between yarkora includes the exchange of letters that will be dissected
      and analyzed until the topic is complete and another can begin. They are
      very solitary individuals; even married yarkora tend to live apart. All
      women are expected to bear at least one child due to low population
      numbers and the females of the species tend to raise their young. They
      often promote a distinguished appearance, even when dressed in the
      lowliest garb.</p>

      <h2>Names</h2>

      <p>Yarkora have two-part names, separated by a hyphen or a space. Because
      of this, they do not use surnames</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Daliv-Storc, Grenek-Yilach,
      Luif-Belal</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Alatc-Heka, Fashe-Qaet,
      Hrect-Golo</p>
