system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Vahla are tall, slightly-built near-Humans. Their physiology is largely
      similar to humans, with the marked exception that their skeletons are
      mostly composed of thick cartilage rather than bone; this unique
      adaptation gives the vahla greater flexibility than baseline humans.
      However, they are more physically frail than similar species. Their hair
      color ranges from black to gray to white, with both or all three colors
      sometimes being present simultaneously. Occasionally, Vahla are born with
      red hair; those so endowed are often regarded as having been blessed by
      the goddess Vahl.</p>

      <h2>Society and Culture</h2>

      <p>Vahla are a shrewd people, often finding themselves on the darker side
      of galactic society. They are nomads who are forever in search of their
      lost homeworld. They are generally regarded as naturally bright and
      clever. Their small economy is stoked by petty theft, limited-scale
      piracy, and bounty hunting. All Vahla are Force-sensitive, and whether
      aware or not, have ties to the dark side of the Force. Most Vahla are
      members of the Ember of Vahl, a dark side cult that worships Vahl, a
      goddess of fire and destruction. Though not all Vahla are members, all are
      expected to follow the orders of a six-priest central coven believed to
      have been "chosen" by the goddess. To show their faith and devotion, those
      Chosen will inflict scars upon themselves. The Chosen consult with Vahl
      through use of Force-empowered farseeing. They also interpret signs and
      portents, and make policy for the Vahla.</p>

      <h2>Names</h2>

      <p>Vahla take names similar to humans. Surnames are familiar.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Cornic, Jakaust, Maljova,
      Theamar</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Alisshy, Celrose, Josvane,
      Kariday</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Allglad, Haghar, Lewhard,
      Redche</p>
