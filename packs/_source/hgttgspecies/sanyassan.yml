system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Sanyassans are a sentient species with reptilian physical traits and
      powerfully-built frames The sanyassans have tougher hides than most
      humanoids, which make them more resistant to physical or energetic damage.
      According to human observers, sanyassans' simian faces are skull-like in
      appearance (the skin pulled tautly over the bones).</p>

      <h2>Society and Culture</h2>

      <p>Sanyassan society is divided into clanic structures—united groups of
      households tracing descent from a common ancestor. Sanyassans observe no
      law prohibiting them from preying upon others. There exists a form of
      aristocracy, but social standing is gained by force, rather than
      birthright. The sanyassan upper class consists mainly of the strongest and
      tallest individuals. Their culture is brutal, based on warfare and
      exploitation of the weak. The species seem unforgiving, ruthless and
      calculating to outsiders. In the wider galaxy, these fierce brawlers are
      renowned for their bad tempers and low intellectual performance. Despite
      their aggressive nature, sanyassans are social beings and feel
      uncomfortable while alone. They prefer to be in large groups, as when
      marching out to raid. Technologically primitive by galactic standards,
      sanyassans formed a feudal-level civilization, with a crude hieroglyphic
      writing system. They never developed the secrets of space travel for
      themselves, but stole it from others. They have a rather rudimentary grasp
      on technology, which caused more harm than good when they try to use
      it.</p>

      <h2>Names</h2>

      <p>Sanyassan names are generally short, between two and three syllables.
      They lack surnames or familial names.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Daj'ribal, Jutleth, Thorok,
      Yanden</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Cranna, Gogmig, Szinker,
      Torokay</p>
