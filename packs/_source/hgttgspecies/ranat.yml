system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Ranats are a species of small rodents. Despite sharing many features in
      common with other sentient species, nevertheless, the status of ranats as
      fully sentient or merely semi-sentient has been the subject of galactic
      debate for centuries. Ranats have short, heavy-duty, retractable claws
      that, while of limited use in hunting or self-defense, allows a ranat to
      dig through soil and loose rock. The ranat body is tough, wiry, and
      partially flattened. Exceptional flexibility allow ranats to squeeze
      through small openings that would prove impenetrable to other beings of
      similar size. Their senses are acute: they can see in the dark and detect
      others' moods by scent. A ranat's bottom two incisors are sharp, pointed,
      and discolored. Because their incisors grow rapidly, ranats gnaw
      constantly to wear them down.</p>

      <h2>Society and Culture</h2>

      <p>Although they are not intelligent by most metrics, ranats are
      resourceful and crafty. They lack the higher emotions associated with
      other species, consumed instead by the simple desires to eat and fight.
      This makes them preeminent survivors and experts at scrounging, foraging,
      and getting into places that they do not belong. However, it makes them
      come off as belligerent, temperamental, self-centered, and stubborn to
      outsiders. Notions of honor and keeping one's word are only good as long
      as they do not interfere with the search for food. Ranats insist on their
      superiority to other lifeforms, calling themselves Con Queecon ("the
      conquerors") in their own language—ranat is an appellation from others
      that refers to their rodent-like appearance.</p>

      <h2>Names</h2>

      <p>Ranat names rely heavily on letters such as 'S' and 'E', using familiar
      surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Engal, Kleef, Nestra,
      Veerz</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Jeers, Marbor, Pallik,
      Targan</p>
