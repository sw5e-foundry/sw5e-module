system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Evolved from shallow-water crustaceans, krevaaki have a protective
      shell and glassy black eyes. Krevaaki lack noses, but compensate by
      detecting scents with six feelers around its mouth. Krevaaki use their
      eight segmented tentacles for increasingly specialized tasks as they grow
      older. A krevaaki child uses all its tentacles, but adults stand upright
      on six of them, using the other two the way other beings use their hands.
      Some tentacles develop protrusions similar to opposable thumbs. Tentacles
      used as legs become stronger but less able to dexterously grasp and
      manipulate smaller objects.</p>

      <h2>Society and Culture</h2>

      <p>Krevaaki are a peaceful, spiritual Species. With minimal interest in
      acquiring wealth, power, or fame, they seek wisdom through exploration and
      meditation. Although they are an ancient spacefaring species, krevaaki are
      rarely encountered in the galaxy at large. Krevaaki prefer not to draw
      attention to themselves, and they are thoughtful, wise, and spiritual,
      refocusing their negative emotions through meditation and seeking to
      resolve conflicts peacefully. In response to other species' xenophobia,
      the krevaaki cloak their tentacled bodies with heavy robes or similar
      garments, leaving only their two dominant tentacles exposed like humanoid
      arms. More than a few beings have been caught unaware by the sudden
      appearance of additional tentacles from beneath the folds of a krevaaki's
      garments.</p>

      <h2>Names</h2>

      <p>Kravaaki names are exotic, some using hyphens between two-part names,
      and others with singular ones. Krevaaki use familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Chal-Vosa, Kion-Tas, Tauj,
      Visto</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Craasadi, Jol, Skaasad, Vosa</p>
