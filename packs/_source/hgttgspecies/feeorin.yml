  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The average feeorin has thick tendrils hanging from the backs of their
      heads and much smaller and thinner ones hanging from their face. The
      feeorin can live for up to four hundred years, and due to a unique
      metabolism, they grow stronger with age rather than weaker, until they
      die, dropping dead suddenly of old age. Curiously, some feeorins had noses
      while others lacked any nasal openings. Feeorin are reputed to be brutal
      and dangerous. While this is not entirely the case, they are quick to
      anger and highly impersonal. They typically place their own affairs above
      others, causing other species to regard them as selfish.</p>

      <h2>Society and Culture</h2>

      <p>Feeorin are known to come from the planet Odryn, a planet of severe
      climatic extremes. They believe that the spirits of their fallen Elders
      reside at the Sanctum of the Exalted, where they forge Odryn's seasons.
      Little else is known about the world, given the closed nature of feeorin
      society. Few feeorin venture from their homeworld, and those few outsiders
      who have survived a visit there tell of a world well suited for the
      feeorin, but nobody else. Feeorin who travel offworld typically select
      careers compatible with their self-serving and aggressive nature. Feeorin
      encountered on their homeworld display a greater range of personality and
      motivation. In either case, feeorin do not seek out acquaintance with
      members of other species.</p>

      <h2>Names</h2>

      <p>Feeorin often name their children after famous Elders of their species,
      having simple names composed of no more than 4 or 5 letters. Surnames are
      not used.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Bral, Dod, Kren, Nym, Zun</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Crayl, Deyla, Fein, Nor,
      Pryn</p>
