  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Drabatans are amphibious humanoids with small dark eyes and a massive
      mouth. They are excellent swimmers (though they strongly dislike salt
      water) and dine on a variety of insects, fish, and algae. They also
      developed large lungs and strong diaphragms, which enable them to achieve
      powerful vocals while singing or shouting.</p>

      <h2>Society and Culture</h2>

      <p>Drabatans are a passionate species dedicated to the performing arts,
      especially song. Critics describe their music as hauntingly beautiful and
      insist that drabatan music requires no translation for anyone to
      appreciate the ethereal, melancholy tones. Performance troupes throughout
      the galaxy count drabatans, who often play the heel, among their number.
      Drabatan voices are pitch-perfect, and many consider seeing a live
      performance of the Pipada Symphony Chamber Chorus to be life changing.
      Song is firmly entrenched throughout everyday drabatan life, in areas
      ranging from entertainment to education. Drabatan families have unique
      songs that detail their lineage and history, often performed at gatherings
      by the family's best vocalist and rearranged for the occasion. Drabatan
      culture values free artistic expression and opposes censorship. It is said
      that the only thing a drabatan likes more than a song is a cause.</p>

      <h2>Names</h2>

      <p>Drabatans receive notoriously long non-gendered names that preserve a
      record of each individual's clan, distinct familial branch, and chief
      living forebearers at the time of hatching. Drabatans are responsive to
      nicknames given by outsiders.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Klikek'Filiti'Nam
      Yab'Trikota'Druumot Huloi'Jitinsk'Colito Uta'Wio'Kentiga'Lajit,
      Lunda'Nintoso'Hijalla'Bak Bramt'Incosa'Ooto'Radam Ghinta'Ionit'Djam
      Wenti'Flugoe'Hinsodot</p>
