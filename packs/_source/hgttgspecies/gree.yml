system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The gree are a six-tentacled race of cephalopod creatures that have an
      unusual anatomy with large sad-looking eyes along with tall foreheads.
      These features support an immense brain sac which flops oddly behind their
      heads. There is no visible mouth present on their faces though it is
      thought that multiple fleshy folds beneath the eyes served vocal oral
      communication needs. Their evolution on their homeworld means that they
      are comfortable in Type II atmospheres with Type I being unpleasant to
      them. As such, when traveling through such an environment, they wear odd
      spongy communication devices to cover their communication folds. Gree
      possess multiple tentacles with each holding a particular function. The
      first pair serves as fine manipulators, another as heavy grippers, and the
      third as ambulators.</p>

      <h2>Society and Culture</h2>

      <p>Gree mark their foreheads with hieroglyphic tattoos to denote caste and
      rank. Crafters produce devices, Researchers create new technologies,
      Operators know how to "Play" the devices, and Administrators function as
      the Gree government. The gree lacked any form of a warrior caste and
      instead had used droids in the past for such a role. As gree engineering
      reached its zenith, the Operators came to dominate the other castes.
      Eventually, the Researchers and Crafters disappeared entirely. Their
      society became apathetic, with the Operators and Administrators concerned
      only with maintaining their cultural purity and keeping what devices they
      can still understand in operation.</p>

      <h2>Names</h2>

      <p>Gree names are agendered and do not use surnames, but all gree names
      end with an apostrophe followed by the letter 'K' to denote their
      connection to gree-kind.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Alot'k, Felat'k, Kratak'k,
      Tira'k</p>
