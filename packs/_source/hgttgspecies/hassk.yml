system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Hassks are a species of subhumanoids almost entirely covered with
      coarse stringy fur. Their faces, however, are hairless, revealing dry
      skin. They have sensitive ears, two large forward-facing eyes that give
      them a keen night vision, all the better for hunting. Their eyes are their
      most distinctive feature, leading to the phrase "caught in a hassk's
      gaze," referring to someone caught in a dangerous situation. Their mouths
      are filled with flesh-tearing fangs. Hassk are near-feral, and are thought
      of by most as wild animals.</p>

      <h2>Society and Culture</h2>

      <p>When they were first confronted with advanced technology, the hassks
      were not prepared for its impact on morality. Consequently, many leave
      Hasskyn to roam the galaxy with their littermates, making trouble in
      places of ill repute. Because of this, most hassks seen in the galaxy are
      found in professions of ill repute, such as pirate or gang member, which
      leads to the preconceived notion in many species that hassks are naturally
      inclined towards these destructive activities. The most important thing to
      all hassks is their litter, which they are seldom seen without. A litter
      typically consists of three to four hassks who travel together for all of
      their lives, as the bond between littermates is incredibly strong. A hassk
      seen alone is often thought of with a mix of confusion and worry.</p>

      <h2>Names</h2>

      <p>Hassks are named after natural phenomena, animals, and other words that
      people would consider intimidating or dangerous. Mothers name the first
      litter, while subsequent litters are named by the previous children as to
      form bonds between them early on. Hassks do not use surnames.</p>

      <p>&nbsp;&nbsp;<strong>Male Names.</strong> Brakk, Graiv, Narvust,
      Ripper</p>

      <p>&nbsp;&nbsp;<strong>Female Names.</strong> Growl, Harkas, Klau,
      Rulsk</p>
