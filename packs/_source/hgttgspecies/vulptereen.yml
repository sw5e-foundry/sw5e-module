  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Vulptereens have six tusks protruding outward from their snouts, a
      feeler on their snout, and two pointed ears on top. Their eyes are capable
      of seeing in dark conditions, yet they lack good depth perception. This
      results in the use of echolocation in these conditions. The species' two
      arms end in clawed hands, that if dismembered can sometimes result in
      aphasia since they lack a central brain. However, they are quite hardy
      when exposed to a variety of environments and do not succumb to toxic
      conditions.</p>

      <h2>Society and Culture</h2>

      <p>Vulptereens are naturally optimistic and hopeful, traits that are
      slowly washed away as their homeworld's exploitation is continued. The
      vulptereen are native to the planet of Vulpter, a world that once
      contained a thriving ecosystem. The vulptereen, however, transformed their
      verdant homeworld into a wasteland due to their over-industrialization.
      They are as poor a people as can be found in the galaxy. Most members of
      the planet's populace work for corporations, operating massive underground
      drilling machines that carve out tunnels used for waste storage. Those not
      directly under the thumb of corporations live in the crumbling aboveground
      cities, producing the few airspeeders and other vehicles for which the
      planet is known. Whether toiling away in underground caverns or cranking
      out locally designed repulsorcraft, the people of Vulpter are constantly
      inundated with inferior products and cast-off merchandise.</p>

      <h2>Names</h2>

      <p>Vulptereen have short and simple single syllable names, these names not
      distinguishing between genders, and using familiar surnames.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Bar, Dun, Lod, Wok</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Greq, Kerg, Mol, Vent</p>
