system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Skels were a bipedal species of mammals native to the desolate
      ice-covered planet of Hoth. They were naturally agile, and featured
      protective tusks that grew out of their snouts. The hands of the Skels
      boasted tough, bony claws which could be used to burrow under snow and
      ice. Their fur was dense and thick, insulating them against extremely
      cold-weather environments, such as their homeworld. Such was the
      effectiveness of their fur that they could survive without shelter in
      conditions far colder than their homeworld's average temperatures.</p>

      <h2>Society and Culture</h2>

      <p>The skels have a primitive yet well-organized culture, and are
      aggressive by nature. They spend their time roaming the frozen wastelands
      of Hoth. Skels communicate through a series of loud snarls and grunts,
      often mistaken for beastial cries. They live in caves, located within
      Hoth's mountain regions, where they are provided with shelter. The skels
      hunt in packs, and are brazen in their work, due to the scarcity of food
      on Hoth. As such, they will attack anything without provocation, including
      scouting droids. Skels typically have fatalistic mindsets, seeing death as
      something to expect, rather than something to avoid. As a result, skels do
      not have any death rituals, simply allowing the corpse to remain until the
      snow eventually covers them. Some skels fashion clubs from severed hands
      or feet of other skels.</p>

      <h2>Names</h2>

      <p>Skels do not use names in the traditional sense. Skels are able to
      differentiate between each other through their speech patterns and unique
      scent, forgoing names entirely. Because of this, skels have difficulty
      understanding the concept of individual names unless it is specifically
      explained. However skels are responsive to nicknames given by
      outsiders.</p>
