system:
  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>Kowakian monkey-lizards are reptilian bipeds, with thin, almost
      twig-like limbs, and a small, triangular head atop slender shoulders. They
      have two large, highly sensitive, floppy ears, which curve backwards and
      narrow into a thin, hairy point, and often have several small holes in
      them, though not always. Some monkey-lizards wear piercings in those ears.
      In place of a nose, monkey-lizards have a wide, hooked, dark-colored beak,
      like that of a reptile, which can be opened to reveal a large, toothless
      mouth.</p>

      <h2>Society and Culture</h2>

      <p>Kowakians are greedy, nefarious beings that revel in others suffering.
      They often use their ceaseless, loud laughter to scare off any potential
      attackers. They travel in groups, making as much noise as possible in an
      attempt to intimidate other creatures in the jungles. After finding a
      corpse, monkey-lizards spend time fighting over the food instead of
      sharing it. Kowakians are known to be extremely cruel and mean-spirited to
      both other monkey-lizards and to members of other species. They have a
      clear sense of mischief and humor, and are known to mock others, laugh at
      them, and even fling objects towards them simply because they find it
      amusing. They are able to perfectly mimic almost any language, and
      according to certain studies, communicate in those languages if they wish.
      Monkey-lizards are also known to laugh at appropriate times during
      conversations, and can often repeat back what they hear fairly
      accurately.</p>

      <h2>Names</h2>

      <p>Kowakians don't put much stock in names, being given entertaining
      nicknames by others typically.</p>

      <p>&nbsp;&nbsp;<strong>First Names.</strong> Bibidi, Fikoot, Gluch, Kneve,
      Lecherous Middle Names. D., R., C., S., B.</p>

      <p>&nbsp;&nbsp;<strong>Surnames.</strong> Flim, Morsel, Rakrak, Tiketa,
      Zilch</p>
