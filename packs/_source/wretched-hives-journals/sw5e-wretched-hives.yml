        <h2>Biotech's Implements</h2>

        <p>Biotech's implements include all of the necessary components to craft and install cybernetic augmentations in humanoids and beasts.</p>

        <h4>Medicine</h4>

        <p>Combined with biotech's implements, your medical acumen allows you to better treat the injuries of cybernetically-enhanced patients.</p>

        <h4>Insight</h4>

        <p>Your knowledge of cybernetics' functionality grants you improved awareness of the facial ticks of the cybernetically-enhanced.</p>

        <h4>Technology</h4>

        <p>Your knowledge and experience lets you identify cybernetic augmentations, and their function.</p>

