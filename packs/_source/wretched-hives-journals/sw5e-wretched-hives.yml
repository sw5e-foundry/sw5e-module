sting Crystal (Training)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Dexterity or Intelligence saving throw and a -1 penalty to the force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Returning Weapon Hilt</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Thrown property</em><br>\n\n<p>This weapon gains the returning property.</p>\n\n<h4>Ventilation Stabilizer</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>When you take the Attack action and hit a creature with this weapon, you can repeat the attack against another creature within 5 feet, no action required. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>\n\n<h4>Stabilizer Ascendancy Cell</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon loses the dexterity property.</p>\n\n<h4>Stabilizer Dueling Cell</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by three steps (from 21 to 15, 19 to 13, or 17 to 11). If the dexterity number is 15 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Stabilizer Fighting Cell</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by two steps (from 21 to 17, 19 to 15, 17 to 13, or 15 to 11). If the dexterity number is 13 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Stabilizer Mastery Cell</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by four steps (from 21 to 13 or 19 to 11). If the dexterity number is 17 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Stabilizer Supremacy Cell</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by five steps (from 21 to 11). If the dexterity number is 19 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Stabilizer Training Cell</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by one step (from 21 to 19, 19 to 17, 17 to 15, 15 to 13, or 13 to 11). If the dexterity number is 11, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Throwing Weapon Hilt (Basic)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains thrown (10/30) property. If it already has the thrown property, the range increases by 5/15.</p>\n\n<h4>Throwing Weapon Hilt (Champion)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains thrown (60/180) property. If it already has the thrown property, the range increases by 30/90.</p>\n\n<h4>Throwing Weapon Hilt (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon gains thrown (50/150) property. If it already has the thrown property, the range increases by 25/75.</p>\n\n<h4>Throwing Weapon Hilt (Fine)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains thrown (20/60) property. If it already has the thrown property, the range increases by 10/30.</p>\n\n<h4>Throwing Weapon Hilt (Improved)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon gains thrown (30/90) property. If it already has the thrown property, the range increases by 15/45.</p>\n\n<h4>Throwing Weapon Hilt (Superior)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains thrown (40/120) property. If it already has the thrown property, the range increases by 20/60.</p>\n\n\n\n<h4>Versatile Handle</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks double or two-handed property</em><br>\n\n<p>This weapon gains the versatile (1d10) property. If it already has the versatile property, the versatile damage increases by one step (from 2d4 to d10, d10 to d12, from d12 to 2d6, or from 2d6 to 3d4).</p>\n\n<h4>Versatile Handle (Superior)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks double or two-handed property</em><br>\n\n<p>This weapon gains the versatile (1d12) property. If it already has the versatile property, the versatile damage increases by two steps (from 2d4 to d12, d10 to 2d6, from d12 to 3d4, or from 2d6 to 3d4).</p>\n\n<h4>Versatile Handle (Champion)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks double or two-handed property</em><br>\n\n<p>This weapon gains the versatile (2d6) property. If it already has the versatile property, the versatile damage increases by three steps (from 2d4 to 2d6, d10 to 3d4, from d12 to 3d4, or from 2d6 to 3d4).</p>\n\n<h4>Vicious Ascendancy Hilt</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the vicious 3 property. If it already has the vicious property, its vicious number increases to 3.</p>\n\n<h4>Vicious Fighting Hilt</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the vicious 1 property. If it already has the vicious property, its vicious number increases by 1, to a maximum of 3.</p>\n\n<h4>Vicious Mastery Hilt</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the vicious 2 property. If it already has the vicious property, its vicious number increases by 2, to a maximum of 3.</p>\n\n<h4>Withercasting Crystal (Dueling)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Crystal (Fighting)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Crystal (Mastery)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Crystal (Training)</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw and a -1 penalty to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Wrist Mount Hilt</h4>\n\n<em><strong>Item modification</strong> (lightweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the fixed property.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Item Modifications (Vibroweapon)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#4a5568\">Celerity Oscillator</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Collapsible Frame</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Compensation Oscillator</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Contoured Grip (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Disarming Oscillator</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Disguised Guard</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Fadecasting Guard (Novice)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Fadecasting Oscillator Mk I</font></td><td><font style=\"