        <h1>Chapter 2: Entertainment and Downtime</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">ny campaign benefits when characters have time between</span><br> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; adventures to engage in other activities. Allowing days, weeks, or months to pass between adventures stretches the campaign over a longer period of time and helps to manage the characters' level progression, preventing them from gaining too much power too quickly.

        <p>Allowing characters to pursue side interests between adventures also encourages players to become more invested in the campaign world(s). When a character owns a cantina in a city or spends time carousing with the locals, the character's player becomes more likely to respond to threats to the city and its inhabitants.</p>

        <p>As your campaign progresses, your players' characters will not only become more powerful, but also more influential and invested in the world. They might be inclined to undertake projects that require more time between adventures, such as building and maintaining a stronghold. As the party gains levels, you can add more downtime between adventures to give characters the time they need to pursue such interests. Whereas days or weeks might pass between low-level adventures, the amount of downtime between higher-level adventures might be measured in months or years.</p>

        <p>Downtime activities are tasks that usually take a workweek (five days of work plus two days of rest) or longer to perform. These tasks can include buying or creating enhanced items, criminal activities, general carousing, or simply working a job. A character selects a downtime activity from among those available, and you, as GM, then follow the rules for the activity to resolve it, informing the player of the results and any complications that ensue.</p>

        <h3>Resources</h3>

        <p>Each activity has a resource requirement, typically comprised of money and time, though some may have greater requirements. The required amount of money and time to perform an activity varies, as described in the activity's resource description.</p>

        <h3>Resolution</h3>

        <p>The Resolution portion of each activity's description tells you how to resolve it. Many activities require an ability check, so be sure to note the character's relevant ability modifiers. Follow the steps in the activity, and determine the results.</p>

        <p>Most downtime activities require at least a workweek to complete. Some activities require days, weeks (7 days), or even months (30 days). A character must spend at least 8 hours of each day engaged in the downtime activity for that day to count toward the activity's completion.</p>

        <p>For many downtime activities, the days of an activity don't need to be consecutive; you can spread them over a longer period of time than is required for the activity. But that period should be no more than twice as long as the required time, otherwise you risk introducing additional complications (see below), and possibly double the activity's costs to represent the inefficiency of the character's progress.</p>

        <h3>Complications</h3>

        <p>The description of each activity includes a discussion of complications you can throw at the characters. The consequences of a complication might spawn entire adventures, introduce NPCs to vex the party, or give characters headaches and advantages in any number of other ways. One of the most common�and recurring�types of complications is the introduction of rivals.</p>

        <p>Each of these sections has a table that offers possible complications. You can use a complication from the table, or invent your own complication. </p>

        <h3>Uptime</h3>

        <p>While most downtime activities aren't suitable for enacting during a session due to the requisite time requirements, others are. For those activities suitable for engaging in during a session, uptime exists. Uptime rules cover what actions need to be taken. Uptime rules often use their own resources, Resolution, and complications.</p>

        <h2>Rivals</h2>

        <p>Rivals are NPCs who oppose the characters and make their presence felt whenever the characters are engaging in downtime. A rival might be a villain you have featured in past adventures or plan to use in the future. Rivals can include more than just malicious entities�they might be unaligned folk who are at odds with the characters, whether because they have opposing goals or they simply dislike one another. A rival might be a third party the players inadvertently snubbed throughout their adventures, or simply a vindictive bystander who is convinced that the party is up to no good.</p>

        <p>A rival's agenda changes over time. Though the characters engage in downtime only between adventures, their rivals rarely rest, continuing to spin plots and work against the characters even when the characters are off doing something else.</p>

        <h3>Creating a Rival</h3>

        <p>It's possible for the characters to have one or more rivals at a time, each with a separate agenda. At least one should be a villain, while the others might not be nefarious characters; conflicts with those rivals might be social or political, rather than manifesting as direct attacks.</p>

        <p>The best rivals have a connection with their adversaries on a personal level. Find links in the characters' backstories or the events of recent adventures that explain what sparked the rival's actions. The best trouble to put the characters in is trouble they created for themselves. You can find sample rival ties in the Example Rivals table to the right.</p>

        <p>To add the right amount of detail to a rival you want to create, give some thought to what the NPC is trying to accomplish and what resources and methods the rival can bring to bear against the characters.</p>



        <h4>Goals</h4>

        <p>An effective rival has a clear reason for interfering with the characters' lives. Think about what the rival wants, how and why the characters stand in the way, and how the conflict could be resolved. Ideally, a rival's goal directly involves the characters or something they care about.</p>

        <h4>Plans</h4>

        <p>The foundation of a rival's presence in the campaign is the actions the rival takes or the events that occur as a result of that character's goals. Each time you resolve one or more workweeks of downtime, pick one of the ways a rival's plans might be advanced and introduce it into play.</p>

        <p>Think about how a rival might operate in order to bring specific plans to fruition, and jot down three or four kinds of <strong>actions</strong> the rival might undertake. Some of these might be versions of the downtime activities described in the \-\-\- chapter, but these are more often efforts specific to that rival. These actions might be a direct attack, such as an assassination attempt, that you can play out during a session, or it might be a background activity that you describe as altering the campaign in some way. For instance, if the characters pursue a specific artifact, the rival might learn of the plans and attempt to retrieve it first. </p>

        <h5>Example Rivals</h5>

        <table class="sw5e-book-table"><thead><tr><th>d20</th><th>Rival</th></tr></thead><tbody><tr><td>1</td><td>Tax collector who is convinced the characters are dodging fees.</td></tr><tr><td>2</td><td>Politician who is concerned the characters are causing more trouble than they solve.</td></tr><tr><td>3</td><td>Faction leader who worries the characters are diminishing their faction's prestige.</td></tr><tr><td>4</td><td>Affluent individual who blames the characters for some recent troubles.</td></tr><tr><td>5</td><td>Rival adventuring party.</td></tr><tr><td>6</td><td>Individual who loves a scandal enough to spark one.</td></tr><tr><td>7</td><td>Childhood rival or member of a rival clan or faction.</td></tr><tr><td>8</td><td>Scorned sibling or parent.</td></tr><tr><td>9</td><td>Merchant who blames the characters for any business woes.</td></tr><tr><td>10</td><td>Newcomer out to make a mark on the world.</td></tr><tr><td>11</td><td>Sibling or ally of a defeated enemy.</td></tr><tr><td>12</td><td>Official seeking to restore a tarnished reputation.</td></tr><tr><td>13</td><td>Deadly foe disguised as a social rival.</td></tr><tr><td>14</td><td>Nefarious character seeking to subvert the party.</td></tr><tr><td>15</td><td>Spurned romantic interest.</td></tr><tr><td>16</td><td>Political opportunist seeking a scapegoat.</td></tr><tr><td>17</td><td>Traitorous noble looking to foment a revolution.</td></tr><tr><td>18</td><td>Would-be tyrant who brooks no opposition.</td></tr><tr><td>19</td><td>Exiled noble looking for revenge.</td></tr><tr><td>20</td><td>Corrupt official worried that recent misdeeds will be revealed.</td></tr></tbody></table>



        <p>Some elements of a rivals plans might involve <strong>events</strong> in the world that aren't under the rival's control. Whether such an event can be easily anticipated or not, the rival's plans might include contigencies for taking advantage of such happenings.</p>

        <h4>Assets</h4>

        <p>Think about the resources the rival can marshal. Does the character have enough money to pay bribes or to hire a small gang of mercenaries? Does the rival hold sway over any guilds, factions, or other groups? Make a list of the rival's assets and how they can be used.</p>

        <h3>Example Rival: Brogg Chak</h3>

        <p>The Chak clan is a small but powerful family of geonosians traders in the city, but years ago, they pulled up stakes and left overnight. Brogg Chak, the youngest scion, has now returned to restore his family's prestige.</p>

        <p>In truth, the family fled because its members had been evading the city's requisite taxes. A corrupt official who was an ally informed the family that a raid on their business was going to be conducted, so they fled the city and began operating as smugglers. After climbing the ranks of their smuggling ring, Brogg�along with a small army of followers�has returned to claim his place among the elite of his former home city. He vows that he will succeed, or leave the city in ruins.</p>

        <h4>Goals</h4>

        <p>Brogg wants to become the most respected and most important merchant in town�someone to whom even the governing body must yield.</p>

        <h4>Plans</h4>

        <p>Brogg plans to discredit and ruin other merchants. His allies spy on his opponents, disrupting their trade routes, stealing their wares, and causing minor chaos. Brogg disrupts his own warehouses to avoid suspicion.</p>

        <p>If Brogg's plan fails, he intends to use his forces to assassinate as much of the ruling body as possible, as well as his merchant peers.</p>

        <h5>Brogg's Plans</h5>

        <table class="sw5e-book-table"><thead><tr><th>Element</th><th>Description</th></tr></thead><tbody><tr><td>Event</td><td>Renegade droids become a noticeable problem in the city. Folk demand that action be taken.</td></tr><tr><td>Action</td><td>Supply raids become more common, and common folk talk of gathering a militia. Brogg contributes to the effort.</td></tr><tr><td>Action</td><td>Warehouses are burned down, ruining tens of thousands of credits worth of goods. Brogg blames the city for lax response times.</td></tr><tr><td>Event</td><td>An electrical storm strikes the city, overriding and destroying many droids and constructs.</td></tr><tr><td>Action</td><td>Brogg spreads rumors that the characters or other rivals in town are responsible for the increased crime.</td></tr></tbody></table>

        <h4>Assets</h4>

        <p>Brogg has a small fortune, some noteworthy skills in espionage, and a substantial following that is dedicated to him.</p>



        <h2>Bounty Hunting</h2>

        <p>One of the galaxy's oldest professions, bounty hunting is a lucrative�but dangerous�activity that is held in great esteem by adventurers.</p>

        <h3>Resources</h3>

        <p>Bounty hunting requires one workweek and at least 500 cr spent on materials, bribes, gifts, and other expenses. Spending more money increases your chance of successfully collecting your bounty, as shown in Resolution.</p>

        <h3>Resolution</h3>

        <p>After one workweek, the character makes a Wisdom (Survival) check, with a +1 bonus per 500 cr spent beyond the initial 500 cr, up to a maximum bonus of +5. The character then consults the Bounty Hunting Roll Modifier table below.</p>

        <h5>Bounty Hunting Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Bounty Hunting Results table, which is discussed below.</p></blockquote>

        <p>Once the player has determined their bounty hunting roll modifier, they then roll percentile dice and consult the Bounty Hunting Results table below.</p>

        <h5>Bounty Hunting Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You fail to catch your target.</td></tr><tr><td>41-<br>70</td><td>You fail to catch your target, but stumble across a lesser bounty, earning 500 cr</td></tr><tr><td>71-<br>100</td><td>You catch your target, resulting in a 1,000 cr bounty</td></tr><tr><td>101-<br>110</td><td>You catch a high-value target, resulting in a 2,500 cr bounty.</td></tr><tr><td>111 or<br> higher</td><td>You catch a kingpin, resulting in a 10,000 cr bounty and a nickname.</td></tr></tbody></table>



        <h3>Complications</h3>

        <p>Bounty hunting is a dangerous profession that involves interaction with many seedy and nefarious characters, and targets rarely go willingly. Consequently, each workweek spent bounty hunting brings a 10 percent chance of triggering a complication.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Bounty Hunting Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>Your quarry swears up-and-down that you've got the wrong person.</td></tr><tr><td>2</td><td>Your target manages to escape after you've collected your bounty, and they are coming for you.</td></tr><tr><td>3</td><td>Your target was very valuable to a crime boss, and they've sworn to take revenge on you.</td></tr><tr><td>4</td><td>Your target had connections with an esteemed noble family, and they're publicly besmirching you.</td></tr><tr><td>5</td><td>Your target was a high-ranking member of a guild. You've earned their ire.</td></tr><tr><td>6</td><td>Another bounty hunter was also on the hunt. You just barely beat them, and they're not happy.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>Bounty hunting is another activity that many characters will find attractive, but it is better executed using the three pillars of adventuring. The GM can determine that complications arise, as appropriate.</p>



        <h2>Buying Enhanced Items</h2>

        <p>Purchasing an enhanced item requires time and money to seek out and contact people willing to sell items. Even then, there is no guarantee a seller will have the items a character desires.</p>

        <p>A character looking to purchase a standard, premium, prototype, advanced, or possibly legendary enhanced item can spend downtime searching for a seller. The downtime activity can be performed only in a city or another location where one can find individuals interested in parting with enhanced items. Artifact enhanced items can't be purchased during downtime. Finding such an item can be the substance of an adventure in and of itself.</p>

        <h3>Resources</h3>

        <p>Finding enhanced items to purchase requires at least five days of effort and 1,000 cr in expenses. Spending more time and money increases your chance of finding a high-quality item, as shown in Resolution.</p>

        <h3>Resolution</h3>

        <p>A character seeking to buy an enhanced item makes an Intelligence (Investigation) check to determine the rarity of the item found. The character gains a +1 bonus on the check for every five days beyond the first that are spent seeking a seller, and a +1 bonus for every additional 1,000 cr spent on the search, up to a maximum bonus of +10. The monetary cost includes a wealthy lifestyle, for a buyer must impresses potential business partners.</p>

        <p>If the characters seek a specific enhanced item, have them make the check twice. If both checks succeed, they find a seller with the specific enhanced item. Otherwise, use the lower of the two rolls to determine what rarity item they find for sale.</p>

        <p>The result of the check determines the rarity of the item for sale, as shown below in the Purchasable Enhanced Item table.</p>

        <h5>Purchasable Enhanced Items</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>DC to<br> Find Seller</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>Standard</td><td>10</td><td>+10</td></tr><tr><td><font style="color:green">Premium</div></td><td>15</td><td>+0</td></tr><tr><td><font style="color:blue">Prototype</div></td><td>20</td><td>-10</td></tr><tr><td><font style="color:purple">Advanced</div></td><td>25</td><td>-20</td></tr><tr><td><font style="color:orange">Legendary</div></td><td>30</td><td>-30</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Buying an Enhanced Item table, which is discussed below.</p></blockquote>

        <p>Once a seller is found, the player rolls percentile dice and consults the Buying an Enhanced Item table below, applying a modifier based on the item's rarity, as shown in the Purchaseable Enhanced Items table. </p>



        <p>You determine a seller's identity. Seller sometimes move prototype, advanced, and legendary items through proxies to ensure that their identities remain unknown. </p>

        <blockquote><p>As a further option to reflect the availability of enhanced items in your campaign, you can apply up to a -10 penalty for a scarce setting, or up to a +10 bonus for a setting where enhanced items are more common, when resolving the d100 roll for buying enhanced items, as appropriate. </p></blockquote>

        <h5>Buying an Enhanced Item</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>A seller asking five times the item's value, or a shady seller asking two and a half times the item's value.</td></tr><tr><td>41-<br>70</td><td>A seller asking twice the item's value, or a shady seller asking the full item's value.</td></tr><tr><td>71-<br>100</td><td>A seller asking the full item's value.</td></tr><tr><td>101-<br>110</td><td>A shady seller asking half the item's value, no questions asked.</td></tr><tr><td>111 or<br> higher</td><td>A seller asking half the item's value, and a favor.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>The buying and selling of enhanced items is fraught with peril. The large sums of money involved and the power offered by enhanced items attract thieves, con artists, and other villains. If the characters encounter a shady seller, they have a 50 percent chance of triggering a complication. Otherwise, they have a 10 percent chance of triggering a complication.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Buying Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>The item is a fake.</td></tr><tr><td>2</td><td>The item is stolen after purchase.</td></tr><tr><td>3</td><td>The item is a relic cursed by a dark entity.</td></tr><tr><td>4</td><td>The item's original owner will kill to reclaim it; the party's enemies spread news of the transaction.</td></tr><tr><td>5</td><td>The other party is murdered before the transaction is completed.</td></tr><tr><td>6</td><td>A third party enters the transaction, doubling the price.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>The GM can determine whether or not buying enhanced items can be performed during uptime.</p>



        <h2>Carousing</h2>

        <p>Carousing is a default downtime activity for many characters. Between adventures, who doesn't want to relax with a few drinks and a group of friends at a cantina?</p>

        <h3>Resources</h3>

        <p>Carousing covers a workweek of fine food, strong drink, and socializing. A character can attempt to carouse among lower-, middle-, or upper-class people. Carousing with the lower-, middle-, or upper-class costs 100, 500, or 2,500 cr for the workweek, respectively.</p>

        <p>A character with an appropriate background, such as noble, can easily mingle with the upper class, but other characters can only do so if you judge that character has made sufficient contacts. Alternatively, a character might use a disguise kit to pass as a noble visiting from a distant city.</p>

        <blockquote><p>If the player elects to disguise themselves, they must make a Charisma (Deception) check instead of a Charisma (Persuasion) check during Resolution.</p></blockquote>

        <h3>Resolution</h3>

        <p>After a workweek of carousing, a character stands to make contacts within the selected social class. The character makes a Charisma (Persuasion) check, and consults the Carousing Roll Modifier table below:</p>

        <h5>Carousing Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Carousing Results table, which is discussed below.</p></blockquote>

        <p>Once the player has determined their carousing roll modifier, they then roll percentile dice and consult the Carousing Results table below.</p>

        <h5>Carousing Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>d100</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You make a hostile contact.</td></tr><tr><td>41-<br>70</td><td>You make no new contacts.</td></tr><tr><td>71-<br>100</td><td>You make an allied contact.</td></tr><tr><td>101-<br>110</td><td>You make two allied contacts.</td></tr><tr><td>111 or<br> higher</td><td>You make three allied contacts.</td></tr></tbody></table>



        <p>Contacts are NPCs who now share a bond with the character. Each one either owes the character a favor or has some reason to hold a grudge. A hostile contact works against the character, placing obstacles but stopping short of committing a crime or violent act, possibly even developing into a rival. Allied contacts are friends who will render aid to the character, but not at the risk of their lives.</p>

        <p>Lower-class contacts include criminals, laborers, mercenaries, a guardsman, or any other folk who normally frequent the chepeast cantina in town.</p>

        <p>Middle-class contacts include guild members, town officials, merchants, and other folk who frequent well-kept establishments.</p>

        <p>Upper-class contacts are the nobles, elite, and their personal servants. Carousing with such folk covers formal banquets, state dinners, and the like.</p>

        <p>Once a contact has helped or hindered a character, the character needs to carouse again to get back into the NPC's good graces. A contact provides help only once, not help for life. The contact remains friendly, which can influence roleplaying and how the characters interact with them, but doesn't come with a guarantee of help.</p>

        <p>You can assign specific NPCs as contacts. You might decide that the barkeep in some wretched hovel and a guard stationed at a city gate are the character's allied contacts. Assigning specific NPCs gives the players concrete options. It brings the campaign to life and seeds the area with NPCs that the characters care about. On the other hand, it can prove difficult to track and might render a contact useless if that character doesn't come into play.</p>

        <p>Alternatively, you can allow the player to make an NPC into a contact on the spot, after carousing. When the characters are in the same area in which they caroused, a player can expend an allied contact and designate an NPC they meet as a contact, assuming the NPC is of the correct social class based on how the character caroused. The player should provide a reasonable explanation for this relationship and work it into the game. </p>

        <p>Using a mix of the two approaches is a good idea, since it gives you the added depth of specific contacts while giving players the freedom to ensure that the contacts they accumulate are useful.</p>

        <p>The same process can apply to hostile contacts. You can give the character's a specific NPC they should avoid, or you might introduce one at an inopportune or dramatic moment.</p>

        <p>At any time, a character can have a maximum number of unspecified allied contacts equal to 1 + the character's Charisma modifier (minimum of 1). Specific, named contacts don't count toward this limit�only ones that can be used at any time to declare an NPC as a contact.</p>



        <h3>Complications</h3>

        <p>Characters who carouse risk bar brawls, accumulating a cloud of nasty rumors, and building a bad reputation around town. Every workweek spent carousing brings a 10 percent chance of a triggering a complication.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h3>Uptime</h3>

        <p>Players can actively engage in carousing using the following rules.</p>

        <h4>Resources</h4>

        <p>Carousing covers fine food, strong drink, and socializing. A character can attempt to carouse among lower-, middle-, or upper-class people. Carousing with the lower-, middle-, or upper-class costs 20, 100, or 500 cr, respectively.</p>

        <p>A character with an appropriate background, such as noble, can easily mingle with the upper class, but other characters can only do so if you judge that character has made sufficient contacts. Alternatively, a character might use a disguise kit to pass as a noble visiting from a distant city.</p>

        <blockquote><p>If the player elects to disguise themselves, they must make Charisma (Deception) or Charisma (disguise kit) checks instead of Charisma (Persuasion) checks during Resolution.</p></blockquote>

        <h4>Resolution</h4>

        <p>The character then makes five DC 20 Charisma (Persuasion) checks. Once you've resolved all five checks, consult the Carousing Results (Uptime) table below.</p>

        <h5>Carousing Results (Uptime)</h5>

        <table class="sw5e-book-table"><thead><tr><th>Successes&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>0 successes</td><td>You are ejected from the establishment, making two or more hostile contacts.</td></tr><tr><td>1 success</td><td>You make a hostile contact.</td></tr><tr><td>2 successes</td><td>You make no new contacts.</td></tr><tr><td>3 successes</td><td>You make an allied contact.</td></tr><tr><td>4 successes</td><td>You make two allied contacts.</td></tr><tr><td>5 successes</td><td>You make three allied contacts.</td></tr></tbody></table>

        <h4>Complications</h4>

        <p>Characters who carouse risk bar brawls, accumulating a cloud of nasty rumors, and building a bad reputation around town. For each failure during Resolution, you have a 10 percent chance of triggering a complication.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>



        <h5>Lower-Class Carousing Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>A pickpocket lifts 1d10 x 50 cr from you.</td></tr><tr><td>2</td><td>A bar brawl leaves you with a scar.</td></tr><tr><td>3</td><td>You have fuzzy memories of doing something very, very illegal, but you can't remember exactly what.</td></tr><tr><td>4</td><td>You are banned from a cantina for some obnoxious behavior.</td></tr><tr><td>5</td><td>After a few drinks, you swore in a public place to pursue a dangerous quest.</td></tr><tr><td>6</td><td>Surprise! You're married.</td></tr><tr><td>7</td><td>Streaking naked through the streets seemed like a great idea at the time.</td></tr><tr><td>8</td><td>Everyone is calling you by some weird, embarrassing nickname, like Puddle Drinker or Bench Slayer, and no one will say why.</td></tr></tbody></table>

        <h5>Middle-Class Carousing Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>You accidentally insulted a guild master, and only a public apology will let you do business with the guild again.</td></tr><tr><td>2</td><td>You swore to complete some quest on behalf of a guild.</td></tr><tr><td>3</td><td>A particularly obnoxious person has taken an intense romantic interest in you.</td></tr><tr><td>4</td><td>A social gaffe has made you the talk of the town.</td></tr><tr><td>5</td><td>You have made a foe out of a local bounty hunter.</td></tr><tr><td>6</td><td>You have been recruited to help run a local festival, play, or similar event.</td></tr><tr><td>7</td><td>You made a drunken toast that scandalized the locals.</td></tr><tr><td>8</td><td>You spent an additional 1,000 cr trying to impress people.</td></tr></tbody></table>

        <h5>Upper-Class Carousing Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>A pushy noble family wants to marry off one of their scions to you.</td></tr><tr><td>2</td><td>You tripped and fell during a dance, and people can't stop talking about it.</td></tr><tr><td>3</td><td>You have agreed to take on a noble's debts.</td></tr><tr><td>4</td><td>You have been challenged to a duel by an embarrassed nobleman.</td></tr><tr><td>5</td><td>You have made a foe out of a local noble.</td></tr><tr><td>6</td><td>A boring noble insists you visit each day and listen to long, tedious expositions on lineage.</td></tr><tr><td>7</td><td>You have become the target of a variety of embarrassing rumors.</td></tr><tr><td>8</td><td>You spent an additional 5,000 cr trying to impress people.</td></tr></tbody></table>



        <h2>Crafting</h2>

        <p>A character who has the time, money, and necessary tools can use downtime to craft all sorts of equipment.</p>

        <h3>Resources</h3>

        <p>Unlike other downtime activities, crafting takes a varying amount of time based on the value of the item being crafted. Crafting requires the tools appropriate to the item being crafted, as shown in the Item Specific Tools table on page \-\-\-. The character also needs raw materials equal to half of the item's value. To determine how many days it takes to create an item, divide its value by 250. More experienced craftsmen can craft at a faster rate. A character can complete multiple items at a time if the items' combined value no greater than twice the craftsman's crafting rate. Items that cost more than 500 cr can be completed over longer periods of time, as long as the work in progress is stored in a safe location.</p>

        <p>Multiple characters can combine their efforts. Divide the time needed to create an item by the number of characters working on it. Use your judgment when determining how many characters can collaborate on an item. A tiny item, like a hold-out, might allow only one or two workers, whereas a large, complex item, like a speeder, might allow four or more workers.</p>

        <h4>Crafting Enhanced Items</h4>

        <p>Creating an enhanced item requires more than just time, effort, and materials. It is a long-term process that involves one or more adventures to track down rare materials and the knowledge needed to create the item. To start with, a character needs a blueprint for an enhanced item in order to create it. The blueprint is like a recipe; it lists the materials needed and steps required to make an item.</p>

        <p>An item invariably requires a rare material to complete it. This material can range from a specific resource found only in the swamps of Dagobah, or the pearl of a krayt dragon. Finding the material should take place as part of an adventure.</p>

        <p>The Enhanced Item Ingredients table below suggests the challenge rating of a creature the character needs to face to acquire the materials for an item. Note that facing a creature does not necessarily mean that the characters must collect items from its corpse. Rather, the creature might guard a location or a resource that character needs access to.</p>

        <h5>Enhanced Item Ingredients</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>CR Range</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>Standard</td><td>1-3</td><td>+10</td></tr><tr><td><font style="color:green">Premium</font></td><td>4-7</td><td>+0</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>8-11</td><td>-10</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>12-14</td><td>-20</td></tr><tr><td><font style="color:orange">Legendary</font></td><td>15-18</td><td>-30</td></tr><tr><td><font style="color:red">Artifact</font></td><td>19+</td><td>-40</td></tr></tbody></table>



        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Crafting Results table, which is discussed below.</p></blockquote>

        <p>&emsp;In addition to facing a specific creature, creating an item comes with a credit cost covering other materials, tools, and so on, equal to half the item's value. If all the above requirements are met, the character can attempt to craft the object.</p>

        <blockquote><p>Consider waiving the rare ingredients for item modifications and consumables of standard and premium rarity.</p></blockquote>

        <h3>Resolution</h3>

        <p>After collecting all the necessary resources and spending the requisite amount of time, a character potentially crafts the item(s). For each item being crafted, the character makes an Intelligence check with the appropriate artisan's tools, and consults the Crafting Roll Modifier table below. If multiple craftsmen worked on the item, use the ability scores and relevant proficiencies for the most skilled amongst them.</p>

        <h5>Crafting Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Crafting Results table, which is discussed below.</p></blockquote>

        <p>For each item being crafted, the player rolls percentile dice and consults the Crafting Results table below, applying a modifier based on the item's rarity, as shown in the Enhanced Item Ingredients table above.</p>

        <h5>Crafting Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You inefficiently craft the item, expending twice the requisite raw materials.</td></tr><tr><td>41-<br>70</td><td>You inefficiently craft the item, expending one and a half times the requisite raw materials.</td></tr><tr><td>71-<br>100</td><td>You craft the item with no significant issue.</td></tr><tr><td>101-<br>110</td><td>You efficiently craft the item, using only half the requisite materials*.</td></tr><tr><td>111 or<br> higher</td><td>You expertly craft the item, using only one-quarter the requisite materials*.</td></tr></tbody></table>

        <blockquote><p>\*If the item required a rare material, you also used a reduced amount of that material.</p></blockquote>



        <h3>Crafting Complications</h3>

        <p>Most of the complications involved in creating something, especially an enhanced item, are linked to the difficulty in finding rare ingredients or components needed to complete the work. The complications a character might face as byproducts of the creation process are most interesting when the characters are working on an enhanced item. Every workweek spent crafting brings a 10 percent chance of a triggering a complication.</p>

        <h5>Crafting Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>Rumors swirl that what you're working on is unstable and a threat to the community.</td></tr><tr><td>2</td><td>Your tools are stolen, forcing you to buy new ones.</td></tr><tr><td>3</td><td>An affluent craftsman shows keen interest in your work and insists on observing you.</td></tr><tr><td>4</td><td>A powerful wealthy individual offers a heft price for your work and is not interested in hearing no for an answer.</td></tr><tr><td>5</td><td>A noteworthy craftsman accuses you of stealing its secret knowledge to fuel your work.</td></tr><tr><td>6</td><td>A competitor spreads rumors that your work is shoddy and prone to failure.</td></tr></tbody></table>

        <blockquote><p>This is another great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h3>Uptime</h3>

        <p>Due to the required time involved in crafting, it is best suited to downtime. However, characters can work on items in small increments, such as during a short rest, provided they have their tools and their work readily available and unspoiled.</p>

        <h3>Experimenting</h3>

        <p>If a character has resources and wants to experiment in crafting an item, using tools with which they are proficient, they can attempt to participate in this variant of this downtime activity.</p>

        <h4>Resources</h4>

        <p>The character should first choose a rarity for which they want to experiment. If experimenting with enhanced items, they should have an appropriate rare material. The character needs raw materials equal to half the maximum value of that item's rarity, as shown in the Enhanced Item Value by Rarity table on page \-\-\-. If experimenting with artifact quality, the value should be assumed to be 1,000,000 cr. For instance, if experimenting with a premium quality item, the value should be treated as 5,000 cr. </p>

        <h4>Resolution</h4>

        <p>Once experimenting is completed, the character should make an Intelligence check with the appropriate artisan's tools with disadvantage, and consult the Crafting Roll Modifier table. If the player fails to meet a DC, no item is crafted, but all materials are expended. The player should then roll percentile dice twice, taking the lesser value, and adding the appropriate modifier </p>



        <p>from the Enhanced Item Ingredients table, and then consult the Crafting Results table. At the end of resolution, unless the character fails to meet a DC, they learn a blueprint for an item and craft the item. The GM can choose an item, or determine it randomly.</p>

        <h4>Complications</h4>

        <p>Complications occur as normal during crafting.</p>

        <h3>Learning Blueprints</h3>

        <p>Throughout their adventures, characters might discover blueprints that teach them the recipes to make specific items. If the character has the appropriate tools, they can spend 10 minutes studying the blueprint. If they do so, they must make an Intelligence check with those tools to attempt to learn the blueprint. The DC for the check is determined by the rarity of the item the blueprint is for, as shown below in the Blueprint Learning DC by Rarity table.</p>

        <h5>Blueprint Learning DC by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Blueprint Learning DC</th></tr></thead><tbody><tr><td>Standard</td><td>10</td></tr><tr><td><font style="color:green">Premium</font></td><td>14</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>18</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>22</td></tr><tr><td><font style="color:orange">Legendary</font></td><td>26</td></tr><tr><td><font style="color:red">Artifact</font></td><td>30</td></tr></tbody></table>

        <p>On a success, the blueprint is learned. On a failure, the blueprint is not learned, and you must wait 24 hours before you can try again.</p>

        <h3>Reverse Engineering</h3>

        <p>Many tools have the option to reverse engineer a crafted item to learn how to make it themselves. Over the course of 1 hour, which can be done during a short rest, a character can carefully disassemble an enhanced item. If they do so, they must make an Intelligence check with the appropriate tools. The DC for the check is determined by the rarity of the item being reverse engineered, as shown below in the Reverse Engineering DC by Rarity table.</p>

        <h5>Reverse Engineer DC by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Reverse Engineer DC</th></tr></thead><tbody><tr><td>Standard</td><td>15</td></tr><tr><td><font style="color:green">Premium</font></td><td>19</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>23</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>27</td></tr><tr><td><font style="color:orange">Legendary</font></td><td>31</td></tr><tr><td><font style="color:red">Artifact</font></td><td>35</td></tr></tbody></table>

        <p>On a success, the item is broken down to half of its raw materials (any rare components are destroyed), and the blueprint for the item is learned. On a failure, the item is destroyed with no recoverable components, and the blueprint is not learned.</p>



        <h2>Crime</h2>

        <p>Sometimes it pays to be bad. This activity gives a character the chance to make some extra cash, at the risk of arrest.</p>

        <h3>Resources</h3>

        <p>A character must spend one workweek and at least 250 cr gathering information on potential targets before committing the intended crime.</p>

        <h3>Resolution</h3>

        <p>The character must make at least one, but up to three checks, and then consult the Crime Roll Modifier table below. If the character makes more than one check, they can choose the highest value amongst all checks made. However, for each check made beyond the first, the DC for each tier increases by 5. The player can choose to make a Dexterity (Sleight of Hand), Dexterity (Stealth), Intelligence (forgery kit), Intelligence (security kit), or Intelligence (slicer's kit) check, as appropriate to the crime they attempt. Each check can only be made once.</p>

        <h5>Crime Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Crime Results table, which is discussed below.</p></blockquote>

        <p>For instance, if the character makes a Dexterity (Stealth) check, and the result is 23, they can elect to keep that check, resulting in +15 crime roll modifier. If the character makes an Intelligence (security kit) check, and the result is a 6, however, they can choose to then make a Dexterity (Sleight of Hand) check. If the result of that check is a 19, and the character elects to keep it, they receive a +5 crime roll modifier, since the DC for each tier increased by 5 after the first check. If the character elects to make three checks, with the results being 8, 9, and 17, however, they fail to meet a DC, since the DC for each tier increased by 5 for each subsequent check. In this instance, since they failed to meet a DC, they are caught and jailed.</p>

        <p>Once the player has determined their crime roll modifier, they then roll percentile dice and consult the Crime Results table below.</p>



        <h5>Crime Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>The robbery fails, but you escape.</td></tr><tr><td>41-<br>70</td><td>You earn 500 cr by robbing a struggling merchant.</td></tr><tr><td>71-<br>100</td><td>You earn 1,000 cr by robbing a prosperous figure.</td></tr><tr><td>101-<br>110</td><td>You earn 2,500 cr by robbing a noble.</td></tr><tr><td>111 or<br> higher</td><td>You earn 10,000 cr by robbing one of the richest figures in town.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>A life of crime is filled with complications. A character committing a crime has a 10 percent chance of triggering a complication. They have an additional 10 percent chance of triggering a complication for each check made during Resolution beyond the first.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Crime Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>A bounty equal to your earnings is offered for information about your crime.</td></tr><tr><td>2</td><td>An unknown person contacts you, threatening to reveal your crime if you don't render a service.</td></tr><tr><td>3</td><td>Your victim is financially ruined by your crime.</td></tr><tr><td>4</td><td>Someone who knows of your crime has been arrested on an unrelated matter.</td></tr><tr><td>5</td><td>Your loot is a single, easily identifiable item that you can't fence in this region.</td></tr><tr><td>6</td><td>You robbed someone under the protection of a local crime lord, who now wants revenge.</td></tr><tr><td>7</td><td>Your victim calls in a favor from a guard, doubling the efforts to solve the case.</td></tr><tr><td>8</td><td>Your victim asks one of your adventuring companions to solve the crime.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>While crime is a very fun and engaging activity for a character to participate in, it is better executed using the three pillars of adventuring. The GM can determine that complications arise, as appropriate.</p>



        <h2>Espionage</h2>

        <p>The galaxy is a vast place with many secrets to be uncovered. Between missions, many adventurers may want to spend their downtime engaging in espionage, uncovering the galaxies secrets.</p>

        <h3>Resources</h3>

        <p>Espionage requires one workweek finding leads, bribing guards, and infiltrating clandestine locations. A character can attempt to spy on lower-, middle-, or upper-class people. Spying on lower-, middle-, or upper-class costs 100, 500, or 2,500 cr for the workweek, respectively.</p>

        <h3>Resolution</h3>

        <p>The character must make at least one, but up to three checks, and then consult the Espionage Roll Modifier table below. If the character makes more than one check, they can choose the highest value amongst all checks made. However, for each check made beyond the first, the DC for each tier increases by 5. The player can choose to make a Charisma (Deception), Dexterity (Stealth), or Intelligence (slicer's kit) check. Each check can only be made once.</p>

        <h5>Espionage Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Espionage Results table, which is discussed below.</p></blockquote>

        <p>For instance, if the character makes a Dexterity (Stealth) check, and the result is 21, they can elect to keep that check, resulting in +15 crime roll modifier. If the character makes an Intelligence (slicer's kit) check, and the result is a 3, however, they can choose to then make a Charisma (Deception) check. If the result of that check is a 17, and the character elects to keep it, they receive a +5 crime roll modifier, since the DC for each tier increased by 5 after the first check. If the character elects to make three checks, with the results being 4, 7, and 13, however, they fail to meet a DC, since the DC for each tier increased by 5 for each subsequent check. In this instance, since they failed to meet a DC, they are caught and jailed.</p>

        <p>Once the player has determined their espionage roll modifier, they then roll percentile dice and consult the Espionage Results table below.</p>



        <h5>Espionage Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You fail to find any useful information with which to blackmail, and your face is clearly identified.</td></tr><tr><td>41-<br>70</td><td>You find no useful information.</td></tr><tr><td>71-<br>100</td><td>You find information with which to blackmail one person.</td></tr><tr><td>101-<br>110</td><td>You find information with which to blackmail two people.</td></tr><tr><td>111 or<br> higher</td><td>You find information with which to blackmail three people.</td></tr></tbody></table>

        <hr>

        <p>Blackmail is information that can be used to coerce an activity from an NPC. Blackmail can come in a variety of forms, and the value of the blackmail varies depending on how important the subject of the information is and to whom it has value.</p>

        <p>Lower-class blackmail includes the secrets of criminals, laborers, mercenaries, guardsmen; anyone you might find a cheap cantina.</p>

        <p>Middle-class blackmail includes the secrets of faction members, town officials, merchants, and people who frequent well-kept establishments.</p>

        <p>Upper-class blackmail covers the secrets of the nobles and elite.</p>

        <h3>Complications</h3>

        <p>Espionage is fraught with peril. A character who engages in espionage has a 10 percent chance of triggering a complication. They have an additional 10 percent chance of triggering a complication for each check made during Resolution beyond the first.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Espionage Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>A bounty equal to the credits spent is offered for information about your crime.</td></tr><tr><td>2</td><td>An unknown person contacts you, threatening to reveal your activities if you don't render a service.</td></tr><tr><td>3</td><td>Your victim asks one of your adventuring companions to solve the crime.</td></tr><tr><td>4</td><td>Someone who knows of your activities has been arrested on an unrelated matter.</td></tr><tr><td>5</td><td>Your victim calls in a favor from a guard, doubling the efforts to solve the case.</td></tr><tr><td>6</td><td>You blackmailed someone under the protection of a local crime lord, who now wants revenge.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>While spying is a very fun and engaging activity for a character to participate in, it is better executed using the three pillars of adventuring. The GM can determine that complications arise, as appropriate.</p>



        <h2>Gambling</h2>

        <p>Games of chance are a great way to make a fortune, and a better way to lose one.</p>

        <h3>Resources</h3>

        <p>This activity requires one workweek of effort, plus a stake of at least 100 cr to a maximum of 10,000 cr, or more as you see fit. Alternatively, you could allow characters to bet with things other than money.</p>

        <h3>Resolution</h3>

        <p>The character must make at least one, but up to three checks, and then consult the Gambling Roll Modifier table below. If the character makes more than one check, they can choose the highest value amongst all checks made. However, for each check made beyond the first, the DC for each tier increases by 5. The player can choose to make a Charisma (Deception), Intelligence check with the appropriate gaming set, or Wisdom (Insight) check. If the character is not proficient in the gaming set, they can not make a Charisma (Deception) or Wisdom (Insight) check. Each check can only be made once.</p>

        <h5>Gambling Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Gambling Results table, which is discussed below.</p></blockquote>

        <p>For instance, if the character makes an Intelligence (sabaac deck) check, and the result is an 18, they can elect to keep that check, resulting in a +10 gambling roll modifier. If the result of the check was only 4, however, they can choose to then make a Charisma (Deception) check. If the result of that check is a 22, and the character elects to keep it, they receive a +10 gambling roll modifier, since the DC for each tier increased by 5 after the first check. If the character makes an Intelligence (sabaac deck) check with a result of 8, a Charisma (Deception) check with a result of 13, and finally a Wisdom (Insight) check, with a result of 11, they fail to meet a DC, since the DC for each tier increased by 5 for each subsequent check. In this instance, they lose their entire stake, and accrue a debt equal to that amount. This debt can be paid immediately if the character has the requisite funds after losing their stake.</p>

        <p>Once the player has determined their gambling roll modifier, they then roll percentile dice and consult the Gambling Results table below.</p>



        <h5>Gambling Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You lose your entire stake.</td></tr><tr><td>41-<br>70</td><td>You lose half your stake.</td></tr><tr><td>71-<br>100</td><td>You break even. Not bad.</td></tr><tr><td>101-<br>110</td><td>You win an amount equal to your stake.</td></tr><tr><td>111 or<br> higher</td><td>You win an amount equal to three times your stake.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>Gambling tends to attract unsavory individuals. The potential complications involved come from run-ins with the law and associations with various criminals tied to the activity. Every workweek spent gambling brings a 10 percent chance of a triggering a complication. They have an additional 10 percent chance of triggering a complication for each check made during Resolution beyond the first.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Gambling Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>You are accused of cheating. You decide whether you did cheat or were framed.</td></tr><tr><td>2</td><td>The town guards raid the gambling hall and throw you in jail.</td></tr><tr><td>3</td><td>A noble in town loses badly to you and loudly vows to get revenge.</td></tr><tr><td>4</td><td>You won a sum from a low-ranking member of a nefarious guild, and the guild wants it money back.</td></tr><tr><td>5</td><td>A local crime boss insists you start frequenting their gambling parlor, and no others.</td></tr><tr><td>6</td><td>A high-stakes gambler comes to town and insists that you take part in a game.</td></tr></tbody></table>

        <h4>Variant: Gambling Spectator</h4>

        <blockquote><p>Occasionally, rather than participate themselves, your characters might want to gamble on a game or event in which someone else is involved. In that case, the character can instead make a Wisdom (Insight) check. If they do so, they do not have the opportunity to make subsequent checks.</p></blockquote>



        <h3>Uptime</h3>

        <p>Players can actively engage in gambling using the following rules.</p>

        <h4>Resources</h4>

        <p>This activity requires a stake of at least 20 cr to a maximum of 2,000 cr, or more as you see fit. Alternatively, you could allow characters to bet with things other than money.</p>

        <h4>Resolution</h4>

        <p>The character must make five checks. </p>

        <p>If playing against the house, the player makes a DC 20 Intelligence check with the appropriate gaming set. Once you've resolved all five checks, consult the Gambling Results (Uptime) table below.</p>

        <p>If playing against an opponent, the player can choose to make a Charisma (Deception), Intelligence check with the appropriate gaming set, or Wisdom (Insight) check contested by the opponent. If there are multiple opponents, use the ability scores and relevant proficiencies for the most skilled amongst them. For each check the character makes, the opponent also makes a check, with an additional effect based on what choices were made.</p>

        <ul><li>If the character chooses to make a Charisma (Deception) check, they have advantage on the check if the opponent makes an Intelligence (gaming set) check, and disadvantage on the check if the opponent makes a Wisdom (Insight) check. If the opponent also makes a Charisma (Deception) check, both checks are made normally.</li><li>If the character chooses to make an Intelligence (gaming set) check, they have advantage on the check if the opponent makes a Wisdom (Insight) check, and disadvantage on the check if the opponent makes a Charisma (Deception) check. If the opponent also makes an Intelligence (gaming set) check, both checks are made normally.</li><li>If the character chooses to make a Wisdom (Insight) check, they have advantage on the check if the opponent makes a Charisma (Deception) check, and disadvantage on the check if the opponent makes an Intelligence (gaming set) check. If the opponent also makes a Wisdom (Insight) check, both checks are made normally.</li></ul>

        <p>This advantage and disadvantage occurs for both the character and the opponent. For instance, if the character chooses to make a Charisma (Deception) check, and the opponent choose to make an Intelligence (gaming set) check, the character has advantage on their check, while the opponent has disadvantage on theirs. In the event of a tie, the character and opponent should reroll the contest. If the character is not proficient in the gaming set, they can not make a Charisma (Deception) or Wisdom (Insight) check. Once you've resolved all five checks, consult the Gambling Results (Uptime) table below.</p>

        <blockquote><p>When determining what action the opponent takes, the GM can choose or determine the choice randomly.</p></blockquote>



        <h5>Gambling Results (Uptime)</h5>

        <table class="sw5e-book-table"><thead><tr><th>Successes&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>0 successes</td><td>You lose your entire stake, and accrue a debt equal to that amount.</td></tr><tr><td>1 success</td><td>You lose your entire stake.</td></tr><tr><td>2 successes</td><td>You lose half your stake.</td></tr><tr><td>3 successes</td><td>You break even. Not bad.</td></tr><tr><td>4 successes</td><td>You win an amount equal to your stake.</td></tr><tr><td>5 successes</td><td>You win an amount equal to three times your stake.</td></tr></tbody></table>

        <h4>Complications</h4>

        <p>Gambling tends to attract unsavory individuals. The potential complications involved come from run-ins with the law and associations with various criminals tied to the activity. For each success during Resolution, you have a 10 percent chance of triggering a complication.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Gambling Complications (Uptime)</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>You are accused of cheating. You decide whether you did cheat or were framed.</td></tr><tr><td>2</td><td>The town guards raid the gambling hall.</td></tr><tr><td>3</td><td>A noble in town loses badly to you and loudly vows to get revenge.</td></tr><tr><td>4</td><td>You won a sum from a low-ranking member of a nefarious guild, and the guild wants it money back.</td></tr><tr><td>5</td><td>A local crime boss insists you start frequenting their gambling parlor, and no others.</td></tr><tr><td>6</td><td>A high-stakes gambler insists that you take part in a game.</td></tr></tbody></table>

        <h4>Variant: Gambling Spectator</h4>

        <blockquote><p>Occasionally, rather than participate themselves, your characters might want to gamble on a game or event in which someone else is involved. In that case, the character can instead make five Wisdom (Insight) check. </p></blockquote>



        <h2>Mercenary Contracting</h2>

        <p>Often, traditional work doesn't appeal to adventurers, who crave a little more excitement, even during their offweeks. Those characters might prefer to engage in mercenary work.</p>

        <h3>Resources</h3>

        <p>Working as a mercenary requires one week of downtime, as well as 100 credits to seek out an available job.</p>

        <h3>Resolution</h3>

        <p>The character must make at least one, but up to three ability checks as appropriate to the contract they take. The GM might call for a Charisma (Intimidation) check if the character as working as an enforcer, a Strength (Athletics) check if working as a guard, or an Intelligence (Investigation) check if the character is working as a detective. If the character makes more than one check, they can choose the highest value amongst all checks made. However, for each check made beyond the first, the DC for each tier increases by 5. </p>

        <h5>Mercenary Contracting Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Mercenary Contracting Results table, which is discussed below.</p></blockquote>

        <p>For instance, if the character makes a Charisma (Intimidation) check, and the result is 20, they can elect to keep that check, resulting in +15 mercenary contracting roll modifier. If the character makes an Intelligence (Investigation) check, and the result is a 4, however, they can choose to repeat the check. If the result of that check is a 16, and the character elects to keep it, they receive a +5 mercenary contracting roll modifier, since the DC for each tier increased by 5 after the first check. If the character elects to make three checks, with the results being 9, 10, and 18, however, they fail to meet a DC, since the DC for each tier increased by 5 for each subsequent check. In this instance, since they failed to meet a DC, they fail to find a job.</p>

        <p>Once the player has determined their mercenary contracting roll modifier, they then roll percentile dice and consult the Mercenary Contract Results table below.</p>



        <h5>Mercenary Contracting Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>The character finds a job, but fails to complete it successfully and goes unpaid.</td></tr><tr><td>41-<br>70</td><td>You complete a relatively simple job, earning 250 cr.</td></tr><tr><td>71-<br>100</td><td>You complete a moderately difficult job, earning 500 cr.</td></tr><tr><td>101-<br>110</td><td>You complete an exceptionally difficult task, earning 1,250 cr.</td></tr><tr><td>111 or<br> higher</td><td>You complete an insanely difficult task, earning 5,000 cr and a favor from your employer.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>Mercenary work varies drastically in how eventful it can be. A character spending a week mercenary contracting has a 10 percent chance of triggering a complication. They have an additional 10 percent chance of triggering a complication for each check made during Resolution beyond the first.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Mercenary Contracting Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>You manage to offend a bystander with an innocuous comment, and it turns out they're important.</td></tr><tr><td>2</td><td>You have a run-in with the law.</td></tr><tr><td>3</td><td>You beat out another individual who wanted your job, earning their ire.</td></tr><tr><td>4</td><td>Your boss works for a local criminal organization, and insists you perform further work for them.</td></tr><tr><td>5</td><td>Another person offers to pay you to fail in your task.</td></tr><tr><td>6</td><td>You are forced into a physical altercation, resulting in a scar.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>While mercenary contracting is a common endeavor in any campaign, it is better executed using the three pillars of adventuring. The GM can determine that complications arise, as appropriate.</p>



        <h2>Pit Fighting</h2>

        <p>Pit fighting includes boxing, wrestling, and other nonlethal forms of combat in an organized setting with predetermined matches. If you want to introduce competitive fighting in a battle-to-the-death situation, the standard combat rules apply, rather than downtime.</p>

        <h3>Resources</h3>

        <p>Engaging in this activity requires one workweek of effort from a character.</p>

        <h3>Resolution</h3>

        <p>The character must make at least one, but up to three checks, and then consult the Pit Fighting Roll Modifier table below. If the character makes more than one check, they can choose the highest value amongst all checks made. However, for each check made beyond the first, the DC for each tier increases by 5. The player can choose to make a Dexterity (Acrobatics) or Strength (Athletics) check. Alternatively, the character can instead make an attack roll using one of the character's weapons. Each check can only be made once.</p>

        <h5>Pit Fighting Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Pit Fighting Results table, which is discussed below.</p></blockquote>

        <p>For instance, if the character makes a Dexterity (Acrobatics) check, and the result is an 27, they can elect to keep that check, resulting in a +20 pit fighting roll modifier. If the result of the check was only 9, however, they can choose to then make an attack roll with one of their weapons. If the result of that attack roll is a 24, and the character elects to keep it, they receive a +10 pit fighting roll modifier, since the DC for each tier increased by 5 after the first check. If the character makes an Strength (Athletics) check with a result of 11, a Dexterity (Acrobatics) check with a result of 14, and finally an attack roll with one of their weapons, with a result of 18, they fail to meet a DC, since the DC for each tier increased by 5 for each subsequent check. In this instance, they lose all of their bouts, and suffer one level of exhaustion.</p>

        <p>Once the player has determined their pit fighting roll modifier, they then roll percentile dice and consult the Pit Fighting Results table below.</p>



        <h5>Pit Fighting Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>You Find...</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You lose all of your bouts.</td></tr><tr><td>41-<br>70</td><td>You win some of your bouts, earning 250 cr.</td></tr><tr><td>71-<br>100</td><td>You win half of your bouts, earning 500 cr.</td></tr><tr><td>101-<br>110</td><td>You win most of your bouts, earning 1,500 cr.</td></tr><tr><td>111 or<br> higher</td><td>You go undefeated, earning 5,000 cr and a title recognized by the people of this town.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>Characters involved in pit fighting must deal with their opponents, the people who bet on matches, and the matches' promoters. Every workweek spent pit fighting brings a 10 percent chance per success of triggering a complication. They have an additional 10 percent chance of triggering a complication for each check made during Resolution beyond the first.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Pit Fighting Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>An opponent swears to take revenge on you.</td></tr><tr><td>2</td><td>A crime boss approaches you and offers to pay you to intentionally lose a few matches.</td></tr><tr><td>3</td><td>You defeat a popular local champion, drawing the crowd's ire.</td></tr><tr><td>4</td><td>You defeat a noble's servant, drawing the wrath of the noble's house.</td></tr><tr><td>5</td><td>You are accused of cheating. Whether the allegation is true or not, your reputation is tarnished.</td></tr><tr><td>6</td><td>You accidentally deliver a near fatal wound to an opponent.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>While pit fighting is a very fun and engaging activity for a character to participate in, it should be executed using the normal rules of combat. For each round victory, a character should receive winning determined by the GM. The GM can also determine that complications arise, as appropriate.</p>



        <h2>Racing</h2>

        <p>On many worlds, racing is a popular local pastime. For the accomplished pilot, racing is a great way to make credits and a name for yourself. However, racing is not for the faint of heart.</p>

        <h3>Resources</h3>

        <p>This activity requires one workweek of effort and a 250 cr entry fee. If the character does not own an appropriate vehicle, they can rent one for 1,000 cr.</p>

        <h3>Resolution </h3>

        <p>The character must make at least one, but up to three checks, and then consult the Racing Roll Modifier table below. If the character makes more than one check, they can choose the highest value amongst all checks made. However, for each check made beyond the first, the DC for each tier increases by 5. The player can choose to make an Intelligence (mechanic's kit), Intelligence (Piloting), or Intelligence (Technology) check. If the character is not proficient in Piloting, they can not make an Intelligence (mechanic's kit) or Intelligence (Technology) check. Each check can only be made once.</p>

        <h5>Racing Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Racing Results table, which is discussed below.</p></blockquote>

        <p>For instance, if the character makes an Intelligence (Piloting) check, and the result is a 17, they can elect to keep that check, resulting in a +10 racing roll modifier. If the result of the check was only 7, however, they can choose to then make a Intelligence (mechanic's kit) check. If the result of that check is a 24, and the character elects to keep it, they receive a +10 racing roll modifier, since the DC for each tier increased by 5 after the first check. If the character makes an Intelligence (Technology) check with a result of 9, an Intelligence (Piloting) check with a result of 9, and finally a Intelligence (mechanic's kit) check, with a result of 9, they fail to meet a DC, since the DC for each tier increased by 5 for each subsequent check. In this instance, they lose all of their races and crash their vehicle, requiring at least 1,000 cr in repairs to fix.</p>

        <p>Once the player has determined their racing roll modifier, they then roll percentile dice and consult the Racing Results table below.</p>



        <h5>Racing Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You lose all of your races.</td></tr><tr><td>41-<br>70</td><td>You win some of your races, earning 500 cr.</td></tr><tr><td>71-<br>100</td><td>You win half of your races, earning 1,000 cr.</td></tr><tr><td>101-<br>110</td><td>You win most of your races, earning 2,500 cr.</td></tr><tr><td>111 or<br> higher</td><td>You go undefeated, earning 10,000 cr and a title recognized by the people of this town.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>Racing attracts many different kinds of individuals: from arrogant racers to manipulative managers, adoring fans to obsessive critics. The potential complications can vary from vehicular trouble to perceived slights. Every workweek spent racing brings a 10 percent chance of a triggering a complication. They have an additional 10 percent chance of triggering a complication for each check made during Resolution beyond the first.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Racing Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>You side-swipe another racer, earning their ire.</td></tr><tr><td>2</td><td>A crime boss approaches you and offers to pay you to intentionally lose a few races.</td></tr><tr><td>3</td><td>You are accused of cheating. Whether the allegation is true or not, your reputation is tarnished.</td></tr><tr><td>4</td><td>You beat a low-ranking member of a nefarious guild, and the guild isn't happy.</td></tr><tr><td>5</td><td>A local crime boss insists you start racing for them, and no others.</td></tr><tr><td>6</td><td>A renowned racer comes to town and insists on a race.</td></tr></tbody></table>

        <h4>Variant: Animal Racing</h4>

        <blockquote><p>You may encounter an arena in which they race animals instead of vehicles. In this instance, you'll want to substitute Intelligence (Nature), Wisdom (Animal Handling), and Wisdom (Survival) for Intelligence (mechanic's kit), Intelligence (Piloting), and Intelligence (Technology), respectively.</p></blockquote>



        <h3>Uptime</h3>

        <p>Players can actively engage in racing using the following rules.</p>

        <h4>Resources</h4>

        <p>This activity requires a 50 cr entry fee. If the character does not own an appropriate vehicle, they can rent one for 200 cr.</p>

        <h4>Resolution</h4>

        <p>The character must make five checks. </p>

        <p>If racing against a time, the player makes a DC 20 Intelligence (Piloting) check. Once you've resolved all five checks, consult the Racing Results (Uptime) table below.</p>

        <p>If racing against an opponent, the player can choose to make an Intelligence (mechanic's kit), Intelligence (Piloting), or Intelligence (Technology) check contested by the opponent. If there are multiple opponents, use the ability scores and relevant proficiencies for the most skilled amongst them. For each check the character makes, the opponent also makes a check, with an additional effect based on what choices were made.</p>

        <ul><li>If the character chooses to make an Intelligence (mechanic's kit) check, they have advantage on the check if the opponent makes an Intelligence (Piloting) check, and disadvantage on the check if the opponent makes an Intelligence (Technology) check. If the opponent also makes an Intelligence (mechanic's kit) check, both checks are made normally.</li><li>If the character chooses to make an Intelligence (Piloting) check, they have advantage on the check if the opponent makes an Intelligence (Technology) check, and disadvantage on the check if the opponent makes an Intelligence (mechanic's kit) check. If the opponent also makes an Intelligence (Piloting) check, both checks are made normally.</li><li>If the character chooses to make an Intelligence (Technology) check, they have advantage on the check if the opponent makes an Intelligence (mechanic's kit) check, and disadvantage on the check if the opponent makes an Intelligence (Piloting) check. If the opponent also makes an Intelligence (Technology) check, both checks are made normally.</li></ul>

        This advantage and disadvantage occurs for both the character and the opponent. For instance, if the character chooses to make an Intelligence (mechanic's kit) check, and the opponent choose to make an Intelligence (Piloting) check, the character has advantage on their check, while the opponent has disadvantage on theirs. In the event of a tie, the character and opponent should reroll the contest. If the character is not proficient Piloting, they can not make an Intelligence (mechanic's kit) or<br> Intelligence (Technology)<br> check. Once you've<br> resolved all five<br> checks, consult the Racing<br> Results (Uptime)<br> table below.



