        <h2>Jeweler's Implements</h2>

        <p>Jeweler's implements include all of the necessary components to identify and refine gemstones.</p>

        <h4>Lore</h4>

        <p>Proficiency with jeweler's implements grants you knowledge about the reputed mystical uses of gems. This insight proves handy when you make Lore checks related to gems or gem-encrusted items.</p>

        <h4>Investigation</h4>

        <p>When you inspect jeweled objects, your proficiency with jeweler's implements aids you in picking out clues they might hold.</p>

        <h4>Technology</h4>

        <p>Your combined experience lets you refine gemstones for use with greater efficiency.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p></blockquote>

