        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Identify a tune</td><td>10</td></tr><tr><td>Subtly manipulate the emotions of your audience</td><td>15</td></tr><tr><td>Improvise a tune</td><td>20</td></tr></tbody></table>

        <h2>Poisoner's Kit</h2>

        <p>A poisoner's kit includes all of the necessary components to craft and store poisons.</p>

        <h4>Investigation</h4>

        <p>Your knowledge of poisons has taught you to handle those substances carefully, giving you an edge when you inspect poisoned objects or try to extract clues from events that involve poison.</p>

        <h4>Medicine</h4>

        <p>When you treat the victim of a poison, your knowledge grants you added insight into how to provide the best care to your patient.</p>

        <h4>Nature</h4>

        <p>Working with poisons enables you to acquire lore about which plants and animals are poisonous.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 poisoner's kit check to temporarily improve the potency of one dose of poison. To use this benefit, you must have a poisoner's kit, and the poison must be within reach. If the poison is applied before the end of your next short or long rest, its DC becomes 8 + your proficiency bonus + your Intelligence modifier, and it deals extra poison damage equal to your Intelligence modifier.</p></blockquote>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Spot a poisoned object</td><td>10</td></tr><tr><td>Determine the effects of poison</td><td>20</td></tr></tbody></table>



        <h2>Scavenging Kit</h2>

        <p>This kit contains the necessary implements to harvest and scavenge ores and metals. </p>

        <h4>Skill 1</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h4>Skill 2</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h4>Skill 3</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h3>Hone Blade</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 scavenging kit check to temporarily hone the edge of a vibroweapon. To use this benefit, you must have a scavenging kit, and the vibroweapon must be within reach. The first time a character deals damage with the vibroweapon before the end of your next short or long rest, and it deals extra damage equal to your Intelligence modifier of the same type it would normally deal.</p>

