<strong>Shield</strong> (any), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You have a +1 bonus to AC while wielding this shield.</p>\n\n<h4>Shield (Improved)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You have a +2 bonus to AC while wielding this shield.</p>\n\n<h4>Shield (Superior)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You have a +3 bonus to AC while wielding this shield.</p>\n\n<h4>Shield Chassis (Standard)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable shield chassis comes with vacant modification slots for armor modifications. It can house modifications of standard rarity.</p>\n\n<h4>Shield Chassis (Artifact)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable shield chassis comes with vacant modification slots for armor modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Shield Chassis (Legendary)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable shield chassis comes with vacant modification slots for armor modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Shield Chassis (Premium)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable shield chassis comes with vacant modification slots for armor modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Shield Chassis (Prototype)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable shield chassis comes with vacant modification slots for armor modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Shield Chassis (Advanced)</h4>\n\n<em><strong>Shield</strong> (any), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable shield chassis comes with vacant modification slots for armor modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Verpine Auto-Shielding Unit</h4>\n\n<em><strong>Shield</strong> (medium shield generator), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this shield generator, you can speak its command word as a bonus action to cause it to animate. The shield projects into the air and hovers in your space to protect you as if you were wielding it, leaving your hands free. The shield remains animated for 1 minute, until you use a bonus action to end this effect, or until you are incapacitated or die, at which point the shield deactivates.</p>\n\n<p><em>The pinnacle of Verpine scientists' shameless theft of ancient Arkanian energy shield designs.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Weapons</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Weapons</em></td><td></td></tr><tr><td><font style=\"color:green\">Weapon (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Weapon (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Weapon (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Weapon (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Weapon (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Weapon (Champion)</h4>\n\n<em><strong>Weapon</strong> (any), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>You have a +3 bonus to attack rolls and deal an additional 1d10 damage with this enhanced weapon.</p>\n\n<h4>Weapon (Exceptional)</h4>\n\n<em><strong>Weapon</strong> (any), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>You have a +3 bonus to attack rolls and deal an additional 1d8 damage with this enhanced weapon.</p>\n\n<h4>Weapon (Fine)</h4>\n\n<em><strong>Weapon</strong> (any), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You have a +1 bonus to attack and damage rolls made with this enhanced weapon.</p>\n\n<h4>Weapon (Improved)</h4>\n\n<em><strong>Weapon</strong> (any), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You have a +2 bonus to attack and damage rolls made with this enhanced weapon.</p>\n\n<h4>Weapon (Superior)</h4>\n\n<em><strong>Weapon</strong> (any), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You have a +3 bonus to attack and damage rolls made with this enhanced weapon.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Weapons (Blasters)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Blasters</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Blaster Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Blaster Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Flashy</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Grenade Launcher (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Shotgun Axe</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Shoulder Cannon (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Sparkles</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Xerrol Nightstinger Rifle</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Blaster Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td><td>&lt;/font&gt;</td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:blue\">Charric Pistol</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Grenade Launcher (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Shoulder Cannon (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Torchy</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Blaster Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Charric Rifle</td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Grenade Launcher (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Shoulder Cannon (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Blaster Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Grenade Launcher (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Shoulder Cannon (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Blaster Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Grenade Launcher (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Shoulder Cannon (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Blaster Chassis (Advanced)</h4>\n\n<em><strong>Weapon</strong> (any blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable blaster chassis comes with vacant modification slots for blaster modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Blaster Chassis (Artifact)</h4>\n\n<em><strong>Weapon</strong> (any blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable blaster chassis comes with vacant modification slots for blaster modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Blaster Chassis (Legendary)</h4>\n\n<em><strong>Weapon</strong> (any blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable blaster chassis comes with vacant modification slots for blaster modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Blaster Chassis (Premium)</h4>\n\n<em><strong>Weapon</strong> (any blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable blaster chassis comes with vacant modification slots for blaster modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Blaster Chassis (Prototype)</h4>\n\n<em><strong>Weapon</strong> (any blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable blaster chassis comes with vacant modification slots for blaster modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Blaster Chassis (Standard)</h4>\n\n<em><strong>Weapon</strong> (any blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable blaster chassis comes with vacant modification slots for blaster modifications. It can house modifications of standard rarity.</p>\n\n<h4>Charric Pistol</h4>\n\n<em><strong>Weapon</strong> (blaster pistol), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You have a +1 bonus to attack and damage rolls with this weapon. Additionally, it has the disarming property, and when a creature tries to reduce the damage of a shot from this weapon with a feature or power, such as monk�s Deflect Missiles or the <em>saber reflect</em> force power, they have disadvantage on the reduction roll. Lastly, on a hit, if the target is wearing heavy armor, it deals an additional 1d6 lightning damage.</p>\n\n<p><em>The proprietary Charric pistol was the standard issue weapon of all of the soldiers in the Chiss Expansionary Defense Force.</em></p>\n\n<h4>Charric Rifle</h4>\n\n<em><strong>Weapon</strong> (sniper rifle), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You have a +2 bonus to attack and damage rolls with this weapon. Additionally, it has the disarming property, and when a creature tries to reduce the damage of a shot from this weapon with a feature or power, such as monk�s Deflect Missiles or the <em>saber reflect</em> force power, they have disadvantage on the reduction roll. Lastly, on a hit, if the target is wearing heavy armor, it deals an additional 1d8 lightning damage.</p>\n\n<p><em>The proprietary Charric rifle was the standard issue weapon of all of the soldiers in the Chiss Expansionary Defense Force.</em></p>\n\n<h4>Flashy</h4>\n\n<em><strong>Weapon</strong> (heavy pistol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>The first time you hit a creature with a ranged weapon attack from this weapon each round, the creature takes an additional 1d4 damage from the attack.</p>\n\n<p><em>Flashy is an SSK heavy pistol owned by the mercenary Corso Riggs during the Galactic Cold War.</em></p>\n\n\n\n<h4>Grenade Launcher (Champion)</h4>\n\n<em><strong>Weapon</strong> (grenade launcher), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Rather than traditional power cells, the grenade launcher fires grenades. When firing a grenade at long range, or if you don't meet the grenade launcher's strength requirement, creatures within the radius of the grenade's explosion have advantage on the saving throw. If you lack proficiency in the grenade launcher, you must roll the damage dice twice and take the lesser total. You have a +3 bonus to the save DC and deal two additional damage dice with grenades fired by this enhanced grenade launcher. </p>\n\n<h4>Grenade Launcher (Exceptional)</h4>\n\n<em><strong>Weapon</strong> (grenade launcher), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Rather than traditional power cells, the grenade launcher fires grenades. When firing a grenade at long range, or if you don't meet the grenade launcher's strength requirement, creatures within the radius of the grenade's explosion have advantage on the saving throw. If you lack proficiency in the grenade launcher, you must roll the damage dice twice and take the lesser total. You have a +3 bonus to the save DC and deal one additional damage die with grenades fired by this enhanced grenade launcher. </p>\n\n<h4>Grenade Launcher (Fine)</h4>\n\n<em><strong>Weapon</strong> (grenade launcher), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Rather than traditional power cells, the grenade launcher fires grenades. When firing a grenade at long range, or if you don't meet the grenade launcher's strength requirement, creatures within the radius of the grenade's explosion have advantage on the saving throw. If you lack proficiency in the grenade launcher, you must roll the damage dice twice and take the lesser total. You have a +1 bonus to the save DC and damage rolls of grenades fired by this enhanced grenade launcher. </p>\n\n<h4>Grenade Launcher (Improved)</h4>\n\n<em><strong>Weapon</strong> (grenade launcher), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Rather than traditional power cells, the grenade launcher fires grenades. When firing a grenade at long range, or if you don't meet the grenade launcher's strength requirement, creatures within the radius of the grenade's explosion have advantage on the saving throw. If you lack proficiency in the grenade launcher, you must roll the damage dice twice and take the lesser total. You have a +2 bonus to the save DC and damage rolls of grenades fired by this enhanced grenade launcher. </p>\n\n<h4>Grenade Launcher (Superior)</h4>\n\n<em><strong>Weapon</strong> (grenade launcher), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Rather than traditional power cells, the grenade launcher fires grenades. When firing a grenade at long range, or if you don't meet the grenade launcher's strength requirement, creatures within the radius of the grenade's explosion have advantage on the saving throw. If you lack proficiency in the grenade launcher, you must roll the damage dice twice and take the lesser total. You have a +3 bonus to the save DC and damage rolls of grenades fired by this enhanced grenade launcher. </p>\n\n<h4>Shotgun Axe</h4>\n\n<strong>Weapon</strong> (shotgun), <font style=\"color:green\"><strong>premium</strong></font><br>\n\n<p>You have a +1 to damage rolls made with this shotgun. Additionally, this shotgun has an axe attachment, allowing you to make a melee weapon attack with it. The axe is a melee weapon that you are proficient with, and deals 1d8 kinetic damage.</p>\n\n<p>Additionally, when you use this shotgun as an improvised weapon, you are considered proficient in it, and it deals 1d8 kinetic damage on a hit.</p>\n\n<p><em>\"Oh you want clever? Come a little closer, I'll get real clever.\"</em></p>\n\n<h4>Shoulder Cannon (Champion)</h4>\n\n<em><strong>Weapon</strong> (shoulder cannon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Mounted in the shoulder slot, a shoulder cannon does not require a free hand to use. Additionally, you have advantage on Strength ability checks and saving throws to avoid being disarmed of this weapon. You have a +3 bonus to attack rolls and deal an additional 1d10 damage with this enhanced shoulder cannon, which has the smart (20, +6) property. </p>\n\n<h4>Shoulder Cannon (Exceptional)</h4>\n\n<em><strong>Weapon</strong> (shoulder cannon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Mounted in the shoulder slot, a shoulder cannon does not require a free hand to use. Additionally, you have advantage on Strength ability checks and saving throws to avoid being disarmed of this weapon. You have a +3 bonus to attack rolls and deal an additional 1d8 damage with this enhanced shoulder cannon, which has the smart (19, +5) property. </p>\n\n<h4>Shoulder Cannon (Fine)</h4>\n\n<em><strong>Weapon</strong> (shoulder cannon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Mounted in the shoulder slot, a shoulder cannon does not require a free hand to use. Additionally, you have advantage on Strength ability checks and saving throws to avoid being disarmed of this weapon. You have a +1 bonus to attack and damage rolls made with this enhanced shoulder cannon, which has the smart (16, +2) property. </p>\n\n<h4>Shoulder Cannon (Improved)</h4>\n\n<em><strong>Weapon</strong> (shoulder cannon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Mounted in the shoulder slot, a shoulder cannon does not require a free hand to use. Additionally, you have advantage on Strength ability checks and saving throws to avoid being disarmed of this weapon. You have a +2 bonus to attack and damage rolls made with this enhanced shoulder cannon, which has the smart (17, +3) property. </p>\n\n<h4>Shoulder Cannon (Superior)</h4>\n\n<em><strong>Weapon</strong> (shoulder cannon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Mounted in the shoulder slot, a shoulder cannon does not require a free hand to use. Additionally, you have advantage on Strength ability checks and saving throws to avoid being disarmed of this weapon. You have a +3 bonus to attack and damage rolls made with this enhanced shoulder cannon, which has the smart (18, +4) property. </p>\n\n\n\n<h4>Sparkles </h4>\n\n<em><strong>Weapon</strong> (light pistol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>When you roll a 20 on an attack roll with this weapon, or hit a creature that has not yet acted during your first turn in combat, you deal an additional 1d4 energy damage.</p>\n\n<p><em>Sparkles is a BlasTech CS-14 light pistol owned by the mercenary Corso Riggs during the Galactic Cold War.</em></p>\n\n<h4>Torchy</h4>\n\n<em><strong>Weapon</strong> (blaster pistol), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You gain a +1 bonus to attack and damage rolls with this enhanced weapon, and when you hit a creature with a ranged weapon attack using this weapon, the creature takes an extra 1d4 energy damage for each size category larger than you it is (up to 3d4 extra damage).</p>\n\n<p><em>Torchy is a BlasTech ALT-25 blaster pistol owned by the mercenary Corso Riggs during the Galactic Cold War.</em></p>\n\n<h4>Xerrol Nightstinger Rifle</h4>\n\n<em><strong>Weapon</strong> (nightstinger rifle), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You have a +1 bonus to damage rolls with this enhanced weapon. Additionally, when you make the Dexterity (Stealth) check to remain hidden as a part of the weapon's silent property, you have advantage on the check.</p>\n\n<p><em>This nightstinger rifle has the unique property of shooting invisible rounds.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Weapons (Lightweapons)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Lightweapons</em></td><td></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Lightweapon Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Lightweapon Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Inquistor Saber</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Lightweapon Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td><td>&lt;/font&gt;</td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Lightweapon Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Darksaber</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Lightweapon Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Lightweapon Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Darksaber</h4>\n\n<em><strong>Weapon</strong> (martial lightsaber), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +3 bonus to attack and damage rolls made with this enhanced lightsaber. Additionally, the weapon ignores resistance to energy damage.</p>\n\n<p>When you attack a creature that has at least one head with this weapon and roll a 20 on the attack roll, you cut off one of the creature's heads. The creature dies if it can't survive without the lost head. A creature is immune to this effect if it is immune to energy damage, doesn't have or need a head, has legendary actions, or the GM decides that the creature is too big for its head to be cut off with this weapon. Such a creature instead takes an extra 6d6 energy damage from the hit.</p>\n\n<p><em>The Darksaber was an ancient and unique black-bladed lightsaber created by Tarre Vizsla, the first Mandalorian ever inducted into the Jedi Order. It features a distinctly Mandalorian hilt and an ominous black blade.</em></p>\n\n<h4>Inquisitor Saber </h4>\n\n<em><strong>Weapon</strong> (any lightweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> Double property</em><br>\n\n<p>You have a +1 bonus to attack and damage rolls made with this enhanced weapon.</p>\n\n<p>As a bonus action, you cause the lightsaber to rapidly spin. When you do so, you lose the +1 bonus to attack and damage rolls made with the weapon, but you gain a +1 bonus to AC. Additionally, while spinning, you have a 30-foot flying speed. While flying, if you take damage, you must make a concentration check as if concentrating on a power. On a failure, you immediately fall to the ground.</p>\n\n<p><em>These lightweapons, favored by the Jedi hunters known as Inquisitors, have the unique ability to rapidly spin, granting its wielder a limited flying ability.</em></p>\n\n<h4>Lightweapon Chassis (Advanced)</h4>\n\n<em><strong>Weapon</strong> (any lightweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable lightweapon chassis comes with vacant modification slots for lightweapon modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Lightweapon Chassis (Artifact)</h4>\n\n<em><strong>Weapon</strong> (any lightweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable lightweapon chassis comes with vacant modification slots for lightweapon modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Lightweapon Chassis (Legendary)</h4>\n\n<em><strong>Weapon</strong> (any lightweapon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable lightweapon chassis comes with vacant modification slots for lightweapon modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Lightweapon Chassis (Premium)</h4>\n\n<em><strong>Weapon</strong> (any lightweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable lightweapon chassis comes with vacant modification slots for lightweapon modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Lightweapon Chassis (Prototype)</h4>\n\n<em><strong>Weapon</strong> (any lightweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable lightweapon chassis comes with vacant modification slots for lightweapon modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Lightweapon Chassis (Standard)</h4>\n\n<em><strong>Weapon</strong> (any lightweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable lightweapon chassis comes with vacant modification slots for lightweapon modifications. It can house modifications of standard rarity.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Weapons (Vibroweapons)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Vibroweapons</em></td><td></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Vibroweapon Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Bolas (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">J-19 Bo-Rifle</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Net (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Vibroweapon Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">AB-75 Bo-Rifle</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Bolas (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Net (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Vibroweapon Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td><td>&lt;/font&gt;</td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Bolas (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Hewey</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Net (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Vibroweapon Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#db6220\">Bolas (Exceptional)</font></td><td><font style=\"color:#db6220\">Legendary</font></td></tr><tr><td><font style=\"color:#db6220\">Net (Exceptional)</font></td><td><font style=\"color:#db6220\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Vibroweapon Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Bolas (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Net (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Vibroweapon Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>AB-75 Bo-Rifle</h4>\n\n<em><strong>Weapon</strong> (bo-rifle), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You have a +2 bonus to attack and damage rolls with this enhanced weapon. Additionally, while it is in staff mode, the save DC for its shocking property increases to 15.</p>\n\n<p><em>This version of the bo-rifle was exclusive to high-ranking members of the Honor Guard of Lasan.</em></p>\n\n<h4>Bolas (Fine)</h4>\n\n<em><strong>Weapon</strong> (bolas), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a bolas is restrained until it is freed. A bolas has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 14 Dexterity check, freeing itself or another creature within its reach on a success. The bolas has an AC of 11, 10 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the bolas frees the creature without harming it and immediately ends the bolas's effects. While a creature is restrained by a bolas, you can make no further attacks with it.</p>\n\n<p>Due to their unwieldy nature, bolas make ineffective melee weapons. Melee attack rolls made with them are made at disadvantage.</p>\n\n<h4>Bolas (Improved)</h4>\n\n<em><strong>Weapon</strong> (bolas), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a bolas is restrained until it is freed. A bolas has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 15 Dexterity check, freeing itself or another creature within its reach on a success. The bolas has an AC of 12, 15 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the bolas frees the creature without harming it and immediately ends the bolas's effects. While a creature is restrained by a bolas, you can make no further attacks with it.</p>\n\n<p>Due to their unwieldy nature, bolas make ineffective melee weapons. Melee attack rolls made with them are made at disadvantage.</p>\n\n<h4>Bolas (Superior)</h4>\n\n<em><strong>Weapon</strong> (bolas), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a bolas is restrained until it is freed. A bolas has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 16 Dexterity check, freeing itself or another creature within its reach on a success. The bolas has an AC of 13, 20 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the bolas frees the creature without harming it and immediately ends the bolas's effects. While a creature is restrained by a bolas, you can make no further attacks with it.</p>\n\n<p>Due to their unwieldy nature, bolas make ineffective melee weapons. Melee attack rolls made with them are made at disadvantage.</p>\n\n<h4>Bolas (Exceptional)</h4>\n\n<em><strong>Weapon</strong> (bolas), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a bolas is restrained until it is freed. A bolas has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 17 Dexterity check, freeing itself or another creature within its reach on a success. The bolas has an AC of 14, 25 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the bolas frees the creature without harming it and immediately ends the bolas's effects. While a creature is restrained by a bolas, you can make no further attacks with it.</p>\n\n<p>Due to their unwieldy nature, bolas make ineffective melee weapons. Melee attack rolls made with them are made at disadvantage.</p>\n\n\n\n<h4>Bolas (Champion)</h4>\n\n<em><strong>Weapon</strong> (bolas), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a bolas is restrained until it is freed. A bolas has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 18 Dexterity check, freeing itself or another creature within its reach on a success. The bolas has an AC of 15, 30 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the bolas frees the creature without harming it and immediately ends the bolas's effects. While a creature is restrained by a bolas, you can make no further attacks with it.</p>\n\n<p>Due to their unwieldy nature, bolas make ineffective melee weapons. Melee attack rolls made with them are made at disadvantage.</p>\n\n<h4>Hewey</h4>\n\n<em><strong>Weapon</strong> (vibroblade), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You gain a +1 bonus to attack and damage rolls with this enhanced weapon.</p>\n\n<p>This weapon has 6 charges and regains 1d6 charges when you complete a long rest. Once per turn when you hit with a melee weapon attack with this weapon, you can expend a charge to have the weapon deal an additional 1d8 kinetic damage. </p>\n\n<p><em>Hewey is an N-30 battle blade owned by the mercenary Corso Riggs during the Galactic Cold War.</em></p>\n\n<h4>J-19 Bo-Rifle</h4>\n\n<em><strong>Weapon</strong> (bo-rifle), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You have a +1 bonus to attack and damage rolls with this enhanced weapon. Additionally, while it is in staff mode, the save DC for its shocking property increases to 14.</p>\n\n<p><em>This more recent and less artfully designed model of bo-rifle comes with a bayonet attached to the top edge.</em></p>\n\n<h4>Net (Fine)</h4>\n\n<em><strong>Weapon</strong> (net), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 14 Strength check, freeing itself or another creature within its reach on a success. The net has an AC of 11, 10 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the net frees the creature without harming it and immediately ends the net's effects. While a creature is restrained by a net, you can make no further attacks with it.</p>\n\n<h4>Net (Improved)</h4>\n\n<em><strong>Weapon</strong> (net), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 15 Strength check, freeing itself or another creature within its reach on a success. The net has an AC of 12, 15 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the net frees the creature without harming it and immediately ends the net's effects. While a creature is restrained by a net, you can make no further attacks with it.</p>\n\n<h4>Net (Superior)</h4>\n\n<em><strong>Weapon</strong> (net), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 16 Strength check, freeing itself or another creature within its reach on a success. The net has an AC of 13, 20 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the net frees the creature without harming it and immediately ends the net's effects. While a creature is restrained by a net, you can make no further attacks with it.</p>\n\n<h4>Net (Exceptional)</h4>\n\n<em><strong>Weapon</strong> (net), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 17 Strength check, freeing itself or another creature within its reach on a success. The net has an AC of 14, 25 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the net frees the creature without harming it and immediately ends the net's effects. While a creature is restrained by a net, you can make no further attacks with it.</p>\n\n<h4>Net (Champion)</h4>\n\n<em><strong>Weapon</strong> (net), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 18 Strength check, freeing itself or another creature within its reach on a success. The net has an AC of 15, 30 hit points, immunity to all damage not dealt by melee weapons, and resistance to damage dealt by unenhanced melee weapons. Destroying the net frees the creature without harming it and immediately ends the net's effects. While a creature is restrained by a net, you can make no further attacks with it.</p>\n\n\n\n<h4>Vibroweapon Chassis (Advanced)</h4>\n\n<em><strong>Weapon</strong> (any vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable vibroweapon chassis comes with vacant modification slots for vibroweapon modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Vibroweapon Chassis (Artifact)</h4>\n\n<em><strong>Weapon</strong> (any vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable vibroweapon chassis comes with vacant modification slots for vibroweapon modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Vibroweapon Chassis (Legendary)</h4>\n\n<em><strong>Weapon</strong> (any vibroweapon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable vibroweapon chassis comes with vacant modification slots for vibroweapon modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Vibroweapon Chassis (Premium)</h4>\n\n<em><strong>Weapon</strong> (any vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable vibroweapon chassis comes with vacant modification slots for vibroweapon modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Vibroweapon Chassis (Prototype)</h4>\n\n<em><strong>Weapon</strong> (any vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable vibroweapon chassis comes with vacant modification slots for vibroweapon modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Vibroweapon Chassis (Standard)</h4>\n\n<em><strong>Weapon</strong> (any vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable vibroweapon chassis comes with vacant modification slots for vibroweapon modifications. It can house modifications of standard rarity.</p>\n\n"
