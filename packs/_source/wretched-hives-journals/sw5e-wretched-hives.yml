        <h2>Surveyor's Implements</h2>

        <p>Surveyor's implements include all of the necessary components to draw and store maps.</p>

        <h4>Lore</h4>

        <p>You can use your knowledge of maps and locations to unearth more detailed information. For instance, you might spot hidden messages in a map, identify when the map was made to determine if geographical features have changed since then, and so forth.</p>

        <h4>Nature</h4>

        <p>Your familiarity with physical geography makes it easier for you to answer questions or solve issues relating to the terrain around you.</p>

        <h4>Survival</h4>

        <p>Your understand of geography makes it easier to find paths to civilization, to predict reas where towns might be found, and to avoid becoming lost. You have studied so many maps that common patterns, such as how trade routes evolve and where settlements arise in relation to gegraphic locations, are familiar to you.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p></blockquote>



        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Determine a map's age and origin</td><td>10</td></tr><tr><td>Estimate direction and distance to a landmark</td><td>15</td></tr><tr><td>Discern that a map is fake</td><td>15</td></tr><tr><td>Fill in a missing part of a map</td><td>20</td></tr></tbody></table>

        <h2>Synthweaver's Implements</h2>

        <p>Synthweaver's implements include all of the necessary components to craft and repair clothing and boots.</p>

        <h4>Lore</h4>

        <p>Your expertise lends you additional insight when examining clothes and boots.</p>

        <h4>Investigation</h4>

        <p>Using your knowledge of the process of creating cloth objects, you can spot clues and make deductions that others would overlook when you examine tapestries, upholstery, clothing, and other woven items, or examining the wear of clothing and boots.</p>

        <h4>Skill 3</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h4>Hidden Compartment</h4>

        <p>Over the course of a short or long rest, you can make a DC 15 synthweaver's implements check to add a hidden compartment to a pair of boots or an article of clothing. The compartment can hold an object up to 3 inches long and 1 inch wide and deep. The DC to find the hidden compartment is equal to 8 + your bonus to checks with synthweaver's implements at the time of creation.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Repurpose or mend a cloth</td><td>10</td></tr><tr><td>Tailor an outfit</td><td>15</td></tr><tr><td>Find a hidden compartment in clothing</td><td>15</td></tr></tbody></table>



        <h2>Tinker's Implements</h2>

        <p>Tinker's implements include all of the necessary components to craft and repair augments and minor trinkets.</p>

        <h4>Lore</h4>

        <p>You can determine the age and origin of objects, even if you have only a few pieces remaining from the original.</p>

        <h4>Investigation/Perception</h4>

        <p>You are more effective at identifying traps concealed by debris.</p>

        <h4>Sleight of Hand</h4>

        <p>You are more effective at hiding traps that you place.</p>

        <h3>Multitool</h3>

        <p>You can use tinker's implements as other tools with which you are proficient. You still make the ability check with the other tool, but you do not require a physical set of the other tools. If you have expertise in the other tools, you must also have expertise in tinker's implements to gain the benefit of that expertise when using tinker's implements in this way.</p>

        <h4>Repair Trinkets</h4>

        <p>With access to your tools, you can repair small items. For any object, you need access to raw materials required to repair it.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Temporarily repair a disabled device</td><td>10</td></tr><tr><td>Repair an item in half the time</td><td>15</td></tr><tr><td>Improvise an item using scraps</td><td>20</td></tr></tbody></table>

