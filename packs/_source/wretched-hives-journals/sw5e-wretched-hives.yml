        <h1>Chapter 3: Factions and Membership</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">s characters travel through the cities and worlds of</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <em>Star Wars</em>, they may come across factions, such as the Jedi Order, the Black Sun, or the Bounty Broker's Association, to which they may want to pledge service. Joining a faction offers unique benefits, as determined by the faction's features.

        <h2>Joining a Faction</h2>

        <p>A character can join a faction at any time, provided they can find a faction member capable of recruiting and they are not in bad standing with the faction. If a character is in bad standing with a faction that they wish to join, and they can find a nonhostile representative of that faction, they may be able to complete a task to return to the faction's favor, as determined by the GM.</p>

        <p>The requirements for joining a faction vary based on the the faction you are trying to join. The Jedi Order, for instance, might require you to be a certain age and Force-sensitive. The Bounty Broker's Association, however, simply require monthly dues.</p>

        <h4>Factions and Backgrounds</h4>

        <blockquote><p>If a character is of an appropriate background, such as Jedi or Guild Merchant, can start at at least 1st rank in their faction, as determined by the GM.</p></blockquote>

        <h3>Membership Benefits</h3>

        <p>As an established and respected member of a faction, you can rely on certain benefits that membership provides. Your fellow faction members will provide you with lodging and food if necessary, and pay for your funeral if needed. In some cities and towns, a headquarters offers a central place to meet other members of your faction, which can be a good place to meet potential patrons, allies, or hirelings.</p>

        <p>Factions often wield tremendous political power. If you are accused of a crime, your faction will support you if a good case can be made for your innocence or the crime is justifiable. You can also gain access to powerful political figures through the faction, if you are a member in good standing. Your dues must be current to remain in the faction's good graces.</p>

        <h3>Membership Dues</h3>

        <p>After joining a faction, characters have certain requirements they must meet in order to retain in their faction's good standing. For some factions, it might simply be credit dues paid at the beginning of the month. For other factions, they might require you spend one workweek a month furthering their interests.</p>

        <h4>Overdue </h4>

        <p>If at the end of a month you are not current in your dues, you must become current again before you can gain any benefits from your faction. For every month you are not current in your dues, you must account for the missed dues for each month before you can become current again. </p>

        <p>&emsp;For instance, if your faction requires a credit tithe, you must meet the missed tithe for each month before you become current again. If your faction requires a workweek of downtime, however, you must complete a workweek for each month you are behind.</p>

        <p>If you ever become overdue by a year or more, you lose your membership in that faction entirely unless you can justify that the absence was beyond your control. If you can not justify your absence and you choose to rejoin your faction, you start over at 1st rank.</p>

        <h3>Membership in Multiple Factions</h3>

        <p>You can have ranks in multiple factions as long as those factions are not in direct conflict, but your total combined ranks across all your factions can not exceed half your character level (rounded up). If you complete a task that aligns with the goals of one of your factions, but is in direct conflict with another faction, you risk lowing renown with the other faction, or potentially being disavowed entirely.</p>

        <h3>Faction Ranks</h3>

        <p>Factions can have a maximum of five ranks. While the names and responsibilities of each rank vary by faction, their general structure tends to be the same.</p>

        <h4>Rank 1: Initiate</h4>

        <p>This is the rank a character receives when first joining a faction. </p>

        <h4>Rank 2: Member</h4>

        <p>Rank 2 characters have shown they're aligned with the faction's goals, allowing greater responsibility.</p>

        <h4>Rank 3: Veteran</h4>

        <p>Rank 3 characters are reliable faction members, entrusted with many secrets and deserving of additional support.</p>

        <h4>Rank 4: Officer</h4>

        <p>Rank 4 characters are trusted within the faction's leadership. They are looked up as champions of a faction's endeavors, and are the leaders of individual faction locations.</p>

        <h4>Rank 5: Leader</h4>

        <p>Rank 5 characters are the leaders of their respective factions. Typically, a faction has one singular leader per headquarters, who delegates responsibilities to the faction's rank 4 and lower characters.</p>

        <p>A faction can not have more rank 5 characters than its tier. If a faction has more than one rank 5 character, typically one stands above the rest.</p>

        <h3>Rising through the Ranks</h3>

        <p>When a character completes an endeavor, such as a downtime activity or mission, that aligns with the goals of their faction, they gain renown. As a character reaches certain thresholds of renown, they earn the opportunity to rise through the ranks of their faction, provided they meet any other requirements, as shown in the Membership Ranks table on page \-\-\-.</p>



        <h2>Factions</h2>

        <p>Faction can vary greatly in size and renown, from a lowly local adventurer's guild to a galaxy-spanning criminal organization. The nature of factions drastically differ as well, depending on the faction's intended focus. </p>

        <h3>Faction Tiers</h3>

        <p>Factions vary in tier depending on their size. Smaller factions will typically hover between tier 1 and tier 5, while larger, galaxy-spanning factions might reach tier 20. Higher tiers require more active members, but grant greater benefits to them, as shown in the Faction Benefits table on page \-\-\-.</p>

        <h4>Proficiency Bonus</h4>

        <p>Factions have their own proficiency bonus, which scales with their tier. This proficiency bonus affects actions that faction takes as a whole, or actions taken by members of appropriate rank, in the ability scores in which the faction is proficient.</p>

        <h4>Ability Scores </h4>

        <p>Ability scores represent what a faction choose to focus on for its enterprises. Their are six ability scores: Strength, Dexterity, Constitution, Intelligence, Wisdom, and Charisma. Ability scores are discussed at greater length in Chapter 4: Using Ability Scores.</p>

        <h3>Faction Traits</h3>

        <p>Every faction is unique, not just in how they function, but also their goals, beliefs, and what kind of members they attract.</p>

        <h4>Goals</h4>

        <p>Each faction has its own goals. One of the most common goals many factions share is the desire for increased wealth and influence. Many factions, however, have goals unique to their own efforts. For instance, a faction might have a goal of maintaining peace and prosperity in their region, directing all of their wealth and influence towards that one goal.</p>

        <h4>Beliefs</h4>

        <p>Each faction also has its own beliefs. Many nefarious factions, such as the Exchange, believe power should be wielded by the strong, and that the weak deserve to be enslaved, while a more monetarily motivated faction, such as the Commerce Guild, believe that material wealth is the greatest source of control.</p>

        <h4>Member Traits</h4>

        <p>Members of a faction are often drawn to it because they share common traits with its members. For instance, criminals who prefer to work alone, or in small groups, might be drawn to the Black Sun, while bounty hunters might choose to join the Bounty Broker's Association to earn greater wealth and prestige.</p>



        <h3>Headquarters</h3>

        <p>Most factions have use of a headquarters. For smaller factions, it might be a simple building, or even a room. For larger factions, however, it might be a space ship, a space station, or even an entire moon or planet. A faction headquarters is required to recruit members to a faction.</p>

        <p>A faction can have any number of headquarters, provided it has the staff and funds to maintain them. However, every headquarters requires at least one 4th rank or higher member to administrate.</p>

        <h4>Operating Costs</h4>

        <p>Beyond the required costs for actually maintaining a headquarters, factions have costs directly associated with their functions. These fees might cover licensing fees, bribes, government contracts, etc. These fees amount to roughly 1,000 cr per headquarters per month.</p>

        <h3>Recruiting</h3>

        <p>In order for a faction to grow, it must recruit members. While lower tier factions can thrive with only a few members, higher tier factions require constant effort by thousands or more members. Additionally, a smaller faction might have trouble recruiting skilled members, while larger factions probably don't. </p>

        <p>Each membership rank can only support members of a certain CR or higher, as shown in the Membership Ranks CR and Renown table below.</p>

        <h5>Membership Ranks CR and Renown</h5>

        <table class="sw5e-book-table"><thead><tr><th>Membership<br> Rank</th><th>Minimum<br> Member CR</th><th>Monthly Renown<br> Generation</th></tr></thead><tbody><tr><td>1</td><td>1/8</td><td>1</td></tr><tr><td>2</td><td>1/2</td><td>2</td></tr><tr><td>3</td><td>1</td><td>3</td></tr><tr><td>4</td><td>2</td><td>4</td></tr><tr><td>5</td><td>5</td><td>5</td></tr></tbody></table>

        <p>Additionally, certain NPCs might also require a higher tier to join your faction. For instance, a skilled craftsman might not have a high CR, but might still require a faction to be a higher tier to merit joining.</p>

        <h3>Renown</h3>

        <p>Characters who act on behalf of their faction's interest earn renown, improving their own standing within their faction as well as their faction's overall effectiveness. In order for a faction to increase in tier, it must have a specific amount of renown, as shown in the Faction Benefits table on page \-\-\-. Additionally, once a faction reaches tier 6, it must have a certain amount of renown generated each month in order to progress to subsequent tiers.</p>

        <p>NPC faction members generate an amount of renown each month determined by their rank in the faction, as shown in the Membership Ranks CR and Renown table above.</p>



        <div class="sw5e-book-block"><h5>Faction Benefits</h5>

        <table class="sw5e-book-table"><thead><tr><th>Tier</th><th>Proficiency<br> Bonus</th><th>Features</th><th>Required<br> Renown&nbsp;</th><th>Monthly Renown<br> Generation&nbsp;</th></tr></thead><tbody><tr><td>1st</td><td>+2</td><td>Insignia, Faction Training</td><td>0</td><td>�</td></tr><tr><td>2nd</td><td>+2</td><td>Association Proficiency, Faction Activity</td><td>5</td><td>�</td></tr><tr><td>3rd</td><td>+2</td><td>Enhanced Insignia</td><td>15</td><td>�</td></tr><tr><td>4th</td><td>+2</td><td>Ability Score Improvement</td><td>30</td><td>�</td></tr><tr><td>5th</td><td>+3</td><td>Premium Item Stockpile</td><td>50</td><td>�</td></tr><tr><td>6th</td><td>+3</td><td>Faction Training (2)</td><td>75</td><td>�</td></tr><tr><td>7th</td><td>+3</td><td>Association Proficiency (2), Faction Activity (2)</td><td>100</td><td>10</td></tr><tr><td>8th</td><td>+3</td><td>Ability Score Improvement</td><td>150</td><td>15</td></tr><tr><td>9th</td><td>+4</td><td>Prototype Item Stockpile</td><td>200</td><td>20</td></tr><tr><td>10th</td><td>+4</td><td>Association Expertise</td><td>250</td><td>25</td></tr><tr><td>11th</td><td>+4</td><td>Faction Training (3), Association Proficiency (3)</td><td>325</td><td>30</td></tr><tr><td>12th</td><td>+4</td><td>Ability Score Improvement</td><td>400</td><td>40</td></tr><tr><td>13th</td><td>+5</td><td>Advanced Item Stockpile, Faction Activity (3)</td><td>500</td><td>50</td></tr><tr><td>14th</td><td>+5</td><td>Association Expertise (2), Association Advantage</td><td>1,000</td><td>100</td></tr><tr><td>15th</td><td>+5</td><td>Faction Training (4), Association Proficiency (4)</td><td>2,000</td><td>200</td></tr><tr><td>16th</td><td>+5</td><td>Ability Score Improvement</td><td>5,000</td><td>500</td></tr><tr><td>17th</td><td>+6</td><td>Ability Score Mastery, Legendary</td><td>10,000</td><td>1,000</td></tr><tr><td>18th</td><td>+6</td><td>Ability Score Mastery</td><td>20,000</td><td>2,000</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Mastery</td><td>50,000</td><td>5,000</td></tr><tr><td>20th</td><td>+6</td><td>Ability Score Mastery, Artifact</td><td>100,000</td><td>10,000</td></tr></tbody></table></div>

        <h3>Insignia</h3>

        <p>Beginning at 1st tier when you establish your faction, your faction can choose an insignia. Faction members of 1st rank or higher can wear, carry, or otherwise bear your insignia in a fashion appropriate to your faction's operations. Your insignia will be one of the primary ways that members identify themselves as a member of your faction.</p>

        <h3>Faction Training</h3>

        <p>Also at 1st tier, your faction gains a favored language or tool. Choose a language, or one of the tool options on page \<em>\</em>\_ of the <em>Player's Handbook</em>. Alternatively, your faction can develop its own cant.</p>

        <p>When a 1st rank or higher faction member trains in the chosen language or tool using the Training downtime activity on page \<em>\</em>\_ of the <em>Player's Handbook</em>, the requisite time and credits are halved. </p>

        <p>At 6th, 11th, and 15th tier, your faction can choose another language or tool.</p>

        <h3>Association Proficiency</h3>

        <p>At 2nd tier, your faction gains proficiency in one of ability score of your choice. When your faction engages in an activity that uses the chosen ability score, they add the faction's proficiency bonus to the d20 roll, in addition to the ability score modifier.</p>

        <p>At 7th, 11th, and 15th tier, your faction gains proficiency in another ability score.</p>

        <h3>Faction Activity</h3>

        <p>Also at 2nd tier, your faction chooses an activity from the options available in Chapter 2: Entertainment and Downtime. When a 2nd rank or higher faction member engages in the chosen activity and rolls percentile dice, they can also make a faction ability check and add it to the roll. The faction ability check is determined by the specific activity, as shown in Chapter 4: Using Ability Scores. Additionally, when they make a d20 roll as a part of the chosen activity, they can use your faction's ability modifier instead of their own modifier, if that number is greater.</p>

        <p>At 7th and 13th tier, your faction can choose another activity.</p>



        <h3>Enhanced Insignia</h3>

        <p>Starting at 3rd tier, its insignia gains an enhanced property. Choose an at-will force or tech power. If the bearer of the insignia is at least 1st rank in the faction, they can cast the power while wielding their insignia. The force- or tech-casting ability varies based on the type of power chosen: Intelligence for tech powers, Wisdom for light side force powers, Charisma for dark side force powers, or Wisdom or Charisma for universal force powers (the faction member's choice).</p>

        <h3>Ability Score Improvement</h3>

        <p>At 4th tier, you can increase one of your faction's ability scores by 2. At 8th, 12th, and 16th tier, you can increase another of your faction's ability scores by 2. As normal, you can't increase an ability score above above 20 using this feature.</p>

        <h3>Premium Item Stockpile </h3>

        <p>Once your faction has reached 5th tier, it gains access to a premium enhanced item of its choice. When a 2nd rank or higher faction member has spent 50 days of downtime furthering the faction's interests, they gain access to the chosen premium item and can purchase it at the item's full value. If the chosen item is a consumable, it takes half the requisite downtime. Once they've done so, they must spend another 50 days of downtime furthering your faction's interest before they can do so again. Provided that the item is undamaged, they can return it to your faction for a full refund.</p>

        <h3>Prototype Item Stockpile</h3>

        <p>At 9th tier, your faction gains access to a prototype enhanced item of your choice. When a 3rd rank or higher faction member has spent 100 days of downtime furthering the faction's interests, they gain access to this prototype item and can purchase it at the item's full value. If the chosen item is a consumable, it takes half the requisite downtime. Provided that the item is undamaged, they can return it to your faction for a full refund.</p>

        <h3>Association Expertise</h3>

        <p>Beginning at 10th tier, your faction gains expertise in one ability score in which it is proficient. </p>

        <p>At 14th tier, your faction gains expertise in another ability score in which it is proficient.</p>

        <h3>Advanced Item Stockpile </h3>

        <p>At 13th tier, your faction gains access to an advanced enhanced item of its choice. When a 4th rank or higher faction member has spent 200 days of downtime furthering the faction's interests, they gain access to this advanced item and can purchase it at the item's full value. If the chosen item is a consumable, it takes half the requisite downtime. Provided that the item is undamaged, they can return it to your faction for a full refund.</p>

        <h3>Association Advantage</h3>

        <p>Starting at 14th tier, your faction gains advantage on checks with one ability score of your choice.</p>

        <h3>Ability Score Mastery</h3>

        <p>At 17th tier, you can increase one of your faction's ability scores by 2. Its maximum for this score increases by 2. At 18th, 19th, and 20th tier, you can increase another of your faction's ability scores, and its maximum, by 2.</p>

        <h3>Legendary</h3>

        <p>Also at 17th tier, your factions gains access to one legendary enhanced item of its choice. When a 5th rank or higher faction member has spent 500 days of downtime furthering the faction's interests, they gain access to this legendary item and can procure it at no cost.</p>

        <h3>Artifact</h3>

        <p>As of 20th tier, your factions gains access to one artifact enhanced item of its choice. When a 5th rank or higher faction member has spent 1,000 days of downtime furthering the faction's interests, they gain access to this artifact item and can procure it at no cost. </p>



        <div class="sw5e-book-block"><h5>Membership Ranks</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rank</th><th>Features</th><th>Required<br> Renown</th><th>Other<br> Requirements</th></tr></thead><tbody><tr><td>1st</td><td>Earn Renown, Faction Training, Insignia</td><td>0</td><td>�</td></tr><tr><td>2nd</td><td>Apprentice, Faction Activity, Premium Item Procurement, Special Missions</td><td>10</td><td>�</td></tr><tr><td>3rd</td><td>Mentor, Prototype Item Procurement</td><td>25</td><td>5th level, 1 special mission</td></tr><tr><td>4th</td><td>Advanced Item Procurement</td><td>50</td><td>9th level, 3 special missions</td></tr><tr><td>5th</td><td>Faction Leader</td><td>100</td><td>13th level, 10 special missions</td></tr></tbody></table></div>

        <h3>Earn Renown</h3>

        <p>Beginning at 1st rank when you join a faction, you gain the ability to earn renown for your faction, allowing you to advance in rank. For every successful workweek in a downtime activity furthering your faction's interests, you gain 1 renown. Additionally, you gain access to faction-specific missions. Every time you complete a  mission for your faction, you gain 1 or more renown.</p>

        <h3>Faction Training</h3>

        <p>Also at 1st rank, you gain access to your faction's favored training. When you train in your faction's favored language or tool using the Training downtime activity on page ___ of the Player's Handbook, the requisite time and credits are halved.</p>

        <h3>Insignia</h3>

        <p>Lastly at 1st rank, you are given permission to wield the insignia of your faction, either openly or in secret. When your faction reaches 3rd tier, your insignia gains an enhanced property.</p>

        <h3>Apprentice</h3>

        <p>At 2nd rank, you gain the ability to be apprenticed to a 3rd rank or higher member of your faction. Bonding with a mentor takes one workweek of downtime spent together furthering your faction's interests in your faction's favored activity. At the end of the workweek, you and your mentor are bonded. You can only have one mentor at a time. You can break your bond with your current mentor at any time, no action required.</p>

        <p>While traveling with or otherwise working with your mentor, you gain the following benefits:</p>

        <h4>Language and Tool Training</h4>

        <p>You can learn any language or tool proficiency that your mentor possesses in half the time, with no credit requirement.</p>



        <h4>Word of Advice</h4>

        <p>While you can see and hear your mentor, you can gain advantage on one ability check, attack roll, or saving throw (no action required). You can wait until after you roll the d20 to use this feature, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Faction Activity</h3>

        <p>Also at 2nd rank, you gain benefits from your faction when you engage in your faction's favored activity, provided your faction is at least 2nd tier. When you roll percentile dice as a part of the chosen activity, you can also make an ability check and add it to the roll. The ability check is determined by the specific activity, as shown in the \<em>\</em>\<em> table on page \</em>\<em>\</em>. Additionally, when you make a d20 roll as a part of the chosen activity, you can use your faction's association modifier instead of your modifier, if that number is greater.</p>

        <h3>Premium Item Procurement</h3>

        <p>Additionally at 2nd rank, after spending at least 50 days of downtime furthering your faction's interests, you gain access to premium enhanced items, which you can purchase at the item's full value, provided your faction is at least 5th tier. You gain access to armor +1, shield +1, weapon +1, and one premium enhanced item chosen by your faction. You can only have one premium item procured in this fashion, but provided that the item is undamaged, you can return it to your faction for a full refund. If your faction's chosen item is a consumable, you can instead have an unlimited number of that item, but you must spend the requisite downtime for each one.</p>



        <h3>Special Missions</h3>

        <p>Lastly at 2nd rank, you gain the opportunity to undergo special missions on behalf of your faction. These missions, while more scarce, often yield greater renown, and potentially other rewards. Special missions are also required to progress past 2nd rank in a faction, as shown in the Membership Ranks table.</p>

        <h3>Mentor</h3>

        <p>At 3rd rank, you gain the ability to take a 1st or 2nd rank member of your faction as an apprentice. Bonding with an apprentice takes one workweek of downtime spent together furthering your faction's interests. At the end of the workweek, you and your apprentice are bonded. You can only have one apprentice at a time. You can break your bond with your current apprentice at any time, no action required.</p>

        <p>And 4th rank, you can have a 2nd or 3rd rank member of your faction as an apprentice, and at 5th rank, you can have a 2nd, 3rd, or 4th rank member of your faction as an apprentice. Additionally, at 5th rank, you can maintain three apprentices at a time, instead of one.</p>

        <p>While traveling with or otherwise working with your apprentice, you gain the following benefits.</p>

        <h4>Downtime</h4>

        <p>When you engage in a downtime activity with your apprentice and make your percentile dice check, you can roll the dice twice and use either total.</p>

        <h4>Inspiring Presence</h4>

        <p>While your apprentice can see and hear you, you can gain advantage on one ability check, attack roll, or saving throw (no action required). You can wait until after you roll the d20 to use this feature, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Prototype Item Procurement</h3>

        <p>Also at 3rd rank, after spending at least 100 days of downtime furthering your faction's interests, you gain access to prototype enhanced items, which you can purchase at the item's full value, provided your faction is at least 9th tier. You gain access to armor +2, shield +2, weapon +2, and one prototype enhanced item chosen by your faction. You can only have one prototype item procured in this fashion, but provided that the item is undamaged, you can return it to your faction for a full refund. If your faction's chosen item is a consumable, you can instead have an unlimited number of that item, but you must spend the requisite downtime for each one.</p>

        <h3>Advanced Item Procurement</h3>

        <p>At 4th rank, after spending at least 200 days of downtime furthering your faction's interests, you gain access to advanced enhanced items, which you can purchase at the item's full value, provided your faction is at least 13th tier. You gain access to armor +3, shield +3, weapon +3, and one advanced enhanced item chosen by your faction. You can only have one advanced item procured in this fashion, but provided that the item is undamaged, you can return it to your faction for a full refund. If your faction's chosen item is a consumable, you can instead have an unlimited number of that item, but you must spend the requisite downtime for each one.</p>

        <h3>Faction Leader</h3>

        <p>As of 5th rank, at the end of a long rest, if a faction member of lower rank is within line of sight, you can grant them Inspiration, which lasts until the end of their next long rest. Once you've done so, you can't do so again until you complete a long rest.</p>

