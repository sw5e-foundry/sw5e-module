        <h2>Brewer's Kit</h2>

        <p>Brewer's kit include includes all of the necessary components to ferment and store beer, as well as other alcoholic beverages.</p>

        <p>Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to create or identify alcoholic beverages.</p>

        <h4>Lore</h4>

        <p>Proficiency with brewer's kit gives you additional insight on Intelligence (Lore) checks concerning events that involve alcohol as a significant element.</p>

        <h4>Medicine</h4>

        <p>This tool proficiency grants additional insight when you treat anyone suffering from alcohol poisoning or when you can use alcohol to dull pain.</p>

        <h4>Persuasion</h4>

        <p>A stiff drink can help soften the hardest heart. Your proficiency with brewer's kit can help you ply someone with drink, giving them just enough alcohol to mellow their mood .</p>

        <h3>Brewmaster</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 brewer's kit check to hone or reduce the addictive properties of an alcoholic beverage within reach. To use this benefit, you must have a brewer's kit, and the alcoholic beverage must be within reach. If a creature consumes the alcoholic beverage before the end of your next short or long rest, they have advantage or disadvantage (your choice) on the saving throws made to avoid the low and addiction.</p>

