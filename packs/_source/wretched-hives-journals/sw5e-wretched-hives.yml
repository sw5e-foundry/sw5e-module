k II</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 30 hit points, and lasts 8 hours. Whenever the creature takes damage (one of acid, cold, fire, force, lightning, necrotic, poison, psychic, or sonic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, the creature takes any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Environmental Barrier Mk III</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 45 hit points, and lasts 8 hours. Whenever the creature takes damage (one of acid, cold, fire, force, lightning, necrotic, poison, psychic, or sonic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Environmental Barrier Mk IV</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 60 hit points, and lasts 8 hours. Whenever the creature takes damage (one of acid, cold, fire, force, lightning, necrotic, poison, psychic, or sonic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Environmental Barrier Mk V</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 75 hit points, and lasts 8 hours. Whenever the creature takes damage (one of acid, cold, fire, force, lightning, necrotic, poison, psychic, or sonic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Environmental Barrier Mk VI</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 90 hit points, and lasts 8 hours. Whenever the creature takes damage (one of acid, cold, fire, force, lightning, necrotic, poison, psychic, or sonic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Physical Barrier Mk I</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 10 hit points, and lasts 8 hours. Whenever the creature takes damage (one of energy, ion, or kinetic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, the creature takes any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Physical Barrier Mk II</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 20 hit points, and lasts 8 hours. Whenever the creature takes damage (one of energy, ion, or kinetic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, the creature takes any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n\n\n<h4>Physical Barrier Mk III</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 30 hit points, and lasts 8 hours. Whenever the creature takes damage (one of energy, ion, or kinetic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Physical Barrier Mk IV</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 40 hit points, and lasts 8 hours. Whenever the creature takes damage (one of energy, ion, or kinetic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Physical Barrier Mk V</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 50 hit points, and lasts 8 hours. Whenever the creature takes damage (one of energy, ion, or kinetic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n<h4>Physical Barrier Mk VI</h4>\n\n<em><strong>Consumable</strong> (barrier), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can administer this barrier to a creature within 5 feet. The barrier has 60 hit points, and lasts 8 hours. Whenever the creature takes damage (one of energy, ion, or kinetic, chosen by the GM when the item is created), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage. A creature can benefit from only one barrier at a time. </p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Consumables (Explosives)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th><th>Page</th></tr></thead><tbody><tr><td><em>Explosives</em></td><td></td><td></td></tr><tr><td><font style=\"color:green\">Grenade, Fragmentation (Average)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:green\">Mine, Fragmentation (Average)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:blue\">Grenade, Fragmentation (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:blue\">Mine, Fragmentation (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:purple\">Grenade, Fragmentation (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:purple\">Mine, Fragmentation (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Grenade, Fragmentation (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Mine, Fragmentation (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:red\">Grenade, Fragmentation (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr><tr><td><font style=\"color:red\">Mine, Fragmentation (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr></tbody></table>\n\n<h4>Grenade, Fragmentation (Average)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can prime and throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 16 Dexterity saving throw. A creature takes 4d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Grenade, Fragmentation (Deadly)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can prime and throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 20 Dexterity saving throw. A creature takes 8d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Grenade, Fragmentation (Devastating)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can prime and throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 24 Dexterity saving throw. A creature takes 12d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Grenade, Fragmentation (Lethal)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can prime and throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 22 Dexterity saving throw. A creature takes 10d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Grenade, Fragmentation (Major)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can prime and throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 18 Dexterity saving throw. A creature takes 6d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Mine, Fragmentation (Average)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which activates at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 16 Dexterity saving throw. A creature takes 4d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Mine, Fragmentation (Deadly)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which activates at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 20 Dexterity saving throw. A creature takes 8d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Mine, Fragmentation (Devastating)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which activates at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 24 Dexterity saving throw. A creature takes 12d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Mine, Fragmentation (Lethal)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which activates at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 22 Dexterity saving throw. A creature takes 10d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n\n\n<h4>Mine, Fragmentation (Major)</h4>\n\n<em><strong>Consumable</strong> (explosive), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which activates at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 18 Dexterity saving throw. A creature takes 6d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Consumables (Medpacs)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th><th></th></tr></thead><tbody><tr><td><em>Medpacs</em></td><td></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Vitapac (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td><td></td></tr><tr><td><font style=\"color:green\">Medpac (Fine)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:green\">Vitapac (Fine)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:blue\">Medpac (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:blue\">Vitapac (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:purple\">Medpac (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:purple\">Vitapac (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Medpac (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Vitapac (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:red\">Medpac (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr><tr><td><font style=\"color:red\">Vitapac (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr></tbody></table>\n\n<h4>Medpac (Champion) </h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>A medpac is a quick-acting syringe filled with a concentrated dose of kolto. As an action, you can use this medpac to restore hit points to a beast or humanoid within 5 feet. The creature rolls six dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Medpac (Exceptional) </h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>A medpac is a quick-acting syringe filled with a concentrated dose of kolto. As an action, you can use this medpac to restore hit points to a beast or humanoid within 5 feet. The creature rolls five dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Medpac (Fine)</h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>A medpac is a quick-acting syringe filled with a concentrated dose of kolto. As an action, you can use this medpac to restore hit points to a beast or humanoid within 5 feet. The creature rolls two dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Medpac (Improved)</h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>A medpac is a quick-acting syringe filled with a concentrated dose of kolto. As an action, you can use this medpac to restore hit points to a beast or humanoid within 5 feet. The creature rolls three dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point) If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Medpac (Superior)</h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>A medpac is a quick-acting syringe filled with a concentrated dose of kolto. As an action, you can use this medpac to restore hit points to a beast or humanoid within 5 feet. The creature rolls four dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Vitapac (Basic)</h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This fast-acting syringe grants a revitalizing boost. As an action, you can use this vitapac to restore expended Hit Dice to a beast or humanoid within 5 feet. The creature immediately regains two Hit Dice. If the creature has spent Hit Dice of different sizes, determine which Hit Dice are restored randomly.</p>\n\n<h4>Vitapac (Champion) </h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This fast-acting syringe grants a revitalizing boost. As an action, you can use this vitapac to restore expended Hit Dice to a beast or humanoid within 5 feet. The creature immediately regains nine Hit Dice. If the creature has spent Hit Dice of different sizes, determine which Hit Dice are restored randomly.</p>\n\n<h4>Vitapac (Exceptional) </h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This fast-acting syringe grants a revitalizing boost. As an action, you can use this vitapac to restore expended Hit Dice to a beast or humanoid within 5 feet. The creature immediately regains eight Hit Dice. If the creature has spent Hit Dice of different sizes, determine which Hit Dice are restored randomly.</p>\n\n<h4>Vitapac (Fine)</h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This fast-acting syringe grants a revitalizing boost. As an action, you can use this vitapac to restore expended Hit Dice to a beast or humanoid within 5 feet. The creature immediately regains three Hit Dice. If the creature has spent Hit Dice of different sizes, determine which Hit Dice are restored randomly.</p>\n\n\n\n<h4>Vitapac (Improved)</h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This fast-acting syringe grants a revitalizing boost. As an action, you can use this vitapac to restore expended Hit Dice to a beast or humanoid within 5 feet. The creature immediately regains five Hit Dice. If the creature has spent Hit Dice of different sizes, determine which Hit Dice are restored randomly.</p>\n\n<h4>Vitapac (Superior)</h4>\n\n<em><strong>Consumable</strong> (medpac), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This fast-acting syringe grants a revitalizing boost. As an action, you can use this vitapac to restore expended Hit Dice to a beast or humanoid within 5 feet. The creature immediately regains six Hit Dice. If the creature has spent Hit Dice of different sizes, determine which Hit Dice are restored randomly.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Consumables (Poisons)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th><th></th></tr></thead><tbody><tr><td><em>Poisons</em></td><td></td><td></td></tr><tr><td><font style=\"color:green\">Poison (Average)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:blue\">Poison (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:purple\">Poison (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Poison (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:red\">Poison (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr></tbody></table>\n\n<h4>Poison (Average) </h4>\n\n<em><strong>Consumable</strong> (poison), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can use the poison in this vial to coat one vibroweapon, one slug cartridge, or one wrist launcher dart. A creature hit by the poisoned weapon must make a DC 16 Constitution saving throw, taking 4d4 poison damage on a failed save or half as much on a successful one. Once applied, the poison retains potency for 1 minute before drying.</p>\n\n<h4>Poison (Deadly) </h4>\n\n<em><strong>Consumable</strong> (poison), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can use the poison in this vial to coat one vibroweapon, one slug cartridge, or one wrist launcher dart. A creature hit by the poisoned weapon must make a DC 20 Constitution saving throw, taking 8d4 poison damage on a failed save or half as much on a successful one. Once applied, the poison retains potency for 1 minute before drying.</p>\n\n<h4>Poison (Devastating) </h4>\n\n<em><strong>Consumable</strong> (poison), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can use the poison in this vial to coat one vibroweapon, one slug cartridge, or one wrist launcher dart. A creature hit by the poisoned weapon must make a DC 24 Constitution saving throw, taking 12d4 poison damage on a failed save or half as much on a successful one. Once applied, the poison retains potency for 1 minute before drying.</p>\n\n<h4>Poison (Lethal) </h4>\n\n<em><strong>Consumable</strong> (poison), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can use the poison in this vial to coat one vibroweapon, one slug cartridge, or one wrist launcher dart. A creature hit by the poisoned weapon must make a DC 22 Constitution saving throw, taking 10d4 poison damage on a failed save or half as much on a successful one. Once applied, the poison retains potency for 1 minute before drying.</p>\n\n<h4>Poison (Major)</h4>\n\n<em><strong>Consumable</strong> (poison), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can use the poison in this vial to coat one vibroweapon, one slug cartridge, or one wrist launcher dart. A creature hit by the poisoned weapon must make a DC 18 Constitution saving throw, taking 6d4 poison damage on a failed save or half as much on a successful one. Once applied, the poison retains potency for 1 minute before drying.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Consumables (Stimpacs)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th><th>Page</th></tr></thead><tbody><tr><td><em>Stimpacs</em></td><td></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Charisma Stim (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Constitution Stim (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Dexterity Stim (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Intelligence Stim (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Strength Stim (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Wisdom Stim (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Charisma Stim (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Constitution Stim (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Dexterity Stim (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Intelligence Stim (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Strength Stim (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Wisdom Stim (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Charisma Stim (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Constitution Stim (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Dexterity Stim (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Intelligence Stim (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Strength Stim (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Wisdom Stim (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Charisma Stim (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Constitution Stim (Superior)</font></td><td><font style=\"color:purple\">Advanced</fo