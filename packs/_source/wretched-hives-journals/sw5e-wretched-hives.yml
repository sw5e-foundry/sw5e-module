>Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Cortosis Weave (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Exceptional Ballistic Polymer</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Gauntlet Armoring Mk III</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Hydraulic Equalizer Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Insulated Reinforcement (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Magnetized Shield (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Powered Armoring Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Absorptive Reinforcement Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Agile Armoring Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Avoidant Reinforcement Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Barbed Armoring Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Bioenhancement Matrix Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Charging Reinforcement Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Hydraulic Equalizer Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Insulated Reinforcement (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Interlocking Shielding Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:red\">Magnetized Shield (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Powered Armoring Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Reactive Armoring Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Responsive Shielding Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Spiked Shielding Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Versatile Shielding Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Absorptive Reinforcement</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor or shield gains the absorptive 1 property. If it already has the absorptive property, its absorptive property increases by 1, to a maximum of 3. </p>\n\n<h4>Absorptive Reinforcement Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This armor or shield gains the absorptive 2 property. If it already has the absorptive property, its absorptive number increases by 2, to a maximum of 3.</p>\n\n<h4>Absorptive Reinforcement Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This armor or shield gains the absorptive 3 property. If it already has the absorptive property, its absorptive number increases to 3.</p>\n\n<h4>Agile Armoring Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the agile 11 property. If it already has the agile property, its agile number increases by one step (from 11 to 13, 13 to 15, 15 to 17, 17 to 19, or 19 to 21).</p>\n\n<h4>Agile Armoring Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the agile 13 property. If it already has the agile property, its agile number increases by two steps (from 11 to 15, 13 to 17, 15 to 19, or 17 to 21).</p>\n\n<h4>Agile Armoring Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the agile 15 property. If it already has the agile property, its agile number increases by three steps (from 11 to 17, 13 to 19, or 15 to 21).</p>\n\n<h4>Agile Armoring Mk IV</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the agile 17 property. If it already has the agile property, its agile number increases by four steps (from 11 to 19 or 13 to 21).</p>\n\n<h4>Agile Armoring Mk V</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the agile 19 property. If it already has the agile property, its agile number increases by five steps (from 11 to 21).</p>\n\n\n\n<h4>Agile Armoring Mk VI</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the agile 21 property. If it already has the agile property, its agile number increases to 21.</p>\n\n<h4>Artificially Intelligent</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>You install an artificial intelligence into this armor. While wearing this armor, when you make an ability check, this armor's artificial intelligence can take the Help action.</p>\n\n<p>You can use this feature twice. You regain all expended uses when you complete a short or long rest.</p>\n\n<h4>Avoidant Reinforcement</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor or shield gains the avoidant 1 property. If it already has the avoidant property, its avoidant property increases by 1, to a maximum of 3. </p>\n\n<h4>Avoidant Reinforcement Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This armor or shield gains the avoidant 2 property. If it already has the avoidant property, its avoidant number increases by 2, to a maximum of 3.</p>\n\n<h4>Avoidant Reinforcement Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This armor or shield gains the avoidant 3 property. If it already has the avoidant property, its avoidant number increases to 3.</p>\n\n<h4>Balanced Shielding</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield loses the imbalanced property.</p>\n\n<h4>Ballistic Polymer</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While you have temporary hit points, kinetic and energy damage you take is reduced by an amount equal to half your proficiency bonus (rounded up). </p>\n\n<h4>Ballistic Polymer (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>While you have temporary hit points, kinetic and energy damage you take is reduced by an amount equal to your proficiency bonus. </p>\n\n<h4>Barbed Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the barbed (1d4) property. If it already has the barbed property, the barbed damage increases by one step (from d4 to d6, or from d6 to d8). </p>\n\n<h4>Barbed Armoring Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the barbed (1d6) property. If it already has the barbed property, the barbed damage increases by two steps (from d4 to d8). </p>\n\n<h4>Barbed Armoring Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the barbed (1d8) property. If it already has the barbed property, the barbed damage increases to d8. </p>\n\n<h4>Bioenhancement Matrix Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your hit point maximum increases by an amount equal to your level, and it increases by 1 every time you gain a level.</p>\n\n<h4>Bioenhancement Matrix Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your hit point maximum increases by an amount equal to twice your level, and it increases by 2 every time you gain a level.</p>\n\n<h4>Bioenhancement Matrix Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Your hit point maximum increases by an amount equal to three times your level, and it increases by 3 every time you gain a level.</p>\n\n<h4>Bonded Plates Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You gain a +1 bonus to AC against melee attacks and a -1 penalty to AC against ranged attacks while wearing this armor or wielding this shield.</p>\n\n<h4>Bonded Plates Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You gain a +1 bonus to AC against melee attacks while wearing this armor or wielding this shield.</p>\n\n<h4>Bonded Plates Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You gain a +2 bonus to AC against melee attacks while wearing this armor or wielding this shield.</p>\n\n<h4>Bonded Plates Mk IV</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You gain a +3 bonus to AC against melee attacks while wearing this armor or wielding this shield.</p>\n\n<h4>Charging Reinforcement</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor or shield gains the charging 1 property. If it already has the charging property, its charging property increases by 1, to a maximum of 3. </p>\n\n<h4>Charging Reinforcement Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This armor or shield gains the charging 2 property. If it already has the charging property, its charging number increases by 2, to a maximum of 3.</p>\n\n<h4>Charging Reinforcement Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This armor or shield gains the charging 3 property. If it already has the charging property, its charging number increases to 3.</p>\n\n\n\n<h4>Collapsible Suit</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor can collapse into a case for easy storage. When transformed this way the armor is indistinguishable from a normal case and weighs 1/3 its normal weight. As an action you can don or doff the armor, allowing it to transform as needed.</p>\n\n<h4>Concealing Shielding</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the concealing property.</p>\n\n<h4>Convenience Reinforcement</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor or shield loses the cumbersome property.</p>\n\n<h4>Cortosis Weave</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This armor or shield gains the absorptive 1 property. If it already has the absorptive property, its absorptive property increases by 1, to a maximum of 3. Additionally, when taking energy damage from a lightweapon, this armor or shield's absorptive number is doubled, to a maximum of 6.</p>\n\n<h4>Cortosis Weave (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This armor or shield gains the absorptive 2 property. If it already has the absorptive property, its absorptive property increases by 2, to a maximum of 3. Additionally, when taking energy damage from a lightweapon, this armor or shield's absorptive number is doubled, to a maximum of 6.</p>\n\n<h4>Darkvision Visor</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>While wearing this armor, you have darkvision to a range of 60 feet. If you already have darkvision, this modification increases its range by 30 feet.</p>\n\n<h4>Emergency Landing Braces</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You can use your reaction to reduce any falling damage you would take by half.</p>\n\n<h4>Enhanced Endurance</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>When you are reduced to 0 hit points while wearing this armor but not killed outright, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>\n\n<h4>Fadecasting Overlay (Adept)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Overlay (Apprentice)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Overlay (Journeyman)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Overlay (Novice)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Strength or Constitution saving throw and a -1 penalty to the force save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Fadecasting Underlay Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Strength or Constitution saving throw and a -1 penalty to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Fadecasting Underlay Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Underlay Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Underlay Mk IV</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Flexible Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor loses the rigid property.</p>\n\n<h4>Gauntlet Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the gauntleted (1d4) property. If it already has the gauntleted property, the gauntleted damage increases by one step (from d4 to d6, or from d6 to d8). </p>\n\n<h4>Gauntlet Armoring Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the gauntleted (1d6) property. If it already has the gauntleted property, the gauntleted damage increases by two steps (from d4 to d8). </p>\n\n<h4>Gauntlet Armoring Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the gauntleted (1d8) property. If it already has the gauntleted property, the gauntleted damage increases to d8.</p>\n\n\n\n<h4>Grappling Harpoon</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains an integrated grappling harpoon set into your gauntlet. With this harpoon, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d6 kinetic damage. This attack can target a surface, object, or creature.</p>\n\n<p>A creature struck by this attack is impaled by the harpoon. As an action, a creature can attempt to remove the harpoon. Removing the harpoon requires a DC 15 Strength check. While the harpoon is stuck in the target, you are connected to the target by a 60 foot cable.</p>\n\n<p>While the harpoon is deployed, you can use your bonus action to activate the reel, pulling yourself to the location if the target is larger than you. A creature or object your size or smaller is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>\n\n<p>Once you've used this feature, you can't use it again until you recover and reinsert the harpoon as an action.</p>\n\n<h4>Heavy Suit</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>You enhance this armor, making it difficult to move. As a bonus action, you can anchor or deanchor your feet to the ground. While anchored, your speed is 0, you have advantage on Strength checks and Strength saving throws, and your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>\n\n<h4>Horizontal Exojets</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>Whenever you take the Dodge or Dash actions, your walking speed increases by 10 feet until the end of your turn.</p>\n\n<h4>Hydraulic Equalizer</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This armor or shield's strength number is reduced by one step (from 21 to 19, 19 to 17, 17 to 15, 15 to 13, or 13 to 11). If the strength number is 11, this modification removes the strength property from it entirely.</p>\n\n<h4>Hydraulic Equalizer Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor or shield's strength number is reduced by two steps (from 21 to 17, 19 to 15, 17 to 13, or 15 to 11). If the strength number is 13 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Hydraulic Equalizer Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This armor or shield's strength number is reduced by three steps (from 21 to 15, 19 to 13, or 17 to 11). If the strength number is 15 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Hydraulic Equalizer Mk IV</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This armor or shield's strength number is reduced by four steps (from 21 to 13 or 19 to 11). If the strength number is 17 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Hydraulic Equalizer Mk V</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This armor or shield's strength number is reduced by five steps (from 21 to 11). If the strength number is 19 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Hydraulic Equalizer Mk VI</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This armor or shield loses the strength property.</p>\n\n<h4>Impermeable Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the impermeable property.</p>\n\n<h4>Inconspicuous Shielding</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br> \n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield loses the obtrusive property.</p>\n\n<h4>Insulated Reinforcement (Basic)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This armor or shield gains the insulated 5 property. If it already has the insulated property, its insulated number increases by 1, to a maximum of 10. </p>\n\n<h4>Insulated Reinforcement (Fine)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor or shield gains the insulated 6 property. If it already has the insulated property, its insulated number increases by 2, to a maximum of 10. </p>\n\n<h4>Insulated Reinforcement (Improved)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This armor or shield gains the insulated 7 property. If it already has the insulated property, its insulated number increases by 3, to a maximum of 10. </p>\n\n<h4>Insulated Reinforcement (Superior)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This armor or shield gains the insulated 8 property. If it already has the insulated property, its insulated number increases by 4, to a maximum of 3.</p>\n\n<h4>Insulated Reinforcement (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This armor or shield gains the insulated 9 property. If it already has the insulated property, its insulated number increases by 5, to a maximum of 10. </p>\n\n<h4>Insulated Reinforcement (Champion)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This armor or shield gains the insulated 10 property. If it already has the insulated property, its insulated number increases to 10.</p>\n\n\n\n<h4>Integrated Jetboosters Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor has a jetpack built in. Activating or deactivating the jetpack requires a bonus action and, while active, you have a flying speed of 30 feet. The jetpack last for 1 minute per power cell (to a maximum of 10 minutes) and can be recharged by a power source or replacing the power cells. </p>\n\n<h4>Interlocking Shielding</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the interlocking 1 property. If it already has the interlocking property, its interlocking number increases by 1, to a maximum of 3.</p>\n\n<h4>Interlocking Shielding Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the interlocking 2 property. If it already has the interlocking property, its interlocking number increases by 2, to a maximum of 3.</p>\n\n<h4>Interlocking Shielding Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the interlocking 3 property. If it already has the interlocking property, its interlocking number increases to 3.</p>\n\n<h4>Lambent Shielding</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This shield gains the lambent property.</p>\n\n<h4>Lightweight Reinforcement</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This armor or shield gains the lightweight property.</p>\n\n<h4>Magnetized Shield</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Physical shield</em><br>\n\n<p>This shield gains the magnetic 13 property. If it already has the magnetic property, its magnetic number increases by 1, to a maximum of 18.</p>\n\n<h4>Magnetized Shield (Champion)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Physical shield</em><br>\n\n<p>This shield gains the magnetic 18 property. If it already has the magnetic property, its magnetic number increases to 18. </p>\n\n<h4>Magnetized Shield (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Physical shield</em><br>\n\n<p>This shield gains the magnetic 17 property. If it already has the magnetic property, its magnetic number increases by 5, to a maximum of 18. </p>\n\n<h4>Magnetized Shield (Fine)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Physical shield</em><br>\n\n<p>This shield gains the magnetic 14 property. If it already has the magnetic property, its magnetic number increases by 2, to a maximum of 18. </p>\n\n<h4>Magnetized Shield (Improved)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Physical shield</em><br>\n\n<p>This shield gains the magnetic 15 property. If it already has the magnetic property, its magnetic number increases by 3, to a maximum of 18. </p>\n\n<h4>Magnetized Shield (Superior)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Physical shield</em><br>\n\n<p>This shield gains the magnetic 16 property. If it already has the magnetic property, its magnetic number increases by 4, to a maximum of 18. </p>\n\n<h4>Manageability Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor loses the bulky property.</p>\n\n<h4>Obscured Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the obscured property.</p>\n\n<h4>Optimized Actuators Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>Your movement speed increases by 5 feet.</p>\n\n<h4>Overlay Amplifier (Adept)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to melee force attacks.</p>\n\n<h4>Overlay Amplifier (Apprentice)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to melee force attacks.</p>\n\n<h4>Overlay Amplifier (Journeyman)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to melee force attacks.</p>\n\n<h4>Overlay Amplifier (Novice)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to melee force attacks and a -1 penalty to ranged force attacks.</p>\n\n<h4>Overlay Rangefinder (Adept)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to ranged force attacks.</p>\n\n<h4>Overlay Rangefinder (Apprentice)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to ranged force attacks.</p>\n\n<h4>Overlay Rangefinder (Journeyman)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to ranged force attacks.</p>\n\n\n\n<h4>Overlay Rangefinder (Novice)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to ranged force attacks and a -1 penalty to melee force attacks.</p>\n\n<h4>Overload Shield</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Shield generator</em><br>\n\n<p>You modify this shield generator to overload. As an action you can overload this shield. Each Large or smaller creature within 5 feet of you must make a DC 13 Dexterity or Strength saving throw (their choice). On a failed save, they are pushed back 5 feet and knocked prone.</p>\n\n<p>You can use this feature twice. You regain all expended uses when you complete a short or long rest.</p>\n\n<h4>Powered Armoring Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the powered 11 property. If it already has the powered property, its powered number increases by one step (from 11 to 13, 13 to 15, 15 to 17, 17 to 19, or 19 to 21).</p>\n\n<h4>Powered Armoring Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the powered 13 property. If it already has the powered property, its powered number increases by two steps (from 11 to 15, 13 to 17, 15 to 19, or 17 to 21).</p>\n\n<h4>Powered Armoring Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the powered 15 property. If it already has the powered property, its powered number increases by three steps (from 11 to 17, 13 to 19, or 15 to 21).</p>\n\n<h4>Powered Armoring Mk IV</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the powered 17 property. If it already has the powered property, its powered number increases by four steps (from 11 to 19 or 13 to 21).</p>\n\n<h4>Powered Armoring Mk V</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the powered 19 property. If it already has the powered property, its powered number increases by five steps (from 11 to 21).</p>\n\n<h4>Powered Armoring Mk VI</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the powered 21 property. If it already has the powered property, its powered number increases to 21.</p>\n\n<h4>Reactive Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the reactive 1 property. If it already has the reactive property, its reactive number increases by 1, to a maximum of 3.</p>\n\n<h4>Reactive Armoring Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the reactive 2 property. If it already has the reactive property, its reactive number increases by 2, to a maximum of 3.</p>\n\n<h4>Reactive Armoring Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the reactive 3 property. If it already has the reactive property, its reactive number increases to 3.</p>\n\n<h4>Regulated Reinforcement</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor or shield gains the regulated property.</p>\n\n<h4>Reinforced Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the reinforced property.</p>\n\n<h4>Reinforced Underlay (Basic)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You gain a +1 bonus to AC against ranged attacks and a -1 penalty to AC against melee attacks while wearing this armor or wielding this shield.</p>\n\n<h4>Reinforced Underlay (Fine)</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"