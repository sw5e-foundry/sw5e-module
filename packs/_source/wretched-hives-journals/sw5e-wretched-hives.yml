        <h1>Chapter 6: Customization Options</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">he combination of ability scores, species, class, and</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; background defines your character's capabilities in the game, and the personal details you create set your character apart from every other character. Even within your class and species, you have options to fine-tune what your character can do. But this chapter is for players who�with the GM's permission�want to go a step further.

        <p>This chapter expands on feats, which are special options you can choose instead of increasing your ability scores as you gain levels. Your GM decides whether these options are available in a campaign.</p>

        <h4>Class Weapon Proficiencies</h4>

        <p>Certain classes�berserker, consular, engineer, fighter, guardian, and scout�have proficiency in all of a type of weapon. For instance, fighters are proficient in all blasters and all vibroweapons. Consequently, fighters have proficiency in all blasters and vibroweapons present in Chapter 5. Other classes�monks, operatives, scholars, and sentinels�have proficiency in a certain set of weapons. For each of these classes, they gain proficiency in only certain weapons, as shown below in the Weapon Proficiencies by Class table:</p>

        <h5>Weapon Proficiencies by Class</h5>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Weapon Proficiencies</th></tr></thead><tbody><tr><td>Berserker</td><td>All vibroweapons, simple blasters</td></tr><tr><td>Consular</td><td>Simple lightweapons, simple vibroweapons</td></tr><tr><td>Engineer</td><td>Simple blasters, simple vibroweapons</td></tr><tr><td>Fighter</td><td>All blasters, all vibroweapons</td></tr><tr><td>Guardian</td><td>All lightweapons, all vibroweapons</td></tr><tr><td>Monk</td><td>Simple blasters, simple vibroweapons, bolas</td></tr><tr><td>Operative</td><td>Simple vibroweapons, simple blasters, bolas, electrobaton, incinerator pistol, riot baton, riot shocker, sonic pistol, vibroknife, wristblade</td></tr><tr><td>Scholar</td><td>Simple blasters, simple vibroweapons, electrobaton, incinerator pistol, sonic pistol, vibroknife</td></tr><tr><td>Scout</td><td>All blasters, all vibroweapons</td></tr><tr><td>Sentinel</td><td>Simple vibroweapons, simple lightweapons, bolas, chained dagger, chained lightdagger, electrobaton, electrostaff, guard shoto, lightfist, riot baton, riot shocker, vibroshield, vibroknife, vibrotonfa, war hat, wristblade</td></tr></tbody></table>

        <h2>Feats</h2>

        <p>A feat represents a talent or an area of expertise that gives character special capabilities. It embodies training, experience, and abilities beyond what a class provides. At certain levels, your class gives you the Ability Score Improvement feature. Using the optional feats rule, you can forgo taking that feature to take a feat of your choice instead. You can take each feat only once, unless the feat's description says otherwise.</p>

        <p>You must meet any prerequisite specified in a feat to take that feat. If you ever lose a feat's prerequisite, you can't use that feat until you regain the prerequisite. For example, the Inspiring Leader feat requires you to have a Charisma of 13 or higher. If your Charisma is reduced below 13 somehow�perhaps by a withering curse�you can't benefit from the Inspiring Leader feat until your Charisma is restored.</p>

        <h3>Augmented Cyborg</h3>

        <p>You've experimented with cybernetic augmentations, granting the following benefits: </p>

        <ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Choose one cybernetic augmentation of standard rarity from Appendix A. That augmentation is installed and doesn't count against the maximum cybernetic augmentations you can support, but it does count towards your total cybernetics augmentations as shown in the Cybernetic Augmentations Side Effects table in Chapter 7.</li></ul>

        <h3>Customized Droid</h3>

        <em><strong>Prerequisite:</strong> Type droid</em><br>

        <p>You've been customized beyond other droids of the same model, granting the following benefits: </p>

        <ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Choose one droid customization of standard rarity from Appendix A. That customization is installed and doesn't count against the maximum droid customizations you can support, but it does count towards your maximum parts or protocols, as appropriate.</li></ul>



        <h3>Investigative Attunement</h3>

        <em><strong>Prerequisite:</strong> 4th level</em><br>

        <p>You've spent a significant amount of time appraising and testing enhanced items. You gain the following benefits:</p>

        <ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Your maximum attunement increases by 1.</li><li>You have advantage on ability checks made to identify items.</li><li>Once per long rest, you can choose one object that you must touch for 10 minutes. If it is an enhanced or modified item, you learn its properties and how to use them, whether it requires attunement to use, and how many charges it has, if any. You learn whether any powers are affecting the item and what they are. If the item was created by a power, you learn which power created it.</li></ul>

        <h3>Savage Shorty</h3>

        <em><strong>Prerequisite:</strong> Strength 13, size Small</em><br>

        <p>Despite being short of stature, your size has no impact on your strength and virility. You gain the following benefits:</p>

        <ul><li>Increase your Strength score by 1, to a maximum of 20.</li><li>Your speed increases by 5 feet.</li><li>You lose the Undersized special trait.</li></ul>

        <h3>Tiny Terror</h3>

        <em><strong>Prerequisite:</strong> Strength 13, size Tiny</em><br>

        <p>Despite falling below knee height of other species, your size has less impact on your strength and virility. You gain the following benefits:</p>

        <ul><li>Increase your Strength score by 1, to a maximum of 20.</li><li>Your speed increases by 5 feet.</li><li>You lose the Pintsized special trait, and you are no longer limited to +3 when determining your bonus to attack and damage rolls for weapon attacks using Strength due to the Puny special trait.</li><li>You gain the Undersized special trait: <strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields or martial weapons with the two-handed property unless it has the light property, and if a martial weapon has the versatile property, you can only wield it in two-hands.</li></ul>

        <h3>Weapon Focused</h3>

        <em><strong>Prerequisite:</strong> 4th level</em><br>

        <p>You adopt a particular type of weapon as your focus. Choose one of the weapon focus options, detailed later in this chapter. You can take this feat multiple times. </p>

        <h3>Weapon Supremacist</h3>

        <em><strong>Prerequisite:</strong> 4th level</em><br>

        <p>You've mastered a particular type of weapon. Choose one of the weapon supremacist options, detailed later in this chapter. You can take this feat multiple times. </p>



        <div class="sw5e-book-block"><h2>Weapon Focus</h2></div>

        <p>The Weapon Focused feat offers your choice of weapon focus. You can't take a weapon focus option more than once, even if you later get to choose again.</p>

        <h4>Alternative Weapon Focus</h4>

        <blockquote><p>Your weapon of choice may be governed by one weapon focus, whereas your character can be better realized utilizing a different focus. For instance, your blaster rifle might work better for you with Carbine Focus rather than Rifle Focus. Work with your GM to determine if a different focus is better suited, and mechanically appropriate, to your character's identity.</p>

        <p>A weapon's focus and supremacy must match.</p></blockquote>

        <p>You may choose your weapon focus from the following options or roll on the table below to determine it randomly.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Weapon Focus</th></tr></thead><tbody><tr><td>1</td><td>Blade Weapon</td></tr><tr><td>2</td><td>Carbine Weapon</td></tr><tr><td>3</td><td>Crushing Weapon</td></tr><tr><td>4</td><td>Heavy Weapon</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Weapon Focus</th></tr></thead><tbody><tr><td>5</td><td>Polearm Weapon</td></tr><tr><td>6</td><td>Rifle Weapon</td></tr><tr><td>7</td><td>Sidearm Weapon</td></tr><tr><td>8</td><td>Trip Weapon</td></tr></tbody></table></div>

        <h3>Weapon Classifications</h3>

        <p>Each weapon has a classification, as shown in Weapons by Classification table later in this chapter, that determines which weapon focus it is governed by.</p>

        <h4>Blade Focus</h4>

        <p>You've focused your combat training on blade weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, the next attack roll the target makes before the start of your next turn has disadvantage.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>parry</strong>. For each attack you forgo, you gain a +1 bonus to AC until the start of your next turn.</li></ul>

        <h4>Carbine Focus</h4>

        <p>You've focused your combat training on carbine weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, the next attack roll the target makes before the start of your next turn has disadvantage.</li></ul>

        <ul><li>When you take the Attack action, you can choose to forgo one or more attacks to  <strong>startle</strong>. For each attack you forgo, you expend 1 ammunition and choose a creature that is no more than one size larger than you (your size or smaller if your weapon has the light property)  and is within your weapon's normal range. The creature must succeed on a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon) or become shocked until the start of your next turn.</li></ul>

        <h4>Crushing Weapon Focus</h4>

        <p>You've focused your combat training on crushing weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, you add the attack's governing ability modifier twice, instead of once, to the attack's damage.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>shatter</strong> the ground. For each attack you forgo, choose a separate 5-foot square within your weapon's reach to shatter. That square becomes difficult terrain until cleared. Each 5-foot-square portion of the area requires at least 1 minute to clear by hand. Additionally, each creature other than you in an affected square must make a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon). On a failed save, a creature takes damage equal to the attack's governing ability modifier.</li></ul>

        <h4>Heavy Weapon Focus</h4>

        <p>You've focused your combat training on heavy weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, you add the attack's governing ability modifier twice, instead of once, to the attack's damage.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>suppress</strong>. For each attack you forgo, you expend ammunition equal to half your weapon's reload number (minimum of 2) and choose a 10-foot-cube area within your weapon's normal range. Each creature in the area that is no more than one size larger than you (your size or smaller if your weapon has the light property) must make a Wisdom saving throw (DC = 8 + your bonus to attacks with the weapon) or become frightened of you until the end of their next turn.</li></ul>

        <h4>Polearm Focus</h4>

        <p>You've focused your combat training on polearm weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, you can roll one additional weapon damage die.</li></ul>





        <ul><li>When you take the Attack action, you can choose to forgo one of your attacks to <strong>choke up</strong>. If you do so, your reach increases by 5 feet until the start of your next turn.</li></ul>

        <h4>Rifle Focus</h4>

        <p>You've focused your combat training on rifle weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, you can roll one additional weapon damage die.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to  <strong>scramble</strong>. For each attack you forgo, you can move up to 10 feet without provoking opportunity attacks.</li></ul>

        <h4>Sidearm Focus</h4>

        <p>You've focused your combat training on sidearm weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, the next attack roll made against the target before the start of your next turn has advantage.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>daze</strong> a creature. For each attack you forgo, you expend 2 ammunition and choose a creature that is no more than one size larger than you (your size or smaller if your weapon has the light property), has a head, and is within your weapon's normal range. The creature must succeed on a Constitution saving throw (DC = 8 + your bonus to attacks with the weapon) or become incapacitated until the end of its next turn or until it takes damage, whichever happens first.</li></ul>

        <h4>Trip Weapon Focus</h4>

        <p>You've focused your combat training on trip weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's damage rolls.</li><li>When you score a critical hit with the weapon, the next attack roll made against the target before the start of your next turn has advantage.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>interrupt</strong>. For each attack you forgo, one creature within your reach gains no benefit to armor class from its shield until the end of its next turn.</li></ul>

        <h2>Weapon Supremacy</h2>

        <p>The Weapon Supremacist feat offers your choice of weapon supremacy. You can't take a weapon supremacy option more than once, even if you later get to choose again.</p>

        <h4>Alternative Weapon Supremacy</h4>

        <blockquote><p>Your weapon of choice may be governed by one weapon supremacy, whereas your character can be better realized utilizing a different supremacy. For instance, your blaster rifle might work better for you with Carbine Supremacy rather than Rifle Supremacy. Work with your GM to determine if a different supremacy is better suited, and mechanically appropriate, to your character's identity.  </p>

        <p>A weapon's focus and supremacy must match.</p></blockquote>

        <p>You may choose your weapon supremacy from the following options or roll on the table below to determine it randomly.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Weapon Supremacy</th></tr></thead><tbody><tr><td>1</td><td>Blade</td></tr><tr><td>2</td><td>Carbine</td></tr><tr><td>3</td><td>Crushing Weapon</td></tr><tr><td>4</td><td>Heavy Weapon</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Weapon Supremacy</th></tr></thead><tbody><tr><td>1</td><td>Polearm</td></tr><tr><td>2</td><td>Rifle</td></tr><tr><td>3</td><td>Sidearm</td></tr><tr><td>4</td><td>Trip Weapon</td></tr></tbody></table></div>

        <h3>Weapon Classifications</h3>

        <p>Each weapon has a classification, as shown in the table on page \<em>\</em>\_, that determines which Weapon Supremacy it is governed by.</p>

        <h4>Blade Supremacy</h4>

        <p>You've specialized your combat training with blade weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), it must succeed on a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon) or gain 1 slowed level until the start of your next turn.</li><li>Your critical hit range increases by 1.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>parry</strong>. For each attack you forgo, you gain a +1 bonus to AC until the start of your next turn. If you could already parry, instead you can do so as your bonus action.</li></ul>



        <h4>Carbine Supremacy</h4>

        <p>You've specialized your combat training with carbine weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), it must succeed on a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon) or gain 1 slowed level until the start of your next turn.</li><li>You can wield this weapon in one hand. When you do so, you treat the weapon as if it would have the strength 11 property. If the weapon already has the strength property, its strength number increases by one step (from 11 to 13, 13 to 15, 15 to 17, 17 to 19, or 19 to 21). While wielding the weapon in one hand, you can't attack a target beyond the weapon's normal range.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to  <strong>startle</strong>. For each attack you forgo, you expend 1 ammunition and choose a creature that is no more than one size larger than you (your size or smaller if your weapon has the light property)  and is within your weapon's normal range. The creature must succeed on a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon) or become shocked until the start of your next turn. If you could already startle, instead you can do so as your bonus action.</li></ul>

        <h4>Crushing Weapon Supremacy</h4>

        <p>You've specialized your combat training with crushing weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), it must succeed on a Strength saving throw (DC = 8 + your bonus to attacks with the weapon) or it is pushed 5 feet in a direction of your choice.</li><li>Once per round, when you use your reaction to make a melee weapon attack, you have advantage on the attack roll.</li></ul>



        <ul><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>shatter</strong> the ground. For each attack you forgo, choose a separate 5-foot square within your weapon's reach to shatter. That square becomes difficult terrain until cleared. Each 5-foot-square portion of the area requires at least 1 minute to clear by hand. Additionally, each creature other than you in an affected square must make a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon). On a failed save, a creature takes damage equal to the attack's governing ability modifier.  If you could already shatter, instead you can do so as your bonus action.</li></ul>

        <h4>Heavy Weapon Supremacy</h4>

        <p>You've specialized your combat training with heavy weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), it must succeed on a Strength saving throw (DC = 8 + your bonus to attacks with the weapon) or it is pushed 5 feet in a direction of your choice.</li><li>When a creature rolls a 1 on the saving throw against one of these weapons, they treat the effect's damage as if it had rolled the maximum. If a creature would already treat the effect's damage as if it had rolled the maximum when it rolls a 1 on this weapon's saving throw, it instead does so on a roll of 1 or 2.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>suppress</strong>. For each attack you forgo, you expend ammunition equal to half your weapon's reload number (minimum of 2) and choose a 10-foot-cube area within your weapon's normal range. Each creature in the area that is no more than one size larger than you (your size or smaller if your weapon has the light property) must make a Wisdom saving throw (DC = 8 + your bonus to attacks with the weapon) or become frightened of you until the end of their next turn. If you could already suppress, instead you can do so as your bonus action.</li></ul>



        <h4>Polearm Supremacy</h4>

        <p>You've specialized your combat training with polearm weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), you have advantage on the weapon's damage roll.</li><li>When you make an ability check or saving throw against an effect that would shove or trip you, you can treat a d20 roll of below half your level (rounded up) as half your level.</li><li>When you take the Attack action, you can choose to forgo one of your attacks to <strong>choke up</strong>. If you do so, your reach increases by 5 feet until the start of your next turn. If you could already choke up, instead you can do so as your bonus action.</li></ul>

        <h4>Rifle Supremacy</h4>

        <p>You've specialized your combat training with rifle weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), you have advantage on the weapon's damage roll.</li><li>Your ranged weapon attacks reduce partial cover by one step (from three-quarters to half or half to one-quarter) against targets within 30 feet of you. If the target has one-quarter cover, you ignore it entirely.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to  <strong>scramble</strong>. For each attack you forgo, you can move up to 10 feet without provoking opportunity attacks. If you could already scramble, instead you can do so as your bonus action.</li></ul>

        <h4>Sidearm Supremacy</h4>

        <p>You've specialized your combat training with sidearm weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), it must succeed on a Strength saving throw (DC = 8 + your bonus to attacks with the weapon) or it drops an object of your choice. If you have a free hand and the object is within your reach, you catch the object. Otherwise, it lands at your feet.</li><li>You can now reload these weapons using your reaction or object interaction, instead of just your action or bonus action. You must have one free hand to reload.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>daze</strong> a creature. For each attack you forgo, you expend 2 ammunition and choose a creature that is no more than one size larger than you (your size or smaller if your weapon has the light property), has a head, and is within your weapon's normal range. The creature must succeed on a Constitution saving throw (DC = 8 + your bonus to attacks with the weapon) or become incapacitated until the end of its next turn or until it takes damage, whichever happens first.  If you could already daze, instead you can do so as your bonus action.</li></ul>

        <h4>Trip Weapon Supremacy</h4>

        <p>You've specialized your combat training with trip weapons. You gain the following benefits while wielding any of these weapons, if you are proficient with it:</p>

        <ul><li>You gain a +1 bonus to the weapon's attack rolls.</li><li>Whenever you have advantage on an attack roll and hit and the lower of the two d20 rolls would also hit (or a creature has disadvantage on a saving throw and the higher of the two d20s would also fail), and the target is no more than one size larger than you (your size or smaller if your weapon has the light property), it must succeed on a Strength saving throw (DC = 8 + your bonus to attacks with the weapon) or it drops an object of your choice. If you have a free hand, you catch the weapon. Otherwise, it lands at your feet. </li><li>You have advantage on Strength (Athletics) checks and attack rolls made to trip a creature.</li><li>When you take the Attack action, you can choose to forgo one or more attacks to <strong>interrupt</strong>. For each attack you forgo, one creature within your reach gains no benefit to armor class from its shield until the end of its next turn. If you could already interrupt, instead you can do so as your bonus action.</li></ul>

