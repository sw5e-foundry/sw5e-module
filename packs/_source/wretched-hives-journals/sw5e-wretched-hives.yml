        <h2>Cybertech's Implements</h2>

        <p>Cybertech's implements include all of the necessary components to modify and maintain datacrons, gadgets, and wristpads.</p>

        <h4>Lore</h4>

        <p>Your knowledge allows you greater insight into the history and origin of datacrons.</p>

        <h4>Investigation</h4>

        <p>Your use of tools allows you to more accurately discern illusions within 5 feet of you for what they are.</p>

        <h4>Technology</h4>

        <p>Your expertise grants you greater insight into the enhanced properties of wristpads.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p></blockquote>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Unlock a datacron</td><td>Varies</td></tr><tr><td>Disassemble a wristpad</td><td>20</td></tr></tbody></table>

        <h2>Demolitions Kit</h2>

        <p>Demolitions kits includes all of the necessary components to create, set, and disarm explosives. It contains a plastic face guard and heavy duty gloves, as well as precision cutting and gripping tools, and various common components of grenades and mines.</p>

        <h4>Lore</h4>

        <p>Your knowledge of explosives grants you insight when answering questions about the most effective explosives for a given task.</p>

        <h4>Investigation and Perception</h4>

        <p>You gain additional insight when looking for mines and charges, because you have learned a variety of common signs that betray their presence.</p>

        <h3>Amplify Explosive</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 demolitions kit check to temporarily improve one grenade or mine. To use this benefit, you must have a demolitions kit with you, and the object must be within reach. If the explosive is detonated before the end of your next short or long rest, it deals bonus damage. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Conceal an explosive</td><td>15</td></tr><tr><td>Disarm a mine</td><td>Varies</td></tr></tbody></table>

        <h2>Disguise Kit</h2>

        <p>Disguise kits includes all of the necessary components to create and apply a disguise. It includes cosmetics, hair dye, and small props that let you create disguises that change your physical appearance, in addition to a tool that lets them holographically mimic clothing. </p>

        <h4>Deception</h4>

        <p>In certain cases, a disguise can improve your ability to weave convincing lies.</p>

        <h4>Intimidation</h4>

        <p>The right disguise can make you look more fearsome, whether you want to scare someone away by posing as a plague victim or intimidate a gang of thugs by taking the appearance of a bully.</p>

        <h4>Persuasion</h4>

        <p>Folk tend to trust a person in uniform. If you disguise yourself as an authority figure, your efforts to persuade others are often more effective.</p>

        <h3>Create Disguise</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 disguise kit check to craft a disguise that mimics the appearance of a creature you spent at least 1 hour observing. To use this benefit, you must have a disguise kit with you. On a success, you can don or doff this disguise as an action. Additionally, once before your next short or long rest, you can gain a bonus to one check to pass yourself off as that creature. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Cover injuries or distinguishing marks</td><td>10</td></tr><tr><td>Spot a disguise being used by someone else</td><td>15</td></tr></tbody></table>



        <h2>Forgery Kit</h2>

        <p>A forgery kit includes all of the necessary components to craft and identify forged documents, including copying a person's seal or signature.</p>

        <h4>Deception</h4>

        <p>A well-crafted forgery, such as papers proclaiming you to be a noble or a writ that grants you safe passage, can lend credence to a lie.</p>

        <h4>Lore</h4>

        <p>A forgery kit combined with your knowledge of history improves your ability to create fake historical documents or to tell if an old document is authentic.</p>

        <h4>Investigation</h4>

        <p>When you examine objects, proficiency with a forgery kit is useful for determining how an object was made and whether it is genuine.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p>

        <h4>Quick Fake</h4>

        <p>As a part of a short rest, you can produce a forged document no more than one page in length. As a part of a long rest, you can produce a document that is up to four pages long. Your Intelligence check using a forgery kit determines the DC for someone else's Intelligence (Investigation) check to spot the fake.</p></blockquote>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Mimic handwriting</td><td>15</td></tr><tr><td>Duplicate a seal</td><td>20</td></tr></tbody></table>

