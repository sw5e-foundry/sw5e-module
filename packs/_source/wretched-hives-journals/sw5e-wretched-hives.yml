        <h2>Security Kit</h2>

        <p>A security kit include all of the necessary components to set or disarm locks and traps.</p>

        <h4>Lore</h4>

        <p>Your knowledge of traps grants you insight when answering questions about locations that are renowned for their traps.</p>

        <h4>Investigation and Perception</h4>

        <p>You gain additional insight when looking for traps, because you have learned a variety of common signs that betray their presence.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p>

        <h4>Set a Trap</h4>

        <p>Just as you can disable traps, you can also set them. As part of a short rest, you can create a trap using items you have on hand. The total of your check becomes the DC for someone else's attempt to discover or disable the trap. The trap deals damage appropriate to the materials used in crafting it (such as poison or a weapon) or damage equal to half the total of your check, whichever the DM deems appropriate.</p></blockquote>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Pick a moderate lock</td><td>15</td></tr><tr><td>Disable a trap</td><td>Varies</td></tr></tbody></table>

        <h2>Slicer's Kit</h2>

        <p>A slicer's kit includes all of the necessary components to interface with and disarm digital securities.</p>

        <h4>Lore</h4>

        <p>Your knowledge of digital securities grants you insight when answering questions about them.</p>

        <h4>Investigation</h4>

        <p>You gain additional insight when looking for digital securities when using computers and terminals.</p>

        <h4>Technology</h4>

        <p>Your knowledge of common digital security types makes it easier for you to identify them.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p></blockquote>

