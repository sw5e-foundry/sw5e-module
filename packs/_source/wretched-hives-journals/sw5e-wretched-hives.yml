        <h2>Archaeologist Kit</h2>

        <p>This kit contains instruments used to carefully collect crystals, gems, relics, and other heirlooms. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to classify, collect, and polish gems and relics.</p>

        <h4>Survival</h4>

        <p>When searching in the wild, you can more easily search for places that might house relics.</p>

        <h4>Investigation</h4>

        <p>You can easily spot the location of potential gemstones or other precious relics.</p>

        <h4>Persuasion</h4>

        <p>When bartering while precious stones or relics are involved, you can more easily negotiate a fair price.</p>

        <h3>Crystal Enhancement</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 archaelogist kit check to temporarily improve a lightweapon or focus generator. To use this benefit, you must have archaelogist kit with you, and the object must be within reach. On a success, once before your next short or long rest, a character wielding this lightweapon can gain a bonus to one weapon damage roll, or focus generator can gain a bonus to one force damage or healing roll. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Appraise a gemstone or relic</td><td>20</td></tr></tbody></table>

        <h2>Armormech's Implements</h2>

        <p>Armormech's implements include all of the necessary components to allow you to work raw materials to craft or repair damage to armor and shields.</p>

        <h4>Lore</h4>

        <p>Your expertise lends you additional insight when examining armor and shields.</p>

        <h4>Investigation</h4>

        <p>You can spot clues and make deductions that others might overlook when an investigation involves armor and shields.</p>

        <h4>Stealth</h4>

        <p>Your greater understanding of armor you�or your allies�wear allows for more cautious movement.</p>

        <h3>Boost Armor</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 armormech's implements check to temporarily improve a suit of armor or a shield. To use this benefit, you must have armormech's implements with you, and the object must be within reach. On a success, once before your next short or long rest, a character wearing this armor or wielding this shield can gain a bonus to AC against one attack. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Repair a suit of armor or a shield</td><td>15</td></tr><tr><td>Sunder a suit of armor or a shield</td><td>10</td></tr></tbody></table>





        <h2>Armstech's Implements</h2>

        <p>Armstech's implements include all of the necessary components to allow you to work raw materials to craft or repair damage to blasters and vibroweapons.</p>

        <h4>Lore</h4>

        <p>Your expertise lends you additional insight when examining blasters and vibroweapons.</p>

        <h4>Investigation</h4>

        <p>You can spot clues and make deductions that others might overlook when an investigation involves blasters and vibroweapons.</p>

        <h4>Technology</h4>

        <p>You can more readily identify an enhanced blaster or vibroweapons properties.</p>

        <h3>Amplify Weapon</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 arsmtech's implements check to temporarily improve a blaster or vibroweapon. To use this benefit, you must have arsmtech's implements with you, and the object must be within reach. On a success, once before your next short or long rest, a character wielding this weapon can gain a bonus to one weapon attack. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Repair a blaster or vibroweapon</td><td>15</td></tr><tr><td>Sunder a blaster or vibroweapon</td><td>10</td></tr></tbody></table>

        <h2>Artificer's Implements</h2>

        <p>Artificer's implements include all of the necessary components to allow you to craft and repair focus generators, holocrons, and lightweapons.</p>

        <h4>Insight</h4>

        <p>You have greater intuition when dealing with spirits trapped in holocrons.</p>

        <h4>Lore</h4>

        <p>Your expertise lends you additional insight when determining the origin and age of lightweapons.</p>

        <h4>Technology</h4>

        <p>Your knowledge grants you greater understanding when reverse engineering lightweapon or focus generator item modifications.</p>



        <h3>Lens Improvement</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 artificer's implements check to temporarily improve a lightweapon or focus generator. To use this benefit, you must have artificer's implements with you, and the object must be within reach. On a success, once before your next short or long rest, a character wielding this lightweapon can gain a bonus to one weapon attack roll, or focus generator can gain a bonus to one force attack roll. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Disassemble a lightweapon</td><td>20</td></tr><tr><td>Repair a lightweapon</td><td>15</td></tr><tr><td>Sunder a lightweapon</td><td>10</td></tr></tbody></table>

        <h2>Artillerist's Kit</h2>

        <p>Artillerist's kits contains all the necessary equipment to create, repair, and modify turrets. </p>

        <h4>Lore</h4>

        <p>Your proficiency allows you to more readily discern the history of any turrets you encounter.</p>

        <h4>Investigation and Perception</h4>

        <p>Your experience lets you more readily identify aftermarket modifications in turrets.</p>

        <h3>Turret Improvements</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 artillerist's kit check to temporarily improve a turret. To use this benefit, you must have an artillerist's kit with you, and the object must be within reach. On a success, once before your next short or long rest, this turret can gain a bonus to one attack roll or a bonus to one save DC. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Disable a turret</td><td>20</td></tr><tr><td>Repair a turret</td><td>15</td></tr></tbody></table>





        <h2>Artist's Implements</h2>

        <p>Artist's implements include all of the necessary components to create and store art.</p>

        <h4>Lore</h4>

        <p>Your expertise aids you in uncovering lore of any sort that is attached to a work of art, such as the mystical properties of a painting or the origins of a strange mural found in a dungeon.</p>

        <h4>Investigation and Perception</h4>

        <p>When you inspect a painting or a similar work of visual art, your knowledge of the practices behind creating it can grant you additional insight.</p>

        <h3>Commemorate Event</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 artist's implements check to create a depiction of an event, person, or other noteworthy object. To use this benefit, you must have artist's implements with you. On a success, you create a rendition that perfectly captures the event in question, provided the event happened no more than one day ago. If you have expertise in the tool, you can instead capture an event that happened no more than one week ago.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Paint an accurate portrait</td><td>10</td></tr><tr><td>Create a painting with a hidden message</td><td>20</td></tr></tbody></table>

        <h2>Astrotech's Implements</h2>

        <p>Astrotech's implements include all of the necessary components to create droid customizations, assemble droids, and modify assembled droids.</p>

        <h4>Investigation</h4>

        <p>Your discerning eye, coupled with your experience with your tools, lets you identify droids that have aftermarket part customizations installed.</p>

        <h4>Lore</h4>

        <p>Your expertise lets you determine the product line, model, and class of a droid.</p>

        <h4>Technology</h4>

        <p>Your knowledge lets you determine whether a droid has been modified beyond its model specifications, and to what extent.</p>

        <h3>Repair Droid</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 astrotech's implements check to repair a droid. To use this benefit, you must have a astrotech's implements with you, and droid must be within reach. On a success, for each Hit Die the droid spends to regain hit points, it regains bonus hit points. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>



        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Identify a droid's designation</td><td>10</td></tr><tr><td>Determine if a droid has any modifications</td><td>15</td></tr></tbody></table>

        <h2>Audiotech's Implements</h2>

        <p>Audiotech's implements contain all of the tools necessary to build, repair, and tune instruments.</p>

        <h4>Performance</h4>

        <p>Fundamental knowledge of instruments enhances your ability to capture the attention of others.</p>

        <h4>Investigation</h4>

        <p>Your experience makes it easy for you to identify an instrument, including its age and manufacturer, if the manufacturer is widely known.</p>

        <h4>Lore</h4>

        <p>You can accurately appraise the value of an instrument.</p>

        <h3>Tune Instrument</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 audiotech's implements check to tune or otherwise care for an instrument. To use this benefit, you must have audiotech's implements with you, and the instrument must be within reach. On a success, once before your next short or long rest, you can gain a bonus to one check you make with the instrument. This bonus is a die, with a maximum value equal to your proficiency bonus. If you have expertise in the tool, this die's maximum is instead equal to twice your proficiency bonus.</p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Appraise an instrument</td><td>20</td></tr><tr><td>Tune an instrument</td><td>15</td></tr></tbody></table>





        <h2>Bioanalysis Kit</h2>

        <p>A bioanalysis kit includes all of the necessary components to harvest and store plants, as well as identify their uses.</p>

        <h4>Medicine</h4>

        <p>Your mastery of bioanalysis improves your ability to treat illnesses and wounds by augmenting your methods of care with medicinal plants.</p>

        <h4>Nature and Survival</h4>

        <p>When you travel in the wild, your skill in bioanalysis makes it easier to identify plants and spot sources of food that others might overlook. </p>

        <h3>Herbal Remedies</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 bioanalysis kit check to help an ally recover. To use this benefit, you must have a bioanalysis kit with you, and access to local flora. On a success, you can remove one poison or disease from a friendly creature within reach. </p>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Find plants</td><td>15</td></tr><tr><td>Identify plants and derivatives</td><td>20</td></tr></tbody></table>

        <h2>Biochemist's Kit</h2>

        <p>A biochemist's kit includes all of the necessary components to create and house standard adrenals, medpacs, and stimpacs.</p>

        <h4>Investigation</h4>

        <p>Proficiency with biochemist's kit allows you to unlock more information on Investigation checks involving adrenals, medpacs, and stimpacs.</p>

        <h4>Perception</h4>

        <p>When you inspect an area for clues, proficiency with biochemist's kit grants additional insight into any chemicals or other substances that might have been used in the area.</p>

        <h4>Skill 3</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h3>Medpac Improvement</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 biochemist's kit check to temporarily improve the potency of one medpac. To use this benefit, you must have a biochemist's kit with you, and the medpac must be within reach. If the medpac is consumed before the end of your next short or long rest, when a creature uses this medpac, they take the maximum instead of rolling.</p>



