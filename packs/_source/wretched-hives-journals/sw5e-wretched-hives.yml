ry</font></td></tr><tr><td><font style=\"color:#dd6b20\">Shocking Oscillator Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Sonorous Oscillator Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Throwing Weapon Guard (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Brutal Oscillator (Lethal)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Compensation Oscillator (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Defensive Guard (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Dire Ascendancy Guard</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Keen Oscillator (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Neuralizing Oscillator Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Ostrine Edge (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Piercing Oscillator (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Serrated Edge Mk IV</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Shocking Oscillator Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Sonorous Oscillator Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Throwing Weapon Guard (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Versatile Frame (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Vicious Ascendancy Guard</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Brutal Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the brutal 1 property. If it already has the brutal property, its brutal number increases by 1, to a maximum of 3.</p>\n\n<h4>Brutal Oscillator (Devastating)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the brutal 3 property. If it already has the brutal property, its brutal number increases to 3.</p>\n\n<h4>Brutal Oscillator (Deadly)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the brutal 2 property. If it already has the brutal property, its brutal number increases by 2, to a maximum of 3.</p>\n\n<h4>Celerity Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Once per turn, when you deal damage with this weapon, your walking speed increases by 10 feet until the start of your next turn, and the damaged creature can't make opportunity attacks against you for the rest of your turn.</p>\n\n<h4>Collapsible Frame</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the hidden property.</p>\n\n<h4>Compensation Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by one step (from 21 to 19, 19 to 17, 17 to 15, 15 to 13, or 13 to 11). If the dexterity number is 11, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Compensation Oscillator (Champion)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon loses the dexterity property.</p>\n\n<h4>Compensation Oscillator (Fine)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by two steps (from 21 to 17, 19 to 15, 17 to 13, or 15 to 11). If the dexterity number is 13 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Compensation Oscillator (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by five steps (from 21 to 11). If the dexterity number is 19 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Compensation Oscillator (Improved)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by three steps (from 21 to 15, 19 to 13, or 17 to 11). If the dexterity number is 15 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Compensation Oscillator (Superior)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon's dexterity number is reduced by four steps (from 21 to 13 or 19 to 11). If the dexterity number is 17 or lower, this modification removes the dexterity property from it entirely.</p>\n\n<h4>Contoured Grip (Basic)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You gain a +1 bonus to attack rolls and a -1 penalty to damage rolls made with this weapon.</p>\n\n<h4>Contoured Grip (Fine)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You gain a +1 bonus to attack rolls made with this weapon.</p>\n\n\n\n<h4>Contoured Grip (Improved)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You gain a +2 bonus to attack rolls made with this weapon.</p>\n\n<h4>Contoured Grip (Superior)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You gain a +3 bonus to attack rolls made with this weapon.</p>\n\n<h4>Defensive Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the defensive 1 property. If it already has the defensive property, its defensive number increases by 1, to a maximum of 3.</p>\n\n<h4>Defensive Guard (Champion)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the defensive 3 property. If it already has the defensive property, its defensive number increases to 3.</p>\n\n<h4>Defensive Guard (Superior)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the defensive 2 property. If it already has the defensive property, its defensive number increases by 2, to a maximum of 3.</p>\n\n<h4>Dire Ascendancy Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the dire 3 property. If it already has the dire property, its dire number increases to 3.</p>\n\n<h4>Dire Fighting Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the dire 1 property. If it already has the dire property, its dire number increases by 1, to a maximum of 3.</p>\n\n<h4>Dire Mastery Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the dire 2 property. If it already has the dire property, its dire number increases by 2, to a maximum of 3.</p>\n\n<h4>Disarming Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the disarming property.</p>\n\n<h4>Disguised Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the disguised property.</p>\n\n<h4>Double Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks two-handed or versatile property</em><br>\n\n<p>This weapon gains the double property, with a double damage value equal to its normal damage.</p>\n\n<h4>Disruption Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the disruptive property.</p>\n\n<h4>Electrifying Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>When you hit with the weapon, you can create an electronic burst. Each creature in a 15-foot cone centered on the creature you hit must make a DC 15 Dexterity saving throw, taking 1d8 lightning damage on a failed save or half as much on a successful one.</p>\n\n<p>Once you've used this feature, you must complete a long rest before you can use it again.</p>\n\n<h4>Fadecasting Guard (Adept)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Guard (Apprentice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Guard (Journeyman)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Guard (Novice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Strength or Constitution saving throw and a -1 penalty to the force save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Fadecasting Oscillator Mk I</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Strength or Constitution saving throw and a -1 penalty to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Fadecasting Oscillator Mk II</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Oscillator Mk III</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Oscillator Mk IV</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fiber-Alloy Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Two-handed property</em><br>\n\n<p>This weapon loses the two-handed property.</p>\n\n\n\n<h4>Finesse Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks dexterity, two-handed, or versatile property</em><br>\n\n<p>This weapon gains the finesse property.</p>\n\n<h4>Flashlight Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You affix a targeted light to this weapon. As a bonus action, you can toggle the light on or off. While on, this weapon sheds bright light in a 60-foot cone.</p>\n\n<h4>Guard Amplifier (Adept)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to melee force attacks.</p>\n\n<h4>Guard Amplifier (Apprentice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to melee force attacks.</p>\n\n<h4>Guard Amplifier (Journeyman)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to melee force attacks.</p>\n\n<h4>Guard Amplifier (Novice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to melee force attacks and a -1 penalty to ranged force attacks.</p>\n\n<h4>Guard Rangefinder (Adept)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to ranged force attacks.</p>\n\n<h4>Guard Rangefinder (Apprentice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to ranged force attacks.</p>\n\n<h4>Guard Rangefinder (Journeyman)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to ranged force attacks.</p>\n\n<h4>Guard Rangefinder (Novice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to ranged force attacks and a -1 penalty to melee force attacks.</p>\n\n<h4>Harpoon Reel Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You install a secondary firemode that launches a harpoon attached to a tightly coiled cord. With this harpoon, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d6 kinetic damage. This attack can target a surface, object, or creature.</p>\n\n<p>A creature struck by this attack is impaled by the harpoon. As an action, a creature can attempt to remove the harpoon. Removing the harpoon requires a DC 15 Strength check. While the harpoon is stuck in the target, you are connected to the target by a 60 foot cable.</p>\n\n<p>While connected in this manner, you can use your bonus action to activate the reel, pulling yourself to the location if the target is your size or larger. A creature or object smaller than you is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>\n\n<p>Once you've used this feature, you can't use it again until you recover and reinsert the harpoon as an action.</p>\n\n<h4>Heavy Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the heavy property.</p>\n\n<h4>Keen Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the keen 1 property. If it already has the keen property, its keen number increases by 1, to a maximum of 3.</p>\n\n<h4>Keen Oscillator (Deadly)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the keen 2 property. If it already has the keen property, its keen number increases by 2, to a maximum of 3.</p>\n\n<h4>Keen Oscillator (Devastating)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the keen 3 property. If it already has the keen property, its keen number increases to 3.</p>\n\n<h4>Light Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the light property.</p>\n\n<h4>Monomolecular Oscillator Mk I</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon ignores resistance to kinetic damage.</p>\n\n<h4>Monomolecular Oscillator Mk II</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon ignores resistance to kinetic damage, and treats immunity as resistance.</p>\n\n<h4>Nagai Edge (Basic)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>When you have advantage on an attack roll you make with this weapon, get the same result on both dice rolls, and hit, you deal one additional weapon die worth of damage.</p>\n\n\n\n<h4>Nagai Edge (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>When you have advantage on an attack roll you make with this weapon, get the same result on both dice rolls, and hit, you deal three additional weapon dice worth of damage.</p>\n\n<h4>Nagai Edge (Improved)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>When you have advantage on an attack roll you make with this weapon, get the same result on both dice rolls, and hit, you deal two additional weapon dice worth of damage.</p>\n\n<h4>Neuralizing Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <f