      content: "<h1>Appendix A: Enhanced Items</h1>\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#4a5568\">Blueprint (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Datacron Mk I</font></td><td><font style=\"color:#4a5568\">Standard</font></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Holocron (Novice)</font></td><td><font style=\"color:#4a5568\">Standard</font></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Tool (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td><td></td></tr><tr><td><font style=\"color:green\">Atmospheric Decanting Vessel</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Blueprint (Premium)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:green\">Datacron Mk II</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:green\">Holocron (Apprentice)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:green\">Tool (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Blueprint (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:blue\">Datacron Mk III</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:blue\">Holocron (Journeyman)</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:blue\">Tool (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Blueprint (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:purple\">Datacron Mk IV</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:purple\">Holocron (Adept)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:purple\">Tool (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Blueprint (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Datacron Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Holocron (Master)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Tool (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:red\">Blueprint (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr><tr><td><font style=\"color:red\">Datacron Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr><tr><td><font style=\"color:red\">Holocron (Ancient)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr><tr><td><font style=\"color:red\">Tool (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr></tbody></table>\n\n<h4>Atmospheric Decanting Vessel</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This metal jug appears to be able to hold a gallon of liquid and weighs 12 pounds whether full or empty.</p>\n\n<p>You can use an action and name one liquid from the table below to cause the jug to produce the chosen liquid. Afterward, you can open the jug as an action and pour that liquid out, up to 2 gallons per minute. The maximum amount of liquid the jug can produce depends on the liquid you named.</p>\n\n<p>Once the jug starts producing a liquid, it can't produce a different one, or more of one that has reached its maximum, until the next dawn.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Liquid</th><th>Quantity</th></tr></thead><tbody><tr><td>Acid</td><td>8 ounces</td></tr><tr><td>Alcohol, strong</td><td>1 gallon</td></tr><tr><td>Alcohol, weak</td><td>4 gallons</td></tr><tr><td>Basic poison</td><td>1/2 ounce</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Liquid</th><th>Quantity</th></tr></thead><tbody><tr><td>Condiment</td><td>2 gallons</td></tr><tr><td>Lubricant</td><td>1 quart</td></tr><tr><td>Water, potable</td><td>8 gallons</td></tr><tr><td>Water, stagnant</td><td>12 gallons</td></tr></tbody></table></div>\n\n<p><em>Most liquids one might desire curiously only involve a handful of elements. This device collects a reservoir of them to recreate a selection of such liquids on demand.</em></p>\n\n<h4>Blueprint (Advanced)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This blueprint contains information regarding the raw and rare materials, tools, and steps required to craft an item of advanced rarity. Over the course of 1 hour, which can be done during a short rest, a character can attempt to learn the blueprint. If they do so, they must make a DC 22 Intelligence check with the appropriate tools. On a success, the blueprint for the item is learned. On a failure, the blueprint is not learned, and the character must wait 24 hours before they can try again.</p>\n\n<p><em>Blueprints contain the secrets of how to craft items of a more complex nature.</em></p>\n\n<h4>Blueprint (Artifact)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This blueprint contains information regarding the raw and rare materials, tools, and steps required to craft an item of artifact rarity. Over the course of 1 hour, which can be done during a short rest, a character can attempt to learn the blueprint. If they do so, they must make a DC 30 Intelligence check with the appropriate tools. On a success, the blueprint for the item is learned. On a failure, the blueprint is not learned, and the character must wait 24 hours before they can try again.</p>\n\n<p><em>Blueprints contain the secrets of how to craft items of a more complex nature.</em></p>\n\n<h4>Blueprint (Legendary)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This blueprint contains information regarding the raw and rare materials, tools, and steps required to craft an item of legendary rarity. Over the course of 1 hour, which can be done during a short rest, a character can attempt to learn the blueprint. If they do so, they must make a DC 26 Intelligence check with the appropriate tools. On a success, the blueprint for the item is learned. On a failure, the blueprint is not learned, and the character must wait 24 hours before they can try again.</p>\n\n<p><em>Blueprints contain the secrets of how to craft items of a more complex nature.</em></p>\n\n<h4>Blueprint (Premium)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This blueprint contains information regarding the raw and rare materials, tools, and steps required to craft an item of premium rarity. Over the course of 1 hour, which can be done during a short rest, a character can attempt to learn the blueprint. If they do so, they must make a DC 14 Intelligence check with the appropriate tools. On a success, the blueprint for the item is learned. On a failure, the blueprint is not learned, and the character must wait 24 hours before they can try again.</p>\n\n<p><em>Blueprints contain the secrets of how to craft items of a more complex nature.</em></p>\n\n\n\n<h4>Blueprint (Prototype)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This blueprint contains information regarding the raw and rare materials, tools, and steps required to craft an item of prototype rarity. Over the course of 1 hour, which can be done during a short rest, a character can attempt to learn the blueprint. If they do so, they must make a DC 18 Intelligence check with the appropriate tools. On a success, the blueprint for the item is learned. On a failure, the blueprint is not learned, and the character must wait 24 hours before they can try again.</p>\n\n<p><em>Blueprints contain the secrets of how to craft items of a more complex nature.</em></p>\n\n<h4>Blueprint (Standard)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This blueprint contains information regarding the raw and rare materials, tools, and steps required to craft an item of standard rarity. Over the course of 1 hour, which can be done during a short rest, a character can attempt to learn the blueprint. If they do so, they must make a DC 10 Intelligence check with the appropriate tools. On a success, the blueprint for the item is learned. On a failure, the blueprint is not learned, and the character must wait 24 hours before they can try again.</p>\n\n<p><em>Blueprints contain the secrets of how to craft items of a more complex nature.</em></p>\n\n<h4>Datacron Mk I</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This datacron contains a single at-will tech power. After tinkering with the datacron for at least 2 hours, a techcaster with a Max Power Level of 1st or higher can make a DC 10 techcasting ability check with proficiency. On a success, they learn the contained tech power, which does not count against their tech powers known. On a failure, the power is not learned and the techcaster can't try again for 24 hours.</p>\n\n<p><em>Datacrons are encrypted storage devices that contain an interactive projection, and are used to store high-value, sensitive information.</em></p>\n\n<h4>Datacron Mk II</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This datacron contains a single 1st-level tech power. After tinkering with the datacron for at least 4 hours, a techcaster with a Max Power Level of 1st or higher can make a DC 14 techcasting ability check with proficiency. On a success, they learn the contained tech power, which does not count against their tech powers known. On a failure, the power is not learned and the techcaster can't try again for 24 hours.</p>\n\n<p><em>Datacrons are encrypted storage devices that contain an interactive projection, and are used to store high-value, sensitive information.</em></p>\n\n<h4>Datacron Mk III</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This datacron contains a single 3rd-level tech power, or multiple powers of 1st-2nd level with a combined level no greater than 3. After tinkering with the datacron for at least 8 hours, a techcaster with a Max Power Level of 3rd or higher can make a DC 18 techcasting ability check with proficiency. On a success, they learn the contained tech power(s), which does not count against their tech powers known. On a failure, the power is not learned and the techcaster can't try again for 24 hours.</p>\n\n<p><em>Datacrons are encrypted storage devices that contain an interactive projection, and are used to store high-value, sensitive information.</em></p>\n\n<h4>Datacron Mk IV</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This datacron contains a single 5th-level tech power, or multiple powers of 1st-4th level with a combined level no greater than 5. After tinkering with the datacron for at least 16 hours, a techcaster with a Max Power Level of 5th or higher can make a DC 22 techcasting ability check with proficiency. On a success, they learn the contained tech power(s), which does not count against their tech powers known. On a failure, the power is not learned and the techcaster can't try again for 24 hours.</p>\n\n<p><em>Datacrons are encrypted storage devices that contain an interactive projection, and are used to store high-value, sensitive information.</em></p>\n\n<h4>Datacron Mk V</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This datacron contains a single 7th-level tech power, or multiple powers of 1st-6th level with a combined level no greater than 7. After tinkering with the datacron for at least 40 hours, a techcaster with a Max Power Level of 7th or higher can make a DC 26 techcasting ability check with proficiency. On a success, they learn the contained tech power(s), which does not count against their tech powers known. On a failure, the power is not learned and the techcaster can't try again for 24 hours.</p>\n\n<p><em>Datacrons are encrypted storage devices that contain an interactive projection, and are used to store high-value, sensitive information.</em></p>\n\n<h4>Datacron Mk VI</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This datacron contains a single 9th-level tech power, or multiple powers of 1st-8th level with a combined level no greater than 9. After tinkering with the datacron for at least 80 hours, a techcaster with a Max Power Level of 9th or higher can make a DC 30 techcasting ability check with proficiency. On a success, they learn the contained tech power(s), which does not count against their tech powers known. On a failure, the power is not learned and the techcaster can't try again for 24 hours.</p>\n\n<p><em>Datacrons are encrypted storage devices that contain an interactive projection, and are used to store high-value, sensitive information.</em></p>\n\n\n\n<h4>Holocron (Adept)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This holocron contains a single 5th-level force power, or multiple powers of 1st-4th level with a combined level no greater than 5. After meditating with the holocron for at least 16 hours, a forcecaster with a Max Power Level of 5th or higher can make a DC 22 forcecasting ability check with proficiency based on the alignment of the power(s) stored within. On a success, they learn the contained force power(s), which does not count against their force powers known and can not be unlearned except through use of a <em>remove curse</em> power. On a failure, the power is not learned and the forcecaster can't try again for 24 hours.</p>\n\n<p><em>Holocrons are information-storage devices used by Force-wielders that contain ancient lessons or valuable information in holographic form.</em></p>\n\n<h4>Holocron (Ancient)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This holocron contains a single 9th-level force power, or multiple powers of 1st-8th level with a combined level no greater than 9. After meditating with the holocron for at least 80 hours, a forcecaster with a Max Power Level of 9th or higher can make a DC 30 forcecasting ability check with proficiency based on the alignment of the power(s) stored within. On a success, they learn the contained force power(s), which does not count against their force powers known and can not be unlearned except through use of a <em>remove curse</em> power. On a failure, the power is not learned and the forcecaster can't try again for 24 hours.</p>\n\n<p><em>Holocrons are information-storage devices used by Force-wielders that contain ancient lessons or valuable information in holographic form.</em></p>\n\n<h4>Holocron (Apprentice)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This holocron contains a single 1st-level force power. After meditating with the holocron for at least 4 hours, a forcecaster with a Max Power Level of 1st or higher can make a DC 14 forcecasting ability check with proficiency based on the alignment of the power stored within. On a success, they learn the contained force power, which does not count against their force powers known and can not be unlearned except through use of a <em>remove curse</em> power. On a failure, the power is not learned and the forcecaster can't try again for 24 hours.</p>\n\n<p><em>Holocrons are information-storage devices used by Force-wielders that contain ancient lessons or valuable information in holographic form.</em></p>\n\n<h4>Holocron (Journeyman)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This holocron contains a single 3rd-level force power, or multiple powers of 1st-2nd level with a combined level no greater than 3. After meditating with the holocron for at least 8 hours, a forcecaster with a Max Power Level of 3rd or higher can make a DC 18 forcecasting ability check with proficiency based on the alignment of the power(s) stored within. On a success, they learn the contained force power(s), which does not count against their force powers known and can not be unlearned except through use of a <em>remove curse</em> power. On a failure, the power is not learned and the forcecaster can't try again for 24 hours.</p>\n\n<p><em>Holocrons are information-storage devices used by Force-wielders that contain ancient lessons or valuable information in holographic form.</em></p>\n\n<h4>Holocron (Master)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This holocron contains a single 7th-level force power, or multiple powers of 1st-6th level with a combined level no greater than 7. After meditating with the holocron for at least 40 hours, a forcecaster with a Max Power Level of 7th or higher can make a DC 26 forcecasting ability check with proficiency based on the alignment of the power(s) stored within. On a success, they learn the contained force power(s), which does not count against their force powers known and can not be unlearned except through use of a <em>remove curse</em> power. On a failure, the power is not learned and the forcecaster can't try again for 24 hours.</p>\n\n<p><em>Holocrons are information-storage devices used by Force-wielders that contain ancient lessons or valuable information in holographic form.</em></p>\n\n<h4>Holocron (Novice)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This holocron contains a single at-will force power. After meditating with the holocron for at least 2 hours, a forcecaster with a Max Power Level of 1st or higher can make a DC 10 forcecasting ability check with proficiency based on the alignment of the power stored within. On a success, they learn the contained force power, which does not count against their force powers known and can not be unlearned except through use of a <em>remove curse</em> power. On a failure, the power is not learned and the forcecaster can't try again for 24 hours.</p>\n\n<p><em>Holocrons are information-storage devices used by Force-wielders that contain ancient lessons or valuable information in holographic form.</em></p>\n\n\n\n<h4>Tool (Basic)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your level of proficiency in these tools increases by one step (to trained, from trained to proficient, from proficient to expertise, from expertise to mastery, from mastery to high mastery, or from high mastery to grand mastery).</p>\n\n<h4>Tool (Champion)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>You have grand mastery in these tools.</p>\n\n<h4>Tool (Exceptional)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>Your level of proficiency in these tools increases by five steps (to mastery, from trained to high mastery, or from proficient to grand mastery).</p>\n\n<h4>Tool (Fine)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your level of proficiency in these tools increases by two steps (to proficient, from trained to expertise, from proficient to mastery, from expertise to high mastery, or from mastery to grand mastery).</p>\n\n<h4>Tool (Improved)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your level of proficiency in these tools increases by three steps (to expertise, from trained to mastery, from proficient to high mastery, or from expertise to grand mastery).</p>\n\n<h4>Tool (Superior)</h4>\n\n<em><strong>Adventuring gear</strong>, <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your level of proficiency in these tools increases by four steps (to expertise, from trained to mastery, from proficient to high mastery, or from expertise to grand mastery).</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Back)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Back</em></td><td></td></tr><tr><td><font style=\"color:green\">Jetpack (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Rocketpack (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Smugglepack (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Jetpack (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Rocketpack (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Smugglepack (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Jetpack (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Rocketpack (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Smugglepack (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Jetpack (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Rocketpack (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Smugglepack (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Jetpack (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Rocketpack (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Smugglepack (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Jetpack (Champion)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Jetpacks are personal aerial transportation devices that allow the operator to fly into and through the air with great mobility. Activating or deactivating the jetpack requires a bonus action and, while active, you have a flying speed of 80 feet. The jetpack last for 1 minute per power cell (to a maximum of 20 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<h4>Jetpack (Exceptional)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>Jetpacks are personal aerial transportation devices that allow the operator to fly into and through the air with great mobility. Activating or deactivating the jetpack requires a bonus action and, while active, you have a flying speed of 70 feet. The jetpack last for 1 minute per power cell (to a maximum of 18 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<h4>Jetpack (Fine)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Jetpacks are personal aerial transportation devices that allow the operator to fly into and through the air with great mobility. Activating or deactivating the jetpack requires a bonus action and, while active, you have a flying speed of 40 feet. The jetpack last for 1 minute per power cell (to a maximum of 12 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<h4>Jetpack (Improved)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Jetpacks are personal aerial transportation devices that allow the operator to fly into and through the air with great mobility. Activating or deactivating the jetpack requires a bonus action and, while active, you have a flying speed of 50 feet. The jetpack last for 1 minute per power cell (to a maximum of 14 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<h4>Jetpack (Superior)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Jetpacks are personal aerial transportation devices that allow the operator to fly into and through the air with great mobility. Activating or deactivating the jetpack requires a bonus action and, while active, you have a flying speed of 60 feet. The jetpack last for 1 minute per power cell (to a maximum of 16 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<h4>Rocketpack (Champion)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Rocketpacks combine the aerial transportation of a jetpack with the firepower of a rocket launcher. Activating or deactivating the rocketpack's flight capabilities requires a bonus action and, while active, you have a flying speed of 50 feet. The jetpack last for 1 minute per power cell (to a maximum of 10 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<p>Additionally, your rocketpack comes with an enhanced integrated rocket launcher with the Ammunition (range 100/400) and reload 1 properties. Rather than traditional power cells, this rocket launcher fires specialized projectiles in the form of rockets. Whenever you would make a ranged weapon attack, you can instead fire this rocket launcher. When firing a rocket at long range, creatures within the radius of the rocket's explosion have advantage on the saving throw. Reloading this rocket launcher takes 1 minute. You have a +3 bonus to attack rolls and deal an additional 1d10 damage with this enhanced rocket launcher.</p>\n\n\n\n<h4>Rocketpack (Exceptional)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>Rocketpacks combine the aerial transportation of a jetpack with the firepower of a rocket launcher. Activating or deactivating the rocketpack's flight capabilities requires a bonus action and, while active, you have a flying speed of 45 feet. The jetpack last for 1 minute per power cell (to a maximum of 9 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<p>Additionally, your rocketpack comes with an enhanced integrated rocket launcher with the Ammunition (range 100/400) and reload 1 properties. Rather than traditional power cells, this rocket launcher fires specialized projectiles in the form of rockets. Whenever you would make a ranged weapon attack, you can instead fire this rocket launcher. When firing a rocket at long range, creatures within the radius of the rocket's explosion have advantage on the saving throw. Reloading this rocket launcher takes 1 minute. You have a +3 bonus to attack rolls and deal an additional 1d8 damage with this enhanced rocket launcher.</p>\n\n<h4>Rocketpack (Fine)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Rocketpacks combine the aerial transportation of a jetpack with the firepower of a rocket launcher. Activating or deactivating the rocketpack's flight capabilities requires a bonus action and, while active, you have a flying speed of 30 feet. The jetpack last for 1 minute per power cell (to a maximum of 6 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<p>Additionally, your rocketpack comes with an enhanced integrated rocket launcher with the Ammunition (range 100/400) and reload 1 properties. Rather than traditional power cells, this rocket launcher fires specialized projectiles in the form of rockets. Whenever you would make a ranged weapon attack, you can instead fire this rocket launcher. When firing a rocket at long range, creatures within the radius of the rocket's explosion have advantage on the saving throw. Reloading this rocket launcher takes 1 minute. You have a +1 bonus to attack and damage rolls made with this enhanced rocket launcher.</p>\n\n<h4>Rocketpack (Improved)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Rocketpacks combine the aerial transportation of a jetpack with the firepower of a rocket launcher. Activating or deactivating the rocketpack's flight capabilities requires a bonus action and, while active, you have a flying speed of 35 feet. The jetpack last for 1 minute per power cell (to a maximum of 7 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<p>Additionally, your rocketpack comes with an enhanced integrated rocket launcher with the Ammunition (range 100/400) and reload 1 properties. Rather than traditional power cells, this rocket launcher fires specialized projectiles in the form of rockets. Whenever you would make a ranged weapon attack, you can instead fire this rocket launcher. When firing a rocket at long range, creatures within the radius of the rocket's explosion have advantage on the saving throw. Reloading this rocket launcher takes 1 minute. You have a +2 bonus to attack and damage rolls made with this enhanced rocket launcher.</p>\n\n<h4>Rocketpack (Superior)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Rocketpacks combine the aerial transportation of a jetpack with the firepower of a rocket launcher. Activating or deactivating the rocketpack's flight capabilities requires a bonus action and, while active, you have a flying speed of 40 feet. The jetpack last for 1 minute per power cell (to a maximum of 8 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<p>Additionally, your rocketpack comes with an enhanced integrated rocket launcher with the Ammunition (range 100/400) and reload 1 properties. Rather than traditional power cells, this rocket launcher fires specialized projectiles in the form of rockets. Whenever you would make a ranged weapon attack, you can instead fire this rocket launcher. When firing a rocket at long range, creatures within the radius of the rocket's explosion have advantage on the saving throw. Reloading this rocket launcher takes 1 minute. You have a +3 bonus to attack and damage rolls made with this enhanced rocket launcher.</p>\n\n<h4>Smugglepack (Champion)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This backpack comes with a main compartment that stores 10 lb., not exceeding 1/2 cubic foot. Additionally, it has a hidden storage compartment that stores 10 lb., not exceeding 3/8 cubic foot. Finding the hidden compartment requires a DC 30 Investigation check.</p>\n\n<h4>Smugglepack (Exceptional)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>This backpack comes with a main compartment that stores 11 lb., not exceeding 3/8 cubic foot. Additionally, it has a hidden storage compartment that stores 9 lb., not exceeding 3/8 cubic foot. Finding the hidden compartment requires a DC 27 Investigation check.</p>\n\n\n\n<h4>Smugglepack (Fine)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This backpack comes with a main compartment that stores 14 lb., not exceeding 1/2 cubic foot. Additionally, it has a hidden storage compartment that stores 6 lb., not exceeding 1/4 cubic foot. Finding the hidden compartment requires a DC 18 Investigation check.</p>\n\n<h4>Smugglepack (Improved)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This backpack comes with a main compartment that stores 13 lb., not exceeding 1/2 cubic foot. Additionally, it has a hidden storage compartment that stores 7 lb., not exceeding 1/4 cubic foot. Finding the hidden compartment requires a DC 21 Investigation check.</p>\n\n<h4>Smugglepack (Superior)</h4>\n\n<em><strong>Adventuring gear</strong> (back), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This backpack comes with a main compartment that stores 12 lb., not exceeding 3/8 cubic foot. Additionally, it has a hidden storage compartment that stores 8 lb., not exceeding 3/8 cubic foot. Finding the hidden compartment requires a DC 24 Investigation check.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Body)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Body</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Tunic Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Clothes, Clandestine (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Jedi Padawan's Robe</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Sith Acolyte's Robe</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Tunic Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Clothes, Clandestine (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Jedi Knight's Robe</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Sith Warrior's Robe</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Tunic Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Clothes, Clandestine (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Jedi Master's Robe</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Sith Lord's Robe</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Tunic Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Clothes, Clandestine (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Tunic Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Clothes, Clandestine (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Tunic Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Clothes, Clandestine (Champion)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>These clothes come with nine hidden pockets, each of which can store up to 1 lb. Finding these hidden pockets requires a DC 30 Investigation check.</p>\n\n<h4>Clothes, Clandestine (Exceptional)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>These clothes come with eight hidden pockets, each of which can store up to 1 lb. Finding these hidden pockets requires a DC 27 Investigation check.</p>\n\n<h4>Clothes, Clandestine (Fine)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>These clothes come with three hidden pockets, each of which can store up to 1 lb. Finding these hidden pockets requires a DC 18 Investigation check.</p>\n\n<h4>Clothes, Clandestine (Improved)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>These clothes come with five hidden pockets, each of which can store up to 1 lb. Finding these hidden pockets requires a DC 21 Investigation check.</p>\n\n<h4>Clothes, Clandestine (Superior)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>These clothes come with six hidden pockets, each of which can store up to 1 lb. Finding these hidden pockets requires a DC 24 Investigation check.</p>\n\n<h4>Jedi Knight's Robe</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +2 bonus to AC while you wear this robe.</p>\n\n<p><em>Members of the Order typically wear plain or unassuming garments, but this variant offers the additional protection needed by Jedi influencing important events.</em></p>\n\n<h4>Jedi Master's Robe</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +3 bonus to AC while you wear this robe.</p>\n\n<p><em>Members of the Order typically wear plain or unassuming garments, but Jedi Masters also know the importance of adequate protection when great challenges must be surmounted.</em></p>\n\n<h4>Jedi Padawan's Robe</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +1 bonus to AC while you wear this robe.</p>\n\n<p><em>Members of the Jedi Order typically wear plain or unassuming garments, offering only a minor boost to defenses.</em></p>\n\n<h4>Sith Acolyte's Robe</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +1 bonus to damage rolls with weapons and force powers while you wear this robe.</p>\n\n<p><em>Designed for those who relish personal combat, and know that power comes to those who take it, these robes augment offensive capabilities with no hindrance to movement.</em></p>\n\n<h4>Sith Lord's Robe</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +3 bonus to damage rolls with weapons and force powers while you wear this robe.</p>\n\n<p><em>Designed for those who relish personal combat, and know that power comes to those who take it, these robes masterfully augment offensive capabilities with no hindrance to movement.</em></p>\n\n<h4>Sith Warrior's Robe</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +2 bonus to damage rolls with weapons and force powers while you wear this robe.</p>\n\n<p><em>Designed for those who relish personal combat, and know that power comes to those who take it, these robes greatly augment offensive capabilities with no hindrance to movement.</em> </p>\n\n\n\n<h4>Tunic Chassis (Advanced)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Tunic Chassis (Artifact)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Tunic Chassis (Legendary)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Tunic Chassis (Premium)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Tunic Chassis (Prototype)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Tunic Chassis (Standard)</h4>\n\n<em><strong>Adventuring gear</strong> (body), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications. It can house modifications of standard rarity.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Feet)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Feet</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Mag-lock Boots</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Aratech Sound Dampening Boots</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Boots of Bounding</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Boots of Hiding</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Rocket Boots (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Rocket Boots (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Rocket Boots (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Slipstream Kickers</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Rocket Boots (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Rocket Boots (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Aratech Sound Dampening Boots</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While you wear these boots, your steps make no sound, regardless of the surface you are moving across. You also have advantage on Dexterity (Stealth) checks that rely on moving silently. </p>\n\n<p><em>Before their repulsorcraft hit it big, Aratech honed its edge in the stealth field generator market.</em></p>\n\n<h4>Boots of Bounding</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in fighter</em><br>\n\n<p>This item can hold a number of charges equal to half your fighter level (rounded up). When you complete a long rest, this item regains all missing charges. On your turn, you can expend 1 or more charges to engage the rocket boosters and leap to a space you can see. For each charge spent, you can move up to 10 feet. Any opportunity attacks you provoke with this movement are made with disadvantage.</p>\n\n<p>When you reach 5th level in fighter, when you use your Action Surge feature, your movement speed is doubled for the turn, you gain a flying speed equal to your walking speed until the end of your turn, though you fall if you end your speed in the air and nothing else is holding you aloft, and opportunity attacks made against you this turn have disadvantage.</p>\n\n<p>When you reach 11th level in fighter, when you use your Indomitable feature, you have advantage on the roll.</p>\n\n<p>When you reach 17th level in fighter, once per round, when you miss with a weapon attack, you can repeat the attack (no action required).</p>\n\n<p><em>These red and black boots come with integrated rocket boosters.</em></p>\n\n<h4>Boots of Hiding</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While wearing these boots, creatures have disadvantage on Wisdom (Survival) checks made to track your steps.</p>\n\n<p>Additionally, you can use a bonus action to cause the boots to leave behind no footprints for 1 minute. When you do, another set of similar footprints appear on the ground that lead in random directions. These footprints last for 8 hours and travel up to 300 feet. A successful DC 14 Intelligence (Investigation) check reveals that the footprints are false. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>\n\n<h4>Mag-lock Boots</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While you wear these boots, you can activate or deactivate heir mag-locks as a bonus action. While the mag locks are engaged, you move at half speed, can walk on any solid metallic surface, ignore difficult terrain caused by metallic debris, and ignore the effects of gravity (or the lack thereof), allowing you to walk up vertical surfaces or even upside-down. </p>\n\n<p>The battery in these boots lasts for a total of 1 hour and recharges at the end of a long rest.</p>\n\n<h4>Rocket Boots (Champion)</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Rocket boots are a form of rocket propulsion system affixed to a pair of boots instead of being worn on the back like a standard jetpack. Activating or deactivating the boots requires a bonus action and, while active, you have a flying speed of 50 feet. The rocket boots last for 1 minute and can be recharged by a power source or replacing the power cell.\t</p>\n\n<h4>Rocket Boots (Exceptional)</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>Rocket boots are a form of rocket propulsion system affixed to a pair of boots instead of being worn on the back like a standard jetpack. Activating or deactivating the boots requires a bonus action and, while active, you have a flying speed of 45 feet. The rocket boots last for 1 minute and can be recharged by a power source or replacing the power cell.\t</p>\n\n<h4>Rocket Boots (Fine)</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Rocket boots are a form of rocket propulsion system affixed to a pair of boots instead of being worn on the back like a standard jetpack. Activating or deactivating the boots requires a bonus action and, while active, you have a flying speed of 30 feet. The rocket boots last for 1 minute and can be recharged by a power source or replacing the power cell.\t</p>\n\n\n\n<h4>Rocket Boots (Improved)</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Rocket boots are a form of rocket propulsion system affixed to a pair of boots instead of being worn on the back like a standard jetpack. Activating or deactivating the boots requires a bonus action and, while active, you have a flying speed of 35 feet. The rocket boots last for 1 minute and can be recharged by a power source or replacing the power cell.\t</p>\n\n<h4>Rocket Boots (Superior)</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Rocket boots are a form of rocket propulsion system affixed to a pair of boots instead of being worn on the back like a standard jetpack. Activating or deactivating the boots requires a bonus action and, while active, you have a flying speed of 40 feet. The rocket boots last for 1 minute and can be recharged by a power source or replacing the power cell.\t</p>\n\n<h4>Slipstream Kickers</h4>\n\n<em><strong>Adventuring gear</strong> (feet), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While you wear these boots, you can use a bonus action to activate or deactivate their overdrive mode. If you do, you gain the effect of the <em>tactical advantage</em> tech power for 1 minute. Once you've used this feature, you must complete a long rest before you can use it again.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Finger)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Finger</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Ring of Novice Force Storing</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Ring of Tech Storing Mk I</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Ring of Apprentice Force Storing</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Ring of Tech Storing Mk II</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Ring of Journeyman Force Storing</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Ring of Tech Storing Mk III</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Ring of Adept Force Storing</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Ring of Tech Storing Mk IV</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Ring of Master Force Storing</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Ring of Tech Storing Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Ring of Ancient Force Storing</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Ring of Tech Storing Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Ring of Adept Force Storing</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores force powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 6 levels worth of force powers at a time. When found, it contains 1d7 - 1 levels of stored force powers chosen by the GM.</p>\n\n<p>Any creature can cast a force power of 1st through 6th level into the ring by touching the ring as the force power is cast. The force power has no effect, other than to be stored in the ring. If the ring can't hold the force power, the force power is expended without effect. The level of the slot used to cast the force power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any force power stored in it. The force power uses the slot level, force save DC, force attack bonus, and forcecasting ability of the original caster, but is otherwise treated as if you cast the force power. The force power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Ancient Force Storing</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores force powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 9 levels worth of force powers at a time. When found, it contains 1d10 - 1 levels of stored force powers chosen by the GM.</p>\n\n<p>Any creature can cast a force power of 1st through 9th level into the ring by touching the ring as the force power is cast. The force power has no effect, other than to be stored in the ring. If the ring can't hold the force power, the force power is expended without effect. The level of the slot used to cast the force power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any force power stored in it. The force power uses the slot level, force save DC, force attack bonus, and forcecasting ability of the original caster, but is otherwise treated as if you cast the force power. The force power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Apprentice Force Storing</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores force powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 3 levels worth of force powers at a time. When found, it contains 1d4 - 1 levels of stored force powers chosen by the GM.</p>\n\n<p>Any creature can cast a force power of 1st through 3rd level into the ring by touching the ring as the force power is cast. The force power has no effect, other than to be stored in the ring. If the ring can't hold the force power, the force power is expended without effect. The level of the slot used to cast the force power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any force power stored in it. The force power uses the slot level, force save DC, force attack bonus, and forcecasting ability of the original caster, but is otherwise treated as if you cast the force power. The force power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Journeyman Force Storing</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores force powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 5 levels worth of force powers at a time. When found, it contains 1d6 - 1 levels of stored force powers chosen by the GM.</p>\n\n<p>Any creature can cast a force power of 1st through 5th level into the ring by touching the ring as the force power is cast. The force power has no effect, other than to be stored in the ring. If the ring can't hold the force power, the force power is expended without effect. The level of the slot used to cast the force power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any force power stored in it. The force power uses the slot level, force save DC, force attack bonus, and forcecasting ability of the original caster, but is otherwise treated as if you cast the force power. The force power cast from the ring is no longer stored in it, freeing up space.</p>\n\n\n\n<h4>Ring of Master Force Storing</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores force powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 8 levels worth of force powers at a time. When found, it contains 1d9 - 1 levels of stored force powers chosen by the GM.</p>\n\n<p>Any creature can cast a force power of 1st through 8th level into the ring by touching the ring as the force power is cast. The force power has no effect, other than to be stored in the ring. If the ring can't hold the force power, the force power is expended without effect. The level of the slot used to cast the force power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any force power stored in it. The force power uses the slot level, force save DC, force attack bonus, and forcecasting ability of the original caster, but is otherwise treated as if you cast the force power. The force power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Novice Force Storing</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores force powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 2 levels worth of force powers at a time. When found, it contains 1d3 - 1 levels of stored force powers chosen by the GM.</p>\n\n<p>Any creature can cast a force power of 1st or 2nd level into the ring by touching the ring as the force power is cast. The force power has no effect, other than to be stored in the ring. If the ring can't hold the force power, the force power is expended without effect. The level of the slot used to cast the force power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any force power stored in it. The force power uses the slot level, force save DC, force attack bonus, and forcecasting ability of the original caster, but is otherwise treated as if you cast the force power. The force power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Tech Storing Mk I</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores tech powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 2 levels worth of tech powers at a time. When found, it contains 1d3 - 1 levels of stored tech powers chosen by the GM.</p>\n\n<p>Any creature can cast a tech power of 1st or 2nd level into the ring by touching the ring as the tech power is cast. The tech power has no effect, other than to be stored in the ring. If the ring can't hold the tech power, the tech power is expended without effect. The level of the slot used to cast the tech power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any tech power stored in it. The tech power uses the slot level, tech save DC, tech attack bonus, and techcasting ability of the original caster, but is otherwise treated as if you cast the tech power. The tech power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Tech Storing Mk II</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores tech powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 3 levels worth of tech powers at a time. When found, it contains 1d4 - 1 levels of stored tech powers chosen by the GM.</p>\n\n<p>Any creature can cast a tech power of 1st through 3rd level into the ring by touching the ring as the tech power is cast. The tech power has no effect, other than to be stored in the ring. If the ring can't hold the tech power, the tech power is expended without effect. The level of the slot used to cast the tech power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any tech power stored in it. The tech power uses the slot level, tech save DC, tech attack bonus, and techcasting ability of the original caster, but is otherwise treated as if you cast the tech power. The tech power cast from the ring is no longer stored in it, freeing up space.</p>\n\n\n\n<h4>Ring of Tech Storing Mk III</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores tech powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 5 levels worth of tech powers at a time. When found, it contains 1d6 - 1 levels of stored tech powers chosen by the GM.</p>\n\n<p>Any creature can cast a tech power of 1st through 5th level into the ring by touching the ring as the tech power is cast. The tech power has no effect, other than to be stored in the ring. If the ring can't hold the tech power, the tech power is expended without effect. The level of the slot used to cast the tech power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any tech power stored in it. The tech power uses the slot level, tech save DC, tech attack bonus, and techcasting ability of the original caster, but is otherwise treated as if you cast the tech power. The tech power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Tech Storing Mk IV</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores tech powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 6 levels worth of tech powers at a time. When found, it contains 1d7 - 1 levels of stored tech powers chosen by the GM.</p>\n\n<p>Any creature can cast a tech power of 1st through 6th level into the ring by touching the ring as the tech power is cast. The tech power has no effect, other than to be stored in the ring. If the ring can't hold the tech power, the tech power is expended without effect. The level of the slot used to cast the tech power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any tech power stored in it. The tech power uses the slot level, tech save DC, tech attack bonus, and techcasting ability of the original caster, but is otherwise treated as if you cast the tech power. The tech power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Tech Storing Mk V</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores tech powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 8 levels worth of tech powers at a time. When found, it contains 1d9 - 1 levels of stored tech powers chosen by the GM.</p>\n\n<p>Any creature can cast a tech power of 1st through 8th level into the ring by touching the ring as the tech power is cast. The tech power has no effect, other than to be stored in the ring. If the ring can't hold the tech power, the tech power is expended without effect. The level of the slot used to cast the tech power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any tech power stored in it. The tech power uses the slot level, tech save DC, tech attack bonus, and techcasting ability of the original caster, but is otherwise treated as if you cast the tech power. The tech power cast from the ring is no longer stored in it, freeing up space.</p>\n\n<h4>Ring of Tech Storing Mk VI</h4>\n\n<em><strong>Adventuring gear</strong> (finger), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This ring stores tech powers cast into it, holding them until the attuned wearer uses them. The ring can store up to 9 levels worth of tech powers at a time. When found, it contains 1d10 - 1 levels of stored tech powers chosen by the GM.</p>\n\n<p>Any creature can cast a tech power of 1st through 9th level into the ring by touching the ring as the tech power is cast. The tech power has no effect, other than to be stored in the ring. If the ring can't hold the tech power, the tech power is expended without effect. The level of the slot used to cast the tech power determines how much space it uses.</p>\n\n<p>While wearing this ring, you can cast any tech power stored in it. The tech power uses the slot level, tech save DC, tech attack bonus, and techcasting ability of the original caster, but is otherwise treated as if you cast the tech power. The tech power cast from the ring is no longer stored in it, freeing up space.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Hands)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Hands</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Handwraps (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Handwraps Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td><td></td></tr><tr><td><font style=\"color:green\">Gauntlets of the Warrior</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Handwraps (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Handwraps Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Reverse-Engineered Crushgaunts</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Handwraps (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Handwraps Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Handwraps (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Handwraps Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Mandalorian Shuk'orok</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Handwraps (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Handwraps Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Handwarps (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Handwarps Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Gauntlets of the Warrior</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in guardian</em><br>\n\n<p>This item can hold a number of charges equal to half your guardian level (rounded up). When you complete a long rest, this item regains all missing charges. When you would use your Force-Empowered Strikes feature, you can expend charges instead of force points.</p>\n\n<p>When you reach 5th level in guardian, when you roll a damage die for your Force-Empowered Strikes or Improved Force-Empowered Strikes feature, if you roll less than your Wisdom or Charisma modifier (your choice), you can use the chosen modifier instead of the result on the die.</p>\n\n<p>When you reach 11th level in guardian, the radius of your Guardian Auras increases by 10 feet. Additionally, when you use your Cause Harm or Lend Aid feature, you can add both your Wisdom and Charisma modifier, instead of just one.</p>\n\n<p>When you reach 17th level in guardian, once per turn, when you roll the maximum on a damage die for your Force-Empowered Strikes or Improved Force-Empowered Strikes feature, you regain a use of your Channel the Force, to a maximum of your Wisdom or Charisma modifier (your choice, minimum of one).</p>\n\n<p><em>These metallic gauntlets are decorated with ornate, sweeping symbols, and are each inlaid with six precious stones of varying colors.</em></p>\n\n<h4>Handwraps (Basic)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While wearing these handwraps, you have a +1 bonus to damage rolls made with your unarmed strikes.</p>\n\n<h4>Handwraps (Champion)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>While wearing these handwraps, you have a +3 bonus to attack rolls and deal an additional 1d10 damage with your unarmed strikes.</p>\n\n<h4>Handwraps (Exceptional)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>While wearing these handwraps, you have a +3 bonus to attack rolls and deal an additional 1d8 damage with your unarmed strikes.</p>\n\n<h4>Handwraps (Fine)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While wearing these handwraps, you have a +1 bonus to attack and damage rolls made with your unarmed strikes.</p>\n\n<h4>Handwraps (Improved)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While wearing these handwraps, you have a +2 bonus to attack and damage rolls made with your unarmed strikes.</p>\n\n<h4>Handwraps (Superior)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While wearing these handwraps, you have a +3 bonus to attack and damage rolls made with your unarmed strikes.</p>\n\n<h4>Handwraps Chassis (Advanced)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>These modifiable handwraps chassis comes with vacant modification slots for vibroweapon modifications, as well as one augment slot. They can house modifications of advanced rarity or lower.</p>\n\n<h4>Handwraps Chassis (Artifact)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>These modifiable handwraps chassis comes with vacant modification slots for vibroweapon modifications, as well as two augment slots. They can house modifications of artifact rarity or lower.</p>\n\n<h4>Handwraps Chassis (Legendary)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>These modifiable handwraps chassis comes with vacant modification slots for vibroweapon modifications, as well as two augment slots. They can house modifications of legendary rarity or lower.</p>\n\n<h4>Handwraps Chassis (Premium)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>These modifiable handwraps chassis comes with vacant modification slots for vibroweapon modifications. They can house modifications of premium rarity or lower.</p>\n\n\n\n<h4>Handwraps Chassis (Prototype)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>These modifiable handwraps chassis comes with vacant modification slots for vibroweapon modifications, as well as one augment slot. They can house modifications of prototype rarity or lower.</p>\n\n<h4>Handwraps Chassis (Standard)</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>These modifiable handwraps chassis comes with vacant modification slots for vibroweapon modifications. They can house modifications of standard rarity.</p>\n\n<h4>Mandalorian Shuk'orok</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing these gloves, your Strength score becomes 21. If your Strength is already equal to or greater than 21, it has no effect on you.</p>\n\n<p><strong><em>Mandalorian Vestments.</em></strong> While wearing and attuned to these gloves and Mandalorian Beskar'gam, these gauntlets no longer count towards your maximum attunement. While wearing and attuned to these gloves, Mandalorian Beskar'gam, and Mandalorian Helmet, you have resistance to kinetic and energy damage from unenhanced sources.</p>\n\n<p><em>The final piece of a Mandalorian's armor, these gauntlets grant augmented strength.</em></p>\n\n<h4>Reverse-Engineered Crushgaunts</h4>\n\n<em><strong>Adventuring gear</strong> (hands), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>Your Strength score is 19 while you wear these gauntlets. They have no effect on you if your Strength is already 19 or higher.</p>\n\n<p><em>Though the knowledge to forge a pair of true</em> shuk'orok <em>is a closely-guarded Mandalorian secret, the effects of these gloves are desirable enough to spawn numerous imitators.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Head)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Head</em></td><td></td></tr><tr><td><font style=\"color:green\">Circle of Persistence</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Goggles of the Tinkerer</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Darkvision Goggles</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Mandalorian Helmet</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:purple\">Jensaarai Headgear</font></td><td><font style=\"color:purple\">Advanced</font></td></tr></tbody></table>\n\n<h4>Circlet of Persistence</h4>\n\n<em><strong>Adventuring gear</strong> (head), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in consular</em><br>\n\n<p>This item can hold a number of charges equal to half your consular level (rounded up). When you complete a long rest, this item regains all missing charges. When you would use a Force-Empowered Casting option, you can expend charges instead of force points.</p>\n\n<p>When you reach 5th level in consular, when you use your Force Recovery feature, you can add both your Wisdom and Charisma modifier to the number of force points regained, instead of just one.</p>\n\n<p>When you reach 11th level in consular, you can ignore the prerequisites for force powers that are lower level than your Max Power Level.</p>\n\n<p>When you reach 17th level in consular, when you make a Constitution saving throw to maintain concentration on a force power, you can add your Wisdom or Charisma modifier (your choice, minimum of one) if it doesn't already include that modifier. </p>\n\n<p><em>This platinum circlet contains a gem that shifts colors at the whim of its bearer.</em></p>\n\n<h4>Darkvision Goggles</h4>\n\n<em><strong>Adventuring gear</strong> (head), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While wearing these goggles, you have darkvision to a range of 60 feet. If you already have darkvision, these goggles increase its range by 30 feet.</p>\n\n<h4>Goggles of the Tinkerer</h4>\n\n<em><strong>Adventuring gear</strong> (head), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in engineer</em><br>\n\n<p>This item can hold a number of charges equal to half your engineer level (rounded up). When you complete a long rest, this item regains all missing charges. Once per turn, when you use a Potent Aptitude feature, you can spend 1 charge to roll the Potent Aptitude dice twice and add them together.</p>\n\n<p>When you reach 5th level in engineer, you become a valid target of your Potent Aptitude feature. Additionally, you gain 1 additional modification slot.</p>\n\n<p>When you reach 11th level in engineer, you can add half your proficiency bonus, rounded down, to any ability check with tools you make that doesn't already include your proficiency bonus. Additionally, you gain 1 additional modification slot (2).</p>\n\n<p>When you reach 17th level in engineer, when use your bonus action to grant a Potent Aptitude die, you can grant a d4 instead of expending a use of your Potent Aptitude. Additionally, you gain 1 additional modification slot (3).</p>\n\n<p><em>These goggles feature one-way glass lenses. When worn over the eyes, the lenses take whatever appearance the bearer decides.</em></p>\n\n<h4>Jensaarai Headgear</h4>\n\n<em><strong>Adventuring gear</strong> (head), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While you are wearing this headgear, kinetic and energy damage that you take from unenhanced weapons is reduced by an amount equal to your proficiency bonus.</p>\n\n<p><strong><em>Jensaarai Regalia.</em></strong> While wearing and attuned to this armor and Jensaarai Armor, this headgear no longer count towards your maximum attunement. While wearing and attuned to this headgear, Jensaarai Armor, and Jensaarai Cloak, fire, cold, and force damage you take is reduced by an amount equal to your proficiency bonus.</p>\n\n<p><em>Most Jensaarai craft a mask or helmet bearing the visage of an animal that best personifies their desires or goals.</em></p>\n\n<h4>Mandalorian Helmet</h4>\n\n<em><strong>Adventuring gear</strong> (head), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This helmet comes equipped with a headcomm and holorecorder. Additionally, while wearing this helmet, you have darkvision out to 60 feet. </p>\n\n<p><strong><em>Mandalorian Vestments.</em></strong> While wearing and attuned to this helmet and Mandalorian Beskar'gam, you have advantage on Wisdom (Perception) checks that rely on sight within 60 feet. While wearing and attuned to this helmet, Mandalorian Beskar'gam, and Mandalorian Shuk'orok, you have advantage on Intelligence (Investigation) checks within 5 feet.</p>\n\n<p><em>Featuring the iconic T-shaped visor of the Mandalorians, this helmet strikes fear into the hearts of the unwary.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Legs)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Legs</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Pants Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Pants Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Pants Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Pants Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Pants Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Pants Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Pants Chassis (Advanced)</h4>\n\n<em><strong>Adventuring gear</strong> (legs), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Pants Chassis (Artifact)</h4>\n\n<em><strong>Adventuring gear</strong> (legs), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Pants Chassis (Legendary)</h4>\n\n<em><strong>Adventuring gear</strong> (legs), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Pants Chassis (Premium)</h4>\n\n<em><strong>Adventuring gear</strong> (legs), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Pants Chassis (Prototype)</h4>\n\n<em><strong>Adventuring gear</strong> (legs), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Pants Chassis (Standard)</h4>\n\n<em><strong>Adventuring gear</strong> (legs), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications. It can house modifications of standard rarity.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Neck)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Neck</em></td><td></td></tr><tr><td><font style=\"color:green\">Necklace of Persistence</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Taozin Amulet</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Beemon Cardio-Regulator</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Respiration Facilitator</font></td><td><font style=\"color:blue\">Prototype</font></td></tr></tbody></table>\n\n<h4>Beemon Cardio-Regulator</h4>\n\n<em><strong>Adventuring gear</strong> (neck), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>Your Constitution score is 19 while you wear this choker. It has no effect on you if your Constitution is already 19 or higher.</p>\n\n<p><em>Demand for Beemon Laboratories' implants streches even to those too sickly to use them without assistance from another of their fine products.</em></p>\n\n<h4>Necklace of Determination</h4>\n\n<em><strong>Adventuring gear</strong> (neck), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in monk</em><br>\n\n<p>This item can hold a number of charges equal to half your monk level (rounded up). When you complete a long rest, this item regains all missing charges. When you would expend a focus point, you can instead expend a charge.</p>\n\n<p>When you reach 5th level in monk, when you use your Slow Fall feature, the amount is increased to ten times your monk level, instead of five.</p>\n\n<p>When you reach 11th level in monk, when you use your Deflect Missiles feature, you can add your Wisdom or Charisma modifier to the roll (your choice, a minimum of +1).</p>\n\n<p>When you reach 17th level in monk, you can add half your Dexterity modifier (rounded down) to your focus save DC and focus attack modifier.</p>\n\n<p><em>This simple necklace comprised of a series of tiny gray beads hosts a single pale blue crystal that glows faintly.</em></p>\n\n<h4>Respiration Facilitator</h4>\n\n<em><strong>Adventuring gear</strong> (neck), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You have advantage on Constitution saving throws against force powers.</p>\n\n<p><em>This choker allowed the notorious bounty hunter Cad Bane to bypass normal respiratory function. While worn, it gives your a voice a deeper, digital sound.</em></p>\n\n<h4>Taozin Amulet</h4>\n\n<em><strong>Adventuring gear</strong> (neck), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this amulet, you are hidden from detection through the Force. You can't be targeted by force powers or features that would detect the presence of the Force in you, and features that would detect your attunement to the Force show you glowing a faint yellow.</p>\n\n<p><em>Made from the skin of a taozin, this amulet blurs and clouds Force senses so their wearers can not easily be detected by another Force-sensitive.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Shoulders)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Shoulders</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Cloak Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Cape of the Orator</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Cloak Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Cowl of the Professional</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Jensaarai Cloak</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Mantle of the Anomic</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Pauldron of Retribution</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Cloak Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Cloak Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Cloak Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Cloak Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Cape of the Orator</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in scholar</em><br>\n\n<p>This item can hold a number of charges equal to half your scholar level (rounded up). When you complete a long rest, this item regains all missing charges. When your superiority die is rolled, you can expend one charge to reroll the die and choose either roll.</p>\n\n<p>When you reach 5th level in scholar, you can maintain two targets of your Critical Analysis feature, instead of one. If you use your bonus action to analyze a third target, you choose which Critical Analysis ends.</p>\n\n<p>When you reach 11th level in scholar, when you use your bonus action to use your Critical Analysis feature, you can target two creatures, instead of just one.</p>\n\n<p>When you reach 17th level in scholar, you can take a third reaction each round. You can only take one reaction per turn.</p>\n\n<p><em>This color-shifting cloak is immune to wrinkles and always has a pressed appearance.</em></p>\n\n<h4>Cloak Chassis (Advanced)</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Cloak Chassis (Artifact)</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Cloak Chassis (Legendary)</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Cloak Chassis (Premium)</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Cloak Chassis (Prototype)</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Cloak Chassis (Standard)</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable clothing chassis comes with vacant modification slots for clothing modifications. It can house modifications of standard rarity.</p>\n\n<h4>Cowl of the Professional</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in operative</em><br>\n\n<p>This item can hold a number of charges equal to half your operative level (rounded up). When you complete a long rest, this item regains all missing charges. When you deal Sneak Attack damage, you can spend charges to reroll any number of dice and use either result.</p>\n\n<p>When you reach 5th level in operative, while the hood is drawn, creatures can't see within the hood's confines unless you choose to allow it, you are in a source of enhanced light, or the creatures possess truesight. Additionally, you have resistance to all damage until the end of your first turn.</p>\n\n<p>When you reach 11th level in operative, when you use your Uncanny Dodge feature, an illusory duplicate of yourself appears in your space until the start of your next turn. The first attack roll made against you before the start of your next turn has disadvantage.</p>\n\n<p>When you reach 17th level in operative, when you are conscious and fail an Intelligence, Wisdom, or Charisma saving throw, you can choose to instead succeed. Once you've done so, you must complete a short or long rest before you can do so again.</p>\n\n<p><em>The color of this hood shifts between light gray and black depending on light.</em></p>\n\n\n\n<h4>Jensaarai Cloak</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this cloak with its hood up, you can try to hide when you are lightly obscured from the creature from which you are hiding. Pulling the hood up or down requires a bonus action.</p>\n\n<p><strong><em>Jensaarai Regalia.</em></strong> While wearing and attuned to this cloak and Jensaarai Armor, while its hood is up, Wisdom (Perception) checks made to see you have disadvantage, and you have advantage on Dexterity (Stealth) checks made to hide. While wearing and attuned to this cloak, Jensaraai Armor, and Jensaarai Headgear, when you make a Dexterity saving throw to an avoid an effect that would deal cold, energy, fire, force, or kinetic damage, you can add your Wisdom or Charisma modifier (your choice, minimum of one) to the roll if it doesn't already include that modifier.</p>\n\n<p><em>Most Jensaari wear a gray cloak that subtly adapts to their surroundings.</em></p>\n\n<h4>Mantle of the Anomic</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in sentinel</em><br>\n\n<p>This item can hold a number of charges equal to half your sentinel level (rounded up). When you complete a long rest, this item regains all missing charges. When you would use a Force-Empowered Self option, you can expend charges instead of force points.</p>\n\n<p>When you reach 5th level in sentinel, you can use two Force-Empowered Self options per hit, instead of only one.</p>\n\n<p>When you reach 11th level in sentinel, you can use each Force-Empowered Self option twice per turn, instead of only once. You can still only use each option once per hit.</p>\n\n<p>When you reach 17th level in sentinel, you can use your Enlightened Evasion feature for any saving throws, instead of just against effects that deal damage.</p>\n\n<p><em>This visually unremarkable mantle resists effects that would cause it to move or make noise.</em></p>\n\n<h4>Pauldron of Retribution</h4>\n\n<em><strong>Adventuring gear</strong> (shoulders), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in berserker</em><br>\n\n<p>This item can hold a number of charges equal to half your berserker level (rounded up). When you complete a long rest, this item regains all missing charges. While raging, when you deal damage that would include your Rage Damage, you can expend one charge to double your Rage Damage bonus for that damage.</p>\n\n<p>When you reach 5th level in berserker, when you use your Reckless Attack feature, your critical hit range increases by 1.</p>\n\n<p>When you reach 11th level in berserker, once per critical hit, when you roll maximum damage on a weapon damage die, you can roll an additional die and add both to the total.</p>\n\n<p>When you reach 17th level in berserker, when you are conscious and fail a Strength, Dexterity, or Constitution saving throw, you can choose to instead succeed. Once you've done so, you must complete a short or long rest before you can do so again.</p>\n\n<p><em>This single pauldron, which can be worn over armor, features the visage of a howling beast.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Waist)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Waist</em></td><td></td></tr><tr><td><font style=\"color:green\">Aratech Echo Belt</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Defel Mimicker</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Strength Enhancer</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">CNS Strength Enhancer</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Baragwin Stealth Unit</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">GNS Strength Enhancer</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Sith Strength Belt</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Dominator Belt</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Aratech Echo Belt</h4>\n\n<em><strong>Adventuring gear</strong> (waist), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While you wear this belt with its field on, Wisdom (Perception) checks made to see you have disadvantage, and you have advantage on Dexterity (Stealth) checks made to hide, as the belt funnels light around you. Activating or deactivating the belt takes an action.</p>\n\n<p><em>The success of this high-end stealth field generator emboldened Aratech to branch out into other hardware.</em></p>\n\n<h4>Baragwin Stealth Unit</h4>\n\n<em><strong>Adventuring gear</strong> (waist), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this belt, you can turn on its stealth field to cause yourself to become invisible. While you are invisible, anything you are carrying or wearing is invisible with you. You become visible when you turn off the field. Turning the field on or off requires an action.</p>\n\n<p>Deduct the time you are invisible, in increments of 1 minute, from the belt's maximum duration of 2 hours. After 2 hours of use, the belt ceases to function. For every uninterrupted period of 12 hours the belt goes unused, it regains 1 hour of use.</p>\n\n<p><em>Those Baragwin who sought to turn their telepathic empathy into an asset for bounty hunting needed something special to overcome the drawbacks of their lumbering frames.</em></p>\n\n<h4>CNS Strength Enhancer</h4>\n\n<em><strong>Adventuring gear</strong> (waist), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this belt, your Strength score becomes 23. If your Strength is already equal to or greater than 23, it has no effect on you.</p>\n\n<p><em>This belt further increases a users physical power with pneumaticized assistance joists and a repulsorfield microgenerator.</em></p>\n\n<h4>Defel Mimicker</h4>\n\n<em><strong>Adventuring gear</strong> (waist), prototype</em></font><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While you wear this belt, it casts a shadow that makes you appear to be standing in a place near your actual location, causing any creature to have disadvantage on attack rolls against you. If you take damage, the property ceases to function until the start of your next turn. This property is suppressed while you are incapacitated, restrained, or otherwise unable to move.</p>\n\n<p><em>The only visible trace of this stealth field generator's user is a vague shadow, much like the Defel themselves.</em></p>\n\n<h4>Dominator Belt</h4>\n\n<em><strong>Adventuring gear</strong> (waist), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this belt, your Strength score becomes 29. If your Strength is already equal to or greater than 29, it has no effect on you.</p>\n\n<p><em>While only barely adhering to the most technical definition of a belt, this harness-like rig of pneumaticized limb actuators supplies enormous strength to every limb of its wearer's body, monstrously increasing their physical power.</em></p>\n\n<h4>GNS Strength Enhancer</h4>\n\n<em><strong>Adventuring gear</strong> (waist), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this belt, your Strength score becomes 25. If your Strength is already equal to or greater than 25, it has no effect on you.</p>\n\n<p><em>This large belt greatly increases a users physical power with an array of repulsorfield microgenerators and a pair of reactive-lift actuators that increase raw force and lift-capacity without any loss of speed or fine motor skills.</em></p>\n\n<h4>Sith Strength Belt</h4>\n\n<em><strong>Adventuring gear</strong> (waist), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this belt, your Strength score becomes 27. If your Strength is already equal to or greater than 27, it has no effect on you.</p>\n\n<p><em>Worn on the legs, waist and lower back, this belt massively increases a users physical power with a set of heavy durasteel actuators alongside an synaptic monitoring system that reacts to its users motion with optimized power responses.</em></p>\n\n<h4>Strength Enhancer </h4>\n\n<em><strong>Adventuring gear</strong> (waist), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this belt, your Strength score becomes 21. If your Strength is already equal to or greater than 21, it has no effect on you.</p>\n\n<p><em>This belt increases a users physical power with pneumaticized assistance joists that provide support and leverage in a minimal form-factor.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Adventuring Gear (Wrists)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Wrists</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Wrist-Mounted Grappling Hook</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Vambraces of the Outrider</font></td><td><font style=\"color:green\">Premium</font></td></tr></tbody></table>\n\n<h4>Vambraces of the Outrider</h4>\n\n<em><strong>Adventuring gear</strong> (wrists), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<em><strong>Prerequisite:</strong> at least 3 levels in scout</em><br>\n\n<p>This item can hold a number of charges equal to half your scout level (rounded up). When you complete a long rest, this item regains all missing charges. When you cast a tech power of 1st level or higher, you can expend one or more charges to reduce the tech power's cost by 1 per charge spent, to a minimum of 1.</p>\n\n<p>When you reach 5th level in scout, you can maintain two targets of your Ranger's Quarry feature, instead of one. Additionally, the reload value of the wrist launcher increases by 1, to 2.</p>\n\n<p>When you reach 11th level in scout, when you are forced to make a concentration check by the target of your Ranger's Quarry, you have advantage on the check and add your Intelligence modifier to the roll. Additionally, the reload value of the wrist launcher increases by 1, to 3.</p>\n\n<p>When you reach 17th level in scout, when you miss with a tech or weapon attack, the target takes damage equal to the attack's governing ability modifier. If the target of the attack is the target of your Ranger's Quarry feature, you can choose to deal your Ranger's Quarry damage as well. Additionally, the reload value of the wrist launcher increases by 1, to 4.</p>\n\n<p><em>This pair of matching vambraces are inlaid with the etched visage of an eagle. One contains an integrated wristpad, while the other contains an integrated wrist launcher.</em></p>\n\n<h4>Wrist-Mounted Grappling Hook</h4>\n\n<em><strong>Adventuring gear</strong> (wrist), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You craft a wrist-mounted grappling hook weapon attached to a tightly coiled cord. With this grappler, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d4 kinetic damage. This attack can target a surface, object, or creature.</p>\n\n<p>A creature struck by this attack is impaled by the hook. As an action, a creature can attempt to remove the hook. Removing the hook requires a DC 13 Strength check. While the hook is stuck in the target, you are connected to the target by a 60 foot cable.</p>\n\n<p>While the hook is deployed, you can use your bonus action to activate the reel, pulling yourself to the location if the target is your size or larger. A creature or object smaller than you is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>\n\n<p>Once you've used this feature, you can't use it again until you recover and reinsert the hook as an action.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Armor</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#4a5568\">Armor Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Armor (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Armor Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Viir Agathys's Armor</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Adapted Armor</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Armor (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Armor Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Mandalorian Beskar'gam</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Armor (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Armor Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Armor (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Armor Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Armor (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Armor Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><em>Light</em></td><td></td></tr><tr><td><em>Medium</em></td><td></td></tr><tr><td><font style=\"color:blue\">Jensaarai Armor</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><em>Heavy</em></td><td></td></tr><tr><td><font style=\"color:green\">Matrix Armor</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Orbalisk Armor</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:#dd6b20\">Reactive Ultrachrome Armor</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr></tbody></table>\n\n<h4>Adapted Armor</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You have resistance to one type of damage while you wear this armor. The DM chooses the type or determines it randomly from the options below.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d10</th><th>Damage Type</th></tr></thead><tbody><tr><td>1</td><td>Acid</td></tr><tr><td>2</td><td>Cold</td></tr><tr><td>3</td><td>Fire</td></tr><tr><td>4</td><td>Force</td></tr><tr><td>5</td><td>Ion</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d10</th><th>Damage Type</th></tr></thead><tbody><tr><td>6</td><td>Lightning</td></tr><tr><td>7</td><td>Necrotic</td></tr><tr><td>8</td><td>Poison</td></tr><tr><td>9</td><td>Psychic</td></tr><tr><td>10</td><td>Sonic</td></tr></tbody></table></div>\n\n<p><em>Those foolhardy enough to not treat a hostile planet as worthy a foe as the ones carrying blasters don't often live long enough to boast about it.</em></p>\n\n<h4>Armor (Champion)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>You have a +3 bonus to AC while wearing this armor. Additionally, while wearing this armor, damage you take is reduced by 2. If this would reduce the damage to 0, the damage is instead reduced to 1.</p>\n\n<h4>Armor (Exceptional)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>You have a +3 bonus to AC while wearing this armor. Additionally, while wearing this armor, damage you take is reduced by 1. If this would reduce the damage to 0, the damage is instead reduced to 1.</p>\n\n<h4>Armor (Fine)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You have a +1 bonus to AC while wearing this armor.</p>\n\n<h4>Armor (Improved)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You have a +2 bonus to AC while wearing this armor.</p>\n\n<h4>Armor (Superior)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You have a +3 bonus to AC while wearing this armor.</p>\n\n<h4>Armor Chassis (Advanced)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable armor chassis comes with vacant modification slots for armor modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Armor Chassis (Artifact)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable armor chassis comes with vacant modification slots for armor modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Armor Chassis (Legendary)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable armor chassis comes with vacant modification slots for armor modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Armor Chassis (Premium)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable armor chassis comes with vacant modification slots for armor modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Armor Chassis (Prototype)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable armor chassis comes with vacant modification slots for armor modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Armor Chassis (Standard)</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable armor chassis comes with vacant modification slots for armor modifications. It can house modifications of standard rarity.</p>\n\n\n\n<h4>Jensaarai Armor</h4>\n\n<em><strong>Armor</strong> (any medium), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>While wearing this armor, you are considered proficient regardless of whether or not you have proficiency in medium armor. Additionally, it grants a +1 bonus to AC.</p>\n\n<p><strong><em>Jensaarai Regalia.</em></strong> While wearing and attuned to this armor and Jensaarai Cloak, you are adapted to both hot and cold climates, as described in chapter 5 of the Dungeon Master's Guide. Additionally, this armor now grants a +2 bonus to AC, instead of +1. While wearing and attuned to this armor, Jensaarai Cloak, and Jensaarai Headgear, this armor now grants a +3 bonus to AC, instead of +2.</p>\n\n<p><em>At the height of their training, Jensaarai craft and bond with their own armor. While each set of armor is unique to its bearer, they share similar traits.</em></p>\n\n<h4>Mandalorian Beskar'gam</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This armor comes equipped with 24 slots that can each hold a single item that weighs less than 2 lb. Additionally, it grants a +1 bonus to AC.</p>\n\n<p><strong><em>Mandalorian Vestments.</em></strong> While wearing and attuned to this armor and Mandalorian Helmet, you are able to survive and operate in zero gravity space and other dangerous conditions. Additionally, this armor now grants a +2 bonus to AC, instead of +1. While wearing and attuned to this armor, Mandalorian Helmet, and Mandalorian Shuk'orok, this armor now grants a +3 bonus to AC, instead of +2.</p>\n\n<p><em>This armor is forged from an incredibly rare material known as beskar, a highly durable metal.</em></p>\n\n<h4>Matrix Armor</h4>\n\n<em><strong>Armor</strong> (any heavy), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While wearing this suit of armor, any critical hit against you becomes a normal hit.</p>\n\n<p><em>This suit of armor has had its protective durasteel components replaced by equivalents made of matrix, a purple metal used to reinforce starships.</em></p>\n\n<h4>Orbalisk Armor</h4>\n\n<em><strong>Armor</strong> (heavy exoskeleton), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This armor has no weight and does not affect encumbrance. While wearing it, you are considered proficient regardless of whether or not you have proficiency with heavy armor, and you are resistant to all unenhanced damage.</p>\n\n<p><strong><em>Cursed.</em></strong> You can not remove this armor without first killing the orbalisks. While wearing this armor, whenever you complete a long rest, you must make a DC 15 Wisdom saving throw. You can choose to fail this saving throw. For each saving throw you fail, the size of your Hit Die is reduced by one step (from d12 to d10, from d10 to d8, from d8 to d6, from d6 to d4, or from d4 to d2). If you fail a saving throw while your Hit Die is a d2, you die as the orbalisks consume you. Additionally, for each saving throw you fail, your AC increases by 1. For each saving throw you succeed, the size of your Hit Die increases by one step (from d2 to d4, from d4 to d6, from d6 to d8, from d8 to d10, or from d10 to d12). Additionally, for each saving throw you succeed, your AC decreases by 1. The size of your Hit Die can not exceed the Hit Dice granted by your class, and your AC can not be increased or reduced more than the number of Hit Die increases or reductions. </p>\n\n<p><em>This armor is comprised of a series of small parasitic creatures called orbalisks. Over time, orbalisks reproduce until they cover the entirety of their host.</em></p>\n\n<h4>Reactive Ultrachrome Armor</h4>\n\n<em><strong>Armor</strong> (heavy exoskeleton), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You have resistence to unenhanced damage while you wear this armor. Additionally, you can use an action to make yourself immune to unenhanced damage for 10 minutes or until you are no longer wearing the armor. Once this special action is used, it can't be used again until the next dawn.</p>\n\n<p><em>Made with just enough ultrachrome to give you an edge while still keeping things interesting, these suits of armor can discharge an integrated power cell to catalyze this metal normally used in starship hulls into a more resilient state.</em></p>\n\n<h4>Viir Agathys's Armor</h4>\n\n<em><strong>Armor</strong> (any), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This armor has 3 charges. As an action, you can spend 1 or more charges to cast the <em>voltaic shielding</em> tech power, 1 charge per level. All expended charges are regained after you complete a long rest.</p>\n\n<p><em>This proprietary armor made by the renowned engineer Viir Agathys includes integrated access to his signature tech power.</em></p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Consumables (Adrenals)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Adrenals</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Alacrity Adrenal (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Sorcerer's Adrenal (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Stamina Adrenal (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Alacrity Adrenal (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Sorcerer's Adrenal (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Stamina Adrenal (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Alacrity Adrenal (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Battle Adrenal Mk I</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Sorcerer's Adrenal (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Stamina Adrenal (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Alacrity Adrenal (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Sorceror's Adrenal (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Stamina Adrenal (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#db6620\">Alacrity Adrenal (Exceptional)</font></td><td><font style=\"color:#db6620\">Legendary</font></td></tr><tr><td><font style=\"color:#db6620\">Stamina Adrenal (Exceptional)</font></td><td><font style=\"color:#db6620\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Alacrity Adrenal (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Battle Adrenal Mk II</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Stamina Adrenal (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Alacrity Adrenal (Basic)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's speed increases by 10 feet. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Alacrity Adrenal (Champion)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's speed increases by 60 feet. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Alacrity Adrenal (Exceptional)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's speed increases by 50 feet. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Alacrity Adrenal (Fine)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's speed increases by 20 feet. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Alacrity Adrenal (Improved)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's speed increases by 30 feet. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Alacrity Adrenal (Superior)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's speed increases by 40 feet. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Battle Adrenal Mk I</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, when the target takes the Attack action, it can make one additional attack (no action required). This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time.</p>\n\n<h4>Battle Adrenal Mk II</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, when the target takes the Attack action, it can make two additional attacks (no action required). This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time.</p>\n\n<h4>Stamina Adrenal (Basic)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's current and maximum hit points increase by 10. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Stamina Adrenal (Champion)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's current and maximum hit points increase by 60. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Stamina Adrenal (Exceptional)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's current and maximum hit points increase by 50. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n\n\n<h4>Stamina Adrenal (Fine)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's current and maximum hit points increase by 20. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Stamina Adrenal (Improved)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's current and maximum hit points increase by 30. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Stamina Adrenal (Superior)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target's current and maximum hit points increase by 40. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Sorcerer's Adrenal (Basic)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target gains a +1 bonus to its damage and healing rolls with force powers. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Sorcerer's Adrenal (Fine)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target gains a +1 bonus to its force attack rolls, force save DC, and damage and healing rolls with force powers. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Sorcerer's Adrenal (Improved)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target gains a +2 bonus to its force attack rolls, force save DC, and damage and healing rolls with force powers. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n<h4>Sorcerer's Adrenal (Superior)</h4>\n\n<em><strong>Consumable</strong> (adrenal), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can administer this adrenal to a creature within 5 feet. When you administer this adrenal, the target gains a +3 bonus to its force attack rolls, force save DC, and damage and healing rolls with force powers. This effect lasts for 1 minute. A creature can benefit from only one adrenal at a time. </p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Consumables (Ammunition)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td></tr><tr><td><font style=\"color:green\">Dart (Average)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Flux Collimator (Average)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Oscillation Calibrator (Average)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Power Cell (Average)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Slug Cartridge (Average)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Dart (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Flux Collimator (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Oscillation Calibrator (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Power Cell (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Slug Cartridge (Major)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Dart (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Flux Collimator (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Oscillation Calibrator (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Power Cell (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Slug Cartridge (Deadly)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Dart (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Flux Collimator (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Oscillation Calibrator (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Power Cell (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Slug Cartridge (Lethal)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Dart (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Flux Collimator (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Oscillation Calibrator (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Power Cell (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Slug Cartridge (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Dart (Average)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You have a +1 bonus to attack and damage rolls made with this enhanced wrist launcher dart, which deals 1d6 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the dart has been fired, it no longer gives a bonus.</p>\n\n<h4>Dart (Deadly)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You have a +3 bonus to attack and damage rolls made with this enhanced wrist launcher dart, which deals 1d6 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the dart has been fired, it no longer gives a bonus.</p>\n\n<h4>Dart (Devastating)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>You have a +3 bonus to attack rolls and deal an additional 1d10 damage with this enhanced wrist launcher dart, which deals 1d6 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the dart has been fired, it no longer gives a bonus.</p>\n\n<h4>Dart (Lethal)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>You have a +3 bonus to attack rolls and deal an additional 1d8 damage with this enhanced wrist launcher dart, which deals 1d6 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the dart has been fired, it no longer gives a bonus.</p>\n\n<h4>Dart (Major)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You have a +2 bonus to attack and damage rolls made with this enhanced wrist launcher dart, which deals 1d6 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the dart has been fired, it no longer gives a bonus.</p>\n\n<h4>Flux Collimator (Average) </h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +1 bonus to attack and damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Flux Collimator (Deadly)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +3 bonus to attack and damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Flux Collimator (Devastating)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +3 bonus to attack rolls and dealing an additional 1d10 damage for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Flux Collimator (Lethal)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +3 bonus to attack rolls and dealing an additional 1d8 damage for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Flux Collimator (Major)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +2 bonus to attack and damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n\n\n<h4>Oscillation Calibrator (Average) </h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +1 bonus to attack and damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Oscillation Calibrator (Deadly)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +3 bonus to attack and damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Oscillation Calibrator (Devastating)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +3 bonus to attack rolls and dealing an additional 1d10 damage for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Oscillation Calibrator (Lethal)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +3 bonus to attack rolls and dealing an additional 1d8 damage for 1 minute. This bonus is in addition to any bonuses granted by the weapon.</p>\n\n<h4>Oscillation Calibrator (Major)</h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +2 bonus to attack and damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, if the weapon is not enhanced, it becomes enhanced for the duration.</p>\n\n<h4>Power Cell (Average) </h4>\n\n<em><strong>Consumable</strong> (ammunition), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You have a +1 bonus to attack and damage rolls made with this enhanced power cell. This bonus is in addition to any bonuses granted by the weapon. Once the power cell is depleted, it no longer gives a bonus.</p>\n\n<h4>Power Cell (Deadly)</h4>\n\n<em><strong>Consumable</strong> (ammunitio