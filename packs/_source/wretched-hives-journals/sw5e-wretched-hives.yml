 5 feet. For the next hour, the creature experiences a high that allows them to roll an additional d10 when making an ability check, attack roll, or saving throw using Charisma. At the end of the high, the creature must succeed on a DC 22 Wisdom saving throw or experience a low that lasts 4 hours, during which they must roll a d10 and subtract the result when making an ability check, attack roll, or saving throw using Charisma. At the end of the low, the creature must make a DC 22 Constitution saving throw to resist addiction.</p>\n\n<h4>Yarrock (Pure)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Yarrock is a hallucinogen which is said to instill a creature with a clear vision of \"the meaning of life\", granting a boost to confidence. As an action, you can apply this substance to a creature within 5 feet. For the next hour, the creature experiences a high that allows them to roll an additional d12 when making an ability check, attack roll, or saving throw using Charisma. At the end of the high, the creature must succeed on a DC 24 Wisdom saving throw or experience a low that lasts 8 hours, during which they must roll a d12 and subtract the result when making an ability check, attack roll, or saving throw using Charisma. At the end of the low, the creature must make a DC 24 Constitution saving throw to resist addiction.</p>\n\n<h4>Yarrock (Uncut)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Yarrock is a hallucinogen which is said to instill a creature with a clear vision of \"the meaning of life\", granting a boost to confidence. As an action, you can apply this substance to a creature within 5 feet. For the next 10 minutes, the creature experiences a high that allows them to roll an additional d6 when making an ability check, attack roll, or saving throw using Charisma. At the end of the high, the creature must succeed on a DC 18 Wisdom saving throw or experience a low that lasts 1 hour, during which they must roll a d6 and subtract the result when making an ability check, attack roll, or saving throw using Charisma. At the end of the low, the creature must make a DC 18 Constitution saving throw to resist addiction.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Consumables (Technology)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th><th>Page</th></tr></thead><tbody><tr><td><em>Technology</em></td><td></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Machinist's Catalyzer Mk I</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Personal Teleporter Mk I</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Computer Spike (Fine)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:green\">Machinist's Catalyzer Mk II</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Personal Teleporter Mk II</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Security Spike (Fine)</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:green\">Repair Kit Mk II</font></td><td><font style=\"color:green\">Premium</font></td><td></td></tr><tr><td><font style=\"color:blue\">Machinist's Catalyzer Mk III</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Personal Teleporter Mk III</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Repair Kit Mk III</font></td><td><font style=\"color:blue\">Prototype</font></td><td></td></tr><tr><td><font style=\"color:purple\">Computer Spike (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:purple\">Machinist's Catalyzer Mk IV</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Personal Teleporter Mk IV</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Repair Kit Mk IV</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:purple\">Security Spike (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td><td></td></tr><tr><td><font style=\"color:#dd6b20\">Personal Teleporter Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Repair Kit Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td><td></td></tr><tr><td><font style=\"color:red\">Computer Spike (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr><tr><td><font style=\"color:red\">Personal Teleporter Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Repair Kit Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr><tr><td><font style=\"color:red\">Security Spike (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td><td></td></tr></tbody></table>\n\n<h4>Computer Spike (Champion)</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>When you make an Intelligence (slicer's kit) check, you can use the spike (no action required) to gain advantage on the check, and then you can reroll both of the dice once. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n<h4>Computer Spike (Fine)</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>When you make an Intelligence (slicer's kit) check, you can use the spike (no action required) to gain advantage on the check. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n<h4>Computer Spike (Superior)</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>When you make an Intelligence (slicer's kit) check, you can use the spike (no action required) to gain advantage on the check, and then you can reroll one of the dice once. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n<h4>Machinist's Catalyzer Mk I</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can administer this catalyzer to a creature within 5 feet. When you administer this adrenal, the target gains a +1 bonus to its damage and healing rolls with tech powers. This effect lasts for 1 minute. A creature can benefit from only one catalyzer at a time. </p>\n\n<h4>Machinist's Catalyzer Mk II</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can administer this catalyzer to a creature within 5 feet. When you administer this adrenal, the target gains a +1 bonus to its tech attack rolls, tech save DC, and damage and healing rolls with tech powers. This effect lasts for 1 minute. A creature can benefit from only one catalyzer at a time. </p>\n\n<h4>Machinist's Catalyzer Mk III</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this catalyzer to a creature within 5 feet. When you administer this adrenal, the target gains a +2 bonus to its tech attack rolls, tech save DC, and damage and healing rolls with tech powers. This effect lasts for 1 minute. A creature can benefit from only one catalyzer at a time. </p>\n\n<h4>Machinist's Catalyzer Mk IV</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can administer this catalyzer to a creature within 5 feet. When you administer this adrenal, the target gains a +3 bonus to its tech attack rolls, tech save DC, and damage and healing rolls with tech powers. This effect lasts for 1 minute. A creature can benefit from only one catalyzer at a time. </p>\n\n<h4>Portable Teleporter Mk I</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can use this teleporter to create a pair of linked portals: one portal appears in a space within 5 feet of you, and the other portal appears in an unoccupied space you can see up to 30 feet away. These portals lasts until the start of your next turn, and they are large enough to accommodate Medium and smaller creatures and objects. Portals take the appearance of an elongated, shimmering mirror, and looking through a portal, a creature can see through the linked portal as if looking through a window. A creature or object who passes through a portal immediately appears in a space within 5 feet of the linked portal.</p>\n\n\n\n<h4>Portable Teleporter Mk II</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can use this teleporter to create a pair of linked portals: one portal appears in a space within 5 feet of you, and the other portal appears in an unoccupied space you can see up to 60 feet away. These portals lasts until the start of your next turn, and they are large enough to accommodate Medium and smaller creatures and objects. Portals take the appearance of an elongated, shimmering mirror, and looking through a portal, a creature can see through the linked portal as if looking through a window. A creature or object who passes through a portal immediately appears in a space within 5 feet of the linked portal.</p>\n\n<h4>Portable Teleporter Mk III</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can use this teleporter to create a pair of linked portals: one portal appears in a space within 5 feet of you, and the other portal appears in an unoccupied space you can see up to 90 feet away. These portals lasts until the start of your next turn, and they are large enough to accommodate Medium and smaller creatures and objects. Portals take the appearance of an elongated, shimmering mirror, and looking through a portal, a creature can see through the linked portal as if looking through a window. A creature or object who passes through a portal immediately appears in a space within 5 feet of the linked portal.</p>\n\n<h4>Portable Teleporter Mk IV</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can use this teleporter to create a pair of linked portals: one portal appears in a space within 5 feet of you, and the other portal appears in an unoccupied space you can see up to 150 feet away. These portals lasts until the start of your next turn, and they are large enough to accommodate Medium and smaller creatures and objects. Portals take the appearance of an elongated, shimmering mirror, and looking through a portal, a creature can see through the linked portal as if looking through a window. A creature or object who passes through a portal immediately appears in a space within 5 feet of the linked portal.</p>\n\n<h4>Portable Teleporter Mk V</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can use this teleporter to create a pair of linked portals: one portal appears in a space within 5 feet of you, and the other portal appears in an unoccupied space you can see up to 300 feet away. These portals lasts until the start of your next turn, and they are large enough to accommodate Medium and smaller creatures and objects. Portals take the appearance of an elongated, shimmering mirror, and looking through a portal, a creature can see through the linked portal as if looking through a window. A creature or object who passes through a portal immediately appears in a space within 5 feet of the linked portal.</p>\n\n<h4>Portable Teleporter Mk VI</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can use this teleporter to create a pair of linked portals: one portal appears in a space within 5 feet of you, and the other portal appears in an unoccupied space you can see up to 1,000 feet away. These portals lasts until the start of your next turn, and they are large enough to accommodate Medium and smaller creatures and objects. Portals take the appearance of an elongated, shimmering mirror, and looking through a portal, a creature can see through the linked portal as if looking through a window. A creature or object who passes through a portal immediately appears in a space within 5 feet of the linked portal.</p>\n\n<h4>Repair Kit Mk II</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>A repair kit included the basic tools needed to repair a droid after being damaged in combat. The kit has three uses. As an action, you can expend one use of the kit to restore hit points to a droid or construct within 5 feet. The creature rolls two dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Repair Kit Mk III</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>A repair kit included the basic tools needed to repair a droid after being damaged in combat. The kit has three uses. As an action, you can expend one use of the kit to restore hit points to a droid or construct within 5 feet. The creature rolls three dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Repair Kit Mk IV</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>A repair kit included the basic tools needed to repair a droid after being damaged in combat. The kit has three uses. As an action, you can expend one use of the kit to restore hit points to a droid or construct within 5 feet. The creature rolls four dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Repair Kit Mk V</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>A repair kit included the basic tools needed to repair a droid after being damaged in combat. The kit has three uses. As an action, you can expend one use of the kit to restore hit points to a droid or construct within 5 feet. The creature rolls five dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n\n\n<h4>Repair Kit Mk VI</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>A repair kit included the basic tools needed to repair a droid after being damaged in combat. The kit has three uses. As an action, you can expend one use of the kit to restore hit points to a droid or construct within 5 feet. The creature rolls six dice equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Security Spike (Champion)</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>When you make an Intelligence (security kit) check, you can use the spike (no action required) to gain advantage on the check, and then you can reroll both of the dice once. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n<h4>Security Spike (Fine)</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>When you make an Intelligence (security kit) check, you can use the spike (no action required) to gain advantage on the check. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n<h4>Security Spike (Superior)</h4>\n\n<em><strong>Consumable</strong> (technology), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>When you make an Intelligence (security kit) check, you can use the spike (no action required) to gain advantage on the check, and then you can reroll one of the dice once. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Cybernetic Augmentations</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Enhancements</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Charisma Enhancement (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Constitution Enhancement (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Dexterity Enhancement (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Intelligence Enhancement (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Strength Enhancement (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Wisdom Enhancement (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Hidden Compartment Blaster</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Fortitude Enhancer Mk I</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Integrated Subdermal Armor</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Reflex Enhancer Mk I</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Will Enhancer Mk I</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Armament and Defense Library</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Integrated Subdermal Armor Mk II</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Active Camouflage Core</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Automated Adrenal Package</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Fortitude Enhancer Mk II</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Reflex Enhancer Mk II</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Skills Enhancement Package</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Will Enhancer Mk II</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Charming Noble Package</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Daring Acrobat Package</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Indomitable Fortress Package</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Mighty Athlete Package</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Quick Savant Package</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Wise Sage Package</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Fortitude Enhancer Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Reflex Enhancer Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Will Enhancer Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><em>Replacements</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Brawny Arm Prosthesis</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Celerity Leg Prosthesis</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Detachable Eye</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Detachable Hand</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Hardy Torso Prosthesis</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Intuitive Facial Prosthesis</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Magnetic Arm Enhancement</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Surveillance Implant</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Hawkeye Ocular Package</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Infiltration Package</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Iridonian Grav-Lev Arm</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Nighthawk Ocular Implant</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Survival and Surveillance Implant</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Czerka Variable Claw-Hand Multitool</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">High-Grade Cybernetic Arm</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">High-Grade Cybernetic Legs</font></td><td><font style=\"color:blue\">Prototype</font></td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:blue\">Microphasic Hypervisor</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Survival and Surveillance Implant Mk II</font></td><td><font style=\"color:blue\">Prototype</font></td></tr></tbody></table>\n\n<h4>Active Camouflage Core</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 13</em><br>\n\n<p>As an action, you can activate this augmentation to cast the <em>infiltrate</em> tech power targeting yourself. Intelligence is your tech casting ability for this power, and if you cast it using this augmentation, it does not require concentration. </p>\n\n<p><strong>Side Effect:</strong> While this augmentation is active, your speed is reduced by 10. Additionally, it fails to activate if you are submerged in water or other liquids.</p>\n\n<p><em>This internal augmentation can be activated to project a distortion field that bends visual light.</em></p>\n\n<h4>Armament and Defense Library</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 13</em><br>\n\n<p>You gain proficiency in all simple and martial weapons, all armor, and the Piloting skill. Additionally, when you make an Intelligence check to recall or discern information about a weapon, piece of armor, or a military vehicle that this library contains information on, you are considered proficient in the check.</p>\n\n<p><strong>Side Effect:</strong> This aggressively effective library can make it difficult to focus in stressful situations. You have disadvantage on Constitution saving throws to maintain concentration. Additionally, you have disadvantage on ability checks while concentrating on a power.</p>\n\n<p><em>This small and unassuming electronic module installed in the parietal lobe contains a massive library of information pertaining to weapons, armor, droids, and every other defense system known to the galaxy at large. Even rare or obscure pieces of technology are described here, offering a unique perspective on the universe - if you can handle it.</em></p>\n\n\n\n<h4>Automated Adrenal Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 15</em><br>\n\n<p>Once on your turn, you can activate this implant to gain the effects of an adrenal (no action required). This effect lasts for one minute, or until a different adrenal is chosen. You can choose from the following types of adrenals:</p>\n\n<hr>\n\n<ul><li><strong>Strength Adrenal:</strong> You gain a +1 bonus to the damage rolls of melee weapon attacks, and your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</li><li><strong>Alacrity Adrenal:</strong> You gain a +1 bonus to the damage rolls of ranged weapon attacks, and your speed increases by 10 feet. </li><li><strong>Stamina Adrenal:</strong> You gain 2 temporary hit points and a +2 bonus to Constitution saving throws. </li></ul>\n\n<p><strong>Side Effect:</strong> You can no longer benefit from other adrenals. </p>\n\n<p><em>This clear plasti-polymer implant has an appearance vaguely resembling a multi-limbed cephalopod, and must be carefully installed by a master cybertech. It attaches by wrapping around the medulla, and produces a variety of combat adrenals for its user's consumption. It also performs blood-cleansing work to reduce the liver damage (for species that have a liver) caused by long-term adrenal use.</em></p>\n\n<h4>Brawny Arm Prosthesis</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces an arm.</p>\n\n<p>When you make an ability check, attack roll, or saving throw using Strength using only this arm, your Strength score is treated as 15. When you make an ability check, attack roll, or saving throw using Strength using more than just this arm, you take the average of the arm's Strength score and your own.</p>\n\n<p><strong>Side Effect:</strong> When you roll a 1 on an ability check, attack roll, or saving throw using Strength with this arm, it seizes up, becoming unusable until the start of your next turn.</p>\n\n<p><em>These arm replacements are popular with the less exercise-inclined.</em></p>\n\n<h4>Celerity Leg Prosthesis</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces both legs.</p>\n\n<p>When determining your bonus to AC and saving throws from Dexterity, your Dexterity score is treated as 15. Additionally, you can substitute this score for your own whenever you make an ability check or attack roll that uses your legs. If your Dexterity score is already equal to or greater than 15, it has no effect on you. </p>\n\n<p><strong>Side Effect:</strong> When you roll a 1 an ability check, attack roll, or saving throw using Dexterity that involves these legs, they seize up, reducing your speed to 0 until the start of your next turn.</p>\n\n<p><em>This leg replacement is common for those travelers interested in making a quick getaway.</em></p>\n\n<h4>Charisma Enhancement (Basic)</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Charisma 11</em><br>\n\n<p>Your Charisma score increases by 1, to a maximum of 20.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Charisma (chosen by the GM) decreases by 1.</p>\n\n<h4>Charming Noble Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Charisma 15</em><br>\n\n<p>Your Charisma score increases by 1, and your maximum for this score increases by 1. Additionally, you have advantage on Charisma saving throws.</p>\n\n<p><strong>Side Effect:</strong> One ability score (other than Charisma) that is chosen by the DM when this augmentation is installed decreases by 1.</p>\n\n<p><em>This implant drastically increases your force of personality.</em></p>\n\n<h4>Constitution Enhancement (Basic)</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 11</em><br>\n\n<p>Your Constitution score increases by 1, to a maximum of 20.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Constitution (chosen by the GM) decreases by 1.</p>\n\n<h4>Czerka Variable Claw-Hand Multitool</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 13</em><br>\n\n<p>This augmentation replaces a hand.</p>\n\n<p>As a bonus action, you can transform this claw-hand into one of the following items of your choice, or back its default claw-hand state. While your claw-hand is transformed, you are considered to be proficient in the item it is replicating, if you are not already:   - Security kit  - Artisan tools (one set, chosen at the time this augmentation is installed)  - Commlink  - Fusion cutter  - Grappling hook (with 50 feet of fibercord cable)  - Hydrospanner  - Traumakit  - Repair kit  - Hidden blade <em>(martial vibroweapon)</em>  - Hold out <em>(simple blaster)</em>  - Medium shield generator <em>(medium armor)</em></p>\n\n<p>For items that have charges such as the repair kit, you regain all expended charges at the end of a long rest. For items that use power cells, you can reload those with power cells normally.  </p>\n\n<p><strong>Side Effect:</strong> Once this hand replacement has been installed, you can no longer wield weapons in this hand other than those this augmentation can transform into. </p>\n\n<p><em>The CVCM hand replacement appears to be a simple claw, but it contains a startling variety of tools, transforming to become whatever gadget is needed at the moment.</em> </p>\n\n\n\n<h4>Daring Acrobat Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Dexterity 15</em><br>\n\n<p>Your Dexterity score increases by 1, and your maximum for this score increases by 1. Additionally, you have advantage on Dexterity saving throws.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Dexterity (chosen by the GM) decreases by 1.</p>\n\n<p><em>This implant drastically increases your fine motor skills and reaction times.</em> </p>\n\n<h4>Detachable Eye</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces an eye.</p>\n\n<p>As an action, you can remove or replace this eye. While removed, the eye sprouts eight small legs, has a speed of 15 feet, an AC of 10, and 1 hit point. As an action on each of your turns, you can move the eye up to its speed as long as it is within 30 feet of you. You can see through both the detached eye and your remaining eye at the same time, or you can use your action to see through only one eye or the other.</p>\n\n<p><strong>Side Effect:</strong> While the eye is removed, you have disadvantage on Intelligence (Investigation) and Wisdom (Perception) checks that rely on sight beyond 5 feet.</p>\n\n<p><em>This eye replacement is a favored tool for the augmented spy.</em></p>\n\n<h4>Detachable Hand</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces a hand.</p>\n\n<p>As an action, you can attach or detach this hand. While detached, the hand has a speed of 15 feet, an AC of 10, and 1 hit point. As an action on each of your turns, you can control the hand as long as it is within 30 feet of you. You can use the hand to manipulate an object, open an unlocked door or container, stow or retrieve an item from an open container, or pour the contents out of a container. You can move the hand up to its speed each time you use it.</p>\n\n<p><strong>Side Effect:</strong> This hand can no longer wield items that weigh more than 7 lbs.</p>\n\n<p><em>This unique hand replacement is a favored option for those looking into places they aren't welcome.</em></p>\n\n<h4>Dexterity Enhancement (Basic)</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Dexterity 11</em><br>\n\n<p>Your Dexterity score increases by 1, to a maximum of 20.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Dexterity (chosen by the GM) decreases by 1.</p>\n\n<h4>Fortitude Enhancer Mk I</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Strength 13</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Strength saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Strength saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n<h4>Fortitude Enhancer Mk II</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 13</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Constitution saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Constitution saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n<h4>Fortitude Enhancer Mk III</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Strength and Constitution 15</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Strength or Constitution saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Strength or Constitution saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n<h4>Hardy Torso Prosthesis</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces your torso.</p>\n\n<p>Your Constitution score becomes 13. If your Constitution score is already equal to or greater than 13, it has no effect on you. Additionally, you have advantage on saving throws against poison.</p>\n\n<p><strong>Side Effect:</strong> When you roll a 1 a Constitution saving throw to avoid exhaustion, you suffer 2 levels of exhaustion, instead of just 1.</p>\n\n<p><em>For the wary traveler who is desperately afraid of poison.</em></p>\n\n<h4>Hawkeye Ocular Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 13</em><br>\n\n<p>This augmentation replaces your eyes.</p>\n\n<p>You can activate or deactivate this augmentation as a bonus action. While this augmentation is active, you gain advantage on Wisdom (Perception) checks that rely on sight beyond 30 feet. In conditions of clear visibility, you can make out details of even extremely distant creatures and objects as small as 2 feet across.</p>\n\n<p><strong>Side Effect:</strong> While this augmentation is active, you have disadvantage on Wisdom (Perception) and Intelligence (Investigation) checks within 30 feet that rely on sight.</p>\n\n<p><em>This eye replacement features integrated macrobinoculars, granting improved ability to see further away.</em></p>\n\n\n\n<h4>Hidden Compartment Blaster</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This implant includes a small hidden blaster that is completely shielded and hidden from unenhanced investigation. You cannot use this hidden blaster until it is revealed. As a bonus action, you can reveal this weapon and make a single ranged weapon attack with it. You have proficiency with this weapon for this attack. It deals 1d4 energy damage on a hit, has a range of 20/60, and the light and reload 4 properties.</p>\n\n<p><strong>Side Effect:</strong> Reloading this weapon takes longer than usual. You can reload and re-conceal this weapon over one hour, which can be done during a short rest. This hidden compartment can only fit the specific blaster with which it is paired.</p>\n\n<p><em>This augmentation hides a weapon in its wearer's forearm that is almost completely undetectable by modern sensors.</em></p>\n\n<h4>High-Grade Cybernetic Arm</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 13</em><br>\n\n<p>This augmentation replaces an arm.</p>\n\n<p>When you hit with a melee weapon attack using Strength with a weapon wielded by this arm, you gain a +1 bonus to the damage roll. Additionally, when you make a Strength (Athletics) check that involves this arm, you gain a +1 bonus to the check.</p>\n\n<p><strong>Side Effect:</strong> You have disadvantage on melee weapon attacks and ability checks using Dexterity that involve this arm.</p>\n\n<p><em>This arm replacement features enhanced strength.</em></p>\n\n<h4>High-Grade Cybernetic Legs</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 13</em><br>\n\n<p>This augmentation replaces both legs.</p>\n\n<p>You gain advantage on Strength ability checks and Strength saving throws, you can make a running long jump or a running high jump after moving only 5 feet on foot, rather than 10 feet, and your speed increases by 10 feet.  </p>\n\n<p><strong>Side Effect:</strong> Your powerful legs have difficulty moving quietly. You have disadvantage on Dexterity (Stealth) checks that rely on moving silently.</p>\n\n<p><em>This mechanical leg replacement increases speed and jumping height.</em></p>\n\n<h4>Indomitable Fortress Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p><em><strong>Prerequisite:</strong> Constitution 15</em> Your Constitution score increases by 1, and your maximum for this score increases by 1. Additionally, you have advantage on Constitution saving throws.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Constitution (chosen by the GM) decreases by 1.</p>\n\n<p><em>This implant drastically increases your endurance.</em> </p>\n\n<h4>Infiltration Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This augmentation replaces a hand.</p>\n\n<p>This implant appears to be a standard cybernetic mechanical arm, but conceals a security kit and a slicer's kit. Additionally, you can also use an action to cast <em>release</em> at 2nd level without expending tech points or use of a tech focus. Intelligence is your techcasting ability for this power. Once you've done so, you can't do so again until you complete a long rest.</p>\n\n<p><strong>Side Effect:</strong> This hand can no longer wield items that weigh more than 7 lbs.</p>\n\n<p><em>This fully cybernetic hand replacement contains a hidden array of infiltration tools optimized for defeating a wide variety of security barriers.</em></p>\n\n<h4>Integrated Subdermal Armor</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>When you aren't wearing armor, your AC becomes 13 + your Dexterity modifier. </p>\n\n<p><strong>Side Effect:</strong> Each time you take damage while you aren't wearing armor, your speed decreases by 5 feet until the start of your next turn.</p>\n\n<p><em>This implant reinforces your skin with an ablative woven alloy, making you difficult to damage.</em></p>\n\n<h4>Integrated Subdermal Armor Mk II</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>When you aren't wearing armor, your AC becomes 14 + your Dexterity modifier. </p>\n\n<p><strong>Side Effect:</strong> Each time you take damage while you aren't wearing armor, your speed decreases by 5 feet until the start of your next turn.</p>\n\n<p><em>This implant reinforces your skin with a high-strength cortosis reinforcement, making you very difficult to damage.</em></p>\n\n<h4>Intelligence Enhancement (Basic)</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 11</em><br>\n\n<p>Your Intelligence score increases by 1, to a maximum of 20.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Intelligence (chosen by the GM) decreases by 1.</p>\n\n<h4>Intuitive Facial Prosthesis</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces your face.</p>\n\n<p>Your Intelligence score becomes 13. If your Intelligence score is already equal to or greater than 13, it has no effect on you. Additionally, you can add half your proficiency bonus (rounded down) to any Intelligence check you make that doesn't already include your proficiency bonus.</p>\n\n<p><strong>Side Effect:</strong> When you roll a 1 an Intelligence saving throw, the implant stutters, causing any ability checks in which you are proficient you make before the start of your next turn to not include your proficiency bonus.</p>\n\n<p><em>This facial prosthetic includes a solid state drive, allowing for quick recall.</em></p>\n\n\n\n<h4>Iridonian Grav-lev Arm</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 13</em><br>\n\n<p>This augmentation replaces a hand.</p>\n\n<p>Your unarmed strikes with this arm deal 1d4 ion damage, and your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples. Additionally, you deal double damage to energy-based structures with your unarmed strikes.</p>\n\n<p><strong>Side Effect:</strong> You can no longer wield weapons with electronic components, such as blasters, vibroweapons, or lightweapons. Additionally, if this hand interacts with a small electronic device, such as a datapad or commlink, it is immediately disabled.</p>\n\n<p><em>This cybernetic arm replacement increases a user's physical strength and can be overloaded to release a unique field resonance discharge that is particularly effective against containment fields and makes holding on to hydrospanners a breeze.</em></p>\n\n<h4>Magnetic Forearm Enhancement</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces a forearm.</p>\n\n<p>Unarmed strikes with this hand have the reach property.</p>\n\n<p><strong>Side Effect:</strong> When you roll a 1 on an ability check, attack roll, or saving throw with this arm, the hand disconnects and falls to the ground. It can be picked up and replaced as a bonus action.</p>\n\n<p><em>This hand replacement creates a magnetic connection between the hand and forearm, emitting a minor hum.</em></p>\n\n<h4>Microphasic Hypervisor</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Constitution 13</em><br>\n\n<p>This augmentation replaces your eyes.</p>\n\n<p>You can activate or deactivate this implant as a bonus action. While active, you have truesight to a range of 30 feet.</p>\n\n<p><strong>Side Effect:</strong> While active, you have disadvantage on Wisdom (Perception) checks beyond 30 feet.</p>\n\n<p><em>This augmentation is a large, boxy eye replacement that covers both eyes with digital optic feeds and high resolution sensors.</em></p>\n\n<h4>Mighty Athlete Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Strength 15</em><br>\n\n<p>Your Strength score increases by 1, and your maximum for this score increases by 1. Additionally, you have advantage on Strength saving throws.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Strength (chosen by the GM) decreases by 1.</p>\n\n<p><em>This implant drastically increases your physical capacities.</em> </p>\n\n<h4>Nighthawk Ocular Implant</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 13</em><br>\n\n<p>This augmentation replaces your eyes.</p>\n\n<p>You can activate or deactivate this implant as a bonus action. While active, you gain darkvision to a range of 120 feet.</p>\n\n<p><strong>Side Effect:</strong> While active and in bright light, you have disadvantage on attack rolls, as well as on Wisdom (Perception) checks that rely on sight.</p>\n\n<h4>Quick Savant Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 15</em><br>\n\n<p>Your Intelligence score increases by 1, and your maximum for this score increases by 1. Additionally, you have advantage on Intelligence saving throws.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Intelligence (chosen by the GM) decreases by 1.</p>\n\n<p><em>This implant drastically increases your mental capacities.</em> </p>\n\n<h4>Reflex Enhancer Mk I</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 13</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Intelligence saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Intelligence saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n<h4>Reflex Enhancer Mk II</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Dexterity 13</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Dexterity saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n<h4>Reflex Enhancer Mk III</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Dexterity and Intelligence 15</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Dexterity or Intelligence saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Dexterity or Intelligence saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n\n\n<h4>Skills Enhancement Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 15</em><br>\n\n<p>When you make an ability check using a skill you are proficient in, you can roll a d4 and add the result to your total. </p>\n\n<p><strong>Side Effect:</strong> When you make an ability check using a skill you are not proficient in, you must roll a d4 and subtract the result from the total.</p>\n\n<p><em>This implant includes a library of situational information that it injects directly into your consciousness.</em></p>\n\n<h4>Strength Enhancement (Basic)</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Strength 11</em><br>\n\n<p>Your Strength score increases by 1, to a maximum of 20.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Strength (chosen by the GM) decreases by 1.</p>\n\n<h4>Surveillance Implant</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This augmentation replaces your face.</p>\n\n<p>This implant includes a headcomm with a scrambler that automatically encodes messages sent to a specified recipient commlink or receiver.</p>\n\n<p><strong>Side Effect:</strong> You can not use portable personal devices used for communication or jamming, such as a commlink or holotrace device, due to interference with this implant.</p>\n\n<p><em>This augmentation appears as a crescent around one eye paired with two small dots above the eyebrow.</em></p>\n\n<h4>Survival and Surveillance Implant</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 13</em><br>\n\n<p>This augmentation replaces your eyes and face.</p>\n\n<p>This implant contains several tools for long-term survival and reconnaissance. As a bonus action, you can activate one of the below modes that enable you to use several of these tools at once. Only one mode can be active at a time.</p>\n\n<hr>\n\n<ul><li><strong>Communications Mode:</strong> This communications suite includes a headcomm with a scrambler that automatically encodes messages sent to a specified recipient commlink or receiver. While this mode is active, you cannot be deafened.</li><li><strong>Interceptor Mode:</strong> This is a jamming and electronic warfare suite that includes a comm jammer, a holotrace device and pocket scrambler.</li><li><strong>Respirator Mode:</strong> This includes a basic respirator that grants advantage on saving throws made to avoid being poisoned and resistance to poison damage. </li></ul>\n\n<p><strong>Side Effect:</strong> This complex interface causes significant interference with other communication devices, rendering them impossible to use. While this implant is installed, you can not use any portable device used for communication or jamming, such as a commlink or holotrace device.</p>\n\n<p><em>Frequently used by scouts and corporate espionage specialists, this imposing implant covers nearly the entire left half of the face, and includes a series of tools for long-term survival in hostile conditions.</em> </p>\n\n<h4>Survival and Surveillance Implant Mk II</h4>\n\n<em><strong>Cybernetic augmentation</strong> (replacement), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Intelligence 15</em><br>\n\n<p>This augmentation replaces your eyes and face.</p>\n\n<p>This implant contains several improved tools for long-term survival and reconnaissance. As a bonus action, you can activate one of the below modes that enable you to use several of these tools at once. Only one mode can be active at a time.</p>\n\n<hr>\n\n<ul><li><strong>Communications Mode:</strong> This communications suite includes a headcomm with a scrambler that automatically encodes messages sent to a specified recipient commlink or receiver. While this mode is active, you cannot be deafened. Additionally, if you listen to any spoken language for 10 minutes, the software in this package will begin to attempt to decipher it. Make an Intelligence (Lore) check, DC determined by the GM depending on the rarity of the language. On a success, you can understand the spoken form of this language, and speak it if your species' vocal capabilities allow for it.</li><li><strong>Interceptor Mode:</strong> This is a jamming and electronic warfare suite that includes a comm jammer, a holotrace device and pocket scrambler. Additionally, you can attempt to listen in on nearby audio communications chatter such as from a comlink or holocomm as an action. Make an Intelligence (Technology) check, DC determined by the GM depending on the sophistication of the technology. On a success, you can hear electronic communications originating from within 100 feet.</li><li><strong>Respirator Mode:</strong> This includes a basic respirator that grants advantage on saving throws made to avoid being poisoned and resistance to poison damage. Additionally, you do not need air to breathe, allowing you to survive even in vacuum for up to 1 hour.</li></ul>\n\n<p><strong>Side Effect:</strong> This complex interface causes significant interference with other communication devices, rendering them impossible to use. While this implant is installed, you can not use any portable device used for communication or jamming, such as a commlink or holotrace device.</p>\n\n<p><em>This sleek, stark white device adorned with a small antenna attaches to the back of the otherwise bulky S3 module.</em></p>\n\n<h4>Will Enhancer Mk I</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Charisma 13</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Charisma saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Charisma saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n\n\n<h4>Will Enhancer Mk II</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Wisdom 13</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Wisdom saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Wisdom saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n<h4>Will Enhancer Mk III</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Wisdom and Charisma 15</em><br>\n\n<p>When you are subjected to an effect that allows you to make a Wisdom or Charisma saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<p><strong>Side Effect:</strong> When you fail a Wisdom or Charisma saving throw, you treat the damage as if the source had rolled the maximum.</p>\n\n<h4>Wisdom Enhancement (Basic)</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Wisdom 11</em><br>\n\n<p>Your Wisdom score increases by 1, to a maximum of 20.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Wisdom (chosen by the GM) decreases by 1.</p>\n\n<h4>Wise Sage Package</h4>\n\n<em><strong>Cybernetic augmentation</strong> (enhancement), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Wisdom 15</em><br>\n\n<p>Your Wisdom score increases by 1, and your maximum for this score increases by 1. Additionally, you have advantage on Wisdom saving throws.</p>\n\n<p><strong>Side Effect:</strong> One ability score other than Wisdom (chosen by the GM) decreases by 1.</p>\n\n<p><em>This implant drastically increases your aural awareness.</em> </p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Droid Customizations</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Parts</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Blaster Integration</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Four-Armed Combatant</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Humanoid Replicant</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Leg Reinforcement</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Manipulator Upgrade</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Mechanic</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Medic</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Power Supply Port</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Reinforced Chassis</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Repulsor Lifts (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Resourceful Drive</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Sentry</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Tool Integration</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Versatility Motivator</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Vocoder (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Mighty Build</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Repulsor Lifts (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Shock Arm</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Vocoder (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Droid Dura Plating Mk I</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Repulsor Lifts (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Vocoder (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Droid Dura Plating Mk II</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Repulsor Lifts (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Vocoder (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Droid Dura Plating Mk III</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Repulsor Lifts (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Vocoder (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Repulsor Lifts (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Vocoder (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><em>Protocols</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Interface Protocol</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Interfaced Assistance Protocol</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Interfaced Crafting Protocol</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Interfaced Distraction Protocol</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Interfaced Healing Protocol</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Interfaced Tracking Protocol</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Analysis Protocol</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Enhanced Reconstructor</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Fortitude Protocol Mk I</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Reflex Protocol Mk I</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Uncanniness Motivator</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Will Protocol Mk I</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:purple\">Fortitude Protocol Mk II</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Reflex Protocol Mk II</font></td><td><font style=\"color:purple\">Advanced</font></td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:purple\">Will Protocol Mk II</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:red\">Fortitude Protocol Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Reflex Protocol Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Will Protocol Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Analysis Protocol</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class I droid</em></font><br>\n\n<p>You know the <em>detect enhancement</em> and <em>toxin scan</em> tech powers. You can cast each power once per day. Intelligence is your techcasting ability for these powers. You do not require use of a wristpad for these powers.</p>\n\n<h4>Blaster Integration</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You can now integrate a single simple or martial blaster into your droid chassis. Over the course of a short or long rest, you can insert and integrate this blaster into your frame. As a bonus action, you can open or close a small hatch located somewhere on your droid body, permitting you to wield and fire the weapon normally when you want to attack with it. While the hatch is open, your hands are not considered occupied by this blaster. All other rules and conditions apply normally as if you were wielding this blaster in either one or two hands (your choice). </p>\n\n<h4>Droid Dura Plating Mk I</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Proficiency with heavy armor</em><br>\n\n<p>Your base AC becomes 19. </p>\n\n<p><em>Originally used on starship hulls, durasteel is the most cost-effective way to prevent the destruction of your droids.</em></p>\n\n<h4>Droid Dura Plating Mk II</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Proficiency with heavy armor</em><br>\n\n<p>Your base AC becomes 20.</p>\n\n<p><em>Originally used on starship hulls, durasteel is the most cost-effective way to prevent the destruction of your droids.</em></p>\n\n<h4>Droid Dura Plating Mk III</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Proficiency with heavy armor</em><br>\n\n<p>Your base AC becomes 21. </p>\n\n<p><em>Originally used on starship hulls, durasteel is the most cost-effective way to prevent the destruction of your droids.</em></p>\n\n<h4>Enhanced Reconstructor</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class IV droid</em></font><br>\n\n<p>Whenever you roll a Hit Die to recover hit points, you add your Intelligence modifier to the roll (minimum of +1).</p>\n\n\n\n<h4>Fortitude Protocol Mk I</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Strength saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<h4>Fortitude Protocol Mk II</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Constitution saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<h4>Fortitude Protocol Mk III</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Strength or Constitution saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<h4>Four-Armed Combatant</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class IV droid</em></font><br>\n\n<p>You install two additional arms which you can use independently of one another. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms your are benefiting from (no action required).</p>\n\n<p>While you have at least 3 arms free, you have a climbing speed equal to your walking speed.</p>\n\n<h4>Humanoid Replicant</h4>\n\n<em><strong>Droid customization</strong> (part), standard</em><br>\n\n<em><strong>Prerequisite:</strong> Humanoid proportions</em><br>\n\n<p>Your droid gains an exterior layer that makes it indistinguishable from a species of your choice of the same size. Additionally, you have advantage on checks made to conceal your nature, and scanners of standard rarity or lower automatically fail to determine that you are a droid.</p>\n\n<h4>Interface Protocol</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You become a valid target for the <em>tracker droid interface</em> tech power. </p>\n\n<h4>Interfaced Assistance Protocol</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While you are interfaced via the <em>tracker droid interface</em> tech power, whenever your handler has advantage on an ability check or attack roll granted by you taking the Help action, they can reroll one of the dice once.</p>\n\n<h4>Interfaced Crafting Protocol</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While you are interfaced via the <em>tracker droid interface</em> tech power, whenever your handler makes an ability check using tools with which the you are also proficient, they have advantage on the check. If they already have advantage, they can instead reroll one of the dice once.</p>\n\n<h4>Interfaced Distraction Protocol</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While you are interfaced via the <em>tracker droid interface</em> tech power, when you are within 5 feet of a target, your handler does not provoke opportunity attacks when moving out of that creature's reach.</p>\n\n<h4>Interfaced Healing Protocol</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While you are interfaced via the <em>tracker droid interface</em> tech power, when your handler restores hit points to a creature that is within 5 feet of you, they can roll the dice twice and take either total.</p>\n\n<h4>Interfaced Tracking Protocol</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While you are interfaced via the <em>tracker droid interface</em> tech power, when your handler makes a Wisdom (Survival) check to track a target, and you are also tracking that target, your handler gains advantage on the check. If they already have advantage, they can instead reroll one of the dice once.</p>\n\n<h4>Leg Reinforcements</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>\n\n<h4>Manipulator Upgrade</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class II droid</font></em><br>\n\n<p>You lose the Undersized special trait.</p>\n\n<h4>Mechanic</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can activate the repair tools, choosing one of the following options:</p>\n\n<ul><li>You can stabilize a droid within 5 feet of you that has 0 hit points, without needing to make an Intelligence (Technology) check.</li><li>You can restore 2d4+2 hit points to a droid or construct within 5 feet.</li></ul>\n\n<p>You can use each feature once. You regain all expended uses when you complete a long rest.</p>\n\n<p><em>This part equips the droid with a series of machine repair tools.</em></p>\n\n\n\n<h4>Medic</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can activate the medical kit, choosing one of the following options:</p>\n\n<ul><li>You can stabilize a creature within 5 feet of you that has 0 hit points, without needing to make a Wisdom (Medicine) check.</li><li>You can restore 1d4+1 hit points to a creature within 5 feet.</li><li>You can cure a target of one poison affecting them or to give them advantage on saving throws against poison for 1 hour.</li></ul>\n\n<p>This medical kit has no effect on droids or constructs. You can use each feature once. You regain all expended uses when you complete a long rest.</p>\n\n<p><em>This part equips the droid with a compact medical kit.</em></p>\n\n<h4>Mighty Build</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class V droid</em><br>\n\n<p>Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>\n\n<h4>Power Supply Port</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class V droid</em></font><br>\n\n<p>You gain the ability to charge expended power cells and power generators within your reach. You have a charging capacity of 1 hour. You can spend 10 minutes of this charging capacity to replenish an expended power cell, or 1 hour replenishing an expended power generator. Alternatively, you can directly connect to and power a single blaster weapon that uses power cells or power generators. Once per turn, if the powered weapon would be reloaded, it can be done without using an action, instead expending 10 minutes of your charging capacity if it uses power cells or 1 hour if it uses a power generator. Connecting or disconnecting a weapon takes an action. </p>\n\n<p>If you attempt to replenish an enhanced power cell or power generator, or a specialized power cell, it loses its enhanced or specialized properties.</p>\n\n<h4>Reflex Protocol Mk I</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Intelligence saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<h4>Reflex Protocol Mk II</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<h4>Reflex Protocol Mk III</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Dexterity or Intelligence saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<h4>Reinforced Chassis</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You've reinforced your chassis. When you don't have armor integrated, your AC is 13 + your Dexterity modifier.</p>\n\n<h4>Repulsor Lifts (Basic)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\">standard</font></em></br>\n\n<p>Repulsor lifts are a form of rocket propulsion affixed to the lower part of a droid's chassis. Activating or deactivating the repulsors requires a bonus action and, while active, you have a flying speed of 25 feet. The repulsor lifts last for 1 minute. Once they've been used, they can't be used again until an hour has passed.</p>\n\n<h4>Repulsor Lifts (Champion)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Repulsor lifts are a form of rocket propulsion affixed to the lower part of a droid's chassis. Activating or deactivating the repulsors requires a bonus action and, while active, you have a flying speed of 50 feet. The repulsor lifts last for 1 minute. Once they've been used, they can't be used again until an hour has passed.</p>\n\n<h4>Repulsor Lifts (Exceptional)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>Repulsor lifts are a form of rocket propulsion affixed to the lower part of a droid's chassis. Activating or deactivating the repulsors requires a bonus action and, while active, you have a flying speed of 45 feet. The repulsor lifts last for 1 minute. Once they've been used, they can't be used again until an hour has passed.</p>\n\n<h4>Repulsor Lifts (Fine)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Repulsor lifts are a form of rocket propulsion affixed to the lower part of a droid's chassis. Activating or deactivating the repulsors requires a bonus action and, while active, you have a flying speed of 30 feet. The repulsor lifts last for 1 minute. Once they've been used, they can't be used again until an hour has passed.</p>\n\n<h4>Repulsor Lifts (Improved)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Repulsor lifts are a form of rocket propulsion affixed to the lower part of a droid's chassis. Activating or deactivating the repulsors requires a bonus action and, while active, you have a flying speed of 35 feet. The repulsor lifts last for 1 minute. Once they've been used, they can't be used again until an hour has passed.</p>\n\n\n\n<h4>Repulsor Lifts (Superior)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Repulsor lifts are a form of rocket propulsion affixed to the lower part of a droid's chassis. Activating or deactivating the repulsors requires a bonus action and, while active, you have a flying speed of 40 feet. The repulsor lifts last for 1 minute. Once they've been used, they can't be used again until an hour has passed.</p>\n\n<h4>Resourceful Drive</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class III droid</em></font><br>\n\n<p>Your speed increases by 5 feet, and you gain proficiency in one blaster or vibroweapon of your choice.</p>\n\n<h4>Sentry</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You learn the <em>alarm</em> tech power. You can cast it once, without the use of a wristpad and without spending tech points, and you regain the ability to do so when you finish a long rest. Intelligence is your techcasting ability for this power.</p>\n\n<p><em>This part equips a droid with a small rotating sensory dish.</em></p>\n\n<h4>Shock Arm</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class II droid</em><br>\n\n<p>You have a small integrated droid shock arm with which you can make unarmed strikes. You have proficiency in this shock arm, which is a vibroweapon with the reach property and deals 1d6 lightning damage on a hit. You can use your choice of Strength or Intelligence for the attack and damage rolls. You must use the same modifier for both rolls.</p>\n\n<p><em>This small robotic appendage has a fork-like prod from that can release a substantial electrical discharge.</em></p>\n\n<h4>Tool Integration</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>One tool of your choice in which you are proficient is integrated into your chassis.</p>\n\n<h4>Uncanniness Motivator</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class III droid</em></font><br>\n\n<p>When you or a creature you can see that can see and understand you makes an ability check, attack roll, or saving throw, you can roll a d4 and add it to their roll (no action required). You can use this before or after the roll, but before the GM determines the roll's outcome. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>\n\n<h4>Versatility Motivator</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Class I droid</em></font><br>\n\n<p>Your speed increases by 5 feet, and you can now speak Binary in addition to understanding it.</p>\n\n<h4>Vocoder (Basic)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>A vocoder is an adjustment to a droid's speech center. The vocoder includes five languages, and grants the droid the ability to speak, read, and write each language. The languages can be changed out while interfaced with a protocol droid or appropriate computer.</p>\n\n<h4>Vocoder (Champion)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>A vocoder is an adjustment to a droid's speech center. The vocoder includes all registered languages, and grants the droid the ability to speak, read, and write each language. </p>\n\n<h4>Vocoder (Exceptional)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>A vocoder is an adjustment to a droid's speech center. The vocoder includes 80 languages, and grants the droid the ability to speak, read, and write each language. The languages can be changed out while interfaced with a protocol droid or appropriate computer.</p>\n\n<h4>Vocoder (Fine)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>A vocoder is an adjustment to a droid's speech center. The vocoder includes 10 languages, and grants the droid the ability to speak, read, and write each language. The languages can be changed out while interfaced with a protocol droid or appropriate computer.</p>\n\n<h4>Vocoder (Improved)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>A vocoder is an adjustment to a droid's speech center. The vocoder includes 20 languages, and grants the droid the ability to speak, read, and write each language. The languages can be changed out while interfaced with a protocol droid or appropriate computer.</p>\n\n<h4>Vocoder (Superior)</h4>\n\n<em><strong>Droid customization</strong> (part), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>A vocoder is an adjustment to a droid's speech center. The vocoder includes 40 languages, and grants the droid the ability to speak, read, and write each language. The languages can be changed out while interfaced with a protocol droid or appropriate computer.</p>\n\n<h4>Will Protocol Mk I</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Charisma saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n\n\n<h4>Will Protocol Mk II</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Wisdom saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n<h4>Will Protocol Mk III</h4>\n\n<em><strong>Droid customization</strong> (protocol), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>When you are subjected to an effect that allows you to make a Wisdom or Charisma saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Focuses</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Force</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Focus Generator Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Focus Generator (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Focus Generator Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Focus Generator (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Focus Generator Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Focus Generator (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Focus Generator Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Focus Generator Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Focus Generator Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><em>Tech</em></td><td></td></tr><tr><td><font style=\"color:#4a5568\">Wristpad Chassis (Standard)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:green\">Wristpad (Fine)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:green\">Wristpad Chassis (Premium)</font></td><td><font style=\"color:green\">Premium</font></td></tr><tr><td><font style=\"color:blue\">Wristpad (Improved)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:blue\">Wristpad Chassis (Prototype)</font></td><td><font style=\"color:blue\">Prototype</font></td></tr><tr><td><font style=\"color:purple\">Wristpad (Superior)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:purple\">Wristpad Chassis (Advanced)</font></td><td><font style=\"color:purple\">Advanced</font></td></tr><tr><td><font style=\"color:#dd6b20\">Wristpad Chassis (Legendary)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Wristpad Chassis (Artifact)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Focus Generator (Fine)</h4>\n\n<em><strong>Focus</strong> (focus), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +1 bonus to the force attack rolls for force powers you cast through this focus generator.</p>\n\n<h4>Focus Generator (Improved)</h4>\n\n<em><strong>Focus</strong> (focus), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +2 bonus to the force attack rolls for force powers you cast through this focus generator.</p>\n\n<h4>Focus Generator (Superior)</h4>\n\n<em><strong>Focus</strong> (focus), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +3 bonus to the force attack rolls for force powers you cast through this focus generator.</p>\n\n<h4>Focus Generator Chassis (Advanced)</h4>\n\n<em><strong>Focus</strong> (force), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable focus generator chassis comes with vacant modification slots for focus generator modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Focus Generator Chassis (Artifact)</h4>\n\n<em><strong>Focus</strong> (force), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable focus generator chassis comes with vacant modification slots for focus generator modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Focus Generator Chassis (Legendary)</h4>\n\n<em><strong>Focus</strong> (force), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable focus generator chassis comes with vacant modification slots for focus generator modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Focus Generator Chassis (Premium)</h4>\n\n<em><strong>Focus</strong> (force), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable focus generator chassis comes with vacant modification slots for focus generator modifications. It can house modifications of premium rarity or lower. </p>\n\n<h4>Focus Generator Chassis (Prototype)</h4>\n\n<em><strong>Focus</strong> (force), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable focus generator chassis comes with vacant modification slots for focus generator modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Focus Generator Chassis (Standard)</h4>\n\n<em><strong>Focus</strong> (force), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable focus generator chassis comes with vacant modification slots for focus generator modifications. It can house modifications of standard rarity.</p>\n\n\n\n<h4>Wristpad (Fine)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +1 bonus to the tech attack rolls for tech powers you cast through this wristpad.</p>\n\n<h4>Wristpad (Improved)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +2 bonus to the tech attack rolls for tech powers you cast through this wristpad.</p>\n\n<h4>Wristpad (Superior)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>You gain a +3 bonus to the tech attack rolls for tech powers you cast through this wristpad.</p>\n\n<h4>Wristpad Chassis (Advanced)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable wristpad chassis comes with vacant modification slots for wristpad modifications, as well as one augment slot. It can house modifications of advanced rarity or lower.</p>\n\n<h4>Wristpad Chassis (Artifact)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable wristpad chassis comes with vacant modification slots for wristpad modifications, as well as two augment slots. It can house modifications of artifact rarity or lower.</p>\n\n<h4>Wristpad Chassis (Legendary)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable wristpad chassis comes with vacant modification slots for wristpad modifications, as well as two augment slots. It can house modifications of legendary rarity or lower.</p>\n\n<h4>Wristpad Chassis (Premium)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable wristpad chassis comes with vacant modification slots for wristpad modifications. It can house modifications of premium rarity or lower.</p>\n\n<h4>Wristpad Chassis (Prototype)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable wristpad chassis comes with vacant modification slots for wristpad modifications, as well as one augment slot. It can house modifications of prototype rarity or lower.</p>\n\n<h4>Wristpad Chassis (Standard)</h4>\n\n<em><strong>Focus</strong> (tech), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Requires attunement</strong></em><br>\n\n<p>This modifiable wristpad chassis comes with vacant modification slots for wristpad modifications. It can house modifications of standard rarity.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Item Modifications (Armor)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#4a5568\">Agile Arm