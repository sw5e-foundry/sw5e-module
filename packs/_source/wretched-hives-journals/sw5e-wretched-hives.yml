        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Detect poison or impurities in a drink</td><td>10</td></tr><tr><td>Identify alcohol</td><td>15</td></tr><tr><td>Ignore effects of alcohol</td><td>20</td></tr></tbody></table>

        <h2>Chef's Kit</h2>

        <p>This kit includes all of the necessary implements to prepare and serve food to up to six people. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to identify food. Also, proficiency with this kit is required to create field rations.</p>

        <h4>Lore</h4>

        <p>Your knowledge of cooking techniques allow you to assess the social patterns involved in a culture's eating habits.</p>

        <h4>Medicine</h4>

        <p>When administering treatment, you can transform medicine that is bitter or sour into a pleasing concoction.</p>

        <h4>Survival</h4>

        <p>When foraging for food, you can make do with ingredients you scavenge that others would be unable to transform into nourishing meals.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 chef's </p>

        <h4>Prepare Meals</h4>

        <p>As part of a short rest, you can prepare a tasty meal that helps your companions regain their strength. You and up to five creatures of your choice regain 1 extra hit point per Hit Die spent during a short rest, provided you have access to your chef's kit and sufficient food.</p>

        <p>During a long rest, you can prepare and serve a meal that helps you and your allies recover from the rigors of adventuring, provided you have suitable food, chef's kit, and other supplies on hand. The meal serves up to six people, and each person who eats it regains two additional Hit Dice at the end of the long rest. In addition, those who partake of the meal have advantage on Constitution saving throws against disease for the next 24 hours.</p></blockquote>

