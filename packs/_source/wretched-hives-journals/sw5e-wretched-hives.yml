        <h3>Slythmonger</h3>

        <p>Over the course of a short or long rest, you can make a DC 15 spicer's kit check to temporarily hone or reduce the addictive properties of a spice within reach. To use this benefit, you must have a spicer's kit, and the spice must be within reach. If a creature consumes the spice before the end of your next short or long rest, they have advantage or disadvantage (your choice) on the saving throws made to avoid the low and addiction.</p>

