 8 hours, during which they must roll a d12 and subtract the result when making an ability check, attack roll, or saving throw using Wisdom. At the end of the low, the creature must make a DC 24 Wisdom saving throw to resist addiction.</p>\n\n<h4>Yaladai (Fine)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Yaladai is a powerful stimulant that grants extreme clarity, improving relaxation and focus. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that increases their current and maximum force points by 2d4. At the end of the high, the creature must succeed on a DC 16 Wisdom saving throw or experience a low that lasts 1 hour, their current and maximum force points are reduced by 2d4. At the end of the low, the creature must make a DC 16 Constitution saving throw to resist addiction.</p>\n\n<h4>Yaladai (High Quality)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Yaladai is a powerful stimulant that grants extreme clarity, improving relaxation and focus. As an action, you can apply this substance to a creature within 5 feet. For the next 10 minutes, the creature experiences a high that increases their current and maximum force points by 2d8. At the end of the high, the creature must succeed on a DC 20 Wisdom saving throw or experience a low that lasts 4 hours, their current and maximum force points are reduced by 2d8. At the end of the low, the creature must make a DC 20 Constitution saving throw to resist addiction.</p>\n\n<h4>Yaladai (Potent)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Yaladai is a powerful stimulant that grants extreme clarity, improving relaxation and focus. As an action, you can apply this substance to a creature within 5 feet. For the next hour, the creature experiences a high that increases their current and maximum force points by 2d10. At the end of the high, the creature must succeed on a DC 22 Wisdom saving throw or experience a low that lasts 4 hours, their current and maximum force points are reduced by 2d10. At the end of the low, the creature must make a DC 22 Constitution saving throw to resist addiction.</p>\n\n<h4>Yaladai (Pure)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Yaladai is a powerful stimulant that grants extreme clarity, improving relaxation and focus. As an action, you can apply this substance to a creature within 5 feet. For the next hour, the creature experiences a high that increases their current and maximum force points by 2d12. At the end of the high, the creature must succeed on a DC 24 Wisdom saving throw or experience a low that lasts 8 hours, their current and maximum force points are reduced by 2d12. At the end of the low, the creature must make a DC 24 Constitution saving throw to resist addiction.</p>\n\n\n\n<h4>Yaladai (Uncut)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Yaladai is a powerful stimulant that grants extreme clarity, improving relaxation and focus. As an action, you can apply this substance to a creature within 5 feet. For the next 10 minutes, the creature experiences a high that increases their current and maximum force points by 2d6. At the end of the high, the creature must succeed on a DC 18 Wisdom saving throw or experience a low that lasts 1 hour, their current and maximum force points are reduced by 2d6. At the end of the low, the creature must make a DC 18 Constitution saving throw to resist addiction.</p>\n\n<h4>Yarrock (Fine)</h4>\n\n<em><strong>Consumable</strong> (substance), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Yarrock 