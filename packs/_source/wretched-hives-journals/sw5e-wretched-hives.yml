        <h2>Gaming Set</h2>

        <p>A gaming set has all the pieces needed to play a specific game or type of game, such as pazaak or sabacc.</p>

        <h4>Lore</h4>

        <p>Your mastery of a game includes knowledge of its history, as well as of important events it was connected to or prominent historical figures involved with it.</p>

        <h4>Insight</h4>

        <p>Playing games with someone is a good way to gain understanding of their personality, granting you a better ability to discern their lies from their truths and read their mood.</p>

        <h4>Sleight of Hand</h4>

        <p>Sleight of Hand is a useful skill for cheating at a game, as it allows you to swap pieces, palm cards, or alter a die roll. Alternatively, engrossing a target in a game by manipulating the components with dexterous movements is a great distraction for a pickpocketing attempt.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p></blockquote>

