he force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Rendcasting Underlay Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw and a -1 penalty to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Rendcasting Underlay Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Rendcasting Underlay Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Rendcasting Underlay Mk IV</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Responsive Shielding Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the responsive 1 property. If it already has the responsive property, its responsive number increases by 1, to a maximum of 3.</p>\n\n<h4>Responsive Shielding Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the responsive 2 property. If it already has the responsive property, its responsive number increases by 2, to a maximum of 3.</p>\n\n<h4>Responsive Shielding Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the responsive 3 property. If it already has the responsive property, its responsive number increases to 3.</p>\n\n<h4>Shield Amplifier</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Shield generator</em><br>\n\n<p>You modify this shield generator to project outward. As a bonus action you can amplify this shield until the start of your next turn. Each creature within 5 feet of you gains a bonus to AC equal to this shield's bonus.</p>\n\n<p>You can use this feature twice. You regain all expended uses when you complete a short or long rest.</p>\n\n<h4>Shield Anchor</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Physical shield</em><br>\n\n<p>This shield gains the anchor property.</p>\n\n<h4>Silent Armoring</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Armor</em><br>\n\n<p>This armor gains the silent property.</p>\n\n<h4>Spiked Shielding</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequiste:</strong> Shield</em><br>\n\n<p>This shield gains the spiked (1d4) property. If it already has the spiked property, the spiked damage increases by one step (from d4 to d6, or from d6 to d8). </p>\n\n<h4>Spiked Shielding Mk II</h4>\n\n<em><strong>Item modi