  - name: 'Chapter 5: Equipment'
    _id: RneSbBvu3Vl9T32J
    text:
      content: "<h1>Chapter 5: Equipment</h1>\n\n\n\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style=\"font-variant: small-caps\">he cities of <em>Star Wars</em> are diverse and multicultural,</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; varying dramatically by planet and system. Commonplace activities in one city might be taboo in another. The most common species on one planet might be shunned on the next one. Every city, in addition to the climate and cultures, varies dramatically in the options available for sale.\n\n<p>In addition to those options available in the <em>Player's Handbook</em>, adventurers might encounter new and interesting wares. On some planets, and in some cultures, armor is made from unique materials that grant it interesting properties. On other planets, a more diverse armory might be available for purchase�or theft. In other places still, interesting and unique adventuring implements might be discovered.</p>\n\n<h4>Starting Equipment</h4>\n\n<p>When choosing the starting equipment for your class, you might have an option to choose any of a certain type of item. For instance, berserkers get a choice of \"<em>(a)</em> a martial vibroweapon and a light or medium physical shield or <em>(b)</em> two martial vibroweapons\". When choosing starting equipment in this fashion, the items available in this chapter should not be included. However, if you use instead use the Variant: Starting Wealth by Class rule, the items in this chapter should be considered available for purchase.</p>\n\n<h4>Ammunition</h4>\n\n<p>Blasters that deal energy or ion damage use power cells, while blasters that deal kinetic damage use slug cartridges. This chapter introduces blasters that deal new damage types: acid, fire, and sonic. These weapons also use power cells.</p>\n\n<h3>Buying and Selling Treasure</h3>\n\n<p>This chapter introduces armor, weapons, adventuring gear, and other valuable materials. Like those options found in the <em>Player's Handbook</em>, selling these items should generally be possible, provided they are unspoiled. </p>\n\n<h4>Enhanced Items</h4>\n\n<p>Enhanced items are scarce and powerful, leading to them rarely having a predetermined price. Buying and selling enhanced items can rarely be performed easily, often requiring extensive time and credits to find a potential buyer and seller. </p>\n\n<h4>Rare Materials</h4>\n\n<p>While rare materials, as the name indicates, are more scarce than their raw material counterparts, they typically have a commonly accepted value across markets. While they won't always be available for sale, they will usually fetch the same price across worlds.</p>\n\n<h2>Armor and Shields</h2>\n\n<p>Adventuring through the different worlds of <em>Star Wars</em> shows limitless variety across cultures, varying drastically by their values and technological availability. Many cultures create similar items, but using different materials, granting their items a unique flair. The Armor table shows some examples of how commonly available types of armor found in the game differ, depending on the materials used.</p>\n\n<p>The Armor table shows the cost, weight, and other properties of these types of armor worn in the worlds of <em>Star Wars</em>.</p>\n\n<h3>Armor and Shield Proficiency</h3>\n\n<p>Anyone can put on a suit of armor or wield a shield. Only those proficient in the armor's use know how to wear it effectively, however. Your class gives you proficiency with certain types of armor. If you wear armor that you lack proficiency with, you have disadvantage on any ability check, saving throw, or attack roll that involves Strength or Dexterity, and you can't force- or tech-cast.</p>\n\n<p>If you have proficiency in armor, you have proficiency in the appropriate shield as well.</p>\n\n<h3>Armor Class (AC)</h3>\n\n<p>Armor protects its wearer from attacks. The armor (and shield) you wear determines your Armor Class.</p>\n\n<h3>Armor Materials</h3>\n\n<p>In addition to form and function, armor varies greatly based on material. Beyond those standard materials universally available to armor, you might find armor made with more specialized and scarce materials. Armor made with these materials offers a unique strength, but also a weakness. Additionally, the armor's cost increases by an amount, based on the armor's type, as shown in the Armor Type Cost Increase table below:</p>\n\n<h5>Armor Type Cost Increase</h5>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Armor<br> Type</th><th>Cost<br> Increase</th></tr></thead><tbody><tr><td>Light armor</td><td>1,000 cr</td></tr><tr><td>Medium armor</td><td>2,000 cr</td></tr><tr><td>Heavy armor</td><td>6,000 cr</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Armor<br> Type</th><th>Cost<br> Increase</th></tr></thead><tbody><tr><td>Light shield</td><td>250 cr</td></tr><tr><td>Medium shield</td><td>750 cr</td></tr><tr><td>Heavy shield</td><td>1,500 cr</td></tr></tbody></table></div>\n\n<p>&emsp;Only physical shields can be crafted using alternative armor materials.</p>\n\n\n\n\n\n<h4>Beskar</h4>\n\n<p>Armor and shields made from beskar gains the regulated property, but also the strength 11 property. If the armor or shield would already have the strength property, instead increase the strength number by 2.</p>\n\n<h4>Bone</h4>\n\n<p>Bone armor and shields have the barbed (1d4) and spiked (1d4) properties, respectively, but suffer a -1 penalty to Armor Class.</p>\n\n<h4>Crystadium</h4>\n\n<p>Armor and shields made from crystadium has the absorptive 1 property, but also the rigid and imbalanced properties, respectively.</p>\n\n<h4>Durafiber</h4>\n\n<p>Durafiber armor and shields have the agile 1 property, but suffer a -1 penalty to Armor Class. </p>\n\n<h4>Duranium</h4>\n\n<p>Armor and shields made from duranium gain the reactive 1 and responsive 1 properties, respectively, but also the cumbersome property.</p>\n\n<h4>Durasteel</h4>\n\n<p>Durasteel armor has the impermeable and rigid properties. Durasteel shields have the interlocking and imbalanced properties.</p>\n\n<h4>Duravlex </h4>\n\n<p>Armor and shields made from duravlex have the silent and concealing properties, respectively, but suffer a -1 penalty to Armor Class.</p>\n\n<h4>Fleximetal</h4>\n\n<p>Fleximetal armor and shields gain the avoidant 1 property, but also the strength 11 property. If the armor or shield would already have the strength property, instead increase the strength number by 2.</p>\n\n<h4>Laminanium</h4>\n\n<p>Armor and shields made from laminanium gain the obscured and lambent properties, respectively, but also the cumbersome property.</p>\n\n<h4>Neutronium</h4>\n\n<p>Neutronium armor and shields gain the insulated 1 property, but also the strength 11 property. If the armor or shield would already have the strength property, instead increase the strength number by 2.</p>\n\n<h4>Plastoid</h4>\n\n<p>Armor made from plastoid has the reinforced and rigid properties. Shields made from plastoid have the anchor and imbalanced properties.</p>\n\n<h4>Quadanium</h4>\n\n<p>Quadanium armor and shields gain the charging 1 property, but also the cumbersome property.</p>\n\n<h3>Armor Properties</h3>\n\n<p>Many armors and shield have special properties related to their use, as shown in the Armor table. You must be proficient in and wearing armor or wielding a shield to benefit from its special properties.</p>\n\n<h4>Absorptive</h4>\n\n<p>When you are wearing armor or wielding a shield with the absorptive property, damage that you take from weapons is reduced by an amount equal to the absorptive number. If this would reduce the damage to 0, the damage is instead reduced to 1.</p>\n\n<h4>Agile</h4>\n\n<p>While wearing armor or wielding a shield with the agile property, you gain a bonus to Dexterity checks and Dexterity saving throws equal to the agile number, and you gain a bonus to your speed equal to 5 x the agile number.</p>\n\n<h4>Anchor</h4>\n\n<p>A shield with the anchor property can be used to provide cover. As an action, you can anchor or recover the shield. While anchored, you gain no benefit from a shield, and it does not require the use of a hand. Instead, while anchored, a light shield provides one-quarter cover, a medium shield provides half cover, and a heavy shield provides three-quarters cover.</p>\n\n<h4>Avoidant</h4>\n\n<p>When wearing armor or wielding a shield with the avoidant property and a creature makes an attack against you, the critical hit range decreases by an amount equal to the avoidant number, to a minimum of 1.</p>\n\n<h4>Barbed</h4>\n\n<p>When you succeed on a Strength (Athletics) check to initiate or maintain a grapple while wearing armor with the barbed property, the creature takes kinetic damage using the barbed damage (which appears in parentheses with the property) + your Strength modifier.</p>\n\n<h4>Charging</h4>\n\n<p>When you take damage while wearing armor or wielding a shield with the charging property, you gain a charge. You can store a maximum number of charges equal to the charging number, and the charges last for 1 minute. The next time you hit with a melee weapon attack while you have charges, you deal additional damage of the same type as the weapon's damage equal to the number of charges stored.</p>\n\n<h4>Concealing</h4>\n\n<p>While wielding a shield with the concealing property, you have advantage on Dexterity (Stealth) checks that rely on sight.</p>\n\n<h4>Cumbersome</h4>\n\n<p>While wearing armor or wielding a shield with the cumbersome property, your speed is reduced by 5.</p>\n\n\n\n<h4>Gauntleted</h4>\n\n<p>While wearing armor with the gauntleted property, your unarmed strikes deal kinetic damage using the gauntleted damage (which appears in parentheses with the property) + your Strength modifier.</p>\n\n<h4>Imbalanced</h4>\n\n<p>When you are critically hit while wielding this shield, you can't take reactions until the start of your next turn, and you gain no AC benefit from your shield against the next attack against you before the start of your next turn.</p>\n\n<h4>Impermeable</h4>\n\n<p>Armor with the impermeable property functions as an enviro-suit, flight suit, and water suit.</p>\n\n<h4>Insulated</h4>\n\n<p>While wearing armor or wielding a shield with the insulated property, you gain a bonus to AC and saving throws against effects that would deal ion or lightning damage equal to the insulated number.</p>\n\n<h4>Interlocking</h4>\n\n<p>While wielding a shield with the interlocking property within 5 feet of a friendly creature who is also wielding a shield with the interlocking property, you can both use your reactions to interlock the shields. While interlocked, both creatures gain a bonus to AC equal to the interlocking number. If at any point the creatures are more than 5 feet from eachother, the shields immediately de-interlock, and this effect ends.</p>\n\n<h4>Lambent</h4>\n\n<p>While wielding a shield with the lambent property, you can use a bonus action to activate or deactivate the shield's light. While active, the shield sheds bright light in a 5-foot radius and dim light for an additional 5 feet. Additionally, Dexterity (Stealth) checks made while the shield's light is active that rely on sight have disadvantage.</p>\n\n<h4>Lightweight</h4>\n\n<p>Armor and shields with the lightweight property have their weight reduced by half.</p>\n\n<h4>Magnetic </h4>\n\n<p>While you are wielding a shield with the magnetic property and a melee weapon attack misses you by an amount less than or equal to your bonus to AC from your shield, the attacking creature must make a Strength saving throw, DC equal to the magnetic number. On a failed save, the creature's weapon adheres to the shield. As an action, a creature can repeat this check. On a success, the weapon is freed. </p>\n\n<h4>Obscured</h4>\n\n<p>While wearing armor with the obscured property, electronic sensors and cameras have disadvantage on Wisdom (Perception) and Intelligence (Investigation) checks against you that rely on sight.</p>\n\n<h4>Powered</h4>\n\n<p>While wearing armor with the powered property, you gain a bonus to damage rolls using Strength, Strength checks, and Strength saving throws equal to the powered number.</p>\n\n<h4>Reactive</h4>\n\n<p>When you are wearing armor with the reactive property and a creature hits you with an attack roll, you gain a bonus to AC against the next attack from that creature before the start of your next turn equal to the reactive number.</p>\n\n<h4>Regulated</h4>\n\n<p>When you are wearing armor or wielding a shield with the regulated property and a creature rolls the maximum on a weapon damage die against you, they must reroll and use the new roll, even if the new roll is the maximum on the weapon damage die.</p>\n\n<h4>Reinforced</h4>\n\n<p>When you make a long jump while wearing armor with the reinforced property, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>\n\n<h4>Responsive</h4>\n\n<p>While you are wielding a shield with the responsive property and an attack misses you by an amount less than or equal to your bonus to AC from your shield, you gain a bonus to AC against the next attack from that creature before the start of your next turn equal to the responsive number.</p>\n\n<h4>Rigid</h4>\n\n<p>While wearing armor with the rigid property, you add half your Dexterity modifier (rounded down), instead of your full Dexterity modifier, to Dexterity saving throws you make. If your Dexterity modifier is negative, you instead subtract the full modifier.</p>\n\n<h4>Silent</h4>\n\n<p>While wearing armor with the silent property, you have advantage on Dexterity (Stealth) checks that rely on sound.</p>\n\n<h4>Spiked</h4>\n\n<p>When you succeed on a Strength (Athletics) check to shove or trip a creature while wielding a shield with the spiked property, the creature takes kinetic damage using the spiked damage (which appears in parentheses with the property) + your Strength modifier.</p>\n\n<h4>Steadfast </h4>\n\n<p>While wearing armor or wielding a shield with the steadfast property, you have advantage on Strength checks and Strength saving throws to avoid being moved.</p>\n\n<h4>Versatile</h4>\n\n<p>A shield with the versatile property can be used with one or two hands. While wielded in two hands, you gain an additional bonus to AC equal to the versatile number.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h5>Armor and Shields</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Armor|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|  |:---|---:|:---|-:|:---| |<em>Light Armor</em>\t|||||| |&emsp;Durafiber combat suit    |  1,100 cr&nbsp;&nbsp;|\t10 + Dex modifier|10 lb&nbsp;&nbsp;|Agile 1| |&emsp;Duravlex fiber armor     |  1,450 cr&nbsp;&nbsp;|\t11 + Dex modifier|13 lb&nbsp;&nbsp;|Silent| |&emsp;Fleximetal fiber armor\t|  1,450 cr&nbsp;&nbsp;|\t12 + Dex modifier|13 lb&nbsp;&nbsp;|Avoidant 1, strength 11| |<em>Medium Armor</em>\t|||||| |&emsp;Neutronium mesh \t        |  2,500 cr&nbsp;&nbsp;|\t13 + Dex modifier (max 2)|20 lb&nbsp;&nbsp;|Insulated 1, strength 11| |&emsp;Beskar weave armor\t    |  3,000 cr&nbsp;&nbsp;|\t14 + Dex modifier (max 2)|25 lb&nbsp;&nbsp;|Regulated, strength 11| |&emsp;Plastoid composite       |  4,500 cr&nbsp;&nbsp;|\t15 + Dex modifier (max 2)|45 lb&nbsp;&nbsp;|Bulky, reinforced, rigid| |<em>Heavy Armor</em>\t|||||| |&emsp;Duranium battle armor\t|  6,750 cr&nbsp;&nbsp;|\t16\t|55 lb&nbsp;&nbsp;|Bulky, cumbersome, reactive 1, strength 13| |&emsp;Laminanium assault       |  8,000 cr&nbsp;&nbsp;|\t17\t|60 lb&nbsp;&nbsp;|Bulky, cumbersome, obscured, strength 15| |&emsp;Durasteel exoskeleton \t| 15,000 cr&nbsp;&nbsp;|\t18\t|65 lb&nbsp;&nbsp;|Bulky, impermeable, rigid, strength 17| |<em>Shield</em>\t\t|||||| |&emsp;Bone light shield        |    300 cr&nbsp;&nbsp;|\t+0\t| 6 lb&nbsp;&nbsp;|Spiked (1d4)| |&emsp;Crystadium medium shield  |\t 900 cr&nbsp;&nbsp;|\t+2\t|18 lb&nbsp;&nbsp;|Absorptive 1, imbalanced, strength 13| |&emsp;Quadanium heavy shield\t|  2,000 cr&nbsp;&nbsp;|\t+3\t|36 lb&nbsp;&nbsp;|Charging 1, cumbersome, obtrusive, strength 15|</p></div>\n\n<h2>Weapons</h2>\n\n<p>In addition to armor varying across myriad planets, you might find new and unique types of weaponry available. Your weapon proficiencies reflect the tools you are most likely to use. The Weapons tables show additional weapons used in the worlds of <em>Star Wars</em>, their price and weight, the damage they deal when they hit, and any special properties they possess. </p>\n\n<h3>Weapon Proficiency</h3>\n\n<p>Your species, class, and feats can grant you proficiency with certain weapons or categories of weapons. The three types of weapons�blaster, lightweapon, and vibroweapon, are further broken down into two categories�simple and martial.Proficiency with a weapon allows you to add your proficiency bonus to the attack roll for any attack you make with that weapon. If you make an attack roll using a weapon with which you lack proficiency, you do not add your proficiency bonus to the attack roll.</p>\n\n<p>Proficiency in these weapons is discussed further in Chapter 6.</p>\n\n\n\n<h3>Weapon Properties</h3>\n\n<p>Many weapons have special properties related to their use, as shown in the Weapons table.</p>\n\n<h4>Autotarget</h4>\n\n<p>This weapon ignores your Dexterity score and proficiency bonus. Two numbers appear in parentheses with the property�the first is the weapon's Dexterity score, and the second is the weapon's proficiency bonus. The weapon uses these values instead of yours when you make attack and damage rolls with it. If you lack proficiency with the weapon, the weapon does not benefit from its proficiency bonus.</p>\n\n<h4>Brutal</h4>\n\n<p>When you score a critical hit with a weapon with the brutal property, you roll a number of additional weapon damage dice equal to the brutal number.</p>\n\n<h4>Defensive</h4>\n\n<p>When you make your first attack on your turn with a weapon with the defensive property, you can choose to suffer a penalty to attack and damage rolls with that weapon up to the defensive number. If you do so, you gain the same bonus to AC. These effects last until the start of your next turn, as long as you're holding the weapon.</p>\n\n\n\n<h4>Dire</h4>\n\n<p>Before you make a weapon attack with a weapon with the dire property, you can choose to suffer a penalty to the attack roll up to the dire number. If you do so and you hit with it, you gain the same bonus to the damage roll.</p>\n\n<h4>Disarming</h4>\n\n<p>When you score a critical hit with a weapon with the disarming property against a creature that is holding an object, you can attempt to disarm the target (no action required). If the target is no more than one size larger than you (your size or smaller if your weapon has the light property), it must succeed on a Strength saving throw (DC = 8 + your bonus to attacks with the weapon) or it drops an object of your choice at its feet.</p>\n\n<h4>Disintegrate</h4>\n\n<p>When a creature is reduced to 0 hit points by a weapon with the disintegrate property, it must make a Constitution saving throw, DC equal to the disintegrate number. On a failed save, it dies immediately without making death saving throws. A disintegrated creature and everything unenhanced it is wearing or carrying are reduced to a pile of fine gray dust. A creature destroyed in this way can not be revitalized.</p>\n\n<h4>Disruptive</h4>\n\n<p>When a creature is forced to make a Constitution saving throw to maintain concentration due to taking damage from a weapon with the disruptive property, the DC for the check equals 10 or the full damage taken, whichever number is higher, instead of only half.</p>\n\n<h4>Keen</h4>\n\n<p>When you make a weapon attack with a weapon with the keen property, the critical hit range increases by an amount equal to the keen number.</p>\n\n<h4>Mighty</h4>\n\n<p>When making an attack with a mighty weapon, you use your choice of your Strength or Dexterity modifier for the attack and damage rolls. You must use the same modifier for both rolls.</p>\n\n<h4>Neuralizing</h4>\n\n<p>When you hit a creature with a weapon with the neuralizing property, you can force it to make a Wisdom saving throw, DC equal to the neuralizing number. On a failed save, the creature takes an additional 1d4 psychic damage and becomes frightened of you until the start of its next turn.</p>\n\n<h4>Piercing</h4>\n\n<p>Before you make a weapon attack with a weapon with the piercing property, you can choose to suffer a penalty to the attack roll up to the piercing number. If you do so, you gain the same bonus to the next attack roll you make against the same target before the start of your next turn.</p>\n\n<h4>Shocking</h4>\n\n<p>When you hit a creature with a weapon with the shocking property, you can force it to make a Dexterity saving throw, DC equal to the shocking number. On a failed save, the creature takes an additional 1d4 lightning damage and becomes shocked until the end of its next turn.</p>\n\n<h4>Silent</h4>\n\n<p>When you make a ranged attack with a weapon with the silent property while hidden, it does not automatically reveal your presence. Make a Dexterity (Stealth) check contested by your targets' Wisdom (Perception) check. On a success, you remain hidden.</p>\n\n<h4>Sonorous</h4>\n\n<p>When you hit a creature with a weapon with the sonorous property, you can force it to make a Constitution saving throw, DC equal to the sonorous number. On a failed save, the creature takes an additional 1d4 sonic damage and becomes deafened until the end of its next turn.</p>\n\n<h4>Switch</h4>\n\n<p>A weapon with the switch property can deal an alternate type of damage. A damage value appears in parentheses appears with the property-the damage when the weapon uses its alternate damage type. On your turn, you can use your object interaction to change the weapon's damage type.</p>\n\n<h4>Vicious</h4>\n\n<p>Whenever you deal damage with a weapon with the vicious property and roll the maximum on a weapon damage die, you gain a bonus to damage equal to the vicious number.</p>\n\n<h3>Special Weapons</h3>\n\n<p>Weapons with special rules are described to below.</p>\n\n<h4>ARC Caster</h4>\n\n<p>When you score a critical hit with this weapon, a creature becomes shocked until the end of its next turn.</p>\n\n<h4>Bolas</h4>\n\n<p>A Large or smaller creature hit by a bolas is restrained until it is freed. A bolas has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 13 Dexterity check, freeing itself or another creature within its reach on a success. The bolas has an AC of 10, 5 hit points, and immunity to all damage not dealt by melee weapons. Destroying the bolas frees the creature without harming it and immediately ends the bolas's effects. While a creature is restrained by a bolas, you can make no further attacks with it.</p>\n\n<p>Due to their unwieldy nature, bolas make ineffective melee weapons. Melee attack rolls made with them are made at disadvantage.</p>\n\n\n\n<h4>Bo-Rifle</h4>\n\n<p>The bo-rifle is a lasat weapon most commonly carried by the Honor Guard of Lasan, which has the unique property of functioning as both a rifle and a staff. On your turn, you can use your object interaction to switch between modes, detailed below. </p>\n\n<p><strong><em>Rifle.</em></strong> While in this mode, the weapon uses traditional power cells.</p>\n\n<p><strong><em>Staff.</em></strong> While in this mode, the weapon gains the shocking 13 property.</p>\n\n<h4>Flechette Cannon</h4>\n\n<p>The flechette cannon does not make attack rolls. Rather than traditional power cells, the flechette cannon uses specialized cannon tanks, which, when fired, spray an area with the contents of the tank. Projector tanks require your target to make a saving throw to resist the tank's effects. It can have different ammunition types loaded simultaneously, and you can choose which ammunition you're using as you fire it (no action required). If you don't meet the flechette cannon's strength requirement, creatures have advantage on their saving throws. If you lack proficiency in the flechette cannon, you must roll the damage dice twice and take the lesser total.</p>\n\n<h4>Grenade Launcher</h4>\n\n<p>Rather than traditional power cells, the grenade launcher fires grenades. When firing a grenade at long range, or if you don't meet the grenade launcher's strength requirement, creatures within the radius of the grenade's explosion have advantage on the saving throw. If you lack proficiency in the grenade launcher, you must roll the damage dice twice and take the lesser total.</p>\n\n<h4>Interchangeable Weapons System</h4>\n\n<p>The IWS is a heavy weapon that can fire in three different modes. On your turn, you can use your object interaction to switch between modes, detailed below. </p>\n\n<p><strong><em>Antiarmor.</em></strong> While in this mode, rather than traditional power cells, the IWS fires grenades. When firing a grenade at long range, creatures within the radius of the grenade's explosion have advantage on the saving throw.</p>\n\n<p><strong><em>Blaster.</em></strong> While in this mode, the weapon uses traditional power cells.</p>\n\n<p><strong><em>Sniper.</em></strong> While in this mode, the weapon uses traditional power cells.</p>\n\n<h4>Mancatcher</h4>\n\n<p>When you would make a Strength (Athletics) check to attempt to grapple a creature while wielding a weapon with the grappling property, you can instead make a melee weapon attack with it. If the attack hits, the creature becomes grappled by you, and it takes damage equal to your Strength modifier of the same type as the weapon's damage.</p>\n\n<h4>Retrosaber</h4>\n\n<p>The retrosaber is an ancient type of lightweapon that requires a power cell to function. Once four attacks have been made with a retrosaber, a character must replace the power cell using an action or bonus action (the character's choice). You must have one free hand to replace the power cell.</p>\n\n<h4>Rocket Launcher</h4>\n\n<p>Rather than traditional power cells, the rocket launcher fires specialized projectiles in the form of rockets. When firing a rocket at long range, or if you don't meet the rocket launcher's strength requirement, creatures within the radius of the rocket's explosion have advantage on the saving throw.</p>\n\n<h4>Rotary Cannon</h4>\n\n<p>Rather than traditional power cells, the rotary cannon uses specialized power generator that allow it to fire continuously for 10 minutes. Replacing a power generator takes an action.</p>\n\n<p>The rotary cannon requires the use of a tripod unless you meet its strength requirement, which is included in the price. Over the course of 1 minute, you can deploy or collapse the rotary cannon on the tripod. While deployed, your speed is reduced to 0.</p>\n\n<h4>Shoulder Cannon</h4>\n\n<p>Mounted by the shoulder slot, a shoulder cannon does not require a free hand to use. Additionally, you have advantage on Strength ability checks and saving throws to avoid being disarmed of this weapon.</p>\n\n<h4>Vapor Projector</h4>\n\n<p>The vapor projector does not make attack rolls. Rather than traditional power cells, the vapor projector uses specialized projector tanks, which, when fired, spray an area with the contents of the tank. Projector tanks require your target to make a saving throw to resist the tank's effects. It can have different ammunition types loaded simultaneously, and you can choose which ammunition you're using as you fire it (no action required). If you don't meet the vapor projector's strength requirement, creatures have advantage on their saving throws. If you lack proficiency in the vapor projector, you must roll the damage dice twice and take the lesser total.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h5>Blasters</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| |:---|---:|:---|-:|:---| | <em>Simple Blasters</em>||||| | &emsp;Bolt-thrower\t\t|   500 cr&nbsp;&nbsp;| 1d10 kinetic | 14 lb&nbsp;&nbsp; | Ammunition (range 100/400), reload 2, silent, strength 11, two-handed | | &emsp;Energy bow\t\t    | 300 cr&nbsp;&nbsp;| 1d6 energy    |  3 lb&nbsp;&nbsp;  | Ammunition (range 80/320), mighty, reload 12, silent, two-handed | | &emsp;Shatter pistol      | 800 cr&nbsp;&nbsp;     | 1d4 kinetic   |  3 lb&nbsp;&nbsp;  | Ammunition (range 40/160), silent, light, reload 20 | | &emsp;Switch carbine\t    | 4,600 cr&nbsp;&nbsp;| 1d6 energy | 8 lb&nbsp;&nbsp; | Ammunition (range 60/240), reload 12, switch (1d4 acid)| | <em>Martial Blasters</em>||||| | &emsp;ARC caster          | 2,400 cr&nbsp;&nbsp;| 1d8 lightning | 10 lb&nbsp;&nbsp;  | Ammunition (range 30/120), burst 4, rapid 2, reload 4, special,<br> strength 11, two-handed | | &emsp;BKG                 | 9,000 cr&nbsp;&nbsp;   | 3d4 fire    | 42 lb&nbsp;&nbsp;    | Ammunition (range 120/480), auto, burst 2, disintegrate 13, reload 2,<br> strength 19, two-handed | | &emsp;Disruptor pistol    | 4,000 cr&nbsp;&nbsp;| 1d8 acid      |  4 lb&nbsp;&nbsp;  | Ammunition (range 60/240), disintegrate 13, reload 16 | | &emsp;Disruptor rifle     | 7,000 cr&nbsp;&nbsp;| 1d10 acid     | 12 lb&nbsp;&nbsp;  | Ammunition (range 100/400), disintegrate 13, reload 1, strength 11,<br> two-handed | | &emsp;Flechette cannon     | 1,800 cr&nbsp;&nbsp;| � | 16 lb&nbsp;&nbsp; | Ammunition (range special), reload 5, special, strength 11, two-handed | | &emsp;Grenade launcher    |   800 cr&nbsp;&nbsp;| � | 10 lb&nbsp;&