cation</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw and a -1 penalty to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Withercasting Underlay Mk I</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw and a -1 penalty to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Withercasting Underlay Mk II</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Underlay Mk III</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Underlay Mk IV</h4>\n\n<em><strong>Item modification</strong> (armor), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Item Modifications (Augment)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#4d5568\">Charisma Augment (Basic)</font></td><td><font style=\"color:#4d5568\">Standard</font></td></tr><tr><td><font st