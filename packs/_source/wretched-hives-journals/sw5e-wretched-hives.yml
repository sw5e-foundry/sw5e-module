        <h2>Constructor's Implements</h2>

        <p>Constructor's implements include all of the necessary components to build furnitures and structures.</p>

        <h4>Lore</h4>

        <p>This tool proficiency aids you in identifying the use and the origin of buildings and structures.</p>

        <h4>Investigation/Perception</h4>

        <p>You gain additional insight when inspecting areas within structures, because you know tricks of construction that can conceal areas from discovery.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p>

        <h4>Temporary Shelter</h4>

        <p>As part of a long rest, you can construct a lean-to or a similar shelter to keep your group dry and in the shade for the duration of the rest. Because it was fashioned quickly from whatever wood was available, the shelter collapses 1d3 days after being assembled.</p></blockquote>

