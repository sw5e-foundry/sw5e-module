mber Mk V</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr></tbody></table>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#dd6b20\">Quantum Splitter Mk III</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Recoil Dampener (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Smart Interface (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Burst Core (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Brutal Scope (Lethal)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Dire Ascendancy Scope</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Disintegration Core Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Expanded Magazine (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Keen Core (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Multispectral Optics (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Ostrine Splitter Mk III</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Penetrating Core (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Piercing Core (Devastating)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Precision Chamber Mk VI</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Quantum Splitter Mk IV</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Rapid Core (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Recoil Dampener (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Smart Interface (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Vicious Ascendancy Core</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Accuracy Focus Mk I</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You gain a +1 bonus to attack rolls and a -1 penalty to damage rolls made with this weapon.</p>\n\n<h4>Accuracy Focus Mk II</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You gain a +1 bonus to attack rolls made with this weapon.</p>\n\n<h4>Accuracy Focus Mk III</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You gain a +2 bonus to attack rolls made with this weapon.</p>\n\n<h4>Accuracy Focus Mk IV</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You gain a +3 bonus to attack rolls made with this weapon.</p>\n\n<h4>Amplifying Barrel (Basic)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You gain a +1 bonus to damage rolls and a -1 penalty to attack rolls made with this weapon.</p>\n\n<h4>Amplifying Barrel (Fine) </h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You gain a +1 bonus to damage rolls made with this weapon.</p>\n\n<h4>Amplifying Barrel (Improved) </h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You gain a +2 bonus to damage rolls made with this weapon.</p>\n\n<h4>Amplifying Barrel (Superior)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>You gain a +3 bonus to damage rolls made with this weapon.</p>\n\n<h4>Aratech Recycler Core Mk II</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Burst property</em><br>\n\n<p>When you use the burst feature of this weapon, you can choose to include up to 2 additional creatures within 5 feet of any affected space to also be affected the burst, if they were not already.</p>\n\n<p>Once per turn, when you deal damage with this weapon, your walking speed increases by 10 feet until the start of your next turn, and the damaged creature can't make opportunity attacks against you for the rest of your turn. </p>\n\n<h4>Bayonet</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>You affix a short blade to the barrel of this weapon, allowing you to make a melee weapon attack with it. The blade is a melee weapon with the finesse property that you are proficient with, and deals 1d6 kinetic damage.</p>\n\n<h4>Brutal Scope</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the brutal 1 property. If it already has the brutal property, its brutal number increases by 1, to a maximum of 3.</p>\n\n<h4>Brutal Scope (Devastating)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the brutal 3 property. If it already has the brutal property, its brutal number increases to 3.</p>\n\n<h4>Brutal Scope (Deadly)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the brutal 2 property. If it already has the brutal property, its brutal number increases by 2, to a maximum of 3.</p>\n\n<h4>Burst Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Blaster that uses cells or cartridges</em><br>\n\n<p>This weapon gains the burst property, with a burst number equal to its reload number, minimum of 2. If it already has the burst property, the burst number is reduced to one-half its reload number (rounded up), to a minimum of 2.</p>\n\n<h4>Burst Core (Champion)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Blaster that uses cells or cartridges</em><br>\n\n<p>This weapon gains the burst property, with a burst number equal to one-fourth its reload number (rounded up), to a minimum of 2. If it already has the burst property, the burst number is reduced to one-eighth its reload number (rounded up), to a minimum of 2.</p>\n\n<h4>Burst Core (Superior)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Blaster that uses cells or cartridges</em><br>\n\n<p>This weapon gains the burst property, with a burst number equal to one-half its reload number (rounded up), to a minimum of 2. If it already has the burst property, the burst number is reduced to one-fourth its reload number (rounded up), to a minimum of 2.</p>\n\n\n\n<h4>Collapsible Stock</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the hidden property.</p>\n\n<h4>Compensating Attachment</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon loses the two-handed property.</p>\n\n<h4>Corellian Crippler Matrix</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Once per round, when you hit a creature with a ranged attack using this weapon, its speed is reduced by 5 feet until the end of its next turn. </p>\n\n<h4>Czerka Attenuating Pulsator</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>\n\n<p>When you score a critical hit or reduce a creature to 0 hit points with a ranged attack using this weapon, you can regain a number of tech points equal to your Intelligence modifier (a minimum of one, no action required).  Once you've used this feature, you must complete a short or long rest before you can use it again.</p>\n\n<h4>Dire Ascendancy Scope</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the dire 3 property. If it already has the dire property, its dire number increases to 3.</p>\n\n<h4>Dire Fighting Scope</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the dire 1 property. If it already has the dire property, its dire number increases by 1, to a maximum of 3.</p>\n\n<h4>Dire Mastery Scope</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the dire 2 property. If it already has the dire property, its dire number increases by 2, to a maximum of 3.</p>\n\n<h4>Disguised Stock</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the disguised property.</p>\n\n<h4>Disintegration Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the disintegrate 13 property. If it already has the disintegrate property, its disintegrate number increases by 1, to a maximum of 18.</p>\n\n<h4>Disintegration Core Mk II</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the disintegrate 14 property. If it already has the disintegrate property, its disintegrate number increases by 2, to a maximum of 18.</p>\n\n<h4>Disintegration Core Mk III</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon gains the disintegrate 15 property. If it already has the disintegrate property, its disintegrate number increases by 3, to a maximum of 18.</p>\n\n<h4>Disintegration Core Mk IV</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the disintegrate 16 property. If it already has the disintegrate property, its disintegrate number increases by 4, to a maximum of 18.</p>\n\n<h4>Disintegration Core Mk V</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon gains the disintegrate 17 property. If it already has the disintegrate property, its disintegrate number increases by 5, to a maximum of 18.</p>\n\n<h4>Disintegration Core Mk VI</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the disintegrate 18 property. If it already has the disintegrate property, its disintegrate number increases to 18.</p>\n\n<h4>Disruption Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the disruptive property.</p>\n\n<h4>Expanded Magazine</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Once on each of your turns, you can reload this weapon once without using an action. You can't use this feature again until you reload the weapon with an action.</p>\n\n<h4>Expanded Magazine (Champion)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Once on each of your turns, you can reload this weapon once without using an action. You can use this feature six times. You regain all expended uses when you reload the weapon with an action.</p>\n\n<h4>Expanded Magazine (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Once on each of your turns, you can reload this weapon once without using an action. You can use this feature five times. You regain all expended uses when you reload the weapon with an action.</p>\n\n<h4>Expanded Magazine (Fine)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Once on each of your turns, you can reload this weapon once without using an action. You can use this feature twice times. You regain all expended uses when you reload the weapon with an action.</p>\n\n<h4>Expanded Magazine (Improved)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Once on each of your turns, you can reload this weapon once without using an action. You can use this feature three times. You regain all expended uses when you reload the weapon with an action.</p>\n\n<h4>Expanded Magazine (Superior)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Once on each of your turns, you can reload this weapon once without using an action. You can use this feature four times. You regain all expended uses when you reload the weapon with an action.</p>\n\n<h4>Fadecasting Core (Dueling)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n\n\n<h4>Fadecasting Core (Fighting)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Core (Mastery)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Fadecasting Core (Training)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Strength or Constitution saving throw and a -1 penalty to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Flashlight Attachment</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You affix a targeted light to this weapon. As a bonus action, you can toggle the light on or off. While on, this weapon sheds bright light in a 60-foot cone.</p>\n\n<h4>Focusing Scope</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>The simple scope allows you to use a bonus action to take aim at a target you can see. The next attack you make before the end of your next turn does not suffer disadvantage due to being made at long range.</p>\n\n<h4>Harpoon Reel Attachment</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>You install a secondary firemode that launches a harpoon attached to a tightly coiled cord. With this harpoon, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d6 kinetic damage. This attack can target a surface, object, or creature.</p>\n\n<p>A creature struck by this attack is impaled by the harpoon. As an action, a creature can attempt to remove the harpoon. Removing the harpoon requires a DC 15 Strength check. While the harpoon is stuck in the target, you are connected to the target by a 60 foot cable.</p>\n\n<p>While connected in this manner, you can use your bonus action to activate the reel, pulling yourself to the location if the target is your size or larger. A creature or object smaller than you is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>\n\n<p>Once you've used this feature, you can't use it again until you recover and reinsert the harpoon as an action.</p>\n\n<h4>Ion Amplifying Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Ion damage</em><br>\n\n<p>This weapon ignores resistance to ion damage.</p>\n\n<h4>Keen Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the keen 1 property. If it already has the keen property, its keen number increases by 1, to a maximum of 3.</p>\n\n<h4>Keen Core (Deadly)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the keen 2 property. If it already has the keen property, its keen number increases by 2, to a maximum of 3.</p>\n\n<h4>Keen Core (Devastating)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the keen 3 property. If it already has the keen property, its keen number increases to 3.</p>\n\n<h4>Light Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the light property.</p>\n\n<h4>Maser Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>When a creature tries to reduce the damage of a shot from this weapon with a feature or power, such as monk's Deflect Missiles or the <em>saber reflect</em> force power, they have disadvantage on the reduction roll.</p>\n\n<h4>Mighty Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks strength property</em><br>\n\n<p>This weapon gains the mighty property.</p>\n\n<h4>Multispectral Optics (Champion)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>While looking through this weapon's scope, you have truesight out to a distance equal to the long range of this weapon and you can see creatures that are lightly or heavily obscured. Additionally, you gain a +2 bonus to attack rolls.</p>\n\n<h4>Ostrine Splitter Mk I</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>When you deal damage with this weapon, you deal an additional 1d4 acid, cold, fire, lightning, poison, or sonic damage (chosen by the GM when generating this item).</p>\n\n<h4>Ostrine Splitter Mk II</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>When you deal damage with this weapon, you deal an additional 1d6 acid, cold, fire, lightning, poison, or sonic damage (chosen by the GM when generating this item).</p>\n\n<h4>Ostrine Splitter Mk III</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>When you deal damage with this weapon, you deal an additional 1d8 acid, cold, fire, lightning, poison, or sonic damage (chosen by the GM when generating this item).</p>\n\n<h4>Piercing Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the piercing 1 property. If it already has the piercing property, its piercing number increases by 1, to a maximum of 3.</p>\n\n<h4>Piercing Core (Deadly)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the piercing 2 property. If it already has the piercing property, its piercing number increases by 2, to a maximum of 3.</p>\n\n\n\n<h4>Piercing Core (Devastating)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the piercing 3 property. If it already has the piercing property, its piercing number increases to 3.</p>\n\n<h4>Precision Chamber Mk I</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon's range increases by 10/40.</p>\n\n<h4>Precision Chamber Mk II</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon's range increases by 20/80.</p>\n\n<h4>Precision Chamber Mk III</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon's range increases by 30/120.</p>\n\n<h4>Precision Chamber Mk IV</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon's range increases by 40/160.</p>\n\n<h4>Precision Chamber Mk V</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon's range increases by 50/200.</p>\n\n<h4>Precision Chamber Mk VI</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon's range increases by 60/240.</p>\n\n<h4>Quantum Splitter Mk I</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>When you deal damage with this weapon, you can roll a d4 and add the result to the total.</p>\n\n<h4>Quantum Splitter Mk II</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>When you deal damage with this weapon, you can roll a d6 and add the result to the total.</p>\n\n<h4>Quantum Splitter Mk III</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>When you deal damage with this weapon, you can roll a d8 and add the result to the total.</p>\n\n<h4>Quantum Splitter Mk IV</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>When you deal damage with this weapon, you can roll a d10 and add the result to the total.</p>\n\n<h4>Rapid Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Blaster that uses cells or cartridges</em><br>\n\n<p>This weapon gains the rapid property, with a rapid number equal to one-half its reload number (rounded up), to a minimum of 2. If it already has the rapid property, the rapid number is reduced to one-fourth its reload number (rounded up), to a minimum of 2.</p>\n\n<h4>Rapid Core (Champion)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Blaster that uses cells or cartridges</em><br>\n\n<p>This weapon gains the rapid property, with a rapid number equal to one-eighth its reload number (rounded up), to a minimum of 2. If it already has the rapid property, the rapid number is reduced to one-sixteenth its reload number (rounded up), to a minimum of 2.</p>\n\n<h4>Rapid Core (Superior)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Blaster that uses cells or cartridges</em><br>\n\n<p>This weapon gains the rapid property, with a rapid number equal to one-fourth its reload number (rounded up), to a minimum of 2. If it already has the rapid property, the rapid number is reduced to one-eighth its reload number (rounded up), to a minimum of 2.</p>\n\n<h4>Rylith Power Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>When you take the Attack action and hit a target with a ranged attack with this weapon, you can repeat the attack against another creature up to 15 feet from the target in a direct line from you (no action required). Once you've used this feature, you must complete a short or long rest before you can use it again.</p>\n\n<h4>Recoil Dampener</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon's strength number is reduced by one step (from 21 to 19, 19 to 17, 17 to 15, 15 to 13, or 13 to 11). If the strength number is 11, this modification removes the strength property from it entirely.</p>\n\n<h4>Recoil Dampener (Champion)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon loses the strength property.</p>\n\n<h4>Recoil Dampener (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon's strength number is reduced by five steps (from 21 to 11). If the strength number is 19 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Recoil Dampener (Fine)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon's strength number is reduced by two steps (from 21 to 17, 19 to 15, 17 to 13, or 15 to 11). If the strength number is 13 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Recoil Dampener (Improved)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon's strength number is reduced by three steps (from 21 to 15, 19 to 13, or 17 to 11). If the strength number is 15 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Recoil Dampener (Superior)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon's strength number is reduced by four steps (from 21 to 13 or 19 to 11). If the strength number is 17 or lower, this modification removes the strength property from it entirely.</p>\n\n<h4>Rendcasting Core (Dueling)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n\n\n<h4>Rendcasting Core (Fighting)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Rendcasting Core (Mastery)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw.</p>\n\n<h4>Rendcasting Core (Training)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Dexterity or Intelligence saving throw and a -1 penalty to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Semiauto Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Auto property</em><br>\n\n<p>This weapon loses the auto property.</p>\n\n<h4>Silencer</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the silent property.</p>\n\n<h4>Siege Weapon</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>You modify this weapon to be more effective against barriers. The weapon deals double damage against structures.</p>\n\n<h4>Smart Interface (Basic)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the smart (15, +2) property. If it already has the smart property, its smart numbers increase by +1 and +1, respectively, to a maximum of 20 and +6.</p>\n\n<h4>Smart Interface (Champion)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the smart (20, +6) property. If it already has the smart property, its smart numbers increase to 20 and +6, respectively.</p>\n\n<h4>Smart Interface (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon gains the smart (19, +5) property. If it already has the smart property, its smart numbers increase by +5 and +4, respectively, to a maximum of 20 and +6.</p>\n\n<h4>Smart Interface (Fine)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the smart (16, +2) property. If it already has the smart property, its smart numbers increase by +2 and +1, respectively, to a maximum of 20 and +6.</p>\n\n<h4>Smart Interface (Improved)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon gains the smart (17, +3) property. If it already has the smart property, its smart numbers increase by +3 and +2, respectively, to a maximum of 20 and +6.</p>\n\n<h4>Smart Interface (Superior)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the smart (18, +4) property. If it already has the smart property, its smart numbers increase by +4 and +3, respectively, to a maximum of 20 and +6.</p>\n\n<h4>Targeting Amplifier (Dueling)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to melee tech attacks.</p>\n\n<h4>Targeting Amplifier (Fighting)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to melee tech attacks.</p>\n\n<h4>Targeting Amplifier (Mastery)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to melee tech attacks.</p>\n\n<h4>Targeting Amplifier (Training)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to melee tech attacks and a -1 penalty to ranged tech attacks.</p>\n\n<h4>Targeting Rangefinder (Dueling)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to ranged tech attacks.</p>\n\n<h4>Targeting Rangefinder (Fighting)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to ranged tech attacks.</p>\n\n<h4>Targeting Rangefinder (Mastery)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to ranged tech attacks.</p>\n\n<h4>Targeting Rangefinder (Training)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to ranged tech attacks and a -1 penalty to melee tech attacks.</p>\n\n<h4>Vicious Ascendancy Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the vicious 3 property. If it already has the vicious property, its vicious number increases to 3.</p>\n\n<h4>Vicious Fighting Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the vicious 1 property. If it already has the vicious property, its vicious number increases by 1, to a maximum of 3.</p>\n\n<h4>Vicious Mastery Core</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the vicious 2 property. If it already has the vicious property, its vicious number increases by 2, to a maximum of 3.</p>\n\n\n\n<h4>Withercasting Core (Dueling)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Core (Fighting)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Core (Mastery)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Core (Training)</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw and a -1 penalty to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Wrist Mount Attachment</h4>\n\n<em><strong>Item modification</strong> (blaster), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the fixed property.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Item Modifications (Clothing)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#4a5568\">Ace Pilot's Pattern (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Acrobat's Pattern (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Animal Handler's Pattern (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Brawny Pattern (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Charisma Weave (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Charmer's Pattern (Basic)</font></td><td><font style=\"col