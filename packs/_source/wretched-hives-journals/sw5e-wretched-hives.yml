        <h2>Spicer's Kit</h2>

        <p>Spicer's kit include all of the necessary components to refine and create illicit substances. </p>

        <h4>Skill 1</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h4>Skill 2</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h4>Skill 3</h4>

