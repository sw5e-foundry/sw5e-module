  - name: 'Chapter 1: Step-By-Step Factions'
    _id: S95Co9IAIFYBc1eU
    text:
      content: |+
        <h1>Chapter 1: Step-By-Step Factions</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">any factions span the galaxy, from lowly gangs</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; inhabiting a single city to governments controlling the majority of known planets. While many characters will find a faction they want to join�for instance, a Jedi will most likely want to climb the ranks of the Jedi Order�many characters will prefer to build their own.

        <p>Before you dive into step 1 below, thinking about whether or not establishing your own faction is the correct route, and what your faction will do that is not already done better by others. You might want to create your own bounty hunter organization and try to take on the greatest bounties the galaxy has to offer. Maybe you want to start your own government and break away from the known powers. Perhaps you want to start your own faction of Force-wielders, separate from the Jedi and the Sith. Or maybe you just want to create your own chain of casino resorts, with pazaak and companions.</p>

        <p>Once you have a faction in mind, follow these steps in order, making decisions that reflect the faction you want. Your conception of your faction might evolve with each choice you make. What's important is that your faction helps you realize a character you're excited to play.</p>

        <p>Throughout this section, we use the term <strong>faction sheet</strong> to mean whatever you use to track your faction, whether it's a formal sheet (like the ones at the end of these rules), some sort of digital record, or a piece of notebook paper. The official SW5e sheets are a fine place to start until you know what information you need and how you use it during the game.</p>

        <h5>Building the Mandalorians</h5>

        <blockquote><p>Each step of faction creation includes an example of that step, with a player building the iconic faction the Mandalorians.</p></blockquote>

        <h3>1. Determine your Ideals</h3>

        <p>Every faction deviates in what they value, how they exercise those values, and what kind of members they attract. Your faction's ideals help determine what kind of members you'll attract, should you decide to recruit outside the confines of your party.</p>

        <h4>Goals</h4>

        <p>Each faction has its own goals. One of the most common goals many factions share is the desire for increased wealth and influence. Many factions, however, have goals unique to their own efforts. For instance, a faction might have a goal of maintaining peace and prosperity in their region, directing all of their wealth and influence towards that one goal.</p>

        <h4>Beliefs</h4>

        <p>Each faction also has its own beliefs. Many nefarious factions, such as the Exchange, believe power should be wielded by the strong, and that the weak deserve to be enslaved, while a more monetarily motivated faction, such as the Commerce Guild, believe that material wealth is the greatest source of control.</p>

        <h4>Member Traits</h4>

        <p>Members of a faction are often drawn to it because they share common traits with its members. For instance, criminals who prefer to work alone, or in small groups, might be drawn to the Black Sun, while bounty hunters might choose to join the Bounty Broker's Association to earn greater wealth and prestige.</p>

        <h4>Insignia</h4>

        <p>Every faction has a symbol that represents it, whether that symbol is worn publicly or only shown in secret.</p>

        <h5>Building the Mandalorians, Step 1</h5>

        <blockquote><p>Mandalorian culture places heavy emphasis on strength and worthiness. The primary <strong>goal</strong> of the Mandalorians is to prove that their strength is greater than that of others. Mandalorian <strong>beliefs</strong> are characterized by the <em>Resol'nare</em>, or the Six Actions:</p>

        <ul><li>A Mandalorian must wear armor. </li><li>A Mandalorian must speak Mando'a. </li><li>A Mandalorian must defend themself and their family. </li><li>A Mandalorian must contribute to the overall well-being of the clan. </li><li>A Mandalorian must raise their children as Mandalorians. </li><li>A Mandalorian must heed Mandalore's call and rally to their cause.<br></li></ul>

        <p>Mandalorians often share <strong>member traits</strong> of being strong, hardy, resilient, and uncompromising. The Mandalorian <strong>insignia</strong>�the <em>Kyr'bes</em>�features the skull of a mythosaur. It is a badge of honor that Mandalorians wear openly.</p></blockquote>

        <img src='https://www.gmbinder.com/images/PyfBX4a.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:480px' />



        <h3>2. Establish a Headquarters</h3>

        <p>Most factions have use of a headquarters. For smaller factions, it might be a simple building, or even a room. For larger factions, however, it might be a space ship, a space station, or even an entire moon or planet. A faction headquarters is required to recruit members to a faction.</p>

        <p>What type of headquarters you choose for your faction makes a statement about how effective your faction is in whatever field it operates. Choosing the appropriate location and appearance for your faction's headquarters can help or hinder your ability to recruit new members.</p>

        <h4>Operating Costs</h4>

        <p>Beyond the required costs for actually maintaining a headquarters, factions have costs directly associated with their functions. These fees might cover licensing fees, bribes, government contracts, etc. These fees amount to roughly 1,000 cr per headquarters per month.</p>

        <h5>Building the Mandalorians, Step 2</h5>

        <blockquote><p>The Mandalorians have myriad headquarters throughout the galaxy, including a massive flagship the <em>Spirit of Vengeance.</em></p></blockquote>

        <h3>3. Determine Ability Scores</h3>

        <p>Much of what your faction does�and how it directly affects its members�depend on its six abilities: <strong>Strength</strong>, <strong>Dexterity</strong>, <strong>Constitution</strong>, <strong>Intelligence</strong>, <strong>Wisdom</strong>, and <strong>Charisma</strong>. Each ability has a score, which is a number you record on your faction sheet. The six abilities and their use in the game are described in the <strong>Using Ability Scores</strong> chapter. </p>

        <p>You generate your faction's six <strong>ability scores</strong> using a standard array: 16, 14, 14, 12, 10, 8. You then take these six numbers and write each number beside one of your faction's abilities to assign score to Strength, Dexterity, Constitution, Intelligence, and Charisma. </p>

        <p>After assigning your ability scores, determine your faction's <strong>ability modifiers</strong> using the Ability Scores and Modifiers table. To determine an ability modifier without consulting the table, subtract 10 from the ability score and then divide the result by 2 (round down). Write the modifier next to each of your scores.</p>

        <h5>Building the Mandalorians, Step 3</h5>

        <blockquote><p>Mandalorians value strength above all, so we assign the highest score, 16, in Strength. The next highest scores�both 14�we apply to Constitution and Wisdom, since Mandalorians are both resilient and perceptive. We then apply the final three scores�12, 10, and 8�to Charisma, Dexterity, and Intelligence, respectively. The Mandalorian ability scores and modifiers look like this: Strength 16 (+3), Dexterity 10 (+0), Constitution 14 (+2), Intelligence 8 (-1), Wisdom 14 (+2), Charisma 12 (+1).</p></blockquote>

        <h5>Ability Scores and Modifiers</h5>

        <table class="sw5e-book-table"><thead><tr><th>Score</th><th>Modifier</th></tr></thead><tbody><tr><td>1</td><td>-5</td></tr><tr><td>2-3</td><td>-4</td></tr><tr><td>4-5</td><td>-3</td></tr><tr><td>6-7</td><td>-2</td></tr><tr><td>8-9</td><td>-1</td></tr><tr><td>10-11</td><td>+0</td></tr><tr><td>12-13</td><td>+1</td></tr><tr><td>14-15</td><td>+2</td></tr><tr><td>16-17</td><td>+3</td></tr><tr><td>18-19</td><td>+4</td></tr><tr><td>20-21</td><td>+5</td></tr><tr><td>22-23</td><td>+6</td></tr><tr><td>24-25</td><td>+7</td></tr><tr><td>26-27</td><td>+8</td></tr><tr><td>28-29</td><td>+9</td></tr><tr><td>30</td><td>+10</td></tr></tbody></table>

        <img src='https://www.gmbinder.com/images/cdwJB5B.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:401.5px' />



        <h3>4. Recruitment</h3>

        <p>In order for a faction to grow, it must recruit members. A smaller faction will have trouble recruiting skilled members, while larger factions don't. </p>

        <h4>Requirements</h4>

        <p>Factors, such as a faction's ideals, headquarters, and ability scores play a huge part into how many people a faction can recruit, and how skilled those individuals are. Additionally, many higher skilled potential members of a faction will not consider joining until the faction reaches a high enough tier.</p>

        <h4>Dues</h4>

        <p>Every faction comes with some requirements that must be fulfilled for members to maintain their status in the faction. For some, it might be simple credit dues. For others, they might require a certain amount of work each month. Consider what your faction's dues should be carefully.</p>

        <h4>Membership Ranks</h4>

        <p>Factions have five total ranks. New members start at 1st rank, and over time can work their way as high as 5th rank. Each rank unlocks unique benefits on its own, in addition to the normal benefits of faction membership. </p>

        <h5>Building the Mandalorians, Step 4</h5>

        <blockquote><p>Mandalorians are a large, galaxy-spanning faction, that doesn't rely on active recruitment. Instead, new members tend to seek out Mandalorian clans to join. Mandalorians require new members to proficient in at least one martial weapon and require at least one workweek of work a month to retain status.</p></blockquote>

        <h3>5. Come Together</h3>

        <p>Factions are a great way to tie a party together in a way that an adventure sometimes can't. To some parties, the founding and expanding of a faction can be an adventure in itself.</p>

        <h4>Beyond 1st Tier</h4>

        <p>As your faction expands and earns renown, it increases in tier. Each tier unlocks new features, or expands on old ones.</p>

        <h4>Faction Features</h4>

        <p>When your faction increases in tier, it offers features that benefit members, as shown in the <strong>Factions and Membership</strong> chapter. Some of these features allow you to increase your faction's ability scores. You can't increase an ability score above 20. In addition, every faction's proficiency bonus increases at certain tiers.</p>

        <p>Some features only apply to members who have achieved a certain rank. For instance, a 5th-tier faction has access to a cache of premium enhanced items, but only members of 2nd rank or higher are able to requisition from that cache.</p>

        <h4>Renown </h4>

        <p>Renown is the primary source of faction and membership progression. Characters earn renown when they work on behalf of their faction, benefiting both themselves and the faction itself. </p>

        <br>

        <h5>Building the Mandalorians, Step 5</h5>

        <blockquote><p>Mandalorians are a tier 17 faction, having existed for thousands of years, unlocking numerous features over time.</p>

        <p><strong><em>Faction Training.</em></strong> Mandalorians have four faction training options. They have their faction-specific language, <em>Mando'a</em>. They also place heavy emphasis on crafting, so they have armormech's tools, armstech's tools, and mechanic's kits.</p>

        <p><strong><em>Assocation Proficiency.</em></strong> Mandalorians are proficient in four ability scores: Strength, Dexterity, Constitution, and Wisdom. When the faction makes an ability check with these abilities, they add their proficiency bonus (+6) to the check.</p>

        <p><strong><em>Faction Activity.</em></strong> Mandalorians have three faction activities: Bounty Hunting, Mercenary Contracting, and Pit Fighting.</p>

        <p><strong><em>Enhanced Insignia.</em></strong> Mandalorians have an enhanced insignia. While wearing their insignia, all Mandalorians can cast the <em>combustive shot</em> at-will tech power (Player's Handbook, page 230). Intelligence is their casting ability for this tech power.</p>

        <p><strong><em>Ability Score Improvement.</em></strong> Mandalorians have four ability scores improvements. They apply two of them to Strength, one to Dexterity, and one to Constitution. The Mandalorian ability scores and modifiers now look like this: Strength 20 (+5), Dexterity 12 (+1), Constitution 16 (+3), Intelligence 8 (-1), Wisdom 14 (+2), Charisma 12 (+1).</p>

        <p><strong><em>Premium Item Stockpile.</em></strong> Mandalorians choose Mandalorian Helmet as their favored premium enhanced item. Any 2nd rank or higher members can procure this item.</p>

        <p><strong><em>Prototype Item Stockpile.</em></strong> Mandalorians choose Mandalorian Beskar'gam as their favored prototype enhanced item. Any 3rd rank or higher members can procure this item.</p>

        <p><strong><em>Association Expertise.</em></strong> Mandalorians have expertise in two ability scores: Strength and Wisdom. When the faction makes an ability check with these abilities, they add twice their proficiency bonus (+12), instead of their normal proficiency bonus.</p>

        <p><strong><em>Advanced Item Stockpile.</em></strong> Mandalorians choose Mandalorian Shuk'orok as their favored advanced enhanced item. Any 4th rank or higher members can procure this item.</p>

        <p><strong><em>Association Advantage.</em></strong> Mandalorians have advantage on one ability score: Strength. When the faction makes an ability check with this ability, they have advantage on the roll.</p>

        <p><strong><em>Ability Score Mastery.</em></strong> Mandalorians have one ability score mastery. They apply this to Strength, increasing the score and it's maximum by 2. The Mandalorian ability scores and modifiers now look like this: Strength 22 (+6), Dexterity 12 (+1), Constitution 16 (+3), Intelligence 8 (-1), Wisdom 14 (+2), Charisma 12 (+1).</p>

        <p><strong><em>Legendary.</em></strong> Mandalorians choose the Darksaber as their favored legendary enhanced item. Only one 5th rank member can procure this item.</p></blockquote>

