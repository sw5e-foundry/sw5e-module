d><tbody><tr><td><font style=\"color:#dd6b20\">Dexterity Augment (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Intelligence Augment (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Strength Augment (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:#dd6b20\">Wisdom Augment (Exceptional)</font></td><td><font style=\"color:#dd6b20\">Legendary</font></td></tr><tr><td><font style=\"color:red\">Charisma Augment (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Constitution Augment (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Dexterity Augment (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Intelligence Augment (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Strength Augment (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Wisdom Augment (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Berserker Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in berserker</em><br>\n\n<p>You learn an additional Berserker Instinct option.</p>\n\n<h4>Berserker Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in berserker</em><br>\n\n<p>Your Rage damage bonus increases by 1, and when you score a critical hit, you can roll one additional weapon damage die and add the result to the total.</p>\n\n<h4>Charisma Augment (Basic)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your Charisma score increases by 1. One ability score other than Charisma (chosen by the GM) decreases by 1.</p>\n\n<h4>Charisma Augment (Champion)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Your Charisma score increases by 2, and your maximum for this score increases by 2.</p>\n\n<h4>Charisma Augment (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Your Charisma score increases by 2, and your maximum for this score increases by 1.</p>\n\n<h4>Charisma Augment (Fine)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your Charisma score increases by 1.</p>\n\n<h4>Charisma Augment (Improved)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your Charisma score increases by 1, and your maximum for this score increases by 1. One ability score other than Charisma (chosen by the GM) decreases by 1.</p>\n\n<h4>Charisma Augment (Superior)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your Charisma score increases by 1, and your maximum for this score increases by 1.</p>\n\n<h4>Constitution Augment (Basic)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your Constitution score increases by 1. One ability score other than Constitution (chosen by the GM) decreases by 1.</p>\n\n\n\n<h4>Constitution Augment (Champion)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Your Constitution score increases by 2, and your maximum for this score increases by 2.</p>\n\n<h4>Constitution Augment (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Your Constitution score increases by 2, and your maximum for this score increases by 1.</p>\n\n<h4>Constitution Augment (Fine)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your Constitution score increases by 1.</p>\n\n<h4>Constitution Augment (Improved)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your Constitution score increases by 1, and your maximum for this score increases by 1. One ability score other than Constitution (chosen by the GM) decreases by 1.</p>\n\n<h4>Constitution Augment (Superior)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your Constitution score increases by 1, and your maximum for this score increases by 1.</p>\n\n<h4>Consular Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in consular</em><br>\n\n<p>When you roll initiative and have no uses of your Force Shield left, you regain one use.</p>\n\n<h4>Consular Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in consular</em><br>\n\n<p>You learn an additional Force-Empowered Casting option. </p>\n\n<h4>Dexterity Augment (Basic)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your Dexterity score increases by 1. One ability score other than Dexterity (chosen by the GM) decreases by 1.</p>\n\n<h4>Dexterity Augment  (Champion)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Your Dexterity score increases by 2, and your maximum for this score increases by 2.</p>\n\n<h4>Dexterity Augment (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Your Dexterity score increases by 2, and your maximum for this score increases by 1.</p>\n\n<h4>Dexterity Augment (Fine)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your Dexterity score increases by 1.</p>\n\n<h4>Dexterity Augment (Improved)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your Dexterity score increases by 1, and your maximum for this score increases by 1. One ability score other than Dexterity (chosen by the GM) decreases by 1.</p>\n\n<h4>Dexterity Augment (Superior)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your Dexterity score increases by 1, and your maximum for this score increases by 1.</p>\n\n<h4>Engineer Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in engineer</em><br>\n\n<p>This item becomes a valid target of the Infuse Item feature if it wasn't already, granting a bonus appropriate to the item's type. Additionally, you gain an additional use of your Potent Aptitude.</p>\n\n<h4>Engineer Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in engineer</em><br>\n\n<p>When you use your Potent Aptitude feature, you can target an additional creature within 60 feet of you who can hear you and grant them a Potent Aptitude die as well without expending an additional use.</p>\n\n<h4>Fighter Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in fighter</em><br>\n\n<p>When you use your Second Wind feature, you also gain temporary hit points equal to the amount of hit points you regain.</p>\n\n<h4>Fighter Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in fighter</em><br>\n\n<p>You learn an additional maneuver, and you gain one additional superiority die.</p>\n\n<h4>Guardian Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in guardian</em><br>\n\n<p>You learn an additional Guardian Aura option, and the radius of your Guardian Auras increases by 5 feet.</p>\n\n<h4>Guardian Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in guardian</em><br>\n\n<p>The damage die for your Focused Strike die and Improved Force-Empowered Strikes features increases by one step (from d8 to d10, or d10 to d12).</p>\n\n<h4>Intelligence Augment (Basic)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your Intelligence score increases by 1. One ability score other than Intelligence (chosen by the GM) decreases by 1.</p>\n\n<h4>Intelligence Augment (Champion)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Your Intelligence score increases by 2, and your maximum for this score increases by 2.</p>\n\n<h4>Intelligence Augment (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Your Intelligence score increases by 2, and your maximum for this score increases by 1.</p>\n\n<h4>Intelligence Augment (Fine)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your Intelligence score increases by 1.</p>\n\n<h4>Intelligence Augment (Improved)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your Intelligence score increases by 1, and your maximum for this score increases by 1. One ability score other than Intelligence (chosen by the GM) decreases by 1.</p>\n\n\n\n<h4>Intelligence Augment (Superior)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your Intelligence score increases by 1, and your maximum for this score increases by 1.</p>\n\n<h4>Monk Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in monk</em><br>\n\n<p>You gain one Monastic Vow option.</p>\n\n<h4>Monk Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in monk</em><br>\n\n<p>When you roll a 1 on the damage roll for an unarmed strike or monk weapon, you can reroll the die. You must use the new roll. </p>\n\n<h4>Operative Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in operative</em><br>\n\n<p>You learn an additional Operative Exploit option.</p>\n\n<h4>Operative Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in operative</em><br>\n\n<p>Your Sneak Attack damage die increases by one step (from d6 to a d8, d8 to d10, or d10 to d12).</p>\n\n<h4>Scholar Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in scholar</em><br>\n\n<p>You learn an additional discovery. When you complete a long rest, you can change this discovery for a different option available to you.</p>\n\n<h4>Scholar Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in scholar</em><br>\n\n<p>You learn an additional maneuver, and you gain one additional superiority die.</p>\n\n<h4>Scout Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p><em><strong>Prerequisite:</strong> At least 3 levels in scout</em> You learn an additional Scout Routine option, and the radius of your Scout Routines increases by 5 feet.</p>\n\n<h4>Scout Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p><em><strong>Prerequisite:</strong> At least 3 levels in scout</em> You can apply the additional damage from your Ranger's Quarry feature one additional time per turn. </p>\n\n<h4>Sentinel Defensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in sentinel</em><br>\n\n<p>You gain an additional manifestation use of your Sentinel Ideals.</p>\n\n<h4>Sentinel Offensive Augment</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> At least 3 levels in sentinel</em><br>\n\n<p>You learn an additional Sentinel Ideal option.</p>\n\n<h4>Strength Augment (Basic)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your Strength score increases by 1. One ability score other than Strength (chosen by the GM) decreases by 1.</p>\n\n<h4>Strength Augment (Champion)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Your Strength score increases by 2, and your maximum for this score increases by 2.</p>\n\n<h4>Strength Augment (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Your Strength score increases by 2, and your maximum for this score increases by 1.</p>\n\n<h4>Strength Augment (Fine)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your Strength score increases by 1.</p>\n\n<h4>Strength Augment (Improved)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your Strength score increases by 1, and your maximum for this score increases by 1. One ability score other than Strength (chosen by the GM) decreases by 1.</p>\n\n<h4>Strength Augment (Superior)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your Strength score increases by 1, and your maximum for this score increases by 1.</p>\n\n<h4>Wisdom Augment (Basic)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your Wisdom score increases by 1. One ability score other than Wisdom (chosen by the GM) decreases by 1.</p>\n\n<h4>Wisdom Augment (Champion)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>Your Wisdom score increases by 2, and your maximum for this score increases by 2.</p>\n\n<h4>Wisdom Augment (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>Your Wisdom score increases by 2, and your maximum for this score increases by 1.</p>\n\n<h4>Wisdom Augment (Fine)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your Wisdom score increases by 1.</p>\n\n<h4>Wisdom Augment (Improved)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your Wisdom score increases by 1, and your maximum for this score increases by 1. One ability score other than Wisdom (chosen by the GM) decreases by 1.</p>\n\n<h4>Wisdom Augment (Superior)</h4>\n\n<em><strong>Item modification</strong> (augment), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your Wisdom score increases by 1, and your maximum for this score increases by 1.</p>\n\n\n\