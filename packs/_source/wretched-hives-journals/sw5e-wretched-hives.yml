        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Mimic handwriting</td><td>15</td></tr><tr><td>Duplicate a seal</td><td>20</td></tr></tbody></table>

        <h2>Musical Instruments</h2>

        <p>A musical instrument includes all of the necessary components to play it, as well as a few songs commonly performed with that instrument.</p>

        <h4>Lore</h4>

        <p>Your expertise aids you in recalling lore related to your instrument.</p>

        <h4>Performance</h4>

        <p>Your ability to put on a good show is improved when you incorporate an instrument into your act.</p>

        <h4>Skill 3</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p></blockquote>

