e=\"color:red\">Survivalist's Pattern (Exquisite)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Techie's Pattern (Exquisite)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Threatening Pattern (Exquisite)</font></td><td><font style=\"color:red\">Artifact</font></td></tr><tr><td><font style=\"color:red\">Wisdom Weave (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Ace Pilot's Pattern (Basic)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your level of proficiency in Piloting increases by one step (to trained, from trained to proficient, from proficient to expertise, from expertise to mastery, from mastery to high mastery, or from high mastery to grand mastery).</p>\n\n<h4>Ace Pilot's Pattern (Choice)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your level of proficiency in Piloting increases by four steps (to mastery, from trained to high mastery, or from proficient to grand mastery).</p>\n\n<h4>Ace Pilot's Pattern (Elite)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>Your level of proficiency in Piloting increases by five steps (to high mastery or from trained to grand mastery).</p>\n\n\n\n<h4>Ace Pilot's Pattern (Exquisite)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>You gain grand mastery in Piloting.</p>\n\n<h4>Ace Pilot's Pattern (Favored)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your level of proficiency in Piloting increases by three steps (to expertise, from trained to mastery, from proficient to high mastery, or from expertise to grand mastery).</p>\n\n<h4>Ace Pilot's Pattern (Fine)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>Your level of proficiency in Piloting increases by two steps (to proficient, from trained to expertise, from proficient to mastery, from expertise to high mastery, or from mastery to grand mastery).</p>\n\n<h4>Acrobat's Pattern (Basic)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>Your level of proficiency in Acrobatics increases by one step (to trained, from trained to proficient, from proficient to expertise, from expertise to mastery, from mastery to high mastery, or from high mastery to grand mastery).</p>\n\n<h4>Acrobat's Pattern (Choice)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>Your level of proficiency in Acrobatics increases by four steps (to mastery, from trained to high mastery, or from proficient to grand mastery).</p>\n\n<h4>Acrobat's Pattern (Elite)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:#db6220\"><strong>legendary</strong></font></em><br>\n\n<p>Your level of proficiency in Acrobatics increases by five steps (to high mastery or from trained to grand mastery).</p>\n\n<h4>Acrobat's Pattern (Exquisite)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>You gain grand mastery in Acrobatics.</p>\n\n<h4>Acrobat's Pattern (Favored)</h4>\n\n<em><strong>Item modification</strong> (clothing), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>Your level of proficiency in Acrobatics increases by three steps (to expertise, from trained to mastery, from proficient to high mastery