        <h2>Mechanic's Kit</h2>

        <p>This kit contains all of the commonly required tools to make repairs on constructs, such as ships, speeders, and turrets. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to perform repairs or install ship upgrades.</p>

        <h4>Lore</h4>

        <p>Your skill allows you to more readily discern the make and model of vehicle and ship parts.</p>

        <h4>Investigation</h4>

        <p>Your experience lets you more readily identify aftermarket modifications in vehicles and ships.</p>

        <h4>Technology</h4>

        <p>Your experience grants you greater insight when conducting repairs on ships or vehicles.</p>

        <h3>Feature</h3>

        <p><em>Feature that utilizes the tool in some capacity.</em></p>

        <blockquote><p>Over the course of a short or long rest, you can make a DC 15 </p>

        <h4>Quick Fixer</h4>

        <p>When you are interrupted while you are conducting repairs on a vehicle or ship, reduce the required time by half as long as you are present during the entirety of the repairs.</p></blockquote>

        <h5>Sample Activities</h5>

        <table class="sw5e-book-table"><thead><tr><th>Activity</th><th>DC</th></tr></thead><tbody><tr><td>Restoring power to a damaged vehicle</td><td>15</td></tr><tr><td>Disassembling a vehicle's engine</td><td>20</td></tr></tbody></table>



        <h2>Munitions Kit</h2>

        <p>This kit contains the necessary tools to create ammunition for blasters, as well as devices to hone lightweapons and vibroweapons.</p>

        <h4>Skill 1</h4>

        <p><em>Skill and tool description interaction.</em></p>

        <h4>Skill 2</h4>

