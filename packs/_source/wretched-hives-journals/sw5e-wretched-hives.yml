        <h1>Chapter 7: Enhanced Items</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">he ability to plunder enhanced items from the hoards</span><br> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;of conquered pirates, or discover them in long-lost Sith tombs is an experience players expect. Such items grant capabilities a character could rarely have otherwise, or they complement their owner's capabilities in wondrous ways.

        <h3>Rarity</h3>

        <p>Each enhanced item has a rarity: standard, premium, prototype, advanced, legendary, or artifact. Standard enhanced items are the most plentiful. Consequently, higher rarity items are more scarce. The game assumes that the secrets of creating the most powerful items arose centuries ago and were then gradually lost as a result of wars or mishaps. Even premium items can't be easily created. Thus, many enhanced items are unique and well-preserved relics.</p>

        <p>Rarity provides a rough measure of an item's power relative to other enhanced items. Each rarity corresponds to a character level, as shown below in the Enhanced Item Rarity and Identification table. A character doesn't typically find a prototype enhanced item, for instance, until 5th-level or later. That said, rarity shouldn't get in the way of your campaign's story. If you want the darksaber to fall into the hands of 1st-level character, so be it. No doubt a great story will arise from that event.</p>

        <h5>Enhanced Item Rarity and Identification</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Character Level</th><th>Identification DC</th></tr></thead><tbody><tr><td><font style="color:#4a5568">Standard</font></td><td>1st or higher</td><td>10</td></tr><tr><td><font style="color:green">Premium</font></td><td>1st or higher</td><td>14</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>5th or higher</td><td>18</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>9th or higher</td><td>22</td></tr><tr><td><font style="color:#dd6b20">Legendary</font></td><td>13th or higher</td><td>26</td></tr><tr><td><font style="color:red">Artifact</font></td><td>17th or higher</td><td>30</td></tr></tbody></table>

        <p>If your campaign allows for trade in enhanced items, rarity can also help you set prices for them. As the GM, you determine the value of an individual enhanced item based on its rarity. Suggested values are provided in the Enhanced Item Rarity table. The value of a consumable, such as a medpac or stimpac, is typically half the value of a permanent item of the same rarity.</p>

        <h3>Identifying Enhanced Items</h3>

        <p>Some enhanced items have properties not readily distinguishable to the naked eye. Identifying such an item requires use of the <em>analyze</em> or <em>telemetry</em> power, or inspection with the appropriate tools.</p>

        <p>If a player is proficient in the appropriate type of tools, as shown in the Tools by Item table on page \<em>\</em>\_, they can make a check with the tools to identify the properties of an enhanced item over the course of a short rest. To use this benefit, they must have the tools, and the enhanced item must be within reach. The DC is found above in the Enhanced Item Rarity and Identification table.</p>

        <h4>Variant: Simpler Identification</h4>

        <p>If you prefer enhanced items to be more readily identifiable, you can allow characters to identify enhanced items through experimentation. Over the course of a short rest, a character can focus on one enhanced item while being in physical contact with it. At the end of the short rest, the character learns the item's properties, as well as how to use them. </p>

        <h3>Attunement</h3>

        <p>Some enhanced items require a creature to form a bond with them before their enhanced properties can be used. This bond is called attunement, and certain items have a prerequisite for it. If the prerequisite is a class, a creature must be a member of that class to attune to the item.</p>

        <p>Without becoming attuned to an item that requires attunement, a creature gains only its unenhanced benefits. For example, an enhanced heavy shield that requires attunement provides the benefits of a normal heavy shield to a creature not attuned to it, but none of its enhanced properties.</p>

        <p>Attuning to an item requires a creature to spend an uninterrupted short rest focused on only that item while being in physical contact with it. This focus can take the form of weapon practice, meditation, or some other appropriate activity. At the end of the short rest, the creature gains an intuitive understanding of how to activate any enhanced properties of the item, including any necessary command words.</p>

        <p>An item can be attuned to only one creature at a time, and a creature can be attuned to a maximum number of items equal to their proficiency bonus; any attempt to attune to an additional item fails. Standard, premium, and prototype items cost one attunement slot, while advanced, legendary and artifact cost two.</p>

        <p>A creature's attunement to an item ends if the creature no longer satisfies the prerequisites for attunement, if the item has been more than 100 feet away for at least 24 hours, if the creature dies, or if another creature attunes to the item. A creature can also voluntarily end attunement by spending another short rest with the item, unless the item is cursed.</p>

        <h4>Variant: Simpler Attunement</h4>

        <p>If you prefer a simpler method, you can instead allow your characters to have a total of three attunement slots. If you do so, enhanced items should only take one attunement slot, regardless of rarity.</p>

        <h3>Cursed Items</h3>

        <p>Some enhanced items bear curses that bedevil their users, sometimes long after a user has stopped using an item. An enhanced item's description specifies whether the item is cursed. Most methods of identifying items, such as the <em>analyze</em> tech power, fail to reveal such a curse, although lore might hint at it. A curse should be a surprise to the item's user when the curse's effects are revealed. </p>

        <p>Attunement to a cursed item can't be ended voluntarily unless the curse is broken first.</p>



        <h2>Enhanced Item Categories</h2>

        <p>Enhanced items fall into different categories depending on the type of enhanced item. Some categories, such as weapons and armor, are obvious. Others are less so.</p>

        <h3>Adventuring Gear</h3>

        <p>Items that don't fall in one of the other categories are considered adventuring gear. They might be worn items, such as boots or a jetpack, or hand-held item like a holocron. This category is a catch-all for for items that don't fit in other categories. </p>

        <h3>Armor</h3>

        <p>Unless an armor's description says otherwise, armor must be worn for its enhanced properties to function.</p>

        <p>Some suits of enhanced armor specify the type of armor they are, such as durasteel armor or combat suit, or the category in which they fall, such as light or heavy armor. If an enhanced armor doesn't specify its armor type, you may choose the type or determine it randomly.</p>

        <h3>Consumables</h3>

        <p>Typically, consumables are single use (unless the description says otherwise). Once a consumable is used, it takes effect immediately and is rendered useless.</p>

        <p>The value of consumables, due to their impermanent nature, is typically half that of permanent enhanced items. Consumables are sub-categorized by their type: </p>

        <p><strong><em>Adrenals.</em></strong> Adrenals are designed to give a short term boost to a creature, like increased speed. Adrenal effects rarely last longer than a minute.</p>

        <p><strong><em>Ammunition.</em></strong> Ammunition is unique sources of power or temporary enhancements for weapons. </p>

        <p><strong><em>Barriers.</em></strong> Barriers offer temporary protection, usually to a single damage type, and rarely last longer than a minute.</p>

        <p><strong><em>Explosives.</em></strong> Explosives, such as cryo grenades or thermal detonators, are designed to cause an effect in a radius that varies depending on their nature. </p>

        <p><strong><em>Medpacs.</em></strong> Medpacs are used to restore hit points to creatures other than droids and constructs.</p>

        <p><strong><em>Poisons.</em></strong> Poisons are used to incapacitate or harm beasts and humanoids.</p>

        <p><strong><em>Stimpacs.</em></strong> Stimpacs offer boosts to creatures, like increasing an ability score, that typically last for an hour or more.</p>

        <p><strong><em>Substances.</em></strong> Substances are often illicit, such as spice or death sticks, or legal and common, like beer or wine. Substances confer a benefit at risk of addiction. Substances are discussed further later in this chapter.</p>

        <p><strong><em>Technology.</em></strong> Technology consumables are used to enhance interactions with technology and other uses, including repairing droids and constructs.</p>



        <h3>Cybernetic Augmentations</h3>

        <p>Cybernetic augmentations are enhancements built in to biological creatures, such as beasts or humanoids. They come in the form of replacements, which replace a physical body part, or enhancements, which simply augment a creature. Cybernetic augmentations are discussed further later in this chapter.</p>

        <h3>Droid Customizations</h3>

        <p>Droid customizations are items that can enhance a droid in some way. They come in the form of parts, which replace a physical droid part, or protocols, which enhance the droid's functions in some way. Droid customizations are discussed later in this chapter.</p>

        <h3>Focuses</h3>

        <p>Focuses are sub-categorized depending on what type of casting they augment: force or tech. </p>

        <p><strong><em>Force.</em></strong> Force focuses are used to augment the casting of force powers. The most common type of force focuses are focus generators, which are held in the hand of the forcecaster. Force focuses are not required to cast force powers.</p>

        <p><strong><em>Tech.</em></strong> Tech focuses are used to augment the casting of tech powers. The most common type of tech focuses are wristpads, which are worn on the forearm of the techcaster. Unlike force focuses, tech focuses are required to cast tech powers.</p>

        <p>A character can only benefit from one focus at a time. Once per round you can switch which focus you are benefiting from (no action required).</p>

        <h3>Modifiable Items</h3>

        <p>Some enhanced items come with vacant slots for item modifications, which improve the enhanced item in some way. Typically, though not always, enhanced items have either built in properties or vacant modification slots, but not both. Modifiable items�and their modifications�are discussed further later in this chapter.</p>

        <h3>Shields</h3>

        <p>Like armor, unless the description says otherwise, the shield must be actively wielded for its enhanced properties to function.</p>

        <p>Some shields specify the category in which they fall, such as light shield generator or any heavy shield. If an enhanced shield doesn't specify its category, you may choose the category or determine it randomly.</p>

        <h3>Weapons</h3>

        <p>Whether crafted for a nefarious or benevolent purpose, weapons are among the most coveted of enhanced items.</p>

        <p>Some enhanced items specify the type of weapon they are in their descriptions, such as a lightsaber or assault cannon, or the category in which they fall, such as vibroweapon or blaster.  If an enhanced weapon doesn't specific its weapon type, you may choose the type or determine it randomly.</p>



        <h2>Awarding Enhanced Items</h2>

        <p>Enhanced items are prized by adventurers are all sorts, often serving as the main reward for an adventurer. This section helps determine which enhanced items end up in the characters' possession.</p>

        <h3>Distribution </h3>

        <p>The Minor and Major Enhanced Items by Rarity tables below show the number of enhanced items a party of four should encounter during a campaign, culminating in 100 enhanced items accumulated by 20th level. The tables show much many of those items are meant to be handed out during the five tiers of play. The second and third tiers (levels 5-8 and 9-12, respectively) are intended to be when characters receive the majority of enhanced items, since these are the tiers where the majority of campaigns occur.</p>

        <h4>Minor and Major Items</h4>

        <p>The most common distinction between minor and major enhanced items is attunement. All items that require attunement should be treated as major enhanced items. On the other hand, all consumables and item modifications should be treated as minor enhanced items. Many items, however, do not easily fall into those two categories. Generally, if the item has a significant impact on one of the three pillars of adventure�exploration, social interaction, or combat�but does not require attunement, it should nonetheless be treated as a major item.</p>

        <p>For instance, armor +1 does not require attunement, but it has a significant impact in combat, so it should be treated as major. Mag-lock boots, however, don't significantly impact any aspect of gameplay, and thus should be treated as minor.</p>



        <h3>Choosing Items Level by Level</h3>

        <p>You decide when to place an item in an adventure that you're creating or modifying usually because you think the story calls for an enhanced item, the characters need one, or the players would be especially pleased to get one.</p>

        <p>When you want to select an item as treasure for an encounter, the Minor and Major Enhanced Items by Rarity tables serve as your item budget, as follows:</p>

        <hr>

        <ul><li><strong>1.</strong> Jot down a copy of the table in your notes, so that you can make adjustments to the numbers as you select items to be placed in an adventure.</li><li><strong>2.</strong> Refer to the line in the Character Level column that corresponds to the level of the player characters in your game. The entries in that row of the table indicate the total number of items that would be appropriate for the characters to receive by the end of the tier represented by that row.</li><li><strong>3.</strong> Choose an enhanced item of any rarity for which the entry in this row is not 0.</li><li><strong>4.</strong> When the characters obtain an item, modify your notes to indicate which part of your budget this expenditure came from by subtracting 1 from the appropriate entry in the table.</li></ul>

        <hr>

        <p>In the future, if you choose an item of a rarity that's not available in the current tier but is still available in a lower tier, deduct the item from the lower tier. If all lower tiers also have no items available of a given rarity, deduct the item from a higher tier.</p>

        <div class="sw5e-book-block"><h5>Minor Enhanced Items by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Character<br> Level</th><th><font style="color:#4a5568">Standard</font></th><th><font style="color:green">Premium</font></th><th><font style="color:blue">Prototype</font></th><th><font style="color:purple">Advanced</font></th><th><font style="color:#dd6b20">Legendary</font></th><th><font style="color:red">Artifact</font></th><th>Total</th></tr></thead><tbody><tr><td>1-4</td><td>6</td><td>3</td><td>�</td><td>�</td><td>�</td><td>�</td><td>9</td></tr><tr><td>5-8</td><td>8</td><td>10</td><td>5</td><td>�</td><td>�</td><td>�</td><td>23</td></tr><tr><td>9-12</td><td>2</td><td>4</td><td>6</td><td>7</td><td>�</td><td>�</td><td>19</td></tr><tr><td>13-16</td><td>�</td><td>2</td><td>3</td><td>5</td><td>6</td><td>�</td><td>16</td></tr><tr><td>17-20</td><td>�</td><td>�</td><td>2</td><td>3</td><td>4</td><td>4</td><td>13</td></tr><tr><td>Total</td><td>16</td><td>19</td><td>16</td><td>15</td><td>10</td><td>4</td><td>80</td></tr></tbody></table>

        <h5>Major Enhanced Items by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Character<br> Level</th><th><font style="color:#4a5568">Standard</font></th><th><font style="color:green">Premium</font></th><th><font style="color:blue">Prototype</font></th><th><font style="color:purple">Advanced</font></th><th><font style="color:#dd6b20">Legendary</font></th><th><font style="color:red">Artifact</font></th><th>Total</th></tr></thead><tbody><tr><td>1-4</td><td>1</td><td>2</td><td>�</td><td>�</td><td>�</td><td>�</td><td>3</td></tr><tr><td>5-8</td><td>�</td><td>1</td><td>4</td><td>�</td><td>�</td><td>�</td><td>5</td></tr><tr><td>9-12</td><td>�</td><td>�</td><td>�</td><td>4</td><td>�</td><td>�</td><td>4</td></tr><tr><td>13-16</td><td>�</td><td>�</td><td>�</td><td>�</td><td>4</td><td>�</td><td>4</td></tr><tr><td>17-20</td><td>�</td><td>�</td><td>�</td><td>�</td><td>�</td><td>4</td><td>4</td></tr><tr><td>Total</td><td>1</td><td>3</td><td>4</td><td>4</td><td>4</td><td>4</td><td>20</td></tr></tbody></table></div>



        <h3>Choosing Items Piecemeal</h3>

        <p>If you prefer a more free-form method of choosing enhanced items, simply select each enhanced item you want to give out; then, when th e characters acquire one, deduct it from the Enhanced Items by Rarity tables in your notes. Whenever you do so, start with the lowest level tier, and deduct the item from the first number you come across in the appropriate rarity column for the item, whether it's minor or major. If that tier doesn't have a number greater than 0 for that rarity, go up a tier until you find one that does, and deduct the enhanced item from that number. Following this process, you will zero out each row of the table in order, going from the lowest levels to the highest.</p>

        <h4>Generating New Enhanced Items</h4>

        <blockquote><p>As a GM, you can easily generate new enhanced items by combining the effects of two like items, provided those items have the same type and subtype (if present). For instance, you could combine the effects of two item modification (augments) to create a new, higher rarity augment, but you couldn't combine the effects of a shield and a suit of armor to create a new item in this way.</p>

        <p>When you do so, you want to combine the rarities of the items whose effects you are combining by assigning a point value to each item. A standard item has a value of 1, premium has a value of 2, and so on up to an artifact's value of 6. Add the points for the items you are combining to determine the new item's rarity. For instance, if you combine the effects a premium (2 points) augment with a prototype (3 points) augment, you end up with a new legendary augment due to the combined total of 5 points. You can't exceed 6 points when combining objects in this way.</p>

        <p>If the two items you are combining confer a like bonus, such as a bonus to attack rolls or the save DC of force powers, that bonus should not exceed +3. If the items already include rules governing the maximum value that item could provide, such as a keen weapon modification, you would instead follow the guidelines provided by that item.</p></blockquote>

        <h3>Overstocking an Adventure</h3>

        <p>The enhanced item tables in this chapter are based on the number of items the characters are expected to receive, not the number of items that are available in an adventure. When creating or modifying an adventure, assume that the characters won't find all of the items you place in it, unless most of the loot is in easy-to-find locations.</p>

        <h4>Are Enhanced Items Necessary?</h4>

        <blockquote><p>Ultimately, this is a question that can only be answered at your table. Some players are more loot driven, while others prefer to focus on the story aspect of gameplay. Generally, a normal campaign assumes that enhanced items appear sporadically and are a boon. Characters and monsters are built to face each other without the aid of enhanced items. Consequently, if your player characters obtain an inordinate amount of enhanced items, encounters might become progressively trivial. As a GM, you have to worry about maintaining that balance.</p></blockquote>

        <h3>Enhanced Item Values</h3>

        <p>The value of an enhanced item varies depending on the rarity of the item, as shown below in the Enhanced Item Value by Rarity table.</p>

        <p>Using the Enhanced Item Value by Rarity table, you then assign prices to the available items, based on their rarity. Halve the price of any consumable item, such as a medpac or explosive, or item modification when using the table to determine an item's value.</p>

        <h5>Enhanced Item Value by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Value</th></tr></thead><tbody><tr><td><font style="color:#4a5568">Standard</font></td><td>up to 1,000 cr</td></tr><tr><td><font style="color:green">Premium</font></td><td>1,001 to 5,000 cr</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>5,000 to 25,000 cr</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>25,000 - 100,000 cr</td></tr><tr><td><font style="color:#dd6b20">Legendary</font></td><td>100,000 - 500,000 cr</td></tr><tr><td><font style="color:red">Artifact</font></td><td>at least 500,000 cr</td></tr></tbody></table>

        <h4>Determine Values Randomly</h4>

        <p>Alternatively, you can determine the value of enhanced items randomly. To do so, you should first roll percentile dice twice, keeping the higher total. Then, you should multiply the result by the modifier, depending on the item's rarity, as shown below in the Value Modifier by Rarity table.</p>

        <h5>Value Modifier by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Value Modifier</th></tr></thead><tbody><tr><td><font style="color:#4a5568">Standard</font></td><td>10 cr</td></tr><tr><td><font style="color:green">Premium</font></td><td>50 cr</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>250 cr</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>1,000 cr</td></tr><tr><td><font style="color:#dd6b20">Legendary</font></td><td>5,000 cr</td></tr><tr><td><font style="color:red">Artifact</font></td><td>25,000 cr</td></tr></tbody></table>

        <p>If item value falls below the base threshold for that rarity, you might instead use the base for that rarity. For instance, if I want to determine the value of a prototype item, I first roll percentile dice twice. I get the results of 63 and 22, so I keep the 63 since it's the higher number. I then multiply that number by the value modifier for prototype (250 cr), ending up with an item value of 15,750 cr (63 x 250 cr). If I instead had rolled 11 and 16 on the percentile dice rolls, however, I would have ended up with an item value of 4,000 cr (16 x 250 cr). Since this falls below the minimum value threshold for prototype items (5,000 cr), you could instead use the minimum.</p>

        <blockquote><p>To reflect the availability of enhanced items in your campaign, you can apply a penalty or bonus, as appropriate to your setting, when resolving the d100 roll determining enhanced item values. </p></blockquote>

        <p>When determining the value for an enhanced item that has an unenhanced version, such as a medpac or a blaster rifle, instead of replacing with the value determined by the rolls above, add the result to the unenhanced item's value.</p>



        <h2>Modifiable Items</h2>

        <p>Some enhanced items come with fixed properties. Other enhanced items, called chassis, are more customizable. </p>

        <h3>Modifying Equipment</h3>

        <p>Modifying an item requires three key components: a modifiable item chassis, a modification to install, and the appropriate tools. An item can only be modified by someone proficient with appropriate tools, as shown in the Item Specific Tools table on page \<em>\</em>\_.</p>

        <h4>Modifiable Item Chassis</h4>

        <p>Every item chassis comes with at least four modification slots, increasing to six at higher rarities, as determined by the chassis's rarity, as shown below in the Modification Slots by Rarity table.</p>

        <h5>Modification Slots by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Modification Slots</th></tr></thead><tbody><tr><td><font style="color:#4a5568">Standard</font></td><td>4</td></tr><tr><td><font style="color:green">Premium</font></td><td>4</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>5</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>5</td></tr><tr><td><font style="color:#dd6b20">Legendary</font></td><td>6</td></tr><tr><td><font style="color:red">Artifact</font></td><td>6</td></tr></tbody></table>

        <p>Every modifiable item chassis has four base slots, determined by its type. Prototype and advanced modifiable item chassis also have one augment slot in addition to the four base slots for their type, while legendary and artifact have two. A modifiable item chassis only requires attunement and is considered enhanced if it has at least one modification installed.</p>

        <p>A modifiable item chassis can only include modifications of the same rarity or a lesser rarity. For instance, if you have a prototype modifiable item chassis, you can modify it with standard, premium, and prototype modifications. However, the item's nature does not allow it to support higher rarity modifications.</p>

        <h4>Installing Modifications</h4>

        <p>Installing a modification takes one hour and requires an ability check with the appropriate tool, as shown in the Item Specific Tools table on page \<em>\</em>\_. The DC for the check is determined by the rarity of the modification being installed, as shown below in the Installation/Removal DC by Rarity table.</p>



        <h5>Installation/Removal DC by Rarity</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Installation/Removal DC</th></tr></thead><tbody><tr><td><font style="color:#4a5568">Standard</font></td><td>10</td></tr><tr><td><font style="color:green">Premium</font></td><td>14</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>18</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>22</td></tr><tr><td><font style="color:#dd6b20">Legendary</font></td><td>26</td></tr><tr><td><font style="color:red">Artifact</font></td><td>30</td></tr></tbody></table>

        <p>On a success, the modification is correctly installed. On a failure, the modification is not installed, and you must wait 24 hours before you can try again.</p>

        <h4>Removing Modifications</h4>

        <p>Removing a modification requires an ability check with the appropriate tool, as shown in the Item Specific Tools table. The DC for the check is determined by the rarity of the modification being removed, as shown above in the Installation/Removal DC by Rarity table.</p>

        <p>On a success, the modification is removed and salvaged. On a failure, the modification is removed but destroyed.</p>



        <h3>Upgrading Modifiable Item Chassis</h3>

        <p>Modifiable item chassis can have their rarity upgraded over time. An item can only be upgraded by someone proficient with the appropriate tools, and it can only be upgraded one rarity step at a time. Modifying a chassis takes eight hours and requires an ability check with the appropriate tool. The DC for the check is determined by the rarity to which the chassis is being upgraded, as shown in the Installation/Removal DC by Rarity table above. Additionally, upgrading the rarity of a chassis requires an appropriate rare material, as discussed in the Crafting downtime activity. Upgrading a modifiable item chassis has no effect on any modifications currently installed in the chassis.</p>

        <p>On a success, the modifiable item chassis is upgraded to the new rarity. On a failure, the modifiable item chassis is not upgraded, you must wait 24 hours before you can try again, and you must roll a d20. If you roll a 1 on the d20, one currently installed modification is destroyed. If the chassis has more than one modification installed, the GM should determine which modification is destroyed randomly.</p>

        <img src='https://www.gmbinder.com/images/aeyZesI.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:580px' />



        <h4>Color Crystals</h4>

        <p>In addition to the modifications unique to themselves, all lightweapons come with a slot for a color crystal. Typically, newly created lightweapons come with one of the more common color variants, such as green, blue, or red. Occasionally, a character might come across a more scarce color crystal. When determining what color crystal a lightweapon comes with, the GM can choose for the player, or have the player make a universal forcecasting ability check with proficiency. The result of the check affects the color of the crystal, as shown below in the Forcecasting Color Crystal Modifier table.</p>

        <h5>Forcecasting Color Crystal Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Forcecasting<br> Ability Check DC</th><th>d100 Roll<br>Item modifier</th></tr></thead><tbody><tr><td>1</td><td>-15</td></tr><tr><td>5</td><td>-10</td></tr><tr><td>10</td><td>-5</td></tr><tr><td>15</td><td>0</td></tr><tr><td>20</td><td>+5</td></tr><tr><td>25</td><td>+10</td></tr><tr><td>30</td><td>+20</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Color Crystal table, which is discussed below.</p></blockquote>

        <p>Once a player has made their forcecasting ability check to discover a lightweapon color crystal, the player rolls percentile dice and consults the Color Crystal table below, applying a modifier based on the result of their forcecasting ability check.</p>

        <h5>Color Crystal</h5>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d100</th><th>Crystal Color</th></tr></thead><tbody><tr><td>1-20</td><td>Blue</td></tr><tr><td>21-40</td><td>Red</td></tr><tr><td>41-60</td><td>Green</td></tr><tr><td>61-70</td><td>Yellow</td></tr><tr><td>71-80</td><td>Purple</td></tr><tr><td>81-90</td><td>Orange</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d100</th><th>Crystal Color</th></tr></thead><tbody><tr><td>91-93</td><td>Viridian</td></tr><tr><td>94-96</td><td>Cyan</td></tr><tr><td>97</td><td>Bronze</td></tr><tr><td>98</td><td>Silver</td></tr><tr><td>99</td><td>White</td></tr><tr><td>100+</td><td>Black</td></tr></tbody></table></div>

        <blockquote><p>This table includes the most common and desirable color crystals. More extensive options can be awarded at the discretion of the GM.</p></blockquote>

        <p>A player can choose the color crystal that is the result of their percentile dice rolled, or they can choose one that falls below it. For instance, if the player rolls a 91 and finds a viridian color crystal, they could instead choose a yellow color crystal, as if they had rolled a 63.</p>

        <h4>Augments</h4>

        <p>Augments are intended to offer features universal across items, such as an increase to an ability score or augmenting a class feature.</p>

        <p>You can't have two of the same augment in a single chassis, but you can have multiples of an augment, each in its own chassis.</p>

        <p><strong><em>Installing Augments in Other Items.</em></strong> Additionally, a character proficient in tinker's implements can add modification slots for augments to items that lack them. First, the character must spend one uninterrupted hour tinkering with the item, which can be done over a short rest, with their tinker's implements. The character must then make an ability check with tinker's implements. On a result of less than 20, the item gains no augment slots, and you must wait 24 hours before you can try again. On a result of 20 or higher, the item gains one augment slot, to a maximum of one augment slot. On a result of 30 or higher, the item gains a two augment slots, to a maximum of two augment slots. Adding augment slots to an item causes that item to require attunement, if it didn't already. An item can't support augments of higher rarity than the item's rarity.</p>

        <h4>Variant: Common Modifications</h4>

        <p>Modifying equipment is a common expectation of adventurers foraying through the worlds of <em>Star Wars</em>. This rule treats all potential modifiable items�that is, the eight categories listed in this chapter�as unmodified standard rarity chassis. For example, every unenhanced blaster you find while adventuring, or for sale in a market, comes with vacant modification slots for blaster modifications.</p>

        <p>Additionally, all modifications of standard rarity should be available for purchase from appropriate vendors without using the Buying Enhanced Items downtime activity.</p>

        <blockquote><p>Note that all chassis of premium or higher rarity should still be treated as enhanced items for the purposes of distribution.</p></blockquote>

        <img src='https://vignette.wikia.nocookie.net/starwars/images/5/5f/LightsaberCrystal-SWE.png/revision/latest?cb=20160911062335' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:260px' />



        <h2>Cybernetic Augmentations</h2>

        <p>Some characters are dissatisfied with their inborn gifts, while some are simply looking to augment their natural prowess. The less fortunate, however, might find themselves missing a limb. For all of these characters, cybernetic augmentations suit a purpose.</p>

        <h3>Augmenting Creatures</h3>

        <p>Augmenting a creature with cybernetic enhancements requires three key components: a valid target for the augmentation, an augmentation to install, and biotech's implements. A creature can only be modified by someone with proficiency in biotech's implements.</p>

        <h4>Valid Targets</h4>

        <p>Typically, only beasts and humanoids are valid targets for augmentations. A creature can support a number of cybernetic augmentations equal to their proficiency bonus.</p>

        <h4>Augmentation Time</h4>

        <p>It takes 8 hours to install an augmentation in a Medium creature. The time it takes to install an augmentation in a creature of another size varies based on the size of the target, as shown below in the Creature Size Time Modifier table below.</p>

        <h5>Creature Size Time Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Creature Size</th><th>Time Modifier</th></tr></thead><tbody><tr><td>Tiny</td><td>x 0.25</td></tr><tr><td>Small</td><td>x 0.5</td></tr><tr><td>Medium</td><td>x 1</td></tr><tr><td>Large</td><td>x 2</td></tr><tr><td>Huge</td><td>x 5</td></tr><tr><td>Gargantuan</td><td>x 10</td></tr></tbody></table>

        <p>For instance, to install an augmentation in a Medium creature takes 8 hours. To install an augmentation in a Huge creature, however, it takes 40 hours (5 x 8).</p>

        <p>The installer works 8 hours per day. It costs 100 credits per hour if the operation is performed by an NPC. </p>

        <h4>Side Effects</h4>

        <p>In addition to the side effects associated with each augmentation, your body undergoes changes, depending on how many augmentations you adopt, as shown below in the Cybernetic Augmentation Side Effects table.</p>

        <h5>Cybernetic Augmentation Side Effects</h5>

        <table class="sw5e-book-table"><thead><tr><th>Number of<br> Augmentations&nbsp;</th><th>Side Effect</th></tr></thead><tbody><tr><td>2</td><td>You have disadvantage on saving throws against effects that deal ion damage.</td></tr><tr><td>4</td><td>You have vulnerability to ion damage.</td></tr><tr><td>6</td><td>You count as a droid for powers that affect only droids or constructs.</td></tr></tbody></table>



        <h3>Installing Augmentations</h3>

        <p>In addition to the time and cost requirement, installing an augmentation requires an ability check with biotech's implements. The DC for the check is determined by the rarity of the augmentation being installed, as shown in the Installation/Removal DC by Rarity table on page \<em>\</em>\.</p>

        <p>On a success, the augmentation is correctly installed. On a failure, the augmentation is not installed, the time and credits are spent, and you must wait 24 hours before you can try again. Additionally, on a failure, the recipient suffers another effect, depending on the type of augmentation installed:</p>

        <ul><li><strong>Enhancement:</strong> On a failure, the recipient suffers one level of exhaustion.</li><li><strong>Replacement:</strong> On a failure, the recipient loses the ability to use the part being replaced for a period of time equal to the time it would take to install the replacement. For instance, to install an arm replacement in a Huge creature it takes 40 hours, performed over five days. If, at the end of the five day period, the installer fails the ability check with biotech's implements, the Huge creature loses the ability to use that arm for five days. </li></ul>

        <h3>Removing Augmentations</h3>

        <p>Removing an augmentation takes half the time and credits it would to install, and requires an ability check with biotech's implements. The DC for the check is determined by the rarity of the augmentation being removed, as shown in the Installation/Removal DC by Rarity table on page \<em>\</em>\.</p>

        <p>On a success, the augmentation is removed and salvaged. On a failure, the augmentation is removed but destroyed.</p>

        <p>Additionally, if removing a replacement augmentation, the recipient loses the ability to use the missing part until it receives another suitable replacement.</p>

        <h3>Augmentation Categories</h3>

        Two major categories of cybernetic augmentations exist in the galaxy: enhancements and<br> replacements.

        <h4>Enhancements</h4>

        <p>Enhancements bestowed new abilities or improved the recipient in some fashion. Enhancements included skeletal reinforcement, subcutaneous communications hardware, and weapon mounts. Some enhancements have visible external components, while others were hidden beneath the skin. </p>

        <h4>Replacements</h4>

        <p>Replacements are prosthetic or artificial units intended to replace limbs and damaged organs. Common replacements provided no benefits other than duplicating the essential functions of their biological counterparts. In appearance, a cybernetic replacement could be recognizably artificial or virtually indistinguishable from the real thing. </p>



        <h2>Droid Customizations</h2>

        <p>Droids vary in form and function. Beyond simply their droid classification and subtype, many droids�or their owners�crave further customizability. Droid customizations are designed for this purpose.</p>

        <h3>Customizing Droids</h3>

        <p>Customizing a droid with droid-specific equipment requires three key components: a droid with a valid slot for the equipment, a piece of equipment to install, and astrotech's implements. A droid can only be customized by someone with proficiency in astrotech's implements.</p>

        <h4>Valid Targets</h4>

        <p>Only droids are valid targets for droid customizations. A droid's motor can support two droid customizations, and can be upgraded to support up to six customizations. </p>

        <h4>Customization Time</h4>

        <p>It takes 8 hours to install a customization in a Medium droid. The time it takes to install a customization in a droid of another size varies based on the size of the target, as shown in the Droid Size Time Modifier table below.</p>

        <h5>Droid Size Time Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Droid Size</th><th>Time Modifier</th></tr></thead><tbody><tr><td>Tiny</td><td>x 0.25</td></tr><tr><td>Small</td><td>x 0.5</td></tr><tr><td>Medium</td><td>x 1</td></tr><tr><td>Large</td><td>x 2</td></tr><tr><td>Huge</td><td>x 5</td></tr><tr><td>Gargantuan</td><td>x 10</td></tr></tbody></table>

        <p>For instance, to install a customization in a Medium droid takes 8 hours. To install an augmentation in a Huge droid, however, it takes 40 hours (5 x 8).</p>

        <p>The installer works 8 hours per day. It costs 100 credits per hour if the operation is performed by an NPC. </p>

        <h4>Motor Upgrading</h4>

        <p>A droid's motor can be upgraded to support more customizations, up to a maximum of six customizations. To upgrade the motor in a Medium droid, it takes 8 hours and a number of credits depending on the total number of slots the upgraded motor grants, as shown below  in the Total Slots Upgrade Cost table.</p>

        <h5>Total Slots Upgrade Cost</h5>

        <table class="sw5e-book-table"><thead><tr><th>Total Slots</th><th>Upgrade Cost</th></tr></thead><tbody><tr><td>3</td><td>2,000 cr</td></tr><tr><td>4</td><td>10,000 cr</td></tr><tr><td>5</td><td>50,000 cr</td></tr><tr><td>6</td><td>200,000 cr</td></tr></tbody></table>



        <p>The time and cost it takes to upgrade a motor in a droid of another size varies based on the size of the target, as shown in the Droid Size Time Modifier table.</p>

        <p>For instance, to upgrade a Medium droid's motor from 2 slots to 3 slots, it takes 8 hours and 2,000 cr. To upgrade a Huge droid's motor from 3 slots to 4 slots, however, it takes 40 hours (5 x 8) and 50,000 cr (5 x 10,000).</p>

        <p>The installer works 8 hours a day. It costs 100 credits per hour if the operation is performed by an NPC.</p>

        <h3>Installing Customizations</h3>

        <p>In addition to the time and cost requirement, installing a customization requires an ability check with astrotech's implements. The DC for the check is determined by the rarity of the customization being installed, as shown in the Installation/Removal DC by Rarity table on page \<em>\</em>\.</p>

        <p>On a success, the customization is correctly installed. On a failure, the customization is not installed, the time and credits are spent, and you must wait 24 hours before you can try again. </p>

        <h3>Removing Customizations</h3>

        <p>Removing a customization takes half the time and credits it would to install, and requires an ability check with astrotech's implements. The DC for the check is determined by the rarity of the customization being removed, as shown in the Installation/Removal DC by Rarity table on page \<em>\</em>\.</p>

        <p>On a success, the customization is removed and salvaged. On a failure, the customization is removed but destroyed.</p>

        <h3>Customization Categories</h3>

        <p>Two major categories of droid customizations exist in the galaxy: parts and protocols. </p>

        <h4>Parts</h4>

        <p>Parts typically enhance or replace the features of a droid. Additional arms, integrated shield generators or weapons, or built-in repulsor lifts. You can't have more parts than your Strength, Dexterity or Constitution modifier (your choice, minimum of one).</p>

        <h4>Protocols</h4>

        <p>Protocols bestow new abilities or improvements on the target droid. Typically, they take the shape of systems improvements and offer no visible indication that they exist. You can't have more protocols than your Intelligence, Wisdom, or Charisma modifier (your choice, minimum of one).</p>

