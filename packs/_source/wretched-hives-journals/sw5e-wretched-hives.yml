        <h2>Research</h2>

        <p>To be forewarned is to be forearmed. This activity allows a character to delve into lore concerning a monster, a location, an enhanced item, or some other specific topic.</p>

        <h3>Resources</h3>

        <p>Typically, a character needs access to a library or some other academic institution to conduct research. Assuming such access is available, conducting research requires one workweek and at least 500 cr spent on materials, bribes, gifts, and other expenses. Spending more money increases your chances of finding noteworthy lore, as shown in Resolution.</p>

        <h3>Resolution</h3>

        <p>The character declares the focus of the research�a specific person, place, or thing. After one workweek, the character makes an Intelligence (Lore) check, with a +1 bonus per 1,000 cr spent beyond the initial 500 cr, up to a maximum bonus of +5. The character then consults the Research Roll Modifier table below.</p>

        <h5>Research Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Research Results table, which is discussed below.</p></blockquote>

        <p>Once the player has determined their research roll modifier, they then roll percentile dice and consult the Research Results table below.</p>

        <h5>Research Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You learn nothing.</td></tr><tr><td>41-<br>70</td><td>You learn one piece of lore.</td></tr><tr><td>71-<br>100</td><td>You learn two pieces of lore.</td></tr><tr><td>101-<br>110</td><td>You learn three pieces of lore.</td></tr><tr><td>111 or<br> higher</td><td>You learn five pieces of lore, as well as the relative location of an item worth at least 5,000 cr.</td></tr></tbody></table>

        <p>Each piece of lore is the equivalent of one true statement about a person, place, or thing. Examples include knowledge of a creature's resistances, the method required to enter a sealed tomb, or the clandestine knowledge held by a specific person.</p>



        <p>As GM, you are the final arbiter concerning exactly what a character learns. For a monster or an NPC, you can reveal elements of statistics or personality. For a location, you can reveal secrets about it, such as a hidden entrance, the answer to a riddle, or the nature of a creature that guards the place.</p>

        <p>Alternatively, you can allow the player to determine what lore they've learned on the spot, after research. When the characters are in an area related to what was researched, a player can expend a lore to uncover something related to the location on hand, assuming it pertains to what was researched. </p>

        <p>Using a mix of the two approaches is a good idea, since it gives you the added depth of specific lore while giving players the freedom to ensure that the lore they learn is useful.</p>

        <p>At any time, a character can have a maximum number of unspecified lore equal to 1 + the character's Intelligence modifier (minimum of 1). Specific, learned lore doesn't count toward this limit�only ones that can be used at any time to learn something related to the original subject of study.</p>

        <h3>Complications</h3>

        <p>The greatest risk in research is uncovering false information. Not all lore is accurate or truthful, and a rival with a scholarly bent might try to lead the character astray, especially if the object of the research is known to the rival. The rival might plant false information, bribe scholars to give bad advice, or steal key information needed to find the truth.</p>

        <p>Additionally, a character might run into other complications during research. Every workweek spent in research brings a 10 percent chance of a triggering a complication. </p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Research Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>You accidentally damage a rare, fragile source of information.</td></tr><tr><td>2</td><td>You offend a scholar, who demands an extravagant gift.</td></tr><tr><td>3</td><td>If you had known the source of information was cursed, you never would have opened it.</td></tr><tr><td>4</td><td>A scholar becomes obsessed with convincing you of a number of strange theories.</td></tr><tr><td>5</td><td>Your actions cause you to be banned from a library or some other academic institution.</td></tr><tr><td>6</td><td>You uncovered useful lore, but only by promising to complete a dangerous task in return.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>Conducting research is generally a long-term activity, requiring time and devotion, best suited to downtime. </p>



        <h2>Selling Enhanced Items</h2>

        <p>Few people can afford to buy an enhanced item, and fewer still know how to find one. Adventurers are exceptional in this regard due to the nature of their profession.</p>

        <p>A character who comes into possession of a standard, premium, prototype, advanced, or possibly legendary enhanced item that he or she wants to sell can spend downtime searching for a buyer. The downtime activity can be performed only in a city or another location where one can find wealthy individuals interested in acquiring enhanced items. Artifact enhanced items can't be sold during downtime. Finding someone to buy such an item can be the substance of an adventure in and of itself.</p>

        <h3>Resources</h3>

        <p>Finding a buyer for a standard, premium, prototype, advanced, or legendary enhanced item takes up to twenty days of effort, depending on the rarity of the enhanced item for sale, and costs 100 cr per day.</p>

        <h3>Resolution</h3>

        <p>For each salable item, the character must make a DC 20 Intelligence (Investigation) check to find buyers. Another character can use his or her downtime to assist with the search, granting advantage on the check. </p>

        <p>On a failure, no buyer for the item is found after a search that lasts a number of days equal to the maximum for that item's rarity, as shown below in the Days to Find Buyer column of the Salable Enhanced Items table below. On a success, a buyer for the item is found after a number of days based on the item's rarity, as shown below in the Salable Enhanced Item table.</p>

        <h5>Salable Enhanced Items</h5>

        <table class="sw5e-book-table"><thead><tr><th>Rarity</th><th>Days to<br> Find Buyer</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>Standard</td><td>1d4</td><td>+10</td></tr><tr><td><font style="color:green">Premium</font></td><td>1d6</td><td>+0</td></tr><tr><td><font style="color:blue">Prototype</font></td><td>1d8</td><td>-10</td></tr><tr><td><font style="color:purple">Advanced</font></td><td>1d10</td><td>-20</td></tr><tr><td><font style="color:orange">Legendary</font></td><td>1d20</td><td>-30</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Selling an Enhanced Item table, which is discussed below.</p></blockquote>

        <p>A character can attempt to find buyers for multiple enhanced items at once. Although this requires multiple Intelligence (Investigation) checks, the searches are occurring simultaneously, and the results of multiple failures or successes aren't added together. For example, if the character finds a buyer for a standard enhanced item in 2 days and a buyer for a premium enhanced item in 5 days, but fails to find a buyer for a prototype enhanced item, the entire search takes 8 days.</p>



        <p>For each item a character wishes to sell, the player rolls percentile dice and consults the Selling an Enhanced Item table below, applying a modifier based on the item's rarity, as shown in the Salable Enhanced Items table. The subsequent total determines what a buyer offers to pay for the item.</p>

        <p>You determine a buyer's identity. Buyers sometimes procure prototype, advanced, and legendary items through proxies to ensure that their identities remain unknown.</p>

        <blockquote><p>As a further option to reflect the availability of enhanced items in your campaign, you can apply up to a -10 penalty for a scarce setting, or up to a +10 bonus for a setting where enhanced items are more common, when resolving the d100 roll for selling enhanced items, as appropriate. </p></blockquote>

        <h5>Selling an Enhanced Item</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>A buyer offering one-quarter of the item's value, or a shady buyer offering half the item's value.</td></tr><tr><td>41-<br>70</td><td>A buyer offering half the item's value, or a shady buyer offering the full item's value.</td></tr><tr><td>71-<br>100</td><td>A buyer offering the full item's value.</td></tr><tr><td>101-<br>110</td><td>A shady buyer offering one and a half times the item's value, no questions asked.</td></tr><tr><td>111 or<br> higher</td><td>A buyer offering one and a half times the item's value, but they also want a favor.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>The buying and selling of enhanced items is fraught with peril. The large sums of money involved and the power offered by enhanced items attract thieves, con artists, and other villains. If the characters encounter a shady buyer, they have a 50 percent chance of triggering a complication. Otherwise, they have a 10 percent chance of triggering a complication.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Selling Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>The item is perceived as a fake.</td></tr><tr><td>2</td><td>The item is stolen before the sale.</td></tr><tr><td>3</td><td>The item is a relic cursed by a dark entity.</td></tr><tr><td>4</td><td>The item's original owner will kill to reclaim it; the party's enemies spread news of the transaction.</td></tr><tr><td>5</td><td>The other party is murdered before the transaction is completed.</td></tr><tr><td>6</td><td>A third party enters the transaction, offering an alternative item.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>The GM can determine whether or not selling enhanced items can be performed during uptime.</p>



        <h2>Training</h2>

        <p>Given enough time, money, and the services of an instructor, a character can learn a language, pick up proficiency with a tool or kit, gain proficiency or even expertise in a skill, or possibly even earn a feat.</p>

        <h3>Resources</h3>

        <p>Receiving training requires you first find a teacher who is willing and capable of teaching you. It then takes a varying amount of time and credits, depending on what you're training in. Costs are paid at the beginning of each workweek.</p>

        <h4>Language or Weapon</h4>

        <p>Learning a new language or training in a new weapon takes 10 workweeks and costs 250 cr per workweek. During resolution, training in a language calls for an Intelligence check, while a weapon requires an attack roll with that weapon. If you are proficient in that saving throw, you add your proficiency bonus to the roll.</p>

        <h4>Tool Training, Proficiency, or Expertise</h4>

        <p>Learning to use a new tool takes 5, 10, or 20 workweeks for training, proficiency, or expertise, respectively and costs the value of the tool in cr per workweek. During resolution, training in a new tool calls for an ability check appropriate to that tool, as determined by the GM. If you are proficient in that saving throw, you add your proficiency bonus to the roll.</p>

        <h4>Skill Training, Proficiency, or Expertise</h4>

        <p>Learning a new skill takes 5, 10, or 20 workweeks and costs at least 250 cr, 500 cr, or 1,000 cr per workweek for training, proficiency, or expertise, respectively. During resolution, training in a new skill calls for an ability check with that skill's governing ability score. If you are proficient in that saving throw, you add your proficiency bonus to the roll.</p>

        <h4>Saving Throw Training or Proficiency</h4>

        <p>Learning a new saving throw takes 10 or 20 workweeks and costs 750 cr or 1,500 cr per workweek for training or proficiency, respectively. During resolution, training in a new saving throw calls for an ability check with that saving throw's governing ability score.</p>

        <h4>Feat</h4>

        <p>Learning a new feat takes 40 workweeks and costs at least 2,000 cr per workweek. During resolution, training in a new feat calls for an ability check appropriate to that feat, as determined by the GM. If you are proficient in that saving throw, you add your proficiency bonus to the roll.</p>

        <h3>Resolution</h3>

        <p>At the end of each workweek, a character makes an ability check depending on their training, and then consults the Training Roll Modifier table.</p>



        <h5>Training Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Training Results table, which is discussed below.</p></blockquote>

        <p>Once the player has determined their training roll modifier, they then roll percentile dice and consult the Training Results table below.</p>

        <h5>Training Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>Your training falters, advancing only half a workweek towards completion.</td></tr><tr><td>41-<br>70</td><td>Your training is adequate, advancing one workweek towards completion.</td></tr><tr><td>71-<br>100</td><td>Your training has a breakthrough, advancing two workweeks towards completion.</td></tr><tr><td>101-<br>110</td><td>Your training is excellent, advancing three workweeks towards completion.</td></tr><tr><td>111 or<br> higher</td><td>Your training is masterful, advancing four workweeks towards completion.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>Complications that arise while training typically involve the teacher. For every five workweeks spent in training, or for each failure during resolution, a character has a 10 percent chance of a complication. Examples of which are on the Training Complications table.</p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>

        <h5>Training Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>Your earn the ire of another of the teacher's students.</td></tr><tr><td>2</td><td>Your teacher instructs you in rare, archaic methods, which draw comments from others.</td></tr><tr><td>3</td><td>Your teacher is a spy sent to learn your plans.</td></tr><tr><td>4</td><td>Your teacher is a wanted criminal.</td></tr><tr><td>5</td><td>Your teacher is a cruel taskmaster.</td></tr><tr><td>6</td><td>Your teacher asks for help dealing with a threat.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>Due to the required time involved in training, it is best suited to downtime.</p>



        <h2>Work</h2>

        <p>When all else fails, an adventurer can turn to an honest trade to earn a living.</p>

        <h3>Resources</h3>

        <p>Taking on a job requires one workweek of work.</p>

        <h3>Resolution</h3>

        <p>The character must make an ability check as appropriate to the job they are trying to perform. The GM might call for a Strength (Athletics) check if the character is working with their hands, an Intelligence check with a set of tools if the character is working as a tradesman, a Charisma (Performance) check if the character is working in a speaking capacity, a Charisma check with a musical instrument if the character is performing in a venue, or any other check the GM deems appropriate. Once the character has made their chosen check, they should consult the Work Roll Modifier table below.</p>

        <h5>Work Roll Modifier</h5>

        <table class="sw5e-book-table"><thead><tr><th>Ability <br>Check DC</th><th>d100 Roll<br> Modifier</th></tr></thead><tbody><tr><td>10</td><td>+5</td></tr><tr><td>15</td><td>+10</td></tr><tr><td>20</td><td>+15</td></tr><tr><td>25</td><td>+20</td></tr><tr><td>30</td><td>+25</td></tr></tbody></table>

        <blockquote><p>The <strong>d100 Roll Modifier</strong> is added to the percentile dice rolled for the Work Results table, which is discussed below.</p></blockquote>

        <h5>Work Results</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;d100&nbsp;&nbsp;</th><th>Result</th></tr></thead><tbody><tr><td>40 or<br> lower</td><td>You earn enough to support a poor lifestyle for the week, with 10 cr left over.</td></tr><tr><td>41-<br>70</td><td>You earn enough to support a modest lifestyle for the week, with 50 cr left over.</td></tr><tr><td>71-<br>100</td><td>You earn enough to support a comfortable lifestyle for the week, with 100 cr left over.</td></tr><tr><td>101-<br>110</td><td>You earn enough to support a wealthy lifestyle for the week, with 200 cr left over.</td></tr><tr><td>111 or<br> higher</td><td>You somehow earn enough to support an aristocratic lifestyle for the week, with 500 cr left over.</td></tr></tbody></table>

        <h3>Complications</h3>

        <p>Despite what should be an uneventful, satisfying week of simple work, complications can arise from this activity. A character spending a week working has a 10 percent chance of triggering a complication. </p>

        <blockquote><p>This is a great opportunity to create a rival to the party, or involve a previous rival.</p></blockquote>



        <h5>Work Complications</h5>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Complication</th></tr></thead><tbody><tr><td>1</td><td>You manage to outperform someone who has been working longer than you, and they're not impressed.</td></tr><tr><td>2</td><td>You bump a coworker in a clearly accidental fashion, but they blow it out of proportion, causing everyone to dislike you.</td></tr><tr><td>3</td><td>A patron asks for a service not provided by your workplace, and asks for the manager when you try to explain this.</td></tr><tr><td>4</td><td>Your manager takes credit for the work you are doing, asserting it is their own.</td></tr><tr><td>5</td><td>One of your coworkers slows down their workload so you have to pick up their slack.</td></tr><tr><td>6</td><td>You sustain a small injury, resulting in a scar.</td></tr><tr><td>7</td><td>Your coworkers, as a group, tell your boss a series of baseless lies. Your boss believes them over you.</td></tr><tr><td>8</td><td>Your coworkers bestow a nickname on you based on an obscure, mundane thing you did or said. They no longer call you by your name.</td></tr></tbody></table>

        <h3>Uptime</h3>

        <p>If you are the type who prefers to hoard their wealth and work for their dinner, you can engage in work during uptime. </p>

        <h4>Resources</h4>

        <p>Taking on a job requires at least one hour of work.</p>

        <h4>Resolution</h4>

        <p>Make an ability check appropriate to the work you are doing and consult the Work Results (Uptime) table below.</p>

        <h5>Work Results (Uptime)</h5>

        <table class="sw5e-book-table"><thead><tr><th>&nbsp;&nbsp;&nbsp;&nbsp;Ability&nbsp;&nbsp;&nbsp;&nbsp;<br>Check DC</th><th>Result</th></tr></thead><tbody><tr><td>10</td><td>You earn enough to support a poor lifestyle for night, with 2 cr left over.</td></tr><tr><td>15</td><td>You earn enough to support a modest lifestyle for night, with 10 cr left over.</td></tr><tr><td>20</td><td>You earn enough to support a comfortable lifestyle for night, with 20 cr left over.</td></tr><tr><td>25</td><td>You earn enough to support a wealthy lifestyle for night, with 40 cr left over.</td></tr><tr><td>30</td><td>You earn enough to support a aristocratic lifestyle for night, with 100 cr left over.</td></tr></tbody></table>

        <h4>Complications</h4>

        <p>You have a 10 percent chance of triggering a complication. If you fail to meet an ability check DC, you instead have a one-hundred percent chance of triggering a complication.</p>

