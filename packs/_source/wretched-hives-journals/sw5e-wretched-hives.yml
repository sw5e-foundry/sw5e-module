nition (range 40/160), reload 12 | | &emsp;Sonic rifle \t    |   800 cr&nbsp;&nbsp;   | 1d8 sonic     | 10 lb&nbsp;&nbsp;  | Ammunition (range 100/400), reload 12, two-handed | | &emsp;Shatter cannon      | 1,300 cr&nbsp;&nbsp;   | 1d10 kinetic   | 24 lb&nbsp;&nbsp;  | Ammunition (range 80/320), burst 4, reload 8, silent,<br> strength 15, two-handed | | &emsp;Shatter rifle       | 1,200 cr&nbsp;&nbsp;   | 1d10 kinetic  | 15 lb&nbsp;&nbsp;  | Ammunition (range 120/480), silent, reload 2, strength 13, two-handed | | &emsp;Shoulder cannon     |  3,200 cr&nbsp;&nbsp;| 1d8 energy | 9 lb&nbsp;&nbsp; | Ammunition (range 60/240), autotarget (15, +2), burst 4, reload 4,<br> special | | &emsp;Switch cannon\t    |  9,400 cr&nbsp;&nbsp;| 1d10 energy | 26 lb&nbsp;&nbsp; | Ammunition (range 80/320), burst 4, reload 8, strength 11,<br> switch (2d4 acid/cold/fire/lightning), two-handed| | &emsp;Switch pistol\t    |  3,100 cr&nbsp;&nbsp;| 1d6 energy | 4 lb&nbsp;&nbsp; | Ammunition (range 40/160), light, reload 12, switch (1d4 fire)| | &emsp;Switch rifle\t    |  5,500 cr&nbsp;&nbsp;| 1d8 energy | 12 lb&nbsp;&nbsp; | Ammunition (range 60/240), reload 8, switch (1d6 lightning),<br> two-handed| | &emsp;Switch sniper\t    |  8,250 cr&nbsp;&nbsp;| 1d12 energy | 16 lb&nbsp;&nbsp; | Ammunition (range 120/480), reload 2, strength 13, switch (1d10 cold),<br> two-handed| | &emsp;Vapor projector     | 1,600 cr&nbsp;&nbsp;| � | 14 lb&nbsp;&nbsp; | Ammunition (range special), reload 5, special, strength 11, two-handed |</p></div>\n\n\n\n<div class=\"sw5e-book-block\"><h5>Lightweapons</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| |:---|---:|:---|-:|:---| | <em>Simple Lightweapons</em>||||| | &emsp;Canesaber           |700 cr&nbsp;&nbsp;|1d6 energy|5 lb&nbsp;&nbsp;|Disguised, finesse, luminous| | &emsp;Wristsaber          |1,000 cr&nbsp;&nbsp;|1d4 energy|2 lb&nbsp;&nbsp;|Finesse, fixed, light, luminous| | <em>Martial Lightweapons</em>||||| | &emsp;Chained lightdagger |1,700 cr&nbsp;&nbsp;|1d6 energy|6 lb&nbsp;&nbsp;|Disarming, finesse, luminous, reach, two-handed| | &emsp;Claymore saber      |2,100 cr&nbsp;&nbsp;|3d4 energy|9 lb&nbsp;&nbsp;|Dexterity 13, luminous, two-handed| | &emsp;Crossguard saber    |  950 cr&nbsp;&nbsp;|1d8 energy|3 lb&nbsp;&nbsp;|Defensive 1, dexterity 13, heavy, luminous, versatile (1d10)| | &emsp;Dual-phase saber    |1,400 cr&nbsp;&nbsp;|1d8 energy|4 lb&nbsp;&nbsp;|Dexterity 11, keen 1, luminous, versatile (1d10)| | &emsp;Guard shoto         |1,350 cr&nbsp;&nbsp;|1d4 energy|3 lb&nbsp;&nbsp;|Defensive 1, finesse, light, luminous| | &emsp;Lightaxe            |1,800 cr&nbsp;&nbsp;|1d10 energy|10 lb&nbsp;&nbsp;|Heavy, luminous, two-handed | | &emsp;Lightfist           |1,200 cr&nbsp;&nbsp;|1d4 energy|2 lb&nbsp;&nbsp;|Disruptive, disguised, fixed, light, luminous | | &emsp;Lightglaive         |1,900 cr&nbsp;&nbsp;|1d12 energy|10 lb&nbsp;&nbsp;|Dexterity 13, luminous, reach, two-handed | | &emsp;Retrosaber          |  800 cr&nbsp;&nbsp;|2d4 energy|8 lb&nbsp;&nbsp;|Keen 1, luminous, special, vicious 1 | | &emsp;Saberaxe\t        |1,400 cr&nbsp;&nbsp;|1d8 energy|5 lb&nbsp;&nbsp;|Brutal 1| | &emsp;Sith saber          |2,400 cr&nbsp;&nbsp;|1d8 energy|3 lb&nbsp;&nbsp;|Dexterity 11, hidden, keen 1, luminous, versatile (1d10) |</p>\n\n<h5>Vibroweapons</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| |:---|---:|:---|-:|:---| | <em>Simple Vibroweapons</em>||||| | &emsp;Vibroclaw           |  600 cr&nbsp;&nbsp;|1d4 kinetic|2 lb&nbsp;&nbsp;|Finesse, fixed, light| | &emsp;Vibrocutter\t\t\t|  300 cr&nbsp;&nbsp;| 1d6 kinetic\t|5 lb&nbsp;&nbsp;|Dexterity 11, heavy, vicious 1 | | <em>Martial Vibroweapons</em>||||| | &emsp;Bolas\t\t\t\t|   70 cr&nbsp;&nbsp;|� \t\t\t\t|2 lb&nbsp;&nbsp;|Light, special, thrown (range 20/60)| | &emsp;Bo-rifle            |2,300 cr&nbsp;&nbsp;| � | 7 lb&nbsp;&nbsp;| Special, two-handed | | &emsp;&emsp;Rifle         |�&nbsp;&nbsp;|1d8 energy | �&nbsp;&nbsp; | Ammunition (range 100/400), reload 6 | | &emsp;&emsp;Staff         |�&nbsp;&nbsp;|1d8 kinetic | �&nbsp;&nbsp; | Double (1d8 kinetic), shocking 13 | | &emsp;Chained dagger      |  850 cr&nbsp;&nbsp;|1d6 kinetic|6 lb&nbsp;&nbsp;|Disarming, finesse, reach, two-handed| | &emsp;Disruptorshiv\t|  900 cr&nbsp;&nbsp;| 1d4 kinetic | 1 lb&nbsp;&nbsp; | Disruptive, finesse, shocking 13| | &emsp;Echostaff\t    |1,200 cr&nbsp;&nbsp;| 1d6 kinetic | 1 lb&nbsp;&nbsp; | Double (1d6 kinetic), finesse, sonorous 13| | &emsp;Electrobaton        |  650 cr&nbsp;&nbsp;|1d4 kinetic|3 lb&nbsp;&nbsp;|Finesse, light, shocking 13| | &emsp;Electroprod\t\t\t|  500 cr&nbsp;&nbsp;|1d4 lightning|2 lb&nbsp;&nbsp;|Disruptive, shocking 13 | | &emsp;Electrohammer       |1,400 cr&nbsp;&nbsp;|2d4 kinetic|18 lb&nbsp;&nbsp;|Heavy, shocking 13, two-handed | | &emsp;Electrostaff        |1,100 cr&nbsp;&nbsp;|1d6 kinetic|6 lb&nbsp;&nbsp;|Double (1d6 kinetic), finesse, shocking 13, two-handed| | &emsp;Electrovoulge       |1,300 cr&nbsp;&nbsp;|1d8 kinetic|15 lb&nbsp;&nbsp;|Reach, shocking 13, two-handed | | &emsp;Mancatcher\t\t\t|  670 cr&nbsp;&nbsp;|1d8 kinetic|12 lb&nbsp;&nbsp;|Reach, special, two-handed| | &emsp;Nervebaton\t    |1,500 cr&nbsp;&nbsp;| 1d6 kinetic | 1 lb&nbsp;&nbsp; | Disruptive, neuralizing 13| | &emsp;Vibrohammer         |1,400 cr&nbsp;&nbsp;|1d10 kinetic|16 lb&nbsp;&nbsp;|Heavy, two-handed | | &emsp;Vibroshield         |  900 cr&nbsp;&nbsp;|1d8 kinetic|7 lb&nbsp;&nbsp;|Defensive 1, fixed| | &emsp;Vibroknife\t\t\t|  600 cr&nbsp;&nbsp;|1d4 kinetic|1 lb&nbsp;&nbsp;|Finesse, light, piercing 1 | | &emsp;Vibrotonfa\t\t\t|1,000 cr&nbsp;&nbsp;|1d4 kinetic|2 lb&nbsp;&nbsp;|Defensive 1, finesse, light | | &emsp;War hat             |1,100 cr&nbsp;&nbsp;|1d6 kinetic|3 lb&nbsp;&nbsp;|Defensive 1, disguised, returning, thrown (range 30/90)| | &emsp;Warsword            |1,400 cr&nbsp;&nbsp;|2d6 kinetic|8 lb&nbsp;&nbsp;|Dexterity 13, two-handed, vicious 1 | | &emsp;Wristblade\t\t\t|1,000 cr&nbsp;&nbsp;|1d6 kinetic|2 lb&nbsp;&nbsp;|Fixed, light |</p></div>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Focuses</h2></div>\n\n<p>For both force- and tech-casting, there exist focuses which are used to channel their respective powers. While focus generators are optional for forcecasters, techcasters are required to have a focus in order to cast their powers. Wristpads are traditionally worn on the wrist and do not require a hand to activate, while focus generators generally take the form of a small scepter or crystal that is traditionally held in the hand.</p>\n\n<h3>Focus Proficiency</h3>\n\n<p>Unlike weapons and armor, no proficiency is required to use focuses. Instead, you need the ability to forcecast for focus generators and the ability to techcast for wristpads.</p>\n\n<h4>Variant: Alternative Focuses</h4>\n\n<blockquote><p>While traditionally there are only two types of focuses�focus generators and wristpads�certain class features and enhanced items unlock the ability to use an alternative item type. If a character wants to use something else as their focus, such as a lightsaber or a heavy shield, consider allowing them to do so. Later in this chapter, you'll find rules to add casting properties to unenhanced focuses. As GM, you can consider extending these rules to weapons and armor, or even tools for your engineer, as you deem appropriate.</p>\n\n<p>Additionally, there are a significant number of focus generator and wristpad modifications that grant these properties. If a player wants to use an alternative focus, consider allowing them to use focus generator and wristpad modifications to in place of the normal modifications for the item they're using as a focus. If they do so, the DC to install or remove a modification, as shown on page \\<em>\\</em>\\_, is increased by 5. You should also consider allowing engineers to install these mods in their archetype focus, even if there is no existing chassis for that item.</p></blockquote>\n\n<h3>Casting Properties</h3>\n\n<p>Some focuses have special properties related to their use, as shown in the Data Recording and Storage subsection of the Adventuring Gear section.</p>\n\n<h4>Absorbing</h4>\n\n<p>While using this item as your focus, when you take damage from any source, you can reduce that damage by an amount up to the absorptive number, provided you have a number of force or tech points equal to half the damage absorbed. When you do so, you lose half the damage taken in force or tech points.</p>\n\n<h4>Accessing</h4>\n\n<p>While using this item as your focus, you gain access to a number of new powers (chosen by the GM) of a combined total no greater than the access number. The powers count as known by you, and you can't unlearn the powers.</p>\n\n<h4>Amplifying</h4>\n\n<p>While using this item as your focus, your critical hit range with melee force or tech attacks increases by an amount equal to the amplifying number.</p>\n\n<h4>Bolstering </h4>\n\n<em><strong>Prerequisite:</strong> Focus generator property</em><br>\n\n<p>While using this item as your focus, your maximum force points increase by the bolstering number.</p>\n\n<h4>Constitution</h4>\n\n<p>While using an item with this property as your focus, you gain no benefit from any additional properties the item has unless your Constitution score meets or exceeds the constitution number.</p>\n\n<h4>Dispelling</h4>\n\n<p>While using this item as your focus, your level of proficiency in force- or tech-casting ability checks increases by a number of steps equal to the empowered number (to trained, from trained to proficient, from proficient to expertise, from expertise to mastery, from mastery to high mastery, or from high mastery to grand mastery).</p>\n\n\n\n<h4>Elongating </h4>\n\n<p>While using this item as your focus, when you cast a power that affects a cylinder, the height of the cylinder increases by an amount equal to the elongating number, and the radius of the cylinder increases by an amount equal to half the elongating number.</p>\n\n<h4>Enlarging</h4>\n\n<p>While using this item as your focus, when you cast a power that affects a cube, the length of each side of the cube increases by an amount equal to the enlarging number.</p>\n\n<h4>Expanding</h4>\n\n<p>While using this item as your focus, when you cast a power that affects a cone, the length of that cone increases by an amount equal to the expanding number.</p>\n\n<h4>Extending </h4>\n\n<p>While using this item as your focus, when you cast a power that affects a line, the length of the line increases by an amount equal to the extending number, and the width of the line increases by an amount equal to half the extending number.</p>\n\n<h4>Fading</h4>\n\n<p>While using this item as your focus, the critical fail range of force or tech powers that require a Strength or Constitution saving throw increases by an amount equal to the fading number.</p>\n\n<h4>Focused</h4>\n\n<p>While using this item as your focus, you can't have disadvantage on Constitution saving throws to maintain concentration.</p>\n\n<h4>Increasing</h4>\n\n<p>While using this item as your focus, when you cast a power that has a range of 5 feet or greater, the range of that power increases by an amount equal to the increasing number.</p>\n\n<h4>Adding Casting Properties to Focuses</h4>\n\n<blockquote><p>Each of these properties can be used to create a new unenhanced focus generator wristpad. When generating new focuses for player character use, each positive property should be offset by a level of Constitution, and each property should increase the of the focus by 1,000 cr. This cost scales by the number of properties and it is in addition to the base cost of the time. For instance, a wristpad with one positive property and the Constitution 11 property would cost 1,600 cr (1,000 cr for the positive property + 600 for the base cost of the wristpad). A wristpad with two positive properties and the Constitution 13 property, however, would cost 3,600 cr (1,000 cr for the first property, 2,000 cr for the second property, and 600 for the base cost of the wristpad). GMs can generate new focuses in this way, similar to how the Weapon Calculator can be used to generate new weapons at the discretion of the GM. Unenhanced focuses can't exceed 1 level in a single property.</p></blockquote>\n\n<h4>Inflating </h4>\n\n<p>While using this item as your focus, when you cast a power that affects a sphere, the radius of the sphere increases by an amount equal to the inflating number.</p>\n\n<h4>Mitigating </h4>\n\n<p>While using this item as your focus, using the Ready action to cast a force or tech power no longer requires concentration. You can only have one instance of this feature active at a time. Additionally, if the power would not be released, and the power was 1st level or higher, the cost of the power is reduced by a number of points equal to the mitigating number, to a minimum of 1.</p>\n\n<h4>Ranging</h4>\n\n<p>While using this item as your focus, your critical hit range with ranged force or tech attacks increases by an amount equal to the ranging number.</p>\n\n<h4>Rending</h4>\n\n<p>While using this item as your focus, the critical fail range of force or tech powers that require a Dexterity or Intelligence saving throw increases by an amount equal to the rending number.</p>\n\n<h4>Repelling</h4>\n\n<p>While using this item as your focus, your powers are no longer automatically dispelled or interrupted. Instead, the DC to interrupt or dispel your powers is equal to 10 + the power's level, or 8 + half your proficiency bonus + your casting modifier for that power, whichever is greater.</p>\n\n<h4>Storing</h4>\n\n<p>While using this item as your focus, you can store 1st-level or higher powers of a combined total no greater than the storing number within the focus for later use. You can cast a power into this item while touching it. The power has no effect other than to be stored in the item. If the item can't hold the power, the power is expended without effect. You can cast any power stored in it at its base level, causing the power to no longer be stored, freeing up the space.</p>\n\n<h4>Surging </h4>\n\n<em><strong>Prerequisite:</strong> Wristpad property</em><br>\n\n<p>While using this item as your focus, your maximum tech points increase by the surging number.</p>\n\n<h4>Withering</h4>\n\n<p>While using this item as your focus, the critical fail range of force or tech powers that require a Wisdom or Charisma saving throw increases by an amount equal to the withering number.</p>\n\n<h4>Variant: Focus Properties and<br> &emsp;Features</h4>\n\n<blockquote><p>Many of these properties could affect class features. Consider extending those properties to benefit those features, as appropriate.</p></blockquote>\n\n\n\n<h2>Adventuring Gear</h2>\n\n<p>This section describes items that have special rules or require further explanation.</p>\n\n<h3>Ammunition</h3>\n\n<h4>Corrosive Cartridge</h4>\n\n<p>A corrosive cartridge is a specialized slug cartridge for use with blaster weapons that deal kinetic damage. When you hit with a shot with the loaded weapon, the creature must make a DC 14 Constitution saving throw, taking 1d8 acid damage on a failed save or half as much on a successful one. If you reduce a creature to 0 hit points with the loaded weapon, it must make a DC 13 Constitution saving throw. On a failed save, it dies immediately without making death saving throws. A disintegrated creature and everything unenhanced it is wearing or carrying are reduced to a pile of fine gray dust. A creature destroyed in this way can not be revitalized. </p>\n\n<h4>Cryo Cell</h4>\n\n<p>A cryo cell is a specialized power cell for use with blaster weapons that deal acid, energy, fire, ion, or sonic damage. The loaded weapon deals cold damage instead of its normal damage type, and when you hit with a shot the creature must make a DC 14 Constitution saving throw. On a failed save, the creature takes 1d4 cold damage and gains 1 slowed level until the end of its next turn. On a successful save, a creature takes half damage and isn't slowed. If this damage reduces a creature to 0 hit points, that creature is frozen in carbonite for 1 hour.</p>\n\n<h4>Deafening Calibrator</h4>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, for the duration, the weapon gains the sonorous 13 property. If it already has the sonorous property, its sonorous number increases by 1, to a maximum of 18.</p>\n\n<h4>Deafening Cell</h4>\n\n<p>A deafening cell is a specialized power cell for use with blaster weapons that deal acid, energy, fire, ion, or sonic damage. The loaded weapon deals sonic damage instead of its normal damage type, and when you hit with a shot the creature must make a DC 14 Constitution saving throw. On a failed save, the creature takes 1d6 sonic damage and is deafened until the start of your next turn. On a successful save, a creature takes half damage and isn't deafened. </p>\n\n<h4>Deafening Collimator</h4>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, for the duration, the weapon gains the sonorous 13 property. If it already has the sonorous property, its sonorous number increases by 1, to a maximum of 18.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Corrosive cartridge</td><td>42 cr</td><td>�</td></tr><tr><td>Cryo cell</td><td>350 cr</td><td>1 lb</td></tr><tr><td>Deafening calibrator</td><td>550 cr</td><td>1 lb</td></tr><tr><td>Deafening cell</td><td>425 cr</td><td>1 lb</td></tr><tr><td>Deafening collimator</td><td>575 cr</td><td>1 lb</td></tr><tr><td>Deafening dart</td><td>70 cr</td><td>�</td></tr><tr><td>Electrifying calibrator</td><td>700 cr</td><td>1 lb</td></tr><tr><td>Electrifying cartridge</td><td>28 cr</td><td>�</td></tr><tr><td>Electrifying collimator</td><td>725 cr</td><td>1 lb</td></tr></tbody></table></div>\n\n<h4>Deafening Dart</h4>\n\n<p>This wrist launcher ammunition deals 1d6 kinetic damage on a hit. Also on a hit, the creature must make a DC 14 Constitution saving throw, taking 1d4 sonic damage on a failed save. </p>\n\n<p>Additionally, on a failed save, a creature is deafened for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Electrifying Calibrator</h4>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, for the duration, the weapon gains the shocking 13 property. If it already has the shocking property, its shocking number increases by 1, to a maximum of 18.</p>\n\n<h4>Electrifying Cartridge</h4>\n\n<p>An electrifying cartridge is a specialized slug cartridge for use with blaster weapons that deal kinetic damage. When you hit with a shot with the loaded weapon, the creature must make a DC 14 Dexterity saving throw. On a failed save, the creature takes 1d4 lightning damage and becomes shocked until the end of its next turn. On a successful save, a creature takes half damage and isn't shocked.</p>\n\n<h4>Electrifying Collimator</h4>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, for the duration, the weapon gains the shocking 13 property. If it already has the shocking property, its shocking number increases by 1, to a maximum of 18.</p>\n\n\n\n<h3>Ammunition</h3>\n\n<h4>Electrifying Dart</h4>\n\n<p>This wrist launcher ammunition deals 1d6 kinetic damage on a hit. Also on a hit, the creature must make a DC 14 Dexterity saving throw, taking 1d4 lightning damage on a failed save. </p>\n\n<p>Additionally, on a failed save, a creature is shocked for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Gas Cartridge</h4>\n\n<p>A gas cartridge is a specialized slug cartridge for use with blaster weapons that deal kinetic damage. When you hit with a shot with the loaded weapon, the creature must make a DC 14 Constitution saving throw. On a failed save, the creature takes 1d6 poison damage and is poisoned until the start of its next turn. On a successful save, a creature takes half damage and isn't poisoned.</p>\n\n<h4>Flechette Clip, Fragmentation</h4>\n\n<p>When triggered, this wrist launcher ammunition fires a volley of kinetic flechette rounds in a short line 15 feet long and 5 feet wide or a long line 45 feet long and 5 feet wide. A single flechette clip holds enough ammunition for three attacks in a short line or one attack in a long line. Each creature must make a DC 14 Dexterity saving throw. A creature takes 1d10 kinetic damage on a failed save, or half as much as on a successful one. If you lack proficiency in the wrist launcher, you must roll the damage dice twice and take the lesser total.</p>\n\n<h4>Flechette Clip, Ion</h4>\n\n<p>When triggered, this wrist launcher ammunition fires a volley of ion flechette rounds in a short line 15 feet long and 5 feet wide or a long line 45 feet long and 5 feet wide. A single flechette clip holds enough ammunition for three attacks in a short line or one attack in a long line. Each creature must make a DC 14 Dexterity saving throw. A creature takes 1d6 ion damage on a failed save, or half as much as on a successful one. Any electronics within the blast radius that aren't being worn or carried are disabled until rebooted. If you lack proficiency in the wrist launcher, you must roll the damage dice twice and take the lesser total.</p>\n\n<h4>Flechette Clip, Plasma</h4>\n\n<p>When triggered, this wrist launcher ammunition fires a volley of energy flechette rounds in a short line 15 feet long and 5 feet wide or a long line 45 feet long and 5 feet wide. A single flechette clip holds enough ammunition for three attacks in a short line or one attack in a long line. Each creature must make a DC 14 Dexterity saving throw. A creature takes 1d10 energy damage on a failed save, or half as much as on a successful one. If you lack proficiency in the wrist launcher, you must roll the damage dice twice and take the lesser total.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Electrifying dart</td><td>85 cr</td><td>�</td></tr><tr><td>Gas cartridge</td><td>36 cr</td><td>�</td></tr><tr><td>Flechette clip, fragmentation</td><td>250 cr</td><td>2 lb</td></tr><tr><td>Flechette clip, ion</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Flechette clip, plasma</td><td>275 cr</td><td>2 lb</td></tr><tr><td>Flechette mag, fragmentation</td><td>550 cr</td><td>4 lb</td></tr><tr><td>Flechette mag, ion</td><td>600 cr</td><td>4 lb</td></tr><tr><td>Flechette mag, plasma</td><td>575 cr</td><td>4 lb</td></tr><tr><td>Flux collimator</td><td>180 cr</td><td>1 lb</td></tr></tbody></table></div>\n\n<h4>Flechette Mag, Fragmentation</h4>\n\n<p>When triggered, this flechette cannon ammunition fires a volley of kinetic flechette rounds in a short line 15 feet long and 5 feet wide or a long line 45 feet long and 5 feet wide. A single flechette mag holds enough ammunition for three attacks in a short line or one attack in a long line. Each creature must make a DC 14 Dexterity saving throw. A creature takes 2d10 kinetic damage on a failed save, or half as much as on a successful one. </p>\n\n<h4>Flechette Mag, Ion</h4>\n\n<p>When triggered, this flechette cannon ammunition fires a volley of ion flechette rounds in a short line 15 feet long and 5 feet wide or a long line 45 feet long and 5 feet wide. A single flechette mag holds enough ammunition for three attacks in a short line or one attack in a long line. Each creature must make a DC 14 Dexterity saving throw. A creature takes 2d6 ion damage on a failed save, or half as much as on a successful one. Any electronics within the blast radius that aren't being worn or carried are disabled until rebooted.</p>\n\n<h4>Flechette Mag, Plasma</h4>\n\n<p>When triggered, this flechette cannon ammunition fires a volley of energy flechette rounds in a short line 15 feet long and 5 feet wide or a long line 45 feet long and 5 feet wide. A single flechette mag holds enough ammunition for three attacks in a short line or one attack in a long line. Each creature must make a DC 14 Dexterity saving throw. A creature takes 2d10 energy damage on a failed save, or half as much as on a successful one. </p>\n\n<h4>Flux Collimator</h4>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon.</p>\n\n\n\n<h3>Ammunition</h3>\n\n<h4>Incendiary Cell</h4>\n\n<p>An incendiary cell is a specialized power cell for use with blaster weapons that deal acid, energy, fire, ion, or sonic damage. The loaded weapon deals fire damage instead of its normal damage type, and when you hit with a shot it sets the ground beneath it in a 5-foot square ablaze for 1 minute. When a creature enters the fire or starts its turn there it must make a DC 14 Dexterity saving throw. On a failed save, the creature takes 1d8 fire damage or half as much on a successful one. A construct makes this save with disadvantage.</p>\n\n<h4>Missile, Incendiary</h4>\n\n<p>This wrist launcher ammunition deals 1d6 kinetic damage on a hit. Additionally, hit or miss, the missile then explodes, setting the ground beneath it in a 15 foot radius ablaze for 1 minute. When a creature enters the fire or starts its turn there it must make a DC 14 Dexterity saving throw. On a failed save, the creature takes 1d8 fire damage or half as much on a successful one. A construct makes this save with disadvantage.</p>\n\n<h4>Missile, Ion</h4>\n\n<p>This wrist launcher ammunition deals 1d6 kinetic damage on a hit. Additionally, hit or miss, the missile then explodes. The target and each creature within 5 feet must make a DC 14 Dexterity saving throw, taking 1d6 ion damage on a failed save or half as much on a successful one. Any electronics within the blast radius that aren't being worn or carried are disabled until rebooted.</p>\n\n<h4>Oscillation Calibrator</h4>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon.</p>\n\n<h4>Panic Calibrator</h4>\n\n<p>As an action, you can apply this calibrator to one vibroweapon or pair of handwraps within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, for the duration, the weapon gains the neuralizing 13 property. If it already has the neuralizing property, its neuralizing number increases by 1, to a maximum of 18.</p>\n\n<h4>Panic Collimator</h4>\n\n<p>As an action, you can apply this collimator to one lightweapon within 5 feet, granting it a +1 bonus to damage rolls for 1 minute. This bonus is in addition to any bonuses granted by the weapon. Additionally, for the duration, the weapon gains the neuralizing 13 property. If it already has the neuralizing property, its neuralizing number increases by 1, to a maximum of 18.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Incendiary cell</td><td>275 cr</td><td>1 lb</td></tr><tr><td>Missile, incendiary</td><td>160 cr</td><td>1/2 lb</td></tr><tr><td>Missile, ion</td><td>140 cr</td><td>1/2 lb</td></tr><tr><td>Oscillation calibrator</td><td>170 cr</td><td>1 lb</td></tr><tr><td>Panic calibrator</td><td>850 cr</td><td>1 lb</td></tr><tr><td>Panic collimator</td><td>875 cr</td><td>1 lb</td></tr><tr><td>Panic dart</td><td>100 cr</td><td>�</td></tr><tr><td>Power generator</td><td>1,250 cr</td><td>5 lb</td></tr><tr><td>Projector canister, corrosive</td><td>300 cr</td><td>2 lb</td></tr></tbody></table></div>\n\n<h4>Panic Dart</h4>\n\n<p>This wrist launcher ammunition deals 1d6 kinetic damage on a hit. Also on a hit, the creature must make a DC 14 Wisdom saving throw, taking 1d4 psychic damage on a failed save. </p>\n\n<p>Additionally, on a failed save, a creature becomes frightened of you for 1 minute. At the start of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Power Generator</h4>\n\n<p>Power generators energize the rotary cannon.</p>\n\n<h4>Projector Canister, Corrosive</h4>\n\n<p>When triggered, this wrist launcher ammunition produces a spray of acid in a line 15 feet long and 5 feet wide or a 15-foot cone. A single fuel canister holds enough fuel for three attacks in a line or a single attack in a cone. Each creature must make a DC 14 Constitution saving throw. On a failed save, a creature takes 1d6 acid damage, and the first attack it makes before the end of its next turn has disadvantage. On a successful save, a creature takes half damage and isn't disadvantaged. If this damage reduces a creature to 0 hit points, it must make a DC 13 Constitution saving throw. On a failed save, it dies immediately without making death saving throws. A disintegrated creature and everything it is wearing and carrying are reduced to a pile of fine gray dust. If you lack proficiency in the wrist launcher, you must roll the damage dice twice and take the lesser total.</p>\n\n\n\n<h3>Ammunition</h3>\n\n<h4>Projector Tank, Corrosive</h4>\n\n<p>When triggered, this vapor projector ammunition produces a spray of acid in a line 15 feet long and 5 feet wide or a 15-foot cone. A single fuel tank holds enough fuel for three attacks in a line or a single attack in a cone. Each creature must make a DC 14 Constitution saving throw. On a failed save, a creature takes 2d6 acid damage, and the first attack it makes before the end of its next turn has disadvantage. On a successful save, a creature takes half damage and isn't disadvantaged. If this damage reduces a creature to 0 hit points, it must make a DC 13 Constitution saving throw. On a failed save, it dies immediately without making death saving throws. A disintegrated creature and everything it is wearing and carrying are reduced to a pile of fine gray dust. </p>\n\n<h4>Projector Tank, Cryo</h4>\n\n<p>When triggered, this vapor projector ammunition produces a beam of carbonite energy in a line 15 feet long and 5 feet wide or a 15-foot cone. A single fuel tank holds enough fuel for three attacks in a line or a single attack in a cone. Each creature must make a DC 14 Constitution saving throw. On a failed save, a creature takes 2d4 cold damage and gains 1 slowed level until the end of your next turn. On a successful save, a creature takes half damage and isn't slowed. If this damage reduces a creature to 0 hit points, that creature is frozen in carbonite for 1 hour.</p>\n\n<h4>Projector Tank, Incendiary</h4>\n\n<p>When triggered, this vapor projector ammunition produces a burst of flame in a line 15 feet long and 5 feet wide or a 15-foot cone. A single fuel tank holds enough fuel for three attacks in a line or a single attack in a cone. Each creature must make a DC 14 Dexterity saving throw, taking 2d8 fire damage or half as much on a successful one. The fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried.</p>\n\n<h4>Rocket, Fragmentation</h4>\n\n<p>This rocket launcher ammunition deals 2d6 kinetic damage on a hit. Additionally, hit or miss, the rocket then explodes. The target and each creature within 15 feet must make a DC 14 Dexterity saving throw, taking 2d10 kinetic damage on a failed save or half as much on a successful one.</p>\n\n<h4>Rocket, Incendiary</h4>\n\n<p>This rocket launcher ammunition deals 2d6 kinetic damage on a hit. Additionally, hit or miss, the rocket then explodes, setting the ground beneath it in a 15 foot radius ablaze for 1 minute. When a creature enters the fire or starts its turn there it must make a DC 14 Dexterity saving throw. On a failed save, the creature takes 2d8 fire damage or half as much on a successful one. A construct makes this save with disadvantage.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Projector tank, corrosive</td><td>625 cr</td><td>3 lb</td></tr><tr><td>Projector tank, cryo</td><td>675 cr</td><td>3 lb</td></tr><tr><td>Projector tank, incendiary</td><td>650 cr</td><td>3 lb</td></tr><tr><td>Rocket, fragmentation</td><td>350 cr</td><td>2 lb</td></tr><tr><td>Rocket, incendiary</td><td>535 cr</td><td>2 lb</td></tr><tr><td>Rocket, ion</td><td>475 cr</td><td>2 lb</td></tr><tr><td>Snare</td><td>300  cr</td><td>2 lb</td></tr><tr><td><em>Clothing</em></td><td></td></tr><tr><td>Clothes, clandestine</td><td>300 cr</td><td>7 lb</td></tr><tr><td>Sunshades</td><td>20 cr</td><td>�</td></tr></tbody></table></div>\n\n<h4>Rocket, Ion</h4>\n\n<p>This rocket launcher ammunition deals 2d6 kinetic damage on a hit. Additionally, hit or miss, the rocket then explodes. The target and each creature within 15 feet must make a DC 14 Dexterity saving throw, taking 2d6 ion damage on a failed save or half as much on a successful one. Any electronics within the blast radius that aren't being worn or carried are disabled until rebooted.</p>\n\n<h4>Snare</h4>\n\n<p>When hit by this wrist launcher ammunition, a Medium or smaller creature is restrained until it is freed. A snare has no effect on formless or Large or larger creatures. A creature can use its action to make a DC 13 Strength or Dexterity check (the target chooses the ability to use), freeing itself or another creature within its reach on a success. The snare has an AC of 10, 5 hit points, and immunity to all damage not dealt by melee weapons. Destroying the snare frees the creature without harming it and immediately ends the snare's effects.</p>\n\n<h3>Clothing</h3>\n\n<h4>Clothes, Clandestine</h4>\n\n<p>These clothes come with two hidden pockets, each of which can store up to 1 lb. Finding these hidden pockets requires a DC 15 Investigation check.</p>\n\n<h4>Sunshades</h4>\n\n<p>These shades are worn over the eyes. While worn, you can no longer have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in direct sunlight. However, while worn, you have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in dim light.</p>\n\n\n\n<h3>Communications</h3>\n\n<h4>Personal Translator</h4>\n\n<p>A personal translator is a hand held device that can translate verbal communications between up to five languages. The languages can be changed out while interfaced with a protocol droid or appropriate computer.</p>\n\n<h4>Vocoder Mask</h4>\n\n<p>A vocoder mask is worn over the nose and mouth of a creature, and can translate verbal communications between up to 15 languages. The languages can be changed out while interfaced with a protocol droid or appropriate computer.</p>\n\n<h3>Data Recording and Storage</h3>\n\n<h4>Credit Chip</h4>\n\n<p>The credit chip is a small, flat card that features a security code and algorithm memory stripes. The chip can be preloaded with a specified number of credits, or it can draw directly from a specific account held by the user. The credit chip can be accessed with a pin, or by a DC 15 slicer's kit check.</p>\n\n<h4>Focus Generator</h4>\n\n<p>A focus generator is a handheld object, typically comprised of a crystal set inside a small translucent rod, that is used to help forcecasters learn to focus on their powers.</p>\n\n<h4>Repelling Wristpad</h4>\n\n<p>This wristpad has the repelling and constitution 11 properties.</p>\n\n<h4>Storing, Withering Focus Generator</h4>\n\n<p>This focus generator has the storing 1, withering 1, and constitution 13 properties.</p>\n\n<h3>Explosives</h3>\n\n<h4>Grenade, Corrosive</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Constitution saving throw. A creature takes 2d8 acid damage on a failed save, or half as much as on a successful one. If this damage reduces a creature to 0 hit points, it must make a DC 13 Constitution saving throw. On a failed save, it dies immediately without making death saving throws. A disintegrated creature and everything unenhanced it is wearing or carrying are reduced to a pile of fine gray dust. A creature destroyed in this way can not be revitalized.</p>\n\n<h4>Grenade, Cryo</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Constitution saving throw. A creature takes 2d6 cold damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature gains 1 slowed level for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Communications</em></td><td></td></tr><tr><td>Personal translator</td><td>150 cr</td><td>1/2 lb</td></tr><tr><td>Vocoder mask</td><td>450 cr</td><td>1/2 lb</td></tr><tr><td><em>Data Recording and Storage</em></td><td></td></tr><tr><td>Credit chip</td><td>100 cr</td><td>�</td></tr><tr><td>Focus generator</td><td>200 cr</td><td>1 lb</td></tr><tr><td>Repelling wristpad</td><td>1,600 cr</td><td>2 lb</td></tr><tr><td>Storing, withering focus generator</td><td>3,200 cr</td><td>1 lb</td></tr><tr><td><em>Explosives</em></td><td></td></tr><tr><td>Grenade, corrosive</td><td>200 cr</td><td>1 lb</td></tr><tr><td>Grenade, cryo</td><td>325 cr</td><td>1 lb</td></tr><tr><td>Grenade, defeaning</td><td>225 cr</td><td>1 lb</td></tr><tr><td>Grenade, electrifying</td><td>300 cr</td><td>1 lb</td></tr><tr><td>Grenade, flash</td><td>350 cr</td><td>1 lb</td></tr></tbody></table></div>\n\n<h4>Grenade, Deafening</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Constitution saving throw. A creature takes 2d6 sonic damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature is deafened for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Grenade, Electrifying</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Dexterity saving throw. A creature takes 2d6 lightning damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature is shocked for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Grenade, Flash</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Constitution saving throw. On a failed save, a creature is blinded for 1 minute. At the start of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n\n\n<h3>Explosives</h3>\n\n<h4>Grenade, Incendiary</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. The grenade explodes, setting the ground in a 10-foot radius ablaze for 1 minute. The fire ignites any flammable objects in the area that aren't being worn or carried.</p>\n\n<p>When a creature enters the fire or starts its turn there, it creature must make a DC 14 Dexterity saving throw. The creature takes 2d8 fire damage on a failed save, or half as much damage on a successful one. </p>\n\n<h4>Grenade, Panic</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Wisdom saving throw. A creature takes 2d6 psychic damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature becomes frightened of you for 1 minute. At the start of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Grenade, Stun</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Constitution saving throw. On a failed save, a creature is stunned until the end of their next turn.</p>\n\n<p>Additionally, on a failed save, a creature is unconscious for 1 minute, until it takes damage, or until someone uses an action to shake or slap the creature awake. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Mine, Corrosive</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Constitution saving throw. A creature takes 2d8 acid damage on a failed save, or half as much as on a successful one. If this damage reduces a creature to 0 hit points, it must make a DC 13 Constitution saving throw. On a failed save, it dies immediately without making death saving throws. A disintegrated creature and everything unenhanced it is wearing or carrying are reduced to a pile of fine gray dust. A creature destroyed in this way can not be revitalized.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Explosives</em></td><td></td></tr><tr><td>Grenade, incendiary</td><td>275 cr</td><td>1 lb</td></tr><tr><td>Grenade, panic</td><td>375 cr</td><td>1 lb</td></tr><tr><td>Grenade, stun</td><td>250 cr</td><td>1 lb</td></tr><tr><td>Mine, corrosive</td><td>425 cr</td><td>2 lb</td></tr><tr><td>Mine, cryo</td><td>625 cr</td><td>2 lb</td></tr><tr><td>Mine, deafening</td><td>450 cr</td><td>2 lb</td></tr><tr><td>Mine, electrifying</td><td>550 cr</td><td>2 lb</td></tr></tbody></table></div>\n\n<h4>Mine, Cryo</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Constitution saving throw. A creature takes 2d6 cold damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature gains 1 slowed level for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Mine, Deafening</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Constitution saving throw. A creature takes 2d6 sonic damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature is deafened for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Mine, Electrifying</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Dexterity saving throw. A creature takes 2d6 lightning damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature is shocked for 1 minute. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n\n\n<h3>Explosives</h3>\n\n<h4>Mine, Flash</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Constitution saving throw. On a failed save, a creature is blinded for 1 minute. At the start of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Mine, Ion</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Dexterity saving throw. A creature takes 2d6 ion damage on a failed save, or half as much as on a successful one. Any electronics within the blast radius that aren't being worn or carried are disabled until rebooted.</p>\n\n<h4>Mine, Panic</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Wisdom saving throw. A creature takes 2d6 psychic damage on a failed save, or half as much as on a successful one. </p>\n\n<p>Additionally, on a failed save, a creature becomes frightened of you for 1 minute. At the start of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<h4>Mine, Plasma</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Dexterity saving throw. A creature takes 2d10 energy damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Mine, Stun</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Constitution saving throw. On a failed save, a creature is stunned until the end of their next turn.</p>\n\n<p>Additionally, on a failed save, a creature is unconscious for 1 minute, until it takes damage, or until someone uses an action to shake or slap the creature awake. At the end of an affected creature's turn, it can repeat this save, ending the effect on a success.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Explosives</em></td><td></td></tr><tr><td>Mine, flash</td><td>600 cr</td><td>2 lb</td></tr><tr><td>Mine, ion</td><td>525 cr</td><td>2 lb</td></tr><tr><td>Mine, panic</td><td>700 cr</td><td>2 lb</td></tr><tr><td>Mine, plasma</td><td>250 cr</td><td>2 lb</td></tr><tr><td>Mine, stun</td><td>475 cr</td><td>2 lb</td></tr><tr><td><em>Life Support</em></td><td></td></tr><tr><td>Underwater respirator</td><td>300 cr</td><td>1/2 lb</td></tr><tr><td>Water suit</td><td>1,500 cr</td><td>20 lb</td></tr><tr><td><em>Medical</em></td><td></td></tr><tr><td>Arm prosthesis</td><td>450 cr</td><td>16 lb</td></tr><tr><td>Ear prosthesis</td><td>100 cr</td><td>1/2 lb</td></tr><tr><td>Eye prosthesis</td><td>250 cr</td><td>1/2 lb</td></tr><tr><td>Facial prosthesis</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Foot prosthesis</td><td>150 cr</td><td>4 lb</td></tr><tr><td>Forearm prosthesis</td><td>300 cr</td><td>8 lb</td></tr><tr><td>Hand prosthesis</td><td>225 cr</td><td>3 lb</td></tr><tr><td>Leg prosthesis</td><td>450 cr</td><td>24 lb</td></tr><tr><td>Throat prosthesis</td><td>325 cr</td><td>2 lb</td></tr><tr><td>Torso prosthesis</td><td>600 cr</td><td>36 lb</td></tr></tbody></table></div>\n\n<h3>Life Support</h3>\n\n<h4>Underwater Respirator</h4>\n\n<p>Underwater respirators are worn over the mouth and lower face. While worn, you can breath underwater, as the respirator filters the water to create breathable oxygen. The respirator functions for 1 hour per power cell (to a maximum of 2 hours) and can be recharged by a power source or replacing the power cells.</p>\n\n<h4>Water Suit</h4>\n\n<p>Water suits are sealed suits that prevent water from getting in or out. Additionally, while wearing a water suit, you can breath underwater, as the suit filters the water to create breathable oxygen.</p>\n\n<h3>Medical</h3>\n\n<h4>Prosthetics</h4>\n\n<p>These cybernetic augmentations don't count against the maximum cybernetic augmentations you can support, but they do count towards your total cybernetics augmentations as shown in the Cybernetic Augmentations Side Effects table. Rules for installing augmentations can be found in chapter 7.</p>\n\n<p><strong><em>Arm Prosthesis.</em></strong> This cybernetic augmentation replaces a single arm, forearm, and hand. </p>\n\n<p><strong><em>Ear Prosthesis.</em></strong> This cybernetic augmentation replaces an ear.</p>\n\n<p><strong><em>Eye Prosthesis.</em></strong> This cybernetic augmentation replaces an eye.</p>\n\n\n\n<p>&emsp;<strong><em>Facial Prosthesis.</em></strong> This cybernetic augmentation replaces all or part of a damaged face.</p>\n\n<p><strong><em>Foot Prosthesis.</em></strong> This cybernetic augmentation replaces a foot. </p>\n\n<p><strong><em>Forearm Prosthesis.</em></strong> This cybernetic augmentation replaces a forearm and hand. </p>\n\n<p><strong><em>Hand Prosthesis.</em></strong> This cybernetic augmentation replaces a hand. </p>\n\n<p><strong><em>Leg Prosthesis.</em></strong> This cybernetic augmentation replaces a leg and a foot. </p>\n\n<p><strong><em>Throat Prosthesis.</em></strong> This cybernetic augmentation replaces a throat, including a creature's voice, though it does not grant a creature the ability to speak beyond their species' capabilities. </p>\n\n<p><strong><em>Torso Prosthesis.</em></strong> This cybernetic augmentation replaces all or part of a damage torso. </p>\n\n<h3>Storage</h3>\n\n<h4>Camtono</h4>\n\n<p>A camtono is a secured, handle container used for transporting valuable goods. A camtono comes with one key. Without the key, unlocking the camtono requires a DC 15 security kit to force open. It stores 5 lb., not exceeding 1/4 cubic foot, has an AC of 10, and 15 hit points. Destroying the camtono risks damaging any goods stored inside.</p>\n\n<h4>Smugglepack</h4>\n\n<p>This backpack comes with a main compartment that stores 15 lb., not exceeding 1/2 cubic foot. Additionally, it has a hidden storage compartment that stores 5 lb., not exceeding 1/4 cubic foot. Finding the hidden compartment requires a DC 15 Investigation check.</p>\n\n<h3>Utilities</h3>\n\n<h4>Computer Spike</h4>\n\n<p>When you make an Intelligence (slicer's kit) check, you can use the spike (no action required) to reroll the check. You must use the new roll. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n<h4>Security Spike</h4>\n\n<p>When you make an Intelligence (security kit) check, you can use the spike (no action required) to reroll the check. You must use the new roll. You can wait until after you roll the d20 before deciding to use the spike, but you must decide before the GM says whether the check succeeds or fails.</p>\n\n<h3>Weapon and Armor Accessories</h3>\n\n<h4>Ammo-feed Belt</h4>\n\n<p>This belt has slots to hold 60 slug cartridges, and can be connected to directly fuel a single blaster weapon that uses slug cartridges. Once per turn, if the powered weapon would be reloaded, it can be done without using an action using any ammunition in the belt. Connecting or disconnecting a weapon takes an action. Replacing 10 slug cartridges takes an action.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Storage</em></td><td></td></tr><tr><td>Camtono</td><td>750 cr</td><td>3 lb</td></tr><tr><td>Smugglepack</td><td>400 cr</td><td>6 lb</td></tr><tr><td><em>Utilities</em></td><td></td></tr><tr><td>Computer spike</td><td>145 cr</td><td>1/2 lb</td></tr><tr><td>Security spike</td><td>150 cr</td><td>1/2 lb</td></tr><tr><td><em>Weapon and Armor Accessories</em></td><td></td><td></td></tr><tr><td>Ammo-feed belt</td><td>450 cr</td><td>1 lb</td></tr><tr><td>Holster</td><td>75 cr</td><td>2 lb</td></tr><tr><td>Power belt</td><td>400 cr</td><td>1 lb</td></tr><tr><td>Rocketpack</td><td>10,000 cr</td><td>35 lb</td></tr></tbody></table></div>\n\n<h4>Holster</h4>\n\n<p>A holster can be worn on the leg, hip, or back, and can be used to store a single weapon. You can draw a weapon stored in a holster without using an action. Once you've done so, you can't do so again until you store a weapon in the holster as an action.</p>\n\n<h4>Power Belt</h4>\n\n<p>This belt has slots to hold six power cells, and can be connected to directly power a single blaster weapon that uses power cells. Once per turn, if the powered weapon would be reloaded, it can be done without using an action using any ammunition in the belt. Connecting or disconnecting a weapon takes an action. Replacing an expended power cell takes an action.</p>\n\n<h4>Rocketpack</h4>\n\n<p>Rocketpacks combine the aerial transportation of a jetpack with the firepower of a rocket launcher. Activating or deactivating the rocketpack's flight capabilities requires a bonus action and, while active, you have a flying speed of 25 feet. The jetpack last for 1 minute per power cell (to a maximum of 5 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<p>Additionally, your rocketpack comes with an integrated rocket launcher with the Ammunition (range 100/400) and reload 1 properties. Rather than traditional power cells, this rocket launcher fires specialized projectiles in the form of rockets. Whenever you would make a ranged weapon attack, you can instead fire this rocket launcher. When firing a rocket at long range, creatures within the radius of the rocket's explosion have advantage on the saving throw. Reloading this rocket launcher takes 1 minute.</p>\n\n\n\n<div class=\"sw5e-book-block\"><div class=\"sw5e-book-block\"><h5>Adventuring Gear</h5></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Corrosive cartridge</td><td>42 cr</td><td>�</td></tr><tr><td>Cryo cell</td><td>350 cr</td><td>1 lb</td></tr><tr><td>Deafening calibrator</td><td>550 cr</td><td>1 lb</td></tr><tr><td>Deafening cell</td><td>425 cr</td><td>1 lb</td></tr><tr><td>Deafening collimator</td><td>575 cr</td><td>1 lb</td></tr><tr><td>Deafening dart</td><td>70 cr</td><td>�</td></tr><tr><td>Electrifying calibrator</td><td>700 cr</td><td>1 lb</td></tr><tr><td>Electrifying cartridge</td><td>28 cr</td><td>�</td></tr><tr><td>Electrifying collimator</td><td>725 cr</td><td>1 lb</td></tr><tr><td>Electrifying dart</td><td>85 cr</td><td>�</td></tr><tr><td>Gas cartridge</td><td>36 cr</td><td>�</td></tr><tr><td>Flechette clip, fragmentation</td><td>250 cr</td><td>2 lb</td></tr><tr><td>Flechette clip, ion</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Flechette clip, plasma</td><td>275 cr</td><td>2 lb</td></tr><tr><td>Flechette mag, fragmentation</td><td>550 cr</td><td>4 lb</td></tr><tr><td>Flechette mag, ion</td><td>600 cr</td><td>4 lb</td></tr><tr><td>Flechette mag, plasma</td><td>575 cr</td><td>4 lb</td></tr><tr><td>Flux collimator</td><td>180 cr</td><td>1 lb</td></tr><tr><td>Incendiary cell</td><td>275 cr</td><td>1 lb</td></tr><tr><td>Missile, incendiary</td><td>160 cr</td><td>1/2 lb</td></tr><tr><td>Missile, ion</td><td>140 cr</td><td>1/2 lb</td></tr><tr><td>Oscillation calibrator</td><td>170 cr</td><td>1 lb</td></tr><tr><td>Panic calibrator</td><td>850 cr</td><td>1 lb</td></tr><tr><td>Panic collimator</td><td>875 cr</td><td>1 lb</td></tr><tr><td>Panic dart</td><td>100 cr</td><td>�</td></tr><tr><td>Power generator</td><td>1,250 cr</td><td>5 lb</td></tr><tr><td>Projector canister, corrosive</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Projector tank, corrosive</td><td>625 cr</td><td>3 lb</td></tr><tr><td>Projector tank, cryo</td><td>675 cr</td><td>3 lb</td></tr><tr><td>Projector tank, incendiary</td><td>650 cr</td><td>3 lb</td></tr><tr><td>Rocket, fragmentation</td><td>350 cr</td><td>2 lb</td></tr><tr><td>Rocket, incendiary</td><td>535 cr</td><td>2 lb</td></tr><tr><td>Rocket, ion</td><td>475 cr</td><td>2 lb</td></tr><tr><td>Snare</td><td>300  cr</td><td>2 lb</td></tr><tr><td><em>Clothing</em></td><td></td><td></td></tr><tr><td>Clothes, clandestine</td><td>300 cr</td><td>7 lb</td></tr><tr><td>Sunshades</td><td>20 cr</td><td>�</td></tr><tr><td><em>Communications</em></td><td></td><td></td></tr><tr><td>Personal translator</td><td>150 cr</td><td>1/2 lb</td></tr><tr><td>Vocoder mask</td><td>450 cr</td><td>1/2 lb</td></tr><tr><td><em>Data Recording and Storage</em></td><td></td><td></td></tr><tr><td>Credit chip</td><td>100 cr</td><td>�</td></tr><tr><td>Focus generator</td><td>200 cr</td><td>1 lb</td></tr><tr><td>Repelling wristpad</td><td>1,600 cr</td><td>2 lb</td></tr><tr><td>Storing, withering focus generator</td><td>3,200 cr</td><td>1 lb</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Explosives</em></td><td></td><td></td></tr><tr><td>Grenade, corrosive</td><td>200 cr</td><td>1 lb</td></tr><tr><td>Grenade, cryo</td><td>325 cr</td><td>1 lb</td></tr><tr><td>Grenade, defeaning</td><td>225 cr</td><td>1 lb</td></tr><tr><td>Grenade, electrifying</td><td>300 cr</td><td>1 lb</td></tr><tr><td>Grenade, flash</td><td>350 cr</td><td>1 lb</td></tr><tr><td>Grenade, incendiary</td><td>275 cr</td><td>1 lb</td></tr><tr><td>Grenade, panic</td><td>375 cr</td><td>1 lb</td></tr><tr><td>Grenade, stun</td><td>250 cr</td><td>1 lb</td></tr><tr><td>Mine, corrosive</td><td>425 cr</td><td>2 lb</td></tr><tr><td>Mine, cryo</td><td>625 cr</td><td>2 lb</td></tr><tr><td>Mine, deafening</td><td>450 cr</td><td>2 lb</td></tr><tr><td>Mine, electrifying</td><td>550 cr</td><td>2 lb</td></tr><tr><td>Mine, flash</td><td>600 cr</td><td>2 lb</td></tr><tr><td>Mine, ion</td><td>525 cr</td><td>2 lb</td></tr><tr><td>Mine, panic</td><td>700 cr</td><td>2 lb</td></tr><tr><td>Mine, plasma</td><td>250 cr</td><td>2 lb</td></tr><tr><td>Mine, stun</td><td>475 cr</td><td>2 lb</td></tr><tr><td><em>Life Support</em></td><td></td><td></td></tr><tr><td>Underwater respirator</td><td>300 cr</td><td>1/2 lb</td></tr><tr><td>Water suit</td><td>1,500 cr</td><td>20 lb</td></tr><tr><td><em>Medical</em></td><td></td></tr><tr><td>Arm prosthesis</td><td>450 cr</td><td>16 lb</td></tr><tr><td>Ear prosthesis</td><td>100 cr</td><td>1/2 lb</td></tr><tr><td>Eye prosthesis</td><td>250 cr</td><td>1/2 lb</td></tr><tr><td>Facial prosthesis</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Foot prosthesis</td><td>150 cr</td><td>4 lb</td></tr><tr><td>Forearm prosthesis</td><td>300 cr</td><td>8 lb</td></tr><tr><td>Hand prosthesis</td><td>225 cr</td><td>3 lb</td></tr><tr><td>Leg prosthesis</td><td>450 cr</td><td>24 lb</td></tr><tr><td>Throat prosthesis</td><td>325 cr</td><td>2 lb</td></tr><tr><td>Torso prosthesis</td><td>600 cr</td><td>36 lb</td></tr><tr><td><em>Storage</em></td><td></td></tr><tr><td>Camtono</td><td>750 cr</td><td>3 lb</td></tr><tr><td>Smugglepack</td><td>400 cr</td><td>6 lb</td></tr><tr><td><em>Utilities</em></td><td></td></tr><tr><td>Computer spike</td><td>145 cr</td><td>1/2 lb</td></tr><tr><td>Security spike</td><td>150 cr</td><td>1/2 lb</td></tr><tr><td><em>Weapon and Armor Accessories</em></td><td></td><td></td></tr><tr><td>Ammo-feed belt</td><td>450 cr</td><td>1 lb</td></tr><tr><td>Holster</td><td>75 cr</td><td>2 lb</td></tr><tr><td>Power belt</td><td>400 cr</td><td>1 lb</td></tr><tr><td>Rocketpack</td><td>10,000 cr</td><td>35 lb</td></tr></tbody></table></div>\n\n\n\n<h2>Tools</h2>\n\n<p>A tool helps you to do something you couldn't otherwise do, such as craft or repair an item, pick a lock, or slice into a computer. Your species, class, background, or feats give you proficiency with certain tools, which lets you add your proficiency bonus to any ability check you make using that tool. Tool use is not tied to a single ability, since proficiency with a tool represents broader knowledge of its use. Like skills, proficiency with a tool allows you to add your proficiency bonus to checks you make with it. Unlike skills, you must have your tools present in order to make an ability check with them. </p>\n\n<p>The table shows examples of some of the most common types of tools. Each tool falls under one of four categories: artisan's implements, gaming sets, musical instruments, or specialist's kits. Each tool requires a separate proficiency. </p>\n\n<h4>Artisan's Implements</h4>\n\n<p>Artisan's implements are predominantly designed for building and crafting things of permanent nature. Each set of implements focuses on a specific craft. </p>\n\n<p><strong><em>Audiotech's Implements.</em></strong> Audiotech's implements are for crafting and tuning musical instruments.</p>\n\n<p><strong><em>Geneticist's Implements.</em></strong> Geneticist's implements are for creating and grafting genetic mutations.</p>\n\n<h4>Gaming Sets</h4>\n\n<p>This item encompasses a wide range of game pieces, including dice and/or decks of cards. A few common examples appear on the Tools table, but other kinds of gaming sets exist. </p>\n\n<h4>Musical Instruments</h4>\n\n<p>Several of the most common types of musical instruments are shown on the table as examples. Musical instruments can often be used in place of�or in addition to�a performance.</p>\n\n<h4>Specialist's Kits</h4>\n\n<p>Like artisan's implements, specialist's kits are need to pursue a craft or trade. Some specialist's kits are used to craft items that are impermanent, such as grenades, medpacs, or poisons while other tools are used to achieve a specific purpose, such as picking locks or creating a disguise.</p>\n\n<p><strong><em>Archaeologist Kit.</em></strong> This kit contains instruments used to carefully collect gems, relics, and other heirlooms. </p>\n\n<p><strong><em>Artillerist's Kit.</em></strong> This kit contains all the necessary equipment to create, repair, and modify turrets. </p>\n\n<p><strong><em>Bioanalysis Kit.</em></strong> This kit contains a variety of instruments such as clippers, mortar and pestle, and pouches and vials used by bioanalysts to harvest and store plants and herbs. </p>\n\n<p><strong><em>Brewer's Kit.</em></strong> This kit contains a variety of devices and containers to adequately distill and house liquors and beers. </p>\n\n<p><strong><em>Munitions Kit.</em></strong> This kit contains the necessary tools to create ammunition for blasters, as well as devices to hone lightweapons and vibroweapons.</p>\n\n\n\n<h5>Tools\t\t\t\t\t\t\t</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Artisan's implements</em></td><td></td><td></td></tr><tr><td>Audiotech's implements</td><td>550 cr</td><td>7 lb</td></tr><tr><td>Geneticist's implements</td><td>900 cr</td><td>4 lb</td></tr><tr><td><em>Specialist's kit</em></td><td></td><td></td></tr><tr><td>Artillerist's kit</td><td>275 cr</td><td>11 lb</td></tr><tr><td>Archaeologist kit</td><td>125 cr</td><td>4 lb</td></tr><tr><td>Bioanalysis kit</td><td>50 cr</td><td>3 lb</td></tr><tr><td>Brewer's kit</td><td>200 cr</td><td>9 lb</td></tr><tr><td>Munitions kit</td><td>425 cr</td><td>6 lb</td></tr><tr><td>Scavenging kit</td><td>75 cr</td><td>4 lb</td></tr><tr><td>Spicer's kit</td><td>700 cr</td><td>4 lb</td></tr></tbody></table>\n\n<p><strong><em>Scavenging Kit.</em></strong> This kit contains the necessary implements to harvest and scavenge ores and metals. </p>\n\n<p><strong><em>Spicer's Kit.</em></strong> This kit contains the required accoutrement to refine materials in order to create illicit substances.</p>\n\n\n\n<h2>Substances</h2>\n\n<p>Substances, most commonly coming in the alcohol and spice varieties, are goods often sought after by the more seedy denizens of the <em>Star Wars</em> underworld. Whether legal or not, people search for these wares, whether to consume or profit on.</p>\n\n<h3>Consumption</h3>\n\n<p>Consuming substances offers powerful temporary boons in the form of a high, potentially offset by a subsequent low. Additionally, consuming substances regularly risks addiction, which reduces the efficacy of substances until a creature abstains from using them.</p>\n\n<h4>Highs and Lows</h4>\n\n<p>Each substance offers a high followed immediately by a potential low. For the duration of the high, a creature might gain a bonus to an ability score, temporary force or tech points, or some other boon. Immediately when the high ends, the character must succeed on a saving throw depending on the substance or suffer a longer-lasting low, which reverses the effects. The high and low varies depending on the substance consumed, and the duration of the high and low vary based on the rarity of the substance consumed, as determined in the item's description.</p>\n\n<p>A creature can only benefit from one substance at a time. If a creature consumes an additional unit of a substance, while currently experiencing a high or a low, they must immediately make a saving throw to resist the effects of addiction before applying the benefits of the consumed substance. Consuming a substance while experiencing a low immediately ends the low, but any time remaining in that low is added to the duration of the low of the additional consumed substance.</p>\n\n<h4>Addiction</h4>\n\n<p>Consuming substances regularly also risks becoming addicted to a substance. When the low of a substance ends, a creature must make a saving throw, determined by what substance they are coming off of, as determined in the substance's description. Addiction is measured in six levels. An effect can give a creature one or more levels of addiction, as specified in the effect's description.</p>\n\n<h5>Addiction Level</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Level</th><th>Effect</th></tr></thead><tbody><tr><td>1</td><td>The duration of lows is doubled.</td></tr><tr><td>2</td><td>The duration of highs is halved.</td></tr><tr><td>3</td><td>The duration of lows is quadrupled, instead of doubled.</td></tr><tr><td>4</td><td>The effect of highs is halved.</td></tr><tr><td>5</td><td>The effect of lows is maximized.</td></tr><tr><td>6</td><td>The effect of highs is minimized.</td></tr></tbody></table>\n\n\n\n<h5>Substances</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Alcoholic beverages</em></td><td></td><td></td></tr><tr><td>Deuterium-pyro</td><td>80 cr</td><td>1/2 lb</td></tr><tr><td>Mummergy</td><td>65 cr</td><td>1/2 lb</td></tr><tr><td>Novanian grog</td><td>70 cr</td><td>1/2 lb</td></tr><tr><td>Raava</td><td>95 cr</td><td>1/2 lb</td></tr><tr><td>Spicebrew</td><td>90 cr</td><td>1/2 lb</td></tr><tr><td>Tihaar</td><td>85 cr</td><td>1/2 lb</td></tr><tr><td>Tsiraki</td><td>60 cr</td><td>1/2 lb</td></tr><tr><td>Vayerbok</td><td>75 cr</td><td>1/2 lb</td></tr><tr><td><em>Spices</em></td><td></td><td></td></tr><tr><td>Andris</td><td>75 cr</td><td>1/8 lb</td></tr><tr><td>Cilona</td><td>60 cr</td><td>1/8 lb</td></tr><tr><td>Giggledust</td><td>80 cr</td><td>1/8 lb</td></tr><tr><td>Glitterstim</td><td>95 cr</td><td>1/8 lb</td></tr><tr><td>Karrak</td><td>90 cr</td><td>1/8 lb</td></tr><tr><td>Muon gold</td><td>65 cr</td><td>1/8 lb</td></tr><tr><td>Yaladai</td><td>70 cr</td><td>1/8 lb</td></tr><tr><td>Yarrock</td><td>85 cr</td><td>1/8 lb</td></tr></tbody></table>\n\n<p>If an already addicted creature suffers another effect that causes addiction, its current level of addiction increases by the amount specified in the effect's description.</p>\n\n<p>A creature suffers the effect of its current level of addiction as well as all lower levels. For example, a creature suffering level 2 addiction has the duration of its lows doubled, and the duration of its highs halved.</p>\n\n<p>An effect that removes addiction reduces its level as specified in the effect's description, with all addiction effects ending if a creature's addiction level is reduced below 1.</p>\n\n<p>If a creature abstains from consuming a substance for 24 hours, they can make a Wisdom saving throw to reduce their addiction level by 1, provided they've completed a long rest during that 24 hours. The DC for the saving throw equals 10 + the creature's addiction level. On a success, their addiction level is reduced by 1. For instance, a creature suffering addiction level 3 can abstain from consuming any substance for 24 hours. If they do so, and they complete a long rest during that 24 hour period, they can make a DC 13 Wisdom saving throw. On a success, their addiction level is reduced to 2.</p>\n\n<h4>Availability </h4>\n\n<blockquote><p>While alcoholic beverages are legal on most planets, spices are not. Whether or these items are readily available is up to your GM.</p></blockquote>\n\n\n\n<h3>Alcoholic Beverages</h3>\n\n<p>The alcoholic beverages are presented in alphabetical order.</p>\n\n<h4>Deuterium-pyro </h4>\n\n<p>This alcoholic beverage, favored amongst ruffians, features a terrible flavor and strong aftertaste. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Strength. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Strength. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n<h4>Mummergy </h4>\n\n<p>Mummergy is a strong-smelling liquor derived from a plant of the same name. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Intelligence. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Intelligence. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n<h4>Novanian Grog</h4>\n\n<p>This grog features a pungent odor and a strong kick. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that increases their current and maximum tech points by 2d4. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, their current and maximum tech points are reduced by 2d4. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n<h4>Raava</h4>\n\n<p>Raava is a traditional liquor breed from zsajhira berries. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Dexterity. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Dexterity. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n\n\n<h4>Spicebrew</h4>\n\n<p>Spicebrew, a popular drink across the galaxy, is a tanned alcoholic beverage topped with foam. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that increases their current and maximum force points by 2d4. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, their current and maximum force points are reduced by 2d4. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n<h4>Tihaar</h4>\n\n<p>This colorless spirit, favored by Mandalorians, burns the mouth and throat when consumed. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check or saving throw using Constitution, and at the start of each of the creature's turns it gains 2d4 temporary hit points. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check or saving throw using Constitution, and for the duration their current and maximum hit points are reduced by 2d4. If this would reduce your maximum hit points below 1, it instead becomes 1. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n<h4>Tsiraki</h4>\n\n<p>Tsiraki is a blue-colored alcoholic beverage crafted from fermented salakberries and pickling spices. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Charisma. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Charisma. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n<h4>Vayerbok</h4>\n\n<p>Vayerbok is a thick, green, vegetable-based alcoholic beverage typically served hot. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Wisdom. At the end of the high, the creature must succeed on a DC 14 Constitution saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Wisdom. At the end of the low, the creature must make a DC 14 Wisdom saving throw to resist addiction.</p>\n\n\n\n<h3>Spices</h3>\n\n<p>The spices are presented in alphabetical order.</p>\n\n<h4>Andris</h4>\n\n<p>Refined andris crystal, a spice mined most commonly on Sevarcos II, sharpens a creature's mind when smoked. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Wisdom. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Wisdom. At the end of the low, the creature must make a DC 14 Constitution saving throw to resist addiction.</p>\n\n<h4>Cilona</h4>\n\n<p>Cilona, the active ingredient in deathsticks, is a hallucinogen that causes an ecstatic feeling that improves strength. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Strength. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Strength. At the end of the low, the creature must make a DC 14 Constitution saving throw to resist addiction.</p>\n\n<h4>Giggledust</h4>\n\n<p>This sandy-brown powder makes everything humorous while enhancing a creature's nimbleness. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Dexterity. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Dexterity. At the end of the low, the creature must make a DC 14 Constitution saving throw to resist addiction.</p>\n\n<h4>Glitterstim</h4>\n\n<p>A silvery-green webbing sharp to the touch, yet when liquidized causes a heightened mental state and pleasurable boost. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Intelligence. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Intelligence. At the end of the low, the creature must make a DC 14 Constitution </p>\n\n\n\n<p>saving throw to resist addiction.</p>\n\n<h4>Karrak</h4>\n\n<p>A powerful painkiller, karrak allows creatures to continue through the most grievous injuries. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check or saving throw using Constitution, and at the start of each of the creature's turns it gains 2d4 temporary hit points. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check or saving throw using Constitution, and for the duration their current and maximum hit points are reduced by 2d4. If this would reduce your maximum hit points below 1, it instead becomes 1. At the end of the low, the creature must make a DC 14 Constitution saving throw to resist addiction.</p>\n\n<h4>Muon Gold</h4>\n\n<p>Muon gold is a lubricant-based spice that gives users intensified mental clarity and focus for a short time. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that increases their current and maximum tech points by 2d4. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, their current and maximum tech points are reduced by 2d4. At the end of the low, the creature must make a DC 14 Constitution saving throw to resist addiction.</p>\n\n<h4>Yaladai</h4>\n\n<p>Yaladai is a powerful stimulant that grants extreme clarity, improving relaxation and focus. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that increases their current and maximum force points by 2d4. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, their current and maximum force points are reduced by 2d4. At the end of the low, the creature must make a DC 14 Constitution saving throw to resist addiction.</p>\n\n<h4>Yarrock</h4>\n\n<p>Yarrock is a hallucinogen which is said to instill a creature with a clear vision of \"the meaning of life\", granting a boost to confidence. As an action, you can apply this substance to a creature within 5 feet. For the next minute, the creature experiences a high that allows them to roll an additional d4 when making an ability check, attack roll, or saving throw using Charisma. At the end of the high, the creature must succeed on a DC 14 Wisdom saving throw or experience a low that lasts 10 minutes, during which they must roll a d4 and subtract the result when making an ability check, attack roll, or saving throw using Charisma. At the end of the low, the creature must make a DC 14 Constitution saving throw to resist addiction.</p>\n\n"
