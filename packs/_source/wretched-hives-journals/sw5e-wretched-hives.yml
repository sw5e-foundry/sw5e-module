tr><tr><td><font style=\"color:red\">Wisdom Stim (Champion)</font></td><td><font style=\"color:red\">Artifact</font></td></tr></tbody></table>\n\n<h4>Charisma Stim (Basic)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Charisma score increases by 2, to a maximum of 20. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n<h4>Charisma Stim (Champion)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Charisma score increases by 10, and its maximum for this score increases by 10. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n<h4>Charisma Stim (Exceptional)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Charisma score increases by 8, and its maximum for this score increases by 8. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n<h4>Charisma Stim (Fine)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Charisma score increases by 2, and its maximum for this score increases by 2. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n<h4>Charisma Stim (Improved)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Charisma score increases by 4, and its maximum for this score increases by 4. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n<h4>Charisma Stim (Superior)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Charisma score increases by 6, and its maximum for this score increases by 6. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n<h4>Constitution Stim (Basic)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Constitution score increases by 2, to a maximum of 20. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n<h4>Constitution Stim (Champion)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's Constitution score increases by 10, and its maximum for this score increases by 10. This effect lasts for 1 hour. A creature can benefit from only one stimpac at a time. </p>\n\n\n\n<h4>Constitution Stim (Exceptional)</h4>\n\n<em><strong>Consumable</strong> (stimpac), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>As an action, you can administer this stimpac to a creature within 5 feet. When you administer this stimpac, the target's 