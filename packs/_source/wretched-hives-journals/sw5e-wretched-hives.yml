m modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains thrown (60/180) property. If it already has the thrown property, the range increases by 30/90.</p>\n\n<h4>Throwing Weapon Guard (Exceptional)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#dd6b20\"><strong>legendary</strong></font></em><br>\n\n<p>This weapon gains thrown (50/150) property. If it already has the thrown property, the range increases by 25/75.</p>\n\n<h4>Throwing Weapon Guard (Fine)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains thrown (20/60) property. If it already has the thrown property, the range increases by 10/30.</p>\n\n<h4>Throwing Weapon Guard (Improved)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>This weapon gains thrown (30/90) property. If it already has the thrown property, the range increases by 15/45.</p>\n\n<h4>Throwing Weapon Guard (Superior)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains thrown (40/120) property. If it already has the thrown property, the range increases by 20/60.</p>\n\n<h4>Venomous Oscillator</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>As a bonus action, you can coat this weapon in a thin layer of poison for 1 minute. The next time you hit with the weapon, the creature must make a DC 15 Constitution saving throw. On a failed save, a creature takes 1d10 poison damage and becomes poisoned for 1 minute.</p>\n\n<p>Once you've used this feature, you must complete a long rest before you can use it again.</p>\n\n<h4>Versatile Frame</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks double or two-handed property</em><br>\n\n<p>This weapon gains the versatile (1d10) property. If it already has the versatile property, the versatile damage increases by one step (from 2d4 to d10, d10 to d12, from d12 to 2d6, or from 2d6 to 3d4).</p>\n\n<h4>Versatile Frame (Superior)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks double or two-handed property</em><br>\n\n<p>This weapon gains the versatile (1d12) property. If it already has the versatile property, the versatile damage increases by two steps (from 2d4 to d12, d10 to 2d6, from d12 to 3d4, or from 2d6 to 3d4).</p>\n\n<h4>Versatile Frame (Champion)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<em><strong>Prerequisite:</strong> Lacks double or two-handed property</em><br>\n\n<p>This weapon gains the versatile (2d6) property. If it already has the versatile property, the versatile damage increases by three steps (from 2d4 to 2d6, d10 to 3d4, from d12 to 3d4, or from 2d6 to 3d4).</p>\n\n<h4>Vicious Ascendancy Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:red\"><strong>artifact</strong></font></em><br>\n\n<p>This weapon gains the vicious 3 property. If it already has the vicious property, its vicious number increases to 3.</p>\n\n<h4>Vicious Fighting Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>This weapon gains the vicious 1 property. If it already has the vicious property, its vicious number increases by 1, to a maximum of 3.</p>\n\n<h4>Vicious Mastery Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>This weapon gains the vicious 2 property. If it already has the vicious property, its vicious number increases by 2, to a maximum of 3.</p>\n\n\n\n<h4>Withercasting Guard (Adept)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Guard (Apprentice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Guard (Journeyman)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Guard (Novice)</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the force save DC of powers that require a Wisdom or Charisma saving throw and a -1 penalty to the force save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Withercasting Oscillator Mk I</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw and a -1 penalty to the tech save DC of powers that require a Strength or Constitution saving throw.</p>\n\n<h4>Withercasting Oscillator Mk II</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:green\"><strong>premium</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +1 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Oscillator Mk III</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:blue\"><strong>prototype</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +2 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Withercasting Oscillator Mk IV</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:purple\"><strong>advanced</strong></font></em><br>\n\n<p>While using this item as your focus, you gain a +3 bonus to the tech save DC of powers that require a Wisdom or Charisma saving throw.</p>\n\n<h4>Wrist Mount Guard</h4>\n\n<em><strong>Item modification</strong> (vibroweapon), <font style=\"color:#4a5568\"><strong>standard</strong></font></em><br>\n\n<p>This weapon gains the fixed property.</p>\n\n\n\n<div class=\"sw5e-book-block\"><h2>Item Modifications (Wristpad)</h2></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><font style=\"color:#4a5568\">Absorbing Amplifier Mk I</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Accessing Motherboard (Simple)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Constitution Dataport (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Dispelling Dataport (Basic)</font></td><td><font style=\"color:#4a5568\">Standard</font></td></tr><tr><td><font style=\"color:#4a5568\">Elongating Dataport Mk I</font></td><td><font style=\"color:#4a5568\">Sta