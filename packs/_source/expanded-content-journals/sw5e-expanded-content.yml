  - name: Pugnacity Practice
    _id: LLioHTGMt4A18rJ3
    text:
      content: |+
        <h2>Pugnacity Practice</h2>

        <p>Those operatives who choose the Pugnacity Practice apply an atypical versatility to their actions, comfortably dispatching foes from afar or face to face.</p>

        <h3>Tools of the Trade</h3>

        <em><strong>Pugnacity Practice:</strong> 3rd level</em><br>

        <p>You've learned to move swiftly while wielding larger armaments. You gain proficiency with medium armor and martial vibroweapons. If you are already proficient in medium armor, you instead gain proficiency in heavy armor. Additionally, you can deal Sneak Attack damage with any weapon, as long as it does not have the heavy or special properties.</p>

        <p>Lastly, you don't need advantage on your attack roll to use your Sneak Attack if no creature other than your target is within 5 feet of you, as long as the target of the attack is below its hit point maximum. All the other rules for the Sneak Attack class feature still apply to you.</p>

        <h3>Blitz Attack</h3>

        <em><strong>Pugnacity Practice:</strong> 3rd level</em><br>

        <p>You've learned ways to use your martial ability to boost your combat performance. When you deal Sneak Attack damage, you may choose to forgo two of your Sneak Attack dice to make the attack a blitz attack.</p>

        <p>Some of your blitz attacks require your target to make a saving throw to resist the attack's effects. The saving throw DC is as follows:</p>

        <hr>

        <div class="sw5e-book-block"><strong>Blitz Attack save DC</strong> = 8 + your proficiency bonus + <br>your Strength or Dexterity modifier (your choice)</div>

        <hr>

        <h4>Demoralizing Attack</h4>

        <p>The target must make a Wisdom saving throw. On a failed save, it is frightened of you until the end of your next turn.</p>

        <h4>Diverting Attack</h4>

        <p>Roll two of your Sneak Attack dice. The first time the target would deal damage before the start of your next turn, that damage is reduced by an amount equal to the resulting roll.</p>

        <h4>Warmonger's Attack</h4>

        <p>If the target makes an attack against you or an allied creature within 5 feet of you before the start of your next turn, you can use your reaction to make a melee weapon attack against it.</p>

        <h3>Extra Attack</h3>

        <em><strong>Pugnacity Practice:</strong> 9th level</em><br>

        <p>When you take the Attack action on your turn, you can choose to attack twice, instead of once. Additionally, you can deal Sneak Attack damage any number of times on your turn. Each time you deal Sneak Attack damage, you can choose how many Sneak Attack dice you apply. You can't apply more than your total Sneak Attack dice each turn.</p>



        <h3>Unrelenting Advance</h3>

        <em><strong>Pugnacity Practice:</strong> 13th level</em><br>

        <p>You have advantage on ability checks and saving throws against effects that would grapple or restrain you. Additionally, if you are grappled or restrained, and you could use your action to attempt to end the effect, you can instead use your bonus action.</p>

        <h3>Razor Focus</h3>

        <em><strong>Pugnacity Practice:</strong> 17th level</em><br>

        <p>You can enter a hyper-focused state of mind for 1 minute as a bonus action. You must maintain concentration, as if concentrating on a power. For the duration, each time you successfully deal Sneak Attack damage against a creature, you gain two additional Sneak Attack dice, cumulatively, as your attacks become increasingly precise. These additional dice are lost when your focus ends, whether through failing to maintain concentration or after 1 minute.</p>

        <p>The first time you use this feature, you suffer no ill effect. If you use this feature again before you finish a long rest, you suffer one level of exhaustion each time you use it.</p>

        <img src='https://www.gmbinder.com/images/Qcqfpkk.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:457px' />

