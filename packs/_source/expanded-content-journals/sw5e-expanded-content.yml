  - name: Arkanian
    _id: 1zQQUGX2lBEsOk9W
    text:
      content: |-
        <h2>Arkanian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Four clawed digits, extreme intelligence, infrared vision</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'0"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Arkania</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Arkanian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Arkanians are a robust near-human species with solid white eyes and clawed, four-fingered hands.</p>

        <p>Arkanians are capable of seeing into the infrared spectrum, and their eyes are sensitive to sources of extreme heat. This proved helpful on their dark and frigid homeworld, but when traveling offworld, many must wear blinders on planets with hotter, younger suns. It is not unheard of for arkanians to undergo genetic or cybernetic manipulation of their own bodies, enhancing themselves so as to be better than "lesser" species.</p>

        <h3>Society and Culture</h3>

        <p>Arkanians are notoriously arrogant, a trait which came from generations of producing some of the galaxy's greatest advancements in genetics and technology. Their homeworld, Arkania, has vast quantities of precious gems; thus, the arkanians have never wanted for much in trade. This wealth went into funding their ambitious scientific projects, the most elaborate of which take generations to be completed. </p>

        <p>Many arkanians have come to see their species as the pinnacle of evolution, and amongst the most�if not <em>the</em> most�intelligent beings in the galaxy. Those species that are not already put off by their aloof nature often fear them, as tales of "mad scientists" and horrific experiments tend to surround them.</p>

        <h3>Names</h3>

        <p>Arkanian names are simultaneously dignified and succinct. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Arkoh, Hyrim, Zeta, Suprin </p>

        <p><strong>Female Names.</strong> Shenna, Elizie, Cratala, Hanna </p>

        <p><strong>Surnames.</strong> Focela, Barzane, Nasdra, Athacorr</p>



        <h3>Arkanian Traits</h3>

        <p>As an arkanian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Arkanians reach adulthood in their late teens and live about 100 years.</p>

        <p><strong><em>Alignment.</em></strong> Due to their arrogance and unscrupulous experimentation, arkanians tend towards lawful dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Arkanians typically stand 5 to 6 feet tall and generally weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Arkanian Brilliance.</em></strong> Whenever you make an ability check, attack roll, or saving throw using Intelligence, you can choose to add 1d4 to the result. You can choose to do this after the check is rolled, but before the DM determines if you've passed or failed the check. You cannot do so again until you complete a short or long rest.</p>

        <p><strong><em>Crafters.</em></strong> You have proficiency in one tool of your choice.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Honed Mind.</em></strong> You have advantage on Intelligence, Wisdom, and Charisma saving throws against force and tech powers.</p>

        <p><strong><em>Infrared Sight.</em></strong> Whenever you make a Wisdom (Perception) check related to sight, you are considered to have expertise in the Perception skill.</p>

        <p><strong><em>Sunlight Sensitivity.</em></strong> You have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in direct sunlight.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Arkanian. Arkanian, when spoken, has an airy tone, and is regarded as one of the most difficult written languages to learn.</p>

        <img src='https://www.gmbinder.com/images/J6Brglm.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:330px' />



