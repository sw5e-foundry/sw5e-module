  - name: Saboteur Practice
    _id: 3bEdFyrEQZPVl33O
    text:
      content: |+
        <h2>Saboteur Practice</h2>

        <p>Those operatives who choose the Saboteur Practice enhance their fine-honed skills of stealth and agility with tech, using advanced technology with the aid of a tracker droid to sustain a longer assault.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Saboteur Practice:</strong> 3rd level</em><br>

        <p>You gain proficiency in astrotech's implements.</p>

        <h3>Techcasting</h3>

        <em><strong>Saboteur Practice:</strong> 3rd level</em><br>

        <p>You have derived powers from schematics with the aid of your wristpad. See chapter 10 for the general rules of techcasting and chapter 12 for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>You learn 3 tech powers of your choice, and you learn more at higher levels, as shown in the Tech Powers Known column of the Saboteur Practice Techcasting table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Tech Points</h4>

        <p>You have a number of tech points equal to half of your operative level, as shown in the Tech Points column of the Saboteur Practice Techcasting table, + your Intelligence modifier. You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many tech powers can be overcharged, consuming more tech points to create a greater effect. You can overcharge these powers to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Saboteur Practice Techcasting table.</p>

        You may only cast tech powers at 4th-level once.<br> You regain the ability to do so after a long rest.

        <h4>Techcasting Ability</h4>

        Intelligence is your techcasting ability for your tech powers. You use your Intelligence whenever a<br> power refers to your techcasting ability.<br> Additionally, you use your Intelligence modifier when setting the saving throw DC for a tech power you cast and when making an attack roll with one.

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + your proficiency bonus + <br>your Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = your proficiency bonus + <br>your Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>You use a wristpad (found in chapter 5) as a techcasting focus for your tech powers.</p>

        <img src='https://www.gmbinder.com/images/sXbGgBh.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:440px' />



        <h3>Tracker Droid Companion</h3>

        <em><strong>Saboteur Practice:</strong> 3rd level</em><br>

        <p>You learn to employ all the knowledge you've accumulated to create and customize your own tracker droid companion.</p>

        <p>Create your tracker droid companion as detailed in the Companions section of the Customization Options document for Expanded Content. You must have astrotech's implements in order to create your droid.</p>

        <p>In addition to its traits and features, your tracker droid companion gains an additional benefit while it is bonded to you:</p>

        <ul><li>Your tracker droid gains two additional traits. It gains one more additional trait when you reach 11th level in this class. For each droid trait in excess of your proficiency bonus, your tech point maximum is reduced by 1. Over the course of a long rest, you can install, replace, or remove a number of tracker droid traits equal to half your Intelligence modifier (minimum of one).</li></ul>

        <p>Lastly, when you cast a tech power of 1st-level or higher that would affect only one target, and your tracker droid companion is bonded and within 10 feet of you or your target, your tracker droid companion can use its reaction to increase the level at which you are casting your power by 1. This feature can increase a power's level above your Max Power Level, and using this feature does not cost additional tech points.</p>

        <p>At 11th level, your tracker droid companion must be within 30 feet of you or your target to benefit from this feature. At 17th level, your tracker droid companion must be within 60 feet.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the operative table. You regain all expended uses when you complete a long rest.</p>

        <h3>Powered Ambush</h3>

        <em><strong>Saboteur Practice:</strong> 9th level</em><br>

        <p>If you are hidden from a creature when you cast a power on it, the creature has disadvantage on any saving throw it makes against the power this turn.</p>

        <h3>Ion Pulse</h3>

        <em><strong>Saboteur Practice:</strong> 13th level</em><br>

        <p>As a bonus action on your turn, you can expend one or more of your tracker droid's Hit Dice to have it emit an pulse of ion energy. Each creature within 5 feet of your tracker droid must make a Constitution saving throw against your tech save DC. A creature takes ion damage for each Hit Die expended in this way on a failed save, or half as much as on a successful one. The size of the damage die equals the size of your tracker droid's Hit Die. Any electronics not being worn or carried within the blast radius are disabled until rebooted.</p>

        <div class="sw5e-book-block"><h5>Saboteur Practice Techcasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Tech Powers<br> Known</th><th>Tech<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>3</td><td>2</td><td>1st</td></tr><tr><td>4th</td><td>4</td><td>2</td><td>1st</td></tr><tr><td>5th</td><td>5</td><td>3</td><td>1st</td></tr><tr><td>6th</td><td>6</td><td>3</td><td>1st</td></tr><tr><td>7th</td><td>7</td><td>4</td><td>2nd</td></tr><tr><td>8th</td><td>8</td><td>4</td><td>2nd</td></tr><tr><td>9th</td><td>9</td><td>5</td><td>2nd</td></tr><tr><td>10th</td><td>10</td><td>5</td><td>2nd</td></tr><tr><td>11th</td><td>11</td><td>6</td><td>2nd</td></tr><tr><td>12th</td><td>12</td><td>6</td><td>2nd</td></tr><tr><td>13th</td><td>13</td><td>7</td><td>3rd</td></tr><tr><td>14th</td><td>14</td><td>7</td><td>3rd</td></tr><tr><td>15th</td><td>15</td><td>8</td><td>3rd</td></tr><tr><td>16th</td><td>16</td><td>8</td><td>3rd</td></tr><tr><td>17th</td><td>17</td><td>9</td><td>4th</td></tr><tr><td>18th</td><td>18</td><td>9</td><td>4th</td></tr><tr><td>19th</td><td>19</td><td>10</td><td>4th</td></tr><tr><td>20th</td><td>20</td><td>10</td><td>4th</td></tr></tbody></table></div>

        <h3>Sabotage</h3>

        <em><strong>Saboteur Practice:</strong> 17th level</em><br>

        <p>You gain the ability to sabotage a tech power in the process of being cast. When a hostile creature casts a tech power, and you are the target of the tech power or within its area of effect, you can use your reaction to force that creature to make an Intelligence saving throw against your tech save DC. On a successful save, the power is cast as normal.</p>

        <p>On a failed save, you negate the power's effects, and the caster takes 1d6 lightning damage per level of the power it was casting. Additionally, on a failed save, the caster's tech focus used to cast the tech power is overloaded and can't be used to cast tech powers for 1 minute. </p>

        <p>At the end of each of the caster's turns, it can repeat the Intelligence saving throw. On a success, it can use the tech focus to cast tech powers again.</p>

        <p>Once you've used this feature, you can't use it again until you finish a long rest.</p>

