  - name: Alignment Tiers
    _id: R8qFPlWHzONl2p00
    text:
      content: |-
        <h3>Alignment Tiers</h3>

        <p>As you earn Light/Dark Points, you reach certain tiers of Alignment Score that manifest themselves in varying ways. If you ever fall below the Light/Dark Points threshold for a Major tier, you immediately lose that tier's benefits. You regain the benefits when you meet the criteria again. Minor tier effects are permanent unless another similar effect occurs.</p>

        <div class="sw5e-book-block"><h4>Force Alignment</h4>

        <table class="sw5e-book-table"><thead><tr><th>Alignment<br> Score</th><th>Features</th></tr></thead><tbody><tr><td><div style="color:blue">100</div></td><td><div style="color:blue">Luminous Being (Major Benevolence Tier V)</div></td></tr><tr><td><div style="color:blue"> 90</div></td><td><div style="color:blue">Minor Benevolence (Tier V)</div></td></tr><tr><td><div style="color:blue"> 80</div></td><td><div style="color:blue">Major Benevolence (Tier IV)</div></td></tr><tr><td><div style="color:blue"> 70</div></td><td><div style="color:blue">Minor Benevolence (Tier IV)</div></td></tr><tr><td><div style="color:blue"> 60</div></td><td><div style="color:blue">Major Benevolence (Tier III)</div></td></tr><tr><td><div style="color:blue"> 50</div></td><td><div style="color:blue">Minor Benevolence (Tier III)</div></td></tr><tr><td><div style="color:blue"> 40</div></td><td><div style="color:blue">Major Benevolence (Tier II)</div></td></tr><tr><td><div style="color:blue"> 30</div></td><td><div style="color:blue">Minor Benevolence (Tier II)</div></td></tr><tr><td><div style="color:blue"> 20</div></td><td><div style="color:blue">Major Benevolence (Tier I)</div></td></tr><tr><td><div style="color:blue"> 10</div></td><td><div style="color:blue">Minor Benevolence (Tier I)</div></td></tr><tr><td>0</td><td>Balanced</td></tr><tr><td><div style="color:red"> 10</div></td><td><div style="color:red">Minor Corruption (Tier I)</div></td></tr><tr><td><div style="color:red"> 20</div></td><td><div style="color:red">Major Corruption (Tier I)</div></td></tr><tr><td><div style="color:red"> 30</div></td><td><div style="color:red">Minor Corruption (Tier II)</div></td></tr><tr><td><div style="color:red"> 40</div></td><td><div style="color:red">Major Corruption (Tier II)</div></td></tr><tr><td><div style="color:red"> 50</div></td><td><div style="color:red">Minor Corruption (Tier III)</div></td></tr><tr><td><div style="color:red"> 60</div></td><td><div style="color:red">Major Corruption (Tier III)</div></td></tr><tr><td><div style="color:red"> 70</div></td><td><div style="color:red">Minor Corruption (Tier IV)</div></td></tr><tr><td><div style="color:red"> 80</div></td><td><div style="color:red">Major Corruption (Tier IV)</div></td></tr><tr><td><div style="color:red"> 90</div></td><td><div style="color:red">Minor Corruption (Tier V)</div></td></tr><tr><td><div style="color:red">100</div></td><td><div style="color:red">Dark Entity (Major Corruption Tier V)</div></td></tr></tbody></table></div>
