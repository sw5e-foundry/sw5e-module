  - name: Standing from Prone while Flanked
    _id: 2aR9h1Dc5IuML3il
    text:
      content: |-
        <h3>Standing from Prone while Flanked</h3>

        <p>When a creature attempts to stand from prone while flanked, it can choose to make a Strength (Athletics) or Dexterity (Acrobatics) check (DC = 10 + its penalty from flanking). On a success, the creature stands and can move to an unoccupied space within 5 feet of it without provoking opportunity attacks. On a failure, the creature remains prone and loses the movement it would have used to stand.</p>



