  - name: Zygerrian
    _id: Qyu0xkIhVQUp0lqb
    text:
      content: |+
        <h2>Zygerrian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Light tones</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, brown, gray, or red</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Blue or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Large pointed ears, clawed hands, fur-covered faces, bony facial spurs</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'1"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>120 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Zygerria</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Zygerrian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Zygerrians are a bipedal, sentient humanoid species. Feline in appearance, the species possesses strong, angular features, with long fangs jutting from their jaws and claws extending from their hands. The Zygerrians' faces and their pointed ears are almost entirely covered with fur; males usually have more hair than females, with bands of fur growing on their cheeks. Male Zygerrians also display a number of bony spurs protruding from the chin, which females typically lack. Zygerrians usually have sallow complexions and are physically strong, but some suffer from obesity. </p>

        <h3>Society and Culture</h3>

        <p>A warlike species, the Zygerrians hold strength�both physical and mental�in great esteem, viewing it as a means to gain power and authority. They believe that it is the natural order of life for the strong to dominate the weak, so slavery is normal for the species, and a display of weakness could mean death or enslavement in their culture. Those who become their slaves are viewed as inferior by the Zygerrians.</p>

        <p>Zygerrian society is organized into clans and classes. They have a noble class, many members of which, despite their high status, pursue a career in the military. The Zygerrian government is a monarchy; female rulers hold the title of Queen, and males are addressed as Kings.</p>

        <p>The center of the Zygerrian society is the Zygerrian Slavers Guild, which focuses on the slave trade in the Outer Rim Territories. </p>

        <h3>Names</h3>

        <p>Zygerrian names are rather diverse, though shorter names are the most common. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Agruss, Darts, Atai, Sono</p>

        <p><strong>Female Names.</strong> Miraj, Faralhi, Latrans, MaDall</p>

        <p><strong>Surnames.</strong> D'nar, Molec, Scientel, Thanda, Tyne</p>



        <h3>Zygerrian Traits</h3>

        <p>As a Zygerrian, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Charisma score<br> increases by 2, and your Intelligence score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Zygerrians reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Zygerrian culture's emphasis on subjugation and strength causes them to tend towards chaotic dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Zygerrians normally stand between 5 to 6 feet tall and weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Acrobatic.</em></strong> You have proficiency in Acrobatics.</p>

        <p><strong><em>Claws.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Darkvision.</em></strong> You have a cat's keen senses, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Notorious Slavers.</em></strong> Whenever you make an ability check related to the buying, selling, or controlling of slaves, you are considered proficient in the check. If you would already be proficient, you instead have expertise.</p>

        <p><strong><em>Reputation for Cruelty.</em></strong> You are proficient in Intimidation, as well as the saberwhip and vibrowhip.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Zygerrian. Zygerrian is characterized by its subtle growls and purrs.</p>

