  - name: Bloodstorm Approach
    _id: UXA5co3GqweZr8fw
    text:
      content: |+
        <h2>Bloodstorm Approach</h2>

        <p>The Bloodstorm Approach is said to have originated from the ancient wookiee Hroufrasnooohn clan (which loosely translates to Bloodstorm in Galactic Basic), whose warriors performed gravity-defying feats with their flying vibroaxes through a combination of unorthodox techniques and a mystical belief in their own abilities. A berserker who follows this approach can hurl their devastating weapons at enemies with such power and skill that it completely blurs the line between melee and ranged combat.</p>

        <h3>Furious Throw</h3>

        <em><strong>Bloodstorm Approach:</strong> 3rd level</em><br>

        <p>Your throwing techniques have become a perfect extension of your melee prowess. When you throw a weapon with which you are proficient, you can benefit from your class features that only apply to melee weapon attacks, such as Rage or Reckless Attack.</p>

        <h3>Returning Attacks</h3>

        <em><strong>Bloodstorm Approach:</strong> 3rd level</em><br>

        <p>Any weapon you throw can ricochet back to you at your command. When you make a thrown weapon attack, you may have the weapon fly back to your hand immediately after the attack.</p>

        <h3>Throw Anything</h3>

        <em><strong>Bloodstorm Approach:</strong> 6th level</em><br>

        <p>Your strength and mastery of throwing techniques has allowed you to throw vibroaxes as easily as others hurl vibrodaggers. When you are wielding a light- or vibro-weapon with which you are proficient, it gains the thrown property (range 20/60).</p>

        <h3>Fling People</h3>

        <em><strong>Bloodstorm Approach:</strong> 10th level</em><br>

        <p>You learn to throw creatures as easily as you throw your weapons. When you successfully grapple a creature, you may immediately throw the creature.</p>

        <h4>Throw Friend</h4>

        If the creature is a willing ally and volunteers<br> to be grappled, you throw the target into any unoccupied space within 60 feet. That creature<br> may immediately use its reaction to make one<br> melee weapon attack, adding your Strength<br> modifier to the attack's damage roll.

        <h4>Throw Foe</h4>

        <p>If the creature is an opponent, you throw the target into any unoccupied space within 30 feet, where it takes damage equal to your Strength modifier and falls prone.</p>



        <h3>Raging Whirlwind</h3>

        <em><strong>Bloodstorm Approach:</strong> 14th level</em><br>

        <p>You can send your weapon spinning into a gravity-defying whirlwind of pain. Once per rage as an action, you may throw a weapon with the thrown property to a point you choose within 60 feet. The weapon fills the air as a cyclone in a 10 foot radius sphere centered on that point. A creature takes damage equal to the thrown weapon's damage + your Strength modifier + your Rage Damage when it enter's the whirlwind's area for the first time on a turn or starts its turn there. This effect ends when you command the weapon to return to you (no action required) or your rage ends.</p>

        <img src='https://www.gmbinder.com/images/ZG0fURq.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:520px' />

