  - name: Chironian
    _id: FUFwJ8YBzFKZnPhP
    text:
      content: |-
        <h2>Chironian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Brown, gold, or red</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, brown, gold, or red</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red to gold</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Two transparent horns, centauriform</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>6'0"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>450 lb.</td><td>x(2d8) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Chiron</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Chironan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The chironian lower body has four legs, similar to that of a horse, and each ends in a dainty, cloven hoof. A chironian can sit down by folding his or her horse-like legs underneath the body. Chironians can also kick backward with both hind legs; this strong kick is sufficient to knock over other beings. A chironian's pace can vary between a walk, a canter, and a gallop.</p>

        <p>Each year, chironian heads grows two horns above the temples. These horns start as small knobs covered by red-furred velvet: a vascular tissue. Once the knobs have grown sufficiently, they break through the velvet naturally, emerging as transparent horns, as bright as diamond, cool to the touch and with smooth ridges. However, if the velvet is cut artificially, chironians can die from the injury. Over time, the horns grow long and sharp enough that adolescent chironians can use them to gore opponents.</p>

        <h3>Society and Culture</h3>

        <p>Chironians express emotions through the mannerisms of their hooves: when impatient, they stamp them; when excited, they tap them in a quick dance, or canter in a spot. The centauriforms frequently shake their heads and manes, and when angry, their faces flush a deeper shade. Young chironians, when frightened, are known to rub or press their velvet-covered horns against the foreheads of other beings to whom they are emotionally close.</p>

        <h3>Names</h3>

        <p>Chironian names are soft and melodic, despite the thick nature of their native language. Important family names are passed down through generations. They don't use surnames. </p>

        <p><strong>Male Names.</strong> Jefin, Slaturn, Cinall, Leathes</p>

        <p><strong>Female Names.</strong> Olachi, Luna, Sinall, Trespen</p>



        <h3>Chironian Traits</h3>

        <p>As a chironian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Chironians reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Chironians tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Chironians typically stand 6 to 8 feet tall and generally weigh about 600 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 40 feet.</p>

        <p><strong><em>Cultured.</em></strong> You have proficiency in the Lore skill.</p>

        <p><strong><em>Equine Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples. Additionally, any climb that requires hands and feet is especially difficult for you because of your hooves. When you make such a climb, each foot of movement costs you 4 extra feet, instead of the normal 1 extra foot. Finally, a Medium or smaller creature can ride on your equine back if you allow it. In such a situation, you continue to act independently, not as a controlled mount.</p>

        <p><strong><em>Hooves and Horns.</em></strong> Your hooves (and depending on your age, horns) are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Powerful Charge.</em></strong> If you move at least 10 feet in a straight line before hitting with a melee weapon attack, you can attempt to trip the target prone as part of the same attack. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Chironan. Chironan is characterized by its soft, melodic sounds.</p>

        <img src='https://www.gmbinder.com/images/mJpcHum.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:570px' />



