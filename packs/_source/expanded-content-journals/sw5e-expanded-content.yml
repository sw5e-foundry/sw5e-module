        <blockquote><div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td>Abyssin</td><td>Savage Attacks</td></tr><tr><td>Advosze</td><td>Darkvision</td></tr><tr><td>Aing-Tii</td><td>Armored Plates</td></tr><tr><td>Aleena</td><td>Racer's Reflexes</td></tr><tr><td>Anomid</td><td>Tech Resistance</td></tr><tr><td>Aqualish</td><td>Darkvision</td></tr><tr><td>Arcona</td><td>Keen Smell</td></tr><tr><td>Ardennian</td><td>Darkvision</td></tr><tr><td>Arkanian</td><td>Darkvision<br> Infrared Sight<br> Sunlight Sensitivity</td></tr><tr><td>Barabel</td><td>Darkvision</td></tr><tr><td>Baragwin</td><td>Keen Smell</td></tr><tr><td>Besalisk</td><td>Powerful Build</td></tr><tr><td>Bith</td><td>Detail Oriented</td></tr><tr><td>Bothan</td><td>Naturally Stealth</td></tr><tr><td>Caamasi</td><td>Keen Smell</td></tr><tr><td>Cathar</td><td>Leonine Agility</td></tr><tr><td>Cerean</td><td>Closed Mind</td></tr><tr><td>Chadra-Fan</td><td>Second Heart</td></tr><tr><td>Chagrian</td><td>Darkvision</td></tr><tr><td>Chevin</td><td>Keen Hearing</td></tr><tr><td>Chiss</td><td>Darkvision</td></tr><tr><td>Clawdite</td><td>Unsettling Visage</td></tr><tr><td>Codru-Ji</td><td>Keen Hearing</td></tr><tr><td>Dashade</td><td>Force Contention</td></tr><tr><td>Defel</td><td>Hidden Step</td></tr><tr><td>Devaronian</td><td>Two Livered</td></tr><tr><td>Dowutin</td><td>Hide</td></tr><tr><td>Draethos</td><td>Darkvision</td></tr><tr><td>Dug</td><td>Fury of the Small</td></tr><tr><td>Duros</td><td>Darkvision</td></tr><tr><td>Echani</td><td>Combative Culture</td></tr><tr><td>Esh-Kha</td><td>Darkvision</td></tr><tr><td>Ewok</td><td>Mask of the Wild</td></tr><tr><td>Falleen</td><td>Closed Mind</td></tr><tr><td>Flesh Raider</td><td>Darkvision</td></tr><tr><td>Gamorrean</td><td>Savage Attacks</td></tr><tr><td>Gand</td><td>Lungless</td></tr><tr><td>Gank</td><td>Aggressive</td></tr><tr><td>Geonosian</td><td>Geonosian Weaponry</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td>Givin</td><td>Vacuum Sealed</td></tr><tr><td>Gormak</td><td>Adaptive Resilience</td></tr><tr><td>Gotal</td><td>Natural Empathy</td></tr><tr><td>Gran</td><td>Keen Sight</td></tr><tr><td>Gungan</td><td>Martial Proficiency</td></tr><tr><td>Harch</td><td>Venomous Fangs</td></tr><tr><td>Herglic</td><td>Toughness</td></tr><tr><td>Ho'Din</td><td>Second Heart</td></tr><tr><td>Houk</td><td>Toughness</td></tr><tr><td>Iktotchi</td><td>Precognition</td></tr><tr><td>Ithorian</td><td>Hold Breath</td></tr><tr><td>Jawa</td><td>Grovel, Cower, and Beg</td></tr><tr><td>Kage</td><td>Superior Darkvision</td></tr><tr><td>Kaleesh</td><td>Darkvision</td></tr><tr><td>Kalloran</td><td>Keen Hearing</td></tr><tr><td>Kaminoan</td><td>Geneticist<br> Ultraviolet Sight</td></tr><tr><td>Karkarodon</td><td>Aggressive</td></tr><tr><td>Kel Dor</td><td>Darkvision</td></tr><tr><td>Killik</td><td>Carapace</td></tr><tr><td>Klatooinian</td><td>Wisdom of the Elders</td></tr><tr><td>Kubaz</td><td>Darkvision</td></tr><tr><td>Kushiban</td><td>Grovel, Cower, and Beg</td></tr><tr><td>Kyuzo</td><td>Darkvision</td></tr><tr><td>Lannik</td><td>Closed Mind</td></tr><tr><td>Lasat</td><td>Powerful Build</td></tr><tr><td>Lurmen</td><td>Rolling Agility</td></tr><tr><td>Mikkian</td><td>Keen Hearing</td></tr><tr><td>Miraluka</td><td>Force Sight</td></tr><tr><td>Mirialan</td><td>Spiritual</td></tr><tr><td>Mon Calamari</td><td>Darkvision</td></tr><tr><td>Mustafarian</td><td>Darkvision</td></tr><tr><td>Muun</td><td>Second Heart</td></tr><tr><td>Nautolan</td><td>Darkvision</td></tr><tr><td>Neimoidian</td><td>Darkvision</td></tr><tr><td>Nikto</td><td>Adaptation</td></tr><tr><td>Noghri</td><td>Keen Smell</td></tr><tr><td>Nothoiin</td><td>Heightened Reflexes</td></tr><tr><td>Ortolan</td><td>Grovel, Cower, and Beg</td></tr><tr><td>Quarren</td><td>Keen Hearing</td></tr><tr><td>Pa'lowick</td><td>Hold Breath<br> Snout</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td>Patrolian</td><td>Darkvision</td></tr><tr><td>Pau'an</td><td>Darkvision</td></tr><tr><td>Pyke</td><td>Mercantile<br> Notorious Slavers</td></tr><tr><td>Rakata</td><td>Darkvision</td></tr><tr><td>Rattataki</td><td>Surprise Attack</td></tr><tr><td>Rishii</td><td>Keen Hearing and Sight</td></tr><tr><td>Rodian</td><td>Darkvision</td></tr><tr><td>Ryn</td><td>Darkvision</td></tr><tr><td>Selkath</td><td>Venomous Claws</td></tr><tr><td>Selonian</td><td>Darkvision</td></tr><tr><td>Shistavanen</td><td>Darkvision<br> Forced March</td></tr><tr><td>Ssi Ruu</td><td>Keen Smell<br> Sunlight Sensitivity<br> Tooth and Nail</td></tr><tr><td>Sith</td><td>Darkvision</td></tr><tr><td>Squib</td><td>Keen Smell</td></tr><tr><td>Sullustan</td><td>Darkvision</td></tr><tr><td>Talz</td><td>Darkvision</td></tr><tr><td>Tarasin</td><td>Sa'tosin Sense</td></tr><tr><td>Taung</td><td>Toughness<br> Force-Insensitive</td></tr><tr><td>Theelin</td><td>Mutation</td></tr><tr><td>Thisspiasian</td><td>Prehensile Tail</td></tr><tr><td>Tiss'shar</td><td>Darkvision</td></tr><tr><td>Tognath</td><td>Hide</td></tr><tr><td>Togorian</td><td>Toughness</td></tr><tr><td>Togruta</td><td>Darkvision</td></tr><tr><td>Toydarian</td><td>Closed Mind</td></tr><tr><td>Trandoshan</td><td>Saving Face</td></tr><tr><td>Tusken</td><td>Aggressive</td></tr><tr><td>Twi'lek</td><td>Darkvision</td></tr><tr><td>Ugnaught</td><td>Darkvision</td></tr><tr><td>Umbaran</td><td>Darkvision</td></tr><tr><td>Verpine</td><td>Hardened Carapace</td></tr><tr><td>Voss</td><td>Darkvision</td></tr><tr><td>Vurk</td><td>Darkvision</td></tr><tr><td>Weequay</td><td>Darkvision</td></tr><tr><td>Wookiee</td><td>Darkvision</td></tr><tr><td>Yevetha</td><td>Aggressive</td></tr><tr><td>Zabrak</td><td>Darkvision</td></tr><tr><td>Zeltron</td><td>Two Livered</td></tr><tr><td>Zygerrian</td><td>Darkvision</td></tr></tbody></table></div></blockquote>





        <h3>Biology and Appearance</h3>

        <p>The appearance and biological features of half-humans vary drastically by each species, but tend to fall somewhere in the middle. A common side-effect of a species interbreeding with humans is the loss of darkvision and tails.</p>

        <h3>Society and Culture</h3>

        <p>Half-humans are subjects of two separate cultures, but belong in neither. A half-human might be raised amongst humans or their other half, or might be fully ostracized, instead growing up in a remote, isolated place, removed from both species.</p>

        <h4>Traits</h4>

        <blockquote><p>Half-humans gain the <strong><em>Defiant</em></strong> special trait from their human half. They also gain the special traits from their non-human half, except for those trait(s) mentioned in the Half-Human table above.</p></blockquote>

        <h3>Names</h3>

        <p>Half-human names might follow human conventions, or that of the other half. Often, they blend the two in some fashion, perhaps taking a human surname, with a special name.</p>



        <h3>Half-human Traits</h3>

        <p>As a half-human, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Half-humans gain the ability score increases of their non-human half, but they can choose any ability score for one of the options, instead of the given option. Half-humans can not increase the same ability score twice during character creation using this feature.</p>

        <p><strong><em>Age.</em></strong> Half-humans live around the average of the two species' lifespans.</p>

        <p><strong><em>Alignment.</em></strong> Half-humans tend towards their non-human half's alignment.</p>

        <p><strong><em>Size.</em></strong> Half-humans stand and weigh around the average of the two species' height and weight. Regardless of your position in that range, your size is the size of your non-human half.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is that of your non-human half.</p>

        <p><strong><em>Defiant.</em></strong> Half-humans are known to be stubborn and often refuse to give up, even against the worst odds. When you or a creature you can see that can see and understand you makes an ability check, attack roll, or saving throw, you can roll a d4 and add it to their roll (no action required). You can use this before or after the roll, but before the GM determines the roll's outcome. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, regardless of whether or not the non-human half can speak it, and the language(s) associated with your non-human half.</p>

