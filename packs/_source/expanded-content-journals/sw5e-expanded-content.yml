  - name: Hermit
    _id: CbB9brMIlibNi1xQ
    text:
      content: |+
        <h2>Hermit</h2>

        <p>You lived in seclusion�either in a community or alone�for a formative part of your life. In your time apart from society, you found quiet, solitude, and perhaps some of the answers you were looking for.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Animal Handling, Lore, Medicine, and Nature</li><li><strong>Tool Proficiencies:</strong> Bioanalysis kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A diary of your experiences, a winter blanket, a set of common clothes, a bioanalysis kit, and 50 cr</li></ul>

        <h4>Life of Seclusion</h4>

        <p>What was the reason for your isolation, and what changed to allow you to end your solitude? You can work with your GM to determine the exact nature of your seclusion, or you can choose or roll on the table below to determine the reason behind your seclusion.</p>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Life of Seclusion</th></tr></thead><tbody><tr><td>1</td><td>I was partaking of communal living in accordance with the dictates of a religious order.</td></tr><tr><td>2</td><td>I retreated from society after a life-altering event.</td></tr><tr><td>3</td><td>I needed a quiet place to work on my art, literature, music, or manifesto.</td></tr><tr><td>4</td><td>I needed to commune with nature, far from civilization.</td></tr><tr><td>5</td><td>I was the caretaker of an ancient ruin or relic.</td></tr><tr><td>6</td><td>I was in search of a place of spiritual significance.</td></tr></tbody></table>

        <h3>Feature: Discovery</h3>

        <p>The seclusion of your hermitage gave you access to a unique and powerful discovery. The nature of this revelation depends on the nature of your seclusion. You might have discovered a great truth about the cosmos or the Force, a fact that has long been forgotten, a relic of the past that could rewrite history, or a place unseen for ages. It might be information that would be damaging to the people who consigned you to exile, and hence the reason for your return to society. Work with your GM to determine the details of your discovery and its impact on the campaign.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Animal Handler</td></tr><tr><td>2</td><td>Loremaster</td></tr><tr><td>3</td><td>Medic</td></tr><tr><td>4</td><td>Naturalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Alert</td></tr><tr><td>7</td><td>Dungeon Delver</td></tr><tr><td>8</td><td>Healer</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Some hermits are well suited to a life of seclusion, whereas others chafe against it and long for company. Whether they embrace solitude or long to escape it, the solitary life shapes their attitudes and ideals. Some few are driven slightly mad by their isolation.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I've been isolated for so long that I rarely speak, preferring gestures and the occasional grunt.</td></tr><tr><td>2</td><td>I am utterly serene, even in the face of disaster.</td></tr><tr><td>3</td><td>The leader of my community had something wise to say on every topic, and I am eager to share that wisdom.</td></tr><tr><td>4</td><td>I feel tremendous empathy for all who suffer.</td></tr><tr><td>5</td><td>I'm oblivious to etiquette and social expectations.</td></tr><tr><td>6</td><td>I connect everything that happens to me to a grand, cosmic plan.</td></tr><tr><td>7</td><td>I often get lost in my own thoughts and contemplation, becoming oblivious to my surroundings.</td></tr><tr><td>8</td><td>I am working on a grand philosophical theory and love sharing my ideas.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Greater Good.</strong> My gifts are meant to be shared with all, not used for my own benefit. (Light)</td></tr><tr><td>2</td><td><strong>Logic.</strong> Emotions must not cloud our sense of what is right and true, or our logical thinking. (Lawful)</td></tr><tr><td>3</td><td><strong>Free Thinking.</strong> Inquiry and curiosity are the pillars of progress. (Chaotic)</td></tr><tr><td>4</td><td><strong>Power.</strong> Solitude and contemplation are paths toward mystical power. (Dark)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Meddling in the affairs of others only causes trouble. (Neutral)</td></tr><tr><td>6</td><td><strong>Self-Knowledge.</strong> If you know yourself, there's nothing left to know. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>Nothing is more important than the other members of my hermitage, order, or association.</td></tr><tr><td>2</td><td>I entered seclusion to hide from the ones who might still be hunting me. I must someday confront them.</td></tr><tr><td>3</td><td>I'm still seeking the enlightenment I pursued in my seclusion, and it still eludes me.</td></tr><tr><td>4</td><td>I entered seclusion because I loved someone I could not have.</td></tr><tr><td>5</td><td>Should my discovery come to light, it could bring ruin to the world.</td></tr><tr><td>6</td><td>My isolation gave me great insight into a great Dark that only I can destroy.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>Now that I've returned to the world, I enjoy its delights a little too much.</td></tr><tr><td>2</td><td>I harbor dark, bloodthirsty thoughts that my isolation and meditation failed to quell.</td></tr><tr><td>3</td><td>I am dogmatic in my thoughts and philosophy.</td></tr><tr><td>4</td><td>I let my need to win arguments overshadow friendships and harmony.</td></tr><tr><td>5</td><td>I'd risk too much to uncover a lost bit of knowledge.</td></tr><tr><td>6</td><td>I like keeping secrets and won't share them with anyone.</td></tr></tbody></table>

