  - name: Artificer Engineering
    _id: 725boDI3Sw1SQRtO
    text:
      content: |-
        <h2>Artificer Engineering</h2>

        <p>Those engineers who choose the Artificer Engineering discipline focus on building and modifying lightsabers, while tapping into the latent presence of the Force in these lightsaber crystals.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Artificer Engineering:</strong> 3rd level</em><br>

        <p>You gain proficiency in artificer's implements, and with the lightsaber simple lightweapon. Additionally, when you engage in crafting with artificer's implements, the rate at which you craft doubles.</p>

        <h3>Modified Lightsaber</h3>

        <em><strong>Artificer Engineering:</strong> 3rd and 9th level</em><br>

        <p>You learn to modify an unenhanced lightsaber utilizing your artificer knowledge. Over the course of a long rest, you can modify your lightsaber. You must have the lightsaber and artificer's implements in order to perform this modification.</p>

        <p>Your modified lightsaber is enhanced, requires attunement, can only be used by you, and counts as a tech focus for your tech powers while you are attuned to it. Your modified lightsaber has 4 modification slots, and it gains more at higher levels, as shown in the Modification Slots column of the engineer table. For each modification installed in excess of your proficiency bonus, your tech point maximum is reduced by 1. Over the course of a long rest, you can install, replace, or remove a number of modifications up to your Intelligence modifier (minimum of one).</p>

        <p>Some modification effects require saving throws. When you use such an effect from this class, the DC equals your tech save DC.</p>

        <p>At 9th level, you can maintain two different modified lightsabers. The total modification slots are split across the two items.</p>



        <h3>Force Resonance</h3>

        <em><strong>Artificer Engineering:</strong> 3rd level</em><br>

        <p>Once per round, when you hit a creature with your modified lightsaber, you can expend one use of your Potent Aptitude to deal an extra 2d6 damage to that target. The damage is the same type as your modified lightsaber's damage.</p>

        <p>The damage increases when you reach certain levels in this class, increasing to 3d6 at 5th level, 5d6 at 11th level, and 8d6 at 17th level.</p>

        <h3>Forcecasting Secrets</h3>

        <em><strong>Artificer Engineering:</strong> 6th, 7th, 13th, and 17th level</em><br>

        <p>Your study of kyber crystals has awakened a latent force sensitivity. Choose two force powers of 1st level. The chosen powers count as tech powers for you, but are not included in the number in the Powers Known column of the engineer table.</p>

        <p>At 7th level, you learn two additional force powers of 1st or 2nd level. At 13th level, you learn two force powers of 1st-3rd level, and at 17th level, you learn two force powers of 1st-4th level. Whenever you gain a level in this class, you can choose one of the force powers you know and replace it with another force power of the same level.</p>

        <h3>Disruptive Resonance</h3>

        <em><strong>Artificer Engineering:</strong> 14th level</em><br>

        <p>When you hit a creature that is concentrating on a power with your modified lightsaber, the creature has disadvantage on the Constitution saving throw to maintain concentration. Additionally, on a failed save, the creature immediately takes psychic damage equal to your engineer level + your Intelligence modifier.</p>

        <h3>Resonating Recovery</h3>

        <em><strong>Artificer Engineering:</strong> 18th level</em><br>

        <p>Once per turn, when you reduce a hostile creature to 0 hit points, you regain a use of your Potent Aptitude. Your number of Potent Aptitude uses can not exceed your Intelligence modifier.</p>

        <img src='https://www.gmbinder.com/images/pAVqGQM.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:660px' />



        <h3>Artificer Modifications</h3>

        <p>If a modification has prerequisites, you must meet them to install it. You can install the modification at the same time that you meet its prerequisites.</p>

        <h4>Additonal Beam Port</h4>

        <p>You install a second beam port into your modified lightsaber. Your modified lightsaber gains the double (1d8) property. You can only benefit from this property while wielding your modified lightsaber with two hands.</p>

        <h4>Adegan Crystal</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to damage rolls made with this weapon. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Advanced Blastsaber </h4>

        <em><strong>Prerequisite:</strong> 15th level, Prototype Blastsaber</em><br>

        <p>You further fine tune your blastsaber. As an action, you can disable a single electronic device not being worn or held by another creature within 5 feet of you. The device is then disabled until it is rebooted.</p>

        <p>Additionally, when you activate this conversion to alter the properties of your lightweapon, you create a projected barrier of ion energy in a 10-foot-radius sphere around you until the start of your next turn. Hostile creatures treat this area as difficult terrain. When a hostile creature enters the shielded area or starts its turn there, that creature takes 3d4 ion damage. Any electronics not being worn or held within the barrier's radius are disabled until rebooted.</p>

        <h4>Advanced Brightsaber </h4>

        <em><strong>Prerequisite:</strong> 15th level, Prototype Brightsaber</em><br>

        <p>You further fine tune your brightsaber. While activated, your modified lightsaber's bright light now automatically dispels illusions and can detect invisibility, as with truesight.</p>

        <p>Additionally, when you activate this conversion to alter the properties of your lightweapon and use a bonus action to attempt to blind your target, it makes the saving throw with disadvantage.</p>

        <h4>Advanced Disruptorsaber</h4>

        <em><strong>Prerequisite:</strong> 15th level, Prototype Disruptorsaber</em><br>

        <p>You further fine tune your disruptorsaber. While activated, your modified lightsaber lightly obscures the area within 5 feet of it.</p>

        <p>Additionally, when you activate this conversion to alter the properties of your lightweapon and use a bonus action to attempt to knock your target prone, the next saving throw you make before the end of your next turn has advantage.</p>



        <h4>Barrier </h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>On your turn, when you make an attack roll with your modified lightsaber, you can choose to forgo your proficiency bonus. If you do, you can use your reaction to erect a temporary barrier that lasts until the start of your next turn. While the barrier is activated, you have a bonus to AC against the first attack roll made against you equal to your proficiency bonus.</p>

        <h4>Beam Gem Lens</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to attack rolls made with this weapon. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Biometric Safety Measures</h4>

        <p>A security system is installed into the hilt of your lightweapon. When a creature other than you attempts to activate your lightweapon, the activation fails. Additionally, the creature attempting to activate must make on a Constitution saving throw or take lightning damage equal to engineer level, and become shocked until the start of its next turn. On a successful save the creature takes half damage and is not shocked. Regardless of success or failure, the creature drops your modified lightsaber.</p>

        <h4>Blastsaber Conversion</h4>

        <em>Incompatible with other conversions</em><br>

        <p>You heavily modify your lightweapon to allow you to make a ranged weapon attack. With this modification, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d6 energy damage.</p>

        <p>Additionally, when you make your first attack on your turn, you can alter the properties of your modified lightsaber. Until the start of your next turn, the damage type of your modified lightsaber is changed to ion. </p>

        <p>You can use this trait a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you complete a short or long rest.</p>

        <h4>Brightsaber Conversion</h4>

        <em>Incompatible with other conversions</em><br>

        <p>You modify your lightweapon, giving it a brighter glow. While activated, your modified lightsaber sheds bright light in a 20-foot radius and dim light for an additional 20 feet.</p>

        <p>Additionally, when you make your first attack on your turn, you can alter the properties of your modified lightsaber. Until the start of your next turn, the damage type of your modified lightsaber is changed to fire.</p>

        <p>You can use this trait a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you complete a short or long rest.</p>

        <h4>Burn Through</h4>

        <p>When you score a critical hit with your modified lightsaber, you have advantage on the next attack roll you make against that creature.</p>



        <h4>Comfortable Handle</h4>

        <p>You make minor modifications to the ergonomics of your modified saber's hilt. Your modified lightsaber gains the finesse property.</p>

        <h4>Crossguard</h4>

        <p>You add an energy guard at the base of your modified lightsaber's blade. While wielding your modified lightsaber, you gain a +1 bonus to your armor class against melee weapon attacks.</p>

        <h4>Disruptorsaber Conversion</h4>

        <em>Incompatible with other conversions</em><br>

        <p>You modify your lightweapon, causing it to eminate a sickly green light. Your modified lightsaber loses the luminous property.</p>

        <p>Additionally, when you make your first attack on your turn, you can alter the properties of your modified lightsaber. Until the start of your next turn, the damage type of your modified lightsaber is changed to acid.</p>

        <p>You can use this trait a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you complete a short or long rest.</p>

        <h4>Extended Beam</h4>

        <p>You install a series of beam focusing amplifiers into your modified lightsaber. Your modified lightsaber gains the reach property.</p>

        <h4>Greatsaber Array</h4>

        <p>You augment the configuration of your modified lightsaber. Your modified lightsaber gains the two-handed property, and it's damage die increases to 1d12.</p>

        <h4>Intense Beam</h4>

        <em><strong>Prerequisite:</strong> 11th level, Burn Through</em><br>

        <p>Your modified lightsaber's critical hit range increases by 1.</p>

        <h4>Magnetic-Lock Grip</h4>

        <p>You insert a series of magnetically charged grips into your modified lightsaber's hilt. While wielding your modified lightsaber, you have advantage on ability checks and saving throws made to disarm or avoid being disarmed.</p>

        <h4>Prototype Blastsaber </h4>

        <em><strong>Prerequisite:</strong> 7th level, Blastsaber Conversion</em><br>

        <p>You fine tune your blastsaber. When you activate this conversion to alter the properties of your lightweapon, you can use your bonus action to cause your modified lightsaber to let loose a burst of energy. Creatures other than yourself within 5 feet of the target creature must succeed on a Dexterity saving throw. On a failed save, they take ion damage equal to your Intelligence modifier.</p>

        <h4>Prototype Brightsaber </h4>

        <em><strong>Prerequisite:</strong> 7th level, Brightsaber Conversion</em><br>

        <p>You fine tune your brightsaber. When you activate this conversion to alter the properties of your lightweapon, you can use your bonus action to attempt to blind the target of the attack. The creature must succeed on a Constitution saving throw or be blinded. </p>

        <h4>Prototype Disruptorsaber</h4>

        <em><strong>Prerequisite:</strong> 7th level, Disruptorsaber Conversion</em><br>

        <p>You fine tune your disruptorsaber. When you activate this conversion to alter the properties of your lightweapon, you can use your bonus action to attempt to knock the target of your attack prone. The creature must make a Strength saving throw or be knocked prone.</p>

        <h4>Returning Weapon</h4>

        <p>You install a retractible chain in the hilt of your modified lightsaber. Your modified lightsaber gains the thrown property with a range of 20/60, and when you throw the weapon, it immediately returns to your hand.</p>



