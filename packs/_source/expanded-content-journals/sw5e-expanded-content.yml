  - name: Tognath
    _id: FqQoRHyIUEv1DuYa
    text:
      content: |-
        <h2>Tognath</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Tan or cream</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Breathing apparatus, endo and exoskeletons</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'5"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>105 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Yar Togna</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Tognath</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Tognath are a sentient species native to Yar Togna. Yar Togna is a foul-smelling, high-gravity planet with a toxic, fume-saturated atmosphere. As a result, tognath wear a breathing apparatus to process the oxygen content in a planet's atmosphere. The tognath have a striking look thanks to their insectoid and mammalian characteristics; another factor is their having both an endo- and exoskeleton. They also possess a very primitive nervous system, which provides them with immunity to most pain (a helpful trait in combat). Tognath begin life as larvae born from egg clutches hatched in a suspension jelly, and latch onto one of their parents, feeding directly from their bloodstream. While in that jelly, two or more eggs (not necessarily from the same parent) sometimes graft together, thus creating a bond that continues throughout the life of the eggmates. Six months later, parents visit a nursery tree, where the young detatch from them and spin a cocoon. Within, the offspring undergo a metamorphosis, developing both their skeletons to resist the high gravity and pressures of Yar Togna.</p>

        <h3>Society and Culture</h3>

        <p>Tognath live in stilted homes with lava channels near the main mountain range of Yar Togna, where they have access to mountain springwater. Most of tognath society believes that mate selection and egg laying should occur late in life, after having dedicated most of one's prime years to a career. This means that parents are generally retired and dote on their children relentlessly, often homeschooling them after their transformation. </p>

        <h3>Names</h3>

        <p>Tognath use generally simple, nongendered names, without bothering with surnames.</p>

        <p><strong>First Names.</strong> Darjia, Essec, Irion, Tathak</p>

        <br>

        <h3>Tognath Traits</h3>

        <p>As a tognath, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength, Dexterity, and Constitution scores increase by 1.</p>

        <p><strong><em>Age.</em></strong> Tognath reach adulthood by 10 and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Tognath are famously dedicated and hard workers, causing them to tend towards balanced alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Tognath typically stand 6 feet tall and generally weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Crafters.</em></strong> You have proficiency with with one set of artisan's implements of your choice.</p>

        <p><strong><em>Exoskeleton.</em></strong> You have a thick exoskeleton. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier.</p>

        <p><strong><em>Foreign Biology.</em></strong> You cannot breathe oxygen. The tognath have created a breathing apparatus to negate the negative effects of living in an oxygen rich environment, but if your mask is removed while you are in such an environment, you lose consciousness.</p>

        <p><strong><em>Life in the Void.</em></strong> You can survive for one hour within the vacuum of space. You have resistance to necrotic damage.</p>

        <p><strong><em>Primitive Nerves.</em></strong> Because of their primitive nervous systems, tognath are immune to most pain, letting them shrug off major injuries. When you take damage, you can use your reaction to roll a d12. Add your Constitution modifier to the number rolled, and reduce the damage by that total. Once you've used this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Vocalizer.</em></strong> Tognath vocal cords are not made for oxygen rich environments, and rely on a vocalizer to communicate effectively with other species. If your vocalizer is removed or destroyed, your voice becomes quiet and difficult to understand.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Tognath. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it.</p>

        <img src='https://www.gmbinder.com/images/QbFVKuY.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:218px' />



