  - name: Togorian
    _id: 8aaclkKeBEmAuwGI
    text:
      content: |-
        <h2>Togorian</h2>

        <blockquote><hr>

        <h5>Visual Characteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>Black, brown, or white</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>Black, brown, orange, or white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>Brown, green, orange, or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>Large frame, retractable claws, striped fur, rigid honor code</td></tr></tbody></table>

        <hr>

        <h5>Physical Characteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>6'2"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>175 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h5>Sociocultural Characteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>Togoria</td></tr><tr><td><strong><em>Language</em></strong></td><td>Togorese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Togorian people are a feline warrior species native to the planet Togoria. They are large, heavy-framed bipeds, with retractable claws on their hands and feet. Female Togorians grow up to 7 feet tall, while adult males can reach up to 9 feet. They're covered in gray-white, black, brown, or orange fur, often with colorful spots or stripes. </p>

        <h3>Society and Culture</h3>

        Togorians have a unique cultural division between<br> their sexes. They evolved as nomadic hunters of<br> creatures like the bist and etelo, surviving on the<br> wilderness as apex predators. As time went on, a rift in<br> their society developed between the two sexes. Males<br> were drawn to continue their lifestyle as nomads and<br> hunters for their people, while females tended to<br> prefer remaining in permanent camps and contributed<br> the vast majority of their species technological<br> developments. This division has continued into<br> modern times, with males continuing their nomadic<br> traditions and females frequently preferring to stay in<br> villages and cities. Males visit their mates for about a<br> month each year, but otherwise the sexes live<br> completely separate lives. Whether in spite of this<br> separation of the sexes, or because of it, Togorians are<br> typically monogamous and devoted to their chosen<br> mates.

        <h3>Names</h3>

        <p>Togorian names tend to be short and primal-sounding. Female names tend to include softer consonants and more vowels, while male names are typically harsher. Togorians do not use surnames.</p>

        <p><strong>Male Names.</strong>  Mezgraf, Mlatar, Morto, Mrrov, Torr</p>

        <p><strong>Female Names.</strong> Coelle, Elotis, H'sishi, Kra'ake, Rrowv</p>



        <h3>Togorian Traits</h3>

        <p>As a togorian, you have the following special traits.</p>

        <p><strong>Ability Score Increase.</strong> Your Strength score increases by 2, and your Dexterity or Constitution score increases by 1.</p>

        <p><strong>Age.</strong> Togorian reach adulthood in their late teens and live less than a century.</p>

        <p><strong>Alignment.</strong> Togorians' rigid sense of honor causes them to tend toward lawful light side, though there are exceptions.</p>

        <p><strong>Size.</strong> Togorians tower over almost all other species, with smaller females standing upwards of 7 feet tall and weighing 250 lbs., while males can easily reach 8 feet tall and weigh around 350 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong>Speed.</strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Claws.</em></strong> Your claws are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong>Savage Attacks.</strong> When you score a critical hit with a melee weapon attack, you can roll one of the weapon's damage dice one additional time and add it to the extra damage of the critical hit.</p>

        <p><strong>Stealthy Hunter.</strong> You have proficiency in the Survival and Stealth skills.</p>

        <p><strong>Toughness.</strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level.</p>

        <p><strong>Languages.</strong> You can speak, read, and write Galactic Basic and Togorese. Togorese is characterized by its deep, resonating growls.</p>

        <img src='https://www.gmbinder.com/images/dAyS86R.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:245px' />



