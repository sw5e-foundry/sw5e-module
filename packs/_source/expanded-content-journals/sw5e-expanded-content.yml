  - name: Irradiate
    _id: BmVJZY3iEmyhjTBq
    text:
      content: |-
        <h4>Irradiate</h4>

        <p><em>2nd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>A surge of radiation washes over a creature within range. The creature must make a Constitution saving throw. On a failed save, the target takes 3d10 necrotic damage and suffers one level of exhaustion, which lasts for the duration. On a successful save, the target takes half as much damage and does not suffer a level of exhaustion. A creature exhausted by this power can make a Constitution saving throw at the end of each of its turns. On a successful save, the power ends.</p>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the damage increases by 1d10 for each slot level above 2nd.</p>
