  - name: Gestalt and Dichotomous Characters
    _id: ObKpWJTR8yJ8FInC
    text:
      content: |-
        <h2>Gestalt and Dichotomous Characters</h2>

        <p></div></p>

        <p>Best suited for smaller parties, gestalt and dichotomous Characters are two separate variant rules that have some conceptual overlap. Gestalt focuses on a character having two classes simultaneously, while, dichotomous focuses on having one class, with two archetypes. If either�or Ashla forbid, both�of these concepts sound intriguing to you, consider the following variant rules.</p>
