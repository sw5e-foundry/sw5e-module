  - name: Companion
    _id: 3sAlEsA6BUMQPf1B
    text:
      content: |+
        <h2>Companion</h2>

        <p>You are experienced in the arts of companionship, and you provide these services for people who can afford to pay it. This may mean adult favors of the sensual variety, but it just as frequently means conversation, comfort, and company.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Acrobatics, Deception, Insight, and Performance</li><li><strong>Tool Proficiencies:</strong> One instrument of your choice or a disguise kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, an instrument or disguise kit, and a belt pouch containing 50 cr</li></ul>

        <h3>Feature: Sordid Knowledge</h3>

        <p>You have or can gain compromising information about people of importance. You may be able to leverage this information in order to acquire lodging, information, or even money.  You may also become a target for having this information. Your GM may rule that any particular individual is either above reproach or is too careful in covering their tracks to provide such leverage.  </p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Acrobat</td></tr><tr><td>2</td><td>Silver-Tongued</td></tr><tr><td>3</td><td>Empathic</td></tr><tr><td>4</td><td>Performer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Entertainer</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Force of Personality</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>You enjoy people and you enjoy your work and you enjoy the money it brings. There is no shame in your profession and it is often highly regulated and regimented by factions or the local government. It requires outgoing and adventurous personalities to be a success, and often these traits lead them to adventures of a different sort.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>People are often hurt and damaged. I try to heal them and leave them stronger than when I meet them.</td></tr><tr><td>2</td><td>I enjoy being in control and manipulating people. It's important that they like me so they do what I say.</td></tr><tr><td>3</td><td>I'm not a laser-brain, although I don't open my mouth to prove people wrong. I let them discover the truth after I have what I want.</td></tr><tr><td>4</td><td>I'm better than those who are more prim and proper, and I'm having more fun.</td></tr><tr><td>5</td><td>I don't really care what happens, it's an easy way to get money for my habit.</td></tr><tr><td>6</td><td>There are so many different kinds of people, and I want to meet them all.</td></tr><tr><td>7</td><td>I never thought this was the life for me, perhaps some brave person will rescue me.</td></tr><tr><td>8</td><td>I like what I do and I resent those who want to rescue me.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Sacred.</strong> My body is a temple I am duty-bound to share. (Lawful)</td></tr><tr><td>2</td><td><strong>Hedonism.</strong> I fill my urges when and where I wish. (Chaotic)</td></tr><tr><td>3</td><td><strong>Loving.</strong> Everyone needs attention and love. (Light)</td></tr><tr><td>4</td><td><strong>Exploitation.</strong> I take pleasure in toying with people, and taking advantage of them. (Dark)</td></tr><tr><td>5</td><td><strong>Consent.</strong>  I respect other's desires and wishes. (Neutral)</td></tr><tr><td>6</td><td><strong>Freedom.</strong>  I want to have the independence to enjoy life. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I seek a relationship with the most powerful people in the land, desiring to be the power behind the throne.</td></tr><tr><td>2</td><td>If I can only collect enough credits, I'll be able to pay off my debts and be free.</td></tr><tr><td>3</td><td>I have a sick parent to whom I send all my money.</td></tr><tr><td>4</td><td>My independence is the most important thing in my world.</td></tr><tr><td>5</td><td>I bring happiness to the world one person at a time.</td></tr><tr><td>6</td><td>I have a young child who is my world.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I have an incurable disease I acquired from a client.</td></tr><tr><td>2</td><td>I am addicted to recreational drugs that dull the pain I feel.</td></tr><tr><td>3</td><td>I no longer practice my old profession, and I fear anyone discovering it.</td></tr><tr><td>4</td><td>I am suspicious of anyone who tries to be nice to me. They only want me to sleep with them.</td></tr><tr><td>5</td><td>Most people are naive children.</td></tr><tr><td>6</td><td>I pretend to be tough, but am broken inside.</td></tr></tbody></table>

