  - name: Guardian
    _id: E2JDtIRmnujdcbbk
    text:
      content: |+
        <h2>Guardian</h2>

        <p>In order to become a guardian, your companion must have a Constitution, Wisdom, or Charisma score of 13 or higher.</p>

        <p>As a guardian, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor, medium armor</li><li><strong>Weapons:</strong> All lightweapons, all vibroweapons</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Constitution, Charisma</li><li><strong>Skills:</strong> Choose two from Acrobatics, Athletics, Deception, Insight, Intimidation, Lore, Perception, Persuasion, and Piloting</li></ul>

        <h3>Forcecasting</h3>

        <p>Beginning when your companion chooses this class at 3rd level, it has learned powers, fragments of knowledge that imbue it with an abiding force ability. See chapter 10 of the Player's Handbook for the general rules of forcecasting and chapter 11 of the Player's Handbook for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>Your companion learns three force powers of its choice of no higher level than its Max Power Level. It may learn a force power at the same time it learns its prerequisite. </p>

        <p>At-will powers chosen by your companion do not scale normally at higher levels. Instead, if they would scale at 5th level, they instead scale at 11th level, and if they would scale at 11th level, they instead scale at 17th level.</p>

        <h4>Force Points</h4>

        <p>Your companion does not require force points. Instead, it can only cast powers at 1st-level twice. It regains all expended uses after completing a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Your companion's Max Power Level is 1st.</p>

        <h4>Forcecasting Ability</h4>

        <p>Your companion's forcecasting ability varies based on the alignment of the powers you cast. It uses Wisdom for light side powers, Charisma for dark side powers, and Wisdom or Charisma for universal powers (its choice). It uses this ability score modifier whenever a power refers to its forcecasting ability. Additionally, it uses this ability score modifier when setting the saving throw DC for a force power it casts and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + its proficiency bonus + <br>its forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = its proficiency bonus + <br>its forcecasting ability modifier</div>

        <hr>



        <h3>Channel the Force</h3>

        <p>Also at 3rd level, your companion knows how to channel the Force to create a unique effect. Your companion starts with its choice of one from two such effects: Cause Harm or Lend Aid. </p>

        <p>Some Channel the Force effects require saving throws. When your companion uses such an effect from this class, the DC equals its universal force save DC.</p>

        <p>Your companion can use this feature a number of times equal to its Wisdom or Charisma modifier (your companion's choice, minimum of once). Your companion regains all expended uses when it finishes a short or long rest.</p>

        <h4>Cause Harm</h4>

        <p>As an action, your companion can expend a use of its Channel the Force to sap the life from a hostile creature it can see within 60 feet. That creature must make a Constitution saving throw. On a failed save, the creature takes necrotic damage equal to your companion's level + its Charisma modifier (minimum of one), or half as much on a successful one.</p>

        <h4>Lend Aid</h4>

        <p>As a bonus action, your companion can expend a use of its Channel the Force and touch a beast or humanoid within 5 feet of it. That creature regains hit points equal to your companion's guardian level + its Wisdom modifier (minimum of one). Alternatively, if the beast or humanoid is poisoned or diseased, your companion neutralizes the poison or disease. If more than one poison or disease afflicts the target, your companion neutralizes one poison or disease that it knows is present, or it neutralizes one at random.</p>

        <h3>Apprentice Forcecasting</h3>

        <p>At 7th level, your companion's Max Power Level increases to 2nd, and it learns three additional powers. </p>

        <p>Additionally, your companion can cast powers at 2nd-level twice. It regains all expended uses after completing a long rest.</p>

        <h3>Extra Attack</h3>

        <p>By 11th level, your companion can attack twice, instead of once, whenever it takes the Attack action on its turn.</p>

        <h3>Force Purity</h3>

        <p>At 15th level, the Force flowing through your companion makes it immune to poison and disease.</p>

        <h3>Journeyman Forcecasting</h3>

        <p>As of 18th level, your companion's Max Power Level increases to 3rd, and it learns three additional powers. </p>

        <p>Additionally, your companion can cast powers at 3rd-level once. It regains the ability to do so after completing a long rest.</p>

