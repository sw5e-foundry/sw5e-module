  - name: Zilkin
    _id: PY12b15MBgokfyKJ
    text:
      content: |-
        <h2>Zilkin</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Turquoise</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Four-fingered hands, three-toed feet, stalk eyes</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>1'0"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>3 lbs.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Zilk</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Zilkin</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The zilkins are a bipedal, amphibious species discernible by their diminutive stature and stalk eyes. Their homeworld, Zilk, has many dense jungles and swamps deemed impossible to navigate by most species. Only the zilkins themselves, evolved from worm-like creatures, were able to easily slip through the gaps in the tangled, coarse foliage. Their powerful legs make them adept at swimming and leaping.</p>

        <p>Zilkin also have bulbous chins which inflate with excess air while they are speaking.</p>

        <h3>Society and Culture</h3>

        <p>Their short lifespans cause zilkins to be one of the fastest learners in the galaxy, capable of learning in weeks what takes other species months. Zilkins live in large communities woven into the thick clumps of trees on Zilk. Whenever a dispute occurs, zilkins turn to a ritualistic form of debate where everyone affected voices their opinion on the matter. Whoever croaks their views the loudest and most confidently, wins. As a result, zilkins tend to be quite opinionated.</p>

        <p>For a long time, the zilkins remained unknown to the galaxy at large, simply because few individuals had any interest in visiting Zilk, let alone exploring its notoriously impenetrable jungles. Having lived in isolation for so many generations, and often mocked for their size, zilkins tend to exhibit cantankerous behavior toward other species. Despite this, a number of zilkins leave their homeworld and take an active role in galactic politics, gaining the planet representation in the Senate.</p>

        <h3>Names</h3>

        <p>Zilkin names are usually clear and concise. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Belip, Jegg, Meebur, Ponix</p>

        <p><strong>Female Names.</strong> Fula, Nili, Sia, Vo</p>

        <p><strong>Surnames.</strong> Bestrein, Cruu, Odebre, Telvet</p>



        <h3>Zilkin Traits</h3>

        <p>As a zilkin, you have the following special traits:</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and two other ability scores of your choice increase by 1.</p>

        <p><strong><em>Age.</em></strong> Zilkin are considered adults at 4 years old, and rarely live to be over 12.</p>

        <p><strong><em>Alignment.</em></strong> Zilkin have an outspoken but just nature that causes them to tend towards lawful light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Zilkin stand between 1 and 2 feet tall and weigh around 10 lbs. Regardless of your position in that range, your size is Tiny.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 20 feet.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Darkvision.</em></strong> Accustomed to life underwater, you have superior vision in low light conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Pintsized.</em></strong> Your tiny stature makes it hard for you to wield bigger weapons. You can't use medium or heavy shields. Additionally, you can't wield weapons with the two-handed or versatile property, and you can only wield one-handed weapons in two hands unless they have the light property.</p>

        <p><strong><em>Puny.</em></strong> Zilkin are too small to pack much of a punch. You have disadvantage on Strength saving throws, and when determining your bonus to attack and damage rolls for weapon attacks using Strength, you can't add more than +3. </p>

        <p><strong><em>Quick Learner.</em></strong> When using downtime for learning a new language or training with a set of tools, it takes half the amount of time and credits necessary to complete.</p>

        <p><strong><em>Small and Nimble.</em></strong> You are too small and fast to effectively target. You have a +1 bonus to AC, and you have advantage on Dexterity saving throws.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 20 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Zilkin. Zilkin is characterized by loud, croaking noises from the throat, supported by air stored in the chin.</p>

        <img src='https://www.gmbinder.com/images/oZJn8UN.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:165px' />



