  - name: Lesser Mislead
    _id: QxSrWbpL9SpEDU5J
    text:
      content: |-
        <h4>Lesser Mislead</h4>

        <p><em>2nd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>

        <p>You become invisible at the same time that an illusory double of you appears where you are standing. The double lasts until the end of your next turn, but the invisibility ends if you attack or cast a power.</p>

        <p>You can use your action to move your illusory double up to your speed and make it gesture, speak, and behave in whatever way you choose.</p>

        <p>As soon as it is attacked or would take damage, the double dissipates.</p>
