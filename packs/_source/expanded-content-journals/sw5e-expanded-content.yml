  - name: Fireteam Specialist (Companion)
    _id: VI8xVYIdpCH2DZ42
    text:
      content: |+
        <h2>Fireteam Specialist (Companion)</h2>

        <p></div></p>

        <p>When charging onto the frontlines of the galaxy's harshest conflicts, it pays to have people you can trust at your side. Those fighters who choose to become Fireteam Specialists work in tandem with a companion, becoming more than either could be on their own.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Fireteam Specialist:</strong> 3rd level</em><br>

        <p>You gain proficiency in your choice of the Persuasion or Intimidation skill.</p>

        <h3>Improved Combat Superiority</h3>

        <em><strong>Fireteam Specialist:</strong> 3rd level</em><br>

        <p>Your tactical skill in combat improves, granting bonuses to your Combat Superiority.</p>

        <h4>Improved Maneuvers </h4>

        <p>You know four maneuvers of your choice, instead of two, and you earn more at higher levels, as shown in the Maneuvers Known column of the Fireteam Specialist Combat Superiority table.</p>

        <h4>Improved Superiority Dice</h4>

        <p>You have four superiority dice, instead of two, and you earn more at higher levels, as shown in the Superiority Dice column of the Fireteam Specialist Combat Superiority table.</p>

        <h3>Humanoid Companion</h3>

        <em><strong>Fireteam Specialist:</strong> 3rd, 11th, and 17th level</em><br>

        <p>You've been assigned a squadmate who is under your command, gaining a humanoid companion.</p>

        <p>Create your humanoid companion as detailed in the Companions section of the Customization Options document for Expanded Content.</p>

        <p>In addition to its traits and features, your companion gains additional benefits while it is bonded to you:</p>

        <ul><li>Your companion gains two additional traits. It gains one more additional trait when you reach 11th level in this class. For each trait in excess of your proficiency bonus, your number of Hit Dice that can be spent to restore hitpoints is reduced by 1.</li></ul>

        <p>Lastly, while your companion is bonded to you and within 10 feet of you, your companion can uses your superiority dice and maneuvers as if it knows them.</p>

        <p>This radius increases to 30 feet at 11th level, and 60 feet at 17th level. </p>

        <h3>Rally the Troops</h3>

        <em><strong>Fireteam Specialist:</strong> 7th level</em><br>

        <p>When you use your Second Wind feature while your companion is within 10 feet of you, your companion regains hit points and gains temporary hit points equal to your fighter level.</p>

        <p>This radius increases to 30 feet at 11th level, and 60 feet at 17th level. </p>

        <h3>On Your Six</h3>

        <em><strong>Fireteam Specialist:</strong> 10th level</em><br>

        <p>While your companion is within 5 feet of you, you can use your bonus action to begin a coordinated </p>

