  - name: Holonet Technician
    _id: HGTowye724oYdnJT
    text:
      content: |-
        <h2>Holonet Technician</h2>

        <p>You worked to keep the holonet up and running, whether being employed directly by an institution or indirectly by people across the galaxy. Your work has allowed you to uncover secrets most would never know existed. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Stealth, and Technology</li><li><strong>Tool Proficiencies:</strong> Choose two from mechanic's kit, security kit, and slicer's kit</li><li><strong>Equipment:</strong> A set of common clothes, an old transceiver antennae, two tools of your choice, and a belt pouch containing 50 cr</li></ul>

        <h4>Employment Type</h4>

        <p>There are many people who service parts of the holonet, and many more who want to control the flow of information. Choose which best suits your character or roll on the table below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Role</th></tr></thead><tbody><tr><td>1</td><td>Inter-world Government</td></tr><tr><td>2</td><td>Inter-world Corporation</td></tr><tr><td>3</td><td>World Government</td></tr><tr><td>4</td><td>Crime Syndicate</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Role</th></tr></thead><tbody><tr><td>5</td><td>Independent Contractor</td></tr><tr><td>6</td><td>Broadcasting Service</td></tr><tr><td>7</td><td>Small Corporation</td></tr><tr><td>8</td><td>Darknet Broadcasting</td></tr></tbody></table></div>

        <h3>Feature: Holonet Access</h3>

        <p>You have the codes to a distributor station which gives you access to all information sent through it. This information comes in the form of useful (and sometimes sensitive) information on a topic you choose each day to tune into; this information isn't always reliable or interesting. Regardless of the quality of the information, it's relevance most likely pertains to your locale.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Stealthy</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Keen Mind</td></tr><tr><td>7</td><td>Practiced</td></tr><tr><td>8</td><td>Tech Dabbler</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Holonets technicians vary from boring officer worker to criminal information broker.   </p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I watch and record people secretly then review it later.</td></tr><tr><td>2</td><td>I talk like I'm on a game show or am a holonet broadcaster at all times.</td></tr><tr><td>3</td><td>I prefer to be left to my own devices.</td></tr><tr><td>4</td><td>I like to record people dying and upload it to the holonet.</td></tr><tr><td>5</td><td>There's no such thing as 'real news'.</td></tr><tr><td>6</td><td>Information is a weapon that I've mastered.</td></tr><tr><td>7</td><td>I am always interested in learning new things.</td></tr><tr><td>8</td><td>I prefer interacting indirectly.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Duty.</strong> It is my duty to keep all people in contact so that everything will continue working as intended. (Lawful)</td></tr><tr><td>2</td><td><strong>Autonomy.</strong> Information is meant to confuse and overwhelm. I choose to control my own mind by controlling what information I have access to. (Chaotic)</td></tr><tr><td>3</td><td><strong>Happiness.</strong> The more hope and joy I spread, the more laughs I bring; that is why I do what I do. (Light)</td></tr><tr><td>4</td><td><strong>Popularity.</strong> I want to become the most renown being in all the galaxy, and I'll destroy the competition. (Dark)</td></tr><tr><td>5</td><td><strong>Knowledge.</strong> I don't care who's ideology is right, I care who's ideology will let me learn and document information. (Neutral)</td></tr><tr><td>6</td><td><strong>Self-Fulfillment.</strong>  I'm just here for the fun of it, no matter what happens it'll make a great story one day. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I will do anything to free people from censorship.</td></tr><tr><td>2</td><td>I can't let anyone know I work for a crime lord.</td></tr><tr><td>3</td><td>I see truth in an ideology, and I must spread that ideal to all.</td></tr><tr><td>4</td><td>I got a man killed by giving him a platform to speak, I can't let that happen again.</td></tr><tr><td>5</td><td>I�m on the run from a government organization that I spread propaganda against and who's propaganda I destroy.</td></tr><tr><td>6</td><td>I have a famous person's private logs, and I don't know what to do with them.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I tend to think any broadcaster is a fraud immediately unless they prove otherwise.</td></tr><tr><td>2</td><td>I tend to repeat the same mistake unless it is pointed out to me.</td></tr><tr><td>3</td><td>I will ramble endlessly about a random holonet broadcast that I saw which I think was the best ever.</td></tr><tr><td>4</td><td>I think everyone who works a normal job is a drone without the ability to think freely.</td></tr><tr><td>5</td><td>I describe everything using references to obscure holonet recordings.</td></tr><tr><td>6</td><td>I've become completely desensitized to violence and graphic imagery, to the point where I laugh in an off putting way whenever I see it.</td></tr></tbody></table>



