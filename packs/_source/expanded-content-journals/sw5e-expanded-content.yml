  - name: Choosing a Destiny
    _id: Sttdnw8QAM4r1AZG
    text:
      content: |-
        <h3>Choosing a Destiny</h3>

        <p>Players don't need to choose destinies for their heroes at the start of the campaign - or ever for that matter. Not every hero has a destiny that must be fulfilled before the end of the campaign, and even players who want their characters to have destinies need to give their characters - and the campaign - a chance to develop first. It may take several adventures before players understand where the campaign is going and what goals their heroes are likely to pursue.</p>

        <p>Choosing a destiny can be handled in one of two ways: either the player can select an appropriate destiny for their hero (based on what's happening in the campaign), or the GM can select a secret destiny for the hero. If the player chooses a destiny for their character, the GM should challenge the player to fulfil their destiny by presenting conflicting situations where the smartest and most beneficial decision might force the character to choose between doing what is best for their fellow heroes and taking steps towards their destiny. If the GM secretly chooses the hero's destiny, they must present challenges that let the character move closer to achieving their destiny, imparting benefits when the character is moving in the right direction and imposing penalties when the character does something that takes them far from the destined path. The GM-selected "secret destiny" forces the player to take their character through a period of self-discovery, as they learn which action leads them closer to - or farther from - their destiny. In essence, this mirrors Luke Skywalker's struggle at the end of <em>The Empire Strikes Back</em>, when he must choose between redeeming his father and falling prey to the corruption of the dark side.</p>

        <p>&emsp;A character with a destiny gains short-term benefits whenever they make significant progress towards fulfilling it, while a character who pursues goals that move them further away from their destiny suffers short-term negative effects. Conversely, a character without a destiny has nothing to gain and nothing to lose. A character may even fulfill one destiny and take on another.</p>

        <p>The GM and players should work together to determine a destiny's impact on a campaign. One or more destinies might form the driving force for an entire campaign, or the central focus of a short series of adventures. In one of these cases, the GM should present the characters with choices that regularly affect their destinies, giving them many opportunities to gain destiny bonuses and penalties. Destiny-based campaigns should culminate in a final adventure that allows characters to ultimately resolve their destinies, for better or for worse.</p>
