  - name: Advantage and Disadvantage
    _id: TSGHbvaQs3Lo58vi
    text:
      content: |-
        <h3>Advantage and Disadvantage</h3>

        <p>If a creature has advantage, it can choose to forgo that advantage when making an attack to increase its domination level by one against its target until the end of its turn. For instance, if a creature has advantage and is 20 feet above another creature both vertically and horizontally, it is superdominating that creature. The creature can choose to forgo its advantage to instead hyperdominate the creature until the end of its turn.</p>

        <p>If a creature is suffering from disadvantage, it can't dominate another creature regardless of how far away from that creature it is, horizontally or vertically.</p>
