  - name: Gand
    _id: 5yZn6IcjRYBMsfBc
    text:
      content: |-
        <h2>Gand</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Varying shades of brown, green, and purple</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown, black, green, or silver</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Exoskeletons, three-fingered hands</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'1"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>75 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Gand</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Gand</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Gand are sentient, stocky humanoids whose insectoid bodies are covered in a chitinous exoskeleton. The natural armor allow the Gand to shrug off injuries that would cripple most other species. The exoskeleton provides extra protection in the clavicle region, which prevented most nerve or pressure-point strikes to the neck and shoulders. In addition, Gands have the remarkable ability to regrow lost limbs. If a Gand is dismembered, it can regrow a lost limb in a few days. </p>

        <h3>Society and Culture</h3>

        Gand society places heavy importance on the achievements of an individual and holds that an individual has no name, and thus no worth, until he or she proves otherwise. The speech patterns of Gands utilize third-person self-reference within each level of identity earned. Young or unproven Gands are all<br> called "Gand," as they are considered merely aspects<br> of the same whole. Major accomplishments earn the<br> use of a family surname. Mastering a skill, such as<br> becoming a findsman, allows for the use of the given<br> name, all with third-person self-reference. This manner<br> of speaking is common within the spoken and written<br> Gand language but is more predominant when a Gand<br> speaks Basic; it is often a source of amusement to<br> outsiders.

        <h3>Names</h3>

        <p>Until a Gand has earned the use of a name, they go simply by the term "Gand." Gand speak in the third person and refer to themselves by name. Often, when a Gand feels shamed, they will stop referring to themselves by their name and revert to calling themselves "Gand" until they prove themselves again. Male and female names are not distinct.</p>

        <p><strong>First Names.</strong> C'nyir, Dash, Iglid, Kyuffax, T'rix</p>

        <p><strong>Surname.</strong> Diqlu, Krakee, Praafri, Quudya, Zooq</p>



        <h3>Gand Traits</h3>

        <p>As a Gand, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Gand reach adulthood when they earn their name, which is usually in their teens, and live to be about 70 on average.</p>

        <p><strong><em>Alignment.</em></strong> Gand tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Gand stand 4 to 6 feet tall and weigh around 100 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Exoskeleton.</em></strong> You have a thick exoskeleton. While you are unarmored or wearing light armor, your AC is 12 + your Dexterity modifier.</p>

        <p><strong><em>Gand Resilience.</em></strong> You have advantage on saving throws against poison, and you have resistance against poison damage (explained in chapter 9).</p>

        <p><strong><em>Lungless.</em></strong> Gand do not have lungs, and therefore do not need to breathe.</p>

        <p><strong><em>Regenerative.</em></strong> When you take damage, you can use your reaction and expend a Hit Die to regain hit points as long as the damage would not reduce your hit points to 0.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Gand. The Gand language does not use pronouns as Gand refer to themselves in the third person, so often Gand who speak Galactic Basic are difficult to understand.</p>

        <img src='https://www.gmbinder.com/images/4owYOQK.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:400px' />



