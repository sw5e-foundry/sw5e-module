  - name: Situational Expertise
    _id: ZzggKroVHAIryMdi
    text:
      content: |-
        <h3>Situational Expertise</h3>

        <p>Certain special traits, such as the aqualish Arms Dealer trait, give expertise in a skill in a certain situation. If you would already have expertise in that situation, instead treat this feature as if it gave advantage.</p>
