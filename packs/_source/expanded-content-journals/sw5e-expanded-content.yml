  - name: Demolitions Specialist
    _id: AtVS2c4W1MeIvyEj
    text:
      content: |+
        <h2>Demolitions Specialist</h2>

        <p>Those fighters who choose to become Demolitions Specialists are experts in using explosives in combat. They have an explosive for every situation, whether it be breaching a fortified bunker, taking down a walker, or simply demonstrating that in combat, standing too close to your squadmates can be fatal.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Demolitions Specialist:</strong> 3rd level</em><br>

        <p>You gain proficiency in demolitions kit. Additionally, when you would install a breaching charge, you can do so in half the time.</p>

        <h3>Explosive Charge</h3>

        <em><strong>Demolitions Specialist:</strong> 3rd, 7th, and 15th level</em><br>

        <p>You learn to create a number of small explosives known as charges. Over the course of a short or long rest, you can create a number of charges equal to your Intelligence modifier. You must have a demolitions kit in order to create these charges. Your charges can only be used by you, and they lose their potency at the end of your next short or long rest.</p>

        Once per turn, when you would make a ranged weapon attack, you can instead throw one of your charges. Your charges have a range equal to 30 feet + your Strength modifier x 5. You can throw a charge at a point you can see within range. Each creature within<br> 5 feet must make a Dexterity saving throw (DC =<br> 8 + your proficiency bonus + your Intelligence modifier). A creature takes 2d4 + your<br> Intelligence modifier kinetic damage on a<br> failed save, or half as much on a successful one. 

        The damage of your charges increases to 3d4<br> at 7th level and 4d4 at 15th level.

        <h3>Cause and Effect</h3>

        <em><strong>Demolitions Specialist:</strong> 7th level</em><br>

        <p>You learn to throw grenades as a bonus action. Additionally, when a creature fails a saving throw against a charge or grenade, you can expend a superiority die to apply one of your maneuvers. You can only use this feature once per grenade.</p>

        <h3>Volatile Reflexes</h3>

        <em><strong>Demolitions Specialist:</strong> 10th level</em><br>

        <p>When a creature within 5 feet of you makes a melee attack against you, you can use your reaction and throw a charge behind the target. If the target fails its saving throw against the charge, you impose disadvantage on the attack roll made against you.</p>



        <h3>Backup Plans</h3>

        <em><strong>Demolitions Specialist:</strong> 15th level</em><br>

        <p>When you roll initiative and have no charges remaining, you can create 2 charges. Additionally, whenever you create a charge, you can change the damage type to acid, energy, fire, ion, lightning, or sonic.</p>

        <h3>Bombard</h3>

        <em><strong>Demolitions Specialist:</strong> 18th level</em><br>

        <p>When a creature fails its saving throw against a charge or grenade thrown by you, it has disadvantage on the next Dexterity saving throw it makes before the end of your next turn.</p>

        <img src='https://www.gmbinder.com/images/jH8d8Mh.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:545px' />

