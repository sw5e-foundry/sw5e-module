  - name: Herglic
    _id: XB0a1xBDAoJk0gOE
    text:
      content: |-
        <h2>Herglic</h2>

        <blockquote><hr>

        <h5>Visual Characteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>Black, gray, pale blue, pale pink</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>Aquatic organs, massive size</td></tr></tbody></table>

        <hr>

        <h5>Physical Charicteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>6'</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>200 lb.</td><td>x(2d8) lb.</td></tr></tbody></table>

        <hr>

        <h5>Sociocultural Charicteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>Giju</td></tr><tr><td><strong><em>Language</em></strong></td><td>Herglese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        The herglic are a massive race of creatures descended<br> from aquatic mammals, breathing though a blowhole<br> on top of their heads. They are tall and wide, and have<br> smooth, hairless skin that ranged in color from pale<br> blue to black, though some rare individuals may<br> appear pink or have white markings on their sides.<br> Their girth tends to leave them feeling out of place among smaller species; herglic tend to take up two chairs or fill the entire doorway of any establishment they enter that does not cater to beings their size.

        <h3>Society and Culture</h3>

        <p>The herglics are very technologically advanced, developing space flight and hyperdrives and colonizing their sector of the galaxy prior to the formation of the Galactic Republic. Natural explorers and traders, they sailed the cosmos establishing crucial trade routes and gaining prestige. Despite their size, herglic are surprisingly dexterous while working with tools, and are some of the finest engineers in the galaxy. </p>

        <p>Herglics have an inquisitive but practical nature, enjoying travel and having exotic experiences. Their perpetually calm demeanor  helps them interact with most other species peacefully, though when dealing with smaller species, herglics tend to become nervous and self-conscious about their proportions. They also seem to have an innate predilection for gambling and games of chance, which have gotten more than one herglic into trouble on several occasions.</p>

        <h3>Names</h3>

        <p>Male names are typically harsher sounding than female names. Herglics rarely use surnames.</p>

        <p><strong>Male Names.</strong> Biglu, Melchi, Sehvorah</p>

        <p><strong>Female Names.</strong> Mahg-Raet, Seese, Uddn</p>



        <h3>Herglic Traits</h3>

        <p>As a herglic, you have the following special traits:</p>

        <strong><em>Ability Score Increase.</em></strong> Your Strength score<br> increases by 2, and your Intelligence score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Herglic reach adulthood in their late teens and live up to 120 years.</p>

        <strong><em>Alignment.</em></strong> Herglics' gentle nature causes them to<br> tend toward the light side, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Herglic stand between 6 and 8 feet tall and weigh up to 600 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Hold Breath.</em></strong> You can hold your breath for up to 1 hour at a time.</p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <strong><em>Technician.</em></strong> You are proficient in the Technology<br> skill.

        <p><strong><em>Toughness.</em></strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Herglese. Herglese has a clear and commanding cadence, drawing the attention of those who hear it.</p>

        <img src='https://www.gmbinder.com/images/d03mAPr.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:470px' />



