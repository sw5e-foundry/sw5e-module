  - name: Clone Trooper
    _id: I3gjzfte1dz5VAzY
    text:
      content: |+
        <h2>Clone Trooper</h2>

        <p>You are one of millions; genetically engineered, identical specimens designed to be the perfect soldier. Created from a template provided by the legendary bounty hunter Jango Fett, you represent the latest and greatest evolution in galactic warfare. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Medicine, Perception, and Piloting</li><li><strong>Tool Proficiencies:</strong> Your choice of demolitions kit, security kit, or slicer's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> Badge or emblem of your rank, your chosen tools, a set of common clothes, and a pouch containing 100 cr</li></ul>

        <h4>Clone Specialization</h4>

        <p>While most clones serve as simple soldier, there are many specialized units. Roll a d8 or choose from the options in the table below to determine your specialization:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialization</th></tr></thead><tbody><tr><td>1</td><td>Trooper</td></tr><tr><td>2</td><td>Commando</td></tr><tr><td>3</td><td>Jet Trooper</td></tr><tr><td>4</td><td>Medic</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialization</th></tr></thead><tbody><tr><td>5</td><td>Spec Ops</td></tr><tr><td>6</td><td>Ordnance</td></tr><tr><td>7</td><td>Officer</td></tr><tr><td>8</td><td>Scout</td></tr></tbody></table></div>

        <h3>Feature: Republic Rank</h3>

        <p>You are a soldier of the Republic. Those loyal to the Republic will respect your status and defer to you if they don't outrank you. You can invoke your position to exert influence over other soldiers, requisition simple equipment, and gain access to military compounds affiliated with the Republic.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Medic</td></tr><tr><td>3</td><td>Perceptive</td></tr><tr><td>4</td><td>Ace Pilot</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Alert</td></tr><tr><td>7</td><td>Athlete</td></tr><tr><td>8</td><td>Forceful Vigor</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Clones are trained from birth to be the perfect soldier; over time, they also develop their own personalities. They are universally loyal to the Republic. While clones share genetic coding, no two are completely identical.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I always respect my commander.</td></tr><tr><td>2</td><td>I can stare down a krayt dragon without flinching.</td></tr><tr><td>3</td><td>I face problems head-on. A simple, direct solution is the best path to success.</td></tr><tr><td>4</td><td>I have a sense of humor. This is rare among my brothers.</td></tr><tr><td>5</td><td>I judge people by their actions, not their words.</td></tr><tr><td>6</td><td>I've lost too many friends, and I'm slow to make new ones.</td></tr><tr><td>7</td><td>I ask a lot of questions.</td></tr><tr><td>8</td><td>I'll settle for nothing less than perfection.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Responsibility.</strong> I do what I must and obey just authority. (Lawful)</td></tr><tr><td>2</td><td><strong>Might.</strong> Strength, not compassion, wins battles. (Dark)</td></tr><tr><td>3</td><td><strong>Republic.</strong> My brothers, the Republic, or people are all that matter. (Any)</td></tr><tr><td>4</td><td><strong>Greater Good.</strong> We fight not for ourselves, but for countless of others that can't fight for themselves. (Light)</td></tr><tr><td>5</td><td><strong>Freedom.</strong> Tyrants must not be allowed to oppress the people. (Chaotic)</td></tr><tr><td>6</td><td><strong>Live and Let Live.</strong> Ideals aren't worth killing or going to war over. (Neutral)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My honor is my life.</td></tr><tr><td>2</td><td>Someone saved my life on the battlefield. To this day, I will never leave a friend behind.</td></tr><tr><td>3</td><td>Those who fight beside me are those worth dying for.</td></tr><tr><td>4</td><td>I fight for those who cannot fight for themselves.</td></tr><tr><td>5</td><td>I would still lay down my life for the people I serve with.</td></tr><tr><td>6</td><td>A proud commander once gave me a horrible beating, and I will take my revenge on any bully I encounter.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I have little respect for anyone who is of a lesser rank.</td></tr><tr><td>2</td><td>I obey orders without question, even if the orders cause misery.</td></tr><tr><td>3</td><td>I'd rather eat my armor than admit when I'm wrong.</td></tr><tr><td>4</td><td>I judge others harshly, and myself even more severely.</td></tr><tr><td>5</td><td>I am inflexible in my thinking.</td></tr><tr><td>6</td><td>I can't tell a lie for the life of me.</td></tr></tbody></table>

