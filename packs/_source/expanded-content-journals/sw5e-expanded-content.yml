  - name: Barabel
    _id: T9FNeWM4QI8SepJi
    text:
      content: |-
        <h2>Barabel</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, green, grey, or red</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Four-fingered hands, two inch long teeth</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'7"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>140 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Barab I</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Barabel</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Barabel are a bipedal species of reptilians who are covered in very tough dark colored scales. Evolved from nocturnal lizards, the Barabel adapted a thick layer of fat which allowed them to remain active and not sluggish when temperatures dropped. A blaster set on stun would not damage them at all or slow them down, as it would merely bounce off their scales. Barabel are able to shed their tails if necessary, an ability that proved the undoing of many startled foes. They also possess heavy retractable claws along with needle sharp teeth which can grow to be 2 inches in length. A carnivorous species, Barabel possess two stomachs in order to process the massive amount of food they required to survive.</p>

        <h3>Society and Culture</h3>

        <p>Living in low tech communities ranging from a few dozen individuals to no more than ten thousand, the Barabel community is built around a warren where the group thrives and hunted from. The Barabel species is noted for its hunting and tracking prowess; many of their actions are fueled by their hunting instincts, leading to the general feeling that Barabel are always angry. They are well known for their aggression but are also extremely loyal. They also have a great deal of respect for the Jedi because of their first experiences with a Jedi Master who settled a dangerous clan dispute. Apologies, whether for a misdeed or in sympathy, are an unknown concept to Barabel and are considered insulting.</p>

        <h3>Names</h3>

        <p>Barabel names are harsh and gutteral. Female names are often softer. Surnames are warren-based.</p>

        <p><strong>Male Names.</strong> Anidroks, Bridiz, Trurzuk, Vilzinok</p>

        <p><strong>Female Names.</strong> Alge, Bulzo, Ekthamo, Inako, Nolku</p>

        <p><strong>Surnames.</strong> Akken, Dutarca, Khigta, Srabulgid, Zhomo</p>



        <h3>Barabel Traits</h3>

        <p>As a barabel, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Barabel reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Barabel aggression causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Barabel typically stand between 6 and 7 feet tall and weigh about 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier. Additionally, your thick hide is naturally adapted to cold climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Hunter.</em></strong> You are proficient in Survival. </p>

        <p><strong><em>Prehensile Tail.</em></strong> You have supreme control over your tail and can use it to manipulate objects as well as your hands.</p>

        <p><strong><em>Tooth and Nail.</em></strong> Your sharp teeth and claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage. Lastly, as a bonus action, you can perform a special claw attack. On a hit, the target suffers the attack's normal effects, you gain temporary hit points equal to your Constitution modifier (minimum of 1), and you can't use this trait again until you finish a short or long rest.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Barabel. The Barabel language is characterized by its barks and hisses.</p>

        <img src='https://www.gmbinder.com/images/fIVSvAv.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:275px' />



