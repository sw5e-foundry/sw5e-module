  - name: Crime Lord
    _id: QhyEqloS4WAlxtiw
    text:
      content: |+
        <h2>Crime Lord</h2>

        <p>Few societies manage to eradicate crime altogether. In the underworld, someone always rises to the top, either through vision, organisation, or sheer intimidation. The life of a crime lord isn't for the timid. After conquering an unseen empire, the crime lord wages a daily struggle not only to stay on top, but also to stay alive.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Intimidation, and Persuasion</li><li><strong>Tool Proficiencies:</strong> One type of gaming set</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A fine set of clothes, a gaming set (one of your choice), and a purse containing 250 cr</li></ul>

        <h4>Criminal Motivation</h4>

        <p>Not every crime lord is bent on corrupting society and making a profit. Some use their criminal connections to wage guerilla wars against tyrants and despots. Indeed, some historical heroes began as smugglers or pirates, rising through the ranks of their organization to provide a more noble direction for their group's activities. Although some did so to remove an obstacle to making more money, others recognized that ridding the galaxy of evil is a more important long-term goal. Choose the motivation behind your criminal enterprise, or roll on the table below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Motivation</th></tr></thead><tbody><tr><td>1</td><td>Desperation</td></tr><tr><td>2</td><td>Freedom</td></tr><tr><td>3</td><td>Infamy</td></tr><tr><td>4</td><td>Love</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Motivation</th></tr></thead><tbody><tr><td>5</td><td>Malice</td></tr><tr><td>6</td><td>Profit</td></tr><tr><td>7</td><td>Respect</td></tr><tr><td>8</td><td>Revenge</td></tr></tbody></table></div>

        <h3>Feature: Criminal Network</h3>

        <p>You have access to an extensive network of organised crime. You know how to get messages to and from local contacts, even over great distances; you know the local messengers, corrupt caravan masters, and seedy sailors who can deliver messages for you.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Threatening</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Inspiring Leader</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Crime lords might seem like villains on the surface, and many of them are villainous to the core. But some have an abundance of endearing, if not redeeming, characteristics. Unlike common thieves, some crime lords even have some respect for law and authority, with whom they play a cat-and-mouse type game. </p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I always have a plan for what to do when things go wrong.</td></tr><tr><td>2</td><td>I am always calm, no matter what the situation. I never raise my voice or let me emotions control me.</td></tr><tr><td>3</td><td>My eloquent flattery makes everyone I talk to feel like the most wonderful and important person in the world.</td></tr><tr><td>4</td><td>I would rather make a new friend than a new enemy.</td></tr><tr><td>5</td><td>I don't like to get my hands dirty, and I won't be caught dead in unsuitable accommodations.</td></tr><tr><td>6</td><td>My favor, once lost, is lost forever.</td></tr><tr><td>7</td><td>If you do me an injury, I will crush you, ruin your name, and salt your fields.</td></tr><tr><td>8</td><td>I blow up at the slightest insult.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Honor.</strong> I don't steal from others in the trade. (Lawful)</td></tr><tr><td>2</td><td><strong>Freedom.</strong> Chains are meant to be broken, as are those who would forge them. (Chaotic)</td></tr><tr><td>3</td><td><strong>Charity.</strong> I steal from the wealthy so that I can help people in need. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I will do whatever it takes to become wealthy. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I'm loyal to my friends, not to any ideals, and everyone else can take a walk for all I care. (Neutral)</td></tr><tr><td>6</td><td><strong>Redemption.</strong> There's a spark of good in everyone. (Light)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I'm trying to pay off an old debt I owe to a generous benefactor.</td></tr><tr><td>2</td><td>My ill-gotten gains go to support my family.</td></tr><tr><td>3</td><td>Something important was taken from me, and I aim to steal it back.</td></tr><tr><td>4</td><td>The common folk must see me as a hero of the people.</td></tr><tr><td>5</td><td>I'm guilty of a terrible crime. I hope I can redeem myself for it.</td></tr><tr><td>6</td><td>Someone I loved died because of a mistake I made. That will never happen again.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I secretly believe that everyone is beneath me.</td></tr><tr><td>2</td><td>When faced with a choice between money and my friends, I usually choose the money.</td></tr><tr><td>3</td><td>I too often hear veiled insults and threats in every word addressed to me, and I'm quick to anger.</td></tr><tr><td>4</td><td>I have a �tell� that reveals when I'm lying.</td></tr><tr><td>5</td><td>I turn tail and run when things look bad.</td></tr><tr><td>6</td><td>An innocent person is in prison for a crime that I committed. I'm okay with that.</td></tr></tbody></table>

