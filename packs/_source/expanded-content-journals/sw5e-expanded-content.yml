  - name: Falleen
    _id: CYDIQD9I2nkKj6Hv
    text:
      content: |-
        <h2>Falleen</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green, red</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, brown</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Ridged skulls, dorsal spine</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'7"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>110 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Falleen</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Falleen</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Falleen are distinguished by their mottled green or red skin, ridged skulls, and their long, black hair which they typically wear in ponytails. The sleek symmetry of their features, calculating and cold demeanors, their exotic looks, and their ability to alter their skin pigmentation make the Falleen often considered to be among the most aesthetically pleasing beings in the galaxy. In addition to their strikingly beautiful appearance, the Falleen exude pheromones which makes them all but irresistible to both sexes.</p>

        <p>The Falleen are semi-aquatic, being able to hold their breath underwater for an extended period of time. Fallen are one of few species that are resistant to manipulation by the Force.</p>

        <h3>Society and Culture</h3>

        <p>Falleen society is of a feudal nature, with noble houses ruling over the lower classes. The upper echelons of Falleen aristocracy are rife with politics and intrigue, though they rarely spill blood over disputes or reduce themselves to open warfare.</p>

        <p>As a cold-blooded species, the Falleen respect discipline and control, particularly self-control. They tend to shun public displays of emotion, and are very patient. As a result of this attitude, they tend to look down on the more openly passionate, whom they see as lacking self-control. Indeed, the Falleen as a species have a towering sense of superiority, reflecting on their view of Falleen as the civilized and cultural center of the galaxy, rather than Coruscant.</p>

        <h3>Names</h3>

        <p>Falleen favor names with Z and X sounds. They are usually accompanied by a surname, which is familial.</p>

        <p><strong>Male Names.</strong> Xomit, Xizor, Xist, Zenex, Zurros</p>

        <p><strong>Female Names.</strong> Xora, Trezza, Mylla, Zule, Annaz</p>

        <p><strong>Surnames.</strong> Grunseit, Croom, Moz, Xiss, Mythric</p>



        <h3>Falleen Traits</h3>

        <p>As a Falleen, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Falleen reach adulthood in their late teens and live up to 250 years. </p>

        <strong><em>Alignment.</em></strong> Falleen societal structure causes them to<br> tend to be lawful balanced, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Falleen typically stand between 5 and 6 feet tall and weigh around 165 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Closed Mind.</em></strong> Falleen brains have an unusual composition which make them resistant to influence from the Force. You have advantage on Wisdom and Charisma saving throws against force powers.</p>

        <p><strong><em>Enthralling Pheromones.</em></strong> You can use your pheromones to influence individuals of both sexes. Whenever you roll a 1 on a Charisma (Persuasion) check, you can reroll the die and must use the new roll. Additionally, once per short or long rest, you can treat a d20 roll of 9 or lower on a Charisma check as a 10. This feature has no effect on droids or constructs.</p>

        <p><strong><em>Hold Breath.</em></strong> You can hold your breath for up to 1 hour at a time.</p>

        <p><strong><em>Mask of the Wild.</em></strong> You can attempt to hide even when you are only lightly obscured by foliage, heavy rain, falling snow, mist, and other natural phenomena.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Falleen. Falleen is characterized by its common use of the Z and X sounds, of which the Falleen are fond.</p>

        <img src='https://www.gmbinder.com/images/XkxqmhZ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:165px' />



