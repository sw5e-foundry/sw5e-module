  - name: Frenzied Approach
    _id: TdIyB2zuyP9UD0wO
    text:
      content: |+
        <h2>Frenzied Approach</h2>

        <p>For some berserkers, rage is a means to an end�that end being violence. The Frenzied Approach is that of untrammeled fury, slick with blood. As you enter the berserker's rage, you thrill in the chaos of battle, heedless of your own health or well-being.</p>

        <h3>Frenzy</h3>

        <em><strong>Frenzied Approach:</strong> 3rd level</em><br>

        <p>You can go into a frenzy when you enter your rage. If you do so, for the duration of your rage you can make a single melee weapon attack as a bonus action on each of your turns after this one.</p>

        The first time you use this feature, you suffer no ill effect. If you use this feature again before you finish<br> a long rest, you suffer one level of exhaustion<br> when your rage ends each time you use<br> it.

        When you finish a long rest, you<br> reduce your exhaustion level by 2,<br> instead of 1. Additionally, any<br> effect that removes exhaustion<br> reduces your exhaustion by 1<br> additional level.

        <h3>Maniacal Rage</h3>

        <em><strong>Frenzied Approach:</strong> 3rd level</em><br>

        <p>While raging, you have advantage on Charisma (Intimidation) checks.</p>

        <h3>Mindless Rage</h3>

        <em><strong>Frenzied Approach:</strong> 6th level</em><br>

        You can't be charmed or frightened while raging.<br> If you are charmed or frightened when you enter<br> your rage, the effect is suspended for the duration<br> of the rage.

        <h3>Intimidating Presence</h3>

        <em><strong>Frenzied Approach:</strong> 10th level</em><br>

        You can use your action to frighten someone with<br> your menacing presence. When you do so, choose<br> one creature that you can see within 30 feet of you. If the creature can see or hear you, it must succeed on a Wisdom saving throw (DC = 8 + your proficiency bonus + your Charisma modifier) or be frightened of you until the end of your next turn. On subsequent turns, you can use your action to extend the duration of this effect on the frightened creature until the end of your next turn. This effect ends if the creature ends its turn out of line of sight or more than 60 feet away from you. While raging, you add double your proficiency bonus to the save DC, instead of your normal proficiency bonus.

        <p>If the creature succeeds on its saving throw, it becomes immune to this feature for 24 hours.</p>

        <h3>Retaliation</h3>

        <em><strong>Frenzied Approach:</strong> 14th level</em><br>

        <p>When you take damage from a creature that is within 5 feet of you, you can use your reaction to make a melee weapon attack against that creature.</p>

        <img src='https://www.gmbinder.com/images/zfue4ei.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:914px' />

