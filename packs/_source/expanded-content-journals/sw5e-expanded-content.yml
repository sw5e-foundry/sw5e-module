  - name: Gank
    _id: DB9uJFcapLt5dSj3
    text:
      content: |-
        <h2>Gank</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Yellow or yellowish-brown</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Brown or black</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red, green, blue, or white</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Always armored, cybernetic communication</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>115 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Nar Shaddaa (possibly)</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Gank</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The ganks are a species of fur-covered carnivores. The typical member of the species has a face that is squared-off and yellow in color, the expression trapped in a perpetual snarl that non-ganks find unattractive. Small, mean-looking eyes peer from above the maw, their head sitting atop a thick neck between broad, strong shoulders. These cap two thickset, powerful arms, which terminate in hands with five fingers each. Their heavy build affords ganks great strength, yet they are also spry runners. They augment their bodies with cybernetics, making them a species of cyborgs.</p>

        <h3>Society and Culture</h3>

        <p>Precious little is known about gank culture. The exception is that the ganks are fabled for their violent and ruthless nature; even the slightest perceived insult is enough to throw a gank into a violent rage of retaliation. Outsiders similarly know little of the organization of gank society, or whether they have any central rulers at all. What is well known was that the ganks are a war-loving and regimented species, whose members enjoy occupations that allow them to fight and shed blood, such as that of assassin, bodyguard, bounty hunter, and mercenary. They are in particular demand by the hutts, who have enough ganks on retainer to constitute a small army. Their warlike ways and physical strength ranks the ganks among the galaxy's most redoubtable fighters. The species have no compunctions about premeditated murder, which lends them the nickname "Gank Killers."</p>

        <h3>Names</h3>

        <p>Gank names do not differentiate between genders, and instead of surnames, they give themselves epithets. </p>

        <p><strong>First Names.</strong> Darakk, Frent, Shett, Yorrath</p>

        <p><strong>Epithets.</strong> the Feared, the Keen, the Slayer, the Tough</p>



        <h3>Gank Traits</h3>

        <p>As a gank, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Dexterity or Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Ganks reach adulthood in their late teens and live for slightly more than a century thanks to their cybernetics.</p>

        <p><strong><em>Alignment.</em></strong> Ganks aggressive and hair trigger nature causes them to tend towards chaotic dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Ganks typically stand 5 to 6 feet tall and generally weigh about 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 35 feet. You ignore the strength property of heavy armor.</p>

        <p><strong><em>Aggressive.</em></strong> As a bonus action, you can move up to your speed toward an enemy of your choice that you can see or hear. You must end this move closer to the enemy than you started.</p>

        <p><strong><em>Athletic.</em></strong> You have proficiency in the Athletics skill.</p>

        <p><strong><em>Gank Training.</em></strong> You have proficiency in light and medium armor as well as two vibroweapons or blasters of your choice.</p>

        <p><strong><em>Mercenary Specialization.</em></strong> You have proficiency in one of the following skills: Intimidation, Persuasion, Stealth, or Perception.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Gank. You can communicate with other ganks within 30 feet without speaking through use of cybernetic implants. Tech casters can detect the communication but can�t understand it.</p>

        <img src='https://www.gmbinder.com/images/mqZHiwg.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:325px' />



