  - name: Faction Adventurer
    _id: F9YQwKSEPkLk4opK
    text:
      content: |+
        <h2>Faction Adventurer</h2>

        <p>Adventuring is nothing new to you. Due to the circumstances of how you were raised, you have been involved with wandering heroes for most of your life. Maybe you were part of an adventuring band previously, but split with them after a disagreement or tragedy. Or, perhaps you worked around heroes in a lesser role for most of your young life, and you are now ready to graduate to the front lines.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Investigation, Nature, and Survival</li><li><strong>Tool Proficiencies:</strong> Your choice demolitions kit, security kit, or slicer's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> 50 feet of rope, a small knife, a trophy, a set of traveler's clothes, and a belt pouch containing 100 cr. </li></ul>

        <h4>Adventuring Origin</h4>

        <p>You have either been adventuring or assisting other in adventuring since a very young age. Perhaps your parents were famous adventurers, or a group of adventurers found and raised you as their own. Perhaps you were trained to be a professional monster hunter, or maybe another faction member saved your life so you swore loyalty to them. Work with your GM to determine the nature of your adventuring.</p>

        <h3>Feature: Faction Membership</h3>

        <p>You are an established and respected member of an adventurer's faction, allowing you to rely on certain benefits that membership provides. If you are in a town with a headquarters for your adventurer's faction and you are in good standing with the faction, you will be allowed to look at the job postings and find adventuring work to earn money. </p>

        <p>factions often wield tremendous political power. If you are accused of a crime, your faction will support you if a good case can be made for your innocence or the crime is justifiable. You can also gain access to powerful political figures through the faction, if you are a member in good standing. You must pay dues of 50 cr per month to the faction. Your dues must be current to remain in the faction's good graces.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Naturalist</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Alert</td></tr><tr><td>8</td><td>Athlete</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Adventurers are well adjusted to life on the road. They are often comfortable doing dangerous things like dungeoneering and fighting and can stay level-headed in the face of danger, but they may not be so well adapted to other parts of life.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I can't bring myself to ignore a cry for help.</td></tr><tr><td>2</td><td>I hold onto every mildly interesting item I find, in case it comes in handy someday.</td></tr><tr><td>3</td><td>After all the weirdness I've seen on my travels, nothing can surprise me.</td></tr><tr><td>4</td><td>I spit and laugh in the face of danger.</td></tr><tr><td>5</td><td>Giving up is never an option for me.</td></tr><tr><td>6</td><td>I feel more at home in monster-infested dungeons than in civilized society.</td></tr><tr><td>7</td><td>I fill silence with wacky stories about my past misadventures, which may or may not be exaggerated.</td></tr><tr><td>8</td><td>My sense of humor is as dark and grim as the dungeons I explore.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Adventure.</strong> All I want is to travel the world and see amazing things. (Any)</td></tr><tr><td>2</td><td><strong>Heroism.</strong> I am dedicated to helping people in need. (Light)</td></tr><tr><td>3</td><td><strong>Order.</strong> I use my power to save the world from the forces of destruction and chaos. (Lawful)</td></tr><tr><td>4</td><td><strong>Excitement.</strong> An ordinary life is boring, I'd rather travel around and find trouble. (Chaotic)</td></tr><tr><td>5</td><td><strong>Power.</strong> The more powerful enemies I defeat, the stronger I become. (Neutral)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I want to go down in history as a brave, powerful hero. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I carry with me a strange artifact that I found in a dungeon, but I don't know what it's for.</td></tr><tr><td>2</td><td>My adventuring party means the world to me.</td></tr><tr><td>3</td><td>I have sworn to hunt down the monster or villain who killed my former adventuring party.</td></tr><tr><td>4</td><td>I adventure in order to bring honor (or money) to my family.</td></tr><tr><td>5</td><td>There is a faraway place I've always wanted to visit, and I won't stop until I make it there.</td></tr><tr><td>6</td><td>All I want is to make the ones who trained me in the way of adventuring proud.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I default to solving problems with violence even when it's unwise or immoral.</td></tr><tr><td>2</td><td>I expect to be lavished with praise whenever I do my job, and I get mad when no one acknowledges me.</td></tr><tr><td>3</td><td>All members of "Dark" species must be Dark, so I will never trust them.</td></tr><tr><td>4</td><td>Waiting around makes me antsy. I'd rather do something stupid than do nothing at all.</td></tr><tr><td>5</td><td>My habit of looting dungeons makes me swipe things I shouldn't.</td></tr><tr><td>6</td><td>A monstrous enemy I faced in the past still leaves me quivering with fear.</td></tr></tbody></table>

