  - name: Cybertech Engineering
    _id: V6a7haY0GIemt6At
    text:
      content: |+
        <h2>Cybertech Engineering</h2>

        <p>Those engineers who choose the Cybertech Engineering discipline focus on the ability to craft reusable consumables and items that augment and complement their techcasting abilities.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Cybertech Engineering:</strong> 3rd level</em><br>

        <p>You gain proficiency in cybertech's implements. Additionally, when you engage in crafting with cybertech's implements, the rate at which you craft doubles.</p>

        <h3>Cybertech Contraptions</h3>

        <em><strong>Cybertech Engineering:</strong> 3rd level</em><br>

        <p>You learn modify gadgets and wristpads utilizing your cybertech knowledge. Over the course of a long rest, you can modify your wristpad. You must have a wristpad and cybertech's implements in order to perform this modification.</p>

        <p>Your wristpad requires attunement, can only be used by you, and counts as a tech focus for your tech powers while you are attuned to it. Your modified wristpad has 4 modification slots, and it gains more at higher levels, as shown in the Modification Slots column of the engineer table. For each modification installed in excess of your proficiency bonus, your tech point maximum is reduced by 1. Over the course of a long rest, you can install, replace, or remove a number of modifications up to your Intelligence modifier (minimum of one).</p>

        <p>Some modification effects require saving throws. When you use such an effect from this class, the DC equals your tech save DC.</p>

        <h3>Potent Techcasting</h3>

        <em><strong>Cybertech Engineering:</strong> 3rd level</em><br>

        <p>When you miss with a tech attack roll, or a creature succeeds on a saving throw against a tech power you cast, you can expend one use of your Potent Aptitude to overwhelm them. Roll the die, and either add it to the attack roll or subtract it from their saving throw.</p>

        <h3>Adaptable Applications</h3>

        <em><strong>Cybertech Engineering:</strong> 6th level</em><br>

        <p>When you cast a tech power of 1st level or higher, you can choose to deal additional damage or provide additional healing with that power. The additional damage or healing equals half your engineer level.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a long rest.</p>

        <h3>Combat Contrivances</h3>

        <em><strong>Cybertech Engineering:</strong> 14th level</em><br>

        <p>When you use your action to a cast a 1st-level or higher tech power, you can use your bonus action to gain temporary hit points equal to the level of the tech power + your Intelligence modifier.</p>



        <h3>Perfected Purposing</h3>

        <em><strong>Cybertech Engineering:</strong> 18th level</em><br>

        <p>When you cast a tech power, you can choose to deal maximum damage or provide maximum healing with that power.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <img src='https://www.gmbinder.com/images/rMiCs3H.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:450px' />



        <h3>Cybertech Modifications</h3>

        <p>If a modification has prerequisites, you must meet them to install it. You can install the modification at the same time that you meet its prerequisites.</p>

        <h4>Advanced Biotic Amplifier</h4>

        <em><strong>Prerequisite:</strong> 15th level, Prototype Biotic Amplifier</em><br>

        <p>You further fine tune your biotic amplifier. While wielding this amplifier, when a creature gains temporary hit points from your biotic amplifier, it instead gains four times as many. This amount can't exceed the number of hit points regained.</p>

        <h4>Advanced Corrosive Amplifier</h4>

        <em><strong>Prerequisite:</strong> 15th level, Prototype Corrosive Amplifier</em><br>

        <p>You further fine tune your Corrosive Amplifier. When you activate this amplifier, the next attack roll made by that creature before the end of its next turn has disadvantage.</p>

        <h4>Advanced Cryo Amplifier</h4>

        <em><strong>Prerequisite:</strong> 15th level, Prototype Cryo Amplifier</em><br>

        <p>You further fine tune your Cryo Amplifier. When you activate this amplifier, the creature is restrained until the end of your next turn.</p>

        <h4>Advanced Explosive Amplifier</h4>

        <em><strong>Prerequisite:</strong> 15th level, Prototype Explosive Amplifier</em><br>

        <p>You further fine tune your Explosive Amplifier. When a creature takes fire damage while ignited, the creature has disadvantage on the next Dexterity saving throw it makes before the start of your next turn.</p>

        <h4>Arakyd Vector</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While using your wristpad as a tech focus, you gain a +1 bonus to tech attack rolls. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Augmented Explosive</h4>

        <p>You can augment a single grenade, mine, or thermal detonator to regain its charge. An augmented explosive can only be used by you, and it uses your tech save DC instead of its own. Once you've activated an explosive, it can't be activated again until you finish a short or long rest.</p>

        <p>You can select this modification multiple times. Each time you do so, you can maintain an additional augmented explosive, to a maximum equal to your Intelligence modifier.</p>

        <h4>Belasco Dynamics</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While using your wristpad as a tech focus, you gain a +1 bonus to your tech save DC. This bonus increases to +2 at 9th level and +3 at 13th level.</p>



        <h4>Biotic Amplifier</h4>

        <p>You integrate a biotic amplifier in your wristpad that increases the potency of your healing tech powers. While wielding this amplifier, when a creature regains hit points from a tech power you cast, you can grant them temporary hit points equal to the amount of tech points spent. This amount can't exceed the number of hit points restored.</p>

        <p>You can use this amplifier a number of times equal to your Intelligence modifier. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Climbing Gloves</h4>

        <p>You craft a set of gloves with a powerful assisted grip. While wearing these gloves, you have a climbing speed of 20 feet, and you have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <h4>Corrosive Amplifier</h4>

        <p>You integrate a booster in your wristpad that enhances your tech powers that deal acid damage. While wielding this amplifier, when a creature takes acid damage from a tech power you cast, you can choose to deal additional acid damage equal to your Intelligence modifier. </p>

        <p>You can use this amplifier a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you complete a short or long rest.</p>

        <h4>Cryo Amplifier</h4>

        <p>You integrate a booster in your wristpad that enhances your tech powers that deal cold damage. While wielding this amplifier, when a creature takes cold damage from a tech power you cast, you can choose to deal additional cold damage equal to your Intelligence modifier.</p>

        <p>You can use this amplifier a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you complete a short or long rest.</p>

        <h4>Darkvision Goggles</h4>

        <p>You craft a pair of sight-enhancing goggles. While wearing these goggles, you have darkvision to a range of 60 feet. If you already have darkvision, this modification increases its range by 30 feet.</p>

        <h4>Explosive Amplifier</h4>

        <p>You integrate a booster in your wristpad that enhances your tech powers that deal fire damage. While wielding this amplifier, when a creature takes fire damage from a tech power you cast, you can choose to deal additional fire damage equal to your Intelligence modifier.</p>

        <p>You can use this amplifier a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you complete a short or long rest.</p>



        <h4>Imaging Amplifier</h4>

        <p>You integrate a booster in your wristpad that enhances your illusionary tech powers. While wielding this amplifier, when a creature attempts an Intelligence (Investigation) check against a tech power you cast to discern the illusion for what it is, you can force the creature to have disadvantage on the roll (no action required). Alternatively, when you cast the <em>mirror image</em> tech power, you create a fourth duplicate. While you have four duplicates, you must roll a 5 or higher on the d20 roll to change an attack's target to a duplicate.</p>

        <p>You can use this amplifier a number of times equal to your Intelligence modifier (a minimum of once). You regain all expended uses when you complete a short or long rest.</p>

        <h4>Jet Boots</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>You find tune your augmented boots to give you temporary, limited flight. Activating or deactivating the boots requires a bonus action and, while active, you have a flying speed of 30 feet. </p>

        <p>The rocket boots last for 1 minute before deactivating. Once the boots have been activated, they can't be activated again until you finish a short or long rest.</p>

        <h4>Mechanical Arm</h4>

        <p>You create a mechanical arm which mounts to your shoulder, which you can use independently. You can only gain the benefit of items held by two of your arms at any given time.</p>

        <p>You can choose this modification twice.</p>

        <h4>Prototype Biotic Amplifier</h4>

        <em><strong>Prerequisite:</strong> 7th level, Biotic Amplifier</em><br>

        <p>You fine tune your biotic amplifier. While wielding this amplifier, when a creature gains temporary hit points from your biotic amplifier, it instead gains twice as many. This amount can't exceed the number of hit points regained.</p>

        <h4>Prototype Corrosive Amplifier</h4>

        <em><strong>Prerequisite:</strong> 7th level, Corrosive Amplifier</em><br>

        <p>You fine tune your Corrosive Amplifier. When you activate this amplifier, the next attack roll made against that creature before the end of its next turn has advantage.</p>

        <h4>Prototype Cryo Amplifier</h4>

        <em><strong>Prerequisite:</strong> 7th level, Cryo Amplifier</em><br>

        <p>You fine tune your Cryo Amplifier. When you activate this amplifier, the creature gains 1 slowed level until the end of your next turn. </p>

        <h4>Prototype Explosive Amplifier</h4>

        <em><strong>Prerequisite:</strong> 7th level, Explosive Amplifier</em><br>

        <p>You fine tune your Explosive Amplifier. When you activate this amplifier, the creature is also ignited for 1 minute. At the start of each of its turns, the creature </p>



        <p>takes additional fire damage equal to your Intelligence modifier and then makes a Dexterity saving throw against your tech save DC, ending this effect on a success. If the target or a creature within 5 feet of it uses an action to put out the flames, or if some other effect douses the flames, the effect ends.</p>

        <h4>Powered Grappling Hook</h4>

        <em><strong>Prerequisite:</strong> 9th level, Wrist-Mounted Grappling Hook</em><br>

        <p>While your wrist-mounted grappling hook is deployed, when you cast a tech power with a range of touch, your hook can deliver the power as if it had cast it.</p>

        <h4>Sentry Turret</h4>

        <p>You learn how to craft small sentry turrets shaped like globes that can adhere to any surface. As an action or bonus action (your choice), you can throw a sentry to a point you can see within range (30 feet + your Strength modifier x 5). At the end of each of your turns, a deployed sentry automatically targets a hostile creature within 10 feet of it. If multiple targets are available, one is chosen at random. The target must make a Dexterity saving throw. On a failed save, it takes 1d4 energy damage and gains 1 slowed level until the end of your next turn.</p>

        <p>The sentries have 1 hit point, an armor class of 10, and can be repaired over the course of a long rest. Each sentry lasts for 1 minute before deactivating. You can maintain a number of sentries equal to your Intelligence modifier. Once a sentry has been activated, it can't be activated again until you finish a short or long rest.</p>

        <h4>Truesight Goggles</h4>

        <em><strong>Prerequisite:</strong> 11th level, Darkvision Goggles</em><br>

        <p>You modify your goggles with a toggle allowing you to briefly gain enhanced sight. As a bonus action, you can activate the truesight feature of your goggles. When toggled on, for the next minute your goggles now automatically dispel illusions and can detect invisibility, as with truesight.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Wrist-Mounted Grappling Hook</h4>

        <p>You craft a wrist-mounted grappling hook weapon attached to a tightly coiled cord. With this contraption, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d4 kinetic damage. This attack can target a surface, object, or creature.</p>

        <p>A creature struck by this attack is impaled by the hook. As an action, a creature can attempt to remove the hook. Removing the hook requires a Strength check. While the hook is stuck in the target, you are connected to the target by a 60 foot cable.</p>

        <p>While the hook is deployed, you can use your bonus action to activate the reel, pulling yourself to the location if the target is your size or larger. A creature or object smaller than you is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>

        <p>Once you've used this feature, you can't use it again until you recover and reinsert the hook as an action.</p>

