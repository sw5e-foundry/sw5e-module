  - name: Squad Shield
    _id: SeBPJgEzOaCnmHdZ
    text:
      content: |-
        <h4>Squad Shield</h4>

        <p><em>7th-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 reaction, which you take in response to an incoming threat</li><li><strong>Range:</strong> Self (10-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>In the face of danger, you create a barrier that protects you and those around you. A faintly glowing sphere of protection with a radius of 10 feet appears. The sphere lasts for the duration.</p>

        <p>Any tech power (or force power that deals energy or lightning damage) of 7th level or lower cast from outside the barrier can't affect creatures or objects within it, even if the power is cast using a higher level tech slot. Such a power can target creatures and objects within the barrier, but the power has no effect on them. Similarly, the area within the barrier is excluded from the areas affected by such powers.</p>

        <p>Furthermore, hazards of the following types cannot physically pass through the barrier or affect anything within it.</p>

        <ul><li>Physical or energy projectiles.</li><li>A specific effect, such as a thermal detonator's explosion.</li><li>An environmental danger, such as falling rocks or a lava flow.</li></ul>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 8th level or higher, the maximum radius increases by 10 feet for each slot level above 7th. In addition, the barrier blocks powers of one level higher for each slot level above 7th.</p>
