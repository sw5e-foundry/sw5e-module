  - name: Adventuring Gear
    _id: PdoeMt2FgLGGri9o
    text:
      content: |-
        <h2>Adventuring Gear</h2>

        <p>This section describes items that have special rules or require further explanation.</p>

        <h3>Ammunition</h3>

        <h4>Fragmentation Torpedo</h4>

        <p>This torpedo launcher ammunition deals 20d4 kinetic damage on a hit. </p>

        <h4>Plasma Torpedo</h4>

        <p>This torpedo launcher ammunition deals 20d4 energy damage on a hit. </p>

        <h3>Explosives</h3>

        <h4>Charge, Fragmentation</h4>

        <p>A device used to blow holes in larger constructs and structures, a breaching charge creates a devastating explosion focused in a specific direction. Installing a breaching charge takes 1 minute. The charge can be set with a 6-second timer, or detonated remotely using a remote detonator.</p>

        <p>When detonated, the breaching charge explodes in a 15-foot cone. Each creature within the cone must make a DC 14 Dexterity saving throw, taking 20d4 kinetic damage on a failed save or half as much on a successful one. If affixed to a creature, that creature has disadvantage on the saving throw. Objects, structures, and other surfaces have disadvantage on the saving throw. If affixed to the object, structure, or surface, it instead automatically fails this saving throw.</p>

        <h4>Charge, Plasma</h4>

        <p>A device used to blow holes in larger constructs and structures, a breaching charge creates a devastating explosion focused in a specific direction. Installing a breaching charge takes 1 minute. The charge can be set with a 6-second timer, or detonated remotely using a remote detonator.</p>

        <p>When detonated, the breaching charge explodes in a 15-foot cone. Each creature within the cone must make a DC 14 Dexterity saving throw, taking 20d4 energy damage on a failed save or half as much on a successful one. If affixed to a creature, that creature has disadvantage on the saving throw. Objects, structures, and other surfaces have disadvantage on the saving throw. If affixed to the object, structure, or surface, it instead automatically fails this saving throw.</p>

        <h3>Life Support</h3>

        <h4>Emergency Raft</h4>

        <p>This raft comes packed in a 2-foot-long tube. When activated, the raft quickly deploys, expanding to full size in six seconds. The raft is 6 feet long and 3 feet wide, and can hold up to four Medium creatures not exceeding 800 lb. It comes with two collapsible oars with which to row. The raft can be collapsed and restored over the course of 1 minute.</p>

        <h4>Emergency Rations (One day's)</h4>

        <p>Emergency rations come in small pill form, provide all the necessary nourishment for one person for one day, and take up roughly one-tenth the space of field rations. </p>

        <h4>Emergency Shelter</h4>

        <p>This shelter comes packed in a 2-foot-long tube. When activated, the shelter deploys, expanding to full size in 1 minute. The shelter is 8 feet long, 8 feet wide, and 6 feet tall, and can house up to six Medium creatures. The shelter includes spikes that automatically mount to the ground, provided they can find purchase. The shelter comes with an integrated power generator, faint glowing lights in the interior which provide dim light, and creatures in the shelter are protected from the elements, including hot and cold climates, as described in chapter 5 of the Dungeon Master's Guide. The shelter's power generator lasts for seven days, after which it stops providing light. The shelter can be collapsed and restored over the course of 10 minutes.</p>

        <h3>Storage</h3>

        <h4>Bottle</h4>

        <p>A bottle stores 1 and 1/2 pints of liquid.</p>

        <h4>Bucket</h4>

        <p>A bucket stores 3 gallons of liquid or 1/2 cubic foot of solids.</p>

        <h4>Flask</h4>

        <p>A flask stores 1 pint of liquid.</p>

        <h4>Hovercart</h4>

        <p>This repulsorcraft is designed to efficiently move large amounts of goods. It has a speed of 30 feet and can store 2,000 lb., not exceeding 120 cubic feet.</p>

        <h4>Jug</h4>

        <p>A jug stores 1 pint of liquid.</p>

        <h4>Pitcher</h4>

        <p>A pitcher stores 1 pint of liquid.</p>

        <h4>Pot</h4>

        <p>A pot stores 1 pint of liquid.</p>

        <h4>Sack</h4>

        <p>A sack stores 30 ounces, not exceeding 1 cubic foot. </p>

        <h4>Tankard</h4>

        <p>A tankard stores 1 pint of liquid.</p>

        <h4>Vial</h4>

        <p>A vial stores 4 ounces of liquid.</p>

        <h3>Utilities</h3>

        <h4>Fire Extinguisher</h4>

        <p>As an action, you can expend a use of the extinguisher to create a 15 foot cone of misty air which lasts for 6 seconds, snuffing out any unenhanced fires within range. Additionally, each creature within range must make a DC 14 Constitution saving throw. On a failed save, a creature is blinded until the start of their next turn. On a successful save, a creature becomes immune to this effect. An extinguisher can be used 5 times before it must be replenished at its original cost.</p>

        <h4>Gravity Generator</h4>

        <p>Gravity generators are special devices typically worn on belts that function as a portable, personal artificial gravity source. Activating or deactivating the belt requires a bonus action and, while active, you are able to move as if in a standard gravitational pull. The generator lasts for 10 minutes and can be recharged by a power source or replacing the power cell.</p>

        <h3>Weapon and Armor Accessories</h3>

        <h4>Propulsion Pack</h4>

        <p>Propulsion packs enhance underwater movement. Activating or deactivating the propulsion pack requires a bonus action and, while active, you have a swimming speed of 30 feet. The propulsion pack lasts for 1 minute per power cell (to a maximum of 10 minutes) and can be recharged by a power source or replacing the power cells.</p>

        <h4>Repulsor Pack</h4>

        <p>Repulsor packs are used to slow descent from a high elevation. Activating or deactivating the repulsor pack requires a bonus action and, while active, your rate of descent slow to 60 feet per round, and you ignore the effects of wind of less than moderate speed (no more than 10 mph). The repulsor pack lasts for 1 minute per power cell (to a maximum of 10 minutes) and can be recharged by a power source or replacing the power cells.</p>

        <h4>Shock Gloves</h4>

        <p>A shock glove is a type of armored glove that is coated with a webbed lacing. When used for an attack, this webbing carries a charge that deals 1d4 lightning damage to any objects that the glove come in contact with. If you are engaged in combat with the target of the attack, you must make a grapple check instead of an attack roll, using a Strength (Athletics) check contested by the target's Strength (Athletics) or Dexterity (Acrobatics) check (the target chooses the ability to use).</p>

        <div class="sw5e-book-block"><div class="sw5e-book-block"><h5>Adventuring Gear</h5></div>

        <table class="sw5e-book-table"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Torpedo, fragmentation</td><td>700 cr</td><td>20 lb</td></tr><tr><td>Torpedo, plasma</td><td>725 cr</td><td>20 lb</td></tr><tr><td><em>Explosives</em></td><td></td><td></td></tr><tr><td>Charge, fragmentation</td><td>750 cr</td><td>4 lb</td></tr><tr><td>Charge, plasma</td><td>775 cr</td><td>4 lb</td></tr><tr><td><em>Life Support</em></td><td></td><td></td></tr><tr><td>Emergency raft</td><td>250 cr</td><td>10 lb</td></tr><tr><td>Emergency rations (one day's)</td><td>25 cr</td><td>—</td></tr><tr><td>Emergency shelter</td><td>600 cr</td><td>15 lb</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Storage</em></td><td></td><td></td></tr><tr><td>Bottle</td><td>20 cr</td><td>1 lb</td></tr><tr><td>Bucket</td><td>2 cr</td><td>2 lb</td></tr><tr><td>Flask</td><td>10 cr</td><td>1 lb</td></tr><tr><td>Hovercart</td><td>2,000 cr</td><td>150 lb</td></tr><tr><td>Jug</td><td>5 cr</td><td>3 lb</td></tr><tr><td>Pitcher</td><td>8 cr</td><td>2 lb</td></tr><tr><td>Pot</td><td>15 cr</td><td>10 lb</td></tr><tr><td>Sack</td><td>5 cr</td><td>1/2 lb</td></tr><tr><td>Tankard</td><td>3 cr</td><td>1 lb</td></tr><tr><td>Vial</td><td>10 cr</td><td>1 lb</td></tr><tr><td><em>Utilities</em></td><td></td></tr><tr><td>Fire extinguisher</td><td>170 cr</td><td>6 lb</td></tr><tr><td>Gravity generator</td><td>500 cr</td><td>3 lb</td></tr><tr><td><em>Weapon and Armor Accessories</em></td><td></td><td></td></tr><tr><td>Propulsion pack</td><td>400 cr</td><td>20 lb</td></tr><tr><td>Repulsor pack</td><td>300 cr</td><td>10 lb</td></tr><tr><td>Shock gloves</td><td>500 cr</td><td>1 lb</td></tr></tbody></table></div>
