  - name: Colicoid
    _id: teOQYBLrFCBLJAoX
    text:
      content: |-
        <h2>Colicoid</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Brown, green, or purple</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Orange, purple, red, or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Carnivorous insectoids, four legs, defensive "ball mode"</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'2"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>120 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Colla IV</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Colicoid</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Colicoids are tall insectoids that held multiple appendages. Their bodies are chitinous and include a powerful stinging tail. A colicoid's physiology allows them to curl up into a protective ball and unfurl suddenly which allow them to catch their prey unaware. This rolling method of locomotion is second nature to the colicoids. Their insectoid minds provide them a natural defense against mind tricks. </p>

        <p>Some members are colicoid queens that are different as they are more than twice the size of even the largest warrior breeds. This makes them extremely dangerous and are the only colicoids that possess a unique poisonous stinger. This combined with their strength and size makes them deadly combatants, especially when within their nests. However, a queen tends to only fight when her young are being threatened.</p>

        <h3>Society and Culture</h3>

        <p>Though highly intelligent, colicoids are emotionless and cannibalistic in nature. Their ruthless cunning serves them well on the battlefield as it does on the negotiating table. It is known that long ago that they transferred these ruthless characteristics to their commerce activities. As a result, they are known to be brutally efficient in their business practices. They are noted for being vicious and calculating creatures that are driven by greed whilst showing little regard for others. The colicoids have numerous successful commercial ventures and hold strict business protocols. </p>

        <h3>Names</h3>

        <p>Colicoid names are typically very short and gender neutral, with surnames being based on the queen from which they spawned. </p>

        <p><strong>First Names.</strong> Gal, Het, Kaf, Lyp, Nok, Yin</p>

        <p><strong>Surnames.</strong> Bek, Dor, Set, Tel, Wim, Zal</p>



        <h3>Coilicoid Traits</h3>

        <p>As a colicoid, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Strength or Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Colicoids reach adulthood by 8 and live to be about 65.</p>

        <p><strong><em>Alignment.</em></strong> Colicoid's emotionless nature causes them to tend towards balanced alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Colicoids typically stand 6 to 6 and a half feet tall and generally weigh about 170 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Acute Senses.</em></strong> You have proficiency in the Perception skill. </p>

        <p><strong><em>Cannibalize.</em></strong> If you spend at least 1 minute devouring the corpse of a beast or humanoid, you gain temporary hit points equal to your Constitution modifier (minimum of one). Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <p><strong><em>Closed Mind.</em></strong> Colicoid brains have an unusual composition which gives them a natural defense against the Force. You have advantage on Wisdom and Charisma saving throws against force powers.</p>

        <p><strong><em>Defensive Ball.</em></strong> You are able to curl into a rolling ball for extra protection. When you take the Dash action while you aren't wielding a shield, you gain a bonus to AC equal to half your proficiency bonus until the start of your next turn. </p>

        <p><strong><em>Natural Armor.</em></strong> Due to your carapace and the shape of your body, you are ill-suited to wearing armor. Your carapace provides ample protection, however; it gives you a base AC of 17 (your Dexterity modifier doesn't affect this number). You gain no benefit from wearing armor, but if you are using a shield, you can apply the shield's bonus as normal.</p>

        <p><strong><em>Stinger.</em></strong> Your stinger is a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Colicoid. The Colicoid language uses sounds produced by the antennae and jointed legs of the colicoids, including humming sounds and clicks, which makes it difficult for other species to speak.</p>

        <img src='https://www.gmbinder.com/images/BNQg5Jz.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:245px' />



