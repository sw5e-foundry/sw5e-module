  - name: Baragwin
    _id: 4KCsDoooUM2T28Yq
    text:
      content: |-
        <h2>Baragwin</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Drag green to dark olive</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Yellow or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Hunchback, large heads, strong sense of smell</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>145 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Old Barag</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Baragwinian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>A hunchbacked species of sentient reptilians, the bipedal baragwin are easily recognized across the galaxy. Noted for their thick, wrinkled skin which can resist most physical attacks and their shuffling gait, the large-headed race have no obvious differences between male and female baragwin. An acute sense of smell give the species enough sensitivity to detect another being's mood and feelings. This leads some of them into careers as big-game hunters, or even as bounty hunters. Due to their ponderous movement, many non-baragwin believe the race to be a dull-witted people while, in fact, they are quite intelligent. Despite this fact, the baragwin frequently keep this intelligence hidden, using the misconceptions of others to their own advantage.</p>

        <h3>Society and Culture</h3>

        <p>Baragwin culture, since it does not derive from a single homeworld, is highly dependent on a baragwin's planet of origin, with Tatooinian baragwin behaving quite differently from those from Denuhi-Eight. Baragwin generally have little prejudice, treating all other beings equally regardless of species, culture, or planetary origins; though criminal baragwin will exploit all beings equally instead. Baragwin settlements are generally small and anarchic, with short-term leaders selected by informal democratic processes. Baragwin are famous as skilled weapon-smiths and introduced many different weapons to different worlds. Baragwin-made blasters and vibroblades are among the most powerful personal weapons in the galaxy. </p>

        <h3>Names</h3>

        <p>Baragwin have names with wide tones, spoken using the entire mouth, that don't differentiate by gender. Baragwin use familial surnames.</p>

        <p><strong>First Names.</strong> Dagel, Eskaul, Idalli, Migo</p>

        <p><strong>Surnames.</strong> Fadani, Igara, Kodrue, Wylbas</p>



        <h3>Baragwin Traits</h3>

        <p>As a baragwin, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Baragwin reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Baragwin tend toward no particular alignment. The best and worst are found among them. </p>

        <p><strong><em>Size.</em></strong> Baragwin typically stand 5 to 7 feet tall and generally weigh about 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Arms Dealers.</em></strong> Whenever you make a Charisma (Persuasion) check related to buying or selling weapons, you are considered to have expertise in the Persuasion skill.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. When you aren't wearing armor, your AC is 13 + your Dexterity modifier. </p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve smell.</p>

        <p><strong><em>Natural Empathy.</em></strong> Baragwin's powerful sense of smell allows them to sense the emotions in those around them. You have advantage on Wisdom (Insight) checks to determine emotions against humanoids and beasts within 10 feet of you.</p>

        <p><strong><em>Travelers.</em></strong> You have proficiency in the Survival skill.</p>

        <p><strong><em>Weapon Developers.</em></strong> Baragwin are famous throughout the galaxy for their quality arms manufacturing. You have proficiency with armstech's implements, munitions kits, or two weapons of your choice.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Baragwinian. Baragwinian is a deep language with low rumbling vocalizations. The baragwin themselves, however, are not especially fond of this language. Most of them learn the languages used on whatever planet they were born, so Baragwinian is not very common. Baragwinian is still considered useful as a trade language, however.</p>

        <img src='https://www.gmbinder.com/images/09zb41x.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:270px' />



