  - name: Way of Confluence
    _id: J5MwO63zRzlqURXy
    text:
      content: |+
        <h2>Way of Confluence</h2>

        <p>The Force binds us, creating an intangible bridge connecting all living things. Those consulars who follow the Way of Confluence master this power, manipulating those connections to both sustain and torment.</p>

        <h3>Manipulate Life Force</h3>

        <em><strong>Way of Confluence:</strong> 3rd level</em><br>

        <p>When you reduce a hostile creature to 0 hit points with a force power, or restore hit points to a creature with 0 hit points with a force power, you gain temporary hit points equal to half your consular level + your Wisdom or Charisma modifier (your choice, minimum of one).</p>

        <h3>Empowered Connection</h3>

        <em><strong>Way of Confluence:</strong> 6th level</em><br>

        <p>While you have temporary hit points, you can add half your Wisdom or Charisma modifier (your choice, minimum of one) to any damage or healing you do with force powers that doesn't already include that modifier. </p>

        <h3>Life Eternal</h3>

        <em><strong>Way of Confluence:</strong> 10th level</em><br>

        You can use your powerful connection to the<br> Force to keep fighting when others would fall.<br> When you are reduced to 0 hit<br> points but not killed outright,<br> you can spend 5 force points to<br> drop to 1 hit point instead. 



        <h3>Interconnectedness</h3>

        <em><strong>Way of Confluence:</strong> 14th level</em><br>

        <p>When you cast a 5th level or lower force power that deals damage or restores hit points and targets only one creature, the power can instead target two creatures within range and within 5 feet of each other. </p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the consular table. You regain all expended uses when you finish a long rest.</p>

        <h3>Dynamic Attachment</h3>

        <em><strong>Way of Confluence:</strong> 18th level</em><br>

        <p>While you have temporary hit points, you have resistance against the damage of force powers, and your force powers ignore resistances. </p>

        <img src='https://www.gmbinder.com/images/4ttaft8.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:620px' />

