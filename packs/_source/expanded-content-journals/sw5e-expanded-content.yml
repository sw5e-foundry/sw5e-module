  - name: Ardennian
    _id: FHz6lPkhg6c0cMOt
    text:
      content: |-
        <h2>Ardennian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown or black</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown to gray</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown or black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Four arms, fur-covered, prehensile feet</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>3'2"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>50 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Ardennia</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Adrennian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Ardennians are sentient humanoid simians hailing from the tropical paradise of Ardennia. They are covered in fur from head to their wrists and ankles, with brown and grey being the most common fur colors. Ardennians sport four arms and prehensile feet. All six of their limbs are equally dexterous.</p>

        <h3>Society and Culture</h3>

        <p>The Ardennian people themselves are a friendly communal species that are well known for welcoming visitors and inviting newcomers to traditional feasts and dances on the sandy beaches of Ardennia. Rural Ardiennan's live in modern tree-villages in the thick, dim jungle canopy on the majority of the islands. Ground level accommodations are available for off world visitors even in the smaller villages. Most off-worlders stay in the large modern resort complexes which boast having miles of private beaches or in the modern cities. Several large cities exist, scattered around the world, which typically encompass an entire island or a series of smaller islands joined together.</p>

        <p>Ardennia's distance from the main hyperlanes makes it one of the lesser-known vacation destinations, but it's a popular one for those who don't mind the extra travel time. Some affluent visitors prefer the solitude that Ardennia offers, and occasionally end up purchasing one of the smaller islands to build their own home. Ardennia is notable for having the most beach per square meter in the galaxy. </p>

        <h3>Names</h3>

        <p>Ardennian's names are typically concise and rarely more than two syllables, with a familal surname.</p>

        <p><strong>Male Names.</strong> Rio, Jakar, Hul, Lup, Quil, Jerno</p>

        <p><strong>Female Names.</strong> Rac, Bras, Nuc, Kua, Karta, Sanya</p>

        <p><strong>Surnames.</strong> Betal, Durant, Jabut, Karon, Rambuan</p>



        <h3>Ardennian Traits</h3>

        <p>As an Ardennian, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Ardennians reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Ardennians' peaceful nature causes them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Ardennians typically stand 4 to 4 and a half feet tall and weigh around 60 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Four-Armed.</em></strong> Ardennians have four arms which they can use independently of one another. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required).</p>

        <p><strong><em>Jungle Dweller.</em></strong> Growing up in the tree-villages of Ardennia has left an impact. You don't treat jungle terrain as difficult terrain.</p>

        <p><strong><em>Mask of the Wild.</em></strong> You can attempt to hide even when you are only lightly obscured by foliage, heavy rain, falling snow, mist, and other natural phenomena.</p>

        <p><strong><em>Prehensile Feet.</em></strong> You have supreme control over your feet and can use them to manipulate objects as well as your hands.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Treeclimber.</em></strong> You have a climbing speed of 25 feet. You have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Ardennian. Ardennian has a bubbly, energizing tone to it.</p>

        <img src='https://www.gmbinder.com/images/y7JaqgD.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:308px' />



