  - name: Urchin
    _id: a9R5HvM1oF9wi0JA
    text:
      content: |+
        <h2>Urchin</h2>

        <p>You grew up on the streets alone, orphaned, and poor. You had no one to watch over you or to provide for you, so you learned to provide for yourself. You fought fiercely over food and kept a constant watch out for other desperate souls who might steal from you. You slept on rooftops and in alleyways, exposed to the elements, and endured sickness without the advantage of medicine or a place to recuperate. You've survived despite all odds, and did so through cunning, strength, speed, or some combination of each.</p>

        <p>You begin your adventuring career with enough money to live modestly but securely for at least ten days. How did you come by that money? What allowed you to break free of your desperate circumstances and embark on a better life?</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Sleight of Hand, and Stealth</li><li><strong>Tool Proficiencies:</strong> Disguise kit, security kit</li><li><strong>Equipment:</strong> A small knife, a map of the city you grew up in, a pet mouse, a token to remember your parents by, a set of common clothes, and a belt pouch containing 100 cr</li></ul>

        <h3>Feature: City of Secrets</h3>

        <p>You know the secret patterns and flows to cities and can find passages through the urban sprawl that others would miss. When you are not in combat, you (and companions you lead) can travel between any two locations in the city twice as fast as your speed would normally allow.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Quick-Fingered</td></tr><tr><td>4</td><td>Stealthy</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Alert</td></tr><tr><td>7</td><td>Athlete</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Urchins are shaped by lives of desperate poverty, for good and for ill. They tend to be driven either by a commitment to the people with whom they shared life on the street or by a burning desire to find a better life� and maybe get some payback on all the rich people who treated them badly.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I hide scraps of food and trinkets away in my pockets.</td></tr><tr><td>2</td><td>I ask a lot of questions.</td></tr><tr><td>3</td><td>I like to squeeze into small places where no one else can get to me.</td></tr><tr><td>4</td><td>I sleep with my back to a wall or tree, with everything I own wrapped in a bundle in my arms.</td></tr><tr><td>5</td><td>I eat like a pig and have bad manners.</td></tr><tr><td>6</td><td>I think anyone who's nice to me is hiding Dark intent.</td></tr><tr><td>7</td><td>I don't like to bathe.</td></tr><tr><td>8</td><td>I bluntly say what other people are hinting at or hiding.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Respect.</strong> All people, rich or poor, deserve respect. (Light)</td></tr><tr><td>2</td><td><strong>Community.</strong> We have to take care of each other, because no one else is going to do it. (Lawful)</td></tr><tr><td>3</td><td><strong>Change.</strong> The low are lifted up, and the high and mighty are brought down. Change is the nature of things. (Chaotic)</td></tr><tr><td>4</td><td><strong>Retribution.</strong> The rich need to be shown what life and death are like in the gutters. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I help the people who help me�that's what keeps us alive. (Neutral)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I'm going to prove that I'm worthy of a better life. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My town or city is my home, and I'll fight to defend it.</td></tr><tr><td>2</td><td>I sponsor an orphanage to keep others from enduring what I was forced to endure.</td></tr><tr><td>3</td><td>I owe my survival to another urchin who taught me to live on the streets.</td></tr><tr><td>4</td><td>I owe a debt I can never repay to the person who took pity on me.</td></tr><tr><td>5</td><td>I escaped my life of poverty by robbing an important person, and I'm wanted for it.</td></tr><tr><td>6</td><td>No one else should have to endure the hardships I've been through.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>If I'm outnumbered, I will run away from a fight.</td></tr><tr><td>2</td><td>Gold seems like a lot of money to me, and I'll do just about anything for more of it.</td></tr><tr><td>3</td><td>I will never fully trust anyone other than myself.</td></tr><tr><td>4</td><td>I'd rather kill someone in their sleep then fight fair.</td></tr><tr><td>5</td><td>It's not stealing if I need it more than someone else.</td></tr><tr><td>6</td><td>People who can't take care of themselves get what they deserve.</td></tr></tbody></table>

