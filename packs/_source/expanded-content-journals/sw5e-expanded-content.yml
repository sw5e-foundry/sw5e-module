  - name: Way of Telekinetics
    _id: EZiI0LSQXbyimY6C
    text:
      content: |+
        <h2>Way of Telekinetics</h2>

        <p>The consular knows how to manipulate the essence of the surrounding elements with the power of the Force. Those consulars who follow the Way of Telekinetics create torrential gusts of telekinetic energy, forming a potent combination that can pummel even the toughest adversaries into submission.</p>

        <h3>Staggering Stratagem</h3>

        <em><strong>Way of Telekinetics:</strong> 3rd level</em><br>

        <p>Your potency with the telekinetic power of the Force heightens. You can manipulate creatures of Large size or smaller with your force powers and Way of Telekinetics features. Additionally, once per turn, when you deal force or kinetic damage to a Large or smaller creature with a force power or class feature, you can choose to either push it up to 10 feet away from you or pull it up to 10 feet closer to you.</p>

        <h3>Mighty Blast</h3>

        <em><strong>Way of Telekinetics:</strong> 6th, 11th, and 17th level</em><br>

        <p>Your force powers batter and blast your enemies with the strength of a hurricane. When you cast a force power of 1st level or higher that deals force or kinetic damage, one creature of your choice damaged by that power must make a Strength saving throw against your universal force save DC or be knocked prone. </p>

        This feature can affect additional creatures when you reach higher levels: two creatures at 11th<br> level and three creatures at 17th level.

        <h3>Size Matters Not</h3>

        <em><strong>Way of Telekinetics:</strong> 10th level</em><br>

        You can manipulate creatures of Huge size or<br> smaller with your force powers and Way of<br> Telekinetics features.



        <p>&emsp;Additionally, when you use your action to cast a force power, you can use a bonus action to fly up to 10 feet without provoking opportunity attacks.</p>

        <h3>Repulsing Wave</h3>

        <em><strong>Way of Telekinetics:</strong> 14th level</em><br>

        <p>When you are dealt damage by a creature within 5 feet of you, you can use your reaction to deal force damage to the creature equal to your consular level + your Wisdom or Charisma modifier (your choice, minimum of +1). If the attacker is Huge or smaller, it must also make a Strength saving throw against your universal force save DC. On a failed save, the attacker is pushed in a straight line up to 20 feet away from you.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the consular table. You regain all expended uses when you finish a short or long rest.</p>

        <h3>My Ally is the Force</h3>

        <em><strong>Way of Telekinetics:</strong> 18th level</em><br>

        <p>You can manipulate creatures of Gargantuan size or smaller with your force powers and Way of Telekinetics features.</p>

        <p>Additionally, whenever a force power you cast pushes or pulls a creature, you can increase the distance of that push or pull by an additional 20 feet.</p>

        <img src='https://www.gmbinder.com/images/sFrtG1P.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:942px' />

