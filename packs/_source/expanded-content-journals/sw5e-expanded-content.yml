  - name: Agile Defense
    _id: IV41Nxj07TiKr9i3
    text:
      content: |-
        <h4>Agile Defense</h4>

        <p><em>1st-level universal power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>As part of the action of casting this power, you take the Dodge action.</p>
