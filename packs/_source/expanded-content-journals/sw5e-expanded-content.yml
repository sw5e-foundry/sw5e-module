  - name: Draethos
    _id: WKHrjXbsQdmLnbk6
    text:
      content: |-
        <h2>Draethos</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Grey, pink, blue, purple, black</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, brown, red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Four fingers, large teeth, telepathy, long life spans</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'5"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>130 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Draethos</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Draethos</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Draethos possess large teeth, which grow outside of their mouths. Coupled with their lack of lips, this leads to the appearance of an overbite. Their scaly skin ranged in color from blue to purple to black. Their hands retain an interstitial web between the fingers. Their fingers end in narrow tips which resemble claws. They possess low-light vision, springing from their cave-dwelling ancestors.</p>

        <p>Draethos possess a limited telepathy, granting the ability to communicate with any sentient being. The ability is limited to communication; a Draethos can not invade the thoughts of others.</p>

        <h3>Society and Culture</h3>

        <p>Partly due to their long lives, Draethos society was slow to evolve and relies heavily on tradition. The Draethos' culture is warrior-based, and those living on the homeworld are expected to demonstrate their martial or hunting prowess. Life on Draethos is harsh, with arrogant aristocrats squabbling among one another for social standing and wealth. Warriors are perpetually in high demand as gladiators, mercenaries, hunters, and soldiers. Those who make a conscious decision to abandon the way of the warrior are exiled to seek a new life among aliens. Consequently, despite their reputation as fierce combatants, most Draethos encountered offworld are peaceful and intellectual.</p>

        <h3>Names</h3>

        <p>Due to their lack of lips, Draethos names typically lack hard consonants. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Odan, Gyeto, Hurl, Jan, Talon</p>

        <p><strong>Female Names.</strong> Gillen, Teria, Kat'h, Yul, Aswe</p>

        <p><strong>Surnames.</strong> Urr, Slyter, Qelu'tlapa, Ayahu, Jek</p>



        <h3>Draethos Traits</h3>

        <p>As a draethos, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Draethos reach adulthood around their late teens and live up to 800 years. </p>

        <p><strong><em>Alignment.</em></strong> Draethos tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Draethos typically stand between 6 and 7 feet tall and weigh around 190 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Telepathy.</em></strong> You can communicate telepathically with creatures within 30 feet of you. You must share a language with the target in order to communicate in this way.</p>

        <p><strong><em>Way of the Warrior.</em></strong> You have proficiency with light and medium armor as well as vibroblades and vibroswords.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Draethos. Draethos is characterized by its flurry of cacophonous sighs and clicks.</p>

        <img src='https://www.gmbinder.com/images/UL6Kig1.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:290px' />



