  - name: Vonil/Ishu Form (Companion)
    _id: WftYcanHPNvkhVUv
    text:
      content: |+
        <h2>Vonil/Ishu Form (Companion)</h2>

        <p></div></p>

        <p>Vonil/Ishu Form, also known as Unity Form, focuses on fighting in tandem with a partner as a warpair. Those guardians who focus on Vonil/Ishu Form utilize teamwork to move swiftly, strike quickly, and protect each other. </p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Vonil/Ishu Form:</strong> 3rd level</em><br>

        <p>You gain proficiency in your choice of Intimidation or Persuasion.</p>

        <h3>Form Basics</h3>

        <em><strong>Vonil/Ishu Form:</strong> 3rd level</em><br>

        <p>You gain your choice of the Vonil or Ishu lightsaber form, detailed in the Lightsaber Forms section of the Customization Options document for Expanded Content. If you already know the chosen form, you can instead choose another lightsaber form.</p>

        <h3>Humanoid Companion</h3>

        <em><strong>Vonil/Ishu Form:</strong> 3rd, 11th, and 17th level</em><br>

        <p>You've adopted a partner, gaining the services of your own humanoid companion.</p>

        <p>Create your humanoid companion as detailed in the Companions section of the Customization Options document for Expanded Content. </p>

        <p>In addition to its traits and features, your companion gains additional benefits while it is bonded to you:</p>

        <ul><li>Your companion gains two additional traits. It gains one more additional trait when you reach 11th level in this class. For each trait in excess of your proficiency bonus, your force point maximum is reduced by 2.</li></ul>

        <p>Lastly, while bonded and within 10 feet of you, when you or your companion are dealt damage by an external effect, you can choose to have you or your companion gain resistance to that damage. If you do so, the other of the two takes the same damage as true damage.</p>

        <p>At 11th level, your companion must be within 30 feet of you to benefit from this feature. At 17th level, your companion must be within 60 feet.</p>

        <h3>The Way of the Hydra</h3>

        <em><strong>Vonil/Ishu Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter a synchronized stance with your companion for 1 minute, as long as your companion is within 10 feet of you. While in this stance, once per turn, when you hit a creature with an attack, your companion has advantage on the next attack it makes against the same target before the end of your next turn. Additionally, once per turn, when your companion hits a creature with an attack, you have advantage on the next attack you make against the same target before the end of your next turn.</p>

        <p>&emsp;This effect ends early if either you or your companion are incapacitated or die, or if your companion is ever more than 10 feet away from you. Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <p>At 11th level, your companion must be within 30 feet of you to benefit from this feature. At 17th level, your companion must be within 60 feet.</p>

        <img src='https://cdn.discordapp.com/attachments/555380018310676492/784117609570238514/knightofzakuul2.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:280px' />



        <h3>Channel the Force</h3>

        <em><strong>Vonil/Ishu Form:</strong> 7th, 11th, and 17th level</em><br>

        <p>You gain one of the following Channel the Force options. Choose Smite for Vonil or Shield for Ishu.</p>

        <h4>Smite</h4>

        <p>Once per turn, when your companion is within 10 feet of you and it hits a creature with a melee weapon attack, you can expend a use of your Channel the Force and expend force points to have your companion deal additional damage to the target, which is the same type as the weapon's damage. The additional damage is 1d8 for each point spent in this way. You can't deal more additional damage than the amount shown in the Focused Strikes column of the guardian table.</p>



        <p>&emsp;At 11th level, your companion must be within 30 feet of you to benefit from this feature. At 17th level, your companion must be within 60 feet.</p>

        <h4>Shield</h4>

        <p>When your companion is hit by a weapon attack while within 10 feet of you, you can use your reaction and expend a use of your Channel the Force to attempt to divert the attack. When you do so, the damage your companion takes from the attack is reduced by 1d10 + your Wisdom or Charisma modifier (your choice) + your guardian level.</p>

        <p>At 11th level, your companion must be within 30 feet of you to benefit from this feature. At 17th level, your companion must be within 60 feet.</p>

        <h3>Teamwork</h3>

        <em><strong>Vonil/Ishu Form:</strong> 15th level</em><br>

        <p>You gain one of the following features. Choose Takedown for Vonil or Rebuttal for Ishu.</p>

        <h4>Takedown</h4>

        <p>When your companion takes the Help action and helps you, you have advantage on the next two ability checks or attack rolls you make before the start of your next turn, instead of only one. When you take the Help action and help your companion, your companion has advantage on the next two ability checks or attack rolls it makes before the start of its next turn, instead of only one.</p>

        <h4>Rebuttal</h4>

        <p>When your companion takes the Help action and helps you, you gain temporary hit points equal to your guardian level that last until the start of your next turn. When you take the Help action and help your companion, it gains temporary hit points equal to your guardian level that last until the start of its next turn. </p>

        <h3>Master of Unity</h3>

        <em><strong>Vonil/Ishu Form:</strong> 20th level</em><br>

        <p>You and your companion are a paragon of harmony. Your Strength or Dexterity (your choice) and Constitution scores increase by 2. Your maximum for those scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute, as long as your companion is within 60 feet of you:</p>

        <ul><li>You and your companion have resistance to kinetic and energy damage.</li><li>Neither you nor your companion can have disadvantage on attack rolls.</li><li>Both you and your companion's critical hit ranges increase by 1.</li></ul>

        <p>This effect ends early if either you or your companion are incapacitated or die, or if your companion is ever more than 60 feet away from you. Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <img src='https://media.discordapp.net/attachments/555380018310676492/784433700690591744/knightofzakuul3.png?width=349&height=678' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:460px' />

