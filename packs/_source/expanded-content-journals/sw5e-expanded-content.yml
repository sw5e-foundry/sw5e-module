  - name: Yevetha
    _id: 9lwhpbMr3EQhQNVZ
    text:
      content: |-
        <h2>Yevetha</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Retractable dewclaws, six fingers</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'2"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>105 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>N'zoth</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Yevethan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Physically, the Yevetha are tall beings with a ghoulish appearance that is bereft of any body hair, being described as being so gaunt as to seem skeletal due to their pallid gray skin and lithe builds. The species possesses six fingered hands that have retractable dewclaws. Each one is located on the inside of the wrist above their six-fingered hands. Their dewclaws shoot from a sheath of a skin beneath their cadaverous hands and are capable of being retracted. When extended fully, the wrist blades reach about a foot in length, and are used in close combat and blood sacrifices. The Yevetha also possess a greater tolerance for g-forces when compared to Human pilots.</p>

        <h3>Society and Culture</h3>

        <p>Within their society, blood is an important aspect of their culture and is a central focus of their religious belief system. This has resulted in them becoming a particularly violent species. For the Yevetha, death is not to be feared. They are described as being dutiful, attentive, cautious but also fatalistic in their view of the universe. When fighting against other foes, Yevetha are notable for being ruthless fighters who never surrender even in the face of certain defeat. Due to the brutal nature of their society, the Yevetha do not possess a single jail, penitentiary or stockade as they believe there is no need for such facilities. In fact, they do not possess a word in their language for either convict or incarcerate.</p>

        <h3>Names</h3>

        <p>Yevetha names are sharp and are kept to one syllable, not varying significantly based on gender. Surnames are familial.</p>

        <p><strong>First Names.</strong> Ral, Var, Cax, Tav, Fol, Sip, Nov</p>

        <p><strong>Surnames.</strong> Faalk, Naalar, Giinn, Ralle, Xoota</p>

        <br>

        <h3>Yevetha Traits</h3>

        <p>As a yevetha, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Strength score<br> increases by 2, and your Intelligence score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Yevetha reach adulthood in their early teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Yevetha's xenophobic attitude causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Yevetha typically stand between 6 and 6 and a half feet tall and generally weigh about 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Aggressive.</em></strong> As a bonus action, you can move up to your speed toward an enemy of your choice that you can see or hear. You must end this move closer to the enemy than you started.</p>

        <p><strong><em>Arm Blades.</em></strong> Your retractable dewclaws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Toughness.</em></strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level. </p>

        <p><strong><em>Mechanical Memory.</em></strong> Whenever you make an Intelligence (Technology) check related to memorizing or duplicating mechanical readouts, you are considered to have expertise in the Technology skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Yevethan. Yevetha are able to speak other languages, but their isolationist nature makes them tend to reject the languages of other species. Only rarely would a Yevethan speak Galactic Basic, as this would often decrease their social standing. </p>

        <img src='https://www.gmbinder.com/images/LJoo422.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:306px' />



