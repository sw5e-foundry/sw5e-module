  - name: Aing-Tii Order
    _id: Fa0PWGlLWzwbnbdY
    text:
      content: |+
        <h2>Aing-Tii Order</h2>

        <p>Monks of the Aing-Tii Order blend an attunement to the Force with their supreme focus to become a blur of motion in the heat of battle.</p>

        <h3>Forcecasting</h3>

        <em><strong>Aing-Tii Order:</strong> 3rd level</em><br>

        <p>You have learned powers, fragments of knowledge that imbue you with an abiding force ability. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 4 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the Aing-Tii Order Forcecasting table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your monk level, as shown in the Force Points column of the Aing-Tii Order Forcecasting table, + your Wisdom or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Aing-Tii Order Forcecasting table.</p>

        <p>You may only cast force powers at 4th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Forcecasting Ability</h4>

        <p>Your forcecasting ability varies based on the alignment of the powers you cast. You use your Wisdom for light side powers, Charisma for dark side powers, and Wisdom or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>

        <h3>Flow-Walking</h3>

        <em><strong>Aing-Tii Order:</strong> 6th, 9th, 13th, and 17th level</em><br>

        <p>You can cast the <em>phasestrike</em> force power without expending force points. When you reach 11th level, the damage bonus of the special attack made during <em>phasestrike</em> increases to 2d8, and at 17th level it increases to 3d8.</p>



        <div class="sw5e-book-block"><h5>Aing-Tii Order Forcecasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Force Powers<br> Known</th><th>Force<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>4</td><td>3</td><td>1st</td></tr><tr><td>4th</td><td>6</td><td>4</td><td>1st</td></tr><tr><td>5th</td><td>7</td><td>5</td><td>1st</td></tr><tr><td>6th</td><td>8</td><td>6</td><td>1st</td></tr><tr><td>7th</td><td>10</td><td>7</td><td>2nd</td></tr><tr><td>8th</td><td>11</td><td>8</td><td>2nd</td></tr><tr><td>9th</td><td>12</td><td>9</td><td>2nd</td></tr><tr><td>10th</td><td>13</td><td>10</td><td>2nd</td></tr><tr><td>11th</td><td>14</td><td>11</td><td>2nd</td></tr><tr><td>12th</td><td>15</td><td>12</td><td>2nd</td></tr><tr><td>13th</td><td>17</td><td>13</td><td>3rd</td></tr><tr><td>14th</td><td>18</td><td>14</td><td>3rd</td></tr><tr><td>15th</td><td>19</td><td>15</td><td>3rd</td></tr><tr><td>16th</td><td>20</td><td>16</td><td>3rd</td></tr><tr><td>17th</td><td>22</td><td>17</td><td>4th</td></tr><tr><td>18th</td><td>23</td><td>18</td><td>4th</td></tr><tr><td>19th</td><td>24</td><td>19</td><td>4th</td></tr><tr><td>20th</td><td>25</td><td>20</td><td>4th</td></tr></tbody></table></div>

        <p>&emsp;Additionally, when you use your action to cast an at-will force power, you can use your Martial Arts or Focus features.</p>

        <p>You can use these features a combined three times. You gain an additional use at 9th, 13th, and 17th level. You regain any expended uses when you finish a long rest.</p>

        <h3>Prismatic Step</h3>

        <em><strong>Aing-Tii Order:</strong> 11th level</em><br>

        <p>When you take the Attack action, you can teleport up to 10 feet before each attack to an unoccupied space you can see.</p>

        <p>If you attack at least two different creatures with the action, you can make one additional attack against a third creature (no action required).</p>

        <h3>Iridescent Strikes</h3>

        <em><strong>Aing-Tii Order:</strong> 17th level</em><br>

        <p>When you use your action to cast a force power, you can spend 2 focus points to teleport to a space within 5 feet of a creature affected by the power and make two unarmed strikes against that creature as a bonus action.</p>

