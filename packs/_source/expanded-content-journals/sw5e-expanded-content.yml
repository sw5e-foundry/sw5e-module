  - name: Courtier
    _id: QwnueDgAQg0ncfcZ
    text:
      content: |+
        <h2>Courtier</h2>

        <p>In your earlier days, you were a personage of some significance in a noble court or a bureaucratic organization. You might or might not come from an upper-class family; your talents, rather than the circumstances of your birth, could have secured you this position.</p>

        <p>You might have been one of the many functionaries, attendants, and other hangers-on in Coruscant's upper echelons, or perhaps you traveled in Nar Shaddaa's baroque and sometimes cutthroat conglomeration of factions, nobles, adventurers, and secret societies. You might have been one of the behind-the-scenes law-keepers or functionaries on Dromund Kaas, or you might have grown up on some other affluent planet.</p>

        <p>Even if you are no longer a full-fledged member of the group that gave you your start in life, your relationships with your former fellows can be an advantage for you and your adventuring comrades. You might undertake missions with your new companions that further the interest of the organization that gave you your start in life. In any event, the abilities that you honed while serving as a courtier will stand you in good stead as an adventurer.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Performance, and Survival</li><li><strong>Languages:</strong> Two of your choice</li><li><strong>Equipment:</strong> A set of fine clothes and a pouch containing 150 cr</li></ul>

        <h3>Feature: Court Functionality</h3>

        <p>Your knowledge of how bureaucracies function lets you gain access to the records and inner workings of any noble court or government you encounter. You know who the movers and shakers are, whom to go to for the favors you seek, and what the current intrigues of interest in the group are.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Performer</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Actor</td></tr><tr><td>7</td><td>Practiced</td></tr><tr><td>8</td><td>Force of Personality</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>The noble court or bureaucratic organization where you got your start is directly or indirectly associated with your bond (which could pertain to certain individuals in the group, such as your sponsor or mentor). Your ideal might be concerned with the prevailing philosophy of your court or organization.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I believe that anything worth doing is worth doing right. I can't help it� I'm a perfectionist.</td></tr><tr><td>2</td><td>I'm a snob who looks down on those who can't appreciate fine art.</td></tr><tr><td>3</td><td>I always want to know how things work and what makes people tick.</td></tr><tr><td>4</td><td>I'm full of witty aphorisms and have a proverb for every occasion.</td></tr><tr><td>5</td><td>I'm rude to people who lack my commitment to hard work and fair play.</td></tr><tr><td>6</td><td>I like to talk at length about my profession.</td></tr><tr><td>7</td><td>I don't part with my money easily and will haggle tirelessly to get the best deal possible.</td></tr><tr><td>8</td><td>I'm well known for my work, so I'm always taken aback when people haven't heard of me.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Community.</strong> It is the duty of all civilized people to strengthen the bonds of community and the security of civilization. (Lawful)</td></tr><tr><td>2</td><td><strong>Generosity.</strong> My talents were given to me so that I could use them to benefit the world. (Light)</td></tr><tr><td>3</td><td><strong>Freedom.</strong> Everyone should be free to pursue his or her own livelihood. (Chaotic)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I'm only in it for the money. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I'm committed to the people I care about, not to ideals. (Neutral)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I work hard to be the best there is at my craft. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>The location where I learned my trade is the most important place in the world to me.</td></tr><tr><td>2</td><td>I created a great work for someone unworthy to receive it. I'm still looking for someone worthy.</td></tr><tr><td>3</td><td>I owe someone a great debt for forging me into the person I am today.</td></tr><tr><td>4</td><td>I pursue wealth to secure someone's love.</td></tr><tr><td>5</td><td>One day I will return to my faction and prove that I am the greatest artisan of them all.</td></tr><tr><td>6</td><td>I will get revenge on the Dark forces that destroyed my place of business and ruined my livelihood.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I'll do anything to get my hands on something rare or priceless.</td></tr><tr><td>2</td><td>I'm quick to assume that someone is trying to cheat me.</td></tr><tr><td>3</td><td>No one must ever learn that I once stole money from faction coffers.</td></tr><tr><td>4</td><td>I'm never satisfied with what I have� I always want more.</td></tr><tr><td>5</td><td>I would kill to acquire a noble title.</td></tr><tr><td>6</td><td>I'm horribly jealous of anyone who can outshine my handiwork. Everywhere I go, I'm surrounded by rivals.</td></tr></tbody></table>

