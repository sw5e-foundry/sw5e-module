  - name: Companions
    _id: CPzQ7wcrph0b1fFe
    text:
      content: |+
        <h2>Companions</h2>

        <p>A companion is a creature who accompanies you on your adventures. It might take the form of a fearsome beast, a padawan learner, a droid sidekick, or a mischievous spirit. Some companions are an integral part of an archetype, while others are simple NPCs that characters encounter and adopt during their adventures.</p>

        <h4>Companions In Your Game</h4>

        <blockquote><p>Companions are not for the faint of heart. They add a significant power boost to a party, and can really bog down your game if their player's are not prepared. You might choose to allow your players to use the companion archetypes, but not the feats, vice versa, both options, or none. It's up to you.</p>

        <p><strong><em>Starting Equipment.</em></strong> Companions generally don't start with any equipment, so it's up to the player to gear their companion. For the sake of modesty, humanoid companion should probably start with a set of basic clothing, as appropriate.</p>

        <p><strong><em>Downtime Activities.</em></strong> Companions should not be able to perform downtime activities separately from their player's character. However, companions should be able to help others perform their downtime activities. Additionally, a player can choose to have their companion perform a downtime activity, though their character must spend their downtime helping the companion.</p>

        <p><strong><em>Encounter Building and Experience Allocation.</em></strong> A companion's level matches that of their owner, so they do not need to gain experience. However, you should consider treating a companion as half a character when building encounters and distributing experience. For instance, if your party is three characters and one companion, you should generate encounters and divide experience gained 3.5 ways, instead of simply three ways.</p>

        <p><strong><em>Enhanced Items.</em></strong> Companions should not count towards party size when allocating enhanced items. Additionally, while companion classes share names with their player character class counterparts, companions can not attune to items that require that class.</p>

        <p><strong><em>Starships and Deployments.</em></strong> Companions can not deploy as pilots, though they can fill other deployments as normal. Additionally, companions can gain deployment ranks, though they accrue prestige at half the rate of player characters, and they can not exceed 4 ranks in a deployment.</p></blockquote>

        <h3>Gaining a Companion</h3>

        <p>Certain archetypes, such as the Astrotech Engineer, Saboteur Operative, or Zoologist Scholar, have their companions as the focus of their archetype's features. Alternatively, a companion can be gained through taking the Companion Keeper feat, detailed later in this chapter.</p>

        <p>Regardless of how a companion is obtained, each player may have no more than one companion at a given time.</p>



        <h3>Generating Your Companion</h3>

        <p>First, you should determine your companion's nature and appearance, as determined by your archetype feature or chosen from the list of companion natures if you take the Companion Keeper feat. Second, allocate your companion's ability scores, as determined by its nature. Finally, you should generate your companion from 1st level using the follower class, and increase its level one level at a time, until its level equals your own. Be sure to update your companion's hit points, ability scores, proficiency bonus, and any features it gains as it levels.</p>

        <h4>Companion Nature</h4>

        <p>Your companion's nature, discussed later in this chapter, is determined by your archetype feature or companion feat. Your companion's nature determines its type, its hit points and Hit Dice, its proficiencies and other features, and its companion traits. At 1st level, your companion starts with two traits. It gains additional traits when it reaches higher levels, as shown in the follower table.</p>

        <h4>Class and Features</h4>

        <p>Your companion gains features when it reaches certain levels, as shown in the follower table.</p>

        <h4>Leveling Your Companion</h4>

        <p>Your companion's level equals your own, and each time you gain a level, so does your companion. </p>

        <h4>Proficiency Bonus</h4>

        <p>Your companion's proficiency bonus is equal to that of a player character of the same level, as shown in the follower table.</p>

        <h4>Starting Equipment</h4>

        <blockquote><p>Generally speaking, companions are not intended to start with any equipment; it is up to you to outfit them as you deem appropriate. Humanoid companions should probably at least have clothing, however.</p></blockquote>

        <h3>Companions in Combat</h3>

        <p>In combat, companions generally behave as a player character would, with the following differences.</p>

        <h4>Actions in Combat</h4>

        <p>Unless you use your bonus action to direct your companion, your companion can only use its action to Dash, Dodge, Disengage, Guard, or Hide.</p>

        <h4>Companion Initiative</h4>

        <p>Both you and your companion roll initiative, but you act together on the lesser of the two results. You act on one turn, and you can each move or take actions in any order.</p>

