    _id: 7J59wWhdJuaR3Lyr
    text:
      content: |-
        <h4>Wild Senses</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Companion</em><br>

        <p>Whenever you make a Wisdom (Perception) or a Wisdom (Survival) check, you can request the aid of your companion by expending a superiority die, adding the number rolled to the check. You can use this maneuver before or after making the ability check, but before the results of the ability check are determined.</p>
