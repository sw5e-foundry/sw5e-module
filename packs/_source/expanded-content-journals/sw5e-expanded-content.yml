  - name: Mirialan
    _id: C950sUqOd82JRrjd
    text:
      content: |-
        <h2>Mirialan</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Green, olive, or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, blonde, brown, or red</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue, green, violet, grey, red, yellow, or orange</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Facial tattoos, flexible and agile</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'6"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Mirial</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Mirialan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Mirialans are a near-human species native to the planet Mirial. They have green to yellow skin and tattoos on their faces. The Mirialans are known for their spirituality and strong connection with the world around them. Mirialans are very flexible and agile, making them fast and formidable foes.</p>

        <h3>Society and Culture</h3>

        The Mirialan people are deeply religious and practice a primitive understanding of the Force. They believe<br> each individual's actions contribute to their destiny,<br> building upon past successes and failures to drive<br> them towards their fates. Within their belief system<br> was the view that individual actions ripple through the<br> Force, also affecting the destiny of the species as a<br> whole.

        <p>A Mirialan often places a unique, geometrically repeated tattoo on their face and hands to signify that they have completed a certain test or task, or achieved sufficient aptitude for a certain skill. The number of tattoos often acts as a good indicator of how mature and/or skilled a Mirialan was. Because the more markings brings about a form of status, Mirialan society is stratified and allows the heavily marked citizens to access greater opportunities. Despite its importance, most Mirialans do not know the entirety of the tattoo lexicon due to its complexity. The interaction between placement and positioning of the shapes is incredibly subtle and changes their meaning greatly.</p>

        <h3>Names</h3>

        <p>Mirialan names are typically concise and rarely more than two syllables. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Boca, Floha, Jemy, Puv, Choqa</p>

        <p><strong>Female Names.</strong> Buf, Ches, Kebe, Ovof, Shaqa</p>

        <p><strong>Surnames.</strong> Acave, Ishakee, Kefvi, Uflozi, Zoria</p>



        <h3>Mirialan Traits</h3>

        <p>As a mirialan, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Mirialan reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Mirialans spiritual tendencies cause them to tend towards the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Mirialan typically stand 5 to 6 feet tall and weight 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 35 feet.</p>

        <p><strong><em>Spiritual.</em></strong> You have proficiency in Lore. Additionally, you are considered to have expertise in Intelligence (Lore) checks made to learn or recall something about a culture's religion.</p>

        <p><strong><em>Surprise Attack.</em></strong> If you surprise a creature and hit it with an attack on your first turn in combat, the attack deals an extra 2d6 damage to it. You can use this trait only once per combat.</p>

        <p><strong><em>Unarmed Combatant.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Mirialan.</p>

        <img src='https://www.gmbinder.com/images/HsbcT51.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:238px' />



