  - name: Calling A Shot
    _id: Bkh3yPlQRiNLsuTf
    text:
      content: |-
        <h3>Calling A Shot</h3>

        <p>In order to make a called shot, you must first be making an attack roll with advantage. If you want to turn that attack into a called shot, you can choose to do so by forgoing that advantage. If you do so, and the attack hits, the hit becomes a called shot.</p>
