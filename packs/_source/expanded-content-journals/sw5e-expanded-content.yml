        <h4>Restraining Bolt (Fine)</h4>

        <em><strong>Adventuring gear</strong>, <font style="color:green"><strong>premium</strong></font></em><br>

        <p>Restraining bolts are small, cylindrical devices that can be affixed to a droid in order to limit its functions and enforce its obedience. When inserted, a restraining bolt restricts the droid from any movement its master does not desire, and also forced it to respond to signals produced by a hand-held control unit.</p>

        <p>Installing a restraining bolt takes 1 minute. The droid must make a DC 16 Constitution saving throw. A hostile droid makes this save with advantage. On a successful save, the restraining bolt overloads and is rendered useless. On a failed save, the restraining bolt is correctly installed, and the control unit can be used to actively control the droid. While the control unit is inactive, the droid can act freely but it can not attempt to remove the restraining bolt.</p>

