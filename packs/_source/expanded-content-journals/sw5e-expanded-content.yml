  - name: Anzellan
    _id: S5KHlA9V19rkL9mM
    text:
      content: |-
        <h2>Anzellan</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Brown, green, or tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, gray, or white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Diminutive size, wispy eyebrows</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>1'0"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>3 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Anzella</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Anzellan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The anzellans are a diminutive species hailing from the secluded planet Anzella. Their eyes have floating corneal micro-lenses that allow them to see microscopic details. Anzellans are a bubbly and receptive people. They are a jovial and trusting people that tend to welcome strangers with open arms.</p>

        <p>Due to their volcanic homeworld, anzellans are also adapted towards heat. This, coupled with their small size, make them well-suited to working in compact places.</p>

        <h3>Society and Culture</h3>

        <p>Anzella is a tropical planet covered in thousands of small volcanic islands. Many of these islands are developed as small villages, with the largest islands designed to accommodate larger species. Anzellan culture is generally based around tourism and crafting; in fact, anzellans are renowned craftsmen due to their discerning eyesight and ability to fit into small spaces.</p>

        <p>Anzellan government is generally casual. Each village has its own governing council of rotating members; these villages act independently from one another unless their decisions would affect more than a single island. In that case, all of the councils work together to come to a planet-wide decision. </p>

        <h3>Names</h3>

        <p>Anzellan names are rarely longer than two syllables, with a bouncy intonation to them. Their surnames are familial.</p>

        <p><strong>Male Names.</strong> Babu, Gridel, Moru, Rano, Yodel</p>

        <p><strong>Female Names.</strong> Dibi, Fing, Nooni, Teena, Zazi</p>

        <p><strong>Surnames.</strong> E'ayoo, Frik, Meer, Tanni, Vrut</p>



        <h3>Anzellan Traits</h3>

        <p>As an anzellan, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and two other ability scores of your choice increase by 1.</p>

        <p><strong><em>Age.</em></strong> Anzellans are considered adults at ten years old. They are a short-lived species, however, that rarely lives longer than 60 years.</p>

        <p><strong><em>Alignment.</em></strong> Anzellans are a friendly and respectful people, which causes them to tend toward lawful light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Anzellans stand between 1 and 2 feet tall and weigh around 10 lbs. Regardless of your position in that range, your size is Tiny.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 20 feet.</p>

        <p><strong><em>Crafters.</em></strong> You have proficiency in one tool of your choice.</p>

        <p><strong><em>Detail Oriented.</em></strong> You are practiced at scouring for details. You have advantage on Intelligence (Investigation) checks that rely on sight within 5 feet.</p>

        <p><strong><em>Pintsized.</em></strong> Your tiny stature makes it hard for you to wield bigger weapons. You can't use medium or heavy shields. Additionally, you can't wield weapons with the two-handed or versatile property, and you can only wield one-handed weapons in two hands unless they have the light property.</p>

        <p><strong><em>Puny.</em></strong> Anzellans are too small to pack much of a punch. You have disadvantage on Strength saving throws, and when determining your bonus to attack and damage rolls for weapon attacks using Strength, you can't add more than +3.</p>

        <p><strong><em>Small and Nimble.</em></strong> You are too small and fast to effectively target. You have a +1 bonus to AC, and you have advantage on Dexterity saving throws.</p>

        <p><strong><em>Tanned.</em></strong> You are naturally adapted to hot climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Technician.</em></strong> You are proficient in the Technology skill.</p>

        <p><strong><em>Tinker.</em></strong> You have proficiency with tinker's implements. You can use these and spend 1 hour and 100 cr worth of materials to construct a Tiny Device (AC 5, 1 hp). You can take the Use an Object action to have your device cause one of the following effects: create a small explosion, create a repeating loud noise for 1 minute, create smoke for 1 minute, create a soothing melody for 1 minute. You can maintain a number of these devices up to your proficiency bonus at once, and a device stops functioning after 24 hours away from you. You can dismantle the device to reclaim the materials used to create it.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Anzellan. Anzellan is characterized by its bouncy sound and emphasis on alternating syllables.</p>

        <img src='https://www.gmbinder.com/images/Hhu2Jeu.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:156px' />



