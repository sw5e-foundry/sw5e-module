  - name: Spending Destiny Points
    _id: YLNxh4c0igyjRybT
    text:
      content: |-
        <h3>Spending Destiny Points</h3>

        <p>Spending a Destiny Point does not take an action and grants one of the following benefits:</p>

        <ul><li>Gain advantage on an attack roll, saving throw, or ability check.</li><li>Impose disadvantage on an enemy attack roll, saving throw, or ability check (even once the attack is resolved).</li><li>Act out of turn (thus changing your position in the initiative order).</li><li>Take damage that would otherwise harm another character within your reach.</li><li>Immediately gain 2 of a consumable class resource (rage, force points, tech points, superiority dice, or focus)</li></ul>
