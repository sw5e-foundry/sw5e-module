  - name: Scout
    _id: 889zTQLxhL2VngEz
    text:
      content: |+
        <h2>Scout</h2>

        <p>In order to become a scout, your companion must have a Strength, Dexterity, or Intelligence score of 13 or higher.</p>

        <p>As a scout, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor, medium armor</li><li><strong>Weapons:</strong> All blasters, all vibroweapons</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Strength, Dexterity</li><li><strong>Skills:</strong> Choose three from Animal Handling, Athletics, Insight, Investigation, Perception, Piloting, Stealth, Survival, and Technology</li></ul>

        <h3>Techcasting</h3>

        <p>Beginning when your companion chooses this class at 3rd level, during its training it has derived powers from schematics with the aid of a wristpad. See chapter 10 of the Player's Handbook for the general rules of techcasting and chapter 12 of the Player's Handbook for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>Your companion learns two tech powers of its choice of no higher level than its Max Power Level. </p>

        <p>At-will powers chosen by your companion do not scale normally at higher levels. Instead, if they would scale at 5th level, they instead scale at 11th level, and if they would scale at 11th level, they instead scale at 17th level.</p>

        <h4>Tech Points</h4>

        <p>Your companion does not require tech points. Instead, it can only cast powers at 1st-level once. It regains the ability to do so after completing a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Your companion's Max Power Level is 1st. </p>

        <h4>Techcasting Ability</h4>

        <p>Intelligence is your companion's techcasting ability for its tech powers. It uses Intelligence whenever a power refers to its techcasting ability. Additionally, it use its Intelligence modifier when setting the saving throw DC for a tech power it casts and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + its proficiency bonus + <br>its Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = its proficiency bonus + <br>its Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>Your companion uses a wristpad (found in chapter 5 of the Player's Handbook) as a techcasting focus for its tech powers.</p>

        <h3>Ranger's Quarry</h3>

        <p>Also at 3rd level, your companion learns how to effectively read and track its prey. Once on each of its turns, your companion can choose a creature it can see within 120 feet and mark it as its quarry (no action </p>



        <p>required). For the next hour, your companion gains the following benefits:</p>

        <ul><li>Once per turn, when your companion hits the target with a weapon attack, it can deal 1d4 additional damage to it of the same type as the weapon's damage. This die increases to a d6 at 7th level and a d8 at 15th level.</li><li>Your companion has advantage on any Wisdom (Perception) or Wisdom (Survival) check it makes to find the target while it's on the same planet as your companion.</li></ul>

        <p>Your companion can only have one creature marked in this way at a time. Beginning at 11th level, your companion can use its reaction to mark a creature when it enters its line of sight, provided it is within range of your companion's Ranger's Quarry.</p>

        <p>The duration increases to 8 hours at 11th level. </p>

        <h3>Techcasting, Mark II</h3>

        <p>At 7th level, your companion's Max Power Level increases to 2nd, and it learns two additional powers.</p>

        <p>Additionally, your companion can cast powers at 2nd-level once. It regains the ability to do so after completing a short or long rest.</p>

        <h3>Extra Attack</h3>

        <p>By 11th level, your companion can attack twice, instead of once, whenever it takes the Attack action on its turn.</p>

        <h3>Commando</h3>

        <p>At 15th level, your companion can take the Dash or Hide actions as a bonus action on each of its turns. Additionally, it can remain perfectly still for long periods of time to set up ambushes.</p>

        <p>When your companion attempts to hide on its turn, it can opt to not move on that turn. If it avoids moving, creatures that attempt to detect it take a -10 penalty to their Wisdom (Perception) checks until the start of your companion's next turn. Your companion loses this benefit if it moves or falls prone, either voluntarily or because of some external effect. It is still automatically detected if any effect or action causes it to no longer be hidden.</p>

        <p>If your companion is still hidden on its next turn, it can continue to remain motionless and gain this benefit until it is detected.</p>

        <p>Additionally, your companion can no longer be tracked by unenhanced means, unless it chooses to leave a trail.</p>

        <h3>Techcasting, Mark III</h3>

        <p>As of 18th level, your companion's Max Power Level increases to 3rd, and it learns two additional powers.</p>

        <p>Additionally, your companion can cast powers at 3rd-level once. It regains the ability to do so after completing a long rest.</p>

