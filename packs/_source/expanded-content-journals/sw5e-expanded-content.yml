  - name: Kubaz
    _id: VTKWJc2yoYVi0axR
    text:
      content: |-
        <h2>Kubaz</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Black, dark grey, or dark green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Prehensile snouts, protective eyewear</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>105 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Kubindi</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Kubazian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Kubaz are distinctive for their short, prehensile facial snouts which were used for reaching insects within their hives. They have adapted to their sun-scorched, vegetation-deprived world by learning to survive off their world's native insect population. Filled with two rows of teeth for gnashing their food, the Kubaz trunk also functions as a highly sensitive nose.  Due to living on their homeworld of Kubindi�a planet which orbits a blue star�Kubaz are highly sensitive to red wavelengths; when traveling to planets with a red or yellow star, Kubaz are forced to don protective eyewear to avoid damaging their sensitive eyes.</p>

        <h3>Society and Culture</h3>

        The Kubazi society is based on a clan structure which<br> dwell in underground nests. Ruled by a queen, each<br> clan takes the name of their queen they are<br> descended from. Developing a non-verbal language of<br> hand gestures which indicated their intentions, Kubaz<br> are able to speak Galactic Basic, though with a strong<br> nasally accent.  When interacting with other species,<br> some Kubaz will share certain hand signals with non-<br>Kubaz in order to ease communications.  Obsessed<br> with tact and decorum, the Kubaz place a high<br> emphasis on the family unit and proper courtesies,<br> displaying truthfulness to a fault. Valuing art and<br> literature with such vigor as to sometimes practice<br> smuggling of great works, the Kubaz do not find such<br> pursuits to be wrong or unlawful.  Due to their diet on<br> Kubindi, the Kubaz have poor relations with sentient<br> insectile species. 

        <h3>Names</h3>

        <p>Kubaz names are usually dominated by harsher sounds, but some names lean more melodic. Surnames are clan-based.</p>

        <p><strong>Male Names.</strong> Shaf, Rizor, Duldril, Kurn, Schnaldiz</p>

        <p><strong>Female Names.</strong> Zhanro, Dizi, Tavo, Agoz, Nuzrem</p>

        <p><strong>Surnames.</strong> Re, Eadzan, Hai, Khu'nar, Mairvuc, Va</p>



        <h3>Kubaz Traits</h3>

        <p>As a Kubaz, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Dexterity score<br> increases by 2, and your Intelligence score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Kubaz reach adulthood in their early teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Kubaz' courteous nature causes them to<br> tend toward lawful alignments, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Kubaz typically stand 5 to 6 feet tall and weigh around 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <strong><em>Art Obsession.</em></strong> Whenever you make an ability check<br> related to the acquisition or location of art or<br> valuables, you are considered proficient in the check. If<br> you would already be proficient, you instead have<br> expertise. 

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 120 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Deft Hand.</em></strong> You have proficiency in one of the following skills: Deception, Sleight of Hand, or Stealth.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Slicer.</em></strong> You have proficiency with the Technology skill and the slicer's kit.</p>

        <p><strong><em>Sunlight Sensitivity.</em></strong> You have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in direct sunlight.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kubazian. Kubazian is comprised of a unique series of whirring, nasally syllables, causing Kubaz to have a high-pitched accent when speaking other languages. </p>

        <img src='https://www.gmbinder.com/images/iHDDETg.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:252px' />



