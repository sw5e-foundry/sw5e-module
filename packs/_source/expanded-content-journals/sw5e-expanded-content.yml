  - name: Defel
    _id: LJs4TlUzGYBOxKaS
    text:
      content: |-
        <h2>Defel</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Black, brown, or grey</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Blue to yellow in ultraviolet light, black to dark brown in visible light</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, orange, or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Ability to absorb light, light blindness, claws</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>3'10"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>65 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Af'El</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Defel</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>While defel appear to be visually similar to the shistavanen, they are very different on a biological level. Defel have the ability to bend waves of light in such a manner that it renders them practically invisible to the human eye. Despite this ability, they could be still be spotted by force-users and keen-eyed individuals.</p>

        <p>Defel have extremely high perceptive ability because of their large ears, sensitive noses, and keen eyes. Because of the heightened levels of visual stimuli their eyes experience, defel are nearly blinded by sunlight but  can see rather well in the dark.</p>

        <h3>Society and Culture</h3>

        <p>Defel live in tight-knit, interdependent communites underground. The harsh environment on Af'El turned the defel into rugged survivors, able to hold their own in the Galaxy. </p>

        <p>Defel have a strong sense of honor and will not associate with individuals that do not keep their word.</p>

        <p>Because defel have yet to achieve interplanetary travel, they are a rare sight in the galaxy.</p>

        <h3>Defel Names</h3>

        <p>Defel names tend to sound dark and mysterious, and are mostly composed of multiple syllables. Defel surnames are familial, using stern and simple sounds.</p>

        <p><strong>Male Names.</strong> Alustair, Claustro, Tenebris, Varsiin</p>

        <p><strong>Female Names.</strong> Lhantra, Soliel, Stroika, Zavtra</p>

        <p><strong>Surnames.</strong> Gauss, Neura, Tume, Vecherom</p>



        <h3>Defel Traits</h3>

        <p>As a defel, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Defel reach adulthood in their early teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Defel tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Defel typically stand 4 to 5 feet tall and generally weigh around 100 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Claws.</em></strong> Your claws are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 120 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hidden Step.</em></strong> As a bonus action, you can turn invisible until the start of your next turn or until you attack, make a damage roll, or force someone to make a saving throw. Once you've used this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Miners.</em></strong> You have proficiency in scavenging kits.</p>

        <p><strong><em>Sunlight Sensitivity.</em></strong> You have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in direct sunlight.</p>

        <p><strong><em>Sneaky</em></strong> You are proficient in the Stealth skill.</p>

        <p><strong><em>Surprise Attack</em></strong> If you surprise a creature and hit it with an attack on your first turn in combat, the attack deals an extra 2d6 damage to it. You can use this trait only once per combat.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Defel. Most defel refuse to speak Galactic Basic while on their home planet of Af'El unless they have a specific need for it.</p>

        <img src='https://www.gmbinder.com/images/xKjvN6h.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:160px' />



