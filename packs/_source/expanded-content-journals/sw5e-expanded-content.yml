  - name: Faction Artisan
    _id: SHdXT1JJDjey91UB
    text:
      content: |+
        <h2>Faction Artisan</h2>

        <p>You are a member of an artisan's faction, skilled in a particular field and closely associated with other artisans. You are a well-established part of the mercantile world, freed by talent and wealth from the constraints of a feudal social order. You learned your skills as an apprentice to a master artisan, under the sponsorship of your faction, until you became a master in your own right.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Insight, Persuasion, and Technology</li><li><strong>Tool Proficiencies:</strong> One type of artisan's implements, biochemist's kit, or chef's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of tools (one of your choice), a letter of introduction from your faction, a set of traveler's clothes, and a belt pouch containing 150 cr</li></ul>

        <h4>Faction Business</h4>

        <p>factions are generally found in cities large enough to support several artisans practicing the same trade. However, your faction might instead be a loose network of artisans who each work in a different village within a larger realm. Work with your GM to determine the nature of your faction.</p>

        <h3>Feature: Faction Membership</h3>

        <p>As an established and respected member of a faction, you can rely on certain benefits that membership provides. Your fellow faction members will provide you with lodging and food if necessary, and pay for your funeral if needed. In some cities and towns, a factionhall offers a central place to meet other members of your profession, which can be a good place to meet potential patrons, allies, or hirelings.</p>

        <p>factions often wield tremendous political power. If you are accused of a crime, your faction will support you if a good case can be made for your innocence or the crime is justifiable. You can also gain access to powerful political figures through the faction, if you are a member in good standing. You must pay dues of 50 cr per month to the faction. Your dues must be current to remain in the faction's good graces.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Charmer</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Haggler</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>faction artisans are among the most ordinary people in the world�until they set down their tools and take up an adventuring career. They understand the value of hard work and the importance of community, but they're vulnerable to sins of greed and covetousness.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I believe that anything worth doing is worth doing right. I can't help it� I'm a perfectionist.</td></tr><tr><td>2</td><td>I'm a snob who looks down on those who can't appreciate fine art.</td></tr><tr><td>3</td><td>I always want to know how things work and what makes people tick.</td></tr><tr><td>4</td><td>I'm full of witty aphorisms and have a proverb for every occasion.</td></tr><tr><td>5</td><td>I'm rude to people who lack my commitment to hard work and fair play.</td></tr><tr><td>6</td><td>I like to talk at length about my profession.</td></tr><tr><td>7</td><td>I don't part with my money easily and will haggle tirelessly to get the best deal possible.</td></tr><tr><td>8</td><td>I believe I'm well known for my work, and I'm always taken aback when people haven't heard of me.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Community.</strong> It is the duty of all civilized people to strengthen the bonds of community and the security of civilization. (Lawful)</td></tr><tr><td>2</td><td><strong>Generosity.</strong> My talents were given to me so that I could use them to benefit the world. (Light)</td></tr><tr><td>3</td><td><strong>Freedom.</strong> Everyone should be free to pursue his or her own livelihood. (Chaotic)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I'm only in it for the money. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I'm committed to the people I care about, not to ideals. (Neutral)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I work hard to be the best there is at my craft. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>The workshop where I learned my trade is the most important place in the world to me.</td></tr><tr><td>2</td><td>I created a great work for someone, and then found them unworthy of it; I now search for someone worthy.</td></tr><tr><td>3</td><td>I owe my faction a great debt for forging me into the person I am today.</td></tr><tr><td>4</td><td>I pursue wealth to secure someone's love.</td></tr><tr><td>5</td><td>One day I will return to my faction and prove that I am the greatest artisan of them all.</td></tr><tr><td>6</td><td>I will get revenge on the Dark forces that destroyed my place of business and ruined my livelihood.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I'll do anything to get my hands on something rare or priceless.</td></tr><tr><td>2</td><td>I'm quick to assume that someone is trying to cheat me.</td></tr><tr><td>3</td><td>No one must ever learn that I once stole money from faction coffers.</td></tr><tr><td>4</td><td>I'm never satisfied with what I have� I always want more.</td></tr><tr><td>5</td><td>I would kill to acquire a noble title.</td></tr><tr><td>6</td><td>I'm horribly jealous of anyone who can outshine my handiwork. Everywhere I go, I'm surrounded by rivals.</td></tr></tbody></table>

