  - name: Biochem Engineering
    _id: UgVy2zoOw38ENUmg
    text:
      content: |+
        <h2>Biochem Engineering</h2>

        <p>Those engineers who choose the Biochem Engineering discipline focus on utilizing their vast knowledge of medicine and chemistry to supply allies with potent healing and enemies with debilitating poisons and acids.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Biochem Engineering:</strong> 3rd level</em><br>

        <p>You gain proficiency in the Medicine skill, biochemist's kits, and poisoner's kits. Additionally, when you engage in crafting with biochemist's kits and poisoner's kits, the rate at which you craft doubles.</p>

        <h3>Modified Biochemist's Pack</h3>

        <em><strong>Biochem Engineering:</strong> 3rd level</em><br>

        <p>You learn to modify and combine your biochemist's kit and poisoner's kit, creating a mobile laboratory using your chemistry expertise. Over the course of a long rest, you can create your modified biochemist's pack. You must have a biochemist's kit, a poisoner's kit, and materials in order to perform this modification.</p>

        <p>Your biochemist's pack is enhanced, requires attunement, can only be used by you, and counts as a tech focus for your tech powers while you are attuned to it. Your modified biochemist's pack has 4 modification slots, and it gains more at higher levels, as shown in the Modification Slots column of the engineer table. For each modification installed in excess of your proficiency bonus, your tech point maximum is reduced by 1. Over the course of a long rest, you can install, replace, or remove a number of modifications up to your Intelligence modifier (minimum of one).</p>

        <p>Some modification effects require saving throws. When you use such an effect from this class, the DC equals your tech save DC.</p>

        Your modified biochemist's pack comes equipped with a chemical distribution system, complete with three chemical mixtures: corrosive, invigorating, and noxious. As an action, you can activate your distributor and target a creature within 30 feet, with an<br> effect determined by the mixture.

        <h4>Corrosive Mixture</h4>

        Your distributor emits a burst of acid.<br> The target must make a Dexterity sav-<br>ing throw. On a failed save, a creature<br> takes 1d6 + your Intelligence modifier acid<br> damage. This mixture's damage increases by<br> 1d6 when you reach 5th level (2d6), 11th level<br> (3d6), and 17th level (4d6).

        <h4>Invigorating Mixture</h4>

        Your distributor emits a bolt of kolto. The target<br> gains 1d6 + your Intelligence modifier temporary<br> hit points, which last until the end of your next<br> turn. The temporary hit points granted by this<br> mixture increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).



        <h4>Noxious Mixture</h4>

        <p>Your distributor emits a cloud of poison. The target must make a Constitution saving throw. On a failed save, a creature takes 1d6 + your Intelligence modifier poison damage. This mixture's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>

        <h3>Biochemist's Touch</h3>

        <em><strong>Biochem Engineering:</strong> 3rd level</em><br>

        <p>Whenever you grant temporary hit points, or deal acid or poison damage using a tech power or class feature, you may expend one use of your Potent Aptitude to increase the potency. When you do so, the amount of temporary hit points you grant or damage you deal is increased by the amount rolled on the die. The damage is the same type as the original damage.</p>

        <h3>Potent Mixtures</h3>

        <em><strong>Biochem Engineering:</strong> 6th level</em><br>

        <p>When you cast a tech power of 1st-level or higher that grants temporary hit points, or deals acid or poison damage, you add your Intelligence modifier (a minimum of +1) to the roll.</p>

        <h3>Epicenter</h3>

        <em><strong>Biochem Engineering:</strong> 14th level</em><br>

        <p>As a reaction when you take damage from a creature within 15 feet of you that you can see, you can use one of your mixtures. The effects of the mixture release in a 15-foot-radius sphere centered on you, and if the mixture requires a saving throw, you automatically succeed on it. Additionally, the affected area is difficult terrain to creatures other than you until the end of your next turn.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Masterful Mixtures</h3>

        <em><strong>Biochem Engineering:</strong> 18th level</em><br>

        When you deal acid or poison damage using a tech power or class feature, you ignore resistance and treat<br> immunity as resistance.

        <img src='https://www.gmbinder.com/images/oTDSfb9.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:445px' />



        <h3>Biochem Modifications</h3>

        <p>If a modification has prerequisites, you must meet them to install it. You can install the modification at the same time that you meet its prerequisites.</p>

        <h4>Biochemist's Amplifer</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While using your biochemist's pack as a tech focus, you gain a +1 bonus to tech attack rolls. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Biochemist's Inhibitor</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While using your biochemist's pack as a tech focus, you gain a +1 bonus to your tech save DC. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Chemical Counteragents</h4>

        <p>You may choose one type of damage that benefits from your Biochemist's Touch and Potent Mixtures features. While wearing your modified biochemist's pack you have resistance to that type of damage.</p>

        <p>You can select this modification multiple times. Each time you do so, you must choose a different damage type.</p>

        <h4>Countertoxin</h4>

        <p>When you or an ally within 30 feet of you is suffering from the poisoned condition, you may use your reaction on your turn to end the poisoned condition on that creature. The creature also gains immunity to the poisoned condition for one minute.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Detachable Distribution System</h4>

        <p>You upgrade your distributor with a secondary, detachable distributor. As a bonus action, you can throw your detachable distributor at a point within range. Your detachable distributor has a range equal to 30 feet + your Strength modifier x 5. Your detachable distributor works for 1 minute before coming inert. Once it does so, you can't use it again until you recover it as an action.</p>

        <p>Additionally, while your detachable distributor is within 100 feet of you, when you use your action to activate your distributor, you can choose to affect each creature within 5 feet of your detachable distributor. You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Drone Distribution System</h4>

        <p>You upgrade your distributor, interfacing it with the target of your <em>tracker droid interface</em> power. When you use your action to activate your distributor, while your tracker droid is within 100 feet of you, you can choose to have your tracker droid deliver the mixture. Your tracker droid must use its reaction to deliver the mixture.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You </p>



        <p>regain all expended uses when you complete a short or long rest.</p>

        <h4>Expanded Chemicals: Combustibles</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You add additional chemicals to your modified biochemist's pack. When you deal fire damage with a tech power or class feature, you can use your Biochemist's Touch and Potent Mixture features.</p>

        <p>Additionally, when a creature fails their Dexterity saving throw against your Corrosive Mixtures feature, you can choose to instead deal fire damage. If you do so, each creature within 5 feet of the target takes fire damage equal to your Intelligence modifier. You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Expanded Chemicals: Cryogenics</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You add additional chemicals to your modified biochemist's pack. When you deal cold damage with a tech power or class feature, you can use your Biochemist's Touch and Potent Mixture features.</p>

        <p>Additionally, when a creature fails their Constitution saving throw against your Noxious Mixtures feature, you can choose to instead deal cold damage. If you do so, it gains 1 slowed level until the start of your next turn. You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Expanded Chemicals: Restorative</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You add additional chemicals to your modified biochemist's pack. When you restore hit points with a tech power or class feature, you can use your Biochemist's Touch and Potent Mixture features.</p>

        <p>Additionally, when you use your Invigorating Mixture to grant temporary hit points to a creature, you can choose to restore that many hit points to the same creature. You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Expanded Mixtures: Adhesive</h4>

        <p>You've created a new mixture from your chemicals that you can use when you activate your distributor. When you do so, the target creature must make a Strength saving throw. If the creature is Large or larger, it has advantage on the saving throw. On a failed save, a creature gains 4 slowed levels until the start of your next turn. As an action on their turn, an affected creature can repeat this saving throw, ending the effect on a success. </p>

        <h4>Expanded Mixtures: Blinding</h4>

        <p>You've created a new mixture from your chemicals that you can use when you activate your distributor. When you do so, the target creature must make a Constitution saving throw. On a failed save, a creature </p>



        <p>is blinded until the start of your next turn.</p>

        <h4>Expanded Mixtures: Hallucinogenic</h4>

        <p>You've created a new mixture from your chemicals that you can use when you activate your distributor. When you do so, the target creature must make an Intelligence saving throw. On a failed save, the target loses the ability to distinguish friend from foe, regarding all creatures it can see as enemies until the end of your next turn. Each time the target takes damage, it can repeat the saving throw, ending the effect on itself on a success. </p>

        <p>Whenever the affected creature chooses another creature as a target, it must choose the target at random from among the creatures it can see within range of the attack, power, or other ability it's using. If an enemy provokes an opportunity attack from the affected creature, the creature must make that attack if it is able to.</p>

        <p>This feature has no effect on droids or constructs.</p>

        <h4>Explosive Distribution System</h4>

        <p>You upgrade your distributor, granting it the ability to create a volley. When you use your action to activate your distributor, you can choose to affect each creature in a 10-foot-radius sphere centered on a point you can see within 30 feet.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Injection Apparatus</h4>

        <p>You install a wrist mounted injection apparatus into your modified biochemist's pack. It is a simple vibroweapon with the finesse and light properties, and deals 1d4 kinetic damage on a hit. Your injection apparatus does not fill the hand slot, but you can't use it while the hand is full.</p>

        <p>When you hit with the weapon, you can activate your distributor to deploy one of your mixtures. If you do so, the target has disadvantage on the saving throw against your mixture.</p>

        <h4>Inoculation</h4>

        <p>You gain immunity to the poisoned and disease conditions.</p>

        <h4>Integrated EVA Functionality</h4>

        <p>You make several additions to your modified biochemist's pack, you are protected from hazardous conditions, as if wearing an EVA suit, for as long as you are wearing your modified biochemist's pack.</p>

        <h4>Kolto Aerosol</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You add a special dispersal system to your modified biochemist's pack. This system slowly disperses small amounts of kolto in the air. If creatures spend the entirety of a long rest within 30 feet of you, they regain all expended Hit Dice, instead of only half. Additionally, they are cured of any poisons or diseases that are suffering from.</p>

        <h4>Long-Range Distribution System</h4>

        <p>You upgrade your distributor, improving the range. When you use your action to activate your distributor, </p>

        <p>you can choose to increase the range to 60 feet.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

        <h4>Luminous Gel</h4>

        <p>You've added a light-emitting gel to your modified biochemist's pack. As an action, you can coat an item, object, or location up to 5-foot-square with this gel. When you do so, the gel sheds bright light in a 10-foot radius and dim light for an additional 10 feet. The gel lasts for 1 hour before losing its potency. You can end this effect as a bonus action.</p>

        <h4>Oil Spill</h4>

        <p>As an action, you can cast the <em>oil slick</em> tech power without expending tech points. Casting the power in this way does not require concentration, and the oil will remain in place for the full duration of the power.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Persistent Chemicals</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>Whenever you use your Biochemist's Touch feature, you may select one creature that was damaged. At the start of each of that creature's turns, it must make a Constitution saving throw. On a failed save, it takes damage of the triggering type equal to your Intelligence modifier and has disadvantage on attack rolls until the start of its next turn. On a success, this feature ends, and the creature becomes immune to it for one day.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Piercing Gel</h4>

        <em><strong>Prerequisite:</strong> 11th level, Luminous Gel</em><br>

        <p>Your luminous gel now automatically dispels illusions and can detect invisibility, as with truesight.</p>

        <h4>Self-Injection Module</h4>

        <p>You install a special kolto injector into your modified biochemist's pack that can inject you with kolto in response to pain. When you take damage, you can use your reaction and expend a Hit Die to regain health as long as the damage would not reduce your hit points to 0.</p>

        <h4>Smart Dispersal System</h4>

        <p>When you activate your distributor, you can choose a number of creature equal to your Intelligence modifier. Those creature automatically succeed on their saving throws against your mixtures.</p>

        <h4>Spray Distribution System</h4>

        <p>You upgrade your distributor, granting it the ability to spray in a cone. When you use your action to activate your distributor, you can choose to affect each creature in a 15-foot cone.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the engineer table. You regain all expended uses when you complete a short or long rest.</p>

