  - name: Damage Reduction (DR)
    _id: CXgg81DYDvXLbK17
    text:
      content: |-
        <h3>Damage Reduction (DR)</h3>

        <p>Damage reduction (DR) is a static value that you subtract when you take damage if certain conditions are met. Certain features, such as the Defense fighting mastery or the absorptive armor property, grant DR that only applies when you take damage from weapons. DR is expressed as a number. DR provided by armor only affects damage you take as a result of being hit by an attack roll, in the same way that AC only helps you avoid being hit by an attack roll.</p>

        <p>If passive DR would reduce the damage you take to 0, you instead take 1 damage.</p>
