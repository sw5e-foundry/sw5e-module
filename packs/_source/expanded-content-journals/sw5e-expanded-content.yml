  - name: Operative
    _id: 99gHuxhon0ROgrAb
    text:
      content: |+
        <h2>Operative</h2>

        <p>In order to become an operative, your companion must have a Dexterity or Intelligence score of 13 or higher.</p>

        <p>As an operative, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons, blaster pistol, hidden blade, techblade, vibrorapier</li><li><strong>Tools:</strong> One specialist's kit of your choice</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Dexterity, Intelligence</li><li><strong>Skills:</strong> Choose any four</li></ul>

        <h3>Sneak Attack</h3>

        <p>Beginning when your companion chooses this class at 3rd level, your companion knows how to strike subtly and exploit a foe's distraction. Once per turn, it can deal an extra 1d6 damage to one creature it hits with an attack if it has advantage on the attack roll. The attack must use a finesse or a ranged weapon.</p>

        <p>Your companion doesn't need advantage on the attack roll if another enemy of the target is within 5 feet of it, that enemy isn't incapacitated, and your companion doesn't have disadvantage on the attack roll.</p>

        <p>The amount of extra damage increases to 2d6 at 7th level, 3d6 at 11th level, 4d6 at 15th level, and 5d6 at 17th level.</p>

        <h3>Cunning Action</h3>

        <p>Also at 3rd level, your companion's quick thinking and agility allow it to move and act quickly. Your companion can take a bonus action on each of its turns in combat. This action can be used only to take the Dash, Disengage, or Hide action.</p>

        <h3>Bad Feeling</h3>

        <p>At 7th level, your companion has a wary eye, bordering on paranoia. When your companion rolls for initiative, it can move up to its speed. This movement happens before the initiative order is determined.</p>

        <p>Once your companion has used this feature, it must finish a long rest before it can use it again.</p>

        <h3>Uncanny Dodge</h3>

        <p>By 11th level, when an attacker that your companion can see hits it with an attack, your companion can use its reaction to halve the attack's damage against it.</p>



        <h3>Evasion</h3>

        <p>At 15th level, when your companion is subjected to an effect, such as a consular's <em>force storm</em> or an engineer's <em>explosion</em>, that allows it to make a Dexterity saving throw to take only half damage, it instead take no damage if it succeeds on a saving throw, and only half damage if it fails.</p>

        <h3>Reliable Talent</h3>

        <p>As of 18th level, your companion has refined its chosen skills until they approach perfection. Whenever your companion makes an ability check that lets it add its proficiency bonus, it can treat a d20 roll of 9 or lower as a 10.</p>

