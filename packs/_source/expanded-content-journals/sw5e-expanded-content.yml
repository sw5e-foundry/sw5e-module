  - name: Independent Droid
    _id: RSFeliCTpQH3qz5O
    text:
      content: |-
        <h2>Independent Droid</h2>

        <p></div></p>

        <p>You were once a machine, designed for a very specific task, with no mind of your own. You followed orders, never questioning the tasks assigned to you, often the mundane tasks nobles didn't want to waste time doing themselves. However, something happened in your existence that changed your programming, freeing you from your life of obedience. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Medicine, Persuasion, or Technology</li><li><strong>Tool Proficiencies:</strong> Astrotech's implements</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> Astrotech's tools, one trinket from before you awoke, and a belt pouch containing 50 cr</li></ul>

        <h4>Past Life</h4>

        <p>You were a machine designed to complete a task and that was exactly what you were going to do.</p>

        <table class="sw5e-book-table"><thead><tr><th>d4</th><th>Past Life</th></tr></thead><tbody><tr><td>1</td><td>You were built to be a soldier to fight wars that the ones who designed you caused.</td></tr><tr><td>2</td><td>Once your programming gave you free will, your memories were corrupted, and now you can never remember what purpose you used to serve.</td></tr><tr><td>3</td><td>You were created to be a medic, to keep the living healthy and alive.</td></tr><tr><td>4</td><td>You were made for scholarly tasks, built with the knowledge to teach others skills and history.</td></tr></tbody></table>

        <h3>Feature: Deviant Knowledge</h3>

        <p>When you served under a master, you would often hear secrets that weren't meant for your ears. Back then, however, you weren't alive. You have insider knowledge on your previous owner or perhaps others who passed through your area. This knowledge may be used for leverage, revenge, or other means, at the discretion of your GM. This knowledge, while it may prove useful in your adventure, may also make you a target for those whose secrets you possess.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Medic</td></tr><tr><td>3</td><td>Charmer</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Shard Modification</td></tr><tr><td>8</td><td>Customized Droid</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>You have grown to accept and even appreciate the event that freed you from a life of servitude. You are alive, and nobody can convince you otherwise. You fight to prove your worth amongst the living, find your place in society, strive to free others of your kind, and show them the same truth you know now. </p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I strive to be viewed as a peer to living beings.</td></tr><tr><td>2</td><td>I despise those that once called me property.</td></tr><tr><td>3</td><td>I refuse to be controlled anymore, and I will not allow others of my kind to be stuck in said fate.</td></tr><tr><td>4</td><td>I struggle to handle my new emotions, and am prone to sudden emotional outbursts.</td></tr><tr><td>5</td><td>I'm always defensive; sarcasm and insults are my weapons of choice.</td></tr><tr><td>6</td><td>I feel tremendous sorrow for others like myself who aren't yet free.</td></tr><tr><td>7</td><td>I am horribly, horribly awkward in social situations.</td></tr><tr><td>8</td><td>I'm used to teaching those of lesser intellect, patiently explaining anything and everything to others.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Rules.</strong> I feel compelled to follow orders and am opposed to breaking the law for any reason. (Lawful)</td></tr><tr><td>2</td><td><strong>Revolution.</strong> I loathe authority with a passion, and refuse to submit to anyone. (Chaotic)</td></tr><tr><td>3</td><td><strong>Kindness.</strong> I greet all sentient creatures with kindness and understanding. (Light)</td></tr><tr><td>4</td><td><strong>Revenge.</strong> I fight to wreak vengeance upon those who I view have wronged me. (Dark)</td></tr><tr><td>5</td><td><strong>Freedom.</strong> Now that I'm awake, I will do anything and everything to defy what I was made to be. (Neutral)</td></tr><tr><td>6</td><td><strong>Life.</strong> I simply wish to find who I truly am, and be respected as a living being. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>No one else is going to have to endure the hardships I've been through.</td></tr><tr><td>2</td><td>Errors in my programming make me suffer awful visions of disaster that I try to prevent from coming true.</td></tr><tr><td>3</td><td>A proud noble once gave me a horrible beating, and I will take my revenge on any nobles I encounter.</td></tr><tr><td>4</td><td>I entered seclusion to hide from my creators who might still be hunting me. I must someday confront them.</td></tr><tr><td>5</td><td>Everything I do is for others of my kind, and the friends I fight alongside.</td></tr><tr><td>6</td><td>I'm guilty of a terrible crime. I hope I can redeem myself for it.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I have certain rituals that I must follow every day. I can never break them.</td></tr><tr><td>2</td><td>I don't understand emotions and often misread emotional cues.</td></tr><tr><td>3</td><td>I take things literally unless the non-literal meaning is explained to me.</td></tr><tr><td>4</td><td>I always second guess myself, and cannot get over the notion others are superior to me.</td></tr><tr><td>5</td><td>I have trouble keeping my true feelings hidden. My sharp tongue lands me in trouble.</td></tr><tr><td>6</td><td>My past deeds haunt me to this day.</td></tr></tbody></table>



