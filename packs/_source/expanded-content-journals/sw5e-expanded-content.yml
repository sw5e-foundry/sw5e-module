  - name: Ammo Size Values and Weights
    _id: X5rsEJG6Ybp6WF7I
    text:
      content: |-
        <h3>Ammo Size Values and Weights</h3>

        <p>Additionally, the value and weight of these sized munitions would scale, as shown in the table below.</p>

        <table class="sw5e-book-table"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Power cell (Tiny)</td><td>3 cr</td><td>1/4 lb</td></tr><tr><td>Power cell (Small)</td><td>5 cr</td><td>1/2 lb</td></tr><tr><td>Power cell (Medium)</td><td>10 cr</td><td>1 lb</td></tr><tr><td>Power cell (Large)</td><td>20 cr</td><td>2 lb</td></tr><tr><td>Power cell (Huge)</td><td>50 cr</td><td>5 lb</td></tr><tr><td>Slug cartridge (Tiny)</td><td>1/2 cr</td><td>�</td></tr><tr><td>Slug cartridge (Small)</td><td>1 cr</td><td>�</td></tr><tr><td>Slug cartridge (Medium)</td><td>2 cr</td><td>�</td></tr><tr><td>Slug cartridge (Large)</td><td>4 cr</td><td>1/4 lb</td></tr><tr><td>Slug cartridge (Huge)</td><td>10 cr</td><td>1/2 lb</td></tr></tbody></table>

        <h4>Powered by Power Cells</h4>

        <blockquote><p>Items that are powered by power cells, such as jetpacks or glowrods, would utilize Medium power cells.</p></blockquote>

