  - name: Critical Success
    _id: 9VG8r6qMM5HNEy0G
    text:
      content: |-
        <h3>Critical Success</h3>

        <p>When a creature rolls a 20 on their saving throw against an effect, they automatically succeed on the saving throw, even if the result of their save would not meet or exceed the save DC. Additionally, if they would suffer any effects on a successful save, such as half damage, they treat the effect's damage as if it had rolled the minimum.</p>
