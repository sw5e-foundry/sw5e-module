  - name: Vurk
    _id: EyEIiGEAhYVHUhvN
    text:
      content: |-
        <h2>Vurk</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Dark blues, greens, greys, or reds</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Bulbous eyes, head crests, three-fingered hands</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'9"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>130 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Sembla</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Semblan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Vurks are the predominant sentient species of the planet Sembla. They are tall, reptilian humanoids with bulbous dark eyes and sweeping head crests. Their hands and feet have three digits each, one of which was opposable. They have distinguishing gray-green, leathery skin. Being able to breathe both water and air, they are perfectly adapted to travel Sembla's warm, shallow seas dotted with volcanic islands. They share a strong nomadic instinct with their amphibious ancestors.  </p>

        <h3>Society and Culture</h3>

        <p>Young Vurk males are married off by their parents; those who failed to marry before reaching adulthood remain bachelors for the rest of their lives. Because their way of living resulted in virtually no sizable permanent settlement whatsoever, Vurks were generally considered primitive by the rest of the galaxy; however, that was not true. They are very intelligent and believe in a highly developed philosophical tradition that emphasizes personal integrity and individual freedom and encourage personal honesty. Their compassionate and calm manner made them better than average diplomats.</p>

        <p>Vurks are very family-oriented. It is common for multiple generations to remain in the same location as a single household, with the eldest family member being the patriarch or matriarch and making the decision for the entire family.</p>

        <h3>Names</h3>

        <p>Vurk names are traditionally two to three syllables. Female names typically end with a vowel, while male names vary. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Coleman, Jadran, Milanko, Zlatko</p>

        <p><strong>Female Names.</strong> Elka, Iryna, Miglena, Tanya, Verka</p>

        <p><strong>Surnames.</strong> Cheevochik, Provric, Trebor, Vorgecz</p>



        <h3>Vurk Traits</h3>

        <p>As a vurk, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Wisdom score<br> increases by 2, and your Constitution score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Vurk reach adulthood in their 20s and live an average of 70 years.</p>

        <p><strong><em>Alignment.</em></strong> Vurk philosophies cause them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Vurks typically stand between 6 and 7 feet tall and weigh around 175 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 35 feet.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Athletic.</em></strong> You have proficiency in the Athletics skill.</p>

        <p><strong><em>Darkvision.</em></strong> Accustomed to life underwater, you have superior vision in low light conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Head Crest.</em></strong> Your head crest is a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Semblan. Semblan has a very melodic feel and often evokes images of waterfalls to those who don't understand its meanings.</p>

        <img src='https://www.gmbinder.com/images/68bFzyf.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:261px' />



