  - name: Imperial Knight
    _id: AzEwbcyHduO3bUuC
    text:
      content: |-
        <h2>Imperial Knight</h2>

        <p></div></p>

        <p>You are an Imperial Knight, a Force-wielding protector of the Fel Empire. Your order combines the teachings of the Jedi with the creed of the Royal Guard of old, using the Force as a powerful and respected tool with which to serve the Force as embodied by your Emperor. Imperial Knights do not share the philosophies of the Jedi with regards to the Force and its light side, and are well aware of the dangers of the dark side, dutifully rejecting its use and temptations. </p>

        <p>While Imperial Knights wield and construct their own lightsabers, they assign them no ceremonial value, treating them as nothing more than tools. As such, almost all lightsabers of the Imperial Knights look the same, with uniform hilt design and signature silver blades. These blades are produced by synthetic crystals similar to the red variety used by the Sith, created with knowledge from Emperor Palpatine's <em>Book of Anger</em>, but in a process bereft of the dark side. Imperial Knights are also recognized by their crimson armor emblazoned with the insignia of the Empire and ideally crafted of lightsaber-resistant materials.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Intimidation, Perception, or Piloting</li><li><strong>Tool Proficiencies:</strong> Armormech's implements and artificer's implements</li><li><strong>Equipment:</strong> a revised copy of the <em>Book of Anger</em>, an Imperial insignia, a black cape with a hood, and a belt pouch containing 100 cr</li></ul>

        <h3>Feature: Will of the Emperor</h3>

        <p>The authority granted by your position is easily acknowledged even by those who don't recognize the Imperial Knights. Though they might not know you, common citizens will extend you every courtesy and do their utmost to help you. Unless you have shown yourself to be a danger to them, they will even take up arms to fight alongside you, should you find yourself facing an enemy alone.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Threatening</td></tr><tr><td>3</td><td>Perceptive</td></tr><tr><td>4</td><td>Ace Pilot</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Force-Sensitive</td></tr><tr><td>7</td><td>Armor Expert</td></tr><tr><td>8</td><td>Weapon Expert</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Imperial Knights are warriors first, not negotiators. Their bonds are shaped by the great value they put in teamwork with their fellow Knights, as well as their loyalty to their Emperor. Their flaws may lie in their hubris, sense of superiority, or overzealousness in banishing the dark side. Some Knights hold ideals that lie beyond their order, for better or worse.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>If a crisis comes, my place will be at the Emperor's side.</td></tr><tr><td>2</td><td>I dislike my title. It is only there to make me seem more important than I am.</td></tr><tr><td>3</td><td>I do not lead. I only advise.</td></tr><tr><td>4</td><td>Some things are more important than the life of any one person�including mine.</td></tr><tr><td>5</td><td>I will not bend, I will not break, I will not serve.</td></tr><tr><td>6</td><td>I will not strike an enemy down in anger.</td></tr><tr><td>7</td><td>I can do whatever needs to be done!</td></tr><tr><td>8</td><td>I've wanted to test myself against the Sith!</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Duty.</strong> We serve with honor and if we are asked to sacrifice our honor as our duty, then we are betrayed. (Lawful)</td></tr><tr><td>2</td><td><strong>Loyalty.</strong> I do not understand, sire. But I will obey. (Lawful)</td></tr><tr><td>3</td><td><strong>Faith.</strong> I will not stray from the true path. I feel the responsibility that comes with wielding the Force now more than ever. (Light)</td></tr><tr><td>4</td><td><strong>Prudence.</strong> Where I come from, we at least hear someone out before we shoot them. (Neutral)</td></tr><tr><td>5</td><td><strong>Pride.</strong> We are Imperial Knights. There are none better. (Any)</td></tr><tr><td>6</td><td><strong>Strategy.</strong> A tiny fever wasp can carry death into places where a Krayt dragon cannot go. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>Our duty is to the Force as embodied by the Emperor.</td></tr><tr><td>2</td><td>There is a person I care more about than my vows as a Knight or my loyalty to the Empire.</td></tr><tr><td>3</td><td>I might, by strength of my own will, develop my own creations.</td></tr><tr><td>4</td><td>I will not allow another who has risen in my defense to be killed!</td></tr><tr><td>5</td><td>My friend is not the most orthodox of Knights. I've learned a lot from her.</td></tr><tr><td>6</td><td>I had a mentor, who was willing to sacrifice himself for the greater good.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>My passion is my strength�my passion is my weakness. So my Master always told me.</td></tr><tr><td>2</td><td>It was by the will of the Force my accident maimed me.</td></tr><tr><td>3</td><td>Sometimes we must sacrifice those who need us for the greater good.</td></tr><tr><td>4</td><td>The penalty for desertion has always been death.</td></tr><tr><td>5</td><td>I envy the freedom of others, but I'm not walking away from my responsibilities.</td></tr><tr><td>6</td><td>I can no longer be a Knight. I've become... something else.</td></tr></tbody></table>



