  - name: Kyuzo
    _id: 1zr3d2UMndX6oKRd
    text:
      content: |-
        <h2>Kyuzo</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Green, ranging from lighter olive shades to deep blue-green colors</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Compound or slit-pupiled eyes, dense musculature, suffer from respiratory and vision problems in standard gravity environments</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'9"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>140 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Phatrong</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Kyuzo</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>A lanky, bipedal humanoid species, the Kyuzo originate on the gravity-heavy Outer Rim world of Phatrong. Kyuzo are tall and slender, though their appearance belies their strength and quickness. Due to the uncommon makeup of their homeworld's atmosphere, Kyuzo frequently wear corrective lenses and a highly pressurized filter mask over their faces to protect their sensitive respiratory systems and assist them in coping with uncomfortable climates like galactic standard habitable environments. As well as causing respiratory and vision problems, exposure to such conditions causes a Kyuzo to become ill within in a short period of time, interfering with their ability to concentrate and slowing them down.</p>

        <h3>Society and Culture</h3>

        <p>A species known for its strong sense of justice and honor, most Kyuzo regard oaths and contracts as unbreakable and many species seek them as mercenaries, law-enforcement personnel and bounty hunters. A highly political species, the Kyuzo developed societies that span considerable geographical areas, and most identify as members of a particular country or region. Most major islands and continents on Phatrong are their own political units, though they do form a loose confederacy.</p>

        <h3>Names</h3>

        <p>Male names typically end in vowels, while female names end in consonants. Surnames are based on region.</p>

        <p><strong>Male Names.</strong> Drego, Embo, Khalu, Mhali, Zuvio</p>

        <p><strong>Female Names.</strong> Catras, Garing, Streehn, Turung</p>

        <p><strong>Surnames.</strong> Brihney, Ghall, Khambey, Maway, Vori</p>



        <h3>Kyuzo Traits</h3>

        <p>As a Kyuzo, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Intelligence score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Kyuzo reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Kyuzos' belief in justice and honor cause<br> them to tend toward lawful balanced, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Kyuzo typically stand between 6 and 7 feet tall and weigh around 170 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your natural evolution allows you to see what others do not in dim and dark conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Foreign Biology.</em></strong> Kyuzo struggle in atmospheres other than those of Phatrong. You wear a filter mask, and if your mask is removed while you are in such an environment, you lose consciousness.</p>

        <p><strong><em>Long-Limbed.</em></strong> When you make a melee attack on your turn, your reach for it is 5 feet greater than normal.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kyuzo. Kyuzo is characterized by short words and quick phrases. Kyuzo struggle with Galactic Basic as it is grammatically dissimilar to Kyuzo.</p>

        <img src='https://www.gmbinder.com/images/4gG3Xwe.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:226px' />



