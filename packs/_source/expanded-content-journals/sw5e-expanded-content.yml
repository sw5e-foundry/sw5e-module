  - name: Turret Companion
    _id: 2UePW9Q2o7CEJaE4
    text:
      content: |+
        <h2>Turret Companion</h2>

        <p>Your turret is a portable companion that you can upgrade over time. Your turret uses your Intelligence score, and its Charisma is 6. You assign your turret's Strength, Dexterity, Constitution, and Wisdom scores using a standard array (16, 14, 12, 8) as you see fit.</p>

        <hr>

        <h3>Turret Features</h3>

        <p>All turrets share the following traits.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d6 per turret companion level</li><li><strong>Hit Points at 1st Level:</strong> 6 + your turret's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d6 (or 4) + your turret's Constitution modifier per turret level after 1st</li></ul>

        <h4>Resistances and Vulnerabilities</h4>

        <hr>

        <ul><li><strong>Turret Resistances:</strong> Your turret is resistant to necrotic, poison, and psychic damage, and immune to poison and disease.</li><li><strong>Turret Vulnerabilities:</strong> Your turret is vulnerable to ion damage. Additionally, your turret has disadvantage on saving throws against effects that would deal ion or lightning damage.</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Languages:</strong> Your turret does not understand any languages, and it cannot speak.</li></ul>

        <hr>

        <ul><li><strong>Size:</strong> Small</li><li><strong>Speed:</strong> Your turret has two modes: undeployed and deployed. While undeployed, your turret's speed equals your own and it can take no actions. While deployed, your turret has a speed of 25 feet and can take actions. You can deploy or undeploy your turret at any time on your turn (no action required), but the effect doesn't occur until the start of your next turn.</li><li><strong>Type:</strong> Construct</li><li><strong>Armor Class:</strong> Your turret uses its Intelligence score for its Armor Class.</li><li><strong>Force Insensitive:</strong> Your turret can not use force powers or take levels in forcecasting classes.</li><li><strong>Integrated Weaponry:</strong> Your turret has an integrated vibroweapon and blaster with which it is proficient and can make weapon attacks. Neither weapon can be removed while your turret is not disabled. Your turret's vibroweapon deals 1d8 kinetic damage on a hit. Your turret's blaster has the ammunition (range 100/400) and reload 20 properties, and it deals 1d6 kinetic or energy damage on it a hit, depending on its loaded ammunition. It can use both slug cartridges and power cells for ammunition. Your turret can't reload itself. You can choose which weapon your turret uses each time it attacks (no action required).</li><li><strong>Turret Systems:</strong> Your turret does not need to eat or drink. Additionally, your turret does not require a tech focus to cast tech powers.</li><li><strong>Attitude:</strong> Your turret has a remote control, which you can use to direct it while within 120 feet of it (no action required). If you are incapacitated or absent, your turret takes no actions unless a trait says otherwise.</li></ul>



        <h3>Turret Traits</h3>

        <p>The traits are presented in alphabetical order. If a trait has prerequisites, your companion must meet them to adopt it. Your companion can adopt a trait at the same time that it meets the trait's prerequisites. Whenever your companion gains a level, it can exchange one trait for another one.</p>

        <h4>Augmenting Barrier</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>As an action, you can reduce your companion's speed and have it create a barrier that surrounds in a radius depending on its size. A Small turret's speed is reduced to 10 feet and has a 5-foot radius, a Medium turret's speed is reduced to 5 feet and has a 10-foot radius, and a Large turret's speed is to reduce to 0 and has a 15-foot radius. While active, when damage is dealt by a tech power originating from inside the barrier against a target outside the barrier, that tech power gains a bonus to damage equal to half your Intelligence modifier (rounded up).</p>

        <p>This barrier lasts for 1 minute. You can end it early as a bonus action on your turn. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Autoreload</h4>

        <p>You can preload your companion's blaster with additional ammunition. You can preload two additional power cells, or you can replace each power cell with 20 slug cartridges. Once on each of your turns, you can reload your companion without using an action. Once you've expended the preloaded ammunition, you can't reload your companion's blaster in this way again until you reload it with an action.</p>

        <h4>Climbing Turret</h4>

        <p>Your companion has a climbing speed equal to its walking speed, and it has advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <h4>Cloaking Barrier</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>As an action, you can reduce your companion's speed and have it create a barrier that surrounds in a radius depending on its size. A Small turret's speed is reduced to 10 feet and has a 5-foot radius, a Medium turret's speed is reduced to 5 feet and has a 10-foot radius, and a Large turret's speed is to reduce to 0 and has a 15-foot radius. While active, this barrier creates an area that is lightly obscured. Wisdom (Perception) checks that originate outside the barrier take a -10 penalty when attempting to detect anything inside the barrier.</p>

        <p>This barrier lasts for 1 minute. You can end it early as a bonus action on your turn. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Deployment Accelerator</h4>

        <p>Your companion now deploys and undeploys instantly, but you can only do so once on each of your turns.</p>



        <h4>Disguised Turret</h4>

        <p>Your companion can collapse into an innocuous looking container while undeployed. You have advantage on Charisma (Deception) checks to hide the nature of your companion while it is undeployed.</p>

        <h4>Fighting Style</h4>

        <p>Your companion adopts a particular style of fighting as its specialty. Choose one of the Fighting Style options, detailed in chapter 6 of the Player's Handbook. Your companion can't take a Fighting Style option more than once, even if it later gets to choose again.</p>

        <h4>Hovering Turret</h4>

        <p>Your companion can hover 5 feet over the ground while deployed. It ignores difficult terrain while hovering in this way.</p>

        <h4>Integrated Grenade Launcher</h4>

        <p>You integrate a grenade launcher into your companion.</p>

        <p>You can choose this upgrade multiple times. Each time you do so, the weapon's reload number increases by 1.</p>

        <h4>Integrated Projector</h4>

        <p>You integrate a vapor projector into your companion. </p>

        <p>You can choose this upgrade multiple times. Each time you do so, the weapon's reload number increases by 1.</p>

        <h4>Integrated Rocket Launcher</h4>

        <p>You integrate a rocket launcher into your companion.</p>

        <p>You can choose this upgrade multiple times. Each time you do so, the weapon's reload number increases by 1.</p>

        <h4>Modifiable Weaponry</h4>

        <p>You can replace your companion's integrated vibroweapon or blaster with a different weapon of the same type. The new weapon cannot be removed while your companion is not disabled.</p>

        <p>You can choose this upgrade twice.</p>

        <h4>Phalanx Barrier</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>As an action, you can reduce your companion's speed and have it create a barrier that surrounds in a radius depending on its size. A Small turret's speed is reduced to 10 feet and has a 5-foot radius, a Medium turret's speed is reduced to 5 feet and has a 10-foot radius, and a Large turret's speed is to reduce to 0 and has a 15-foot radius. While active, ranged weapon attacks originating from outside the barrier that pass through it have disadvantage. Ranged weapon attacks originating from inside the barrier are unaffected.</p>

        <p>This barrier lasts for 1 minute. You can end it early as a bonus action on your turn. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Ram Attachment</h4>

        <p>You integrate a battering ram into your companion. When your companion makes a Strength check to break down physical doors, it gains a bonus to the check, depending on its size. A Small turret gains a +2 bonus, a Medium turret gains a +3 bonus, and a Large turret gains a +5 bonus. </p>

        <h4>Rejuvenating Barrier</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>As an action, you can reduce your companion's speed and have it create a barrier that surrounds in a radius depending on its size. A Small turret's speed is reduced to 10 feet and has a 5-foot radius, a Medium turret's speed is reduced to 5 feet and has a 10-foot radius, and a Large turret's speed is to reduce to 0 and has a 15-foot radius. While active, friendly creatures that enter this barrier for the first time or start their turn there regain hit points equal to your Intelligence modifier, and gain temporary hit points equal to your Intelligence modifier. This feature can restore a creature to no more than half of its hit point maximum. </p>

        <p>This barrier lasts for 1 minute. You can end it early as a bonus action on your turn. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Sentry </h4>

        <p>You add an overwatch suite to your companion. When you cast the <em>alarm</em> tech power, you can choose to have your companion notified when the alarm is triggered. If you do so, when the alarm is triggered, your companion immediately makes a number of weapon attacks against the triggering creature up to your companion's proficiency bonus. If multiple creatures trigger the alarm simultaneously, your companion targets each creature randomly.</p>

        <h4>Size: Large</h4>

        <em><strong>Prerequisite:</strong> Size: Medium</em><br>

        <p>Your companion's size is Large. Its hit points increase by an amount equal to its level + 1, its Hit Die becomes a d10, its vibroweapon and blaster damages increase to 1d12 and 1d10, respectively, and its deployed walking speed decreases to 15 feet.</p>

        <h4>Size: Medium</h4>

        <p>Your companion's size is Medium. Its hit points increase by an amount equal to its level + 1, its Hit Die becomes a d8, its vibroweapon and blaster damages increase to 1d10 and 1d8, respectively, and its deployed walking speed decreases to 20 feet.</p>

        <h4>Suppressing Fire</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>When a creature within 30 feet of you moves at least 5 feet, you can use your reaction to have your companion make a ranged weapon attack with its blaster against the creature. If the attack hits, the creature's speed is reduce by half until the start of your next turn.</p>

        <h4>Turret Coverage</h4>

        <p>As an action, you can have your companion anchor itself to the ground or recover itself. While anchored, its speed is reduce to 0, it has resistance to energy and kinetic damage, and it provides cover to creatures within 5 feet of it, depending on its size. A Small turret provides one-quarter cover, a Medium turret provides half cover, and a Large turret provides three-quarters cover. If an attack would miss a creature by an amount less than or equal to the bonus to AC granted by your companion's cover, and the attack would hit your companion, your companion instead takes the attack's damage. </p>

