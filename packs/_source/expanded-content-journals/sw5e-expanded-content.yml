  - name: Destiny Points
    _id: Av7yN2OyeBEuE161
    text:
      content: |-
        <h3>Destiny Points</h3>

        <p>Destiny Points are a resource that a player can use to help fulfil whatever destiny has been set before their character. You either have a Destiny Point or you don't - you can't stockpile multiple Destiny Points for later use.</p>

        <h4>Destiny Bonus</h4>

        <p>When a character accomplishes a goal or performs a task that clearly moves them closer to fulfilling their destiny (GM's determination), they gain a Destiny Point.</p>

        <h4>Destiny Penalty</h4>

        <p>When a character does something that clearly moves them away from their destiny (GM's determination), they lose their Destiny Point if they currently have one. If not, the GM gains one Destiny Point to be used against them.</p>

        <p>If the character makes steps towards their destiny once more, this GM Destiny Point should first be discarded instead of awarding the player with one.</p>
