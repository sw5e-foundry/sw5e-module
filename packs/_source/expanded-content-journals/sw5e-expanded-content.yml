  - name: Tactical Initiative
    _id: HLE4Zub6gWipGbV7
    text:
      content: |-
        <h2>Tactical Initiative</h2>

        <p></div></p>

        <p>Rather than each player character and creature acting on their own, two or more allied creatures can instead choose to act tactically and work together using this initiative variant rule.</p>
