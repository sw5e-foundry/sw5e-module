  - name: When Are They Chosen?
    _id: 4sXr4GsvBJLDYJKm
    text:
      content: |-
        <h3>When Are They Chosen?</h3>

        <p>Each character can choose to spend their proficiency points at any time to gain proficiency in a language or tool. If they would do so in a moment when that language or proficiency would become relevant to the story, they must first justify how they already know that language or tool proficiency. For instance, if the party encounters a particular species from which they need to glean information, and they have no way to communicate with that species, one of your players might spend a proficiency point to learn the language that species speaks. In order to do so, however, they must first explain how they would know that language. Perhaps they grew up with a wandering member of that species who taught it to them? Or maybe they took this specific language as an elective during their education?</p>
