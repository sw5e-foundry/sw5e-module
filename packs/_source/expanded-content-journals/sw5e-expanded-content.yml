  - name: Ryn
    _id: LLOD3GyedOLFiE1N
    text:
      content: |-
        <h2>Ryn</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Blue, black, green, purple</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Light brown to white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Amber, blue, brown, or green</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Long tails, beak-like noses</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'4"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>75 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Unknown</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Ryn</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Their homeworld long lost from memory and time, the ryn are a humanoid race of musicians, vagabonds and travelers. The ryn's bodies are covered in soft, short fur, with a head of white hair which is matched by a tuft of hair at the end of their long prehensile tails, excellent for grasping things. Very uniquely ryn in nature, are their beak-like noses that contain fluted holes. These holes allow the ryn to play their 'beaks' like flutes. This talent has been used to communicate between ryn and has uniquely been observed in communication with droids.</p>

        <h3>Society and Culture</h3>

        <p>Wanderlust consumes the ryn. The ryn are a nomadic species, their original homeworld forgotten, even to them. They cannot abide confinement and constraint, and they itch to move on shortly after they arrive in a new place. Due to their homelessness, musical talent, natural secrecy, and avoidance of written records, ryn developed a nomadic culture and a reputation for confidence games, leaving many species prejudiced against them. In some sectors it is legal to enslave or hunt ryn. Their language is outlawed in many locations, and a large number of ryn women are used as slave breeding stock. They claim that sabaac, the popular card game that took the place of Pazaak in terms of card game prominence, is derived from their use of it as a fortune telling tool in their auguries. These auguries are today favored by hutts, who have a superstitious belief in the card tellings. A peculiar habit is that a ryn cannot sleep in the same location twice.</p>

        <h3>Names</h3>

        <p>Ryn names have a very melodic tone, taking cues from many different languages from across the galaxy. Ryn do not use surnames.</p>

        <p><strong>Male Names.</strong> Corfat, Dirygat, Garya, Nemagary</p>

        <p><strong>Female Names.</strong> Cogesama, Giani, Gypopha, Simeti</p>



        <h3>Ryn Traits</h3>

        <p>As a ryn, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence or Charisma score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Ryn reach adulthood in their early teens and live about 80 years.</p>

        <p><strong><em>Alignment.</em></strong> Ryn's superstitious and solitary nature causes them to tend toward balanced alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Ryn typically stand 4 and a half to 6 feet tall and generally weigh about 120 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Con Artist.</em></strong> You have proficiency in one gaming set of your choice.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Divination.</em></strong> Whether through mystical divination or sheer luck, you can turn failures into successes. When you roll a 1 on the d20 for an attack roll, ability check, or saving throw, you can reroll the die and must use the new roll.</p>

        <p><strong><em>Eternal Nomads.</em></strong> You have proficiency in Lore or Survival (your choice).</p>

        <p><strong><em>Musical.</em></strong> You have proficiency in Performance and one musical instrument of your choice.</p>

        <p><strong><em>Prehensile Tail.</em></strong> You have supreme control over your tail and can use it to manipulate objects as well as your hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Ryn. Ryn uses tones and inflections and is easily described as melodious by anyone who hears it. You can communicate with droids and other ryn without using words through the use of your beak. </p>

        <img src='https://www.gmbinder.com/images/PpUCVvm.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:278px' />



