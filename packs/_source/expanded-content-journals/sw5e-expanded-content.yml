  - name: Triage Technique
    _id: ukrm7FtCTNaalpAA
    text:
      content: |+
        <h2>Triage Technique</h2>

        <p>With every conflict comes death and destruction. Followers of the Triage Technique excel at keeping their comrades in the fight with quick thinking and fast-acting medicine.</p>

        <h3>Triage Training</h3>

        <em><strong>Triage Technique:</strong> 3rd level</em><br>

        <p>You gain proficiency in the Medicine skill. </p>

        <p>Additionally, when you would use your action to make an ability check to stabilize a creature, expend a use of a traumakit, or use a medpac, you can instead use your bonus action.</p>

        <h3>Mark of Triage </h3>

        <em><strong>Triage Technique:</strong> 3rd level</em><br>

        <p>You learn new ways to use your Ranger's Quarry. </p>

        <ul><li>While a hostile creature is the target of your Ranger's Quarry, you always know any conditions it is suffering from, and you know at roughly what percentage its current hit points is relative to its maximum. Additionally, if the target is within 60 feet of you, when it is forced to make a Constitution saving throw, you can use your reaction to force it to make the roll with disadvantage. Once you've used this feature, you must complete a short or long rest before you can use it again.</li><li>While a friendly creature is the target of your Ranger's Quarry, you have advantage on Wisdom (Medicine) checks made to stabilize it. Additionally, if the target is within 60 feet of you, you can use your bonus action and roll your Ranger's Quarry and either restore hit points equal to the amount rolled, or grant temporary hit points equal to the amount rolled. Once a friendly creature has benefited from this ability, they can not do so again until they complete a short or long rest.</li></ul>

        <h3>Double Dose</h3>

        <em><strong>Triage Technique:</strong> 7th level</em><br>

        <p>Your application of medicine does not interfere with your own ability to recover from injuries. When you restore hit points or grant temporary hit points to another creature with a tech power or class feature, you recover the same amount of hit points or gain the same number of temporary hit points. </p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you complete a long rest.</p>

        <h3>Experimental Infusion</h3>

        <em><strong>Triage Technique:</strong> 11th level</em><br>

        <p>When you target a creature with your Ranger's Quarry, you can grant one of the following additional effects of your choice:</p>

        <ul><li><strong><em>Adrenaline/Tranquilizer.</em></strong> The creature's movement speed is doubled until the end of its next turn. Alternatively, it gains a level of slowed until the end of its next turn.</li></ul>



        <ul><li><strong><em>Focus/Dizziness.</em></strong> The creature has either advantage or disadvantage (your choice) on the first ability check, attack roll, or saving throw it makes within the next minute.</li><li><strong><em>Toughen/Weaken.</em></strong> The creature gains temporary hit points equal to your scout level, which last for 1 minute. Alternatively, the creature must make a Constitution saving throw against your tech save DC. On a failure, it takes psychic damage equal to your scout level and it can't regain hit points until the start of your next turn.</li></ul>

        <p>You can use each feature once. You regain any expended uses when you complete a short or long rest.</p>

        <h3>Cure-All</h3>

        <em><strong>Triage Technique:</strong> 15th level</em><br>

        <p>Your healing becomes even more potent. When you restore hit points or grant temporary hit points to a creature as a bonus action using your Mark of Triage feature, you can also end one of the following conditions afflicting it: blinded, deafened, diseased, paralyzed, or poisoned.</p>

        <img src='https://www.gmbinder.com/images/i9YaACg.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:412px' />

