  - name: Tarasin
    _id: 4AMn2mrLDbdzgNoX
    text:
      content: |-
        <h2>Tarasin</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Translucent; varies with emotion</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red, orange, yellow, or black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Reptillian, sa'tosin spines</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Cularin</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Tarasinese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Tarasins are tall reptilians covered in translucent scales that allows the species' color-changing skin below to show through. Tarasins also have a colorful fan of flesh and scales�known as a kampo�that opens around their heads when they experience strong emotional distress, which can be a detriment to negotiations, as it is difficult for a tarasin to hide discomfort. This color-changing ability is useful for camouflage and communication, and the scales naturally repel heat. Some examples of colors they take on include being brown when calm and in a comfortable environment, or becoming red after extended exertion or when excited. Tarasins also have short spines that protrude from their forearms�known as a sa'tosin�which give the creatures the ability to sense the use of the Force. Tarasins are naturally curious and protective but also slow to anger. What they lack in sheer physical strength they make up for with a brilliant intellect.</p>

        <h3>Society and Culture</h3>

        <p>Tarasins live in a tribal system in the jungle underbrush of Cularin, grouping together in clans called irstat. The tarasin believe they have a symbiotic relationship with Cularin, and their religion is based around the appreciation of the natural world. This closeness with their homeworld is what makes the tarasin reluctant to leave it for an extended time. The tarasin have a strong connection with the Force, and their spiritual leaders are often able to call upon the Force in small ways. The tarasin believe that the ch'hala tree is sacred. This may have been influenced by the trees having a similar ability to shift their colors as the tarasin, but it is also the most unique tree on Cularin. </p>

        <h3>Names</h3>

        <p>Tarasin names are generally very soft and melodic. Names are agendered, and surnames are not used.</p>

        <p><strong>Names.</strong> Feliosa, Misona, Nissira, Vylana, Ziransa</p>



        <h3>Tarasin Traits</h3>

        <p>As a tarasin, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Tarasins reach adulthood at 10 and live less than 80 years.</p>

        <p><strong><em>Alignment.</em></strong> Tarasins' curious yet composed nature causes them to tend toward balanced alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Tarasins typically stand 5 to 6 feet tall and generally weigh about 130 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Chameleon Skin.</em></strong> Your scales are translucent, allowing your color-shifting skin to help you blend into your surroundings. You have proficiency in the Stealth skill. Additionally, you can attempt to hide even when you are only lightly obscured by foliage, heavy rain, falling snow, mist, and other natural phenomena.</p>

        <p><strong><em>Jungle Dweller.</em></strong> Growing up in the jungles of Cularin has left an impact. You don't treat jungle terrain as difficult terrain.</p>

        <p><strong><em>Naturalist.</em></strong> You have proficiency in the Nature skill.</p>

        <p><strong><em>Sa'tosin Sense.</em></strong> Tarasins have short spines called sa'tosin that allow them to sense the use of the Force. You are constantly under the effects of the force power <em>sense force</em>, though the power does not require concentration for you.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Tarasinese. You can communicate non-verbally with other tarasins through use of a complex system of skin color changes.</p>

        <img src='https://www.gmbinder.com/images/v6JqWEi.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:189px' />



