  - name: Longer Rests
    _id: KzfSVcFwpI5FFApe
    text:
      content: |-
        <h2>Longer Rests</h2>

        <p></div></p>

        <p>SW5e offers greater character customization than traditional 5e, and ultimately yields more powerful characters. If you find yourself struggling to challenge your party, consider using the following variant rule to make them stretch their resources.</p>
