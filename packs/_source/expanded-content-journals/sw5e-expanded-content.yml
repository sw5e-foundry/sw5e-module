  - name: Houk
    _id: 29oQZ5Qa7bRmzibh
    text:
      content: |-
        <h2>Houk</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Violet to blue, or yellow to brown</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Thick skull, large stature, great physical strength</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>6'0"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>190 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Lijuter</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Houkese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Houk are hulking bipeds with thick skin, hairless heads marked with bony ridges and a pronounced brow, flabby jowls, beady yellow eyes, and no visible ears or nose. They are very powerful due to their large bulk of pure muscle. </p>

        <h3>Society and Culture</h3>

        <p>The houk have well-earned reputations as bullies, cheaters, and backstabbers. They are often compared to wookiees because of their great strength and violent disposition. Houk are humorless, short-tempered beings who use their strength to antagonize weaker beings. Their propensity for deceit and skulduggery is matched only by the hutts. Though their tempers are not as explosive as those of wookiees, houk are known for their tendency to solve problems violently. In politics, they will often wage war without formal declarations, negotiate in bad faith, and ignore treaties. Though this preference for violence tend to cause the houk problems in dealing with other societies, it often gets them what they want. Surprisingly though, in personal combat, houk prefer to use stealth rather than direct confrontation. This gives them a reputation for deceit and cowardice. However, just as each houk colony has a different culture and government, houk individuals have varied personalities. Though all houk come from a culture with high levels of corruption and violence, many houk are hard workers who have learned to get along with other sentients. The houk produce little technology of their own, though they adapt themselves to the standard technology of the rest of the galaxy. </p>

        <h3>Names</h3>

        <p>Houk names are gruff and primitive in nature, and don't vary by gender.</p>

        <p><strong>First Names.</strong> Agamor, Krelba, Morg, Roath</p>

        <p><strong>Surnames.</strong> Krin, Nar, Vogog, Voss</p>



        <h3>Houk Traits</h3>

        <p>As a houk, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Houk reach adulthood in their late teens and live for about 80 years.</p>

        <p><strong><em>Alignment.</em></strong> Most houk are short-tempered and deceitful, causing them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Houk typically stand 6 to 8 feet tall and generally weigh about 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Ambusher.</em></strong> You have proficiency in the Stealth skill. </p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Surprise Attack.</em></strong> If you surprise a creature and hit it with an attack on your first turn in combat, the attack deals an extra 2d6 damage to it. You can use this trait only once per combat.</p>

        <p><strong><em>Toughness.</em></strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Houkese. Houkese is mainly formed by grunts, with subtle tonal inflections to differentiate words that would otherwise sound the same. Written Houkese uses primitive ideograms with one letter to represent each simple verb, and complex pictograms to represent nouns. </p>

        <img src='https://www.gmbinder.com/images/GZHx6ZJ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:296px' />



