  - name: Nothoiin
    _id: 36T3feqEVv23lhir
    text:
      content: |-
        <h2>Nothoiin</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Golden</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Blond, brown, light brown</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Brown</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Near-human, flaky golden skin, skilled pilots</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>110 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Nothoiin</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Notho</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Near-humans possessing golden, flaky skin, nothoiins feature fair to brown hair with brown eyes and typically have physical heights and builds common to humans.  Nothoiins' appearance has earned their species the nickname of "Goldskins."</p>

        <h3>Society and Culture</h3>

        <p>Although nothoiins hail from their eponymous homeworld and star system in the Anoat Sector, they are ubiquitous throughout the Greater Javin Region and Corporate Sectors.  Their history of interstellar exploration and colonization was facilitated by their species' natural spacefaring abilities in both piloting and navigation and necessitated by their home planet's periodically harsh, dry climate.  Droughts on Nothoiin can last for decades, and the wildfires they foster have served as one of the primary factors behind the limited development of the planet's economy beyond the ur-diamond mining industry, which produces the system's chief export.  </p>

        <p>Large-scale emigration from Nothoiin has led members of its native species to seek careers as pilots, navigators, and operatives in numerous criminal enterprises.  Various nothoiin colonies have given rise to a number of different governmental systems running the gamut from representative democracies to autocracies.</p>

        <h3>Names</h3>

        <p>Nothoiin typically receive a gendered given name and a familial surname.</p>

        <p><strong>Male Names.</strong> Amrosio, Jado, Kosimas, Troov</p>

        <p><strong>Female Names.</strong> Elayah, Giranti, Lorinah, Sil</p>

        <p><strong>Surnames.</strong> Caban, Mordu, Plintus, Starstrider</p>



        <h3>Nothoiin Traits</h3>

        <p>As a nothoiin, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong>  Nothoiin reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Nothoiins tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Nothoiins typically stand between 5 and 6 feet tall and weigh 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Born Pilots.</em></strong> Nothoiins demonstrate seemingly innate piloting abilities from a very young age.  You have proficiency in the Piloting skill.</p>

        <p><strong><em>Expert Navigators.</em></strong> You are considered to have expertise in Wisdom (Survival) checks made to navigate.</p>

        <p><strong><em>Galactic Traveler.</em></strong> You have proficiency in the Lore skill.</p>

        <p><strong><em>Heightened Reflexes.</em></strong> Whenever you make a Dexterity ability check, attack roll, or saving throw, you can choose to add 1d4 to the result. You can use this before or after the roll, but before the GM determines the roll's outcome. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <p><strong><em>Major Miners.</em></strong> Nothoiins have intimate knowledge of ur-diamond mining and refinement practices.  You gain proficiency in your choice of jeweler's implements, scavenging kit, or archaeologist kit.</p>

        <p><strong><em>Starship Specialists.</em></strong> Whenever you make an Intelligence (Technology) check related to starships, you are considered to have expertise in the Technology skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and one language of your choice. You can also communicate via Notho, a native hand language developed by hunters living in the Nothoiin plains.  Usage of Notho is exceedingly rare outside Nothoiin culture.</p>

        <img src='https://www.gmbinder.com/images/NkubbUY.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:267px' />



