  - name: Alternative At-Wills and Extra Attack
    _id: 1eqcG6pblKgM2y9j
    text:
      content: |-
        <h2>Alternative At-Wills and Extra Attack</h2>

        <p></div></p>

        <p>One of my many gripes with 5e is that its cantrips scale with character level. I find that this doesn't make sense both mechanically and logically; if I multiclass 2 levels of fighter and 3 levels of warlock, I don't magically get Extra Attack, but for some reason I can create two beams when I cast <em>eldritch blast</em>. If you want to try alternative at-will power scaling, consider this variant rule.</p>
