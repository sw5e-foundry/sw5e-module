  - name: Gormak
    _id: DKOYOC0mWXZKMR4w
    text:
      content: |-
        <h2>Gormak</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Orange or blue</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Frills on the face and body</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'2"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Voss</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Gormak</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The gormak are green humanoids with flat, noseless faces adorned with frills, collecting in whorls on the sides of their heads. They have clawed, three-fingered, frilled hands, and tend to possess a muscular build. Females are slightly shorter than males and lacked a whorl located above their nose. </p>

        <h3>Society and Culture</h3>

        <p>An aggressive species, the gormak hold an innate love of warfare and competition, and are extremely hostile towards the other natives of their planet, the voss. The gormak hold a belief that in order for them to prosper, the voss, whom they view as a plague on the planet, must be destroyed. To achieve that goal, warriors have repeatedly assaulted the voss capital city over the course of centuries; however, despite their far greater numbers, their nature has kept them from uniting against their enemy. While their society and speech are considered primitive by galactic standards, their innate talent with technology rivals the top minds of the galaxy. From bits of scavenged electronics and equipment, the gormak construct advanced tools, heavy machinery, specialized weapons and even cybernetic implants. However, despite their incredible affinity for technology, the gormak remain a pre-spaceflight culture confined to their homeworld, which causes them to be viewed as a backward species despite being perfectly capable of repairing, modifying and improving tech created by more advanced cultures. </p>

        <h3>Names</h3>

        <p>Gormak are commonly named after heroes of their history by local shamans. Surnames are tribe-based, but optional. </p>

        <p><strong>Male Names.</strong> Damal, Henet, Wockuss, Yryu, Zenit</p>

        <p><strong>Female Names.</strong> Finay, Heidith, Jhekon, Rakva, Sanas</p>

        <p><strong>Surnames.</strong> -Du, -Fo, -Qa, -Ry, -Ve</p>



        <h3>Gormak Traits</h3>

        <p>As a gormak, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Gormaks reach adulthood in their late teens and live for more than a century.</p>

        <p><strong><em>Alignment.</em></strong> Gormaks' warlike nature causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Gormaks typically stand 5 and a half to 6 and a half feet tall and generally weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Adaptive Resilience.</em></strong> Their innate understanding of technology allow gormak to readily adapt to its effects. You have advantage on Strength and Constitution saving throws against tech powers.</p>

        <p><strong><em>Aggressive.</em></strong> As a bonus action, you can move up to your speed toward an enemy of your choice that you can see or hear. You must end this move closer to the enemy than you started.</p>

        <p><strong><em>Claws.</em></strong> Your claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Technological Affinity.</em></strong> You have proficiency in the Technology skill, one vibroweapon and one blaster of your choice, and your choice of armstech's implements, biotech's implements, constructor's implements, mechanic's kits, or tinker's implements. Additionally, you have advantage on Intelligence (Technology) checks made to understand, utilize, or modify technology that you are unaware of or have never seen before.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Gormak. Gormak is primitive and gruff, often lacking definitions for things found outside of their homeworld. </p>

        <img src='https://www.gmbinder.com/images/ThmU0PQ.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:422px;mix-blend-mode:darken' />



