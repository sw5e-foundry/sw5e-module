    text:
      content: |-
        <h4>Chains of Transfixing</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>You can use a bonus action to expend a superiority die. When you do so, choose a creature you can see within 30 feet of you that is no more than one size larger than you. The target must succeed on a Strength saving throw or gain four slowed levels until the start of your next turn.</p>
