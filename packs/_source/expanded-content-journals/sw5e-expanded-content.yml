  - name: Time Bomb
    _id: HmOn6CCuAjCnbNgC
    text:
      content: |-
        <h4>Time Bomb</h4>

        <p><em>1st-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>Make a melee tech attack against a target you touch. On a miss, this power ends. On a hit, you deal 2d6 kinetic damage as you plant an explosive charge on the target's body. You can then detonate the charge as a bonus action, which ends this power. It deals 1d8 fire damage if detonated on the same turn. It deals 2d8 fire damage on your next turn, increasing by 1d8 for each round you do not detonate it, to a maximum of 6d8. If this power ends before you detonate the charge, the target takes no fire damage.</p>

        <p>A creature affected by this power can use an action to attempt to remove the detonator from its person, making a Strength or Dexterity check (the creature chooses the ability to use) against your tech save DC. On a success, this power ends, as the detonator deactivates harmlessly.</p>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the kinetic damage increases by 1d6 for each slot level above 1st.</p>
