  - name: Lurmen
    _id: WaIf8teVJIsHw5e4
    text:
      content: |-
        <h2>Lurmen</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Black or gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Brown to gray</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Yellow or orange</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Prehensile tail and feet, furred body</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>2'11"</td><td>+2d4"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>40 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Mygeeto, Maridun</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Lurmese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Lurmen's bodies are covered entirely in fur, which range in color from a dark brown to a white-gray, though they do wear garments. They can walk either upright on their two legs, and can also use their arms and legs for faster movement. Many lurmen have the ability to roll themselves into a wheeled shape; this allows them to cover distances at great speed. They may have learned this ability from the native amani on Maridun. </p>

        <h3>Society and Culture</h3>

        <p>The lurmen use fallen seedpods from the giant trees as shelter and home. Living near the trees proves too dangerous, as the falling pods can be deadly. Instead, the lurmen drag the pods into a clearing and use them as huts. They also extract essential oils from the pods for nutrition and healing medicines. Most lurmen are pacifistic by nature and refuse to fight or run even in the face of death. They often will hide instead of using violence. As pacifists, they carry no weapons but carry farming tools or ropes. The greatest native threat to the lurmen are the amani and the mastiff phalones, raptor-headed quadrupeds that hunted in groups. However, even in defeating these beasts the lurmen attempt to remain true to their pacifist ideals, and not inflict any injury to the creatures. Instead, when cornered by a mastiff phalone, an agile lurmen will try to unbalance the creature by tying a rope around its stout legs. </p>

        <h3>Names</h3>

        <p>Lurmen names are sharp and made up of a single syllable. Instead of surnames, lurmen are granted additional names based on their importance to the village. Common lurmen possess one name, with leaders having as many as four. </p>

        <p><strong>Male Names.</strong> Fee, Gatt, Nub, Shoo, Yup</p>

        <p><strong>Female Names.</strong> Kal, Laa, Shal, Vook, Yiit</p>



        <h3>Lurmen Traits</h3>

        <p>As a lurmen, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Lurmen reach adulthood in their late teens and live less than 80 years.</p>

        <p><strong><em>Alignment.</em></strong> The pacifistic nature of the lurmen causes them to be neutral light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Lurmen typically stand around 3 feet tall and generally weigh about 45 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Natural Healer.</em></strong> You have proficiency in the Medicine and Nature skills, and the bioanalysis kit.</p>

        <p><strong><em>Prehensile Tail and Feet.</em></strong> You have supreme control over your tail and feet and can use them to manipulate objects as well as your hands. </p>

        <p><strong><em>Rolling Agility.</em></strong> As a lurmen, you can run on all fours, or curl into a ball, to move quickly along the ground. When you move on your turn in combat, you can double your speed until the end of the turn. Once you use this trait, you can't use it again until you move 0 feet on one of your turns. </p>

        <p><strong><em>Treeclimber.</em></strong> You have a climbing speed of 25 feet. You have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing. </p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Lurmese. Lurmese is a name collectively given to the various tribal languages spoken by the lurmen people. While each language is distinct, shared phrases allow translation between dialects. </p>

        <img src='https://www.gmbinder.com/images/twbUZ4y.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:183px;mix-blend-mode:darken' />



