  - name: Long Rest
    _id: aI8ffpB8r8XnNl9H
    text:
      content: |-
        <h3>Long Rest</h3>

        <p>A long rest is a period of extended downtime, at least 2 days long, during which a character sleeps for at least 6 hours each day, and performs light activity, such as reading, talking, eating, or standing watch during the remainder of the long rest. If the rest is interrupted by a period of strenuous activity�fighting, casting powers, at least 4 hours of walking, or similar adventuring activity�the characters must restart the rest to benefit from it.</p>

        <p>At the end of a long rest, a character regains all lost hit points. The character also regains spent Hit Dice, up to a number of dice equal to half of the character's total number of them (minimum of one).</p>

        <p>A character can't benefit from more than one long rest in a 7-day period, and a character must have at least 1 hit point at the start of the rest to gain its benefits.</p>
