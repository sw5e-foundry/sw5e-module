  - name: Instant Translocation
    _id: AHtoWS5zB0govVmo
    text:
      content: |-
        <h4>Instant Translocation</h4>

        <p><em>3rd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you are hit by an attack</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>Your form shimmers in a holographic configuration and collapses as an attack begins to hit you. You have a +5 bonus to AC against the triggering attack. As part of the same reaction, you can then teleport to an unoccupied space within 30 feet of you, and can make one weapon attack with advantage against the attacker.</p>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, the maximum teleport distance increases by 10 for each slot level above 3rd.</p>
