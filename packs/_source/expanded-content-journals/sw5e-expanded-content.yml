  - name: Bonus Proficiencies
    _id: 2IMxKDOGWe89sogF
    text:
      content: |-
        <h2>Bonus Proficiencies</h2>

        <p></div></p>

        <p>Unlike traditional 5e, Star Wars 5e places a significantly greater emphasis on the use of tools. Additionally, Star Wars 5e has substantially more languages than traditional 5e, since it spans an entire galaxy, with hundreds if not thousands of species, each speaking their own language. Using this variant rule, you can add additional proficiencies in tools and languages to your players beyond those offered by their species, class, or background.</p>
