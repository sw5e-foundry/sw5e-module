  - name: Archaeologist Pursuit
    _id: I4ALi6yNNA7XZ6bz
    text:
      content: |-
        <h2>Archaeologist Pursuit</h2>

        <p></div></p>

        <p>Archaeologists are those who study the remnants of historical civilizations. Those scholars who choose the Archaeologist Pursuit are driven by a desire to uncover the past, forming a connection to the lives of those that came before, and unlocking within themselves a connection not just to history, but to the Force itself.</p>

        <h3>Studious Excavator</h3>

        <em><strong>Archaeologist Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency with archaeologist kits and in the Lore skill. Additionally, you can't have disadvantage on checks you make with them.</p>

        <h3>Forcecasting</h3>

        <em><strong>Archaeologist Pursuit:</strong> 3rd level</em><br>

        <p>You have learned powers from your studies of civilizations that were also once close to the Force. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 4 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the Archaeologist Pursuit Forcecasting table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your scholar level, as shown in the Force Points column of the Archaeologist Pursuit Forcecasting table, + your Intelligence, Wisdom, or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Archaeologist Pursuit Forcecasting table.</p>

        <p>You may only cast force powers at 4th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Forcecasting Ability</h4>

        <p>Your forcecasting ability varies based on the alignment of the powers you cast. You use your Intelligence or Wisdom for light side powers (your choice), Intelligence or Charisma for dark side powers (your choice), and Intelligence, Wisdom, or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>

        <div class="sw5e-book-block"><h5>Archaeologist Pursuit Forcecasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Force Powers<br> Known</th><th>Force<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>4</td><td>3</td><td>1st</td></tr><tr><td>4th</td><td>6</td><td>4</td><td>1st</td></tr><tr><td>5th</td><td>7</td><td>5</td><td>1st</td></tr><tr><td>6th</td><td>8</td><td>6</td><td>1st</td></tr><tr><td>7th</td><td>10</td><td>7</td><td>2nd</td></tr><tr><td>8th</td><td>11</td><td>8</td><td>2nd</td></tr><tr><td>9th</td><td>12</td><td>9</td><td>2nd</td></tr><tr><td>10th</td><td>13</td><td>10</td><td>2nd</td></tr><tr><td>11th</td><td>14</td><td>11</td><td>2nd</td></tr><tr><td>12th</td><td>15</td><td>12</td><td>2nd</td></tr><tr><td>13th</td><td>17</td><td>13</td><td>3rd</td></tr><tr><td>14th</td><td>18</td><td>14</td><td>3rd</td></tr><tr><td>15th</td><td>19</td><td>15</td><td>3rd</td></tr><tr><td>16th</td><td>20</td><td>16</td><td>3rd</td></tr><tr><td>17th</td><td>22</td><td>17</td><td>4th</td></tr><tr><td>18th</td><td>23</td><td>18</td><td>4th</td></tr><tr><td>19th</td><td>24</td><td>19</td><td>4th</td></tr><tr><td>20th</td><td>25</td><td>20</td><td>4th</td></tr></tbody></table></div>

        <h3>Archaic Diagnostics</h3>

        <em><strong>Archaeologist Pursuit:</strong> 3rd level</em><br>

        <p>When you analyze a hostile creature, you can use maneuvers that require a weapon attack when you cast a force power that requires a force attack and you can use maneuvers that require a hit with a weapon attack when a creature fails a saving throw against a force power you cast.</p>

        <h3>Force Carving</h3>

        <em><strong>Archaeologist Pursuit:</strong> 6th level</em><br>

        <p>You have unlocked more control over the Force, allowing you to choose wisely who it affects. When you cast a force power that affects other creatures that you can see, you can choose a number of them equal to 1 + the power's level. The chosen creatures automatically succeed on their saving throws against the power, and they take no damage if they would normally take half damage on a successful save.</p>



        <h3>Psychometric Analysis</h3>

        <em><strong>Archaeologist Pursuit:</strong> 9th level</em><br>

        <p>Your strength in the Force and your ability to read the objects around you intensifies. You can use your Critical Analysis to analyze an object of Huge size or smaller that you can see within range. When you do so, you learn whether or not the object is enhanced, cursed, and how old it is. </p>

        <p>Additionally, you can end your Critical Analysis on the object (no action required) to ask it a single question and receive an answer, usually in the form of an auditory or visual hallucination. For example, touching the rusted, broken remains of a lightsaber and asking how it got there may result in a brief vision of a disgruntled Jedi Knight casting it to the ground on that spot. An object �questioned� in this way can only provide information relating to its past. The GM has the final say on what objects can be questioned, and to what extent.</p>

        <p>You can use this feature four times. You gain an additional use at 13th and 17th level. You regain all expended uses when you complete a long rest.</p>

        <h3>Knowledge is Power</h3>

        <em><strong>Archaeologist Pursuit:</strong> 17th level</em><br>

        <p>You gain the ability to steal the knowledge of how to cast a power from another forcecaster. When a hostile creature casts a force power that affects a friendly creature within range of your Critical Analysis feature, and you use your reaction target that friendly creature with your Critical Analysis feature, you can force the creature casting the power to make a Wisdom or Charisma saving throw (your choice) against your universal force save DC. On a successful save, the power is cast as normal.</p>

        <p>On a failed save, you negate the power's effects, and you steal the knowledge of that power if it is at least 1st level and of a level you can cast. For the next 8 hours, you know the power and can cast it using your force points. The creature cannot cast that power again until the 8 hours have passed.</p>

        <p>Once you've used this feature, you cannot use it again until you finish a long rest.</p>

        <h3>Archaeologist Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect your studies into historical civilations. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order. </p>

        <h4>Archive Research</h4>

        <p>Your expeditions have turned up a bevy of knowledge on the force. You learn three at-will force powers of your choice, which don't count against your number of force powers known.</p>



        <h4>Force Combat Knowledge</h4>

        <p>Your research into Jedi and Sith combat techniques has allowed you to gain proficiency in simple lightweapons. Additionally, you gain knowledge of one lightsaber form of your choice.</p>

        <h4>It Belongs in a Museum</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>Your knowledge of antiquities is unparalleled. When you make an Intelligence (Lore) check or an ability check with your archaeologist kit, you may treat any roll of a 9 or lower as a 10.</p>

        <h4>Localized Survey</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>Your affinity for the force allows you to key in to the recent past of an area you enter. When you would expend a use of your Psychometric Analysis, you can instead choose to target your immediate vicinity (up to a 50-foot cube) and investigate for at least 1 minute. For each minute you investigate, you see visions of recent events in the area going back a number of days equal to your scholar level, you learn about one significant event, beginning with the most recent. </p>

        <p>You can investigate in this way for a number of minutes equal to your scholar level and must maintain concentration during that time, as if you were concentrating on a power. </p>

        <p>Once you've used this feature, you can't use it again until you complete a short or long rest.</p>

        <h4>Making This Up As You Go</h4>

        <em><strong>Prerequisite:</strong> 17th level</em><br>

        <p>You may now cast force powers at 4th-level twice between rests. </p>

        <h4>Telekinetic Ministrations</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You can cast the <em>telekinesis</em> force power at 5th level without spending force points.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h4>The Years and the Mileage</h4>

        <p>Your archaeological studies have taken you all across the galaxy. While you are the target of your Critical Analysis feature, you can use your universal forcecasting ability instead of Wisdom when making Insight or Survival checks.</p>

        <h4>Tomb of the Ancients</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>As a reaction when you take damage, you can entomb yourself in the Force until the end of your next turn. For the duration, you have resistance to the triggering damage, you gain temporary hit points equal to 1d10 + your universal forcecasting ability modifier + your scholar level to potentially absorb the attack, and your speed is reduced to 0.</p>

        <p>Once you've used this feature, you can't use it again until you finish a short or long rest. </p>



