  - name: Features That Grant Critical Saves
    _id: NrIgWzGjBfXxT7qi
    text:
      content: |-
        <h3>Features That Grant Critical Saves</h3>

        <p>Certain features, such as the Explosives fighting style or the Heavy Weapon Specialization feat, grant the ability for certain saving throws to deal critical damage. If you are using this variant rule, instead have them expand the critical hit range by 1. For instance, while using this variant rule, a character with the Explosives fighting style would have a critical hit range of 2 on their grenades. Consequently, creatures that roll a 1 or a 2 on the saving throw against their grenades would critically fail their saves.</p>

        <p>Additionally, you can consider allowing weapons with the keen property to increase the critical hit range of their burst or rapid properties.</p>
