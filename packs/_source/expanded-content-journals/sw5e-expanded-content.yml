  - name: Damage Dice Ammo Size
    _id: N29yKJm7P143o65T
    text:
      content: |-
        <h3>Damage Dice Ammo Size</h3>

        <p>Slug cartridges and power cells are each broken down into five size categories, from Tiny to Huge. These new sized ammunitions only fit in weapons that utilize certain damage values, as shown in the below table.</p>

        <table class="sw5e-book-table"><thead><tr><th>Ammo Size</th><th>Damage Dice</th></tr></thead><tbody><tr><td>Tiny</td><td>d4</td></tr><tr><td>Small</td><td>d6</td></tr><tr><td>Medium</td><td>d8/2d4</td></tr><tr><td>Large</td><td>d10</td></tr><tr><td>Huge</td><td>d12/2d6/3d4</td></tr></tbody></table>

        <p>For those weapons with alternative damage types, you'll want to treat their damage as one step higher. Ion damage should be two steps higher or twice the weapon's damage, whichever is lower.</p>

        <p>For instance, a blaster which deals 1d8 energy damage would use Medium power cells, while a blaster that deals 1d4 kinetic damage would use Tiny slug cartridges. A blaster that deals 1d4 fire damage, however, would use Small power cells (since we treat that damage as one step higher), as would a blaster that deals 1d3 ion damage (since we treat that damage as two steps higher).</p>
      format: 1
