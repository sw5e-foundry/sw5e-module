  - name: Balosar
    _id: JfJJ5UhKq8cCWsR7
    text:
      content: |-
        <h2>Balosar</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Pale</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, blond, orange, brown, white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Varies</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Antennapalps, resistance to toxins</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'8"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Balosar</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Balosur</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Physically similar to humans, balosars appear to be sickly and gaunt when compared with the galaxy's most common species due to the heavy pollution of their homeworld. The most striking difference between balosars and humanity is a pair of antennapalps which sprouts from underneath the thick, coarse hair on their skulls. Retractable, these atennapalps allow them to listen into the subsonic range and give the species physical intuition and preternatural reflexes, which members of the Jedi Order sometimes mistook for Force-sensitivity. Balosars also possess an acute tolerance for poisonous substances, a byproduct of life on their toxic homeworld.</p>

        <h3>Society and Culture</h3>

        <p>Early in its history, the balosar homeworld was overrun by galactic megacorporations eager to exploit the world's lax ecological protection laws. The planet was home to the balo mushroom, a key ingredient in death sticks, one of the galaxy's most infamous narcotics. After its discovery, Balosar was wrought with corruption, addiction, and pollution from the production and usage of death sticks.</p>

        <p>Since there is little opportunity to flourish on their homeworld, balosars often leave in search of fortune elsewhere. Their natural resistance to the lethal�but not the addictive�effects of the drug encourages some to enter the death stick business.</p>

        <h3>Names</h3>

        <p>Balosar names have a slight exotic tinge to them�often because Balosar parents name their children while on a death stick high. Their surnames are familial.</p>

        <p><strong>Male Names.</strong> Barin, Elan, Fantes, Zerba </p>

        <p><strong>Female Names.</strong> Delaana, Ferrika, Reki, Vetyl </p>

        <p><strong>Surnames.</strong> Cher'dak, Mer'darro, Sel'Sabagno</p>

        <br>

        <h3>Balosar Traits</h3>

        <p>As a balosar, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Balosars reach adulthood in their late teens and live about 70 years naturally, though death stick addiction has lead to a general decline in their lifespan.</p>

        <p><strong><em>Alignment.</em></strong> Balosars are notoriously cynical, selfish, and pragmatic, causing most to be neutral dark side. However, there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Balosar stand at an average height of about 5 feet, and weigh about 115 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Keen Hearing.</em></strong> Your antennapalps give you advantage on Wisdom (Perception) checks based on hearing.</p>

        <p><strong><em>Snap Senses.</em></strong> Through your antennapalps, you can sense incoming danger and react accordingly. When you roll for initiative, you can choose to gain advantage on the roll. Alternatively, if you are surprised, you may act normally on your first turn. Once you've used this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Spicer.</em></strong> You are proficient in spicer's kit.</p>

        <p><strong><em>Toxin Resistance.</em></strong> You have advantage on saving throws against poison, and you have resistance against poison damage (explained in chapter 9).</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Balosur. Balosur is known by its throaty rasps and deep vocalizations, and is considered crude as a written language.</p>

        <img src='https://www.gmbinder.com/images/Lm4fmbM.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:266px' />



