  - name: Student
    _id: EAOCMD3ygg6bs8VQ
    text:
      content: |-
        <h2>Student</h2>

        <p>As a child, you were inquisitive when your playmates were possessive or raucous. In your formative years, you found your way to one of the galaxy's great institutes of learning, where you were apprenticed and taught that knowledge is a more valuable treasure than gold or gems. Now you are ready to leave your home- not to abandon it, but to quest for new lore to add to its storehouse of knowledge.</p>

        <p>The most well-known of the galaxy's fonts of knowledge is the Library of the Republic. The great library is always in need of workers and attendants, some of whom rise through the ranks to assume roles of greater responsibility and prominence. You might be one of Coruscant's own, dedicated to the curatorship of what is likely the most complete body of lore and history in all the world.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Lore, Investigation, and Nature</li><li><strong>Languages:</strong> Two of your choice</li><li><strong>Equipment:</strong> A set of common clothes, a datapad and 10 data cards, a book on the subject of your current study, and a pouch containing 100 cr</li></ul>

        <h3>Feature: Library Access</h3>

        <p>Though others must often endure extensive interviews and significant fees to gain access to even the most common archives in your library, you have free and easy access to the majority of the library, though it might also have repositories of lore that are too valuable, powerful, or secret to permit anyone immediate access.</p>

        <p>You have a working knowledge of your cloister's personnel and bureaucracy, and you know how to navigate those connections with some ease.</p>

        <p>Additionally, you are likely to gain preferential treatment at other libraries across the galaxy, as professional courtesy shown to a fellow scholar.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>1</td><td>Loremaster</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>4</td><td>Naturalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Keen Mind</td></tr><tr><td>7</td><td>Observant</td></tr><tr><td>8</td><td>Healer</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Cloistered scholars are defined by their extensive studies, and their characteristics reflect this life of study. Devoted to scholarly pursuits, they value knowledge highly � as a worthy goal in itself, or as a means to a desirable end.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I use polysyllabic words that convey the impression of great erudition.</td></tr><tr><td>2</td><td>I've read every book in the world's greatest libraries�or I like to boast that I have.</td></tr><tr><td>3</td><td>I'm used to helping out those who aren't as smart as I am, and I patiently explain anything and everything to others.</td></tr><tr><td>4</td><td>There's nothing I like more than a good mystery.</td></tr><tr><td>5</td><td>I'm willing to listen to every side of an argument before I make my own judgment.</td></tr><tr><td>6</td><td>I... speak... slowly... when talking... to idiots,... which... almost... everyone... is... compared... to me.</td></tr><tr><td>7</td><td>I am horribly, horribly awkward in social situations.</td></tr><tr><td>8</td><td>I'm convinced that people are always trying to steal my secrets.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Knowledge.</strong> The path to power and self-improvement is through knowledge. (Neutral)</td></tr><tr><td>2</td><td><strong>Beauty.</strong> What is beautiful points us beyond itself toward what is true. (Light)</td></tr><tr><td>3</td><td><strong>Logic.</strong> Emotions must not cloud our logical thinking. (Lawful)</td></tr><tr><td>4</td><td><strong>No Limits.</strong> Nothing should fetter the infinite possibility inherent in all existence. (Chaotic)</td></tr><tr><td>5</td><td><strong>Power.</strong> Knowledge is the path to power and domination. (Dark)</td></tr><tr><td>6</td><td><strong>Self-Improvement.</strong> The goal of a life of study is the betterment of oneself. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>It is my duty to protect my students.</td></tr><tr><td>2</td><td>I have an ancient text that holds terrible secrets that must not fall into the wrong hands.</td></tr><tr><td>3</td><td>I work to preserve a library, university, scriptorium, or monastery.</td></tr><tr><td>4</td><td>My life's work is a series of tomes related to a specific field of lore.</td></tr><tr><td>5</td><td>I've been searching my whole life for the answer to a certain question.</td></tr><tr><td>6</td><td>I sold my soul for knowledge. I hope to do great deeds and win it back.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am easily distracted by the promise of information.</td></tr><tr><td>2</td><td>Most people scream and run when they see a monster. I stop and take notes on its anatomy.</td></tr><tr><td>3</td><td>Unlocking an ancient mystery is worth the price of a civilization.</td></tr><tr><td>4</td><td>I overlook obvious solutions in favor of complicated ones.</td></tr><tr><td>5</td><td>I speak without really thinking through my words, invariably insulting others.</td></tr><tr><td>6</td><td>I can't keep a secret to save my life, or anyone else's.</td></tr></tbody></table>



