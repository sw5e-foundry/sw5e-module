  - name: Death and Destiny
    _id: WAVCgPI4UUc8sQeT
    text:
      content: |-
        <h3>Death and Destiny</h3>

        <p>Achieving one's destiny may yield great benefits, but the path of destiny can be perilous. Many characters in the <em>Star Wars</em> saga perish attempting to fulfil their destinies. If a Force-sensitive character dies while fulfilling (or attempting to fulfil) their destiny, the GM may allow the dead character to manifest as a Force spirit. If a non-force-wielder perishes while pursuing or achieving his destiny, the GM may decide that the character's sacrifice or untimely death imparts some benefit upon his surviving allies.</p>

        <p><strong>Force Spirit.</strong> A force-wielder who dies in the process of fulfilling his destiny may manifest as a Force spirit. For a light side force-wielder, this means transforming into a translucent blue spirit that can appear before his former allies. For a dark side force-wielder, this means becoming an evil dark side spirit that can linger on, continuing to spread the influence of the dark side.</p>

        <p>If a Force sensitive character dies while fulfilling their destiny, that character may become a Force spirit, retaining their consciousness (and their Intelligence, Wisdom and Charisma scores) but becoming completely incorporeal. The Force spirit can menifest at will and can vanish just as easily. It can also walk through walls and exist in the vacuum of space. Additionally, Force spirits can travel anywhere in the galaxy instantly with a mere thought. However, Force spirits have no substance and cannot interact physically with creatures or objects in the universe.</p>

        <p>When a hero dies and becomes a Force spirit, that Force spirit might serves as a guide, advising heroes in times of dire need and sharing valuable information or wisdom it held in life.</p>

        <p><strong>Noble Sacrifice.</strong> Whenever a character willingly sacrifices himself for a noble cause, particularly while fulfilling his destiny he can bolster the resolve of his surviving comrades and allies. For example, when Arvel Crynyd crashed his A-wing into the bridge of the Executor, it was a turning point in the Battle of Endor. When a character dies fulfilling his destiny in such a way, all allies within the same star system gain one destiny point.</p>



        <p>&emsp;<strong>Vengeance.</strong> When a valued ally falls in the pursuit of his destiny, it can have powerful effects on those present at the time of his death. When a character dies fulfilling his destiny, any ally who witnesses his death may choose to become filled with a desire to avenge their fallen comrade, gaining a destiny point. Since revenge leads to the dark side, any force-wielder who chooses to gain this bonus must immediately increase his Corruption score by 1.</p>



