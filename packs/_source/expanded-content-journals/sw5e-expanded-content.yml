  - name: Insurgent
    _id: BCOr4LWgwA5em5OM
    text:
      content: |+
        <h2>Insurgent</h2>

        <p></div></p>

        <p>Have enemies? Good, that means you stood for something at some time in your life. For you, that was taking a stand against the status quo back home. Whether it was against scheming merchant lords or an oppressive autocracy, you made your voice heard to push for change...and perhaps its the reason why you're now adventuring, having left your home to gather allies or flee retribution. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Persuasion, Stealth, or Technology</li><li><strong>Tool Proficiencies:</strong> One type of artisan's implements, disguise kit, or forgery kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> One set of tools in which you are proficient, a set of traveler's clothes, and a belt pouch containing 100 cr</li></ul>

        <h4>Form of Protest</h4>

        <p>Every insurgent has a method to their madness when it comes to rebelling against the authorities. Choose a form of protest or roll on the table below.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Dissent Method</th></tr></thead><tbody><tr><td>1</td><td>I create subversive artwork that I leave in public places.</td></tr><tr><td>2</td><td>I actively vandalize property of my homeland's rulers.</td></tr><tr><td>3</td><td>I agitate the common people to unite against the rulers.</td></tr><tr><td>4</td><td>I work within the system, leaking private information.</td></tr><tr><td>5</td><td>I organize secret meetings of enemies of the state.</td></tr><tr><td>6</td><td>I publish written critiques against the my rulers.</td></tr><tr><td>7</td><td>I investigate and expose corruption in government.</td></tr><tr><td>8</td><td>I publicly condemn the ruling class.</td></tr></tbody></table>

        <h3>Feature: Rebel Kinship</h3>

        <p>You are part of a network of fellow insurgents. Although you may not always agree on the methods of dissent with your fellow members, they are willing to create distractions in public, provide safe passage, and inform you of the patrol routes of guards, the military and other law enforcement in the cities and territories in which they are active. </p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Charmer</td></tr><tr><td>3</td><td>Stealthy</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Alert</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Insurgents live a life on the move, thinking one step ahead of the their pursuers, whether law enforcement at home or spies abroad. They might be calm in tense situations or stressed by the pressures facing them.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>Nothing is immune to criticism, whether the king, the Force, or the price of bread.</td></tr><tr><td>2</td><td>I will go out of my way to help the downtrodden and subjugated.</td></tr><tr><td>3</td><td>I keep a collection of political writings and posters I find, just in case I need them.</td></tr><tr><td>4</td><td>I am hardened in my resolve, no setback, no challenge will break it.</td></tr><tr><td>5</td><td>I like to walk through public places and people watch.</td></tr><tr><td>6</td><td>People are not entitled to their opinion, they are entitled to their <em>informed</em> opinion.</td></tr><tr><td>7</td><td>I will  spend a good amount of time rehearsing my talking points and my zingers.</td></tr><tr><td>8</td><td>I'm passionate about what I do to the point that I forget the day has finished.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Change.</strong> The status quo is broken and must be reformed. (Any)</td></tr><tr><td>2</td><td><strong>Morality.</strong> Those in power have an obligation to help everyone, not just the few. (Light)</td></tr><tr><td>3</td><td><strong>Justice.</strong> The law is the law, those in power are not above it. (Lawful)</td></tr><tr><td>4</td><td><strong>Power.</strong> We must overcome doubt and achieve our goals, by any means necessary. (Dark)</td></tr><tr><td>5</td><td><strong>Freedom.</strong> We must  liberate ourselves from those who would seek to chain us to tradition. (Chaotic)</td></tr><tr><td>6</td><td><strong>Order.</strong> Without authority, we fall into disarray. (Lawful)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My fellow comrades fighting for change are a second family to me.</td></tr><tr><td>2</td><td>An agent of the regime is responsible for all my suffering. I will get my revenge on them one day.</td></tr><tr><td>3</td><td>I possess secret information vital to my movement, I cannot let the enemy obtain it.</td></tr><tr><td>4</td><td>Despite all of its problems, I love my homeland.</td></tr><tr><td>5</td><td>Someone helped me escape certain execution, I owe them my life.</td></tr><tr><td>6</td><td>There are letters out there that will help bring down those in power. I will stop at nothing to obtain them.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am certain I am being hunted and am mistrusting towards those who offer me help.</td></tr><tr><td>2</td><td>I just <em>have</em> to bring up politics at the dinner table.</td></tr><tr><td>3</td><td>I view people who won't fight for what they believe in as cowards.</td></tr><tr><td>4</td><td>I frequently misrepresent or stereotype those with views different than me.</td></tr><tr><td>5</td><td>I struggle to empathize with those who will be hurt by the changes I want to bring.</td></tr><tr><td>6</td><td>I adamantly refuse to change my mind and dismiss evidence that contradicts my beliefs.</td></tr></tbody></table>

