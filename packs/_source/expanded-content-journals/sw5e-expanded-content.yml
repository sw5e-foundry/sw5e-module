  - name: Bartender
    _id: 4vEy6UgGHHWGSKpr
    text:
      content: |-
        <h2>Bartender</h2>

        <p></div></p>

        <p>Sometimes you want to go where everybody knows your name and they're always glad you came. As a bartender, you're a charismatic fellow that knows how to deal with people. Whether you're the life of the party or simply an ear for someone who needs advice, people from all walks of life are drawn to your trustworthy nature.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Intimidation, Medicine, or Persuasion</li><li><strong>Tool Proficiencies:</strong> Brewer's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, a brewer's kit, and a belt pouch containing 150 cr</li></ul>

        <h3>Feature: Social Lubricant</h3>

        <p>You have no trouble finding and getting into places that serve drinks. While drinking in a social establishment, strangers take a liking to you and feel comfortable enough to share gossip.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Threatening</td></tr><tr><td>3</td><td>Medic</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Observant</td></tr><tr><td>8</td><td>Snappy Interjection</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>A bartender's demeanor ranges from jovial to downright rude. Regardless, all bartenders know how to take care of business�they break up fights, kick out drunk patrons, and offer honest counsel to people down on their luck.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I'm always looking for a good time with good company.</td></tr><tr><td>2</td><td>I earnestly enjoy offering advice.</td></tr><tr><td>3</td><td>Even in a social atmosphere, I always feel alone.</td></tr><tr><td>4</td><td>I live vicariously through the people I meet and the stories I hear.</td></tr><tr><td>5</td><td>I'm everyone's outlet but sometimes I just want to punch them in their thoughtless face.</td></tr><tr><td>6</td><td>If you're looking for a fight, I'll give you one.</td></tr><tr><td>7</td><td>TI know how to calm people down, but I also know how to rile them up.</td></tr><tr><td>8</td><td>It's not all fun and games. Business needs to run smoothly, whatever that might be.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Cheer</strong>. Spreading joy is my passion. (Light)</td></tr><tr><td>2</td><td><strong>Guidance</strong>. It's our duty to help others. (Lawful)</td></tr><tr><td>3</td><td><strong>Legacy</strong>. We have only one chance to write our story. Do what you will and make it count. (Chaotic)</td></tr><tr><td>4</td><td><strong>Manipulation</strong>. Drunk people are the most vulnerable and can easily be taken advantage of. (Dark)</td></tr><tr><td>5</td><td><strong>People</strong>. It's always good to meet and connect with new people. (Any)</td></tr><tr><td>6</td><td><strong>Honesty</strong>. If I call you a nerf herder, it means I like you. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My cantina means everything to me. It brings back important memories from my past.</td></tr><tr><td>2</td><td>Brewing is my craft. My art brings people together.</td></tr><tr><td>3</td><td>The regular patrons of my cantina are like family to me.</td></tr><tr><td>4</td><td>I want to be successful. Whatever it takes.</td></tr><tr><td>5</td><td>Alcohol is all I ened, and sometimes all I want.</td></tr><tr><td>6</td><td>I've met so many people while staying in the same place. I need my own story to tell.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I can always go for another round. The gutter is my second home.</td></tr><tr><td>2</td><td>I judge people that don't drink to be antisocial and untrustworthy.</td></tr><tr><td>3</td><td>Party animals and depressed people make me feel bitter about my life.</td></tr><tr><td>4</td><td>Whenever life gets hard, I drink my problems away.</td></tr><tr><td>5</td><td>I need to know everyone's story.</td></tr><tr><td>6</td><td>I curse more than a kriffing sailor.</td></tr></tbody></table>



