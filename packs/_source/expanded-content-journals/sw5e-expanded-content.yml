  - name: Path of the Corsair
    _id: HxivGKCjpCzL7QRr
    text:
      content: |+
        <h2>Path of the Corsair</h2>

        <p>There may come a time when a sentinel finds themselves stranded, hunted, or in any situation where they must hide their nature as a force wielder. Those sentinels who follow the Path of the Corsair make use of alternative weaponry not commonly associated with force-wielders to great effect.</p>

        <h3>Scavenger's Reach</h3>

        <em><strong>Path of the Corsair:</strong> 3rd level</em><br>

        <p>You learn the <em>force disarm</em> force power, which does not count against your total powers known. Additionally, you can use Double Strike Force-Empowered Self option to deal kinetic damage when you cast it as your action and the target fails its save. Finally, when you cast the <em>force disarm</em> force power, disarm a blaster weapon, and catch it, you can reload the weapon as a part of the same action.</p>

        <h3>Corsair Weapons</h3>

        <em><strong>Path of the Corsair:</strong> 3rd level</em><br>

        <p>You can use the force to quickly learn the use of unfamiliar weapons. When you hold a weapon that you are not proficient in, you can spend 1 force point (no action required) to gain proficiency with that weapon until the end of your next long rest. </p>

        <p>Additionally, when you throw a grenade, you can use Wisdom or Charisma instead of Strength when determining your throwing range.</p>

        <h3>Force-Empowered Detonators</h3>

        <em><strong>Path of the Corsair:</strong> 7th level</em><br>

        <p>You learn to infuse a number of small detonators with the Force. Over the course of a short or long rest, you can create a number of detonators equal to your Wisdom or Charisma modifier (your choice, minimum of one). Your detonators can only be used by you, and they lose their potency at the end of your next short or long rest.</p>

        <p>As a bonus action on each of your turns, you can throw one of your detonators at a point within range. Your detonators have a range equal to 30 feet + your Wisdom or Charisma modifier x 5. Make a universal ranged force attack. On a hit, the detonator adheres to the target, and if the target is a Large or smaller creature, it is pushed back 5 feet. On a miss, it falls to the ground. Hit or miss, the detonator then explodes. The target and each creature within 5 feet must make a Dexterity saving throw against your universal force save DC. If the detonator adhered to a target, the creature has disadvantage on the saving throw. A creature takes force damage using your Kinetic Combat die + your Wisdom or Charisma modifier (your choice) on a failed save, or half as much on a successful one.</p>



        <h3>Energized Kinetics</h3>

        <em><strong>Path of the Corsair:</strong> 13th level</em><br>

        <p>Once per turn, when you deal damage with a Force-Empowered Detonator or your Double Strike feature, you can deal additional damage using your Kinetic Combat die. The damage type is force, lightning, necrotic, or psychic (your choice).</p>

        <h3>Disorienting Detonations</h3>

        <em><strong>Path of the Corsair:</strong> 18th level</em><br>

        <p>When a creature fails the saving throw against your Force-Empowered Detonators feature, you can spend 2 force points to subject it to the effects of one of the following force powers: <em>affliction, force blind/deafen, stun,</em> or <em>stun droid</em>. They automatically fail the saving throw for the selected power, but the effects only last until the end of your next turn.</p>

        <img src='https://www.gmbinder.com/images/GSI1y6J.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:400px' />

