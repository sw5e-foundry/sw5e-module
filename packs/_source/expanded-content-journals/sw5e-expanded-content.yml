  - name: Way of Negation
    _id: UOGg3t44znLicULU
    text:
      content: |+
        <h2>Way of Negation</h2>

        <p>Some force users seek mastery over the fundamentals of energy manipulation, known as tutaminis. Those consulars who follow the Way of Negation harness this power to limit the havoc that other force-wielders might wreak.</p>

        <h3>Force Deflection</h3>

        <em><strong>Way of Negation:</strong> 3rd level</em><br>

        <p>When you fail a saving throw, you can use your reaction to gain a bonus to that saving throw equal to your Wisdom or Charisma modifier (your choice, minimum of +1).</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the consular table. You regain all expended uses when you finish a long rest.</p>

        <h3>Power Surge</h3>

        <em><strong>Way of Negation:</strong> 6th level</em><br>

        <p>You learn to simultaneously limit a creature's force powers and store that power within yourself to later strengthen your damaging force powers.</p>

        <p>You can store a maximum number of power surges equal to your Wisdom or Charisma modifier (your choice, minimum of one). Whenever you successfully end a force power with a power such as <em>force suppression</em> or <em>sever force</em>, or use your Force Shield or Force Deflection features to successfully avoid an attack or succeed on a saving throw, you gain one power surge, as you redirect the flow of the Force into yourself. </p>



        <p>&emsp;Once per turn, when you deal damage to a creature or object with a force power, you can spend one power surge to deal extra damage to that target. The extra damage is of the same type as the power's damage, and it equals half your consular level.</p>

        <p>Whenever you finish a long rest, your number of power surges resets to one. If you end a short rest with no power surges, you gain one power surge.</p>

        <h3>Enduring Focus</h3>

        <em><strong>Way of Negation:</strong> 10th level</em><br>

        <p>You can casually deflect attacks while channeling your power. While you are concentrating on a Force power, you have a +2 bonus to your AC and all saving throws.</p>

        <p>Additionally, you can extend your Force Deflection to a creature within 5 feet of you when they fail a saving throw.</p>

        <h3>Conflux</h3>

        <em><strong>Way of Negation:</strong> 14th level</em><br>

        <p>When you use your Force Deflection feature, you can cause a ripple in the Force to expand from you. Up to three creatures of your choice that you can see within 60 feet of you each take force damage equal to half your consular level.</p>

        <h3>Tutaminis Mastery</h3>

        <em><strong>Way of Negation:</strong> 18th level</em><br>

        <p>When you use a Force-Empowered Casting option, you can spend a power surge to use it without spending additional force points. </p>

        <img src='https://www.gmbinder.com/images/pq3knax.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:1050px' />

