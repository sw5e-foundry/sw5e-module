  - name: Land Stride
    _id: F3ptYk7EVKnbcJNL
    text:
      content: |-
        <h4>Land Stride</h4>

        <p><em>1st-level light side power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (40-foot radius)</li><li><strong>Duration:</strong> 8 hours</li></ul>

        <p>You align yourself with nature, making traversing natural environments far easier. For the duration, your movement and that of creatures of your choice within 40 feet of you can't be slowed by natural terrain, such as mud, rocky ground, vines, or tall grass. Climbing still costs double normal movement. A creature that receives this bonus leaves behind no traces of its passage.</p>
