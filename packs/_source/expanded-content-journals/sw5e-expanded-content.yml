  - name: Rattataki
    _id: 5DCje4fV5amqwGTB
    text:
      content: |-
        <h2>Rattataki</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Chalk-white</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown, grey or white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Grey or white</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Near-human features, white skin, usually with a bald head, often tattooed</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'4"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>90 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Rattatak</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Rattataki</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Rattataki are a near-human species characterized by their nimble movements, chalk-white skin and oft-bald heads. Virtually isolated from the rest of the galaxy, the Rattataki developed a violent society on their home planet of Rattatak, which involves extensive gladiatorial combat. </p>

        <h3>Society and Culture</h3>

        <p>While most other inhabitants of Rattatak came from the Unknown Regions, there are a significant number of off-worlder mercenaries who come to Rattatak from time to time, likely to view or participate in gladiatorial combat, only to be stranded there permanently. The remarkably harsh conditions on the planet nearly drove its population to extinction. For eons, the Rattataki constantly battled amongst themselves and their fellow inhabitants (represented primarily by Humans, Zabraks, Siniteens, Vollick, and Weequay) over the planet's limited resources. Despite being nearly completely isolated from the outside galaxy, the Rattataki displayed remarkable initiative and continually created new ways to kill each other.</p>

        <p>Rattataki culture is bloody and unforgiving. Punishment for even the smallest crimes is unnecessarily harsh, which does little to quell that behavior. In fact, Rattataki who are known to commit crimes without being caught are celebrated.</p>

        <h3>Names</h3>

        <p>Rattataki names are harsh sounding and short. Surnames are familial, though many Rattataki abandon them in favor of self-aggrandizing titles.</p>

        <p><strong>Male Names.</strong> Aidus, Charnagus, Karok, Veran</p>

        <p><strong>Female Names.</strong> Amaran, Kassien, Silas, Sraja, Vol</p>

        <p><strong>Surnames.</strong> Anjek, Danvik, Degger, Kolla, Venkorr</p>



        <h3>Rattataki Traits</h3>

        <p>As a rattataki, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Dexterity or Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Rattataki reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Rattataki are self-serving and violent which causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Rattataki typically stand about 5 and a half feet tall and weigh 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 35 feet.</p>

        <p><strong><em>Acrobatic.</em></strong> You have proficiency in Acrobatics.</p>

        <p><strong><em>Intimidating.</em></strong> You have proficiency in Intimidation.</p>

        <p><strong><em>Surprise Attack.</em></strong> If you surprise a creature and hit it with an attack on your first turn in combat, the attack deals an extra 2d6 damage to it. You can use this trait only once per combat.</p>

        <p><strong><em>Unarmed Combatant.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Rattataki. Rattataki is known for have an inordinate amount of curses.</p>

        <img src='https://www.gmbinder.com/images/YcTaYbs.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:242px' />



