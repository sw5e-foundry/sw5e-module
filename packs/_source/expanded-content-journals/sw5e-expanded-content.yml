  - name: Ho'din
    _id: G3deBrwgLcLuTgce
    text:
      content: |-
        <h2>Ho'din</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green, yellow, blue, orange</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Red-violet</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Snake-like "hair", suction-cupped fingers</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>7'10"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>150 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Moltok</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Ho'Din</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Ho'dins are tall humanoids with multi-colored skin, naturally webbed and suction cup-tipped fingers and toes, and temperature-sensing red-violet "snake hair". Ho'dins are, on average, over nine feet tall�nearly a full head taller than wookiees. Renowned throughout the galaxy as botanists and healers, the ho'din claim an ancestry derived from the plants of their home planet, Moltok�in fact, "ho'din" translates as "walking flower" in Galactic Basic. They are, in fact, reptilian, as their natural climbing skills and cold-bloodedness seem to indicate, and boast a second heart to enhance their survivability. Their "snake hair" is temperature-sensitive, allowing ho'din to sense changes in ambient temperature.</p>

        <h3>Society and Culture</h3>

        <p>Ho'dins are known to be self-conscious and vain, particularly when it comes to their looks and their work, and do not take criticism or insults well. Their religion, Dinante Fli'R, is centered around worshipping and communing with nature, a trait that has sent many ho'din out into the galaxy to rejuvenate damaged planets. The ho'din have an aversion to technology and avoid surface mining and manufacturing, opting instead to dwell in trees. They have learned to make incredibly advanced pharmaceuticals and gardens using their botanical skills to concoct natural medicines, some of which have cured plagues on distant worlds. The title of "Master Gardener" is one of high esteem and great respect in ho'din society.</p>

        <h3>Names</h3>

        <p>Ho'din names are quite diverse. Some names look complicated and difficult to pronounce, while others are quite simple. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Baji, Gra'tau, Iwo, Oojoh, Thrung, Vala</p>

        <p><strong>Female Names.</strong> Chela, Kutu, Lohje, Par'tah, Sirta, Tal</p>

        <p><strong>Surnames.</strong> Alewune, Kulko, Oolos, Plett, Ustu, Wen</p>



        <h3>Ho'Din Traits</h3>

        <p>As a ho'din, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Ho'din reach adulthood in their early 30s and live up to 120 years.</p>

        <p><strong><em>Alignment.</em></strong> Ho'dins' benevolent nature causes them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Ho'din are taller than most species, typically standing 8 to 10 feet tall and generally weighing about 275 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet. </p>

        <p><strong><em>Biological Specialists.</em></strong> You have proficiency with Medicine or Survival (your choice).</p>

        <p><strong><em>Cold Sensitivity.</em></strong> You have disadvantage on Constitution saving throws made to avoid exhaustion due to extreme cold.</p>

        <p><strong><em>Crafters.</em></strong> You have proficiency with with one artisan's implements of your choice.</p>

        <p><strong><em>Naturalist.</em></strong> You have proficiency in the Nature skill.</p>

        <p><strong><em>Rain Forest Dweller.</em></strong> Growing up in the rain forests of Moltok has left an impact. You don't treat forest terrain as difficult terrain.</p>

        <p><strong><em>Reptilian Senses.</em></strong> Whenever you make a Wisdom (Perception) check related to sensing heat, you are considered to have expertise in the Perception skill.</p>

        <p><strong><em>Second Heart.</em></strong> When you are reduced to 0 hit points but not killed outright, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>

        <p><strong><em>Treeclimber.</em></strong> You have a climbing speed of 30 feet. You have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, and Ho'Din. Ho'Din consists of croaks and hisses. Its written form includes characters derived from the shapes of Moltok flora. The Ho'Din lexicon includes a great amount of plant-based idioms and metaphors.</p>

        <img src='https://www.gmbinder.com/images/jxHayK4.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:231px' />



