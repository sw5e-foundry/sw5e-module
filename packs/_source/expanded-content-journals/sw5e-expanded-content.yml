  - name: Gotal
    _id: KAH6tXo7O3SpTHBT
    text:
      content: |-
        <h2>Gotal</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Grey, brown, or black</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>White, grey, or brown</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red, orange, yellow, grey, green, or black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Full body fur, flat noses, head cones</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'5"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>120 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Antar 4</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Antarian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        Gotals possess cranial horns as receptors to sense electromagnetism and other energy emissions. These nerve-ending filled cones can sense the natural electromagnetic fields produced by Antar 4's<br> magnetite-rich crust, allowing the species to operate<br> even in total darkness. Their senses also pick up the<br> electromagnetic auras from other life forms. When<br> close to their hunting targets, they can ascertain<br> information on its mood, awareness, and state of<br> mind. Electronic devices can also be sensed by Gotals;<br> in fact, most droids give off enough electromagnetic<br> emissions to at least annoy a Gotal, and at worst to<br> seriously disorient the horned beings, making them<br> notoriously distrustful of droids. Gotals rely heavily on<br> their cones, with their eyesight and hearing being<br> quite weak, and their sense of smell almost completely<br> absent. 

        <h3>Society and Culture</h3>

        Since their natural empathy makes them instantly sensitive to the feelings of others, Gotals have little use for government or laws on their homeworld, resulting in problems when dealing with other societies. No central authority figure can speak for Antar 4 as a<br> whole in a crisis, and no organized Gotal military or<br> police force can act on their behalf. Other species<br> respect the Gotals for their discretion and restraint, but<br> some individuals fear interacting with the horned<br> beings for fear of having their emotional state revealed<br> to others.

        <h3>Names</h3>

        <p>Gotal names are quite guttural, though there are also many harsher tones within their names. Gotal names do not vary significantly based on gender, and surnames are familial. </p>

        <p><strong>First Names.</strong> Thon, Fern, Fuu'rash, Jir, Vluphol</p>

        <p><strong>Surnames.</strong> Gratlul, Klux, Vathon, Zilat, Krigh, Rahxem</p>



        <h3>Gotal Traits</h3>

        <p>As a Gotal, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and one other ability score of your choice increases by 1.</p>

        <p><strong><em>Age.</em></strong> Gotals reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Gotals' polite and respectful nature causes them to tend toward lawful alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Gotals typically stand 6 to 7 feet tall and generally weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Energy Sensors.</em></strong> Gotals perceive the environment around them through use of electromagnetic sensors held in their cranial horns. You have blindsight out to 30 feet. If another trait would grant you blindsight, the range is increased by half as many feet. </p>

        <p><strong><em>Hunter.</em></strong> You are proficient in Survival. </p>

        <p><strong><em>Natural Empathy.</em></strong> Gotal's electromagnetic sensors allow them to sense the emotions in those around them. You have advantage on Wisdom (Insight) checks to determine emotions against humanoids and beasts within 10 feet of you.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Antarian. The Antarian language is characterized by growls and clicking noises at various volumes. </p>

        <img src='https://www.gmbinder.com/images/v8Y9W1o.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:380px' />



