  - name: Whills Order
    _id: ZgkiN5QoYicZ98V3
    text:
      content: |+
        <h2>Whills Order  </h2>

        <p>Monks of the Whills Order hold the secrets of the Force sacred, and dedicate their lives to defending ancient  knowledge of the Force and its artifacts. They master the use of ranged weapons, often crafting their own weapons in respectful admiration of the Jedi tradition of crafting lightweapons.</p>

        <h3>Flurry of Light</h3>

        <em><strong>Whills Order:</strong> 3rd level</em><br>

        <p>You gain proficiency in blaster pistols, blaster rifles, ion pistols, ion rifles, and the lightbow, which are your Whills weapons and are monk weapons for you. When you are wielding a Whills weapon, you gain the following benefits:</p>

        <ul><li>Your Whills weapons count as melee weapons for you, and when you make a melee weapon attack with them, you deal kinetic damage equal to your Martial Arts Damage Die.</li><li>When you would make an unarmed strike<br> using your Martial Arts bonus action<br> or as a part of<br> your<br> Flurry of Blows, you can instead attack with a Whills weapon you are wielding. You roll a d4 in place of the normal damage of your Whills weapon when attacking in this way. This die changes as you gain monk levels, as shown in the Martial Arts column of the monk table.</li><li>When you would make a ranged weapon attack with a Whills weapon, you can instead reload the weapon.</li></ul>

        <h3>The Force is With You</h3>

        <em><strong>Whills Order:</strong> 6th level</em><br>

        <p>As you channel the Force through you, you gain the following benefits:</p>

        <ul><li>You can use your Stunning Strike feature when you hit with a ranged weapon attack while you are wielding a Whills weapon. </li><li>You can spend up to 3 focus points to reduce partial cover by one step (from three-quarters to half or half to one-quarter). If you reduce the target below one-quarter cover, you ignore cover bonuses entirely. At 17th level, you can spend 3 focus points to ignore total cover, as long as your target is not hidden from you. </li><li>When you hit a creature with a Whills weapon, that creature has disadvantage on opportunity attacks against you until the start of your next turn.</li></ul>

        <h3>One With the Force</h3>

        <em><strong>Whills Order:</strong> 11th level</em><br>

        <p>You learn how to enter a trance, preparing to unleash yourself upon your enemy. While in this trance, you can still talk and move. If you stay in the trance for at least one minute, when you roll initiative, you can make a ranged weapon attack on a number of creatures up to your focus ability modifier (a minimum of one) within 30 feet of you when you were in this trance.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>



        <h3>Guided Strikes</h3>

        <em><strong>Whills Order:</strong> 17th level</em><br>

        <p>Your first ranged weapon attack and your first melee weapon attack each turn deal additional damage equal to your focus ability modifier (a minimum of +1).</p>

        <img src='https://www.gmbinder.com/images/2yB0wp5.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:810px' />

