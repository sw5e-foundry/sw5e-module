        <h4>Charge, Fragmentation (Average)</h4>

        <em><strong>Consumable</strong> (explosive), <font style="color:green"><strong>premium</strong></font></em><br>

        <p>A device used to blow holes in larger constructs and structures, a breaching charge creates a devastating explosion focused in a specific direction. Installing a breaching charge takes 1 minute. The charge can be set with a 6-second timer, or detonated remotely using a remote detonator.</p>

        <p>When detonated, the breaching charge explodes in a 15-foot cone. Each creature within the cone must make a DC 16 Dexterity saving throw, taking 20d6 kinetic on a failed save or half as much on a successful one. If affixed to a creature, that creature has disadvantage on the saving throw. Objects, structures, and other surfaces have disadvantage on the saving throw. If affixed to the object, structure, or surface, it instead automatically fails this saving throw.</p>

