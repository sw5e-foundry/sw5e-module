  - name: Anomid
    _id: U2AZpO4qDcrEUtzR
    text:
      content: |-
        <h2>Anomid</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Translucent violet to light purple</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, gray, or white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Opalescent; yellow or blue</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>No vocal cords, six-fingered hands</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'8"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Yablari</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Anomid Sign Language</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Anomid are a species of humanoids with translucent, purple-hued skin that is smooth but wrinkles with age. They have large, slender hands with six fingers on each: two end fingers, two center fingers and two thumbs, with a sharp claw on each. The fingers are paired in twos and slightly spaced apart from the others. The eyes of the anomids are solid, with no visible irises or pupils and have been seen in varying shades of yellow or blue. The anomids have pointed, fin-like ears that protrude from the sides of their heads. Anomid hair is often long and well kept, and is always found in shades of black, gray or white.</p>

        <h3>Society and Culture</h3>

        <p>Anomids almost always wear elaborate masks which cover most of their faces. These are not breath masks, but vocalizer units. Since anomids have no vocal cords, they rely on these vocalizer masks to communicate with other species. These masks are often elaborately customized to reflect an anomid's social status, family origin, or profession. Among themselves, anomids communicate using an elaborate sign language. Anomid sign language requires six-fingered hands, which makes it difficult for humans or human-programmed protocol droids to use.</p>

        <p>Anomid civilization has a long history of pacifism and technical achievement. In fact, most Anomids are pacifists�historians believed that no major wars have ever been fought in the Yablari system.</p>

        <h3>Names</h3>

        <p>Anomid names are usually one or two syllables long, featuring hard consonants. Female names are often softer, with a greater flow to them. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Arkis, Jarak, Magris, Vell </p>

        <p><strong>Female Names.</strong> Apharis, Eralie, Siphanie, Ulaniye </p>

        <p><strong>Surnames.</strong> Dekan, Krest, Narroc, Quill, Wode</p>



        <h3>Anomid Traits</h3>

        <p>As an anomid, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Anomid reach adulthood in their late teens and live a little under a century.</p>

        <p><strong><em>Alignment.</em></strong> Anomid's pacifistic culture causes them to tend toward light alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Anomid typically stand 5 to 6 feet tall and generally weigh about 120 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Agricultural Exports.</em></strong> Whenever you make an Intelligence (Nature) or Intelligence (Technology) check related to food, agriculture, or agricultural technology, you are considered to have expertise in the skill.</p>

        <p><strong><em>Tech Dabbler.</em></strong> You know the <em>minor hologram</em> at-will tech power. When you reach 3rd level, you learn and can cast the <em>repair droid</em> tech power once per long rest. When you reach 5th level, you learn and can cast the <em>hold droid</em> tech power once per long rest. Your techcasting ability is Intelligence. You require use of a wristpad for these powers.</p>

        <p><strong><em>Tech Resistance.</em></strong> Growing up around technology leaves an impact on anomid. You have advantage on Dexterity and Intelligence saving throws against tech powers.</p>

        <p><strong><em>Tech Savant.</em></strong> You have proficiency in the Technology skill.</p>

        <p><strong><em>Vocalizer.</em></strong> Anomid have no vocal cords, and rely on a vocalizer to communicate with other species. If your vocalizer is removed or destroyed, you cannot speak.</p>

        <p><strong><em>Wealthy.</em></strong> During character creation, you start with additional credits equal to your level x your proficiency bonus x 1,000 cr.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic through the use of your vocalizer. You can also use Anomid Sign Language, which is an elaborate language requiring six-fingered hands.</p>

        <img src='https://www.gmbinder.com/images/qQvZOKy.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:160px' />



