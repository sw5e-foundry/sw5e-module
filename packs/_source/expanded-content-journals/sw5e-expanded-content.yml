  - name: Aging Thresholds
    _id: Gkz8buvEeYUpj3HN
    text:
      content: |-
        <h3>Aging Thresholds</h3>

        <p>Every species ages at a different rate. While many near-human species age at the same rate as humans, reaching adulthood in their late teens, middle age in their 40's, elderly in their late 50's to early 60's, and venerability in their 70's, other species age differently. For instance, lanniks reach adulthood in their 50's and can live up to 900 years, while hutts aren't considered adults until they reach 200 years old and can live to be over a thousand.</p>

        <p>Consequently, rather than tying aging to numbers, we instead establish three thresholds: Middle-Age, Elderly, and Venerable. Each time a character reaches one of these thresholds, they gain one or more aging quirks and one or more aging boons, determined by the threshold they've reached. When they do so, the GM can determine choose which quirk and boon they get, or determine it randomly, using the Aging Quirks and Aging Boons tables below:</p>

        <h5>Aging Quirks</h5>

        <table class="sw5e-book-table"><thead><tr><th>d4</th><th>Quirk</th></tr></thead><tbody><tr><td>1</td><td>Your Strength score decreases by 1. Your maximum for this score decreases by 1.</td></tr><tr><td>2</td><td>Your Dexterity score decreases by 1. Your maximum for this score decreases by 1.</td></tr><tr><td>3</td><td>Your Constitution score decreases by 1. Your maximum for this score decreases by 1.</td></tr><tr><td>4</td><td>Your base walking speed decreases by 5 feet.</td></tr></tbody></table>

        <h5>Aging Boons</h5>

        <table class="sw5e-book-table"><thead><tr><th>d4</th><th>Boon</th></tr></thead><tbody><tr><td>1</td><td>Your Intelligence score increases by 1. Your maximum for this score increases by 1.</td></tr><tr><td>2</td><td>Your Wisdom score increases by 1. Your maximum for this score increases by 1.</td></tr><tr><td>3</td><td>Your Charisma score increases by 1. Your maximum for this score increases by 1.</td></tr><tr><td>4</td><td>You gain proficiency in a language, skill, tool, or weapon of your choice.</td></tr></tbody></table>

        <p>These effects are cumulative. When a middle-aged character, who has one quirk and one boon, becomes elderly, they gain two more quirks and two more boons, for a total of three of each. Additionally, duplicates are only rerolled at separate thresholds. If, at middle-age, your Strength score decreased by 1, your Strength score could again decrease by 1 at elderly.</p>

        <h4>Middle-Aged</h4>

        <p>Most species enter middle age about halfway through their expected life. For humans and near-humans, this is typically in their 40's, while lanniks don't reach middle age until about 400 years, and hutts at about 600 years. When a character reaches middle age, the GM should choose one quirk and one boon. Alternatively, they can determine the quirk and boon randomly. </p>

        <h4>Elderly</h4>

        <p>Like middle age, at which age a species becoming elderly also varies. For humans and near-humans, this is typically in their late 50's to early 60's, while lanniks are considered elderly at about 600, and hutts at about 750 years. When a character becomes elderly, the GM should choose two quirks and two boons. Alternatively, they can determine the quirks and boons randomly, rerolling any duplicates.</p>

        <h4>Venerable</h4>

        <p>Venerable members of a species are rare and typically revered by the younger members of their species. Humans and near-humans become in their 70's, lanniks at about 750, and hutts over the age of 900. When a character becomes venerable, the GM should choose three quirks and three boons. Alternatively, they can determine the quirks and boons randomly, rerolling any duplicates.</p>

        <h4>Additional Aging Traits</h4>

        <blockquote><p>Some species gain additional traits as they age. For instance, hutts have the unique special characteristic in that they never stop growing from birth to death. The GM can add quirks and boons as appropriate for members of those species. </p></blockquote>

