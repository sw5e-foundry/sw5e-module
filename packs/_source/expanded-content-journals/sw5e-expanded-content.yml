  - name: Saber Assault
    _id: 2Jq5qRWYxFbZpCAf
    text:
      content: |-
        <h4>Saber Assault</h4>

        <p><em>1st-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Saber Ward</li><li><strong>Casting Time:</strong> Special</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>

        <p>The first time you take the Attack action during your turn, you can simultaneously cast this power to blend your melee weapon attacks with the use of the Force. For each successful hit you make with a melee weapon before the power ends, the target must make a Dexterity saving throw or have a new effect apply until the end of its next turn. Once you've made three weapon attacks, the power ends.</p>

        <ul><li><strong>1st Hit:</strong> If the target fails its saving throw, it gains 1 slowed level until the end of its next turn.</li><li><strong>2nd Hit:</strong> If the target fails its saving throw, it takes 1d6 kinetic damage and cannot take reactions until after the end of its next turn.</li><li><strong>3rd Hit:</strong> If the target fails its saving throw, it takes 2d6 kinetic damage and cannot take bonus actions during its next turn.</li></ul>

        <p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, the damage of the second and third hit each increase by 1d6 for every two slot levels above 1st.</p>
