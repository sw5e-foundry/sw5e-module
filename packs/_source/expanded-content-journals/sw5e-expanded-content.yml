  - name: Replacing Powers
    _id: LcuDqwtphoDDOI2a
    text:
      content: |-
        <h2>Replacing Powers</h2>

        <p></div></p>

        <p>Often a player might feel restricted because they made a bad power choice, and they don't want to wait until their next level up to do so. If this is a mechanic that suits your players, consider using the following variant rule.</p>

        <p>Each time a character completes a long rest, they can attempt to take one power they know and replace it with another power, as long as that power is not of a higher level than their Max Power Level. If the character knows both force and tech powers, those powers can only be replaced with another force or tech power, respectively. </p>

        <p>The character immediately unlearns the power they are trying to replace, and then must make a force- or tech-casting ability check (using Wisdom or Charisma as appropriate, depending on force power alignment) with proficiency. The DC of the check varies depending on the level of the power the character is attempting to learn, as shown in the Power Level Check DC table below.</p>

        <h5>Power Level Check DC</h5>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>Power <br>Level</th><th>Check <br>DC</th></tr></thead><tbody><tr><td>0</td><td>10</td></tr><tr><td>1</td><td>14</td></tr><tr><td>2</td><td>16</td></tr><tr><td>3</td><td>18</td></tr><tr><td>4</td><td>20</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>Power <br>Level</th><th>Check <br>DC</th></tr></thead><tbody><tr><td>5</td><td>22</td></tr><tr><td>6</td><td>24</td></tr><tr><td>7</td><td>26</td></tr><tr><td>8</td><td>28</td></tr><tr><td>9</td><td>30</td></tr></tbody></table></div>

        <p>On a success, the new power is learned. On a failure, the new power is not learned, the old power is still forgotten, and the character can't try again until their next long rest.</p>

        <p>When attempting to replace a power, if the character currently has a vacant power known slot, they do not need to first unlearn a power before attempting to fill that slot.</p>

