  - name: Equipment
    _id: TzR1UQZq9vmYlulG
    text:
      content: "<h1>Equipment</h1>\n\n<div class=\"sw5e-book-block\"><h5>Blasters</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| |:---|---:|:---|-:|:---| | <em>Simple Blasters</em>||||| | <em>Martial Blasters</em>||||| | &emsp;Torpedo launcher        | 10,000 cr&nbsp;&nbsp;   | — | 25 lb&nbsp;&nbsp; | Ammunition (range 1,200/3,600), reload 1, special, strength 15,<br> two-handed |</p>\n\n<h5>Lightweapons</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| |:---|---:|:---|-:|:---| | <em>Simple Lightweapons</em>||||| | <em>Martial Lightweapons</em>||||| | &emsp;Saber gauntlet         | 1,300 cr&nbsp;&nbsp; | 1d8 energy   |  2 lb&nbsp;&nbsp; | Finesse, fixed, luminous | | &emsp;Buster saber         | 7,777 cr&nbsp;&nbsp; | 1d12 energy   |  15 lb&nbsp;&nbsp; | Dexterity 19, heavy, keen 1, luminous, reach, two-handed, vicious 1 | | &emsp;Cross-saber         | 5,500 cr&nbsp;&nbsp; | 2d4 energy   |  13 lb&nbsp;&nbsp; | Dexterity 15, double (2d4 energy), heavy, luminous, reach, two-handed | </p>\n\n<h5>Vibroweapons</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| |:---|---:|:---|-:|:---| | <em>Simple Vibroweapons</em>||||| | <em>Martial Vibroweapons</em>||||| | &emsp;Disguised blade\t\t|  200 cr&nbsp;&nbsp;|1d4 kinetic\t\t|1 lb&nbsp;&nbsp;|Disarming, disguised, finesse, light\t| | &emsp;Hooked vibroblade      |   700 cr&nbsp;&nbsp; | 1d6 kinetic  |  6 lb&nbsp;&nbsp; | Disarming, finesse | | &emsp;Jagged vibroblade      |   500 cr&nbsp;&nbsp; | 1d8 kinetic  |  5 lb&nbsp;&nbsp; | Dexterity 13, dire 1, versatile (1d10), vicious 1 | | &emsp;Riot baton          |  350 cr&nbsp;&nbsp;|1d6 kinetic|4 lb&nbsp;&nbsp;|Defensive 1, light| | &emsp;Riot shocker        |  750 cr&nbsp;&nbsp;|1d4 kinetic|4 lb&nbsp;&nbsp;|Defensive 1, light, shocking 13| | &emsp;Shock whip\t\t\t|  500 cr&nbsp;&nbsp;|1d4 kinetic\t\t|3 lb&nbsp;&nbsp;|Reach, shocking 13| | &emsp;Vibrobattleaxe         | 1,200 cr&nbsp;&nbsp; | 1d12 kinetic | 15 lb&nbsp;&nbsp; | Dexterity 13, heavy, two-handed | | &emsp;Vibrobuster         | 7,777 cr&nbsp;&nbsp; | 1d12 kinetic   |  15 lb&nbsp;&nbsp; | Dexterity 19, heavy, keen 1, reach, two-handed, vicious 1 | | &emsp;Vibroclaymore       |1,050 cr&nbsp;&nbsp;|3d4 kinetic|14 lb&nbsp;&nbsp;|Dexterity 13, two-handed| | &emsp;Vibroglaive            | 1,250 cr&nbsp;&nbsp; | 1d10 kinetic | 13 lb&nbsp;&nbsp; | Dexterity 13, heavy, reach, two-handed |</p></div>\n\n<h3>Special Weapons</h3>\n\n<p>Weapons with special rules are described to below.</p>\n\n<h4>Torpedo Launcher</h4>\n\n<p>Rather than traditional power cells, the torpedo launcher fires specialized projectiles in the form of torpedoes. Torpedo launchers have advantage on attack rolls against Gargantuan creatures and disadvantage on attack rolls again Large and smaller creatures. Unlike other weapons, the torpedo launcher can only be loaded using an action, and you don't add your Dexterity modifier to damage rolls you make with it.</p>\n\n<p>Before firing the torpedo launcher, you must first use your action to deploy it. While deployed, your speed is reduced by half. You can collapse the torpedo launcher as a bonus action.</p>"
