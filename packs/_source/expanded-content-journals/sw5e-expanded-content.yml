  - name: Chadra-Fan
    _id: NfN5iD23utaCj5JU
    text:
      content: |-
        <h2>Chadra-Fan</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, brown, or grey</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, brown, or grey</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Dark</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Large ears, flat noses with four nostrils</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>2'8"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>35 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Chad</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Chadra-Fan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Chadra-Fan are covered from head to foot in fur. Their species evolved from small, arboreal rodents. The two different sexes of Chadra-Fan are indistinguishable to other species, though the Chadra-Fan could readily tell the difference using their powerful sense of smell. Chadra-Fan also have involuntary pheromones that conveyed information about their family line and created an aura of attractiveness. Other voluntary pheromones often conveyed a Chadra-Fan's state of emotion-anger, fear, or joy. Chadra-Fan even create more complex messages using their pheromones, though the pheromones when mixed sometimes caused confusion. They are unique in the fact that they had clear blood.</p>

        <h3>Society and Culture</h3>

        <p>The society of Chadra-Fan is divided into a clan structure in which every member is responsible for parenting the clan's children; a fact of life is that every household is open at any time. Leadership within the clan is a temporary role that is passed from one individual to another as the situation calls for a particular expertise. Children are the centerpiece of a Chadra-Fan community, and only leave when wed. However the new Chadra-Fan couple remain with the smaller clan so it was possible that a Chadra-Fan never leaves his or her home.</p>

        <p>Chadra-Fan left by themselves suffer depression, so they regularly seek the company of others; thus, Chadra-Fan are not very picky when it came to friends and prefer complete strangers to loneliness</p>

        <h3>Names</h3>

        <p>Chadra-Fan names do not vary significantly based on sex. Surnames are clan based.</p>

        <p><strong>First Names.</strong>  Dubi, Kattar, Naska, T'yabah, O'yasha</p>

        <p><strong>Surnames.</strong> Abalomm, Fandy, Nemm, Nuz, Yedit</p>



        <h3>Chadra-Fan Traits</h3>

        <p>As a chadra-fan, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Chadra-Fan reach adulthood by 15 and live an average of 40 years.</p>

        <p><strong><em>Alignment.</em></strong> Chadra-Fan's open, clan-based culture cause them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Chadra-Fan stand 3-4 feet tall and weigh about 45 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Climb.</em></strong> You have a climbing speed of 25 feet.</p>

        <p><strong><em>Keen Hearing and Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve hearing or smell.</p>

        <p><strong><em>Second Heart.</em></strong> When you are reduced to 0 hit points but not killed outright, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>

        <p><strong><em>Tinker.</em></strong> You have proficiency with tinker's implements. You can use these and spend 1 hour and 100 cr worth of materials to construct a Tiny Device (AC 5, 1 hp). You can take the Use an Object action to have your device cause one of the following effects: create a small explosion, create a repeating loud noise for 1 minute, create smoke for 1 minute, emit an onerous smell for 1 minute. You can maintain a number of these devices up to your proficiency bonus at once, and a device stops functioning after 24 hours away from you. You can dismantle the device to reclaim the materials used to create it.</p>

        <p><strong><em>Trance.</em></strong> You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Chadra-Fan. The Chadra-Fan language is characterized as being nasally and squeaky.</p>

        <img src='https://www.gmbinder.com/images/o7JpUfj.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:180px' />



