  - name: Saber Onslaught
    _id: ABt2KJGTf5tUGKbr
    text:
      content: |-
        <h4>Saber Onslaught</h4>

        <p><em>4th-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Saber Strike</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 turn</li></ul>

        <p>You assume a battle stance. Until the end of your turn, your movement does not provoke opportunity attacks. Additionally, whenever you move, you can make one melee weapon attack against each creature you move within 5 feet of for the first time this turn. On a hit, the attack deals an extra 1d6 damage of the weapon's type, and the target must make a Strength saving throw. On a failed save, you can choose to either knock the target prone, or push it 5 feet away from you.</p>

        <p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 5th level or higher, the bonus weapon damage increases by 1d6 for each slot level above 4th.</p>
