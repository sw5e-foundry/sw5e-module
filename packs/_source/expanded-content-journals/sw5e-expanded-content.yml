  - name: Umbaran
    _id: 8QN5P08N5MahRJaO
    text:
      content: |-
        <h2>Umbaran</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Pale grey or white</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Blue tinted skin and sunken, colorless eyes</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'11"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>105 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Umbara</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Umbaran</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        Umbarans, called the "Shadow People" by some, are a<br> near-human species characterized by their pale, bluish<br> skin and colorless, sunken eyes. Their homeworld,<br> Umbara, is situated deep within the Ghost Nebula, and<br> receives almost no direct light from the planet's<br> primary star. As a result, Umbaran eyes are well-<br>adjusted to seeing in low light, and can see into the<br> ultraviolet spectrum, but can be disoriented by bright<br> light.

        <h3>Society and Culture</h3>

        <p>Umbaran society is strictly divided into a leveled caste system, with most Umbarans constantly scheming to improve their social rank, using tactics such as blackmail, subterfuege, and even assassination if necessary. Only those within the ten highest caste tiers were given opportunities to leave their homeworld. Because of the cutthroat machinations required to get there, Umbarans in the wider galaxy are known as skilled, ruthless politicians. This reputation is enhanced by the Umbarans' talents for reading and influencing the emotions of others.</p>

        <p>Umbara developed its own technological advances separate from galactic society, and possessed technology that was in many fields far more advanced than the galactic standard. </p>

        <h3>Names</h3>

        <p>Umbaran names are typically no more than one or two syllables. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Mee, Pir, Nyss, Moshenu  </p>

        <p><strong>Female Names.</strong> Sly, Syll, Myn, Sata </p>

        <p><strong>Surnames.</strong> Deechi, Moore, Phobi, Nenn</p>



        <h3>Umbaran Traits</h3>

        <p>As an umbaran, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Charisma or Wisdom score increases by 1. </p>

        <p><strong><em>Age.</em></strong> Umbarans reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Umbarans' desire to improve their social standing at all costs causes them to tend towards chaos, though there are exceptions</p>

        <p><strong><em>Size.</em></strong> Umbarans typically stand 5 to 6 feet tall and generally weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Superior Darkvision.</em></strong> You've lived most of your life without direct sunlight. You can see in dim light within 120 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Umbaran Specilization.</em></strong> You have proficiency in one of the following skills: Insight, Technology, Deception, or Perception.</p>

        <p><strong><em>Tech Dabbler.</em></strong> You know the <em>ward</em> at-will tech power. When you reach 3rd level, you learn and can cast the <em>analyze</em> tech power once per day. When you reach 5th level, you can also cast the <em>infiltrate</em> tech power once per day. Intelligence is your techcasting ability for these powers. You do not require use of a wristpad for these powers.</p>

        <p><strong><em>Shadow People.</em></strong> You can attempt to hide even when you are only lightly obscured by dim light.</p>

        <p><strong><em>Sunlight Sensitivity.</em></strong> You have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in direct sunlight.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Umbaran. Umbaran is characterized by its blending of technical jargon with informal language. It is rarely spoken off Umbara.</p>

        <img src='https://www.gmbinder.com/images/YlmtHY7.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:213px' />



