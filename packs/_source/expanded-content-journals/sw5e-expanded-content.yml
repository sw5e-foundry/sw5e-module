  - name: Kushiban
    _id: 8vg1VwwC0vckCISF
    text:
      content: |-
        <h2>Kushiban</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>White to light gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Typically white but varies based on<br> mood</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Typically blue, brown, or green</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Lagomorph, nimble, resilient</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>2'11"</td><td>+2d4"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>35 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Kushibah</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Kushiban</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Kushibans are four-limbed lagomorphs native to the planet Kushibah. They are diminutive, unimposing, and typically weaker than most humanoids, but they are also quite difficult to track due to their natural speed and stealth.</p>

        <p>While Kushibans are quadrupeds, their forepaws are as manipulative as traditional hands. While kushibans can walk on two legs, they typically run around on four feet since they can move significantly faster that way. </p>

        <p>Kushibans are inherently cute and fuzzy, and more nefarious species often attempt to take them as slaves. Kushibans are social and do not take well to slavery, and they typically don't live long in solitude or captivity. </p>

        <h3>Society and Culture</h3>

        Kushibans live in a simple, peaceful society on the non-<br>industrialized, lush green planet of Kushibah in the Outer Rim. Kushibans are typically kind and generous, with a playful sense of humor and a penchant for practical jokes. However, if betrayed or angered, Kushibans can be cruel or vindictive, and they have little patience for bullies, simpletons, and misanthropes.

        <h3>Names</h3>

        <p>Kushiban names are a single word combining both their first and familial names.</p>

        <p><strong>Male Names.</strong> Cerlyk, Etyk, Mabbik, Tieko, Widdimur</p>

        <p><strong>Female Names.</strong> Asani, Pritsi, Sibble, Mirax</p>



        <h3>Kushiban Traits</h3>

        <p>As a Kushiban, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Kushibans reach adulthood at 13 and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Kushibans' playful nature causes them to tend toward chaotic light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Kushibans typically stand 3 and a half to 4 feet tall and weigh around 40 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Grovel, Cower, and Beg.</em></strong> As an action on your turn, you can cower pathetically to distract nearby foes. Until the end of your next turn, your allies gain advantage on attack rolls against enemies within 10 feet of you that can see you. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 12 + your Dexterity modifier. Additionally, your thick hide is naturally adapted to cold climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Mask of the Wild.</em></strong> You can attempt to hide even when you are only lightly obscured by foliage, heavy rain, falling snow, mist, and other natural phenomena.</p>

        <p><strong><em>Nimble Agility.</em></strong> Your reflexes and agility allow you to move with a burst of speed. When you move on your turn in combat, you can double your speed until the end of the turn. Once you use this trait, you can't use it again until you move 0 feet on one of your turns.</p>

        <p><strong><em>Stealthy.</em></strong> You are proficient in the Stealth skill.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kushiban. Kushiban has a bubbly, joyful tone to it.</p>

        <img src='https://www.gmbinder.com/images/ktFY3mY.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:272px' />



