  - name: Unarmed Strikes/Natural Weapons
    _id: Pom1pFGENVTyNUZG
    text:
      content: |-
        <h3>Unarmed Strikes/Natural Weapons</h3>

        <p>Many species come with higher unarmed strike damage, such as twi'lek or zabrak, or a natural weapon, such as chevin or karkarodons, representing their natural aptitude with unarmed combat. If a player chooses a species, class, or customization option combination that would both grant an increased unarmed strike, consider instead granting them a +1 bonus to their unarmed strike damage. For instance, at 1st level, a zabrak monk with a 16 in Dexterity would do 1d4+4 instead of 1d4+3 with their unarmed strikes. A character should only gain this bonus once.</p>

        <p>Additionally, consider allowing those species that have natural weapons to use those weapons in place of their unarmed strikes, as appropriate.</p>
