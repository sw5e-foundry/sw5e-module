  - name: Shii-Cho Form
    _id: XZF9CUwskLW814lj
    text:
      content: |+
        <h2>Shii-Cho Form</h2>

        <p>Shii-Cho Form, also known as Determination Form, uses wild, unpredictable attacks designed to distract and disarm their foes. Those guardians who focus on Shii-Cho Form make seemingly random, yet deliberate, attacks to knock their opponents off-balance.</p>

        <h3>Form Basics</h3>

        <em><strong>Shii-Cho Form:</strong> 3rd level</em><br>

        <p>You gain the Shii-Cho lightsaber form, detailed in Chapter 6 of the Player's Handbook. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Sarlaac</h3>

        <em><strong>Shii-Cho Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter a frenetic stance for one minute. While in this stance, the first time you hit a creature with a melee weapon attack on your turn, it has disadvantage on the next melee attack roll it makes against you before the start of your next turn. Additionally, if that creature is within 5 feet of you, it must make a Strength saving throw (DC = 8 + your proficiency bonus + your Strength or Dexterity modifier). On a failed save, it is pushed back 5 feet, and you can immediately move into the space it just vacated without provoking opportunity attacks.</p>

        This effect ends early if you are incapacitated<br> or die. Once you've used this feature, you can't<br> use it again until you finish a long rest.

        <h3>Channel the Force</h3>

        <em><strong>Shii-Cho Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>Disarming Slash</h4>

        <p>When you hit a creature with a melee weapon attack, you can expend a use of your Channel the Force (no action required)  to attempt to disarm the target, forcing it to drop one item of your choice that it's holding. The creature must make a Strength saving throw. On a failed save, it drops the object you choose. If you are within 5 feet of the target, and you have a free hand, you can catch the item. Otherwise, the object lands at its feet.</p>

        <h3>Unpredictable Motion</h3>

        <em><strong>Shii-Cho Form:</strong> 7th level</em><br>

        <p>While you are wielding a light- or vibro-weapon, opportunity attacks against you are made at disadvantage.</p>

        <h3>Sarlaac Sweep</h3>

        <em><strong>Shii-Cho Form:</strong> 15th level</em><br>

        <p>When a creature moves to within 5 feet of you, you can use your reaction to make a melee weapon attack against that creature. If the attack hits, you can attempt to damage another creature within 5 feet of the original target and within your reach. If the original attack roll would hit the second creature, it takes damage equal to your Strength or Dexterity modifier (your choice). The damage is of the same type dealt by the original attack.</p>



        <h3>Master of Determination</h3>

        <em><strong>Shii-Cho Form:</strong> 20th level</em><br>

        <p>The erratic fluidity of your movement confounds even the most determined of foes. Your Strength or Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for these scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic, energy, and ion damage from weapons.</li><li>Attack rolls made against you can't have advantage.</li><li>When more than one creature is within 5 feet of you, you gain a bonus to your Armor Class equal to the number of creatures within 5 feet of you, up to your Wisdom or Charisma modifier (your choice, minimum of one).</li><li>When you use your Sarlaac Sweep feature, you have advantage on the attack roll, and you can apply the bonus damage to every creature within 5 feet of you.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/LKsiRge.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:550px' />

