  - name: Exhibition Specialist
    _id: ZEZjEU4ktuddlIl5
    text:
      content: |-
        <h2>Exhibition Specialist</h2>

        <p></div></p>

        <p>Those fighters who choose to become Exhibition Specialists can't help but show off. Even where there isn't an audience, these warriors take command of the battlefield as though it were a stage.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Exhibition Specialist:</strong> 3rd level</em><br>

        <p>You gain proficiency in one Charisma skill of your choice.</p>

        <h3>In The Spotlight</h3>

        <em><strong>Exhibition Specialist:</strong> 3rd level</em><br>

        <p>You can overwhelm an opponent with your unique blend of skill and style. As a bonus action, you can choose one creature you can see within 30 feet of you. The target is marked for 1 minute. While the target is marked, you gain the following benefits:</p>

        <ul><li>You can add half your Charisma modifier (minimum of one) to any weapon damage roll you make against the marked target that doesn't already include that modifier.</li><li>Your critical hit range against the marked target increases by 1.</li><li>If the marked target is reduced to 0 hit points, you regain hit points equal to your fighter level + your Charisma modifier (minimum of 1).</li></ul>

        <p>This effect ends early if you're incapacitated or die. Once you've used this feature, you can't use it again until you finish a short or long rest. </p>

        <h3>Showoff</h3>

        <em><strong>Exhibition Specialist:</strong> 3rd, 5th, 9th, 13th, and 17th level</em><br>

        <p>You're a master at dazzling your friends and enemies alike. When you would make a Strength, Dexterity, Constitution, or Charisma  check, you can roll a d4 and add it to the roll. On a success, you can immediately choose a number of creatures within 30 feet of you that can see you up to your Charisma modifier (no action required, minimum of one). Each creature must succeed on a Wisdom saving throw (DC = 8 + your proficiency bonus + your Charisma modifier) or be charmed by you. This effects ends on a target after 1 minute, if it takes any damage, if you attack it, or if it witnesses you attacking or damaging any of its allies. If a target succeeds on this saving throw, the target has no hint you tried to charm it.</p>

        <p>This die increases to 1d6 at 5th level, 1d8 at 9th level, 1d10 at 13th level, and 1d12 at 17th level.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Glory Kill</h3>

        <em><strong>Exhibition Specialist:</strong> 7th level</em><br>

        <p>As you defeat your enemies in combat, you can weaken the morale of other foes or bolster the resolve of your allies alike. When you score a critical hit or reduce a creature to 0 hit points, you can choose one or more creatures that you can see within 30 feet of you, up to a number equal to your Charisma modifier (minimum of one creature). Each of the chosen </p>

        <p>creatures are affected by one of the following effects of your choice:</p>

        <ul><li>The creature gains temporary hit points equal to 1d6 + your Charisma modifier (minimum of 1 temporary hit point).</li><li>The creature must succeed on a Wisdom saving throw (DC = 8 + your proficiency bonus + your Charisma modifier) or be frightened of you until the start of your next turn.</li></ul>

        <h3>Relentless Competitor</h3>

        <em><strong>Exhibition Specialist:</strong> 10th level</em><br>

        <p>Once on each of your turns, you can regain a use of your Action Surge (no action required). If you do so, you immediately suffer one level of exhaustion.</p>

        <h3>Glorious Defense</h3>

        <em><strong>Exhibition Specialist:</strong> 15th level</em><br>

        <p>Your glory on the battlefront can misdirect attacks. When a creature you can see hits you with an attack roll, you can use your reaction to gain a bonus to AC against that attack, potentially causing it to miss you. The bonus equals your Charisma modifier (minimum of +1). If the attack misses, you can make one weapon attack against the attacker as part of this reaction.</p>

        <h3>The Beauty of Violence</h3>

        <em><strong>Exhibition Specialist:</strong> 18th level</em><br>

        <p>You've perfected a fighting style that allows you to stylishly dominate the field of battle. When you mark a creature with your In The Spotlight feature, you can enhance it. For the duration of the mark, you gain the following additional benefits:</p>

        <ul><li>You can add your full Charisma modifier, instead of half, to any weapon damage roll you make against the marked target that doesn't already include that modifier.</li><li>You can add half your Charisma modifier (minimum of one) to any weapon attack roll you make against the marked target that doesn't already include that modifier.</li><li>If the marked target is reduced to 0 hit points, you can use your reaction to mark a new creature within 30 feet of you. The duration of the new mark is equal to the remaining duration of the existing mark.</li></ul>

        This effect ends early if<br> you're incapacitated or die. Once you've<br> used this feature, you can't use it<br> again until you finish a long rest. 

        <img src='https://www.gmbinder.com/images/TPUYOZz.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:300px' />



