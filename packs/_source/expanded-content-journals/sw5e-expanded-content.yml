  - name: Aging
    _id: WeEihSrqFrd0BH7c
    text:
      content: |-
        <h2>Aging</h2>

        <p></div></p>

        <p>Sometimes, campaigns might take place over years, or even decades. As these campaigns progress, you might want to introduce mechanics to reflect your characters' natural aging. Alternatively, at character creation, you might want to create a character who is already at a later stage in life. Regardless of when your characters have aged, consider using the following variant rule.</p>
