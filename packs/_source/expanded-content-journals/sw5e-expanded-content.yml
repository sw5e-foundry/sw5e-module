    _id: 35820Pk0LnLR0NOK
    text:
      content: |-
        <h3>Gestalt and Dichotomous</h3>

        <p>Gestalt and dichotomous characters, since they impact only certain parts of the character generation experience, work seamlessly together. Simply follow the rules associated with gestalt characters, including the restriction on multiclassing, and allow them to choose two archetypes in each class at 3rd level.</p>

