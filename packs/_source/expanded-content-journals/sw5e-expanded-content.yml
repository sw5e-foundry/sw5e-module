  - name: Culisetto
    _id: DP45hAFFr0RbRCGd
    text:
      content: |-
        <h2>Culisetto</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Pink, yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Thoracic carapace</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>2'8"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>35 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Culiset</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Culisetto</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The culisetto are an insectoid species, with a close resemblance to the common fly. Their long snouts are not truly proboscises, but function much the same, allowing them to drain blood with the aid of two tendrils, one on either side of the snout. They move by crawling about on their hands and feet, and are adept at leaping and climbing.</p>

        <p>Despite their appearance, culisetto are an exceptionally hygenic species, with an evolved habit of rubbing their hands and legs to rid them of germs from the ground.</p>

        <h3>Society and Culture</h3>

        <p>Culisetto are often shunned by other species, if not for their grotesque appearance, then usually for their habit of drinking blood. They prefer to do so while their victims are alive, but tolerate it if they are recently dead. While they have evolved beyond needing to drink blood to survive, its taste remains quite enticing to many culisetto, who will indulge in it at their pleasure.</p>

        <p>Culisetto tend to favor the company of their own kind, particularly their siblings. Broodlings frequently travel in groups of three or more, inseparable from birth.</p>

        <h3>Names</h3>

        <p>Culisetto names are distinctively antiquated in their etymology. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Kreon, Sosilu, Ocyto, Phino</p>

        <p><strong>Female Names.</strong> Hecuba, Anophe, Xeina, Adeia</p>

        <p><strong>Surnames.</strong> Dengue, Chontos, Kazan, Vazil</p>



        <h3>Culisetto Traits</h3>

        <p>As a culisetto, you have the following traits:</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Culisetto reach adulthood at 8 years old, and live to be about 60.</p>

        <p><strong><em>Alignment.</em></strong> Culisettos' thirst for blood cause them to tend towards the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Culisetto stand between 3 and 4 feet tall and weigh about 45 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Cannibalize.</em></strong> If you spend at least 1 minute devouring the corpse of a beast or humanoid, you gain temporary hit points equal to your Constitution modifier. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <p><strong><em>Climb.</em></strong> You have a climbing speed of 25 feet.</p>

        <p><strong><em>Compound Eyes.</em></strong> Whenever you make a Wisdom (Perception) check related to sight, you are considered to have expertise in the Perception skill.</p>

        <p><strong><em>Powerful Leap.</em></strong> If you jump at least 10 feet in a straight line before hitting with a melee weapon attack, you can attempt to trip the target as part of the same attack. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Prehensile Feet.</em></strong> You have supreme control over your feet and can use them to manipulate objects as well as your hands.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Surprise Attack.</em></strong> If you surprise a creature and hit it with an attack on your first turn in combat, the attack deals an extra 2d6 damage to it. You can use this trait only once per combat.</p>

        <p><strong><em>Torpor.</em></strong> You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields or martial weapons with the two-handed property unless it has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Culisetto. Culisetto is composed of high pitched whines made from the snout.</p>

        <img src='https://www.gmbinder.com/images/QY64ZRD.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:245px' />



