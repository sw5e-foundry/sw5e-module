  - name: Force-Bond
    _id: CG26O6TgYTLKTZaK
    text:
      content: |-
        <h2>Force-Bond</h2>

        <p></div></p>

        <p>When two Force-sensitive individuals spend time together, they can develop a powerful connection through the Force. While bonded in such a fashion, the two individuals gain a series of boons, depending on the strength of their bond. However, if the bond is unwilling, the individuals risk corruption by the dark side of the Force.</p>
