  - name: Fighter
    _id: WhjTCxLOAvwYAkLc
    text:
      content: |+
        <h2>Fighter</h2>

        <p>In order to become a warrior, your companion must have a Strength, Dexterity, or Constitution score of 13 or higher.</p>

        <p>As a fighter, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> All armor</li><li><strong>Weapons:</strong> All blasters, all vibroweapons</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Strength, Constitution</li><li><strong>Skills:</strong> Choose two skills from Acrobatics, Animal Handling, Athletics, Lore, Insight, Intimidation, Perception, and Survival</li></ul>

        <h3>Second Wind</h3>

        <p>Beginning when your companion chooses this class at 3rd level, it has a limited well of stamina that it can draw on to protect itself from harm. On its turn, your companion can use a bonus action to regain hit points. It rolls a Hit Die without expending it, regaining a number of hit points equal to the result of the Hit Die + its level.</p>

        <p>Once your companion has used this feature, it must finish a short or long rest before it can use it again.</p>

        <h3>Action Surge</h3>

        <p>Also at 3rd level, your companion can push itself beyond its normal limits for a moment. On its turn, it can take one additional action on top of its regular action and possible bonus actions.</p>

        <p>Once your companion has used this feature, it must finish a short or long rest before it can use it again.</p>

        <h3>Martial Superiority</h3>

        <p>At 7th level, your companion has learned maneuvers that are fueled by special dice called superiority dice. See chapter 13 of the Player's Handbook for the maneuvers list.</p>

        <h4>Maneuvers</h4>

        <p>Your companion learns one maneuver of its choice. Many maneuvers enhance an attack in some way. Your companion can use only one maneuver per attack, and it may only use each maneuver once per turn.</p>

        <p>Your companion learns an additional maneuver at 5th, 9th, 13th, 15th, and 17th level. Each time your companion gains a level, it can also replace one maneuver it knows with a different one.</p>

        <h4>Superiority Dice</h4>

        <p>Your companion has one superiority dice, which is d4. This die increases to a d6 at 9th level and a d8 at 17th level. A superiority die is expended when your companion uses it. Your companion regains all of its expended superiority dice when it finishes a short or long rest.</p>

        <p>Your companion gains an additional superiority die at 9th and 17th level.</p>



        <h4>Maneuver Ability</h4>

        <p>Your companion's maneuver ability varies based on the type of the maneuver it uses. It uses Strength, Dexterity, or Constitution for physical maneuvers (its choice), Intelligence, Wisdom, or Charisma for mental maneuvers (its choice), and an ability of its choice for general maneuvers. It uses this ability whenever a maneuver refers to its maneuver ability. Additionally, it uses this ability modifier when setting the saving throw DC for a maneuver it uses.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Maneuver save DC</strong> = 8 + your proficiency bonus + <br>your maneuver ability modifier</div>

        <hr>

        <h3>Extra Attack</h3>

        <p>By 11th level, your companion can attack twice, instead of once, whenever it takes the Attack action on its turn.</p>

        <h3>Indomitable</h3>

        <p>At 15th level, your companion can reroll a saving throw that it fails. If it does so, it must use the new roll.</p>

        <p>Your companion can use this feature twice. It regains all expended uses when it completes a long rest.</p>

        <h3>Greater Extra Attack</h3>

        <p>As of 18th level, your companion can attack three times, instead of once, whenever it takes the Attack action on its turn.</p>

        <p>Additionally, when your companion uses a bonus action to engage in Double- or Two-Weapon Fighting, it can make two attacks, instead of one.</p>

