  - name: Archaeologist
    _id: DKetoH1LoWRf3Njs
    text:
      content: |+
        <h2>Archaeologist</h2>

        <p></div></p>

        <p>An archaeologist learns about the long-lost and fallen cultures of the past by studying their remains � their bones, their ruins, their surviving masterworks, and their tombs. Those who practice archaeology travel to the far corners of the world to root through crumbled cities and lost dungeons, digging in search of artifacts that might tell the stories of monarchs and high priests, wars and cataclysms.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Investigation, Lore, Perception, or Survival</li><li><strong>Tool Proficiencies:</strong> Surveyor's implements or scavenging kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A case containing a physical or digital map to a ruin or dungeon, a lantern, a vibropick, a set of traveler's clothes, a shovel, a two-person tent, a trinket recovered from a dig site, and a pouch containing 250 cr</li></ul>

        <h4>Dust Digger</h4>

        <p>Prior to becoming an adventurer, you spent most of your young life crawling around in the dust, pilfering relics of questionable value from crypts and ruins. Though you managed to sell a few of your discoveries and earn enough credits to buy proper adventuring gear, you have held onto an item that has great emotional value to you. You can determine your signature item or determine it randomly below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Signature Item</th></tr></thead><tbody><tr><td>1</td><td>10-foot pole</td></tr><tr><td>2</td><td>Hat</td></tr><tr><td>3</td><td>Hammer</td></tr><tr><td>4</td><td>Lantern</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Signature Item</th></tr></thead><tbody><tr><td>5</td><td>Medallion</td></tr><tr><td>6</td><td>Prybar</td></tr><tr><td>7</td><td>Shovel</td></tr><tr><td>8</td><td>Whip</td></tr></tbody></table></div>

        <h3>Feature: Historical Knowledge</h3>

        <p>When you enter a ruin or dungeon, you can correctly ascertain its original purpose and determine its builders, whether those were jedi, sith, hutts, rakata, or some other known species or civilization. Additionally, you can readily determine the value of ancient art.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Investigator</td></tr><tr><td>2</td><td>Loremaster</td></tr><tr><td>3</td><td>Perceptive</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Dungeon Delver</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Few archaeologists can resist the lure of an unexplored ruin or dungeon, particularly if such a site is the source of legends or is rumored to contain noteworthy relics. Whatever their motivations, they combine the likes of a dutiful historian with those of a dogged scoundrel.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I love a good puzzle or mystery.</td></tr><tr><td>2</td><td>I'm a pack rat who never throws anything away.</td></tr><tr><td>3</td><td>Fame is more important to me than money.</td></tr><tr><td>4</td><td>I have no qualms about stealing from the dead.</td></tr><tr><td>5</td><td>I'm happier in a dusty old tomb than I am in the centers of civilization.</td></tr><tr><td>6</td><td>Traps don't make me nervous. Idiots who trigger traps make me nervous.</td></tr><tr><td>7</td><td>I might fail, but I will never give up.</td></tr><tr><td>8</td><td>You might think I'm a scholar, but I love a good brawl. These fists were made for punching.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Preservation.</strong> That artifact belongs in a museum. (Light)</td></tr><tr><td>2</td><td><strong>Greed.</strong> I won't risk my life for nothing. I expect some kind of payment. (Any)</td></tr><tr><td>3</td><td><strong>Death Wish.</strong> Nothing is more exhilarating than a narrow escape from the jaws of death. (Chaotic)</td></tr><tr><td>4</td><td><strong>Dignity.</strong> The dead and their belongings deserve to be treated with respect. (Lawful)</td></tr><tr><td>5</td><td><strong>Immortality.</strong> All my exploring is part of a plan to find the secret of everlasting life. (Any)</td></tr><tr><td>6</td><td><strong>Danger.</strong> With every great discovery comes grave danger. The two walk hand in hand. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>Ever since I was a child, I've heard stories about a lost city. I aim to find it, learn its secrets, and earn my place in the history books.</td></tr><tr><td>2</td><td>I want to find my mentor, who disappeared on an expedition some time ago.</td></tr><tr><td>3</td><td>I have a friendly rival. Only one of us can be the best, and I aim to prove it's me.</td></tr><tr><td>4</td><td>I won't sell an art object or other treasure that has historical significance or is one of a kind.</td></tr><tr><td>5</td><td>I'm secretly in love with the wealthy patron who sponsors my archaeological exploits.</td></tr><tr><td>6</td><td>I hope to bring prestige to an library, a museum, or a university.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I have a secret fear of some common wild animal, and in my work, I see them everywhere.</td></tr><tr><td>2</td><td>I can't leave a room without searching it for secret doors.</td></tr><tr><td>3</td><td>When I'm not exploring dungeons or ruins, I get jittery and impatient.</td></tr><tr><td>4</td><td>I have no time for friends or family. I spend every waking moment thinking about and preparing for my next expedition.</td></tr><tr><td>5</td><td>When given the choice of going left or right, I always go left.</td></tr><tr><td>6</td><td>I can't sleep except in total darkness.</td></tr></tbody></table>

