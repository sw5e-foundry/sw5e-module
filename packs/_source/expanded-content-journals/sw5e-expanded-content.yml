  - name: Combination Weapons
    _id: EXl4DHAAajJZvhZX
    text:
      content: |-
        <h2>Combination Weapons</h2>

        <p></div></p>

        <p>Some weapons�specifically lightweapons�can be used in a variety of ways. For instance, the iconic scenes with Darth Maul using his doublesaber, but with only one blade extended. Or more recently with Cal Kestis in Jedi: Fallen Order, where you could adjust from doublesaber fighting to single saber fighting, or vice versa, on the fly. If you want the option to combine weapons in this fashion, consider the following variant rule.</p>
