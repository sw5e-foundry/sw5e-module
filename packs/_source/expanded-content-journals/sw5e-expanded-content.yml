  - name: Office Worker
    _id: Z1Rboo6109410Wix
    text:
      content: |-
        <h2>Office Worker</h2>

        <p>You are an experienced office worker, having been employed by one or more local, planetary, or galactic governments, or one or more private enterprises or syndicates.  You have spent plenty of time around the water cooler and still have contacts in the governmental and corporate worlds.  Love them or hate them, you know your way around rules and regulations and you function well in structured environments. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Lore, and Perception</li><li><strong>Tool Proficiencies:</strong> One type of gaming set</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, an expired data cylinder, a gaming set (one of your choice), and a belt pouch containing 150 cr</li></ul>

        <h4>Office Specialty</h4>

        <p>There are many kinds of office workers, and within a government or private enterprise, individual members have particular specialties. Choose your role or the department you worked for in your office life or roll on the table below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Role</th></tr></thead><tbody><tr><td>1</td><td>Accounting</td></tr><tr><td>2</td><td>Droid Management</td></tr><tr><td>3</td><td>Executive Assistant</td></tr><tr><td>4</td><td>Facilities</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Role</th></tr></thead><tbody><tr><td>5</td><td>Information Technology</td></tr><tr><td>6</td><td>Procurement</td></tr><tr><td>7</td><td>Public Relations</td></tr><tr><td>8</td><td>Sentient Resources</td></tr></tbody></table></div>

        <h3>Feature: Clerical Augur</h3>

        <p>You have an intuitive understanding of how offices work and can readily fit in to an office environment as if you were meant to be there, as long as no one looks too carefully. Additionally, you know where the true power lies in the office: you know who is likely to know the local gossip and you know who to sweet talk into getting things done for you.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Perceptive</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Feigned Confidence</td></tr><tr><td>8</td><td>Snappy Interjection</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Office workers run the gamut from loyal and effective team member to lazy and incompetent employee.   </p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I can find common ground between the fiercest enemies, empathizing with them and always working towards peace.</td></tr><tr><td>2</td><td>I am always calm, no matter what the situation. I never raise my voice or let me emotions control me.</td></tr><tr><td>3</td><td>I have little practical experience dealing with people in the world and prefer to work alone.</td></tr><tr><td>4</td><td>I would rather make a new friend than a new enemy.</td></tr><tr><td>5</td><td>I am always figuring out how to implement better procedures to prevent mistakes.</td></tr><tr><td>6</td><td>There is no "I" in "team."</td></tr><tr><td>7</td><td>I work to live.</td></tr><tr><td>8</td><td>I live to work.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Prestige.</strong> I hope to one day rise to the top of my field and command the respect of those who work for me. (Lawful)</td></tr><tr><td>2</td><td><strong>Superiority.</strong> Rules are meant to control the sheep.  I'm no sheep. (Chaotic)</td></tr><tr><td>3</td><td><strong>Community.</strong> It is the duty of all people to strengthen the bonds of community and thereby improve civilization. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I will do whatever it takes to climb to the top. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I'm loyal to my friends, not to any ideals, and everyone else can take a walk for all I care. (Neutral)</td></tr><tr><td>6</td><td><strong>Faith.</strong>  I trust that my leader will guide my actions, I have faith that if I work hard, things will go well. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I will someday get revenge on the corrupt boss who fired me.</td></tr><tr><td>2</td><td>Everything I do is for the common people.</td></tr><tr><td>3</td><td>I will do anything to protect my employer.</td></tr><tr><td>4</td><td>No one must ever learn that I once stole from my employer.</td></tr><tr><td>5</td><td>I'm guilty of a terrible crime. I hope I can redeem myself for it.</td></tr><tr><td>6</td><td>I am committed to my group's goals over my own.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I put too much trust in those who wield power within my employer's hierarchy.</td></tr><tr><td>2</td><td>I am inflexible in my thinking.</td></tr><tr><td>3</td><td>I like to talk at length about my office job.</td></tr><tr><td>4</td><td>I do anything I can to avoid real work.</td></tr><tr><td>5</td><td>I am not an independent thinker.  I need detailed instructions and close supervision.</td></tr><tr><td>6</td><td>I gossip about others to hide my inadequacies.</td></tr></tbody></table>



