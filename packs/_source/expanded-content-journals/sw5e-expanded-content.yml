  - name: Feats
    _id: TqHNmuwEhZmrDTYi
    text:
      content: |-
        <h2>Feats</h2>

        <p>A feat represents a talent or an area of expertise that gives character special capabilities. It embodies training, experience, and abilities beyond what a class provides. At certain levels, your class gives you the Ability Score Improvement feature. Using the optional feats rule, you can forgo taking that feature to take a feat of your choice instead. You can take each feat only once, unless the feat's description says otherwise.</p>

        <p>You must meet any prerequisite specified in a feat to take that feat. If you ever lose a feat's prerequisite, you can't use that feat until you regain the prerequisite. For example, the Inspiring Leader feat requires you to have a Charisma of 13 or higher. If your Charisma is reduced below 13 somehow—perhaps by a withering curse—you can't benefit from the Inspiring Leader feat until your Charisma is restored.</p>

        <h3>Total Reconstruction</h3>

        <em><strong>Prerequisite:</strong> Type beast or humanoid</em><br>

        <p>You are more machine than man. While repaired in a similar configuration as your own species, you are subject to the following changes:</p>

        <ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>Choose one class of droid (class I-V or tracker). You count as the chosen creature type in addition to your other type.</li><li>You are resistant to necrotic and poison damage, and are immune to poison and disease.</li><li>You do not need to eat or drink. Additionally, you no longer require a tech focus to cast tech powers.</li><li>You are vulnerable to ion damage. Additionally, you have disadvantage on saving throws against effects that would deal ion or lightning damage.</li><li>You can not sense the Force, use force powers, or take levels in forcecasting classes.</li><li>You are no longer a valid target for cybernetic augmentations or genetic mutations. However, you are now a valid target for droid customizations.</li></ul>

        <h3>Double-Weapon Casting</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You've learned to blend your prowess with twinblades with your casting. You gain the following benefits:</p>

        <ul><li>Increase your Intelligence, Wisdom, or Charisma score by 1, to a maximum of 20.</li><li>When you use your action to Cast a Power that calls for a weapon attack and attack with a weapon with the light and double properties while wielding it in two hands, you can use your bonus action to engage in Double-Weapon Fighting. All the rules of Double-Weapon Fighting still apply to you.</li></ul>

        <h3>Two-Weapon Casting</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You've learned to better combine your dual wielding with your powers. You gain the following benefits:</p>

        <ul><li>Increase your Intelligence, Wisdom, or Charisma score by 1, to a maximum of 20.</li><li>When you use your action to Cast a Power that calls for a weapon attack and attack with a light weapon that you're holding in one hand, you can use your bonus action to engage in Two-Weapon Fighting. All the rules of Two-Weapon Fighting still apply to you.</li></ul>

        <h3>Dutifully Deployed</h3>

        <p>You've developed an aptitude for a particular deployment on a starship. You gain the following benefits:</p>

        <ul><li>Increase an ability score of your choice by 1, to a maximum of 20.</li><li>You gain 1 rank in a deployment of your choice. This rank does not count towards or affect your prestige.</li><li>The maximum number of ranks you can gain in deployments increases by 1. You can still only gain 5 ranks in a deployment.</li></ul>

        <h3>Adaptable Fading</h3>

        <em><strong>Prerequisite:</strong> 4th level</em><br>

        <p>You can easily overthrow an enemy's fortitude. You gain the following benefits:</p>

        <ul><li>Increase your Strength or Constitution score by 1, to a maximum of 20.</li><li>When you make an attack roll using your Strength, you can choose to add half your Constitution modifier to the attack roll. Alternatively, when you would make an attack roll using Constitution, you can add half your Strength modifier to the attack roll. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses of this feature when you complete a long rest.</li><li>When an effect you control would call for a Strength saving throw, you can instead have it call for a Constitution saving throw. Alternatively, when an effect you control would call for a Constitution saving throw, you can instead have it call for a Strength saving throw. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses of this feature when you complete a long rest.</li></ul>

        <h3>Flexible Rending</h3>

        <em><strong>Prerequisite:</strong> 4th level</em><br>

        <p>You are adept at overwhelming an opponent's reflexes. You gain the following benefits:</p>

        <ul><li>Increase your Dexterity or Intelligence score by 1, to a maximum of 20.</li><li>When you make an attack roll using your Dexterity, you can choose to add half your Intelligence modifier to the attack roll. Alternatively, when you would make an attack roll using Intelligence, you can add half your Dexterity modifier to the attack roll. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses of this feature when you complete a long rest.</li><li>When an effect you control would call for a Dexterity saving throw, you can instead have it call for a Intelligence saving throw. Alternatively, when an effect you control would call for a Intelligence saving throw, you can instead have it call for a Dexterity saving throw. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses of this feature when you complete a long rest.</li></ul>

        <h3>Versatile Withering</h3>

        <em><strong>Prerequisite:</strong> 4th level</em><br>

        <p>You have learned to easily overcome an adversary's will. You gain the following benefits:</p>

        <ul><li>Increase your Wisdom or Charisma score by 1, to a maximum of 20.</li><li>When you make an attack roll using your Wisdom, you can choose to add half your Charisma modifier to the attack roll. Alternatively, when you would make an attack roll using Charisma, you can add half your Wisdom modifier to the attack roll. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses of this feature when you complete a long rest.</li><li>When an effect you control would call for a Wisdom saving throw, you can instead have it call for a Charisma saving throw. Alternatively, when an effect you control would call for a Charisma saving throw, you can instead have it call for a Wisdom saving throw. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses of this feature when you complete a long rest.</li></ul>

        <h3>Muscled Menace</h3>

        <em><strong>Prerequisite:</strong> Strength 13, size Medium</em><br>

        <p>Despite being of otherwise average size, your might extends beyond that of your peers. You gain the following benefits:</p>

        <ul><li>Increase your Strength score by 1, to a maximum of 20.</li><li>Your speed increases by 5 feet.</li><li>You can't add more than +3 when determining your bonus to AC from your Dexterity.</li><li>You can't add more than +3 when determing your bonus to Dexterity saving throws from Dexterity.</li><li>You gain the Oversized special trait: <strong><em>Oversized.</em></strong> Light- and vibro-weapons that lack the dexterity or light property are considered to have the heavy property for you. The strength number for blasters is reduced by one step (from 19 to 17, 17 to 15, 15 to 13, or 13 to 11). If the strength number is 11, you ignore it entirely. </li></ul>

        <h3>Improved Force-Sensitive</h3>

        <em><strong>Prerequisite:</strong> The ability to cast 2nd-level force powers</em><br>

        <p>You know one at-will force power. Additionally, you know one 3rd-level force power, which you can cast once per long rest. Your forcecasting ability is Wisdom or Charisma (depending on power alignment).</p>

        <h3>Greater Force-Sensitive</h3>

        <em><strong>Prerequisite:</strong> The ability to cast 3rd-level force powers</em><br>

        <p>You know one at-will force power. Additionally, you know one 4th-level force power, which you can cast once per long rest. Your forcecasting ability is Wisdom or Charisma (depending on power alignment).</p>

        <h3>Master Force-Sensitive</h3>

        <em><strong>Prerequisite:</strong> The ability to cast 4th-level force powers</em><br>

        <p>You know one at-will force power. Additionally, you know one 5th-level force power, which you can cast once per long rest. Your forcecasting ability is Wisdom or Charisma (depending on power alignment).</p>

        <h3>Improved Tech Dabbler</h3>

        <em><strong>Prerequisite:</strong> The ability to cast 2nd-level tech powers</em><br>

        <p>You know one at-will tech power. Additionally, you know one 3rd-level tech power, which you can cast once per long rest. Your techcasting ability is Intelligence. You require use of a wristpad for these powers. </p>

        <h3>Greater Tech Dabbler</h3>

        <em><strong>Prerequisite:</strong> The ability to cast 3rd-level tech powers</em><br>

        <p>You know one at-will tech power. Additionally, you know one 4th-level tech power, which you can cast once per long rest. Your techcasting ability is Intelligence. You require use of a wristpad for these powers. </p>

        <h3>Master Tech Dabbler</h3>

        <em><strong>Prerequisite:</strong> The ability to cast 4th-level tech powers</em><br>

        <p>You know one at-will tech power. Additionally, you know one 5th-level tech power, which you can cast once per long rest. Your techcasting ability is Intelligence. You require use of a wristpad for these powers. </p>

        <h3>Companion Keeper</h3>

        <em><strong>Prerequisite:</strong> 4th level</em><br>

        <p>You gain the services of a companion. Choose one of the companion nature options, detailed later in this chapter.</p>

        <h3>Close Quarters Caster</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You've practiced utilizing powers in close quarters, learning techniques that grant you the following benefits:</p>

        <ul><li>When making a ranged force or tech attack while you are within 5 feet of a hostile creature, you do not have disadvantage on the attack roll.  </li><li>Your ranged force and tech attacks ignore half cover and three-quarters cover against targets within 30 feet of you. </li><li>You learn one at-will power that requires an attack roll. Your casting ability for this at-will power depends on the power list you chose from: Wisdom or Charisma (depending on power alignment) for force powers or Intelligence for tech powers.</li></ul>

        <h3>Combat Caster</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You've practiced making your powers more difficult to avoid, learning techniques that grant you the following benefits:</p>

        <ul><li>When a creature rolls a 1 on the d20 roll of a saving throw against a power you cast that deals damage, they instead take the highest number possible for the damage die.</li><li>You learn one at-will power that requires a saving throw. Your casting ability for this at-will power depends on the power list you chose from: Wisdom or Charisma (depending on power alignment) for force powers or Intelligence for tech powers.</li></ul>

        <h3>Dual Focused Caster</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You have learned to bifurcate your attention while concentrating on powers, learning techniques that grant you the following benefits:</p>

        <ul><li>If you attempt to cast a power that requires concentration while already concentrating on an existing power, you can maintain concentration on both powers simultaneously. You must spend your action each subsequent round on maintaining this concentration, or lose concentration for both powers.                              </li><li>At the end of each of your turns where you have two powers you are concentrating on, you must make a Constitution saving throw (DC equals 10 + the number of complete rounds you've been concentrating on two powers). On a failure, you lose concentration for both powers. You can drop concentration on one of your powers during your turn as a free action to avoid this saving throw.</li><li>Any time you would be forced to make a Constitution saving throw to maintain concentration due to taking damage, the DC equals 10 + both powers' levels combined, or half the damage you take, whichever number is higher. On a failure, you lose concentration on both powers.</li></ul>

        <h3>Mounted Caster</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You are trained in the use of powers while mounted. While you are mounted and aren't incapacitated, you gain the following benefits:</p>

        <ul><li>When you cast a power targeting yourself, you can also affect your mount with the power.</li><li>You have advantage on melee force or tech attack rolls against any unmounted creature that is smaller than your mount.</li><li>If your mount is subjected to an effect that allows it to make a Dexterity saving throw to take only half damage, it instead takes no damage if it succeeds on the saving throw, and only half damage if it fails.</li></ul>

        <h3>Quick Caster</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You've practiced casting powers in quick succession, learning techniques that grant you the following benefits:</p>

        <ul><li>When you cast a power with a casting time of a bonus action, you may use your action to cast a power with a power level no higher than half your proficiency bonus (rounded down).</li><li>When you cast a power with a casting time of a bonus action, you can cast it without expending force or tech points as long as it is no higher level than your proficiency bonus. Once you've used this feature, you must complete a long rest before you can use it again.</li></ul>

        <h3>Sniping Caster</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You've practiced casting powers more accurately from long range, learning techniques that give you the following benefits:</p>

        <ul><li>When you cast a power that requires you to make an attack roll, the power's range is doubled.</li><li>Your ranged force and tech attacks ignore one-quarter, half, and three-quarters cover.</li><li>You learn one at-will power that requires an attack roll. Your casting ability for this at-will power depends on the power list you chose from: Wisdom or Charisma (depending on power alignment) for force powers or Intelligence for tech powers.</li></ul>

        <h3>War Caster</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>You've practiced casting powers in the midst of combat, learning techniques that grant you the following benefits:</p>

        <ul><li>You have advantage on Constitution saving throws that you make to maintain your concentration on a power when you take damage.</li><li>Once per round, when a hostile creature provokes an opportunity attack from you, you can use your reaction to cast a power at the creature, rather than making an opportunity attack. The power must have a casting time of 1 action and must target only that creature.</li></ul>

        <h3>Casting Specialist</h3>

        <em><strong>Prerequisite:</strong> 4th level, the ability to cast force or tech<br> &emsp;powers</em><br>

        <p>Choose one from force- or tech-casting. You've mastered your chosen casting type, gaining the following benefits:</p>

        <ul><li>You gain a +1 bonus to your force or tech save DC and your force or tech attack modifier.</li><li>Once per turn, when you cast a power that requires an attack roll or saving throw, you can have advantage on one attack roll, or you can force one creature affected by the power to have advantage or disadvantage on the saving throw (your choice). Once you've used this feature on a power, you can't affect that power again until you complete a short or long rest. Once you've used this feature on a creature, you can't do so again until you complete a short or long rest.</li><li>Once per turn, when you cast a power that doesn't require an ability check, attack roll, or saving throw, but requires a die roll, you can choose the maximum or minimum on the die (your choice). If the power requires rolling multiple dice, you can only affect a number of them equal to half your proficiency bonus (rounded up) in this way. Once you've used this feature on a power, you can't affect that power again until you complete a short or long rest.</li></ul>

        <p>You can select this feat twice. Each time you do so, you must choose a different casting type.</p>
