  - name: Heighten Senses
    _id: YjrBVx4iGnkcjsqi
    text:
      content: |-
        <h4>Heighten Senses</h4>

        <p><em>1st-level universal power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you would roll initiative</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>

        <p>Through the Force, you sense a sudden shift in your environment, and can seize on it with great speed. You gain advantage on your initiative check, and until the end of your first turn in combat, your walking speed increases by 30 feet.</p>
