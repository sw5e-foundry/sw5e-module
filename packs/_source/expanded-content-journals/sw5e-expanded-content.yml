  - name: Kyuzo Order
    _id: Ykzuihu5NCF7nrRZ
    text:
      content: |+
        <h2>Kyuzo Order</h2>

        <p>Monks of the Kyuzo Order turn weapon throwing into a true art form. Inspired by the skill of native kyuzo wielding their war helmets as both shield and weapon, these monks utilize any thrown object they can find to defend themselves and others while they attack enemies from angles both surprising and devastating.</p>

        <h3>Intercept</h3>

        <em><strong>Kyuzo Order:</strong> 3rd level</em><br>

        You gain proficiency in vibroweapons with<br> the thrown property and they become monk<br> weapons for you. Additionally, when you throw an improvised weapon, you are considered proficient in it, and it uses your Martial Arts die instead of its 1d4. 

        Additionally, you've learned to use thrown weapons to intercept projectiles traveling towards your allies. When you are wielding a weapon with which you are<br> proficient, and a creature within your weapon's<br> normal thrown range is hit by a ranged<br> attack, you can use your reaction to throw<br> your weapon to intercept the projectile. When<br> you do so, the damage the creature takes from<br> the attack is reduced by 1d10 + your Dexterity<br> modifier + your monk level. If the weapon has<br> the returning property, it then returns to your<br> hand.

        <h3>Scattering Stance</h3>

        <em><strong>Kyuzo Order:</strong> 6th level</em><br>

        <p>When you take the Dodge action, until the start of your next turn you gain a number of special reactions equal to your proficiency bonus that you can only use for your Intercept feature. You can only take one reaction per turn.</p>

        <h3>Curved Throw</h3>

        <em><strong>Kyuzo Order:</strong> 11th level</em><br>

        You can curve your throws behind cover.<br> When you make an attack roll with a<br> weapon with the thrown property, you<br> can spend 1 focus point to cause<br> the target to gain no benefit from<br> shields or cover, unless that cover<br> is full cover.



        <h3>Relentless Assault</h3>

        <em><strong>Kyuzo Order:</strong> 17th level</em><br>

        <p>When you make multiple weapon attacks with thrown weapons against the same target on your turn, each attack after the first gains a +1 bonus to its attack roll, cumulatively, to a maximum bonus of +6.</p>

        <img src='https://www.gmbinder.com/images/5aztMYq.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:590px' />

