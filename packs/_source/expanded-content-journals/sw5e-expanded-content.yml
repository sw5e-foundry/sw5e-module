  - name: Geonosian
    _id: 8KiapffVcsBuNvf8
    text:
      content: |-
        <h2>Geonosian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Gray, green, or orange</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Hive-based, winged semi-insectoids</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'5"</td><td>+2d4"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>60 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Geonosis</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Geonosian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Geonosians have a hard chitin exoskeleton that provided protection from physical impacts and bouts of radiation that occasionally shower their world. Geonosians are strong despite their thin builds, and are capable of constructing massive hives and factories in concert. The head of a Geonosian is elongated and large with their skulls ridged on the top and by the side where they have bulbous, thick-lidded eyes. Both are physically strong and covered with bony ridges which protected their arms, legs, and vital organs. </p>

        <h3>Society and Culture</h3>

        Geonosian society is caste-based with little upward mobility, though some of the lower caste do develop ambition. Workers are conditioned to loathe even the concept of separation from their hive and the system<br> of control. A low-ranking worker's normal life is one of<br> endless toil and labor to satisfy the aristocracy, who<br> are known to make spectacular demands. The warrior<br> caste tend to be highly competitive and are eager to<br> prove themselves. They are born with an abnormal<br> level of intelligence, and one of their only hopes of<br> escape from their rigid duty is entering voluntarily into<br> gladiatorial combat. Should they survive, they are<br> granted freedom. Ultimately, their society exist to<br> benefit those few members that reside in the upper<br> caste. Members of the aristocratic classes are known to<br> be ambitious, domineering, and manipulative. They<br> constantly move towards improving their standing and<br> holdings while sumultaneously working to ruin their<br> rivals.

        <h3>Names</h3>

        <p>Geonosian names are usually harsh sounding. Lower castes don't get surnames. Upper caste surnames are familial.</p>

        <p><strong>Male Names.</strong> Buck, Goshey, Nik, Sozz, Techtu</p>

        <p><strong>Female Names.</strong> Datte, Kida, Miri, Nare, Tenessi</p>

        <p><strong>Surnames.</strong> Chak, Hor, Lur, Marpes, Zol</p>



        <h3>Geonosian Traits</h3>

        <p>As a geonosian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> You Dexterity score increases by 2, and your Constitution or Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Geonosians reach adulthood at 10 and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Geonosians' greedy and self-serving nature causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Geonosians typically stand from 5 to 6 feet tall and rarely weigh more than 80 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Crafter.</em></strong> Geonosian culture promotes artisanry. You have proficiency in one set of artisan's implements of your choice.</p>

        <p><strong><em>Exoskeleton.</em></strong> You have a thick exoskeleton. While you are unarmored or wearing light armor, your AC is 12 + your Dexterity modifier.</p>

        <p><strong><em>Flight.</em></strong> You have a flying speed equal to your walking speed. While wearing medium or heavy armor, your flying speed is reduced by half.</p>

        <p><strong><em>Geonosian Weaponry.</em></strong> You have proficiency in blasters that deal sonic damage.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Geonosian. The Geonosian language consists of click consonants through use of a Geonosians' dual mandibles. This makes it difficult for other species to learn to speak it.</p>

        <img src='https://www.gmbinder.com/images/1crsxzt.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:584px' />



