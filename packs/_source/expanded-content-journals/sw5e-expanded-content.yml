  - name: Humanoid Companion
    _id: GeqU6MWuomv7HZ91
    text:
      content: |+
        <h2>Humanoid Companion </h2>

        <p>Your humanoid takes a form and size of your choosing. Your humanoid's size determines its features. Once you've chosen the size of your humanoid, you assign your humanoid's ability scores using standard array (16, 14, 14, 12, 10, 8) as you see fit.</p>

        <hr>

        <h3>Humanoid Features</h3>

        <p>All humanoids share the following features.</p>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Languages:</strong> Humanoids can speak, read, and write Galactic Basic and one language of your choice. If your humanoid takes the form of a species that can't speak Galactic Basic, you choose whether or not your humanoid can speak it.</li><li><strong>Type:</strong> Humanoid</li><li><strong>Armor Class:</strong> Your humanoid's armor class equals 10 + its Dexterity modifier.</li><li><strong>Attitude:</strong> The humanoid obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your humanoid acts on its own.</li></ul>

        <h3>Tiny Humanoids</h3>

        <p>Tiny humanoids are comprised of diminutive species such as anzellan or patitites.</p>

        <p>As a tiny humanoid, your humanoid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d4 per humanoid level</li><li><strong>Hit Points at 1st Level:</strong> 4 + your humanoid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d4 (or 3) + your humanoid's Constitution modifier per humanoid level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Tools:</strong> One of your choice.</li><li><strong>Size:</strong> Tiny</li><li><strong>Speed:</strong> 20 ft.</li><li><strong>Pintsized:</strong> Your humanoid's tiny stature makes it hard for it to wield bigger weapons. Your humanoid can't use medium or heavy shields. Additionally, it can't wield weapons with the two-handed or versatile property, and it can only wield one-handed weapons in two hands unless they have the light property.</li><li><strong>Puny:</strong> Your humanoid is too small to pack much of a punch. It has disadvantage on Strength saving throws, and when determining its bonus to attack and damage rolls for weapon attacks using Strength, it can't add more than +3.</li><li><strong>Small and Nimble:</strong> Your humanoid is too small and fast to effectively target. It has a +1 bonus to AC, and it has advantage on Dexterity saving throws.</li></ul>



        <h3>Small Humanoids </h3>

        <p>Small humanoids are comprised of shorter species such as ewoks or jawas.</p>

        <p>As a small humanoid, your humanoid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d6 per humanoid level</li><li><strong>Hit Points at 1st Level:</strong> 6 + your humanoid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d6 (or 4) + your humanoid's Constitution modifier per humanoid level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Skills:</strong> One of your choice</li><li><strong>Tools:</strong> One specialist's kit of your choice</li><li><strong>Size:</strong> Small</li><li><strong>Speed:</strong> 25 ft.</li><li><strong>Undersized:</strong> Your humanoid's small stature makes it hard for it to wield bigger weapons. Your humanoid can't use heavy shields. Additionally, it can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, your humanoid can only wield it in two hands.</li></ul>

        <h3>Medium Humanoids </h3>

        <p>Medium humanoids are the most common seen in the galaxy. </p>

        <p>As a medium humanoid, your humanoid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per humanoid level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your humanoid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your humanoid's Constitution modifier per humanoid level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Size:</strong> Medium</li><li><strong>Speed:</strong> 30 ft.</li><li><strong>Armored:</strong> Your humanoid has proficiency in light armor. If it would already have proficiency in light armor, it instead has proficiency in medium armor. If it would already have proficiency in light and medium armor, it instead has proficiency in heavy armor. If it would already have proficiency in all armor, it instead has proficiency in a skill or tool of your choice.</li></ul>

        <h3>Humanoid Traits</h3>

        <p>The traits are presented in alphabetical order. If a trait has prerequisites, your companion must meet them to adopt it. Your companion can adopt a trait at the same time that it meets the trait's prerequisites. Whenever your companion gains a level, it can exchange one trait for another one.</p>



        <h4>Adaptive Resilience</h4>

        <p>Your companion has advantage on Strength and Constitution saving throws against tech powers.</p>

        <h4>Aggressive</h4>

        <p>As a bonus action, your companion can move up to its speed toward an enemy of its choice that it can see or hear. Your companion must end this move closer to the enemy than it started.</p>

        <h4>Alert</h4>

        <p>Always on the lookout for danger, your companion gains the following benefits:</p>

        <ul><li>Your companion gains a +5 bonus to initiative.</li><li>You and your companion can't be surprised while your companion is conscious.</li></ul>

        <h4>Athlete</h4>

        <p>Your companion has undergone extensive physical training to gain the following benefits:</p>

        <ul><li>When your companion is prone, standing up uses only 5 feet of its movement.</li><li>Climbing doesn't halve your companion's speed.</li><li>Your companion can make a running long jump or a running high jump after moving only 5 feet on foot, rather than 10 feet.</li></ul>

        <h4>Amphibious</h4>

        <p>Your companion can breathe air and water.</p>

        <h4>Cannibalize</h4>

        <p>If your companion spends at least 1 minute devouring the corpse of a beast or humanoid, it gains temporary hit points equal to its Constitution modifier. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Closed Mind</h4>

        <p>Your companion has advantage on Wisdom and Charisma saving throws against force powers.</p>

        <h4>Darkvision</h4>

        <p>Your companion has a keen eyesight, especially in the dark. It can see in dim light within 60 feet of it as if it were bright light, and in darkness as if it were dim light. It can't discern color in darkness, only shades of gray.</p>

        <h4>Defensive Ball</h4>

        <p>Your companion is able to curl into a rolling ball for extra protection. When it takes the Dash action while it isn't wielding a shield, it gains a bonus to AC equal to half its proficiency bonus (rounded up) until the start of its next turn. </p>

        <h4>Defiant</h4>

        <p>When your companion or a creature it can see that can see and understand it makes an ability check, attack roll, or saving throw, your companion can roll a d4 and add it to their roll (no action required). It can use this before or after the roll, but before the GM determines the roll's outcome. Once your companion has used this feature, it must complete a short or long rest before it can use it again.</p>

        <h4>Dungeon Delver</h4>

        <p>Alert to the hidden traps and secret doors found in many dungeons, your companion gains the following benefits:</p>

        <ul><li>Your companion has advantage on Wisdom (Perception) and Intelligence (Investigation) checks made to detect the presence of secret doors.</li><li>Your companion has advantage on saving throws made to avoid or resist traps.</li><li>Your companion has resistance to the damage dealt by traps.</li><li>Your companion can search for traps while traveling at a normal pace, instead of only at a slow pace.</li></ul>

        <h4>Durable</h4>

        <p>Hardy and resilient, your companion gains the following benefits:</p>

        <ul><li>When your companion rolls a Hit Die to regain hit points, the minimum number of hit points your companion can regain from the roll equals twice your companion's Constitution modifier (minimum of 2).</li><li>Your companion's hit point maximum increases by an amount equal to twice its level when it chooses this trait. Whenever your companion gains a level thereafter, its hit point maximum increases by an additional 2 hit points.</li></ul>

        <h4>Enthralling Pheromones</h4>

        <p>Your companion can use its pheromones to influence individuals of both sexes. Whenever your companion rolls a 1 on a Charisma (Persuasion) check, it can reroll the die and must use the new roll. Additionally, once per short or long rest, your companion can treat a d20 roll of 9 or lower on a Charisma check as a 10. This feature has no effect on droids or constructs.</p>

        <h4>Fighting Style</h4>

        <p>Your companion adopts a particular style of fighting as its specialty. Choose one of the Fighting Style options, detailed in chapter 6 of the Player's Handbook. Your companion can't take a Fighting Style option more than once, even if it later gets to choose again.</p>

        <h4>Flight</h4>

        <em><strong>Prerequisite</strong> 9th level</em><br>

        <p>Your companion has a flying speed equal to its walking speed. While wearing medium or heavy armor, its flying speed is reduced by half.</p>

        <h4>Force Adept</h4>

        <em><strong>Prerequisite:</strong> Force Sensitive</em><br>

        <p>Your companion knows one 2nd-level force power of your choice, and once per long rest it can cast it at 2nd-level without expending force points. Your companion's forcecasting ability is Wisdom or Charisma (depending on power alignment).</p>

        <h4>Force Contention</h4>

        <p>Your companion has advantage on Strength and Constitution saving throws against force powers.</p>



        <h4>Force-Sensitive</h4>

        <p>Your companion one at-will force power and one 1st-level force power, which it can cast at its lowest level once per long rest. Your companion's forcecasting ability is Wisdom or Charisma (depending on power alignment). At-will powers chosen by your companion do not scale normally at higher levels. Instead, if they would scale at 5th level, they instead scale at 11th level, and if they would scale at 11th level, they instead scale at 17th level.</p>

        <h4>Four-Armed</h4>

        <p>Your companion has four arms which it can use independently of one another. It can only gain the benefit of items held by two of its arms at any given time, and once per round it can switch which arms it is benefiting from (no action required).</p>

        <h4>Grovel, Cower, and Beg</h4>

        <em><strong>Prerequisite</strong> 5th level</em><br>

        <p>As an action on its turn, your companion can cower pathetically to distract nearby foes. Until the end of its next turn, your companion's allies gain advantage on attack rolls against enemies within 10 feet of it that can see it. </p>

        <p>Once your companion has used this trait, it can't use it again until it finishes a short or long rest.</p>

        <h4>Hardy Cleverness</h4>

        <p>Your companion has advantage on Wisdom and Charisma saving throws against tech powers.</p>

        <h4>Heavily Armored</h4>

        <em><strong>Prerequisite:</strong> Proficiency with medium armor</em><br>

        <p>Your companion gains proficiency in heavy armor. If your companion is already proficient in heavy armor, instead critical hits are treated as normal hits against it.</p>

        <h4>Hidden Step</h4>

        <p>As a bonus action, your companion can turn invisible until the start of its next turn or until it attacks, makes a damage roll, or forces someone to make a saving throw. </p>

        <p>Once your companion has used this trait, it can't use it again until you finish a short or long rest.</p>

        <h4>Hide</h4>

        <p>Your companion has a thick hide. When it isn't wearing armor, its AC is 13 + its Dexterity modifier. </p>

        <h4>Keen Hearing</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on hearing.</p>

        <h4>Keen Sight</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on sight.</p>

        <h4>Keen Smell</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on smell.</p>

        <h4>Lightly Armored</h4>

        <p>Your companion gains proficiency in light armor. If your companion is already proficient in light armor, instead your companion's speed increases by 5 feet while light armor is integrated. </p>

        <h4>Linguist</h4>

        <p>Your companion has studied languages and codes, gaining the following benefits:</p>

        <ul><li>Your companion learns three languages of its choice.</li><li>Your companion can can ably create written ciphers. Others can't decipher a code it creates unless it teaches them, they succeed on an Intelligence check (DC = your Intelligence score + your proficiency bonus), or they use a power to decipher it.</li></ul>

        <h4>Mobile</h4>

        <p>Your companion's speed increases by 10 feet.</p>

        <h4>Moderately Armored</h4>

        <em><strong>Prerequisite:</strong> Proficiency with light armor</em><br>

        <p>Your companion gains proficiency in medium armor.  If your companion is already proficient in medium armor, the maximum Dexterity bonus your companion can add to AC increases to 3 from 2 while medium armor is integrated.</p>

        <h4>Naturally Stealthy</h4>

        <p>Your companion can attempt to hide even when it is obscured only by a creature that is its size or larger than it.</p>

        <h4>Nimble Agility</h4>

        <p>Your companion reflexes and agility allow it to move with a burst of speed. When your companion moves on its turn in combat, it can double its speed until the end of the turn. Once your companion has used this trait, it can't use it again until it moves 0 feet on one of its turns.</p>

        <h4>Nimble Reflexes</h4>

        <p>Your companion has advantage on Dexterity and Intelligence saving throws against force powers.</p>

        <h4>Nimbleness</h4>

        <p>Your companion can move through the space of any creature that is of a size larger than it.</p>

        <h4>Observant </h4>

        <em><strong>Prerequisite:</strong> Alert</em><br>

        <p>Quick to notice details of its environment, your companion gains the following benefits:</p>

        <ul><li>If your companion can see a creature's mouth while it is speaking a language it understands, your companion can interpret what it's saying by reading its lips.</li><li>Your companion is considered to have advantage when determining its passive Wisdom (Perception) and passive Intelligence (Investigation) scores.</li></ul>

        <h4>Powerful Build</h4>

        <p>Your companion's carrying capacity and the weight it can push, drag, or lift doubles. If it would already double, it instead triples. </p>

        <h4>Proficient</h4>

        <p>Your companion gains proficiency in one skill or tool of its choice.</p>



        <h4>Rapid Regeneration</h4>

        <em><strong>Prerequisite</strong> 5th level</em><br>

        <p>Your companion can control and focus its healing. As a bonus action, it can choose to spend one of its Hit Dice to recover hit points.</p>

        <h4>Regenerative</h4>

        <em><strong>Prerequisite</strong> 5th level</em><br>

        <p>When your companion takes damage, it can use its reaction and expend a Hit Die to regain hit points as long as the damage would not reduce its hit points to 0.</p>

        <h4>Second Heart</h4>

        <em><strong>Prerequisite</strong> 5th level</em><br> 

        <p>When your companion is reduced to 0 hit points but not killed outright, it can drop to 1 hit point instead. It can't use this feature again until it finishes a long rest.</p>

        <h4>Strong-Legged</h4>

        <p>When your companion makes a long jump, it can cover a number of feet up to twice its Strength score. When it makes a high jump, it can leap a number of feet up into the air equal to 3 + twice its Strength modifier.</p>

        <h4>Tech Resistance</h4>

        <p>Your companion has advantage on Dexterity and Intelligence saving throws against tech powers.</p>

        <h4>Unarmed Combatant</h4>

        <p>Your companion's unarmed strikes deal 1d4 kinetic damage. It can use your choice of your Strength or Dexterity modifier for the attack and damage rolls. It must use the same modifier for both rolls.</p>

        <h4>Savage Attacks</h4>

        <p>When your companion scores a critical hit with a melee weapon attack, it can roll one of the weapon’s damage dice one additional time and add it to the extra damage of the critical hit.</p>

        <h4>Savage Shorty</h4>

        <em><strong>Prerequisite:</strong> Strength 13, size Small</em><br>

        <p>Despite being short of stature, your companion's size has no impact on its strength and virility. Your companion gains the following benefits:</p>

        <ul><li>Your companion's speed increases by 5 feet</li><li>Your companion loses the Undersized trait.</li></ul>

        <h4>Tech Adept</h4>

        <em><strong>Prerequisite:</strong> Tech Dabbler</em><br>

        <p>Your companion learns one 2nd-level tech power of your choice, and once per long rest it can cast it at 2nd-level without expending tech points. Your companion's techcasting ability is Intelligence. Your companion requires use of a wristpad for this power.</p>

        <h4>Tech Dabbler</h4>

        <p>Your companion learns one at-will tech power and one 1st-level tech power, which it can cast at its lowest level once per long rest. Your companion's techcasting ability is Intelligence. Your companion requires use of a wristpad for these powers. At-will powers chosen by your companion do not scale normally at higher levels. Instead, if they would scale at 5th level, they instead </p>



        <p>scale at 11th level, and if they would scale at 11th level, they instead scale at 17th level.</p>

        <h4>Tiny Terror</h4>

        <em><strong>Prerequisite:</strong> Strength 13, size Tiny</em><br>

        <p>Despite falling below knee height of other species, your companion's size has less impact on its strength and virility. Your companion gains the following benefits:</p>

        <ul><li>Your companion's speed increases by 5 feet</li><li>Your companion loses the Pintsized trait, and it is no longer limited to +3 when determining its bonus to attack and damage rolls for weapon attacks using Strength due to the Puny trait.</li><li>Your companion gains the Undersized trait: <strong><em>Undersized.</em></strong> Your companion's small stature makes it hard for it to wield bigger weapons. It can't use heavy shields or martial weapons with the two-handed property unless it has the light property, and if a martial weapon has the versatile property, your companion can only wield it in two hands.</li></ul>

        <h4>Tough</h4>

        <em><strong>Prerequisite:</strong> Durable</em><br>

        <p>Your companion has the blood of heroes flowing through its veins. Your companion gain the following benefits:</p>

        <ul><li>Whenever your companion takes the Dodge action in combat, it can spend one Hit Die to heal itself. Roll the die, add its Constitution modifier, and it regains a number of hit points equal to the total (minimum of one).</li></ul>

        <h4>Trance</h4>

        <p>Your companion only needs 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your companion's long rest would be interrupted, it only needs to complete the long rest instead of restarting it to gain its benefits.</p>

        <h4>Weapon Expert</h4>

        <p>Your companion gains proficiency with all blasters, lightweapons, and vibroweapons. If your companion is already proficient with all blasters, lightweapons or vibroweapons, instead once per turn when it rolls damage for a weapon attack using a weapon from a category in which it is proficient with all weapons, it can reroll the weapon's damage dice and use either total.</p>

