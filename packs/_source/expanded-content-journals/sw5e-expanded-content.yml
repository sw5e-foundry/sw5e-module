  - name: Mikkian
    _id: FlasTO1Z0oz5AoNU
    text:
      content: |-
        <h2>Mikkian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green, pink, red, blue, or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Blue or Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Numerous head-tendrils, acute senses of sight and hearing</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Mikkia</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Mikkian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Mikkians are a species of brightly colored humanoids. The mikkians' most distinctive feature are their motile head-tendrils, with the number, form, and pattern varying between individuals. These head-tendrils primarily serve as sensory organs, particularly detecting sound as a replacement for an ear common in other species. Mikkian head-tendrils also could detect other information, such as humidity, temperature, magnetic direction and radiation. This radiation detection can be detected to the extent that mikkians can "see" light and dark, although their eyes are still their primary visual organs. </p>

        <h3>Society and Culture</h3>

        <p>Mikkians place kinship and integrity above all. In fact, their honesty can come across as blunt or even rude to other sentients. Conversely, mikkians often have trouble adjusting to the more flexible views of other races. Their complex code of honor encompass all things in life, with a particular insistance on matters of warfare. Although they respect warrior traditions, the Mikkians nevertheless value discipline and honor over victory or physical might.</p>

        <p>Different religious traditions exist among the Mikkians, but belief in the Force plays a central role in all of them. In Mikkian society, their head-tendrils have important cultural significance, and as such tendril-reading is used by Mikkian mystics to predict their future. Every facet of the head-tendril contributes to that meaning.</p>

        <h3>Names</h3>

        <p>Mikkian names are often short and disyllabic, with a melodic quality to them. Mikkians typically don't use surnames, though some may adopt them. </p>

        <p><strong>Male Names.</strong> Cage, Fedlas, Mekko, Sakas </p>

        <p><strong>Female Names.</strong> Beyra, Fenvar, Tiplee, Zelna </p>



        <h3>Mikkian Traits</h3>

        <p>As a mikkian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and one other ability score of your choice increases by 1.</p>

        <p><strong><em>Age.</em></strong> Mikkian reach adulthood in their late teens and live a little over a century.</p>

        <p><strong><em>Alignment.</em></strong> Mikkian's honor and integrity based culture causes them to tend toward lawful alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Mikkian typically stand 5 to 6 feet tall and generally weigh about 120 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Blindsight.</em></strong> Mikkian can perceive the world around them through heat and radiation. You have blindsight out to 30 feet. If another trait would grant you blindsight, the range is increased by half as many feet.</p>

        <p><strong><em>Keen Hearing.</em></strong> Your head-tendrils provide a keen awareness of your surroundings. You have advantage on Wisdom (Perception) checks that involve hearing.</p>

        <p><strong><em>Bureaucratic.</em></strong> You have proficiency with Persuasion or Intimidation (your choice).</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Mikkian. Mikkian is a melodic, flowing tongue made up of several ancient dialects.</p>

        <img src='https://www.gmbinder.com/images/6sJKi2x.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:231px' />



