  - name: Givin
    _id: 5pBH63SZ8yUl9sQA
    text:
      content: |-
        <h2>Givin</h2>

        <blockquote><hr>

        <h5>Visual Characteristics</h5>

        <p>|||| |:--|:-:|:--| |<strong><em>Skin Color</em></strong>||White| |<strong><em>Hair Color</em></strong>||None | |<strong><em>Eye Color</em></strong>||Black| |<strong><em>Distinctions</em></strong>||Skeletal appearance, able to survive in a vacuum for short periods|</p>

        <hr>

        <h5>Physical Characteristics</h5>

        <p>||||| |:--|:-:|:-:|:-:| |  <strong><em>Height</em></strong> || 5'5" | +2d8"| |  <strong><em>Weight</em></strong> || 105 lb. | x2d4 lb.|</p>

        <hr>

        <h5>Sociocultural Characteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>Yag'Dhul</td></tr><tr><td><strong><em>Language</em></strong></td><td>Givin</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Givin are a species of white-skinned, hairless humanoids who are quite frequently likened to animated skeletons. Their facial features include many sharp downward angles, large triangular eye sockets, and sloped-up brows that meet together in the middle, lending them an appearance of permanent anguish. Because of the harsh environment of their homeworld, the Givins' organs are sealed against atmospheric exposure; thanks to this complex system, they can survive for about a day in a vacuum.</p>

        <h3>Society and Culture</h3>

        <p>In order to survive their homeworld's lunar tides, the Givin became extremely adept at calculating the trajectory of their celestial bodies. Over the ages, Givin have become so skilled at celestial navigation that they are able to calculate hyperspace jumps in their heads. As such, mathematics have become a cornerstone of Givin society. Two Givin will often greet each other by exchanging complex equations for the other to solve.</p>

        <p>Due to their profound mathematical ability, Givin are skilled starship builders and astrogators. They create some of the most impressive, complex, and sleek ships in the galaxy. However, they frequently build their ships without the presence of a navcomputer or pressurization system, and so their buyers have to add these system in the starship aftermarket.</p>

        <h3>Names</h3>

        <p>Givin names are often derived by parents from favored mathematical equations. Male and female names do not significantly differ. Surnames are familial.</p>

        <p><strong>First Names.</strong> Daggibus, Lersia, Na-Soth, Nisil, Sladru</p>

        <p><strong>Surnames.</strong> Alarin, Nalas, Narth, Larr, Scoritoles</p>



        <h3>Givin Traits</h3>

        <p>As a Givin, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Intelligence score<br> increases by 2, and your Constitution score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Givin reach adulthood in their early teens and live about 80 years.</p>

        <strong><em>Alignment.</em></strong> Givins believe power and respect are<br> earned rather than expected, causing them to tend<br> towards balanced alignments, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Givin typically stand around 6 feet tall and weigh 150 lb. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Hardened Exterior.</em></strong> You have a tough, bony exterior. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier.</p>

        <strong><em>Mathematical Savants.</em></strong> Whenever you make an<br> Intelligence (Technology) check involving mathematics,<br> you are considered to have expertise in the Technology<br> skill.

        <strong><em>Stargazer.</em></strong> You have proficiency in Piloting and<br> Technology.

        <strong><em>Vacuum Sealed.</em></strong> You can survive for one day within<br> the vacuum of space. You still require oxygen to<br> breathe. You have resistance to cold damage.

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Givin. Givin is characterized by its use of mathematical jargon and symbols, making it nigh incomprehensible to the less mathematically inclined.</p>

        <img src='https://www.gmbinder.com/images/8TM7t8q.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:202px' />



