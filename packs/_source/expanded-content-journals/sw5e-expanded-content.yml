  - name: Redemption
    _id: DOYDAcqYFLCIJc1i
    text:
      content: |+
        <h3>Redemption</h3>

        <p>Your destiny is to redeem a character that has been corrupted or otherwise turned to evil. Many Jedi seek to turn their fallen brethren away from the dark side. A Rebel agent might seek to turn his brother, an Imperial officer, away from the evil Empire, redeeming him back to the side of justice and freedom. The target of this destiny should be someone that has fallen from the light in some way, whether that means turning to the dark side of the Force or simply siding with evil over good. Turning someone away from their wicked ways is usually very difficult and requires far more than simple persuasion. Often a a character that fulfills this destiny does not survive it, and sometimes neither does their redeemed target. Aditionally, you may be your own target for this destiny, making your own redemption the means of fulfilling it.</p>

        <p>Examples of this destiny include Luke Skywalker turning Darth Vader away from the dark side and Revan's redemption of Bastila Shan on the Star Forge.</p>

        <h4>Destiny Fulfilled</h4>

        <p>You receive a permanent 2 increase to your Wisdom score. In addition, the Corruption score of the redeemed character is reduced to 1 and they lose any dark side corruptions they have accrued.</p>

