  - name: Mustafarian
    _id: LP0vK5YvVxfjntdm
    text:
      content: |-
        <h2>Mustafarian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Extremophiles</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'8"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Mustafar</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Mustafarian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Mustafarians are an insectoid species of sentients native to the volcanic planet of Mustafar. They are divided into two subspecies: the lanky northern mustafarians, and the stocky southern mustafarians. The southern mustafarians were notable for their greater strength, making them more suited to manual labor. Both subspecies shared many traits, particularly their hardened exoskeletons and leathery skin, which acclimated them to the extreme heat of their volcanic environment.</p>

        <h3>Society and Culture</h3>

        <p>Mustafarians evolved from arthropods living in the slightly cooler hollows within dormant volcanoes on the surface of Mustafar. As a result of such close living, mustafarian culture is isolationist by nature, though they tolerate trade with other systems. Mustafar hosts scarce minerals and rare metals, making mustafarians an invaluable trade partner.</p>

        <p>Native mustafarians rarely take sides when galactic conflicts rage, instead preferring to keep to themselves and control their own planet. They are daunting enemies when provoked, however.</p>

        <h3>Names</h3>

        <p>Mustafarian names are often inspired by displays of competency or bravery, such as recovering large quantities of rare minerals, or successfully taming a lava flea. Their surnames are familial.</p>

        <p><strong>Male Names.</strong> Aumstrogh, Chivos, Ikt, Ulon</p>

        <p><strong>Female Names.</strong> Altoa, Hailith, Saonji, Yura</p>

        <p><strong>Surnames.</strong> Fal'co, Glost, Mensix, Nek'dem</p>



        <h3>Mustafarian Traits</h3>

        <p>As a mustafarian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Strength or Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Mustafarians reach adulthood in their late teens and live about 80 years.</p>

        <p><strong><em>Alignment.</em></strong> Mustafarians are usually judicious and value good work above all else, causing them to be lawful balanced, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Mustafarians stand between 5 and 7 feet tall and weigh around 165 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet. You ignore the strength property of heavy armor.</p>

        <p><strong><em>Darkvision.</em></strong> As an originally cave-dwelling species, your eyes are adapted to the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 12 + your Dexterity modifier. </p>

        <p><strong><em>Lava Dweller.</em></strong> Your body is well accustomed to extreme heat, giving you resistance to fire damage. Additionally, your thick hide is naturally adapted to hot climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Refinery Specialist.</em></strong> You have proficiency in your choice of constructor's implements, scavenging kit, or surveyor's implements. Additionally, whenever you make an Intelligence (Nature) check to identify a metal or mineral, you are considered to have expertise in the Nature skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Mustafarian. Mustafarian consists of choppy clicks and emphatic groans.</p>

        <img src='https://i.ibb.co/dLqfZS0/Mustafarian-NEGAS-removebg-preview.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:304px' />



