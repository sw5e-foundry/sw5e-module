  - name: Trickster Order
    _id: VNy9vvQd1SdDH4XZ
    text:
      content: |+
        <h2>Trickster Order</h2>

        <p>Monks of the Trickster Order embody the archetypal role of the "trickster"� one who seemingly bumbles their way into good fortune. They employ a unique fighting style composed of slips, trips, and falls to confuse and frustrate their enemies to no end. Whether your movements are actual foibles on your part or calculated strokes, they will surely leave others guessing long after your time is past.</p>

        <h3>Bumbling Technique</h3>

        <em><strong>Trickster Order:</strong> 3rd level</em><br>

        <p>Your martial arts technique mixes combat training with the precision of a dancer and the antics of a jester. You gain proficiency in Performance.</p>

        <p>Additionally, you learn how to twist and turn quickly. Whenever you use your bonus action to make an unarmed strike, creatures you hit can't make opportunity attacks against you, and your speed increases by 10 feet until the end of your turn.</p>



        <h3>Clumsy Sway</h3>

        <em><strong>Trickster Order:</strong> 6th level</em><br>

        <p>You can move in sudden, swaying ways. You gain the following benefits.</p>

        <p><strong><em>Leap to Your Feet.</em></strong> When you're prone, you can stand up by spending 5 feet of movement, rather than half your speed.</p>

        <p><strong><em>Redirect Attack.</em></strong> When a creature misses you with a melee attack roll, you can spend 1 focus point as a reaction to cause that attack to hit one creature of your choice, other than the attacker, that you can see within 5 feet of you.</p>

        <h3>Luck of the Fool</h3>

        <em><strong>Trickster Order:</strong> 11th level</em><br>

        <p>You always seem to get a lucky bounce at the right moment. When you make an ability check, an attack roll, or a saving throw and have disadvantage, you can spend 2 focus points to instead have advantage for that roll.</p>

        <h3>Comic Frenzy</h3>

        <em><strong>Trickster Order:</strong> 17th level</em><br>

        <p>You gain the ability to make an overwhelming number of attacks against a group of enemies. When you use your Flurry of Blows, you can make up to three additional attacks with it (up to a total of five Flurry of Blows attacks), provided that each Flurry of Blows attack targets a different creature this turn.</p>

        <img src='https://www.gmbinder.com/images/NOIWq0u.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:590px' />

