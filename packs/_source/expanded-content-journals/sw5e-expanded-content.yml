  - name: Chevin
    _id: WXWAtsKnYndCpqA9
    text:
      content: |-
        <h2>Chevin</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Grey</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, brown, blond, grey, or white (usually with age)</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Stocky build, large heads, long snouts, long arms, three-fingered hands, four-toed feet</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'9"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>170 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Vinsoth</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Chevin</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Chevin have long snouts which hang down nearly to their ankles. Combined with their intellect, this makes them skilled hunters of animals such as backshin, because they can smell out their prey or feed while keeping their eyes on the horizon. It is also their hunting prowess which allowed them to dominate their homeworld and conquer the Chevs. Chevin have thick legs, massive wide bodies, thin rope-like tails, and arms so long their three-fingered hands often brushed the ground.</p>

        <h3>Society and Culture</h3>

        <p>Chevin live in small, mobile communities, with homes mounted on great wheeled carts. Even after they gained access to galactic technology, they continued to live as nomads (though more affluent Chevin mounted their lodges on large repulsorlift vehicles instead.) Their Chev slaves are usually forced to follow on foot. Nomadic groups of Chevin keep in touch via comlinks, and often converge on a single location to deal with danger.</p>

        <p>The only Chevin settlements that stay in place for more than one standard month are the Government Villages, where Chevin dictators live with their hand-picked advisors. Even these settlements are movable when necessary. Each of the roughly two dozen Government Villages rules a Chevin nation.</p>

        <h3>Names</h3>

        <p>Chevin names do not vary significantly based on gender. Surnames are based on community.</p>

        <p><strong>First Names.</strong> Buula, Ephant, Perre, Phylus, Reseros</p>

        <p><strong>Surnames.</strong> Meh, Mon, Nen, Needmo, Phrusaani</p>



        <h3>Chevin Traits</h3>

        <p>As a Chevin, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Chevin reach adulthood in their thirties and live up to 200 years.</p>

        <p><strong><em>Alignment.</em></strong> Chevin warmongering and slavetrading cause them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Chevin stand between 6 and 8 feet tall and weigh up to 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier. Additionally, your thick hide is naturally adapted to both hot and cold climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Keen Hearing.</em></strong> You have advantage on Wisdom (Perception) checks that rely on hearing.</p>

        <p><strong><em>Nomadic.</em></strong> You are proficient in Survival.</p>

        <p><strong><em>Thick Skull.</em></strong> Your skull is a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Chevin. The Chevin language is characterized by grunts and low-pitched rumblings. Chevin typically have deep voices, even when speaking Basic.</p>

        <img src='https://www.gmbinder.com/images/WWwwMgv.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:425px' />



