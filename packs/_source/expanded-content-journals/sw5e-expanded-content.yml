  - name: Clone
    _id: 6uMbhbVlq0NIxRgY
    text:
      content: |+
        <h2>Clone</h2>

        <p>You are a miracle of science. A creature born not from love or passion, but from logic and machinery. Created in a laboratory, you are a perfect genetic replica of your DNA-Donor, whomever that is. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Lore, Sleight of Hand and Survival</li><li><strong>Tool Proficiencies:</strong> Your choice of geneticist's implements, security kit, or slicer's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of clothes appropriate to your duties, a trinket related to your DNA-donor, and 150 credits</li></ul>

        <h4>DNA-Donor</h4>

        <p>The background of your DNA-Donor often shapes a clone's path in life.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d20</th><th>Donor's Background</th></tr></thead><tbody><tr><td>1</td><td>Agent</td></tr><tr><td>2</td><td>Bounty Hunter</td></tr><tr><td>3</td><td>Criminal</td></tr><tr><td>4</td><td>Entertainer</td></tr><tr><td>5</td><td>Force Adept</td></tr><tr><td>6</td><td>Gambler</td></tr><tr><td>7</td><td>Investigator</td></tr><tr><td>8</td><td>Jedi</td></tr><tr><td>9</td><td>Mandalorian</td></tr><tr><td>10</td><td>Mercenary</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d20</th><th>Donor's Background</th></tr></thead><tbody><tr><td>11</td><td>Noble</td></tr><tr><td>12</td><td>Nomad</td></tr><tr><td>13</td><td>Outlaw</td></tr><tr><td>14</td><td>Pirate</td></tr><tr><td>15</td><td>Scientist</td></tr><tr><td>16</td><td>Scoundrel</td></tr><tr><td>17</td><td>Sith</td></tr><tr><td>18</td><td>Smuggler</td></tr><tr><td>19</td><td>Soldier</td></tr><tr><td>20</td><td>Spacer</td></tr></tbody></table></div>

        <h3>Feature: A Life Not Lived</h3>

        <p>Being a clone, you were born from the existence of another. Flashes of deeds you never did, of people you have never met and of information you have never learned sporadically appear. You may be confused with your DNA-Donor by others, being befriended by, or made enemies of, people you have never before met. The exact nature of these revelations depends on the nature of your DNA-Donor; they might lead to a site that only one other has ever seen, some long-forgotten fact, relic or weapon from the past that could reshape the present, or even information that would be damaging to the people who created you.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Athlete</td></tr><tr><td>2</td><td>Loremaster</td></tr><tr><td>3</td><td>Quick-Fingered</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Force-Sensitive</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>A clone's demeanor often, though not always, matches that of their DNA-Donor. Is it nature, or is it nurture?</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I speak rarely but mean every word I say.</td></tr><tr><td>2</td><td>I laugh loudly and see the humor in stressful situations.</td></tr><tr><td>3</td><td>I prefer to solve problems without violence, but I finish fights decisively.</td></tr><tr><td>4</td><td>I enjoy being out in nature; poor weather never sours my mood.</td></tr><tr><td>5</td><td>I am dependable.</td></tr><tr><td>6</td><td>I am always working on some project or other.</td></tr><tr><td>7</td><td>I'm always picking things up, absently fiddling with them, and sometimes accidentally breaking them.</td></tr><tr><td>8</td><td>I bluntly say what others are hinting at or hiding.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Charity.</strong> I always try to help those in need, no matter what the personal cost. (Light)</td></tr><tr><td>2</td><td><strong>Logic.</strong> Emotions must not cloud our sense of what is right and true, or our logical thinking. (Lawful)</td></tr><tr><td>3</td><td><strong>Live and Let Live.</strong> Meddling in the affairs of others only causes trouble. (Balanced)</td></tr><tr><td>4</td><td><strong>Freedom.</strong> Chains are meant to be broken, as are those who would forge them. (Chaotic)</td></tr><tr><td>5</td><td><strong>Pride.</strong> I will do whatever it takes to be recognized as the best. (Dark)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I'm determined to make something of myself. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I am fiercely loyal to those with whom I work.</td></tr><tr><td>2</td><td>In my birth laboratory, I discovered something that could endanger the world.</td></tr><tr><td>3</td><td>I spend money freely and live life to the fullest, knowing that tomorrow I might die.</td></tr><tr><td>4</td><td>I live for the thrill of the hunt.</td></tr><tr><td>5</td><td>I owe my instructor a great debt for forging me into the person I am today.</td></tr><tr><td>6</td><td>One day I will return to my home planet and prove that I am their greatest creation.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I secretly believe that everyone is beneath me.</td></tr><tr><td>2</td><td>I write exceptionally bad poetry and recite it at inopportune times.</td></tr><tr><td>3</td><td>I struggle with individuality, those who see me as unique I would die for.</td></tr><tr><td>4</td><td>Every social situation I'm in seems to lead to my asking rude personal questions.</td></tr><tr><td>5</td><td>I have trouble trusting in my allies.</td></tr><tr><td>6</td><td>I invest so much time into planning that I can't bring myself to deviate from the plan, even when it is needed.</td></tr></tbody></table>

