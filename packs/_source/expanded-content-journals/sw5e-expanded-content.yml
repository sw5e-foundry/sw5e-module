  - name: Exert
    _id: M7r36I3DkKFXrzuU
    text:
      content: |-
        <h3>Exert</h3>

        <p>Once per round, a player can have their character attempt to exert themselves. When the character makes an ability check, attack roll, or saving throw, the character can roll a Hit Die without expending it, adding the result of the die to the roll. Alternatively, on their turn, the character can roll a Hit Die without expending it, increasing their speed by 5 x the amount rolled until the end of their turn. If the character has Hit Dice of different sizes, they can choose which Hit Die they use.</p>

        <p>The character can wait until after it rolls the d20 before deciding to exert themselves, but must decide before the GM says whether the roll succeeds or fails.</p>
