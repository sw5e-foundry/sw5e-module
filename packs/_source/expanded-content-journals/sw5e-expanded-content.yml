  - name: Droid Companion
    _id: ZMWt1yA7hPGcBlhT
    text:
      content: |+
        <h2>Droid Companion </h2>

        <p>Your droid takes a form of your choosing. The class of droid you choose determines its features. Once you've selected your type of droid class, you assign your droid's ability scores using standard array (16, 14, 14, 12, 10, 8) as you see fit.</p>

        <hr>

        <h3>Droid Features</h3>

        <p>All droids share the following features.</p>

        <h4>Resistances and Vulnerabilities</h4>

        <hr>

        <ul><li><strong>Droid Resistances:</strong> Your droid is resistant to necrotic, poison, and psychic damage, and immune to poison and disease.</li><li><strong>Droid Vulnerabilities:</strong> Your droid is vulnerable to ion damage. Additionally, your droid has disadvantage on saving throws against effects that would deal ion or lightning damage.</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Type:</strong> Droid</li><li><strong>Armor Class:</strong> Your droid's armor class equals 10 + its Dexterity modifier.</li><li><strong>Armor Integration:</strong> Your droid can not wear armor, but it can have the armor professionally integrated into its chassis over the course of a long rest. This work must be done by someone proficient with astrotech's implements. Your droid must be proficient in armor in order to have it integrated.</li><li><strong>Droid Systems:</strong> Your droid does not need to eat or drink. Additionally, your droid does not require a tech focus to cast tech powers.</li><li><strong>Force Insensitive:</strong> Your droid can not use force powers or take levels in forcecasting classes.</li><li><strong>Maintenance Mode:</strong> Rather than sleep, your droid must spend 3 hours performing routine maintenance during a long rest to gain its benefits, during which it has disadvantage on Wisdom (Perception) checks. Additionally, if your droid's long rest would be interrupted, it only needs to complete the long rest instead of restarting it.</li><li><strong>Attitude:</strong> The droid obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your droid acts on its own.</li></ul>

        <h3>Class I Droid </h3>

        <p>Class I droids, programmed for the mathematical, medical, or physical sciences, are subcategorized as medical droids, biological science droids, physical science droids, and mathematics droids.</p>

        <p>As a class I droid, your droid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per droid level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your droid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your droid's Constitution modifier per droid level after 1st</li></ul>



        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Languages:</strong> Your droid can speak, read, and write Galactic Basic and one language of your choice. It can understand spoken and written Binary, but can not speak it.</li><li><strong>Skills:</strong> One Intelligence, Wisdom, or Charisma skill of your choice</li><li><strong>Size:</strong> Medium</li><li><strong>Speed:</strong> 25 ft.</li></ul>

        <h3>Class II Droid </h3>

        <p>Class II droids, programmed for the application of engineering and other technical sciences, are subcategorized as astromech droids, exploration droids, environmental droids, engineering droids, and maintenance droids.</p>

        <p>As a class II droid, your droid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d6 per droid level</li><li><strong>Hit Points at 1st Level:</strong> 6 + your droid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d6 (or 4) + your droid's Constitution modifier per droid level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Skills:</strong> One of your choice</li><li><strong>Tools:</strong> One specialist's kit of your choice</li><li><strong>Languages:</strong> Your droid can speak, read, and write Binary. It can understand spoken and written Galactic Basic and one language of your choice, but can not speak it.</li><li><strong>Size:</strong> Small</li><li><strong>Speed:</strong> 25 ft.</li><li><strong>Undersized:</strong> Your droid's small stature makes it hard for it to wield bigger weapons. Your droid can't use heavy shields. Additionally, it can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, your droid can only wield it in two hands.</li></ul>

        <h3>Class III Droid </h3>

        <p>Class III droids, programmed to interact with humans and said to be the most advanced droids ever invented, are subcategorized as protocol droids, servant droids, tutor droids, and child care droids.</p>

        <p>As a class III droid, your droid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per droid level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your droid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your droid's Constitution modifier per droid level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Languages:</strong> Your droid can speak and understand all registered languages</li><li><strong>Size:</strong> Medium</li><li><strong>Speed:</strong> 25 ft.</li></ul>



        <h3>Class IV Droid</h3>

        <p>Class IV droids, programmed for military and security purposes, are subcategorized as assassin droids, battle droids, gladiator droids, and security droids.</p>

        <p>As a class IV droid, your droid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per droid level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your droid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your droid's Constitution modifier per droid level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Languages:</strong> Your droid can speak, read, and write Galactic Basic and one language of your choice. It can understand spoken and written Binary, but can not speak it.</li><li><strong>Size:</strong> Medium</li><li><strong>Speed:</strong> 30 ft.</li><li><strong>Armored:</strong> Your droid has proficiency in light armor. If it would already have proficiency in light armor, it instead has proficiency in medium armor. If it would already have proficiency in light and medium armor, it instead has proficiency in heavy armor. If it would already have proficiency in all armor, it instead has proficiency in a skill or tool of your choice.</li></ul>

        <h3>Class V Droid</h3>

        <p>Class V droids, programmed for menial and low-skill tasks, are subcategorized as construction droids, lifting droids, mining droids, sanitation droids, and transportation droids.</p>

        <p>As a class V droid, your droid companion has the following features.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per droid level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your droid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your droid's Constitution modifier per droid level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Skills:</strong> Athletics</li><li><strong>Tools:</strong> One set of artisan's implements</li><li><strong>Languages:</strong> Your droid can speak, read, and write Binary. It can understand spoken and written Galactic Basic and one language of your choice, but can not speak it.</li><li><strong>Size:</strong> Medium</li><li><strong>Speed:</strong> 30 ft.</li></ul>

        <h3>Droid Traits</h3>

        <p>The traits are presented in alphabetical order. If a trait has prerequisites, your companion must meet them to adopt it. Your companion can adopt a trait at the same time that it meets the trait's prerequisites. Whenever your companion gains a level, it can exchange one trait for another one.</p>

        <h4>Alarm Protocol</h4>

        <p>You install an alarm module in your companion, granting it the following benefits:</p>

        <ul><li>Your companion gains a +5 bonus to initiative.</li></ul>



        <ul><li>You and your companion can't be surprised while your companion is conscious.</li></ul>

        <h4>Analysis Protocol</h4>

        <em><strong>Prerequisite:</strong> 9th level, Class I Droid</em><br>

        <p>Your companion can analyze a target, develop a plan on how to best overcome any potential obstacle, and execute that plan with ruthless efficiency. As a bonus action on your companion's turn, your companion can analyze a target it can see within 60 feet of it. For the next minute, or until it analyzes another target, it gains the following benefits:</p>

        <ul><li>When it analyzes a hostile creature, its attack and damage rolls made with weapons with the finesse property or blaster weapons against that target may use its Intelligence modifier instead of Strength or Dexterity.</li><li>When it analyzes a friendly creature, the target can end your companion's Analysis Protocol on them (no action required) to add half your companion's Intelligence modifier (rounded down, minimum of +1) to one attack roll, ability check, or saving throw. Once a friendly creature has benefited from this ability, they can not do so again until they complete a short or long rest.</li></ul>

        <h4>Arm Cannons</h4>

        <p>You install dual arm cannons in your companion. The arm cannons have 2 charges. As an action, your companion can use charges to cast the <em>overload</em> tech power, using 1 charge per level. The saving throw is made against your companion's tech save DC (8 + your companion's proficiency bonus + your companion's Intelligence modifier).</p>

        <p>You can choose this trait multiple times. Each time you do so, the arm cannons gain another charge, to a maximum of 4. The arm cannons regain all charges after a long rest.</p>

        <h4>Back-Up Protocol</h4>

        <p>You install an emergency protocol in your companion, prompting a quick reboot after critical damage is taken. If your companion would be reduced to 0 hit points, it instead is reduced to 1.</p>

        <p>Once your companion uses this feature, it must finish a long rest before it can use it again.</p>

        <h4>Celerity Augment</h4>

        <p>You augment your companion to move a little faster. Your companion's speed increases by 10 feet.</p>

        <h4>Charisma Chip</h4>

        <em><strong>Prerequisite:</strong> Class III Droid</em><br>

        <p>You install a charisma chip in your companion. When an ally your companion can see makes an ability check, attack roll, or saving throw, your companion can use its reaction to give them advantage on the roll. It can do so before or after they roll the d20, but before the GM says the roll succeeds or fails. Once your companion uses this ability, it can't use it again until it finishes a short or long rest.</p>

        <h4>Darkvision Optics</h4>

        <p>Your companion has darkvision to a range of 60 feet. If your companion already has darkvision, this trait increases its range by 30 feet.</p>



        <h4>Durability Module</h4>

        <p>You enhance your companion's durability, granting the following benefits:</p>

        <ul><li>When your companion rolls a Hit Die to regain hit points, the minimum number of hit points your companion can regain from the roll equals twice your companion's Constitution modifier (minimum of 2).</li><li>Your companion's hit point maximum increases by an amount equal to twice its level when you install this protocol. Whenever your companion gains a level thereafter, its hit point maximum increases by an additional 2 hit points.</li></ul>

        <h4>Emergency Mode</h4>

        <em><strong>Prerequisite:</strong> Back-Up Protocol</em><br>

        <p>You modify your companion's back-up protocol. When your companion's back-up protocol is initiated, it can use its reaction to make one attack roll against a target within range. If the target is the source of the damage that reduced your companion to 0, the attack roll has advantage.</p>

        <h4>Energy Shield</h4>

        <p>You install an energy shield in your companion, which has 1 charge. As an action, your companion can use 1 charge to cast the <em>energy shield</em> tech power.</p>

        <p>You can choose this trait multiple times. Each time you do so, the energy shield gains another charge, to a maximum of 3. The energy shield regains all expended charges after a long rest.</p>

        <h4>False Combustion</h4>

        <em><strong>Prerequisite:</strong> Class II Droid</em><br>

        <p>As a reaction in response to taking damage, your companion can feign an explosion. For 1 minute, it appears to be destroyed to all outward inspection. A creature can use its action to inspect your companion and make an Intelligence (Investigation) check (DC = 8 + your companion's proficiency bonus + your companion's Intelligence modifier). If it succeeds, it becomes aware that your companion still functions.</p>

        <h4>Fighting Style Protocol</h4>

        <p>Your companion adopts a particular style of fighting as its specialty. Choose one of the Fighting Style options, detailed in chapter 6 of the Player's Handbook. Your companion can't take a Fighting Style option more than once, even if it later gets to choose again.</p>

        <h4>Flamethrower</h4>

        <p>You install a flamethrower in your companion. The flamethrower has 1 charge. As an action, your companion can cast the <em>jet of flame</em> tech power, though it does not scale with higher levels, or use 1 charge to cast the <em>flame sweep</em> tech power at 1st level. The saving throw is made against your companion's tech save DC (8 + your companion's proficiency bonus + your companion's Intelligence modifier).</p>

        <p>You can choose this trait multiple times. Each time you do so, the flamethrower gains another charge, to a maximum of 3. If the flamethrower has multiple charges, you can use multiple charges to cast <em>flame sweep</em> at a higher level, 1 point per charge. The flamethrower regains all expended charges after a long rest.</p>

        <h4>Four-Armed Combatant</h4>

        <em><strong>Prerequisite:</strong> Class IV Droid</em><br>

        <p>You install two additional arms to improve your companion's combat capabilities, granting it four arms which it can use independently of one another. Your companion can only gain the benefit of items held by two of its arms at any given time, and once per round your companion can switch which arms it is benefiting from (no action required).</p>

        <p>While your companion has at least 3 arms free, it has a climbing speed equal to its walking speed.</p>

        <h4>Heavy Plating</h4>

        <em><strong>Prerequisite:</strong> Proficiency with medium armor</em><br>

        <p>Your companion gains proficiency in heavy armor. If your companion is already proficient in heavy armor, instead critical hits are treated as normal hits against it while heavy armor is integrated.</p>

        <h4>Interface Protocol</h4>

        <p>Your companion becomes a valid target for the <em>tracker droid interface</em> tech power.</p>

        <h4>Light Plating</h4>

        <p>Your companion gains proficiency in light armor. If your companion is already proficient in light armor, instead your companion's speed increases by 5 feet while light armor is integrated. </p>

        <h4>Martial Protocol</h4>

        <em><strong>Prerequisite:</strong> 9th level, Class IV Droid</em><br>

        <p>Your companion has martial training that allows it to perform special combat maneuvers. It gains the following benefits:</p>

        <ul><li>It learns two maneuvers of your choice from among those available to the fighter class. If a maneuver it uses requires its target to make a saving throw to resist the maneuver's effects, the saving throw DC equals 8 + your companion's proficiency bonus + your companion's Strength or Dexterity modifier (your choice).</li><li>Your companion has two superiority dice, which are d4s. These dice are used to fuel its maneuvers. A superiority die is expended when your companion uses it. It regain all of its expended superiority dice when it finishes a short or long rest.</li></ul>

        <h4>Medium Plating</h4>

        <em><strong>Prerequisite:</strong> Proficiency with light armor</em><br>

        <p>Your companion gains proficiency in medium armor.  If your companion is already proficient in medium armor, the maximum Dexterity bonus your companion can add to AC increases to 3 from 2 while medium armor is integrated.</p>

        <h4>Memory Protocol</h4>

        <em><strong>Prerequisite:</strong> Class I Droid</em><br>

        <p>Your companion can recall anything it has read in the past month that it understood. This includes but is not limited to books, maps, signs, and lists.</p>

        <h4>Observant Protocol</h4>

        <em><strong>Prerequisite:</strong> Alarm Protocol</em><br>

        <p>You modify the alarm module in your companion, granting the following benefits:</p>

        <ul><li>If your companion can see a creature's mouth while it is speaking a language it understands, your companion can interpret what it's saying by reading its lips.</li></ul>





        <ul><li>Your companion is considered to have advantage when determining its passive Wisdom (Perception) and passive Intelligence (Investigation) scores.</li></ul>

        <h4>Performance Protocol</h4>

        <em><strong>Prerequisite:</strong> 9th level, Class III Droid</em><br>

        <p>You modify your companion's charisma chip, granting the following benefits: </p>

        <ul><li>Your companion has advantage on Charisma (Performance) checks.</li><li>Your companion can also use its bonus action to motivate an ally within 30 feet of it. Until the start of your companion's next turn, the ally can add the droid's Charisma modifier (minimum of +1) to the first attack roll, ability check, or saving throw they make. Your companion can use this feature a number of time equal to its Charisma modifier, and it regains all expended uses after it completes a long rest.</li></ul>

        <h4>Powerful Droid</h4>

        <em><strong>Prerequisite:</strong> Class V Droid</em><br>

        <p>Your companion's carrying capacity and the weight it can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <h4>Power Core</h4>

        <p>Your companion's hit points increase by an amount equal to its level + 1 and its Hit Die increases by one step (from d6 to d8, d8 to d10, or d10 to d12).</p>

        <p>You can choose this trait multiple times.</p>

        <h4>Powerful Grip</h4>

        <em><strong>Prerequisite:</strong> 9th level, Class V Droid</em><br>

        <p>When your companion hits a creature with a melee weapon attack on its turn and has a free hand, it can use a bonus action to attempt to grapple the target. If it does so, and the grapple succeeds, your companion can make one additional attack against the target (no action required).</p>

        <h4>Proficiency Protocol</h4>

        <p>You install a protocol in your companion that grants it proficiency in a skill or tool. Your companion gains proficiency in a skill or tool of your choice.</p>

        <p>You can choose this trait multiple times. </p>

        <h4>Rapid Reconstructor</h4>

        <em><strong>Prerequisite</strong> 5th level</em><br>

        <p>Your companion can control and focus its healing. As a bonus action, it can choose to spend one of its Hit Dice to recover hit points.</p>

        <h4>Repulsor Coil</h4>

        <em><strong>Prerequisite:</strong> 9th level, Class II Droid</em><br>

        <p>Your companion has a flying speed equal to its walking speed. While medium or heavy armor is integrated, its flying speed is reduced by half.</p>

        <h4>Sensor Augmentation</h4>

        <p>You augment your companion with an advanced sensor, granting the following benefits:</p>

        <ul><li>Your companion has advantage on Wisdom (Perception) and Intelligence (Investigation) checks made to detect the presence of secret doors.</li></ul>



        <ul><li>Your companion has advantage on saving throws made to avoid or resist traps.</li><li>Your companion has resistance to the damage dealt by traps.</li><li>Your companion can search for traps while traveling at a normal pace, instead of only at a slow pace.</li></ul>

        <h4>Shard Modification</h4>

        <p>You specially modify your companion to house a shard. Shards are sentient crystals native to the planet Orax, roughly a foot in length, that communicate with each other through pulses of light. While inhabiting a specialized droid host, shards are able to overcome the droid’s inability to wield the Force, granting the following benefits: </p>

        <ul><li>Your companion loses the Force Insensitive trait.</li><li>Your companion can cast the <em>sense force</em> force power once per day. Wisdom or Charisma (your choice) is your companion's forcecasting ability for this power.</li></ul>

        <h4>Stun Ray</h4>

        <p>You install a stun ray in your companion. The stun ray has 1 charge. As an action, your companion can use 1 charge to cast the <em>hold droid</em> or <em>paralyze humanoid</em> tech power. The saving throw is made against your companion's tech save DC (8 + your companion's proficiency bonus + your companion's Intelligence modifier).</p>

        <p>You can choose this trait multiple times. Each time you do so, the stun ray gains another charge, to a maximum of 3. The stun ray regains all expended charges after a long rest.</p>

        <h4>Techcasting Protocol</h4>

        <p>Your companion learns one at-will tech power and one 1st-level tech power, which it can cast at its lowest level once per long rest. Your companion's techcasting ability is Intelligence. At-will powers chosen by your companion do not scale normally at higher levels. Instead, if they would scale at 5th level, they instead scale at 11th level, and if they would scale at 11th level, they instead scale at 17th level.</p>

        <h4>Techcasting Protocol Mark II</h4>

        <em><strong>Prerequisite:</strong> Techcasting Protocol</em><br>

        <p>Your companion learns one 2nd-level tech power of your choice, and once per long rest it can cast it at 2nd-level without expending tech points. Your companion's techcasting ability is Intelligence. </p>

        <h4>Toughness Module</h4>

        <em><strong>Prerequisite:</strong> Durability Module</em><br>

        <p>You modify the durability module in your companion, granting the following benefit:</p>

        <ul><li>Whenever your companion takes the Dodge action in combat, it can spend one Hit Die to heal itself. Roll the die, add its Constitution modifier, and it regains a number of hit points equal to the total (minimum of one).</li></ul>

        <h4>Truesight Optics</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <em><strong>Prerequisite:</strong> Darkvision Optics</em><br>

        <p>Your companion can see through illusions and detect invisibility within 30 feet, as with truesight.</p>

