  - name: Advozse
    _id: JbjnykJKqW5lYC2u
    text:
      content: |-
        <h2>Advozse</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green, brown, muddy yellow, or tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Large eyes, single horn on head, pointed ears</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Riflor</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Advb</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Advozsec evolved from herbivorous reptile-analogs which fed on the vegetation known to form around Riflor's hot springs. Evolving into a class of reptomammal, advozsec have a single horn at the crown of their heads, four digits on each hand and foot, pointed ears, and large eyes. Advozsec are strictly vegetarian, unable to properly digest meat. The geothermal hot springs that appear on their homeworld forced the species to evolve thick skin in order to survive. The large eyes of the advozsec are adaptations to the clouds of volcanic ash which darken Riflor's skies. </p>

        <h3>Society and Culture</h3>

        <p>Since so much of the sunlight on Riflor is blocked by volcanic eruptions, advozsec tend to settle near geothermal springs for heat. Unfortunately, these springs also tend to be in geologically unstable regions, and anything built near them is often destroyed or abandoned due to eruptions or groundquakes. As a result, the advozse people ended up having little attachment to material goods or long-term plans, and developed a pessimistic, selfish, and even paranoid outlook on life. This facet of their culture remained long after contact with the Galactic Republic gave them access to modern construction techniques allowing for more permanent buildings. Seeing financial stability as the only truly achievable stability one could find in life, the advozsec constantly strive to accumulate as much monetary wealth as they can in a lifetime in order to have the ability to rebuild when the worst happens.</p>

        <h3>Names</h3>

        <p>Advozsec have simple names that do not distinguish between genders, using familiar surnames.</p>

        <p><strong>First Names.</strong> Dleck, Fjemm, Gorde, Rollar, Xon</p>

        <p><strong>Surnames.</strong> Ghantere, Leventraim, Timack, Vy, Zimda</p>



        <h3>Advozse Traits</h3>

        <p>As an advozse, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Advozsec reach adulthood in their late teens and typically live for over half a century.</p>

        <p><strong><em>Alignment.</em></strong> Advozsec's paranoid and pessimistic nature causes them to tend towards balanced alignments, particularly lawful balanced, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Advozsec typically stand 5 to 6 feet tall and generally weigh about 130 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 12 + your Dexterity modifier.</p>

        <p><strong><em>Horn.</em></strong> Your sharp horn is a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Lava Dweller.</em></strong> Your body is well accustomed to extreme heat, giving you resistance to fire damage.</p>

        <p><strong><em>Vigilant.</em></strong> When you would roll initiative, you can choose to have advantage on the roll. Once you've done so, you must complete a short or long rest before you can do so again.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Advb. Advb sounds quick and aggressive. It's incredibly rare to find a non-advozsec speaking Advb, some linguists even considering it all but a dead language. </p>

        <img src='https://www.gmbinder.com/images/Kq8wLLZ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:199px' />



        <hr>

        <h2>Aing-Tii</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Force-sensitivity, unique technology, six green tongues</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'7"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>145 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Aing-Tii homeworld in the Kathol Rift</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Non-verbal communication  via taste, smell, and touch</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The aing-tii are a species of sentient, toothless mammals who stand on two clawed feet with two spindly arms, each with three large digits. Their bodies are covered in jointed white, bony plates covered in unique painted motifs. The aing-tii head is small and juts out perpendicularly from their chest, featuring two large eyes and six long, thin, green tongues extending from their mouths. They have a long, prehensile tail. The species is incapable of producing sound and conveys information via tasting, smelling and touching each other with their tongues.</p>

        <h3>Society and Culture</h3>

        <p>The aing-tii are native to a planet whose location in the Kathol Rift is a closely guarded secret. Although in a dangerous area of space, the majority of Aing-Tii never leave their homeworld nor have any contact with the outside world. Those who do�commonly called aing-tii warrior monks�are often xenophobic and reclusive. The monks spend their entire lives performing errands for their gods, in the hope that they will receive "an answer" from them. The aing-tii hate slavery, and often attack slavers who roam the Kathol Outback.</p>

        <p>While the aing-tii are Force-sensitive, they avoid wielding the Force, which they see as sacred. The aing-tii believe that everything is somehow guided by the Force. They do not believe in the light or dark sides of the Force. Instead, they hold that there are many different aspects to the Force.</p>

        <h3>Names</h3>

        <p>Aing-tii names are, in reality, non-verbal and only truly understandable via taste, smell, and touch.  The few aing-tii who have been known to the outside world have used translators to convey an auditory identifier. </p>

        <p><strong>Male Names.</strong> Ben'Sur, Looshen'Fel, Tadar'Ro</p>

        <p><strong>Female Names.</strong> Kulan'Pa, Laman'So, Te'Nuriel </p>



        <h3>Aing-Tii Traits</h3>

        <p>As an aing-tii, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Aing-tii reach adulthood in their late teens and live more than a century.</p>

        <p><strong><em>Alignment.</em></strong> Aing-tii's foreign nature causes them to be hard to understand. Most aing-tii tend toward neutral light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Aing-tii typically stand 6 to 7 feet tall and generally weigh about 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Armored Plates.</em></strong> You have thick armored plates. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier.</p>

        <p><strong><em>Closed Mind.</em></strong> Aing-tii have a natural attunement for the Force, which makes them resistant to its powers. You have advantage on Wisdom and Charisma saving throws against force powers.</p>

        <p><strong><em>Force-Sensitive.</em></strong> You know the <em>force push/pull</em> at-will force power. Wisdom or Charisma (your choice) is your forcecasting ability for this power.</p>

        <p><strong><em>Prehensile Tail.</em></strong> You have supreme control over your tail and can use it to manipulate objects as well as your hands.</p>

        <p><strong><em>Wisdom of the Elders.</em></strong> You are proficient in the Lore skill.</p>

        <p><strong><em>Languages.</em></strong> You can understand, read, and write Galactic Basic, and the non-verbal communication of the aing-tii. However, you cannot speak or make noise verbally.</p>

        <img src='https://www.gmbinder.com/images/W8mBO4X.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:461px' />



