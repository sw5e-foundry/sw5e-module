  - name: Short or Long Rest Recovery
    _id: aDucMpgnHBvECcK6
    text:
      content: |-
        <h3>Short or Long Rest Recovery</h3>

        <p>You can also consider swapping the point recovery rest requirements, creating short rest force points or long rest tech points. To do so, you'll want to halve the base number of force points (not accounting for ability modifier) to account for short rest recovery, or double the base number of tech points (again not accounting for ability modifier) to account for long rest recovery. For instance, a consular with long rest forcecasting gets four tech points for each consular level (before modifier). If you wanted to do a short rest forcecasting consular instead, you'd only receive two tech points per consular level. The opposite would be true for an engineer; while they would get two tech points per engineer level as with short rest recovery techcasting, they would instead get four tech points per engineer level for long rest casting (again, ignoring additional tech points from their ability modifier).</p>

        <p>Note that if you are only swapping the rest mechanics, this has no impact on powers known or casting ability, as discussed earlier in this variant rule.</p>

        <h4>Sundry Sidney</h4>

        <blockquote><p>For those of you watching A Starstruck Odyssey, Sundry Sidney is a sentinel using techcasting instead of forcecasting. While they swapped the powers known, type of points, and casting ability, they maintained the long rest recovery of points. Consequently, she kept the three points per level a sentinel would normally receive, instead of halving the number received as with Improved Techcasting present in the Mechanist Scout archetype.</p></blockquote>

