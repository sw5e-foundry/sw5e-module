  - name: Dismantle
    _id: N0CzMUNL591lPMPv
    text:
      content: |-
        <h4>Dismantle</h4>

        <p><em>At-will tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> Special</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>You break or tear an unenhanced structure or object you touch that is not being worn or carried by a creature other than you. The break or tear can be up to 1 foot in any dimension. When cast this in this way, this power has a casting time of 1 minute.</p>

        <p>Alternatively, you can touch a droid or construct when you cast this power. Make a melee tech attack against the target. On a hit, the target takes 1d6 energy damage. When cast in this way, this power has a casting time of 1 action.</p>

        <p>This power’s damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>
