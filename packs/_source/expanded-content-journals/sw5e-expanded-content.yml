  - name: Detonator
    _id: EilXh7q2F3KgOO0a
    text:
      content: |-
        <h4>Detonator</h4>

        <p><em>At-will tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>You launch a detonator at a creature. Make a ranged tech attack against a creature you can see within range. On a hit, the target takes 1d6 fire damage, and each creature within 5 feet of the target must make a Dexterity saving throw or take 1d4 fire damage.</p>

        <p>This power's damage increases by one die when you reach 5th level (2d6/2d4), 11th level (3d6/3d4), and 17th level (4d6/4d4).</p>
