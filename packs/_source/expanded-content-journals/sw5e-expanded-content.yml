  - name: Path of Meditation
    _id: BlmSjcYF1xaz6FyK
    text:
      content: |+
        <h2>Path of Meditation</h2>

        <p>Throughout the Force, there is both symphonic harmony, and discordant chaos. Those sentinels who follow the Path of Meditation embody these concepts, empowering their allies and hindering their enemies through the use of the ancient Force technique of battle meditation.</p>

        <h3>Sage Counsel</h3>

        <em><strong>Path of Meditation:</strong> 3rd level</em><br>

        <p>You learn the <em>guidance</em> force power, which does not count against your total powers known. Additionally, this power's die increases by one step (from d4 to d6, d6 to d8, d8 to d10, or d10 to d12).</p>

        <h3>Force-Empowered Allies</h3>

        <em><strong>Path of Meditation:</strong> 3rd level</em><br>

        <p>While you are concentrating on a power that benefits a friendly creature other than you, you gain new ways to utilize your Force-Empowered Self features. Each option costs 1 force point, and you can only target a creature that is benefiting from a power you cast.</p>

        <h4>Deflection</h4>

        <p>When an ally is hit with an attack roll, you can use your reaction and roll a Kinetic Combat die to add it to your ally's AC, potentially causing the attack to miss.</p>

        <h4>Double Strike</h4>

        <p>When an ally hits with an attack roll, you can use your reaction and roll a Kinetic Combat die to deal additional damage of the same type as the attack.</p>

        <h4>Slow Time</h4>

        <p>When an ally moves on their turn, you can use your reaction and roll a Kinetic Combat die to increase their speed by 5 x the amount rolled until the end of the turn.</p>

        <h3>Unbreakable Focus</h3>

        <em><strong>Path of Meditation:</strong> 7th level</em><br>

        <p>Once per long rest, you can cast the <em>battle meditation</em> force power at its base level without expending force points. While concentrating on <em>battle meditation</em>, at the start of each of your turns, the power's die increases by one step (from d4 to d6, d6 to d8, d8 to d10, or d10 to d12).</p>

        <p>Additionally, whenever you make a Constitution saving throw to maintain concentration on a force power, you can treat a d20 roll of 9 or lower as a 10.</p>

        <h3>Turbulent Presence</h3>

        <em><strong>Path of Meditation:</strong> 13th level</em><br>

        <p>Once per long rest, you can cast the <em>improved battle meditation</em> force power at its base level without expending force points. While concentrating on <em>improved battle meditation</em>, at the start of each of your turns, the power's die increases by one step (from d6 to d8, d8 to d10, or d10 to d12).</p>



        <p>&emsp;Additionally, once per round, when a creature rolls a bonus or penalty die from an effect you control, you can have them roll the die with advantage or disadvantage (your choice).</p>

        <h3>Legendary Battle Meditation</h3>

        <em><strong>Path of Meditation:</strong> 18th level</em><br>

        <p>Once per long rest, you can cast the <em>master battle meditation</em> force power without expending force points. While concentrating on <em>master battle meditation</em>, at the start of each of your turns, the power's die increases by one step (from d8 to d10, or d10 to d12).</p>

        <p>Additionally, you gain a second reaction each round that you can only use for your Force-Empowered Allies feature. You can only take one reaction per turn.</p>

        <img src='https://www.gmbinder.com/images/FnJLXn8.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:380px' />

