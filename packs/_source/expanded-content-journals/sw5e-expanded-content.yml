  - name: Thisspiasian
    _id: Y1Nsj6fxot5L90bl
    text:
      content: |-
        <h2>Thisspiasian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Pale to green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, blond, brown, grey, or white (with age)</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Four arms, serpentine, large beards</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'8"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>250 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Thisspias</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Thisspiasian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Thisspiasians are easily recognized by their abundant beards and their long tails, which often reach over six feet. These tails are very strong and are commonly used to carry large objects. When meditating or at rest, a thisspiasian will coil their tail beneath their torso, reducing their height by several feet. They also possess four arms, with the upper set being stronger and larger. Each of their four hands have five fingers, and each finger is tipped with a long, sturdy claw. It is thought unsophisticated or unseemly by upper-class thisspiasians to have the bottom two visible in public, so they are generally hidden from sight via larger garments, with the smaller limbs sometimes even bound to their bodies. Thisspiasians need very little sleep to function normally, resting for only two hours a day, with brief meditative moments scattered throughout the day to refocus.</p>

        <h3>Society and Culture</h3>

        <p>Thisspiasian culture is one of proud warriors who keep their emotions well-concealed and their rages checked. Many outsiders see only a thisspiasian's outward facade of tranquility, and to most being it seems as if thisspiasians existed in a sea of calm. This is far from the truth, however, as they are in truth a very passionate species below the surface. A thisspiasian who doesn't meditate as often as they should will often be prone to otherwise atypical emotional outbursts.</p>

        <p>Thisspias is ruled by a hereditary leader called the Blood Monarch. Due to their seemingly archaic ruling structure, thisspiasians are often considered out-of-touch. </p>

        <h3>Names</h3>

        <p>Thisspiasian names typically are composed of two similar sounding syllables. Surnames are familial. </p>

        <p><strong>First Names.</strong> Annak, Effed, Emmet, Gorro, Koto</p>

        <p><strong>Surnames.</strong> Albarn, Braibel, Kirsingr, Raledurn</p>



        <h3>Thisspiasian Traits</h3>

        <p>As a thisspiasian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Thisspiasians reach adulthood in their 20s and often live more than a century.</p>

        <p><strong><em>Alignment.</em></strong> Thisspiasians' emotional composure causes them to tend toward lawful alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Thisspiasians typically stand 5 to 6 and a half feet tall and generally weigh about 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Claws.</em></strong> Your claws are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Cultured.</em></strong> You have proficiency in the Lore skill.</p>

        <p><strong><em>Four-Armed.</em></strong> Thisspiasians have four arms which they can use independently of one another. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required).</p>

        <p><strong><em>Inscrutable.</em></strong> Your calm demeanor and control make you hard to read. Wisdom (Insight) checks made against you have disadvantage, and you have advantage on any saving throw against an effect that would read your thoughts.</p>

        <p><strong><em>Prehensile Tail.</em></strong> You have supreme control over your tail and can use it to manipulate objects as well as your hands. </p>

        <p><strong><em>Trance.</em></strong> You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Thisspiasian. Thisspiasian is a complex language characterized by its interlocking sentences and heavy use of sibilants.</p>

        <img src='https://www.gmbinder.com/images/GZQ97jw.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:229px' />



