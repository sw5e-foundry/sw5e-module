  - name: Detective Pursuit
    _id: OxjydN2yZCpCU2o8
    text:
      content: |-
        <h2>Detective Pursuit</h2>

        <p></div></p>

        <p>Some individuals learn to hone their instincts to investigate and discover that which others can't see. Those scholars who choose the Detective Pursuit train themselves to see the things that others miss, gaining a unique�and powerful�perspective.</p>

        <h3>Martial Training</h3>

        <em><strong>Detective Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency in martial vibroweapons and the Investigation skill. Additionally, you can't have disadvantage on checks you make with it.</p>

        <h3>Intelligent Applications</h3>

        <em><strong>Detective Pursuit:</strong> 3rd level</em><br>

        <p>When you analyze a hostile creature with your Critical Analysis, you can use your Critical Analysis ability modifer with any weapon, as long as it does not have the heavy or special properties.</p>

        <h3>Extra Attack</h3>

        <em><strong>Detective Pursuit:</strong> 6th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h3>Sharp Instincts</h3>

        <em><strong>Detective Pursuit:</strong> 9th level</em><br>

        <p>Once on each of your turns, when you hit the target of your Critical Analysis with a melee weapon attack, you can make a Wisdom (Insight) check contested by the target's Charisma (Deception) check. If you win the contest, you deal an additional 1d8 damage to the target, which is the same type as the weapon's damage</p>

        <p>This die increases to d10 at 13th level and d12 at 17th level.</p>

        <h3>Discombobulate</h3>

        <em><strong>Detective Pursuit:</strong> 17th level</em><br>

        <p>When you use a scholar maneuver on a hostile creature, you can force that target to make a Wisdom saving throw against your maneuver save DC. On a failed save, the target is stunned for 1 minute. The target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success.</p>

        <p>Once you use this feature, you can't do so again until you finish a short or long rest.</p>

        <h3>Detective Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect your investigative prowess. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order.</p>

        <h4>Athletic</h4>

        <p>You gain your choice of a climbing, crawling, or swimming speed equal to your walking speed.</p>

        <h4>Brawler Adept</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>Your unarmed strike damage increases by one step (from 1 to d4, d4 to d6, or d6 to d8). Additionally, your unarmed strikes and count as enhanced for the purpose of overcoming resistance and immunity to unenhanced attacks and damage.</p>

        <h4>Eye for Attire</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>As an action, you can touch a suit of armor that isn't being worn or carried by a hostile creature and instantly don it, provided you aren't wearing armor already.</p>

        <h4>Eye for Detail</h4>

        <p>You take the Search action as a bonus action.</p>

        <h4>Ear for Deceit</h4>

        <p>Whenever you make a Wisdom (Insight) check to determine whether a creature is lying, treat a roll of 7 or lower on the d20 as an 8.</p>

        <h4>Fighting Style</h4>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting style options, detailed in Chapter 6 of the Player's Handbook.</p>

        <h4>Scrapper's Armor</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain proficiency in medium armor. If you are already proficient in medium armor, you instead gain proficiency in heavy armor.</p>

        <h4>Steady Eye</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>On your turn, you can reduce your speed by half to gain advantage on Wisdom (Perception) or Intelligence (Investigation) checks until the end of the turn. You can not use this feature if you have moved more than half your speed this turn.</p>

        <h4>Thirst for Justice</h4>

        <p>When you reduce a hostile creature to 0 hit points, but don't kill it outright, you gain temporary hit points equal to your scholar level, which last for 1 minute.</p>

        <h4>Unerring Eye</h4>

        <em><strong>Prerequisite:</strong> 15th level</em><br>

        <p>You can see the true form of any shapechanger or creature concealed by illusion while the creature is within 30 feet of you and within line of sight.</p>

