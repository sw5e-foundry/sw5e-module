  - name: Itemize
    _id: CZ1x48kza27YpcKf
    text:
      content: |-
        <h4>Itemize</h4>

        <p><em>At-will tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>You instantly learn the exact quantity of one type of item within 30 feet of you. It must be a type of item that you've handled in the past; you can't, for example, use <em>itemize</em> to find out how many <em>BKGs</em> are nearby if you've never handled such a weapon. The object being itemized must also be reasonably specific. You can learn how many meilooruns are nearby, for example, but not how much fruit.</p>
      format: 1
    src: null
