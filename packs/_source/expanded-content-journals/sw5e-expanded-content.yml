  - name: Jensaarai
    _id: Om1hD3IYocoBEJ4c
    text:
      content: |+
        <h2>Jensaarai</h2>

        <p>You are a Jensaarai, a Force user who has come to understand the failings of both Jedi inactivity and Sith malevolence. While they wield lightsabers, a true mark of skill among the Jensaarai is the crafting of their armor. Each suit is perfectly unique to the wearer, and is frequently (but not always) adorned and shaped to represent an animal that the Jensaarai finds kinship with, up to and potentially including additional mounted weapons or sensors to further emulate that creature.</p>

        <p>While the Jensaarai train in, and will use dark side powers when necessary, they seek to avoid true corruption. They are not evil, nor are they wholly good either. They are anti-heroes, and well-practiced in this craft. In addition, the Jensaarai train in more than the lightsaber, employing whatever tools are at hand to best fit the job.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Intimidation, Lore, and Perception</li><li><strong>Tool Proficiencies:</strong> Armormech's implements</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes including a robe, a sturdy knife, and a belt pouch containing 150 cr</li></ul>

        <h3>Feature: Depths of Duality</h3>

        <p>Due to the corruption of the Jedi training done to the pre-Jensaarai, you have a unique insight into both the Light and Dark side of the Force, as well as its history, applications, and techniques in a scholarly manner.</p>

        <p>You are well versed in the above concepts, and can recall key information related to them. However, if the research was hidden from the public and you have not had experience working with it, you can only partially understand it. You also recognize well-known Jedi Masters and Sith Lords by their works and marks.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Threatening</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Perceptive</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Alert</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Jensaarai are shaped by the unique capacity of their upbringing. Their study of the duality of the Force manifests in their mannerisms and ideals. Their bond might be their family or their armor. Their flaws might be some a hatred of the Jedi or Sith or a desire to become one or the other.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I ignore the rhetoric a person spouts when meeting them, preferring to judge them by action.</td></tr><tr><td>2</td><td>I'm the first to swing a punch, but the last to draw a weapon.</td></tr><tr><td>3</td><td>Danger is my middle name.</td></tr><tr><td>4</td><td>Goodwill is in short supply in the galaxy, and I always try to foster a little more wherever I go.</td></tr><tr><td>5</td><td>Both the Republic and the Empire have tried to crush us under their bootheels. I refuse to yield.</td></tr><tr><td>6</td><td>Defiant to the last isn't good enough. Upon death I will become a force spirit and continue to defy my killer.</td></tr><tr><td>7</td><td>Well-behaved people rarely make history.</td></tr><tr><td>8</td><td>What gave you the idea that I was going to give you a fair fight?</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Respect.</strong> Respect will be shown to everyone, disrespect will be shown to those who earn it. (Lawful)</td></tr><tr><td>2</td><td><strong>Freedom.</strong> People should be free to make their own way without interference. (Chaotic)</td></tr><tr><td>3</td><td><strong>Growth.</strong> Self-improvement is an unending chore, but one that must be done. (Any)</td></tr><tr><td>4</td><td><strong>Escalation.</strong> I will immediately end a hostile situation with all means at my disposal. (Neutral)</td></tr><tr><td>5</td><td><strong>Power.</strong> Given our luck with both Jedi and Sith, I need all I can get. (Dark)</td></tr><tr><td>6</td><td><strong>Redemption.</strong> There's a spark of good in everyone. (Light)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>The Jensaarai took me in when nobody else would. I back the order 100%.</td></tr><tr><td>2</td><td>I was once a Jedi, but grew disillusioned by their inactivity.</td></tr><tr><td>3</td><td>I fight for those who cannot fight for themselves.</td></tr><tr><td>4</td><td>I lost my mentor in battle. I will honor their sacrifice by destroying their killer.</td></tr><tr><td>5</td><td>I was able to slough off Dark Side corruption, but I couldn't avoid making amends.</td></tr><tr><td>6</td><td>The powerful use their strength to raise people up, not keep them down.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I might be a little too enamored with force choking my enemies.</td></tr><tr><td>2</td><td>I am my own worst critic, in everything I do.</td></tr><tr><td>3</td><td>My armor is precision crafted and has served me faithfully. I never give up a chance to prove how well.</td></tr><tr><td>4</td><td>I have a collection of lightsabers from fallen foes, and I love adding to it.</td></tr><tr><td>5</td><td>The Jedi and Sith worship the Force as a religion. I do everything I can to remind them they're just worshipping a hammer.</td></tr><tr><td>6</td><td>The minute you tell me that someone should not be crossed, I'm already crossing them.</td></tr></tbody></table>

