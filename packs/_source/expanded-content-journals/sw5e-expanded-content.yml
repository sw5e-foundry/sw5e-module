  - name: Telepathic Link
    _id: YUf0pR3l4gpVFuME
    text:
      content: |-
        <h4>Telepathic Link</h4>

        <p><em>1st-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Force Whisper</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>

        <p>You establish a telepathic link with one willing creature you touch. Until the power ends, whenever you and the target can see each other, each of you can communicate with the other via telepathy.</p>

        <p>You don't need to share a language with a creature for it to understand your telepathic utterances, and the creature understands you even if it lacks a language. The creature can respond to you telepathically as well, but it must understand at least one language in order to communicate this way. This power has no effect on droids or constructs.</p>

        <p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, the duration increases to concentration, up to 1 hour, and if either you or the creature you are linked to are surprised while the other isn't, and both of you can see each other, the surprised creature can still act normally on its first turn in combat, as if it were not surprised.</p>
