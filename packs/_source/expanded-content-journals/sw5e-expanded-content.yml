  - name: Weapon Proficiencies
    _id: JRJT1PRlQvwlFqzr
    text:
      content: |-
        <h3>Weapon Proficiencies</h3>

        <p>Many species come with specific weapon proficiencies suited to their species' culture, such as chiss or tuskens. If a player chooses a species and class combination that would grant the same weapon proficiencies, consider instead granting them a +1 bonus to damage rolls with the chosen weapon. For instance, at 1st level, a chiss scout with a 16 in Dexterity would have a +4 to damage rolls instead of a +3 when attacking with a blaster pistol or sniper rifle. A character should only gain this bonus once, and this bonus does not apply if the species offers a choice of weapons, such as human or echani.</p>
