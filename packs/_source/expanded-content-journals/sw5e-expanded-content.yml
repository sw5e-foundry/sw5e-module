  - name: Jar'Kai Form
    _id: InmRKSRIWLckPSaU
    text:
      content: |+
        <h2>Jar'Kai Form</h2>

        <p>Jar'Kai Form, also known as Domination Form, utilizes two weapons to overwhelm their foes. Those guardians who focus on Jar'Kai Form know that two weapons offer greater versatility than one, and capitalize on the twin angles from which they attack to subdue their enemies.</p>

        <h3>Form Basics</h3>

        <em><strong>Jar'Kai Form:</strong> 3rd level</em><br>

        <p>You gain the Jar'Kai lightsaber form, detailed in Chapter 6 of the Player's Handbook. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Acklay</h3>

        <em><strong>Jar'Kai Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter a destructive stance for one minute. While in this stance, you can add half your Strength or Dexterity modifier (your choice, minimum of one) to any melee weapon damage roll you make that doesn't already include that modifier. Additionally, when you hit a creature with a melee weapon attack, you can move up to 5 feet without provoking opportunity attacks.</p>

        <p>This effect ends early if you are incapacitated or die. Once you use this feature, you can't use it again until you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Jar'Kai Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>Twin Strike</h4>

        <p>Once per turn, when you miss with a melee weapon attack, you can expend a use of your Channel the Force to immediately make another melee weapon attack against the same target (no action required).</p>

        <h3>Eye of the Storm</h3>

        <em><strong>Jar'Kai Form:</strong> 7th level</em><br>

        <p>When you score a critical hit with a melee weapon attack, you regain an expended use of your Channel the Force.</p>

        <h3>Rising Whirlwind</h3>

        <em><strong>Jar'Kai Form:</strong> 15th level</em><br>

        <p>As an action, you can rush forward up to 30 feet to an unoccupied space you can see without provoking opportunity attacks. Each creature within 5 feet of your path must make a Dexterity saving throw (DC = 8 + your bonus to attacks with your weapon). A creature takes normal weapon damage on a failed save, or half as much on a successful one. If you are wielding separate two light- or vibro-weapons in each hand with which you are proficient, or a weapon with the double property, a creature makes this save with disadvantage, and takes additional damage equal to your Strength or Dexterity modifier (your choice, minimum of one) on a failed save if it doesn't already include that modifier.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>



        <h3>Master of Domination</h3>

        <em><strong>Jar'Kai Form:</strong> 20th level</em><br>

        <p>You are a whirlwind of strikes, eviscerating all who step within your reach. Your Strength and Dexterity scores increase by 2. Your maximum for these scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic, energy, and ion damage from weapons.</li><li>When you hit a creature with a melee weapon attack, you have advantage on the next melee weapon attack roll you make against that creature, and that creature provokes an opportunity attack from you even if they take the Disengage action before leaving your reach until the end of your next turn.</li><li>Creatures provoke an opportunity attack from you when they enter your reach.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you use this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/AWxckDM.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:430px' />

