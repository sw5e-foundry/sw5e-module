  - name: Beast Companion
    _id: KSPzaGHul8C6V1GZ
    text:
      content: |+
        <h2>Beast Companion </h2>

        <p>Your beast takes a form of your choosing. Alternatively, your GM can choose what form your beast takes based on your environment. Once you've chosen your beast's appearance, you assign your beast companion's ability scores. Your beast's Intelligence score is 6, and you assign its other ability scores using a standard array (16, 14, 12, 10, 8) as you see fit.</p>

        <hr>

        <h3>Beast Features</h3>

        <p>All beasts share the following traits.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d4 per beast companion level</li><li><strong>Hit Points at 1st Level:</strong> 4 + your beast's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d4 (or 3) + your beast's Constitution modifier per beast level after 1st</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Languages:</strong> Your beast can understand simple commands spoken in two languages of your choice, as well as hand signals, but it can not speak</li><li><strong>Size:</strong> Tiny</li><li><strong>Speed:</strong> 20 ft.</li><li><strong>Type:</strong> Beast</li><li><strong>Armor Class:</strong> Your beast's armor class equals 10 + its Dexterity modifier.</li><li><strong>Barding:</strong> Your beast requires proficiency in armor in order to have it made into barding for them, and if the your beast's size increases, the barding must be upgraded accordingly.</li><li><strong>Natural Weapon:</strong> Your beast companion attacks with a natural weapon, such as claws or a bite, with which it is proficient. On a hit, it deals 1d4 kinetic damage.</li><li><strong>Attitude:</strong> The beast obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your beast acts on its own.</li></ul>

        <h3>Bestial Traits</h3>

        <p>The traits are presented in alphabetical order. If a trait has prerequisites, your companion must meet them to adopt it. Your companion can adopt a trait at the same time that it meets the trait's prerequisites. Whenever your companion gains a level, it can exchange one trait for another one.</p>



        <h4>Aerial</h4>

        <p>Your companion has a flying speed equal to its walking speed, and opportunity attacks made against it have disadvantage.</p>

        <h4>Amphibious</h4>

        <p>Your companion has a swimming speed equal to its walking speed, and it can breathe air and water.</p>

        <h4>Burrower</h4>

        <p>Your companion has a burrowing speed equal to its walking speed, and it has blindsight out to 10 feet.</p>

        <h4>Charger</h4>

        <p>If your companion moves at least half its speed straight towards a target before making a melee attack, it deals an additional 1d8 damage on a hit.</p>

        <h4>Climber</h4>

        <p>Your companion has a climbing speed equal to its walking speed, and it has advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <h4>Closed Mind</h4>

        <p>Your companion has advantage on Wisdom and Charisma saving throws against force powers.</p>

        <h4>Darkvision</h4>

        <p>Your companion is accustomed to low-light environments. Your companion can see in dim light within 60 feet as if it were bright light, and in darkness as if it were dim light. Your companion can't discern color in darkness, only shades of gray.</p>

        <h4>Evasive</h4>

        <p>Your companion can take the Disengage action as a bonus action.</p>

        <h4>Force Adept</h4>

        <em><strong>Prerequisite:</strong> Force Sensitive</em><br>

        <p>Your companion learns one 2nd-level force power of your choice, and once per long rest it can cast it at 2nd-level without expending force points. Your companion's forcecasting ability is Wisdom or Charisma (depending on power alignment).</p>

        <h4>Force Contention</h4>

        <p>Your companion has advantage on Strength and Constitution saving throws against force powers.</p>

        <h4>Force-Sensitive</h4>

        <p>Your companion learns one at-will force power and one 1st-level force power, which it can cast at its lowest level once per long rest. Your companion's forcecasting ability is Wisdom or Charisma (depending on power alignment). At-will powers chosen by your companion do not scale normally at higher levels. Instead, if they would scale at 5th level, they instead scale at 11th level, and if they would scale at 11th level, they instead scale at 17th level.</p>



        <h4>Grappler</h4>

        <p>When your companion hits with a melee weapon attack, it can use a bonus action to attempt to grapple the target. On a success, the target is both grappled and restrained, and your companion can't attack again while it has a creature grappled.</p>

        <h4>Heavy Hide</h4>

        <p>Your companion's armor class becomes 14. </p>

        <h4>Keen Hearing</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on hearing.</p>

        <h4>Keen Sight</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on sight.</p>

        <h4>Keen Smell</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on smell.</p>

        <h4>Light Hide</h4>

        <p>Your companion's armor class becomes 11 + its Dexterity modifier.</p>

        <h4>Medium Hide</h4>

        <p>Your companion's armor class becomes 13 + its Dexterity modifier, to a maximum of +2.</p>

        <h4>Natural Camouflage</h4>

        <p>When your companion attempts to hide, it can opt to not move on its turn. If it avoids moving, it is considered lightly obscured until it moves.</p>

        <h4>Nimble Reflexes</h4>

        <p>Your companion has advantage on Dexterity and Intelligence saving throws against force powers.</p>

        <h4>Nimble Weapon</h4>

        <p>Your companion's natural weapon gains the finesse property.</p>

        <h4>Pack Tactics</h4>

        <p>Your companion has advantage on an attack roll against a creature if at least one ally of your companion is within 5 feet of the creature and the ally isn't incapacitated.</p>

        <h4>Pouncer </h4>

        <p>If your companion moves at least half its speed straight toward a creature and hits it with a melee attack, the creature must make a Strength saving throw (DC = 8 + your companion's proficiency bonus + its Strength modifier). If the creature is larger than your companion, it makes this save with advantage. On a failed save, the creature is knocked prone, and your companion can make one additional attack against it as a bonus action.</p>

        <h4>Powerful Build</h4>

        <p>Your companion's carrying capacity and the weight it can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <h4>Rampager</h4>

        <p>If your companion reduces a creature to 0 hit points with a melee attack on its turn, your companion can take a bonus action to move up to half its speed and make a melee attack.</p>

        <h4>Ranged Weapon</h4>

        <p>Your companion has a natural ranged weapon, such as a spitter or tail spikes. It has a normal range of 30 feet and a long range of 90 feet, and on a hit it deals kinetic damage equal to its natural weapon damage die. </p>

        <h4>Reach Weapon</h4>

        <p>Your companion has a natural weapon with reach, such as a tail or wings. It has the reach property, and on a hit it deals kinetic damage equal to its natural weapon damage die.</p>

        <h4>Size: Huge</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <em><strong>Prerequisite:</strong> Size Large</em><br>

        <p>Your companion's size is Huge. Its hit points increase by an amount equal to its level + 1, its Hit Die becomes a d12, its natural weapon damage die becomes a d12, and its walking speed increases to 40.</p>

        <h4>Size: Large</h4>

        <em><strong>Prerequisite:</strong> Size Medium</em><br>

        <p>Your companion's size is Large. Its hit points increase by an amount equal to its level + 1, its Hit Die becomes a d10, its natural weapon damage die becomes a d10, and its walking speed increases to 35.</p>

        <h4>Size: Medium</h4>

        <em><strong>Prerequisite:</strong> Size Small</em><br>

        <p>Your companion's size is Medium. Its hit points increase by an amount equal to its level + 1, its Hit Die becomes a d8, its natural weapon damage die becomes a d8, and its walking speed increases to 30.</p>

        <h4>Size: Small</h4>

        <p>Your companion's size is Small. Its hit points increase by an amount equal to its level + 1, its Hit Die becomes a d6, its natural weapon damage die becomes a d6, and its walking speed increases to 25.</p>

        <h4>Sturdy-Legged</h4>

        <p>Your companion's long jump is up to 20 feet and its high jump is up to 10 feet, with or without a running start, and it has advantage on Strength and Dexterity saving throws made against effects that would knock it prone.</p>

        <h4>Swift</h4>

        <p>Your companion can take the Dash action as a bonus action.</p>

        <h4>Tremorsense</h4>

        <p>Your companion gains tremorsense out to 30 feet.</p>

        <h4>Venomous Weapon</h4>

        <p>When your companion deals damage to a creature with its natural weapon, it must make a Constitution saving throw (DC = 8 + your companion's proficiency bonus + your companion's Constitution modifier) or become poisoned until the end of its next turn.</p>

