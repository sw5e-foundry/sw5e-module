  - name: Creation
    _id: aDH6immxFZW3oUfb
    text:
      content: |-
        <h3>Creation</h3>

        <p>Your destiny requires you to create an object, machine, or other item of great power or significant use. You must use this item in support of another character's destiny, or in a future destiny of your own. Others might help create the actual item, so long as you lead and make a significant contribution to the effort. Pursuing this destiny might require you to seek out rare or restricted materials, expert advice, and adequate construction facilities or shops.</p>

        <p>Examples of this destiny include Grand Moff Tarkin and the construction of the Death Star, Raith Sienar and the TIE fighter, and Walex Blissex and the <em>Victory</em>-class Star Destroyers.</p>

        <h4>Destiny Fulfilled</h4>

        <p>Once per short rest, you or any ally within line of sight can take two actions in a single round while performing an action using the created object.</p>
