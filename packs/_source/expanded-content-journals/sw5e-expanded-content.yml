  - name: Pyrokinesis
    _id: OnDgeeuYvJ2xfOAe
    text:
      content: |-
        <h4>Pyrokinesis</h4>

        <p><em>At-will universal power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>By stimulating air molecules, you create a zone of Force-enhanced fire on ground that you can see within range. Until the power ends, the enhanced fire fills a 5-foot cube. Any creature in the fire's space when you cast the power must succeed on a Dexterity saving throw or take 1d8 energy damage. A creature must also make the saving throw when it moves into the fire's space for the first time on a turn or ends its turn there.</p>

        <p>The fire ignites flammable objects in its area that aren't being worn or carried.</p>

        <p>The power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).</p>
