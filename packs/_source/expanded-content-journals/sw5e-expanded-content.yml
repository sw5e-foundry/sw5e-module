  - name: Combined Weapons
    _id: 3JhTZi9B8iHzbGmC
    text:
      content: |-
        <h3>Combined Weapons</h3>

        <p>Once you've combined two weapons, you can readily switch between each weapon by using your object interaction on your turn. The combined weapon's weight is equal to the total weight of each individual part, and each weapon uses the appropriate damage and properties as shown in its statistics in the Weapons table.</p>

        <p>For instance, a 3rd-level character decides they want to combine a greatsaber and a doublesaber. They have both weapons available, as well as a set of artificer's tools. After spending one hour, they make an ability check with the tools, resulting in a 17. The weapons are successfully combined, and using their object interaction each turn, the character can switch from a greatsaber to a doublesaber, or back again.</p>

        <p>When the character reaches 5th level, they decide they want to add a lightwhip to the mix. They obtain a lightwhip, and attempt to combine it with their current weapon over the course of an hour with their artificer's tools. At the end of the hour, however, they only roll an 8 on the check, failing to combine the third weapon. They must wait until tomorrow to try again.</p>

        <h4>Blasters</h4>

        <p>Unlike light- and vibro-weapons, you can't combine multiple blasters. Instead, you can integrate a wrist launcher attachment to a blaster, as long as the weapon lacks the fixed property. This attachment can fire all wrist launcher ammunition with a range of 20/40, or it can fire grenades with a range of 40/80. This attachment has a reload value of 2, it can have different ammunition types loaded simultaneously, and you can choose which ammunition you're using as you fire it (no action required). Each ammunition must be reloaded separately.</p>

        <p>When you would attempt to combine an additional weapon, you can instead attempt to increase this attachment's reload property by making an ability check with the appropriate tool and consulting the Combination/Separation DC by Weapons table.</p>

