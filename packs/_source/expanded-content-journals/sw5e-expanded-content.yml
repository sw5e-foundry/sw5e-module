  - name: Proficiency Points
    _id: HCUQ9RKFq0HcgSl3
    text:
      content: |-
        <h3>Proficiency Points</h3>

        <p>Each character gains a number of proficiency points equal to their proficiency bonus. These proficiency points can be spent to learn languages or tool proficiencies at a ratio of 1 point per language or tool.</p>

        <h4>Tool Expertise</h4>

        <p>If a character wants to instead use their points to gain expertise in a tool, the GM might allow them to spend 2 proficiency points to gain expertise in a tool in which they are already proficient.</p>
