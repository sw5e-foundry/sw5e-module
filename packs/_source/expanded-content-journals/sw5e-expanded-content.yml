  - name: Fighting Styles
    _id: QsFvVdmBYCqMF7S6
    text:
      content: |-
        <h3>Fighting Styles</h3>

        <p>Certain class features or feats offer your choice of Fighting Style. Choose from the following. You can't take a Fighting Style option more than once, even if you later get to choose again.</p>

        <h4>Brawling</h4>

        <p>You are skilled at using your weight to your advantage. You gain the following benefits:</p>

        <ul><li>You are proficient with improvised weapons.</li><li>Your unarmed strike damage increases by one step (from 1 to d4, d4 to d6, or d6 to d8).</li><li>When you attempt to shove or grapple a creature, or make an attack against a creature with an unarmed strike or an improvised weapon wielded in one hand on your turn, you can use your bonus action to make an additional attack, grapple, or shove against the same creature.</li></ul>

        <h4>Close Quarters Shooting</h4>

        <p>You are skilled at getting up close and personal with blaster weapons. While you are wielding a blaster weapon with which you are proficient, you gain the following benefits:</p>

        <ul><li>When making a ranged weapon attack while you are within 5 feet of a hostile creature, you do not have disadvantage on the attack roll. </li><li>Your ranged weapon attacks ignore half cover against targets within 15 feet of you. </li><li>You gain a +1 bonus to attack rolls you make with blaster weapons.</li></ul>

        <h4>Defense</h4>

        <p>You are skilled at the art of defending yourself. While you are wearing armor with which you are proficient, you gain the following benefits:</p>

        <ul><li>You gain a +1 bonus to AC.</li><li>You have advantage on ability checks and saving throws to avoid being moved.</li></ul>

        <h4>Dueling</h4>

        <p>You are skilled in the art of fighting with a single melee weapon. While you are wielding a melee weapon in one hand with which you are proficient and no other weapons, you gain a +2 bonus to damage rolls.</p>

        <h4>Equilibrium</h4>

        <p>You are skilled at fighting while minimally armored. While you are wearing no armor and not wielding a medium or heavy shield, you gain the following benefits:</p>

        <ul><li>You gain a +1 bonus to AC.</li><li>You gain a +1 bonus to attack rolls you make with unarmed strikes and weapon attacks.</li></ul>

        <h4>Great Weapon Fighting</h4>

        <p>You are skilled at putting the weight of a weapon to your advantage. While you are wielding a melee weapon in two hands with which you are proficient, when you roll a 1 or 2 on a damage die for an attack, you can reroll the die and must use the new roll, even if the new roll is a 1 or a 2. </p>

        <h4>Sentinel</h4>

        <p>You are skilled at techniques that take advantage of every drop in any enemy's guard. While you are wielding a melee weapon with which you are proficient, you can use a bonus action to enter a defensive stance that lasts until the start of your next turn. While in your defensive stance, you can make a number of opportunity attacks equal to your proficiency bonus without using your reaction, and you can use your reaction to make a melee attack against a creature that moves more than 5 feet while within your reach.</p>

        <h4>Sharpshooting</h4>

        <p>You are skilled with blaster weapons and can make shots that others find difficult. While you are wielding a blaster weapon with which you are proficient, gain a +2 bonus to ranged weapon attacks.</p>

        <h4>Shielding</h4>

        <p>You are skilled at using your shield to defend your allies as well as yourself. While you are wielding a shield with which you are proficient, you gain the following benefits:</p>

        <ul><li>When a creature you can see attacks a target other than you that is within 5 feet of you, you can use your reaction to impose disadvantage on the attack roll.</li><li>If you are wielding a heavy shield, you are no longer required to wield a weapon with the light property in the other hand.</li></ul>

        <h4>Throwing</h4>

        <p>You are skilled with the techniques of throwing weapons. While you are wielding a weapon with the thrown property with which you are proficient, you gain the following benefits:</p>

        <ul><li>You gain a +1 bonus to ranged attack and damage rolls. </li><li>Whenever you make a ranged attack with a thrown weapon, you can immediately draw another weapon as part of the attack.</li></ul>

        <h4>Two-Weapon Fighting</h4>

        <p>You are skilled at fighting with two weapons. While you are wielding separate weapons in each hand, or a weapon with the double property, with which you are proficient, you gain the following benefits:</p>

        <ul><li>When you engage in Two-Weapon Fighting, you can add your ability modifier to the damage of your Two-Weapon Fighting attack.</li><li>When you make an opportunity attack, you can attack with both of your weapons.</li></ul>

        <h4>Versatile Fighting</h4>

        <p>You are skilled at using weapons in different ways. While you are wielding a melee weapon with the versatile property with which you are proficient and no other weapons, you gain the following benefits:</p>

        <ul><li>You gain a +1 bonus to attack rolls while wielding a weapon in one hand.</li><li>You gain a +1 bonus to damage rolls while wielding a weapon in two hands.</li></ul>
