  - name: Codru-Ji
    _id: MPW10zo8p5hF98PH
    text:
      content: |-
        <h2>Codru-Ji</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Light to dark tones</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, brown, gray, or white (usually with age)</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, slate, gray, or brown</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Four arms</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'6"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>90 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Munto Codru</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Codruese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Codru-Ji are humanoids generally near-human in their adult appearances, save for their four arms. While their hair, eye, and skin pigmentations tend towards earthen hues, brighter colorations such as blonde hair or blue eyes, though uncommon, also exist. Rarer still, some adults maintain a light coat of fur or elongated, pointed ears. These eccentric attributes result from their unusual childhood forms.</p>

        <p>Codru-Ji children are actually sapient, six-legged canid creatures that cannot speak. Codru-Ji in this stage of their lives are called Wyrwulves: they mature to their more recognizable figures after reaching puberty. At that point, a blue, rubbery substance cocoons a Wyrwulf for several weeks before it emerges as a humanoid adolescent. They do, however, retain both the natural resilience and the enhanced hearing of their previous selves.</p>

        <h3>Society and Culture</h3>

        <p>The Codru-Ji are proud and protective of their ancient customs, and they carefully manage their homeworld's economy to keep a degree of anonymity from the galaxy at large. They fear the tainting of their long-held practices by outside influence as well as prejudice against them for the almost barbaric level of callousness they will display towards one another in pursuit of personal gain. The kidnapping of a political rivals' children or the ransoming of off-worlders back to their people are both common practices. </p>

        <h3>Names</h3>

        <p>Codru-Ji names are often kept to two syllables. Clan names are appended to the given name as a hyphenated affix.</p>

        <p><strong>Male Names.</strong> Kossok, Tirrit, Uttar, Yunnan</p>

        <p><strong>Female Names.</strong> Davvi, Kella, Russa, Zollu </p>

        <p><strong>Clan Names.</strong> -Fa, -Mu, Ro-, -Sy, Yi-</p>



        <h3>Codru-Ji Traits</h3>

        <p>As a codru-ji, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Codru-Ji reach adulthood in their early teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Steeped in selfish tradition, Codru-Ji tend towards the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Codru-Ji stand 5 to 6 feet tall and weigh around 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Four-Armed.</em></strong> Codru-Ji have four arms which they can use independently of one another. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required).</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 12 + your Dexterity modifier.</p>

        <p><strong><em>Keen Hearing.</em></strong> You have advantage on Wisdom (Perception) checks that rely on hearing.</p>

        <p><strong><em>Natural Grappler.</em></strong> Whenever you make a Strength (Athletics) check to grapple you are considered to have expertise in the Athletics skill.</p>

        <p><strong><em>Trance.</em></strong> You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Codruese, which has a solemn and stately cadence to it.</p>

        <img src='https://www.gmbinder.com/images/uLDGz5m.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:235px' />



