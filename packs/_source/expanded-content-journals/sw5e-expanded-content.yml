  - name: Kage
    _id: V7n8Wa8BcZyhZZRn
    text:
      content: |-
        <h2>Kage</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Gray, white</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Gray, pale yellow, white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Green, pink, red, yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Athleticism, pale skin, piercing eyes</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'9"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>95 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Quarzite</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Galactic Basic</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The kage are a pale-skinned sentient species native to the caverns in the planet of Quarzite. The kage have a long-time conflict with the belugans, consistently at odds with them. During the Clone Wars, Otua Blank ordered the capture of Pluma Sodi to marry her, she was later given back to the Kage Warriors by Asajj Ventress. </p>

        <h3>Society and Culture</h3>

        <p>The kage are a dedicated people of physical excellence; they train tireless and elite fighter-monks known as Kage warriors. They tend to use weapons with electric or disruptive properties, but they are also great fighters in unarmed combat. Kage warriors are respected in Kage society as the greatest calling a kage might follow.</p>

        <p>Kage also share an affinity with animals, most notably the native multi-legged milodon, developing a symbiotic relationship. They use the milodon as transport; they can keep pace with the subtram transports that supply belugan strongholds, and launch raids that often catch the belugan security forces off-guard.</p>

        <h3>Names</h3>

        <p>Kage names are generally multisyllable with melodic intonations. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Baalin, Forta, Krismo, Rafa, Timko</p>

        <p><strong>Female Names.</strong> Chena, Fari, Moora, Ooni, Pluma</p>

        <p><strong>Surnames.</strong> Buno, Keeli, Nima, Sodi, Tani</p>



        <h3>Kage Traits</h3>

        <p>As a kage, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Kage reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Kages' rigid sense of honor causes them to tend toward lawful light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Kage typically stand between 5 and 6 feet tall, and weigh around 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Animal Handler.</em></strong> You are proficient in Animal Handling.</p>

        <p><strong><em>Athletic.</em></strong> You have proficiency in the Athletics skill.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Sunlight Sensitivity.</em></strong> You have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in direct sunlight.</p>

        <p><strong><em>Superior Darkvision.</em></strong> You've lived most of your life without direct sunlight. You can see in dim light within 120 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Unarmed Combatant.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Weapon Training.</em></strong> Kage are adept warriors. You are proficient with the electroprod and electrostaff.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and one language of your choice.</p>

        <img src='https://www.gmbinder.com/images/ELW9r8k.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:200px' />



