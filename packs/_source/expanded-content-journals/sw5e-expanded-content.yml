  - name: Pyke
    _id: CvKNprRVsqXWEQ98
    text:
      content: |-
        <h2>Pyke</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Gray or green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Blue, magenta, or purple</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Elongated, tapered skull with an undersized face</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'2"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Oba Diah</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Pyke</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>A sentient species, the pykes are humanoid, although slimmer and taller than most humans. They have two long, lanky legs, and two arms that end in three-fingered hands. Their heads are large and elongated, with a tapered skull and an undersized face, a feature which some other species find unsettling. Pykes had two narrow, almond-shaped eyes which could be magenta or blue in color.</p>

        <h3>Society and Culture</h3>

        <p>Pykes hail from Oba Diah, a terrestrial planet marked by obsidian cliffs. Visitors to Oba Diah view both the population and terrain as unwelcoming. The pyke homeworld serves as the headquarters of the Pyke Syndicate, a criminal dealership within the Spice Cartel that operates in the criminal underworld distributing spice, an illicit substance harvested by slaves in the spice mines of the planet Kessel. To deliver spice to their customers, such as crime families on Coruscant, the Pyke Syndicate relies on smugglers and freighter captains to complete the dangerous Kessel Run. The Pyke Syndicate almost completely controls the production of raw spice in the galaxy, while maintaining tentative alliances with other criminal organizations throughout the galaxy, such as the Black Sun and the Crimson Dawn. </p>

        <h3>Names</h3>

        <p>Pyke names are often influenced by naming conventions of other species, with their rarely-used surnames being familial.</p>

        <p><strong>Male Names.</strong> Dor, Eife, Qalo, Thok, Zret</p>

        <p><strong>Female Names.</strong> Gali, Taela, Shethni, Vent, Zeeren</p>

        <p><strong>Surnames.</strong> Kemtol, Nek, Pyke, Safet, Welkor </p>



        <h3>Pyke Traits</h3>

        <p>As a pyke, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Pykes reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Due to their underhanded nature, Pykes tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Pykes typically stand 6 to 6 and a half feet tall and generally weigh about 155 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Long-Limbed.</em></strong> When you make a melee attack on your turn, your reach for it is 5 feet greater than normal.</p>

        <p><strong><em>Mercantile.</em></strong> You have proficiency in one of the following skills of your choice: Deception, Persuasion, or Intimidation. </p>

        <p><strong><em>Notorious Slavers.</em></strong> Whenever you make an ability check related to the buying, selling, or controlling of slaves, you are considered proficient in the check. If you would already be proficient, you instead have expertise.</p>

        <p><strong><em>Spicer.</em></strong> You are proficient in spicer's kit. </p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Pyke. The Pyke language is characterized by its multisyllable grunts.</p>

        <img src='https://www.gmbinder.com/images/AA8RHNh.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:453px' />



