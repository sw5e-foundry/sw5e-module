  - name: Break
    _id: FtfwCfAPXFCAb1dC
    text:
      content: |-
        <h4>Break</h4>

        <p><em>At-will universal power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>You inflict 10 force damage to an object you can see within range that is not being worn or carried, generating an explosion of sound that can be heard up to 100 feet away. Even if the object is not destroyed, small shards of shrapnel fly at creatures within 5 feet of it. Each creature must make a Dexterity saving throw. On a failed save, a creature takes 1d4 kinetic damage. </p>

        <p>This power’s kinetic damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4), and the power’s force damage also increases by 10 at each of these levels.</p>
