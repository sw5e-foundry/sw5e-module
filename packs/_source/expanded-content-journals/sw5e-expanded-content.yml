  - name: Aleena
    _id: 3QxOiWvXVGcJozxV
    text:
      content: |-
        <h2>Aleena</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Blue, gray, purple, tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Blue</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Short stature, scaly skin, crested head</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>2'1"</td><td>+2d4"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>35 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Aleen</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Aleena</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Aleena are short, reptilian bipeds with large eyes and wide mouths full of small, sharp teeth. Aleena's bodies are long compared to their short arms and stubby legs. Warm-blooded reptiles, they possess exceptional reflexes as well as a fast metabolism which allow them to convert food into energy very rapidly in order to escape predators on their harsh home planet. </p>

        <h3>Society and Culture</h3>

        <p>Aleena are social and tend to thrive best in with close-knit teams if not with their own kind. They develop strong loyalties to friends and protect those they care about fiercely. Due to their inborn curiosity, the aleena are stereotypically galactic travelers, tourists in every sense. This, combined with their strong dedication to their relatives, results in aleena families traveling even to most unusual and dangerous locations just to see its sights. The appearance of aleena family walking through an intergalactic metropolis is a common sight on many planets. The aleena's love of sports and particularly, adventure and thrill sports, draw many into the galactic community. Most who enter professional classes are experts or diplomats. </p>

        <p>Aleena settlements were small, and most individuals were part of a single lineage, or tahiko. The leader of each tahiko led the community, and represented their wishes to the planetary advisory body. The advisory body elected a king to govern the planet, and was generally revered as a religious figure as they led religious ceremonies. </p>

        <h3>Names</h3>

        <p>Aleena names are generally short and guttural, with longer names being saved for royalty. Surnames are based on their tahiko, or tribal lineage.</p>

        <p><strong>Male Names.</strong> Batts, Gratz, Wakka, Zakan, Zetts</p>

        <p><strong>Female Names.</strong> Arkei, Harza, Sutci, Tsuon, Yenn, </p>

        <p><strong>Surnames.</strong> Anares, Kylar, Ors, Practes, Targae</p>



        <h3>Aleena Traits</h3>

        <p>As an aleena, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Aleena reach adulthood in their late teens and live to be about 80.</p>

        <p><strong><em>Alignment.</em></strong> Aleena's benevolent yet curious nature causes them to tend toward chaotic light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Aleena typically stand 2 and a half to 3 feet tall and generally weigh about 35 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Bite.</em></strong> Your sharp teeth are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage. Lastly, as a bonus action, you can perform a special bite attack. On a hit, the target suffers the attack's normal effects, you gain temporary hit points equal to your Constitution modifier (minimum of 1), and you can't use this trait again until you finish a short or long rest.</p>

        <p><strong><em>Cosmopolitan.</em></strong> You have proficiency in Lore.</p>

        <p><strong><em>Nimble Escape.</em></strong> You can take the Disengage or Hide action as a bonus action on each of its turns.</p>

        <p><strong><em>Nimbleness.</em></strong> You can move through the space of any creature that is of a size larger than yours.</p>

        <p><strong><em>Racer's Reflexes.</em></strong> Whenever you make a Dexterity ability check, attack roll, or saving throw, you can choose to add 1d4 to the result. You can choose to do this after the check is rolled, but before the DM determines if you've passed or failed the check. You cannot do so again until you complete a short or long rest.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Aleena. Aleena is characterized by its use of short syllables and energetic movements to convey urgency and emotion.</p>

        <img src='https://www.gmbinder.com/images/hISRoiP.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:208px' />



