  - name: Dowutin, Young
    _id: FaL1B56QV1iLVGMN
    text:
      content: |-
        <h2>Dowutin, Young</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Brown, orange, or orange-green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black or white</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Chin horns, thick skin, imposing build, never stop growing</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>6'3"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>200 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Dowut</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Dowuta</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Dowutin species evolved from a type of omnivorous herd animal on the planet Dowut. They were large, aggressive-looking humanoids with chin horns, sharp claws, thick skin, and had poor eyesight but superior senses of hearing and smell. Dowutin are massive humanoids who can live for centuries, and dying of old age is unheard of for them. While most other species become frail as they age, Dowutin never stop growing and getting stronger. As teenagers, Dowutin resemble Wookiees in size and strength, but by their fifth century, they are a mountain of muscle weighing a metric ton, with loud footsteps and voices warning other species away.</p>

        <h3>Society and Culture</h3>

        <p>Dowutin are a very straightforward people, and their society is among the most simple in the galaxy. They have few cities, governments, or even organized social structures, as they often survive entirely on their own. Children are left behind by their families at a very young age and must learn to fend for themselves. Because of this, those who quickly learned hunting skills survived. Their size and strength made them prized as hired muscle, but most Dowutins' pride dissuaded them from such work, as they viewed other species as weak, absolutely refusing to take orders from anyone who is physically weaker than them. As such, those who employ Dowutin will command them in more subtle ways, typically phrasing their commands as suggestions or advice. Strength in the literal sense is very important to them; it is a measure of worth and earns them respect. </p>

        <h3>Names</h3>

        <p>Dowutin names are harsh and guttural, and roll off the tongue like a rock slide. Dowutin do not use surnames.</p>

        <p><strong>First Names.</strong> Dursuc, Grimgorl, Maucro, Tornak</p>



        <h3>Dowutin Traits</h3>

        <p>As a dowutin, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Dowutins are considered a child until around the age of 75 in which they are a full fledged adult. Dowutins can live upwards of 900 years with even more ancient ones exceeding that.</p>

        <p><strong><em>Alignment.</em></strong> Dowutins are aggressive and brash, causing them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Dowutins have a unique special characteristic; from birth to death, they never stop growing. Even as an adolescent, dowutins tend to tower over other species, reaching heights over 8 feet and weighing 400 pounds. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Claws.</em></strong> Your claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier. Additionally, you have advantage on Constitution saving throws made to avoid exhaustion due to extreme cold.</p>

        <p><strong><em>Hunter.</em></strong> You have proficiency in the Survival skill.</p>

        <p><strong><em>Keen Hearing and Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve hearing or smell.</p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Dowuta. Dowuta consists of deep, booming vocalizations and is considered difficult for members of other species to emulate. </p>

        <img src='https://www.gmbinder.com/images/MEaHybL.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:276.5px' />



