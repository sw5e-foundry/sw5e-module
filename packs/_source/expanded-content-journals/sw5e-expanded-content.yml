  - name: Battlemind
    _id: JVdcGRPi2rGgC1Lp
    text:
      content: |-
        <h4>Battlemind</h4>

        <p><em>2nd-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Battle Precognition</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>

        <p>Through the Force, you gain a limited form of telepathy that enables you to anticipate the moves of your opponents in combat. While you aren't wearing armor or wielding a shield, you gain a +2 AC bonus against melee attacks and a +3 AC bonus against ranged attacks.</p>

        <p>This AC bonus is not applied against attacks from droids, constructs, or creatures with resistance or immunity to psychic damage.</p>
