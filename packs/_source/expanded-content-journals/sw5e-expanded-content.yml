  - name: Gladiator
    _id: UQBEXchV75jgZJ5M
    text:
      content: |+
        <h2>Gladiator</h2>

        <p>A gladiator is as much an entertainer as any minstrel or circus performer, trained to make the arts of combat into a spectacle the crowd can enjoy. This kind of flashy combat is your entertainer routine, though you might also have some skills as a tumbler or actor. Using your A Champion Well Known feature, you can find a place to perform in any place that features combat for entertainment�perhaps a gladiatorial arena or secret pit fighting club. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Acrobatics, Athletics, Intimidation, and Performance</li><li><strong>Tool Proficiencies:</strong> One type of musical instrument</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A trophy earned via some sort of competition, clothing suitable to your profession, and a belt pouch containing 150 cr</li></ul>

        <h3>Feature: A Champion Well Known</h3>

        <p>You can always find a place to perform, usually in an inn or tavern but possibly with a circus, at a theater, or even in a noble's court. At such a place, you receive free lodging and food of a modest or comfortable standard (depending on the quality of the establishment), as long as you perform each night. In addition, your performance makes you something of a local figure. When strangers recognize you in a town where you have performed, they typically take a liking to you.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Acrobat</td></tr><tr><td>2</td><td>Brawny</td></tr><tr><td>3</td><td>Threatening</td></tr><tr><td>4</td><td>Performer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Entertainer</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Athlete</td></tr><tr><td>8</td><td>Durable</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Successful entertainers have to be able to capture and hold an audience's attention, so they tend to have flamboyant or forceful personalities. They're inclined toward the romantic and often cling to high-minded ideals about the practice of art and the appreciation of beauty.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I know a story relevant to almost every situation.</td></tr><tr><td>2</td><td>Whenever I come to a new place, I collect local rumors and spread gossip.</td></tr><tr><td>3</td><td>I'm a hopeless romantic, always searching for that �special someone.�</td></tr><tr><td>4</td><td>Nobody stays angry at me or around me for long, since I can defuse any amount of tension.</td></tr><tr><td>5</td><td>I love a good insult, even one directed at me.</td></tr><tr><td>6</td><td>I get bitter if I'm not the center of attention.</td></tr><tr><td>7</td><td>I'll settle for nothing less than perfection.</td></tr><tr><td>8</td><td>I change my mood or my mind as quickly as I change key in a song.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Beauty.</strong> When I perform, I make the world better than it was. (Light)</td></tr><tr><td>2</td><td><strong>Tradition.</strong> The stories, legends, and songs of the past must never be forgotten, for they teach us who we are. (Lawful)</td></tr><tr><td>3</td><td><strong>Creativity.</strong> The world is in need of new ideas and bold action. (Chaotic)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I'm only in it for the money and fame. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I like seeing the smiles on people's faces when I perform. That's all that matters. (Neutral)</td></tr><tr><td>6</td><td><strong>Honesty.</strong> Art should reflect the soul; it should come from within and reveal who we really are. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My instrument is my most treasured possession, and it reminds me of someone I love.</td></tr><tr><td>2</td><td>Someone stole my precious trophy, and someday I'll get it back.</td></tr><tr><td>3</td><td>I want to be famous, whatever it takes.</td></tr><tr><td>4</td><td>I idolize a hero of the old tales and measure my deeds against that person's.</td></tr><tr><td>5</td><td>I will do anything to prove myself superior to my hated rival.</td></tr><tr><td>6</td><td>I would do anything for the other members of my old troupe.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I'll do anything to win fame and renown.</td></tr><tr><td>2</td><td>I'm a sucker for a pretty face.</td></tr><tr><td>3</td><td>A scandal prevents me from ever going home again. That kind of trouble seems to follow me around.</td></tr><tr><td>4</td><td>I once satirized a noble who still wants my head. It was a mistake that I will likely repeat.</td></tr><tr><td>5</td><td>I have trouble keeping my true feelings hidden. My sharp tongue lands me in trouble.</td></tr><tr><td>6</td><td>Despite my best efforts, I am unreliable to my friends.</td></tr></tbody></table>

