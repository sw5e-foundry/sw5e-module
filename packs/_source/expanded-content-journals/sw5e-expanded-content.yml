  - name: Invocation Versatility
    _id: 75lGiV5d7CnxRDLj
    text:
      content: |-
        <h2>Invocation Versatility</h2>

        <p></div></p>

        <p>With the semi-recent release that added a second level of customization classes that lack them�collectively referred to as invocations, due to their inspiration from the warlock feature of that name�every class now has two levels of customization available to them: their class's invocation feature, and their archetype. Most (all?) of the class's invocation features are hard-locked; that is, once you choose it, you've got it for life. Benevolent GMs might allow players to replace a choice if they found it underwhelming, but others might not. With this variant rule, however, it is encouraged for GMs to allow their player's to rechoose invocations <em>on a case-by-case basis.</em></p>
