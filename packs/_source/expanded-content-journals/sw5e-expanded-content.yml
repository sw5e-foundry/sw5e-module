  - name: Teacher
    _id: Iq6BmlGoxSUS5yfb
    text:
      content: |+
        <h2>Teacher</h2>

        <p>You are an experienced teacher who knows how to best instruct others in an array of disciplines.  Although you have a vast amount of knowledge yourself, pedagogy is the most important tool in your toolbox because it allows the rest of your knowledge to spread most efficiently.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Lore, Nature, Performance, and Technology</li><li><strong>Tool Proficiencies:</strong> One instrument or set of artisan's implements of your choice</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, an instrument or set of tools with which you are proficient, a token from a former student, and a belt pouch containing 50 cr</li></ul>

        <h3>Feature: Knowledge</h3>

        <p>If you need information on something, you know if there is a book containing that information and where to find it. Further, when you hear a creature speaking or when you see language written down, you can identify exactly what language is being used even if you are not proficient in the language.  Finally, when you hear music, you know which instruments are being used in the performance, even if you are not proficient in their use. </p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Loremaster</td></tr><tr><td>2</td><td>Naturalist</td></tr><tr><td>3</td><td>Performer</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Entertainer</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Feigned Confidence</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>As a teacher you are devoted to educating others, as well as learning new information for yourself. It is up to you whether you are preachy or wise, a bookworm or more kinesthetic, a note taker or visual learner.  In any case, you are most likely underappreciated.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>Books are my everything.</td></tr><tr><td>2</td><td>Knowledge is the most important thing in the world.</td></tr><tr><td>3</td><td>I have quotes for every occasion.</td></tr><tr><td>4</td><td>My vocabulary is vast enough I sometimes use words that are larger than necessary.</td></tr><tr><td>5</td><td>I love working with kids.</td></tr><tr><td>6</td><td>Because I understand why people can make mistakes, I am also patient with them.</td></tr><tr><td>7</td><td>Sometimes I start explaining things at a level much to basic for the audience.</td></tr><tr><td>8</td><td>I reward hard work and good manners.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Teach.</strong> I must spread what I have learned. (Lawful)</td></tr><tr><td>2</td><td><strong>Insatiable.</strong> When I find something new I must learn everything about it, no matter the cost. (Chaotic)</td></tr><tr><td>3</td><td><strong>Discovery.</strong> Every single piece of information is waiting to be discovered. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> Every piece of knowledge will be mine. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I will teach anybody anything. (Neutral)</td></tr><tr><td>6</td><td><strong>Power.</strong> Knowledge is power. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I was picked on while growing up for being a bookworm.</td></tr><tr><td>2</td><td>The world is such an open place, I feel like there is still so much to learn. I want to compile knowledge from different places.</td></tr><tr><td>3</td><td>I like reading books and writing, but I'm no poet yet. It is just a hobby I want to share with others, looking for exotic inspirations.</td></tr><tr><td>4</td><td>I will become the power behind the throne by controlling the information the throne receives.</td></tr><tr><td>5</td><td>Children are our future, and I will mold them.</td></tr><tr><td>6</td><td>I can't teach what I don't know. I will teach everything.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>Someone showing bad manners does not exist to me. I will never talk to or acknowledge that person.</td></tr><tr><td>2</td><td>I overemphasize the importance of discipline.</td></tr><tr><td>3</td><td>I invest so much time into planning that I can't bring myself to deviate from the plan, even when it is needed.</td></tr><tr><td>4</td><td>I look down on uneducated adults.</td></tr><tr><td>5</td><td>I'd give up my companions for a piece of secret information.</td></tr><tr><td>6</td><td>I can't stand not reading at least one page of a book a day.</td></tr></tbody></table>

