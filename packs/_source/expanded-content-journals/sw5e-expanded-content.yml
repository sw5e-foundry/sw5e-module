  - name: Champion
    _id: QSR5fSD7K4c1Y4Db
    text:
      content: |-
        <h3>Champion</h3>

        <p>Your destiny requires your to become leader of a large and/or significant group or organization and successfully lead it through an extremely threatening event. Characters who have this destiny might or might not know of the group they are destined to lead. They must attain this goal through a mixture of training, charisma, experience and political maneuvering. The GM might want to divide this into two destinies: attaining leadership and leading the group through troubled times.</p>

        <p>Examples of this destiny include Mon Mothma leading the Rebel Alliance, Darth Sidious gaining control of the Republic, Wedge Antilles leading Rogue Squadron, and Admiral Ackbar escaping Grand Moff Tarkin and eventually taking command of the Rebel Fleet.</p>

        <h4>Destiny Fulfilled</h4>

        <p>You receive a permanent 2 increase to your Charisma score.</p>

        <h5>Sample Champion Destiny: Recruiting</h5>

        <blockquote><p>Your destiny is to convince an influential person or group to secretly aid or openly join the resistance effort on a planet or in a sector. The person or group must have considerable authority and resources, and thus be able to operate behind a thick wall of underlings and bureacracy. The group might be a far-reaching criminal organization that has agents, established rackets, transports, and cover facilities throughout a sector. It could be a corporation that could lend its financial and material support to a local rebellion. Perhaps the hero encourages an influential military, government, or corporate leader currently serving the Empire to defect and aid the resistance. Convincing this entity to change its allied or neutral stance towards the Empire requires the hero to undertake missions to earn that individual's trust.</p></blockquote>
