  - name: Flanking
    _id: FgFDAygbPWkLMzUG
    text:
      content: |-
        <h2>Flanking</h2>

        <p></div></p>

        <p>When multiple creatures within 5 feet of another creature engage it in combat, that creature may become flanked. This variant rule offers mechanical boons to flanking separate from simple advantage.</p>

        <p>A creature who is <strong>one-quarter flanked</strong> suffers a -2 penalty to AC and Dexterity saving throws against sources within 5 feet of it. A creature is one-quarter flanked if it is at least one-fourth surrounded, either to a side, above, or below.</p>

        <p>A creature who is <strong>half flanked</strong> suffers a -3 penalty to AC and Dexterity saving throws against sources within 5 feet of it. A creature is half flanked if it is at least half surrounded, either to a side, above, or below.</p>

        <p>A creature who is <strong>three-quarters flanked</strong> suffers a -5 penalty to AC and Dexterity saving throws against sources within 5 feet of it. A creature is three-quarters flanked if it is at least three-quarters surrounded, either to a side, above, or below.</p>

        <blockquote><p>Alternatively, you can have players add a +2, +3, or +5 bonus to their attack rolls against creatures who are one-quarter, half, or three-quarters flanked, respectively, by them. Additionally, if you use the Saving Throws Checks variant, you can instead have them add a +2, +3, or +5 bonus to their Dexterity saving throw checks against creatures who are one-quarter, half, or three-quarters flanked, respectively, by them.</p></blockquote>

        <p>A creature who has a reach of greater than 5 feet gains the benefit of flanking against a creature while within melee range, but does not contribute towards flanking unless they are within 5 feet of the target.</p>

        <p><strong><em>Flanking on Squares.</em></strong> On a square grid, a Small or Medium creature takes up one square, and has eight squares surrounding it within 5 feet. When two or three of those squares are occupied by hostile creatures, that creature is considered one-quarter flanked by those creatures. When four or five of those squares are occupied by hostile creatures, that creature is considered half flanked by those creatures. If six or more of those squares are occupied by hostile creatures, that creature is instead considered three-quarters flanked.</p>

        <p><strong><em>Flanking on Hexes.</em></strong> On a hex grid, a Small or Medium creature takes up one hex, and has six hexes surrounding it within 5 feet. When two of those squares are occupied by hostile creatures, that creature is considered one-quarter flanked by those creatures. When three or four of those squares are occupied by hostile creatures, that creature is considered half flanked by those creatures. If five or six of those hexes are occupied by hostile creatures, that creature is instead considered three-quarters flanked.</p>

        <blockquote><p>Alternatively, you can run the simpler ruleset for flanking found in the DMG, that offers advantage instead of flat bonuses. That ruleset works alongside Advanced Advantage as well.</p></blockquote>
