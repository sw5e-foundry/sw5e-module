  - name: Tiss'shar
    _id: 6p97SoPBn9vN3SNP
    text:
      content: |-
        <h2>Tiss'shar</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Varies</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Red, yellow, blue, purple</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Long necks, sharp teeth, colorful scales, tails</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Tiss'sharl</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Tiss'shar</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Tiss'shar are bipedal therapods descended from predatory reptilians native to the humid jungle continents of Tiss'sharl. They are relatively strong and agile, with long necks, slender torsos, wider hips, and a short but wiry tail. Their mouths are filled with short, sharp teeth, and their large tongues are pink and constantly moving. Their large eyes appear glassy as a result of the clear, resilient film that covered and protected them. Many tiss'shar have prominent sickle-shaped claws on the first toe of their feet; some also possessed a crest of feathers atop their heads.</p>

        <h3>Society and Culture</h3>

        <p>Tiss'shar social structure is inextricably tied to business. Nearly all tiss'shar families have a corporation as a patron, which provides the family with its material needs in exchange for the dedicated labor of its members. Patron corporations regularly supply food, housing, health care, education, and security services. The predatory instincts of the tiss'shar, redirected into the realm of business, often serve them well. While no stereotype fully defines the species, they often were considered aggressive, resourceful, calculating businessbeings. These traits also made them excellent assassins and gunfighters, renowned galaxywide for their efficiency. Most tiss'shar had an appreciation for the art of the deal, and conducted their business legitimately; even those who chose the path of the assassin remembered that they were conducting business and respected their contracts.</p>

        <h3>Names</h3>

        <p>Tiss'shar names are segmented, with males receiving an additional "tail name." Surnames always come last.</p>

        <p><strong>Male Names.</strong> Si-Di-Ri, Tra-Skan-Lor, Geor-Dan-Thi </p>

        <p><strong>Female Names.</strong> Von-Ra, Ura-Vaza, Shu-Xangiz, Sav-Lork</p>



        <h3>Tiss'shar Traits</h3>

        <p>As a tiss'shar, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Strength, Intelligence, or Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Tiss'shar reach adulthood in their early teens and live about 80 years.</p>

        <p><strong><em>Alignment.</em></strong> Tiss'shar's moral flexibility causes them to tend towards balanced alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Tiss'shar typically stand 5 to 6 feet tall and generally weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can�t discern color in darkness, only shades of gray.</p>

        <p><strong><em>Predatory Talents.</em></strong> You have proficiency in one of the following skills: Acrobatics, Sleight of Hand, Stealth, or Technology.</p>

        <p><strong><em>Surprise Attack.</em></strong> If you surprise a creature and hit it with an attack on your first turn in combat, the attack deals an extra 2d6 damage to it. You can use this trait only once per combat.</p>

        <p><strong><em>Tooth and Nail.</em></strong> Your sharp teeth and claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage. Lastly, as a bonus action, you can perform a special bite attack. On a hit, the target suffers the attack's normal effects, you gain temporary hit points equal to your Constitution modifier (minimum of 1), and you can't use this trait again until you finish a short or long rest.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Tiss'shar. Tiss'shar is mainly formed of hisses, shrieks, and lisping vocalizations. As a written language, it has a violent-looking calligraphy of curves and sharp lines.</p>

        <img src='https://www.gmbinder.com/images/19T3gjz.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:205px' />



