  - name: Armor Class (AC)
    _id: WV3egp09pQM4VNFf
    text:
      content: |-
        <h3>Armor Class (AC)</h3>

        <p>Base armor class (AC), without consideration of any special traits, class features, or armor and shields, is always calculated as 10 + Dexterity modifier, with armor replacing or augmenting that base AC calculation. Using this system, your base armor class is instead calculated as follows:</p>

        <hr>

        <div class="sw5e-book-block"><strong>Base AC</strong> = 8 + your proficiency bonus + <br>your Dexterity modifier</div>

        <hr>
