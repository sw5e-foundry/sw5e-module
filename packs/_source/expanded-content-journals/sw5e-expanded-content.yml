  - name: Fighting Mastery
    _id: Arl6kGDgESMZdwv0
    text:
      content: |-
        <h3>Fighting Mastery</h3>

        <p>A feat represents a talent or an area of expertise that gives character special capabilities. It embodies training, experience, and abilities beyond what a class provides. At certain levels, your class gives you the Ability Score Improvement feature. Using the optional feats rule, you can forgo taking that feature to take a feat of your choice instead. You can take each feat only once, unless the feat's description says otherwise. As a part of this variant rule, you should allow your players to take the following feat instead of the options listed in the Player Handbook.</p>

        <h4>Sundering Mastery</h4>

        <p>You have mastered rending your foes' weapons, leaving them impotent and vulnerable to your follow up attacks. While you are wielding a melee weapon with which you are proficient, you gain the following benefits:</p>

        <ul><li>Before you make a Sundering attack with weapon that you are proficient with, you can choose to forgo your proficiency bonus. If the attack hits, you add double your proficiency bonus to the attack's damage.</li><li>On your turn, when you score a critical hit with a Sundering attack or reduce a weapon to 0 hit points with one, you can make one melee weapon attack as a bonus action.</li></ul>



