  - name: Hutt, Adolescent
    _id: 7ELmJtKerFbo3mvK
    text:
      content: |-
        <h2>Hutt, Adolescent</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Black, blue, brown, gold, green, purple, tan, white, or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Blue, gray, green, orange, turquoise, violet, or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Three lungs, slug-like appearance</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'5"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>400 lb.</td><td>x(2d8) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Nal Hutta</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Huttese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Hutts are a massive slug-like species who have large mouths and stubby arms. They have three lungs and thick leathery skin, which is wrinkled and slimy. Hutts often have watery eyes and lack facial expressions.  Their tails are supported by a skeletal spine.  Despite their legendary size, hutts start out as tiny huttlets less than half a foot in height, and continually grow over the long lives.</p>

        <h3>Society and Culture</h3>

        <p>Most hutts are crime lords who live opulent lives overseeing criminal underworld activities like spice smuggling, slavery, gambling and bounty hunting. This is not true for all, however, as some eschew the life of a decadent, obese version of their species and prefer a more mobile existence. Hutt society is divided into families known as kajidics, a social structure that is both familial and a crime gang.</p>

        <p>Hutts are encouraged to make a name for themselves around the age of 150 while simultaneously not threatening the welfare of the clan.  At around 200, they will likely stop being saved by the clan and encouraged even further to fend for themselves while benefiting the kajidic; they may even be granted a star system or two.  Nomadic or kajidic-less hutts are often hunted or killed by other hutts in fear of the nomad coming to claim a territory.</p>

        <h3>Names</h3>

        <p>Hutt names with a suffix title as "the Hutt" are usually reserved for noteworthy huts, with the name of a hutt's kajidic coming before the title.  Because hutts are hermaphroditic, choosing a gender at will, their names are considered androgynous.</p>

        <p><strong>First Names.</strong> Arok, Gorga, Jabba, Mama, Ziro, </p>

        <p><strong>Kajidic Names.</strong> Besadii, Desilijic, Fenn'ak, Gnuda</p>



        <h3>Hutt Traits</h3>

        <p>As a hutt you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and two other ability scores of your choice increase by 1.</p>

        <p><strong><em>Age.</em></strong> Hutts are considered a child until around the age of 200 in which they are a full fledged adult.  Hutts can live upwards of 900 years with even more ancient ones exceeding that.</p>

        <p><strong><em>Alignment.</em></strong> Hutts are selfish, greedy, and highly organized, causing them to tend toward chaotic dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Hutts have a unique special characteristic; from birth to death, they never stop growing. As an adolescent hutt, you typically stand between 6 and 7 feet tall and weigh at least 400 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 20 feet.</p>

        <p><strong><em>Closed Mind.</em></strong> Hutt brains have an unusual composition which made them resistant to influence from the Force. You have advantage on Wisdom and Charisma saving throws against force powers.</p>

        <p><strong><em>Natural Resistance.</em></strong> You have advantage on saving throws against poison, and you have resistance against poison damage (explained in chapter 9).</p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Prehensile Tail.</em></strong> You have supreme control over your tail and can use it to manipulate objects as well as your hands.</p>

        <p><strong><em>Shrewd Demeanor.</em></strong> You have proficiency in two Intelligence, Wisdom, or Charisma skills of your choice.</p>

        <p><strong><em>Slow and Lethargic.</em></strong> Hutts are slow and generally incapable of moving quickly. You have disadvantage on Dexterity saving throws, and when determining your bonus to AC from your Dexterity, you can't add more than +3.</p>

        <p><strong><em>Wealthy.</em></strong> During character creation, you start with additional credits equal to your level x your proficiency bonus x 1,000 cr.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Huttese. Hutts rarely speak Galactic Basic, even though they are perfectly able; if the person with whom they are speaking doesn't understand Huttese, they are more likely to use an interpretor than deign to speak the language of lesser species.</p>

        <img src='https://www.gmbinder.com/images/2WRsVbc.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:256px' />



