  - name: City Watch
    _id: aHnVtdvp74zItVRY
    text:
      content: |+
        <h2>City Watch</h2>

        <p>You have served the community where you grew up, standing as its first line of defense against crime and wildlife. You aren't a soldier, directing your gaze outward at possible enemies. Instead, your service to your hometown was to help police its populace, protecting the citizenry from lawbreakers and malefactors of every stripe.</p>

        <p>Even if you're not city-born or city-bred, this background can describe your early years as a member of law enforcement. Most settlements of any size have their own law enforcement forces.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Insight, Investigation, and Perception</li><li><strong>Languages:</strong> Two of your choice</li><li><strong>Equipment:</strong> A uniform in the style of your unit and indicative of your rank, a horn with which to summon help, a set of binders, and a pouch containing 100 cr</li></ul>

        <h3>Feature: Watcher's Eye</h3>

        <p>Your experience in enforcing the law, and dealing with lawbreakers, gives you a feel for local laws and criminals. You can easily find the local outpost of the watch or a similar organization, and just as easily pick out the dens of criminal activity in a community, although you're more likely to be welcome in the former locations rather than the latter.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Investigator</td></tr><tr><td>4</td><td>Perceptive</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Alert</td></tr><tr><td>7</td><td>Athlete</td></tr><tr><td>8</td><td>Durable</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Years of service in the City Watch have led to the rigid discipline most often seen in military service. Working with your comrades has created a strong family bond and pride in your community.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I'm always polite and respectful.</td></tr><tr><td>2</td><td>I'm haunted by memories of war. I can't get the images of violence out of my mind.</td></tr><tr><td>3</td><td>I've lost too many friends, and I'm slow to make new ones.</td></tr><tr><td>4</td><td>I'm full of inspiring and cautionary tales from my guard service relevant to almost every combat situation.</td></tr><tr><td>5</td><td>I can stare down a hell hound without flinching.</td></tr><tr><td>6</td><td>I enjoy being strong and like breaking things.</td></tr><tr><td>7</td><td>I have a crude sense of humor.</td></tr><tr><td>8</td><td>I face problems head-on. A simple, direct solution is the best path to success.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Greater Good.</strong> Our lot is to lay down our lives in defense of others. (Light)</td></tr><tr><td>2</td><td><strong>Responsibility.</strong> I do what I must and obey just authority. (Lawful)</td></tr><tr><td>3</td><td><strong>Independence.</strong> When people follow orders blindly, they embrace a kind of tyranny. (Chaotic)</td></tr><tr><td>4</td><td><strong>Might.</strong> In life as in war, the stronger force wins. (Dark)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Ideals aren't worth killing over or going to war for. (Neutral)</td></tr><tr><td>6</td><td><strong>Nation.</strong> My city, nation, or people are all that matter. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I would still lay down my life for the people I served with.</td></tr><tr><td>2</td><td>Someone saved my life on the battlefield. To this day, I will never leave a friend behind.</td></tr><tr><td>3</td><td>My honor is my life.</td></tr><tr><td>4</td><td>I'll never forget the crushing defeat my company suffered or the enemies who dealt it.</td></tr><tr><td>5</td><td>Those who fight beside me are those worth dying for.</td></tr><tr><td>6</td><td>I fight for those who cannot fight for themselves.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>The monstrous enemy we faced in battle still leaves me quivering with fear.</td></tr><tr><td>2</td><td>I have little respect for anyone who is not a proven warrior.</td></tr><tr><td>3</td><td>I made a terrible mistake in battle cost many lives� and I would do anything to keep that mistake secret.</td></tr><tr><td>4</td><td>My hatred of my enemies is blind and unreasoning.</td></tr><tr><td>5</td><td>I obey the law, even if the law causes misery.</td></tr><tr><td>6</td><td>I'd rather eat my armor than admit when I'm wrong.</td></tr></tbody></table>

