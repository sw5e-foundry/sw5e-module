  - name: Caamasi
    _id: Rz2Fxe8IaZ728BMc
    text:
      content: |-
        <h2>Caamasi</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Pink and gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Brown, gray, white, or gold</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Yellow or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Snouts, memnii, distinct scent</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>115 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Caamas</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Caamasi</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>A species of furry mammalians, the caamasi are covered in dense fur and have a spicy, woody body scent that is similar to that of Corellian whiskey. They have long arms with three-fingered hands, and pointed ears which stick out from the sides of their heads. They also have extremely acute senses of smell, with their nose positioned at the end of a tooth-filled snout. Caamasi have the interesting ability to share vivid memories called memnii with their near relatives and Force-sensitives. A memnis is as vivid to one who receives it as it was to the one who participated in the event remembered. Their peace-loving natures are in part due to memnii, as having a memory of killing or harming will be particularly strong, becoming unbearable in time, and something caamasi will seek to avoid except in defense of themselves or others, for which case they would accept their burden.</p>

        <h3>Society and Culture</h3>

        <p>A pacifist race, culture on Caamas evolved around the basic tenets of peace and social justice; influencing the evolution of the Jedi Order. Working as explorers, diplomats, and artists, the caamasi are a monogamous people who value single partners while mating and starting a family. However following the devastation of their homeworld by the Empire, caamasi who were off-world at the time considered evolving to a position of polygamy so as to regrow the population. While the argument is one of survival, many sociologists familiar with the culture of the caamasi believe that they will not accept the idea.</p>

        <h3>Names</h3>

        <p>Caamasi surnames are often composed of two parts, with the second part designating clan membership.</p>

        <p><strong>Male Names.</strong> Althanic, Gelerit, Ryg'gos, Shren</p>

        <p><strong>Female Names.</strong> Eeshraq, Heshrisa, Nulana, Yr'na</p>

        <p><strong>Surnames.</strong> A'kriy, I'tela, O'Tul, Sho'cyl</p>



        <h3>Caamasi Traits</h3>

        <p>As a caamasi, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Caamasi reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Caamasi's peaceful and just nature causes them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Caamasi typically stand 5 to 6 feet tall and generally weigh about 170 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Call for Peace.</em></strong> As an action on your turn, you can emphatically demand that your foes embrace peace, thereby distracting them. Until the end of your next turn, enemies within 10 feet of you that can see you gain disadvantage on attack rolls against your allies. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Diplomatic.</em></strong> You have proficiency in the Persuasion skill.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Memnii Transfer.</em></strong> As an action, while touching a creature, you can initiate a memnii transfer. The creature must make an Intelligence saving throw (DC = 8 + your proficiency bonus + your Intelligence modifier), a creature can choose to fail this saving throw if it wishes. On a failed save the target is stunned, and you can share vivid memories with the target as if they were their own for 1 minute or until your concentration ends (as if you were concentrating on a power). The transfer ends if you stop touching the target. At the end of each of its turns, the creature can repeat the saving throw to resist the transfer. On a success, the transfer ends. Otherwise, you may end the transfer on your turn (no action required). Once you've used this trait, you can't use it again until you finish a long rest. This feature has no effect on droids, constructs, or Force-Insensitive creatures.</p>

        <p><strong><em>Scholarly.</em></strong> You have proficiency in the Insight skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Caamasi. Caamasi uses smooth tones and low volumes, making it soothing to listen to. Many popular nursery rhymes have been written in Caamasi to help children to sleep.</p>

        <img src='https://www.gmbinder.com/images/tfY49eC.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:172px;mix-blend-mode:darken' />



