  - name: Quick Rest
    _id: UnBbZu41MYSPke7u
    text:
      content: |-
        <h3>Quick Rest</h3>

        <p>A quick rest is a period of downtime, at least 1 hour long, during which a character does nothing more strenuous than eating, drinking, reading, and tending to wounds.</p>

        <p>A character can spend one or more Hit Dice at the end of a quick rest, up to the character's maximum number of Hit Dice, which is equal to the character's level. Whenever a character spends a Hit Die to regain hit points, the player rolls the die and adds the character's Constitution modifier to it. The character regains hit points equal to the total. The player can decide to spend an additional Hit Die after each roll.</p>
      format: 1
    src: null
    flags:
      sw5e-module:
