  - name: Klatooinian
    _id: HUyfP4SuqELIRWNO
    text:
      content: |-
        <h2>Klatooinian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green, gray, brown</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Brown, black, gray</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Heavy brows, short canine muzzles</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'4"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>125 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Klatooine</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Huttese, Klatooinian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Klatooinians are a humanoid species with canine features, having short muzzles over toothy overbites. They are also notable for their heavy brows and ridges along the tops of their heads. </p>

        <h3>Society and Culture</h3>

        <p>For centuries, klatooinians have been slaves to the hutts, whom they view as almost godlike, immortal beings. Although the hutts allow a council of elders to rule on Klatooine, all off-world affairs are wholly under hutt control. Under the hutts, the klatooinians serve as soldiers and guards. Even those klatooinians who do not serve the hutts are often employed as hired muscle by other masters.</p>

        <p>Klatooinian society was known for a strong belief in tradition and the wisdom of the elders, although some younger klatooinians rebelled against this norm and sought out freedom from enslavement. Others attempted to gain their own fortunes as smugglers, pirates, bounty hunters, or raiders.</p>

        <h3>Names</h3>

        <p>Klatooinian names are often derived from the names of great heroes and historical figures. Surnames are familial, and are usually shorter than klatooinian given names. </p>

        <p><strong>Male Names.</strong> Barada, Castas, Sta-Den, Tarados</p>

        <p><strong>Female Names.</strong> Gelis, Petkara, Sterasi, Yelmith </p>

        <p><strong>Surnames.</strong> Eek, Gort, Gon, Ovin</p>



        <h3>Klatooinian Traits</h3>

        <p>As a klatooinian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength, Constitution, and Wisdom scores increase by 1.</p>

        <p><strong><em>Age.</em></strong> Klatooinians reach adulthood in their late teens and can live as long as 90 standard years.</p>

        <p><strong><em>Alignment.</em></strong> Klatooinian society encourages reverence for tradition and an inclination towards violence, causing them to tend toward lawful dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Klatooinians typically stand around 6 feet tall and generally weigh about 170 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Enforcer.</em></strong> You are proficient in the Intimidation skill. When you take the Help action to give an ally advantage on an Intimidation check, they gain a bonus to the roll equal to your proficiency bonus. </p>

        <p><strong><em>Toughness.</em></strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level.</p>

        <p><strong><em>Weapon Training.</em></strong> Klatooinians are trained to fight from a young age. You have proficiency in two martial vibroweapons of your choice.</p>

        <p><strong><em>Wisdom of the Elders.</em></strong> You are proficient in the Lore skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Klatooinian, and Huttese. Klatooinian is a gutteral, barking language, with many loanwords adopted from Huttese over the centuries.</p>

        <img src='https://www.gmbinder.com/images/7m3THr4.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:368px' />



