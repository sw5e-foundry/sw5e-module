  - name: Way of Endurance
    _id: AE4yjuaLnnhsfHU0
    text:
      content: |+
        <h2>Way of Endurance</h2>

        <p>The Force manifests in myriad ways; while some use the Force to manipulate the world around them, others use it to enhance themselves. Those consulars who follow the Way of Endurance channel the Force to allow them to overcome and reflect the most grievous of injuries.</p>

        <h3>Upheld by the Force</h3>

        <em><strong>Way of Endurance:</strong> 3rd level</em><br>

        <p>The Force flowing through your body strengthens you, granting the following benefits:</p>

        <ul><li>Your hit point maximum increases by 3, and it increases by 1 again whenever you gain a level in this class.</li><li>Your base AC becomes 13 + your Constitution modifier. </li><li>When you make a melee weapon attack as a part of a force power you cast, you can use Wisdom or Charisma (your choice) instead of Strength for the attack and damage rolls.</li></ul>

        <p>Additionally, as an action, you can gain resistance to kinetic and energy damage for 1 minute. This effect lasts until you end it as a bonus action, you are incapacitated, or you don armor other than a shield. You can use this feature twice. You regain all expended uses of it when you finish a short or long rest.</p>

        <h3>Retaliation Strike</h3>

        <em><strong>Way of Endurance:</strong> 6th, 9th,<br> &emsp;13th, and 17th level</em><br>

        You learn to turn an opponent's<br> aggression back on them. When<br> you deal damage with a force power<br> or a melee weapon attack, if you took<br> damage since the start of your last turn,<br> you deal an extra 1d6 damage. The damage<br> is the same type as the power or weapon's<br> damage.

        This die increases when you reach certain levels<br> in this class: to 1d8 at 9th level, to 1d10 at 13th level, and to 1d12 at 17th level.

        <h3>Boundless Vitality</h3>

        <em><strong>Way of Endurance:</strong> 10th level</em><br>

        <p>When you take damage, you can use your reaction and expend a force point to regain health equal to 1d8 + your Wisdom or Charisma modifier (your choice, minimum of one) as long as the damage would not reduce your hit points to 0. </p>

        <p>This die increases when you reach certain levels in this class: to 1d10 at 14th level, and to 1d12 at 18th level.</p>



        <h3>Unrelenting Resilience</h3>

        <em><strong>Way of Endurance:</strong> 14th level</em><br>

        <p>When you use your Boundless Vitality feature while concentrating on a force power, you can add the result of the roll to the Constitution saving throw made to maintain concentration.</p>

        <p>Additionally, when you are reduced to 0 hit points but not killed outright while Upheld by the Force is active, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>

        <h3>The Force Unleashed</h3>

        <em><strong>Way of Endurance:</strong> 18th level</em><br>

        <p>As an action, you can choose a point within 60 feet. Each creature of your choice within 30 feet of that point must make a Constitution saving throw against your universal force save DC. On a failed save, a creature takes 5d10 force damage and suffers 1 level of exhaustion. On a successful save, a creature takes half damage and does not suffer exhaustion.</p>

        <p>For each creature that fails this saving throw, a friendly creature within 30 feet of them can regain hit points equal to the amount of damage dealt. A friendly creature can only gain this benefit once per turn.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the consular table. You regain all expended uses when you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/HNr2yz4.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:650px' />

