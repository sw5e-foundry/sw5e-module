  - name: Wounds
    _id: SEsT6wXUaMP9kTav
    text:
      content: |-
        <h2>Wounds</h2>

        <p></div></p>

        <p>When a character is reduced to 0 hit points, begins making death saving throws, and has hit points restored, they can return to the battle no worse for the wear. Using this variant rule, you can add an additional layer to make falling to 0 hit points more threatening.</p>
