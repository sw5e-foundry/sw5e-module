  - name: Repairing Damaged/Broken Weapons
    _id: UYiIWcUWQtIMJdtd
    text:
      content: |-
        <h3>Repairing Damaged/Broken Weapons</h3>

        <p>A weapon is destroyed when it drops to 0 hit points. As long as a weapon has 1 or more hit points remaining, a character can attempt to perform minor repairs by spending one or more of the weapon's Hit Dice at the end of a short rest, up to the weapon's maximum number of Hit Dice. To restore hit dice, the player must first make an Intelligence (Technology) check If a weapon has at least 1 HP remaining, you can attempt to make minor repairs to it during a Short Rest. To attempt to restore HD, a character must make an Intelligence (Technology) roll. The DC is 8 + the amount of damage the weapon has taken. The player has advantage on the roll if they know the <em>mending</em> tech power or are proficient with the appropriate artisan's tools (armstech's tools for blasters and vibroweapons, artificer's tools for lightweapons). On a failure, the Hit Die is expended and no hit points are restored. On a success, the player can spend the weapon's Hit Dice to restore hit points. The player can decide to spend an additional Hit Die after each roll.</p>

        <p>A weapon regains Hit Dice when serviced by a professional with the appropriate artisan's tools, who can repair the weapon over a number of hours equal to the size of the weapon's damage dice. For instance, a blaster rifle has a 1d8 damage die, so it would take 8 hours to repair. This service costs half the value of the weapon.</p>

        <br>

        <blockquote><p>In reality, lightweapons are probably more effective than vibroweapons when it comes to sundering weapons. For the sake of balance, they aren't. At the GM's discretion, weapons might be resistant to kinetic damage, or vulnerable to energy damage, to represent this effectiveness.</p></blockquote>

        <p>A player can choose to specialize their character with the following features.</p>
