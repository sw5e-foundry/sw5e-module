  - name: Sokan Form
    _id: HxTRc2p6CO5bDM1y
    text:
      content: |+
        <h2>Sokan Form</h2>

        <p>Sokan Form, also known as Persistence Form, uses determined movements followed by swift strokes to keep their opponents' footing unsteady. Those guardians who focus on Persistence Form make use of the terrain, trying to maneuver their opponents into vulnerable areas before dispatching them.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Sokan Form:</strong> 3rd level</em><br>

        <p>You gain proficiency in heavy armor.</p>

        <h3>Form Basics</h3>

        <em><strong>Sokan Form:</strong> 3rd level</em><br>

        <p>You gain the Sokan lightsaber form, detailed in Chapter 6 of the Player's Handbook. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Varactyl</h3>

        <em><strong>Sokan Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter an unyielding stance for one minute. While in this stance, you have advantage on ability checks and saving throws to shove, trip, and avoid being moved, and you ignore difficult terrain. Additionally, once per turn, when you hit with a melee weapon attack, you can attempt to shove the target up to 10 feet away from you (no action required).</p>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Sokan Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>High Ground Defense</h4>

        When an opponent within 5 feet of you makes a<br> melee attack against you, you can use your<br> reaction and expend a use of your Channel the<br> Force to move to another space within 5<br> feet of that creature without provoking<br> opportunity attacks, imposing disadvantage<br> on the roll. If the attack misses, you can<br> attempt to shove the creature up to 10<br> feet away from you as a part of that<br> same reaction.



        <h3>Unwavering Self</h3>

        <em><strong>Sokan Form:</strong> 7th and 15th level</em><br>

        <p>If you fail a Strength, Dexterity, or Constitution saving throw, you can reroll the die. You must use the new roll.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again. At 15th level you can use this feature twice between long rests.</p>

        <h3>Unhindered Charge</h3>

        <em><strong>Sokan Form:</strong> 15th level</em><br>

        <p>Wen you move at least 10 feet before making a melee weapon attack, you deal additional damage equal to your Strength modifier.</p>

        <h3>Master of Persistence</h3>

        <em><strong>Sokan Form:</strong> 20th level</em><br>

        <p>You are an unrelenting force on the field of battle. Your Strength and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for these scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic, energy, and ion damage from weapons.</li><li>You ignore effects that would reduce your speed.</li><li>Once per turn, when you push a creature, you can move up to 10 feet as a part of this push without provoking opportunity attacks. If you end this movement within 5 feet of that creature, you can make one melee weapon attack (no action required).</li></ul>

        This effect ends early if you are incapacitated<br> or die. Once you've used this feature, you can't<br> use it again until you complete a long rest.

        <img src='https://www.gmbinder.com/images/dF0zRmv.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:740px' />

