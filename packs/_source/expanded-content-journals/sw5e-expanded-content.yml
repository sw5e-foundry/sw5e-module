  - name: Weapon Sundering
    _id: IwlVEspXgh6VmVFF
    text:
      content: |-
        <h2>Weapon Sundering</h2>

        <p></div></p>

        <p>You can attempt to damage, and potentially destroy, a weapon held by a hostile creature. On your turn, you can take the Sundering action to damage an enemy's weapon. Make a melee weapon attack roll with disadvantage against the target's Armor Class as normal. If the attack hits, roll weapon damage and instead apply the damage to one weapon being wielded by your target.</p>
