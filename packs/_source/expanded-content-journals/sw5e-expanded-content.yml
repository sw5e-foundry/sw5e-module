  - name: Gaining Light/Dark Points
    _id: 1FCYSztWSsHfFS9U
    text:
      content: |-
        <h3>Gaining Light/Dark Points</h3>

        <p>When a character performs an act associated with one side of the Force, they gain points accordingly. Players can gain Light Points through a multitude of actions:</p>

        <ul><li>The first time you cast a light side force power of 1st-level or higher, you gain Light Points equal to the power's level. Subsequent castings of that power earn you 1 Light Point.</li><li>Committing selfless acts, such as deliberately saving others at the expense of yourself, can earn you 1 or more Light Points.</li><li>Other benevolent acts, as determined by your GM, can earn you 1 or more Light Points.</li></ul>

        <p>Consequently, players can also gain Dark Points through various actions:</p>

        <ul><li>The first time you cast a dark side force power of 1st-level or higher you gain Dark Points equal to the power's level. Subsequent castings of that power earn you 1 Dark Point.</li><li>Committing truly heinous acts, such as harming or murdering an innocent, can earn you 1 or more Dark Points.</li><li>Other evil acts, as determined by your GM, can earn you 1 or more Dark Points.</li></ul>

        <p>If a character has a score and performs an opposing act, instead of gaining points towards the other aspect of the Force, they lose them from their current score. For instance, if a player has 5 Light Points, and casts a dark side power of 4th level, they would have their Light Points reduced to 1. If the player instead casts a dark side power of 7th level, their score would shift to Dark 2.</p>
