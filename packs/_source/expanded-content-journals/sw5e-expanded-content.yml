  - name: Agonizing Lethargy
    _id: 3x6XgKMtC7WbfPxZ
    text:
      content: |-
        <h4>Agonizing Lethargy</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>You can use an action to expend a superiority die. When you do so, choose a creature you can see within 30 feet of you. The target must make a Constitution saving throw. On a failed save, the target takes 1d6 necrotic damage for each attack it makes until the start of your next turn. A creature targeted by your Critical Analysis has disadvantage on the save.</p>
