  - name: When Can They Re-choose?
    _id: BNPbO7WwOyauWFrz
    text:
      content: |-
        <h3>When Can They Re-choose?</h3>

        <p>The easiest route would be to allow characters to re-choose one of their invocation options when they complete a long rest, or even when they level up. Alternatively, you might enforce a narrative moment for them to re-choose. For instance, a guardian might not be able to relearn their Guardian Aura without spending some time with their master, while a monk might have to spend time in a monastery to re-choose a Monastic Vow, and a scout might have to spend time alone practicing to re-choose a Scout Routine. Ultimately, the method in which allow your players to re-choose their invocations is up to you and your playgroup. You might even let them re-choose on the fly.</p>
