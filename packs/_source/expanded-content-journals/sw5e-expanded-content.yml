  - name: Mechanist Technique
    _id: ViTGQE2Hy6XilNUF
    text:
      content: |-
        <h2>Mechanist Technique</h2>

        <p></div></p>

        <p>Some scouts are peerless inventors, skilled at working with droids and other forms of technology. Followers of the Mechanist Technique make up for the weakness of organics with the strength and purity of their creations.</p>

        <h3>Improved Techcasting</h3>

        <em><strong>Mechanist Technique:</strong> 3rd level</em><br>

        <p>Your command of techcasting improves.</p>

        <h4>Improved Tech Powers Known</h4>

        <p>You know 7 tech powers of your choice, instead of 5, and you learn more at higher levels, as shown in the Tech Powers Known column of the Mechanist Technique Techcasting table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Improved Tech Points</h4>

        <p>You have a number of tech points equal to one and a half times your scout level, instead of your scout level, as shown in the Tech Points column of the Mechanist Technique Techcasting table, + your Intelligence modifier. You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Improved Max Power Level</h4>

        <p>Your Max Power Level becomes 2nd, instead of 1st, and it increases at higher levels, as shown in the Mechanist Technique Techcasting table.</p>

        <p>You may only cast tech powers at 5th, 6th, and 7th-level once, instead of 4th and 5th. You regain the ability to do so after a long rest.</p>

        <h3>Mark of the Mechanist</h3>

        <em><strong>Mechanist Technique:</strong> 3rd level</em><br>

        <p>As a bonus action, you can cause the target of your Ranger's Quarry to emit an ion pulse, as long as the target is within 60 feet of you. The target, and any creatures within 5 feet of it, must make a Constitution saving throw against your tech save DC. On a failed save, roll your Ranger's Quarry die; each creature takes ion damage equal to the amount rolled.</p>

        <img src='https://www.gmbinder.com/images/2DWzzeB.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:700px' />



        <h3>Potent Tech</h3>

        <em><strong>Mechanist Technique:</strong> 7th level</em><br>

        <p>You can use your ingenuity to bolster yourself or an ally. As an action, you can touch one creature (which can be yourself) and confer one of the following benefits of your choice to that creature:</p>

        <ul><li>For 10 minutes, the creature can roll a d3 whenever making an attack roll or an ability check and add the number rolled to the d20 roll. Once a creature receives this benefit, that creature can't receive it again until it finishes a short or long rest.</li><li>Roll a d4. The creature regains a number of tech points equal to the result. Once a creature receives this benefit, that creature can't receive it again until it finishes a long rest.</li></ul>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you finish a long rest.</p>

        <h3>High Voltage</h3>

        <em><strong>Mechanist Technique:</strong> 11th level</em><br>

        <p>You are used to working with electronics and have learned to increase their potency, while becoming inured to their dangers. You gain resistance to ion and lightning damage.</p>

        <p>Additionally, whenever you deal ion damage to a creature, you can spend a tech point to force the creature to make a Constitution saving throw. On a failed save, it is stunned until the end of your next turn.</p>

        <div class="sw5e-book-block"><h5>Mechanist Technique Techcasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Tech Powers<br> Known</th><th>Tech<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>7</td><td>4</td><td>2nd</td></tr><tr><td>4th</td><td>8</td><td>6</td><td>2nd</td></tr><tr><td>5th</td><td>9</td><td>7</td><td>2nd</td></tr><tr><td>6th</td><td>11</td><td>9</td><td>3rd</td></tr><tr><td>7th</td><td>12</td><td>10</td><td>3rd</td></tr><tr><td>8th</td><td>13</td><td>12</td><td>3rd</td></tr><tr><td>9th</td><td>15</td><td>13</td><td>4th</td></tr><tr><td>10th</td><td>16</td><td>15</td><td>4th</td></tr><tr><td>11th</td><td>17</td><td>16</td><td>5th</td></tr><tr><td>12th</td><td>18</td><td>18</td><td>5th</td></tr><tr><td>13th</td><td>19</td><td>19</td><td>5th</td></tr><tr><td>14th</td><td>20</td><td>21</td><td>6th</td></tr><tr><td>15th</td><td>21</td><td>22</td><td>6th</td></tr><tr><td>16th</td><td>22</td><td>24</td><td>6th</td></tr><tr><td>17th</td><td>23</td><td>25</td><td>7th</td></tr><tr><td>18th</td><td>24</td><td>27</td><td>7th</td></tr><tr><td>19th</td><td>25</td><td>28</td><td>7th</td></tr><tr><td>20th</td><td>26</td><td>30</td><td>7th</td></tr></tbody></table></div>

        <h3>Command Droid</h3>

        <em><strong>Mechanist Technique:</strong> 15th level</em><br>

        <p>You can reprogram a droid and bring it under your control. As an action, you can touch one droid that you can see that is the target of your Ranger's Quarry. That creature must make a Intelligence saving throw against your tech save DC. If it succeeds, you can't use this feature on it again for 24 hours. If it fails, it becomes friendly to you and obeys your commands until you use this feature again.</p>

        <p>Intelligent droids are harder to control in this way. If the target has an Intelligence of 8 or higher, it has advantage on the saving throw. If it fails the saving throw and has an Intelligence of 12 or higher, it can repeat the saving throw at the end of every hour until it succeeds and breaks free.</p>

        <img src='https://www.gmbinder.com/images/UIwaVgQ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:500px' />



