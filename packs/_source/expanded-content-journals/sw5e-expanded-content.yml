        <h4>Binders (Fine)</h4>

        <em><strong>Adventuring gear</strong>, <font style="color:green"><strong>premium</strong></font></em><br>

        <p>Binders can be used to restrain a Small or Medium creature with appropriate appendages. Applying binders takes an action, and the target must make a DC 16 Strength or Dexterity saving throw (the target chooses the ability to use). A hostile creature makes this save with advantage. A set of binders comes with one key. Breaking the binders requires a DC 22 Strength check. Escaping them requires a DC 22 Dexterity check. Without the key, unlocking the binders requires a DC 18 security kit to force open. Binders have an AC of 11 and 30 hit points. Destroying the binders frees the creature without harming it.</p>

