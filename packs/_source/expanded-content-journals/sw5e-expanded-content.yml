  - name: Spine-Chilling Howls
    _id: ThBFqFmOWkau1Thm
    text:
      content: |-
        <h4>Spine-Chilling Howls</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Companion</em><br>

        <p>As an action, you can expend one superiority die to command your companion to frighten another creature. The target must then succeed on a Wisdom saving throw against your Maneuver save DC or become frightened of both you and your companion for 1 minute. The frightened target can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success.</p>
