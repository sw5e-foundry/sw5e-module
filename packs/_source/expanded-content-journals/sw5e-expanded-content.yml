  - name: Felucian
    _id: S5AF0DnCsitcAG8r
    text:
      content: |-
        <h2>Felucian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Gray, with blue, red, or yellow markings</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Extra limb at elbow, innate Force-sensitivity</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'8"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>165 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Felucia</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Felucianese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Felucians are a tall, bipedal species. Both their arms and legs end in four, large webbed digits with suction-cup fingertips. Springing from the underside of each forearm is a second short arm, ending in three large and agile fingers. A Felucian's head is a thick mass of long flexible tendrils featuring illuminated tips. The eyes and mouth appear as black holes or openings within this mass.</p>

        <h3>Society and Culture</h3>

        <p>Felucians are mysterious sentient beings native to the vast fungal swamps and jungles of Felucia. Though Felucia has long been colonized, the native Felucians avoided notice by living deep in the jungle. Such seclusion was easily maintained. Even the hardiest of colonists were loath to brave the perils of the dangerous wilderness without cause.</p>

        <p>The Felucians are an unusual, amphibious species. They are highly adapted to surviving the wilds of their home planet, and fade easily into its confusing mass of plant life. They are equally at home on land or in the water, and they traverse the swamps with ease.</p>

        <p>All Felucians are part of a single, planetwide tribe that is broken down into smaller villages and communities, each one led by shamans and chieftains. These shamans are very strong in the Force, using it to their own ends with incredible skill.</p>

        <h3>Names</h3>

        <p>Felucian names are usually two syllables and full of hard consonants. Surnames are a combination of tribe lineage.</p>

        <p><strong>Male Names.</strong> Gokkuul, Kargrek, Hagark, Ruggorn</p>

        <p><strong>Female Names.</strong> Lakko, Taarell, Duuna, Frula </p>

        <p><strong>Surnames.</strong> s'Gokuul, d'Lakko, s'Kargrek, d'Frula</p>



        <h3>Felucian Traits</h3>

        <p>As a Felucian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Felucians reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Felucians' connection to the Living Force causes them to tend toward the light side, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Felucians typically stand over 6 feet tall and generally weigh about 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Force-Sensitive.</em></strong> You know the <em>burst</em> at-will force power. When you reach 3rd level, you learn and can cast the <em>beast trick</em> force power once per day. When you reach 5th level, you learn and can cast the <em>plant surge</em> force power once per day. Wisdom is your forcecasting ability for these powers.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Stealthy.</em></strong> You are proficient in the Stealth skill.</p>

        <p><strong><em>Mask of the Wild.</em></strong> You can attempt to hide even when you are only lightly obscured by foliage, heavy rain, falling snow, mist, and other natural phenomena.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Felucianese, and one more language of your choice. Felucianese is characterized by guttural, whisper-like vowels, interspersed with hard clicks.</p>

        <img src='https://www.gmbinder.com/images/Owb4UPk.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:409px' />



