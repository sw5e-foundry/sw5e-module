  - name: Destiny
    _id: SBi04UGHysG4iowk
    text:
      content: |-
        <h2>Destiny</h2>

        <p></div></p>

        <p>Destiny plays a large role in the <em>Star Wars</em> universe. As a young boy, Anakin Skywalker is told that his destiny is to bring about balance to the Force. Padme's destiny is to give birth to the twins, Luke and Leia, so that they can fulfil their own destinies. Luke Skywalker learns that his destiny is to redeem his father, Darth Vader, so that balance to the Force is restored. Leia's destiny is to save the Rebellion from annihilation at the hands of the Empire and help forge the New Republic. The destiny mechanic helps players and GMs recognize that all heroes - and even major villains - have significant roles to play in the fate of the galaxy. Destiny rewards players for good roleplaying and gives GM new plot hooks to use when designing adventures.</p>

        <p>The rules presented below are optional. A GM may decide to use Destiny Points or not; however, the decision to use them should be made before the campaign gets underway, so that each player can decide whether or not to embrace a destiny for their character from the outset.</p>
