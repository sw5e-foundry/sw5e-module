  - name: What are Invocations?
    _id: ThAh4ARXhJKLHEu4
    text:
      content: |-
        <h3>What are Invocations?</h3>

        <p>Beyond their choice of archetype, each class has a second level of customization collectively referred to as invocations. These invocations are as follows:</p>

        <ul><li>Berserkers have Berserker Instincts.</li><li>Consulars have Force-Empowered Casting.</li><li>Engineers have Modification Slots, which vary based on their class.</li><li>Fighters have their Combat Superiority Maneuvers.</li><li>Guardians have their Guardian Auras.</li><li>Monks have their Monastic Vows.</li><li>Operatives have their Operative Exploits.</li><li>Scholars have their Academic Superiority Maneuvers <em>and</em> Discoveries.</li><li>Scouts have their Scout Routines.</li><li>Sentinels have their Sentinel Ideals.</li></ul>

        <p>Of the ten classes, only engineers (mostly), fighters, and scholars can re-choose their invocations, and even then only sparingly. Using this rule, you can instead let all ten classes re-choose their invocations, at appropriate intervals.</p>
