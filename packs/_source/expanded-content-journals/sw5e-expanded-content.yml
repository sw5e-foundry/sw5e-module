  - name: Deadeye Technique
    _id: TfAFG02OWUx3G25S
    text:
      content: |+
        <h2>Deadeye Technique</h2>

        <p></div></p>

        <p>Some scouts become legends written in blaster burns. Followers of the Deadeye Technique perfect the art of the blaster shot and utilize their incredible focus to make shots that most would deem impossible. When everything depends on one shot, you want a Deadeye pulling the trigger.</p>

        <p>Due to their uncanny focus, Deadeyes can make shots that other marksmen would never dare to attempt. Deadeyes know how to make the most of ranged weapons and can use them to greater effect than other Scouts.</p>

        <h3>Focused Superiority</h3>

        <em><strong>Deadeye Technique:</strong> 3rd level</em><br>

        <p>You learn maneuvers that are fueled by special dice called superiority dice. See chapter 13 for the maneuvers list.</p>

        <h4>Maneuvers Known</h4>

        <p>You learn two maneuvers of your choice, and you earn more at higher levels, as shown in the Maneuvers Known column of the Focused Superiority table. Many maneuvers enhance an attack in some way. You can use only one maneuver per attack, and you may only use each maneuver once per turn.</p>

        <p>Each time you learn new maneuvers, you can also replace one maneuver you know with a different one.</p>

        <h4>Superiority Dice</h4>

        <p>You have two superiority dice, which are d4s, and you earn more at higher levels, as shown in the Superiority Dice column of the Focused Superiority table. This die changes as you gain scout levels, as shown in the Combat Superiority column of the scout table. A superiority die is expended when you use it. </p>

        <p>You regain all of your expended superiority dice when you finish a short or long rest.</p>

        <h4>Maneuver Ability</h4>

        <p>Your maneuver ability varies based on the type of the maneuver you use. You use Strength, Dexterity, or Constitution for physical maneuvers (your choice), Intelligence, Wisdom, or Charisma for mental maneuvers (your choice), and an ability of your choice for general maneuvers. You use this ability whenever a maneuver refers to your maneuver ability. Additionally, you use this ability modifier when setting the saving throw DC for a maneuver you use.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Maneuver save DC</strong> = 8 + your proficiency bonus + <br>your maneuver ability modifier</div>

        <hr>

        <h3>Mark of the Deadeye</h3>

        <em><strong>Deadeye Technique:</strong> 3rd level</em><br>

        <p>The range of your Ranger's Quarry feature doubles. Additionally, when making ranged weapon attacks against the target of your Ranger's Quarry, the normal and long range of your blaster weapons double.</p>

        <h3>Cover to Cover</h3>

        <em><strong>Deadeye Technique:</strong> 7th level</em><br>

        <p>Attack rolls made against you on your turn are made with disadvantage.</p>

        <div class="sw5e-book-block"><h5>Deadeye Technique<br> Focused Superiority</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Focused Superiority</th><th>Superiority Dice</th><th>Maneuvers Known</th></tr></thead><tbody><tr><td>3rd</td><td>d4</td><td>2</td><td>2</td></tr><tr><td>4th</td><td>d4</td><td>2</td><td>2</td></tr><tr><td>5th</td><td>d6</td><td>3</td><td>4</td></tr><tr><td>6th</td><td>d6</td><td>3</td><td>4</td></tr><tr><td>7th</td><td>d6</td><td>3</td><td>5</td></tr><tr><td>8th</td><td>d6</td><td>3</td><td>5</td></tr><tr><td>9th</td><td>d8</td><td>4</td><td>6</td></tr><tr><td>10th</td><td>d8</td><td>4</td><td>6</td></tr><tr><td>11th</td><td>d8</td><td>4</td><td>7</td></tr><tr><td>12th</td><td>d8</td><td>4</td><td>7</td></tr><tr><td>13th</td><td>d10</td><td>5</td><td>9</td></tr><tr><td>14th</td><td>d10</td><td>5</td><td>9</td></tr><tr><td>15th</td><td>d10</td><td>5</td><td>10</td></tr><tr><td>16th</td><td>d10</td><td>5</td><td>10</td></tr><tr><td>17th</td><td>d12</td><td>6</td><td>11</td></tr><tr><td>18th</td><td>d12</td><td>6</td><td>11</td></tr><tr><td>19th</td><td>d12</td><td>6</td><td>12</td></tr><tr><td>20th</td><td>d12</td><td>6</td><td>12</td></tr></tbody></table></div>

        <h3>Shoot First</h3>

        <em><strong>Deadeye Technique:</strong> 11th, 13th, and 17th level</em><br>

        <p>You have learned that the person who shoots first is often the one who walks out alive. When you make a ranged weapon attack against a creature that has not yet acted during your first turn in combat and you have advantage on the roll, you can reroll one of the dice once. Additionally, on a hit, you deal an extra 1d8 damage of the same type as the weapon. This damage increases to 1d10 at 13th level and 1d12 at 17th level.</p>

        <h3>Overwatch</h3>

        <em><strong>Deadeye Technique:</strong> 15th level</em><br>

        <p>You have become a master at protecting your allies from afar. When a creature attempts to make an opportunity attack against an allied creature, or forces your ally to make a saving throw, you can use your reaction to make an attack roll against the enemy creature. </p>

        <p>If your attack hits, either impose disadvantage on the enemy creature's opportunity attack roll or grant advantage to any allies making the saving throw.</p>

