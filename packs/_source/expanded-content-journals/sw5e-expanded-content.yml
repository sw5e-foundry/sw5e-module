  - name: Armor Proficiencies
    _id: 7L7cxu0sHzeZxvgr
    text:
      content: |-
        <h3>Armor Proficiencies</h3>

        <p>Many species come with specific armor proficiencies suited to their species' culture, such as chiss or draethos, or natural unarmored defense, such as aing-tii or wookie. If a player chooses a species and class combination that would grant the same armor proficiencies, or a species with natural armor and a class with unarmored defense, consider instead granting them a bonus depending on the type of armor, as shown below:</p>

        <hr>

        <ul><li><strong>Unarmored Defense:</strong> +1 bonus to AC while not wearing armor or wielding a shield.</li><li><strong>Light Armor:</strong> +1 bonus to Dexterity saving throws while wearing light armor.</li><li><strong>Medium Armor:</strong> +1 bonus to Constitution saving throws while wearing medium armor.</li><li><strong>Heavy Armor:</strong> -1 damage taken from weapons while wearing heavy armor. If this would reduce the damage to 0, the damage is instead reduced to 1.</li></ul>

        <p>For instance, at 1st level, a draethos operative with a 16 in Dexterity would have +6 to Dexterity saving throws instead of +5 while wearing light armor, while a wookiee berserker with a 14 in Dexterity and a 16 in Constitution would have an Armor Class of 16 while unarmored, instead of 15. A character should only gain each bonus once.</p>
