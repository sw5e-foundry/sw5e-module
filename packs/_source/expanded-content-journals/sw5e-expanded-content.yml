  - name: Jump Pad
    _id: OVfScxiFfDZwSgQI
    text:
      content: |-
        <h4>Jump Pad</h4>

        <p><em>2nd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>You create a bouncy surface in a 5-foot square on a surface within range. When you cast the power, you can designate creatures that can safely use the jump pad. For the duration, whenever a creature you haven't chosen enters the affected area, it must make a Dexterity saving throw or be launched 10 feet upwards, and 5 feet horizontally in a random direction. To determine the direction, roll a d8 and assign a direction to each die face.</p>

        <p>While a creature you have chosen (or a creature that has succeeded its Dexterity saving throw) is in the area, it can use its reaction to jump with the aid of the bouncy surface. The creature's jump distance for this jump is multiplied by 5.</p>
