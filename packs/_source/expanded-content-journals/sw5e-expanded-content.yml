  - name: Alignment Score
    _id: 4hT8RpA3yuPQS6Md
    text:
      content: |-
        <h3>Alignment Score</h3>

        <p>How much a character embodies an aspect of the Force is calculated using their Alignment Score. The Alignment Score is an ever-shifting value falling between Light 100 to Dark 100. Characters gain an Alignment Score by gaining Light/Dark Points, as determined by their actions.</p>
