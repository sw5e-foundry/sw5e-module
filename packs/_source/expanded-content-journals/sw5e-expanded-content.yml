  - name: Flesh Raider
    _id: H3iMdidAtlaQ6R6k
    text:
      content: |-
        <h2>Flesh Raider</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Brown, pink, red, or tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, dark blue, dark green</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Horizontal eye stalks, horizontal spade-shaped head, tridactyl hands</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>145 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Tython</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Rakata</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Flesh raiders are a more primitive, and more physically imposing subspecies of rakata that mutated prior to the end of the Infinite Empire. A life above ground and in caves has led the flesh raiders to lose their more amphibian traits, and are now more humanoid in their biological needs, though they seem to only be able to digest meats and flesh.</p>

        <p>Flesh raiders keep many of their ancestral rakatan features, though they have experienced a form of gigantism that has lead to their interesting appearance, that of a flat topped, spade shaped head, with blade-like eye stalks coming off the side ends of the spade. Their body structure also more closely matches that of a trandoshan or dashade, being bulky and imposing in stature, towering over most other sentient creatures.</p>

        <p>Unlike contemporary rakata, flesh raiders did not lose their ability to tap into the Force.</p>

        <h3>Society and Culture</h3>

        <p>Flesh raiders are known to form small clan structures, with a war boss in charge of the clan. Those flesh raiders who are born Force-sensitive can be found imitating a temple structure, with a powerful Force-sensitive, usually from another species, leading them. </p>

        <p>Flesh raiders still speak the rakatan language, though it has developed into a cruder variant.</p>

        <h3>Names</h3>

        <p>Flesh  raider names tend to be short and concise, embodying strength and virility. Flesh raider names make no distinction between male and female names. Surnames are clan-based, though they are rarely used.</p>

        <p><strong>First Names.</strong> Cha'nagh, Fashk, Gorshh, Keshk, Mar'govrok</p>

        <p><strong>Surnames.</strong> Ban, Fel, Kuir, Penk, Teeshk</p>



        <h3>Flesh Raider Traits</h3>

        <p>As a flesh raider, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Wisdom or Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Flesh raiders reach adulthoood by 20 and rarely live longer than 90 years.</p>

        <p><strong><em>Alignment.</em></strong> Flesh raiders' propensity towards war and aggression cause them to tend toward chaotic dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Flesh raiders typically stand between 6 and 7 feet tall and weigh around 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Aggressive.</em></strong> As a bonus action, you can move up to your speed toward an enemy of your choice that you can see or hear. You must end this move closer to the enemy than you started.</p>

        <p><strong><em>Cannibalize.</em></strong> If you spend at least 1 minute devouring the corpse of a beast or humanoid, you gain temporary hit points equal to your Constitution modifier (minimum of one). Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Force Contention.</em></strong> Due to their unique physiology, flesh raider hardiness allows them to overcome use of the Force. You have advantage on Strength and Constitution saving throws against force powers.</p>

        <p><strong><em>Menacing.</em></strong> You gain proficiency in the Intimidation skill.</p>

        <p><strong><em>Hunters.</em></strong> Whenever you make a Wisdom (Survival) check to hunt for food, you are considered to have expertise in the Survival skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Rakata. Rakata is characterized by its deep tones and simplistic nature, using mainly consonants and long vowels. It's script seems to be a very ancient form of Galactic Basic.</p>

        <img src= 'https://www.gmbinder.com/images/K3ME2Po.png' style='position:absolute;top:45px;right:110px;width:225px;transform:scaleX(-1);z-index:1000' />



