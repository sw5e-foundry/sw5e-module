  - name: Besalisk
    _id: 8zulnjtPBE8l8H8c
    text:
      content: |-
        <h2>Besalisk</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown or green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Bony headcrest, four arms, inflatable wattle</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>6'0"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>175 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Ojom</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Besalisk</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Male Besalisks' heads sported prominent crests and four arms hung at their sides; females of the species could have as many as eight arms, but like Humans had a primary hand and a limited range of functionality with the others. The addition of the extra appendages required a hearty metabolism, and these bulky beings were able to store food and water for many days, and if the need arose, they could survive for long periods without either. Scruffy sensory whiskers lined the area below their noses, just above the robust wattle most adult Besalisks possessed.</p>

        <h3>Society and Culture</h3>

        <p>Because of Ojom's harsh environment, large cities were never developed on the world; instead small communes of about a thousand families claim territories around the world and are each led by an elected leader. The communes have a strict policy of keeping the size of their groupings equal to avoid conflict. When too many families grow in one area, the leader would ask certain families to break away and start a new community on another glacier.</p>

        <p>While not involved in galactic politics and because they do not produce any of their own technology, the Besalisks established large orbital space stations where offworlders could come to do business. Trading and making deals, any violence on these stations is committed by offworlders as Besalisks avoid confrontation.</p>

        <h3>Names</h3>

        <p>Besalisk name's are generally words that embody them, with a surname attached to their commune.</p>

        <p><strong>Male Names.</strong> Darius, Dexter, Plun, Pong</p>

        <p><strong>Female Names.</strong> Delia, Mora, Ren, Teen</p>

        <p><strong>Surnames.</strong> Jettster, Kil, Krell, Ugg</p>



        <h3>Besalisk Traits</h3>

        <p>As a Besalisk, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Besalisks reach adulthood in their early teens and generally live to be about 70.</p>

        <p><strong><em>Alignment.</em></strong> Besalisks tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Besalisks tower over almost all other species, with the smallest standing at 6 feet tall and weighing 200 lbs., and the largest approaching 8 feet tall and 400 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Four-Armed.</em></strong> Besalisks have four arms which they can use independently of one another. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required).</p>

        <p><strong><em>Long-Limbed.</em></strong> When you make a melee attack on your turn, your reach for it is 5 feet greater than normal.</p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Besalisk.</p>

        <img src='https://www.gmbinder.com/images/NCC0HBq.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:364px' />



