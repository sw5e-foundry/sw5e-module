  - name: Breaking a Bond
    _id: 3kKOI6zXgnZjk5pv
    text:
      content: |-
        <h3>Breaking a Bond</h3>

        <p>Sometimes, creatures might want to end their Force-bond, whether the bond was created unbeknownst to them or they no longer wish to share the bond. To do so, one of the creatures must spend 10 minutes meditating on the bond, and then make a Charisma saving throw. The DC of this saving throw varies, depending on the tier of the bond, as shown above in the Bond Distance and DC by Tier table. On a success, the bond's tier is reduced by 1. If the bond's tier is 1, it is broken. On a failure, the bond's tier is not reduced, and you can't try again for 24 hours.</p>

        <img src='https://www.gmbinder.com/images/JmR6yJ9.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:970px' />



