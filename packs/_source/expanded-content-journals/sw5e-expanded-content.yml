  - name: Actions
    _id: 8CjZssTnHqOwVohn
    text:
      content: |-
        <h3>Actions</h3>

        <p>There are three major actions a dueling character can take: Attack, Defend, or Feint. During each round of dueling, each involved party must decide which of these three actions they will take.</p>

        <h4>Attack</h4>

        <p>The most common action, a character can choose to attack. When a character chooses to attack, they have advantage on the attack roll during resolution if the opponent takes the Feint action, and disadvantage on the roll if the character takes the Defend action.</p>

        <h4>Defend</h4>

        <p>The second action a character can take is is to defend. When a character chooses to defend, they have advantage on the attack roll during resolution if the opponent takes the Attack action, and disadvantage on the roll if the character takes the Feint action.</p>

        <h4>Feint</h4>

        <p>The third action a character can take is to feint. When a character chooses to feint, they have advantage on the attack roll during resolution if the opponent takes the Defend action, and disadvantage if the character takes the Attack action.</p>

        <h4>Extra Attack</h4>

        <blockquote><p>If one party has the Extra Attack feature, and the other party doesn't, consider allowing them to roll with an additional instance of advantage.</p></blockquote>
