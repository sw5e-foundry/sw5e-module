  - name: Companion Natures
    _id: VDj224xKKdScPovc
    text:
      content: |+
        <h2>Companion Natures</h2>

        <p>Certain class features grant a specific companion nature, while the Companion Keeper feat offers your choice of companion nature. You must meet a companion nature's requirement in order to choose that companion. You may only have one active companion at a time.</p>

        <h4>Alternative Companion Nature</h4>

        <blockquote><p>Your archetype feature may grant you one type of companion, whereas your character can be better realized utilizing a different companion. For instance, an astrotech engineer might prefer to have a tracker droid over one of the larger droid options. Work with your GM to determine if a different companion is better suited, and mechanically appropriate, to your character's identity. </p></blockquote>

        <p>&emsp;You may choose your companion's nature from the following options or roll on the table below to determine it randomly. </p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d10</th><th>Companion Nature</th></tr></thead><tbody><tr><td>1</td><td>Aberrant</td></tr><tr><td>2</td><td>Beast</td></tr><tr><td>3</td><td>Droid</td></tr><tr><td>4</td><td>Humanoid</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d10</th><th>Companion Nature</th></tr></thead><tbody><tr><td>5</td><td>Spirit</td></tr><tr><td>6</td><td>Thrall</td></tr><tr><td>7</td><td>Tracker Droid</td></tr><tr><td>8</td><td>Turret</td></tr></tbody></table></div>

        <p>If you determine your companion's nature randomly, and the result is a nature for which you are ineligible, simply reroll until you get a proper result.</p>

        <p>If your companion is irreparably destroyed, or you want a different companion, you must first break the bond with your current companion. Bonding with a new companion takes 8 hours spent in an appropriate location. You may only have one companion at a time. If you want to change your companion nature, as with the Alternative Companions feature above.</p>



        <h4>Aberrant Companion</h4>

        <em><strong>Prerequisite:</strong> Proficient with alchemy kits</em><br>

        <blockquote><p>Aberrant companions are part of a WIP scholar archetype.</p></blockquote>

        <h4>Beast Companion</h4>

        <em><strong>Prerequisite:</strong> Proficiency in Animal Handling</em><br>

        <p>Through spending time in the wilderness or discovering a forlorn creature in a foreign environment, you gain the loyalty of a beast companion.</p>

        <h4>Droid Companion</h4>

        <em><strong>Prerequisite:</strong> Proficiency with astrotech's implements</em><br>

        <p>Through creation of your own or capture of another, you gain the services of a droid companion.</p>

        <h4>Humanoid Companion</h4>

        <em><strong>Prerequisite:</strong> Proficiency in Intimidation or Persuasion</em><br>

        <p>Through menacing or recruitment, you gain the fidelity of a humanoid companion.</p>

        <h4>Spirit Companion</h4>

        <em><strong>Prerequisite:</strong> Discovery of a spirit's essence</em><br>

        <p>Through happenstance or misfortune, you gain the curiosity of a spirit companion.</p>

        <blockquote><p>Spirits don't exist yet, but they will as a part of the Path of Communion sentinel rework c. 2023.</p></blockquote>

        <h4>Thrall Companion</h4>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <blockquote><p>Undead thralls are part of a WIP consular archetype.</p></blockquote>

        <h4>Tracker Droid Companion</h4>

        <em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>

        <p>Through fabrication of your own or purchase from a vendor, you gain the assistance of a tracker droid companion.</p>

        <h4>Turret Companion</h4>

        <em><strong>Prerequisite:</strong> Proficiency with artillerist's kit</em><br>

        <p>Through construction of your own or coopting someone else's, you gain the use of a turret companion.</p>

