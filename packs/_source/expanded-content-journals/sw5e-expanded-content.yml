  - name: Harch
    _id: SH9DoTdzrNVmdxPc
    text:
      content: |-
        <h2>Harch</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Pale pink</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Brown, black</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Spider-like with six eyes, eight limbs and chelicerae</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'5"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>150 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Secundus Ando</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Harchese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Harch possess a large-fanged mouth between two prominent chelicerae, above which they have six red eyes arranged in a semicircle. The two lowest eyes are larger and roughly twice the size of the four smaller eyes. Harch walk on two legs and have six arms, with the second and third set of arm protruding from behind the first pair rather than directly above or below them. These arms are covered in thick hair and end in three-fingered hands.</p>

        The Harch are distantly related to the Aqualish<br> species and there is much debate among geneticists<br> regarding the relationship between the Harch and the<br> Aqualish Ualaq subspecies. However, the Harch<br> themselves considered such discussions to be<br> obscene.

        <h3>Society and Culture</h3>

        <p>Not much is known about the Harch, as few of them have mingled with the galactic community, preferring to stay on Secundus Ando. Harch that leave the planet tend to have a more aspirant nature than their fellows, and often reach great heights in their chosen professions in the galaxy. Such Harch are considered outliers�most apparently care little for titles.</p>

        <p>Like the Arcona species, female Harch are seen as more domineering and aggressive than their male counterparts. It is not unheard of for a male Harch to raise entire broods of hatchlings alone.</p>

        <h3>Names</h3>

        <p>Harch names are not gender-specific. Harch do not use surnames.</p>

        <p><strong>Names.</strong> Cubach, Quixoch, Trench, Turch</p>



        <h3>Harch Traits</h3>

        <p>As a Harch, you have the following special traits:</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength, Constitution, and Intelligence scores increase by 1.</p>

        <p><strong><em>Age.</em></strong> Harch reach adulthood at age 10 and can live up to 200 years.</p>

        <p><strong><em>Alignment.</em></strong> Harch are cold, calculating beings, causing them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Harch stand around 6 feet tall and weigh between 200 and 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Bite.</em></strong> Your fangs are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage. Lastly, as a bonus action, you can perform a special bite attack. On a hit, the target suffers the attack's normal effects, and it must make a Constitution saving throw (DC = 8 + your proficiency bonus + your Constitution modifier). On a failed save, the target is poisoned until the end of its next turn, and you can't use this feature again until you complete a short or long rest.</p>

        <p><strong><em>Six-Armed.</em></strong> Harch have six arms which they can use independently of one another. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required).</p>

        <p><strong><em>Spider Climb.</em></strong> You have a climbing speed of 30 feet. You have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing, and while climbing you always have two hands free.</p>

        <p><strong>Languages.</strong> You can speak, read, and write Galactic Basic and Harchese. Harchese is discernible from other insectoid languages by a noticeable emphasis on consonants, especially the "ch" sound.</p>

        <img src='https://www.gmbinder.com/images/fgdUWW0.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:240px' />



