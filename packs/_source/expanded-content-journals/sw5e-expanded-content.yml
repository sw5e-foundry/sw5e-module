  - name: Acting in Concert
    _id: ODyPVsLhQH8dReAE
    text:
      content: |-
        <h3>Acting in Concert</h3>

        <p>When a tactical group's turn comes up in the initiative order, each member of the group acts together. Their turns and actions can come in any order, though each individual tactical group member is still limited to what actions they could normally take. Additionally, actions that could normally be broken up, such as when a fighter takes the Attack action and has the Extra Attack feature, can be broken up during the turn.</p>

        <p>For instance, a 5th-level fighter might take the Attack action and make their first attack. Before they make their second attack, however, the operative ally in their tactical group might then take the Help action to grant them advantage before the fighter makes the second attack.</p>
