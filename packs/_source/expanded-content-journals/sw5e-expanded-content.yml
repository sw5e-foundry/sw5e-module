  - name: Adrenaline
    _id: 4qyBJZZNMxG74g42
    text:
      content: |-
        <h4>Adrenaline</h4>

        <p><em>1st-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 reaction, which you take when a creature within range that you can see would roll initiative</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>You infuse one creature within range with a jittery burst of power, speeding its senses and reactions to the point of near precognition. The creature makes its initiative check with advantage.</p>
