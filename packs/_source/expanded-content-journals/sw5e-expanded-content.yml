  - name: Re-choosing Archetypes or Classes?
    _id: 8NyJBkhSzPCYsAqT
    text:
      content: |-
        <h3>Re-choosing Archetypes or Classes?</h3>

        <p>Re-choosing archetypes or classes is not intended as a part of this variant rule. However, you could easily allow players to do so, though I'd recommend the narrative approach over the simple level up or long rest.</p>



