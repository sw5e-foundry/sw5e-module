  - name: Compound Advantage
    _id: 6u8hl9XttnoCgshy
    text:
      content: |-
        <h2>Compound Advantage</h2>

        <p>Typically, multiple instances of advantage or disadvantage don't stack; you either have it or you don't, and if you have both, you essentially have neither. This variant rule is designed to allow sources of advantage�and disadvantage�to stack, to a maximum of three times.</p>

        <p>When you have two sources of advantage, you instead have <strong>superadvantage</strong>, which allows you to roll two additional d20s when you make your ability check, attack roll, or saving throw, and take the highest of the three dice. If you have three sources of advantage, however, you instead have <strong>hyperadvantage</strong>, which allows you to roll three additionals d20s and take the highest of the four. Consequently, if you have two sources of disadvantage, you instead have <strong>superdisadvantage</strong>, and if you have three sources of disadvantage, you have <strong>hyperdisadvantage</strong>, rolling three and four d20s, respectively, and taking the lowest.</p>

        <p>Additionally, advantage and disadvantage no longer completely cancel each other out. Instead, if you have two sources of advantage and one source of disadvantage, you instead have one source of advantage. For instance, if you are hidden from a creature, and an ally within 5 feet of it takes the Help action, you would have two sources of advantage�superadvantage�when you make your attack roll. If the creature is heavily obscured from you, however, you would have disadvantage on the attack roll, shifting you from superadvantage to advantage.</p>

        <p>Each source of advantage or disadvantage must be unique. For instance, if you are hidden from a creature, and an ally within 5 feet of it takes the Help action, you would have two sources of advantage�superadvantage�when you make your attack roll. If another ally also takes the Help action, however, you still only have two unique sources of advantage, thus granting only superadvantage.</p>

        <blockquote><p>Some customization options, such as the Supreme Accuracy feat, grant bonuses if you would have advantage. If you elect to use this variant rule, adjust these customization options to instead grant an additional source of advantage if you would already have advantage. For instance, if you have the Supreme Accuracy feat, if you have no source of advantage, you gain no benefit from the second bullet of the feat. If you have a source of advantage, however, the feat instead grants you superadvantage (or potentially hyperadvantage if you have an additional source of advantage).</p></blockquote>
