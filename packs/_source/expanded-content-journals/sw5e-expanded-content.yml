  - name: Strengthening a Bond
    _id: FeIcjy1e70JH6G0j
    text:
      content: |-
        <h3>Strengthening a Bond</h3>

        <p>In order to strengthen their bond, bond-mates must remain with a certain distance of each other, as shown below in the Bond Distance and DC by Tier table. They must spend one week times the tier they are trying to achieve. For instance, to progress from 1st to 2nd tier takes two weeks, while progressing from 2nd to 3rd takes an additional three weeks. This time does not have to be continuous; bond-mates can spend three days together, two days apart, and then four more days together to achieve 2nd tier.</p>

        <h5>Bond Distance and DC by Tier</h5>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>Tier</th><th>DC</th><th>Bond Distance</th></tr></thead><tbody><tr><td>1st</td><td>13</td><td>10 feet</td></tr><tr><td>2nd</td><td>14</td><td>30 feet</td></tr><tr><td>3rd</td><td>15</td><td>300 feet</td></tr><tr><td>4th</td><td>16</td><td>1 mile</td></tr><tr><td>5th</td><td>17</td><td>10 miles</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>Tier</th><th>DC</th><th>Bond Distance</th></tr></thead><tbody><tr><td>6th</td><td>19</td><td>100 miles</td></tr><tr><td>7th</td><td>20</td><td>1,000 miles</td></tr><tr><td>8th</td><td>21</td><td>10,000 miles</td></tr><tr><td>9th</td><td>22</td><td>100,000 miles</td></tr><tr><td>10th</td><td>23</td><td>Limitless</td></tr></tbody></table></div>
