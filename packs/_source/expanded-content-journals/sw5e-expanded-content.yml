  - name: Follower
    _id: CKIs2eBwhhRqmQg8
    text:
      content: |-
        <h2>Follower</h2>

        <p>As a follower, your companion gains the following features.</p>

        <h3>Companion Traits</h3>

        <p>Beginning at 1st level, your companion gains two traits, determined by its nature. Companion natures are discussed later in this chapter. Your companion gains an additional trait at 5th, 9th, 13th, and 17th level.</p>

        <h3>Helpful</h3>

        <p>At 2nd level, your companion can take the Help action as a bonus action, but it can only help you in this way.</p>

        <h3>Companion Class</h3>

        <p>When your companion reaches 3rd level, it can choose a class that determines how it focuses its training, which is detailed at the end of the follower's description. Your companion's class grants features at 3rd level, and again at 7th, 11th, 15th, and 18th level.</p>

        <h3>Ability Score Improvement</h3>

        <p>When your companion reaches 4th level, and again at 8th, 12th, 16th, and 19th level, it can increase one ability score of its choice by 2, or it can increase two ability scores of its choice by 1. As normal, you can’t increase an ability score above 20 using this feature</p>

        <h3>Expertise</h3>

        <p>At 6th level, choose one of your companion's skill or tool proficiencies. It gains expertise in the chosen skill or tool.</p>

        <p>At 14th level, your companion gains expertise in another skill or tool.</p>

        <h3>Companion Freedom</h3>

        <p>Once your companion has reached 10th level, your companion no longer requires you to use your bonus action to allow it to take an action other than Dash, Disengage, Dodge, Guard or Hide.</p>

        <h3>Feat</h3>

        Also at 10th level, your companion gains one feat of your choice. Your companion<br> can't take a feat that would<br> grant them a companion.

        <h3>Companion Capstone</h3>

        By 20th level, your companion<br> has reached the peak of its<br> capabilities. Two ability scores<br> of its choice increase by 2. Its<br> maximum for those scores<br> increases by 2.

        <div class="sw5e-book-block"><h5>The Follower</h5>

        |Level|Proficiency<br> Bonus|Features|

        <p>|:-:|:-:|:--| | 1st|+2|Companion Traits (two traits)| | 2nd|+2|Helpful| | 3rd|+2|Companion Class| | 4th|+2|Ability Score Improvement| | 5th|+3|Companion Traits (three traits)| | 6th|+3|Expertise| | 7th|+3|Companion Class feature| | 8th|+3|Ability Score Improvement| | 9th|+4|Companion Traits (four traits)| |10th|+4|Companion Freedom, Feat| |11th|+4|Companion Class feature| |12th|+4|Ability Score Improvement| |13th|+5|Companion Traits (five traits)| |14th|+5|Expertise| |15th|+5|Companion Class feature| |16th|+5|Ability Score Improvement| |17th|+6|Companion Traits (six traits)| |18th|+6|Companion Class feature| |19th|+6|Ability Score Improvement| |20th|+6|Companion Capstone|</p></div>
