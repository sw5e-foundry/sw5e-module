  - name: Kalleran
    _id: KnFSDTtfQN4Tc86U
    text:
      content: |-
        <h2>Kalleran</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green with distinct black markings</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, orange, green, or blue</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Olfactory antenna, noseless</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>6'4"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>110 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Kaller</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Kall</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Kallerans evolved from a semi-amphibious species on Kaller. Kallerans are tall and flexible; their hands and feet have three prehensile digits on each, which leeds kallerans to avoid wearing shoes or boots. The majority of kallerans have green skin patterned with distinctive black stripes. The species have dense muscles that assist them in the protection of their otherwise delicate bodies. The kalleran head is distinguished by fin-like folds on the tops and sides of their faces. These fins augment a kalleran's hearing, allowing sound to bounce back and be picked up by the two antenna crowning their head. These antenna are sensory organs that serve as olfactory and aural receptors. Kallerans have lungs adapted to breathe above water, though the majority of their respiration is done through their skin. A holdover from their amphibious past, their skin can draw oxygen in from the air and filter out carbon dioxide. Their respiratory system requires them to consume more water than other species their size to keep their skin moist and supple. Because they do not primarily breathe through their mouths, kallerans did not evolve noses.</p>

        <h3>Society and Culture</h3>

        <p>Above all else, kalleran's value personal achievement over collective accomplishments. Because of this, the people of Kaller have never united to form great societies or participate in galactic affairs. Much of the cultural expansion on Kaller was brought by colonists, both friendly and violent, who had settled the world over the course of millennia.</p>

        <h3>Names</h3>

        <p>Kallerans have regal sounding names, sometimes using accents on vowels, with clan-based surnames. </p>

        <p><strong>Male Names.</strong> Gliconn, Orcas, L�vern, Seelv�n</p>

        <p><strong>Female Names.</strong> Cybele, F�ress, Numarin, Retesh</p>

        <p><strong>Surnames.</strong> Alash, Byssus, Estair, Lash</p>



        <h3>Kalleran Traits</h3>

        <p>As a kalleran, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Kallerans reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Kallerans' individualistic society causes them to tend towards chaotic alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Kallerans typically stand 6 and a half to 8 feet tall and generally weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Flexible.</em></strong> You have advantage on Dexterity (Acrobatics) checks that involve flexibility.</p>

        <p><strong><em>Keen Hearing.</em></strong> You have advantage on Wisdom (Perception) checks that involve hearing.</p>

        <p><strong><em>Prehensile Feet.</em></strong> You have supreme control over your feet and can use them to manipulate objects as well as your hands.</p>

        <p><strong><em>Snap Senses.</em></strong> Through your antenna, you can sense incoming danger and react accordingly. When you roll for initiative, you can choose to gain advantage on the roll. Alternatively, if you are surprised, you may act normally on your first turn. Once you've used this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kall. Kall depends upon distinct antenna movements communicate correctly. This leads to this characteristic antenna movement when kallerans speak Galactic Basic. Because antenna movement is an integral part of Kall, it is difficult for most other species to master. </p>

        <img src='https://www.gmbinder.com/images/IsneoUp.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:140px' />



