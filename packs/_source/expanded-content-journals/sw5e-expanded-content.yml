  - name: Verpine
    _id: W8PHWKP0MKfeaE6T
    text:
      content: |-
        <h2>Verpine</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Hive-based insectoids, radio wave senses, technological aptitude, hardened carapace, short snouts, and small, toothless mouths</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'9"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>80 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Roche asteroid field</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Verpine</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Verpine are thin bipedal insectoids whose heads are dominated by large compound eyes. They also have two antennae, one located behind each eye. Their hardened carapace, composed of a green chitinous substance called carahide, is as flexible as the skin of other creatures, yet tough enough to deflect a blade or even absorb a glancing blaster bolt. The Verpine circulatory system does not contain a heart.</p>

        <p>Verpine eyes are keen enough to pick out microscopic details. Their antennae contain tympanic nerves which pick up sound. Their antennae are also sensitive to radio waves, giving Verpine the natural ability to sense and transmit radio waves to communicate with another Verpine in their language over long distances.</p>

        <h3>Society and Culture</h3>

        <p>The Verpine people hail from the Roche asteroid field, which is the fractured remnants of their home planet. The Roche live in artificial, self-sustaining environments inside these fragments.</p>

        <p>Verpine culture is oriented around crafting; they are noteworthy manufacturers of weapons, shield generators, armor, as well as personal use items such as breathing apparatuses. They are also gifted pilots.</p>

        <h3>Names</h3>

        <p>Verpine had variable naming customs. Not all Verpines adopt surnames. Male and female Verpine names do not differentiate.</p>

        <p><strong>First Names.</strong> Fxz'et, Kuli, Moegid, Ss's, Zix</p>

        <p><strong>Surnames.</strong> And'et, Ned'Ix, Ned'lx, Niskooen, Zes'sx</p>



        <h3>Verpine Traits</h3>

        <p>As a verpine, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Verpine reach adulthood in their 40's and live an average of 200 years.</p>

        <p><strong><em>Alignment.</em></strong> Verpine's altruistic and generous nature cause them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Verpine stand between 6 and 7 feet tall and rarely weigh more than 120 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Crafters.</em></strong> You have proficiency in one tool of your choice.</p>

        <p><strong><em>Hardened Carapace.</em></strong> While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier.</p>

        <p><strong><em>Tympanic Antennae.</em></strong> You have tremorsense out to 30 feet. You can detect and pinpoint the origin of vibrations within that radius, provided that monster and the source of the vibrations are in contact with the same ground or substance. Tremorsense can't be used to detect flying or incorporeal creatures</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Verpine. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it. You can communicate with other Verpine at distances of up to a mile using your antennae.</p>

        <img src='https://www.gmbinder.com/images/vUVn1n8.png?1' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:266px' />



