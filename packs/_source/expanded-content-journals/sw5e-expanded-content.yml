  - name: Weapon Hit Dice and Hit Points
    _id: QkBvKYAKik7k5hTr
    text:
      content: |-
        <h3>Weapon Hit Dice and Hit Points</h3>

        <p>A weapon's hit points are presented both as Hit Dice and hit points. A weapon has a number of Hit Dice equal to twice its damage dice. For instance, a blaster rifle has a 1d8 damage die, so it has 2 Hit Dice, which are d8s. A weapon's hit points are determined by taking the average of its hit dice. For instance, a blaster has 2 Hit Dice, which are d8s, so it has 9 hit points on average, as shown in the Hit Dice Average table below.</p>

        <h4>Hit Dice Average</h4>

        <table class="sw5e-book-table"><thead><tr><th>Hit Die</th><th>Average Hit Points per Hit Die</th></tr></thead><tbody><tr><td>d4</td><td>2.5</td></tr><tr><td>d6</td><td>3.5</td></tr><tr><td>d8</td><td>4.5</td></tr><tr><td>d10</td><td>5.5</td></tr><tr><td>d12</td><td>6.5</td></tr></tbody></table>

        <p>At the GM's discretion, some weapons might be resistant, immune, or even vulnerable to certain types of damage. Enhanced weapons are resistance, or even immune, to damage from unenhanced weapons.</p>
