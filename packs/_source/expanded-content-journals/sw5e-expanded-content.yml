  - name: Miraluka
    _id: 2TyDLHtvcX7wJ8X1
    text:
      content: |-
        <h2>Miraluka</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Pale to brown</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, brown, grey, or white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Lack of physical eyes, inherent <em>force<br> sight</em></td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>110 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Alpheridies</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Miralukese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The Miraluka are a near-human species that differs from Humans in that they lack eyes, only retaining vestigial eye sockets, and perceive the environment around them through <em>force sight</em> instead of regular vision. This vision is so strong that if a Miraluka looks upon a Jedi or Sith, they can "see" Force radiating off them. The strength of a Miraluka's connection to the Force varies by individual.</p>

        <h3>Society and Culture</h3>

        <p>Miraluka are a thoughtful, cautious, and deliberative species. They have little interest in personal gain or glory. For social reasons, Miraluka hide their appearance by wearing a headband, a mask, or similar concealing headwear. In addition all Miraluka are very united by species. They call themselves "brothers" and are considered as members of a great family. As a Force-using species, Miraluka are often quite shocked if 'shown' life not connected to the Force. </p>

        <p>Many Miraluka worship two gods, Ashla and Bogan, through the philosophy of the Greater Force. They do not believe in good or evil, but were taught to accept both life and death.</p>

        <p>Miraluka Force-sensitives are an order of their own called the Luka Sene. Academic in atmosphere and culture, the Luka Sene focus primarily on developing the sense-related powers of their members. However, unlike the Jedi, Sith and other traditions, the Luka Sene does not dictate a member's personal life.</p>

        <h3>Names</h3>

        Miraluka names are generally two syllables. Miraluka don't use surnames, as they believe they are one<br> family.

        <p><strong>Male Names.</strong> Aakih, Pafil, Rikhor, Vociif, Xuwuth</p>

        <p><strong>Female Names.</strong> Auchaod, Favom, Mucem, Wilierth</p>



        <h3>Miraluka Traits</h3>

        <p>As a miraluka, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Charisma score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Miraluka reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Miraluka believe in balance and thus tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Miraluka typically stand 5 to 6 feet tall and generally weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Force-Sensitive.</em></strong> You know the <em>mind trick</em> at-will force power. When you reach 3rd level, you learn and can cast the <em>sanctuary</em> force power once per day. When you reach 5th level, you learn and can cast the <em>force confusion</em> power once per day. Wisdom or Charisma (your choice) is your forcecasting ability for these powers.</p>

        <p><strong><em>Force Sight.</em></strong> Miraluka perceive the environment around them through use of the Force. You are constantly under the effects of the force power <em>force sight</em>, though the power does not require concentration for you. </p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Miralukese.</p>

        <img src='https://www.gmbinder.com/images/S8aL9VM.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:194px' />



