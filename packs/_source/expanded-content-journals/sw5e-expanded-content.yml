  - name: Burst of Flame
    _id: EcYBww6QTL3YEcvi
    text:
      content: |-
        <h4>Burst of Flame</h4>

        <p><em>2nd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot line)</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>You expel a burst of flame in a line 30 feet long and 5 feet wide, originating from you. Each creature in the line must make a Dexterity saving throw. A creature takes 3d8 fire damage on a failed save, or half as much damage on a successful one.</p>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd.</p>
