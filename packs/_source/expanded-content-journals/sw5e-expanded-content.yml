  - name: Major Benevolence
    _id: 3sLusMgmdAix1Fpn
    text:
      content: |-
        <h3>Major Benevolence</h3>

        <p>At certain tiers of Light Points, as shown in the Force Alignment table, you manifest a Major Benevolence.</p>

        <h4>Tier I</h4>

        <p>When you or an ally within 30 feet of you makes a Charisma (Persuasion) check to attempt to calm a creature or bring peace/alliance, you may spend a force point to add 1d4 to the result of the roll. </p>

        <h4>Tier II</h4>

        <p>When a friendly creature other than you within 30 feet that you can see fails a saving throw against being frightened, you can spend 1 force point to have them reroll the die. They must use the new roll.</p>

        <h4>Tier III</h4>

        <p>When an ally within 30 feet of you rolls a 1 on the d20 for an ability check or saving throw, you can spend 1 force point to let the ally reroll the die. They must use the new roll.</p>

        <h4>Tier IV</h4>

        <p>Casting light side force powers of 1st level or higher costs 1 fewer force point, but casting dark side powers of 1st level or higher costs 1 more.</p>

        <h4>Luminous Being (Tier V)</h4>

        <p>You have become a physical manifestation of the light side of the Force, gaining one of the following boons. Your GM can choose the boon for you, or roll a die to determine it randomly.</p>

        <div class="sw5e-book-block"><p>| d6 | Boon   | |:-:|:---| | 1 | Lightbringer | | 2 | Protection | | 3 | Immutable Defense | </p>

        <p>| d6 | Boon   | |:-:|:---| | 4 | Quick Casting | | 5 | Lay On Hands | | 6 | Healer |</p></div>

        <p>&emsp;<strong><em>Lightbringer.</em></strong> Your maximum force points increases by 10.</p>

        <p><strong><em>Protection.</em></strong> When a friendly creature other than you within 30 feet that you can see takes damage from any source, you can reduce that damage to 0. Once you've used this boon, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Immutable Defense.</em></strong> The damage resistances of friendly creatures other than you within 30 feet of you cannot be ignored.</p>

        <p><strong><em>Quick Casting.</em></strong> Choose one light side force power you know of 1st through 3rd level that has a casting time of 1 action. That power's casting time is now 1 bonus action for you.</p>

        <p><strong><em>Lay On Hands.</em></strong> You can use a bonus action and touch a friendly creature other than yourself, causing them to recover a number of hit points equal to half their hit point maximum. Once you've used this boon, you can't use it again until you finish a long rest.</p>

        <p><strong><em>Healer.</em></strong> If a friendly creature within 30 feet of you regains hit points at the end of a short rest by spending one or more Hit Dice, that creature regains additional hit points equal to your Wisdom modifier.</p>
