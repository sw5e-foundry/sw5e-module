  - name: Kaleesh
    _id: XkOClVSKXoxDiEgE
    text:
      content: |-
        <h2>Kaleesh</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Orange, red, or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or brown</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Bone masks, elongated ears, flat nose, tusks</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'1"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>105 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Kalee</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Kaleesh</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Tusks protrude from a Kaleesh's upper jaw, and shorter ones jut from their chins. Kaleesh have large pointed ears and long nostrils that stretched close to their eyes. They have very keen olfactory sense and were able to produce pheromones. Most of their facial features are obscured behind the traditional masks they wear, and outsiders rarely see Kaleesh unmasked. They are known to practice polygyny, a form of polygamy, where a male courts multiple wives. </p>

        <h3>Society and Culture</h3>

        <p>Kaleesh society is divided into numerous autonomous tribes. War is viewed as an essential and sacred practice, and the culture's large emphasis on honor is known to spur many acts of vengeance among the various tribes. However, when necessary, the tribes will put aside their differences and bond to fend off a common enemy.</p>

        <p>The Kaleesh are a spiritual people, believing that those who perform great deeds in life became gods in death; therefore, burial places are sacred to them. A large number of temples are devoted to their ancestor gods, the holiest of which was called Shrupak. </p>

        <p>Abesmi, a great monolith of stone in the Jenuwaa Sea, is the place the Kaleesh believed the gods ascended to the heavens. Pilgrims take the perilous voyage to Abesmi to beseech the gods.</p>

        <h3>Names</h3>

        <p>Male Kaleesh names are typically one syllable while female are two. Kaleesh surnames are tribal and often use two words.</p>

        <p><strong>Male Names.</strong> Bir, Grost, Jick, Xygh, Yles</p>

        <p><strong>Female Names.</strong> Dduzu, Glaglo, Runda, Yugdo, Zodey</p>

        <p><strong>Surnames.</strong> Jal Greennath, Lij Jum, San Syrro,</p>



        <h3>Kaleesh Traits</h3>

        <p>As a Kaleesh, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Kaleesh reach adulthood in their early teens and live to be about 80.</p>

        <p><strong><em>Alignment.</em></strong> Kaleesh tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Kaleesh typically stand about five and a half feet tall and weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> The thermal pits under a Kaleesh's eyes grant darkvision. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Weapon Training.</em></strong> Kaleesh are adept hunters. You are proficient with the blaster carbine, vibroblade, vibropike, and, vibrospear.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Tracker.</em></strong> You have proficiency in the Survival skill. Additionally, you are considered to have expertise in Wisdom (Survival) checks made to track a creature if that creature has a scent.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kaleesh.</p>

        <img src='https://www.gmbinder.com/images/J34Afph.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:402px' />



        <p>Good afternoon, all:</p>

        <p>This week's Expanded Content release is the Kalleran species. </p>

        <p>If you have questions, concerns, or you notice a typo, post it here!</p>

        <hr>

        <hr>

        <h3>Credit</h3>

        <p>This species was written by Heresy on the discord.</p>

        <hr>

        <h3>Typos</h3>

        <p>None so far.</p>

        <blockquote><p>|Kalloran|Keen Hearing|</p></blockquote>



        <h3>Design Insights</h3>

        <p>Kalloran are an aquatic species, similar to nautolans or quarren, with excellent physical stats. I would probably build this as a close-quarters, medium armor martial character (probably fighter or maybe berserker) and take advantage of the light- and vibro-weapons that have Dexterity requirements.</p>

        <hr>

        <h3>FAQ</h3>

        <blockquote><p>What will this species lose to half-human?</p></blockquote>

        <p>Kalloran will lose Keen Hearing.</p>

