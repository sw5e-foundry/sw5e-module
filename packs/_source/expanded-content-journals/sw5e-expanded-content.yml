  - name: Teras Kasi Order
    _id: GYKypQp0Q1IsjX5R
    text:
      content: |+
        <h2>Teras Kasi Order</h2>

        <p></div></p>

        <p>Monks of the Teras Kasi Order are the ultimate masters of unarmed martial arts combat. They learn techniques to draw focus from the defeat of their enemies, resist the mental assaults of the Force, and unleash powerful rushes of strikes to subdue their foes.</p>

        <h3>Forredari Stance</h3>

        <em><strong>Teras Kasi Order:</strong> 3rd level</em><br>

        <p>Your honed focus allows you to enter a stance of mental fortification and power. You can use your bonus action to enter this stance. When you do so, you unleash a flurry of blows on creatures of your choice that you can see within 10 feet of you. Each creature in the area must make a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon) or take the weapon's normal damage.</p>

        <p>This stance lasts for 1 minute. While you are in this stance, you gain the following benefits:</p>

        <ul><li><strong>Death Weave.</strong> When you reduce a creature to 0 hit points, you gain temporary hit points equal to your focus ability modifier + half your monk level.</li><li><strong>Gundark Slap.</strong> Once on each of your turns, when you hit a creature with an unarmed strike or a monk weapon, you can choose to make it unable to take reactions until the end of your next turn.</li><li><strong>Sleeping Krayt.</strong> You can use your focus ability modifier instead of Strength whenever you would make a Strength check or a Strength saving throw. Additionally, you have advantage on saving throws against being charmed or frightened.</li></ul>

        <p>These effects end early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <p>While you have no remaining uses of this feature, you can instead expend 1 focus point to use it. When you do so, your maximum focus points are reduced by 1 until you complete a long rest.</p>

        <h3>Steel Hands Form</h3>

        <em><strong>Teras Kasi Order:</strong> 6th level</em><br>

        You can draw upon<br> your focus to utilize an<br> array of practiced<br> techniques to strike<br> your opponents with<br> precision and power.<br> You can use your<br> bonus action to enter<br> this stance, and<br> when you do so,<br> you can also enter<br> your Forredari<br> Stance as a part of<br> this same bonus<br> action. This form<br> lasts for 1 minute.<br> While you are in this<br> stance, you gain the<br> following benefits:

        <ul><li><strong>Charging Wampa.</strong> Once per round, when you are forced to make a saving throw against a force power, your movement speed increases by 10 feet until the end of your next turn.</li><li><strong>Nexu Grin.</strong> When a creature you can see within 10 feet of you casts a force power that requires a force attack roll against you or an an allied creature, you can use your reaction and expend 1 focus point to impose disadvantage on the attack roll. If the attack misses, and the higher of the two d20 rolls would also miss, the creature cannot cast that force power again until it completes a short or long rest.</li><li><strong>Screaming Squill.</strong> Once per turn, when you hit a creature that is concentrating on a force power and it makes a Constitution saving throw to maintain concentration, the DC for the check equals your focus save DC, unless the DC for the Constitution saving throw would be higher.</li></ul>

        <p>These effects end early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <p>While you have no remaining uses of this feature, you can instead expend 1 focus point to use it. When you do so, your maximum focus points are reduced by 1 until you complete a long rest.</p>

        <h3>Matter Over Mind</h3>

        <em><strong>Teras Kasi Order:</strong> 11th level</em><br>

        <p>You tap into the greater power of your focus. While both your Forredari Stance and your Steel Hands Form are active, you gain the following benefits:</p>

        <ul><li><strong>Dancing Dragonsnake.</strong> When you take force, lightning, or necrotic damage, you can use your reaction to deflect it. When you do so, the damage you take is reduced by 1d10 + your focus ability modifier + your monk level.</li><li><strong>Aryx Slash.</strong> Once on each of your turns, when you hit a target with an unarmed strike or monk weapon, you can roll a Martial Arts die and deal additional psychic damage equal to the amount rolled.</li><li><strong>Piercing Gaze.</strong> When you would make an Insight check against a creature you know to wield the Force, you can use your focus ability modifier for the roll, and you are considered to have expertise in the Insight skill. If you would already have expertise in the check, you instead have advantage on the roll. </li></ul>

        <h3>Spitting Rawl</h3>

        <em><strong>Teras Kasi Order:</strong> 17th level</em><br>

        <p>You have learned to harness your strikes in a blistering fury. On your turn, when a creature takes damage from you three times, you can make up to three additional unarmed strikes against the creature (no action required). The first additional unarmed strike costs 1 focus point and deals 1d12 additional psychic damage on a hit, and each unarmed strike after the first costs 1 additional focus point and deals 1d12 additional psychic damage on a hit, cumulatively.</p>

