  - name: Iktotchi
    _id: F7lsGzjyywDyqyQI
    text:
      content: |-
        <h2>Iktotchi</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Pink</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Horns, precognition, telepathy, thick pink skin</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'11"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>120 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Iktotch, moon of Iktotchon</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Iktotchese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Iktotchi do not have hair, but rather they had a very resistant skin which protected them from the violent winds which crossed the satellite. Both males and females have down-curved cranial horns, which gave them an aggressive aspect. The males' horns are generally a little larger, a remnant from their mountain-dwelling, caprinaen ancestors. The horns are able to regenerate if damaged.</p>

        <h3>Society and Culture</h3>

        <p>The Iktotchi are a fiercely guarded and isolationist species - vaunted for their ability to hide their feelings and bury any semblance of emotion. Originating on the harsh, windy moon of Iktotch, which orbits the planet Iktotchon in the Expansion Region, the Iktotch are gifted with precognition, and are courted as often by Jedi as by pirates for their skills.</p>

        <p>Iktotchi society is a stratified society. Upward mobility is both possible and encouraged. Iktotchi are an outwardly dispassionate people, which is evidenced by their culture. They have a robust legal system, and suffer little crime. Iktotchi are respectful of cultures other than their own and can easily integrate with others.</p>

        <p>Iktotchi who distinguish themselves often earn a titular nickname, by which they are referred to in place of their name. Generally, this is done by accomplishing a remarkable feat that benefits the Iktotchi as whole.</p>

        <h3>Names</h3>

        <p>Iktotchi names are generally two syllables. Surnames are familial. Respected Iktotchi often adopt a nickname, which they use in place of their birth name.</p>

        <p><strong>Male Names.</strong> Dilnam, Imruth, Kashkil, Yellam</p>

        <p><strong>Female Names.</strong> Kemkal, Onyeth, Reshu, Zorlu</p>

        <p><strong>Surnames.</strong> Hevil, Kaawi, Mimir, Nudaal, Zelend</p>



        <h3>Iktotchi Traits</h3>

        <p>As an Iktotchi, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Iktotchi reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Iktotchi are lawful and tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Iktotchi typically stand between 5 and 6 feet tall and weigh about 170 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Precognition.</em></strong> You can see brief fragments of the future, that allow you to turn failures into successes. When you roll a 1 on an attack roll, ability check, or saving throw, you can reroll the die and must use the new roll.</p>

        <p><strong><em>Telepathy.</em></strong> You can communicate telepathically with creatures within 30 feet of you. You must share a language with the target in order to communicate in this way.</p>

        <p><strong><em>Horns.</em></strong> Your horns are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Pilot.</em></strong> You have proficiency in the Piloting skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Iktotchese.</p>

        <img src='https://www.gmbinder.com/images/k2cfrAm.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:444px' />



