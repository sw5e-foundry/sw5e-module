  - name: Toydarian
    _id: 9z4hrem6Gm0WKtbC
    text:
      content: |-
        <h2>Toydarian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue, green, grey, or pink</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, brown, or green</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Two wings, facial tusks, snout, three fingers and toes on appendages</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>3'3"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>40 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Toydaria</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Toydarian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>A mammalian species of winged, stout bodied humanoids, the Toydarians have stubby facial tusks which protruded from their lower jaw and framed a short pudgy trunk. While their stubby legs can support their body weight, Toydarians' primary mode of locomotion was their use of the wings on their upper back. Though their wings can beat as fast as ten times a second, the effort burned up large amounts of energy, causing the species to need to replenish itself often through regularly eating mass quantities of food. In order to fuel this hyperactive metabolism, Toydarians eat concentrated foods and egg-seeds. Most of the bloodiest wars in their history were fought over food supplies. </p>

        <h3>Society and Culture</h3>

        <p>Despite being ruled by the Hutts, the Toydarian people are able to govern themselves free of major outside intervention through the establishment of a feudal monarchy. A ruling king sits on the planet's throne, allowing vassals to form allegiances and have minor disputes to solve their own problems. The king makes sure to keep his vassals happy and to have their allegiance, but will occasionally encourage infighting to reveal the true character of the vassals and weed out treachery. </p>

        <p>Toydarians are known as shrewd businessmen.</p>

        <h3>Names</h3>

        <p>Toydarian names are fairly simple and guttural, but a few harsher elements can be found here and there. Male names are generally shorter than female names. Female names always end in a vowel. </p>

        <p><strong>Male Names.</strong> Dod, Nesteddo, Tul, Zloomroo</p>

        <p><strong>Female Names.</strong> Fefiffe, Lenlibo, Nugni, Zoldibu</p>

        <p><strong>Surnames.</strong> Daab, Faabb, Kepo, Mitra, Vulba</p>



        <h3>Toydarian Traits</h3>

        <p>As a toydarian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Toydarians reach adulthood at 10 and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Toydarians' greedy nature causes them to tend toward chaotic balanced, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Toydarians average 4 feet tall and weigh less than 50 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Business Savvy.</em></strong> A common trait of all Toydarians is their shrewd business sense and their ability to haggle any deal. A loyal and proud people, these traits could be off-putting to outsiders, as many Toydarians in the galaxy were seen as crooks or slimy businessmen, but this was not always the case. Whenever you make a Charisma (Persuasion) check involving haggling you are considered to have expertise in the Persuasion skill.</p>

        <p><strong><em>Closed Mind.</em></strong> Toydarian brains have an unusual composition which made them resistant to influence from the Force. You have advantage on Wisdom and Charisma saving throws against force powers.</p>

        <p><strong><em>Flight.</em></strong> You have a flying speed equal to your walking speed. While wearing medium or heavy armor, your flying speed is reduced by half.</p>

        <p><strong><em>Shrewd Demeanor.</em></strong> You have proficiency in two Intelligence, Wisdom, or Charisma skills of your choice.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Huttese, and Toydarian.</p>

        <img src='https://www.gmbinder.com/images/WqVdcz3.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:403px' />



