    _id: IZEU2dQyDbjF9z8Y
    text:
      content: |-
        <h4>Greater Energy Shield</h4>

        <p><em>2nd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 reaction, which you take when a creature you can see within range is hit by an attack or targeted by the <em>homing rockets</em> power</li><li><strong>Range:</strong> 15 feet</li><li><strong>Duration:</strong> 1 round</li></ul>

        <p>An energy shield appears and protects the target. Until the start of the target's next turn, the target has a +5 bonus to AC, including against the triggering attack, and the target takes no damage from <em>homing rockets</em>.</p>
