      content: |-
        <h2>Exertion</h2>

        <p></div></p>

        <p>When the outlook of a situation is grim, player's might want to have their character attempt to go above and beyond, fueling their endeavors with their own vitality at the expense of potentially overexerting themselves through use of this variant rule.</p>
