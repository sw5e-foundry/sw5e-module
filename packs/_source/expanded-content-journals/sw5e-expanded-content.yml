  - name: Ortolan
    _id: 2t3YCi5V5HDliUh1
    text:
      content: |-
        <h2>Ortolan</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Light colors</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Light colors</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Stocky builds, trunklike noses, floppy ears, small mouths, brightly dyed fur</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>2'10"</td><td>+2d4"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>50 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Orto</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Ortolan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        Ortolans are squat, heavily-built humanoid bipeds with long, trunklike noses and beady black eyes. They possess floppy ears, which are extremely sensitive to sound waves. They have two hands, each ending in<br> four chubby fingers and a thumb, which is not<br> opposable. A thick, baggy hide covered in fuzz<br> resembling velvet hangs off of the Ortolan body.<br> Ortolans have a keen sense of smell to help them<br> forage for food. In fact, they are handicapped in their<br> business affairs by their attachment to food,<br> sometimes accepting otherwise unfavorable contracts<br> when promised enough to eat. Their twin obsessions<br> are food and music; offworld, many Ortolans find<br> success as chefs or musicians. 

        <h3>Society and Culture</h3>

        <p>Ortolan society is reasonably industrialised, though not as technologically advanced as other species. Despite this, their economy is mostly based on barter, with credits primarily used to trade with offworlders. Education is the responsibility of their parents, though gifted youngsters are often traded to other families to get specialized education. </p>

        <p>While most Ortolans appear to have blue skin, Ortolans are actually covered in short velvety fur which they often dyed in bright colors, most often blue and pink.  This tradition began when a Devaronian trader tried to sell Ortolans a shipment of food dyes�they considered dyeing their food a waste of time, but found dyed fur to be quite stylish.</p>

        <h3>Names</h3>

        <p>Ortolan names are generally short with big sounds. Female names are typically softer. Surnames are familial.</p>

        <p><strong>Male names.</strong> Donmb, Hegh, Nax, Parm, Teeb</p>

        <p><strong>Female names.</strong> Bedla, Folfe, Nelni, Phoff, Sallo</p>

        <p><strong>Surnames.</strong> Bigek, Lubum, Nad, Rojool, Somo </p>



        <h3>Ortolan Traits</h3>

        <p>As an ortolan, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Ortolans are considered adults at the age of seven and typically live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Ortolans' love of food and music causes them to tend toward chaotic light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Ortolans stand around 3 to 4 feet tall and weigh about 55 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Foragers.</em></strong> Whenever you make a Wisdom (Survival) check to forage for food you are considered to have expertise in the Survival skill.</p>

        <p><strong><em>Grovel, Cower, and Beg.</em></strong> As an action on your turn, you can cower pathetically to distract nearby foes. Until the end of your next turn, your allies gain advantage on attack rolls against enemies within 10 feet of you that can see you. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Hide.</em></strong> Your thick hide is naturally adapted to cold climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Keen Hearing and Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve hearing or smell.</p>

        <p><strong><em>Musical.</em></strong> You have proficiency in Performance and one musical instrument of your choice.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Ortolan. Ortolan is characterized by its grunts and hoots.</p>

        <img src='https://www.gmbinder.com/images/cFpHkEc.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:300px' />



