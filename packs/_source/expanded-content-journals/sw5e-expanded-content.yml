  - name: Final Destiny
    _id: 8jZtMf258C39zoNm
    text:
      content: |-
        <h3>Final Destiny</h3>

        <p>When the moment or encounter of a character's final destiny is upon them (GM's determination) their Destiny Point is not expended upon use and may be used repeatedly. Examples of such a situation include Luke Skywalker at the Battle of Yavin, or Revan upon facing Darth Malak onboard the Star Forge.</p>
