  - name: Instinctive Movement
    _id: JvLkgLYJ8ECXCqfy
    text:
      content: |-
        <h4>Instinctive Movement</h4>

        <p><em>1st-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Wall Run</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 minute</li></ul>

        <p>You enhance your movement with the Force, allowing you to traverse your environment with speed and acrobatic grace. When you cast this power, you gain two speed points. When you cast the power and as a bonus action on subsequent turns, you can expend a speed point, granting yourself all of the following benefits until the end of that turn:</p>

        <ul><li>Your speed increases by 5 feet. </li><li>You have resistance to falling damage. </li><li>You ignore difficult terrain. </li><li>You have a climb speed equal to your walking speed. </li><li>You add 10 feet to your long jump distance and 3 feet to your high jump distance. </li><li>You can move up, down, and across vertical surfaces and upside down along ceilings, while leaving your hands free. </li><li>You do not sink when moving over soft or brittle terrain, such as dust, silt, mud, snow, or thin ice. This effect does not allow you to move across liquid surfaces.</li><li>If you move at least 20 feet straight toward a creature and then hit it with a melee weapon attack for the first time on the same turn, you deal an extra 1d4 damage with that attack.</li></ul>

        <p>At the end of the turn, the benefits fade entirely until you spend another speed point. If these benefits end while you are still on a vertical surface, or anywhere else where you would normally fall or sink, you immediately fall or begin to sink unless you have some other means to remain there. </p>

        <p>This power ends when its duration expires, when you cast this power again, or when you have spent all your speed points. When the power ends, any unspent speed points are lost.</p>

        <p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the extra damage increases by 1d4 for each slot level above 1st. In addition, if you cast this power with a force slot of 3rd level or higher, you gain one additional speed point for every two slot levels above 1st.</p>
