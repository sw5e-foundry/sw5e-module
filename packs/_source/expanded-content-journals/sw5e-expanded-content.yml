  - name: Alternate Casting
    _id: H9uWEV5skoRkT0dR
    text:
      content: |-
        <h2>Alternate Casting</h2>

        <p></div></p>

        <p>Inspired by the Dimension 20 actual play campaign A Starstruck Odyssey, where one of the main characters is using sentinel bones but with techcasting instead of forcecasting, I've created the following variant rule.</p>
