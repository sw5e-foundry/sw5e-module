  - name: Elevation
    _id: 2dStjoAmaukzDYsy
    text:
      content: |-
        <h2>Elevation</h2>

        <p></div></p>

        <p>One aspect of 5e that has been more-or-less untouched is the concept of using elevation to your advantage beyond just creatures not being able to reach you. This variant rule offers mechanical boons to encourage utilizing elevation as a tactical device. Elevation grants a bonus called dominance, which comes in three levels.</p>

        <p>A creature has <strong>dominance</strong> over another creature if it is at least 10 feet above that creature vertically, and at least 10 feet away from that creature horizontally. While a creature has dominance over another, it has a +2 bonus to ranged attack rolls against the dominated creature, and the dominated creature suffers a -2 penalty to Dexterity saving throws against effects the creature dominating it controls. Additionally, a creature with dominance has a +2 bonus to AC and Dexterity saving throws against a creature it is dominating.</p>

        <p>A creature has <strong>superdominance</strong> over another creature if it is at least 20 feet above that creature vertically, and at least 20 feet away from that creature horizontally. While a creature has superdominance over another, it has a +3 bonus to ranged attack rolls against the superdominated creature, and the superdominated creature suffers a -3 penalty to Dexterity saving throws against effects the creature dominating it controls. Additionally, a creature with superdominance has a +3 bonus to AC and Dexterity saving throws against a creature it is dominating.</p>

        <p>A creature has <strong>hyperdominance</strong> over another creature if it is at least 30 feet above that creature vertically, and at least 30 feet away from that creature horizontally. While a creature has hyperdominance over another, it has a +5 bonus to ranged attack rolls against the hyperdominated creature, and the hyperdominated creature suffers a -5 penalty to Dexterity saving throws against effects the creature dominating it controls. Additionally, a creature with hyperdominance has a +5 bonus to AC and Dexterity saving throws against a creature it is dominating.</p>

        <p>A creature can only benefit from one level of dominance at a time for each creature it would be dominating, but it can have different levels of dominance for different creatures. For instance, if a creature is 30 feet above another creature both vertically and horizontally, it is hyperdominating that creature. If it is 20 feet above another creature vertically and 15 feet horizontally, it is only dominating the third creature instead of superdominating, since both values exceed 10 feet, but not 20.</p>
