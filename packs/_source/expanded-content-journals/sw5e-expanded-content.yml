  - name: Karkarodon
    _id: Bd5zQlM6HXx3GbDI
    text:
      content: |-
        <h2>Karkarodon</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue, gray, or white</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Multiple rows of sharp teeth, powerful jaws, shark-like heads</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>130 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Karkaris</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Karkaran</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The amphibious Karkarodons have tall, slim bodies with webbed hands and feet. Their shark-like heads have pointed noses, gill slits, and many rows of razor-sharp teeth, which they use when attacking and eating. Karkarodons are skilled and fast swimmers. They attack by grabbing the target and used their jaws for ripping and tearing.</p>

        <h3>Society and Culture</h3>

        <p>Karkarodons hail from the planet Karkaris, which is located in a star system neighboring the planet Mon Cala. They harbor an intense hatred for the Mon Calamari and Quarren inhabitants. The planet is almost entirely under water, and is very uninviting to non-Karkarodons. </p>

        <p>Karkarodon culture is a warmongering, strength-based culture. Clans often fight eachother for dominance, natural resources, and to cull the weak. Each clan on the planet has a ruling triumvirate, usually comprised of venerated warriors who rule for life. When a younger Karkarodon wants to replace one of the ruling body, they challenge them to single, mortal combat. Occasionally, the challenged may spare the life of the challenger when they win, though that usually leads to resentment from the loser.</p>

        <p>Karkarodons do not believe in lying or duplicity. They believe in approaching problems head on and saying what they mean, and are generally demeaing towards those they deem their lessers.</p>

        <h3>Names</h3>

        <p>Karkarodon names are harsh and gutteral. They are generally one syllable. Surnames are clan-based rather than familial.</p>

        <p><strong>Male Names.</strong> Aurb, Rend, Riff, Trak, Vour</p>

        <p><strong>Female Names.</strong> Dewb, Garr, Rast, Scrat, Zend</p>

        <p><strong>Surnames.</strong> Alben, Gerdall, Kibben, Tamson, Zendall</p>



        <h3>Karkarodon Traits</h3>

        <p>As a karkarodon, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Kakarodon reach adulthood in their early teens and live to be about 70.</p>

        <p><strong><em>Alignment.</em></strong> Karkarodons' warmongering nature causes them to tend toward the dark side, though there are exceptions</p>

        <p><strong><em>Size.</em></strong> Karkarodons stand 5 to 7 feet tall and weigh upwards of 250 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Aggressive.</em></strong> As a bonus action, you can move up to your speed toward an enemy of your choice that you can see or hear. You must end this move closer to the enemy than you started.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Bite.</em></strong> Your sharp teeth are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage. Lastly, as a bonus action, you can perform a special bite attack. On a hit, the target suffers the attack's normal effects, you gain temporary hit points equal to your Constitution modifier (minimum of 1), and you can't use this trait again until you finish a short or long rest.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Karkaran. Karkaran is characterized by its fierce sounds.</p>

        <img src='https://www.gmbinder.com/images/MFBrXRX.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:455px' />



