  - name: Armored Approach
    _id: 1nBhrEn1H2CreFxs
    text:
      content: |-
        <h2>Armored Approach</h2>

        <p></div></p>

        <p>Many berserkers forgo armor and rely on their own fortitude. Berserkers of the Armored Approach, however, embrace the use of armor. Each one customizes their own suit of armor to be used both defensively and offensively, so that the suit becomes an extension of the berserker's own might and fury.</p>

        <h3>Spiked Armor</h3>

        <em><strong>Armored Approach:</strong> 3rd level</em><br>

        <p>You gain proficiency in armormech's implements. Over the course of a long rest, you can customize a suit of light or medium armor into spiked armor. You must have the armor and armormech's implements in order to perform this modification. You can only have one suit of spiked armor at a time.</p>

        <p>This armor gains the barbed (1d4) property. If the armor already has the barbed property, the barbed damage increases by one step (from d4 to d6, or from d6 to d8). Additionally, while raging, you add your rage damage bonus to your barbed damage when you successfully initiate or maintain a grapple.</p>

        <p>While wearing your spiked armor, you can use your Constitution modifier instead of your Dexterity modifier when determining your AC.</p>

        <p>Additionally, while wearing your spiked armor, you can use your spiked armor as an improvised weapon. When you do so, you are considered proficient with it, and if your armor's barbed damage would be higher than your damage with improvised weapons, you use the barbed damage instead. If you take the Attack action on your turn and make at least one attack with your spiked armor, you can use your bonus action to make an additional attack with your spiked armor against the same target.</p>

        <h3>Environmental Shielding</h3>

        <em><strong>Armored Approach:</strong> 6th level</em><br>

        <p>You customize your spiked armor to better protect you. Choose one of the following damage types: acid, cold, fire, lightning, or sonic. While wearing your spiked armor, you have resistance to damage of the chosen type. Over the course of a long rest, you can select a different damage type, provided you have the armor and armormech's implements with you.</p>

        Additionally, while wearing your spiked armor, you have advantage on Constitution<br> saving throws made to avoid<br> exhaustion due to extreme heat<br> or cold.

        <h3>Customized Armor</h3>

        <em><strong>Armored Approach:</strong> 10th level</em><br>

        <p>You learn new ways to customize your spiked armor. Choose one of the following options. While wearing your spiked armor, you gain the effects of the chosen option. Over the course of a long rest, you can select a different option, provided you have the armor and armormech's implements with you.</p>

        <h4>Defensive Field</h4>

        <p>On your turn, you can use a bonus action to gain temporary hit points equal to 1d12 + your berserker level. Once you use this feature, you must finish a short or long rest before you can use it again.</p>

        <h4>Deflective Layer</h4>

        <p>Your armor class increases by 1.</p>

        <h4>Grappling Line</h4>

        <p>You can use a bonus action to launch a grappling line at one creature of your choice that you can see within 15 feet. The target must succeed on a Strength saving throw (DC = 8 + your proficiency bonus + your Strength modifier) or be pulled up to 10 feet in a straight line towards you. If it ends this movement within 5 feet of you, it takes kinetic damage from your armor spikes equal to your Strength modifier.</p>

        <h4>Integrated Sonar</h4>

        <p>You can use an action to give yourself the benefits of the <em>true sight</em> force power for 1 hour. Once you use this feature, you must finish a short or long rest before you can use it again.</p>

        <h4>Neural Interface</h4>

        <p>You are immune to all effects that would cause you to be charmed or frightened.</p>

        <h3>Spiked Retribution</h3>

        <em><strong>Armored Approach:</strong> 14th level</em><br>

        <p>When a creature within 5 feet of you hits you with a melee attack, the attacker takes kinetic damage equal to your Strength modifier, as long as you are wearing your spiked armor and you aren't incapacitated.</p>

        If you are raging, you add your rage damage bonus<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;to this damage.

