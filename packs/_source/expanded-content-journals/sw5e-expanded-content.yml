  - name: Pull Earthward
    _id: OZteYfA2koJzueLa
    text:
      content: |-
        <h4>Pull Earthward</h4>

        <p><em>2nd-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Force Propel</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 300 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>Choose one creature you can see within range. The target must succeed on a Strength saving throw or its flying speed (if any) is reduced to 0 feet for the power’s duration. An airborne creature affected by this power descends at 60 feet per round until it reaches the ground or the power ends.</p>
