  - name: Politician
    _id: PlgRcFnV9ZPyr4v1
    text:
      content: |+
        <h2>Politician</h2>

        <p></div></p>

        <p>You might just be a Junior Representative or newly elected Senator. Regardless you are now a member of the political turmoil of the Galaxy. Depending on who you befriended, your benefactors or your sponsorships. You are now placed within a position of great power that can ultimately make decisions that could alter the course of the known Galaxy. You represent not just yourself but an entire planet that revolves around the type of difficult decisions that you will make throughout your career. Others look to you to serve as the primary legislative body of the Galactic Republic. They believe your voice is responsible for creating laws, mediating disputes, making treaties, and regulating commerce. Divided into numerous committees and subcommittees, you must choose a path. Will you strive to accomplish your goals and bring peace back to the Republic or will you like many others, fall into corruption.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Intimidation, Performance, and Persuasion</li><li><strong>Languages:</strong> Two of your choice.</li><li><strong>Equipment:</strong> A set of fine clothes, a signet ring, a political manifesto you helped write, and a purse containing 250 cr.</li></ul>

        <h4>Ideology</h4>

        <p>What is the world you envision to create through policy? </p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d6</th><th>Specialization</th></tr></thead><tbody><tr><td>1</td><td>Democracy</td></tr><tr><td>2</td><td>Dictatorship</td></tr><tr><td>3</td><td>Egalitarianism</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Specialization</th></tr></thead><tbody><tr><td>4</td><td>Anarchy</td></tr><tr><td>5</td><td>Monarchy</td></tr><tr><td>6</td><td>Theocracy</td></tr></tbody></table></div>

        <h3>Feature: Political Presence</h3>

        <p>When you walk into a room, people immediately respect your opinion and listen to what you have to say. You are commonly taken for face value as a person of great standing. People will likely treat you like a noble or assume you of that lineage. You can attain audiences with nobles or officials easily, as they may often see you as one of their circle. Bureaucratic red tape holds little challenge to you because you always seem to know the right person to talk to.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Threatening</td></tr><tr><td>3</td><td>Performer</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Actor</td></tr><tr><td>7</td><td>Observant</td></tr><tr><td>8</td><td>Inspiring Leader</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Politicians are rumored to be wicked and blackhearted. Do you want to prove the rumors right or wrong?</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I am someone that needs no introduction, I am renowned in my own way.</td></tr><tr><td>2</td><td>I am the only one capable of making a better galaxy, I trust my gut instinct.</td></tr><tr><td>3</td><td>I'm going to take over the senate! The supreme chancellor is far to weak and foolish.</td></tr><tr><td>4</td><td>I will not tolerate violence. We are not savages, we are intellectuals.</td></tr><tr><td>5</td><td>I'm looking out only for myself here in this corrupt democracy.</td></tr><tr><td>6</td><td>I'm very patient and can conceal my inner discomforts easily.</td></tr><tr><td>7</td><td>I'm an aristocrat. I hold myself up to high standards of behavior and others just as much.</td></tr><tr><td>8</td><td>I am quiet and reserved. I will not take the spotlight from the real heroes.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Dictator.</strong> We must ensure that our authority extends to the farthest points of the galaxy. (Dark)</td></tr><tr><td>2</td><td><strong>Equality.</strong> We have elected officials for a reason, the system works we just have to give it time. (Lawful)</td></tr><tr><td>3</td><td><strong>Humanity.</strong> I will serve my term with purpose, I will ensure the safety and prosperity of all of our citizens. (Light)</td></tr><tr><td>4</td><td><strong>Rational Self Interest.</strong> I only need to survive this industry. (Neutral)</td></tr><tr><td>5</td><td><strong>Legacy.</strong> I'm only looking out for the needs of my home world and my species. (Any)</td></tr><tr><td>6</td><td><strong>Galactic Rule.</strong> I love democracy... I love the republic. (Chaotic)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>Children are our future. We cannot leave the galaxy like this, we cannot leave them with our mistakes.</td></tr><tr><td>2</td><td>Family, friends? Everyone is a stepping stone.</td></tr><tr><td>3</td><td>I have seen too much and have done to little, it is time for a change.</td></tr><tr><td>4</td><td>Even if I become a corrupted, I am doing it for the right reasons.</td></tr><tr><td>5</td><td>I have only ever loved two things: Money and Myself.</td></tr><tr><td>6</td><td>I had a mentor, who was more of a family to me than my actual family.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I'm a pathological liar, even I don't know the truth of my words anymore.</td></tr><tr><td>2</td><td>I'm indecisive, I need time to think this over.</td></tr><tr><td>3</td><td>My methods are unconventional despite my best intentions.</td></tr><tr><td>4</td><td>I've rigged an election before, in fact I've rigged almost all of elections.</td></tr><tr><td>5</td><td>There is no civility, only politics.</td></tr><tr><td>6</td><td>I'll help, in exchange for your vote.</td></tr></tbody></table>

