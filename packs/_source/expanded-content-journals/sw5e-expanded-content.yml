  - name: Farmer
    _id: G81fBUROlSmh1i9E
    text:
      content: |+
        <h2>Farmer</h2>

        <p>You are an experienced farmer, cultivating and harvesting nature for the provision of others. You have spent a lot of time surviving outside population centers, but know how to sell your product either directly or to merchants, legal or otherwise.  Because you deal with commodities, either as input or as produce, you know how to get things done and how to live on razor-thin margins. You have survived up to this point by working long, hard, and smart.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Animal Handling, Nature, Persuasion, and Technology</li><li><strong>Tool Proficiencies:</strong> One instrument and one type of artisan's implements or bioanalysis kit</li><li><strong>Equipment:</strong> A rough instrument you are proficient with, a set of tools (one of your choice), a sturdy knife, a set of common clothes, and a belt pouch containing 50 cr</li></ul>

        <h4>Farming Specialty</h4>

        <p>There are as many kinds of farmers as there are things to harvest. Even farmers who provide for all their own needs have deep experience in one type of farming over others. Choose your harvest, or roll on the table below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Harvest</th></tr></thead><tbody><tr><td>1</td><td>Cereal Crops</td></tr><tr><td>2</td><td>Drug Compounds</td></tr><tr><td>3</td><td>Fibrous Plants</td></tr><tr><td>4</td><td>Herbs &amp; Spices</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Harvest</th></tr></thead><tbody><tr><td>5</td><td>Insect Products</td></tr><tr><td>6</td><td>Livestock</td></tr><tr><td>7</td><td>Moisture</td></tr><tr><td>8</td><td>Vegetables</td></tr></tbody></table></div>

        <h3>Feature: Rustic Hospitality</h3>

        <p>Since you are of the common folk, you fit in among them with ease. You can find a place to hide, rest, or recuperate among other commoners, unless you have shown yourself to be a danger to them. They will shield you from the law or anyone else searching for you, though they will not risk their lives for you.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Animal Handler</td></tr><tr><td>2</td><td>Naturalist</td></tr><tr><td>3</td><td>Charmer</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Entertainer</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Specialist</td></tr><tr><td>8</td><td>Haggler</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>A farmer is one of the common people and unusually tied to their home and the land. Most farmers look on their humble origins as a virtue, not a shortcoming, and they are quick to defend their home communities and their values, even if they always longed to leave their rural lives and move to the city.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I judge people by their actions, not their words.</td></tr><tr><td>2</td><td>If someone is in trouble, I'm always ready to lend help.</td></tr><tr><td>3</td><td>When I set my mind to something, I follow through no matter what gets in my way.</td></tr><tr><td>4</td><td>I have a strong sense of fair play and always try to find the most equitable solution to arguments.</td></tr><tr><td>5</td><td>Thinking is for other people. I prefer action.</td></tr><tr><td>6</td><td>I misuse long words in an attempt to sound smarter.</td></tr><tr><td>7</td><td>I watch over my friends as if they were a litter of newborn pups.</td></tr><tr><td>8</td><td>I have a lesson for every situation, drawn from observing nature.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Respect.</strong> People deserve to be treated with dignity and respect. (Light)</td></tr><tr><td>2</td><td><strong>Honor.</strong> My word is my bond. (Lawful)</td></tr><tr><td>3</td><td><strong>Freedom.</strong> Tyrants must not be allowed to oppress the people. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I will do whatever it takes to become wealthy. (Dark)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Meddling in the affairs of others only causes trouble. (Neutral)</td></tr><tr><td>6</td><td><strong>People.</strong> I'm loyal to my friends, not to any ideals, and everyone else can take a walk for all I care. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I'm trying to pay off an old debt I owe to a generous benefactor.</td></tr><tr><td>2</td><td>I worked the land, I love the land, and I will protect the land.</td></tr><tr><td>3</td><td>A proud noble once gave me a horrible beating, and I will take my revenge on any bully I encounter.</td></tr><tr><td>4</td><td>I wish my childhood sweetheart had come with me to pursue my destiny.</td></tr><tr><td>5</td><td>My family, community, or planet is the most important thing in my life, even when they are far from me.</td></tr><tr><td>6</td><td>Someone I loved died because of a mistake I made. That will never happen again.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am too enamored of ale, wine, and other intoxicants.</td></tr><tr><td>2</td><td>I remember every insult I've received and nurse a silent resentment toward anyone who's ever wronged me.</td></tr><tr><td>3</td><td>I am slow to trust members of other species, planets, and societies.</td></tr><tr><td>4</td><td>The tyrant who rules my land will stop at nothing to see me killed.</td></tr><tr><td>5</td><td>I turn tail and run when things look bad.</td></tr><tr><td>6</td><td>I have a weakness for the vices of the city, especially gambling.</td></tr></tbody></table>

