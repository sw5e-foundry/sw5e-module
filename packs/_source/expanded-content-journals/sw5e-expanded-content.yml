  - name: Fireteam Specialist
    _id: N8q0ZnsYA8JQRaBd
    text:
      content: |-
        <h2>Fireteam Specialist</h2>

        <p></div></p>

        <p>When charging onto the frontlines of the galaxy's harshest conflicts, it pays to have people you can trust at your side. Those fighters who choose to become Fireteam Specialists command the respect and loyalty of those beside them by guiding their squad through thick and thin.</p>

        <h3>Improved Combat Superiority</h3>

        <em><strong>Fireteam Specialist:</strong> 3rd level</em><br>

        <p>Your tactical skill in combat improves, granting bonuses to your Combat Superiority.</p>

        <h4>Improved Maneuvers </h4>

        <p>You know four maneuvers of your choice, instead of two, and you earn more at higher levels, as shown in the Maneuvers Known column of the Fireteam Specialist Combat Superiority table.</p>

        <h4>Improved Superiority Dice</h4>

        <p>You have four superiority dice, instead of two, and you earn more at higher levels, as shown in the Superiority Dice column of the Fireteam Specialist Combat Superiority table.</p>

        <h3>Lead By Example</h3>

        <em><strong>Fireteam Specialist:</strong> 3rd level</em><br>

        <p>Once per turn, when an ally that can see or hear you attacks a creature that you can see, you can expend a superiority die and enhance that ally's attack, using one of the maneuvers that you know.</p>

        <h3>Rally the Troops</h3>

        <em><strong>Fireteam Specialist:</strong> 7th level</em><br>

        <p>When you use your Second Wind feature, you can choose up to three allies within 60 feet of you that can see or hear you. Each ally gains temporary hit points equal to your fighter level.</p>

        <p>You can choose an additional ally at 9th, 13th, and 17th level.</p>

        <h3>On Your Six</h3>

        <em><strong>Fireteam Specialist:</strong> 10th level</em><br>

        <p>You can use your bonus action to begin a coordinated maneuver with an ally who is within 5 feet of you. For the next minute, while you and the chosen ally are within 5 feet of each other and neither of you are wielding a shield, you each gain a bonus to AC equal to half your proficiency bonus.</p>

        <p>When the chosen ally moves on their turn, you can use your reaction to move with them. You must end this movement within 5 feet of the ally, and this movement can't exceed your speed.</p>

        <p>This effect ends early if either you or your ally are incapacitated or die. Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <div class="sw5e-book-block"><h5>Fireteam Specialist<br> Combat Superiority</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Superiority<br> Dice</th><th>Maneuvers<br> Known</th></tr></thead><tbody><tr><td>3rd</td><td>4</td><td>4</td></tr><tr><td>4th</td><td>4</td><td>4</td></tr><tr><td>5th</td><td>4</td><td>4</td></tr><tr><td>6th</td><td>4</td><td>4</td></tr><tr><td>7th</td><td>6</td><td>6</td></tr><tr><td>8th</td><td>6</td><td>6</td></tr><tr><td>9th</td><td>6</td><td>6</td></tr><tr><td>10th</td><td>6</td><td>6</td></tr><tr><td>11th</td><td>8</td><td>8</td></tr><tr><td>12th</td><td>8</td><td>8</td></tr><tr><td>13th</td><td>8</td><td>8</td></tr><tr><td>14th</td><td>8</td><td>8</td></tr><tr><td>15th</td><td>10</td><td>10</td></tr><tr><td>16th</td><td>10</td><td>10</td></tr><tr><td>17th</td><td>10</td><td>10</td></tr><tr><td>18th</td><td>10</td><td>10</td></tr><tr><td>19th</td><td>10</td><td>10</td></tr><tr><td>20th</td><td>10</td><td>10</td></tr></tbody></table></div>

        <h3>Tactical Advice</h3>

        <em><strong>Fireteam Specialist:</strong> 15th level</em><br>

        <p>Over the course of one minute, you can share knowledge with up to five allies. For the next hour, the chosen creatures gain all of your weapon and armor proficiencies, and a single use of your Indomitable feature. </p>

        <p>You can choose an additional ally at 17th level.</p>

        <p>Once you've used this feature, you can't use it again until you complete a long rest. </p>

        <h3>No Soldier Left Behind</h3>

        <em><strong>Fireteam Specialist:</strong> 18th level</em><br>

        <p>While under the effects of On Your Six, if either you or your ally are reduced to 0 hit points, you can end On Your Six to have them drop to 1 hit point instead. When you do so, the effects of On Your Six persist until the start of your next turn.</p>



