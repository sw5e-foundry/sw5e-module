  - name: Power Durations and Other Effects
    _id: T4GjdYJkzXW62zD6
    text:
      content: |-
        <h3>Power Durations and Other Effects</h3>

        <p>Certain powers, such as <em>battle precognition</em> or <em>force barrier</em>, are powers that are intended to be cast once or twice per adventuring day. Since long rests are now once per week instead of once per day, consider increasing the duration of these powers to 24 hours, or even up to three days, as you deem appropriate.</p>

