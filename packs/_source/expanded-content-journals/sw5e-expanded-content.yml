  - name: Blademaster Specialist
    _id: 5BA08kLPg6G7IGcT
    text:
      content: |+
        <h2>Blademaster Specialist</h2>

        <p>Those fighters who choose to become Blademaster Specialists hone their focus to a blade's edge, becoming so in tune with their arsenal that it becomes both their weapon and their armor.</p>

        <h3>Unarmored Defense</h3>

        <em><strong>Blademaster Specialist:</strong> 3rd level</em><br>

        <p>While you are wearing no armor and not wielding a shield, your AC equals 10 + your Dexterity modifier + your Strength modifier.</p>

        <h3>Adaptive Fighting</h3>

        <em><strong>Blademaster Specialist:</strong> 3rd level</em><br>

        <p>You've learned to make adaptations to your fighting style on the fly. You have three such effects: Change Up, Draw, and Stow. When you use your Adaptive Fighting, you choose which effect to create.</p>

        <p>You can use this features a number of times equal to your Strength or Dexterity modifier (your choice, a minimum of once). You regain all expended uses when you complete a short or long rest.</p>

        <h4>Change Up</h4>

        <p>You can use your object interaction and expend a use of your Adaptive Fighting to change the Fighting Style option granted to you by your fighter class feature.</p>

        <h4>Draw</h4>

        <p>When you use your object interaction to draw one or more weapons, you can expend a use of your Adaptive Fighting (no action required) to increase your critical hit range by 1 with the weapon(s) until the start of your next turn.</p>

        <h4>Stow</h4>

        <p>When you use your object interaction to stow a weapon, you can expend a use of your Adaptive Fighting (no action required) to take the Disengage action.</p>



        <h3>Dervish</h3>

        <em><strong>Blademaster Specialist:</strong> 7th level</em><br>

        <p>When you score a critical hit with a melee weapon attack, you regain an expended use of your Adaptive Fighting.</p>

        <h3>Resilient Fighting</h3>

        <em><strong>Blademaster Specialist:</strong> 10th level</em><br>

        <p>When you expend a use of your Adaptive Fighting, you gain resistance to energy and kinetic damage dealt by weapons until the start of your next turn.</p>

        <h3>Adrenaline Rush</h3>

        <em><strong>Blademaster Specialist:</strong> 15th level</em><br>

        <p>When you use your Action Surge feature, you can take an extra bonus action on top of the additional action.</p>

        <h3>Bladestorm</h3>

        <em><strong>Blademaster Specialist:</strong> 18th level</em><br>

        <p>You can use your action to make a single melee weapon attack against each creature within your reach. Make a separate attack roll against each target. The first attack gains a +1 bonus to its attack roll, and each attack after the first gains an additional +1 bonus to its attack roll, cumulatively, to a maximum bonus of +6. If you are wielding two light- or vibro-weapons, or a weapon with the double property, you also add this bonus to your damage rolls, and you can use your bonus action to engage in Double- or Two-Weapon Fighting.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <img src='https://www.gmbinder.com/images/vLDR8kY.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:680px' />

