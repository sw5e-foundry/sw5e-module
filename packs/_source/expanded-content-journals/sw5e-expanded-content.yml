  - name: Effects
    _id: B90XgGrL2cJrqO86
    text:
      content: |-
        <h3>Effects</h3>

        <p>When you hit with a called shot, you can choose to deal normal weapon damage and then roll a d100 to determine the effect of the shot randomly using the Called Shot Effects table below. Alternatively, you can choose to roll your damage dice twice and take the lesser total. If you do so, you can choose the effect you want to cause on the Called Shot Effects table below, instead of determining it randomly.</p>

        <h5>Called Shot Effects</h5>

        <table class="sw5e-book-table"><thead><tr><th>d100</th><th>Effect</th></tr></thead><tbody><tr><td>01-<br>45</td><td><strong><em>Leg Shot.</em></strong> The creature gains 1 slowed level until the end of its next turn.</td></tr><tr><td>46-<br>90</td><td><strong><em>Arm Shot.</em></strong> The creature can not use an arm until the end of its next turn. If the creature has multiple arms, determine which arm is affected randomly.</td></tr><tr><td>91-<br>95</td><td><strong><em>Scatter Shot.</em></strong> If the creature attempts to cast a power before the end of its next turn, it must first make a concentration check (DC = 10 + the power's level). On a failure, any resources are spent and the power immediately fails.</td></tr><tr><td>96-<br>100</td><td><strong><em>Head Shot.</em></strong> The creature is blinded until the start of its next turn.</td></tr></tbody></table>

