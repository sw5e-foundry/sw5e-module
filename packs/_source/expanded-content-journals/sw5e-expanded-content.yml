  - name: Industrial Approach
    _id: YNqe3NhgHHw1pcrq
    text:
      content: |+
        <h2>Industrial Approach</h2>

        <p>While some berserkers are content to surrender to their rage, others prefer a more tactful approach. Berserkers of the Industrial Approach augment their rage with the versatility of technology, adding elemental explosions to their already fearsome arsenal.</p>



        <h3>Techcasting</h3>

        <em><strong>Industrial Approach:</strong> 3rd level</em><br>

        <p>You have derived powers from schematics with the aid of your wristpad. See chapter 10 for the general rules of techcasting and chapter 12 for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>You learn 3 tech powers of your choice, and you learn more at higher levels, as shown in the Tech Powers Known column of the Industrial Approach Techcasting table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Tech Points</h4>

        <p>You have a number of tech points equal to half of your berserker level, as shown in the Tech Points column of the Industrial Approach Techcasting table, + your Intelligence modifier. You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Max Power Level</h4>

        Many tech powers can be overcharged, consuming more tech points to create a greater effect. You can overcharge these powers to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Industrial Approach Techcasting<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;table.

        &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;You may only cast tech powers at<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;4th-level once. You regain the<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;ability to do so after a long rest.

        <h4>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;Techcasting Ability</h4>

        <p>Intelligence is your techcasting ability for your tech powers. You use your Intelligence whenever a power refers to your techcasting ability. Additionally, you use your Intelligence modifier when setting the saving throw DC for a tech power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + your proficiency bonus + <br>your Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = your proficiency bonus + <br>your Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>You use a wristpad (found in chapter 5 of the Player's Handbook) as a tech focus for your tech powers.</p>

        <h3>Industrious Tech</h3>

        <em><strong>Industrial Approach:</strong> 3rd level</em><br>

        <p>You can cast tech powers while raging as long as the power's casting time is no more than 1 action and the power does not require concentration. While raging, you add your rage damage to damage rolls from tech powers you cast that require a tech attack or saving throw. If a tech power damages more than one target, you may only apply your rage damage to one of them. </p>

        <p>Casting tech powers during rage counts as attacking for the purposes of maintaining rage, and you can use your Reckless Attack feature to gain advantage when casting a tech power that requires a tech attack.</p>



        <img src='https://www.gmbinder.com/images/ilyi6Mj.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:1040px' />

        <h3>Explosive Resilience</h3>

        <em><strong>Industrial Approach:</strong> 6th level</em><br>

        <p>Once per round, when you deal damage that includes your rage damage, you can cause a localized explosion around the recipient of that damage. Each creature within 5 feet of the damaged creature other than you takes acid, cold, fire, ion, or lightning damage (your choice) equal to your rage damage bonus, and you gain resistance to the chosen damage type until the end of your next turn.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the berserker table. You regain all expended uses when you complete a short or long rest.</p>

        <h3>Painkiller</h3>

        <em><strong>Industrial Approach:</strong> 10th level</em><br>

        <p>Whenever you cast a tech power of 1st-level or higher, or deal damage using your Explosive Resilience feature, you can cause a friendly creature you can see within 30 feet to gain temporary hit points equal to half your berserker level + your Intelligence modifier. Additionally, while they have these temporary hit points, they have advantage on saving throws against effects that would cause them to be frightened.</p>

        <h3>Final Countdown</h3>

        <em><strong>Industrial Approach:</strong> 14th level</em><br>

        <p>When you are reduced to 0 hit points but not killed outright, and you have at least one tech point remaining, you can expend all your remaining tech points and instead to drop to one hit point (no action required). If you do so, each creature within 30 feet of you must make a Dexterity saving throw against your tech save DC. On a failed save, they take 1d12 acid, cold, fire, ion, or lightning damage (your choice) damage for each tech point spent in this way, or half as much on a successful one.</p>

        <div class="sw5e-book-block"><h5>Industrial Approach Techcasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Tech Powers<br> Known</th><th>Tech<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>3</td><td>2</td><td>1st</td></tr><tr><td>4th</td><td>4</td><td>2</td><td>1st</td></tr><tr><td>5th</td><td>5</td><td>3</td><td>1st</td></tr><tr><td>6th</td><td>6</td><td>3</td><td>1st</td></tr><tr><td>7th</td><td>7</td><td>4</td><td>2nd</td></tr><tr><td>8th</td><td>8</td><td>4</td><td>2nd</td></tr><tr><td>9th</td><td>9</td><td>5</td><td>2nd</td></tr><tr><td>10th</td><td>10</td><td>5</td><td>2nd</td></tr><tr><td>11th</td><td>11</td><td>6</td><td>2nd</td></tr><tr><td>12th</td><td>12</td><td>6</td><td>2nd</td></tr><tr><td>13th</td><td>13</td><td>7</td><td>3rd</td></tr><tr><td>14th</td><td>14</td><td>7</td><td>3rd</td></tr><tr><td>15th</td><td>15</td><td>8</td><td>3rd</td></tr><tr><td>16th</td><td>16</td><td>8</td><td>3rd</td></tr><tr><td>17th</td><td>17</td><td>9</td><td>4th</td></tr><tr><td>18th</td><td>18</td><td>9</td><td>4th</td></tr><tr><td>19th</td><td>19</td><td>10</td><td>4th</td></tr><tr><td>20th</td><td>20</td><td>10</td><td>4th</td></tr></tbody></table></div>

        <img src='https://www.gmbinder.com/images/nOm7Msc.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:1200px' />

