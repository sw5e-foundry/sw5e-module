  - name: Dug
    _id: K4BL8QCtGAkom6KL
    text:
      content: |-
        <h2>Dug</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown, purple, gray, or red</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Arms used as legs and legs used as arms</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>3'2"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>50 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Malastare</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Dug</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Dugs are slender, powerfully built beings with a somewhat humanoid build and a unique method of walking that hailed from the high gravity world Malastare. Their primary means of locomotion is their strong arms, and their lower limbs and feet were used for grappling and other fine motor manipulation. They hardly ever walk on their lower limbs. Although most Dugs may walk on all four limbs, others like to use their strong arms as legs and their feet as hands like they would normally do.</p>

        <h3>Society and Culture</h3>

        <p>Due to their oppression under their Gran rulers who colonized Malastare, many Dugs often feel the need to throw around their strength in bids to establish dominance. As a result, they are known for their ill-tempered demeanor, and many are bullying thugs.</p>

        <p>On their homeworld of Malastare, the vast majority of Dugs are little more than laborers toiling for the enrichment of the Gran. With the species excluded from much of the power and money on Malastare, many Dugs turn to swoop racing or bounty hunting as their only means to achieve fame and fortune. In all other areas, the Dugs are exploited.</p>

        <h3>Names</h3>

        <p>Dug names are often 3 syllables long, mostly through big sounds rather than harsh tones. There are harsher tones in their names as well though, often in the forms of x's and k's. Female Dugs have softer names, but no one would call them beautiful. Surnames are usually passed down through family or clan.</p>

        <p><strong>Male Names.</strong> Bawugri, Gadwouhx, Rorgukwa, </p>

        <p><strong>Female Names.</strong> Bosix, Grugne, Jiwous, Pragiba, </p>

        <p><strong>Surnames.</strong> Brundaare, Gninsaidi, Kedwir, Randaine</p>



        <h3>Dug Traits</h3>

        <p>As a dug, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Dugs reach adulthood in their early teens and live an average of 75 years. Their violent nature often leads to violent ends.</p>

        <p><strong><em>Alignment.</em></strong> Dugs' angry nature causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Dugs typically stand between 3 and 4 feet tall. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Courageous.</em></strong> You have advantage on saving throws against being frightened.</p>

        <p><strong><em>Fisticuffs.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Fury of the Small.</em></strong> When you damage a creature with an attack or a power and the creature's size is larger than yours, you can cause the attack or power to deal extra damage to the creature. The extra damage equals your level. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Menacing.</em></strong> You have proficiency in the Intimidation skill.</p>

        <p><strong><em>Strong and Small.</em></strong> You have a climbing speed of 25 feet.</p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Dug.</p>

        <img src='https://www.gmbinder.com/images/EC4z4yc.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:205px;mix-blend-mode:darken' />



