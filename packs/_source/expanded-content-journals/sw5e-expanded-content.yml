  - name: Nikto
    _id: 7y6n6Yu2GHeZVqMn
    text:
      content: |-
        <h2>Nikto</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Varies by subspecies</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Leathery skin, subspecies</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>90 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Kintan</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Nikto, Huttese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Nikto are reptilian humanoids that are noted for their leathery skin. They hold a limited range of facial expressions because they lack the necessary anatomical infrastructure. Their eyes are covered by a protective membrane, being a thin transparent pellicle that protects their eyes underwater and during windstorms. As a result, they are noted for their "staring" eyes and a seemingly blank expression which leads to many underestimating nikto intelligence.</p>

        <h3>Society and Culture</h3>

        <p>Although lacking in personal charisma, nikto posses a single-minded tenacity that makes them excellent followers. Their lives made nikto cunning combatants. Most nikto are content with a life of servitude as in their eyes a life in slavery was preferable to the hardship and toil on their homeworld. Not all nikto work for the hutts though most free members of their kind were formerly enslaved. Whilst nikto are known to escape from their master, most tend to fall into service of another hutt who "inherited" them according to custom should their previous employer die. However, some escaped nikto did instead use some opportunities to genuinely become free beings. Any such emancipated nikto have to be constantly on guard as they risked capture by hutt-employed slavers who return their prey to their "rightful owners". In addition, they lacked charisma and preferred to follow orders instead of giving them. As a result, the Nikto were most identified with their Hutt masters.</p>

        <h3>Names</h3>

        <p>Nikto names are very complex, hard to pronounce, and harsh sounding. Name length also differs a lot, longer names having apostrophes or dashes. Their names are unisex, with surnames being familiar and optional. </p>

        <p><strong>First Names.</strong> Jydabaum, N'rok'ratu, Sussa, Vydgish</p>

        <p><strong>Surnames.</strong> Gozorc, Irtitt, Qegmarg, Umpluurg</p>



        <h3>Nikto Traits</h3>

        <p>As a nikto, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and one other ability score of your choice increases by 1.</p>

        <p><strong><em>Age.</em></strong> Nikto reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Nikto's self-sufficient and clever nature causes them to tend toward balanced alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Nikto typically stand 5 to 6 feet tall and generally weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier.</p>

        <p><strong><em>Protective Membrane.</em></strong> You have advantage on saving throws against being blinded.</p>

        <p><strong><em>Radiation Resistant.</em></strong> The dying star nearby their homeworld makes nikto naturally used to radiation. You have resistance to necrotic damage.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Nikto, and Huttese. Nikto is spoken with sharp syllables with a deep and rumbling cadence.</p>

        <p><strong><em>Adaptation.</em></strong> The frequent radiation bursts from the nearby dying star caused the nikto to mutate and adapt into different subspecies over time, specialized for different environments. Choose one of the following adaptations:</p>

        <hr>

        <ul><li><strong>Esral'sa'Nikto (Mountain)</strong><br> <strong><em>Acute Hearing.</em></strong> Whenever you make a Wisdom (Perception) check related to hearing, you are considered to have expertise in the Perception skill.<br> <strong><em>Cold Adaptation.</em></strong> You have advantage on Constitution saving throws made to avoid exhaustion due to extreme cold.</li><li><strong>Gluss'sa'Nikto (Pale)</strong><br> <strong><em>Hold Breath.</em></strong> You can hold your breath for up to 15 minutes at a time.<br> <strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</li><li><strong>Kadas'sa'Nikto (Green)</strong><br> <strong><em>Claws.</em></strong> Your claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.<br> <strong><em>Forest Dweller.</em></strong> You don't treat forest terrain as difficult terrain.<br> <strong><em>Treeclimber.</em></strong> You have a climbing speed of 30 feet.</li><li><strong>Kajain'sa'Nikto (Red)</strong><br> <strong><em>Heat Adaptation.</em></strong> You have advantage on Constitution saving throws made to avoid exhaustion due to extreme heat.<br> <strong><em>Survivor.</em></strong> You have proficiency in the Survival skill.</li><li><strong>M'shento'su'Nikto (Southern)</strong><br> <strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</li></ul>

        <img src='https://www.gmbinder.com/images/aHB5qPb.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:158px' />



