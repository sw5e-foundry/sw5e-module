  - name: Esh-Kha
    _id: 5fdUIQfEy2eM4GkQ
    text:
      content: |-
        <h2>Esh-Kha</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Gray or tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Gray</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Horizontal head protrusions</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'4"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>145 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Unknown, Belsavis (adopted)</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Kharan</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Esh-kha are a gray-skinned humanoid species with equine features, including muzzles and digitigrade legs. They also have small black eyes. </p>

        <h3>Society and Culture</h3>

        <p>In terms of society, their race's culture resembles that of a hive society though each individual retain their own thoughts and aspirations yet all being bred for a specific role that they were eager to fulfill. A caste system is present amongst the esh-kha which included Force-sensitive simple minded savants, more numerous skilled determined warriors that watched over them and finally the patriarchs that acted as leaders who provided their wisdom as well as decisions to their entire people. Esh-kha appear to outsiders as a savage violent species that care only for the destruction of all other races. This hatred for other sentient species is believed to had stemmed from their tightly-knit hive-like society. It is suspected that the esh-kha are simply unable to tolerate or even adapt to the existence of thinking of outsiders who only suffered their wrath. Their race only turns violent against one another in the most extreme of circumstances.</p>

        <h3>Names</h3>

        <p>Whilst their kind are individuals, esh-kha are not named at birth but instead earn their names through their actions. An esh-kha that displayed great skill in battle could be called "Swift Blade", or maybe "Deadly Cutter" or some other such name. It is believed that this partly explained an esh-kha's zeal in battle with young warriors seeking not only victory but an opportunity to lay claim to a name and forge their own identity. Esh-kha do not use surnames, as they believe they are one family.</p>

        <p><strong>Names.</strong> Bleeding Yell, Dormant Heart, Blue Survivor, Ancient Cull, Sharp Grip, Running Sun, Flame Walker</p>



        <h3>Esh-kha Traits</h3>

        <p>As an esh-kha, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength or Wisdom score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Esh-kha reach adulthood in their early teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> The esh-kha's stubborn and racially-centric mindsets cause them to tend toward lawful balanced, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Esh-kha typically stand 6 to 6 and a half feet tall and generally weigh about 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray. </p>

        <p><strong><em>Force-Sensitive.</em></strong> You know your choice of the <em>turbulence</em>, <em>force disarm</em>, or <em>slow</em> at-will force powers. Your forcecasting ability is Wisdom or Charisma (depending on power alignment). </p>

        <p><strong><em>Inquisitive.</em></strong> You have proficiency in the Investigation skill. </p>

        <p><strong><em>Savage Attacks.</em></strong> When you score a critical hit with a melee weapon attack, you can roll one of the weapon's damage dice one additional time and add it to the extra damage of the critical hit.</p>

        <p><strong><em>Skill Versatility.</em></strong> You gain proficiency in one skill of your choice.</p>

        <p><strong><em>Weapon Training.</em></strong> You have proficiency in two vibroweapons or blasters of your choice.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kharan. Kharan contains many metaphorical expressions when translated to Galactic Basic. The language has many comparisons to music and singing, such as a galactic government being compared to a chorus. </p>

        <img src='https://www.gmbinder.com/images/jeAlzJN.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:207px' />



