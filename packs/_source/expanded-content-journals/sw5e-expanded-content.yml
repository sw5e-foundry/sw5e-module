  - name: Corruption
    _id: 9IO78ZQvy2C0WTya
    text:
      content: |-
        <h3>Corruption</h3>

        <p>Your destiny is to corrupt an individual, organization, or location. You may seek to turn a person to the dark side or indoctrinate a group of people in the ways of evil. Your destiny may also be to become corrupted yourself, either by another character, an organisation, or a series of life-changing events that unfold over time. The corruption should be a long-term goal requiring a great deal of time and effort.</p>

        <p>Examples of this destiny include the Emperor's corruption of Anakin Skywalker, a dark force-wielder transforming a Jedi shrine into a temple of evil, or an Imperial officer convincing an Alliance cell to betray the Rebellion.</p>

        <p>Additionally, a character's destiny may be to allow themselves to be corrupted by the dark side; their fall into darkness becomes the path to achieving this destiny.</p>

        <h4>Destiny Fulfilled</h4>

        <p>Increase two ability scores of your choice by 1 each. In addition, if you are using the variant Dark Side Corruption rules, consult the Dark Side Corruption table.</p>
