  - name: Weapon Combination
    _id: 6cABIAoaeRdYdILU
    text:
      content: |-
        <h3>Weapon Combination</h3>

        <p>Combining weapons requires three key components: the two weapons you want to combine, and the appropriate tools. Two weapons can only be combined by someone proficient with appropriate tools, as shown in the Item Specific Tools table in Wretched Hives.</p>

        <h4>Valid Targets</h4>

        <p>Only unenhanced weapons of the same type can be combined, and you can't combine weapons that already have multiple modes, such as the IWS or bo-rifle. For instance, a lightweapon can only be combined with another lightweapon, while a vibroweapon can only be combined with another vibroweapon.</p>

        <h4>Combining Weapons</h4>

        <p>You can only combine a number of weapons up to your proficiency bonus. Combining weapons takes one hour and requires an ability check with the appropriate tools, as shown in the Item Specific Tools table in Wretched Hives. The DC for the check is determined by the number of weapons being combined, as shown below in the Combination/Separation DC by Weapons table.</p>

        <h5>Combination/Separation DC by Weapons</h5>

        <table class="sw5e-book-table"><thead><tr><th>Weapons</th><th>Combination/Separation DC</th></tr></thead><tbody><tr><td>2</td><td>10</td></tr><tr><td>3</td><td>15</td></tr><tr><td>4</td><td>20</td></tr><tr><td>5</td><td>25</td></tr><tr><td>6</td><td>30</td></tr></tbody></table>

        <p>On a success, the weapons are correctly combined. On a failure, the weapons are not combined, and you must wait 24 hours before you can try again.</p>

        <h4>Separating Weapons</h4>

        <p>Separating weapons requires an ability check with the appropriate tool, as shown in the Item Specific Tools table. The DC for the check is determined by the total number of combined weapons before separating, as shown above in the Combination/Separation DC by Weapons table.</p>

        <p>On a success, the weapons are correctly separated. On a failure, the weapons are not separated, you must wait 24 hours before you can try again, and you must roll a d20. If you roll a 1 on the d20, one currently combined weapon is destroyed. The GM should determine which weapon is destroyed randomly.</p>
