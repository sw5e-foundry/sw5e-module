  - name: Theelin
    _id: NzEsu4yCJ0NPKKdU
    text:
      content: |-
        <h2>Theelin</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Variable</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Variable</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Variable</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Small horns, pale skin, colorful hair</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>95 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Unknown</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Galactic Basic</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The original appearance of the theelin is officially uncertain, as almost all known "theelin" are not full-blooded specimens, but hybrids. It is possible that some aspects of these individuals' appearances are not from their theelin genes, but from other near-human ancestors. Most, however, have vividly colored hair and pale skin, often mottled with colorful spots. Unfortunately, a series of mutations arose among later generations of theelin. These mutations have led to genetic incompatibilities within their species, making it impossible to produce offspring. Even attempts to continue their species by cross-breeding with other near-humans could not stop the theelin slide towards extinction, due to the high infant mortality rates such couplings suffer from. Theelin began inevitably dwindling in number�only a few million theelin and part-theelin remain by the time the Republic fell, and pure theelin are presumed extinct by the fall of the Empire. Some of their greatest works are produced in these years, however, as an epitaph for a dying people. </p>

        <h3>Society and Culture</h3>

        <p>Theelin performers and artists created many of the galaxy's greatest works of art. The Theelin Divas, an all-female religious order, are recognized by many scholars of music as the greatest singers in the galaxy. Because of the rarity of the theelin, many female theelin and part-theelin are named "Diva" at birth, in hopes that they will develop the musical talent necessary to continue the traditions of the Diva order.</p>

        <h3>Names</h3>

        <p>Theelin use names similar to those in their community, typically human-similar names with exotic tinges.</p>

        <p><strong>Male Names.</strong> Dhess, Gooti, J�nsone, Qylett</p>

        <p><strong>Female Names.</strong> F�niss, Diva, Prystill, Saqua</p>

        <p><strong>Surnames.</strong> Joolie, Masozi, Oasay, Rellik</p>



        <h3>Theelin Traits</h3>

        <p>As a theelin, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and two other ability scores of your choice increase by 1.</p>

        <p><strong><em>Age.</em></strong> Theelin reach adulthood in their late teens and live for about 70 years.</p>

        <p><strong><em>Alignment.</em></strong> Theelin's good-nature and positivity despite the dour state of their species causes them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Theelin typically stand 5 to 6 feet tall and generally weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Expressive.</em></strong> You have proficiency in your choice of artist's implements, disguise kits, synthweaver's implements, or one musical instrument of your choice.</p>

        <p><strong><em>Performer.</em></strong> You have proficiency in the Performance skill.</p>

        <p><strong><em>Skill Versatility.</em></strong> You gain proficiency in one skill of your choice.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and one extra language of your choice.</p>

        <p><strong><em>Mutation.</em></strong> Theelin gain unique mutations, a result of cross-breeding with other humanoids. Choose one of the following mutations.</p>

        <hr>

        <ul><li><strong>Balanced Hooves.</strong> You have advantage on ability checks and saving throws against being knocked prone.</li><li><strong>Darkvision.</strong>  You can see in dim light within 30 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</li><li><strong>Enhanced Senses.</strong> Choose one from hearing, sight, or smell. Whenever you make a Wisdom (Perception) check related to the chosen sense, you are considered to have expertise in the Perception skill.</li><li><strong>Heightened Reflexes.</strong> Whenever you make a Dexterity ability check, attack roll, or saving throw, you can choose to add 1d4 to the result. You can choose to do this after the check is rolled, but before the DM determines if you�ve passed or failed the check. You cannot do so again until you complete a short or long rest.</li><li><strong>Unarmed Combatant.</strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</li></ul>

        <img src='https://www.gmbinder.com/images/3W9n7t9.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:132px' />



