  - name: Killik
    _id: 36Q0IdGdvpXCeWow
    text:
      content: |-
        <h2>Killik</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown, chestnut, green, red, scarlet, or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or orange</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Chitinous armor, mandibles projected<br> from face, four arms ending in long<br> three toed claws protrude from their<br> torsos</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'9"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>110 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Alderaan</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Killik</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Killiks possess a strong chitinous exoskeleton that is glossy and greenish with their carcasses capable of surviving thousands of years of erosion as seen by the colonists of Alderaan. The exoskeleton also contains a number of spiracles which served as their way of breathing. Typically, these Human-sized hive creatures have four arms with each ending in a powerful three-fingered claw. They stand on two stout legs that are capable of leaping great distances. Killiks can communicate with other Killiks through use of pheromones.</p>

        <h3>Society and Culture</h3>

        <p>The Killiks have a communal society, with each and every Killik being in mental contact with another. Due to their hive mind, every Killik nest is virtually one individual. Killiks are also peaceful in nature. Their telepathic connection is capable of extending to other species which includes non-insectoids. A willing creature can submit to this telepathy to become a Joiner. They effectively become another vessel of the hive mind.</p>

        <p>Killiks lose connection to their hive mind at great distances. Those who voluntarily leave the hive mind are referred to as Leavers. It is rare that they are allowed to rejoin their hive without reason.</p>

        <h3>Names</h3>

        <p>Killiks are a hive-mind insectoid that typically don't use names. On the offchance they do, it's usually an incomprehensible series of clicking noises. They are receptive to nicknames given by others.</p>



        <h3>Killik Traits</h3>

        <p>As a Killik, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Killiks reach adulthood in their 40s and live an average of 200 years.</p>

        <p><strong><em>Alignment.</em></strong> Killiks' willingness to brainwash or kill their enemies cause them to tend towards the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Killiks stand between 5 and 6 feet tall and weigh about 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Four-Armed.</em></strong> Killiks have four arms which they can use independently of one another. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required).</p>

        <p><strong><em>Hardened Carapace.</em></strong> While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Telepathy.</em></strong> You can communicate telepathically with creatures within 30 feet of you. You must share a language with the target in order to communicate in this way.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Killik. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it.</p>

        <img src='https://www.gmbinder.com/images/ch35N8N.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:330px' />



