  - name: (Un)Retired Adventurer
    _id: IdWGBBFRLjytRB0H
    text:
      content: |+
        <h2>(Un)Retired Adventurer</h2>

        <p>"I'm getting too old for this stuff."</p>

        <p>You spent your life as an adventurer, learning the use of many skills and basic survival techniques, including how to stay alive in a hostile area. You might have been part of a famous adventuring party or a less renowned one.</p>

        <p>When you choose this background, work with your GM to determine the details of your previous adventuring party, and what kind of experiences you had in your adventuring career. How famous was your previous adventuring party and how well known are you? What did you learn? What was your group's specialty?</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Insight, Lore, and Survival</li><li><strong>Tool Proficiencies</strong>: One type of artisan's implements</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A grappling hook, one tool with which you are proficient, a memento of an unsuccessful expedition (map to a never found treasure, lock of hair from a fallen companion, or another trinket),  and a pouch containing your last 50 cr</li></ul>

        <h3>Feature: Bridges Not Yet Burned</h3>

        <p>Throughout your adventures you have established a multitude of contacts from all walks of life, but the intervening years have seen those relationships strained. You may use any feature of any other background, but once a particular feature is used, that feature can't be used again until one year has passed.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Athlete</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>The trials and triumphs of retired adventurers have left an impact, shaping their ideals, creating strong bonds, and often leaving them scarred and vulnerable to fear, shame, and hatred.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I'm always polite and respectful.</td></tr><tr><td>2</td><td>I'm haunted by memories of war. I can't get the images of violence out of my mind.</td></tr><tr><td>3</td><td>I've lost too many friends, and I'm slow to make new ones.</td></tr><tr><td>4</td><td>I'm full of inspiring and cautionary tales from my adventuring experience relevant to almost every combat situation.</td></tr><tr><td>5</td><td>I can stare down a rancor without flinching.</td></tr><tr><td>6</td><td>I enjoy being strong and like breaking things.</td></tr><tr><td>7</td><td>I have a crude sense of humor.</td></tr><tr><td>8</td><td>I face problems head-on. A simple, direct solution is the best path to success.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Greater Good.</strong> Our lot is to lay down our lives in defense of others. (Light)</td></tr><tr><td>2</td><td><strong>Responsibility.</strong> I do what I must and obey just authority. (Lawful)</td></tr><tr><td>3</td><td><strong>Independence.</strong> When people follow orders blindly, they embrace a kind of tyranny. (Chaotic)</td></tr><tr><td>4</td><td><strong>Might.</strong> In life as in war, the stronger force wins. (Dark)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Ideals aren't worth killing over or going to war for. (Neutral)</td></tr><tr><td>6</td><td><strong>Nation.</strong> My city, nation, or people are all that matter. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I would still lay down my life for the people I adventured with.</td></tr><tr><td>2</td><td>Someone saved my life when they could have left me. To this day, I will never leave a friend behind.</td></tr><tr><td>3</td><td>My honor is my life.</td></tr><tr><td>4</td><td>I'll never forget the crushing defeat my party suffered or the enemies who dealt it.</td></tr><tr><td>5</td><td>Those who fight beside me are those worth dying for.</td></tr><tr><td>6</td><td>I fight for those who cannot fight for themselves.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>The monstrous enemy we faced in battle still leaves me quivering with fear.</td></tr><tr><td>2</td><td>I have little respect for anyone who is not a proven adventurer.</td></tr><tr><td>3</td><td>I made a terrible mistake in battle cost many lives� and I would do anything to keep that mistake secret.</td></tr><tr><td>4</td><td>My hatred of my enemies is blind and unreasoning.</td></tr><tr><td>5</td><td>I obey the law, even if the law causes misery.</td></tr><tr><td>6</td><td>I'd rather eat my armor than admit when I'm wrong.</td></tr></tbody></table>

