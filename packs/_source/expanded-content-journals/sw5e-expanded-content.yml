  - name: Bond Features
    _id: N1ec0LAq1FIct7t8
    text:
      content: |-
        <h3>Bond Features</h3>

        <p>At each tier, bond-mates unlock a certain feature. In order to benefit from these features, bond-mates must be within 10 feet of eachother. This distance changes as their bond strengthens, as shown above in the Bond Distance and DC by Tier table.</p>

        <p>For instance, at 1st tier, the bond-mates must be within 10 feet of each other to benefit from their bond's features. At 2nd tier, however, they must only be within 30 feet of each other.</p>

        <h4>1st Tier</h4>

        <p>Both bond-mates always know precisely where their bond-mate is in relation to them, regardless of whether or not they can see or hear them.</p>

        <h4>2nd Tier</h4>

        <p>Both bond-mates can speak with each other as if they were standing within 5 feet, provided they share a language. At 6th tier, this communication becomes telepathic.</p>

        <h4>3rd Tier </h4>

        Both bond-mates are constantly under the effects of the <em>sense emotions</em> force power, but they are only able<br> &emsp;to read each other's emotions. This does not require<br> &emsp;&emsp;&nbsp;concentration for either bond-mate, and this<br> &emsp;&nbsp;&emsp;&nbsp;&emsp;&nbsp;feature can not be interrupted while both<br> &emsp;&nbsp;&emsp;&nbsp;&emsp;&nbsp;&emsp;&nbsp;bond-mates are conscious.

        <img src='https://www.gmbinder.com/images/29gfREL.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:900px' />



        <h4>4th Tier</h4>

        <p>As an action on each of their turns, bond-mates can pass items to each other. When a bond-mate uses their action in such a way, the other bond-mate must use their reaction to take the item.</p>

        <h4>5th Tier</h4>

        <p>Whenever a bond-mate makes an ability check or attack roll with advantage due to the other bond-mate taking the Help action, they can reroll one of the dice once.</p>

        <h4>6th Tier</h4>

        <p>When a bond-mate casts a force power, they can cast it as if they are standing within 5 feet of their bond-mate. If the power requires a target, and that target is not their bond-mate, they must be aware of the target's presence and location in order to target them with this power.</p>

        <h4>7th Tier</h4>

        <p>When a bond-mate casts a power of 1st-level or higher that targets only themself, they can also target their bond-mate. </p>

        <h4>8th Tier</h4>

        <p>Whenever a bond-mate is reduced to 0 hit points, but not killed outright, the other bond-mate can use their reaction to cause them to drop to 1 hit point instead. </p>

        <p>Once this feature has been used, neither bond-mate can use it again until they both complete a long rest.</p>

        <h4>9th Tier</h4>

        On their turn, one bond-mate can use their<br> action to give their bond-mate an additional<br> turn. If they do so, the targeted bond-mate<br> immediately takes an additional turn after<br> the current bond-mate's turn. 

        Once this feature has been used,<br> neither bond-mate can use it again<br> until they both complete a long<br> rest.

        <h4>10th Tier</h4>

        <p>Whenever a bond-mate takes damage, the other bond-mate can use their reaction to grant them resistance to the damage. If they do so, both bond-mates take the same amount of damage. Alternatively, when a bond-mate has hit points restored, they can use their reaction to halve the amount of hit points. If they do so, the other bond-mate regains the same number of hit points. These features can be used a number of times equal to the bond-mate's combined Wisdom or Charisma modifiers (their choice, a minimum of once). All expended uses are regained when both bond-mates complete a long rest.</p>
