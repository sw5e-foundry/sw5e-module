  - name: Explorer Pursuit
    _id: A29ge2ubcXAUvkyA
    text:
      content: |+
        <h2>Explorer Pursuit</h2>

        <p></div></p>

        <p>The explorer strives to navigate past the known to discover new planets, forgotten ruins, or forbidden locations. Those scholars who choose the Explorer Pursuit spend their time studying maps, landmarks, architecture blue prints, or even history books, using them to effectively lead the way for their companions.</p>

        <h3>Focused Navigator</h3>

        <em><strong>Explorer Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency in two of the Perception, Piloting, Survival, and Acrobatics skills. Additionally, you can't have disadvantage on checks you make with them.</p>

        <h3>Surveyed Area</h3>

        <em><strong>Explorer Pursuit:</strong> 3rd level</em><br>

        <p>You can now use your Critical Analysis feature on a 15-foot cube area within 60 feet of you that you can see. You can treat any creatures inside this cube as if they are the target of your Critical Analysis feature, and when a creature ends your Critical Analysis feature on themself, it does not end this effect for other creatures in your Surveyed Area. </p>

        <h3>Field Advantage</h3>

        <em><strong>Explorer Pursuit:</strong> 6th level</em><br>

        <p>You learn to quickly convey spatial information in the midst of combat about the area you analyzed, giving them an edge at maneuvering in the area. While moving through your Surveyed Area, you and friendly creatures of your choice ignore unenhanced difficult terrain, and opportunity attacks against them are made with disadvantage.</p>

        <h3>Unstoppable Adventurer</h3>

        <em><strong>Explorer Pursuit:</strong> 9th level</em><br>

        <p>You learn to swim and scale vertical surfaces with ease. You gain swimming and climbing speed equal to your walking speed.</p>

        <p>Additionally, your Sage Advice feature can be used to give friendly creatures knowledge on how to swim or climb, provided you have a swimming or climbing speed. Chosen creatures have a swimming speed or climbing speed for the entire duration.</p>

        <h3>Survey Master</h3>

        <em><strong>Explorer Pursuit:</strong> 17th level</em><br>

        <p>When you use the Surveyed Area feature, the area affected is a 30-foot cube instead of a 15-foot cube.</p>

        <h3>Explorer Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect your studies in maps and hidden routes. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order.</p>

        <h4>Cover Adept</h4>

        <em><strong>Prerequisite:</strong> 12th level</em><br>

        <p>You treat one-quarter cover as half cover, half cover as three-quarters cover, and three-quarters cover as full cover. Additionally, while you are in cover, Dexterity (Stealth) checks you make gain a bonus equal to your Critical Analysis ability modifer (minimum of +1).</p>

        <h4>Dungeon Explorer</h4>

        <p>You have advantage on Wisdom (Perception) checks and Intelligence (Investigation) checks to locate any secret doors or traps, and you have resistance to damage dealt by traps.</p>

        <p>Additionally, you can use your Sage Advice feature to teach friendly creatures about various types of traps, following the same rules of that feature. When you do so, the chosen creatures have resistance to damage dealt by traps.</p>

        <h4>Galactic Explorer</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>When you make an Intelligence (Piloting) check and add your proficiency bonus to the check, treat any roll of 9 or lower as if you had rolled a 10. </p>

        <h4>Grappling Hunter</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>Attack rolls that you make against creatures that you are grappling have advantage. </p>

        <h4>High Ground</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>Once per turn, when you or a friendly creature hits a creature that is a target of your Critical Analysis feature, it takes additional damage equal to half your Critical Analysis ability modifer (minimum of +1). </p>

        <h4>No Stone Left Unturned</h4>

        <p>When you make a Wisdom (Perception) or Intelligence (Investigation) check to find a hidden creature that is inside the area that is targeted by your Critical Analysis feature, you do so with advantage. </p>

        <h4>Versatile Explorer</h4>

        <p>You can hold your breath twice as long as you are normally able to, and take half as much damage from fall damage.</p>

        <img src='https://www.gmbinder.com/images/mBimHwq.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:290px' />

