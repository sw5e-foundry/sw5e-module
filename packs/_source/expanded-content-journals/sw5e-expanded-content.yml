  - name: Aqinos Form
    _id: WtDkmAg0ghktoHQw
    text:
      content: |+
        <h2>Aqinos Form</h2>

        <p>Aqinos Form, also know as Adaptation Form, is named after a Jedi Master who sought to merge technology with Force use. Those guardians who focus on Aqinos Form adopt these tenets to employ clever exploits using technology and the aid of a droid companion.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Aqinos Form:</strong> 3rd level</em><br>

        <p>You gain proficiency in astrotech's implements and the Technology skill.</p>

        <h3>Form Basics</h3>

        <em><strong>Aqinos Form:</strong> 3rd level</em><br>

        <p>You gain the Aqinos lightsaber form, detailed in the Lightsaber Forms section of the Customization Options document for Expanded Content. If you already know this form, you can instead choose another lightsaber form. </p>

        <h3>Techcasting Secrets</h3>

        <em><strong>Aqinos Form:</strong> 3rd level</em><br>

        <p>You have learned to blend your technological aptitude with the Force. Choose two tech powers of no higher level than your Max Power Level, as shown in the guardian table. The chosen powers count as both universal force powers and tech powers for you, but are not included in the number in the Powers Known column of the guardian table.</p>

        <p>You learn two additional powers at 5th, 9th, 13th, and 17th level. Whenever you gain a level in this class, you can choose one of the tech powers you know and replace it with another tech power of no higher level than your Max Power Level.</p>

        <h3>Droid Companion</h3>

        <em><strong>Aqinos Form:</strong> 3rd, 11th, and 17th level</em><br>

        <p>You learn to employ all the knowledge you've accumulated to create, customize, and bond with your own droid companion.</p>

        <p>Create your droid companion as detailed in the Companions section of the Customization Options document for Expanded Content. You must have astrotech's implements in order to create your droid.</p>

        <p>If your companion is irreparably destroyed, or you want a companion, you must first break the bond with your current companion. Bonding with a new companion takes 8 hours spent in an appropriate location. You may only have one companion at a time.</p>

        <p>In addition to its traits and features, your droid companion gains additional benefits while it is bonded to you:</p>

        <ul><li>Your companion is a valid target of the <em>tracker droid interface</em> tech power.</li><li>Your companion gains two additional traits. It gains one more additional trait when you reach 11th level in this class. For each companion trait in excess of your proficiency bonus, your force point maximum is reduced by 2. Over the course of a long rest, you can replace or remove a number of companion traits equal to half your Intelligence modifier (minimum of one).</li></ul>



        <p>&emsp;Lastly, while bonded and within 10 feet of you, your companion can cast the tech powers you know without expending tech points. If your companion casts an at-will power in this way, it does not scale normally at higher levels. Instead, if it would scale at 5th level, it instead scales at 11th level, and if it would scale at 11th level, it instead scales at 17th level. If your companion casts a power of 2nd-level or higher, it consumes a number of uses of this feature equal to that power's level.</p>

        <p>At 11th level, your droid companion must be within 30 feet of you to benefit from this feature. At 17th level, your droid companion must be within 60 feet.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the guardian table. You regain all expended uses when you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Aqinos Form:</strong> 7th level</em><br>

        <p>You learn your choice of the Cause Harm or Lend Aid Channel the Force options, and when you use either of these options, you gain additional benefits.</p>

        <h4>Cause Harm</h4>

        <p>You can choose to deal ion damage instead of necrotic.</p>

        <h4>Lend Aid</h4>

        <p>Droids and constructs are now valid targets.</p>

        <h3>Adaptive Calibration</h3>

        <em><strong>Aqinos Form:</strong> 15th level</em><br>

        <p>When you reduce a hostile creature to 0 hit points with a tech power, or you restore hit points to a friendly creature that is at 0 hit points with a tech power, you regain an expended use of your Channel the Force, and you gain temporary force points equal to the power's level.</p>

        <h3>Master of Adaptation</h3>

        <em><strong>Aqinos Form:</strong> 20th level</em><br>

        <p>Your masteries of the Force and technology have achieved equilibrium. Your Constitution and Wisdom or Charisma (your choice) scores increase by 2. Your maximum for those scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to ion damage, and you can't have disadvantage on saving throws against ion or lightning damage.</li><li>You can't have disadvantage on attack rolls you make as a part of a tech power, and enemies can't have advantage on saving throws against your tech powers.</li><li>You add your governing ability modifier (minimum of +1) to any damage or healing you do with tech powers you cast that don't already include that modifier.</li></ul>

        <p>While you are conscious and your droid is within 60 feet of you and conscious, it also gains these benefits.</p>

        <p>This effect ends early if you are incapacitated or die. Once you use this feature, you can't use it again until you finish a long rest.</p>

