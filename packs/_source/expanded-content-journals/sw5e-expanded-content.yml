  - name: Separating a Tactical Group
    _id: WIrVwqvTQHn8G5mi
    text:
      content: |-
        <h3>Separating a Tactical Group</h3>

        <p>When a tactical group loses contact with each other, or if the tactical group chooses to break up on their turn (no action required), the tactical group becomes separated. When separated, each member of the former tactical group acts on their own, though they retain the initiative of the tactical group. The order of any active members of the former tactical group acting on the same initiative is determined randomly.</p>



