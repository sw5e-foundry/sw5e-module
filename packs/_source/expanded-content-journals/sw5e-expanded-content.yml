  - name: Rakatan Order
    _id: 8PxOM5tZGEjiCtSR
    text:
      content: |-
        <h2>Rakatan Order</h2>

        <p></div></p>

        <p>Monks of the Rakatan Order believe in the harmony of self with technology. They use tech to push themselves beyond their body's natural limits.</p>

        <h3>Techcasting</h3>

        <em><strong>Rakatan Order:</strong> 3rd level</em><br>

        <p>You have derived powers from schematics with the aid of your wristpad. See chapter 10 for the general rules of techcasting and chapter 12 for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>You learn 3 tech powers of your choice, and you learn more at higher levels, as shown in the Tech Powers Known column of the Rakatan Order Techcasting table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Tech Points</h4>

        <p>You have a number of tech points equal to half of your monk level (rounded up), as shown in the Tech Points column of the Rakatan Order Techcasting table, + your Intelligence, Wisdom, or Charisma modifier (your choice). You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many tech powers can be overcharged, consuming more tech points to create a greater effect. You can overcharge these powers to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Rakatan Order Techcasting table.</p>

        You may only cast tech powers at 4th-level once.<br> You regain the ability to do so after a long rest.

        <h4>Techcasting Ability</h4>

        <p>Intelligence, Wisdom, or Charisma is your techcasting ability for your tech powers (your choice). You use this ability whenever a power refers to your techcasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a tech power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + your proficiency bonus + <br>your techcasting ability modifer

        <hr>

        <strong>Tech attack modifier</strong> = your proficiency bonus + <br>your techcasting ability modifer</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>You use a wristpad (found in chapter 5) as a techcasting focus for your tech powers.</p>

        <h3>Focused Tech</h3>

        <em><strong>Rakatan Order:</strong> 6th level</em><br>

        <p>You can cast your tech powers using your focus points. When you do so, your maximum focus points are reduced by 1 until you complete a long rest.</p>

        <p>Additionally, when you use a Focus feature, you gain the following tech enhancements. Each effect costs 1 tech point.</p>

        <p><strong><em>Flurry of Blows.</em></strong> When you hit with an attack with Flurry of Blows, you can deal an additional 1d8 damage of the same type.</p>

        <div class="sw5e-book-block"><h5>Rakatan Order Techcasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Tech Powers<br> Known</th><th>Tech<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>3</td><td>2</td><td>1st</td></tr><tr><td>4th</td><td>4</td><td>2</td><td>1st</td></tr><tr><td>5th</td><td>5</td><td>3</td><td>1st</td></tr><tr><td>6th</td><td>6</td><td>3</td><td>1st</td></tr><tr><td>7th</td><td>7</td><td>4</td><td>2nd</td></tr><tr><td>8th</td><td>8</td><td>4</td><td>2nd</td></tr><tr><td>9th</td><td>9</td><td>5</td><td>2nd</td></tr><tr><td>10th</td><td>10</td><td>5</td><td>2nd</td></tr><tr><td>11th</td><td>11</td><td>6</td><td>2nd</td></tr><tr><td>12th</td><td>12</td><td>6</td><td>2nd</td></tr><tr><td>13th</td><td>13</td><td>7</td><td>3rd</td></tr><tr><td>14th</td><td>14</td><td>7</td><td>3rd</td></tr><tr><td>15th</td><td>15</td><td>8</td><td>3rd</td></tr><tr><td>16th</td><td>16</td><td>8</td><td>3rd</td></tr><tr><td>17th</td><td>17</td><td>9</td><td>4th</td></tr><tr><td>18th</td><td>18</td><td>9</td><td>4th</td></tr><tr><td>19th</td><td>19</td><td>10</td><td>4th</td></tr><tr><td>20th</td><td>20</td><td>10</td><td>4th</td></tr></tbody></table></div>

        <p>&emsp;<strong><em>Patient Defense.</em></strong> While under the effects of your Patient Defense, when you are hit by an attack, you can use your reaction and roll your Martial Arts die to increase your AC against the attack.</p>

        <p><strong><em>Step of the Wind.</em></strong> While under the effects of your Step of the Wind, you can become immune to the shocked condition, and have each slowed level only reduce your speed by 5 feet, unless it would reduce your speed to 0.</p>

        <h3>Harmonious Rakatan</h3>

        <em><strong>Rakatan Order:</strong> 11th level</em><br>

        <p>You can use your Focus features using your tech points. When you do so, your maximum tech points are reduced by 1 until you complete a long rest.</p>

        <p>Additionally, you are constantly under the effects of the <em>detect enhancement</em> tech power. As an action, you can cast the <em>analyze</em> tech power without expending tech points. When you do so, <em>detect enhancement</em> is suppressed and you can't do so again until you complete a short or long rest. </p>

        <h3>Tech Mastery</h3>

        <em><strong>Rakatan Order:</strong> 17th level</em><br>

        <p>You learn and can cast one 5th-level tech power once per long rest without expending tech points. </p>



