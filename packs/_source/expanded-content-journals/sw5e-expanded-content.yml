  - name: Lannik
    _id: 7Awe7nxhLRjT7J3T
    text:
      content: |-
        <h2>Lannik</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue, brown, green, orange, red, purple, yellow, or gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown, gray, or white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Amber, blue, brown, gray, green, hazel, purple, or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Downward-sloping, large ears</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>3'0"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>40 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Lannik</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Lannik</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Lannik are short, bipedal humanoids with droopy, long ears. Males and females are equally tall, although the latter have a considerably less strong complexity. Their species is, however, much more vigorous and resistant than what its size could suggest. A Lannik's skin tends to be of colours similar to his or her eyes and hair. The species has evolved long pointy ears which allow them to hear better than human ears. </p>

        <h3>Society and Culture</h3>

        <p>The Lannik culture is apparently war loving, and Lanniks feel a great respect for warriors. At the same time, though, they follow a strict centuries-old code of honour. Lannik soldiers have the custom of tying all their hair in a single topknot over their head. Their species is one of fierce warriors, whose abilities have developed fighting against terrible predators and other Lanniks in a long history of wars. Although many regard the Lannik as hotheaded and temperamental, they are quite fearless and clear-headed even in combat, giving them the ability to think their way out of a dangerous situation.</p>

        <p>The Lannik do not show their thoughts through their facial expressions, and seem always angry to other species. They are also very stubborn, and are not likely to change career once they chose it. Most males - and many females - serve in the planetary militia, celebrating the species' past as a warrior species. Some take on off-world mercenary work.</p>

        <h3>Names</h3>

        <p>Lannik names are generally short. Lanniks don't often give out their surnames.</p>

        <p><strong>Male Names.</strong> Minch, Oteg, Vandar, Yaddle, Yoda</p>

        <p><strong>Female Names.</strong> Giro, Lina, Penny, Vona, Zeya</p>

        <p><strong>Surnames.</strong> Bek, Kaz, Mon, Var, Zin</p>



        <h3>Lannik Traits</h3>

        <p>As a lannik, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Intelligence score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Lanniks reach adulthood in their 100's and can live up to 900 years.</p>

        <p><strong><em>Alignment.</em></strong> Despite the turbulence on their homeworld, Lanniks tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Lanniks typically stand 3 to 4 feet tall and rarely weigh more than 50 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Closed Mind.</em></strong> Lanniks have a natural attunement for the Force, which makes them resistant to its powers. You have advantage on Wisdom and Charisma saving throws against force powers.</p>

        <p><strong><em>Force-Sensitive.</em></strong> You know the <em>guidance</em> at-will force power. When you reach 3rd level, you learn and can cast the <em>valor</em> force power once per day. When you reach 5th level, you learn and can cast the <em>force enlightenment</em> force power once per day. Wisdom is your forcecasting ability for these powers.</p>

        <p><strong><em>Keen Hearing.</em></strong> You have advantage on Wisdom (Perception) checks that rely on hearing.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Wisdom of the Elders.</em></strong> You are proficient in the Lore skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Lannik. Due to their large ears, the Lannik language is spoken softly, and it is considered insulting to shout.</p>

        <img src='https://www.gmbinder.com/images/4Fd7AXL.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:266px' />



