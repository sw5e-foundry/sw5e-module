  - name: Skill Protocol
    _id: 2LUIzHcOcgKDq03L
    text:
      content: |-
        <h4>Skill Protocol</h4>

        <p><em>5th-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>

        <p>You enhance a droid or construct's protocols. You touch one willing droid or construct and give it expertise in one tool or skill of your choice.</p>

        <p>You must choose a tool or skill in which the target is proficient and that isn't already benefiting from an effect, such as expertise, that doubles its proficiency bonus.</p>
