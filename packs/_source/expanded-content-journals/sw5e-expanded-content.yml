  - name: Dathomir Witch
    _id: M4OSxD08b3pio2TG
    text:
      content: |+
        <h2>Dathomir Witch</h2>

        <p>You are a part of one of the many Force-sensitive clans on Dathomir. You and your sisters, under the guidance of the Clan Mother, form powerful connections with one another and the untamed wilds of the planet. Your people are a matriarchal society of warriors who train in the art of war and the usage of both muscle and the Force in combat. While all clans have their own set of rules regarding Force usage, all the clans held one rule above all others: <em>"Never Concede to Evil."</em></p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Acrobatics, Animal Handling, Lore, and Nature</li><li><strong>Tool Proficiencies:</strong> Bioanalysis kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A copy of your clan's book of laws, a set of traveler's clothes, and a pouch containing 150 cr</li></ul>

        <h4>Witch Clans</h4>

        <p>Dathomir culture is built on the backbone of various clans. The clan you are a part of has it's own history, allegiances, and feuds which shape your persepctive. Choose an option or roll on the table below to determine your clan.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Clan</th></tr></thead><tbody><tr><td>1</td><td>Singing Mountain</td></tr><tr><td>2</td><td>Misty Falls</td></tr><tr><td>3</td><td>Red Hills</td></tr><tr><td>4</td><td>Dreaming River</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Clan</th></tr></thead><tbody><tr><td>5</td><td>Frenzied River</td></tr><tr><td>6</td><td>Great Canyon</td></tr><tr><td>7</td><td>Nightsisters</td></tr><tr><td>8</td><td>Nightbrothers</td></tr></tbody></table></div>

        <h3>Feature: Matriarchal Society</h3>

        <p>Other Dathomir Witches know, and will look out for you. If you're ever in need of a place to stay, or a meal to eat, other Dathomir Witches will help you as long as your clans aren't feuding. This could be in the form of shelters, meals, even healing. If the Dathomir Witches are of your clan or a clan friendly to you, they may be willing to help you even at cost to themselves. </p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Acrobat</td></tr><tr><td>2</td><td>Animal Handler</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Naturalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Force-Sensitive</td></tr><tr><td>8</td><td>Force of Personality</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Dathomir Witches are shaped by their training. They study their book of laws and use it to uphold order and prevent one's turn to the dark side. Their clan and the people around them affects their mannerisms and ideals. Their flaws might be some hidden hypocrisy or heretical idea, or an ideal or bond taken to an extreme.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I try and bring my culture to outsiders.</td></tr><tr><td>2</td><td>I always put my clan first.</td></tr><tr><td>3</td><td>I follow my clan's book of law to the letter.</td></tr><tr><td>4</td><td>I once ran twenty-five miles without stopping to warn my clan of an approaching rival clan. I'd do it again if I had to.</td></tr><tr><td>5</td><td>I place no stock in wealthy or well-mannered folk. Credits and manners won't save you from a hungry rancor.</td></tr><tr><td>6</td><td>I have a lesson for every situation, drawn from observing nature.</td></tr><tr><td>7</td><td>I feel far more comfortable around wildlife than I do society.</td></tr><tr><td>8</td><td>I'm always picking things up, absently fiddling with them, and sometimes accidentally breaking them.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Change.</strong> Life is like the seasons, in constant change, and we must change with it. (Chaotic)</td></tr><tr><td>2</td><td><strong>Greater Good.</strong> It is each person's responsibility to make the most happiness for the whole clan. (Light)</td></tr><tr><td>3</td><td><strong>Honor.</strong> If I dishonor myself, I dishonor my whole clan. (Lawful)</td></tr><tr><td>4</td><td><strong>Might.</strong> The strongest are meant to rule. (Dark)</td></tr><tr><td>5</td><td><strong>Nature.</strong> The natural world is more important than all the constructs of civilization. (Neutral)</td></tr><tr><td>6</td><td><strong>Glory.</strong> I must earn glory in battle, for myself and my clan. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My family and clan is the most important thing in my life, even when they are far from me.</td></tr><tr><td>2</td><td>An injury to the unspoiled wilderness of my home is an injury to me.</td></tr><tr><td>3</td><td>I am the last of my clan, and it is up to me to keep the traditions of my ancestors alive.</td></tr><tr><td>4</td><td>It is my duty to provide children to sustain my clan.</td></tr><tr><td>5</td><td>I suffer awful visions of a coming disaster and will do anything to prevent it.</td></tr><tr><td>6</td><td>I will bring terrible wrath down on those who disrespect my clan.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I stick to my traditions no matter what, even at the cost of others.</td></tr><tr><td>2</td><td>There's no room for caution in a life lived to the fullest.</td></tr><tr><td>3</td><td>I remember every insult I've received and nurse a silent resentment toward anyone who's ever wronged me.</td></tr><tr><td>4</td><td>I am slow to trust members of other species, clans, and societies.</td></tr><tr><td>5</td><td>Violence is my answer to almost any challenge.</td></tr><tr><td>6</td><td>Don't expect me to save those who can't save themselves. It is nature's way that the strong thrive and the weak perish.</td></tr></tbody></table>

