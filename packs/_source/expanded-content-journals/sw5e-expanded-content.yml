    _id: 8LDQ6BczkTWyWQKb
    text:
      content: |-
        <h4>Shadow Puppetry</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When a creature you can see within 30 feet of you is reduced to 0 hit points, you can use your reaction and expend a superiority die to give that creature a final act of aggression. That creature can immediately move a number of feet equal to 5 times the result of the die and make a single weapon attack against a target of your choice within its attack range, adding the die to the attack roll.</p>
