  - name: Companion Classes
    _id: 92BZsmO5jTKaVZhE
    text:
      content: |-
        <h2>Companion Classes</h2>

        <p>Your companion's class grants it features at 3rd level, and again at 7th, 11th, 15th, and 18th level. </p>

        <p>You may choose your companion's class from the following options or roll on the table below to determine it randomly. </p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d10</th><th>Companion Class</th></tr></thead><tbody><tr><td>1</td><td>Berserker</td></tr><tr><td>2</td><td>Consular</td></tr><tr><td>3</td><td>Engineer</td></tr><tr><td>4</td><td>Fighter</td></tr><tr><td>5</td><td>Guardian</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d10</th><th>Companion Class</th></tr></thead><tbody><tr><td>6</td><td>Monk</td></tr><tr><td>7</td><td>Operative</td></tr><tr><td>8</td><td>Scholar</td></tr><tr><td>9</td><td>Scout</td></tr><tr><td>10</td><td>Sentinel</td></tr></tbody></table></div>

        <p>If you determine your companion's class randomly, and the result is a class for which the companion is ineligible, simply reroll until you get a proper result.</p>



        <img src='https://www.gmbinder.com/images/DLfTLC8.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:340px' />
