  - name: Selkath
    _id: 3GVuTQJdGHhoSZ5S
    text:
      content: |-
        <h2>Selkath</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Blue, gray, green, pink</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, blue, green</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Venom-tipped claws, artificial misting vents, cephalic lobes, three-digit hands, two-toed feet</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'0"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Manaan</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Selkatha</td></tr></tbody></table></blockquote>



        <h3>Biology &amp; Appearance</h3>

        <p>The Selkath are an aquatic species, known for being skilled swimmers and diplomats. Their heads resemble sting rays and they have a blue, pink, or green skin naturally patterned as an underwater camouflage. Their mouths are bracketed by cephalic lobes. Female Selkath differed from males due to the presence of tendrils on the back of their heads.</p>

        <p>All members of the Selkath race have rectractable, venom-tipped claws. The use of these claws in any form of combat or attack was considered dishonorable and a sign of madness; to do this was to give in to animal instincts unbecoming of a sentient species. Because of the Selkath's water-dwelling nature, their chest armors were fitted with misting vents in order to keep their skin moist.</p>

        <h3>Society &amp; Culture</h3>

        <p>Selkath are native to the planet Manaan, the only naturally occurring source of the medical liquid referred to as kolto. The Selkath have leveraged this monopoly on maintain their neutrality, peddling their invaluable healing supplies to all comers.</p>

        <p>Manaan is an ocean planet is home to only one above-surface settlement, the floating Ahto City, built directly above Hrakert Rift, the most abundant source of kolto on Manaan.  As bacta began to replace the inferior kolto on the galactic stage, Manaan fell from their previously respected position, shirking away their previous prestige and causing many Selkath to disappear from the galactic eye into isolationism and tribalism. </p>

        <h3>Names</h3>

        <p>Selkath names tend to have a flowing quality to it, like a stream of water. They rarely use surnames.</p>

        <p><strong>Male Names.</strong> Chata, Galas, Qual, Morgo, Shaelas</p>

        <p><strong>Female Names.</strong> Halsuna, Dolmas, Shasa, Ulsuru</p>



        <h3>Selkath Traits</h3>

        <p>As a selkath, you have the following special traits.</p>

        <strong>Ability Score Increase.</strong> Your Intelligence score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong>Age.</strong> Selkath reach adulthood in their late teens and live up to 100 years. </p>

        <p><strong>Alignment.</strong> Selkath have been renowned for countless millenia of the careful preservation of neutrality. As such individuals tend towards the neutral balanced alignment, though there are exceptions.</p>

        <strong>Size.</strong> Selkath typically stand between 4 and a half to<br> 5 and a half feet tall and average 130 pounds.<br> Regardless of your position in that range, your size is<br> Medium.

        <p><strong>Speed.</strong> Your base walking speed is 30 feet.</p>

        <p><strong>Amphibious.</strong> You can breathe air and water.</p>

        <p><strong><em>Claws.</em></strong> Your claws are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage and have the finesse property. Lastly, as a bonus action, you can perform a special claw attack. On a hit, the target suffers the attack's normal effects, and it must make a Constitution saving throw (DC = 8 + your proficiency bonus + your Constitution modifier). On a failed save, the target is poisoned until the end of its next turn, and you can't use this feature again until you complete a short or long rest.</p>

        <p><strong>Gift of the Progenitor.</strong> You know the <em>temporary boost</em> at-will tech power. When you reach 3rd level, you learn and can cast the <em>kolto pack</em> tech power once per day. When you reach 5th level, you learn and can cast the <em>kolto cloud</em> tech power once per day. Your techcasting ability is Intelligence. You do not require use of a wristpad for these powers. </p>

        <p><strong>Swim.</strong> You have a swimming speed of 30 feet.</p>

        <p><strong>Languages.</strong> You can speak, read, and write Galactic Basic and Selkatha. Selkatha has a very moist and gurgling tone to it.</p>

        <img src='https://www.gmbinder.com/images/sTuHieJ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:307px' />



