  - name: Scholar
    _id: 5i9T4Aj98KgJVmfU
    text:
      content: |+
        <h2>Scholar</h2>

        <p>In order to become a scholar, your companion must have an Intelligence score of 13 or higher.</p>

        <p>As a scholar, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons, techblades</li><li><strong>Tools:</strong> Any one</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Wisdom, Intelligence</li><li><strong>Skills:</strong> Choose three from Deception, Insight, Intimidation, Investigation, Lore, Medicine, Nature, Persuasion, and Survival</li></ul>

        <h3>Academic Superiority</h3>

        <p>Beginning when your companion chooses this class at 3rd level, your companion has learned maneuvers that are fueled by special dice called superiority dice. See chapter 13 of the Player's Handbook for the maneuvers list.</p>

        <h4>Maneuvers</h4>

        <p>Your companion learns two maneuvers of its choice. Many maneuvers enhance an attack in some way. Your companion can use only one maneuver per attack, and it may only use each maneuver once per turn.</p>

        <p>Your companion learns an additional maneuver at 5th, 7th, 9th, 11th, 13th, 15th, and 17th level. Each time your companion gains a level, it can also replace one maneuver it knows with a different one.</p>

        <h4>Superiority Dice</h4>

        <p>Your companion has two superiority dice, which are d4s. This die increases to a d6 at 9th level and a d8 at 17th level. A superiority die is expended when your companion uses it. Your companion regains all of its expended superiority dice when it finishes a short or long rest.</p>

        <p>Your companion gains an additional superiority die at 5th, 9th, 13th, and 17th level.</p>

        <h4>Maneuver Ability</h4>

        <p>Your companion's maneuver ability varies based on the type of the maneuver it uses. It uses Strength, Dexterity, or Constitution for physical maneuvers (its choice), Intelligence, Wisdom, or Charisma for mental maneuvers (its choice), and an ability of its choice for general maneuvers. It uses this ability whenever a maneuver refers to its maneuver ability. Additionally, it uses this ability modifier when setting the saving throw DC for a maneuver it uses.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Maneuver save DC</strong> = 8 + your proficiency bonus + <br>your maneuver ability modifier</div>

        <hr>



        <h3>Critical Analysis</h3>

        <p>Also at 3rd level, it is able to analyze a target, develop a plan on how to best overcome any potential obstacle, and execute that plan with ruthless efficiency. As a bonus action on its turn, your companion can analyze a target it can see within 60 feet of it. For the next minute, or until your companion analyzes another target, it gain the following benefits:</p>

        <ul><li>When your companion analyzes a hostile creature, its attack and damage rolls made with weapons with the finesse property or blaster weapons against that target may use its Intelligence modifier instead of Strength or Dexterity.</li><li>When your companion analyzes a friendly creature, the target can end your companion's Critical Analysis on them (no action required) to add your companion's Intelligence modifier to one attack roll, ability check, or saving throw. Once a friendly creature has benefited from this ability, they can not do so again until they complete a short or long rest.</li></ul>

        <h3>Discoveries</h3>

        <p>At 7th level, your companion learns two discoveries from those available to the scholar class or any of the scholar's archetypes. </p>

        <h3>Multitasker</h3>

        <p>By 11th level, your companion can take a second reaction each round. It can only take one reaction per turn.</p>

        <h3>Sage Advice</h3>

        <p>At 15th level, your companion can spend 1 minute spread its knowledge and experience, advising those around it. When it does so, your companion chooses a skill or tool it is proficient with and a number of friendly creatures up to its Intelligence modifier with 30 feet of it who can hear it and understand it. Once within the next hour, the next time each creature would make an ability check with the chosen skill or tool, they may add their proficiency bonus to the roll if they are not already proficient. A creature may only benefit from this feature once. If a creature is targeted by this feature again before using it, they can choose to retain the first benefit or replace it with the new skill or tool instead.</p>

        <p>Once your companion has used this feature, it must complete a short or long rest before it can use it again.</p>

        <h3>Calm and Collected</h3>

        <p>As of 18th level, when your companion makes a saving throw caused by an effect it can see, it may gain a bonus to the saving throw equal to its Intelligence modifier.</p>

        <p>Once your companion has used this feature, it must complete a short or long rest before it can use it again.</p>

