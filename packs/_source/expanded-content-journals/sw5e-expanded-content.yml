  - name: Short Rest
    _id: 4t2h54bPQVumc9pI
    text:
      content: |-
        <h3>Short Rest</h3>

        <p>A short rest is a period of extended downtime, at least 8 hours long, during which a character sleeps for at least 6 hours and performs light activity, such as reading, talking, eating, or standing watch, for no more than 2 hours. If the rest is interrupted by a period of strenuous activity�fighting, casting powers, at least 4 hours of walking, or similar adventuring activity�the characters must restart the rest to benefit from it.</p>

        <p>At the end of a short rest, a character regains missing hit points up to half their hit point maximum (rounded up). A character can then spend one or more Hit Dice, up to the character's maximum number of Hit Dice, which is equal to the character's level. Whenever a character spends a Hit Die to regain hit points, the player rolls the die and adds the character's Constitution modifier to it. The character regains hit points equal to the total. The player can decide to spend an additional Hit Die after each roll.</p>

        <p>A character can't benefit from more than one short rest in a 24-hour period, and a character must have at least 1 hit point at the start of the rest to gain its benefits.</p>
