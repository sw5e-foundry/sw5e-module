  - name: Sullustan
    _id: Guj5yXmVRb6Jbqh7
    text:
      content: |-
        <h2>Sullustan</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Gray, pink, or light green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or brown</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Large ears, scarns, ultra-sensitive hearing, jet-black eyes, two flaps of jowls around their cheeks</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>3'11"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>60 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Sullust</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Sullestese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>A diminutive species of near-humans, Sullustans bear round, tapered skulls. Sullustans are distinguishable for their almond-shaped black eyes, facial jowls called dewflaps and large, round ears. Their wide earlobes provide excellent hearing, and their large eyes provide exceptional low-light vision. Due to their relative lack of exposure to natural light, Sullustans begin to suffer from corneal defects after 30 standard years. Many choose to wear special visors to prevent further damage. Some Sullustans tattoo their heads as a form of individual expression.</p>

        <h3>Society and Culture</h3>

        <p>Sullustans are outgoing and mercantile, friendly and pragmatic. As a species they are altogether lacking in xenophobia. Though fond of practical jokes and extremely shrewd in their business dealings, they are eager to explore and travel the galaxy. Inquisitive by nature, some have described Sullustans as reckless, especially for their preference to learn and discover whenever possible through personal experience. Sullustans organize themselves into familial units known as Warren-clans. Each clan consists of one polyandrous female, several husbands, and their young. Unmated females, known as "Fems", are active members of their communities until they reach breeding status, called "Ready", when they choose their mates.</p>

        <h3>Names</h3>

        <p>Male names are typically longer than female names. Surnames are based on Warren-clan.</p>

        <p><strong>Male Names.</strong> Duedt, Oshror, Partheen, Throthinnitz</p>

        <p><strong>Female Names.</strong> Asulu, Eldo, Tri, Vo, We</p>

        <p><strong>Surnames.</strong> Frovarr, Jeard, Plonr, Tsah, Vhiibb</p>



        <h3>Sullustan Traits</h3>

        <p>As a sullustan, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Sullustan reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Sullustans' outgoing and friendly nature cause them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Sullustans typically stand 4 and a half to 5 feet tall and weigh around 120 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Keen Hearing.</em></strong> You have advantage on Wisdom (Perception) checks that rely on hearing.</p>

        <strong><em>Mercantile.</em></strong> Whenever you make a Charisma<br> (Persuasion) check related to conducting business, you<br> are considered to have expertise in the Persuasion<br> skill.

        <p><strong><em>Pilot.</em></strong> You have proficiency in Piloting.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Sullestese, and one more language of your choice. Sullestese is characterized as a robust language in business, and as such is commonly learned by professional merchants.</p>

        <img src='https://www.gmbinder.com/images/7ctKMBy.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:327px' />



