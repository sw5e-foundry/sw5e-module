  - name: Strikes
    _id: 5wtuZ4haGmGeeWeI
    text:
      content: |-
        <h3>Strikes</h3>

        <p>How many strikes a character can take varies based on the lethality of the contest. You might grant each party a potential three strikes if sparring, or you might give them each strikes equal to their Constitution modifier in a lethal contest, or even strikes equal to their proficiency bonus in a fight for honor. </p>

