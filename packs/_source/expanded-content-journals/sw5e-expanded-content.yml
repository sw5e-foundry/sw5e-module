  - name: Illusionist Technique
    _id: CjrfCtG1WgpzMxjI
    text:
      content: |+
        <h2>Illusionist Technique</h2>

        <p>Among the galaxy you may find the various infiltrators and agents who make ample use of holographic technology to get themselves in and out of danger. Followers of the Illusionist Technique make use of this holographic technology to give themselves an illusory edge in combat.</p>

        <h3>Holographic Decoy</h3>

        <em><strong>Illusionist Technique:</strong> 3rd level</em><br>

        <p>As an action, you can create a perfect illusion of yourself that lasts for 10 minutes, or until you lose your concentration (as if you were concentrating on a power). The decoy appears in an unoccupied space that you can see within 30 feet of you. The decoy is purely visual. If anything passes through it, it is revealed to be an illusion. For the duration, you can cast tech powers as though you were in the decoy's space. Both your decoy and the target of your tech power must be within your line of sight.</p>

        <p>You can use your bonus action to cause the decoy to move up to 30 feet. As your decoy changes location, you can alter its appearance so that its movements appear natural for the decoy. If your decoy is ever more than 120 feet away from you, it immediately disappears.</p>

        <p>Additionally, when both you and your decoy are within 5 feet of a creature that can see the decoy, but is not aware it is an illusion, you have advantage on attack rolls against that creature.</p>

        <p>A creature that uses its action to examine your decoy can determine that it is an illusion with a successful Intelligence (Investigation) check against your tech save DC. If a creature discerns the illusion for what it is, the creature can see through the image.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you finish a short or long rest. </p>



        <h3>Mark of the Illusionist</h3>

        <em><strong>Illusionist Technique:</strong> 3rd level</em><br>

        <p>The target of your Ranger's Quarry feature has disadvantage on all checks made to discern the nature of your illusions. Additionally, when the target of your Ranger's Quarry is reduced to 0 hit points, you can use your reaction to immediately cause an active illusion, or your Holographic Decoy, to take the form of the creature as long as the creature's dimensions fall within the power's capacity restrictions.</p>

        <h3>Charged Illusions</h3>

        <em><strong>Illusionist Technique:</strong> 7th level</em><br>

        <p>When a creature discerns the nature of an illusion you have created using a tech power or class feature while within 5 feet of it, you can dispel the illusion (no action required) to have the creature take energy damage equal to 1d10 + half your scout level. </p>

        <h3>Quick Escape</h3>

        <em><strong>Illusionist Technique:</strong> 11th level</em><br>

        <p>Whenever you take damage, you can use your reaction to swap places with an illusion of yourself that you have created using a tech power or class feature. The illusion must be within 60 feet of you, and you must be able to see it.</p>

        <h3>Improved Decoys</h3>

        <em><strong>Illusionist Technique:</strong> 15th level</em><br>

        <p>You can create up to four duplicates of yourself, instead of one, when you use your Holographic Decoy feature. When you use your bonus action to move a decoy, you can move any number of them with the same bonus action.</p>

