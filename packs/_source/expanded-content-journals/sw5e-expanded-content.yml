  - name: Dashade
    _id: WKJA4onj8LdNBfrm
    text:
      content: |-
        <h2>Dashade</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Black, dark gray, or Olive green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, orange, or red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Heat dissipation, Force-resistance, radiation resistance</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'1"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>145 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Urkupp</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Dashadi</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Dashade are a hulking reptillian species known for their strength and aggression. They have three fingers on each hand, each tipped with a long, curving claw.</p>

        <p>Their most notable feature is their natural resistance to the power of the Force. Along with their resistance to the Force, Dashade possess a high tolerance for radioactive energy, able to withstand contact with radioactive materials much longer than other species.</p>

        <p>Despite the thick skin Dashade possess, they have the uncanny ability to control the rate that heat dissipates from their skin. This allows them to regulate their body temperature at will.</p>

        <h3>Society and Culture</h3>

        <p>Dashade's brute strength and Force resistance makes them prime candidates for mercenary and assassin work. </p>

        <p>Dashade society is clan-based. Theses clan's often feud over honor and reputation, a trait that the dashade as a species exhibit.</p>

        <h3>Names</h3>

        <p>Many dashade names are short, dominated by harsher sounds, while others are longer and seperated by an apostrophe. Dashade names are gender neutral. Surnames are clan-based, but most dashade don't share or use them. </p>

        <p><strong>First Names.</strong> Anarin, Rak'vhul, Set, Vattix, Vos</p>

        <p><strong>Surnames.</strong> Ferrex, Gusar, Kruyel, Orath, Xeng, Zath</p>



        <h3>Dashade Traits</h3>

        <p>As a dashade, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Dashade reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Dashade's aggressive yet loyal nature causes them to tend toward lawful dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Dashade typically stand 5 and a half to 6 and a half feet tall and generally weigh around 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Claws.</em></strong> Your claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Force Contention.</em></strong> Due to their unique physiology, dashade hardiness allows them to overcome use of the Force. You have advantage on Strength and Constitution saving throws against force powers.</p>

        <p><strong><em>Heat Dissipation.</em></strong> Whenever you make a Dexterity (Stealth) check to avoid detection by electronic sensors and cameras, you are considered to have expertise in the Stealth skill.</p>

        <p><strong><em>Menacing.</em></strong> You gain proficiency in the Intimidation skill.</p>

        <p><strong><em>Radiation Resistant.</em></strong> Dashade are naturally able to resist radiation. You have resistance to necrotic damage. </p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Dashadi. Dashadi is characterized by its low pitch and elongated growls.</p>

        <img src='https://www.gmbinder.com/images/kvAjtRv.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:306px' />



