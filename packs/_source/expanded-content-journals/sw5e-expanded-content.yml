  - name: Laborer
    _id: RcinfWIer5obAwMl
    text:
      content: |+
        <h2>Laborer</h2>

        <p>You are an experienced laborer and come from a humble social rank.  You work with your hands, and anything worth doing is worth doing well.  Your life is full of hard work and too little respect for your efforts, but you share a deep camaraderie with your fellow workers. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Animal Handling, Athletics, Survival, and Technology</li><li><strong>Tool Proficiencies:</strong> One type of gaming set and one set of artisan's implements</li><li><strong>Equipment:</strong> A set of common clothes, a sturdy knife, a gaming set (one of your choice), and a belt pouch containing 100 cr</li></ul>

        <h4>Labor Specialty</h4>

        <p>There are many kinds of manual laborors, skilled and unskilled. Choose your field or specialty or roll on the table below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>1</td><td>Construction</td></tr><tr><td>2</td><td>Droid Repair</td></tr><tr><td>3</td><td>Electrician</td></tr><tr><td>4</td><td>Facilities Maintenance</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>5</td><td>Logistics/Shipping</td></tr><tr><td>6</td><td>Manufacturing</td></tr><tr><td>7</td><td>Mechanic</td></tr><tr><td>8</td><td>Plumbing/HVAC</td></tr></tbody></table></div>

        <h3>Feature: Working Class</h3>

        <p>You have a contact that acts as your liaison to a union or faction. You know how to reach your contact at all times. Your contact can provide you with the means to requisition equipment used in manufacturing or shipping.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Animal Handler</td></tr><tr><td>2</td><td>Brawny</td></tr><tr><td>3</td><td>Survivalist</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Athlete</td></tr><tr><td>8</td><td>Durable</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Laborers run the gamut from independent operator and owners to lazy and incompetent employees.   </p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I am quiet and reserved. I rarely raise my voice or object.</td></tr><tr><td>2</td><td>I take pride in what my hands create or fix.</td></tr><tr><td>3</td><td>I have little respect for people who call others to fix their problems.</td></tr><tr><td>4</td><td>I am fiercely independent.</td></tr><tr><td>5</td><td>I look down on book learning and take pride in my street-smarts.</td></tr><tr><td>6</td><td>I may be quite calm and polite around those of higher power than I; but I'm harsh towards all my underlings, flexing the little power I have.</td></tr><tr><td>7</td><td>I work to live.</td></tr><tr><td>8</td><td>I live to work.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Prestige.</strong> I hope to one day rise to the top of my field and command the respect of those who work for me. (Lawful)</td></tr><tr><td>2</td><td><strong>Superiority.</strong> Rules are meant to control the sheep.  I'm no sheep. (Chaotic)</td></tr><tr><td>3</td><td><strong>Community.</strong> It is the duty of all people to strengthen the bonds of community and thereby improve civilization. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I will do whatever it takes to climb to the top. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I�m loyal to my friends, not to any ideals, and everyone else can take a walk for all I care. (Neutral)</td></tr><tr><td>6</td><td><strong>Faith.</strong>  I trust that my leader will guide my actions, I have faith that if I work hard, things will go well. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I will someday get revenge on the corrupt boss who fired me.</td></tr><tr><td>2</td><td>Everything I do is for the common people.</td></tr><tr><td>3</td><td>I will do anything to protect my co-workers.</td></tr><tr><td>4</td><td>No one must ever learn that I once stole from my employer.</td></tr><tr><td>5</td><td>I�m guilty of a terrible crime. I hope I can redeem myself for it.</td></tr><tr><td>6</td><td>I am committed to my group's goals over my own.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I put too much trust in those who wield power within my employer's hierarchy.</td></tr><tr><td>2</td><td>I am inflexible in my thinking.</td></tr><tr><td>3</td><td>I like things more than people.</td></tr><tr><td>4</td><td>I do anything I can to avoid real work.</td></tr><tr><td>5</td><td>I am not an independent thinker.  I need detailed instructions and close supervision.</td></tr><tr><td>6</td><td>I gossip about others to hide my inadequacies.</td></tr></tbody></table>

