  - name: Juyo/Vaapad Form
    _id: PwUbCcVHBI8SCgbl
    text:
      content: |+
        <h2>Juyo/Vaapad Form</h2>

        <p>Juyo/Vaapad Form, also known as Ferocity Form, revels in the satisfaction of battle and victory. Those guardians who focus on Juyo/Vaapad Form channel their emotions into their fighting, making heavy, sweeping strikes.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Juyo/Vaapad Form:</strong> 3rd level</em><br>

        <p>You gain proficiency in heavy armor.</p>

        <h3>Form Basics</h3>

        <em><strong>Juyo/Vaapad Form:</strong> 3rd level</em><br>

        <p>You gain your choice of the Juyo or Vaapad lightsaber form, detailed in Chapter 6 of the Player's Handbook. If you already know the chosen form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Vornskr</h3>

        <em><strong>Juyo/Vaapad Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can take a savage stance, designating one creature you can see within 10 feet of you as your prey for 1 minute. You have advantage on attack rolls against the creature. If the target drops to 0 hit points, you can use a bonus action on a subsequent turn to mark a new creature.</p>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you complete a long rest.</p>



        <h3>Channel the Force</h3>

        <em><strong>Juyo/Vaapad Form:</strong> 3rd level</em><br>

        <p>You gain one of the following Channel the Force options. Choose Snap Aggression for Juyo or Assertive Defense for Vaapad.</p>

        <h4>Snap Aggression</h4>

        <p>If you are surprised at the start of combat and aren't incapacitated, you can expend a use of your Channel the Force to act normally on your first turn.</p>

        <h4>Assertive Defense</h4>

        <p>When you reduce the damage dealt by a force power to 0 using the <em>saber reflect</em> power, and you're wielding a lightweapon or vibroweapon, you can expend a use of your Channel the Force to reflect the attack at a target within range, regardless of what type the damage is.</p>

        <img src='https://www.gmbinder.com/images/XSgalq5.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:815px' />



        <h3>Fury</h3>

        <em><strong>Juyo/Vaapad Form:</strong> 7th level</em><br>

        <p>You gain one of the following features. Choose Relentless for Juyo or Punishing Charge for Vaapad.</p>

        <h4>Relentless </h4>

        <p>You have advantage on initiative checks, and gain a 10 foot bonus to your speed on your first turn of combat.</p>

        <h4>Punishing Charge </h4>

        <p>When a hostile creature you can see or hear within 30 feet of you casts a force power, you can use your reaction to move up to half your speed. You must end this move closer to the enemy than you started. If you end this movement within 5 feet of the creature, and the triggering force power required a ranged attack roll, they have disadvantage on the roll.</p>

        <h3>Vengeance</h3>

        <em><strong>Juyo/Vaapad Form:</strong> 15th level</em><br>

        <p>You gain one of the following features. Choose Devastating Critical for Juyo or Their Power, My Strength for Vaapad.</p>

        <h4>Devastating Critical</h4>

        When you score a critical hit with a melee weapon attack, you gain a bonus to that weapon's damage<br> roll equal to your guardian level.

        <h4>Their Power, My Strength</h4>

        When you are dealt damage by a force power, you<br> can reduce that damage by an amount equal to your guardian level (no action required).

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the guardian table. You regain all expended uses when you complete a short or long rest.</p>

        <h3>Master of Ferocity</h3>

        <em><strong>Juyo/Vaapad Form:</strong> 20th level</em><br>

        <p>You are a paragon of extraordinary martial prowess. Your Strength and Dexterity scores increase by 2. Your maximum for those scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to all damage.</li><li>When you take the Attack action on your turn, you can make one additional attack as part of that action.</li><li>Your critical hit range with weapons increases by 1.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <img src='https://www.gmbinder.com/images/B55mV5X.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:515px' />

