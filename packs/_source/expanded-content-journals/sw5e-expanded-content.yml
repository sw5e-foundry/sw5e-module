  - name: Overlapping Features
    _id: 55KxEoK0k0S5O14T
    text:
      content: |-
        <h2>Overlapping Features</h2>

        <p></div></p>

        <p>Many species have features that make them better in certain martial ways: special traits like natural armor, armor and weapon proficiencies, or unarmed strikes and natural weapons. Counterintuitively, when those species choose certain classes, those features become obsolete instead of enhancing their class choice.</p>

        <p>If you players choose such a species/class combination, consider using this variant rule.</p>
