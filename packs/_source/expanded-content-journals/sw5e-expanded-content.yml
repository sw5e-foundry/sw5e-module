  - name: Abyssin
    _id: Avbq24CwN0ydwa5O
    text:
      content: |-
        <h2>Abyssin</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green, tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, turning white with age</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Yellow, white</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Single eye, regenerative abilities</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'5"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>150 lbs.</td><td>x2d4 lbs.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Byss</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Abyssin</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The hulking abyssin have long limbs and a single large eye that dominates their foreheads. Typically well-muscled, the abyssin's stooping gait results in a slightly hunched appearance. </p>

        <p>A distinctive trait of the abyssin is their ability to heal quickly; their fast regeneration is believed to have been an adaptation to prevent fluid loss via bleeding on their desert homeworld. All cells in the abyssin body are replaced every 80 hours, and organs which typically were paired in other species appear singularly.</p>

        <h3>Society and Culture</h3>

        <p>A primitive tribal society, the abyssin of Byss are known as violent and brutish, and their planet is avoided by most beings in the civilized galaxy. Unstable resources on Byss do not allow for mass population growth or for the stabilization of a central government, economy or trade system. </p>

        <p>Existing simply in nomadic tribes, abyssin groups can interact peacefully with one another, though only if both groups have plentiful water and food supplies. Otherwise, they began a 'Blooding', a brawl that ends only when one tribe's warriors are all killed, captured, or incapacitated. Warriors who survive a Blooding are usually allowed to join the winning tribe once they finish their regeneration. This tradition led to some violent incidents when spacers tried to make first contact and trade with Abyssin tribes with scarce water resources, especially since the abyssin assumed the alien traders could regenerate as quickly as they did. </p>

        <h3>Names</h3>

        <p>There does not appear to be any distinction between male and female names for abyssin. Abyssin don't use surnames.</p>

        <p><strong>Names.</strong> Anami, Easym, Myo, Qawohl, Seh-run, Sidie</p>



        <h3>Abyssin Traits</h3>

        <p>As an abyssin, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Abyssin reach adulthood at age 30 and can live up to 300 years thanks to their regenerative abilities.</p>

        <p><strong><em>Alignment.</em></strong> Abyssin's violent and anarchic upbringing cause them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Abyssin stand around 6 feet tall and weigh between 200 and 400 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Rapidly Regenerative.</em></strong> You heal quickly, both at will and in response to danger. As a bonus action, you can choose to spend one of your Hit Dice to recover hit points. Additionally, when you take damage, you can use your reaction and expend a Hit Die to regain hit points as long as the damage would not reduce your hit points to 0.</p>

        <p><strong><em>Rugged Survivalist.</em></strong> You are proficient in the Survival skill. Additionally, you are naturally adapted to hot climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Tech-Impaired.</em></strong> While abyssin can figure out basic technology, they experience difficulty using more complex equipment like wristpads. You can not use tech powers or take levels in techcasting classes.</p>

        <p><strong><em>Savage Attacks.</em></strong> When you score a critical hit with a melee weapon attack, you can roll one of the weapon's damage dice one additional time and add it to the extra damage of the critical hit.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Abyssin. Abyssin uses mainly growls and grunts that many species consider primitive. The written form of language uses only a small number of simple hieroglyphs.</p>

        <img src='https://www.gmbinder.com/images/7FVX3ZX.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:223px' />



