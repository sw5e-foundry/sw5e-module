    _id: RVh5vXY3FkuMaTp7
    text:
      content: |-
        <h4>Reverse Curse</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When another creature attempts to charm or frighten you or an ally you can see within 15 feet of you, you can use your reaction and expend a superiority die and roll it to attempt to turn the effect back on that creature. The creature must succeed on a Wisdom saving throw or be be charmed or frightened by you, dependent on the triggering ability, for a number of rounds equal to the die roll or until the creature takes any damage.</p>
