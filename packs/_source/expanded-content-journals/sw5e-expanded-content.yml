  - name: Ugnaught
    _id: M9RoLPcVNoThV3KG
    text:
      content: |-
        <h2>Ugnaught</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Varying shades of pink</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>White</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black and red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Diminutive stature, porcine features, technological affinity</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>3'1"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>40 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Gentes</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Ugnaught</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Ugnaughts are diminutive, porcine humanoids who have pink skin, upturned noses, white hair, and thick layers of jowls. Some have tusks that they use in blood duels. They are strong and resilient, and their life-spans reached up to 200 standard years. They notably eat genteslugs.</p>

        <h3>Society and Culture</h3>

        <p>Ugnaughts are ruled by councils comprised of elected officers. Ugnaughts live their lives in accordance to their "blood profession", with Ugnaught parents teaching their children their trade. Infant Ugnaughts are known as Ugletts. If the number of new Ugnaughts in a given profession exceeds the need, a blood duel is called. When the Ugnaughts reached their twentieth year of age, these fights are held to the death, with the victor winning the right to inherit their blood profession. Despite this outdated and violent custom, the Ugnaughts are generally a peaceful people with a rich culture.</p>

        <p>When greeting an Ugnaught, it is advised to bow silently, then wait for a guttural purring as a positive response. Usage of the common galactic greeting "yaa-yaah" is considered a personal insult to Ugnaughts. If this occurrs, it was advisable to duck and cover, as various mechanical implements will be thrown one's way. </p>

        Ugnaughts are often enslaved as they are fairly<br> meek.

        <h3>Names</h3>

        <p>Ugnaught names are generally concise. Female names sound more cheerful. Surnames are determined by blood profession.</p>

        <p><strong>Male Names.</strong> Banax, Dral, Durn, Togre, Yirkux</p>

        <p><strong>Female Names.</strong> Admeva, Olnito, Ruskor, Vurlilli</p>

        <p><strong>Surnames.</strong> Col, Gnatro, Mikk, Roc, Sag</p>



        <h3>Ugnaught Traits</h3>

        <p>As an ugnaught, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Ugnaughts reach adulthood at 20 and can live to reach 200.</p>

        <p><strong><em>Alignment.</em></strong> Ugnaughts tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Ugnaughts typically stand around 4 feet and weigh about 50 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25.</p>

        <p><strong><em>Bite.</em></strong> Your tusks are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Crafters.</em></strong> You have proficiency in one tool of your choice.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Industrial Hazards.</em></strong> You have resistance to acid damage.</p>

        <p><strong><em>Tech Dabbler.</em></strong> You know the <em>mending</em> at-will tech power. When you reach 3rd level, you learn and can cast the <em>analyze</em> tech power once per day. When you reach 5th level, you learn and can cast the <em>overheat</em> tech power once per day. Your techcasting ability is Intelligence. You do not require use of a wristpad for these powers.</p>

        <p><strong><em>Tinker.</em></strong> You have proficiency with tinker's implements. You can use these and spend 1 hour and 100 cr worth of materials to construct a Tiny Device (AC 5, 1 hp). You can take the Use an Object action to have your device cause one of the following effects: create a small explosion, create a repeating loud noise for 1 minute, create smoke for 1 minute, cause harmless tremors for 1 minute. You can maintain a number of these devices up to your proficiency bonus at once, and a device stops functioning after 24 hours away from you. You can dismantle the device to reclaim the materials used to create it.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Ugnaught. The Ugnaught language is composed of grunts, squeals, and chatters, and is difficult for other species to learn.</p>

        <img src='https://www.gmbinder.com/images/0XZcHOH.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:142px;mix-blend-mode:darken' />



