  - name: Kaminoan
    _id: PlLA9Z48bGwRTP5G
    text:
      content: |-
        <h2>Kaminoan</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Grey, yellow, blue, green</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Very tall, long limbs, long necks</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>6'4"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>150 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Kamino</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Kaminoan, Galactic Basic</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Kaminoans' evolution from aquatic creatures in the vast oceans of Kamino is reflected in their tall shape, glassy coated eyes, near luminescent skin, and long, thin necks. The almond-shaped eyes of kaminoans are also able to see color in the ultraviolet spectrum. While female kaminoans are bald, males possess headcrests and fin ridges along the rear of their small, bulbous skulls.</p>

        <h3>Society and Culture</h3>

        <p>The kaminoans see themselves as a superior form of life, but nevertheless remained polite to outsiders. To them any species seeking self-improvement is worthy of respect, but those who do not are obviously inferior; self-improvement has a central role in Kaminoan society. Through the development and mastery of selective breeding, genetics, and cloning, the kaminoans were able to overcome a cataclysm that pushed them to the brink of extinction. </p>

        <p>Kaminoans live in a caste based society, determined by the color of the kaminoan's eyes. Gray eyed individuals handle administration and are considered of the highest-level caste; middle castes had yellow eyes and handle the skilled work; and lower castes had blue eyes and perform manual labor and other menial tasks. Although it is extremely rare, kaminoans are sometimes born with green eyes. Those are viewed as genetically inferior and as a threat to the kaminoans' well ordered society and as such are exterminated shortly after birth. </p>

        <h3>Names</h3>

        <p>Kaminoan names typically are composed by around two syllables and a brief surname.</p>

        <p><strong>Male Names.</strong> Lama, Ni, Orun, Koa</p>

        <p><strong>Female Names.</strong> Taun, Ko, Nala, Kina</p>

        <p><strong>Surnames.</strong> Ha, Su, We, Sai, Wa</p>



        <h3>Kaminoan Traits</h3>

        <p>As a kaminoan, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2 and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Kaminoans reach adulthood at 11 years old and live around 100 years.</p>

        <p><strong><em>Alignment.</em></strong> Kaminoans highly organized society lead individuals to tend toward a lawful alignment, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong>  Kaminoans typically stand 7 to 8 feet tall and weigh around 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Geneticist.</em></strong> You have proficiency in the Medicine skill.</p>

        <p><strong><em>Long-Limbed.</em></strong> When you make a melee attack on your turn, your reach for it is 5 feet greater than normal. </p>

        <p><strong><em>Tech Dabbler.</em></strong> You know the <em>temporary boost</em> at-will tech power. Your techcasting ability is Intelligence. You do not require use of a wristpad for this power.</p>

        <p><strong><em>Ultraviolet Sight.</em></strong> Whenever you make a Wisdom (Perception) check related to sight, you are considered to have expertise in the Perception skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kaminoan. Kaminoan is characterized by its flowing water-like sound.</p>

        <img src='https://www.gmbinder.com/images/LmLMqTY.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:227px' />



