  - name: Trakata Form
    _id: TqA4YE5t3PGo6ug2
    text:
      content: |-
        <h2>Trakata Form</h2>

        <p>Trakata Form, also known as Deception Form, capitalizes on a lightweapon's ability to quickly be toggled on and off. Those guardians who focus on Trakata Form perform dazzling tricks with their lightweapon, confusing their opponents before dispatching them.</p>

        <h3>Form Basics</h3>

        <em><strong>Trakata Form:</strong> 3rd level</em><br>

        <p>You gain the Trakata lightsaber form, detailed in Chapter 6 of the Player's Handbook. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Monkey-Lizard</h3>

        <em><strong>Trakata Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter a confusing stance for one minute. As a part of this bonus action, and as a bonus action on each of your turns, when you take the Dodge action, you can make one melee weapon attack against a creature within range. Additionally, when you make this melee weapon attack, you can flourish your weapon to attempt to distract your target. Make a Dexterity (Sleight of Hand) check contested by a Wisdom (Perception) check of the target of your attack. On a success, you make this attack roll with advantage.</p>

        <p>This effect ends early if you are incapacitated or die. Once you use this feature, you can't use it again until you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Trakata Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>Unbalancing Block</h4>

        <p>When you are hit with a melee weapon attack, and you are wielding a lightweapon with which you are proficient, you can use your reaction and expend a use of your Channel the Force to add your Wisdom or Charisma modifier (your choice, minimum of +1) to your AC for that attack, potentially causing the attack to miss you.</p>

        <h3>Duplicitous Force</h3>

        <em><strong>Trakata Form:</strong> 7th level</em><br>

        <p>When you make a Dexterity (Sleight of Hand) check, you gain a bonus to that check equal to your Wisdom or Charisma modifier (your choice, minimum of one).</p>

        <h3>Pass the Blade</h3>

        <em><strong>Trakata Form:</strong> 15th level</em><br>

        <p>When a creature misses you with an attack, you gain temporary hit points equal to your Wisdom or Charisma modifier (your choice, minimum of one), and you add your Wisdom or Charisma modifier (your choice, minimum of one) to the first melee weapon attack and damage rolls you make against that creature before the end of your next turn. </p>



        <h3>Master of Deception</h3>

        <em><strong>Trakata Form:</strong> 20th level</em><br>

        <p>Your skill with a lightweapon is both mesmerizing and confounding. Your Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for these scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic, energy, and ion damage from weapons.</li><li>Your attack rolls can't suffer from disadvantage.</li><li>Whenever a creature misses you with a melee attack, it takes 5 energy damage.</li><li>Whenever a creature hits you with a melee attack, it takes damage equal to half of the damage you take from the attack.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you use this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/qOrHbRd.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:467px' />



