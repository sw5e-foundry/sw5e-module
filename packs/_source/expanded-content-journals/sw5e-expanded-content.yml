  - name: Artillerist Technique (Companion)
    _id: 8hkBjxmm39VvoWSu
    text:
      content: |-
        <h2>Artillerist Technique (Companion)</h2>

        <p></div></p>

        <p>While some scouts choose to foray alone, others like to have support. Followers of the Artillerist Technique master control of militant constructs, laying waste to the battlefield with their expertise</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Artillerist Technique:</strong> 3rd level</em><br>

        <p>You gain proficiency in artillerist's implements.</p>

        <h3>Turret Companion</h3>

        <em><strong>Artillerist Technique:</strong> 3rd, 11th, and 17th level</em><br>

        <p>You learn to apply your knowledge to construct and bond with your own portable turret.</p>

        <p>Create your turret companion as detailed in the Companions section of the Customization Options document for Expanded Content. You must have artillerist's implements in order to create your turret.</p>

        <p>In addition to its traits and features, your turret companion gains additional benefits while it is bonded to you:</p>

        <ul><li>Your turret is a valid target of the <em>tracker droid interface</em> tech power.</li><li>Your turret gains two additional traits. It gains one more additional trait when you reach 11th level in this class. For each turret trait in excess of your proficiency bonus, your tech point maximum is<br> reduced by 1. Over the course of a long<br> rest, you can install, replace, or remove a<br> number of turret traits equal to half<br> your Intelligence modifier (rounded<br> up, minimum of one).</li><li>When you would make a weapon<br> attack, you can let your turret make<br> a weapon attack instead.</li></ul>

        Lastly, while your turret<br> is bonded, within 10 feet<br> of you, and the target of<br> your <em>tracker droid interface</em><br> tech power, when you cast a<br> tech power with a range of 5<br> feet or greater, you can cast it as if<br> you were in your turret's space, and<br> the range increases to 10 feet if it<br> isn't greater.

        Both the range and radius<br> increase to 30 feet at 11th level,<br> and 60 feet at 17th level.

        <h3>Mark of the Artillerist</h3>

        <em><strong>Artillerist Technique:</strong> 3rd level</em><br>

        <p>Once per round, when your turret deals damage to the target of your Ranger's Quarry, you can roll your Ranger's Quarry die and add it to the damage roll.</p>

        <h3>Crisis Management</h3>

        <em><strong>Artillerist Technique:</strong> 7th level</em><br>

        <p>While you can see your turret, it can add half its proficiency bonus to any saving throws it makes that doesn't already include it.</p>

        <h3>Double Up</h3>

        <em><strong>Artillerist Technique:</strong> 11th level</em><br>

        <p>When you deal damage to a creature with a weapon or tech power, your turret has advantage on the next attack roll it makes against the creature or it has disadvantage on the first saving throw it makes against an effect your turret controls before the start of your next turn. When your turret deals damage to a creature, you have advantage on your next attack roll against the creature or it has disadvantage on the first saving throw it makes against an effect you control before the start of your next turn.</p>

        <h3>Battlefront</h3>

        <em><strong>Artillerist Technique:</strong> 15th level</em><br>

        <p>When you use your Combat Tech feature, both you and your turret can each make one weapon attack as part of the same bonus action.</p>

