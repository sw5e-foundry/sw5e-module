  - name: Scrapper Practice
    _id: HR3ZKNZd88AZAQMw
    text:
      content: |-
        <h2>Scrapper Practice</h2>

        <p>Those operatives who choose the Scrapper Practice don't have the time or patience for the fair fight. They utilize close-quarters blaster combat blended with underhanded tactics to surprise and disable their foes.</p>

        <h3>Back Blast</h3>

        <em><strong>Scrapper Practice:</strong> 3rd level</em><br>

        <p>You gain proficiency in all blasters with the burst or rapid property that lack the two-handed property. Additionally, when a creature fails a saving throw against the burst or rapid property of a weapon you control and with which you are proficient, you can apply your Sneak Attack damage to one creature dealt damage in this way as long as that creature didn't have advantage on the save.</p>

        <p>When you reach 9th level in this class, when multiple creatures fail a saving throw against the burst property of a weapon you control and with which you are proficient, you can divide your Sneak Attack dice amongst the targets as you see fit.</p>

        <h3>Upper Hand</h3>

        <em><strong>Scrapper Practice:</strong> 3rd level</em><br>

        <p>You learn to use underhanded tactics to gain the upper hand. When you deal Sneak Attack damage to a creature, you may choose to forgo two of your Sneak Attack Dice in order to perform an upper hand technique.</p>

        <p>Some of your upper hand techniques require your target to make a saving throw to resist the technique's effects. The saving throw DC is calculated as follows: </p>

        <hr>

        <div class="sw5e-book-block"><strong>Upper Hand save DC</strong> = 8 + your proficiency bonus + <br>your Charisma modifier</div>

        <hr>



        <h4>Brutal Hit</h4>

        <p>You attempt to knock the target prone while within 15 feet of it. The target must make a Strength saving throw or be knocked prone.</p>

        <h4>Low Blow</h4>

        <p>You attempt to stun the target while within 15 feet of it. The target must make a Constitution saving throw or be stunned until the start of its next turn.</p>

        <h4>Shank Shot</h4>

        <p>You attempt to hamper the target while within 15 feet of it. The target must make a Dexterity saving throw. If it fails, its movement speed is to 0 and it makes Dexterity saving throws with disadvantage until the end of its next turn.</p>

        <h3>Sleight of Foot</h3>

        <em><strong>Scrapper Practice:</strong> 9th level</em><br>

        <p>When a creature moves to within 5 feet of you, you can use your reaction to move up to half your speed away from the creature without provoking opportunity attacks. You must end this movement further from the creature than you started.</p>

        <h3>Hostile Negotiations</h3>

        <em><strong>Scrapper Practice:</strong> 13th level</em><br>

        <p>You gain proficiency in Intimidation or Persuasion. Additionally, while you are wielding a weapon with which you are proficient, you can't have disadvantage on Charisma (Intimidation) and Charisma (Persuasion) checks, and if the target would make a contested check, they can't have advantage on it.</p>

        <h3>Double Tap</h3>

        <em><strong>Scrapper Practice:</strong> 17th level</em><br>

        <p>You can deal Sneak Attack damage twice per turn, but you can't deal more than your total Sneak Attack dice to a single target per turn.</p>

        <img src='https://www.gmbinder.com/images/GHT4jiF.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:770px' />



