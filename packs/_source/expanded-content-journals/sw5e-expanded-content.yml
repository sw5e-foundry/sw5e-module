  - name: Patrolian
    _id: 986B51bCuA3niXG5
    text:
      content: |-
        <h2>Patrolian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Blue-purple to green</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Light to dark red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Fin-like limbs, pastel-color scales</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>2'8"</td><td>+2d4"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>35 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Patrolia</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Patrolian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Patrolians are fish-like in appearance, covered in pale, pastel-colored scales and possessing numerous fins on their long limbs and face, as well as a notable dorsal fin which often require modified clothing to accommodate. </p>

        <p>Thanks to their gills, patrolians are perfectly comfortable breathing underwater as well as on land, and their physiology is also notoriously resistant to electric shocks�both likely throwbacks to evolution on their native homeworld of Patrolia.</p>

        <h3>Society and Culture</h3>

        <p>Patrolians are a notably innovative and resourceful species, and many of their number have found their way into roles in the construction, maintenance and sale of technology. </p>

        <p>Unfortunately, patrolians tend to pursue these businesses in a shady manner, and most tend to operate such ventures in the criminal underworld, working as bounty hunters, thieves, fences, slicers and other such technically-demanding criminal roles. </p>

        <p>This inclination towards crime stems from their homeworld, which is perpetually stalled in a state of economic decay due to wartime. With the advent of multiple wars fought in the system, different armies continue to see the aquatic world as a strategic bulwark in the region. Because of this, patrolians have to find work not only off-world, but typically in fields not falling under governmental purview; unfortunately, criminal activities are the most common path. </p>

        <h3>Names</h3>

        <p>Patrolian names are usually multisyllabic and sing-songy with lots of open vowels and few fricatives. Patrolians are not known to use family names or other surnames.</p>

        <p><strong>Male Names.</strong> Dalladu, Feddi, Nogagai, Teconica</p>

        <p><strong>Female Names.</strong> Kakeda, Machibido, Rinimma, Talla</p>



        <h3>Patrolian Traits</h3>

        <p>As a patrolian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Dexterity or Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Patrolians reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Patrolians' greedy, scheming nature causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Patrolians typically stand just over 3 feet tall and generally weigh about 40 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Conniving.</em></strong> You have proficiency in Deception or Stealth (your choice). </p>

        <p><strong><em>Darkvision.</em></strong> Accustomed to life underwater, you have superior vision in low light conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Electrical Resistance.</em></strong> Patrolians are notably capable of shrugging off electricity. You have resistance to lightning damage.</p>

        <p><strong><em>Specialist.</em></strong> You have proficiency in one specialist's kit of your choice.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 25 feet.</p>

        <p><strong><em>Technician.</em></strong> You are proficient in the Technology skill.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Patrolian. Patrolian is a high-energy language, consisting mostly of gurgles and skittish vocalizations. Patrolian, even when spoken on land, sounds like it's being spoken underwater. </p>

        <img src='https://www.gmbinder.com/images/BI9NFuF.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:180px' />



