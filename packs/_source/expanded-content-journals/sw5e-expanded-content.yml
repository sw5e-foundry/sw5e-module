  - name: Survivor
    _id: FqsLUlnMwWeeWseg
    text:
      content: |+
        <h2>Survivor</h2>

        <p></div></p>

        <p>You are haunted by something so terrible that you dare not speak of it. You've tried to bury it and run away from it, to no avail. Whatever this thing is that haunts you can't be slain, a ghost in the dark, a bloodcurdling nightmare, or a memory that refuses to die. The burden has taken its toll, isolating you from most people and making you question your sanity. You must find a way to overcome it before it destroys you.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Investigation, Lore, Survival, and Technology</li><li><strong>Tool Proficiencies:</strong> Your choice of artist's implements, biotech's implements, or brewer's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, one tool with which you are proficient, a tattered journal, and a belt pouch containing 100 cr</li></ul>

        <h4>Source of Dismay</h4>

        <p>What dire event molded you into who you are today?</p>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Source of Dismay</th></tr></thead><tbody><tr><td>1</td><td>A creature that slaughtered dozens of innocent people spared your life, and you don't know why.</td></tr><tr><td>2</td><td>An apparition that has haunted your family for generations now haunts you, unrelentingly.</td></tr><tr><td>3</td><td>Your family has a history of practicing dark sorcery or alchemy. You dabbled once and felt something horrible clutch at your mind, whereupon you fled in terror.</td></tr><tr><td>4</td><td>A stranger took your sibling one cold, dark night, and you were unable to stop it.</td></tr><tr><td>5</td><td>You were drastically changed physically by an accident and are haunted by what you once were.</td></tr><tr><td>6</td><td>A cultist kidnapped and raised you. You escaped, but they still have a mental hold over you.</td></tr></tbody></table>

        <h3>Feature: Heart of Darkness</h3>

        <p>Those who look into your eyes can see that you have faced unimaginable horror and that you are no stranger to darkness. Though they might fear you, commoners will extend you every courtesy and do their utmost to help you. Unless you have shown yourself to be a danger to them, they may even take up arms to fight alongside you, should you find yourself facing an enemy alone.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Investigator</td></tr><tr><td>2</td><td>Loremaster</td></tr><tr><td>3</td><td>Survivalist</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Total Reconstruction</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Survivors live through some traumatic event that shapes and defines them.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I don't run from evil. Evil runs from me.</td></tr><tr><td>2</td><td>I like to read and memorize poetry. It keeps me calm and brings me fleeting moments of happiness.</td></tr><tr><td>3</td><td>I spend money freely and live life to the fullest, knowing that tomorrow I might die.</td></tr><tr><td>4</td><td>I live for the thrill of the hunt.</td></tr><tr><td>5</td><td>I don't talk about the thing that torments me. I'd rather not burden others with my curse.</td></tr><tr><td>6</td><td>I expect danger around every corner.</td></tr><tr><td>7</td><td>I refuse to become a victim, and I will not allow others to be victimized.</td></tr><tr><td>8</td><td>I put no trust in authority.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Honor.</strong> I try to help those in need, no matter what the personal cost. (Light)</td></tr><tr><td>2</td><td><strong>Vengeance.</strong> I'll stop the spirits that haunt me or die trying. (Any)</td></tr><tr><td>3</td><td><strong>Fury.</strong> I kill monsters to make the world a safer place, and to exorcise my own demons. (Light)</td></tr><tr><td>4</td><td><strong>Entitlement.</strong> I have a dark calling that puts me above the law. (Chaotic)</td></tr><tr><td>5</td><td><strong>Focus.</strong> I like to know my enemy's capabilities and weaknesses before rushing into battle. (Lawful)</td></tr><tr><td>6</td><td><strong>Selfish.</strong> I'm a monster that destroys other monsters, and anything else that gets in my way. (Dark)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I keep my thoughts and discoveries in a journal. My journal is my legacy.</td></tr><tr><td>2</td><td>I would sacrifice my life to protect the innocent.</td></tr><tr><td>3</td><td>My torment drove away the person I love. I strive to win back the love I've lost.</td></tr><tr><td>4</td><td>A terrible guilt consumes me. I hope that I can find redemption through my actions.</td></tr><tr><td>5</td><td>There's evil in me, I can feel it. It must never be set free.</td></tr><tr><td>6</td><td>I have a child to protect. I must make the world a safer place for him (or her).</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I have certain rituals that I must follow every day. I can never break them.</td></tr><tr><td>2</td><td>I assume the worst in people.</td></tr><tr><td>3</td><td>I feel no compassion for the dead. They're the lucky ones.</td></tr><tr><td>4</td><td>I have an addiction.</td></tr><tr><td>5</td><td>I am a purveyor of doom and gloom who lives in a world without hope.</td></tr><tr><td>6</td><td>I talk to spirits that no one else can see.</td></tr></tbody></table>

