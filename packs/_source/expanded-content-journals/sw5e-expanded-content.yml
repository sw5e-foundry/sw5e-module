  - name: Servant
    _id: AaXQQ4KEYa0Im08p
    text:
      content: |+
        <h2>Servant</h2>

        <p>You have lived much of your life in the service of a lord, noble, merchant, or someone else with much wealth or power. You fetched their coats, drove their chariots, pressed their clothes; and generally did what they asked you to do. </p>

        <p>Were you a highly respected butler? A simple scullery maid? Were you born into service, or did you join later? Were you close to your master or masters, or were they distant and cold? Did they treat you well, or beat you at the drop of a hat? </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Lore, Performance, and Persuasion </li><li><strong>Tool Proficiencies:</strong> One of your choice </li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A noble symbol representing your employer, a set of artisan's implements (one of your choice), a set of nice clothes, a set of common clothes, and a belt pouch containing 100 cr</li></ul>

        <h3>Feature: Decorum</h3>

        <p>You know how to carry yourself around the elite and their servants. When in the presence of someone of power, or the servants of such a person, you can easily act as if you belong and, barring any extremely outlandish behavior, you can pass off your companions as belonging, too.  </p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Loremaster</td></tr><tr><td>3</td><td>Performer</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Entertainer</td></tr><tr><td>7</td><td>Specialist</td></tr><tr><td>8</td><td>Linguist</td></tr></tbody></table></div>

        <h4>Suggested Characteristics </h4>

        <p>A servant, for better or worse, will have their personality affected by their years of servitude. </p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I am compulsively neat, and clean; I feel uncomfortable if my companions and I are ever dirty or  unpresentable.</td></tr><tr><td>2</td><td>I am a bit of a snob, and look down on the common rabble.</td></tr><tr><td>3</td><td>I am extremely subservient; I rarely raise my voice or object.</td></tr><tr><td>4</td><td>I may be quite calm and polite around those of higher power than I; but I'm harsh towards all my underlings, flexing the little power I have.</td></tr><tr><td>5</td><td>I dote over my companions like a concerned mother bird, fixing their clothing and making sure they look nice.</td></tr><tr><td>6</td><td>I hated my time as a servant, and go out of my way to enjoy myself and let loose, rarely holding my tongue.</td></tr><tr><td>7</td><td>I rarely show any emotions, remaining calm and stoic even in the worst of situations.</td></tr><tr><td>8</td><td>I can-or think I can-diffuse the most tense and stressful of situations with the right word or phrase.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Service.</strong> Your wish is my desire. (Lawful)</td></tr><tr><td>2</td><td><strong>Helpful.</strong> I just enjoy making myself useful. (Light)</td></tr><tr><td>3</td><td><strong>Free.</strong> Noone should be bound in servitude. (Chaotic)</td></tr><tr><td>4</td><td><strong>Infiltrate.</strong> From the position of a servant, I can worm my way into places of power! (Dark)</td></tr><tr><td>5</td><td><strong>Payment.</strong> I don't care what my masters do; as long as I get paid. (Neutral)</td></tr><tr><td>6</td><td><strong>Live.</strong> I only wish to serve in peace. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I am still loyal to my old master.</td></tr><tr><td>2</td><td>The Lord I worked for is after my head, and will do anything to capture me.</td></tr><tr><td>3</td><td>My family still live as servants; I hope to earn a better life for them.</td></tr><tr><td>4</td><td>An older servant taught me the ropes and looked out for me; and I owe them a great debt.</td></tr><tr><td>5</td><td>I will exact revenge on the bastards who ruined (or ended) my Master's life.</td></tr><tr><td>6</td><td>I have plenty of friends in high places; and they've come in useful from time to time.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I become incredibly nervous around people of power and importance.</td></tr><tr><td>2</td><td>Saying that I'm a little bossy is a bit of an understatement.</td></tr><tr><td>3</td><td>I can be a sycophant, constantly fawning and flattering others; which can come off as shallow.</td></tr><tr><td>4</td><td>I've lived a relatively pampered life; the world of commoners is dull and painful to me.</td></tr><tr><td>5</td><td>I never speak for myself, letting others walk all over me.</td></tr><tr><td>6</td><td>I often can seem stiff, old fashioned and generally a stick in the mud.</td></tr></tbody></table>

