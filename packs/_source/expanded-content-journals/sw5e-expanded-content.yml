        <h4>Byrothsis Adept Cell</h4>

        <em><strong>Lightweapon modification</strong> (cell), <font style="color:purple"><strong>advanced</strong></font></em><br>

        <p>When this weapon is levitated by the Force to deal damage through a class feature or force power you use, it deals additional damage equal to one of its weapon damage dice.</p>

        <h4>Byrothsis Ancient Cell</h4>

        <em><strong>Lightweapon modification</strong> (cell), <font style="color:red"><strong>artifact</strong></font></em><br>

        <p>When this weapon is levitated by the Force to deal damage through a class feature or force power you use, it deals additional damage equal to two of its weapon damage dice.</p>

        <h4>Dexterous Ascendancy Cell</h4>

        <em><strong>Lightweapon modification</strong> (cell), <font style="color:red"><strong>artifact</strong></font></em><br>

        <em><strong>Prerequisite:</strong> Lacks two-handed or versatile property</em><br>

        <p>This weapon gains the finesse property, and its dexterity number is reduced by four steps (from 19 to 11). If the dexterity number is 17 or lower, this modification removes the dexterity property from it entirely.</p>

        <h4>Dexterous Dueling Cell</h4>

        <em><strong>Lightweapon modification</strong> (cell), <font style="color:blue"><strong>prototype</strong></font></em><br>

        <em><strong>Prerequisite:</strong> Lacks two-handed or versatile property</em><br>

        <p>This weapon gains the finesse property, and its dexterity number is reduced by one step (from 19 to 17, 17 to 15, 15 to 13, or 13 to 11). If the dexterity number is 11, this modification removes the dexterity property from it entirely.</p>

        <h4>Dexterous Mastery Cell</h4>

        <em><strong>Lightweapon modification</strong> (cell), <font style="color:purple"><strong>advanced</strong></font></em><br>

        <em><strong>Prerequisite:</strong> Lacks two-handed or versatile property</em><br>

        <p>This weapon gains the finesse property, and its dexterity number is reduced by two steps (from 19 to 15, 17 to 13, or 15 to 11). If the dexterity number is 13 or lower, this modification removes the dexterity property from it entirely.</p>

