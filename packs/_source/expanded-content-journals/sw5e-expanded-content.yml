  - name: Disabling Practice
    _id: UA6l2D8sQqUf8Izt
    text:
      content: |+
        <h2>Disabling Practice</h2>

        <p>Those operatives who choose the Disabling Practice utilize a variety of pushes, pulls, weight shifts, and joint locks to immobilize their opponent. They use these techniques to manipulate their opponent, moving them across the battlefield before incapacitating them.</p>

        <h3>Clinch Strike</h3>

        <em><strong>Disabling Practice:</strong> 3rd level</em><br>

        <p>You learn how to discourage, debilitate, and harm your enemies. You gain the following benefits while you aren't wearing heavy armor or wielding a medium or heavy shield:</p>

        <ul><li>Your damage die for your unarmed strikes and natural weapons increases by one step (from 1 to d4, d4 to d6, or d6 to d8), and you can apply your Sneak Attack damage when you hit with an unarmed strike even if it doesn't have the finesse property.</li><li>You don't need advantage on your attack roll to use your Sneak Attack if the target of your Sneak Attack is a creature grappled by you. All the other rules for the Sneak Attack class feature still apply to you.</li><li>You can use the bonus action granted by your Cunning Action to make an unarmed strike against a creature you are grappling.</li></ul>

        <h3>Skilled Grappler</h3>

        <em><strong>Disabling Practice:</strong> 3rd level</em><br>

        <p>You learn a number of grappling techniques to subdue your opponents. When you hit a creature grappled by you with an unarmed strike and deal Sneak Attack damage, you may choose to forgo two of your Sneak Attack dice to make the attack a grappling technique.</p>

        <p>Some of your grappling techniques require your target to make a saving throw to resist the grappling technique's effects. The saving throw DC is calculated as follows: </p>

        <hr>

        <div class="sw5e-book-block"><p><strong>Grapple Technique save DC</strong> = 8 + your proficiency bonus + your Strength modifier</p></div>

        <hr>

        <h4>Constrict</h4>

        <p>You attempt to choke the target into unconsciousness. The target must make a Constitution saving throw or be restrained until the end of your following turn.  </p>

        If you maintain this technique for 1 minute,<br> the target falls unconscious for 1 hour. Droids and constructs can not be knocked unconscious in this<br> way.

        <h4>Disarm</h4>

        You attempt to disarm a weapon or other object<br> the target is holding. The target must make a Strength saving throw. On a failed save, it releases the object. If you have a free hand, you can catch the object. Otherwise, it lands at your feet.



        <h4>Hip Toss</h4>

        <p>You attempt to throw your target to the ground. The target must make a Dexterity saving throw. On a failed save, the target is pushed back 5 feet, knocked prone, and stunned until the start of your next turn. This ends the grapple.</p>

        <h3>Human Shield</h3>

        <em><strong>Disabling Practice:</strong> 9th level</em><br>

        <p>You learn to manipulate the body of a grappled target to make attacks against you more difficult to land. Moving a grappled creature the same size as you or smaller no longer halves your speed, and when a creature grappled by you would grant you half cover, you instead have three-quarters cover. Additionally, when you are hit by an attack while grappling a creature, you can use your reaction to force that attack to instead hit the grappled creature.</p>

        <h3>Kiss the Wall</h3>

        <em><strong>Disabling Practice:</strong> 13th level</em><br>

        <p>You can use your surroundings to further punish the target of your grapple. When you roll a 1 or 2 on a Sneak Attack damage die for an unarmed strike you make against a creature grappled by you, you can reroll the die and must use the new roll, even if the new roll is a 1 or a 2.</p>

        <h3>Neck Snap</h3>

        <em><strong>Disabling Practice:</strong> 17th level</em><br>

        <p>You learn how to immediately remove your grappled opponent from the fight. As an action, you can force a creature grappled by you to make a Constitution saving throw. On a failed save, if the creature has 100 hit points or fewer, it dies. If the target has more than 100 hit points, it immediately takes 10d10 true damage. </p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <img src='https://www.gmbinder.com/images/1R5mZA5.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:400px' />

