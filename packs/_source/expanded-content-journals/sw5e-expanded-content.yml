  - name: Stinger
    _id: ZTMw7HBVZwnZ0ygV
    text:
      content: |-
        <h4>Stinger</h4>

        <p><em>At-will tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> 1 round</li></ul>

        <p>You fire a stinging dart at a creature within range. Make a ranged tech attack against the target. On a hit, the target takes 1d8 poison damage, and if the target is a humanoid or beast, it can't regain hit points until the start of your next turn.</p>

        <p>This power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).</p>
