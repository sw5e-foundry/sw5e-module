  - name: Lethality Practice
    _id: aI9kl2bavmHu6GFK
    text:
      content: |+
        <h2>Lethality Practice</h2>

        <p>Those operatives who choose the Lethality Practice use disguises to get close to their enemies, then leverage the toxic power of poisons to debilitate them and capitalize on their weaknesses. </p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Lethality Practice:</strong> 3rd level</em><br>

        <p>You gain proficiency with the disguise kit and the poisoner's kit.</p>

        <h3>Assassinate</h3>

        <em><strong>Lethality Practice:</strong> 3rd level</em><br>

        <p>You are at your deadliest when you get the drop on your enemies. You have advantage on attack rolls against any creature that hasn't taken a turn in the combat yet. Additionally, any hit you score against a creature that is surprised is a critical hit.</p>

        <h3>Lethal Strikes</h3>

        <em><strong>Lethality Practice:</strong> 3rd level</em><br>

        <p>You learn how to read your foes and strikes their weak points. When you deal Sneak Attack damage to a creature, you may choose to forgo two of your Sneak Attack dice to make the attack a lethal strike. </p>

        <p>Some of your lethal strikes require your target to make a saving throw to resist the lethal strike's effects. The saving throw DC is calculated as follows: </p>

        <hr>

        <div class="sw5e-book-block"><strong>Lethal Strike save DC</strong> = 8 + your proficiency bonus + <br>your Dexterity modifier</div>

        <hr>

        <h4>Priming Attack</h4>

        <p>You attempt to prime the target. The target must make a Dexterity, Constitution, or Wisdom saving throw (your choice). On a failed save, the next time you deal Sneak Attack damage against the target before the end of your next turn, you roll four additional Sneak Attack dice.</p>

        <h4>Target Assessment</h4>

        <p>You attempt to infer crucial details about your foe. The creature must make a Charisma saving throw. On a failed save, the GM tells you two of the following characteristics of your choice:</p>

        <ul><li>Highest ability score</li><li>Lowest ability score</li><li>Strongest saving throw</li><li>Weakest saving throw</li></ul>

        <h4>Vulnerable Strike</h4>

        <p>You attempt to stagger the target. The target must make a Wisdom saving throw. On a failed save, the next time you would make an attack roll against the target before the end of your next turn, you can instead force the target to make a saving throw with the ability score of your choice. On a failed save, the creature takes normal weapon damage and you can apply your Sneak Attack dice to the roll.</p>



        <h3>Poisoner</h3>

        <em><strong>Lethality Practice:</strong> 9th level</em><br>

        <p>You are a master of poisons. You can apply a poison as a bonus action, and you have advantage on Dexterity (Sleight of Hand) checks made to conceal the application of poisons. </p>

        <p>Additionally, you can improve the capability of one dose of poison. To use this benefit, you must have a poisoner's kit, and the poison must be within reach. If the poison is applied before the end of your next short or long rest, the target has disadvantage on the saving throw made to resist your poison. Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h3>Impostor</h3>

        <em><strong>Lethality Practice:</strong> 13th level</em><br>

        <p>You gain the ability to unerringly mimic another person's speech, writing, and behavior. You must spend at least 1 minute studying these three components of the person's behavior: listening to speech, examining handwriting, and observing mannerisms. If you can only study some of these aspects (such as only having writing samples, or only audio recordings), you can mimic that aspect of the person, but not other aspects you have not studied.</p>

        <p>Your ruse is indiscernible to the casual observer. If a wary creature suspects something is amiss, you have advantage on any Charisma (Deception) check you make to avoid detection.</p>

        <h3>Death Strike</h3>

        <em><strong>Lethality Practice:</strong> 17th level</em><br>

        You've become a<br> master of instant<br> death. When you<br> deal weapon<br> damage to a<br> creature that is<br> surprised, it must<br> make a Constitution<br> saving throw against<br> your lethal strike<br> save DC. On a <br>failed save, double<br> the damage of<br> your attack against<br> the creature.

