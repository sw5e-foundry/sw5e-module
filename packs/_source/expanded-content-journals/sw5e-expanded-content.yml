  - name: Liberation
    _id: YhZiwzmyuJhkIfNk
    text:
      content: |-
        <h3>Liberation</h3>

        <p>Your destiny is to liberate a group, population, or region from Imperial domination. The focus of this destiny can range from a persecuted group - a small alien enclave, a remote town, or an orbital installation - all the way to a city, a starport, or even an entire planet. For instance, a hero might endeavour to free a planet's governing legislature, which has been previously relocated to a well-guarded penal camp by a hard-line Imperial governor to silence its dissenting view. As another example, they could attempt to wrest control of a starship construction facility from the Empire by influencing the worker population to revolt, supplying arms and equipment, and leading them in a mutiny. Achieving this objective usually requires organizing resistance to Imperial forces that are persecuting the local populace, destroying key installations or assets, or deterring or eliminating personnel that are vital for the Empire to maintain its oppressive grip.</p>

        <h4>Destiny Fulfilled</h4>

        <p>You gain a permanent +1 destiny bonus to saving throws.</p>
