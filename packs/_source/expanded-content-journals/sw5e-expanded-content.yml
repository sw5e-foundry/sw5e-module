  - name: Major Corruption
    _id: 6eRmPLTtv1z3a5vq
    text:
      content: |-
        <h3>Major Corruption</h3>

        <p>At certain tiers of Dark Points, as shown in the Force Alignment table, you manifest a Major Corruption.</p>

        <h4>Tier I</h4>

        <p>You have advantage on Charisma (Intimidation) checks and disadvantage on Wisdom (Insight) checks made against creatures with a higher Wisdom score than you.</p>

        <h4>Tier II</h4>

        <p>You have advantage on saving throws against being frightened, and disadvantage on saving throws against being charmed.</p>

        <h4>Tier III</h4>

        <p>You have advantage on saving throws made against dark side force powers. Additionally, when you receive healing from light side force powers, you only regain half the amount of hit points.</p>

        <h4>Tier IV</h4>

        <p>Casting dark side force powers of 1st level or higher costs 1 fewer force point, but casting light side powers of 1st level or higher costs 1 more.</p>

        <h4>Dark Entity (Tier V)</h4>

        <p>You have become a physical manifestation of the dark side of the Force, gaining one of the following boons. Your GM can choose the boon for you, or roll a die to determine it randomly.</p>

        <div class="sw5e-book-block"><p>| d6 | Boon   | |:-:|:---| | 1 | Deathbringer | | 2 | Invincibility | | 3 | Irresistible Offense | </p>

        <p>| d6 | Boon   | |:-:|:---| | 4 | Quick Casting | | 5 | Recovery | | 6 | Power Mastery |</p></div>

        <p>&emsp;<strong><em>Deathbringer.</em></strong> Your maximum force points increases by 10.</p>

        <p><strong><em>Invincibility.</em></strong> When you take damage from any source, you can reduce that damage to 0. Once you've used this boon, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Irresistible Offense.</em></strong> You can bypass the damage resistances of any creature.</p>

        <p><strong><em>Quick Casting.</em></strong> Choose one dark side force power you know of 1st through 3rd level that has a casting time of 1 action. That power's casting time is now 1 bonus action for you.</p>

        <p><strong><em>Recovery.</em></strong> You can use a bonus action to recover a number of hit points equal to half your hit point maximum. Once you use this boon, you can't use it again until you finish a long rest.</p>

        <p><strong><em>Power Mastery.</em></strong> Choose one 1st-level dark side power that you can cast. You can now cast that power at its lowest level without expending force points.</p>



        <div class='wide'>
