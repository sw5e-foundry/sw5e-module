    _id: 6Zgjmu7ZV3R1YEKt
    text:
      content: |-
        <h4>Deathseek</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When an attack made against the target of your Critical Analysis that you can see would miss, you can use a reaction and expend a superiority die and roll it to force the creature to instead take the hit. The creature must make a Wisdom saving throw. On a failed save, the target takes the minimum damage the attack could have dealt plus additional damage equal to the roll.</p>
