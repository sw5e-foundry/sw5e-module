  - name: Multiclassing Extra Attack
    _id: 2zGgWyGiTpIUd7jA
    text:
      content: |-
        <h3>Multiclassing Extra Attack</h3>

        <p>If using this variant rule, you might consider allowing characters who multiclass in classes with the Extra Attack feature to add their class levels together to gain that feature. Their combined level in those classes must satisfy the level requirement in both classes to receive this benefit, however. </p>

        <p>For instance, a character with 2 levels in fighter and 3 levels in berserker would be eligible for Extra Attack, since their combined levels would meet the 5th-level requirement for Extra Attack in both classes. </p>

        <p>On the other hand, a character with 2 levels in fighter and 3 levels in armormech engineer, would not be eligible for Extra Attack, since their combined levels levels don't meet the 6th-level requirement for Extra Attack in armormech engineer. If that character gains an additional level in either class, or a level in another class with the Extra Attack feature, however, they would now meet the requirements for Extra Attack in all three classes, and thus would gain the feature.</p>

        <p>If a class or archetype has a restriction to their Extra Attack feature, such as armormech engineer requiring that you are wearing your modified armor or wielding your modified shield to gain the benefit, the character must meet that requirement to gain the benefits of Extra Attack while multiclassing.</p>

        <h4>Greater Extra Attack</h4>

        <p>No characters should receive the Greater Extra Attack feature through this multiclassing variant, since that feature is exclusive to fighter.</p>

