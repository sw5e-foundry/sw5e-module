  - name: Destruction
    _id: S0ACIXOpZAYgPAmS
    text:
      content: |+
        <h3>Destruction</h3>

        <p>Your destiny is to destroy a person or object, for good or evil. A Rebel agent's destiny might be to destroy a tyrannical Imperial Moff presiding over his home planet, while a darkside may be destined to destroy a powerful Jedi training site used to bolster the ranks of the Jedi order. The target of this destiny should be something very difficult to reach, either because it's heavily guarded or well hidden. Example of this destiny include Darth Vader's destruction of the Emperor, Lando Calrissian's destruction of the Death Star II, or A-wing pilot Arvel Crynyd's destruction of the <em>Executor</em>.</p>

        <h4>Destiny Fulfilled</h4>

        <p>Increase one ability score of your choice by +2.</p>

