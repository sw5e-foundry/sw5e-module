  - name: Squib
    _id: 4K5wBrDPq7y9xHnq
    text:
      content: |-
        <h2>Squib</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Pink</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>White, gray, black, brown, blue, violet, or red</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue, yellow, red, or brown</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Curious, overconfident, hagglers</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>2'11"</td><td>+2d4"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>45 lb.</td><td>x1 lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Skor II</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Squibbian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        Squibs are small, sentient, humanoid mammals with both rodent and canine characteristics. Their pink skin is covered in fur that offers some protection from cold weather, but, more importantly, it serves as an<br> olfactory organ, able to pick up scents at a distance<br> and ascertain intrinsic details�such as penetrating<br> through a disguise or identifying a forgery�when<br> rubbed against. The species has both male and female<br> sexes, although non-Squibs often have difficulty<br> determining the sex of a Squib based on appearance<br> alone. Their mouths are full of forbidding, sharp, white<br> teeth, and their flexible cheeks were capable of storing<br> items.

        <h3>Society and Culture</h3>

        <p>Squibs are friendly and cheerful to such an extent that, over time, they are considered quite annoying. Squibs are inherently curious, handling items with little regard to care. They are unabashed pack rats, and they wear clothing for the excess storage rather than necessity. The Squibs' overconfidence is a defining trait. The typical Squib response to a threat is not to fight or flee, but to bluff and bluster, especially when not face-to-face. In person, their sharp teeth are their favored means of intimidation. Squibs believe that bargaining is the highest form of communication, and they believe haggling is more important than the goods themselves. A deal is a binding oath to Squibs, and they are incredibly loyal to their business partners.</p>

        <h3>Names</h3>

        <p>Squibs combine their first and last names, which are familial, into one long, hyphenated name. They often go by nicknames derived from their full names. Male and female names do not significantly deviate.</p>

        <p><strong>Full Names.</strong> Galaneever-marmalios, Meelawin-demort, Sleerinwilpher-remalior</p>

        <p><strong>Nicknames.</strong> Galan, Meela, Wilpher</p>



        <h3>Squib Traits</h3>

        <p>As a squib, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Squibs reach adulthood at nine years of age and live an average of sixty-five years.</p>

        <p><strong><em>Alignment.</em></strong> Squibs' cheerful nature causes them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Squibs typically stand 3 to 3 and a half feet tall and weigh around 50 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Bite.</em></strong> Your sharp teeth are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Business Savvy.</em></strong> A common trait of all Squibs is their desire and love of haggling. Squibs believe a deal is done when both sides believe they got the better of the other. Whenever you make a Charisma (Persuasion) check involving haggling you are considered to have expertise in the Persuasion skill.</p>

        <p><strong><em>Flexible Cheeks.</em></strong>  Squibs have flexible cheeks in which they can store small goods. You can store up to two items that weigh a combined total of no more than 2 lb. in your cheeks, and you have advantage on Dexterity (Sleight of Hand) checks made to conceal them.</p>

        <p><strong><em>Hide.</em></strong> Your thick hide is naturally adapted to cold climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Sensitive Fur.</em></strong> Squibs' fur is exceptionally sensitive to physical details. You have advantage on Intelligence (Investigation) checks that rely on touch.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Squibbian. The Squibbian language originated as a secret form of communication for Squibs to convey information without being understood.</p>

        <img src='https://www.gmbinder.com/images/QqLGFKE.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:290px' />



