  - name: Dichotomous Characters
    _id: 90kX4AKHWdkPWPoB
    text:
      content: |-
        <h3>Dichotomous Characters</h3>

        <p>Instead of your character leveling in two classes simultaneously, you can have your character level in one class, but with two archetypes from that class.</p>

        <p>When a character reaches third level, they gain an archetype of their choice for their chosen class. Using this variant, they instead can choose two. At each level within that class that they would gain archetype features, they gain the features for both archetypes. If archetypes offer features that conflict, it's up to the GM to determine how those features interact.</p>

        <p>Alternatively, you can have a dichotomous character choose the features of only one archetype at a given level, rather than both, allowing the player to mix and match archetype features.</p>

        <h4>Multiclassing</h4>

        <p>If a dichotomous character multiclasses, and reaches third level in two or more classes, it's up to the GM to determine whether they gain multiple archetypes in each class, or only in one.</p>
