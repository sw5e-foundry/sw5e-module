  - name: Called Shots
    _id: EsQtm48wN4sJPR3g
    text:
      content: |-
        <h2>Called Shots</h2>

        <p></div></p>

        <p>Often times, in combat, characters might want to target a specific body part or feature of their target when making an attack. This is commonly referred to as a "called shot." If this is a mechanic you want to implement in your game, consider using the following variant rule.</p>
