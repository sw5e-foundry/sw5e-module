  - name: Echani
    _id: 62v8CqqbjjYuycs8
    text:
      content: |-
        <h2>Echani</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Pale tones</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>White</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Silver</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Fair skin, white hair and eyes, remarkable familial similarity.</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'1"</td><td>+1d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>105 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Eshan</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Galactic Basic</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Echani are characterized by their white skin, hair, and eyes, and their remarkable tendency to look very much alike one another to outside observers, particularly amongst family members. It is thought that their origins stem from Arkanian experimentation on the human genome, a hypothesis that could explain their physical conformity.</p>

        <h3>Society and Culture</h3>

        <p>A matriarchal, caste-based society originating from the Inner Rim world of Eshan, the echani spread to encompass a confederacy of six worlds including Bengali and Thyrsus, known as the Six Sisters, governed by the all-female Echani Command. </p>

        <p>Echani generals are sometimes seen by others as having the ability to predict their opponent's next move. This is no biologicial trait inherent to the species, but rather stems from the fact that combat is so ingrained into every level of echani culture; the echani hold to the idea that combat is the truest form of communication, and to know someone fully, you must fight them. While their combat rituals require complete freedom of movement and unarmed martial arts, in warfare, they tend towards light armor and melee weapons, and are considered excellent craftsmen of such.</p>

        <h3>Names</h3>

        <p>Echani names tend to lack hard consonants, but are otherwise as variable as human ones. Echani surnames are tied directly to their place in the caste system.</p>

        <p><strong>Male Names.</strong> Caelian, Inarin, Losor, Uelis, Yusanis </p>

        <p><strong>Female Names.</strong> Astri, Brianna, Isena, Raskta, Senriel</p>

        <p><strong>Surnames.</strong> Authal, Elysi, Fenni, Kinro, Lsu</p>



        <h3>Echani Traits</h3>

        <p>As an Echani, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Echani reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Echani culture's emphasis on honor and combat cause them to tend towards lawful alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Echani stand between 5 and a half and 6 feet tall and weigh around 150 lbs, with little variation between them. Your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Allies of the Force.</em></strong> Whenever you make a Wisdom (Insight) check against someone you know to wield the Force, you are considered to have expertise in the Insight skill.</p>

        <p><strong><em>Unarmed Combatant.</em></strong> Your unarmed strikes deal 1d6 kinetic damage and have the finesse property.</p>

        <p><strong><em>Echani Art.</em></strong> If a humanoid you can see makes a melee weapon attack, you can use your reaction to make a Wisdom (Insight) check against the target's Charisma (Deception). On a success you learn one of the following traits about that creature: it's Strength, Dexterity or Constitution score; bonus to Strength, Dexterity or Constitution saving throws; armor class; or current hit points. On a failure, the target becomes immune to this feature for one day. You can use this ability a number of times equal to your Wisdom modifier (a minimum of once). You regain all expended uses on a long rest.</p>

        <p><strong><em>Combative Culture.</em></strong> You have proficiency in Lore and Acrobatics.</p>

        <p><strong><em>Martial Upbringing.</em></strong> You have proficiency in light armor, and gain proficiency with two martial vibroweapons of your choice.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and one extra language of your choice.</p>

        <img src='https://www.gmbinder.com/images/vJMdYRf.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:400px' />



