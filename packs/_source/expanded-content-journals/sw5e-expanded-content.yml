  - name: Kage Order
    _id: HKs0O2Nx3UvFifhY
    text:
      content: |+
        <h2>Kage Order</h2>

        <p>Monks of the Kage Order, known as Kage warriors, have mastered fighting in darkness, using that which others fear as a weapon against them. Kage warriors learn tricks to create darkness where none exists, fighting using their intuition rather than relying on sight.</p>

        <h3>Darkness Charges</h3>

        <em><strong>Kage Order:</strong> 3rd, 5th, 9th, 13th, and 17th level</em><br>

        <p>You learn to create a number of small charges that create enhanced darkness. Over the course of a short or long rest, you can create two charges. You can create an additional charge at 5th, 9th, 13th, and 17th level. Your charges can only be used by you, and they lose their potency at the end of your next short or long rest.</p>

        <p>Once per turn, when you would make a weapon attack or unarmed strike, you can instead throw one of your charges. Your charges have a range equal to 30 feet + your Strength modifier x 5. You can throw a device at a point you can see within range. The charges create a pocket of darkness in a 10-foot radius sphere centered on that point. The darkness spreads around corners. It lasts for 1 minute or until an enhanced source of bright light dispells it.</p>

        <h3>Disruptive Shock</h3>

        <em><strong>Kage Order:</strong> 6th level</em><br>

        <p>Once per turn, when you hit a creature with a melee weapon attack when you have advantage, or it fails a saving throw against an effect that you control, you can choose to roll a Martial Arts die and deal additional psychic damage equal to the amount rolled.</p>

        You can use this feature a<br> number of times equal to your<br> proficiency bonus, as shown in the monk table. You regain any<br> expended uses when you finish a short or<br> long rest.

        <h3>One With Darkness</h3>

        <em><strong>Kage Order:</strong> 11th level</em><br>

        You have learned to become one with the<br> shadows. When you are in an area of dim light or darkness, you can use your action<br> to become invisible. You remain<br> invisible until you make an<br> attack, cast a power,<br> otherwise take a hostile<br> action, or are in an area<br> of bright light.



        <h3>Opportunist</h3>

        <em><strong>Kage Order:</strong> 17th level</em><br>

        <p>You can exploit a creature's momentary distraction when it is hit by an attack. Whenever a creature within 5 feet of you is hit by an attack made by a creature other than you, you can use your reaction to make a melee attack against that creature.</p>

        <img src='https://www.gmbinder.com/images/KJeYR53.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:726px' />

