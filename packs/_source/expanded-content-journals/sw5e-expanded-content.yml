  - name: Resolution
    _id: GzOIaZ6Hm3WbrcsD
    text:
      content: |-
        <h3>Resolution</h3>

        <p>Once each party has chosen their action, they should each make an attack roll, with advantage or disadvantage as appropriate. The winner of the contest strikes a blow or scores a point, as appropriate.</p>

        <h4>Ties</h4>

        <p>Generally, ties should either award a point to both parties�or no points to either party�at the discretion of the GM.</p>
