  - name: Alternative Proficiencies
    _id: U1xO3OF5TEiCTqt8
    text:
      content: |-
        <h3>Alternative Proficiencies</h3>

        <p>Alternatively, you might allow your players to spend their proficiency points to gain proficiency in weapons or armor. A character could spend 1 proficiency point to gain proficiency in a singular weapon, or 2 proficiency points to gain proficiency in a weapon category (all blasters, lightweapons, or vibroweapons). A character could also spend 2 proficiency points to gain proficiency in a type of armor. However, they would first need to have proficiency in the lesser armors. For instance, to gain proficiency in heavy armor, you must first have proficiency in medium armor. To gain proficiency in medium armor, you must first have proficiency in light armor.</p>

        <h4>Skill Expertise</h4>

        <p>If a character wants to instead use their points to gain expertise in a skill, the GM might allow them to spend 4 proficiency points to gain expertise in a skill in which they are already proficient.</p>

