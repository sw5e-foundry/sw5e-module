  - name: Performance Practice
    _id: O8011gsNpDTblpox
    text:
      content: |+
        <h2>Performance Practice</h2>

        <p>Some operatives choose to master finesse and timing through performance art. Those operatives who choose the Performance Practice become skilled performers who prove especially deadly in close combat, able to find the rhythm of an attacker's strikes as easily as any song.</p>

        <h3>Artful Dancer</h3>

        <em><strong>Performance Practice:</strong> 3rd level</em><br>

        <p>Your training with music and dancing grants you certain benefits. You gain proficiency in the Performance skill and one musical instrument of your choice.</p>

        <p>Additionally, while you are not wearing armor or wielding a medium or heavy shield, you can add half your Charisma modifier to your AC as long as it doesn't already include that modifier.</p>

        <h3>Dazzling Steps</h3>

        <em><strong>Performance Practice:</strong> 3rd level</em><br>

        <p>You learn to conduct impressive displays of grace and speed in combat. While you aren't wearing medium or heavy armor or wielding a medium or heavy shield, and you take the Attack action on your turn and attack with a weapon with either the light or finesse properties, your walking speed increases by 10 feet until the end of the turn, and if you deal Sneak Attack damage, you may choose to forgo two of your Sneak Attack dice to make the attack a dazzling step.</p>

        <p>Some of your dazzling steps require your target to make a saving throw to resist the dazzling step's effects. The saving throw DC is calculated as follows:</p>

        <hr>

        <div class="sw5e-book-block"><strong>Dazzling Step save DC</strong> = 8 + your proficiency bonus + <br>your Charisma modifier</div>

        <hr>

        <h4>Defensive Step</h4>

        <p>You defend yourself from further attack. Roll two Sneak Attack dice. You gain temporary hit points that last until the start of your next turn equal to the amount rolled.</p>

        <h4>Mobile Step</h4>

        <p>You twist and twirl around the target. The target must make a Strength saving throw. A Huge or larger creature automatically succeeds. On a failed save, it is pushed back 5 feet, and you can immediately move into the space it just vacated without provoking opportunity attacks.</p>

        <h4>Offensive Step</h4>

        Choose another creature that you can see<br> within your reach. The creature must make a<br> Dexterity saving throw. On a failed save, roll<br> two Sneak Attack dice. The creature takes<br> damage equal to the amount rolled. This<br> damage is of the same as your weapon's<br> damage.



        <h3>Flexible Body</h3>

        <em><strong>Performance Practice:</strong> 9th level</em><br>

        <p>You are able to use your acrobatic talent to gain the upper hand in combat. You can use the bonus action granted by your Cunning Action to shove or trip a creature. When you do so, you can make a Dexterity (Acrobatics) check instead of a Strength (Athletics) check. </p>

        <p>Additionally, you now ignore difficult terrain, you can move through space occupied by hostile creatures, and you can squeeze through smaller spaces without expending extra movement.</p>

        <h3>Dance of Death</h3>

        <em><strong>Performance Practice:</strong> 13th level</em><br>

        <p>You can use your action to make a weapon attack against any number of creatures within 5 feet of you, with a separate attack roll for each target. You can choose to deal Sneak Attack damage to each creature you hit, but you can only roll half your number of Sneak Attack dice per creature.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Master of Dance</h3>

        <em><strong>Performance Practice:</strong> 17th level</em><br>

        <p>Your confidence when putting on a show has extended into combat. You add your Charisma modifier to initiative checks. Additionally, any creature who fails a saving throw against your Dazzling Step save DC has disadvantage on the first attack roll they make against you each turn until the end of your next turn.</p>

        <img src='https://i.ibb.co/nnh6s3n/final-twilek.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:452px' />

