  - name: Jump
    _id: DzN3XAIB9Fy3kzs3
    text:
      content: |-
        <h4>Jump</h4>

        <p><em>1st-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 minute</li></ul>

        <p>You touch a creature. The creature's jump distance is tripled until the power ends.</p>
