  - name: Aid Droid
    _id: MDHBQItwZDRX6fJB
    text:
      content: |-
        <h4>Aid Droid</h4>

        <p><em>1st-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>Choose one droid or construct that you can see within range. The target can immediately use its reaction to regain hit points equal to 1d6 + your techcasting ability modifier.</p>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the healing increases by 1d6 for each slot level above 1st.</p>
