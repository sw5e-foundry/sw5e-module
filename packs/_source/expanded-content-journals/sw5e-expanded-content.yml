  - name: Addict
    _id: XuhMXggXJetMC7mV
    text:
      content: |-
        <h2>Addict</h2>

        <p>You hammer down your fifth bottle of the night, do your last bit of snuff, and bid farewell to the seedy cantina barman. You stagger onto the streets and find a nearby alley in which you empty the night's contents. To many, the next morning's hangovers would be hell. To you, they're a ritual.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Performance, Persuasion, and Sleight of Hand</li><li><strong>Tool Proficiencies:</strong> Your choice of any gaming set, brewer's kit, or spicer's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A chance cube set, a sabaac deck, 2 days field rations, a flask or belt pouch containing your addiction, a set of common clothes, a bedroll, and a belt pouch containing 25 cr</li></ul>

        <h4>Pick Your Poison</h4>

        <p>While most addicts are willing to try everything once, they typically have a drug of choice. You can determine what the source of your addiction or determine it randomly below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d16</th><th>Substance of Choice</th></tr></thead><tbody><tr><td>1</td><td>Deuterium-pyro</td></tr><tr><td>2</td><td>Mummergy</td></tr><tr><td>3</td><td>Novanian grog</td></tr><tr><td>4</td><td>Raava</td></tr><tr><td>5</td><td>Spicebrew</td></tr><tr><td>6</td><td>Tihaar</td></tr><tr><td>7</td><td>Tsiraki</td></tr><tr><td>8</td><td>Vayerbok</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d16</th><th>Substance of Choice</th></tr></thead><tbody><tr><td>9</td><td>Andris</td></tr><tr><td>10</td><td>Cilona</td></tr><tr><td>11</td><td>Giggledust</td></tr><tr><td>12</td><td>Glitterstim</td></tr><tr><td>13</td><td>Karrak</td></tr><tr><td>14</td><td>Muon gold</td></tr><tr><td>15</td><td>Yaladai</td></tr><tr><td>16</td><td>Yarrock</td></tr></tbody></table></div>

        <h3>Feature: Addicted</h3>

        <p>You've been abusing substances for a long time. You always know who to talk to and where to find substances, and you can often identify them in their raw form. </p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Performer</td></tr><tr><td>3</td><td>Charmer</td></tr><tr><td>4</td><td>Quick-Fingered</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Durable</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Addicts can be rude and uncouth, wearing their addiction visibly, or they might hide that addiction and appear to function normally. Importantly, and varying with every addict, why are you addicted? To forget the past? To drown your sorrows? Or are you simply chasing the dragon?</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I am guaranteed to fight someone if I'm drunk/high enough.</td></tr><tr><td>2</td><td>Life is pain. All I want is to drink/smoke myself into nothingness.</td></tr><tr><td>3</td><td>I have a simple rule; life's a party, so grab the deathsticks!</td></tr><tr><td>4</td><td>The only thing keeping me from burning down this village is the fact that you make some damn good spice.</td></tr><tr><td>5</td><td>I'm quite reserved until the moment I fulfill my addictive needs.</td></tr><tr><td>6</td><td>This stuff is a bit weak, do you have anything higher than 60% in the back?</td></tr><tr><td>7</td><td>I take pride in my addiction and am often snobbish when talking about it.</td></tr><tr><td>8</td><td>I blow up at the slightest insult.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Hope.</strong> I hope to one day be free of my addiction. (Light)</td></tr><tr><td>2</td><td><strong>Carelessness.</strong> I don't care what I have to do, just let me feed my addiction. (Dark)</td></tr><tr><td>3</td><td><strong>Isolation.</strong> Just let me deal with my demons in peace. (Neutral)</td></tr><tr><td>4</td><td><strong>Caution.</strong> I will never let my addiction harm others. (Lawful)</td></tr><tr><td>5</td><td><strong>Independence.</strong> Addiction frees me. (Chaotic)</td></tr><tr><td>6</td><td><strong>Comradery.</strong> Hey, some of my favorite people are addicts! (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I use my addiction as a tool to wash away my past sins.</td></tr><tr><td>2</td><td>My family never wanted to be forgotten. I take drugs in the hopes they will be.</td></tr><tr><td>3</td><td>I hope to start a drug business myself and give people the same happiness I've found.</td></tr><tr><td>4</td><td>Everything I do is in the hopes of getting my hands on my drug.</td></tr><tr><td>5</td><td>I traded my former self to my addiction. Now I need to find a way to get him back.</td></tr><tr><td>6</td><td>To be addicted is to be truly alive.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>This could be rough, let's take something before we go.</td></tr><tr><td>2</td><td>Hopefully this will be the one to end it.</td></tr><tr><td>3</td><td>The mission can wait, we should find some dealers first.</td></tr><tr><td>4</td><td>What? I don't have a problem. You're the one with the problem!</td></tr><tr><td>5</td><td>It looks like my drug, so it should be safe to take right?</td></tr><tr><td>6</td><td>I'm never myself when I'm on it.</td></tr></tbody></table>



