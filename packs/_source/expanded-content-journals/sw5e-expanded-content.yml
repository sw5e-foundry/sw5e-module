  - name: Neimoidian
    _id: 3lsFqTisY0QfxPAK
    text:
      content: |-
        <h2>Neimoidian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green-gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Dark red or pink</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Horizontal pupils, noseless</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'1"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>90 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Neimoidia</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Pak Pak</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Neimoidians are distant genetic relatives of the duros and retain many similarities to them, including basic form, noseless faces, and green-blue skin (though neimoidians tend to be grayer). Their eyes also have pupils that split horizontally, and they are distinguished by small lumps on their foreheads and down-turned mouths. Instead of noses, they have olfactory glands underneath their eyes. These genetic differences are attributed to the distinct features of their homeworld, Neimoidia, including its gravity, which is markedly heavier than duro.</p>

        <h3>Society and Culture</h3>

        <p>Neimoidians spend their formative years as puny grubs in the communal hives of Neimoidia, until the age of seven standard years. They are knowingly neglected by being given limited amounts of food. This way, the weaker individuals are weeded out, while the most acquisitive grubs hoard more food than they can eat by themselves. Neimoidian education ensures the survival of the greediest. Neimoidians place tremendous value on wealth and material possessions, and would go to great lengths to gain money and power. This has resulted in a stereotype of neimoidians being greedy and cowardly. While not all neimoidians are easily intimidated, many prefer to avoid direct combat.</p>

        <h3>Names</h3>

        <p>Neimoidian names are usually short and easy to pronounce, to make them more memorable to other species that approach them as consumers. Their surnames are familial.</p>

        <p><strong>Male Names.</strong> Lok, Gap, Krinit, Mar, Nute</p>

        <p><strong>Female Names.</strong> Bu, Fia, Feza, Vissi</p>

        <p><strong>Surnames.</strong> Dod, How, Kethe, Preelli, Tuuk </p>



        <h3>Neimoidian Traits</h3>

        <p>As a neimoidian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Neimoidians reach adulthood in their 20s and live about 150 years.</p>

        <p><strong><em>Alignment.</em></strong> Neimoidians' greedy nature causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Neimoidians typically stand around 6 feet tall and generally weigh about 135 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Grovel, Cower, and Beg.</em></strong> As an action on your turn, you can cower pathetically to distract nearby foes. Until the end of your next turn, your allies gain advantage on attack rolls against enemies within 10 feet of you that can see you. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Smooth Talker.</em></strong> You have proficiency in Deception and Persuasion.</p>

        <p><strong><em>Wealthy.</em></strong> During character creation, you start with additional credits equal to your level x your proficiency bonus x 1,000 cr.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Pak Pak. Pak Pak is often considered an elegant-sounding language by those who hear it. It consists of husky sighs and guttural ululations.</p>

        <img src='https://www.gmbinder.com/images/krJ6D9A.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:300px;mix-blend-mode:darken' />



