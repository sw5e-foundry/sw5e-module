  - name: Saber Strike
    _id: 6AKxSEpvyrn4gTSA
    text:
      content: |-
        <h4>Saber Strike</h4>

        <p><em>2nd-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Saber Assault</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>As part of the action used to cast the power, you can move up to your speed and make one melee weapon attack. On a hit, the attack deals an extra 1d10 damage of the weapon's type. In addition, if you hit with the attack, the target must succeed on a Strength saving throw or be knocked prone.</p>

        <p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the bonus weapon damage increases by 1d10 for every two slot levels above 2nd.</p>
