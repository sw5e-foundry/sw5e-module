  - name: Lawyer
    _id: 6ivuekWXAmJstRpG
    text:
      content: |+
        <h2>Lawyer</h2>

        <p>Your duty is to uphold the law. Before becoming an adventurer you resided over a court or tribunal, managing proceedings and sentencing criminals to punishments fit for their crimes. Your job required a deep understanding of the law which you used to resolve conflicts both clear-cut and morally grey.</p>

        <p>The legal system on the planet where you worked has a large effect on how you view the law. Was it a court system with a jury making the final verdict, or did you have absolute authority over determining guilt and sentencing? Was it a fair legal system with plenty of integrity, or was it rife with abuse and corruption? Did you work on criminal cases, civil law, or something even more specific? Perhaps instead of working for a government you were a judge in an internal tribunal for a temple or military organization. </p>

        <p>Consider what compelled you to leave your old occupation behind and begin adventuring. Perhaps you seek to bring someone beyond the scope of law to justice, or maybe you have lost faith in the legal system altogether and have turned to a vigilante approach. </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Performance, and Persuasion</li><li><strong>Languages:</strong> Two of your choice</li><li><strong>Equipment:</strong> Documentation of your station, a book of law, a formal uniform you wear to court, a set of common clothes, and a belt pouch containing 100 cr. </li></ul>

        <h3>Feature: Legal Authority</h3>

        <p>You are familiar with the letter of the law and workings of courts, at least on the planet that you were a judge in. If you are in a foreign place where you are not familiar with their exact laws, you often will be able to track down the resources you need to learn them. </p>

        <p>If you or your party gets into legal trouble, your experience may help you get out of it. If you can prove your credentials, you might be able to represent your party in a court of law without admonishment. You may know of legal loopholes that will help your case. If you are in the region where you originally worked, you might have past connections with many legal professionals there.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Performer</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Actor</td></tr><tr><td>7</td><td>Observant</td></tr><tr><td>8</td><td>Keen Mind</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>A lawyer's career is centered on issues of right, wrong, and punishment, so they will approach adventuring through a similar lens. They are used to being respected and in control, leading many of them to struggle with wild, Any situations.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I quote the law like a religious fanatic quotes scripture.</td></tr><tr><td>2</td><td>I bang my weapon like a gavel whenever I want a rowdy group's attention.</td></tr><tr><td>3</td><td>I remain impartial when making decisions, even when I should have biases and loyalties.</td></tr><tr><td>4</td><td>Evidence is necessary to back up any claim.</td></tr><tr><td>5</td><td>I insist on settling all party disagreements through fake court proceedings.</td></tr><tr><td>6</td><td>I have to hear all sides of a story, but I secretly hate listening to people whine about how unfairly they're treated.</td></tr><tr><td>7</td><td>I am happy to make sacrifices for the sake of fairness.</td></tr><tr><td>8</td><td>I will not attack a person unless someone can prove they are doing something wrong.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Law.</strong> I will follow the letter of the law always, no matter what I believe. (Lawful)</td></tr><tr><td>2</td><td><strong>Justice.</strong> My duty is to fight for the disenfranchised underdog. (Light)</td></tr><tr><td>3</td><td><strong>Reform.</strong> Laws can be corrupt, and I strive to free people from the bad ones. (Chaotic)</td></tr><tr><td>4</td><td><strong>Punishment.</strong> I will punish all those who have committed great Darks. (Lawful)</td></tr><tr><td>5</td><td><strong>Control.</strong> I enforce the law only where it benefits myself. (Dark)</td></tr><tr><td>6</td><td><strong>Stability.</strong> The purpose of the law is to keep civilization from collapsing. That spirit of that goal is more important than the letter of the law. (Neutral)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>A dangerous criminal is on the loose, and I plan to hunt them down.</td></tr><tr><td>2</td><td>All those who strive to uphold the law are my allies.</td></tr><tr><td>3</td><td>I have sentenced an innocent man to a horrible punishment, and the guilt still haunts me.</td></tr><tr><td>4</td><td>There is an ethical cause that I would give my life for.</td></tr><tr><td>5</td><td>I dream of memorizing the laws of every civilization.</td></tr><tr><td>6</td><td>I am enamored with the legal system of my own culture, and want to spread its tenets everywhere.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>Mercy is a foreign concept to me.</td></tr><tr><td>2</td><td>I am unwilling to admit when I am wrong.</td></tr><tr><td>3</td><td>I become unreasonably enraged at even the slightest injustice.</td></tr><tr><td>4</td><td>I expect others to adhere to the law, but I act like i am above it.</td></tr><tr><td>5</td><td>If there isn't a law in the books to handle a moral dilemma, I can't make a decision.</td></tr><tr><td>6</td><td>The punishments I deal are cruel and unusual.</td></tr></tbody></table>

