    _id: SPvZcN5zSnDi3yVV
    text:
      content: |-
        <h3>Class Features</h3>

        <p>Different classes or archetypes with casting as a core component are typically built around that casting's primary ability score. You'll want to update or replace them, as appropriate to the class or archetype, including capstones.</p>
