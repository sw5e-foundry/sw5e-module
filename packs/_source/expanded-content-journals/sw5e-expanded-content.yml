  - name: Education
    _id: 3jM1vGiVI6m0TuLF
    text:
      content: |-
        <h3>Education</h3>

        <p>Your destiny is to train or educate another being or group of beings in some way. In some cases, this could mean taking a young Padawan learner and molding them into an eventual Jedi Master, or it could mean training fresh-faced Rebel Alliance recruits and molding them into a crack team of SpecForce operatives. Characters with this destiny are not merely teachers providing mundane training. The education that this destiny demands must be of great importance to the galaxy, and should lay the groundwork for the beneficiaries of your tutelage to go on to fulfil destinies of their own. Only when the training is complete can this destiny be fulfilled, and the process should take months or years to complete.</p>

        <p>Examples of this destiny include Obi-Wan Kenobi's training of Anakin Skywalker, Yoda's training of Luke Skywalker, or Grand Admiral Thrawn's training of Captain Pellaeon.</p>



        <h4>Destiny Fulfilled</h4>

        <p>You gain a permanent destiny bonus equal to your proficiency bonus on checks made with one class skill of your choice.</p>
