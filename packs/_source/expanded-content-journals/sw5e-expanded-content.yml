  - name: Ability Capstone Feats
    _id: 4ZqetlIAMqFhAZZl
    text:
      content: |-
        <h2>Ability Capstone Feats</h2>

        <p>At higher levels, character tend to reach the pinnacle of an ability score, representing their mastery of that aspect. These feats are designed to give those characters an edge greater than just the ability score.</p>

        <h3>Titan's Power</h3>

        <em><strong>Prerequisite:</strong> 12th level, Strength 20</em><br>

        <p>You have the strength that legends tell of, granting the following benefits:</p>

        <ul><li>You gain proficiency in Strength saving throws. If you are already proficient in them, you instead gain expertise in them.</li><li>You ignore the two-handed property of weapons with which you are proficient.</li><li>When you miss with a melee weapon attack, the creature takes damage equal to your Strength modifier. This damage is of the same type as the weapon's damage.</li></ul>

        <h3>Blinding Agility</h3>

        <em><strong>Prerequisite:</strong> 12th level, Dexterity 20</em><br>

        <p>You have the reflexes one who can see things before they happen, granting the following benefits:</p>

        <ul><li>You gain proficiency in Dexterity saving throws. If you are already proficient in them, you instead gain expertise in them.</li><li>Weapons that lack the two-handed or special properties are considered to have the finesse property for you.</li><li>Opportunity attacks made against you have disadvantage.</li></ul>

        <h3>Unnatural Resilience</h3>

        <em><strong>Prerequisite:</strong> 12th level, Constitution 20</em><br>

        <p>You have the fortitude often attributed to gods, granting the following benefits:</p>

        <ul><li>You gain proficiency in Constitution saving throws. If you are already proficient in them, you instead gain expertise in them.</li><li>Enhanced effects, such as powers or medpacs, that would restore hit points to you can't restore an amount less than half your level + your Constitution modifier. If this amount would exceed that maximum amount of hit points that effect could restore, you instead take that effect's maximum.</li><li>You can add your Constitution modifier to death saving throws you make.</li></ul>

        <h3>Cunning Intellect</h3>

        <em><strong>Prerequisite:</strong> 12th level, Intelligence 20</em><br>

        <p>You have the cunning of the most prolific scholars, granting the following benefits:</p>

        <ul><li>You gain proficiency in Intelligence saving throws. If you are already proficient in them, you instead gain expertise in them.</li></ul>



        <ul><li>When you engage in the Training downtime activity, during resolution, you add your proficiency bonus to the check. If you would already add your proficiency bonus, you instead add twice your proficiency bonus. If you would already add twice your proficiency bonus, you instead have advantage on the check.</li><li>Whenever you make an ability check that uses your Intelligence, you can add half your proficiency bonus (rounded down) if it doesn't already include your proficiency bonus. Additionally, if you roll lower than half your level (rounded down) on an Intelligence check, you can instead use your level for the d20 roll.</li></ul>

        <h3>Exalted Awareness</h3>

        <em><strong>Prerequisite:</strong> 12th level, Wisdom 20</em><br>

        <p>You have the wisdom associated with the most renowned masters of the Force, granting the following benefits:</p>

        <ul><li>You gain proficiency in Wisdom saving throws. If you are already proficient in them, you instead gain expertise in them.</li><li>Creatures within 60 feet of you have disadvantage on Dexterity (Stealth) checks made to hide from you.</li><li>As an action, you can sense the presence of illusions and other effects designed to deceive the senses within 30 feet of you, provided that you aren't blinded or deafened. You sense that an effect is trying to trick you, but you gain no insight into what is hidden or its true nature. Once you've used this feature, you must complete a short or long rest before you can use it again.</li></ul>

        <h3>Overwhelming Presence</h3>

        <em><strong>Prerequisite:</strong> 12th level, Charisma 20</em><br>

        <p>You have the presence of the most affluent of leaders, granting the following benefits:</p>

        <ul><li>You gain proficiency in Charisma saving throws. If you are already proficient in them, you instead gain expertise in them.</li><li>While you are conscious, up to five friendly creatures within 30 feet of you who can see or hear you and who can understand you can gain a bonus to one Intelligence, Wisdom, or Charisma saving throw they make equal to your Charisma modifier. Once they've done so, they can't do so again until they finish a short or long rest.</li><li>As an action, you can attempt to distract up to five creatures you can see within 30 feet of you. Each creature must make a Wisdom saving throw (DC = 8 + your proficiency bonus + your Charisma modifier). Any creature immune to being charmed is unaffected. If you or your companions are fighting a creature, it has advantage on the saving throw. On a failed save, for the next minute, a creature has disadvantage on Wisdom (Perception) checks made to perceive any creature other than you until the effect ends or until the target can no longer see or hear you. This ends early if you are incapacitated or die.</li></ul>
