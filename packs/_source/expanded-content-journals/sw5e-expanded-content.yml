  - name: Critical Saving Throws
    _id: mUpSFP2wbyng8SDE
    text:
      content: |-
        <h2>Critical Saving Throws</h2>

        <p></div></p>

        <p>Unlike attack rolls, which have critical hits and critical misses, saving throws don't have critical successes or failures. Using this variant rule, you can allow critical successes and failures on saving throws.</p>
