  - name: Scavenger
    _id: 5Yg366Lm14vvF0ol
    text:
      content: |+
        <h2>Scavenger</h2>

        <p>You are experienced with collecting lost or abandoned items or recovering wreckage from the aftermath of large scale conflicts or natural disasters. Scavengers sole occupation is to salvage anything they can find that they can reuse or sell for much needed credits.  </p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Persuasion, Sleight of Hand, Survival, and Technology</li><li><strong>Tool Proficiencies:</strong> Your choice of archaeologist kit, jeweler's implements, mechanic's kit, or scavenging kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes with a hood, 2 days field rations, mechanic's goggles, a bedroll, and a pouch containing 200 cr</li></ul>

        <h4>Scavenger Specialty</h4>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>1</td><td>Droid Scavenger</td></tr><tr><td>2</td><td>Ship Scavenger</td></tr><tr><td>3</td><td>Junk Dealer</td></tr><tr><td>4</td><td>Scrapper</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>5</td><td>Collector</td></tr><tr><td>6</td><td>Trader</td></tr><tr><td>7</td><td>Clean-up</td></tr><tr><td>8</td><td>Fence</td></tr></tbody></table></div>

        <h3>Feature: Rugged Survivalist </h3>

        <p>Scavengers due to their line of work have an eye for spotting useful or even valuable parts of technology or artifacts. You can easily spot the best place to scavenge the most valuable parts.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Loremaster</td></tr><tr><td>3</td><td>Quick-Fingered</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Tech Dabbler</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Scavengers are usually self-employed while searching for the next piece of technology or random junk to sell for profit or merely for survival.</p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I am quiet, reserved, and focused on my work. It takes a lot for me to raise my voice or object outside of my job.</td></tr><tr><td>2</td><td>If I find an intact piece of technology, I'll be focused on how many credits I can get by salvaging it.</td></tr><tr><td>3</td><td>When I find myself in a trove full of technology, I'm thinking of a way to use them for profit.</td></tr><tr><td>4</td><td>I look down on people that do not like getting their hands dirty.</td></tr><tr><td>5</td><td>I like making friends, those who don't like widening their circle are fools.</td></tr><tr><td>6</td><td>I am polite around my customers or patrons, though I am harsh toward my fellow Scavengers.</td></tr><tr><td>7</td><td>I am slow to trust people as in my line of work; it's every individual for themselves.</td></tr><tr><td>8</td><td>If there is a lost individual that is in need, I will always lend a hand.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Honor.</strong> I don�t steal from other in or outside of the trade. (Lawful)</td></tr><tr><td>2</td><td><strong>Independence.</strong> I do not work well with others, I work alone. (Chaotic)</td></tr><tr><td>3</td><td><strong>Charity.</strong> I use the credits I gain to help those less fortunate. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I will do whatever it takes to get more credits. (Dark)</td></tr><tr><td>5</td><td><strong>Community.</strong> I�m loyal to my friends and fellow Scavengers. (Neutral)</td></tr><tr><td>6</td><td><strong>Hope.</strong> I hope to one day get enough money to start a new life in the stars. (Neutral)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I carry with me a unique piece of technology unknown to me, but I keep it as a good luck charm.</td></tr><tr><td>2</td><td>My fellow scavengers mean the world to me.</td></tr><tr><td>3</td><td>I unintentionally killed someone by stealing their property. I hope to redeem myself for it.</td></tr><tr><td>4</td><td>I used to work for a horrible employer that abused their power; I will take my revenge on any who bully others.</td></tr><tr><td>5</td><td>I'm working off the debt I owe to a wealthy benefactor.</td></tr><tr><td>6</td><td>Someone I loved died because of a mistake I made. That will never happen again.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>When I see something valuable, I can�t think about anything but how to make a profit from it.</td></tr><tr><td>2</td><td>When faced with a choice between money and my friends, I usually choose the money.</td></tr><tr><td>3</td><td>If there�s a plan, I�ll forget it. If I don�t forget it, I�ll ignore it.</td></tr><tr><td>4</td><td>I have a "tell" that reveals when I'm lying.</td></tr><tr><td>5</td><td>I turn tail and run when things look bad.</td></tr><tr><td>6</td><td>I tend to hold people who work normal jobs in contempt.</td></tr></tbody></table>

