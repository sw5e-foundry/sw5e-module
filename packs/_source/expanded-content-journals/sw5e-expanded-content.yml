  - name: Path of Tenacity
    _id: G4eXvqbnCBT0jIiW
    text:
      content: |-
        <h2>Path of Tenacity</h2>

        <p>The tenacious are ever mindful that the Force ebbs and flows, and uses this knowledge to great advantage. Those sentinels who follow the Path of Tenacity use their connection to the Force to draw the opposition's attention while also warding off their attacks, serving as an effective bulwark against even the most implacable of foes.</p>

        <h3>Protector</h3>

        <em><strong>Path of Tenacity:</strong> 3rd level</em><br>

        <p>You learn the <em>saber ward</em> force power, which does not count against your total powers known. Additionally, when you cast it, you can spend 2 force points to extend the benefits to creatures of your choice within 5 feet of you while the power is active. The creatures immediately lose this benefit if they move more than 5 feet away from you.</p>

        <h3>Kinetic Ward</h3>

        <em><strong>Path of Tenacity:</strong> 3rd level</em><br>

        You can use your reaction to deflect a strike when you are dealt damage by a melee weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your sentinel level.<br><br><br><br><br> If you reduce the damage to 0, you can redirect it at another target if you have a weapon capable of doing so. You can spend 1 force point to make a melee weapon attack at a target within 5 feet of you with the weapon, as part of the same reaction. You make this attack with proficiency, regardless of your weapon proficiencies, and if the attack hits it uses your Kinetic Combat die for its damage roll. If <em>saber ward</em> is active, you have advantage on the attack roll.

        <h3>Kinetic Bulwark</h3>

        <em><strong>Path of Tenacity:</strong> 7th level</em><br>

        <p>You can extend your Kinetic Ward to a creature within 5 feet of you when they are hit by a melee weapon attack. If this damage is not reduced to 0, the warded creature takes any remaining damage. </p>

        <h3>Indomitable</h3>

        <em><strong>Path of Tenacity:</strong> 13th level</em><br>

        <p>The Force flowing through you makes it harder for movement to be forced upon you. You have advantage on ability checks and saving throws to avoid being grappled or moved. If you fail the saving throw or ability check, you can spend 1 force point to reroll one of the dice once. You must use the new roll.</p>

        <p>Additionally, if allies within 5 feet of you are gaining the benefit of your <em>saber ward</em> force power, they also gain the benefit of this feature.</p>



        <h3>Kinetic Bastion</h3>

        <em><strong>Path of Tenacity:</strong> 18th level</em><br>

        <p>You can protect allies even further from you. When a creature within 30 feet of you is hit by a melee weapon attack, you can use your reaction to teleport to them and extend your Kinetic Ward. If this damage is not reduced to 0, the warded creature takes any remaining damage. </p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the sentinel table. You regain all expended uses when you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/uUGZB8C.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:803px' />



