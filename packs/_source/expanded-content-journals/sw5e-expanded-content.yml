  - name: Predator Technique
    _id: L1EMqNXVRDUIcp9z
    text:
      content: |+
        <h2>Predator Technique</h2>

        <p>Some scouts work in solitude, while others prefer the strength of a group. Followers of the Predator Technique find power lies with the pack; they distract their prey, while their allies go for the kill.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Predator Technique:</strong> 3rd level</em><br>

        <p>You gain proficiency in heavy armor.</p>

        <h3>Hunting Party</h3>

        <em><strong>Predator Technique:</strong> 3rd level</em><br>

        <p>When you take the Attack action on your turn, you can use a bonus action to direct one of your companions to strike. When you do so, choose a friendly creature who can see or hear you. That creature can immediately use its reaction to make one weapon attack.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses of it when you finish a long rest.</p>



        <h3>Mark of the Predator</h3>

        <em><strong>Predator Technique:</strong> 3rd level</em><br>

        <p>If the target of your Ranger's Quarry feature can see you, a number of friendly creatures you choose up to your Intelligence modifier have advantage on Dexterity (Stealth) checks made to hide from it.</p>

        <h3>Predator's Resolve</h3>

        <em><strong>Predator Technique:</strong> 7th level</em><br>

        <p>You can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have advantage on Constitution saving throws.</li><li>At the start of each of your turns, you gain temporary hit points equal to your Constitution modifier (minimum of one).</li><li>When you use your Hunting Party feature and the target of the attack is your Ranger's Quarry, your ally gains a bonus to damage on the attack equal to your Ranger's Quarry Damage Die.</li></ul>

        <p>Once you've used this feature, you can't use it again until you finish a short or long rest.</p>

        <h3>Prey on the Weak</h3>

        <em><strong>Predator Technique:</strong> 11th level</em><br>

        <p>When you hit a creature with a weapon attack, and the creature is below its hit point maximum, the next attack roll made against that creature before the end of your next turn by someone other than you has advantage.</p>

        <h3>On the Hunt</h3>

        <em><strong>Predator Technique:</strong> 15th level</em><br>

        <p>When you use your Predator's Resolve feature, a number of friendly creatures you choose up to your Intelligence modifier that you can see within 30 feet of you also gain the benefits of the feature.</p>

        <img src='https://www.gmbinder.com/images/TidlOHN.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:585px' />

