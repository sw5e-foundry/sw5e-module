  - name: Clawdite
    _id: WBXANp29rlDi9mQq
    text:
      content: |-
        <h2>Clawdite</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Green to yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Yellow, gold, or blue</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Shapechanging capabilities</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'11"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>95 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Zolan</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Clawdite</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>In their natural form, clawdites resemble reptilian humanoids, having evolved from reptomammals. They have sunken cheeks with a narrow nose, a small mouth, large eyes with slit-like pupils, and a thin line that runs down their foreheads, creasing their nose. Clawdites possess an extremely rare ability to change their appearance. They can change the color and texture of their skin and eyes, and even grow hair, to mimic other species, though they cannot add significant physical mass to their bodies. </p>

        <h3>Society and Culture</h3>

        <p>By nature, clawdites are quiet and solitary beings, often shunning the company of others unless it benefits them. Due to their nature as shapeshifters, they are often mistrusted by strangers. Consequently, they view the galaxy pragmatically, and are often harsh realists.</p>

        <p>Not all clawdites use their shapeshifting abilities due to the pain the transformation causes. These clawdites are often inclined to remain on their homeworld of Zolan, avoiding the company of other species.</p>

        <p>On Zolan, clawdites are feared and shunned by the zolanders, who are a deeply religious people, believing that clawdites are impure and sinful. Zolanders force clawdites to live in slums scattered across the planet.</p>

        <p>Those clawdites who leave their homeworld tend to gravitate toward professions that celebrate their shapeshifting, such as smuggling, bounty hunting, or espionage.</p>

        <h3>Names</h3>

        <p>Clawdite names often have a rolling or hissing quality to them. Surnames are familial, though clawdites rarely use them.</p>

        <p><strong>Male Names.</strong> Nuri, Pol, Renneyn, Rosat, Turman</p>

        <p><strong>Female Names.</strong> Bargu, Cato, Murna, Sora, Zam</p>

        <p><strong>Surnames.</strong> Durra, Noviee, Parasitti, Virten, Wesell</p>



        <h3>Clawdite Traits</h3>

        <p>As a clawdite, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and one other ability score of your choice increases by 1.</p>

        <p><strong><em>Age.</em></strong> Clawdites reach adulthood in their early teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Clawdites' pragmatism cause them to tend towards neutral balanced, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Clawdites typically stand 5 to 7 feet tall and generally weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Changeling Instincts.</em></strong> You gain proficiency with two of the following skills of your choice: Deception, Intimidation, Insight, and Persuasion</p>

        <p><strong><em>Shapechanger.</em></strong> As an action, you can change your appearance and your voice. You determine the specifics of the changes, including your coloration, hair length, and sex. You can also adjust your height and weight, but not so much that your size changes. You can make yourself appear as a member of another species, though none of your game statistics change. You can't duplicate the appearance of a creature you've never seen, and you must adopt a form that has the same basic arrangement of limbs that you have. Your clothing and equipment aren't changed by this trait. You stay in the new form until you use an action to revert to your true form or until you die.</p>

        <p><strong><em>Unsettling Visage.</em></strong> When a creature you can see makes an attack roll against you, you can use your reaction to impose disadvantage on the roll. You must use this feature before knowing whether the attack hits or misses. Using this trait reveals your shapeshifting nature to any creature within 30 feet that can see you. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Clawdite, and one more language of your choice. Clawdite is characterized by its rolling sounds paired with hissing sibilants.</p>

        <img src='https://vignette.wikia.nocookie.net/starwars/images/3/37/ClawditeNEGAS.jpg/revision/latest?cb=20090709061818' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:180px;mix-blend-mode:darken' />



