  - name: Selonian
    _id: BiudOlkcWzqyciM9
    text:
      content: |-
        <h2>Selonian</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Brown</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Black, brown, or gray</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Long pointed faces with whiskers</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>125 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Selonia</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Mandaba</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The selonians are carnivores who are believed to have descended from aquatic mammals. Their bodies are covered by a sleek fur and they normally do not wear clothing. However, when working or visiting offworld, they wear appropriate outfits. Their long bodies are equally comfortable walking on either two or four legs. Their long tails serve as a counterbalance for their bodies when standing upright. These tails are equally capable of being used as potent bludgeoning weapons in combat. At the end of their paw-like hands are retractable claws which not only gives them the capacity to dig but also makes them excellent climbers. They have long pointed faces with bristly whiskers as well as long teeth. Most selonians born are infertile females. One in every hundred are male, and one in every five hundred are fertile females.</p>

        <h3>Society and Culture</h3>

        <p>Despite the massive starship traffic to Corellia, many visitors and even native Corellians know very little of the selonians and their distinctive unique alien culture. In mindset, they are a thoroughly grounded and serious race who are primarily concerned with the safety of their people. This means that the protection of their family dens and their species as a whole was a chief concern. The basis for this line of thinking is because they viewed that the needs of the society outweighed the needs of the individual. To those unaware of the deeper intricacies of the race, the selonians appear as an outgoing, friendly and charitable species. However, their interests rarely go beyond securing the good of their respective den.</p>

        <h3>Names</h3>

        <p>Selonian use punctual names with no surnames.</p>

        <p><strong>Male Names.</strong> Duldayd, Gov, Krez, Qaran</p>

        <p><strong>Female Names.</strong> Chu, Driacnear, Fiircasa, Shilis</p>



        <h3>Selonian Traits</h3>

        <p>As a selonian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Selonians reach adulthood in their mid teens and live for about 75 years.</p>

        <p><strong><em>Alignment.</em></strong> Selonians are serious and den-focused, causing them to tend towards lawful balanced, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Selonians typically stand 6 to 7 feet tall and generally weigh about 180 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 35 feet.</p>

        <p><strong><em>Climb.</em></strong> You have a climbing speed of 35 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can�t discern color in darkness, only shades of gray.</p>

        <p><strong><em>Nimble Agility.</em></strong> Your reflexes and agility allow you to move with a burst of speed. When you move on your turn in combat, you can double your speed until the end of the tum. Once you use this trait, you can�t use it again until you move 0 feet on one of your turns.</p>

        <p><strong><em>Tail and Claw.</em></strong> Your strong tail and razor-sharp claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 35 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Mandaba. Selonians use the name "Home Talk" to refer to their own language.</p>

        <img src='https://www.gmbinder.com/images/hsKqKnd.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:345px' />



