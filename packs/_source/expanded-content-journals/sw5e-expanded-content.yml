  - name: Way of Tutelage
    _id: N9aeWWNl66brijoX
    text:
      content: |+
        <h2>Way of Tutelage  </h2>

        <p>With the Force, knowledge is most often passed from a master to an apprentice. Those consulars who follow the Way of Tutelage know the strength of working together exceeds that of working alone.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Way of Tutelage:</strong> 3rd level</em><br>

        <p>You gain proficiency in your choice of Intimidation or Persuasion.</p>

        <h3>Humanoid Companion</h3>

        <em><strong>Way of Tutelage:</strong> 3rd level</em><br>

        <p>You've taken an apprentice, gaining the services of your own humanoid companion.</p>

        <p>Create your humanoid companion as detailed in the Companions section of the Customization Options document for Expanded Content. </p>

        <p>In addition to its traits and features, your companion gains additional benefits while it is bonded to you:</p>

        <ul><li>Your companion gains two additional traits. It gains one more additional trait when you reach 11th level in this class. For each trait in excess of your proficiency bonus, your force point maximum is reduced by 2.</li></ul>

        <p>Lastly, while bonded and within 10 feet of you, when your companion is hit by an attack, you can use your reaction and expend a use of your Force Shield feature to shroud it in Force energy. If you do so, until the start of your next turn, both you and your companion gain the benefits of your Force Shield. This includes the triggering attack.</p>

        <p>At 11th level, your companion must be within 30 feet of you to benefit from this feature. At 17th level, your companion must be within 60 feet.</p>

        <h3>Strength Flows from the Force</h3>

        <em><strong>Way of Tutelage:</strong> 6th level</em><br>

        When you cast a power that affects only<br> your companion, you can choose to treat<br> the power as if cast at your Max Power<br> Level.

        You can use this feature a number of<br> times equal to your proficiency bonus, as shown in the consular table. You regain all<br> expended uses when you finish a<br> long rest.



        <h3>You Have That Power Too</h3>

        <em><strong>Way of Tutelage:</strong> 10th, 11th, and 17th level</em><br>

        <p>The bond between you and your companion has strengthened. When your companion is within 10 feet of you, and either you or your companion casts a force power that would affect only one of you, you can instead have it affect both.</p>

        <p>At 11th level, your companion must be within 30 feet of you to benefit from this feature. At 17th level, your companion must be within 60 feet.</p>

        <h3>Got Your Back</h3>

        <em><strong>Way of Tutelage:</strong> 14th and 17th level</em><br>

        <p>Once per turn, when your companion is within 10 feet of you, and both you and your companion have to make a saving throw to resist the same effect, either you or your companion can choose to have disadvantage on the save. If either of you do so, the other of the two of you gains advantage on the save. You can use this feature before or after you both make the saving throw, but you must do so before the GM says whether the save succeeds or fails.</p>

        <p>At 17th level, your companion must be within 60 feet of you to benefit from this feature. </p>

        <h3>Now I Am The Master</h3>

        <em><strong>Way of Tutelage:</strong> 18th level</em><br>

        <p>Your companion has learned almost all that it can from you. As an action on its turn, your companion can take the lead, gaining the following benefits for 1 minute:</p>

        <ul><li>It gains temporary hit points equal to twice its level.</li><li>Once per turn, when it deals damage or restores hit points, it can roll an additional die.</li><li>It gains resistance to kinetic and energy damage.</li></ul>

        &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;This effect ends early if your<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;companion is incapacitated or dies.<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;Once your companion has used<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;this feature, it can't use it again<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;until it finishes a long rest.

        <img src='https://www.gmbinder.com/images/3O1yfjY.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:640px' />

