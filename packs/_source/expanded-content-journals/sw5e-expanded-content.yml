  - name: Far Traveler
    _id: OpdJsW4v8hTxjXBI
    text:
      content: |+
        <h2>Far Traveler</h2>

        <p>Almost all of the common people and other folk that one might encounter throughout the galaxy have one thing in common: they live  their lives without traveling more than a few miles from where they were born.</p>

        <p>You aren't one of those folk.</p>

        <p>You are from a distant place that few of the common folk realize exists; chances are good that even if some people have heard of your homeland, they know merely the name and maybe a few outrageous stories. </p>

        <p>Although you find some of this land's ways to be strange and discomfiting, you can also be sure that some things its people take for granted will be, to you, new wonders that you've never laid eyes on before. By the same token, you're a person of interest, for good or ill, to those around you almost anywhere you go.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Perception, and Persuasion</li><li><strong>Tool Proficiencies:</strong> One musical instrument or gaming set of your choice</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> One set of traveler's clothes, any one musical instrument or gaming set you are proficient with, poorly wrought maps from your homeland, a small piece of jewelry worth 100 cr in the style of your homeland's craftsmanship, and a pouch containing 50 cr</li></ul>

        <h4>Why Are You Here?</h4>

        <p>To determine why you are so far from home, roll on the table below or choose from the options provided. </p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d6</th><th>Reason</th></tr></thead><tbody><tr><td>1</td><td>Emissary</td></tr><tr><td>2</td><td>Exile</td></tr><tr><td>3</td><td>Fugitive</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Reason</th></tr></thead><tbody><tr><td>4</td><td>Pilgrim</td></tr><tr><td>5</td><td>Sightseer</td></tr><tr><td>6</td><td>Wanderer</td></tr></tbody></table></div>

        <h3>Feature: All Eyes On You</h3>

        <p>Your foreign nature attracts attention, yielding access to people and places you might not otherwise have, for you and your traveling companions. Noble lords, scholars, and merchant princes, to name a few, might be interested in hearing about your distant homeland and people.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Perceptive</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Entertainer</td></tr><tr><td>6</td><td>Competitor</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Practiced</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>The distance you've traveled manifests itself in the way you speak and carry yourself.</p>



        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I have different assumptions from those around me concerning personal space, invading others' space in innocence, or reacting to invasion of my own.</td></tr><tr><td>2</td><td>I have my own ideas about food, and I find the eating habits of others fascinating, confusing, or revolting.</td></tr><tr><td>3</td><td>I have a strong code of honor or sense of propriety that others don't comprehend.</td></tr><tr><td>4</td><td>I express affection or contempt in ways that are unfamiliar to others.</td></tr><tr><td>5</td><td>I honor my deities through practices that are foreign to this land.</td></tr><tr><td>6</td><td>I begin or end my day with small traditional rituals that are unfamiliar to those around me.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Open.</strong> I have much to learn from the kindly folk I meet along my way. (Light)</td></tr><tr><td>2</td><td><strong>Reserved.</strong> As someone new to these strange lands, I am cautious and respectful in my dealings. (Lawful)</td></tr><tr><td>3</td><td><strong>Adventure.</strong> I'm far from home, and everything is strange and wonderful! (Chaotic)</td></tr><tr><td>4</td><td><strong>Cunning.</strong> Though I may not know their ways, neither do they know mine, which can be to my advantage. (Dark)</td></tr><tr><td>5</td><td><strong>Inquisitive.</strong> Everything is new, but I have a thirst to learn. (Neutral)</td></tr><tr><td>6</td><td><strong>Suspicious.</strong> I must be careful, for I have no way of telling friend from foe here. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>So long as I have this token from my homeland, I can face any adversity in this strange land.</td></tr><tr><td>2</td><td>The gods of my people are a comfort to me so far from home.</td></tr><tr><td>3</td><td>I hold no greater cause than my service to my people.</td></tr><tr><td>4</td><td>My freedom is my most precious possession. I'll never let anyone take it from me again.</td></tr><tr><td>5</td><td>I'm fascinated by the beauty and wonder of this new land.</td></tr><tr><td>6</td><td>Though I had no choice, I lament having to leave my loved one(s) behind. I ho pe to see them again one day.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am secretly (or not so secretly) convinced of the superiority of my own culture over that of this foreign land.</td></tr><tr><td>2</td><td>I pretend not to understand the local language in order to avoid interactions I would rather not have.</td></tr><tr><td>3</td><td>I have a weakness for the new intoxicants and other pleasures of this land.</td></tr><tr><td>4</td><td>I don't take kindly to some of the actions and motivations of folk different from me.</td></tr><tr><td>5</td><td>I consider the adherents of other gods to be deluded innocents at best, or ignorant fools at worst.</td></tr><tr><td>6</td><td>I have a weakness for the exotic beauty of the people of these lands.</td></tr></tbody></table>

