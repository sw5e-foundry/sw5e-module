  - name: Art of Movement
    _id: UI42CPQgTorzM1gR
    text:
      content: |-
        <h4>Art of Movement</h4>

        <p><em>3rd-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Instinctive Movement</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>

        <p>By letting the Force flow through you, you move with preternatural grace, leaping onto or over tall obstacles that impede others. Until the power ends, you gain the following benefits:</p>

        <ul><li>Your speed increases by 10 feet.</li><li>You have resistance to damage from falling.</li><li>Your jumping distance is tripled.</li><li>You gain a climbing speed equal to your walking speed, and you can move up, down, and across vertical surfaces and upside down along ceilings, while leaving your hands free. If you are on a vertical surface when you end your turn and are not using your hands to climb, you immediately fall unless you have some other means of remaining there.</li><li>Your movement is unaffected by difficult terrain or squeezing.</li><li>You ignore the effects of slowed levels under 3.</li></ul>

        <p>Once before the power ends, you can give yourself advantage on one weapon attack roll on your turn. That attack deals an extra 1d10 force damage on a hit. Whether you hit or miss, you gain a flying speed equal to your walking speed until the end of that turn.</p>
      format: 1
    src: null
    flags:
      sw5e-module:
