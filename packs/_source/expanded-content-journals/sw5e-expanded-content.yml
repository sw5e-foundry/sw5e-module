    _id: DSIhPMHQkPtrsdA5
    text:
      content: |-
        <h3>Critical Failure</h3>

        <p>When a creature rolls a 1 on their saving throw against an effect, they automatically fail the saving throw, even if the result of their save would meet or exceed the save DC. Additionally, if the effect would deal damage, they treat the effect's damage as if it had rolled the maximum.</p>
