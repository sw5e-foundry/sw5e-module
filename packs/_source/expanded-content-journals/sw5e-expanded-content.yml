  - name: Alternative Armor
    _id: ZsVvqGi3138UJMNR
    text:
      content: |-
        <h2>Alternative Armor</h2>

        <p></div></p>

        <p>Traditionally, armor class is designed entirely for avoidance. While unarmored or lightly armored, that's dodging the attack entirely. In medium or heavy armor, however, that's absorbing the attack on your armor in such a way that it deals no damage. If you want a different approach to armor, try this variant rule.</p>
