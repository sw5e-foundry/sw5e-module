  - name: Amnesiac
    _id: Sl452KLrtKwOrQqJ
    text:
      content: |-
        <h2>Amnesiac</h2>

        <p></div></p>

        <p>One day you awoke, perhaps in a forest or on a sandy beach, with no recollection of what happened to you. How did you get here? Who were you? These questions elude and boggle your mind. Some people wish for a fresh start, but you never even got a choice.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Investigation, and Survival </li><li><strong>Tool Proficiencies:</strong> Choose one from disguise kit, forgery kit, or tinker's implements</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, a relic of your past which you do not remember, and a belt pouch containing 200 cr</li></ul>

        <h4>Variant: Randomized Proficiencies</h4>

        <blockquote><p>Rather than taking the proficiencies provided by this background, you can choose to take no proficiencies, instead waiting to gain a proficiency during a story moment. When you do so, you must succeed on a DC 15 check. You add your proficiency bonus to this check, but no additional modifiers. On a success, you gain the chosen skill, tool, or language proficiency. On a failure, you do not gain a proficiency, and you can't attempt again for 24 hours. You can gain no more than two skill proficiencies and two tool or language proficiencies in this way.</p></blockquote>

        <h3>Feature: A Life Once Lived</h3>

        <p>You once had a home, a family, relationships, possessions, but now you are left with nothing but the ability to start anew. You are unfamiliar with the world around you as well as the people in it. You may often need to ask for clarification on things other adventurers may know intrinsically. Some events, locations, names, phrases, or objects may also trigger you to recall small details which could relate to the life you once had, at the discretion of the GM.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Investigator</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Practiced</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>The important things to consider when choosing this background are how your character has dealt with starting life anew and what have they done to set down that path.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I don't know who you are but I'll try to help you.</td></tr><tr><td>2</td><td>I will let nothing stop my quest for answers.</td></tr><tr><td>3</td><td>Even if I never find out who I was before, I will know who I am now.</td></tr><tr><td>4</td><td>I am sometimes clumsy when speaking. I must've not been very eloquent.</td></tr><tr><td>5</td><td>I shy away from forging new relationships. I don't want to leave anyone behind again.</td></tr><tr><td>6</td><td>Having no memories of the past has left me feeling free and happy.</td></tr><tr><td>7</td><td>I am eager to learn and devour any knowledge I can.</td></tr><tr><td>8</td><td>I am insightful and can often see things from other peoples point of view.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Conscience.</strong> I've forgotten before, I can forget again.  I don't let my conscience get in the way of my actions. (Lawful)</td></tr><tr><td>2</td><td><strong>Freedom.</strong> With no past to tie me down I do was I will. (Chaotic)</td></tr><tr><td>3</td><td><strong>Respect.</strong> People deserve to be treated with respect. (Light)</td></tr><tr><td>4</td><td><strong>Past.</strong> I will destroy whatever I have to in order to reclaim what I once had. (Dark)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Ideals aren't worth killing over or going to war for. (Neutral)</td></tr><tr><td>6</td><td><strong>Memory.</strong> Finding out my history drives every action I do. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I will never rest until I find out what happened to me.</td></tr><tr><td>2</td><td>I have a family out there who's looking for me. I can't let them down.</td></tr><tr><td>3</td><td>I was given a chance to start fresh, and I'm not taking it for granted.</td></tr><tr><td>4</td><td>My entire life was lost in the blink of an eye. What's the point of all this?</td></tr><tr><td>5</td><td>I've already lost everything. Now I do as I please.</td></tr><tr><td>6</td><td>I will become something great so that even if I forget, others won't.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I've lost all hope since I woke up.</td></tr><tr><td>2</td><td>I'm obsessed with the life I left behind.</td></tr><tr><td>3</td><td>Sometimes I crack under the stress of starting new.</td></tr><tr><td>4</td><td>I get tunnel vision when investigating my past life.</td></tr><tr><td>5</td><td>I no longer care about anything. It could all be gone in an instant.</td></tr><tr><td>6</td><td>I am constantly angry about forgetting everything.</td></tr></tbody></table>



