  - name: Saving Throws
    _id: TTXIpOLWZCvxrtuM
    text:
      content: |-
        <h3>Saving Throws</h3>

        <p>For the five classes with native casting (consular, engineer, guardian, scout, sentinel) you'll want to make the following adjustments to their saving throws.</p>

        <ul><li><strong>Consular:</strong> Replace Charisma with Intelligence.</li><li><strong>Engineer:</strong> Replace Intelligence with Charisma.</li><li><strong>Guardian:</strong> Replace Charisma with Intelligence.</li><li><strong>Scout:</strong> No changes.</li><li><strong>Sentinel:</strong> Replace Charisma with Intelligence.</li></ul>
