  - name: Inquisitor Technique
    _id: 2mKHUoLOEvYezuPs
    text:
      content: |+
        <h2>Inquisitor Technique</h2>

        <p>Across history, there have been those who live to hunt those who wield the Force, be they Jedi or Sith. Followers of the Inquisitor Technique combine technology with force techniques to track down and eliminate force-wielders. For those practitioners of the Force, they are the greatest adversary.</p>

        <h3>Forcecasting Secrets</h3>

        <em><strong>Inquisitor Technique:</strong> 3rd, 5th, 9th, 13th,<br> &emsp;and 17th level</em><br>

        <p>You have learned secrets from a subtle attunement to the force. Choose two force powers of no higher level than your Max Power Level, as shown in the scout table. The chosen powers count as tech powers for you, but are not included in the number in the Powers Known column of the scout table.</p>

        <p>You learn two additional powers at 5th, 9th, 13th, and 17th level. Whenever you gain a level in this class, you can choose one of the force powers you know and replace it with another force power of no higher level than your Max Power Level.</p>

        <h3>Mark of the Inquisitor</h3>

        <em><strong>Inquisitor Technique:</strong> 3rd, 11th, and 17th level</em><br>

        <p>When the target of your Ranger's Quarry feature is within 15 feet of you, you gain the following benefits:</p>

        <ul><li>Whenever the creature casts a force power, it must first succeed on a Constitution saving throw against your tech save DC to maintain concentration. On a failed save, the casting is disrupted, the force power fails, and the force points are wasted.</li><li>Whenever the creature starts its turn while concentrating on a force power, it must make a Constitution saving throw against your tech save DC<br> to maintain concentration. On a failed save, it loses<br> concentration on the power.</li></ul>

        The radius of this feature increases to 30<br> feet at 11th level and 60 feet at 17th<br> level.

        <h3>Sense Force</h3>

        <em><strong>Inquisitor Technique:</strong> 7th level</em><br>

        <p>You can use your action to gain the benefits of the <em>force sight</em> force power until the end of your next turn.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you finish a long rest.</p>

        <h3>Force Resistance</h3>

        <em><strong>Inquisitor Technique:</strong> 11th and 17th level</em><br>

        <p>While the target of your Ranger's Quarry feature is within 30 feet of you, you gain the following benefits:</p>

        <ul><li>You have advantage on saving throws against force powers they cast.</li><li>You have resistance to damage dealt by force powers they cast. </li></ul>

        <p>The radius of this feature increases to 60 feet at 17th level.</p>



        <h3>Inquisitor's Wrath</h3>

        <em><strong>Inquisitor Technique:</strong> 15th and 17th level</em><br>

        <p>You can cast the <em>force suppression</em> and <em>sever force</em> force powers at 3rd level against the target of your Ranger's Quarry without expending tech points. If they are within 30 feet of you, you have advantage on the forcecasting ability check for these powers.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you finish a long rest.</p>

        <p>The radius of this feature increases to 60 feet at 17th level.</p>

        <img src='https://www.gmbinder.com/images/6k8LjLG.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:660px' />

