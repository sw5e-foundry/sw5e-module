  - name: Tracker Droid Companion
    _id: OheHZNLi6hQpHfwZ
    text:
      content: |+
        <h2>Tracker Droid Companion</h2>

        <p>Your tracker droid takes a form of your choosing. Once you've selected your tracker droid's appearance, you assign your tracker droid's ability scores using a standard array (16, 14, 12, 10, 8, 6) as you see fit.</p>

        <hr>

        <h3>Tracker Droid Features</h3>

        <p>All tracker droids share the following traits.</p>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d4 per tracker droid companion level</li><li><strong>Hit Points at 1st Level:</strong> 4 + your tracker droid's Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d4 (or 3) + your tracker droid's Constitution modifier per tracker droid level after 1st</li></ul>

        <h4>Resistances and Vulnerabilities</h4>

        <hr>

        <ul><li><strong>Droid Resistances:</strong> Your tracker droid is resistant to necrotic, poison, and psychic damage, and immune to poison and disease.</li><li><strong>Droid Vulnerabilities:</strong> Your tracker droid is vulnerable to ion damage. Additionally, your tracker droid has disadvantage on saving throws against effects that would deal ion or lightning damage.</li></ul>

        <h4>Proficiencies and Features</h4>

        <hr>

        <ul><li><strong>Skills:</strong> Two of your choice</li><li><strong>Tools:</strong> One of your choice, which comes integrated into the droid</li><li><strong>Languages:</strong> Tracker droids can speak, read, and write Binary. They can understand spoken and written Galactic Basic and one language of your choice, but can not speak it.</li><li><strong>Size:</strong> Tiny</li><li><strong>Speed:</strong> 20 feet</li><li><strong>Type:</strong> Droid</li><li><strong>Armor Class:</strong> Your tracker droid's armor class equals 10 + its Dexterity modifier. Your tracker droid can't wear armor or have it integrated.</li><li><strong>Droid Systems:</strong> Your tracker droid does not need to eat or drink. Additionally, your tracker droid does not require a tech focus to cast tech powers, and it is a valid target of the <em>tracker droid interface</em> tech power.</li><li><strong>Droid Weaponry:</strong> Your tracker droid has an integrated shockprod with which it can make weapon attacks. This weapon can't be removed while your tracker droid is conscious. Your tracker droid's shockprod deals 1 lightning damage on a hit, and it has the finesse property.</li><li><strong>Force Insensitive:</strong> Your tracker droid can not use force powers or take levels in forcecasting classes.</li><li><strong>Maintenance Mode:</strong> Rather than sleep, your companion must spend 3 hours performing routine maintenance during a long rest to gain its benefits, during which it has disadvantage on Wisdom (Perception) checks. Additionally, if your companion's long rest would be interrupted, it only needs to complete the long rest instead of restarting it.</li><li><strong>Attitude:</strong> The tracker droid obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your tracker droid acts on its own.</li></ul>



        <h3>Tracker Droid Traits</h3>

        <p>The traits are presented in alphabetical order. If a trait has prerequisites, your companion must meet them to adopt it. Your companion can adopt a trait at the same time that it meets the trait's prerequisites. Whenever your companion gains a level, it can exchange one trait for another one.</p>

        <h4>Aerial Travel Package</h4>

        <p>Your companion has a 30 foot flying speed, and opportunity attacks made against it have disadvantage.</p>

        <h4>Camouflage Module</h4>

        <p>You install a camouflage module in your companion. Your companion can activate its camouflage module to become invisible. While it is invisible, anything it is carrying or wearing is also invisible. It becomes visible if it attacks, casts a power, takes a hostile action, or when it deactivates the module. Activating or deactivating the module requires an action.</p>

        <p>Deduct the time your companion is invisible, in increments of 1 minute, from the module's maximum duration of 2 hours. After 2 hours of use, the module ceases to function. For every uninterrupted period of 12 hours the module goes unused, it regains 1 hour of use.</p>

        <h4>Darkvision Optics</h4>

        <p>Your companion has darkvision to a range of 60 feet. If your companion already has darkvision, this trait increases its range by 30 feet.</p>

        <h4>Four-Armed Tracker</h4>

        <em><strong>Prerequisite:</strong> Pintsized Arms</em> or <em>Undersized Arms</em><br>

        <p>Your companion gains two additional arms which they can use independently of one another. Your companion can only gain the benefit of items held by two of its arms at any given time, and once per round it can switch which arms it is benefiting from (no action required).</p>

        <h4>Heavy Plating</h4>

        <p>Your companion's armor class becomes 14.</p>

        <h4>Interfaced Assistance Protocol</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While you are interfaced with your companion via the <em>tracker droid interface</em> tech power, whenever you have advantage on an ability check or attack roll granted by your companion taking the Help action, you can reroll one of the dice once.</p>

        <h4>Interfaced Crafting Protocol</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While you are interfaced with your companion via the <em>tracker droid interface</em> tech power, whenever you make an ability check using artisan's implements with which you are proficient, you have advantage on the check. If you already have advantage, you can instead reroll one of the dice once.</p>



        <h4>Interfaced Distraction Protocol</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While you are interfaced with your companion via the <em>tracker droid interface</em> tech power, when your companion is within 5 feet of a target, you do not provoke opportunity attacks when moving out of that creature's reach.</p>

        <h4>Interfaced Healing Protocol</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While you are interfaced with your companion via the <em>tracker droid interface</em> tech power, when you restore hit points to a creature that is within 5 feet of your companion, you can roll the dice twice and take either total.</p>

        <h4>Interfaced Tracking Protocol</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>While you are interfaced with your companion via the <em>tracker droid interface</em> tech power, when you make a Wisdom (Survival) check to track a target, and your companion is also tracking that target, you gain advantage on the check. If you already have advantage, you can instead reroll one of the dice once.</p>

        <h4>Keen Hearing</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on hearing.</p>

        <h4>Keen Sight</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on sight.</p>

        <h4>Keen Smell</h4>

        <p>Your companion has advantage on Wisdom (Perception) checks that rely on smell.</p>

        <h4>Laser Cutter</h4>

        <p>Your companion can cut through 1-inch-thick glass at a rate of 3 inches per round.</p>

        <h4>Light Plating</h4>

        <p>Your companion's armor class becomes 11 + its Dexterity modifier.</p>

        <h4>Medium Plating</h4>

        <p>Your companion's armor class becomes 13 + its Dexterity modifier, to a maximum of +2.</p>

        <h4>Pintsized Arms</h4>

        <em><strong>Prerequisite:</strong> Size Tiny</em><br>

        <p>Your Tiny tracker droid gains two arms that struggle to wield bigger weapons. Your companion can't use medium or heavy shields. Additionally, your companion can't wield weapons with the two-handed or versatile property, and it can only wield one-handed weapons in two hands unless they have the light property.</p>

        <h4>Proficiency Protocol</h4>

        <p>You install a protocol in your companion that grants it proficiency in a skill or tool of your choice.</p>

        <h4>Ranged Interface Protocol</h4>

        <p>The range within which you can interact with your companion increases by 50 feet. This increases by an additional 50 feet at 5th level (100), 9th level (150), 13th level (200), 17th level (250), and 20th level (300).</p>

        <h4>Ranged Shockshot</h4>

        <p>Your companion gains a ranged shockshot. It has a normal range of 30 feet and a long range of 90 feet, and on a hit it deal lightning damage equal to its shockprod damage.</p>

        <h4>Scomp Link</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>Your companion gets an integrated scomp link which it can use to interface with computers. While interfaced, when you or your companion makes an Intelligence (slicer's kit) check, you can choose to reroll the check. You must use the new roll. You can wait until after you roll the d20 before deciding to use this feature, but you must decide before the GM says whether the check succeeds or fails.</p>

        <h4>Sentry Dish</h4>

        <p>Your companion learns the <em>alarm</em> tech power. It can cast it once, without spending tech points, and it regains the ability to do so when it finishes a long rest. Intelligence is its techcasting ability for this power.</p>

        <h4>Size: Small</h4>

        <p>Your companion's size is Small. Its hit points increase by an amount equal to its level + 1, its Hit Die becomes a d6, its shockprod damage die becomes a d4, and it's walking speed increases to 25.</p>

        <h4>Spider Legs</h4>

        <p>Your companion has a climbing speed equal to its walking speed. Additionally, your companion has advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <h4>Storage</h4>

        <p>Your companion comes with a hidden storage compartment which can store up to 1 lb. Finding this hidden compartment requires a DC 15 Investigation check.</p>

        <h4>Techcasting Range Protocol</h4>

        <p>You can cast tech powers with a range of 5 feet or greater through your companion while interfaced with it, but your companion must be within 5 feet of the target of the power. This increases to 10 feet at 5th level, 20 feet at 9th level, 30 feet at 13th level, 60 feet at 17th level, and 120 feet at 20th level.</p>

        <h4>Truesight Optics</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <em><strong>Prerequisite:</strong> Darkvision Optics</em><br>

        <p>Your companion can see through illusions and detect invisibility within 60 feet, as with truesight.</p>

        <h4>Undersized Arms</h4>

        <em><strong>Prerequisite:</strong> Size Small</em><br>

        <p>Your Small tracker droid gains two arms that struggle to wield bigger weapons. Your companion can't use heavy shields. Additionally, your companion can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, your companion can only wield it in two hands.</p>

