  - name: Ataru Form
    _id: OYOXCnoGvkKggTiY
    text:
      content: |+
        <h2>Ataru Form</h2>

        <p>Ataru Form, also know as Aggression Form, is a kinetically active form that relies on speed, acrobatics, and power. Those guardians who focus on Ataru Form utilize high energy tactics to confuse and distract their opponents, quickly moving about the battlefield.</p>

        <h3>Form Basics</h3>

        <em><strong>Ataru Form:</strong> 3rd level</em><br>

        <p>You gain the Ataru lightsaber form, detailed in Chapter 6 of the Player's Handbook. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Hawk-Bat</h3>

        <em><strong>Ataru Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can take an aggressive stance, leaping around the battlefield for 1 minute. As a part of this bonus action, and as a bonus action on each of your turns, you can cast the <em>force jump</em> power at 1st-level without expending force points. Additionally, when you cast <em>force jump</em>, you have advantage on the first attack roll you make against each creature within 5 feet of where you land.</p>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Ataru Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>Retreating Leap</h4>

        <p>When a creature makes a melee attack roll against you, you can expend a use of your Channel the Force and your reaction to jump 10 feet in a direction of your choice, imposing disadvantage on the roll. This movement does not provoke opportunity attacks. You can wait until after the attack roll is made, but before the DM determines whether the attack hits.</p>

        <h3>Hawk-Bat Swoop</h3>

        <em><strong>Ataru Form:</strong> 7th level</em><br>

        <p>You gain the ability to move along vertical surfaces without falIing during the move. If you end your turn in the air, you fall immediately to the ground.</p>

        <p>Additionally, you no longer take damage when falling from a distance no greater than your walking speed.</p>

        <h3>Whirlwind Attack</h3>

        <em><strong>Ataru Form:</strong> 15th level</em><br>

        <p>You can use your action to make melee attacks against any number of creatures within 5 feet of you, with a separate attack roll for each target.</p>



        <h3>Master of Aggression</h3>

        <em><strong>Ataru Form:</strong> 20th level</em><br>

        <p>Your presence on the field of battle is as a graceful blur of deadly blades and daring acrobatics. Your Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for those scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic, energy, and ion damage from weapons.</li><li>When an ally within 30 feet of you takes the Attack action, they can make one additional attack as a part of that same action.</li><li>When you hit a creature with a weapon attack, you can move up to 10 feet. This movement does not provoke opportunity attacks.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/BWuZ77A.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:550px' />

