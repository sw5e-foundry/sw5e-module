  - name: Master Pyrokinesis
    _id: FiZaFo7b2l679uK8
    text:
      content: |-
        <h4>Master Pyrokinesis</h4>

        <p><em>7th-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Greater Pyrokinesis</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>A storm made up of sheets of roaring, Force-enhanced flame appears in a location you choose within range. The area of the storm consists of up to ten 10-foot cubes, which you can arrange as you wish. Each cube must have at least one face adjacent to the face of another cube. Each creature in the area must make a Dexterity saving throw. It takes 7d10 energy damage on a failed save, or half as much damage on a successful one. A creature in the area of more than one cube is affected only once.</p>

        <p>The flame damages objects in the area and ignites flammable objects that aren't being worn or carried.</p>
