  - name: Fighting Masteries
    _id: Yu8KfmLP7ZHRcLUk
    text:
      content: |-
        <h3>Fighting Masteries</h3>

        <p>Certain class features or feats offer your choice of Fighting Mastery. Choose from the following. You can't take a Fighting Mastery option more than once, even if you later get to choose again.</p>

        <h4>Brawling Mastery</h4>

        <p>You've mastered using your weight to your advantage, easily wrangling targets around. You gain the following benefits:</p>

        <ul><li>Your improvised weapons use a d6 for damage and gain the versatile (2d4) property.</li><li>Your unarmed strike damage increases by one step (from 1 to d4, d4 to d6, or d6 to d8).</li><li>Your speed isn't halved by carrying a grappled creature who is the same size category as you or smaller. </li><li>Once per turn, when you hit a creature with an unarmed strike or an improvised weapon, you can make an additional unarmed strike or improvised weapon attack against the same target without the aid of your proficiency bonus (no action required).</li></ul>

        <h4>Close Quarters Shooting Mastery</h4>

        <p>You've mastered getting up close and personal with blaster weapons, maintain both rate of fire and accuracy. While you are wielding a blaster weapon with which you are proficient, you gain the following benefits:</p>

        <ul><li>When you take the Attack action, you can choose to fire rapidly at the expense of accuracy. Your ranged weapon attacks are made without the aid of your proficiency bonus, but you use your bonus action to make an additional ranged weapon attack, also without your proficiency bonus.</li><li>Your ranged weapon attacks ignore half cover against targets within 30 feet of you.</li><li>Other creatures provoke an opportunity attack from you when they move to within 15 feet of you, and you can use blaster weapons when making opportunity attacks.</li></ul>

        <h4>Defense Mastery</h4>

        <p>You've mastered the art of defending yourself, treating your armor as a second skin. While you are wearing armor with which you are proficient, you gain the following benefits:</p>

        <ul><li>Critical hits made against you are treated as normal hits.</li><li>When a creature makes a melee attack against you and misses, you can use your reaction to attempt to shove that creature up to 10 feet directly away from you.</li></ul>

        <h4>Dueling Mastery</h4>

        <p>Your mastery of fighting with a single melee weapon is unsurpassed; you make one weapon feel like many. While you are wielding a melee weapon in one hand with which you are proficient and no other weapons, you gain the following benefits:</p>

        <ul><li>When you take the Attack action, you can decide to attack with haste at the expense of accuracy. Your melee weapon attacks are made without the aid of your proficiency bonus, but you use your reaction to make an additional melee weapon attack, also without your proficiency bonus. </li><li>When a creature hits you with a melee attack, you can use your reaction to add your proficiency bonus to your AC for that attack, potentially causing the attack to miss you.</li></ul>

        <h4>Great Weapon Mastery</h4>

        <p>You've mastered putting the weight of a weapon to your advantage, letting its momentum empower your strikes. While you are wielding a melee weapon in two hands with which you are proficient, you gain the following benefits:</p>

        <ul><li>On your turn, when you score a critical hit with a melee weapon or reduce a creature to 0 hit points with one, you can make one melee weapon attack as a bonus action.</li><li>Before you make a melee attack with a weapon that you are wielding in two-hands with which you are proficient with, you can choose to forgo your proficiency bonus. If the attack hits, you add double your proficiency bonus to the attack's damage.</li></ul>

        <h4>Sentinel Mastery</h4>

        <p>You've mastered techniques to take advantage of every drop in any enemy's guard; in tight spaces you are indomitable. While you are wielding a melee weapon with which you are proficient, you gain the following benefits:</p>

        <ul><li>When you hit a creature with an opportunity attack, the creature's speed becomes 0 for the rest of the turn.</li><li>Creatures within 5 feet of you provoke opportunity attacks from you even if they take the Disengage action before leaving your reach.</li></ul>

        <h4>Sharpshooting Mastery</h4>

        <p>You have mastered blaster weapons and can easily make shots that others find impossible. While you are wielding a blaster weapon with which you are proficient, you gain the following benefits:</p>

        <ul><li>Attacking at long range doesn't impose disadvantage on your ranged weapon attack rolls.</li><li>Your ranged weapon attacks ignore half cover and three-quarters cover.</li><li>Before you make an attack with a blaster weapon that you are proficient with, you can choose to forgo your proficiency bonus. If the attack hits, you add double your proficiency bonus to the attack's damage.</li></ul>

        <h4>Shielding Mastery</h4>

        <p>You've mastered using a shield to defend your allies as well as yourself, and you understand that shields are not just for protection but also for offense. While you are wielding a shield with which you are proficient, you gain the following benefits:</p>

        <ul><li>If you take the Attack action on your turn, you can use a bonus action to try to shove a creature within 5 feet of you with your shield.</li><li>If you aren't incapacitated, you can add your shield's AC bonus to any Dexterity saving throw you make against a power or other harmful effect.</li></ul>

        <h4>Throwing Mastery</h4>

        <p>You've mastered the techniques of throwing weapons, readily blending the weapons with your movements. While you are wielding a weapon with the thrown property with which you are proficient, you gain the following benefits:</p>

        <ul><li>You gain a +1 bonus to ranged attack rolls you make with thrown weapons.</li><li>Attacking at long range doesn't impose disadvantage on your ranged weapon attack rolls with thrown weapons.</li><li>When you hit a creature with a ranged weapon attack with a thrown weapon, you have advantage on your next melee weapon attack against that creature before the end of your next turn.</li><li>You can use Two-Weapon Fighting even when the melee weapons you are wielding in one hand aren't light, if at least one of them has the thrown property.</li></ul>

        <h4>Two-Weapon Mastery</h4>

        <p>You've mastered fighting with two weapons, becoming a flurry of motion. While you are wielding separate weapons in each hand, or a weapon with the double property, with which you are proficient, you gain the following benefits:</p>

        <ul><li>While wielding separate weapons in each hand, you gain a +1 bonus to AC.</li><li>While wielding a double weapon, when you roll a 1 on a weapon damage die, you can reroll the die and must use the new roll, even if the new roll is a 1.</li><li>You can engage in Two-Weapon Fighting even when the weapons you are wielding lack the light property.</li><li>You can draw or stow two weapons when you would normally be able to draw or stow only one.</li><li>When you engage in Two-Weapon Fighting, you can choose to forgo your proficiency bonus. If you do so, you can make an additional Two-Weapon Fighting attack, also without your proficiency bonus.</li></ul>

        <h4>Versatile Mastery</h4>

        <p>You've mastered the art of using weapons in different ways, altering your attack patterns mid-swing. While you are wielding a melee weapon with the versatile property with which you are proficient and no other weapons, you gain the following benefits:</p>

        <ul><li>When you are the target of a melee weapon attack, you can immediately use your reaction to make a melee weapon attack against the target without your proficiency bonus. On a hit, you impose disadvantage on the attack roll made against you.</li><li>If you miss an attack while wielding a weapon in two hands, you can immediately make an attack roll against the same target using one hand. You can only make this attack once per turn. If the two-handed attack was made with disadvantage or without your proficiency bonus, this attack is made the same way.</li><li>If you miss an attack while wielding a weapon in one hand, you can immediately attempt to shove that creature up to 5 feet directly away from you. You can only make this attempt once per turn. If the one-handed attack was made with disadvantage or without your proficiency bonus, this ability check is made the same way.</li></ul>

