  - name: Enhanced Items
    _id: SHyAEUB8y2Ctw7Ka
    text:
      content: |-
        <h1>Enhanced Items</h1>

        <h3>Consumables (Ammunition)<br> Torpedoes</h3>

        <table class="sw5e-book-table"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td><font style="color:green">Torpedo, Fragmentation (Average)</font></td><td><font style="color:green">Premium</font></td></tr><tr><td><font style="color:green">Torpedo, Plasma (Average)</font></td><td><font style="color:green">Premium</font></td></tr><tr><td><font style="color:blue">Torpedo, Fragmentation (Major)</font></td><td><font style="color:blue">Prototype</font></td></tr><tr><td><font style="color:blue">Torpedo, Plasma (Major)</font></td><td><font style="color:blue">Prototype</font></td></tr><tr><td><font style="color:purple">Torpedo, Fragmentation (Deadly)</font></td><td><font style="color:purple">Advanced</font></td></tr><tr><td><font style="color:purple">Torpedo, Plasma (Deadly)</font></td><td><font style="color:purple">Advanced</font></td></tr><tr><td><font style="color:#db6620">Torpedo, Fragmentation (Lethal)</font></td><td><font style="color:#db6620">Legendary</font></td></tr><tr><td><font style="color:#db6620">Torpedo, Plasma (Lethal)</font></td><td><font style="color:#db6620">Legendary</font></td></tr><tr><td><font style="color:red">Torpedo, Fragmentation (Devastating)</font></td><td><font style="color:red">Artifact</font></td></tr><tr><td><font style="color:red">Torpedo, Plasma (Devastating)</font></td><td><font style="color:red">Artifact</font></td></tr></tbody></table>

        <h3>Weapon (Blaster)</h3>

        <table class="sw5e-book-table"><thead><tr><th>Item</th><th>Rarity</th></tr></thead><tbody><tr><td><em>Blaster</em></td><td></td><td></td></tr><tr><td><font style="color:green">Torpedo Launcher (Fine)</font></td><td><font style="color:green">Premium</font></td></tr><tr><td><font style="color:blue">Torpedo Launcher (Improved)</font></td><td><font style="color:blue">Prototype</font></td></tr><tr><td><font style="color:purple">Torpedo Launcher (Superior)</font></td><td><font style="color:purple">Advanced</font></td></tr></tbody></table>

        <h4>Torpedo Launcher (Fine)</h4>

        <em><strong>Weapon</strong> (torpedo launcher), <font style="color:green"><strong>premium</strong></font></em><br>

        <p>You have a +1 bonus to attack rolls made with this enhanced weapon. Additionally, the damage of torpedoes fired by this weapon increases by one step (from d4 to d6, d6 to d8, d8 to d10, d10 to d12, or d12 to d20). If this would increase the damage die above a d20, instead add an additional five dice to the torpedo's damage for each step above a d20.</p>

        <h4>Torpedo Launcher (Improved)</h4>

        <em><strong>Weapon</strong> (torpedo launcher), <font style="color:blue"><strong>prototype</strong></font></em><br>

        <p>You have a +2 bonus to attack rolls made with this enhanced weapon. Additionally, the damage of torpedoes fired by this weapon increases by two steps (from d4 to d8, d6 to d10, d8 to d12, or d10 to d20). If this would increase the damage die above a d20, instead add an additional five dice to the torpedo's damage for each step above a d20.</p>

        <h4>Torpedo Launcher (Superior)</h4>

        <em><strong>Weapon</strong> (torpedo launcher), <font style="color:purple"><strong>advanced</strong></font></em><br>

        <p>You have a +3 bonus to attack rolls made with this enhanced weapon. Additionally, the damage of torpedoes fired by this weapon increases by three steps (from d4 to d10, d6 to d12, or d8 to d20). If this would increase the damage die above a d20, instead add an additional five dice to the torpedo's damage for each step above a d20.</p>

        <h4>Torpedo, Fragmentation (Average)</h4>

        <em><strong>Consumable</strong> (ammunition), <font style="color:green"><strong>premium</strong></font></em><br>

        <p>You have a +1 bonus to attack rolls made with this enhanced torpedo launcher ammunition, which deals 20d6 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the power generator is depleted, it no longer gives a bonus.</p>

        <h4>Torpedo, Fragmentation (Major)</h4>

        <em><strong>Consumable</strong> (ammunition), <font style="color:blue"><strong>prototype</strong></font></em><br>

        <p>You have a +2 bonus to attack rolls made with this enhanced torpedo launcher ammunition, which deals 20d8 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the power generator is depleted, it no longer gives a bonus.</p>

        <h4>Torpedo, Fragmentation (Deadly)</h4>

        <em><strong>Consumable</strong> (ammunition), <font style="color:purple"><strong>advanced</strong></font></em><br>

        <p>You have a +3 bonus to attack rolls made with this enhanced torpedo launcher ammunition, which deals 20d10 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the power generator is depleted, it no longer gives a bonus.</p>

        <h4>Torpedo, Fragmentation (Lethal)</h4>

        <em><strong>Consumable</strong> (ammunition), <font style="color:#dd6b20"><strong>legendary</strong></font></em><br>

        <p>You have a +3 bonus to attack rolls made with this enhanced torpedo launcher ammunition, which deals 20d12 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the power generator is depleted, it no longer gives a bonus.</p>

        <h4>Torpedo, Fragmentation (Devastating)</h4>

        <em><strong>Consumable</strong> (ammunition), <font style="color:red"><strong>artifact</strong></font></em><br>

        <p>You have a +3 bonus to attack rolls made with this enhanced torpedo launcher ammunition, which deals 20d20 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the power generator is depleted, it no longer gives a bonus.</p>

        <h4>Torpedo, Plasma (Average)</h4>

        <em><strong>Consumable</strong> (ammunition), <font style="color:green"><strong>premium</strong></font></em><br>

        <p>You have a +1 bonus to attack and damage rolls made with this enhanced torpedo launcher ammunition, which deals 20d6 kinetic damage on a hit. This bonus is in addition to any bonuses granted by the weapon. Once the power generator is depleted, it no longer gives a bonus.</p>

        <h4>Torpedo, Plasma (Major)</h4>

        <em><strong>Consumable</strong> (ammunition), <font style="color:blue"><strong>prototype</strong></font></em><br>

