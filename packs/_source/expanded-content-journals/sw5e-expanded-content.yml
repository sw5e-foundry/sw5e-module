  - name: Pau'an
    _id: YlASP6o8Oglc1rDi
    text:
      content: |-
        <h2>Pau'an</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Gray or white</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black or silver</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Red eye sockets, pinstriped skin, long lifespan, jagged teeth</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'0"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>120 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Utapau</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Utapese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Pau'ans have large, sunken black eyes in red eye sockets and jagged, fang-like teeth used for tearing into raw meat, as they are carnivores. The species has pale, wrinkled skin, due to the fact that they lived in the sinkholes of Utapau, giving them limited access to light. These traits cause some to view them as frightening. However, Pau'ans as a society are generally friendly, and are happy to welcome guests to their often overlooked world. Pau'ans have long lifespans, living up to 700 years, much longer than the Utai. This earned them the nickname of "Ancients".</p>

        <h3>Society and Culture</h3>

        <p>Pau'ans fulfill most of the governmental and administrative duties on Utapau, as the utai do not desire such work, serving as laborers instead. Most pau'ans served as leaders early in their lives, often managing teams of Utai laborers. This gives them experience that will be used later in their lives. Pau'ans are kind leaders, and sympathetic to their subordinates. Each city on Utapau is controlled by a Master of Port Administration, a hereditary title reserved for pau'ans. These administrators are assisted by advisory councils for making important decisions about their city, and each administrator serves on the Utapauan Committee and oversees planetary governance. However, the committee rarely makes crucial decisions, as the cities are able to function on their own most of the time.</p>

        <h3>Names</h3>

        <p>Pau'an names are fairly simple, and generally melodic. Surnames are familial. </p>

        <p><strong>Male Names.</strong> Kernul, Sivrol, Tar, Vizun, Yal, Zeolbud</p>

        <p><strong>Female Names.</strong> Cas, Jevoh, Nesim, Sizil, Ten, Yofan</p>

        <p><strong>Surnames.</strong> Gesat, Kluneln, Nom, Vley, Voy, Zet</p>



        <h3>Pau'an Traits</h3>

        <p>As a pau'an, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Constitution score increases by 1. </p>

        <p><strong><em>Age.</em></strong> Pau'ans reach adulthood in their 30's and have been known to live up to 700 years old. </p>

        <p><strong><em>Alignment.</em></strong> Pau'ans' commanding presence, yet friendly and kind nature, cause them to tend to be lawful light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Pau'ans typically stand between 6 and 7 feet tall and generally weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Authoritative.</em></strong> You have proficiency in Persuasion or Intimidation (your choice). </p>

        <p><strong><em>Cultured.</em></strong> You have proficiency in the Lore skill.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 120 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hypersensitive Hearing.</em></strong> Pau'ans possess incredibly receptive hearing, often to their detriment, so you wear special covers on your ears. Whenever you make a Wisdom (Perception) check involving hearing, you are considered to have expertise in the Perception skill, but if your hearing aids are removed, you have disadvantage on saving throws against effects that would deal sonic damage.</p>

        <p><strong><em>Vigilant.</em></strong> You can choose to have advantage on your next Initiative check. Once you use this trait, you can't use it again until you finish a short or long rest. </p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Utapese. Utapese is characterized by its rigid, yet melodic sound.</p>

        <img src='https://www.gmbinder.com/images/rBn3F2L.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both' />style='position:absolute;top:25px;right:110px;width:212.5px;transform:scaleX(1);z-index:1000' /&gt;</p>



