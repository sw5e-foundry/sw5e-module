  - name: Gestalt Characters
    _id: EOa5hZBhDiJKvoU1
    text:
      content: |-
        <h3>Gestalt Characters</h3>

        <p>As indicated above, gestalt characters level in two classes simultaneously. They gain all of the proficiencies and features of each class, with following adjustments.</p>

        <h4>Experience Gain</h4>

        <p>Because a character is leveling in two classes simultaneously, the amount of experience that character should require to gain a level should double. For instance, going from 2nd level to 3rd requires 600 experience points. For a gestalt character, it instead requires 1,200.</p>

        <h4>Hit Points and Hit Dice</h4>

        <p>If a character chooses two classes with different sized Hit Dice, they should take the average of the two Hit Die sizes (rounded down), and they don't add the Hit Dice together. For instance, if a gestalt character chooses to level in consular, who has a d6 Hit Die, and guardian, who has a d10 Hit Die, that character would have a d8 Hit Die. If the player chooses consular and sentinel, who has a d8 Hit Die, however, their Hit Die would be a d6, since that would be the average of the two Hit Die sizes rounded down.</p>

        <h4>Starting Proficiencies and Equipment</h4>

        <p>For starting proficiencies and equipment, what you receive varies:</p>

        <p><strong><em>Saving Throws.</em></strong> You choose the saving throw pair offered by either class. You cannot mix-and-match, and you do not get both.</p>

        <p><strong><em>Skills.</em></strong> You choose the skills offered by one of your classes. You cannot mix-and-match, and you do not get both.</p>

        <p><strong><em>Weapons, Armor, and Tools.</em></strong> You gain the weapons, armor, and tool proficiencies for both classes.</p>

        <p><strong><em>Starting Equipment.</em></strong> You gain the starting equipment�or starting wealth�for either class. You cannot mix-and-match, and you do not get both.</p>

        <h4>Ability Score Increases</h4>

        <p>When a gestalt character reaches 4th, 8th, 12th, 16th, and 19th level, they gain the Ability Score Improvement feature in both classes. At each of these levels, that character should only gain this feature once, instead of twice. Alternatively, you can give them the full +2 Ability Score Improvement from one class, and a feat from the other, as with the ASI and a Feat variant rule.</p>

        <h4>Force- and Tech-Casting</h4>

        <p>If a character chooses two classes that both have force- or tech-casting, they use the following adjustments:</p>

        <ul><li>They determine their Max Power Level as if they were multiclassing. If the potential Max Power Level of the two classes combined would exceed 9, however, they instead use the fullcasting Max Power Level progression present on the Multiclass Max Power Level table.</li><li>They add the force or tech points from both classes together.</li><li>They learn their powers separately by class, as with multiclassing, and those powers are restricted by that class's native Max Power Level regardless of their gestalt Max Power Level.</li></ul>

        <p>If a character chooses two classes with opposing casting, they ignore these rules. For instance, if a gestalt character levels as consular and scout, force- and tech-casting are treated separately as determined by their class.</p>

        <h4>Overlapping Features</h4>

        <p>If two classes receive features that overlap, and aren't otherwise mentioned, it's up to the GM to determine how those features interact.</p>

        <h4>Multiclassing</h4>

        <p>Gestalt Characters are not suitable for multiclassing.</p>
