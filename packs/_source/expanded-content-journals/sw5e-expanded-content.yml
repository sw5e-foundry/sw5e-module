  - name: Teleportation Technique
    _id: KTXyxvK6s1nmOZV0
    text:
      content: |+
        <h2>Teleportation Technique</h2>

        &emsp;&nbsp;&nbsp;Whether through experimentation or discovery of<br> &emsp;&nbsp;&nbsp;an ancient technology, followers of the<br> &emsp;&nbsp;&nbsp;Teleportation Technique have learned to create<br> &emsp;&nbsp;&nbsp;brief teleportation portals, allowing them to<br> &emsp;&nbsp;&nbsp;maneuver and attack both quickly and<br> &emsp;&nbsp;&nbsp;unpredictably throughout the battlefield.

        <h3>Bonus Proficiencies</h3>

        <em><strong>Teleportation Technique:</strong> 3rd level</em><br>

        <p>You gain proficiency in tinker's implements.</p>

        <h3>Personal Teleporter</h3>

        <em><strong>Teleportation Technique:</strong> 3rd level</em><br>

        <p>You can use portable teleporters as a bonus action, instead of an action. </p>

        <p>Additionally, while you are wielding a tech focus, you can use your bonus action to create a pair of linked portals: one portal appears in a space within 5 feet of you, and the other portal appears in an unoccupied space you can see up to 30 feet away. These portals last until the start of your next turn, and they are large enough to accommodate Medium and smaller creatures and objects. Portals take the appearance of an elongated, shimmering mirror, and looking through a portal, a creature can see through the linked portal as if looking through a window. A creature or object who passes through a portal immediately appears in a space within 5 feet of the linked portal. You can use your reaction to end your portals early. If a creature is partially within your portals, it is shunted back to the space it previously occupied and it must make a Dexterity saving throw against your a tech save DC. On a failed save, it takes energy damage equal to your scout level + your Intelligence modifier.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you complete a short or long rest. At the beginning of each of your turns while you have a pair of portals active, you can expend a use of this feature to extend the duration of the portals until the start of your next turn (no action required).</p>

        <p>The distance at which you can create portals increases at higher levels. It increases to 60 feet at 5th level, 90 feet at 9th level, 150 feet at 13th level, 300 feet at 17th level, and 1,000 feet at 20th level.</p>

        <h3>Mark of the Teleporter</h3>

        <em><strong>Teleportation Technique:</strong> 3rd level</em><br>

        <p>On your turn, when you deal damage to the target of your Ranger's Quarry, and either you, your weapon, or the source of your damage have passed through your portals on this turn, when you roll below half the maximum on a damage die, you can treat the roll as if you'd rolled half the maximum on the damage die. You can only affect a number of dice up to half your Intelligence modifier (minimum of one) in this way.</p>



        <h3>Residual Warp</h3>

        <em><strong>Teleportation Technique:</strong> 7th level</em><br>

        <p>When you use your Personal Teleporter feature, you can place your portal in a place you've visited in the last 10 minutes, provided you can remember it, as opposed to a place you can see. That place must still be within range of your teleporter.</p>

        <h3>Quantum Entanglement</h3>

        <em><strong>Teleportation Technique:</strong> 11th level</em><br>

        <p>When you use your Personal Teleporter feature, you can place the portal that you would normally place within 5 feet of you in a place you can see within your Personal Teleporter's range. If that space is occupied by a Huge or smaller creature or a Medium or smaller unsecured object, it must make a Dexterity saving throw against your tech save DC. An object automatically fails this saving throw, and a creature can choose to fail. On a failed save, a Medium or smaller creature or object falls through the portal, immediately appearing in a space within 5 feet of the linked portal and falling prone. A Large or Huge creature instead falls prone without moving.</p>

        <h3>Reprisal</h3>

        <em><strong>Teleportation Technique:</strong> 15th level</em><br>

        <p>When you would be affected by a weapon or tech power that requires a Dexterity saving throw or attack roll and would affect only you, you can use your reaction to instantaneously create a pair of portals to redirect that power to another target within 30 feet. If the weapon or power required a melee or ranged attack roll, make a melee or ranged tech attack roll against the new target, as appropriate. If it required a Dexterity saving throw, the new target must make a Dexterity saving throw against your tech save DC.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <img src='https://www.gmbinder.com/images/qpp67Av.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:300px' />



