  - name: Shistavanen
    _id: HM4TXj81ztmUKK9V
    text:
      content: |-
        <h2>Shistavanen</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or light to dark brown</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, light to dark brown, grey (usually with age)</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or gray</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Lupine appearance, enhanced senses, increased speed, increased strength, healing ability</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'7"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>140 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Uvena Prime</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Shistavanen</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Shistavanen have pronounced muzzles, sharp claws, long pointed teeth, and pointed ears set on top of their heads. Shistavanen also possess large glowing eyes, and can also run at high speeds for long periods without getting tired, alternately using two or four limbs. As predators, they possess keen hearing and smell and excellent night vision.</p>

        <h3>Society and Culture</h3>

        As a species, the Shistavanen are isolationists. The species colonized all the unpopulated worlds in the Uvena system to prevent them from being settled by non-Shistavanen, and their restrictive trade laws (which are unapologetic in how they favor their own kind over off-world traders).  Most of their society uses<br> technology similar to the rest of the galaxy, though<br> some parts of Uvena Prime use slightly less<br> sophisticated technology.

        <p>A minority of Shistavanen are more outgoing, and travel the galaxy's hyperlanes. Even these Shistavanen usually remain by themselves or with other Shistavanen. Due to their natural predatory instincts, Shistavanen commonly find employment as scouts, mercenaries and bounty hunters. Many other species react badly to Shistavanen, since their isolationist culture makes them an unfamiliar sight, and their predatory appearance put other species on edge.</p>

        <h3>Names</h3>

        <p>Shistavanen first names typically sound graceful, while their surnames are more gutteral. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Bustuc, Hulvav, Kembol, Nemdav, Sirul</p>

        <p><strong>Female Names.</strong> Gaeft, Laer, Recloz, Shaalir, Thovnim</p>

        <p><strong>Surnames.</strong> Ghirat, Lakrevl, Meq, Nukroft, Rosk</p>



        <h3>Shistavanen Traits</h3>

        <p>As a shistavanen, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Constitution score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Shistavanen reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Shistavanen are private and tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Shistavanen typically stand around 6 feet tall and weigh between 140 and 190 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Forced March.</em></strong> Shistavanen are able to maintain a fast pace longer than other species. Shistavanen have advantage on Constitution saving throws made to avoid Exhaustion due to prolongued travel, as described in Chapter 8.</p>

        <p><strong><em>Keen Hearing and Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve hearing or smell.</p>

        <p><strong><em>Regenerative.</em></strong> When you take damage, you can use your reaction and expend a Hit Die to regain hit points as long as the damage would not reduce your hit points to 0.</p>

        <p><strong><em>Tooth and Nail.</em></strong> Your fangs and claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Shistavanen. The Shistavanen language is characterized by its barks and growls. </p>

        <img src='https://www.gmbinder.com/images/4yZRTuQ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:271.5px' />



