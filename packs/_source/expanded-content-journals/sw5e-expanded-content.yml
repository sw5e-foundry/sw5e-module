  - name: Adept Specialist
    _id: 6AX3rGgfTT0UYhcq
    text:
      content: |+
        <h2>Adept Specialist</h2>

        <p>Those fighters who choose to become Adept Specialists tap into a latent Force-sensitivity to augment their martial prowess, blending the two to accelerate their bodies and blows. An adept speeds across the battlefield, attacking opponents in a flurry of blows before dashing off again.</p>

        <h3>Forcecasting</h3>

        <em><strong>Adept Specialist:</strong> 3rd level</em><br>

        <p>You have learned powers, fragments of knowledge that imbue you with an abiding force ability. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 4 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the Adept Specialist Forcecasting table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your fighter level, as shown in the Force Points column of the Adept Specialist Forcecasting table, + your Wisdom or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Adept Specialist Forcecasting table.</p>

        <p>You may only cast force powers at 4th-level once. You regain the ability to do so after a long rest.</p>



        <h4>Forcecasting Ability</h4>

        <p>Your forcecasting ability varies based on the alignment of the powers you cast. You use your Wisdom for light side powers, Charisma for dark side powers, and Wisdom or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>

        <h3>Growing Momentum</h3>

        <em><strong>Adept Specialist:</strong> 3rd level</em><br>

        <p>You can cast the <em>burst of speed</em> force power targeting yourself at 1st-level without expending force points. At 10th level, when you do so, your speed increases by an additional 10 feet. At 18th level, when you do so, your speed increases by an additional 10 feet.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the fighter table. You regain any expended uses when you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/RUmDcAB.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:600px' />



        <h3>Whirling Weapons</h3>

        <em><strong>Adept Specialist:</strong> 7th level</em><br>

        <p>Your constant blur of motion and attacks becomes an unending barrage as you build momentum. Once on your turn when you miss with a weapon attack you can make another weapon attack, no action required. </p>

        <div class="sw5e-book-block"><h5>Adept Specialist Forcecasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Force Powers<br> Known</th><th>Force<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>4</td><td>3</td><td>1st</td></tr><tr><td>4th</td><td>6</td><td>4</td><td>1st</td></tr><tr><td>5th</td><td>7</td><td>5</td><td>1st</td></tr><tr><td>6th</td><td>8</td><td>6</td><td>1st</td></tr><tr><td>7th</td><td>10</td><td>7</td><td>2nd</td></tr><tr><td>8th</td><td>11</td><td>8</td><td>2nd</td></tr><tr><td>9th</td><td>12</td><td>9</td><td>2nd</td></tr><tr><td>10th</td><td>13</td><td>10</td><td>2nd</td></tr><tr><td>11th</td><td>14</td><td>11</td><td>2nd</td></tr><tr><td>12th</td><td>15</td><td>12</td><td>2nd</td></tr><tr><td>13th</td><td>17</td><td>13</td><td>3rd</td></tr><tr><td>14th</td><td>18</td><td>14</td><td>3rd</td></tr><tr><td>15th</td><td>19</td><td>15</td><td>3rd</td></tr><tr><td>16th</td><td>20</td><td>16</td><td>3rd</td></tr><tr><td>17th</td><td>22</td><td>17</td><td>4th</td></tr><tr><td>18th</td><td>23</td><td>18</td><td>4th</td></tr><tr><td>19th</td><td>24</td><td>19</td><td>4th</td></tr><tr><td>20th</td><td>25</td><td>20</td><td>4th</td></tr></tbody></table></div>

        <h3>&emsp;&emsp;Focused Breathing</h3>

        &emsp;&emsp;<em><strong>Adept Specialist:</strong> 10th level</em><br>

        <p>&emsp;You learn to recover some of your expended power quickly. When you use your Second Wind you also regain a number of force points equal to your Wisdom or Charisma modifier (your choice, a minimum of one). </p>

        <h3>Unstoppable Force</h3>

        <em><strong>Adept Specialist:</strong> 15th level</em><br>

        <p>You learn to completely ignore many of the most devastating impediments of combat. You can expend a use of Indomitable to gain the effect of the <em>freedom of movement</em> force power until the end of your next turn. </p>

        <h3>Instant Acceleration</h3>

        <em><strong>Adept Specialist:</strong> 18th level</em><br>

        <p>You reach the pinnacle of your training, moving faster than eyes or most sensors can track. When you use Action Surge feature, you can teleport up to 30 feet to an unoccupied space you can see. You can teleport before or after the additional action.</p>

        <img src='https://www.gmbinder.com/images/O85GUMO.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:520px' />

