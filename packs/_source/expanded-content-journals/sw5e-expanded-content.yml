  - name: Bolstering Practice
    _id: SeBM5RZB0WJqQ2Gm
    text:
      content: |+
        <h2>Bolstering Practice</h2>

        <p>Those operatives who choose the Bolstering Practice use precise strikes and brilliant use of small unit tactics to overwhelm enemies through superior teamwork.</p>

        <h3>Articulate Authority</h3>

        <em><strong>Bolstering Practice:</strong> 3rd level</em><br>

        <p>When you use your Cunning Action feature to take the Dash, Disengage, or Hide actions, a number of friendly creatures up to your Charisma modifier within 30 feet of you who can hear you and who can understand you can use their reaction to gain an effect, determined by the action you took:</p>

        <ul><li><strong>Dash:</strong> The creature can move up to half their speed. They must end this movement within 30 feet of you.</li><li><strong>Disengage:</strong> The creature can move up to 5 feet. If this movement would provoke an opportunity attack, the opportunity attack is made with disadvantage.</li><li><strong>Hide:</strong> The creature has advantage on the first attack roll they make before the end of their next turn against a creature you successfully hide from.</li></ul>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the operative table. You regain all expended uses when you finish a short or long rest.</p>

        <h3>Fireteam Commander</h3>

        <em><strong>Bolstering Practice:</strong> 3rd level</em><br>

        <p>You learn a number of squad maneuvers you can use to assist allies or exploit enemies. When you deal Sneak Attack damage to a creature, you may choose to forgo two of your Sneak Attack dice to make the attack a squad maneuver.</p>

        <h4>Fortifying Strike</h4>

        <p>You inspire a friendly creature within 60 feet of you who can see or hear you and roll two Sneak Attack dice. That ally immediately gains temporary hit points equal to the amount of rolled.</p>

        <h4>Reaffirming Strike</h4>

        <p>You use the authority your attacks carry to help your ally focus on the task at hand. Choose a creature within 60 feet of you who can see or hear you and that is currently charmed or frightened by the creature you would deal Sneak Attack damage to. The condition immediately ends on that creature.</p>

        <h4>Bolstering Strike</h4>

        <p>You choose a friendly creature within 60 feet of you who can see or hear you. Once before the start of your next turn, if that creature hits the creature against which you forwent two Sneak Attack damage dice, they deal additional damage to the target equal to the maximum of the two Sneak Attack dice.</p>



        <h3>Open Opportunity</h3>

        <em><strong>Bolstering Practice:</strong> 9th level</em><br>

        <p>Once per turn, when you take the Attack action and hit a creature without applying your Sneak Attack damage to it, you can forgo your Sneak Attack damage for the turn and use your bonus action to throw the creature off balance. The next ally to hit that creature before the start of your next turn may add your Sneak Attack dice to the damage of their attack. </p>

        <h3>Ambush Tactics</h3>

        <em><strong>Bolstering Practice:</strong> 13th level</em><br>

        <p>When attempting to move stealthily as a group, you may choose a number of creatures equal to your Charisma modifier. Those creatures may add their proficiency to any Dexterity (Stealth) checks they make as long as they remain within 60 feet of you and they do not already add their proficiency bonus.</p>

        <p>Additionally, each ally other than you that surprises a creature and hits it with an attack on their first turn in combat rolls two dice equal to the size of your Sneak Attack dice, dealing additional damage of the same type to the creature. </p>

        <h3>Squad Goals</h3>

        <em><strong>Bolstering Practice:</strong> 17th level</em><br>

        <p>You have such skill at maintaining the faith of your allies that the very sight of you in danger can spur them into action. When you are hit by an attack, up to six allies within 60 feet of you that can see or hear you and see the creature that hit you can make one weapon attack against that creature (no action required).</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <img src='https://www.gmbinder.com/images/LPJ9Lon.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:315px' />

