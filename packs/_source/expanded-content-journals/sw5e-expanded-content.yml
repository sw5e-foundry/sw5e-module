  - name: Pa'lowick
    _id: 6PIodohiEkFXA6tl
    text:
      content: |-
        <h2>Pa'lowick</h2>

        <blockquote><hr>

        <h5>Visual Characteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>Generally tan and greenish hues</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>Green, blue, gray, red-orange</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>Long snout, bulbous body on thin legs</td></tr></tbody></table>

        <hr>

        <h5>Physical Charicteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>4'6"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>65 lbs.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h5>Sociocultural Charicteristics</h5>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>Lowick</td></tr><tr><td><strong><em>Language</em></strong></td><td>Lowickese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>The pa'lowick are a species of humanoid amphibians who live in the coastal salt marshes of Lowick. They have compact but rotund midsections that top a pair of long, spindly legs ending in anisodactylic feet�three toes pointing forward, one back. This configuration, combined with their powerful lungs, enabled them to swim.</p>

        <p>The most prominent feature of pa'lowick physiology is their prehensile snout, which ends in a pair of pouty, human-like lips. Pa'lowick are also born with sharp tusks, which some lose by middle age.</p>

        <h3>Society and Culture</h3>

        <p>Pa'lowick live in large, independent communities with a feudal system of government. Many pa'lowick become fishers or hunters, as their biology allows. </p>

        <p>Songs and stories are the most treasured aspect of pa'lowick culture. Pa'lowick music runs the gamut of genres and subjects, although religious music is particularly common. Cultural heritage, such as history, genealogy, and parables, is largely passed down orally. Every Pa'lowick community has a dedicated storyteller; the esteem afforded this individual makes the position a coveted one. Large lungs make the Pa'lowick hearty singers and affords at least some members of the species the ability to scream loudly and disarm opponents in combat.</p>

        <h3>Names</h3>

        <p>Pa'lowick names tend to grow longer as the family tree grows older, with each generation adding a few syllables they are fond of.</p>

        <p><strong>Male Names.</strong> Loran, Jelanto, Neeamesh, Samoos</p>

        <p><strong>Female Names.</strong> Larisselle, Rensilla, Sy, Tripika</p>

        <p><strong>Surnames.</strong> Chatrunis, Dym, Geeci, Snootles</p>



        <h3>Pa'lowick Traits</h3>

        <p>As a pa'lowick, you have the following special traits:</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Pa'lowick reach adulthood in their late teens and live about 75 years.</p>

        <p><strong><em>Alignment.</em></strong> Pa'lowick enjoy a raucous good time, causing them to tend toward chaotic light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Pa'lowick stand about 5 feet tall, and weigh approximately 100 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Hold Breath.</em></strong> Pa'lowick have a great lung capacity and can hold their breath for up to 15 minutes at a time.</p>

        <p><strong><em>Proud Performer.</em></strong> Pa'lowick are best known for the energy they can bring to a singing performance. Whenever you make a Charisma (Performance) check involving singing, you are considered to have expertise in the Performance skill.</p>

        <p><strong><em>Snout.</em></strong> You have supreme control over your snout and can use it to manipulate objects as well as your hands. Additionally, your snout is a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Sonic Scream.</em></strong> As an action, you can violently expel air in a 15-foot cone. When you do so, each creature in the area of the exhalation must make a Wisdom saving throw (DC = 8 + your proficiency bonus + your Constitution modifier). A creature takes 2d6 sonic damage on a failed save, and half as much damage on a successful one. The damage increases to 4d6 at 5th level, 6d6 at 11th level, and 8d6 at 17th level. This ability has no effect on constructs. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses when you complete a long rest.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Lowickese. Lowickese requires the user to purse their lips and blow air, and is considered amusing by other species.</p>

        <img src='https://www.gmbinder.com/images/m4n05we.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:143px' />



