  - name: Engineer
    _id: RhFqeSoYoaGucQtT
    text:
      content: |+
        <h2>Engineer </h2>

        <p>In order to become an engineer, your companion must have an Intelligence score of 13 or higher.</p>

        <p>As an engineer, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons</li><li><strong>Tools:</strong> Tinker's implements and one of your choice</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Constitution, Intelligence</li><li><strong>Skills:</strong> Choose three from Investigation, Lore, Medicine, Nature, Piloting, and Technology</li></ul>

        <h3>Techcasting</h3>

        <p>Beginning when your companion chooses this class at 3rd level, during its training it has derived powers from schematics with the aid of a wristpad. See chapter 10 of the Player's Handbook for the general rules of techcasting and chapter 12 of the Player's Handbook for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>Your companion learns two tech powers of its choice of no higher level than its Max Power Level. </p>

        <p>At-will powers chosen by your companion do not scale normally at higher levels. Instead, if they would scale at 5th level, they instead scale at 11th level, and if they would scale at 11th level, they instead scale at 17th level.</p>

        <h4>Tech Points</h4>

        <p>Your companion does not require tech points. Instead, it can only cast powers at 1st-level once. It regains the ability to do so after completing a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Your companion's Max Power Level is 1st. </p>

        <h4>Techcasting Ability</h4>

        <p>Intelligence is your companion's techcasting ability for its tech powers. It uses Intelligence whenever a power refers to its techcasting ability. Additionally, it use its Intelligence modifier when setting the saving throw DC for a tech power it casts and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + its proficiency bonus + <br>its Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = its proficiency bonus + <br>its Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>Your companion uses a wristpad (found in chapter 5 of the Player's Handbook) as a techcasting focus for its tech powers.</p>



        <h3>Potent Aptitude</h3>

        <p>Also at 3rd level, your companion's technological experience lends it an uncommon insight that it can use to bolster its allies. To do so, it uses a bonus action on its turn to choose one creature other than itself within 60 feet of it who can hear it. That creature gains one Potent Aptitude die, a d4. This die increases to a d6 at 7th level and a d8 at 15th level.</p>

        <p>Once within the next 10 minutes, the creature can roll the die and add the number rolled to one ability check, attack roll, or saving throw it makes. The creature can wait until after it rolls the d20 before deciding to use the Potent Aptitude die, but must decide before the GM says whether the roll succeeds or fails. Once the Potent Aptitude die is rolled, it is lost.</p>

        <p>A creature can have only one Potent Aptitude die at a time.</p>

        <p>Your companion can use this feature once. It gains an additional use at 5th and 13th level. It regains any expended uses when it finishes a short or long rest.</p>

        <h3>Techcasting, Mark II</h3>

        <p>At 7th level, your companion's Max Power Level increases to 2nd, and it learns two additional powers.</p>

        <p>Additionally, your companion can cast powers at 2nd-level once. It regains the ability to do so after completing a short or long rest.</p>

        <h3>Techcasting, Mark III</h3>

        <p>By 11th level, your companion's Max Power Level increases to 3rd, and it learns two additional powers.</p>

        <p>Additionally, your companion can cast powers at 3rd-level once. It regains the ability to do so after completing a short or long rest.</p>

        <h3>Techcasting, Mark IV</h3>

        <p>At 15th level, your companion's Max Power Level increases to 4th, and it learns two additional powers.</p>

        <p>Additionally, your companion can cast powers at 4th-level once. It regains the ability to do so after completing a short or long rest.</p>

        <h3>Techcasting, Mark V</h3>

        <p>As of 18th level, your companion's Max Power Level increases to 5th, and it learns two additional powers.</p>

        <p>Additionally, your companion can cast powers at 5th-level once. It regains all expended uses after completing a long rest.</p>

