  - name: Racer
    _id: 4CkAxSgoviRUEozy
    text:
      content: |+
        <h2>Racer</h2>

        <p>You have a need for speed.  You live off of the adrenaline rush of piloting your craft or steering your beast through the dangers of a race.  You love the thrill of a photo-finish and relish the sweet taste of victory.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Animal Handling, Nature, Piloting, and Technology</li><li><strong>Tool Proficiencies:</strong> One type of gaming set or mechanic's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, a trophy or ribbon from your first-ever win, a gaming set (one of your choice), and a belt pouch containing 150 cr</li></ul>

        <h4>Racing Specialty</h4>

        <p>There are many places to race and many things to race with.  Maybe you dabble in all things fast.  Even still, all professional racers have a type of racing they prefer above all else; a race in which they are masters. Choose your vehicular or beastly specialty, or roll on the table below.</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>1</td><td>Air Speeders</td></tr><tr><td>2</td><td>Boonta Speeders</td></tr><tr><td>3</td><td>Pod Racers</td></tr><tr><td>4</td><td>Speeder Bikes</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>5</td><td>Starships</td></tr><tr><td>6</td><td>Swoop Bikes</td></tr><tr><td>7</td><td>Fathiers</td></tr><tr><td>8</td><td>Varactyls</td></tr></tbody></table></div>

        <h3>Feature: Terrain Mastery</h3>

        <p>You have a preternatural instinct for understanding the terrain, interpreting maps, and planning routes.  You and your party can move at three-fourths your speed over difficult terrain during long-distance travel.  Because of these skills, if you know your destination and the intervening terrain--either by reputation, by sight, or by maps you have seen--you are able to identify an effective short-cut, trimming your travel time by up to half.  Your GM may rule that your short-cut entails significant danger or may be temporarily impassable.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Animal Handler</td></tr><tr><td>2</td><td>Naturalist</td></tr><tr><td>3</td><td>Ace Pilot</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Linguist</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Racers are usually competitive and often fearless. They can lead a whirlwind of a life, and sometimes the adrenaline of the race is no longer enough for them. </p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>Win or lose.  There is no try.</td></tr><tr><td>2</td><td>Giving up is never an option for me.</td></tr><tr><td>3</td><td>I spit and laugh in the face of danger.</td></tr><tr><td>4</td><td>Why do something if there is not the possibility of death?</td></tr><tr><td>5</td><td>I am always calm, no matter what the situation. I never raise my voice or let my emotions control me.</td></tr><tr><td>6</td><td>I don't pay attention to the risks in a situation. Never tell me the odds.</td></tr><tr><td>7</td><td>The best way to get me to do something is to tell me I can't do it.</td></tr><tr><td>8</td><td>I blow up at the slightest insult.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Victory.</strong> It's not a victory if you don't follow the rules. (Lawful)</td></tr><tr><td>2</td><td><strong>Win.</strong> A win is a win, no matter how it's done. (Chaotic)</td></tr><tr><td>3</td><td><strong>Charity.</strong> I share my winnings with the less fortunate. (Light)</td></tr><tr><td>4</td><td><strong>Pride.</strong> I will do whatever it takes to be recognized as the best. (Dark)</td></tr><tr><td>5</td><td><strong>Excitement.</strong> Life is a race worth entering, because you never know how the ships will fly. (Neutral)</td></tr><tr><td>6</td><td><strong>Victory.</strong> Nothing worth doing is ever a sure thing. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>There is nothing more important to me than my vehicle.</td></tr><tr><td>2</td><td>I will win the Coruscant Invitational one day.</td></tr><tr><td>3</td><td>I'm trying to pay off the debt on my vehicle.</td></tr><tr><td>4</td><td>I owe a lot of money to the wrong kind of people.</td></tr><tr><td>5</td><td>I do what feels good.  Let's see the authorities catch me.</td></tr><tr><td>6</td><td>Someone I loved died because they were too slow.  That will never happen to me.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I think most people in life are content with a participation trophy. They disgust me.</td></tr><tr><td>2</td><td>I classify everyone I meet as a winner or a loser.  There's only ever one winner.</td></tr><tr><td>3</td><td>There is not a drug I won't try.</td></tr><tr><td>4</td><td>Once I start drinking, it's hard for me to stop.</td></tr><tr><td>5</td><td>Once someone questions my courage, I never back down no matter how dangerous the situation.</td></tr><tr><td>6</td><td>Waiting around makes me antsy. I'd rather do something stupid than do nothing at all.</td></tr></tbody></table>

