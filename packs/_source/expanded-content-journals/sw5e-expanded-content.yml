  - name: Taung
    _id: LgC0qB5eoBQVJrg5
    text:
      content: |-
        <h2>Taung</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>Gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>Yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>Bony and ridged skulls, tendrils  and fin-like protrusions on the back of their heads</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>5'8"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>165 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>Coruscant, Mandalore (adopted)</td></tr><tr><td><strong><em>Language</em></strong></td><td>Mando'a</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Taung are a humanoid species of tall and strong sentient simians. Physically, the taung are extremely resilient and are able to endure hardships many other species are unable to, which benefits their warlike nature as well as their tendencies to conquer planets.</p>

        <h3>Society and Culture</h3>

        <p>Taung society is one steeped in war, and the taung are warriors above all else. Nomadic and clan-based, the taung greatly value strength and honor, with pragmatism and ruthlessness being common traits amongst them. Originally waging war as a means of ritual worship to their god Kad Ha'rangir, the taung eventually became the Mandalorians, and - under the leadership of Mandalore the Indomitable - the act of war itself became the center of Mandalorian worship, and to wage war is to <em>be</em> divine.</p>

        <p>Despite their volatile nature, the taung are far from primitive, and maintain a high priority in procuring the latest technological advancements whenever possible.</p>

        <p>The Mandalorian armor that has become iconic throughout the galaxy originally began with the culture's taung founders, with their unique helmets and war masks being forged in the image of the taung's face, including slanted outer angles and a pointed chin. However, the armor is quite sparse among the taung as they believe that unarmed combat brings the highest honor.</p>

        <h3>Names</h3>

        <p>Taung names reflect their practical nature, typically choosing names that correspond to traits they deem desirable. Their names are rarely gender specific and can apply to either male or female. Their surnames reflect that of the clan they hail from.</p>

        <p><strong>First Names.</strong> Adenn (merciless), Atin (stubborn), Kot (strength), Kotep (brave), Tor (justice), Verd (soldier)</p>

        <p><strong>Surnames.</strong> Cadera, Fett, Keldau, Lok, Ordo, Vizla</p>



        <h3>Taung Traits</h3>

        <p>As a taung, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Taung reach adulthood at 13 and live to around 85, though they rarely live even half the length as they naturally can due to their deadly lifestyles as Mandalorians.</p>

        <p><strong><em>Alignment.</em></strong> The taung live by the traditions and honor-bound code of the Mandalorians, making them tend towards a lawful alignment, typically balanced or dark, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Taung typically stand between 6 and 7 feet tall and weigh around 210 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Claws.</em></strong> Your claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Toughness.</em></strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level. </p>

        <p><strong><em>Relentless Endurance.</em></strong> When you are reduced to 0 hit points but not killed outright, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>

        <p><strong><em>Taung Weapon Training.</em></strong> You gain proficiency in one vibroweapon and one blaster of your choice.</p>

        <p><strong><em>Menacing.</em></strong> You gain proficiency in the Intimidation skill.</p>

        <p><strong><em>Force Insensitive.</em></strong> While taung can be manipulated by the force, they cannot sense the Force. You can not use force powers or take levels in forcecasting classes.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Mando'a. Mando'a is primarily a spoken language and is very expressive with simple grammar.</p>

        <img src='https://www.gmbinder.com/images/YhgllKi.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:200px' />

        <img src='https://www.gmbinder.com/images/YEGoG1S.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:201px' />



