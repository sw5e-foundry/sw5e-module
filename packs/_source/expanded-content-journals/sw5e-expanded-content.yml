  - name: Dueling
    _id: 4axK2CAkyCA9EJLY
    text:
      content: |-
        <h2>Dueling</h2>

        <p></div></p>

        <p>Dueling, be it with lightsabers or blasters, is an iconic experience in the Star Wars narrative. When you want to engage in a more narrative form of dueling, rather than traditional combat, consider the following rules.</p>
