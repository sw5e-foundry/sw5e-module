  - name: Rakata
    _id: 2vsVoE24THRJAVZz
    text:
      content: |-
        <h2>Rakata</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Blue, green, grey, or red</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Blue, brown, gold, or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Horizontal eye stalks, vertical blade shaped head, tridactyl hands</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>125 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Lehon</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Rakata</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>In appearance, rakata are smooth skinned amphibian-like humanoids that had tall craniums along with eyes that protruded from each side of their heads on short stalks. These bipedal beings have three digit hands that are tipped with claws for digging through packed dirt. As a species, they are uniformly lean and tall; while most rakata have a similar height and weight, females tend to be more slender than males, though just as tall. Rakata are primarily carnivorous, likely stemming from the fact that they are cannibalistic, often making a meal of other species.</p>

        <p>Long term abuse of the Force in their society, exacerbated by a plague, culled the rakata's ability to sense the Force.</p>

        <h3>Society and Culture</h3>

        <p>Rakatan technology and structures hold the unique property of blending with the Force, creating powerful and long-lasting monuments that are almost impossibly to replicate. Rakatan society is devoted to conquering and enslaving those they deem weak. At the height of its power, the Rakatan Infinite Empire had conquered and enslaved dozens of worlds. They would strip entire planets of their resources and then terraform them to fit their own needs.</p>

        <p>After a plague ravaged their civilization and caused the fall of the Infinite Empire, rakata broke off into smaller tribes rather than a unified organization. Despite their newfound tribal nature, rakata retained their ability to quickly adapt to and appropriate technology.</p>

        <h3>Names</h3>

        <p>Rakatan names do not distinguish by gender, and they do not use surnames.</p>

        <p><strong>Names.</strong> Ceh'let, Orsaa, Skal'nas, Soa, Tul'kar</p>



        <h3>Rakata Traits</h3>

        <p>As a rakata, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Rakata reach adulthoood by 20 and rarely live longer than 90 years.</p>

        <p><strong><em>Alignment.</em></strong> Rakata's propensity towards war and aggression cause them to tend toward lawful dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Rakata typically stand between 6 and 7 feet tall and weigh around 180 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Adaptive Resilience.</em></strong> Prolongued use of technology allows rakata to readily adapt to its effects. You have advantage on Strength and Constitution saving throws against tech powers.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Cannibalize.</em></strong> If you spend at least 1 minute devouring the corpse of a beast or humanoid, you gain temporary hit points equal to your Constitution modifier. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <p><strong><em>Claws.</em></strong> Your claws are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Force-Insensitive.</em></strong> While rakata can be manipulated by many force powers, they can not sense the Force. You can not use force powers or take levels in forcecasting classes.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Technician.</em></strong> You are proficient in the Technology skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Rakata. Rakata is characterized by its deep tones and simplistic nature, using mainly consonants and long vowels. It's script seems to be a very ancient form of Galactic Basic.</p>

        <img src= 'https://www.gmbinder.com/images/KavzyFx.png' style='position:absolute;top:45px;right:160px;width:153px;transform:scaleX(-1);z-index:1000' />



