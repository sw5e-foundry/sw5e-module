  - name: Path of Witchcraft (Companion)
    _id: BWIKvbWm2rnORHIX
    text:
      content: |+
        <h2>Path of Witchcraft (Companion)</h2>

        <p></div></p>

        <p>The Force connects all living things. Those sentinels who follow the Path of Witchcraft use that connection to summon the aid of nature, both beasts and the elements, adapting them to their will.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Path of Witchcraft:</strong> 3rd level</em><br>

        <p>You gain proficiency in Animal Handling.</p>

        <h3>Wild Power</h3>

        <em><strong>Path of Witchcraft:</strong> 3rd level</em><br>

        <p>You learn the <em>enfeeble</em> force power, which does not count against your total powers known. Additionally, you can use Wisdom or Charisma as your forcecasting ability for it, and you can use the Double Strike Force-Empowered Self option when you cast it as your action and the target fails its save. Finally, you add your Wisdom or Charisma modifier (your choice, minimum of one) to damage rolls with it.</p>

        <h3>Beast Companion</h3>

        <em><strong>Path of Witchcraft:</strong> 3rd, 11th, and 17th level</em><br>

        <p>You learn to create a powerful bond through the Force with your own  beast companion.</p>

        <p>Create your beast companion as detailed in the Companions section of the Customization Options document for Expanded Content.</p>

        <p>In addition to its traits and features, your beast companion gains an additional benefit while it is bonded to you:</p>

        <ul><li>Your beast gains two additional traits. It gains one more additional trait when you reach 11th level in this class. For each beast trait in excess of your proficiency bonus, your force point maximum is reduced by 2. </li></ul>

        <p>Lastly, while bonded and within 10 feet of you, your beast companion gains the following benefits:</p>

        <ul><li>When you use a Force-Empowered Self option to increase your speed or armor class, you can instead grant this bonus to your beast companion. </li></ul>

        <ul><li>You and your beast companion can communicate telepathically, though your beast companion can only communicate in and understand simple concepts.</li></ul>

        <p>This radius increases to 30 feet at 11th level, and 60 feet at 17th level.</p>

        <h3>Nature's Vigor</h3>

        <em><strong>Path of Witchcraft:</strong> 7th level</em><br>

        <p>You've learned to attune your senses with nature. If you spend at least 1 minute meditating while in nature, you gain the following benefits for 1 hour:</p>

        <ul><li>You ignore difficult terrain caused by nature.</li><li>You can understand plants within 30 feet of you. They can telepathically communicate simple ideas to you, including memories from within the past day.</li><li>You can command plants within 30 feet of you to create difficult terrain, or other tasks at the GM's discretion (no action required).</li></ul>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Beastwarden</h3>

        <em><strong>Path of Witchcraft:</strong> 13th and 17th level</em><br>

        <p>Your bond with your beast companion strengthens, granting the following benefits while your beast companion is within 30 feet of you:</p>

        <ul><li>When you cast a force power that targets only yourself, and your beast companion is within range, you can also target your beast companion with that power. </li><li>If you or your beast have darkvision and the other doesn't, the other gains it with the same radius. If you both have darkvision, you both use the larger radius of the two, which then increases by 30 feet.</li><li>If you or your beast have advantage on Perception checks and the other doesn't, the other gains advantage on Perception checks. If you both have advantage on Perception checks, when either of you makes a Perception check with advantage, you can reroll one of the dice once.</li></ul>

        <p>This radius increases to 60 feet at 17th level.</p>

        <h3>Stormcaller</h3>

        <em><strong>Path of Witchcraft:</strong> 18th level</em><br>

        <p>You've learned to command the elements to summon a fierce storm in a 30-foot radius around you. As an action, you can gain the following benefits for 1 minute:</p>

        <ul><li>You gain a flying speed equal to your walking speed.</li><li>You have resistance to energy, lightning, and necrotic damage.</li><li>Whenever a hostile creature enters this radius for the first time on a turn or starts its turn there, it takes 10 lightning damage.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

