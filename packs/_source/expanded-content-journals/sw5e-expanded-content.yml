  - name: Rolling Tactical Initiative
    _id: G5QBGboVuf7uCUMU
    text:
      content: |-
        <h3>Rolling Tactical Initiative</h3>

        <p>When combat begins and initiative would be rolled, two or more allied creatures can choose to work as a unit, provided they can see or hear and understand each other. When they do so, they each roll initiative separately, adding any modifiers as appropriate. Once each individual party has rolled their initiative, the group then acts using the lowest result. Once a tactical group is formed, each character's initiative is set to the lowest result, even if the tactical group separates.</p>

        <p>For instance, if three players want to use tactical initiative, and they roll a 17, an 11, and a 14, all three players will instead act on initiative 11.</p>

        <h4>Multiple Tactical Groups</h4>

        <p>The party can use multiple tactical groups rather than all working in concert. For instance, a party of five might split into a tactical group of three and a tactical group of two, each group rolling their tactical initiative separately. A character can only belong to one tactical group at a time.</p>
