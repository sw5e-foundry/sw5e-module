  - name: Muun
    _id: NrPJcUOS6e2wFIiX
    text:
      content: |-
        <h2>Muun</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Light pink or white</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or grey</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Three hearts, long limbs,<br> elongated heads</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>145 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Scipio</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Muun</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        Muuns are tall, gaunt humanoids with thin bodies, long<br> limbs, and elongated hairless heads. They typically<br> have pale pink or white skin, most likely derived from<br> their propensity for staying indoors. Muuns have tiny<br> ears on the middle of the sides of their heads, flat<br> noses, and slim mouths which leads to a<br> commonly nasally voice.

        <h3>Society and Culture</h3>

        <p>Muuns believe in tradition, with an established culture based on intelligence and merit. A class-based hierarchy, Muuns consider the  the intellectual pursuits � financiers, lawyers, engineers, diplomats, scientists � as the highest levels of society. Muun culture, and life, revolves around economics and finance. Intense competition among coworkers encourages economic growth, increased productivity, and superior work ethic. Muuns also have a fundamental respect for justice, though they typically adhere to the letter of the law rather than the spirit.</p>

        <p>Since Muuns tend to shy away from fighting and physical pursuits, Muun society relies on alternative means for their planet's protection, using vast financial resources to purchase massive floating defense platforms to defend their civilization from attack.</p>

        <h3>Names</h3>

        <p>Muun names are typically clear and concise, rarely containing more than two syllables, with familial surnames.</p>

        <p><strong>Male Names.</strong> Clu, Hego, Nix, Pors, San</p>

        <p><strong>Female Names.</strong> Dax, Efra, Gil, Rel, Ter</p>

        <p><strong>Surnames.</strong> Card, Damask, Hill, Lesser, Tonith</p>



        <h3>Muun Traits</h3>

        <p>As a muun, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Intelligence score<br> increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Muuns reach adulthood in their late teens and live an average of a century.</p>

        <p><strong><em>Alignment.</em></strong> Muuns' lawful culture nature causes them to tend toward lawful balanced, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Muuns typically stand 6 and a half to 7 feet tall and weigh around 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Finance Savvy.</em></strong> Muun share a keen business sense and an ability to find value where others don't. Whenever you make a Charisma (Persuasion) check involving finances you are considered to have expertise in the Persuasion skill.</p>

        <p><strong><em>Long-Limbed.</em></strong> When you make a melee attack on your turn, your reach for it is 5 feet greater than normal.</p>

        <p><strong><em>Three Hearts.</em></strong> When you are reduced to 0 hit points but not killed outright, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Muun. The Muuns' admiration of mathematics carries over into their language, which bares a striking resemblance to Binary.</p>

        <img src='https://www.gmbinder.com/images/O6NHCqM.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:211px' />



