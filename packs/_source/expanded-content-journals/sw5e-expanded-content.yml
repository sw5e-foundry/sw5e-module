  - name: Armor Class vs. Damage Reduction
    _id: 1nrzCZsvXdm5Jx0b
    text:
      content: |-
        <h3>Armor Class vs. Damage Reduction</h3>

        <p>Instead of focusing solely on damage avoidance, this variant rule balances armor class and damage reduction, to better emphasize how armor is used. Each type of armor affects your AC and DR differently, as shown below.</p>

        <h4>Light Armor</h4>

        <p>As normal, light armor does not prohibit the maximum Dexterity bonus you can receive to your AC. However, if the light armor had a higher base AC, extra AC instead becomes damage reduction (DR).</p>

        <p>For instance, fiber armor normally increases your AC to 12 + Dexterity modifier. If you have a Dexterity modifier of +3, while wearing fiber armor you would have an AC of 15. With this variant rule, however, fiber armor instead grants you DR of 2 while allowing you to add your Dexterity modifier to your AC. If you have a proficiency bonus of +2, you would have an AC of 13 (8 + your proficiency bonus of +2 and your Dexterity modifier of +3) and DR of 2. </p>

        <h4>Medium Armor</h4>

        <p>Medium armor strikes a balance between AC and DR. As normal, it still allows you to add up to +2 to your AC if your Dexterity modifier is +2 or higher.</p>

        <p>For instance, weave armor normally increases your AC to 14 + Dexterity modifier (max 2). If you have a Dexterity modifier of +2 or higher, while wearing weave armor you would have an AC of 16. With this variant </p>

        <p>rule, however, weave armor instead grants you DR of 4 while allowing you to add your Dexterity modifier (max 2) to your AC. If you have a proficiency bonus of +2, you would have an AC of 12 (8 + your proficiency bonus of +2 and your Dexterity modifier of +2) and DR of 4. </p>

        <h4>Heavy Armor</h4>

        <p>Heavy armor focuses entirely on DR. You gain no benefit to AC from your Dexterity modifier, but you also aren't penalized if your Dexterity modifier is negative.</p>

        <p>For instance, assault armor normally increases your AC to 17. With this variant rule, however, assault armor instead grants you DR of 7, but it grants no benefit to your AC. If you have a proficiency bonus of +2, you would have an AC of 10 (8 + your proficiency bonus of +2) and DR of 7. </p>

        <h4>Unarmored Defense and Natural Armor</h4>

        <p>Certain species (such as wookie or colicoid), classes (such as monk or berserker), or archetypes (such as Blademaster Specialist fighter) grant unarmored defense or natural armor. When using this variant, the following rules apply.</p>

        <p><strong><em>Unarmored Defense.</em></strong> If your unarmored defense includes Strength, Dexterity, Intelligence, Wisdom, or Charisma, you add that modifier to your AC as normal. If your unarmored defense includes your Constitution modifier, however, you instead treat that modifier as DR. For instance, a monk with a proficiency bonus of +2, a Dex modifier of +4, and a Wisdom modifier of +3 would have an AC of 17. A berserker with a proficiency bonus of +2, a Dex modifier of +4, and a Constitution modifier of +3, however, would have an AC of 14 and DR of 3. </p>

        <p><strong><em>Natural Armor.</em></strong> If your natural armor includes an adjustment to your base AC, that adjustment instead becomes DR. If your natural armor allows you to add your Dexterity modifier to your AC, you still add it as normal. For instance, a wookiee's hide grants them a base AC of 13 + Dexterity modifier. If the wookiee has a proficiency bonus of +2 and a Dexterity modifier of +2, instead of having an AC of 15 they would have an AC of 12 and DR of 3. A colicoid, however, who would have an AC of 17, with a proficiency bonus of +2, would have an AC of 10 and a DR of 7.</p>

        <h4>Shields</h4>

        <p>As normal, shields add their bonus to AC.</p>

        <h4>Enhanced Items</h4>

        <p>If an enhanced armor would add an additional bonus to AC, it instead increases DR. If an enhanced shield would add an additional bonus to AC, it continues to do so. If that bonus only applies to melee or ranged AC, it still only applies to melee or ranged AC or DR, as appropriate.</p>

        <h4>Other AC Calculations</h4>

        <p>Work with your GM to determine how other AC calculations, such as the <em>battle precognition</em> power or Way of Endurance consular's Upheld by the Force feature, should translate using these rules.</p>



