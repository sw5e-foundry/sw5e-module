  - name: Ssi-Ruu
    _id: Az2q18x0jvI52d5C
    text:
      content: |-
        <h2>Ssi-Ruu </h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Brown, red, or tan scales</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Solid black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Reptilian, tails, scent-tongues</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'7"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>200 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Lwhekk</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Ssi-ruuvi</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Ssi-ruuk are a predatory, warm-blooded saurian species gifted with ferocious strength, remarkable speed, and sharp fangs and claws, traits that serve them well in the volcanic jungles of their homeworld of Lwhekk. Their muscular forms combined with their powerful tails make them very agile hunters, and their colorfully-scaled hides have been proven to be resistant even to blaster bolts. From their nostrils, two scent-tongues protrude that grant them enhanced olfactory senses, compensating for the poor vision afforded them by their dark, three-lidded eyes. No Ssi-ruu has ever been known to be Force-sensitive.</p>

        <h3>Society and Culture</h3>

        <p>The citizens of the Ssi-ruuvi Imperium follow a rigid caste system in which their station in society is determined by the color of the scales they are born with. Among these, the brown-scaled outcasts are regarded as the lowest of the low, and have no place in the Imperium beyond menial labor or death at birth. Deeply xenophobic and religious, the Ssi-ruuk view the rest of the galaxy as populated by lesser beings whose worlds rightfully belong to the Imperium. Despite their fierce nature, most ssi-ruuk are afraid of dying on a world unconsecrated by their priest caste, as they believe their souls would be doomed, so they harvest and "entech" the life-energy of other species to power droids that fight for them. The entechment process is torturous and painful to its victims, and is the main power source of Ssi-ruuvi technology.</p>

        <h3>Names</h3>

        <p>Ssi-ruuvi names are difficult to pronounce and gender neutral. Many ssi-ruuk adopt nicknames to make the lives of their associates easier. Ssi-ruuk do not have surnames.</p>

        <p><strong>Names.</strong> Firwirrung, Ivpikkis, Sh'tk'ith, Th'twirirl, Yifaii</p>



        <h3>Ssi-Ruu Traits</h3>

        <p>As a ssi-ruu, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Ssi-ruuk reach adulthood in their early teens and live to between 100 and 120 years.</p>

        <p><strong><em>Alignment.</em></strong> Ssi-ruuk's cultural drive to enslave and entech others cause them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Ssi-ruuk typically stand between 6 or 7 feet tall and weigh over 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 35 feet.</p>

        <p><strong><em>Type.</em></strong> Your creature type is both beast and humanoid.</p>

        <p><strong><em>Force-Insensitive.</em></strong> While Ssi-ruuk can be manipulated by many force powers, they can not sense the Force. You can not use force powers or take levels in forcecasting classes.</p>

        <p><strong><em>Hunter.</em></strong> You are proficient in Survival.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Natural Empathy.</em></strong> Ssi-ruuk have scent-tongues that let them read the emotions of individuals. You have advantage on Wisdom (Insight) checks to determine emotions against humanoids and beasts within 10 feet of you.</p>

        <p><strong><em>Sunlight Sensitivity.</em></strong> You have disadvantage on attack rolls and on Wisdom (Perception) checks that rely on sight when you, the target of your attack, or whatever you are trying to perceive is in direct sunlight.</p>

        <p><strong><em>Thick Skin.</em></strong> You have tough, scaly skin and prefer not to wear clothes. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier. </p>

        <p><strong><em>Tooth and Nail.</em></strong> Your fangs and claws are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d6 kinetic damage.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Ssi-ruuvi. Ssi-ruuvi is a language of musical whistles, honks and clicks, and is nigh impossible for humans and similar species to speak.</p>

        <img src='https://www.gmbinder.com/images/etWeg0L.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:330px;mix-blend-mode:darken' />



