  - name: Wire Tow
    _id: 5dJGMJzDBTTOEQhK
    text:
      content: |-
        <h4>Wire Tow</h4>

        <p><em>2nd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>You project a length of wire towards a foe to bring them within your grasp. Make a ranged tech attack against the target. On a hit, the target takes 2d10 kinetic damage, and you can pull it up to 25 feet closer to you. If you score a critical hit, the target is also knocked prone. If the target ends this movement within 5 feet of you and is no more than one size larger than you, the target is grappled by you for the duration.</p>

        <p>If a creature you grapple with this power uses its action to escape, it must succeed on a Strength (Athletics) or Dexterity (Acrobatics) check against your tech save DC to do so.</p>

        <p>This power ends if the attack misses or the grapple ends.</p>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the damage increases by 1d10 for each slot level above 2nd.</p>
