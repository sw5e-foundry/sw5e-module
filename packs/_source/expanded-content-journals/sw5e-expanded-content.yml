  - name: Barbarian
    _id: Vg7Fnbwb1WsUNgte
    text:
      content: |-
        <h2>Barbarian</h2>

        <p>Though you might have only recently arrived in civilized lands, you are no stranger to the values of cooperation and group effort when striving for supremacy. You learned these principles, and much more, as a member of your tribe.</p>

        <p>Your people have always tried to hold to the old ways. Tradition and taboo have kept your tribe strong while the kingdoms of others have collapsed into chaos and ruin. But for the last few generations, some bands among the tribes were tempted to settle, make peace, trade, and even to build towns. Perhaps this is why your tribe chose to raise up the totems among the people as living embodiments of his power. Perhaps they needed a reminder of who they were and from whence they came. The Chosen of your tribe led bands back to the old ways, and most of your people abandoned the soft ways of civilization.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Animal Handling, Athletics, Nature, and Survival</li><li><strong>Tool Proficiencies</strong>: One type of musical instrument or artisan's implements</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A hunting trap, a totemic token or set of tattoos marking your loyalty to your tribe, a set of traveler's clothes, and a pouch containing 100 cr</li></ul>

        <h3>Feature: Barbarian Heritage</h3>

        <p>You have an excellent knowledge of not only your tribe's territory, but also the terrain and natural resources of the rest of the worlds. You are familiar enough with any wilderness area that you find twice as much food and water as you normally would when you forage there.</p>

        <p>Additionally, you can call upon the hospitality of other tribes in times of need.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Animal Handler</td></tr><tr><td>2</td><td>Brawny</td></tr><tr><td>3</td><td>Naturalist</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Entertainer</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Athlete</td></tr><tr><td>8</td><td>Weapon Expert</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>Often considered rude and uncouth among civilized folk, barbarians have little respect for the niceties of life in the cities. The ties of tribe, clan, family, and the natural world of which they are a part are the most important bonds to most outlanders. </p>



        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I'm driven by a wanderlust that led me away from home.</td></tr><tr><td>2</td><td>I watch over my friends as if they were a litter of newborn pups.</td></tr><tr><td>3</td><td>I once ran twenty-five miles without stopping to warn my clan of an approaching horde. I'd do it again if I had to.</td></tr><tr><td>4</td><td>I have a lesson for every situation, drawn from observing nature.</td></tr><tr><td>5</td><td>I place no stock in wealthy or well-mannered folk. Money and manners won't save you from a hungry rancor.</td></tr><tr><td>6</td><td>I'm always picking things up, absently fiddling with them, and sometimes accidentally breaking them.</td></tr><tr><td>7</td><td>I feel far more comfortable around animals than people.</td></tr><tr><td>8</td><td>I was, in fact, raised by wampas.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Change.</strong> Life is like the seasons, in constant change, and we must change with it. (Chaotic)</td></tr><tr><td>2</td><td><strong>Greater Good.</strong> It is each person's responsibility to make the most happiness for the whole tribe. (Light)</td></tr><tr><td>3</td><td><strong>Honor.</strong> If I dishonor myself, I dishonor my whole clan. (Lawful)</td></tr><tr><td>4</td><td><strong>Might.</strong> The strongest are meant to rule. (Dark)</td></tr><tr><td>5</td><td><strong>Nature.</strong> The natural world is more important than all the constructs of civilization. (Neutral)</td></tr><tr><td>6</td><td><strong>Glory.</strong> I must earn glory in battle, for myself and my clan. (Any)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My family, clan, or tribe is the most important thing in my life, even when they are far from me.</td></tr><tr><td>2</td><td>An injury to the unspoiled wilderness of my home is an injury to me.</td></tr><tr><td>3</td><td>I will bring terrible wrath down on the Darkdoers who destroyed my homeland.</td></tr><tr><td>4</td><td>I am the last of my tribe, and it is up to me to ensure their names enter legend.</td></tr><tr><td>5</td><td>I suffer awful visions of a coming disaster and will do anything to prevent it.</td></tr><tr><td>6</td><td>It is my duty to provide children to sustain my tribe.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am too enamored of ale, wine, and other intoxicants.</td></tr><tr><td>2</td><td>There's no room for caution in a life lived to the fullest.</td></tr><tr><td>3</td><td>I remember every insult I've received and nurse a silent resentment toward anyone who's ever wronged me.</td></tr><tr><td>4</td><td>I am slow to trust members of other species, tribes, and societies.</td></tr><tr><td>5</td><td>Violence is my answer to almost any challenge.</td></tr><tr><td>6</td><td>Don't expect me to save those who can't save themselves. It is nature's way that the strong thrive and the weak perish.</td></tr></tbody></table>



