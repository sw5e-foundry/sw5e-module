  - name: Discovery
    _id: 9wnjBvoPiNKdUq71
    text:
      content: |-
        <h3>Discovery</h3>

        <p>Your destiny is to discover a person, species, object, or location that was either previously lost or unknown to the civilized galaxy. This could be as simple as seeking out the remains of a long-dead hero, or as rare as finding a vergence in the Force. A scout's destiny might be to find a thus-far-uncharted world that helps solve a galactic crisis, while a scoundrel's destiny might be to chart a new route through th Deep Core, allowing the Rebel Alliance to sneak past the Empire's security web. The thing being discovered should be something that can only be found as the result of a long-term search or serendipitous events that only occure because the character long ago set down the path that would lead to that discovery.</p>

        <p>Examples of thise destiny include Qui-Gon Jinn's discovery of Anakin Skywalker on Tatooine or Kyle Katarn's discovery of the Valley of the Jedi.</p>

        <h5>Sample Discovery Destiny:</h5>

        <h5>Base of Resistance</h5>

        <blockquote><p>Your destiny requires you to establish a hidden base that provides a safe haven and support for resistance fighters in a specific region. You might need to locate a new world that could accommodate a secret base or find a concealed facility on a known world from which dissenters covertly operate agains the Empire. You might need to gather allies and create secret support networks to maintain the base, supply it with equipment and weapons, and provide transportation for resistance forces. The scope of this destiny varies; it might be enough to establish a secret gathering place and a supply depot to aid resistance fighters in a single city, or it might require the construction of a major base to support operations in an entire system or even a sector.</p></blockquote>

        <h4>Destiny Fulfilled</h4>

        <p>You gain a permanent +1 destiny bonus to saving throws.</p>
