  - name: Fighting Style
    _id: FJaOqUoEKRdMlKlU
    text:
      content: |-
        <h3>Fighting Style</h3>

        <p>Certain class features or feats offer your choice of Fighting Style. As a part of this variant rule, you should allow your players to take the following Fighting Style instead of the options listed in the Player Handbook. You can't take a Fighting Style option more than once, even if you later get to choose again.</p>

        <h4>Sunder Fighting</h4>

        <p>You are skilled at striking in order to damage, and potentially destroy, your enemies' weapons. While you are wielding a melee weapon with which you are proficient, you gain the following benefits:</p>

        <ul><li>You no longer have disadvantage on Sundering attack rolls.</li><li>When a foe hits you with a Sundering attack, you can use your reaction to add a +5 to your armor class vs the triggering attack. If this causes the attack to miss, your weapon does not take any damage.</li></ul>
