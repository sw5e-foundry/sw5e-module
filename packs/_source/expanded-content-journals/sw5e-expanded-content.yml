  - name: Caster Level
    _id: NSkCGZbyzi8zxjqj
    text:
      content: |-
        <h3>Caster Level</h3>

        <p>Instead of having at-will powers that improve at 5th, 11th, and 17th <em>character</em> level, instead have them scale at 5th, 11th, and 17th <em>caster</em> level. Caster level is, effectively, what you're calculating when you are determining your Max Power Level while multiclassing. </p>

        <p>To determine your caster level, you divide your class's potential Max Power Level by 9, and then multiply the result by your number of levels in that class. That number is your caster level. For the full-caster classes�consular and engineer�this will be the same as your level in that class. For other casting classes and archetypes, your caster level will be lower than your level in that class.</p>

        <p>When multiclassing, you determine your caster level by dividing each class's potential Max Power Level by 9, multiplying the result by the number of levels in that class, adding the results for each class together, and rounding down the final result. For instance, if you have four levels in Marauder Approach berserker (1.77) and three levels in guardian (1.67), your caster level is 3.</p>
