  - name: Slicer Pursuit
    _id: FzBwLikCdFU5b5kc
    text:
      content: |-
        <h2>Slicer Pursuit</h2>

        <p></div></p>

        <p>Across the galaxy one can find numerous pseudonyms and false identities belonging to the hackers and cyber-infiltrators that call the world of electronics home. Those scholars who choose the Slicer Pursuit put their impressive intellectual prowess to work in the field of technology, to ends both benevolent and malicious.</p>

        <h3>Hacker's Disposition</h3>

        <em><strong>Slicer Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency with slicer's kits and in the Technology skill. Additionally, you can't have disadvantage on checks you make with them.</p>

        <h3>Techcasting</h3>

        <em><strong>Slicer Pursuit:</strong> 3rd level</em><br>

        <p>You have derived powers from schematics with the aid of your wristpad. See chapter 10 for the general rules of techcasting and chapter 12 for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>You learn 3 tech powers of your choice, and you learn more at higher levels, as shown in the Tech Powers Known column of the Slicer Pursuit Techcasting table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Tech Points</h4>

        <p>You have a number of tech points equal to half of your scholar level, as shown in the Tech Points column of the Slicer Pursuit Techcasting table, + your Intelligence modifier. You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many tech powers can be overcharged, consuming more tech points to create a greater effect. You can overcharge these powers to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Slicer Pursuit Techcasting table.</p>

        <p>You may only cast tech powers at 4th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Techcasting Ability</h4>

        <p>Intelligence is your techcasting ability for your tech powers. You use your Intelligence whenever a power refers to your techcasting ability. Additionally, you use your Intelligence modifier when setting the saving throw DC for a tech power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + your proficiency bonus + <br>your Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = your proficiency bonus + <br>your Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>You use a wristpad (found in chapter 5 of the Player's Handbook) as a tech focus for your tech powers.</p>

        <div class="sw5e-book-block"><h5>Slicer Pursuit Techcasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Tech Powers<br> Known</th><th>Tech<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>3</td><td>2</td><td>1st</td></tr><tr><td>4th</td><td>4</td><td>2</td><td>1st</td></tr><tr><td>5th</td><td>5</td><td>3</td><td>1st</td></tr><tr><td>6th</td><td>6</td><td>3</td><td>1st</td></tr><tr><td>7th</td><td>7</td><td>4</td><td>2nd</td></tr><tr><td>8th</td><td>8</td><td>4</td><td>2nd</td></tr><tr><td>9th</td><td>9</td><td>5</td><td>2nd</td></tr><tr><td>10th</td><td>10</td><td>5</td><td>2nd</td></tr><tr><td>11th</td><td>11</td><td>6</td><td>2nd</td></tr><tr><td>12th</td><td>12</td><td>6</td><td>2nd</td></tr><tr><td>13th</td><td>13</td><td>7</td><td>3rd</td></tr><tr><td>14th</td><td>14</td><td>7</td><td>3rd</td></tr><tr><td>15th</td><td>15</td><td>8</td><td>3rd</td></tr><tr><td>16th</td><td>16</td><td>8</td><td>3rd</td></tr><tr><td>17th</td><td>17</td><td>9</td><td>4th</td></tr><tr><td>18th</td><td>18</td><td>9</td><td>4th</td></tr><tr><td>19th</td><td>19</td><td>10</td><td>4th</td></tr><tr><td>20th</td><td>20</td><td>10</td><td>4th</td></tr></tbody></table></div>

        <h3>Systems Hijack</h3>

        <p>Also at 3rd level, when the target of your Critical Analysis is a droid or construct, or wearing or holding a techcasting focus, that creature is a viable target for any tech powers with you cast with a range of touch.</p>

        <p>Additionally, when the target of your Critical Analysis casts a tech power, you can use your reaction to identify the tech power being cast, and at what level.</p>



        <h3>Potent Programming</h3>

        <em><strong>Slicer Pursuit:</strong> 6th level</em><br>

        <p>When a creature succeeds on a saving throw against an at-will tech power you cast that deals damage, the creature takes half the power's damage, but suffers no additional effects of the power.</p>

        <h3>Redirect Error</h3>

        <em><strong>Slicer Pursuit:</strong> 9th level</em><br>

        <p>When the target of your Critical Analysis feature casts a tech power that affects an area, you can use your reaction to cause that power to instead affect an area in a 10-foot-radius sphere centered on the caster. </p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h3>System Override</h3>

        <em><strong>Slicer Pursuit:</strong> 17th level</em><br>

        <p>You know how to quickly activate anti-tech subroutines you have encoded into your wristpad. You can cast the <em>diminish tech</em> and <em>tech override</em> powers at 3rd level without expending tech points. If the target is the target of your Critical Analysis, you have advantage on the techcasting ability check for these powers.</p>

        <p>You can use this feature three times. You regain all expended uses when you finish a long rest.</p>

        <h3>Slicer Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect your understanding of tech casting. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order.</p>

        <h4>Administrator's Log</h4>

        <p>If you spend at least 10 minutes working on a computer or terminal, you can get a full list of users who have accessed the machine within the past 24 hours. Over the course of a long rest, you may then form a facsimile of identification that would allow you to pass yourself off as that person when accessing machines.</p>

        <h4>Backdoor Egress</h4>

        <p>When you cast a tech power that affects an area and requires a saving throw, and you are inside that power's area, you can use your reaction to move up to half your speed without provoking opportunity attacks. If you end this movement outside the area affected by the tech power, you do not have to make a saving throw to avoid its effects. </p>

        <h4>Intelligence Core Override</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You can cast the <em>override interface</em> tech power at 5th level without spending tech points. </p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h4>Resource Appropriation</h4>

        <em><strong>Prerequisite:</strong> 11th level</em><br>

        <p>If you reduce the target of your Critical Analysis feature to 0 hit points, and it has tech point remaining, you may choose to gain any tech points it had remaining. Your current tech points cannot exceed your tech point maximum.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Skillful Casting</h4>

        <p>When you hit a creature with an at-will tech power that requires an attack roll, you may treat that attack roll as a weapon attack for the purpose of using maneuvers.</p>

        <h4>Sleeper Program</h4>

        <p>Whenever you cast a tech power with a casting time of 1 action, you can choose to delay the power's activation up to a minute. When you do so, you cast the power as normal, but holds its energy for the duration of the delay. Holding onto the power's effect requires concentration. If your concentration is broken before the delay ends, the power dissipates without taking effect. You can use your reaction to activate the power at any time.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the scholar table. You regain all expended uses  when you finish a long rest.</p>



