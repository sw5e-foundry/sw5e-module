  - name: Cryogenic Blow
    _id: XXFFYyTaS9o0XC4l
    text:
      content: |-
        <h4>Cryogenic Blow</h4>

        <p><em>1st-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>

        <p>The next time you hit a creature with a weapon attack during this power's duration, the attack deals an extra 1d6 cold damage to the target. The target must make a Strength saving throw. On a failed save, it gains a level of slowed for the duration. At the start of each of its turns, the target can repeat the saving throw, ending the effect on itself on a success.</p>

        <p><strong><em>Overcharge Tech.</em></strong> If you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.</p>
