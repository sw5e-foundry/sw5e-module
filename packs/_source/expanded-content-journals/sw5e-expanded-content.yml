  - name: Improved Pyrokinesis
    _id: NZ63BIxh1hkGoQ6g
    text:
      content: |-
        <h4>Improved Pyrokinesis</h4>

        <p><em>2nd-level universal power</em></p>

        <hr>

        <ul><li><strong>Prerequisite:</strong> Pyrokinesis</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>

        <p>A line of roaring Force-enhanced flame 30 feet long and 5 feet wide emanates from you in a direction you choose. Each creature in the line must make a Dexterity saving throw. A creature takes 3d8 energy damage on a failed save, or half as much damage on a successful one.</p>

        <p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd.</p>
