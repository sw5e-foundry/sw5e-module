  - name: Gran
    _id: 3Ukk2CW8q9rQG3OJ
    text:
      content: |-
        <h2>Gran</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Blue or tan</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Black, purple</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Three eyes and goat-like snout</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'10"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>115 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Kinyen</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Gran</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Gran can easily be identified by their three eyes and their goat-like snout. Female Gran also have three breasts. They have excellent vision, able to resolve more colors than most species, and even able to see into the infrared, thus they are able to sense one another's emotions and disposition by noting subtle changes in body heat and skin color. Gran have two stomachs, having evolved from herbivorous grazing animals who lived in herds on the mountains and highlands of Kinyen. A single meal can take almost an entire day to finish, after that a Gran does not often need to eat for several days.</p>

        <h3>Society and Culture</h3>

        <p>The peaceful nature of Gran society is a reflection of their homeworld, Kinyen. Kinyen boasted large and rolling grasslands and highlands, a dense and beautiful forest, and one of the longest and clearest rivers in the Bes Ber Bikade sector. The beauty of this planet, and the need for primitive Gran to band together for defense against predatory animals, helped the Gran develop strong bonds of home and family in their society. </p>

        <p>The Grans are also very protective of their families, and were some of the most devoted parents in the galaxy. This is because of their very powerful and sensitive sight, which can sense the emotions of their mates and their children. Gran society maintains its balance by setting up strict career quotas, and making sure young Gran are educated for a specific job that best served his or her talents.</p>

        <h3>Names</h3>

        <p>Gran names typically are monosyllabic and accompanied by a surname, which is familial.</p>

        <p><strong>Male Names.</strong> Ask, Dree, Ree, Pax, Nic</p>

        <p><strong>Female Names.</strong> Yan, Alijia, Meeb, Sir, Zeek</p>

        <p><strong>Surnames.</strong> Moe, Leem, Yees, Wix, Naaq</p>



        <h3>Gran Traits</h3>

        <p>As a Gran, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Gran reach adulthood around their late teens and live up to 80 years. </p>

        <p><strong><em>Alignment.</em></strong> Gran highly organized society cause them to tend toward lawful alignments, though there are exceptions..</p>

        <p><strong><em>Size.</em></strong> Gran typically stand between 5 and 6 feet tall and weigh around 170 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Slow Metabolism.</em></strong> You are able to go a number of days without food equal to 3 + twice your Constitution modifier before suffering exhaustion.</p>

        <p><strong><em>Keen Sight.</em></strong> Through use of infrared vision, you have advantage on Wisdom (Perception) checks that rely on sight. </p>

        <p><strong><em>Reader of Hearts.</em></strong> Through identifying subtle variations in a target's body heat, the Gran are able to better understand their emotions and intentions. You are proficient in the Insight skill. </p>

        <p><strong><em>Toughness.</em></strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Gran. It is rare to hear Gran spoken on any world other than Kinyen.</p>

        <img src='https://www.gmbinder.com/images/a6Bb4kH.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:360px' />



