  - name: Rescue
    _id: ELqsDGUTEOwTODgq
    text:
      content: |-
        <h3>Rescue</h3>

        <p>Your destiny requires you to save a person from death or an object from destruction. Often characters with this destiny will not know which person or object they're meant to save, let alone when or how to do so. They simply must be in the right place at the right time. A hero might spend months travelling with his allies before fulfilling his destiny by saving one of their lives. Conversely, a Rebel agent might engage in years' worth of espionage on his home planet, only to find that his destiny is to save a local Imperial magistrate who betrays the Empire after having her life saved.</p>

        <p>Examples of this destiny include Han Solo saving Luke Skywalker's life at the Battle of Yavin and Wicket the Ewok rescuing Leia from the scout troopers on Endor.</p>

        <h4>Destiny Fulfilled</h4>

        <p>Increase two ability score of your choice by 1 each.</p>
