  - name: Rishii
    _id: RKnV510fBVomgYFA
    text:
      content: |-
        <h2>Rishii</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown or white</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Sound mimicry, enhanced hearing and sight</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'2"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>60 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Rishi</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Rishii</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Rishii are a sentient, avian species of carnivores which possess two legs ending in four-toed feet, two arms, a tail, and a head. The species' two arms consist of feathered wings ending in nimble humanoid hands, capable of manipulating tools. The wings grant the Rishii the ability to fly at great speeds, which is their method of travel equivalent to running in land-based species. A Rishii's head contained a beak between two yellow eyes framed by a large brow. Rishii were capable of mimicking anything said to them perfectly, and also possessed extremely strong senses, particularly hearing and sight. </p>

        <h3>Society and Culture</h3>

        <p>Native to the planet Rishi, the Rishii live in loose primitive tribes, known as nests, clustered high upon the planet's mountains, away from the hot and humid lowland swamps. Each nest consists of a small number of family units led by a chieftain, with neighbouring nests respecting each others territories and living in harmony. This peaceful and accepting attitude goes beyond just other Rishii and was extended to all neighbours of a nest, including the many other species who colonise the lowlands of Rishi. Due to the unfavorable conditions found in the lowlands, the native avians do not understand the off-worlders' choice to live there, but were not opposed to their presence.</p>

        <h3>Names</h3>

        <p>As with much of their speech, Rishii names include clicks, trills, and whistles to the point that other peoples have a difficult time pronouncing them. Typically, a name has two to four syllables with the sounds acting as connectors. Rishii names do not vary based on gender. Rishii are responsive to nicknames given by outsiders. </p>



        <h3>Rishii Traits</h3>

        <p>As a rishii, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Rishii reach adulthood at 10 and generally live no longer than 60 years.</p>

        <p><strong><em>Alignment.</em></strong> Rishii tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Rishii range from 4 to 6 feet tall and generally weigh less than 130 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Flight.</em></strong> You have a flying speed equal to your walking speed. While wearing medium or heavy armor, your flying speed is reduced by half.</p>

        <p><strong><em>Keen Hearing and Sight.</em></strong> You have advantage on Wisdom (Perception) checks that rely on hearing or sight.</p>

        <p><strong><em>Mimicry.</em></strong> You can mimic sounds you have heard, including voices. A creature that hears the sounds you make can tell they are imitations with a successful Wisdom (Insight) check opposed by your Charisma (Deception) check.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Rishii. Rishii's clicks, trills, and whistles are difficult for outsiders to learn without the aid of a protocol droid, and so Rishii often feel comfortable speaking to eachother in the language in front of others.</p>

        <img src='https://www.gmbinder.com/images/BuOJWlZ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:522px' />



