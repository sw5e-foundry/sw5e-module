  - name: Minor Benevolence/Corruption
    _id: PWKUwil3yc9ESjNQ
    text:
      content: |+
        <h3>Minor Benevolence/Corruption</h3>

        <p>At certain tiers of Light/Dark Points, you risk manifesting Minor Traits, as shown in the Force Alignment table. When you would earn a Minor Trait, you must first make a saving throw (Charisma for Benevolence, Wisdom for Corruption), the DC of which varies depending on the tier of the Minor Trait, as shown in the Minor Benevolence/Corruption Save DC table below. On a failed save, you must roll on a Minor Benevolence/Corruption tables, depending on the tier of the Minor Benevolence/Corruption. You can choose to fail this saving throw, if you wish.</p>

        <h5>Minor Benevolence/Corruption Save DC</h5>

        <p>| Minor Benevolence/Corruption Tier | Save DC | |:--|:-:| | Minor Benevolence/Corruption (Tier I)     | 12 | | Minor Benevolence/Corruption (Tier II)    | 14 | | Minor Benevolence/Corruption (Tier III)   | 16 | | Minor Benevolence/Corruption (Tier IV)    | 18 | | Minor Benevolence/Corruption (Tier V)     | 20 |</p>



        <div class="sw5e-book-block"><h4>Minor Benevolence (Tier I)</h4>

        <p>| d4 | Minor Benevolence| |:-:|:--| | 1 | Your eyes tend to brighten during moments of satisfaction. |  | 2 | Your body is less likely to scar or show lasting signs of injury. |  | 3 | Your voice becomes slightly more eloquent. |  | 4 | Tame animals seem less uneasy around you.| </p>

        <h4>Minor Benevolence (Tier II)</h4>

        <p>| d4 | Minor Benevolence |   |:-:|:--| | 1 | Your eyes become more stark and vibrant. | | 2 | Any existing scars on your body fade, and wounds never scar or fester. |  | 3 | Your voice gains a pleasant, melodic speaking cadence. |  | 4 | Your hair gains subtle highlights of gold or silver that occasionally reflect light. | </p>

        <h4>Minor Benevolence (Tier III)</h4>

        <p>| d4 | Minor Benevolence |  |:-:|:--| | 1 | Your eyes gain flecks of an unusual, complimenting color, such as amber or emerald. |  | 2 | Your skin always has a healthy tone. |  | 3 | You never suffer from minor illnesses, always appearing to be the pinnacle of health. |  | 4 | Wild animals become significantly less prone to attacking you. | </p>

        <h4>Minor Benevolence (Tier IV)</h4>

        <p>| d4 | Minor Benevolence |  |:-:|:--| | 1 | Your eyes permanently take on an unusual, complimenting color, such as green becoming bright emerald. |  | 2 | Your voice has a naturally calming quality that puts others at easy. |  | 3 | You seem all but immune to naturally occurring illnesses. |  | 4 | Your hair takes on visible streaks of gold or silver. | Your hair begins to wither and fall out. |</p>

        <h4>Minor Benevolence (Tier V)</h4>

        <p>| d4 | Minor Benevolence |  |:-:|:--| | 1 | Your eyes permanently gain a faint glow.|  | 2 | You exude a calming presence that brings a slight feeling of peace to those around you. | | 3 | Withered or sickly plants seem to liven in your presence. | | 4 | You appear 1d10 years more youthful than you actually are. This does not change your actual life span.  |</p></div>

        <div class="sw5e-book-block"><h4>Minor Corruption (Tier I)</h4>

        <p>| d4 | Minor Corruption| |:-:|:--| | 1 | Your eyes turn a pale yellow during moments of anger. | | 2 | You more easily become scarred. | | 3 | Your voice becomes slightly hoarse. | | 4 | Your hair starts to lose its color, with gray streaks appearing throughout it. |</p>

        <h4>Minor Corruption (Tier II)</h4>

        <p>| d4 | Minor Corruption | |:-:|:--| | 1 | Your eyes turn a luminous, sulfuric yellow with fiery red rims around the irises during moments of anger. | | 2 | Any scars on your body become more noticeable, and your wounds become more pronounced. | | 3 | Your voice lowers in pitch and becomes raspier. | | 4 | Your hair becomes predominantly gray. |</p>

        <h4>Minor Corruption (Tier III)</h4>

        <p>| d4 | Minor Corruption | |:-:|:--| | 1 | Your eyes permanently turn a luminous, sulfuric yellow with fiery red rings around the irises. | | 2 | Your skin begins to lose its pigmentation, becoming pale and mottled. | | 3 | Your veins become increasingly visible across your entire body, as if they are sticking out. | | 4 | Your hair loses its color entirely, turning a stark white. |</p>

        <h4>Minor Corruption (Tier IV)</h4>

        <p>| d4 | Minor Corruption | |:-:|:--| | 1 | Your eyes permanently turn a luminous, dark orange with fiery red rings around the irises.  | 2 | Your skin loses its pigmentation, turning nearly stark white, while your veins become even more accentuated. | | 3 | Your nails and claws begin to wither and grow longer, turning a vile yellow color. | | 4 | Your hair begins to wither and fall out. |</p>

        <h4>Minor Corruption (Tier V)</h4>

        <p>| d4 | Minor Corruption | |:-:|:--| | 1 | Your eyes permanently turn a luminous, blood red with fiery red rings around the irises. | | 2 | You appear physically devoid of emotions. Your feelings never project outwards. | | 3 | You develop a sickly, uncontrollable cough. | | 4 | You appear 1d10 year older than you actually are. This does not change your actual life span. |</p></div>

