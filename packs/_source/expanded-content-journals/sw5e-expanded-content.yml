  - name: Mutate/Augment
    _id: MWzzXG6MNgJp6T3j
    text:
      content: |-
        <h4>Mutate/Augment</h4>

        <p><em>3rd-level tech power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>

        <p>You alter your body with tech, temporarily gaining new properties which last for the duration. You can select three of the following properties. You cannot select a property more than once, unless that property says otherwise.</p>

        <ul><li>Your body becomes more flexible. You have advantage on ability checks and saving throws against effects that would grapple or restrain you, and your movement is unaffected by difficult terrain or squeezing.</li><li>You grow one additional appendage. This appendage serves as an arm and a hand, though it can take the shape of a limb, tentacle, or similar appendage. You can select this property twice to grow a maximum number of two appendages. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required).</li><li>You sprout antennae that give you tremorsense out to a range of 30 feet.</li><li>You extend the length of your limbs. When you make a melee attack or attempt to grapple, shove, or trip a creature on your turn, your reach for it is 5 feet greater than normal.</li><li>You gain a burrowing speed equal to your walking speed.</li><li>Your flesh hardens. Your AC can't be less than 16, regardless of what kind of armor you're wearing.</li><li>You can gain the benefits of any one option of the <em>alter self</em> power. You can select this property multiple times to gain the benefits of multiple options of the <em>alter self</em> power, choosing a different option each time.</li><li>You gain the effect of the <em>magnetic hold</em> power, but you can affix to and move along any surface, instead of only metallic surfaces. You have a climbing speed equal to your walking speed.</li><li>You can gain any one effect of the <em>force enlightenment</em> power.</li></ul>

        <p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, you can select an additional property for each slot level above 3rd.</p>
