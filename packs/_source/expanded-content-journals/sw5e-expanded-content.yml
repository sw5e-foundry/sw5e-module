  - name: Vonil/Ishu Form
    _id: FA2QNNiqBfuv81O6
    text:
      content: |-
        <h2>Vonil/Ishu Form</h2>

        <p></div></p>

        <p>Vonil/Ishu Form, also known as Unity Form, focuses on fighting in tandem with your allies. Those guardians who focus on Vonil/Ishu Form utilize teamwork to move swiftly, strike quickly, and protect each other from harm.</p>

        <h3>Form Basics</h3>

        <em><strong>Vonil/Ishu Form:</strong> 3rd level</em><br>

        <p>You gain your choice of the Vonil or Ishu lightsaber form, detailed in the Lightsaber Forms section of the Customization Options document for Expanded Content. If you already know the chosen form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Hydra</h3>

        <em><strong>Vonil/Ishu Form:</strong> 3rd, 11th, and 17th level</em><br>

        <p>As a bonus action, you can enter a synchronized stance with one ally of your choice within 10 feet of you for 1 minute. While in this stance, once per turn, when you hit a creature with an attack, the chosen ally has advantage on the next attack it makes against the same target before the end of your next turn. Additionally, once per turn, when the chosen ally hits a creature with an attack, you have advantage on the next attack you make against the same target before the end of your next turn.</p>

        <p>This effect ends early if either you or the chosen ally are incapacitated or die, or if the chosen ally is ever more than 10 feet away from you. Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <p>At 11th level, the chosen ally must be within 30 feet of you to benefit from this feature. At 17th level, the chosen ally must be within 60 feet.</p>

        <h3>Channel the Force</h3>

        <em><strong>Vonil/Ishu Form:</strong> 3rd, 11th, and 17th level</em><br>

        <p>You gain one of the following Channel the Force options. Choose Smite for Vonil or Shield for Ishu.</p>

        <h4>Smite</h4>

        <p>Once per turn, when an ally is within 10 feet of you and it hits a creature with a melee weapon attack, you can expend a use of your Channel the Force and expend force points to have the chosen ally deal additional damage to the target, which is the same type as the weapon's damage. The additional damage is 1d8 for each point spent in this way. You can't deal more additional damage than the amount shown in the Focused Strikes column of the guardian table.</p>

        <p>At 11th level, the chosen ally must be within 30 feet of you to benefit from this feature. At 17th level, the chosen ally must be within 60 feet.</p>

        <h4>Shield</h4>

        <p>When an ally is hit by a weapon attack while within 10 feet of you, you can use your reaction and expend a use of your Channel the Force to attempt to divert the attack. When you do so, the damage the chosen ally takes from the attack is reduced by 1d10 + your Wisdom or Charisma modifier (your choice) + your guardian level.</p>

        <p>&emsp;At 11th level, the chosen ally must be within 30 feet of you to benefit from this feature. At 17th level, the chosen ally must be within 60 feet.</p>

        <h3>Amplified Auras</h3>

        <em><strong>Vonil/Ishu Form:</strong> 7th, 11th, and 17th level</em><br>

        <p>Once on each of your turns, you can choose an ally within 10 feet of you. While the chosen ally is within 10 feet of you, your auras emit from that ally as if you were standing in that ally's space. A creature in the area of more than one instance of your auras is affected only once.</p>

        <p>At 11th level, the chosen ally must be within 30 feet of you to benefit from this feature. At 17th level, the chosen ally must be within 60 feet.</p>

        <h3>Teamwork</h3>

        <em><strong>Vonil/Ishu Form:</strong> 15th level</em><br>

        <p>You gain one of the following features. Choose Takedown for Vonil or Rebuttal for Ishu.</p>

        <h4>Takedown</h4>

        <p>When an ally within 30 feet of you takes the Help action and helps you, you have advantage on the next two ability checks or attack rolls you make before the start of their next turn, instead of only one. When you take the Help action and help an ally within 30 feet of you, the chosen ally has advantage on the next two ability checks or attack rolls it makes before the start of your next turn, instead of only one.</p>

        <h4>Rebuttal</h4>

        <p>When an ally within 30 feet of you takes the Help action and helps you, you gain temporary hit points equal to your guardian level that last until the start of their next turn. When you take the Help action and help an ally within 30 feet of you, it gains temporary hit points equal to your guardian level that last until the start of your next turn.</p>

        <h3>Master of Unity</h3>

        <em><strong>Vonil/Ishu Form:</strong> 20th level</em><br>

        <p>You and your allies are a paragon of harmony. Your Strength or Dexterity (your choice) and Constitution scores increase by 2. Your maximum for those scores increases by 2. Additionally, you can use your action and choose an ally within 60 feet of you to gain the following benefits for 1 minute:</p>

        <ul><li>You and the chosen ally have resistance to kinetic and energy damage.</li><li>Neither you nor the chosen ally can have disadvantage on attack rolls.</li><li>Both you and the chosen ally's critical hit ranges increase by 1.</li></ul>

        <p>This effect ends early if either you or the chosen ally are incapacitated or die, or if the chosen ally is ever more than 60 feet away from you. Once you've used this feature, you can't use it again until you complete a long rest.</p>



