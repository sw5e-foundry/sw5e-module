  - name: Opponents
    _id: ZVdNH5S4CQhm489I
    text:
      content: |-
        <h3>Opponents</h3>

        <p>Most often, dueling is an event suited only to two people. It might be a fight to the death, a fight for honor, or simply a fight to see who is better. Alternatively, it might simply be a sparring session. These rules are intended to potentially encompass all of these possibilities, but only for a traditional one versus one encounter.</p>
