  - name: Berserker
    _id: DAnaHkQeXanOPf54
    text:
      content: |+
        <h2>Berserker</h2>

        <p>In order to become a berserker, your companion must have a Strength score of 13 or higher.</p>

        <p>As a berserker, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor, medium armor</li><li><strong>Weapons:</strong> All vibroweapons, simple blasters</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws</strong>: Strength, Constitution</li><li><strong>Skills:</strong> Choose two from Animal Handling, Athletics, Intimidation, Nature, Perception, Survival</li></ul>

        <h3>Rage</h3>

        <p>Beginning when your companion chooses this class at 3rd level, in battle, it fights with primal ferocity. On your companion's turn, it can enter a rage as a bonus action if it isn't wearing heavy armor.</p>

        <p>While raging, your companion gains the following benefits:</p>

        <ul><li>It has advantage on Strength checks and Strength saving throws.</li><li>When it makes a melee weapon attack using Strength, it gains a +2 bonus to the damage roll. This bonus increases to +3 at 11th level.</li><li>It has resistance to kinetic and energy damage.</li><li>If it is able to cast powers, it can't cast them or concentrate on them while raging.</li></ul>

        <p>Your companion's rage lasts for 1 minute. It ends early if your companion is knocked unconscious, it dons heavy armor, or if its turn ends and it hasn't attacked a hostile creature or taken damage since its last turn. It can also end its rage on your turn as a bonus action.</p>

        <p>Your companion can use this feature twice. It gains an additional use at 11th level. Your companion regains all expended uses when it finishes a long rest.</p>

        <h3>Reckless Attack</h3>

        <p>Also at 3rd level, your companion can throw aside all concern for defense to attack with fierce desperation. When you make your first attack on your turn, you can decide to attack recklessly. Doing so gives you advantage on melee weapon attack rolls using Strength during this turn, but attack rolls against you have advantage until your next turn.</p>

        <h3>Danger Sense</h3>

        <p>At 7th level, your companion gains an uncanny sense of when things nearby aren't as they should be, giving it an edge when it dodges away from danger.</p>

        <p>Your companion has advantage on Dexterity saving throws against effects that it can see, such as traps and powers. To gain this benefit, it can't be blinded, deafened, or incapacitated.</p>



        <h3>Extra Attack</h3>

        <p>By 11th level, your companion can attack twice, instead of once, whenever it takes the Attack action on its turn.</p>

        <h3>Brutal Critical</h3>

        <p>At 15th level, your companion can roll one additional weapon damage die when determining the extra damage for a critical hit with a melee attack.</p>

        <h3>Relentless Rage</h3>

        <p>As of 18th level, your companion's rage can keep it fighting despite grievous wounds. If your companion drops to 0 hit points while it's raging and it doesn't die outright, it can make a DC 10 Constitution saving throw. If it succeeds, it drops to 1 hit point instead.</p>

        <p>Each time it uses this feature after the first, the DC increases by 5. When it finishes a short or long rest, the DC resets to 10.</p>

