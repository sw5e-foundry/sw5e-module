    _id: 5dOUTFBNWT9aEhYW
    text:
      content: |-
        <h3>Saving Throw Checks</h3>

        <p>If you use the Saving Throw Checks variant, you would instead allow effects to critically succeed if they would critically hit, and critically fail if they would critically miss, as appropriate.</p>

