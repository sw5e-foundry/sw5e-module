  - name: Lasat
    _id: 9CRCyLIuoXSBJqFT
    text:
      content: |-
        <h2>Lasat</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Grey or purple</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Purple or grey (with age)</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Green</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Impressive height, strength, and agility</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>6'0"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>160 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Lira San</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Lasat</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>A humanoid sentient species, Lasats are notable for their impressive height, strength, and agility, with their muscular digitigrade legs enabling them to run faster, jump higher and farther, and move more quietly than humans. Their large finger pads and prehensile toes assist them in climbing. In addition, their large eyes and ears afford them superior sight and hearing over humans. They had the strength to open a powered-down blast door. A height of two meters tall was considered below-average for a Lasat.</p>

        <h3>Society and Culture</h3>

        Lasat society is held together by a long-standing oral tradition, featuring clever and stealthy heroes. Within the species, those with fighting skills are highly respected, often being members of the Lasan High Honor Guard, a group of highly trained, highly intelligent warriors sworn to protect their homeworld<br> of Lira San. Bo-rifles are a long-standing tradition in<br> Lasat culture, used exclusively by the Honor Guard of<br> Lasan. The warrior way of the Lasat is the Boosahn<br> Keeraw. When a Lasat is bested by a superior<br> opponent in combat, they would give them their<br> weapon.

        Facial hair is an important status symbol in Lasat culture. Those with green eyes and prominent purple stripes are considered to be attractive by others of<br> their species. Juvenile Lasat are noted to climb tree<br> branches. 

        <h3>Names</h3>

        <p>Lasat names tend to be melodic, with the occasionally harsh tone sprinkled in. Surnames are born by communities within Lasat culture rather than individual families.</p>

        <p><strong>Male Names.</strong> Brob, Drim, Krus, Parred, Volares</p>

        <p><strong>Female Names.</strong> Denazo, Gume, Hado, Zanisa</p>

        <p><strong>Surnames.</strong> Dragarr, Ellias, Krod, Roleb, Vuzan </p>



        <h3>Lasat Traits</h3>

        <p>As a lasat, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Lasats reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Lasat' honorable tendences cause them to tend toward lawful light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Lasats tower over other species, averaging 7 feet tall and weighing over 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Bo-rifle Training.</em></strong> You have proficiency with blaster rifles, bo-rifles, and vibrostaffs.</p>

        <p><strong><em>Climbing.</em></strong> You have a climbing speed of 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Keen Hearing and Sight.</em></strong> You have advantage on Wisdom (Perception) checks that rely on hearing or sight.</p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Lasat, a language whose <em>r</em>'s are difficult to replicate by most other species.</p>

        <img src='https://www.gmbinder.com/images/l6e7iEk.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:295px;mix-blend-mode:darken' />



