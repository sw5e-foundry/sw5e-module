    _id: KQaSbt3dYNiDHqkF
    text:
      content: |-
        <h4>Dark Transference</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When you hit the target of your Critical Analysis with an attack, you can expend a superiority die and roll it to attempt to siphon life from it. The target must make a Constitution saving throw. On a failed save, add the result to the damage roll, and you regain one expended Hit Die.</p>
