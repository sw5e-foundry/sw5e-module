        <h4>Remote Detonator (Fine)</h4>

        <em><strong>Adventuring gear</strong>, <font style="color:green"><strong>premium</strong></font></em><br>

        <p>A small handhold device with a single button, used to activate explosives. Over the course of 1 minute, you can pair the detonator with up to four mines within 10 feet. As an action, you can remotely detonate all of the paired mines. You must be within 60 feet of the mines to detonate them.</p>

