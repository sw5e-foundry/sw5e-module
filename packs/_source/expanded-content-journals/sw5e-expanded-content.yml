        <p>maneuver. For the next minute, while you and your companion are within 5 feet of each other and neither of you are wielding a shield, you each gain a bonus to AC equal to half your proficiency bonus.</p>

        <p>This effect ends early if either you or your companion are incapacitated or die. Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <h3>Indomitable in Tandem</h3>

        <em><strong>Fireteam Specialist:</strong> 15th level</em><br>

        <p>When you and your companion are both forced to make a saving throw against the same effect, and one�but not both�of you fails, you can expend a use of your Indomitable feature to instead have you both succeed.</p>

