  - name: Monk
    _id: MZwr1Gr2uzRf4TY6
    text:
      content: |+
        <h2>Monk</h2>

        <p>In order to become a monk, your companion must have a Dexterity, Wisdom, or Charisma score of 13 or higher.</p>

        <p>As a monk, your companion gains the following class features.</p>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> None</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons, chakrams, techblades</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Strength, Dexterity</li><li><strong>Skills:</strong> Choose two from Acrobatics, Athletics, Insight, Lore, Perception, and Stealth</li></ul>

        <h3>Martial Arts</h3>

        <p>Beginning when your companion chooses this class at 3rd level, your companion's practice of martial arts gives it mastery of combat styles that use unarmed strikes and martial artist weapons, which are any simple vibroweapons that don't have the two-handed property.</p>

        <p>Your companion gains the following benefits while it is unarmed or wielding only martial artist weapons and isn't wearing armor or wielding a shield:</p>

        <ul><li>Your companion can use Dexterity instead of Strength for the attack and damage rolls of its unarmed strikes and martial artist weapons.</li><li>Your companion can roll a d4 in place of the normal damage of its unarmed strike or martial artist weapons. This die becomes a d6 at 7th level and a d8 at 15th level.</li><li>Your companion can use Dexterity instead of Strength whenever it would make a Strength (Athletics) check to grapple, shove, or trip a creature.</li><li>When your companion takes the Attack action with an unarmed strike or a martial artist weapon on your turn, it can make one unarmed strike as a bonus action. </li><li>Your companion can take the Dash and Disengage actions as a bonus action.</li></ul>

        <h3>Unarmored Defense</h3>

        <p>Also at 3rd level, while your companion is wearing no armor and not wielding a shield, its AC equals 10 + its Dexterity modifier + its Wisdom or Charisma modifier (your companion's choice).</p>

        <h3>Focus</h3>

        <p>At 7th level, your companion's training allows it to harness the mystic energy of focus. Its access to this energy is represented by a number of focus points. Your companion has three focus points. It gains an additional focus point at 9th, 13th, and 17th level.</p>

        <p>Your companion can spend these points to fuel various focus features. Your companion knows three such features: Flurry of Blows, Patient Defense, and Step of the Wind. </p>



        <p>&emsp;When your companion spends a focus point, it is unavailable until your companion finishes a short or long rest, at the end of which it draws all of its expended focus back into itself. Your companion must spend at least 30 minutes of the rest meditating to regain its focus points.</p>

        <p>Some of your companion's focus features require your target to make a saving throw to resist the feature's effects. The saving throw DC is calculated as follows:</p>

        <hr>

        <div class="sw5e-book-block"><p><strong>Focus save DC</strong> = 8 + your proficiency bonus + your Wisdom or Charisma modifier (your choice)</p></div>

        <hr>

        <h4>Flurry of Blows</h4>

        <p>When your companion makes its Martial Arts bonus action unarmed strike, it can spend 1 focus point to make an additional unarmed strike (no action required). At 18 level, it can instead spend 2 focus points to make two additional unarmed strikes.</p>

        <h4>Patient Defense</h4>

        <p>When your companion uses its bonus action to Disengage, it can spend 1 focus point to also Dodge (no action required). At 18th level, it can instead spend 2 focus points to Dodge and gain an additional reaction until the start of its next turn. It can only take one reaction per turn.</p>

        <h4>Step of the Wind</h4>

        <p>When your companion uses its bonus action to Dash, it can spend 1 focus point to double its jump distance for the turn. At 18th level, it can instead spend 2 focus points to gain a flying speed equal to its walking speed until the end of your turn, though it falls if it ends its speed in the air and nothing else is holding it aloft.</p>

        <h3>Enhanced Strikes</h3>

        <p>Also at 7th level, your companion's unarmed strikes count as enhanced for the purpose of overcoming resistance and immunity to unenhanced attacks and damage.</p>

        <h3>Extra Attack</h3>

        <p>By 11th level, your companion can attack twice, instead of once, whenever it takes the Attack action on its turn.</p>

        <h3>Evasion</h3>

        <p>At 15th level, when your companion is subjected to an effect, such as a consular's <em>force storm</em> or an engineer's <em>explosion</em>, that allows it to make a Dexterity saving throw to take only half damage, it instead take no damage if it succeeds on a saving throw, and only half damage if it fails.</p>

        <h3>Diamond Soul</h3>

        <p>As of 18th level, your companion gains proficiency in all saving throws. Additionally, whenever your companion fails a saving throw, it can spend 1 focus point to reroll it and take the second result.</p>

