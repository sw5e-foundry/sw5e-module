  - name: Zeltron
    _id: JHr6r8WRfiv1CRra
    text:
      content: |-
        <h2>Zeltron</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Light pink to deep crimson</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>Blue, brown, pink, or red</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Hazel, silver, amber</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Capable of producing powerful pheromones</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'8"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>90 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Zeltros</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Galactic Basic</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Zeltrons are one of the few near-human species that differentiated from the baseline stock enough to be considered a new species of the Human genus, rather than simply a subspecies. They possess two biological traits of note. The first is that they all produce potent pheromones, similar to the Falleen species, which enhanced their attractiveness and likeability. The second is a limited telepathic ability, used to project emotions onto others, as well as allowing them to read and even feel the emotions of others; some Zeltrons have been hired by the Exchange for this ability. Because of their telepathic ability, positive emotions such as happiness, love and pleasure are very important to them, while negative ones such as anger, fear, or depression are shunned.</p>

        <h3>Society and Culture</h3>

        <p>Zeltron culture is highly influenced by sexuality and the pursuit of pleasure in general. Most of their art and literature is devoted to the subject, producing some of the raciest pieces in the galaxy. Zeltrons are known to dress in wildly colorful or revealing attire. It's common to see Zeltrons wearing shockingly bright shades of neon colors in wildly designed bikinis, or nearly skin tight clothing of other sorts with bizarre color designs, patterns, and symbols. </p>

        <h3>Names</h3>

        <p>Zeltron names often have an air of mystique to them, to evoke sensuality. For a Zeltron, a beautiful face is nothing without an equally beautiful name. It's not uncommon for a Zeltron to forsake their familial surname in favor of a more attractive-sounding one.</p>

        <p><strong>Male Names.</strong> Marruc, Bahb, Rahulh, Demagol </p>

        <p><strong>Female Names.</strong> Lyshaa, Dani, Vianna, Chantique </p>

        <p><strong>Surnames.</strong> D'Pow, Blue, Duare, Sapphire</p>



        <h3>Zeltron Traits</h3>

        <p>As a zeltron, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Charisma score<br> increases by 2, and your Constitution score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Zeltron reach adulthood in their late teens and live about 80 years.</p>

        <p><strong><em>Alignment.</em></strong> Zeltron are a deeply sensual, hedonistic species, causing them to tend toward chaotic balanced or dark side alignments, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Zeltron tend to be slender and statuesque, typically standing between 5 and 6 feet tall and rarely weighing more than 150 lb. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Charismatic.</em></strong> You have proficiency with Deception or Persuasion (your choice). </p>

        <p><strong><em>Enthralling Pheromones.</em></strong> You can use your pheromones to influence individuals of both sexes. Whenever you roll a 1 on a Charisma (Persuasion) check, you can reroll the die and must use the new roll. Additionally, once per short or long rest, you can treat a d20 roll of 9 or lower on a Charisma check as a 10. This feature has no effect on droids or constructs.</p>

        <p><strong><em>Natural Empathy.</em></strong> Zeltron's limited telepathy allow them to sense mood shifts in those around them. You have advantage on Wisdom (Insight) checks to determine emotions against humanoids and beasts within 10 feet of you.</p>

        <p><strong><em>Two Livered.</em></strong> Zeltron have two livers, which makes them adept at filtering toxins. You have advantage on saving throws against poison, and you have resistance against poison damage (explained in chapter 9).</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and one language of your choice.</p>

        <img src='https://www.gmbinder.com/images/vTd5mYO.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:413.5px' />



