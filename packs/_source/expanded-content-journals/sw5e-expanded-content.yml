  - name: Voss
    _id: 1q313FnrZI1mv2Mn
    text:
      content: |-
        <h2>Voss</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Blue (male) or red (female)</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Orange (male) or blue (female)</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Mechanical apperance, unique patterns and markings along face, neck, and body</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>4'9"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>105 lb</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Voss</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Voss</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Voss are humanoid sentients with a high rate of Force-sensitivity who display prominent sexual dimorphism. The male Voss have blue skin and bright orange eyes, while the females have red skin and azure eyes. The Voss do not have hair or distinct pupils, and posess unique patterns of markings on their face, neck, and body, a trace of their shared ancestry with Gormak. Their voices have a slight mechanical tinge to them, making them sound somewhat like a droid or machine. Voss undogo a physical, developmental change during their marriage ceremonies (known as the Rite of Ardor) and do not develop sexually prior to the performance of these rituals.</p>

        <h3>Society and Culture</h3>

        <p>The Voss species resides in the isolated mountain-top city of Voss-Ka and is vastly outnumbered on their homeworld by its other native sentient species, the Gormak, who are extremely hostile toward them and from whom they arose. Most Voss live peacefully in Voss-Ka, caring for their families, cultivating the wild plants and maintaining equipment for the Voss commandos in the war against the Gormak, although some Voss do live outside the capital city, such as the Voss Mystics who reside in the Shrine of Healing. The Voss are great lovers of art, and their architecture features a distinctive artistic style. The entire Voss society is guided by the Force visions of Voss Mystics, which are considered infallible without exception.</p>

        <h3>Names</h3>

        <p>All Voss have two short names, connected by a hyphen, with the family name being the second one.</p>

        <p><strong>Male Names.</strong> Char, Edan, Fadith, Nodin, Orin</p>

        <p><strong>Female Names.</strong> Amin, Magra, Tala, Weylin, Yana</p>

        <p><strong>Surnames.</strong> -Ko, -La, -Po, -Rae, -Va</p>

        <br>

        <h3>Voss Traits</h3>

        <p>As a voss, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Wisdom score<br> increases by 2, and your Constitution score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Voss reach adulthood in their late teens and live less than a century. They do not reach sexual maturity until they undergo the Rite of Ardor.</p>

        <p><strong><em>Alignment.</em></strong> As Voss culture encourages duty and emotional composure, individuals tend toward a lawful alignment, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Voss typically stand 5 to 6 feet tall and generally weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of grey.</p>

        <p><strong><em>Precognition.</em></strong> You see brief visions of the future, that allow you to turn failures into successes. When you roll a 1 on an attack roll, ability check, or saving throw, you can reroll the die and must use the new roll.</p>

        <p><strong><em>Mystic Healing.</em></strong> You have proficiency in Medicine.</p>

        <p><strong><em>Voss Weapon Training.</em></strong> You have proficiency with the blaster rifle and techblade.</p>

        <strong><em>Inscrutable.</em></strong> Your calm demeanor and control make<br> you hard to read. Wisdom (Insight) checks made<br> against you have disadvantage, and you have<br> advantage on any saving throw against an effect that<br> would read your thoughts.

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Voss. The Voss language is characterized by it's mystic-sounding word pairings.</p>

        <img src='https://www.gmbinder.com/images/FWD7qdj.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:310px' />



