  - name: Passive Checks
    _id: QsZRKOunPy5oF1xv
    text:
      content: |-
        <h3>Passive Checks</h3>

        <p>When determining your total for a passive check with this variant rule, if you have superadvantage on a check, add 8. For superdisadvantage, subtract 8. If you have hyperadvantage on a check, add 10, and if you have hyperdisadvantage, subtract 10.</p>
