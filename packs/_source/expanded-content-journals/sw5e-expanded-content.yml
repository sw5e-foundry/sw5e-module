  - name: Aqualish
    _id: 1205C0gLc91XRnzi
    text:
      content: |-
        <h2>Aqualish</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, blue, green, or red</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, brown, or gray</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, blue, red, or brown</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Tusks, belligerent personalities, brawny stature</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'5"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>140 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Ando</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Aqualish</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>An amphibious species native to the planet Ando, the Aqualish people have two facial tusks which curve down over their mouths; a trait which added to their appearance as arachnids. These facial tusks are highly sensitive to heat and cold and are used for cracking open the hard shells of shellfish or burrowing through the swampy loam of their homeworld. Having finned hands and two bulbous black eyes, Aqualish are unable to manipulate most machinery or equipment developed by the galaxy's many species which designed these tools for beings with digits. As a result, Aqualish tend to remain on their homeworld. Aqualish are well known for their hair-trigger tempers that flare without reason.</p>

        <p>While Force-sensitive Aqualish are rare, members of the species have trained as both Sith and Jedi, though they typically gravitate toward the former.</p>

        <h3>Society and Culture</h3>

        The Aqualish hate the image they have in the galaxy as thugs, regardless of its veracity, and blame it on any- and everyone else. Because of this, the species are considered pariahs on Ando, which has a lower population of Aqualish than the galaxy itself. All Aqualish speak mutually intelligible dialects of the<br> same language. Quarrelsome and thug-like, the<br> Aqualish culture revolved around aggression and toughness, with diplomacy being one of their weakest<br> attributes.

        <h3>Names</h3>

        <p>Aqualish names are intended to sound strong. Surnames are not familial, but are chosen by each individual Aqualish.</p>

        <p><strong>Male Names.</strong> Bung, Gu, Opege, Soni, Tubop</p>

        <p><strong>Female Names.</strong> Cestirki, Duni, Iftu, Sifre, Umi</p>

        <p><strong>Surnames.</strong> Dogomurra, Julo, Kronem, Nidoal, Utix</p>



        <h3>Aqualish Traits</h3>

        <p>As an Aqualish, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Aqualish reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Aqualish' aggressive personalities cause them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Aqualish stand between 6 and 7 feet tall and weigh around 190 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Arms Dealers.</em></strong> Whenever you make a Charisma (Persuasion) check related to buying or selling weapons, you are considered to have expertise in the Persuasion skill.</p>

        <p><strong><em>Aggressive.</em></strong> As a bonus action, you can move up to your speed toward an enemy of your choice that you can see or hear. You must end this move closer to the enemy than you started.</p>

        <p><strong><em>Darkvision.</em></strong> You have a keen eyesight, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Menacing.</em></strong> You have proficiency in the Intimidation skill.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Aqualish. Aqualish is a harsh, guttural language. It's rare that other species bother to learn it unless they regularly interact with Aqualish.</p>

        <img src='https://www.gmbinder.com/images/vXcfGpp.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:261px' />



