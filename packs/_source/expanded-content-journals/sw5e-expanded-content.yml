  - name: Developing a Bond
    _id: 8Fk15wG7QTth2aQ1
    text:
      content: |-
        <h3>Developing a Bond</h3>

        <p>When one creature wants to develop a bond with another, they must spend 1 hour meditating, which can be done during a short rest,  while within 30 feet of a target that they can see. At the end of this meditation, the target must make a Charisma saving throw. The DC of this saving throw is equal to the initiator's universal force save DC, and the target of this feature can choose to fail this save. On a failure, the two creature's develop a Force-bond.</p>

        <h4>Valid Targets</h4>

        <p>Only sentient creatures who can cast force powers of 1st-level or higher can develop a Force-bond, and a creature can only be bonded in such a way to one other creature a time.</p>
