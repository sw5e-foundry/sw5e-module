  - name: Defensive Technique
    _id: Ta5EEzsazr11uv8g
    text:
      content: |-
        <h4>Defensive Technique</h4>

        <p><em>At-will light side power</em></p>

        <hr>

        <ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>

        <p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and you ward yourself from it through the Force.</p>

        <p>If the target forces you to make a saving throw before the start of your next turn, the target takes an additional 1d6 psychic damage, and you can roll 1d4 and add the number rolled to your saving throw. The power then ends.</p>

        <p>The power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d6 psychic damage to the target, and the psychic damage the target takes for forcing you to make a saving throw increases to 2d6. Both damage rolls increase by 1d6 at 11th level and 17th level.</p>
