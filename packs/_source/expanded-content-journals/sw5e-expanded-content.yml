  - name: Ammunition Sizes
    _id: VEw3pAFw0GQ5pAsU
    text:
      content: |-
        <h2>Ammunition Sizes</h2>

        <p></div></p>

        <p>For the sake of simplicity, ammunition is shared amongst weapons that deal the same damage type. For instance, all blasters that deal kinetic damage utilize slug cartridges, while all blasters that deal energy, ion, or other elemental damage types utilize power cells. If you dislike that an assault cannon and a blaster pistol utilize the same ammunition, consider the following variant rule.</p>
