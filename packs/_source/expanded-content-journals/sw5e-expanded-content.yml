  - name: Artillerist Technique
    _id: LSXgimV1qo9lfAS6
    text:
      content: |-
        <h2>Artillerist Technique</h2>

        <p></div></p>

        <p>Some scouts choose to navigate around defenses, while others choose to go through them. Followers of the Artillerist Technique learn to exert greater control of their tech powers, causing delayed�and often empowered�effects.</p>

        <h3>Modular Munitions</h3>

        <em><strong>Artillerist Technique:</strong> 3rd level</em><br>

        <p>When you cast a tech power, rather than having it take effect instantly, you can choose to delay the effect to occur on initiative count 20 (losing all initiative ties). When you do so, any creature that leaves the affected area of your tech power is unaffected when the tech power occurs. If the power would only target one creature, and that creature moves from the space it was in when you cast the power, the tech power automatically misses if it would call for an attack roll, as if you had rolled a 1 on the attack, and the creature automatically succeeds on the saving throw against the power if it calls for a saving throw, as if it had rolled a 20 on the save.</p>

        <p>Additionally, when you cast a tech power and choose to delay it in this way, and that tech power would deal damage, you can apply one of the following additional empowerment effects:</p>

        <ul><li><strong>Flashbang</strong>: Each creature damaged by this power must succeed on a Constitution saving throw or be blinded and deafened until the start of your next turn.</li><li><strong>Mire:</strong> Each creature damaged by this power must succeed on a Dexterity saving throw or gain one slowed level until the start of your next turn.</li><li><strong>Psyche:</strong> Each creature damaged by this power must succeed on a Wisdom saving throw or become frightened until the start of your next turn.</li></ul>

        <p>If an empowerment effect calls for a saving throw, the DC equals your tech save DC.</p>

        <p>You can use these features a combined number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you complete a short or long rest.</p>

        <p>While you have no remaining uses of this feature, you can instead expend 1 tech point to use it. When you do so, your maximum tech points are reduced by 1 until you complete a long rest.</p>

        <h3>Mark of the Artillerist</h3>

        <em><strong>Artillerist Technique:</strong> 3rd and 11th level</em><br>

        <p>You can now use your Ranger's Quarry feature on a 10-foot cube area within 60 feet of you that you can see. You can treat any creatures inside this cube as if they are the target of your Ranger's Quarry feature, and when a creature is hit by a tech attack or fails a saving throw against a tech power you cast that deals damage, you can apply your Ranger's Quarry damage to that creature.</p>

        <p>At 11th level, you can now use your Ranger's Quarry feature on a 15-foot cube area, instead of a 10-foot cube.</p>

        <h3>Sundered Defenses</h3>

        <em><strong>Artillerist Technique:</strong> 7th level</em><br>

        <p>Your precise bombardments make even the most hardened defenses crumble. When you cast a power that calls for a tech attack or a Dexterity saving throw, it reduces partial cover by one step (from three-quarters to half or half to one-quarter) against creatures affected by it. If an affected creature has one-quarter cover, your power ignores it entirely.</p>

        <h3>Target Masking</h3>

        <em><strong>Artillerist Technique:</strong> 11th level</em><br>

        <p>You are familiar with various turrets and defensive emplacements, and their operation. </p>

        <p>As a bonus action, you can activate a masking effect to confuse the targeting of constructs for 1 minute. Any construct who targets you with an attack, a harmful power, or a hostile action must first make a Wisdom saving throw against your tech save DC. On a failed save, the construct must choose a new target or lose the attack or power. This power doesn't protect you from area effects.</p>

        <p>You can use this feature a combined number of times equal to your proficiency bonus, as shown in the scout table. You regain all expended uses when you complete a long rest.</p>

        <h3>Master of Ordnance</h3>

        <em><strong>Artillerist Technique:</strong> 15th level</em><br>

        <p>You can now expend two uses of your Modular Munitions feature when you cast a tech power to apply two empowerment effects, instead of only one. Additionally, you gain three additional empowerment effects:</p>

        <ul><li><strong>Confusion:</strong> Each creature damaged by this power must make a Charisma saving throw. On a failure, on its next turn, a creature must use its action to make a melee attack against a randomly determined creature within its reach. If there is no creature within its reach, the creature does nothing this turn.</li><li><strong>Knockout:</strong> Each creature damaged by this power must succeed on a Strength saving throw or be knocked prone.</li><li><strong>Static:</strong> Each creature damaged by this power must succeed on an Intelligence saving throw or become shocked until the start of your next turn.</li></ul>

        Additionally,<br> when you would<br> spend 1 tech point<br> to apply an empowerment<br> effect, it no longer<br> reduces your<br> maximum tech<br> points.

        <img src='https://www.gmbinder.com/images/mckPwzx.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:310px' />



