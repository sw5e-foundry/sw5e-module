  - name: Blackguard
    _id: 8hmSs3KLN87wkSFw
    text:
      content: |+
        <h2>Blackguard </h2>

        <p></div></p>

        <p>You are a member of the Blackguard: a reclusive sect of Force users from the planet of Mustafar. Rather than being determined by the Force, the Blackguard believe that the light or dark dwell within the user, and that to truly increase one's knowledge and strength in the Force, one must understand and seek out the philosophies and abilities of other Force traditions around the galaxy.</p>

        <hr>

        <ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Lore, and Survival</li><li><strong>Tool Proficiencies:</strong> Artificer's implements</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A copy of a Force-wielder organization's text, a trinket from your travels around the galaxy, a set of common clothes including a robe, and a belt pouch containing 150 cr</li></ul>

        <h3>Feature: Student of the Force</h3>

        <p>You often know where to find information on Force-sensitive organizations, or where to find someone who would know, and can readily decipher more common lore about them. Your GM might rule that the knowledge you seek is secreted away in an almost inaccessible place, that it simply cannot be found, or is too difficult to decipher.</p>

        <h3>Background Feat</h3>

        <p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>investigator</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Formfighting Dabbler</td></tr><tr><td>8</td><td>Force-Sensitive</td></tr></tbody></table></div>

        <h4>Suggested Characteristics</h4>

        <p>The Blackguard are galactic travelers and students, looking to expand their horizons and knowledge of the Force by learning from others.</p>

        <table class="sw5e-book-table"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I let my actions speak for themselves.</td></tr><tr><td>2</td><td>I've left emotion behind me, I'm now perfectly placid.</td></tr><tr><td>3</td><td>I question every Force user I meet, trying to acquire every piece of knowledge I can.</td></tr><tr><td>4</td><td>I'm willing to listen to every side of an argument before I make my own judgment.</td></tr><tr><td>5</td><td>I spend every free moment training in lightsaber techniques.</td></tr><tr><td>6</td><td>I judge people by their actions, not their words.</td></tr><tr><td>7</td><td>When I set my mind to something, I follow through no matter what gets in my way.</td></tr><tr><td>8</td><td>I face problems head-on. A simple, direct solution is the best path to success.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Knowledge.</strong> The path to true understanding of the Force is through knowledge. (Neutral)</td></tr><tr><td>2</td><td><strong>Might.</strong> Knowledge is the path to power and domination. (Dark)</td></tr><tr><td>3</td><td><strong>Defense.</strong> The Blackguard protect that which others would seek to destroy. (Lawful)</td></tr><tr><td>4</td><td><strong>Loyalty.</strong> The Blackguard Order watches its own. (Any)</td></tr><tr><td>5</td><td><strong>Balance.</strong> There is no light or dark. There is only the Force. (Balanced)</td></tr><tr><td>6</td><td><strong>Freedom.</strong> True freedom rejects the restrictions of the Jedi and Sith. (Chaos)</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>Nothing is more important than the other members of the Blackguard.</td></tr><tr><td>2</td><td>I would die to recover an ancient relic that was lost long ago.</td></tr><tr><td>3</td><td>I will do anything to protect the temple where I served.</td></tr><tr><td>4</td><td>I seek to preserve a sacred text that my enemies consider heretical and seek to destroy.</td></tr><tr><td>5</td><td>I'm still seeking the enlightenment I pursued in joining the Blackguard, and it still eludes me.</td></tr><tr><td>6</td><td>I would do anything for the Wilder that trained me.</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I believe that everyone is beneath me.</td></tr><tr><td>2</td><td>I am easily distracted by the promise of information.</td></tr><tr><td>3</td><td>I have little respect for anyone who is not a proven warrior.</td></tr><tr><td>4</td><td>I find those who believe in the Dark and Light of the Force childish simpletons.</td></tr><tr><td>5</td><td>My rejection of Light and Dark has drained me of any real moral compass.</td></tr><tr><td>6</td><td>My focus on gaining knowledge has left me with little attachment to people or their feelings.</td></tr></tbody></table>

