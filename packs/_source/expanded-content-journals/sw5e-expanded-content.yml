  - name: Over-Exertion
    _id: aOori722wU959IZW
    text:
      content: |-
        <h3>Over-Exertion</h3>

        <p>When a character exerts themselves, they immediately lose hit points equal to the amount rolled, which can't be reduced or negated in any way. If this damage would reduce the character to 0 hit points, they don't immediately fall unconscious. At the end of the current turn, if the character is still at 0 hit points, they fall unconscious and are stable.</p>



