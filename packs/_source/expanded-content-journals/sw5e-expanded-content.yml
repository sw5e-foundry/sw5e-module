  - name: Cyclone Approach
    _id: Bet6ZteaV0NFJCdZ
    text:
      content: |+
        <h2>Cyclone Approach</h2>

        <p>The Cyclone Approach empowers the berserker's ability to fight with weapons in each hand. Followers of this approach learn to move quickly to avoid attacks and can become a whirlwind of fury and steel, cleaving through hordes of enemies.</p>

        <h3>Dual Wielder</h3>

        <em><strong>Cyclone Approach:</strong> 3rd level</em><br>

        <p>When you engage in Two-Weapon Fighting, you can add your Strength or Dexterity modifier (your choice) to the damage of your Two-Weapon Fighting attack as long as it doesn't already include that modifier.</p>

        <h3>Double Swing</h3>

        <em><strong>Cyclone Approach:</strong> 3rd level</em><br>

        <p>Once on each of your turns when you miss with an attack while raging, you can immediately make a melee attack with the weapon in your other hand. </p>

        <h3>Twisting Winds</h3>

        <em><strong>Cyclone Approach:</strong> 6th level</em><br>

        <p>Your unpredictable movement makes you harder to hit and pin down. When you make a saving throw or ability checks to avoid being knocked prone, pushed, grappled, or restrained, it gains a bonus equal to your Strength or Dexterity modifier (your choice) as long as it doesn't already include that modifier.</p>



        <h3>Mighty Leap</h3>

        <em><strong>Cyclone Approach:</strong> 10th level</em><br>

        <p>The distance you can jump is doubled, and you do not provoke attacks of opportunity if you leave a hostile creature's reach while jumping.</p>

        <h3>Tornado</h3>

        <em><strong>Cyclone Approach:</strong> 14th level</em><br>

        <p>You can become a tornado of attacks. When you take the Attack action on your turn, you can forgo one of your regular attacks to make a melee attack against any number of creatures within 5 feet of you, with a separate attack roll for each target. If you are wielding a separate melee weapon in each hand, each successful hit against a target deals damage equal to the damage dice of both weapons + your ability modifier + any other modifiers.</p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the berserker table. You regain all expended uses when you finish a short or long rest.</p>

        <img src='https://www.gmbinder.com/images/N7AJIeU.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:825px' />

