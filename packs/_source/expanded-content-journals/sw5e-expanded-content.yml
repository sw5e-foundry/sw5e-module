  - name: Noghri
    _id: FmJXCEs9u9MxBdad
    text:
      content: |-
        <h2>Noghri</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Bluish-gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Advanced olfactory senses, claws, hunting prowess.</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'5"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>115 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Honoghr</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Honoghran</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        Noghri are a primitive humanoid species hailed from the planet Honoghr with steely gray-blue skin that are renowned assassins. A natural gift for stealth and<br> hand-to-hand combat, Noghri are efficient killing<br> machines with their rending claws and strong olfactory<br> sense that can often determine familial lineage. Their smaller size belies their ruthlessness and potent<br> hunting skills.

        <h3>Society and Culture</h3>

        <p>Noghri culture relies heavily on honor, with society being clan-based, revolving around the Dukha, a community center in each village. The greatest strength of the Noghri stems from their loyalty and secrecy; when a Noghri takes a job, they always fulfill it, even if it would result in their death. As such, they make exceptional, albeit expensive bodyguards.</p>

        <p>Noghri are loathe to fight with weapons larger than small daggers, believing combat to be a personal celebration to be sullied by use of heavier weapons. As such, it is rare (though not impossible) to see a Noghri wielding a weapon larger than their forearm.</p>

        <p>Each Noghri clan village centers around the Dukha, with each clan being led by a Dynast. The Dukha is inhabited by the clan's Maitrakh, who functions as the storyteller, spiritual leader, and lore keep of the clan.</p>

        <h3>Names</h3>

        <p>Noghri names vary from short to long, with female names being typically softer. Surnames are clan-based.</p>

        <p><strong>Male Names.</strong> Cakhmaim, Ezrakh, Khabarakh, Rukh</p>

        <p><strong>Female Names.</strong> Cilnaas, Edvir, Kahr'corvh, Meewalh</p>

        <p><strong>Surnames.</strong> Bakh'tor, Eikh'mir, Hakh'khar, Khim'bar</p>



        <h3>Noghri Traits</h3>

        <p>As a noghri, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Strength score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Noghri reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Noghri's honorable society causes them to tend toward a lawful alignment, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Noghri typically stand about 5 feet tall and weigh around 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Hunter.</em></strong> You are proficient in Survival and Stealth.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Powerful Leap.</em></strong> If you jump at least 10 feet in a straight line before hitting with a melee weapon attack, you can attempt to trip the target prone as part of the same attack. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Unarmed Combatant.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Honorghran. Honorghran is characterized by its scratchy, gutteral sounds.</p>

        <img src='https://www.gmbinder.com/images/SczLueA.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:256px;mix-blend-mode:darken' />



