  - name: Results
    _id: TFDXOp8Cwnu7xbG3
    text:
      content: |-
        <h3>Results</h3>

        <p>Ultimately, the results of this variant rule mean that a 20th-level fighter who took the Force-Sensitive feat and the <em>shock</em> force power is no longer as potent with <em>shock</em> as a 20th-level consular. Both mechanically and flavorfully, this aligns to me. Additionally, it means the consular who focuses on the Force is also better with their at-will powers than an equal level guardian or sentinel, which again makes more sense mechanically and flavorfully. </p>

        <h5>Favored At-Wills</h5>

        <blockquote><p>Some archetypes, such as most sentinel archetypes or Soresu guardian, are built around a specific at-will. Your GM might consider letting characters of that archetype use native scaling. However, if adopting this variant rule, they should only scale with class level in this way, rather than character level.</p></blockquote>
