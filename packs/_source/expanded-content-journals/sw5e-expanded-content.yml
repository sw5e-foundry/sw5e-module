  - name: Geneticist Pursuit
    _id: 3MpsYbcbLrIaSQY6
    text:
      content: |-
        <h2>Geneticist Pursuit</h2>

        <p>Throughout the galaxy there exists scientists who focus on unraveling the mysteries contained within the bodies of the divese sentients of the galaxy. Those scholars who choose the Geneticist Pursuit put their knowledge into practice, splicing their own genetic material to become superior beings... or monsters.</p>

        <h3>Genesplicer's Methods</h3>

        <em><strong>Geneticist Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency with geneticist's implements and your choice of Medicine or Survival skills. Additionally, you can't have disadvantage on checks you make with them.</p>

        <h3>Mutagenic Analysis</h3>

        <em><strong>Geneticist Pursuit:</strong> 3rd level</em><br>

        <p>While you are the target of your Critical Analysis feature, you can add half your Critical Analysis ability modifer (minimum of one) to any saving throw you make that doesn't already include that modifier. </p>



        <h3>Mutagenic Transformation</h3>

        <em><strong>Geneticist Pursuit:</strong> 6th level</em><br>

        <p>When you target yourself with your Critical Analysis feature, you can choose to undergo a mutagenic transformation. Your form shifts, exaggerating and strengthening your geneticist discoveries for 1 hour. You gain the following benefits:</p>

        <ul><li>You can attack twice, instead of once, whenever you take the Attack action on your turn.</li><li>Your Strength score becomes equal to your Critical Analysis score.</li><li>You gain a bonus to your AC equal to half your Critical Analysis ability modifer (minimum of +1) if it doesn't already include that modifier.</li></ul>

        <p>You can end this effect early on your turn as a bonus action. This effect ends early if you are incapacitated or die. You can use this feature twice. You regain all expended uses of it when you finish a long rest.</p>

        <h3>Geneticist's Resilience</h3>

        <em><strong>Geneticist Pursuit:</strong> 9th level</em><br>

        <p>Your genetic alterations make you immune to poison and disease. Additionally, you have resistance to poison damage.</p>

        <img src='https://www.gmbinder.com/images/6T3NzPT.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:885px' />



        <h3>Chimeric Adaptation</h3>

        <em><strong>Geneticist Pursuit:</strong> 17th level</em><br>

        <p>Your genetic modifications have reached new heights. When you complete a short or long rest, you can choose one of the following features. When you undergo your mutagenic transformation, you also gain the benefits of the chosen feature for the duration. You can only have one of these features at a time.</p>

        <h4>Aspect of the Terentatek</h4>

        <p>You gain proficiency in Wisdom and Charisma saving throws. Additionally, you have advantage on saving throws against force powers, and when a creature within 30 feet of you casts a force power, you can use your reaction to move up to half your speed towards the creature. You must end this movement closer to the creature than you started. If you end this movement within 5 feet of the creature, you can make one melee attack against the creature (no action required).</p>

        <h4>Aspect of the Rancor</h4>

        <p>You gain proficiency in Strength and Constitution saving throws. Additionally, you gain immunity to the frightened condition,  and when you deal damage with a weapon or unarmed strike, you can deal an additional 1d8 damage of the same type as the weapon's damage.</p>

        <h4>Aspect of the Varactyl</h4>

        <p>You gain proficiency in Dexterity and Intelligence saving throws. Additionally, your speed increases by 10 feet, your attack rolls can't suffer from disadvantage, creatures can't have advantage on attack rolls against you, and each slowed level only reduces your speed by 5 feet, unless it would reduce your speed to 0.</p>

        <h3>Geneticist Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect the changes you have caused your own body to undergo. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order. </p>

        <h4>Adapted Hide</h4>

        <p>When you aren't wearing armor, your AC is 13 + your Dexterity modifier. Additionally, you are adapted to hot or cold climates (your choice), as described in chapter 5 of the Dungeon Master's Guide. When you undergo your mutagenic transformation, you add your full Critical Analysis ability modifer, instead of half, to your AC for the duration.</p>

        <h4>Atmospheric Adaptation</h4>

        <p>You can breathe air and water. When you undergo your mutagenic transformation, you no longer need to breathe, and you can survive up to one hour within the vacuum of space for the duration.</p>



        <h4>Enhanced Musculature</h4>

        <p>Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples. Additionally, when you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier. When you undergo your mutagenic transformation, you have advantage on Strength checks and Strength saving throws for the duration.</p>

        <h4>Icarian Mutation</h4>

        <p>You sprout a pair of winged arms. You gain a flying speed equal to half your walking speed. You can only gain the benefit of items held by two of your arms at any given time, and once per round you can switch which arms you are benefiting from (no action required). When you undergo your mutagenic transformation, your flying speed increases to your full walking speed, and you can use your bonus action to take the Dash action for the duration.</p>

        <h4>Mutagenic Hardiness</h4>

        <p>Your hit point maximum increases by a number equal to your level, and it increases by 1 every time you gain a level. When you undergo your mutagenic transformation, and at the beginning of each of your turns, you gain temporary hit points equal to your half your scholar level + your Critical Analysis ability modifer for the duration.</p>

        <h4>Predatory Senses</h4>

        <p>You have darkvision out to 60 feet. If you already have darkvision, its range instead increases by 30 feet. When you undergo your mutagenic transformation, you gain advantage on Wisdom (Perception) checks that rely on smell for the duration. Additionally, you can track creatures that have left a scent in the last 24 hours.</p>

        <h4>Underground Adaptation</h4>

        <p>You gain a burrowing speed equal to your walking speed and you can tunnel through solid rock at a rate of 1 foot per round. In order to use this speed, you must have two free hands. When you undergo your mutagenic transformation, you gain tremorsense out to 30 feet for the duration. You can detect and pinpoint the origin of vibrations within a specific radius, provided that monster and the source of the vibrations are in contact with the same ground or substance. Tremorsense can't be used to detect flying or incorporeal creatures.</p>

        <h4>Unnatural Weaponry</h4>

        <p>You sprout claws or some other natural weapon. Your unarmed strikes deal 1d4 kinetic damage, and you can use your choice of your Strength, Dexterity, or Critical Analysis ability modifer for the attack and damage rolls. You must use the same modifier for both rolls. When you undergo your mutagenic transformation, your unarmed strikes increase to a d6 and are considered enhanced for the duration. Additionally, you deal an additional 1d4 acid, lightning, or poison damage when you hit with them.</p>



