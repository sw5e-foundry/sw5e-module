  - name: Force Alignment
    _id: NvYODWPJfFEuAhGm
    text:
      content: |-
        <h2>Force Alignment</h2>

        <p></div></p>

        <p>The Force is manifested by two powerful and opposing aspects: the Ashla and the Bogan, more commonly known as the light side and the dark. As force-wielding characters evolve throughout the game, they can gravitate towards one side or the other (or neither, should they choose), resulting in physical manifestations and boons.</p>
