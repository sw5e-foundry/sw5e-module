  - name: Force- and Tech-casting
    _id: GAqSWAelLcGBpXHh
    text:
      content: |-
        <h3>Force- and Tech-casting</h3>

        <p>You'll want to replace the Forcecasting feature with Techcasting, and vice versa, as appropriate. Specifically, <strong>Force Powers Known</strong>, <strong>Force Points</strong>, and <strong>Forcecasting Ability</strong> will want to be replaced with <strong>Tech Powers Known</strong>, <strong>Tech Points</strong>, and <strong>Techcasting Ability</strong>, and vice versa, as described below:</p>

        <blockquote><p>Note that Max Power Level is not mentioned because it is not affected by these changes.</p></blockquote>

        <ul><li><strong>Consular:</strong> Replace consular Forcecasting with engineer Techcasting.</li><li><strong>Engineer:</strong> Replace engineer Techcasting with consular Forcecasting.</li><li><strong>Guardian:</strong> Replace guardian Forcecasting with scout Techcasting.</li><li><strong>Scout:</strong> Replace scout Techcasting with guardian Forcecasting. Mechanist scout should instead replace Improved Techcasting with sentinel Forcecasting.</li><li><strong>Sentinel:</strong> Replace sentinel Forcecasting with the Improved Techcasting present in the Mechanist Technique scout archetype, with the following updates: sentinels will have 5 and 6 tech powers known, and 2 and 3 tech points, at 1st and 2nd levels, respectively.</li><li><strong>Splashcasters:</strong> Replace Forcecasting with Techcasting, and vice versa, of the other splashcasting archetype for that class. For instance, Shield Specialist fighter would replace its Techcasting feature with Adept Specialist fighter's forcecasting.</li></ul>

        <blockquote><p>For the crosscaster archetypes, such as Way of Technology consular, you can simply flip the powers accordingly.</p></blockquote>
