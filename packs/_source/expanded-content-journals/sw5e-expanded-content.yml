  - name: Arcona
    _id: Ut49LtaMq3D4euIG
    text:
      content: |-
        <h2>Arcona</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td></td><td>Ebony to mahogany</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td></td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td></td><td>Green, blue, pink, gold when addicted</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td></td><td>Flat  heads, easily addicted</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td></td><td>5'0"</td><td>+2d10"</td></tr><tr><td><strong><em>Weight</em></strong></td><td></td><td>95 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td></td><td>Cona</td></tr><tr><td><strong><em>Language</em></strong></td><td></td><td>Arconese</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Arcona have anvil-shaped heads, claws, marble-like eyes, and protective skin. Cona is always hot, and has very little water, but the atmosphere is filled with ammonia vapor. Arcona adapted to this environment by eating the ammonia-converting roots of flora as a source of water. Arcona depended on the ammonia to live and, as a result, arcona living offworld have to take ammonia supplements. Despite their large eyes, arcona have very poor eyesight. Their eyes, made up of thousands of photoreceptors, can not detect fine shapes, only seeing blurry objects. To aid this, they have a small sensory organ between their eyes. Often mistaken for their nose, this organ detects heat patterns from living beings. Thus, arcona can recognize things by its heat pattern.</p>

        <p>Arcona are highly susceptible to addiction to spice and common salt, which serves as a hallucinogen with effects resembling that of intoxication. Their eyes shift to gold after prolonged addiction.</p>

        <h3>Society and Culture</h3>

        <p>Arcona normally think of themselves not as individuals but as a collective whole. Largely forsaking individuality, they often refer to themselves as "we" even when alone. The arcona live in loose, family-based communities called nests, which are ruled by a Grand Nest. Because arcona are born in nests underground, they obtain a close sense of family living in close quarters with siblings. Males raise the young, since females are typically impulsive thrill-seekers. </p>

        <h3>Names</h3>

        <p>Arcona names are quite diverse, named by their fathers in the nest. Surnames are either familial or nest-based. </p>

        <p><strong>Male Names.</strong> Bijrik, El, Jat, Kazat, Onalol, Shle</p>

        <p><strong>Female Names.</strong> Ak, Cimam, Cuten, He, Madan, Omik</p>

        <p><strong>Surnames.</strong> Cheen, -drell, -faxel, Shran, Takonak, -voll</p>



        <h3>Arcona Traits</h3>

        <p>As an arcona, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Arcona reach adulthood in their late teens and live for more than a century.</p>

        <p><strong><em>Alignment.</em></strong> Arcona tend toward no particular alignment. They can vary from the chaotic thrillseekers to the orderly lawkeepers. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Arcona typically stand 5 and a half to 6 and a half feet tall and generally weigh about 140 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Claws.</em></strong> Your sharp talons are natural weapons, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Clever.</em></strong> You have proficiency in one Intelligence skill of your choice. </p>

        <p><strong><em>Easily Addicted.</em></strong> Arcona are susceptible to spice addiction, and as a result you are taught to identify it from an early age. Additionally, consuming salt can cause them to hallucinate, potentially replicating the effects of spice. Whenever you make an ability check related to identifying salt or spice or seeing whether something contains salt or spice, you have advantage. </p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. When you aren't wearing armor, your AC is 13 + your Dexterity modifier. Additionally, your thick hide is naturally adapted to hot climates, as described in chapter 5 of the Dungeon Master's Guide.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve smell.</p>

        <p><strong><em>Reptilian Senses.</em></strong> Whenever you make a Wisdom (Perception) check related to sensing heat, you are considered to have expertise in the Perception skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Arconese. Arconese is spoken through complex, guttural squeaks from the back of the throat. However, arcona born and raised in colonies outside of Cona often did not learn Arconese, but the local language instead. </p>

        <img src='https://www.gmbinder.com/images/ik53fKQ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:200px' />



