  - name: Cover
    _id: EqIuleAGDjEwZDMm
    text:
      content: |-
        <h3>Cover</h3>

        <p>If a creature would be dominating another creature, and it also has cover from that creature, the bonus to AC and Dexterity saving throws don't stack. Instead, the dominating creature gains the higher of the two bonuses. For instance, if a creature is dominating another creature, and it also has half cover from that creature, it only gains the +3 bonus to AC and Dexterity saving throws against that creature. However, if the dominated creature has a feature that allows it to ignore the benefit of cover, such as Sharpshooter Mastery, the dominating creature would still gain the +2 benefit from dominating the other creature.</p>

        <p>Conversely, if a creature is both dominated by another creature, and it has cover from that creature, you don't add the bonus and penalty together. Instead, you reduce a creatures dominance by one for each level of cover it has. For instance, if a creature is superdominated by a creature, but it also has one-quarter cover from that creature, it is instead just dominated. If the creature that is dominating it has a feature that allows it to ignore the benefit of cover, such as a Sharpshooter Mastery, however, the creature is still superdominated since the creature dominating it isn't affected by the cover.</p>



