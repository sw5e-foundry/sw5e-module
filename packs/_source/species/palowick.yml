  description:
    value: >-
      <h2>Biology and Appearance</h2>

      <p>The pa'lowick are a species of humanoid amphibians who live in the
      coastal salt marshes of Lowick. They have compact but rotund midsections
      that top a pair of long, spindly legs ending in anisodactylic feet—three
      toes pointing forward, one back. This configuration, combined with their
      powerful lungs, enabled them to swim.</p>

      <p>The most prominent feature of pa'lowick physiology is their prehensile
      snout, which ends in a pair of pouty, human-like lips. Pa'lowick are also
      born with sharp tusks, which some lose by middle age.</p>

      <h2>Society and Culture</h2>

      <p>Pa'lowick live in large, independent communities with a feudal system
      of government. Many pa'lowick become fishers or hunters, as their biology
      allows. </p>

      <p>Songs and stories are the most treasured aspect of pa'lowick culture.
      Pa'lowick music runs the gamut of genres and subjects, although religious
      music is particularly common. Cultural heritage, such as history,
      genealogy, and parables, is largely passed down orally. Every Pa'lowick
      community has a dedicated storyteller; the esteem afforded this individual
      makes the position a coveted one. Large lungs make the Pa'lowick hearty
      singers and affords at least some members of the species the ability to
      scream loudly and disarm opponents in combat.</p>

      <h2>Names</h2>

      <p>Pa'lowick names tend to grow longer as the family tree grows older,
      with each generation adding a few syllables they are fond of.</p>

      <p><strong>Male Names.</strong> Loran, Jelanto, Neeamesh, Samoos</p>

      <p><strong>Female Names.</strong> Larisselle, Rensilla, Sy, Tripika</p>

      <p><strong>Surnames.</strong> Chatrunis, Dym, Geeci, Snootles</p>
