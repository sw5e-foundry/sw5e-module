name: Pilot
type: feat
folder: ZimgHdWlD2Mk2F0P
sort: 0
flags:
  sw5e:
    legacyDeployment:
      description:
        value: >-
          <h3 style="color:#000000">The Pilot</h3>

          <table style="border:none;width:300px">

          <tbody>

          <tr>

          <th style="text-align:center">Rank</th>

          <th style="text-align:left">Feature</th>

          </tr>

          </tbody>

          <tbody>

          <tr>

          <td style="text-align:center">1st</td>

          <td style="text-align:left">Venture, Piloting Procedure</td>

          </tr>

          <tr>

          <td style="text-align:center">2nd</td>

          <td style="text-align:left">I'll Try Spinning, Uncanny Dodge</td>

          </tr>

          <tr>

          <td style="text-align:center">3rd</td>

          <td style="text-align:left">Dependable Pilot, Cunning Avoidance</td>

          </tr>

          <tr>

          <td style="text-align:center">4th</td>

          <td style="text-align:left">That's a Good Trick, Evasion</td>

          </tr>

          <tr>

          <td style="text-align:center">5th</td>

          <td style="text-align:left">Paragon Pilot, Pilot Extraordinaire</td>

          </tr>

          </tbody>

          </table>

          <h2>Venture</h2>

          <p>Beginning when you choose this deployment as your specialty, at 1st
          rank, and again at 2nd, 3rd, 4th, and 5th rank, you can choose a
          venture (see Chapter 6 for a list of ventures).</p>

          <h2>Piloting Procedure</h2>

          <p>Also at 1st rank, you learn tactics that are fueled by special dice
          called power dice.</p>

          <h3>Tactics</h3>

          <p>You learn two tactics of your choice, which are detailed under
          "Tactics" below. You can use only one tactic per turn, and you can
          only use each tactic once per round.</p>

          <p>You learn an additional tactic at 2nd, 3rd, 4th, and 5th rank in
          this deployment. Each time you learn a new tactic, you can also
          replace one tactic you know with a different one.</p>

          <h3>Power Dice</h3>

          <p>A power die is expended when you use it. Your ship must have a
          power die at the required system in order to use the tactic.</p>

          <p>Your ship gains power dice based primarily on reactor production.
          These power dice are stored in a central and/or system capacitors to
          power abilities of deployed crew members. Your power die type is
          determined by your ship tier.</p>

          <h2>Tactics</h2>

          <p>The tactics are presented in alphabetical order.</p>

          <h3>Attack Pattern Delta</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />When
          your ship makes a ship attack while there is a friendly ship within
          100 feet of you, you can expend a power die to grant advantage to the
          roll. If the attack hits, add the result of the die to the attack's
          damage roll.</p>

          <h3>Break the Lock</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />When the
          ship fails a Strength, Dexterity, or Constitution saving throw, as a
          reaction, you can expend a power die to attempt to recover. Roll the
          die and add the result to the saving throw.</p>

          <h3>Defense Screen</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />As a
          bonus action, you can expend a power die and take a defensive
          formation as long as there is a friendly ship within 100 feet of you.
          When you do so, your AC increases by the amount rolled on the die
          until the start of your next turn.</p>

          <h3>Koiogran Turn</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />When you
          are the target of an attack roll, you can expend a power die and
          attempt to maneuver out of the line of fire. Roll the die, take the
          result, and multiply it by 50. You immediately move that many feet in
          a direction of your choice. The orientation of your ship does not
          change.</p>

          <h3>Skim the Surface</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />As a
          bonus action, you can expend a power die and attempt to fly through
          the space of a hostile ship. Roll the die, take the result, and
          multiply it by 50. Your ship's flying speed increases by that amount
          until the end of your turn. Additionally, moving through a hostile
          ship's space does not count as hostile terrain this turn.</p>

          <h3>Snap Roll</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />When you
          are hit by a ship attack, you can expend a power die and attempt to
          roll to mitigate the damage. When you do so, the damage you take from
          the attack is reduced by the amount rolled on the die.</p>

          <h3>Starship Charge</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />When you
          take the Ram action, you can expend a power die to increase the
          damage. On a failed save, the target ship takes additional kinetic
          damage equal to the amount rolled on the die + your ship's Strength
          modifier. Your ship has resistance to the additional damage dealt by
          this tactic.</p>

          <h3>Target Acquired</h3>

          <p><em><strong>Power Die Location:</strong> Engines</em><br />As a
          bonus action, you can expend a power die and hone in on a target you
          can see. The next attack roll made by your ship has advantage, and if
          the attack hits, add the result of the die to the attack's damage
          roll.</p>

          <h2>I'll Try Spinning</h2>

          <p>At 2nd rank, when you use take the Evade action, you can choose to
          have all attacks against you from a single ship have disadvantage
          until the beginning of your ship's next turn.</p>

          <p>Once you've used this feature, you can't use it again until you
          finish a long rest.</p>

          <h2>Uncanny Dodge</h2>

          <p>Also at 2nd rank, when an attacker that you can see hits your ship
          with an attack, you can use your reaction to halve the attack's damage
          against your ship.</p>

          <h2>Dependable Pilot</h2>

          <p>Starting at 3rd rank, when you would make a Dexterity (Maneuvering)
          check while assigned as a pilot, you can take the maximum instead of
          rolling. You can use this feature before or after making the roll, but
          before any effects of the roll are determined. You may use this
          feature a number of times equal to your ranks in piloting. You regain
          all expended uses when you complete a long rest.</p>

          <h2>Cunning Avoidance</h2>

          <p>Also at 3rd rank, once per round, when your ship is hit with a ship
          attack or fails a saving throw, you can make a Dexterity (Maneuvering)
          check, and instead use that value for your AC or saving throw.</p>

          <h2>That's a Good Trick</h2>

          <p>At 4th rank, you can take a reaction to give disadvantage to an
          attack declared against your ship.</p>

          <p>Once you've used this feature, you can't use it again until you
          finish a long rest.</p>

          <h2>Evasion</h2>

          <p>Also at 4th rank, your instinctive agility lets you dodge out of
          the way of certain area effects. When your ship is subjected to an
          effect, such as a proton torpedo or a seismic charge, that allows your
          ship to make a Dexterity saving throw to take only half damage, it
          instead takes no damage if it succeeds on a saving throw, and only
          half damage if it fails.</p>

          <h2>Paragon Pilot</h2>

          <p>As of 5th tier, you are a paragon of your deployment. When you
          would expend a power die, you can use a d4 instead of expending a die.
          You can only use this feature once per round.</p>

          <h2>Pilot Extraordinaire</h2>

          <p>Also at 5th rank, you are a master at the helm. As a bonus action,
          you can harness your experience in a brief but awe-inspiring burst.
          Until the end of your next turn, you have advantage on Dexterity
          (Maneuvering) checks, your ship has advantage on Strength and
          Dexterity saving throws, and attack rolls against your ship have
          disadvantage.</p>

          <p>Once you've used this feature, you can't use it again until you
          finish a short or long rest.</p>
