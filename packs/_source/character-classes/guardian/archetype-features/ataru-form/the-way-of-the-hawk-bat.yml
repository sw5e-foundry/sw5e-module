system:
  description:
    value: >-
      <p><em><strong>Ataru Form:</strong> 3rd level</em></p>

      <p>As a bonus action, you can take an aggressive stance, leaping around
      the battlefield for 1 minute. As a part of this bonus action, and as a
      bonus action on each of your turns, you can cast the <em>force jump</em>
      power at 1st-level without expending force points. Additionally, when you
      cast <em>force jump</em>, you have advantage on the first attack roll you
      make against each creature within 5 feet of where you land.</p>

      <p>This effect ends early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you finish a long
      rest.</p>
