    value: >-
      <p><em><strong>Ataru Form:</strong> 3rd level</em></p>

      <p>You gain the following Channel the Force option.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.GGsMEfBNf7IpuRbv]{Retreating
      Leap}</h3>

      <p>When a creature makes a melee attack roll against you, you can expend a
      use of your Channel the Force and your reaction to jump 10 feet in a
      direction of your choice, imposing disadvantage on the roll. This movement
      does not provoke opportunity attacks. You can wait until after the attack
      roll is made, but before the DM determines whether the attack hits.</p>
