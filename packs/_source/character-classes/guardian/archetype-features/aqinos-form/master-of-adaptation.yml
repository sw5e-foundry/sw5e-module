system:
  description:
    value: >-
      <p><em><strong>Aqinos Form:</strong> 20th level</em></p>

      <p>Your masteries of the Force and technology have achieved equilibrium.
      Your Constitution and Wisdom or Charisma (your choice) scores increase by
      2. Your maximum for those scores increases by 2. Additionally, you can use
      your action to gain the following benefits for 1 minute:</p>

      <ul>

      <li>You have resistance to ion damage, and you can't have disadvantage on
      saving throws against ion or lightning damage.</li>

      <li>You can't have disadvantage on attack rolls you make as a part of a
      tech power, and enemies can't have advantage on saving throws against your
      tech powers.</li>

      <li>You add your governing ability modifier (minimum of +1) to any damage
      or healing you do with tech powers you cast that don't already include
      that modifier.</li>

      </ul>

      <p>While you are conscious and your droid is within 60 feet of you and
      conscious, it also gains these benefits.</p>

      <p>This effect ends early if you are incapacitated or die. Once you use
      this feature, you can't use it again until you finish a long rest.</p>
