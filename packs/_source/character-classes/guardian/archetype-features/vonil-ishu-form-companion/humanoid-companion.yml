  description:
    value: >-
      <p><em><strong>Vonil/Ishu Form:</strong> 3rd, 11th, and 17th
      level</em></p>

      <p>You've adopted a partner, gaining the services of your own humanoid
      companion.</p>

      <p>Create your humanoid companion as detailed in the Companions section of
      the Customization Options document for Expanded Content. </p>

      <p>In addition to its traits and features, your companion gains additional
      benefits while it is bonded to you:</p>

      <ul>

      <li>Your companion gains two additional traits. It gains one more
      additional trait when you reach 11th level in this class. For each trait
      in excess of your proficiency bonus, your force point maximum is reduced
      by 2.</li>

      </ul>

      <p>Lastly, while bonded and within 10 feet of you, when you or your
      companion are dealt damage by an external effect, you can choose to have
      you or your companion gain resistance to that damage. If you do so, the
      other of the two takes the same damage as true damage.</p>

      <p>At 11th level, your companion must be within 30 feet of you to benefit
      from this feature. At 17th level, your companion must be within 60
      feet.</p>
