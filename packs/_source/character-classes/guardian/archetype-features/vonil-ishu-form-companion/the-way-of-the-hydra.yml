system:
  description:
    value: >-
      <p><em><strong>Vonil/Ishu Form:</strong> 3rd level</em></p>

      <p>As a bonus action, you can enter a synchronized stance with your
      companion for 1 minute, as long as your companion is within 10 feet of
      you. While in this stance, once per turn, when you hit a creature with an
      attack, your companion has advantage on the next attack it makes against
      the same target before the end of your next turn. Additionally, once per
      turn, when your companion hits a creature with an attack, you have
      advantage on the next attack you make against the same target before the
      end of your next turn.</p>

      <p>This effect ends early if either you or your companion are
      incapacitated or die, or if your companion is ever more than 10 feet away
      from you. Once you've used this feature, you can't use it again until you
      complete a long rest.</p>

      <p>At 11th level, your companion must be within 30 feet of you to benefit
      from this feature. At 17th level, your companion must be within 60
      feet.</p>
