system:
  description:
    value: >-
      <p><em><strong>Vonil/Ishu Form (Companion):</strong> 20th level</em></p>

      <p>You and your companion are a paragon of harmony. Your Strength or
      Dexterity (your choice) and Constitution scores increase by 2. Your
      maximum for those scores increases by 2. Additionally, you can use your
      action to gain the following benefits for 1 minute, as long as your
      companion is within 60 feet of you:</p>

      <ul>

      <li>You and your companion have resistance to kinetic and energy
      damage.</li>

      <li>Neither you nor your companion can have disadvantage on attack
      rolls.</li>

      <li>Both you and your companion's critical hit ranges increase by 1.</li>

      </ul>

      <p>This effect ends early if either you or your companion are
      incapacitated or die, or if your companion is ever more than 60 feet away
      from you. Once you've used this feature, you can't use it again until you
      complete a long rest.</p>
