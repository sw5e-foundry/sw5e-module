system:
  description:
    value: >-
      <p><em><strong>Vonil/Ishu Form:</strong> 7th, 11th, and 17th
      level</em></p>

      <p>You gain one of the following Channel the Force options. Choose Smite
      for Vonil or Shield for Ishu.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.BjgrQRKNtjhf1akJ]{Smite}</h3>

      <p>Once per turn, when your companion is within 10 feet of you and it hits
      a creature with a melee weapon attack, you can expend a use of your
      Channel the Force and expend force points to have your companion deal
      additional damage to the target, which is the same type as the weapon's
      damage. The additional damage is [[/r 1d8]] for each point spent in this
      way. You can't deal more additional damage than the amount shown in the
      Focused Strikes column of the guardian table.</p>

      <p>At 11th level, your companion must be within 30 feet of you to benefit
      from this feature. At 17th level, your companion must be within 60
      feet.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.sIxasPYYSmJfgkMJ]{Shield}</h3>

      <p>When your companion is hit by a weapon attack while within 10 feet of
      you, you can use your reaction and expend a use of your Channel the Force
      to attempt to divert the attack. When you do so, the damage your companion
      takes from the attack is reduced by [[/r 1d10]] + your Wisdom or Charisma
      modifier (your choice) + your guardian level.</p>

      <p>At 11th level, your companion must be within 30 feet of you to benefit
      from this feature. At 17th level, your companion must be within 60
      feet.</p>
