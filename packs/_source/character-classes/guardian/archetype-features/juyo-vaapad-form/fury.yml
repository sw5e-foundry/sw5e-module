system:
  description:
    value: >-
      <p><em><strong>Juyo/Vaapad Form:</strong> 7th level</em></p>

      <p>You gain one of the following features. Choose Relentless for Juyo or
      Punishing Charge for Vaapad.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.Xuhu5J6jGwdhwPdf]{Relentless
      }</h3>

      <p>You have advantage on initiative checks, and gain a 10 foot bonus to
      your speed on your first turn of combat.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.6L8CL3z3jPQkd742]{Punishing
      Charge }</h3>

      <p>When a hostile creature you can see or hear within 30 feet of you casts
      a force power, you can use your reaction to move up to half your speed.
      You must end this move closer to the enemy than you started. If you end
      this movement within 5 feet of the creature, and the triggering force
      power required a ranged attack roll, they have disadvantage on the
      roll.</p>
