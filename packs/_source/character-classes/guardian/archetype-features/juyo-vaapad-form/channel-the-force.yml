  description:
    value: >-
      <p><em><strong>Juyo/Vaapad Form:</strong> 3rd level</em></p>

      <p>You gain one of the following Channel the Force options. Choose Snap
      Aggression for Juyo or Assertive Defense for Vaapad.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.pw2SoWreDqfiCwk1]{Snap
      Aggression}</h3>

      <p>If you are surprised at the start of combat and aren't incapacitated,
      you can expend a use of your Channel the Force to act normally on your
      first turn.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.HOCuxZ7SICk9g3y2]{Assertive
      Defense}</h3>

      <p>When you reduce the damage dealt by a force power to 0 using the
      <em>saber reflect</em> power, and you're wielding a lightweapon or
      vibroweapon, you can expend a use of your Channel the Force to reflect the
      attack at a target within range, regardless of what type the damage
      is.</p>
