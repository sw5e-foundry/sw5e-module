system:
  description:
    value: >-
      <p>When a hostile creature you can see or hear within 30 feet of you casts
      a force power, you can use your reaction to move up to half your speed.
      You must end this move closer to the enemy than you started. If you end
      this movement within 5 feet of the creature, and the triggering force
      power required a ranged attack roll, they have disadvantage on the
      roll.</p>
