system:
  description:
    value: >-
      <p><em><strong>Shii-Cho Form:</strong> 15th level</em></p>

      <p>When a creature moves to within 5 feet of you, you can use your
      reaction to make a melee weapon attack against that creature. If the
      attack hits, you can attempt to damage another creature within 5 feet of
      the original target and within your reach. If the original attack roll
      would hit the second creature, it takes damage equal to your Strength or
      Dexterity modifier (your choice). The damage is of the same type dealt by
      the original attack.</p>
