system:
  description:
    value: >-
      <p><em><strong>Makashi Form:</strong> 3rd level</em></p>

      <p>As a bonus action, you can enter an offensive stance for one minute.
      While in this stance, you add your Wisdom or Charisma modifier (your
      choice) to the first melee weapon attack and damage rolls you make each
      turn.</p>

      <p>This effect ends early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you finish a long
      rest.</p>
