system:
  description:
    value: >-
      <p>When another creature damages you with a melee attack, you can expend a
      use of your Channel the Force and use your reaction to attempt to deflect
      the attack. When you do so, the damage you take from the attack is reduced
      by [[/r 1d10]] + your Dexterity modifier + your guardian level.</p>

      <p>If you reduce the damage to 0, you can immediately make a single melee
      weapon attack against that creature as a part of the reaction.</p>
