system:
  description:
    value: >-
      <p><em><strong>Trakata Form:</strong> 20th level</em></p>

      <p>Your skill with a lightweapon is both mesmerizing and confounding. Your
      Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your
      maximum for these scores increases by 2. Additionally, you can use your
      action to gain the following benefits for 1 minute:</p>

      <ul>

      <li>You have resistance to kinetic, energy, and ion damage from
      weapons.</li>

      <li>Your attack rolls can't suffer from disadvantage.</li>

      <li>Whenever a creature misses you with a melee attack, it takes 5 energy
      damage.</li>

      <li>Whenever a creature hits you with a melee attack, it takes damage
      equal to half of the damage you take from the attack.</li>

      </ul>

      <p>This effect ends early if you are incapacitated or die. Once you use
      this feature, you can't use it again until you finish a long rest.</p>
