system:
  description:
    value: >-
      <p><em><strong>Sokan Form:</strong> 3rd level</em></p>

      <p>As a bonus action, you can enter an unyielding stance for one minute.
      While in this stance, you have advantage on ability checks and saving
      throws to shove, trip, and avoid being moved, and you ignore difficult
      terrain. Additionally, once per turn, when you hit with a melee weapon
      attack, you can attempt to shove the target up to 10 feet away from you
      (no action required).</p>

      <p>This effect ends early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you complete a long
      rest.</p>
