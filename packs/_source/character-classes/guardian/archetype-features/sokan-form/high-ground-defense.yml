system:
  description:
    value: >-
      <p>When an opponent within 5 feet of you makes a melee attack against you,
      you can use your reaction and expend a use of your Channel the Force to
      move to another space within 5 feet of that creature without provoking
      opportunity attacks, imposing disadvantage on the roll. If the attack
      misses, you can attempt to shove the creature up to 10 feet away from you
      as a part of that same reaction.</p>
