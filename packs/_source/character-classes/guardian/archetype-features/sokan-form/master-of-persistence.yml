system:
  description:
    value: >-
      <p><em><strong>Sokan Form:</strong> 20th level</em></p>

      <p>You are an unrelenting force on the field of battle. Your Strength and
      Wisdom or Charisma scores (your choice) increase by 2. Your maximum for
      these scores increases by 2. Additionally, you can use your action to gain
      the following benefits for 1 minute:</p>

      <ul>

      <li>You have resistance to kinetic, energy, and ion damage from
      weapons.</li>

      <li>You ignore effects that would reduce your speed.</li>

      <li>Once per turn, when you push a creature, you can move up to 10 feet as
      a part of this push without provoking opportunity attacks. If you end this
      movement within 5 feet of that creature, you can make one melee weapon
      attack (no action required).</li>

      </ul>

      <p>This effect ends early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you complete a long
      rest.</p>
