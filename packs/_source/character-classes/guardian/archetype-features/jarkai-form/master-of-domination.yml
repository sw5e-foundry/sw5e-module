system:
  description:
    value: >-
      <p><em><strong>Jar'Kai Form:</strong> 20th level</em></p>

      <p>You are a whirlwind of strikes, eviscerating all who step within your
      reach. Your Strength and Dexterity scores increase by 2. Your maximum for
      these scores increases by 2. Additionally, you can use your action to gain
      the following benefits for 1 minute:</p>

      <ul>

      <li>You have resistance to kinetic, energy, and ion damage from
      weapons.</li>

      <li>When you hit a creature with a melee weapon attack, you have advantage
      on the next melee weapon attack roll you make against that creature, and
      that creature provokes an opportunity attack from you even if they take
      the Disengage action before leaving your reach until the end of your next
      turn.</li>

      <li>Creatures provoke an opportunity attack from you when they enter your
      reach.</li>

      </ul>

      <p>This effect ends early if you are incapacitated or die. Once you use
      this feature, you can't use it again until you finish a long rest.</p>
