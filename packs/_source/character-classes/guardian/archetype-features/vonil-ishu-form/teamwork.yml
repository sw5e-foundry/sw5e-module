system:
  description:
    value: >-
      <p><em><strong>Vonil/Ishu Form:</strong> 15th level</em></p>

      <p>You gain one of the following features. Choose Takedown for Vonil or
      Rebuttal for Ishu.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.h76GVdl2WZeQvMHo]{Takedown}</h3>

      <p>When an ally within 30 feet of you takes the Help action and helps you,
      you have advantage on the next two ability checks or attack rolls you make
      before the start of their next turn, instead of only one. When you take
      the Help action and help an ally within 30 feet of you, the chosen ally
      has advantage on the next two ability checks or attack rolls it makes
      before the start of your next turn, instead of only one.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.PR1lB6q06GfHu3zb]{Rebuttal}</h3>

      <p>When an ally within 30 feet of you takes the Help action and helps you,
      you gain temporary hit points equal to your guardian level that last until
      the start of their next turn. When you take the Help action and help an
      ally within 30 feet of you, it gains temporary hit points equal to your
      guardian level that last until the start of your next turn.</p>
