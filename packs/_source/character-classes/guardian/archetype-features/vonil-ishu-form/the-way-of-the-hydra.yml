system:
  description:
    value: >-
      <p><em><strong>Vonil/Ishu Form:</strong> 3rd, 11th, and 17th
      level</em></p>

      <p>As a bonus action, you can enter a synchronized stance with one ally of
      your choice within 10 feet of you for 1 minute. While in this stance, once
      per turn, when you hit a creature with an attack, the chosen ally has
      advantage on the next attack it makes against the same target before the
      end of your next turn. Additionally, once per turn, when the chosen ally
      hits a creature with an attack, you have advantage on the next attack you
      make against the same target before the end of your next turn.</p>

      <p>This effect ends early if either you or the chosen ally are
      incapacitated or die, or if the chosen ally is ever more than 10 feet away
      from you. Once you've used this feature, you can't use it again until you
      complete a long rest.</p>

      <p>At 11th level, the chosen ally must be within 30 feet of you to benefit
      from this feature. At 17th level, the chosen ally must be within 60
      feet.</p>
