    value: >-
      <p><em><strong>Vonil/Ishu Form:</strong> 7th, 11th, and 17th
      level</em></p>

      <p>Once on each of your turns, you can choose an ally within 10 feet of
      you. While the chosen ally is within 10 feet of you, your auras emit from
      that ally as if you were standing in that ally's space. A creature in the
      area of more than one instance of your auras is affected only once.</p>

      <p>At 11th level, the chosen ally must be within 30 feet of you to benefit
      from this feature. At 17th level, the chosen ally must be within 60
      feet.</p>
