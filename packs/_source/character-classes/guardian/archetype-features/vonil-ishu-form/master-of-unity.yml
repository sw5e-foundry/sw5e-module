system:
  description:
    value: >-
      <p><em><strong>Vonil/Ishu Form:</strong> 20th level</em></p>

      <p>You and your allies are a paragon of harmony. Your Strength or
      Dexterity (your choice) and Constitution scores increase by 2. Your
      maximum for those scores increases by 2. Additionally, you can use your
      action and choose an ally within 60 feet of you to gain the following
      benefits for 1 minute:</p>

      <ul>

      <li>You and the chosen ally have resistance to kinetic and energy
      damage.</li>

      <li>Neither you nor the chosen ally can have disadvantage on attack
      rolls.</li>

      <li>Both you and the chosen ally's critical hit ranges increase by 1.</li>

      </ul>

      <p>This effect ends early if either you or the chosen ally are
      incapacitated or die, or if the chosen ally is ever more than 60 feet away
      from you. Once you've used this feature, you can't use it again until you
      complete a long rest.</p>
