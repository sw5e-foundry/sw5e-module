    value: >-
      <p>When you hit with an attack made by the <em>saber reflect</em> power,
      you can expend force points to deal additional damage to the target, which
      is the same type as the weapon's damage. The additional damage is [[/r
      1d8]] for each point spent in this way. You can't deal more additional
      damage than the amount shown in the Focused Strikes column of the guardian
      table.</p>
