system:
  description:
    value: >-
      <p><em><strong>Shien/Djem So Form:</strong> 7th level</em></p>

      <p>You gain one of the following features. Choose Aggressive Negotiations
      for Shien or Reliable Vigor for Djem So.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.pXWkqYaBM4T0YCXa]{Aggressive
      Negotiations}</h3>

      <p>You gain proficiency in Intimidation or Persuasion. Additionally, while
      you are wielding a weapon with which you are proficient, you can't have
      disadvantage on Charisma (Intimidation) and Charisma (Persuasion) checks,
      and if the target would make a contested check, they can't have advantage
      on it.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.B3rKYEpxP1D2sY8Z]{Reliable
      Vigor}</h3>

      <p>If the [[/r d20]] result for a Strength check or saving throw is less
      than your guardian level, you can use your guardian level in place of the
      result. You can use this feature three times. You gain an additional use
      at 9th, 13th, and 17th level. You regain all expended uses when you
      complete a long rest.</p>
