system:
  description:
    value: >-
      <p><em><strong>Shien/Djem So Form:</strong> 3rd level</em></p>

      <p>As a bonus action, you can take a threatening stance for one minute.
      While in this stance, the first time you hit with a melee weapon attack
      using Strength each turn, you can choose to deal additional damage equal
      to your Strength modifier. If there is another creature within 5 feet of
      the original target and within your reach, you can attempt to deal the
      additional damage to that creature instead. If the original attack roll
      would hit the second creature, it takes damage equal to your Strength
      modifier. The damage is of the same type dealt by the original attack.</p>

      <p>This effect ends early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you finish a long
      rest.</p>
