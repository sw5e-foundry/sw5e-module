system:
  description:
    value: >-
      <p><em><strong>Shien/Djem So Form:</strong> 20th level</em></p>

      <p>Your might overwhelms even the most implacable of foes. Your Strength
      and Constitution scores increase by 2. Your maximum for these scores
      increases by 2. Additionally, you can use your action to gain the
      following benefits for 1 minute:</p>

      <ul>

      <li>You have resistance to kinetic and energy damage from unenhanced
      weapons.</li>

      <li>Once per turn, when you hit with a melee weapon attack using Strength,
      you can use your Force-Empowered Strikes feature at 1st-level without
      expending force points. You gain temporary hit points equal to the extra
      damage dealt.</li>

      <li>When a creature within 5 feet of you makes an attack roll against you,
      you can use your reaction to make a single weapon attack with advantage
      against that creature. If the attack hits, you impose disadvantage on the
      triggering attack roll.</li>

      </ul>

      <p>This effect ends early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you finish a long
      rest.</p>
