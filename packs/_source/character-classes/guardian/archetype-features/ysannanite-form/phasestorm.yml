system:
  description:
    value: >-
      <p><em><strong>Ysannanite Form:</strong> 15th level</em></p>

      <p>You can use your action to dart across the battlefield, striking up to
      six such creatures that you can see within 30 feet. You immediately move
      to each creature in succession without provoking opportunity attacks,
      after which you return to the space in which you started. Each creature
      must make a Dexterity saving throw (DC = 8 + your bonus to attacks with
      your weapon). A creature takes normal weapon damage on a failed save, or
      half as much on a successful one. If you are wielding separate weapons in
      each hand with which you are proficient, a creature makes this save with
      disadvantage, and takes additional damage equal to your Wisdom or Charisma
      modifier (your choice, minimum of one) on a failed save if the damage
      doesn't already include that modifier.</p>

      <p>Once you've used this feature, you must complete a short or long rest
      before you can use it again.</p>
