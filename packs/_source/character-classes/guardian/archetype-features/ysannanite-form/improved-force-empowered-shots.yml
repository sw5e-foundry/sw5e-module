system:
  description:
    value: >-
      <p><em><strong>Ysannanite Form:</strong> 7th level</em></p>

      <p>Your familiarity with blaster weapons has granted you greater insight
      into their function and usage. Once on each of your turns, drawing or
      stowing a blaster no longer requires your object interaction.
      Additionally, you no longer require a free hand to reload.</p>

      <p>At 11th level, once per turn, when you hit a creature with a ranged
      weapon attack, the creature takes an extra [[/r 1d8]] damage. If you also
      use your Force-Empowered Shots with an attack, you add this damage to the
      extra damage of your Force-Empowered Shots. The damage is the same type as
      the weapon's damage.</p>
