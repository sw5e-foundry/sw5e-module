    value: >-
      <h1>Soresu Form</h1><p>Soresu Form, also known as Resilience Form, relies
      on tight bladework and subtle dodges to provide maximum defensive
      coverage, minimizing exposure to ranged weaponry. Those guardians who
      focus on Soresu Form use broad footwork to move around the playing field,
      making broad, short sweeping motions that protect the body.</p>
