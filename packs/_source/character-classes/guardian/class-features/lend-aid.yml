system:
  description:
    value: >-
      <p>As a bonus action, you can expend a use of your Channel the Force and
      touch a beast or humanoid within 5 feet of you. That creature regains hit
      points equal to your guardian level + your Wisdom modifier (minimum of
      +1). Alternatively, if the beast or humanoid is poisoned or diseased, you
      neutralize the poison or disease. If more than one poison or disease
      afflicts the target, you neutralize one poison or disease that you know is
      present, or you neutralize one at random.</p>
