system:
  description:
    value: >-
      <p><em><strong>Guardian:</strong> 2nd level</em></p><p>When you hit a
      creature with a melee weapon attack, you can expend force points to deal
      additional damage to the target, which is the same type as the weapon's
      damage. The additional damage is [[/r 1d8]] for each point spent in this
      way. You can't deal more additional damage than the amount shown in the
      Focused Strikes column of the guardian table.</p><section class="secret"
      id="secret-Tko1M83XFLWrB42I"><p><strong>Foundry Note</strong></p><p>Your
      maximum additional points spent will scale automatically as you level. You
      can select the damage type in the damage roll's dialog box. Damage types
      other than Energy and Kinetic can be added from the activity's effect
      tab.</p></section>
