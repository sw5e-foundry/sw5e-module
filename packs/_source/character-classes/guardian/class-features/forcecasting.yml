  description:
    value: >-
      <p><em><strong>Guardian:</strong> 1st level</em></p>

      <p>In your meditations on the Force, you have learned powers, fragments of
      knowledge that imbue you with an abiding force ability. See chapter 10 for
      the general rules of forcecasting and chapter 11 for the force powers
      list.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.zXiHl7sV8HFx6yJN]{Force
      Powers Known}</h3>

      <p>You learn 5 force powers of your choice, and you learn more at higher
      levels, as shown in the Force Powers Known column of the guardian table.
      You may not learn a force power of a level higher than your Max Power
      Level, and you may learn a force power at the same time you learn its
      prerequisite.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.t9ESLnhZlRsCTgIs]{Force
      Points}</h3>

      <p>You have a number of force points equal to your guardian level x 2, as
      shown in the Force Points column of the guardian table, + your Wisdom or
      Charisma modifier (your choice). You use these force points to cast force
      powers. You regain all expended force points when you finish a long
      rest.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.Yky5gMnuOxy2yGOc]{Max
      Power Level}</h3>

      <p>Many force powers can be overpowered, consuming more force points to
      create a greater effect. You can overpower these abilities to a maximum
      level, which increases at higher levels, as shown in the Max Power Level
      column of the guardian table.</p>

      <p>You may only cast force powers at 4th and 5th-level once. You regain
      the ability to do so after a long rest.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.a4vvaYweCkoHu889]{Forcecasting
      Ability}</h3>

      <p>Your forcecasting ability varies based on the alignment of the powers
      you cast. You use Wisdom for light side powers, Charisma for dark side
      powers, and Wisdom or Charisma for universal powers (your choice). You use
      this ability whenever a power refers to your forcecasting ability.
      Additionally, you use this ability modifier when setting the saving throw
      DC for a force power you cast and when making an attack roll with one.</p>

      <p><em></em>_</p>

      <p><strong>Force save DC</strong> = 8 + your proficiency bonus + your
      forcecasting ability modifier</p>

      <p><em></em>_</p>

      <p><strong>Force attack modifier</strong> = your proficiency bonus + your
      forcecasting ability modifier</p>

      <p><em></em>_</p>
