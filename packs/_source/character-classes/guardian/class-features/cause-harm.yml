system:
  description:
    value: >-
      <p>As an action, you can expend a use of your Channel the Force to sap the
      life from a hostile creature you can see within 60 feet. That creature
      must make a Constitution saving throw. On a failed save, the creature
      takes necrotic damage equal to your guardian level + your Charisma
      modifier (minimum of +1), or half as much on a successful one.</p>
