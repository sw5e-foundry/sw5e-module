system:
  description:
    value: >-
      <p><em><strong>Frenzied Approach:</strong> 10th level</em></p>

      <p>You can use your action to frighten someone with your menacing
      presence. When you do so, choose one creature that you can see within 30
      feet of you. If the creature can see or hear you, it must succeed on a
      Wisdom saving throw (DC = 8 + your proficiency bonus + your Charisma
      modifier) or be frightened of you until the end of your next turn. On
      subsequent turns, you can use your action to extend the duration of this
      effect on the frightened creature until the end of your next turn. This
      effect ends if the creature ends its turn out of line of sight or more
      than 60 feet away from you. While raging, you add double your proficiency
      bonus to the save DC, instead of your normal proficiency bonus.</p>

      <p>If the creature succeeds on its saving throw, it becomes immune to this
      feature for 24 hours.</p>
