system:
  description:
    value: >-
      <p><em><strong>Cyclone Approach:</strong> 14th level</em></p>

      <p>You can become a tornado of attacks. When you take the Attack action on
      your turn, you can forgo one of your regular attacks to make a melee
      attack against any number of creatures within 5 feet of you, with a
      separate attack roll for each target. If you are wielding a separate melee
      weapon in each hand, each successful hit against a target deals damage
      equal to the damage dice of both weapons + your ability modifier + any
      other modifiers.</p>

      <p>You can use this feature a number of times equal to your Strength
      modifier (a minimum of once). You regain all expended uses when you finish
      a short or long rest.</p>
