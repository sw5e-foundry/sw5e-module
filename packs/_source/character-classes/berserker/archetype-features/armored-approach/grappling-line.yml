system:
  description:
    value: >-
      <p>You can use a bonus action to launch a grappling line at one creature
      of your choice that you can see within 15 feet. The target must succeed on
      a Strength saving throw (DC = 8 + your proficiency bonus + your Strength
      modifier) or be pulled up to 10 feet in a straight line towards you. If it
      ends this movement within 5 feet of you, it takes kinetic damage from your
      armor spikes equal to your Strength modifier.</p>
