  description:
    value: >-
      <p><em><strong>Armored Approach:</strong> 14th level</em></p>

      <p>When a creature within 5 feet of you hits you with a melee attack, the
      attacker takes kinetic damage equal to your Strength modifier, as long as
      you are wearing your spiked armor and you aren't incapacitated.</p>

      <p>If you are raging, you add your rage damage bonus to this damage.</p>
