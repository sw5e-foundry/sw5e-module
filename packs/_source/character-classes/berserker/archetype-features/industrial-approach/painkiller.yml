  description:
    value: >-
      <p><em><strong>Industrial Approach:</strong> 10th level</em></p>

      <p>Whenever you cast a tech power of 1st-level or higher, or deal damage
      using your Explosive Resilience feature, you can cause a friendly creature
      you can see within 30 feet to gain temporary hit points equal to half your
      berserker level + your Intelligence modifier. Additionally, while they
      have these temporary hit points, they have advantage on saving throws
      against effects that would cause them to be frightened.</p>
