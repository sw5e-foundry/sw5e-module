  description:
    value: >-
      <p><em><strong>Industrial Approach:</strong> 6th, 9th, 13th, and 17th
      level</em></p>

      <p>Once per round, when you deal damage that includes your rage damage,
      you can cause a localized explosion around the recipient of that damage.
      Each creature within 5 feet of the damaged creature other than you takes
      acid, cold, fire, ion, or lightning damage (your choice) equal to your
      rage damage bonus, and you gain resistance to the chosen damage type until
      the end of your next turn.</p>

      <p>You can use this feature three times. You gain an additional use at
      9th, 13th, and 17th level. You regain all expended uses when you complete
      a short or long rest.</p>
