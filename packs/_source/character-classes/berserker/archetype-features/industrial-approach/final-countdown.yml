system:
  description:
    value: >-
      <p><em><strong>Industrial Approach:</strong> 14th level</em></p>

      <p>When you are reduced to 0 hit points but not killed outright, and you
      have at least one tech point remaining, you can expend all your remaining
      tech points and instead to drop to one hit point (no action required). If
      you do so, each creature within 30 feet of you must make a Dexterity
      saving throw against your tech save DC. On a failed save, they take [[/r
      1d12]] acid, cold, fire, ion, or lightning damage (your choice) damage for
      each tech point spent in this way, or half as much on a successful
      one.</p>
