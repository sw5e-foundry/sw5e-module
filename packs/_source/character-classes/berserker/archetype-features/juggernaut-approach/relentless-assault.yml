system:
  description:
    value: >-
      <p><em><strong>Juggernaut Approach:</strong> 14th level</em></p>

      <p>You're able to charge in unerring bursts. As an action, you can charge
      up to twice your speed in a straight line without provoking opportunity
      attacks. Each creature within 5 feet of your path must make a Strength or
      Dexterity saving throw (DC = 8 + your proficiency bonus + your Strength
      modifier, the target chooses the ability they use use). On a failed save,
      a creature takes damage equal to your Strength modifier + your Rage Bonus
      and is pushed back 5 feet in a direction of your choice. Creatures smaller
      than you make this save with disadvantage. When you end this movement, if
      a creature is within 5 feet of you, you can make one melee weapon attack
      (no action required). On a hit, the creature takes additional damage equal
      to your berserker level.</p>

      <p>Once you've used this feature, you must complete a short or long rest
      before you can use it again.</p>
