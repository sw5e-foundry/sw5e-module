system:
  description:
    value: >-
      <p><em><strong>Juggernaut Approach:</strong> 10th level</em></p>

      <p>When you successfully push a creature into a surface or another
      creature while raging, the pushed creature takes kinetic damage equal to
      your Rage Damage. Additionally, the first time you hit with a melee weapon
      attack using Strength each turn, you can attempt to damage another
      creature with the same attack. Choose another creature within 5 feet of
      the original target and within your reach. If the original attack roll
      would hit the second creature, it takes damage equal to your Strength
      modifier. The damage is of the same type dealt by the original attack.</p>
