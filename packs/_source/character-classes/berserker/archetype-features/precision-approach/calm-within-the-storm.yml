system:
  description:
    value: >-
      <p><em><strong>Precision Approach:</strong> 14th level</em></p>

      <p>The precision with which you act during your rage causes you to become
      a storm of reactive lethality. When you use your Reckless Attack feature,
      you can make a number of opportunity attacks equal to your proficiency
      bonus without using your reaction, and when a creature within 5 feet of
      you misses you with an attack, you can use your reaction to make a melee
      weapon attack using Dexterity against that creature. You can only take one
      reaction per turn.</p>
