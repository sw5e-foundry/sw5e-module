      <p><em><strong>Precision Approach:</strong> 3rd level</em></p>

      <p>You hone your rage to a razor sharp focus. While raging, when you make
      a melee weapon attack using Dexterity, you add your rage damage to the
      damage roll. Additionally, you can use your Reckless Attack feature to
      give you advantage on melee weapon attacks using Dexterity during your
      turn.</p>
