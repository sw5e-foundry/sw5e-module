system:
  description:
    value: >-
      <p><em><strong>Marauder Approach:</strong> 14th level</em></p>

      <p>You can expel the might of your rage all at once to unleash a
      devastating storm of force energy. As an action, you can end your rage
      early, forcing each creature within 15 feet of you to make a Dexterity
      saving throw against your universal force save DC. On a failed save, a
      creature takes [[/r 1d12]] force damage for each round you've spent in
      rage, or half as much on a successful one.</p>
