system:
  description:
    value: >-
      <p><em><strong>Warchief Approach:</strong> 3rd level</em></p>

      <p>You become more aware of your allies, and their intent when fighting at
      your side. While you are raging, when an ally within 10 feet of you makes
      an attack roll against an enemy, you can use your reaction to grant
      advantage to that attack and add your rage damage bonus to the damage
      roll, if the attack hits.</p>

      <p>You can use this feature twice. You gain an additional use at 5th, 9th,
      13th, and 17th level. You regain all expended uses when you complete a
      short or long rest.</p>
