system:
  description:
    value: >-
      <p><em><strong>Addicted Approach:</strong> 14th level</em></p>

      <p>While you are both raging and experiencing the high of a substance,
      having 0 hit points doesn't knock you unconscious. You still must make
      death saving throws, and you suffer the normal effects of taking damage
      while at 0 hit points. However, if you would die due to failing death
      saving throws, you don't die until your rage ends, and you die then only
      if you still have 0 hit points.</p>
