    value: >-
      <p><em><strong>Addicted Approach:</strong> 3rd level</em></p>

      <p>While you are raging or experiencing the high of a substance, you have
      advantage on saving throws that would force you to act against your will,
      be frightened, or prevent you from attacking a creature. If you are both
      raging and experiencing the high of a substance, you are instead immune to
      effects that would force you to act against your will or would prevent you
      from attacking a creature.</p>
