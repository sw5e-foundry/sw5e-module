    value: >-
      <p><em><strong>Addicted Approach:</strong> 6th level</em></p>

      <p>While you are raging or experiencing the high of a substance, when you
      hit a creature with a melee weapon attack, you can expend a Hit Die to
      deal additional damage to the target. Roll the Hit Die, adding the result
      of the die to the damage roll. If you are both raging and experiencing the
      high of a substance, you also add your Constitution modifier to the damage
      roll.</p>
