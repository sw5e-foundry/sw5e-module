system:
  description:
    value: >-
      <p><em><strong>Champion Approach:</strong> 3rd level</em></p>

      <p>You learn maneuvers that are fueled by special dice called superiority
      dice. See chapter 13 for the maneuvers list.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.VlxRu3b3jxcOBPy6]{Maneuvers
      Known}</h3>

      <p>You learn two maneuvers of your choice, and you earn more at higher
      levels, as shown in the Maneuvers Known column of the Champion Superiority
      table. Many maneuvers enhance an attack in some way. You can use only one
      maneuver per attack, and you may only use each maneuver once per turn.</p>

      <p>Each time you learn new maneuvers, you can also replace one maneuver
      you know with a different one.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.OTPEBk9GeSPdIJOo]{Superiority
      Dice}</h3>

      <p>You have two superiority dice, which are d4s, and you earn more at
      higher levels, as shown in the Superiority Dice Quantity column of the
      Champion Superiority table. This die changes as you gain berserker levels,
      as shown in the Superiority Dice Size column of the Champion Superiority
      table. A superiority die is expended when you use it. </p>

      <p>You regain all of your expended superiority dice when you finish a
      short or long rest.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.okyJ09ep0SX9rfk1]{Maneuver
      Ability}</h3>

      <p>Your maneuver ability varies based on the type of the maneuver you use.
      You use Strength, Dexterity, or Constitution for physical maneuvers (your
      choice), Intelligence, Wisdom, or Charisma for mental maneuvers (your
      choice), and an ability of your choice for general maneuvers. You use this
      ability whenever a maneuver refers to your maneuver ability. Additionally,
      you use this ability modifier when setting the saving throw DC for a
      maneuver you use.</p>

      <p><em></em>_</p>

      <p><strong>Maneuver save DC</strong> = 8 + your proficiency bonus + your
      maneuver ability modifier</p>

      <p><em></em>_</p>
