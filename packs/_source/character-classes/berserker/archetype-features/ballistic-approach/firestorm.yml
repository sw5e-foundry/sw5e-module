system:
  description:
    value: >-
      <p><em><strong>Ballistic Approach:</strong> 3rd level</em></p>

      <p>You gain proficiency in martial blasters with the burst or rapid
      property. Additionally, you've learned to use ranged weapons with untold
      fury. While wielding a blaster with which you are proficient, you gain the
      following benefits:</p>

      <ul>

      <li>You can use your choice of Strength or Dexterity modifier for the
      attack and damage rolls of blaster weapons against targets within 30 feet
      of you. You must use the same modifier for both rolls.</li>

      <li>When you use a blaster as an improvised weapon, you are considered
      proficient with it.</li></ul>
