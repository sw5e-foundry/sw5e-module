system:
  description:
    value: >-
      <p><em><strong>Bloodstorm Approach:</strong> 10th level</em></p>

      <p>You learn to throw creatures as easily as you throw your weapons. When
      you successfully grapple a creature, you may immediately throw the
      creature.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.YDSKOTBsH2rWpOkk]{Throw
      Friend}</h3>

      <p>If the creature is a willing ally and volunteers to be grappled, you
      throw the target into any unoccupied space within 60 feet. That creature
      may immediately use its reaction to make one melee weapon attack, adding
      your Strength modifier to the attack's damage roll.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.OgGqrG1OD9ELC4Dd]{Throw
      Foe}</h3>

      <p>If the creature is an opponent, you throw the target into any
      unoccupied space within 30 feet, where it takes damage equal to your
      Strength modifier and falls prone.</p>
