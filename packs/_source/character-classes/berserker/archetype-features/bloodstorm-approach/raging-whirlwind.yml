system:
  description:
    value: >-
      <p><em><strong>Bloodstorm Approach:</strong> 14th level</em></p>

      <p>You can send your weapon spinning into a gravity-defying whirlwind of
      pain. Once per rage as an action, you may throw a weapon with the thrown
      property to a point you choose within 60 feet. The weapon fills the air as
      a cyclone in a 10 foot radius sphere centered on that point. A creature
      takes damage equal to the thrown weapon's damage + your Strength modifier
      + your Rage Damage when it enter's the whirlwind's area for the first time
      on a turn or starts its turn there. This effect ends when you command the
      weapon to return to you (no action required) or your rage ends.</p>
