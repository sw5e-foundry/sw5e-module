  description:
    value: >-
      <p><em><strong>Beastmaster Approach:</strong> 6th level</em></p>

      <p>You gain a your choice of a climbing or swimming speed equal to your
      walking speed. Additionally, you gain an effect while raging based on your
      choice of speed:</p>

      <ul>

      <li>If you chose a climbing speed, you can climb difficult surfaces,
      including upside down on ceilings, without needing to make an ability
      check.</li>

      <li>If you chose a swimming speed, you can use your bonus action to Dash
      or Disengage while in water.</li></ul>
