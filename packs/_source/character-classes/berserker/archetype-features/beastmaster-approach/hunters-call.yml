  description:
    value: >-
      <p><em><strong>Beastmaster Approach:</strong> 14th and 17th level</em></p>

      <p>When you enter your rage, you can choose up to 5 allies that you can
      see within 30 feet of you. You gain 5 temporary hit points for each
      creature. For the duration of your rage, once on each of their turns, an
      affected ally can add your rage damage bonus to a weapon attack's damage
      roll.</p>

      <p>You can use this feature five times. You gain an additional use at 17th
      level. You regain all expended uses when you finish a long rest.</p>
