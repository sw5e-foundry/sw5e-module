  description:
    value: >-
      <img style="margin:5px;border:0px;float:right"
      src="modules/sw5e-module/icons/packs/Classes/berserker_01.webp" /><p>A
      massive wookiee hunter prowls through the forest, hefting his vibroaxe.
      With a roar he charges at the pair of trandoshans who dared poach his
      kin.</p><p>A gamorrean snarls at the latest challenger to his authority
      over their savage tribe, ready to break his neck with his bare hands as he
      did to the last six rivals.</p><p>Frothing at the mouth, a nikto slams his
      helmet into the face of his foe, then turns to drive his armored elbow
      into the gut of another.</p><p>These berserkers, different as they might
      be, are defined by their rage: unbridled, unquenchable, and unthinking
      fury. More than a mere emotion, their anger is the ferocity of a cornered
      predator, the unrelenting assault of a storm, the churning turmoil of the
      sea. For every berserker, rage is a power that fuels not just a battle
      frenzy but also uncanny reflexes, resilience, and feats of
      strength.</p><h2>Primal Instinct</h2><p>People of towns and cities take
      pride in how their civilized ways set them apart from animals, as if
      denying one's own nature was a mark of superiority. To a berserker,
      though, civilization is no virtue, but a sign of weakness. The strong
      embrace their animal nature keen instincts, primal physicality, and
      ferocious rage. Berserkers are uncomfortable when hedged in by walls and
      crowds. They thrive where the civilized don't.</p><p>Berserkers come alive
      in the chaos of combat. They can enter a berserk state where rage takes
      over, giving them superhuman strength and resilience. A berserker can draw
      on this reservoir of fury only a few times without resting, but those few
      rages are usually sufficient to defeat whatever threats arise.</p><h2>A
      Life of Danger</h2><p>Not every person deemed "berserkers" by scions of
      civilized society has the berserker class. A true berserker among these
      people is as uncommon as a skilled fighter in a town, and he or she plays
      a similar role as a protector of the people and a leader in times of war.
      Life in the wild places of the world is fraught with peril: rival tribes,
      deadly weather, and terrifying monsters. Berserkers charge headlong into
      that danger so that their people don't have to.</p><p>Their courage in the
      face of danger makes berserkers perfectly suited for adventuring.
      Wandering is often a way of life for their native tribes, and the rootless
      life of the adventurer is little hardship for a berserker. Some berserkers
      miss the close-knit family structures of the tribe, but eventually find
      them replaced by the bonds formed among the members of their adventuring
      parties.</p><p>When creating a berserker character, think about where your
      character comes from and his or her place in the world. Talk with your GM
      about an appropriate origin for your berserker. Did you come from a remote
      planet, making you a stranger in the area of the campaign? Or is the
      campaign set in a rough-and-tumble frontier where berserkers are
      common?</p><p>What led you to take up the adventuring life? Were you lured
      to settled planets by the promise of riches? Did you join forces with
      soldiers of those lands to face a shared threat? Did monsters or an
      invading horde drive you out of your homeland, making you a rootless
      refugee? Perhaps you were a prisoner of war, brought in chains to
      "civilized" lands and only now able to win your freedom. Or you might have
      been cast out from your people because of a crime you committed, a taboo
      you violated, or a coup that removed you from a position of
      authority.</p><h3>Quick Build</h3><p>You can make a berserker quickly by
      following these suggestions. First, put your highest ability score in
      Strength, followed by Constitution. Second, choose the mercenary
      background.</p>
