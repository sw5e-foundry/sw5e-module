system:
  description:
    value: >-
      <h1>Warchief Approach</h1><p>For some berserkers, it is their duty or
      birthright to lead their tribe and kin to battle and victory. The Warchief
      Approach is one forged from alliances, bonds, and strategy. In combat,
      your rages are less mindless, and more focused. Ignoring the distractions
      of unimportant events, your attention hones in on the battlefield and how
      best to direct and control it. You guide your allies' strikes, and your
      presence is enough to wash away their fatigue.</p>
