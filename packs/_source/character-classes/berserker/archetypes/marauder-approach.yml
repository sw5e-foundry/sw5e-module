system:
  description:
    value: >-
      <h1>Marauder Approach</h1><p>Few things are more terrifying than being in
      the path of a Berserker who has learned the ways of the Force. Those who
      follow this path unlock something deep within them, a well of untamed
      power from the depths of their fury. When a marauder unleashes their rage,
      they channel their brute strength into primal might, and uses it to
      devastate his foes in a hail of fire, blades, and blood. Due to the
      uncontrolled nature of their powers, marauders have a dangerous
      predilection for the strength and raw power offered by the dark side, and
      many fall into it's clutches. Even those who do not are always temped by
      the voices of fury barely contained within.</p>
