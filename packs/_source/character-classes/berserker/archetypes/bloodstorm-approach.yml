system:
  description:
    value: >-
      <h1>Bloodstorm Approach</h1><p>The Bloodstorm Approach is said to have
      originated from the ancient wookiee Hroufrasnooohn clan (which loosely
      translates to Bloodstorm in Galactic Basic), whose warriors performed
      gravity-defying feats with their flying vibroaxes through a combination of
      unorthodox techniques and a mystical belief in their own abilities. A
      berserker who follows this approach can hurl their devastating weapons at
      enemies with such power and skill that it completely blurs the line
      between melee and ranged combat.</p>
