  description:
    value: >-
      <h1>Armored Approach</h1>

      <p>Many berserkers forgo armor and rely on their own fortitude. Berserkers
      of the Armored Approach, however, embrace the use of armor. Each one
      customizes their own suit of armor to be used both defensively and
      offensively, so that the suit becomes an extension of the berserker's own
      might and fury.</p>
