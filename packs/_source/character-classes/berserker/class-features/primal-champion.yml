    value: >-
      <p><em><strong>Berserker:</strong> 20th level</em></p>

      <p>You embody the power of the wilds. Your Strength or Dexterity score
      increases by 2, and your Constitution score increases by 2. Your maximum
      for those scores increases by 2.</p>

      <p>Additionally, you can enter rage an unlimited number of times, and
      entering rage no longer requires your bonus action on your turn.</p>
