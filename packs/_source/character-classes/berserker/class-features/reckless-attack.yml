  description:
    value: >-
      <p><em><strong>Berserker:</strong> 2nd level</em></p>

      <p>You can throw aside all concern for defense to attack with fierce
      desperation. When you make your first attack on your turn, you can decide
      to attack recklessly. Doing so gives you advantage on melee weapon attack
      rolls using Strength during this turn, but attack rolls against you have
      advantage until your next turn.</p>
