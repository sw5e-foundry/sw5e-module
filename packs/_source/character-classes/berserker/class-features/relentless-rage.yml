system:
  description:
    value: >-
      <p><em><strong>Berserker:</strong> 11th level</em></p><p>Your rage can
      keep you fighting despite grievous wounds. If you drop to 0 hit points
      while you're raging and don't die outright, you can make a DC 10
      Constitution saving throw. If you succeed, you drop to 1 hit point
      instead.</p><p>Each time you use this feature after the first, the DC
      increases by 5. When you finish a short or long rest, the DC resets to
      10.</p><section class="secret"
      id="secret-eAyAZJpXKp4DLiWB"><p><strong>Foundry Note</strong></p><p>This
      feature will automatically increase the DC by 5 if you consume the
      resource when activating it. It will also automatically reset to 10 after
      a Short or Long Rest.</p></section>
