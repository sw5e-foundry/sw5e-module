system:
  description:
    value: >-
      <p><em><strong>Berserker:</strong> 3rd level</em></p><p>You gain an
      uncanny sense of when things nearby aren't as they should be, giving you
      an edge when you dodge away from danger. You have advantage on Dexterity
      saving throws against effects that you can see, such as traps and powers.
      To gain this benefit, you can't be blinded, deafened, or
      incapacitated.</p><section class="secret"
      id="secret-wPMwJgh0QIu2IWeF"><p><strong>Foundry Note</strong></p><p>This
      feature automates the Advantage on Dexterity saving throws but is not
      automatically disabled when blinded, deafened, or incapacitated. It can be
      temporarily deactivated in the Effects tab.</p></section>
