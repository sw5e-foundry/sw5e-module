  description:
    value: >-
      <p><em><strong>Berserker:</strong> 3rd level</em></p>

      <p>You gain an uncanny sense of when things nearby aren't as they should
      be, giving you an edge when you dodge away from danger. You have advantage
      on Dexterity saving throws against effects that you can see, such as traps
      and powers. To gain this benefit, you can't be blinded, deafened, or
      incapacitated.</p>
