system:
  description:
    value: >-
      <h1>Jal Shey Order</h1><p>Monks of the Jal Shey order, driven by the
      pursuit of knowledge, maintain one of the most well-respected and heavily
      guarded repositories of history and knowledge across the galaxy: the
      Archives of the Jal Shey. Here, young folk of all species seeking the
      clarity of truth and the strength of knowledge pledge to learn the arts of
      seeking enlightenment by understanding the world around them, and
      mastering the techniques to defend it. To become a Jal Shey monk is to
      give one's self to the quest for unveiling the deepest mysteries of the
      galaxy, to bring light to the secrets of the dark, and guard the most
      powerful and dangerous of truths.</p><p></p>
