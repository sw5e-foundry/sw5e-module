    value: >-
      <p><em><strong>Matukai Order:</strong> 17th level</em></p>

      <p>Whenever you use your Instinctive Leap feature, you can leap your
      entire movement speed instead of only half. Additionally, when you land,
      you can make an unarmed strike with advantage against a creature within 5
      feet of you as part of the same reaction. On a hit, this attack deals an
      additional [[/r 2d6]] force damage.</p>
