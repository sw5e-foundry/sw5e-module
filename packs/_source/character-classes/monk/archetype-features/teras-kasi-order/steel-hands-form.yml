system:
  description:
    value: >-
      <p><em><strong>Teras Kasi Order:</strong> 6th level</em></p>

      <p>You can draw upon your focus to utilize an array of practiced
      techniques to strike your opponents with precision and power. You can use
      your bonus action to enter this stance, and when you do so, you can also
      enter your Forredari Stance as a part of this same bonus action. This form
      lasts for 1 minute. While you are in this stance, you gain the following
      benefits:</p>

      <ul>

      <li><strong>Charging Wampa.</strong> Once per round, when you are forced
      to make a saving throw against a force power, your movement speed
      increases by 10 feet until the end of your next turn.</li>

      <li><strong>Nexu Grin.</strong> When a creature you can see within 10 feet
      of you casts a force power that requires a force attack roll against you
      or an an allied creature, you can use your reaction and expend 1 focus
      point to impose disadvantage on the attack roll. If the attack misses, and
      the higher of the two [[/r d20]] rolls would also miss, the creature
      cannot cast that force power again until it completes a short or long
      rest.</li>

      <li><strong>Screaming Squill.</strong> Once per turn, when you hit a
      creature that is concentrating on a force power and it makes a
      Constitution saving throw to maintain concentration, the DC for the check
      equals your focus save DC, unless the DC for the Constitution saving throw
      would be higher.</li>

      </ul>

      <p>These effects end early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you finish a long
      rest.</p>

      <p>While you have no remaining uses of this feature, you can instead
      expend 1 focus point to use it. When you do so, your maximum focus points
      are reduced by 1 until you complete a long rest.</p>
