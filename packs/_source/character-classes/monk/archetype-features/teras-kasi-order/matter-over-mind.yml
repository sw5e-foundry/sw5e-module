system:
  description:
    value: >-
      <p><em><strong>Teras Kasi Order:</strong> 11th level</em></p>

      <p>You tap into the greater power of your focus. While both your Forredari
      Stance and your Steel Hands Form are active, you gain the following
      benefits:</p>

      <ul>

      <li><strong>Dancing Dragonsnake.</strong> When you take force, lightning,
      or necrotic damage, you can use your reaction to deflect it. When you do
      so, the damage you take is reduced by [[/r 1d10]] + your focus ability
      modifier + your monk level.</li>

      <li><strong>Aryx Slash.</strong> Once on each of your turns, when you hit
      a target with an unarmed strike or monk weapon, you can roll a Martial
      Arts die and deal additional psychic damage equal to the amount
      rolled.</li>

      <li><strong>Piercing Gaze.</strong> When you would make an Insight check
      against a creature you know to wield the Force, you can use your focus
      ability modifier for the roll, and you are considered to have expertise in
      the Insight skill. If you would already have expertise in the check, you
      instead have advantage on the roll. </li></ul>
    chat: ''
