system:
  description:
    value: >-
      <p><em><strong>Teras Kasi Order:</strong> 17th level</em></p>

      <p>You have learned to harness your strikes in a blistering fury. On your
      turn, when a creature takes damage from you three times, you can make up
      to three additional unarmed strikes against the creature (no action
      required). The first additional unarmed strike costs 1 focus point and
      deals [[/r 1d12]] additional psychic damage on a hit, and each unarmed
      strike after the first costs 1 additional focus point and deals [[/r
      1d12]] additional psychic damage on a hit, cumulatively.</p>
