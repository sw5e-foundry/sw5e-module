system:
  description:
    value: >-
      <p><em><strong>Nightsister Order:</strong> 3rd level</em></p>

      <p>You gain a new attack option that you can use with the Attack action.
      This special attack is a ranged focus attack with a range of 30 feet. You
      are proficient with it, and you add your focus ability modifier to its
      attack and damage rolls. Its damage is necrotic, it counts as an unarmed
      strike for the sake of your Martial Arts feature, and it uses your Martial
      Arts die for its damage die.</p>

      <p>When you would make an unarmed strike as part of your Martial Arts
      bonus action attack or your Flurry of Blows, you can replace the attack
      with this one.</p>

      <p>When you reduce a creature to 0 hit points with this attack, you gain
      temporary hit points equal to your focus ability modifier (your choice,
      minimum of one) + your monk level.</p>
