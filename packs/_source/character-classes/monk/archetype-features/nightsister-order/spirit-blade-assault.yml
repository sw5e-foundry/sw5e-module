    value: >-
      <p><em><strong>Nightsister Order:</strong> 17th level</em></p>

      <p>As an action, you conjure a blade of spirit energy and strike one
      creature within 5 feet of you with it, expending 1 to 10 focus points. The
      target must make a Constitution saving throw. On a failed save, it takes
      [[/r 2d10]] necrotic damage per focus point spent, or half as much on a
      successful one.</p>
