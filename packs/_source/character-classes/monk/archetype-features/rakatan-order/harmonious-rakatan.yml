system:
  description:
    value: >-
      <p><em><strong>Rakatan Order:</strong> 11th level</em></p>

      <p>You can use your Focus features using your tech points. When you do so,
      your maximum tech points are reduced by 1 until you complete a long
      rest.</p>

      <p>Additionally, you are constantly under the effects of the <em>detect
      enhancement</em> tech power. As an action, you can cast the
      <em>analyze</em> tech power without expending tech points. When you do so,
      <em>detect enhancement</em> is suppressed and you can't do so again until
      you complete a short or long rest. </p>
