system:
  description:
    value: >-
      <p>Intelligence, Wisdom, or Charisma is your techcasting ability for your
      tech powers (your choice). You use this ability whenever a power refers to
      your techcasting ability. Additionally, you use this ability modifier when
      setting the saving throw DC for a tech power you cast and when making an
      attack roll with one.</p>

      <p><em></em>_</p>

      <p><strong>Tech save DC</strong> = 8 + your proficiency bonus + your
      techcasting ability modifer</p>

      <p><em></em>_</p>

      <p><strong>Tech attack modifier</strong> = your proficiency bonus + your
      techcasting ability modifer</p>

      <p><em></em>_</p>
