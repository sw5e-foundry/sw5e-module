    value: >-
      <p>You have a number of tech points equal to half of your monk level
      (rounded up), as shown in the Tech Points column of the Rakatan Order
      Techcasting table, + your Intelligence, Wisdom, or Charisma modifier (your
      choice). You use these tech points to cast tech powers. You regain all
      expended tech points when you finish a short or long rest.</p>
