system:
  description:
    value: >-
      <p><em><strong>Rakatan Order:</strong> 6th level</em></p>

      <p>You can cast your tech powers using your focus points. When you do so,
      your maximum focus points are reduced by 1 until you complete a long
      rest.</p>

      <p>Additionally, when you use a Focus feature, you gain the following tech
      enhancements. Each effect costs 1 tech point.</p>

      <p><strong><em>Flurry of Blows.</em></strong> When you hit with an attack
      with Flurry of Blows, you can deal an additional [[/r 1d8]] damage of the
      same type.</p>

      <p><strong><em>Patient Defense.</em></strong> While under the effects of
      your Patient Defense, when you are hit by an attack, you can use your
      reaction and roll your Martial Arts die to increase your AC against the
      attack.</p>

      <p><strong><em>Step of the Wind.</em></strong> While under the effects of
      your Step of the Wind, you can become immune to the shocked condition, and
      have each slowed level only reduce your speed by 5 feet, unless it would
      reduce your speed to 0.</p>
