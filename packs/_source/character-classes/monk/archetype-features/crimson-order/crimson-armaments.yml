system:
  description:
    value: >-
      <p><em><strong>Crimson Order:</strong> 3rd level</em></p>

      <p>You gain proficiency in light and medium armor. If you are already
      proficient in light and medium armor, you instead gain proficiency in
      heavy armor. Additionally, you can now gain the benefits of your Martial
      Arts and Unarmored Movement features while wearing armor as long as you
      are not wielding a shield.</p>

      <p>Additionally, you've learned to adapt to new weaponry. Over the course
      of an hour, which can be performed during a short rest, you can perform a
      kata with a weapon of your choice. You gain proficiency in that weapon if
      you do not already have proficiency, and it becomes a monk weapon for you.
      You can only adapt to one weapon at a time, and if you attempt to adapt to
      another weapon you immediately lose your proficiency with the chosen
      weapon.</p>
