    value: >-
      <p><em><strong>Kage Order:</strong> 11th level</em></p>

      <p>You have learned to become one with the shadows. When you are in an
      area of dim light or darkness, you can use your action to become
      invisible. You remain invisible until you make an attack, cast a power,
      otherwise take a hostile action, or are in an area of bright light.</p>
