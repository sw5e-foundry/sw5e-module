system:
  description:
    value: >-
      <p><em><strong>Echani Order:</strong> 6th level</em></p>

      <p>You extend your focus into your Echani weapons, granting you the
      following benefits.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.aXwHRhJSxgZbHRbI]{Enhanced
      Echani Weapons}</h3>

      <p>Your attacks with your Echani weapons count as enhanced for the purpose
      of overcoming resistance and immunity to unenhanced attacks and
      damage.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.nAWdnGFRbyjdg6at]{Deft
      Strike}</h3>

      <p>When you hit a target with an Echani weapon, you can spend 1 focus
      point to cause the weapon to deal extra damage to the target equal to your
      Martial Arts die. You can use this feature only once on each of your
      turns.</p>
