system:
  description:
    value: >-
      <p><em><strong>Echani Order:</strong> 3rd level</em></p>

      <p>Your special martial arts training leads you to master the use of
      certain weapons. You gain the following benefits. Choose two types of
      weapons to be your Echani weapons: one vibroweapon and one blaster. Each
      of these weapons can be any simple or martial </p>

      <p>weapon that lacks the special property. You gain proficiency with these
      weapons if you don't already have it. Weapons of the chosen types are monk
      weapons for you. Many of this order's features work only with your Echani
      weapons. When you reach 6th, 11th, and 17th level in this class, you can
      choose another type of weapon to be an Echani weapon for you, following
      the criteria above.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.7HFu2KCPHDjXLMcn]{Agile
      Parry}</h3>

      <p>If you make an unarmed strike as part of the Attack action on your turn
      and are holding an Echani weapon, you can use it to defend yourself if it
      is a melee weapon. You gain a +2 bonus to AC until the start of your next
      turn, while the weapon is in your hand and you aren't incapacitated.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.wzl4vGyu4zr4yRCr]{Echani's
      Shot}</h3>

      <p>You can use a bonus action on your turn to make your ranged attacks
      with an Echani weapon more deadly. When you do so, any target you hit with
      a ranged attack using an Echani weapon takes an extra [[/r 1d4]] damage of
      the weapon's type. You retain this benefit until the end of the current
      turn.</p>
