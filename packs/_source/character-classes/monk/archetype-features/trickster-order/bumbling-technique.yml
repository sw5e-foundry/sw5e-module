  description:
    value: >-
      <p><em><strong>Trickster Order:</strong> 3rd level</em></p>

      <p>Your martial arts technique mixes combat training with the precision of
      a dancer and the antics of a jester. You gain proficiency in
      Performance.</p>

      <p>Additionally, you learn how to twist and turn quickly. Whenever you use
      your bonus action to make an unarmed strike, creatures you hit can't make
      opportunity attacks against you, and your speed increases by 10 feet until
      the end of your turn.</p>
