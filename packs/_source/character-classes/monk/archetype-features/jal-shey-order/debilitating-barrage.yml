    value: >-
      <p><em><strong>Jal Shey Order:</strong> 17th level</em></p>

      <p>You've gained the knowledge to temporarily inhibit a creature's
      fortitude by striking a series of pressure points. Whenever you hit a
      creature with an unarmed strike, you can spend 3 focus points to cause the
      creature to become vulnerable to a damage type of your choice. This effect
      lasts for 1 minute or until they take damage of the chosen type.</p>
