  description:
    value: >-
      <p><em><strong>Jal Shey Order:</strong> 3rd level</em></p>

      <p>You've undergone extensive training in lore from the Jal Shey's
      collected knowledge. You learn one language of your choice, and you gain
      proficiency in your choice of Lore, Medicine, Nature, or Technology. You
      learn an additional language and an additional skill proficiency from the
      above list at 11th level.</p>

      <p>Additionally, you can strike multiple pressure points to extract
      crucial details about your foe. Whenever you hit a creature with an
      unarmed strike, you can learn learn certain information about its
      capabilities. The GM tells you if the creature has one of the following
      characteristics of your choice:</p>

      <ul>

      <li>Condition immunities</li>

      <li>Damage vulnerabilities</li>

      <li>Damage resistances</li>

      <li>Damage immunities</li></ul>
