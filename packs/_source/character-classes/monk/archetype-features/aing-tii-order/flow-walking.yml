system:
  description:
    value: >-
      <p><em><strong>Aing-Tii Order:</strong> 6th, 9th, 13th, and 17th
      level</em></p>

      <p>You can cast the <em>phasestrike</em> force power without expending
      force points. When you reach 11th level, the damage bonus of the special
      attack made during <em>phasestrike</em> increases to [[/r 2d8]], and at
      17th level it increases to [[/r 3d8]].</p>

      <p>Additionally, when you use your action to cast an at-will force power,
      you can use your Martial Arts or Focus features.</p>

      <p>You can use these features a combined three times. You gain an
      additional use at 9th, 13th, and 17th level. You regain any expended uses
      when you finish a long rest.</p>
