  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> Crushing Hand of the Mountain</em>
      or <em>Patient Bantha Listens</em></p>

      <p>As an action, you can choose a point you can see on the ground within
      120 feet. A fountain of churned earth and stone erupts in a 20-foot cube
      centered on that point. Each creature in that area must make a Dexterity
      saving throw. A creature takes [[/r 3d12]] kinetic damage on a failed
      save, or half as much damage on a successful one. Additionally, the ground
      in that area becomes difficult terrain until cleared. Each 5-foot-square
      portion of the area requires at least 1 minute to clear by hand.</p>
