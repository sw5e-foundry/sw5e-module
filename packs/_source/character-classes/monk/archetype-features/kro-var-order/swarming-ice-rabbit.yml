system:
  description:
    value: >-
      <p>As an action, you can cause a flurry of ice crystals to erupt from a
      point you can see within 90 feet. Each creature in a 5-foot-radius sphere
      centered on that point must make a Dexterity saving throw. On a failed
      save, a creature takes [[/r 3d6]] cold damage, and gains 1 slowed level
      until the start of your next turn. On a successful save, a creature takes
      half as much damage and isn't slowed.</p>
