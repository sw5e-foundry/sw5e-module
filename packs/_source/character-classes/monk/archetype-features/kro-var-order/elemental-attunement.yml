  description:
    value: >-
      <p><em><strong>Kro Var Order:</strong> 3rd, 11th, and 17th level</em></p>

      <p>You gain the ability to bend the elements to your will. As an action,
      you can manipulate these forces to create one of the following effects of
      your choice at a space within 10 feet of you:</p>

      <ul>

      <li>Create a harmless, instantaneous sensory effect related to air, earth,
      fire, or water, such as a shower of sparks, a puff of wind, a spray of
      light mist, or a gentle rumbling of stone.</li>

      <li>Instantaneously light or snuff out a candle, a torch, or a small
      campfire.</li>

      <li>Chill or warm up to 1 pound of nonliving material for up to 1
      hour.</li>

      <li>Cause earth, fire, water, or mist that can fit within a 1-foot cube to
      shape itself into a crude form you designate for 1 minute.</li>

      </ul>

      <p>This range increases to 30 feet at 11th level and 60 feet at 17th
      level.</p>

      <p>Additionally, as a bonus action on your turn, you can spend 1 focus
      point to conjure a weapon made of one of the four elementsâ€"air, earth,
      fire, or waterâ€"which lasts for 1 minute. Your weapon takes an appearance
      of your choice, it can only be used by you, and you can't be disarmed of
      it while you are conscious. You are proficient in this weapon, which
      counts as a monk weapon for you and uses your Martial Arts die for its
      damage rolls. You can only have one of these weapons at a time, and if you
      summon a new one the old one immediately disappears.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.1JEwbfSBdCjsS7up]{Air}</h3>

      <p>Your whistling weapon has the returning property, the thrown property
      with a range of 20/60, and deals sonic damage on a hit. Additionally, when
      you hit a creature with the weapon, it is deafened until the end of its
      next turn.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.zSWfLVSWOFNkcLWo]{Earth}</h3>

      <p>Your earthen weapon takes the form of stone, and deals kinetic damage
      on a hit. Additionally, when you hit a creature with it, you can force the
      target to make a Strength saving throw. On a failed save, the target is
      pushed back 5 feet. Lastly, while active, you can use Strength instead of
      Dexterity when determining your AC, as long as it doesn't already include
      that modifier.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.M2Vld1EFmOV7OMRx]{Fire}</h3>

      <p>Your flaming weapon sheds bright light in a 10-foot radius and dim
      light for an additional 10 feet, deals fire damage, and when you hit a
      creature with it, the creature takes additional damage equal to half your
      focus ability modifier (minimum of one).</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.CfQVHKDsyj7TlOjV]{Water}</h3>

      <p>Your watery weapon has the reach property, deals cold damage on a hit,
      and you can use your focus ability modifier instead of Dexterity or
      Strength for its attack and damage rolls. You must use the same modifier
      for both rolls. Additionally, when you would make a melee weapon attack,
      you can instead use your weapon to wet a 5-foot square within your
      weapon's reach. The affected area is difficult terrain. Each creature who
      starts its turn in the square or enters it for the first time must make a
      Dexterity saving throw, falling prone on a failed save.</p>
