system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> Earth Reaches for Sky</em></p>

      <p>As an action, you cause rock to envelop you, granting the following
      benefits until the start of your next turn:</p>

      <ul>

      <li>You have resistance to kinetic and energy damage.</li>

      <li>You can move across difficult terrain made of earth or stone without
      spending extra movement. You can move through solid earth or stone as if
      it was air without destabilizing it, but you can't end your movement
      there. If you do so, you are immediately shunted to the nearest unoccupied
      space that you can occupy and take force damage equal to twice the number
      of feet you are moved.</li>

      <li>You can use your action to create a small earthquake on the ground in
      a 15-foot radius centered on you. Other creatures on that ground must
      succeed on a Dexterity saving throw or be knocked prone.</li>

      </ul>

      <p>At the start of each of your turns, you can use your bonus action to
      extend the benefits of this feature until the start of your next turn, to
      a maximum duration of 1 minute. This effect ends immediately if you are
      incapacitated or die.</p>
