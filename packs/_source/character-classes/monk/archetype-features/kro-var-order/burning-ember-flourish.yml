system:
  description:
    value: >-
      <p>You can use your action to choose an area of flame that you can see and
      that fits within a 5-foot cube within 60 feet. You can extinguish the fire
      in that area, and you create either fireworks or smoke when you do so.</p>

      <p><strong><em>Fireworks.</em></strong> The target explodes with a
      dazzling display of colors. Each creature within 10 feet of the target
      must succeed on a Constitution saving throw or become blinded until the
      end of your next turn.</p>

      <p><strong><em>Smoke.</em></strong> Thick black smoke spreads out from the
      target in a 20-foot radius, moving around corners. The area of the smoke
      is heavily obscured. The smoke persists for 1 minute or until a strong
      wind disperses it.</p>
