    value: >-
      <p>You can use your action pull water from air, and return it to the
      atmosphere. In an open container, you can create up to 20 gallons of
      drinkable water. You may also produce a rain that falls within a 30-foot
      cube and extinguishes open-air flames. You can destroy the same amount of
      water in an open container, or destroy a 30-foot cube of fog.</p>
