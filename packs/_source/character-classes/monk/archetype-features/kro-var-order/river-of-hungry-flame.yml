system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> Burning Ember Flourish</em> or
      <em>Hatchling's Flame</em></p>

      <p>As an action, you can create a wall of fire on a solid surface within
      120 feet. You can make the wall up to 60 feet long, 20 feet high, and 1
      foot thick, or a ringed wall up to 20 feet in diameter, 20 feet high, and
      1 foot thick. The wall is opaque and lasts for 1 minute.</p>

      <p>When the wall appears, each creature within its area must make a
      Dexterity saving throw. On a failed save, a creature takes [[/r 5d8]] fire
      damage, or half as much damage on a successful save.</p>

      <p>One side of the wall, chosen by you when you use this feature, deals
      [[/r 5d8]] fire damage to each creature that ends its turn within 10 feet
      of that side of the wall. A creature takes the same damage when it enters
      the wall for the first time on a turn or ends its turn there. The other
      side of the wall deals no damage.</p>
