system:
  description:
    value: >-
      <p>Your watery weapon has the reach property, deals cold damage on a hit,
      and you can use your focus ability modifier instead of Dexterity or
      Strength for its attack and damage rolls. You must use the same modifier
      for both rolls. Additionally, when you would make a melee weapon attack,
      you can instead use your weapon to wet a 5-foot square within your
      weapon's reach. The affected area is difficult terrain. Each creature who
      starts its turn in the square or enters it for the first time must make a
      Dexterity saving throw, falling prone on a failed save.</p>
