system:
  description:
    value: >-
      <p>Your earthen weapon takes the form of stone, and deals kinetic damage
      on a hit. Additionally, when you hit a creature with it, you can force the
      target to make a Strength saving throw. On a failed save, the target is
      pushed back 5 feet. Lastly, while active, you can use Strength instead of
      Dexterity when determining your AC, as long as it doesn't already include
      that modifier.</p>
