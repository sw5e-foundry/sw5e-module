system:
  description:
    value: >-
      <p>As an action, you call up a mighty gale, which swirls around you in a
      10-foot radius and moves with you, remaining centered on you. The wind
      lasts for 10 minutes. The wind deafens both you and other creatures in its
      area. It extinguishes unprotected flames in its area that are torch-sized
      or smaller and hedges out vapor, gas, and fog that can be dispersed by
      strong wind. The area is difficult terrain for creatures other than you
      and the attack rolls of ranged weapon attacks have disadvantage if the
      attacks pass in or out of the wind.</p>
