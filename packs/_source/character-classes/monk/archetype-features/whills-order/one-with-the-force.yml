system:
  description:
    value: >-
      <p><em><strong>Whills Order:</strong> 11th level</em></p>

      <p>You learn how to enter a trance, preparing to unleash yourself upon
      your enemy. While in this trance, you can still talk and move. If you stay
      in the trance for at least one minute, when you roll initiative, you can
      make a ranged weapon attack on a number of creatures up to your focus
      ability modifier (a minimum of one) within 30 feet of you when you were in
      this trance.</p>

      <p>Once you've used this feature, you must complete a short or long rest
      before you can use it again.</p>
