system:
  description:
    value: >-
      <p><em><strong>Whills Order:</strong> 3rd level</em></p>

      <p>You gain proficiency in blaster pistols, blaster rifles, ion pistols,
      ion rifles, and the lightbow, which are your Whills weapons and are monk
      weapons for you. When you are wielding a Whills weapon, you gain the
      following benefits:</p>

      <ul>

      <li>Your Whills weapons count as melee weapons for you, and when you make
      a melee weapon attack with them, you deal kinetic damage equal to your
      Martial Arts Damage Die.</li>

      <li>When you would make an unarmed strike using your Martial Arts bonus
      action or as a part of your Flurry of Blows, you can instead attack with a
      Whills weapon you are wielding. You roll a [[/r d4]] in place of the
      normal damage of your Whills weapon when attacking in this way. This die
      changes as you gain monk levels, as shown in the Martial Arts column of
      the monk table.</li>

      <li>When you would make a ranged weapon attack with a Whills weapon, you
      can instead reload the weapon.</li></ul>
