system:
  description:
    value: >-
      <p><em><strong>Monk:</strong> 1st level</em></p><p>Your practice of
      martial arts gives you mastery of combat styles that use unarmed strikes
      and monk weapons, which are vibroweapons with which you are proficient
      that lack the dexterity, heavy, special, and two-handed
      properties.</p><p>You gain the following benefits while you are unarmed or
      wielding only monk weapons and you aren't wearing armor or wielding a
      shield:</p><ul><li>Your unarmed strikes and monk weapons gain the finesse
      property.</li><li>You can roll a [[/r d4]] in place of the normal damage
      of your unarmed strike or monk weapon. This die changes as you gain monk
      levels, as shown in the Martial Arts column of the monk table.</li><li>You
      can use Dexterity instead of Strength whenever you would make a Strength
      (Athletics) check to grapple, shove, or trip a creature.</li><li>When you
      use the Attack action with an unarmed strike or a monk weapon on your
      turn, you can make one unarmed strike as a bonus action.</li><li>You can
      take the Dash or Disengage actions as a bonus
      action.</li></ul><blockquote><p>Variant: Monks with Lightweapons</p><p>If
      monks gain lightweapon proficiency, consider letting them use lightweapons
      as monk weapons, provided the weapon lacks the dexterity, heavy, special,
      and two-handed properties.</p></blockquote><section class="secret"
      id="secret-sTBnLYHgkpCMKqHI"><p><strong>Foundry Note</strong></p><p>This
      feature includes an activity for enchanting a weapon which adds a
      <strong>Monk Attack</strong> activity to it that integrates the changes
      mentioned above.</p></section>
