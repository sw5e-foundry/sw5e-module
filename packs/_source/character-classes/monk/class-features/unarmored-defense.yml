    value: >-
      <p><em><strong>Monk:</strong> 1st level</em></p><p>While you are wearing
      no armor and not wielding a shield, your AC equals 10 + your Dexterity
      modifier + your Wisdom or Charisma modifier (your choice).</p><section
      class="secret" id="secret-iEmEZ6taINwlND34"><p><strong>Foundry
      Note</strong></p><p>This feature includes an Active Effect which updates
      your Armor Class. The Active Effect assumes you will use the higher
      modifier between Wisdom and Charisma. It must be disabled manually from
      the Effects tab if a shield or armor is equipped.</p></section>
