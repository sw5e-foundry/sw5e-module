    value: >-
      <p><em><strong>Monk:</strong> 4th level</em></p><p>You can use your
      reaction when you fall to reduce any falling damage you take by an amount
      equal to five times your monk level.</p><section class="secret"
      id="secret-AGgXjPVRTSxZGeDR"><p><strong>Foundry Note</strong></p><p>This
      feature includes a <strong>Reduce</strong> activity which can be used to
      restore lost Hit Points equal to five times your Monk level. Attention
      must be paid as the healing is not limited by the fall damage
      dealt.</p></section>
