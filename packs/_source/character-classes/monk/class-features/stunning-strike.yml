system:
  description:
    value: >-
      <p><em><strong>Monk:</strong> 5th level</em></p><p>You can interfere with
      an opponent's body. When you hit another creature with a melee weapon
      attack, you can spend 1 focus point to attempt a stunning strike. The
      target must succeed on a Constitution saving throw or be stunned until the
      end of your next turn.</p><section class="secret"
      id="secret-aClv1BrKCMAJGcxS"><p><strong>Foundry Note</strong></p><p>This
      feature includes the Saving Throw and a Stunned Active Effect which
      applies the Stunned status if they fail and a Slowed Active Effect for
      tracking that their Speed is halved.</p></section>
