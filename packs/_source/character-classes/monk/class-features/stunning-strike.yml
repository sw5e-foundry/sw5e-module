    value: >-
      <p><em><strong>Monk:</strong> 5th level</em></p>

      <p>You can interfere with an opponent's body. When you hit another
      creature with a melee weapon attack, you can spend 1 focus point to
      attempt a stunning strike. The target must succeed on a Constitution
      saving throw or be stunned until the end of your next turn.</p>
