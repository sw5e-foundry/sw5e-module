system:
  description:
    value: >-
      <p><em><strong>Monk:</strong> 3rd level</em></p>

      <p>You can use your reaction to deflect a projectile when you are dealt
      damage by a ranged weapon attack. When you do so, the damage you take from
      the attack is reduced by [[/r 1d10]] + your Dexterity modifier + your monk
      level.</p>

      <p>If you reduce the damage to 0, and the damage is kinetic, energy, or
      ion, you can redirect it at another target if you have a weapon capable of
      doing so. You can spend 1 focus point to make a ranged attack with a range
      of 20/60 as you deflect the projectile, as part of the same reaction. You
      make this attack with proficiency, regardless of your weapon
      proficiencies, and the projectile counts as a monk weapon for the
      attack.</p>
