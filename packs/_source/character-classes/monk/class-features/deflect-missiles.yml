system:
  description:
    value: >-
      <p><em><strong>Monk:</strong> 3rd level</em></p><p>You can use your
      reaction to deflect a projectile when you are dealt damage by a ranged
      weapon attack. When you do so, the damage you take from the attack is
      reduced by [[/r 1d10]] + your Dexterity modifier + your monk
      level.</p><p>If you reduce the damage to 0, and the damage is kinetic,
      energy, or ion, you can redirect it at another target if you have a weapon
      capable of doing so. You can spend 1 focus point to make a ranged attack
      with a range of 20/60 as you deflect the projectile, as part of the same
      reaction. You make this attack with proficiency, regardless of your weapon
      proficiencies, and the projectile counts as a monk weapon for the
      attack.</p><section class="secret"
      id="secret-f3VsSLMY7EEla1yU"><p><strong>Foundry Note</strong></p><p>The
      <strong>Reduce</strong> activity can be used to heal yourself to reduce
      the total damage if it's not enough to reduce it to 0.</p><p>The
      <strong>Redirect</strong> activity can be used to roll damage and consume
      a use of your Focus Points if you can reduce it to 0. You can select the
      type of damage in the roll dialog. The dice increase automatically as you
      level up.</p></section>
