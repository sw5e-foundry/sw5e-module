system:
  description:
    value: >-
      <p><em><strong>Monk:</strong> 2nd and 11th level</em></p>

      <p>Your training allows you to harness the mystic energy of focus. Your
      access to this energy is represented by a number of focus points. Your
      monk level determines the number of points you have, as shown in the Focus
      Points column of the monk table.</p>

      <p>You can spend these points to fuel various focus features. You start
      knowing three such features: Flurry of Blows, Patient Defense, and Step of
      the Wind. You learn more focus features as you gain levels in this
      class.</p>

      <p>When you spend a focus point, it is unavailable until you finish a
      short or long rest, at the end of which you draw all of your expended
      focus back into yourself. You must spend at least 30 minutes of the rest
      meditating to regain your focus points.</p>

      <p>You use your choice of Wisdom or Charisma for your focus ability. You
      use the chosen ability modifier whenever a feature refers to your focus
      ability. Additionally, you use the chosen ability modifier when making an
      attack with a focus feature or setting the saving throw DC for one.</p>

      <p><em></em>_</p>

      <p><strong>Focus save DC</strong> = 8 + your proficiency bonus + your
      Wisdom or Charisma modifier (your choice)</p>

      <p><em></em>_</p>

      <p><strong>Focus attack modifier</strong> = your proficiency bonus + your
      Wisdom or Charisma modifier (your choice)</p>

      <p><em></em>_</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.S7Eyxu0liaaotA1M]{Flurry
      of Blows}</h3>

      <p>When you make your Martial Arts bonus action attack, you can spend 1
      focus point to make an additional unarmed strike (no action required). At
      11th level, you can instead spend 2 focus points to make two additional
      unarmed strikes.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.ZkKSsPaCGZrjgocn]{Patient
      Defense}</h3>

      <p>When you use your bonus action to Disengage, you can spend 1 focus
      point to also Dodge (no action required). At 11th level, you can instead
      spend 2 focus points to Dodge and gain an additional reaction until the
      start of your next turn. You can only take one reaction per turn.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.fnkBlUCThMSEt5KA]{Step
      of the Wind}</h3>

      <p>When you use your bonus action to Dash, you can spend 1 focus point to
      double your jump distance for the turn. At 11th level, you can instead
      spend 2 focus points to gain a flying speed equal to your walking speed
      until the end of your turn, though you fall if you end your speed in the
      air and nothing else is holding you aloft.</p>
