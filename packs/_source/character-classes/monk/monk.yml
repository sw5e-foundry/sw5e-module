  description:
    value: >-
      <img style="margin:5px;border:0px;float:right"
      src="modules/sw5e-module/icons/packs/Classes/monk_01.webp" /><p>Her
      vibrostaff a blur as they deflect an incoming hail of blaster bolts, a
      human springs over a barricade and throws herself into the massed ranks of
      pirates on the other side. She whirls among them, knocking their blows
      aside and sending them reeling, until at last she stands
      alone.</p><p>Taking a deep breath, a zabrak covered in tattoos settles
      into a battle stance. As the first charging mercenaries reach him, he
      exhales and a blast of negative energy courses from his hands, engulfing
      his foes.</p><p>Moving with the silence of the night, a black-clad
      mirialan steps into a shadow beneath an arch and nimbly climbs to the
      balcony a stone's throw above her. She slides her blade free of its
      cloth-wrapped scabbard and peers through the open window at the warlord,
      so vulnerable in the grip of sleep.</p><p>Whatever their discipline, monks
      are united in their ability to harness the energy that flows in their
      bodies. Whether channeled as a striking display of combat prowess or a
      subtler focus of defensive ability and speed, this energy infuses all that
      a monk does.</p><h2>The Power of Focus</h2><p>Monks make careful study of
      a mystical energy that most monastic orders call focus. This energy is an
      element of the power that suffuses the galaxyâ€"specifically, the element
      that flows through living bodies. Monks harness this energy within
      themselves to create powerful effects and exceed their bodies' physical
      capabilities, and some of their special attacks can hinder the flow of
      focus in their opponents. Using this energy, monks channel uncanny speed
      and strength into their unarmed strikes. As they gain experience, their
      martial training and their mastery of focus gives them more power over
      their bodies and the bodies of their foes.</p><h2>Training and
      Asceticism</h2><p>Most monks live entirely apart from the surrounding
      population, secluded from anything that might impede their spiritual
      progress. Others are sworn to isolation, emerging only to serve as spies
      or assassins at the command of their leader, a noble patron, or some other
      power.</p><p>The majority of monks don't shun their neighbors, making
      frequent visits to nearby towns or villages and exchanging their service
      for food and other goods. As versatile warriors, monks often end up
      protecting their neighbors from monsters or brigands.</p><p>For a monk,
      becoming an adventurer means leaving a structured, communal lifestyle to
      become a wanderer. This can be a harsh transition, and monks don't
      undertake it lightly. Those who leave their cloisters take their work
      seriously, approaching their adventures as personal tests of their
      physical and spiritual growth.</p><p>As you make your monk character,
      think about your connection to the monastery where you learned your skills
      and spent your formative years. Were you an orphan or a child left on the
      monastery's threshold? Did your parents promise you to the monastery in
      gratitude for a service performed by the monks? Did you enter this
      secluded life to hide from a crime you committed? Or did you choose the
      monastic life for yourself?</p><p>Consider why you left. Did the head of
      your monastery choose you for a particularly important mission beyond the
      cloister? Perhaps you were cast out because of some violation of the
      community's rules. Did you dread leaving, or were you happy to go? Is
      there something you hope to accomplish outside the monastery? Are you
      eager to return to your home?</p><p>As a result of the structured life of
      a monastic community and the discipline required to harness focus, monks
      are typically lawful in alignment.</p><h3>Quick Build</h3><p>You can make
      a monk quickly by following these suggestions. First, make Dexterity your
      highest ability score, followed by Wisdom. Second, choose the agent
      background.</p>
