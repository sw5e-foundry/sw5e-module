system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> 13th level</em></p>

      <p>As a bonus action, you can choose one creature within 30 feet that you
      can see. The creature must make a Wisdom saving throw against your focus
      save DC. On a successful save, the creature becomes immune to this feature
      for 24 hours. On a failed save, for the next minute, the creature has
      disadvantage on attack rolls against creatures other than you, and it must
      make an additional Wisdom saving throw each time it attempts to move to a
      space that is more than 30 feet away from you; if it succeeds on this
      saving throw, this feature doesn't restrict its movement for that turn.
      </p>

      <p>This feature ends early if you attack another creature, if you target
      another hostile creature with a power or class feature, if a friendly
      creature damages the target, if a friendly creature targets it with a
      power or class feature, or if you target another creature with this
      feature.</p>
