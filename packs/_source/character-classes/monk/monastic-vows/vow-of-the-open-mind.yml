  description:
    value: >-
      <p>You gain proficiency in a skill of your choice. Additionally, you can
      spend 1 focus point and 10 minutes meditating on a skill in which you are
      proficient. If you do so, when you make an ability check with the chosen
      skill, you can add your Wisdom or Charisma modifier to the check. You can
      only have one instance of this feature active at a time.</p>
