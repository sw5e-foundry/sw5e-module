  description:
    value: >-
      <p>When you would make an unarmed strike, you can spend 1 focus point to
      instead touch a willing creature within your reach. Roll your Martial Arts
      die. The target gains hit points equal to the amount rolled + your Wisdom
      or Charisma modifier (your choice, minimum of +1).</p><section
      id="secret-Qt8Y0eUoJIxDS5MV" class="secret"><p><strong>Foundry
      Note</strong></p><p>This feature includes an Activity to consume focus
      points and roll for healing. This feature assumes you will use whichever
      modifier is higher between Wisdom and Charisma.</p></section>
