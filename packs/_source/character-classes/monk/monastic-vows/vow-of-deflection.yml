system:
  description:
    value: >-
      <p>You can use your reaction to divert a strike when you are dealt damage
      by a melee weapon attack. When you do so, the damage taken by the attack
      is reduced by [[/r 1d10]] + your Dexterity modifier + your monk
      level.</p><section class="secret"
      id="secret-Wx2gOlUZqiqhUw3f"><p><strong>Foundry Note</strong></p><p>This
      feature includes a <strong>Reduce</strong> activity which can be used to
      restore lost Hit Points equal to 1d10 + your Dexterity modifier + your
      monk level. Attention must be paid as the healing is not limited by the
      original damage dealt and may need to be reduced manually.</p></section>
