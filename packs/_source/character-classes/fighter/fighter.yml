  description:
    value: >-
      <img style="margin:5px;border:0px;float:right"
      src="modules/sw5e-module/icons/packs/Classes/fighter_01.webp" /><p>A
      Trandoshan runs frantically across rooftops, constantly looking over his
      shoulder. As he prepares to leap a gap, a blaster bolt hits him in the
      back and renders him unconscious. His blurry vision barely makes out the
      figure of a masked woman who casually approaches, ready to collect her
      bounty.</p><p>With his muscular arms held wide, a grizzled-looking Wookiee
      grins to his bloodthirsty crowd. He turns back to his arena opponent just
      in time to see the Besalisk take a swing. He ducks, punching the
      four-armed fighter in the gut. Two wild haymakers later, and he stands
      alone as the gladiatorial champion.</p><p>Taking a deep breath, a Republic
      soldier looks out onto the war zone waging across the frozen surface of
      Ilum. He grips his blaster rifle tightly then, with a nod to the dozen
      squad-mates beside him, he charges onto the battlefield.</p><p>Fighters
      combine discipline with martial skills to become the best pure warriors in
      the galaxy. Fighters can be stalwart defenders of those in need, cruel
      marauders, or brave advent-urers. They fight for glory, honor, to right
      wrongs, to gain power, to acquire wealth, or simple for the thrill of
      battle.</p><h2>All in a Day's Work</h2><p>Many fighters see adventures,
      raids on enemy strongholds, and dangerous missions as their jobs. Some
      want to defend those who can't defend themselves while others seek to use
      their muscle to carve their own place of importance in the galaxy.
      Fighters can take the form of guards, champions, bounty hunters,
      enforcers, mercenaries, freedom fighters, or simply armed
      explorers.</p><h2>Code Red</h2><p>Most fighters come to the profession
      after receiving at least some amount of formal training from a military
      organization. Some attend formal academies; others are self-taught and
      well tested. A fighter may have taken up his weapon to escape a mundane
      life while another may be following a proud family tradition. Whatever
      their origins, most fighters share an unshakeable loyalty. Fighters follow
      orders with little hesitation, as failure can often mean
      death.</p><p>While creating your fighter character, consider where your
      loyalties lie. You could be part of a formal military, one of countless
      troopers fighting for your enterprise. Perhaps you are a gun-for-hire,
      traveling the galaxy in search of your next gig. What weapons do you
      prefer and specialize in? Who or what do you fight for? Do you have
      aspirations of a life beyond the battlefield, or have you been at war so
      long you know of nothing else?</p><h3>Quick Build</h3><p>You can make a
      fighter quickly by following these suggestions. First, make Strength or
      Dexterity your highest ability modifier, depending on whether you want to
      focus on melee combat or on ranged weapons (or finesse weapons). Your
      next-highest score should be Constitution. Second, choose the soldier
      background.</p>
