    value: >-
      <p><em><strong>Fighter:</strong> 9th level</em></p><p>You can reroll a
      saving throw that you fail. If you do so, you must use the new roll, and
      you can't use this feature again until you finish a long rest.</p><p>You
      can use this feature twice between long rests starting at 13th level and
      three times between long rests starting at 17th level.</p><section
      class="secret" id="secret-O4YNu8AXYqBx1QsV"><p><strong>Foundry
      Note</strong></p><p>This feature includes a limited use that increases
      automatically at levels 13 and 17.</p></section>
