  description:
    value: >-
      <p><em><strong>Fighter:</strong> 2nd level</em></p><p>You can push
      yourself beyond your normal limits for a moment. On your turn, you can
      take one additional action on top of your regular action.</p><p>Once
      you've used this feature, you must finish a short or long rest before you
      can use it again. Starting at 17th level, you can use it twice before a
      rest, but only once on the same turn.</p><section class="secret"
      id="secret-z694H38bt2a1ndSG"><p><strong>Foundry Note</strong></p><p>This
      feature includes a limited use that increases automatically at level
      17.</p></section>
