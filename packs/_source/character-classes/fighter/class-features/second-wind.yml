  description:
    value: >-
      <p><em><strong>Fighter:</strong> 1st level</em></p>

      <p>You have a limited well of stamina that you can draw on to protect
      yourself from harm. On your turn, you can use a bonus action to regain hit
      points equal to [[/r 1d10]] + your fighter level.</p>

      <p>Once you've used this feature, you must finish a short or long rest
      before you can use it again.</p>
