  description:
    value: >-
      <p><em><strong>Fighter:</strong> 20th level</em></p>

      <p>You are the master of combat. Your Strength or Dexterity score
      increases by 2, and your Constitution score increases by 2. Your maximum
      for those scores increases by 2.</p>

      <p>Additionally, you can attack four times, instead of three times,
      whenever you take the Attack action on your turn.</p>
