system:
  description:
    value: >-
      <p><em><strong>Fireteam Specialist:</strong> 10th level</em></p>

      <p>You can use your bonus action to begin a coordinated maneuver with an
      ally who is within 5 feet of you. For the next minute, while you and the
      chosen ally are within 5 feet of each other and neither of you are
      wielding a shield, you each gain a bonus to AC equal to half your
      proficiency bonus.</p>

      <p>When the chosen ally moves on their turn, you can use your reaction to
      move with them. You must end this movement within 5 feet of the ally, and
      this movement can't exceed your speed.</p>

      <p>This effect ends early if either you or your ally are incapacitated or
      die. Once you've used this feature, you can't use it again until you
      complete a long rest.</p>
