  description:
    value: >-
      <p><em><strong>Fireteam Specialist:</strong> 7th level</em></p>

      <p>When you use your Second Wind feature, you can choose up to three
      allies within 60 feet of you that can see or hear you. Each ally gains
      temporary hit points equal to your fighter level.</p>

      <p>You can choose an additional ally at 9th, 13th, and 17th level.</p>
