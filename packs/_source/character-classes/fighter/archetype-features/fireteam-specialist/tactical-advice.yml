  description:
    value: >-
      <p><em><strong>Fireteam Specialist:</strong> 15th level</em></p>

      <p>Over the course of one minute, you can share knowledge with up to five
      allies. For the next hour, the chosen creatures gain all of your weapon
      and armor proficiencies, and a single use of your Indomitable feature.
      </p>

      <p>You can choose an additional ally at 17th level.</p>

      <p>Once you've used this feature, you can't use it again until you
      complete a long rest. </p>
