  description:
    value: >-
      <p><em><strong>Heavy Weapons Specialist:</strong> 3rd level</em></p>

      <p>You have learned to use the heft of your weapon to root yourself in
      place. At the end of each of your turns, if you move less than half your
      speed while wielding a weapon with the heavy or strength properties, you
      have advantage on saving throws to avoid being restrained, moved, or
      knocked prone. This advantage lasts until the end of your next turn.</p>
