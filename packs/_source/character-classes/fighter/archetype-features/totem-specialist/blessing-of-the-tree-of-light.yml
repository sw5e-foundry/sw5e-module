    value: >-
      <p><em><strong>Totem Specialist:</strong> 18th level</em></p>

      <p>You learn how to share your totem's power with your allies. When you
      use your Totemic Might feature, you can choose one willing creature you
      can see within 60 feet of you. The chosen creature also gains the benefits
      of your Totemic Might feature. If you are incapacitated or killed, this
      effect immediately ends for both of you.</p>
