system:
  description:
    value: >-
      <p><em><strong>Mounted Specialist:</strong> 15th level</em></p>

      <p>You can run down your foes, whether you're mounted or not. If you move
      at least 10 feet in a straight line right before attacking a creature and
      you hit it with the attack, that target must succeed on a Strength saving
      throw (DC = 8 + your proficiency bonus + your Strength modifier) or be
      knocked prone. You can use this feature only once on each of your
      turns.</p>
