    value: >-
      <p><em><strong>Mounted Specialist:</strong> 18th level</em></p>

      <p>You respond to danger with extraordinary vigilance. In combat, you get
      a special reaction that you can take once on every creature's turn, except
      your turn. You can use this special reaction only to make an opportunity
      attack, and you can't use it on the same turn that you take your normal
      reaction.</p>
