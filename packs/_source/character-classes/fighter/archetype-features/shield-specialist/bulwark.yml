system:
  description:
    value: >-
      <p><em><strong>Shield Specialist:</strong> 15th level</em></p>

      <p>You can extend the benefit of your Indomitable feature to an ally. When
      you decide to use Indomitable to reroll an Intelligence, a Wisdom, or a
      Charisma saving throw and you aren't incapacitated, you can choose one
      ally within 60 feet of you that also failed its saving throw against the
      same effect. If that creature can see or hear you, it can reroll its
      saving throw and must use the new roll.</p>
