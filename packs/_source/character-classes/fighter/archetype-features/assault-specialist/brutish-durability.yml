      <p><em><strong>Assault Specialist:</strong> 10th, 13th, and 17th
      level</em></p>

      <p>Once per round, you can roll a [[/r d8]] and add the die to a saving
      throw you make. If applying this bonus to a death saving throw increases
      the total to 20 or higher, you gain the benefits of rolling a 20 on the
      [[/r d20]].</p>

      <p>This die increases to a [[/r d10]] at 13th level and a [[/r d12]] at
      17th level.</p>
