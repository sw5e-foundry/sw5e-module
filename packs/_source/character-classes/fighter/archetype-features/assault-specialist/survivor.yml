    value: >-
      <p><em><strong>Assault Specialist:</strong> 18th level</em></p>

      <p>You attain the pinnacle of resilience in battle. At the start of each
      of your turns, you regain hit points equal to 5 + your Constitution
      modifier if you have no more than half your hit points left. You don't
      gain this benefit if you have 0 hit points.</p>
