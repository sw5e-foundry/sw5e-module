    value: >-
      <p><em><strong>Fireteam Specialist:</strong> 3rd level</em></p>

      <p>Your tactical skill in combat improves, granting bonuses to your Combat
      Superiority.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.RkUHu3MCEZY0qKrw]{Improved
      Maneuvers }</h3>

      <p>You know four maneuvers of your choice, instead of two, and you earn
      more at higher levels, as shown in the Maneuvers Known column of the
      Fireteam Superiority table.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.Yxxby19m8exWpEwZ]{Improved
      Superiority Dice}</h3>

      <p>You have four superiority dice, instead of two, and you earn more at
      higher levels, as shown in the Superiority Dice Quantity column of the
      Fireteam Superiority table.</p>
