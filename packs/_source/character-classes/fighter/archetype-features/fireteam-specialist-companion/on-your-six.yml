system:
  description:
    value: >-
      <p><em><strong>Fireteam Specialist:</strong> 10th level</em></p>

      <p>While your companion is within 5 feet of you, you can use your bonus
      action to begin a coordinated </p>

      <p>maneuver. For the next minute, while you and your companion are within
      5 feet of each other and neither of you are wielding a shield, you each
      gain a bonus to AC equal to half your proficiency bonus.</p>

      <p>This effect ends early if either you or your companion are
      incapacitated or die. Once you've used this feature, you can't use it
      again until you complete a long rest.</p>
