  description:
    value: >-
      <p><em><strong>Fireteam Specialist:</strong> 3rd, 11th, and 17th
      level</em></p>

      <p>You've been assigned a squadmate who is under your command, gaining a
      humanoid companion.</p>

      <p>Create your humanoid companion as detailed in the Companions section of
      the Customization Options document for Expanded Content.</p>

      <p>In addition to its traits and features, your companion gains additional
      benefits while it is bonded to you:</p>

      <ul>

      <li>Your companion gains two additional traits. It gains one more
      additional trait when you reach 11th level in this class. For each trait
      in excess of your proficiency bonus, your number of Hit Dice that can be
      spent to restore hitpoints is reduced by 1.</li>

      </ul>

      <p>Lastly, while your companion is bonded to you and within 10 feet of
      you, your companion can uses your superiority dice and maneuvers as if it
      knows them.</p>

      <p>This radius increases to 30 feet at 11th level, and 60 feet at 17th
      level. </p>
