    value: >-
      <p><em><strong>Fireteam Specialist:</strong> 7th level</em></p>

      <p>When you use your Second Wind feature while your companion is within 10
      feet of you, your companion regains hit points and gains temporary hit
      points equal to your fighter level.</p>

      <p>This radius increases to 30 feet at 11th level, and 60 feet at 17th
      level. </p>
