system:
  description:
    value: >-
      <p><em><strong>Praetorian Specialist:</strong> 3rd level</em></p>

      <p>Your intensity in battle can shield you and help you strike true. As a
      bonus action on your turn, you can give yourself advantage on all weapon
      attack rolls until the end of the current turn. When you do so, you also
      gain 5 temporary hit points. The number of hit points increases when you
      reach certain levels in this class, increasing to 10 at 10th level and 15
      at 15th level.</p>

      <p>You can use this feature three times. You regain all expended uses when
      you finish a long rest.</p>
