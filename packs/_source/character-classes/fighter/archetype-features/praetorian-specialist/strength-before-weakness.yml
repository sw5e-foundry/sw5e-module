system:
  description:
    value: >-
      <p><em><strong>Praetorian Specialist:</strong> 18th level</em></p>

      <p>Your fighting spirit can delay the grasp of death. If you take damage
      that reduces you to 0 hit points, you can use your reaction to delay
      falling unconscious, and you can immediately take an extra turn. While you
      have 0 hit points during that extra turn, taking damage causes death
      saving throw failures as normal, and three death saving throw failures can
      still kill you. When the extra turn ends, you fall unconscious if you
      still have 0 hit points.</p>

      <p>Once you've used this feature, you can't use it again until you finish
      a long rest.</p>
