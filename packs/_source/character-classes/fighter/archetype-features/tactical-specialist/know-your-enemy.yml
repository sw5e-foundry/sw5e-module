system:
  description:
    value: >-
      <p><em><strong>Tactical Specialist:</strong> 7th level</em></p>

      <p>If you spend at least 1 minute observing or interacting with another
      creature outside combat, you can learn certain information about its
      capabilities compared to your own. The GM tells you if the creature is
      your equal, superior, or inferior in regard to two of the following
      characteristics of your choice:</p>

      <ul>

      <li>Strength score</li>

      <li>Dexterity score</li>

      <li>Constitution score</li>

      <li>Armor Class</li>

      <li>Current hit points</li>

      <li>Total class levels (if any)</li>

      <li>Fighter class levels (if any)</li></ul>
