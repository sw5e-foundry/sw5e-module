    value: >-
      <p><em><strong>Demolitions Specialist:</strong> 10th level</em></p>

      <p>When a creature within 5 feet of you makes a melee attack against you,
      you can use your reaction and throw a charge behind the target. If the
      target fails its saving throw against the charge, you impose disadvantage
      on the attack roll made against you.</p>
