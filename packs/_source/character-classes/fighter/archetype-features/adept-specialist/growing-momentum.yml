  description:
    value: >-
      <p><em><strong>Adept Specialist:</strong> 3rd, 5th, 9th, 13th, and 17th
      level</em></p>

      <p>You can cast the <em>burst of speed</em> force power targeting yourself
      at 1st-level without expending force points. At 10th level, when you do
      so, your speed increases by an additional 10 feet. At 18th level, when you
      do so, your speed increases by an additional 10 feet.</p>

      <p>You can use this feature twice. You gain an additional use at 5th, 9th,
      13th, and 17th level. You regain any expended uses when you finish a long
      rest.</p>
