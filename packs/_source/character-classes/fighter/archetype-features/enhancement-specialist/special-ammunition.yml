system:
  description:
    value: >-
      <p><em><strong>Enhancement Specialist:</strong> 3rd level</em></p>

      <p>You learn ammunition enhancements that are fueled by amplified shots to
      unleash special enhanced effects.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.y8z1sDzLBBO8D8HI]{Ammunition
      Enhancements}</h3>

      <p>You know two ammunition enhancements of your choice, which are detailed
      under "Ammunition Enhancements" below, and you earn more at higher levels.
      Many ammunition enhancements boost an attack in some way. Once per turn
      when you fire a shot from a blaster as part of the Attack action, you can
      apply one of your Ammunition Enhancement options to that shot,</p>

      <p>You gain an additional Ammunition Enhancement option of your choice
      when you reach certain levels in this class: 7th, 10th, 15th, and 18th
      level. Each option also improves when you become an 18th-level
      fighter.</p>

      <p>Each time you learn new ammunition enhancements, you can also replace
      one ammunition enhancement you know with a different one.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.OacBeMxYUFKsRow3]{Amplified
      Shots}</h3>

      <p>You have two amplified shots, which you use to activate your ammunition
      enhancements. An amplified shot is expended when you use it. When you fire
      an amplified shot, your weapon is treated as enhanced for overcoming
      resistance and immunity to unenhanced attacks and damage. You decide to
      use the option when the shot hits a creature, unless the option doesn't
      involve an attack roll. You regain all of your amplified shots when you
      finish a short or long rest.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.yC4t9WqEnK0vKq6X]{Saving
      Throws}</h3>

      <p>Some of your ammunition enhancements require your target to make a
      saving throw to resist the maneuver's effects. The saving throw DC is
      calculated as follows:</p>

      <p><em></em>_</p>

      <p><strong>Ammunition save DC</strong> = 8 + your proficiency bonus + your
      Dexterity modifier</p>

      <p><em></em>_</p>
