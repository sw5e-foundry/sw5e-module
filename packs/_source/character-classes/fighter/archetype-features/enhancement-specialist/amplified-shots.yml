system:
  description:
    value: >-
      <p>You have two amplified shots, which you use to activate your ammunition
      enhancements. An amplified shot is expended when you use it. When you fire
      an amplified shot, your weapon is treated as enhanced for overcoming
      resistance and immunity to unenhanced attacks and damage. You decide to
      use the option when the shot hits a creature, unless the option doesn't
      involve an attack roll. You regain all of your amplified shots when you
      finish a short or long rest.</p>
