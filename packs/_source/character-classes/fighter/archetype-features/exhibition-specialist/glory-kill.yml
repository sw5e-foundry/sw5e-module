system:
  description:
    value: >-
      <p><em><strong>Exhibition Specialist:</strong> 7th level</em></p>

      <p>As you defeat your enemies in combat, you can weaken the morale of
      other foes or bolster the resolve of your allies alike. When you score a
      critical hit or reduce a creature to 0 hit points, you can choose one or
      more creatures that you can see within 30 feet of you, up to a number
      equal to your Charisma modifier (minimum of one creature). Each of the
      chosen </p>

      <p>creatures are affected by one of the following effects of your
      choice:</p>

      <ul>

      <li>The creature gains temporary hit points equal to [[/r 1d6]] + your
      Charisma modifier (minimum of 1 temporary hit point).</li>

      <li>The creature must succeed on a Wisdom saving throw (DC = 8 + your
      proficiency bonus + your Charisma modifier) or be frightened of you until
      the start of your next turn.</li></ul>
