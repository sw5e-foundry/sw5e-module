system:
  description:
    value: >-
      <p><em><strong>Exhibition Specialist:</strong> 15th level</em></p>

      <p>Your glory on the battlefront can misdirect attacks. When a creature
      you can see hits you with an attack roll, you can use your reaction to
      gain a bonus to AC against that attack, potentially causing it to miss
      you. The bonus equals your Charisma modifier (minimum of +1). If the
      attack misses, you can make one weapon attack against the attacker as part
      of this reaction.</p>
