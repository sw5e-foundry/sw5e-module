  description:
    value: >-
      <h1>Tactical Specialist</h1><p>Those fighters who choose to become
      Tactical Specialists employ martial techniques passed down through
      generations. To a Tactical Specialist, combat is an academic field,
      sometimes including subjects beyond battle such as armstech or armormech.
      Not every fighter absorbs the lessons of history, theory, and artistry
      that are reflected in the Tactical Specialty, but those who do are
      well-rounded fighters of great skill and knowledge.</p>
