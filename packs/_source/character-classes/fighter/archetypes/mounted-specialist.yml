    value: >-
      <h1>Mounted Specialist</h1><p>Those fighters who choose to become Mounted
      Specialists excel at mounted combat. Mounted Specialists are most
      dangerous from the seat of a speeder or saddle of a varactyl, though they
      can hold their own from the ground. Their versatility often has them
      leading the charge or protecting the team.</p>
