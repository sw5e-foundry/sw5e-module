system:
  description:
    value: >-
      <p><em><strong>Sentinel:</strong> 2nd level</em></p><p>Your training
      allows you to harness the mystical energy of the Force throughout your
      body. You learn three effects: Deflection, Double Strike, and Slow Time.
      Each effect costs 1 force point and uses a [[/r d4]], which changes as you
      gain sentinel levels, as shown in the Kinetic Combat column of the
      sentinel table. You can only use each effect once per
      round.</p><h3>@UUID[Compendium.sw5e-module.character-classes.Item.DkeBmqxtDGB5IS25]{Deflection}</h3><p>When
      you are the target of an attack, you can roll a Kinetic Combat die and add
      it to your AC (no action required). You can do so before or after the
      attack is made, but you must choose to do so before the GM determines if
      the attack
      hits.</p><h3>@UUID[Compendium.sw5e-module.character-classes.Item.xdVUUvvy1WQNS8HB]{Double
      Strike}</h3><p>When you hit a creature with a weapon attack, you can roll
      a Kinetic Combat die and deal additional damage of the same type equal to
      the amount
      rolled.</p><h3>@UUID[Compendium.sw5e-module.character-classes.Item.A87ImRq8O2Ftebxa]{Slow
      Time}</h3><p>When you move on your turn, you can roll a Kinetic Combat die
      to increase your speed by 5 x the amount rolled until the end of your
      turn.</p><section id="secret-nLIuRlKyvY6hSiN4"
      class="secret"><p><strong>Foundry Note<br /></strong>This feature includes
      activities that deduct force points automatically. For Deflection and Slow
      Time they include an arbitrary roll for their bonuses but do not actually
      increase AC or Speed. Double Strike's damage type can be selected in the
      damage roll's dialog box.</p></section>
