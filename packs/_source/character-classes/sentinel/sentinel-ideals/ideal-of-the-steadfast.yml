system:
  description:
    value: >-
      <p>When you would make a melee weapon attack roll, you can instead force
      the target to make a Dexterity saving throw (DC = 8 + your bonus to
      attacks with the weapon). If you would have advantage on your attack roll,
      the creature instead has disadvantage on their saving throw, and if you
      would have disadvantage on your attack roll, the creature instead has
      advantage on their saving throw. On a failed save, the target takes normal
      weapon damage and is subjected to any additional effects that would occur
      on a hit.</p>

      <p>Additionally, as a bonus action, you can manifest this ideal in a brief
      surge of energy. For the next minute, when a creature succeeds on the
      saving throw, they take half the normal weapon damage, and when a creature
      rolls a 1 on the saving throw, they treat the damage as if you had rolled
      the maximum.</p>
