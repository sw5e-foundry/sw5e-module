system:
  description:
    value: >-
      <p>When you finish a short or long rest, you gain a number of temporary
      force points equal to half your Wisdom or Charisma modifier (your choice,
      minimum of one). When you would spend a force point while you have
      temporary force points, the temporary force points are spent first. All
      temporary force points are lost at the end of your next short or long
      rest.</p>

      <p>Additionally, as an action, you can manifest this ideal in a brief
      surge of energy. You regain a number of force points equal to half your
      Wisdom or Charisma modifier (your choice, minimum of one).</p>
