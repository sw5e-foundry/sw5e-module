system:
  description:
    value: >-
      <p>Choose one of your skill or tool proficiencies. When you make an
      ability check with the chosen skill or tool, you can add half your Wisdom
      or Charisma modifier (your choice, minimum of one).</p>

      <p>Additionally, as an action, you can manifest this ideal in a brief
      surge of energy. For the next 10 minutes, the bonus increases to your
      Wisdom or Charisma modifier, and you can choose a second skill or tool to
      extend this feature to.</p>
