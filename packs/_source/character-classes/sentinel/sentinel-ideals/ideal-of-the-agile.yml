system:
  description:
    value: >-
      <p>You gain a swimming speed and a climbing speed equal to your walking
      speed. When you make a long jump, you can cover a number of feet up to
      twice your Wisdom or Charisma score (your choice). When you make a high
      jump, you can leap a number of feet up into the air equal to 3 + twice
      your Wisdom or Charisma modifier (your choice).</p>

      <p>Additionally, as a bonus action, you can manifest this ideal in a brief
      surge of energy. For the next minute, opportunity attacks against you are
      made with disadvantage.</p>
