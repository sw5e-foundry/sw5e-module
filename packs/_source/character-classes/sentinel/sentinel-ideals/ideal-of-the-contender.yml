system:
  description:
    value: >-
      <p>Your unarmed strike damage increases by one step (from 1 to [[/r d4]],
      [[/r d4]] to [[/r d6]], or [[/r d6]] to [[/r d8]]), and your unarmed
      strikes gain the finesse property.</p>

      <p>Additionally, as a bonus action, you can manifest this ideal in a brief
      surge of energy. For the next minute, your unarmed strikes count as
      enhanced for the purpose of overcoming resistance and immunity to
      unenhanced attacks and damage, and you can use your Wisdom or Charisma
      modifier (your choice) instead of Strength for checks made to grapple a
      target or escape a grapple.</p>
