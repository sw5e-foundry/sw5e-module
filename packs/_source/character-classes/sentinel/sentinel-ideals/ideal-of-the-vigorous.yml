system:
  description:
    value: >-
      <p>When you roll a Hit Die to regain hit points, you may use your Wisdom
      or Charisma modifier in place of your Constitution modifier when
      determining the number of hit points you regain.</p>

      <p>Additionally, as an action, you can manifest this ideal in a brief
      surge of energy. You gain a number of temporary hit points equal to half
      your sentinel level + your Wisdom or Charisma modifier (your choice,
      minimum of one).</p>
