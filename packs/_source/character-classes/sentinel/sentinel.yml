  description:
    value: >-
      <img style="margin:5px;border:0px;float:right"
      src="modules/sw5e-module/icons/packs/Classes/sentinel_01.webp" /><p>Clad
      in black robes, the rattataki pulls his hood forward and steps into the
      shadowy alcove, only to reappear further down the hall. As his quarry
      walks past, he presses the hilt of his lightsaber to the back of their
      head, quickly toggling it on-and-off. He is gone before the corpse hits
      the ground.</p><p>The togruta dashes across the battlefield, doublesaber
      deflecting blaster shots to the ground. She pulls her wounded padawan to
      her feet, and guides her away from the warzone.</p><p>Green-bladed
      lightsaber a blur, the cathar ferociously presses the attack. With each
      strike, she guides her opponent closer to the ravine's edge. A flurry of
      blows followed by a quick <em>force push</em> and her foe tumbles over the
      edge.</p><p>Sentinels are the masters of blending force powers with weapon
      attacks. They weave the two together so expertly that their foes have
      trouble predicting them.</p><h2>The Middle of the Road</h2><p>The sentinel
      uses stealth and subterfuge to accomplish the will of the Force. Where the
      consular focuses on mastery of the Force and the guardian focuses on the
      mastery of the lightsaber, the sentinel focuses on merging the
      two.</p><h2>Solitary Action</h2><p>Sentinels are notoriously independent,
      most comfortable acting alone and without backup; where some use a team to
      make up for their weaknesses, the sentinel uses the Force to overcome
      theirs. While some take this independent streak to the extreme, they are
      usually accepting of authority, as long as they are allowed to carry out
      directions using their preferred methods.</p><p>While creating your
      sentinel, consider your personal philosophy in regards to the Force and
      its most famous practitioners â€" the Jedi and the Sith. Are you a member
      of one of the two orders, or do you walk a different path? Are you an
      operative tapping into a latent Force-sensitivity? Were you trained in the
      force from a young age, or did you discover it as an adult? How do you
      treat those weaker than you? What was your family like? Do you see the
      Force as light and dark, or an impartial river of gray?</p><h3>Quick
      Build</h3><p>You can make a sentinel quickly by following these
      suggestions. First, make Dexterity your highest ability score, followed by
      Wisdom or Charisma. Second, choose the Jedi or Sith background.</p>
