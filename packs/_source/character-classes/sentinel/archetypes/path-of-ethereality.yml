  description:
    value: >-
      <h1>Path of Ethereality</h1><p>In the distant reaches of the galaxy
      obscure knowledge and forgotten secrets of the Force can sometimes be
      found. While other Force-sensitive may find themselves touched by this
      secret knowledge of the Force, those sentinels who follow the Path of
      Ethereality instead find themselves grabbed. Held onto by mysterious
      aspects of the Force that refuse to let go, these sentinels find
      themselves able to manipulate the universe around them.</p>
