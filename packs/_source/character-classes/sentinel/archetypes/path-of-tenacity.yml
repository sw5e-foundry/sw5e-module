    value: >-
      <h1>Path of Tenacity</h1><p>The tenacious are ever mindful that the Force
      ebbs and flows, and uses this knowledge to great advantage. Those
      sentinels who follow the Path of Tenacity use their connection to the
      Force to draw the opposition's attention while also warding off their
      attacks, serving as an effective bulwark against even the most implacable
      of foes.</p>
