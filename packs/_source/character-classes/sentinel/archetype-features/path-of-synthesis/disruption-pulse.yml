system:
  description:
    value: >-
      <p>As an action, you can send out a 30 foot cone of
      electromagnetically-charged energy to overload enemy weapons. Each
      creature within the cone that is wearing or carrying a weapon with
      electric components must make an Intelligence saving throw. If the weapon
      is being worn, this save is made with disadvantage. On a failed save, the
      first attack they attempt to make with that weapon has disadvantage. A
      creature with multiple weapons must make a separate save for each
      weapon.</p>
