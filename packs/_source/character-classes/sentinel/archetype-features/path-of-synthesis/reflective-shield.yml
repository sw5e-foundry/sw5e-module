system:
  description:
    value: >-
      <p><em><strong>Path of Synthesis:</strong> 18th level</em></p>

      <p>When you use your Force-Empowered Tech features, a barrier for energy
      shimmers into existence, surrounding you until the end of your next turn.
      When you take damage, you can mitigate the incoming energy and potentially
      reflect it back at your attacker. You use your reaction to have resistance
      against the triggering damage, and if the source of the damage is within 5
      feet of you, they take half of the total damage dealt as ion.</p>
