system:
  description:
    value: >-
      <p><em><strong>Path of Synthesis:</strong> 13th level</em></p>

      <p>You've gained access to two additional Force-Empowered Tech effects:
      Harmonic Synthesis and Conservation of Energy.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.L5ovMD949ibKVGiv]{Harmonic
      Synthesis}</h3>

      <p>When you use your action to cast a force power, you can use your bonus
      action to gain resistance to damage dealt by tech powers until the start
      of your next turn. If you use your action to cast a tech power, you can
      instead gain resistance to damage dealt by force powers.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.evzBOIvoBxiy2SIi]{Conservation
      of Energy}</h3>

      <p>When you reduce a hostile creature to 0 hit points with a tech power,
      you can reduce the force point cost of the tech power to 0 (no action
      required).</p>
