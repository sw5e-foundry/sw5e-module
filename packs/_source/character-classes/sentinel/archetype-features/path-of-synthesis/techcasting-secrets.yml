system:
  description:
    value: >-
      <p><em><strong>Path of Synthesis:</strong> 3rd level</em></p>

      <p>You have learned to intersperse your training with an aptitude for
      technology. Choose two tech powers of 1st level or lower. The chosen
      powers count as universal force powers for you, but are not included in
      the number in the Powers Known column of the sentinel table. </p>

      <p>At 7th level, you learn two tech powers of 2nd level or lower. At 13th
      level, you learn two tech powers of 3rd level or lower. At 17th level, you
      learn two tech powers of 4th level or lower. Whenever you gain a level in
      this class, you can choose one of the tech powers you know and replace it
      with another tech power of no higher than the level determined by this
      feature.</p>
