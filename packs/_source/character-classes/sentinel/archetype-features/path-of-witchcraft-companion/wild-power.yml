  description:
    value: >-
      <p><em><strong>Path of Witchcraft:</strong> 3rd level</em></p>

      <p>You learn the <em>enfeeble</em> force power, which does not count
      against your total powers known. Additionally, you can use Wisdom or
      Charisma as your forcecasting ability for it, and you can use the Double
      Strike Force-Empowered Self option when you cast it as your action and the
      target fails its save. Finally, you add your Wisdom or Charisma modifier
      (your choice, minimum of one) to damage rolls with it.</p>
