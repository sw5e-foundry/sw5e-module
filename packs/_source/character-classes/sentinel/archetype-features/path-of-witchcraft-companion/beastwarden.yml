  description:
    value: >-
      <p><em><strong>Path of Witchcraft:</strong> 13th and 17th level</em></p>

      <p>Your bond with your beast companion strengthens, granting the following
      benefits while your beast companion is within 30 feet of you:</p>

      <ul>

      <li>When you cast a force power that targets only yourself, and your beast
      companion is within range, you can also target your beast companion with
      that power. </li>

      <li>If you or your beast have darkvision and the other doesn't, the other
      gains it with the same radius. If you both have darkvision, you both use
      the larger radius of the two, which then increases by 30 feet.</li>

      <li>If you or your beast have advantage on Perception checks and the other
      doesn't, the other gains advantage on Perception checks. If you both have
      advantage on Perception checks, when either of you makes a Perception
      check with advantage, you can reroll one of the dice once.</li>

      </ul>

      <p>This radius increases to 60 feet at 17th level.</p>
