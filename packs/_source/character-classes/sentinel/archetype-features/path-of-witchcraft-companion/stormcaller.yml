system:
  description:
    value: >-
      <p><em><strong>Path of Witchcraft:</strong> 18th level</em></p>

      <p>You've learned to command the elements to summon a fierce storm in a
      30-foot radius around you. As an action, you can gain the following
      benefits for 1 minute:</p>

      <ul>

      <li>You gain a flying speed equal to your walking speed.</li>

      <li>You have resistance to energy, lightning, and necrotic damage.</li>

      <li>Whenever a hostile creature enters this radius for the first time on a
      turn or starts its turn there, it takes 10 lightning damage.</li>

      </ul>

      <p>This effect ends early if you are incapacitated or die. Once you've
      used this feature, you can't use it again until you finish a long
      rest.</p>
