system:
  description:
    value: >-
      <p><em><strong>Path of the Forceblade:</strong> 3rd level</em></p>

      <p>You learn the <em>saber throw</em> force power, which does not count
      against your total powers known. Additionally, you no longer have
      disadvantage on the attack roll with it if you are within 5 feet of a
      hostile creature, and you can use the Double Strike Force-Empowered Self
      options when you cast it as your action and hit a target. Finally, when
      you hit a creature with the <em>saber throw</em> force power, you deal
      additional damage equal to half your Wisdom or Charisma modifier (your
      choice, minimum of +1) if it doesn't already include that modifier.</p>
