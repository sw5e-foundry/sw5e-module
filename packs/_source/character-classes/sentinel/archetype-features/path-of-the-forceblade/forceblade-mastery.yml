system:
  description:
    value: >-
      <p><em><strong>Path of the Forceblade:</strong> 18th level</em></p>

      <p>You've mastered controlling your forceblade with your mind, using it to
      keep your enemies at bay. As an action, you can telekinetically control
      your forceblade and have it strike any number of creatures within 10 feet
      of you, spending 1 force point per target. Each target must make a
      Dexterity saving throw (DC = 8 + your bonus to weapon attack rolls with
      that weapon). On a failed save, it takes damage using your Kinetic Combat
      die + half your sentinel level (rounded down), is pushed back 10 feet and
      knocked prone.</p>
