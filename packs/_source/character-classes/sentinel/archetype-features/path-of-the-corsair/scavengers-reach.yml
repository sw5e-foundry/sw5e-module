  description:
    value: >-
      <p><em><strong>Path of the Corsair:</strong> 3rd level</em></p>

      <p>You learn the <em>force disarm</em> force power, which does not count
      against your total powers known. Additionally, you can use Double Strike
      Force-Empowered Self option to deal kinetic damage when you cast it as
      your action and the target fails its save. Finally, when you cast the
      <em>force disarm</em> force power, disarm a blaster weapon, and catch it,
      you can reload the weapon as a part of the same action.</p>
