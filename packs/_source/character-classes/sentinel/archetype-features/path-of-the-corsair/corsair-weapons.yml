  description:
    value: >-
      <p><em><strong>Path of the Corsair:</strong> 3rd level</em></p>

      <p>You can use the force to quickly learn the use of unfamiliar weapons.
      When you hold a weapon that you are not proficient in, you can spend 1
      force point (no action required) to gain proficiency with that weapon
      until the end of your next long rest. </p>

      <p>Additionally, when you throw a grenade, you can use Wisdom or Charisma
      instead of Strength when determining your throwing range.</p>
