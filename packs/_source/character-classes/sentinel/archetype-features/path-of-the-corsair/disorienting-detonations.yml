    value: >-
      <p><em><strong>Path of the Corsair:</strong> 18th level</em></p>

      <p>When a creature fails the saving throw against your Force-Empowered
      Detonators feature, you can spend 2 force points to subject it to the
      effects of one of the following force powers: affliction, force
      blind/deafen, stun, or stun droid. They automatically fail the saving
      throw for the selected power, but the effects only last until the end of
      your next turn.</p>
