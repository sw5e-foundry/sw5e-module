system:
  description:
    value: >-
      <p><em><strong>Path of Communion:</strong> 3rd, 5th, 9th, 13th, and 17th
      level</em></p>

      <p>You attract the attention of the spirit of a Force ghost. Over the
      course of one hour, you can attune to the spirit, forging a lasting
      connection. While attuned to a spirit, you gain the following
      benefits:</p>

      <ul>

      <li>Your spirit is always audible and visible to you. Your spirit can
      choose to make itself audible and visible or inaudible and invisible to
      other creatures (no action required), but it is always visible to beings
      with truesight.</li>

      <li>Your spirit can not interact with the corporeal world, but it is also
      not impeded by unenhanced walls or barriers.</li>

      <li>Your spirit acts independently of you, and it only obeys your commands
      if it chooses to. In combat, it rolls its own initiative and acts on its
      own turn. Your spirit can't attack, but it can take other actions as
      normal.</li>

      <li>While your spirit is within 100 feet of you, you can telepathically
      communicate with it. Additionally, as an action, you can see through your
      spirit's vision and hear what it hears until the start of your next turn.
      During this time, you are deaf and blind with regard to your own
      senses.</li>

      <li>When you cast a force power with a range of touch, your spirit can
      deliver the power as if it had cast it. Your spirit must be within 100
      feet of you, and it must use its reaction to deliver the power when you
      cast it. If the power requires an attack roll, you use your attack
      modifier for the roll.</li>

      </ul>

      <p>You can only attune to one spirit at a time. If you attempt to attune
      to another spirit, you immediately break the bond with your current
      spirit.</p>

      <p>&gt; ####
      @UUID[Compendium.sw5e-module.character-classes.Item.VhWNkJQNUbNMQfRq]{Generating
      Your Spirit}</p>

      <p>&gt; Your spirit might be the ghost of a benevolent Jedi, discovered in
      the ruins of a Jedi temple, or a powerful Sith spirit lingering in an
      ancient artifact. It might be the spirit of a Nightsister sorceress, or a
      paragon of a long-forgotten monastic order. Work with your GM to determine
      the nature of your spirit.</p>

      <p>Additionally, your spirit can briefly interact with the physical world.
      When you would make a melee attack, your spirit can deliver the attack as
      if it had made it. Your spirit must be within 100 feet of you, and it must
      use its reaction to deliver the attack. It uses your modifiers for the
      attack and damage rolls. You can use this feature twice. You gain an
      additional use at 5th, 9th, 13th, and 17th level. You regain all expended
      uses when you complete a short or long rest.</p>
    chat: ''
