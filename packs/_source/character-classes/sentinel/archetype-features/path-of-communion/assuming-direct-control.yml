system:
  description:
    value: >-
      <p><em><strong>Path of Communion:</strong> 18th level</em></p>

      <p>When a creature fails its saving throw against your Invasive Presence
      feature, the target becomes charmed by you for as long as Invasive
      Presence is active.</p>

      <p>While the target is charmed, you and your spirit have a telepathic link
      with it as long as you are within 100 feet of it. You and your spirit can
      use this telepathic link to issue commands to the creature while you are
      conscious (no action required), which it does its best to obey. You can
      specify a simple and general course of action, such as "Attack that
      creature," "Run over there," or "Fetch that object." If the creature
      completes the order and doesn't receive further direction from you, it
      defends and preserves itself to the best of its ability.</p>

      <p>You can use your action to take total and precise control of the
      target. Until the end of your next turn, the creature takes only the
      actions you choose, and doesn't do anything that you don't allow it to do.
      During this time you can also cause the creature to use a reaction, but
      this requires you to use your own reaction as well.</p>
