system:
  description:
    value: >-
      <p><em><strong>Path of Communion:</strong> 7th level</em></p>

      <p>Your spirit can invade another creature's being. As an action, your
      spirit can touch a creature within 5 feet of it, forcing it to make a
      Wisdom saving throw against your universal force save DC. If you or
      creatures that are friendly to you are fighting it, it has advantage on
      the saving throw. </p>

      <p>On a failed save, your spirit moves into that creatures space,
      inhabiting its body, for 1 minute. The affected creature has disadvantage
      on the first attack roll, ability check, or saving throw it makes each
      turn. At the end of each its turns, the creature repeats this save. On a
      success, it repels the spirit from its body, and it becomes immune to this
      feature for 24 hours.</p>

      <p>Once you've used this feature, you must complete a long rest before you
      can use it again.</p>
