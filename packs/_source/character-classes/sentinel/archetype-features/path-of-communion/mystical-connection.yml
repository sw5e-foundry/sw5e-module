system:
  description:
    value: >-
      <p><em><strong>Path of Communion:</strong> 3rd level</em></p>

      <p>You learn the <em>feedback</em> force power, which does not count
      against your total powers known. Additionally, you can use Wisdom or
      Charisma as your forcecasting ability for it, and you can use the Double
      Strike Force-Empowered Self option when you cast it as your action and the
      target fails its saving throw. Finally, when you deal psychic damage with
      the <em>feedback</em> force power, you deal additional psychic damage
      equal to your Wisdom or Charisma modifier (your choice, minimum of one) if
      it doesn't already include that modifier.</p>
