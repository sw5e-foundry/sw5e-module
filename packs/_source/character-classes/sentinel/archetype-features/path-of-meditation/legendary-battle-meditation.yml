  description:
    value: >-
      <p><em><strong>Path of Meditation:</strong> 18th level</em></p>

      <p>Once per long rest, you can cast the master battle meditation force
      power without expending force points. While concentrating on master battle
      meditation, at the start of each of your turns, the power's die increases
      by one step (from [[/r d8]] to [[/r d10]], or [[/r d10]] to [[/r
      d12]]).</p>

      <p>Additionally, you gain a second reaction each round that you can only
      use for your Force-Empowered Allies feature. You can only take one
      reaction per turn.</p>
