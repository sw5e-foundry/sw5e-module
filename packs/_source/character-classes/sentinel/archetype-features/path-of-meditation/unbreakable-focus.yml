system:
  description:
    value: >-
      <p><em><strong>Path of Meditation:</strong> 7th level</em></p>

      <p>Once per long rest, you can cast the <em>battle meditation</em> force
      power at its base level without expending force points. While
      concentrating on <em>battle meditation</em>, at the start of each of your
      turns, the power's die increases by one step (from [[/r d4]] to [[/r d6]],
      [[/r d6]] to [[/r d8]], [[/r d8]] to [[/r d10]], or [[/r d10]] to [[/r
      d12]]).</p>

      <p>Additionally, whenever you make a Constitution saving throw to maintain
      concentration on a force power, you can treat a [[/r d20]] roll of 9 or
      lower as a 10.</p>
