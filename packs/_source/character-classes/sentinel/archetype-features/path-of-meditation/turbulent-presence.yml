  description:
    value: >-
      <p><em><strong>Path of Meditation:</strong> 13th level</em></p>

      <p>Once per long rest, you can cast the <em>improved battle
      meditation</em> force power at its base level without expending force
      points. While concentrating on <em>improved battle meditation</em>, at the
      start of each of your turns, the power's die increases by one step (from
      [[/r d6]] to [[/r d8]], [[/r d8]] to [[/r d10]], or [[/r d10]] to [[/r
      d12]]).</p>

      <p>Additionally, once per round, when a creature rolls a bonus or penalty
      die from an effect you control, you can have them roll the die with
      advantage or disadvantage (your choice).</p>
