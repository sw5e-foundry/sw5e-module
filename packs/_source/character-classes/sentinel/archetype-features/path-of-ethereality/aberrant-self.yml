    value: >-
      <p><em><strong>Path of Ethereality:</strong> 18th level</em></p>

      <p>You no longer suffer the frailty of old age, and you can't be aged
      abnormally. You can still die of old age, however. Additionally, you no
      longer need food or water, and you no longer need to sleep. Lastly, the
      first time you take damage on each of your turns, you can roll your
      Kinetic Combat die and reduce the damage by that amount.</p>
