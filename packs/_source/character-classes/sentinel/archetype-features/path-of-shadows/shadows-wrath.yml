system:
  description:
    value: >-
      <p><em><strong>Path of Shadows:</strong> 18th level</em></p>

      <p>Your training has taught you advanced techniques while you maneuver in
      the shadows. While you are hidden from your target, the first attack roll
      you make each round does not automatically reveal your presence. Make a
      Dexterity (Stealth) check against your target's Wisdom (Perception) check.
      On a success, you remain hidden. If you are also invisible, you remain
      invisible.</p>
