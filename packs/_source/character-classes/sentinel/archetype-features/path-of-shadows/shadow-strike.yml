    value: >-
      <p><em><strong>Path of Shadows:</strong> 7th level</em></p>

      <p>You learn to strike from the shadows. Once per turn, you can deal an
      extra [[/r 1d6]] damage to one creature you hit with an attack if you have
      advantage on the roll. </p>

      <p>The extra damage increases to [[/r 2d6]] at 11th level and [[/r 3d6]]
      at 17th level.</p>
