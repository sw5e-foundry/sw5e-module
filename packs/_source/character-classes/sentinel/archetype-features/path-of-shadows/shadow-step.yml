system:
  description:
    value: >-
      <p><em><strong>Path of Shadows:</strong> 13th level</em></p>

      <p>You gain the ability to step from one shadow into another. While you
      are in dim light or darkness, as a bonus action you can teleport up to 60
      feet to an unoccupied space you can see that is also in dim light or
      darkness. You then have advantage on the first melee attack you make
      before the end of the turn.</p>
