system:
  description:
    value: >-
      <p><em><strong>Path of Shadows:</strong> 3rd level</em></p>

      <p>You learn the <em>psychic charge</em> force power, which does not count
      against your total powers known. Additionally, you can use Wisdom or
      Charisma as your forcecasting ability for it, and when you hit a creature
      with the <em>psychic charge</em> force power and the target tries to
      speak, it takes additional damage equal to your Wisdom or Charisma
      modifier (your choice, minimum of +1), and its voice does not produce
      sound until the end of your next turn.</p>
