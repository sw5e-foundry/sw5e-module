    value: >-
      <p><em><strong>Path of Iron:</strong> 3rd level</em></p>

      <p>You've undergone special training, increasing your physical
      capabilities. You gain the following benefits: </p>

      <ul>

      <li>You gain proficiency in medium armor. If you are already proficient in
      medium armor, you then gain proficiency in heavy armor. While you are
      wearing light or medium armor, you can use your Wisdom or Charisma
      modifier (your choice) instead of your Dexterity modifier when determining
      your AC.</li>

      <li>Your hit point maximum increases by 3, and it increases by 1 again
      whenever you gain a level in this class.</li></ul>
