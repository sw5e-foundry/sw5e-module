system:
  description:
    value: >-
      <p><em><strong>Path of Iron:</strong> 7th level</em></p>

      <p>Through intense physical training, you've improved your body's ability
      to access and channel the force flowing within you. </p>

      <p>When you would use a Force-Empowered Self option, you can choose to
      bolster the option, gaining an additional effect as listed below. You can
      only bolster a Force-Empowered Self option once per turn. </p>

      <p>You can use these features a combined three times. You gain an
      additional use at 9th, 13th, and 17th level. You regain any expended uses
      when you finish a short or long rest.</p>

      <p>While you have no remaining uses of this feature, you can instead
      expend 1 force point to use it.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.4PAEl9iiT7bvd6Ri]{Aegis}</h3>

      <p>When you bolster Deflection, when an attack would hit you before the
      start of your next turn, you subtract the same value rolled for Deflection
      from the damage taken.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.lPUZkEctW4LFDcew]{Cleave}</h3>

      <p>When you bolster Double Strike, you choose another creature within 5
      feet of your target. They take damage of the same type equal to the result
      of the die rolled for Double Strike.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.ZnbNH69k0Aoet3aG]{Momentum}</h3>

      <p>When you bolster Slow Time, until the end of your turn you ignore
      difficult terrain, and can move along vertical surfaces and across liquids
      without falling during the move.</p>
