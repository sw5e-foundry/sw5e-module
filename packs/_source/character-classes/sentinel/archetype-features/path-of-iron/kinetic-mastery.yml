      <p><em><strong>Path of Iron:</strong> 18th level</em></p>

      <p>Choose a lightsaber form you know. Once on each of your turns, you can
      use the chosen form without using your bonus action. </p>

      <p>You can do so six times. You regain all expended uses when you complete
      a long rest.</p>

      <p>While you have no remaining uses of this feature, you can instead
      expend 1 force point to use it.</p>
