  description:
    value: >-
      <p><em><strong>Path of Focus:</strong> 18th level</em></p>

      <p>At 18th level, your bursts can overpower even the fiercest of foes.
      Once on your turn, when a creature takes damage from you three times, you
      can force it to make a Constitution saving throw against your universal
      force save DC. On a failed save, it becomes stunned until the end of its
      next turn.</p>
