      <p><em><strong>Path of Tenacity:</strong> 3rd level</em></p>

      <p>You learn the <em>saber ward</em> force power, which does not count
      against your total powers known. Additionally, when you cast it, you can
      spend 2 force points to extend the benefits to creatures of your choice
