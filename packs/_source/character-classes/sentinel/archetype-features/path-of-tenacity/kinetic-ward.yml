system:
  description:
    value: >-
      <p><em><strong>Path of Tenacity:</strong> 3rd level</em></p>

      <p>You can use your reaction to deflect a strike when you are dealt damage
      by a melee weapon attack. When you do so, the damage you take from the
      attack is reduced by [[/r 1d10]] + your Dexterity modifier + your sentinel
      level. If you reduce the damage to 0, you can redirect it at another
      target if you have a weapon capable of doing so. You can spend 1 force
      point to make a melee weapon attack at a target within 5 feet of you with
      the weapon, as part of the same reaction. You make this attack with
      proficiency, regardless of your weapon proficiencies, and if the attack
      hits it uses your Kinetic Combat die for its damage roll. If <em>saber
      ward</em> is active, you have advantage on the attack roll.</p>
    chat: ''
