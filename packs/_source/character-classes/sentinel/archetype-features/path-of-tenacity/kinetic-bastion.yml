system:
  description:
    value: >-
      <p><em><strong>Path of Tenacity:</strong> 18th level</em></p>

      <p>You can protect allies even further from you. When a creature within 30
      feet of you is hit by a melee weapon attack, you can use your reaction to
      teleport to them and extend your Kinetic Ward. If this damage is not
      reduced to 0, the warded creature takes any remaining damage.</p>

      <p>You can use this feature a number of times equal to your Wisdom or
      Charisma modifier (your choice, a minimum of once). You regain all
      expended uses when you finish a long rest.</p>
