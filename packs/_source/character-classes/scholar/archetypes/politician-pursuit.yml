    value: >-
      <h1>Politician Pursuit</h1><p>Politicians study social &amp; political
      sciences. Those scholars who choose the Politician Pursuit know how to
      best present themselves to manipulate the masses into doing their bidding
      or allow them and their allies to carry out their business without
      impediment. They also understand the importance of self-preservation for a
      political figure.</p>
