    value: >-
      <h1>Explorer Pursuit</h1><p>The explorer strives to navigate past the
      known to discover new planets, forgotten ruins, or forbidden locations.
      Those scholars who choose the Explorer Pursuit spend their time studying
      maps, landmarks, architecture blue prints, or even history books, using
      them to effectively lead the way for their companions.</p>
