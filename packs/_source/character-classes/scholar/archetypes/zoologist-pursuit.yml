      <h1>Zoologist Pursuit</h1><p>Many academics develop an affinity for
      nature, studying the vast fauna that inhabit the different planets
      throughout the galaxy. Those scholars who choose the Zoologist Pursuit
      capitalize on their knowledge of animals, developing a strong bond with a
      companion with whom they gain an advantage on the battlefield.</p>
