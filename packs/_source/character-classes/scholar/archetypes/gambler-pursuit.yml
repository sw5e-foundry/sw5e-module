  description:
    value: >-
      <h1>Gambler Pursuit</h1><p>Not all studied men and women use their
      intelligence and skill for the pursuit of knowledge, but instead turn to
      the various casinos and betting halls of the galaxy. Those scholars who
      choose the Gambler Pursuit use their knowledge of probability and risk to
      attempt to master games of chance and build their fortune, or lose it all
      along the way.</p>
