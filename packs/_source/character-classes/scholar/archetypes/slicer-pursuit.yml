  description:
    value: >-
      <h1>Slicer Pursuit</h1><p>Across the galaxy one can find numerous
      pseudonyms and false identities belonging to the hackers and
      cyber-infiltrators that call the world of electronics home. Those scholars
      who choose the Slicer Pursuit put their impressive intellectual prowess to
      work in the field of technology, to ends both benevolent and
      malicious.</p>
