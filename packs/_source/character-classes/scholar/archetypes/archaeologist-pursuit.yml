    value: >-
      <h1>Archaeologist Pursuit</h1><p>Archaeologists are those who study the
      remnants of historical civilizations. Those scholars who choose the
      Archaeologist Pursuit are driven by a desire to uncover the past, forming
      a connection to the lives of those that came before, and unlocking within
      themselves a connection not just to history, but to the Force itself.</p>
