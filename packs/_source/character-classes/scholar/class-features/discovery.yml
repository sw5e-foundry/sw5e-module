  description:
    value: >-
      <p><em><strong>Scholar:</strong> 2nd level</em></p>

      <p>As you adventure, your studies have helped you discover new practices
      you can apply to your skills. You master two discoveries of your choice.
      Your discovery options are detailed at the end of the class description.
      When you gain certain scholar levels, you gain additional discoveries of
      your choice, as shown in the Discoveries column of the scholar table.</p>

      <p>Additionally, when you gain a level in this class, you can choose one
      of the discoveries you know and replace it with another discovery that you
      could learn at that level.</p>
