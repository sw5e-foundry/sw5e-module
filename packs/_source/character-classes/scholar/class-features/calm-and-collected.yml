    value: >-
      <p><em><strong>Scholar:</strong> 14th and 17th level</em></p>

      <p>When you make a saving throw caused by an effect you can see, you may
      gain a bonus to the saving throw equal to your Intelligence modifier. </p>

      <p>You can use this feature five times. You gain an additional use at 17th
      level. You regain all expended uses when you complete a long rest.</p>
