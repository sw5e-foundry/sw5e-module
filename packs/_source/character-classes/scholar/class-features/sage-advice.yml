system:
  description:
    value: >-
      <p><em><strong>Scholar:</strong> 2nd and 13th level</em></p><p>You can
      spend 1 minute spreading your knowledge and experience, advising those
      around you. When you do so, choose a skill or tool you are proficient with
      and a number of friendly creatures up to your Intelligence modifier within
      30 feet of you who can hear you and who can understand you. Once within
      the next hour, the next time each creature would make an ability check
      with the chosen skill or tool, they may add their proficiency bonus to the
      roll if they are not already proficient. A creature may only benefit from
      this feature once. If a creature is targeted by this feature again before
      using it, they can choose to retain the first benefit or replace it with
      the new skill or tool instead.</p><p>Once you've used this feature, you
      can't use it again until you finish a long rest. Starting at 13th level,
      you regain the ability to use it after you complete a short or long
      rest.</p><section class="secret"
      id="secret-0RzJO3rsWDkQSy1A"><p><strong>Foundry Note<br /></strong>This
      feature includes and Active Effect for tracking who has been granted Sage
      Advice. The Active Effect does not impact rolls and must be disabled
      manually when used. Additionally, at Level 13 the recovery must be
      manually changed to recharge on a Short Rest.</p></section>
