system:
  description:
    value: >-
      <p><em><strong>Scholar:</strong> 1st level</em></p>

      <p>You are able to analyze a creature, develop a plan on how to best
      overcome any potential obstacle, and execute that plan with ruthless
      efficiency. As a bonus action on your turn, you can analyze a creature you
      can see within 60 feet of you. For the next minute, or until you analyze
      another target, you gain the following benefits:</p>

      <ul>

      <li>When you analyze a hostile creature, your attack and damage rolls made
      with weapons with the finesse property or blaster weapons against that
      target may use your Critical Analysis ability modifier, which is
      Intelligence, instead of Strength or Dexterity. You must use the same
      modifier for both rolls.</li>

      <li>When you analyze a friendly creature, the target can end your Critical
      Analysis on them (no action required) to add your Critical Analysis
      ability modifier, which is Intelligence, to one attack roll, ability
      check, or saving throw. Once a friendly creature has benefited from this
      ability, they can not do so again until they complete a short or long
      rest.</li></ul>
