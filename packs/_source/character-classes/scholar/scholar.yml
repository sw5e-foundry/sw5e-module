  description:
    value: >-
      <img style="margin:5px;border:0px;float:right"
      src="modules/sw5e-module/icons/packs/Classes/scholar_01.webp" /><p>An
      overwhelming horde of tusken raiders bears down on a chiss and her fellow
      adventurers. She gives the order and her allies unleash a single
      coordinated attack cutting deep into their lines. Under her command the
      enemy is quickly routed against all odds, all according to
      plan.</p><p>Deep within the once thought abandoned ruins, a nautolan tends
      to his companions wounds as they rest. Countless long nights of study and
      training have conditioned him to keep going even when all others have
      exhausted themselves. He will see them through this.</p><p>A twi'lek in
      fine vestments addresses a gathering crowd. What was the making of an
      angry mob begins to disperse, his mere presence putting them at ease,
      giving his companions time to make their escape.</p><p>Scholars are master
      of the mundane arts, using methodical practices to turn the tables to
      their advantage. From years of study and testing, scholars take in the
      situation around them and quickly formulate the means to achieve whatever
      they have minds set to. Whatever pursuit they follow, a scholar will have
      a plan for anything that comes their way.</p><h2>The Pursuit of
      Knowledge</h2><p>A true scholar is never satisfied. They are always
      seeking out a new answer to a new question. This often goes hand-in-hand
      with seeking a life of adventure, to explore new, hidden areas, or
      accompany those that do. The life of a scholar often times begins in the
      mundane, as a teacher or sage. Sometimes they serve as doctors, diplomats,
      or as officers in the military.</p><h2>To Learn, To Know</h2><p>For
      scholars, mundane life is often too slow. When life becomes stagnant or
      when an answer cannot be found, the call to adventure rings louder.
      Scholars will often go to ancient, forgotten, and often dangerous places
      to find something to quench their thirst for knowledge.</p><p>As you
      create a scholar, it's important to think of where you gained your
      knowledge. Did you serve as an apprentice under a master? Did you attend
      college or other formal education? Perhaps you gained it on your own,
      searching out and pouring over dusty tomes found in forgotten places.
      Where did your thirst for knowledge come from? Insatiable curiosity?
      Always wanting to know the right answer? Or do you have something to
      prove? Think about what field you wish to pursue and think of what is
      driving you in that direction.</p><h3>Quick Build</h3><p>You can make a
      scholar quickly by following these suggestions. First, make Intelligence
      your highest ability score. Your next-highest score should be Dexterity.
      Second, choose the noble background.</p>
