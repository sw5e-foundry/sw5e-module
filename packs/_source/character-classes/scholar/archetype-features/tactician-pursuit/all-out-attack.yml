system:
  description:
    value: >-
      <p><em><strong>Tactician Pursuit:</strong> 17th level</em></p>

      <p>You can use your action to initiate an all-out attack. Choose a number
      of allies up to your Critical Analysis ability modifier within 60 feet who
      can see or hear you. The chosen allies may then immediately use their
      reaction to make one weapon attack against a target of your choice. You
      may choose the target for each attack separately.</p>

      <p>Once you use this feature, you cannot use it again until you finish a
      short or long rest.</p>
