      <p><em><strong>Zoologist Pursuit:</strong> 6th level</em></p>

      <p>Your beast companion's strikes count as enhanced for the purpose of
      overcoming resistance and immunity to unenhanced attacks and damage.
      Additionally, when your beast makes an attack roll, ability check, or
      saving throw, you may expend a superiority die and apply the benefits of a
      maneuver you know from this class, as if you had taken the action
      yourself.</p>
