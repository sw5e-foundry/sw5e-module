system:
  description:
    value: >-
      <p><em><strong>Zoologist Pursuit:</strong> 17th level</em></p>

      <p>You have learned how to push your beast beyond its limits. If your
      beast is within 30 feet of you and can see or hear you, you can command it
      to enter a furious state. While raging, your beast gains the following
      benefits:</p>

      <ul>

      <li>Your beast has advantage on Strength checks and Strength saving throws
      if it is size Medium or larger.</li>

      <li>Your beast has advantage on Dexterity checks and Dexterity saving
      throws if it is size Small or smaller.</li>

      <li>When your beast hits with an attack, it deals bonus damage equal to
      your Critical Analysis ability modifer.</li>

      <li>Your beast has resistance to kinetic and energy damage.</li>

      </ul>

      <p>Your beast's furious state lasts for 1 minute. It ends early if your
      beast is knocked unconscious. You can end your beast's furious state as a
      bonus action.</p>

      <p>Once you've used this feature, you can't use it again until you finish
      a long rest.</p>
