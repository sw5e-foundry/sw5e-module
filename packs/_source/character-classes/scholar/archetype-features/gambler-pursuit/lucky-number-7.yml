    value: >-
      <p><em><strong>Gambler Pursuit:</strong> 6th level</em></p>

      <p>Whenever you roll a 7 on an attack roll against the target of your
      Critical Analysis feature, the attack automatically hits and you regain an
      expended superiority die. </p>

      <p>When attacking with advantage or disadvantage, this effect applies if
      either roll is a 7. If both rolls are a 7, the attack is a critical
      hit.</p>
