system:
  description:
    value: >-
      <p>You gain proficiency in Wisdom and Charisma saving throws.
      Additionally, you have advantage on saving throws against force powers,
      and when a creature within 30 feet of you casts a force power, you can use
      your reaction to move up to half your speed towards the creature. You must
      end this movement closer to the creature than you started. If you end this
      movement within 5 feet of the creature, you can make one melee attack
      against the creature (no action required).</p>
