system:
  description:
    value: >-
      <p><em><strong>Geneticist Pursuit:</strong> 17th level</em></p>

      <p>Your genetic modifications have reached new heights. When you complete
      a short or long rest, you can choose one of the following features. When
      you undergo your mutagenic transformation, you also gain the benefits of
      the chosen feature for the duration. You can only have one of these
      features at a time.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.UU0zv45Y3ghTVisM]{Aspect
      of the Terentatek}</h3>

      <p>You gain proficiency in Wisdom and Charisma saving throws.
      Additionally, you have advantage on saving throws against force powers,
      and when a creature within 30 feet of you casts a force power, you can use
      your reaction to move up to half your speed towards the creature. You must
      end this movement closer to the creature than you started. If you end this
      movement within 5 feet of the creature, you can make one melee attack
      against the creature (no action required).</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.QXVQhL1BPcbHiSp1]{Aspect
      of the Rancor}</h3>

      <p>You gain proficiency in Strength and Constitution saving throws.
      Additionally, you gain immunity to the frightened condition, </p>

      <p>and when you deal damage with a weapon or unarmed strike, you can deal
      an additional [[/r 1d8]] damage of the same type as the weapon's
      damage.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.pzlusj1T1k5sJUg1]{Aspect
      of the Varactyl}</h3>

      <p>You gain proficiency in Dexterity and Intelligence saving throws.
      Additionally, your speed increases by 10 feet, your attack rolls can't
      suffer from disadvantage, creatures can't have advantage on attack rolls
      against you, and each slowed level only reduces your speed by 5 feet,
      unless it would reduce your speed to 0.</p>
