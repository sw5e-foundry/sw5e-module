    value: >-
      <p><em><strong>Occultist Pursuit:</strong> 3rd, 5th, 9th, 13th, and 17th
      level</em></p>

      <p>When you target a creature with your Critical Analysis, you can choose
      one ability. While it can see you, the target has disadvantage on ability
      checks made with the chosen ability.</p>

      <p>You can use this feature twice. You gain an additional use at 5th, 9th,
      13th, and 17th level. You regain all expended uses when you complete a
      long rest.</p>
