system:
  description:
    value: >-
      <p><em><strong>Archaeologist Pursuit:</strong> 17th level</em></p>

      <p>You gain the ability to steal the knowledge of how to cast a power from
      another forcecaster. When a hostile creature casts a force power that
      affects a friendly creature within range of your Critical Analysis
      feature, and you use your reaction target that friendly creature with your
      Critical Analysis feature, you can force the creature casting the power to
      make a Wisdom or Charisma saving throw (your choice) against your
      universal force save DC. On a successful save, the power is cast as
      normal.</p>

      <p>On a failed save, you negate the power's effects, and you steal the
      knowledge of that power if it is at least 1st level and of a level you can
      cast. For the next 8 hours, you know the power and can cast it using your
      force points. The creature cannot cast that power again until the 8 hours
      have passed.</p>

      <p>Once you've used this feature, you cannot use it again until you finish
      a long rest.</p>
