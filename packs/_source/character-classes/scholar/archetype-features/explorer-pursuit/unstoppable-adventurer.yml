    value: >-
      <p><em><strong>Explorer Pursuit:</strong> 9th level</em></p>

      <p>You learn to swim and scale vertical surfaces with ease. You gain
      swimming and climbing speed equal to your walking speed.</p>

      <p>Additionally, your Sage Advice feature can be used to give friendly
      creatures knowledge on how to swim or climb, provided you have a swimming
      or climbing speed. Chosen creatures have a swimming speed or climbing
      speed for the entire duration.</p>
