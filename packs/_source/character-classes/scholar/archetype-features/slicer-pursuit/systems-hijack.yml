system:
  description:
    value: >-
      <p>Also at 3rd level, when the target of your Critical Analysis is a droid
      or construct, or wearing or holding a techcasting focus, that creature is
      a viable target for any tech powers with you cast with a range of
      touch.</p>

      <p>Additionally, when the target of your Critical Analysis casts a tech
      power, you can use your reaction to identify the tech power being cast,
      and at what level.</p>
