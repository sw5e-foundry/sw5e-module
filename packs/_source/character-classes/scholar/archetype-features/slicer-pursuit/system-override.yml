system:
  description:
    value: >-
      <p><em><strong>Slicer Pursuit:</strong> 17th level</em></p>

      <p>You know how to quickly activate anti-tech subroutines you have encoded
      into your wristpad. You can cast the <em>diminish tech</em> and <em>tech
      override</em> powers at 3rd level without expending tech points. If the
      target is the target of your Critical Analysis, you have advantage on the
      techcasting ability check for these powers.</p>

      <p>You can use this feature three times. You regain all expended uses when
      you finish a long rest.</p>
