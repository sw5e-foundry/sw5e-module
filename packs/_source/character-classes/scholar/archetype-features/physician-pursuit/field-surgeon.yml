system:
  description:
    value: >-
      <p><em><strong>Physician Pursuit:</strong> 6th and 11th level</em></p>

      <p>Whenever you expend superiority dice to restore hit points or grant
      temporary hit points to a creature, you can roll an additional die [[/r
      d6]] and add it to the roll. This die increases to [[/r d8]] at 9th level,
      [[/r d10]] at 13th level, and [[/r d12]] at 17th level.</p>

      <p>Additionally, whenever you expend superiority dice to restore hit
      points or grant temporary hit points to a creature, if the creature is the
      target of your Critical Analysis, you can instead choose the maximum on
      both dice. Once you've used this feature, you must finish a short or long
      rest before you can use it again. Starting at 11th level, you can use it
      twice before a rest, but only once on the same turn.</p>
    chat: ''
