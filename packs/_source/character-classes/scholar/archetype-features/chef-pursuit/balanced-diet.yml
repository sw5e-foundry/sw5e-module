      <p><em><strong>Chef Pursuit:</strong> 6th level</em></p>

      <p>Your cooking is so nutritionally balanced that it allows allies to
      stave off the effects of continued rigorous activity. Creatures of your
      choice who eat food prepared by you have advantage on Constitution saving
      throws to avoid exhaustion, as described in chapter 8, until the end of
      their next long rest.</p>
