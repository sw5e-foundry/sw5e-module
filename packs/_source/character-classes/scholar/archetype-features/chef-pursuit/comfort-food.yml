system:
  description:
    value: >-
      <p><em><strong>Chef Pursuit:</strong> 9th level</em></p>

      <p>If you or any friendly creatures who have consumed food you prepared
      during a short rest regain hit points by spending hit dice at the end of
      the short rest, each of those creatures regains an extra [[/r 1d8]] hit
      points.</p>

      <p>The extra hit points increase when you reach certain levels in this
      class: to [[/r 1d10]] at 11th level, and to [[/r 1d12]] at 15th level.</p>
