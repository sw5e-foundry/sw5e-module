system:
  description:
    value: >-
      <p><em><strong>Politician Pursuit:</strong> 6th level</em></p>

      <p>As an action, you suggest a course of activity (limited to a sentence
      or two) to influence a creature you can see within range that can hear and
      understand you. Creatures that can't be charmed are immune to this effect.
      The suggestion must be worded in such a manner as to make the course of
      action sound reasonable. Asking the creature to stab itself, throw itself
      onto a spear, immolate itself, or do some other obviously harmful act ends
      the effect.</p>

      <p>The target must make a Wisdom saving throw against your maneuver save
      DC. On a failed save, the target is charmed by you, and it pursues the
      course of action you described to the best of its ability. The suggested
      course of action can continue for up to 24 hours. If the suggested
      activity can be completed in a shorter time, the effect ends when the
      subject finishes what it was asked to do.</p>

      <p>You can also specify conditions that will trigger a special activity
      during the duration. For example, you might suggest that an officer givers
      her gun to the first smuggler she meets. If the condition isn't met before
      the effect ends, the activity isn't performed.</p>

      <p>If you or any of your companions damage the target, the effect
      ends.</p>

      <p>You can use this feature three times. You gain an additional use at
      9th, 13th, and 17th level. You regain all expended uses when you finish a
      long rest.</p>
