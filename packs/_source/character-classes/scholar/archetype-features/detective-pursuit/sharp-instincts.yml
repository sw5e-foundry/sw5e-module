system:
  description:
    value: >-
      <p><em><strong>Detective Pursuit:</strong> 9th level</em></p>

      <p>Once on each of your turns, when you hit the target of your Critical
      Analysis with a melee weapon attack, you can make a Wisdom (Insight) check
      contested by the target's Charisma (Deception) check. If you win the
      contest, you deal an additional [[/r 1d8]] damage to the target, which is
      the same type as the weapon's damage</p>

      <p>This die increases to [[/r d10]] at 13th level and [[/r d12]] at 17th
      level.</p>
