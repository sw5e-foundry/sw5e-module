system:
  description:
    value: >-
      <p><em><strong>Detective Pursuit:</strong> 17th level</em></p>

      <p>When you use a scholar maneuver on a hostile creature, you can force
      that target to make a Wisdom saving throw against your maneuver save DC.
      On a failed save, the target is stunned for 1 minute. The target can
      repeat the saving throw at the end of each of its turns, ending the effect
      on itself on a success.</p>

      <p>Once you use this feature, you can't do so again until you finish a
      short or long rest.</p>
