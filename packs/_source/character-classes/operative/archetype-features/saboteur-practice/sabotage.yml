system:
  description:
    value: >-
      <p><em><strong>Saboteur Practice:</strong> 17th level</em></p>

      <p>You gain the ability to sabotage a tech power in the process of being
      cast. When a hostile creature casts a tech power, and you are the target
      of the tech power or within its area of effect, you can use your reaction
      to force that creature to make an Intelligence saving throw against your
      tech save DC. On a successful save, the power is cast as normal.</p>

      <p>On a failed save, you negate the power's effects, and the caster takes
      [[/r 1d6]] lightning damage per level of the power it was casting.
      Additionally, on a failed save, the caster's tech focus used to cast the
      tech power is overloaded and can't be used to cast tech powers for 1
      minute.</p>

      <p>At the end of each of the caster's turns, it can repeat the
      Intelligence saving throw. On a success, it can use the tech focus to cast
      tech powers again.</p>

      <p>Once you've used this feature, you can't use it again until you finish
      a long rest.</p>
