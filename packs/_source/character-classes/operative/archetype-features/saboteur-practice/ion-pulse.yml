system:
  description:
    value: >-
      <p><em><strong>Saboteur Practice:</strong> 13th level</em></p>

      <p>As a bonus action on your turn, you can expend one or more of your
      tracker droid's Hit Dice to have it emit an pulse of ion energy. Each
      creature within 5 feet of your tracker droid must make a Constitution
      saving throw against your tech save DC. A creature takes ion damage for
      each Hit Die expended in this way on a failed save, or half as much as on
      a successful one. The size of the damage die equals the size of your
      tracker droid's Hit Die. Any electronics not being worn or carried within
      the blast radius are disabled until rebooted.</p>
