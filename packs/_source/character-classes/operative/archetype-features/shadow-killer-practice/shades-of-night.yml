    value: >-
      <p><em><strong>Shadow Killer Practice:</strong> 17th level</em></p>

      <p>Your familiarity with poisons and the spirit realm has opened up new
      paths of life and death for you. Your Evasion feature now applies to
      Constitution saving throws as well as Dexterity saving throws.</p>

      <p>Additionally, whenever you create poison using your Venomous feature,
      you can change the damage type to acid, cold, fire, lightning or necrotic.
      When you do so, and you deal Sneak Attack damage with a weapon coated with
      your poison, you can also change your Sneak Attack damage to the chosen
      type.</p>
