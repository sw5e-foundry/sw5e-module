  description:
    value: >-
      <p><em><strong>Shadow Killer Practice:</strong> 9th level</em></p>

      <p>You are a master of poisons. Targets of your poisons cannot have
      advantage on the saving throw made to resist your poison, and you have
      advantage on Dexterity (Sleight of Hand) checks made to conceal the
      application of poisons.</p>

      <p>Additionally, when you apply poison to a weapon or its ammunition, that
      poison can affect an additional hit or an additional piece of ammunition,
      and when you deal Sneak Attack damage with an attack that would include
      poison damage, you can change your Sneak Attack damage to poison
      damage.</p>
