system:
  description:
    value: >-
      <p><em><strong>Shadow Killer Practice:</strong> 13th level</em></p>

      <p>You learn to partially enter the spirit realm. As an action, you can
      become invisible as an enhanced effect, along with anything you are
      wearing or carrying, for 1 hour or until you dismiss this effect (no
      action required). This invisibility ends early immediately after you deal
      damage to a creature or you force a creature to make a saving throw.</p>

      <p>Once you use this feature, you can't do so again until you finish a
      long rest. While you have no remaining uses of this feature, you can
      expend one of your poison doses from your Venomous feature to use this
      feature again. When you do so, your maximum doses decreases by 1 until the
      end of your next long rest.</p>
