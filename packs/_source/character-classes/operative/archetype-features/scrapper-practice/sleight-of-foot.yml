    value: >-
      <p><em><strong>Scrapper Practice:</strong> 9th level</em></p>

      <p>When a creature moves to within 5 feet of you, you can use your
      reaction to move up to half your speed away from the creature without
      provoking opportunity attacks. You must end this movement further from the
      creature than you started.</p>
