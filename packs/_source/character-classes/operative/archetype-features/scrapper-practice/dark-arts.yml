system:
  description:
    value: >-
      <p><em><strong>Shadow Killer Practice:</strong> 3rd level</em></p>

      <p>You learn to combine poison and stealth to perform assassination
      techniques. When you deal Sneak Attack damage to a creature you may choose
      to forgo two of your Sneak Attack dice to make the attack a dark art.</p>

      <p><em></em>_</p>

      <p><strong>Dark Arts save DC</strong> = 8 + your proficiency bonus + your
      Intelligence modifier</p>

      <p><em></em>_</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.CY7PXHHnO1dXAahI]{Envenomed
      Art}</h3>

      <p>You attempt to poison the target. The target must make a Constitution
      saving throw or be poisoned until the end of your next turn.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.yWIiYlrs3JJZQxaW]{Hallucinatory
      Art}</h3>

      <p>You attempt to blind the target. The target must make a Wisdom saving
      throw or be blinded until the end of your next turn.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.bI5Sc84HZMoVVINh]{Vanishing
      Art}</h3>

      <p>You feint to momentarily disappear from your target's purview. The
      target must make a Dexterity saving throw. On a failure, you can move up
      to 10 feet without provoking opportunity attacks from the target.</p>
