system:
  description:
    value: >-
      <p><em><strong>Sharpshooter Practice:</strong> 3rd level</em></p>

      <p>You perfect the art of placing distant shots for maximum effectiveness
      in debilitating and controlling your enemies. When you deal Sneak Attack
      damage to a creature, you may choose to forgo two of your Sneak Attack
      dice to make the attack a placed shot. </p>

      <p>Some of your placed shots require your target to make a saving throw to
      resist the placed shot's effects. The saving throw DC is calculated as
      follows: </p>

      <p><em></em>_</p>

      <p><strong>Placed Shot save DC</strong> = 8 + your proficiency bonus +
      your Dexterity modifier</p>

      <p><em></em>_</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.zMMq3eiVVvursHRE]{Disarming
      Shot}</h3>

      <p>You attempt to disarm a creature with your attack. The target must
      succeed on a Strength saving throw or be forced to drop one item of your
      choice that it's holding. The object lands at its feet.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.pyRxcxvzCkg8BqBp]{Penetrating
      Shot}</h3>

      <p>You attempt to damage another target with the same attack. Choose a
      second target within 15 feet of and directly behind your initial target.
      If the original attack roll would hit the second target, it takes two dice
      worth of Sneak Attack damage.</p>

      <p>The damage is of the same type dealt by the original attack.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.QbRThfP6qBcJirDe]{Suppressive
      Shot}</h3>

      <p>You attempt to pin the target to its location. The target must succeed
      on a Wisdom saving throw or be frightened of you until the end of its next
      turn.</p>
