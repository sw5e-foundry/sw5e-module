system:
  description:
    value: >-
      <p><em><strong>Sharpshooter Practice:</strong> 13th level</em></p>

      <p>You are able to defend your compatriots from afar. When a friendly
      creature you can see within your weapon's normal range is the target of a
      ranged attack, or forced to make a saving throw, and the source of the
      effect is within your weapon's normal range, you can use your reaction to
      make a ranged weapon attack against the source. On a hit, instead of
      dealing damage, the target of your attack has disadvantage on the attack
      roll against your ally, or your ally has advantage on the saving throw to
      resist the effect.</p>
