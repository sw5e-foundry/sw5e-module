    value: >-
      <p><em><strong>Sharpshooter Practice:</strong> 17th level</em></p>

      <p>You've learned to capitalize when you have the advantage. When you take
      the Attack action and make an attack with advantage, you can choose to
      forgo the advantage. If you do, you can make an additional attack against
      the target or another creature within 5 feet of it (no action required).
      Both attacks can benefit from your Sneak Attack damage, instead of only
      one.</p>
