system:
  description:
    value: >-
      <p><em><strong>Pugnacity Practice:</strong> 3rd level</em></p>

      <p>You've learned ways to use your martial ability to boost your combat
      performance. When you deal Sneak Attack damage, you may choose to forgo
      two of your Sneak Attack dice to make the attack a blitz attack.</p>

      <p>Some of your blitz attacks require your target to make a saving throw
      to resist the attack's effects. The saving throw DC is as follows:</p>

      <p><em></em>_</p>

      <p><strong>Blitz Attack save DC</strong> = 8 + your proficiency bonus +
      your Strength or Dexterity modifier (your choice)</p>

      <p><em></em>_</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.dLwhDdiunbMM8OBO]{Demoralizing
      Attack}</h3>

      <p>The target must make a Wisdom saving throw. On a failed save, it is
      frightened of you until the end of your next turn.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.PvT4VmnqjwB4PgJd]{Diverting
      Attack}</h3>

      <p>Roll two of your Sneak Attack dice. The first time the target would
      deal damage before the start of your next turn, that damage is reduced by
      an amount equal to the resulting roll.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.xzhBu7Ohpf3P0Qw1]{Warmonger's
      Attack}</h3>

      <p>If the target makes an attack against you or an allied creature within
      5 feet of you before the start of your next turn, you can use your
      reaction to make a melee weapon attack against it.</p>
