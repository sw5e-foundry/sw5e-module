    value: >-
      <p><em><strong>Pugnacity Practice:</strong> 9th level</em></p>

      <p>When you take the Attack action on your turn, you can choose to attack
      twice, instead of once. Additionally, you can deal Sneak Attack damage any
      number of times on your turn. Each time you deal Sneak Attack damage, you
      can choose how many Sneak Attack dice you apply. You can't apply more than
      your total Sneak Attack dice each turn.</p>
