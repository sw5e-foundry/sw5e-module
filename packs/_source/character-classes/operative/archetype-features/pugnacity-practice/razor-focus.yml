system:
  description:
    value: >-
      <p><em><strong>Pugnacity Practice:</strong> 17th level</em></p>

      <p>You can enter a hyper-focused state of mind for 1 minute as a bonus
      action. You must maintain concentration, as if concentrating on a power.
      For the duration, each time you successfully deal Sneak Attack damage
      against a creature, you gain two additional Sneak Attack dice,
      cumulatively, as your attacks become increasingly precise. These
      additional dice are lost when your focus ends, whether through failing to
      maintain concentration or after 1 minute.</p>

      <p>The first time you use this feature, you suffer no ill effect. If you
      use this feature again before you finish a long rest, you suffer one level
      of exhaustion each time you use it.</p>
