      <p><em><strong>Maverick Practice:</strong> 9th level</em></p>

      <p>When a creature fails a saving throw or ability check against you or an
      effect you control, you don't need advantage on your attack roll to use
      Sneak Attack, you can't have disadvantage on attack rolls against that
      creature, and that creature can't have advantage on ability checks and
      saving throws against effects you control. These effects last until the
      end of your next turn.</p>
