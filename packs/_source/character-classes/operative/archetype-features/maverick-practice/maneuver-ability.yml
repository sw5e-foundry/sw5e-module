system:
  description:
    value: >-
      <p>Your maneuver ability varies based on the type of the maneuver you use.
      You use Strength, Dexterity, or Constitution for physical maneuvers (your
      choice), Intelligence, Wisdom, or Charisma for mental maneuvers (your
      choice), and an ability of your choice for general maneuvers. You use this
      ability whenever a maneuver refers to your maneuver ability. Additionally,
      you use this ability modifier when setting the saving throw DC for a
      maneuver you use.</p>

      <p><em></em>_</p>

      <p><strong>Maneuver save DC</strong> = 8 + your proficiency bonus + your
      maneuver ability modifier</p>

      <p><em></em>_</p>
