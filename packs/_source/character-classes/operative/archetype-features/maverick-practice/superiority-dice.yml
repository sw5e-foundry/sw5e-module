system:
  description:
    value: >-
      <p>You have two superiority dice, which are d4s, and you earn more at
      higher levels, as shown in the Superiority Dice Quantity column of the
      Maverick Superiority table. This die changes as you gain operative levels,
      as shown in the Superiority Dice Size column of the Maverick Superiority
      table. A superiority die is expended when you use it. </p>

      <p>You regain all of your expended superiority dice when you finish a
      short or long rest.</p>
