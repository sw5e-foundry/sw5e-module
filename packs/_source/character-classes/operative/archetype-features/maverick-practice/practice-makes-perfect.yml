system:
  description:
    value: >-
      <p><em><strong>Maverick Practice:</strong> 13th and 17th level</em></p>

      <p>When you make an ability check as part of or that is affected by a
      maneuver you use, you can choose to increase your level of proficiency in
      that check by one step (from trained to proficient, from proficient to
      expertise, from expertise to mastery, from mastery to high mastery, or
      from high mastery to grand mastery).</p>

      <p>You can use this feature five times. You gain an additional use at 17th
      level. You regain all expended uses when you complete a long rest.</p>
