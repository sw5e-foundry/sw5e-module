  description:
    value: >-
      <p><em><strong>Maverick Practice:</strong> 17th level</em></p>

      <p>As an action, you can choose to intensely focus for one minute, gaining
      the following benefits:</p>

      <ul>

      <li>Once on each of your turns, when you use a maneuver, you can use a
      [[/r d4]] instead of expending a superiority die.</li>

      <li>You can't have disadvantage on ability checks or saving throws.</li>

      <li>Creatures can't have advantage on attack rolls against you.</li>

      </ul>

      <p>Once you've used this feature, you must complete a long rest before you
      can use it again.</p>
