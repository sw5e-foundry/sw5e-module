system:
  description:
    value: >-
      <p><em><strong>Acquisitions Practice:</strong> 3rd level</em></p>

      <p>You can use the bonus action granted by your Cunning Action to make a
      Dexterity (Sleight of Hand) check, use your demolitions kit or security
      kit to disarm a trap or open a lock, or take the Use an Object action.</p>

      <p>Additionally, climbing no longer costs you extra movement, and you gain
      the ability to move in flying leaps with incredible speed, precision, and
      power. When you move, instead of using your walking speed, you may take
      two short movements by flying. Each movement is at half your speed, and
      you must end each one on a solid object, a surface, or on the ground. If
      you do not, you fall and your movement ends. If you Dash, your bonus
      movement is applied to your normal speed, not this movement. </p>
    chat: ''
