system:
  description:
    value: >-
      <p><em><strong>Acquisitions Practice:</strong> 3rd level</em></p>

      <p>You learn a number of techniques to distract and confuse your
      opponents. When you deal Sneak Attack damage, you may choose to forgo two
      of your Sneak Attack dice to perform a deft hand maneuver.</p>

      <p>Some of your deft hand maneuvers require your target to make a saving
      throw to resist the deft hand maneuver's effects. The saving throw DC is
      as follows:</p>

      <p><em></em>_</p>

      <p><strong>Deft Hands save DC</strong> = 8 + your proficiency bonus + your
      Dexterity modifier</p>

      <p><em></em>_</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.5gesgqKFONRnpVBf]{Hinder}</h3>

      <p>You attempt to distract your target in order to hinder their movement.
      The target must make a Constitution saving throw. On a failed save, it
      gains 1 slowed level until the end of its next turn and it makes the first
      Dexterity saving throw before the end of its next turn with
      disadvantage.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.PWfpuwRQp3z4aMcu]{Pilfer}</h3>

      <p>You attempt to pick your target's pockets. The target must make a
      Wisdom saving throw. On a failed save, you have advantage on the first
      Dexterity (Sleight of Hand) check you make against the target before the
      end of your next turn.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.w2C0cYCEY466rgc4]{Tumble}</h3>

      <p>You attempt to nimbly roll away. You immediately move 10 feet in a
      direction of your choice, and the target must make a Dexterity saving
      throw. On a failed save, this movement does not provoke opportunity
      attacks from the creature.</p>
