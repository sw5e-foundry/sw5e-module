      <p><em><strong>Acquisitions Practice:</strong> 13th level</em></p>

      <p>Your agility in the air grants you the following benefits:</p>

      <ul>

      <li>When you move, you can instead take 3 short movements by flying.</li>

      <li>Whenever you end your flying movement and you are within 5 feet of a
      climbable surface, you can grab onto that surface as though you were
      climbing upon it.</li></ul>
