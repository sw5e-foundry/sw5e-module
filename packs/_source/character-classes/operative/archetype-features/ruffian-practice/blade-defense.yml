system:
  description:
    value: >-
      <p>You attempt to determine your target's next strike. Roll two Sneak
      Attack dice, and the target must make a Charisma saving throw. On a failed
      save, your AC increases by the higher amount rolled on the dice against
      the first attack it makes against you before the start of your next turn.
      On a successful save, your AC instead increases by the lower amount.</p>
