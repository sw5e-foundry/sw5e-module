system:
  description:
    value: >-
      <p><em><strong>Gunslinger Practice:</strong> 3rd level</em></p>

      <p>You learn a number of trick shots you can use to debilitate enemies and
      impress allies. When you deal Sneak Attack damage to a creature, you may
      choose to forgo two of your Sneak Attack dice to make the attack a trick
      shot. </p>

      <p>Some of your trick shots require your target to make a saving throw to
      resist the trick shot's effects. The saving throw DC is calculated as
      follows: </p>

      <p><em></em>_</p>

      <p><strong>Trick Shot save DC</strong> = 8 + your proficiency bonus + your
      Dexterity modifier</p>

      <p><em></em>_</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.umX3068kxtlX2M4g]{Blinding
      Shot}</h3>

      <p>You attempt to blind the target. The target must make a Constitution
      saving throw or be blinded until the end of your next turn. </p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.El6nNKpaHjPO1P3b]{Brutal
      Shot}</h3>

      <p>You attempt to knock the target prone. The target must make a Strength
      saving throw or be knocked prone.  </p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.3wFAYlr2qDchR7Y0]{Hampering
      Shot}</h3>

      <p>You attempt to hobble the enemy's movement. The target must make a
      Dexterity saving throw. If it fails, it gains 1 slowed level and it has
      disadvantage on Dexterity saving throws until the end of its next
      turn.</p>
