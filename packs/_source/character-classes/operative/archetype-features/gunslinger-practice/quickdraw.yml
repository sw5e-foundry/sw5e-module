system:
  description:
    value: >-
      <p><em><strong>Gunslinger Practice:</strong> 17th level</em></p>

      <p>You learn to perform miracles with just a blaster and some nerve. On
      your first turn in combat, if you aren't surprised, you can use your
      action to attack creatures that have not yet acted. Choose up to six such
      creatures that you can see, making a ranged weapon attack against each. On
      a hit, you deal normal weapon damage and can apply a single trick shot to
      each attack made this way.</p>

      <p>Once you've used this feature, you must complete a short or long rest
      before you can use it again.</p>
