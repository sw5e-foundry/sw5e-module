system:
  description:
    value: >-
      <p><em><strong>Performance Practice:</strong> 3rd level</em></p>

      <p>You learn to conduct impressive displays of grace and speed in combat.
      While you aren't wearing medium or heavy armor or wielding a medium or
      heavy shield, and you take the Attack action on your turn and attack with
      a weapon with either the light or finesse properties, your walking speed
      increases by 10 feet until the end of the turn, and if you deal Sneak
      Attack damage, you may choose to forgo two of your Sneak Attack dice to
      make the attack a dazzling step.</p>

      <p>Some of your dazzling steps require your target to make a saving throw
      to resist the dazzling step's effects. The saving throw DC is calculated
      as follows:</p>

      <p><em></em>_</p>

      <p><strong>Dazzling Step save DC</strong> = 8 + your proficiency bonus +
      your Charisma modifier</p>

      <p><em></em>_</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.pCVDhJLMXKcqYjwO]{Defensive
      Step}</h3>

      <p>You defend yourself from further attack. Roll two Sneak Attack dice.
      You gain temporary hit points that last until the start of your next turn
      equal to the amount rolled.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.QaovuUqteTxMXKuK]{Mobile
      Step}</h3>

      <p>You twist and twirl around the target. The target must make a Strength
      saving throw. A Huge or larger creature automatically succeeds. On a
      failed save, it is pushed back 5 feet, and you can immediately move into
      the space it just vacated without provoking opportunity attacks.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.ykLS0YLVcNrh7kFZ]{Offensive
      Step}</h3>

      <p>Choose another creature that you can see within your reach. The
      creature must make a Dexterity saving throw. On a failed save, roll two
      Sneak Attack dice. The creature takes damage equal to the amount rolled.
      This damage is of the same as your weapon's damage.</p>
