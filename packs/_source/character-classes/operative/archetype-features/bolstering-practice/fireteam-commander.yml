system:
  description:
    value: >-
      <p><em><strong>Bolstering Practice:</strong> 3rd level</em></p>

      <p>You learn a number of squad maneuvers you can use to assist allies or
      exploit enemies. When you deal Sneak Attack damage to a creature, you may
      choose to forgo two of your Sneak Attack dice to make the attack a squad
      maneuver.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.BHjjIuqhaEVLc5qU]{Fortifying
      Strike}</h3>

      <p>You inspire a friendly creature within 60 feet of you who can see or
      hear you and roll two Sneak Attack dice. That ally immediately gains
      temporary hit points equal to the amount of rolled.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.EN8ryKU2ETXAcjxN]{Reaffirming
      Strike}</h3>

      <p>You use the authority your attacks carry to help your ally focus on the
      task at hand. Choose a creature within 60 feet of you who can see or hear
      you and that is currently charmed or frightened by the creature you would
      deal Sneak Attack damage to. The condition immediately ends on that
      creature.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.lxTzTk1sCStxWo1b]{Bolstering
      Strike}</h3>

      <p>You choose a friendly creature within 60 feet of you who can see or
      hear you. Once before the start of your next turn, if that creature hits
      the creature against which you forwent two Sneak Attack damage dice, they
      deal additional damage to the target equal to the maximum of the two Sneak
      Attack dice.</p>
