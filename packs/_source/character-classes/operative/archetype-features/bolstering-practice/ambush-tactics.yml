  description:
    value: >-
      <p><em><strong>Bolstering Practice:</strong> 13th level</em></p>

      <p>When attempting to move stealthily as a group, you may choose a number
      of creatures equal to your Charisma modifier. Those creatures may add
      their proficiency to any Dexterity (Stealth) checks they make as long as
      they remain within 60 feet of you and they do not already add their
      proficiency bonus.</p>

      <p>Additionally, each ally other than you that surprises a creature and
      hits it with an attack on their first turn in combat rolls two dice equal
      to the size of your Sneak Attack dice, dealing additional damage of the
      same type to the creature. </p>
