system:
  description:
    value: >-
      <p><em><strong>Bolstering Practice:</strong> 9th level</em></p>

      <p>Once per turn, when you take the Attack action and hit a creature
      without applying your Sneak Attack damage to it, you can forgo your Sneak
      Attack damage for the turn and use your bonus action to throw the creature
      off balance. The next ally to hit that creature before the start of your
      next turn may add your Sneak Attack dice to the damage of their attack.
      </p>
