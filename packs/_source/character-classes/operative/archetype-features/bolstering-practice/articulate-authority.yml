  description:
    value: >-
      <p><em><strong>Bolstering Practice:</strong> 3rd, 5th, 9th, 13th, and 17th
      level</em></p>

      <p>When you use your Cunning Action feature to take the Dash, Disengage,
      or Hide actions, a number of friendly creatures up to your Charisma
      modifier within 30 feet of you who can hear you and who can understand you
      can use their reaction to gain an effect, determined by the action you
      took:</p>

      <ul>

      <li><strong>Dash:</strong> The creature can move up to half their speed.
      They must end this movement within 30 feet of you.</li>

      <li><strong>Disengage:</strong> The creature can move up to 5 feet. If
      this movement would provoke an opportunity attack, the opportunity attack
      is made with disadvantage.</li>

      <li><strong>Hide:</strong> The creature has advantage on the first attack
      roll they make before the end of their next turn against a creature you
      successfully hide from.</li>

      </ul>

      <p>You can use this feature twice. You gain an additional use at 5th, 9th,
      13th, and 17th level. You regain all expended uses when you finish a short
      or long rest.</p>
