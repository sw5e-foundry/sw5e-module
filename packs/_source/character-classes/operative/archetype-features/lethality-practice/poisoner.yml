  description:
    value: >-
      <p><em><strong>Lethality Practice:</strong> 9th level</em></p>

      <p>You are a master of poisons. You can apply a poison as a bonus action,
      and you have advantage on Dexterity (Sleight of Hand) checks made to
      conceal the application of poisons. </p>

      <p>Additionally, you can improve the capability of one dose of poison. To
      use this benefit, you must have a poisoner's kit, and the poison must be
      within reach. If the poison is applied before the end of your next short
      or long rest, the target has disadvantage on the saving throw made to
      resist your poison. Once you've used this feature, you must complete a
      long rest before you can use it again.</p>
