system:
  description:
    value: >-
      <p>You attempt to stagger the target. The target must make a Wisdom saving
      throw. On a failed save, the next time you would make an attack roll
      against the target before the end of your next turn, you can instead force
      the target to make a saving throw with the ability score of your choice.
      On a failed save, the creature takes normal weapon damage and you can
      apply your Sneak Attack dice to the roll.</p>
