system:
  description:
    value: >-
      <p><em><strong>Disabling Practice:</strong> 3rd level</em></p>

      <p>You learn how to discourage, debilitate, and harm your enemies. You
      gain the following benefits while you aren't wearing heavy armor or
      wielding a medium or heavy shield:</p>

      <ul>

      <li>Your damage die for your unarmed strikes and natural weapons increases
      by one step (from 1 to [[/r d4]], [[/r d4]] to [[/r d6]], or [[/r d6]] to
      [[/r d8]]), and you can apply your Sneak Attack damage when you hit with
      an unarmed strike even if it doesn't have the finesse property.</li>

      <li>You don't need advantage on your attack roll to use your Sneak Attack
      if the target of your Sneak Attack is a creature grappled by you. All the
      other rules for the Sneak Attack class feature still apply to you.</li>

      <li>You can use the bonus action granted by your Cunning Action to make an
      unarmed strike against a creature you are grappling.</li></ul>
