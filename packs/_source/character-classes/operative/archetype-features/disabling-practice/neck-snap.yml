system:
  description:
    value: >-
      <p><em><strong>Disabling Practice:</strong> 17th level</em></p>

      <p>You learn how to immediately remove your grappled opponent from the
      fight. As an action, you can force a creature grappled by you to make a
      Constitution saving throw. On a failed save, if the creature has 100 hit
      points or fewer, it dies. If the target has more than 100 hit points, it
      immediately takes [[/r 10d10]] true damage.</p>

      <p>Once you've used this feature, you must complete a short or long rest
      before you can use it again.</p>
