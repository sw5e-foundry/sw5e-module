system:
  description:
    value: >-
      <p>You attempt to create a lingering wound in the target for one minute.
      The target must make a Constitution saving throw. On a failed save, at the
      start of each of the target's turns, it takes true damage equal to one
      Sneak Attack die and repeats this saving throw, ending the effect on a
      success.</p>
