system:
  description:
    value: >-
      <p><em><strong>Sawbones Practice:</strong> 3rd level</em></p>

      <p>You gain proficiency in Medicine, and you can use your Intelligence
      modifier instead of your Wisdom modifier for checks made with it.</p>

      <p>Additionally, you can expend one use of a traumakit to help revitalize
      your wounded allies during a short rest. If you or any friendly creatures
      within 30 feet of you regain hit points at the end of the short rest by
      spending one or more Hit Dice, each of those creatures regains an extra
      [[/r 1d6]] hit points.</p>

      <p>The extra hit points increase when you reach certain levels in this
      class: to [[/r 1d8]] at 9th level, to [[/r 1d10]] at 13th level, and to
      [[/r 1d12]] at 17th level.</p>
