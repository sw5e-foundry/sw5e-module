system:
  description:
    value: >-
      <p><em><strong>Sawbones Practice:</strong> 13th level</em></p>

      <p>Your knowledge of medicine allows you to partition and ration healing
      supplies very effectively, without impacting its potency. Over the course
      of 1 hour, which can be done during a rest, you can carefully measure and
      mark out dosages of a medpac within reach. The medpac can now be used
      twice before it is consumed.</p>

      <p>At your DM's discretion, you may be able to use this feature on other
      pacs, stims, or adrenals, most likely involving an ability check to
      succeed.</p>
