system:
  description:
    value: >-
      <p><em><strong>Beguiler Practice:</strong> 17th level</em></p>

      <p>As a bonus action, you can mask yourself with the Force for 1 minute or
      until you are incapacitated. For the duration, whenever any creature tries
      to attack you for the first time on a turn, the attacker must make a
      Charisma saving throw (DC = 8 + your proficiency bonus + your Charisma
      modifier). On a failed save, it can't attack you on this turn, and it must
      choose a new target for its attack or the attack is wasted. On a
      successful save, it can attack you on this turn, but it has disadvantage
      on any saving throw it makes against your powers on your next turn.</p>

      <p>Once you've used this feature, you must complete a short or long rest
      before you can use it again.</p>
