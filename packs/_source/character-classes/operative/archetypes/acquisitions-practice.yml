  description:
    value: >-
      <h1>Acquisitions Practice</h1><p>Many operatives are hired for the
      procurement of valuable artifacts, but only the true masters of the art
      can slip through the tightest security and make off with untold riches,
      whether they do it for a profit, or for sport. Those operatives who choose
      the Acquisitions Practice apply a mixture of stealth and impressive
      acrobatics to surpass any kind of defenses they are met with.</p>
