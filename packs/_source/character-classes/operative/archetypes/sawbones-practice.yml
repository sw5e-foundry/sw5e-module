system:
  description:
    value: >-
      <h1>Sawbones Practice</h1><p>Those operatives who choose the Sawbones
      Practice have studied the humanoid body on a more intimate level than
      other operatives. While others may know where best to stab in order to
      kill, you also know how to repair the wounds you inflict, as well as how
      to make them even deeper. You delve into the secrets of the body, learning
      as much medical knowledge as you can get your hands on, regardless of how
      dirty the work becomes.</p>
