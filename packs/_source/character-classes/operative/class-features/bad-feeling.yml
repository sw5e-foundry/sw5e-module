    value: >-
      <p><em><strong>Operative:</strong> 3rd level</em></p>

      <p>You have a wary eye, bordering on paranoia. When you roll for
      initiative, you can move up to your speed. This movement happens before
      the initiative order is determined. </p>

      <p>Once you've used this feature, you can't use it again until you finish
      a long rest.</p>
