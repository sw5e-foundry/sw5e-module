system:
  description:
    value: >-
      <p><em><strong>Operative:</strong> 20th level</em></p>

      <p>You have an uncanny knack for succeeding when you need to. Your
      Dexterity and Intelligence scores increase by 2. Your maximum for those
      scores increases by 2. Additionally, if your attack misses a target within
      range, you can turn the miss into a hit. Alternatively, if you fail an
      ability check, you can treat the [[/r d20]] roll as a 20.</p>

      <p>Once you've used this feature, you can't use it again until you finish
      a short or long rest.</p>
