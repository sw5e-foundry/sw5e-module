  description:
    value: >-
      <p><em><strong>Triage Technique:</strong> 7th, 9th, 13th, and 17th
      level</em></p>

      <p>Your application of medicine does not interfere with your own ability
      to recover from injuries. When you restore hit points or grant temporary
      hit points to another creature with a tech power or class feature, you
      recover the same amount of hit points or gain the same number of temporary
      hit points. </p>

      <p>You can use this feature three times. You gain an additional use at
      9th, 13th, and 17th level. You regain all expended uses when you complete
      a long rest.</p>
