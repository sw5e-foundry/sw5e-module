  description:
    value: >-
      <p><em><strong>Mechanist Technique:</strong> 3rd level</em></p>

      <p>As a bonus action, you can cause the target of your Ranger's Quarry to
      emit an ion pulse, as long as the target is within 60 feet of you. The
      target, and any creatures within 5 feet of it, must make a Constitution
      saving throw against your tech save DC. On a failed save, roll your
      Ranger's Quarry die; each creature takes ion damage equal to the amount
      rolled.</p>
