  description:
    value: >-
      <p><em><strong>Mechanist Technique:</strong> 3rd level</em></p>

      <p>Your command of techcasting improves.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.dckaIKEUmHhg1mBE]{Improved
      Tech Powers Known}</h3>

      <p>You know 7 tech powers of your choice, instead of 5, and you learn more
      at higher levels, as shown in the Tech Powers Known column of the
      Mechanist Technique Techcasting table. You may not learn a tech power of a
      level higher than your Max Power Level.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.rpcAEn9I9mBklPyQ]{Improved
      Tech Points}</h3>

      <p>You have a number of tech points equal to one and a half times your
      scout level, instead of your scout level, as shown in the Tech Points
      column of the Mechanist Technique Techcasting table, + your Intelligence
      modifier. You use these tech points to cast tech powers. You regain all
      expended tech points when you finish a short or long rest.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.sD4WRUQSTjdDjLvd]{Improved
      Max Power Level}</h3>

      <p>Your Max Power Level becomes 2nd, instead of 1st, and it increases at
      higher levels, as shown in the Mechanist Technique Techcasting table.</p>

      <p>You may only cast tech powers at 5th, 6th, and 7th-level once, instead
      of 4th and 5th. You regain the ability to do so after a long rest.</p>
