system:
  description:
    value: >-
      <p><em><strong>Deadeye Technique:</strong> 15th level</em></p>

      <p>You have become a master at protecting your allies from afar. When a
      creature attempts to make an opportunity attack against an allied
      creature, or forces your ally to make a saving throw, you can use your
      reaction to make an attack roll against the enemy creature.</p>

      <p>If your attack hits, either impose disadvantage on the enemy creature's
      opportunity attack roll or grant advantage to any allies making the saving
      throw.</p>
