system:
  description:
    value: >-
      <p><em><strong>Predator Technique:</strong> 7th level</em></p>

      <p>You can use your action to gain the following benefits for 1
      minute:</p>

      <ul>

      <li>You have advantage on Constitution saving throws.</li>

      <li>At the start of each of your turns, you gain temporary hit points
      equal to your Constitution modifier (minimum of one).</li>

      <li>When you use your Hunting Party feature and the target of the attack
      is your Ranger's Quarry, your ally gains a bonus to damage on the attack
      equal to your Ranger's Quarry Damage Die.</li>

      </ul>

      <p>Once you've used this feature, you can't use it again until you finish
      a short or long rest.</p>
