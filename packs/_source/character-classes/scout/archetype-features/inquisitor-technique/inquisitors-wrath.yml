system:
  description:
    value: >-
      <p><em><strong>Inquisitor Technique:</strong> 15th level</em></p>

      <p>You can cast the force suppression and sever force force powers at 3rd
      level against the target of your Ranger's Quarry without expending tech
      points. If they are within 30 feet of you, you have advantage on the
      forcecasting ability check for these powers.</p>

      <p>You can use this feature a number of times equal to 1 + your
      Intelligence modifier (a minimum of once). You regain all expended uses
      when you finish a long rest.</p>

      <p>The radius of this feature increases to 60 feet at 17th level.</p>
