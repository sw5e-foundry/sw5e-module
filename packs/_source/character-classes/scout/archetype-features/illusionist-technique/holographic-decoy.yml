system:
  description:
    value: >-
      <p><em><strong>Illusionist Technique:</strong> 3rd, 5th, 9th, 13th, and
      17th level</em></p>

      <p>As an action, you can create a perfect illusion of yourself that lasts
      for 10 minutes, or until you lose your concentration (as if you were
      concentrating on a power). The decoy appears in an unoccupied space that
      you can see within 30 feet of you. The decoy is purely visual. If anything
      passes through it, it is revealed to be an illusion. For the duration, you
      can cast tech powers as though you were in the decoy's space. Both your
      decoy and the target of your tech power must be within your line of
      sight.</p>

      <p>You can use your bonus action to cause the decoy to move up to 30 feet.
      As your decoy changes location, you can alter its appearance so that its
      movements appear natural for the decoy. If your decoy is ever more than
      120 feet away from you, it immediately disappears.</p>

      <p>Additionally, when both you and your decoy are within 5 feet of a
      creature that can see the decoy, but is not aware it is an illusion, you
      have advantage on attack rolls against that creature.</p>

      <p>A creature that uses its action to examine your decoy can determine
      that it is an illusion with a successful Intelligence (Investigation)
      check against your tech save DC. If a creature discerns the illusion for
      what it is, the creature can see through the image.</p>

      <p>You can use this feature twice. You gain an additional use at 5th, 9th,
      13th, and 17th level. You regain all expended uses when you finish a short
      or long rest. </p>
