system:
  description:
    value: >-
      <p><em><strong>Illusionist Technique:</strong> 3rd level</em></p>

      <p>The target of your Ranger's Quarry feature has disadvantage on all
      checks made to discern the nature of your illusions. Additionally, when
      the target of your Ranger's Quarry is reduced to 0 hit points, you can use
      your reaction to immediately cause an active illusion, or your Holographic
      Decoy, to take the form of the creature as long as the creature's
      dimensions fall within the power's capacity restrictions.</p>
