system:
  description:
    value: >-
      <p><em><strong>Mechanist Technique:</strong> 3rd, 5th, 9th, 11th, 13th,
      and 17th level</em></p>

      <p>You learn to employ all the knowledge you've accumulated to create and
      customize your own tracker droid companion.</p>

      <p>Create your tracker droid companion as detailed in the Companions
      section of the Customization Options document for Expanded Content. You
      must have astrotech's implements in order to create your droid.</p>

      <p>In addition to its traits and features, your tracker droid companion
      gains an additional benefit while it is bonded to you:</p>

      <ul>

      <li>Your tracker droid gains two additional traits. It gains one more
      additional trait when you reach 11th level in this class. For each droid
      trait in excess of your proficiency bonus, your tech point maximum is
      reduced by 1. Over the course of a long rest, you can install, replace, or
      remove a number of droid traits equal to half your Intelligence modifier
      (minimum of one).</li>

      </ul>

      <p>Lastly, while your tracker droid companion is bonded and within 10 feet
      of you, you can use your action to learn the location of any droid or
      construct, tech focus, tech power or enhanced item within 60 feet of you
      or your tracker droid that isn't behind total cover. When you sense a tech
      power in this way, you learn what the power is. At 11th level, your
      tracker droid companion must be within 30 feet of you or your target to
      benefit from this feature. At 17th level, your tracker droid companion
      must be within 60 feet. You can use this feature twice. You gain an
      additional use at 5th, 9th, 13th, and 17th level. You regain all expended
      uses when you complete a long rest.</p>
