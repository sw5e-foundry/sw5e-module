    value: >-
      <p><em><strong>Stalker Technique:</strong> 15th level</em></p>

      <p>Whenever a creature attacks you and does not have advantage, you can
      use your reaction to impose disadvantage on the creature's attack roll
      against you. You can use this feature before or after the attack roll is
      made, but it must be used before the outcome of the roll is
      determined.</p>
