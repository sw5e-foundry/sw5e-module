    value: >-
      <p><em><strong>Bulwark Technique:</strong> 15th level</em></p>

      <p>When your personal barrier takes damage, you can have it gain
      resistance to subsequent damage of that type until the start of your next
      turn (no action required). If it takes damage of more than one type
      simultaneously, you can choose which type it gains resistance to. Your
      barrier can only have resistance to one type of damage at a time.</p>
