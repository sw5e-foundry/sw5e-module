  description:
    value: >-
      <p>You create a wave of barrier energy in a 15-foot cone. Each creature
      within the cone must make a Dexterity saving throw. On a failed save, a
      creature takes [[/r 2d6]] energy damage and is pushed back to the edge of
      the cone. On a success, they take half damage and aren't pushed.</p>

      <p>This feature's damage increases by [[/r 1d6]] when you reach 11th level
      ([[/r 3d6]]) and 17th level ([[/r 4d6]]).</p>
