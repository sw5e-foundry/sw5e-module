system:
  description:
    value: >-
      <p>You create an unstable energy maelstrom in a 5-foot cube at a point you
      can see within 30 feet that lasts until the start of your next turn. A
      creature takes [[/r 4d4]] energy damage when it enters the area for the
      first time on a turn or starts its turn there. You can maintain the
      barrier by spending an additional barrier hit point at the start of each
      of your turns (no action required). </p>

      <p>This feature's damage increases by [[/r 1d4]] when you reach 11th level
      ([[/r 5d4]]) and 17th level ([[/r 6d4]]).</p>
