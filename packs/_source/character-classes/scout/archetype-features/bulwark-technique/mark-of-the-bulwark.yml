system:
  description:
    value: >-
      <p><em><strong>Bulwark Technique:</strong> 3rd level</em></p>

      <p>When the target of your Ranger's Quarry feature makes a melee attack
      against a friendly creature within 5 feet of you, you can use your
      reaction to force the attack to target you instead. If the attack hits,
      and your Personal Barrier has hit points, the attacking creature takes
      bonus damage equal to your Ranger's Quarry Damage Die.</p>
