system:
  description:
    value: >-
      <p><em><strong>Teleportation Technique:</strong> 3rd level</em></p>

      <p>On your turn, when you deal damage to the target of your Ranger's
      Quarry, and either you, your weapon, or the source of your damage have
      passed through your portals on this turn, when you roll below half the
      maximum on a damage die, you can treat the roll as if you'd rolled half
      the maximum on the damage die. You can only affect a number of dice up to
      half your Intelligence modifier (minimum of one) in this way.</p>
