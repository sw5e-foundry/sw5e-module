  description:
    value: >-
      <p><em><strong>Mastermind Technique:</strong> 3rd level</em></p>

      <p>You can use Intelligence instead of Dexterity for the attack and damage
      rolls made with weapons with the finesse property or blaster weapons
      against the target of your Ranger's Quarry.</p>

      <p>Additionally, once per round, when you hit the target of your Ranger's
      Quarry with a tech attack, or it fails a saving throw against a tech power
      you cast that deals damage, you can deal additional damage equal to your
      Ranger's Quarry damage die of the same type as the tech power's
      damage.</p>
