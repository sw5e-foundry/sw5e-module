system:
  description:
    value: >-
      <p><em><strong>Mastermind Technique:</strong> 11th level</em></p>

      <p>You've learned to formulate and execute a plan. As an action, you can
      choose up to six creatures (including yourself) that you can see within 60
      feet of you. For each creature, choose one of the following: ability
      check, attack roll, or saving throw. Each creature gains an Emergency
      Planning die, which is a [[/r d8]].</p>

      <p>Once within the next 10 minutes, each creature can roll the die and add
      the number rolled to one ability check, attack roll, or saving throw, as
      determined when you use this feature. The creature can wait until after it
      rolls the [[/r d20]] before deciding to use the Emergency Planning die,
      but must decide before the GM says whether the roll succeeds or fails.
      Once the Emergency Planning die is rolled, it is lost.</p>

      <p>A creature can have only one Emergency Planning die at a time.</p>

      <p>Once you've used this feature, you must complete a short or long rest
      before you can use it again.</p>

      <p>Your Emergency Planning die changes when you reach certain levels in
      this class. to [[/r 1d10]] at 13th level, and to [[/r 1d12]] at 17th
      level.</p>
