system:
  description:
    value: >-
      <p><em><strong>Artillerist Technique:</strong> 3rd level</em></p>

      <p>When you cast a tech power, rather than having it take effect
      instantly, you can choose to delay the effect to occur on initiative count
      20 (losing all initiative ties). When you do so, any creature that leaves
      the affected area of your tech power is unaffected when the tech power
      occurs. If the power would only target one creature, and that creature
      moves from the space it was in when you cast the power, the tech power
      automatically misses if it would call for an attack roll, as if you had
      rolled a 1 on the attack, and the creature automatically succeeds on the
      saving throw against the power if it calls for a saving throw, as if it
      had rolled a 20 on the save.</p>

      <p>Additionally, when you cast a tech power and choose to delay it in this
      way, and that tech power would deal damage, you can apply one of the
      following additional empowerment effects:</p>

      <ul>

      <li><strong>Flashbang</strong>: Each creature damaged by this power must
      succeed on a Constitution saving throw or be blinded and deafened until
      the start of your next turn.</li>

      <li><strong>Mire:</strong> Each creature damaged by this power must
      succeed on a Dexterity saving throw or gain one slowed level until the
      start of your next turn.</li>

      <li><strong>Psyche:</strong> Each creature damaged by this power must
      succeed on a Wisdom saving throw or become frightened until the start of
      your next turn.</li>

      </ul>

      <p>If an empowerment effect calls for a saving throw, the DC equals your
      tech save DC.</p>

      <p>You can use these features a combined number of times equal to your
      proficiency bonus, as shown in the scout table. You regain all expended
      uses when you complete a short or long rest.</p>

      <p>While you have no remaining uses of this feature, you can instead
      expend 1 tech point to use it. When you do so, your maximum tech points
      are reduced by 1 until you complete a long rest.</p>
