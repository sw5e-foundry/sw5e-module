  description:
    value: >-
      <p><em><strong>Artillerist Technique:</strong> 3rd and 11th level</em></p>

      <p>You can now use your Ranger's Quarry feature on a 10-foot cube area
      within 60 feet of you that you can see. You can treat any creatures inside
      this cube as if they are the target of your Ranger's Quarry feature, and
      when a creature is hit by a tech attack or fails a saving throw against a
      tech power you cast that deals damage, you can apply your Ranger's Quarry
      damage to that creature.</p>

      <p>At 11th level, you can now use your Ranger's Quarry feature on a
      15-foot cube area, instead of a 10-foot cube.</p>
