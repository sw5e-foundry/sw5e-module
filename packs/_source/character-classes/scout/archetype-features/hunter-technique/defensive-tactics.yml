    value: >-
      <p><em><strong>Hunter Technique:</strong> 7th level</em></p>

      <p>You gain one of the following features of your choice. </p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.jfod2jgUrIzoO8kG]{Escape
      the Horde}</h3>

      <p>Opportunity attacks against you are made with disadvantage.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.XI49sd2DxAGNn4hb]{Multiattack
      Defense}</h3>

      <p>When a creature hits you with an attack, you gain a +4 bonus to AC
      against all subsequent attacks made by that creature for the rest of the
      turn. </p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.PH319Y8tlAAEIEJ9]{Steel
      Will}</h3>

      <p>You have advantage on saving throws against being frightened.</p>
