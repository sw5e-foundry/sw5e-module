system:
  description:
    value: >-
      <p><em><strong>Hunter Technique:</strong> 15th level</em></p>

      <p>You gain one of the following features of your choice.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.vkPjBb7JH0bsOgIJ]{Evasion}</h3>

      <p>When you are subjected to an effect that allows you to make a Dexterity
      saving throw to take only half damage, you instead take no damage if you
      succeed on a saving throw, and only half damage if you fail.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.Lnio8U8eJfe3O82a]{Stand
      Against the Tide}</h3>

      <p>When a hostile creature misses you with a melee attack, you can use
      your reaction to force that creature to repeat the same attack against
      another creature (other than itself) of your choice.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.LyvivG977B6jmfvP]{Uncanny
      Dodge}</h3>

      <p>When an attacker that you can see hits you with an attack, you can use
      your reaction to halve the attack's damage against you.</p>
