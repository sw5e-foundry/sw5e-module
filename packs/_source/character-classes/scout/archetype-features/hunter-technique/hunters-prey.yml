system:
  description:
    value: >-
      <p><em><strong>Hunter Technique:</strong> 3rd level</em></p>

      <p>You gain one of the following features of your choice. </p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.bkHPKACByCvSf2br]{Colossus
      Slayer}</h3>

      <p>Your tenacity can wear down the most potent foes. When you hit a
      creature with a weapon attack, the creature takes an extra [[/r 1d8]]
      damage if it's below its hit point maximum. You can deal this extra damage
      only once per turn, and this damage is the same type as the weapon's
      damage. </p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.nHycSyY8xdrp5c6G]{Giant
      Killer}</h3>

      <p>When a Large or larger creature within 5 feet of you hits or misses you
      with an attack, you can use your reaction to attack that creature
      immediately after its attack, provided that you can see the creature. </p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.1LSnF7cvNXmLRgYJ]{Horde
      Breaker}</h3>

      <p>Once on each of your turns when you make a weapon attack, you can make
      another attack with the same weapon against a different creature that is
      within 5 feet of the original target and within range of your weapon, no
      action required.</p>
