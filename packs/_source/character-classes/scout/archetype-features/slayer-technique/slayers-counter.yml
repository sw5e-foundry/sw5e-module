  description:
    value: >-
      <p><em><strong>Slayer Technique:</strong> 15th level</em></p>

      <p>If the target of your Ranger's Quarry feature forces you to make a
      saving throw, you can use your reaction to make one weapon attack against
      it. You make this attack immediately before making the saving throw. If
      your attack hits, you automatically succeed on the saving throw, in
      addition to the attack's normal effects.</p>
