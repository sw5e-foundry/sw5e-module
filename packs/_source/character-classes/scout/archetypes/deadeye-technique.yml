system:
  description:
    value: >-
      <h1>Deadeye Technique</h1><p>Some scouts become legends written in blaster
      burns. Followers of the Deadeye Technique perfect the art of the blaster
      shot and utilize their incredible focus to make shots that most would deem
      impossible. When everything depends on one shot, you want a Deadeye
      pulling the trigger.</p><p>Due to their uncanny focus, Deadeyes can make
      shots that other marksmen would never dare to attempt. Deadeyes know how
      to make the most of ranged weapons and can use them to greater effect than
      other Scouts.</p>
