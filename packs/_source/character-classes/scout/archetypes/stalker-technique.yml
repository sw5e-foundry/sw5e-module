    value: >-
      <h1>Stalker Technique</h1><p>Some Scouts become consumed by the thrill of
      the hunt. Only heard and never seen they revel in the violence of battle.
      Followers of the Stalker Technique hone their abilities to track others
      utilizing a variety of techniques: camouflage, infiltration, surveillance,
      and target acquisition.</p>
