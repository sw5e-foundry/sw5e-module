    value: >-
      <h1>Inquisitor Technique</h1><p>Across history, there have been those who
      live to hunt those who wield the Force, be they Jedi or Sith. Followers of
      the Inquisitor Technique combine technology with force techniques to track
      down and eliminate force-wielders. For those practitioners of the Force,
      they are the greatest adversary.</p>
