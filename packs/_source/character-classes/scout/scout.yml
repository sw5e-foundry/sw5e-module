  description:
    value: >-
      <img style="margin:5px;border:0px;float:right"
      src="modules/sw5e-module/icons/packs/Classes/scout_01.webp" /><p>Rough and
      grizzled looking, a human stalks alone through the shadows of trees,
      hunting the quarry he knows is planning a raid on a nearby settlement.
      Clutching a techblade in each hand, he becomes a whirlwind of steel,
      cutting down one enemy after another.</p><p>After tumbling away from the
      shrapnel of a missile's explosion, a bothan finds her feet and quick-fires
      two shots from her carbine at the oncoming tank. Shrugging off the wave of
      fear that threatens to permeate her entire being, she strafes around her
      foe, firing shot after shot to try to penetrate the tank's thick
      armor.</p><p>Glancing at his wristpad, a sullustan looks through the eyes
      of his tracker droid. Transmitting instructions, he sends his droid to
      distract the houk he's been tracking while he readies his sniper rifle for
      the shot.</p><p>Scouts are the first on the trail and the last to lose it,
      tracking their quarry for miles unimpeded. They are adaptable, wielding
      both tech powers and their weaponry to overcome their foes.</p><h2>Deadly
      Hunters</h2><p>Warriors in their own right, scouts specialize in tracking
      and hunting the monsters that threaten civilizationâ€"humanoid raiders,
      rampaging beasts and monstrosities, terrible Force-wielders, and renegade
      droids. They learn to track their quarry as a predator does, moving
      stealthily through any terrain and hiding themselves in brush and rubble.
      Scouts focus their combat training on techniques that are particularly
      useful against their specific favored foes.</p><p>Scouts acquire the
      ability to cast tech powers through utilization of a wristpad. Their
      powers, like their combat abilities, emphasize speed, stealth, and the
      hunt. A scout's talents and abilities are honed with deadly focus on the
      grim task of protecting the civilization.</p><h2>Independent
      Adventurers</h2><p>Though a scout might make a living as a bounty hunter,
      a guide, or a tracker, a scout's true calling is to defend civilization
      from the ravages of monsters and humanoid hordes that press in. In some
      places, scouts gather in secretive orders, though many scouts are
      independent almost to a fault, knowing that, when a rancor or a band of
      pirates attacks, a scout might be the firstâ€"and possibly the lastâ€"line
      of defense. This fierce independence makes scouts well suited to
      adventuring, since they are accustomed to life far from the comforts of a
      dry bed and a hot bath. Faced with city-bred adventurers who grouse and
      whine about the hardships of the wild, scouts respond with some mixture of
      amusement, frustration, and compassion. But they quickly learn that other
      adventurers who can carry their own weight in a fight against
      civilization's foes are worth any extra burden. Coddled city folk might
      not know how to feed themselves or find fresh water in the wild, but they
      make up for it in other ways.</p><p>As you create your scout character,
      consider the nature of the training that gave you your particular
      capabilities. Did you train with a single mentor, tracking together until
      you mastered the scout's ways? Did you leave your apprenticeship, or was
      your mentor slainâ€"perhaps by some kind of bestial monstrosity on which
      you've sworn revenge? Or perhaps you learned your skills as part of a band
      of mercenaries.</p><p>What's the source of your particular hatred of a
      certain kind of enemy? Did a monster kill someone you loved or destroy
      your home village? Or did you see too much of the destruction these
      monsters cause and commit yourself to reining in their depredations? Is
      your adventuring career a continuation of your work, or a significant
      change?</p><p>What made you join up with a band of adventurers? Do you
      find it challenging to teach new allies the ways of the wild, or do you
      welcome the relief from solitude that they offer?</p><h3>Quick
      Build</h3><p>You can make a scout quickly by following these suggestions.
      First, make Strength or Dexterity your highest ability modifier, depending
      on whether you want to focus on melee combat or on ranged weapons (or
      finesse weapons). Your next-highest score should be Intelligence. Second,
      choose the bounty hunter background.</p>
