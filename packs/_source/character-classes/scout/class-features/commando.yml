system:
  description:
    value: >-
      <p><em><strong>Scout:</strong> 10th level</em></p>

      <p>You can take the Dash or Hide actions as a bonus action on each of your
      turns. Additionally, you can remain perfectly still for long periods of
      time to set up ambushes. </p>

      <p>When you attempt to hide on your turn, you can opt to not move on that
      turn. If you avoid moving, creatures that attempt to detect you take a -10
      penalty to their Wisdom (Perception) checks until the start of your next
      turn. You lose this benefit if you move or fall prone, either voluntarily
      or because of some external effect. You are still automatically detected
      if any effect or action causes you to no longer be hidden. </p>

      <p>If you are still hidden on your next turn, you can continue to remain
      motionless and gain this benefit until you are detected.</p>

      <p>Finally, you can no longer be tracked by unenhanced means, unless you
      choose to leave a trail.</p>
