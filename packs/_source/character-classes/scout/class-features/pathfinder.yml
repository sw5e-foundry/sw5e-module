system:
  description:
    value: >-
      <p><em><strong>Scout:</strong> 1st level</em></p>

      <p>You are skilled at navigating the untamed wilds. You ignore difficult
      terrain, and when traveling for an hour or more, you gain the following
      benefits:</p>

      <ul>

      <li>Difficult terrain doesn't slow your group, provided they can see and
      hear you.</li>

      <li>You can't become lost by unenhanced means.</li>

      <li>Even when you are engaged in another activity while traveling (such as
      foraging, navigating, or tracking), you remain alert to danger.</li>

      <li>If you are traveling alone, you can move stealthily at a normal
      pace.</li>

      <li>When you forage, you find twice as much food.</li>

      <li>You have advantage on Survival checks.</li></ul>
