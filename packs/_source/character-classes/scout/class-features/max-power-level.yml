  description:
    value: >-
      <p>Many tech powers can be overcharged, consuming </p>

      <p>more tech points to create a greater effect. You can overcharge these
      powers to a maximum level, which increases at higher levels, as shown in
      the Max Power Level column of the scout table.</p>

      <p>You may only cast tech powers at 4th and 5th-level once. You regain the
      ability to do so after a long rest.</p>
