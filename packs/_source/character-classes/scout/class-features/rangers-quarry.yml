system:
  description:
    value: >-
      <p><em><strong>Scout:</strong> 1st, 5th, 9th, and 17th level</em></p>

      <p>You learn how to effectively read and track your prey. Once on each of
      your turns, you can choose a creature you can see within 120 feet and mark
      it as your quarry (no action required). For the next hour, you gain the
      following benefits:</p>

      <ul>

      <li>Once per turn, when you hit the target with a weapon attack, you can
      deal [[/r 1d4]] additional damage to it of the same type as the weapon's
      damage. This die changes as you gain scout levels, as shown in the
      Ranger's Quarry column of the scout table.</li>

      <li>You have advantage on any Wisdom (Perception) or Wisdom (Survival)
      check you make to find it while it's on the same planet as you.</li>

      </ul>

      <p>You can only have one creature marked in this way at a time. Beginning
      at 5th level, you can use your reaction to mark a creature when it enters
      your line of sight, provided it is within range of your Ranger's
      Quarry.</p>

      <p>The duration increases to 8 hours at 9th level and 24 hours at 17th
      level.</p>
