  description:
    value: >-
      <h1>Way of the Sage</h1><p>The rejuvenating power of the Force is
      incredible, and the consular is the master of this usage. Those consulars
      who follow the Way of the Sage assist with an array of healing powers that
      grant allies the strength to continue through even the harshest of
      encounters. Separated from the heart of the fray, the sage can be an
      unfailing warden to those in need.</p>
