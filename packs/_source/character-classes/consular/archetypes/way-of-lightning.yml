    value: >-
      <h1>Way of Lightning</h1><p>Of all of the dark arts of the Force, little
      can match the spectacle and devastation of Force lightning. Those
      consulars who follow the Way of Lightning summon intense discharges of
      pure Force energy, overwhelming enemies with punishing damage from a
      distance, leaving them shaken and vulnerable -- if not dead.</p>
