  description:
    value: >-
      <p><em><strong>Way of the Sage:</strong> 14th level</em></p>

      <p>You gain the ability to overcome grievous injuries. As a bonus action
      when you have fewer than half your hit points remaining, you can regain a
      number of hit points equal to half your hit point maximum.</p>

      <p>Once you've used this feature, you can't use it again until you finish
      a long rest.</p>
