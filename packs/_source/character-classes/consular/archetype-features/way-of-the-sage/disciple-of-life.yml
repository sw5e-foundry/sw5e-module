      <p><em><strong>Way of the Sage:</strong> 3rd level</em></p>

      <p>When you cast a force power that restores hit points, you can use
      Wisdom or Charisma as your forcecasting ability for it. </p>

      <p>Additionally, whenever you use a force power of 1st level or higher to
      restore hit points to a creature, the creature regains extra hit points
      equal to 2 + the power's level.</p>
