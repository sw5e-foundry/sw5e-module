system:
  description:
    value: >-
      <p>Creatures that see you or any allies within 30 feet of you during this
      time cannot recall your physical appearances, your mannerisms, or any
      other identifying features.</p>

      <p>Creatures that interact with you must make a Wisdom saving throw
      against your universal force save DC once the interaction ends. You can
      choose to exclude a creature from this effect. On a failed save, the
      creature forgets all details of the interaction, rationalizing any of its
      outcomes.</p>
