system:
  description:
    value: >-
      <p><em><strong>Way of Suggestion:</strong> 3rd level</em></p>

      <p>You can befuddle a creature's mind with nothing but a gesture. As an
      action, you can cause a creature you can see within 30 feet to make a
      Wisdom saving throw against your universal force save DC. On a failed
      save, you can force the creature to believe or forget a single aspect of a
      conversation, observation or encounter it had that you were present for in
      the past 10 minutes. Whether the creature succeeds or fails their saving
      throw, you can't use this feature on them again until you finish a long
      rest. </p>

      <p>Additionally, creatures who attempt to detect your use of the Force
      have disadvantage on ability checks to do so, and if a creature has the
      <em>sense force</em> or <em>force sight</em> power active, they must
      succeed on a universal forcecasting ability check against your universal
      force save DC in order to notice your usage of the Force, your alignment
      within the Force, or how strong your connection to the Force is. </p>
