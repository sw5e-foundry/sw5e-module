system:
  description:
    value: >-
      <p><em><strong>Way of Suggestion:</strong> 10th, 13th, and 17th
      level</em></p>

      <p>Your mind-affecting powers are particularly potent. When you cast one
      of <em>cloud mind</em>, <em>dominate mind</em>, <em>mass coerce mind</em>,
      and <em>dominate monster</em>, you can choose to treat the power as if
      cast at your Max Power Level.</p>

      <p>You can use this feature four times. You gain an additional use at 13th
      and 17th level. You regain all expended uses when you finish a long
      rest.</p>
