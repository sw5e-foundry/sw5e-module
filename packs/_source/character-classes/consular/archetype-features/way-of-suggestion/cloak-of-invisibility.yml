  description:
    value: >-
      <p>You and everything you are wearing or carrying become invisible to
      creatures of your choice. If you damage a creature or affect it with a
      force power, it can make a Wisdom saving throw against your universal
      force save DC. On a success, you are no longer invisible to that
      creature.</p>
