system:
  description:
    value: >-
      <p><em><strong>Way of Endurance:</strong> 10th level</em></p>

      <p>When you take damage, you can use your reaction and expend a force
      point to regain health equal to [[/r 1d8]] + your Wisdom or Charisma
      modifier (your choice, minimum of one) as long as the damage would not
      reduce your hit points to 0. </p>

      <p>This die increases when you reach certain levels in this class: to [[/r
      1d10]] at 13th level, and to [[/r 1d12]] at 17th level.</p>
