  description:
    value: >-
      <p><em><strong>Way of Telekinetics:</strong> 3rd level</em></p>

      <p>Your potency with the telekinetic power of the Force heightens. You can
      manipulate creatures of Large size or smaller with your force powers and
      Way of Telekinetics features. Additionally, once per turn, when you deal
      force or kinetic damage to a Large or smaller creature with a force power
      or class feature, you can choose to either push it up to 10 feet away from
      you or pull it up to 10 feet closer to you.</p>
