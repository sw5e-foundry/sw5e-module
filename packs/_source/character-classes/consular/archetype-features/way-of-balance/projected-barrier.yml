    value: >-
      <p><em><strong>Way of Balance:</strong> 6th level</em></p>

      <p>When a creature that you can see within 30 feet of you takes damage,
      you can use your reaction to cause your Force Barrier to absorb that
      damage. If this damage reduces the barrier to 0 hit points, the warded
      creature takes any remaining damage.</p>
