    value: >-
      <p><em><strong>Way of Negation:</strong> 3rd, 5th, 9th, 13th, and 17th
      level</em></p>

      <p>When you fail a saving throw, you can use your reaction to gain a bonus
      to that saving throw equal to your Wisdom or Charisma modifier (your
      choice, minimum of +1).</p>

      <p>You can use this feature twice. You gain an additional use at 5th, 9th,
      13th, and 17th level. You regain all expended uses when you finish a long
      rest.</p>
