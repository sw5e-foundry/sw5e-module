system:
  description:
    value: >-
      <p><em><strong>Way of Manipulation:</strong> 3rd, 5th, 11th, and 17th
      level</em></p>

      <p>You learn to deftly control your weapons utilizing the Force. As an
      action, you can initiate your Saber Storm. When you do so, select a light-
      or vibro-weapon within 5 feet that is not worn or carried by a conscious
      creature other than you, and use the Force to cause it to levitate, acting
      as an extension of your will for 1 minute. When you activate this feature,
      you can cause the weapon to move up to 10 feet and make a melee force
      attack against a creature within 5 feet of it. On a hit, the target takes
      [[/r 1d8]] + your forcecasting ability modifier damage. The type is of the
      normal damage dealt by the weapon. The weapon then returns to your
      side.</p>

      <p>Your weapon moves with you, and while Saber Storm is active and you
      have a weapon animated, on each of your turns you can use an action to
      move a weapon up to 10 feet and repeat the attack against a creature
      within 5 feet of it. The weapon then returns to your side. Your Saber
      Storm ends early if you are incapacitated. At any time, you can end this
      feature and return the animated weapon to your hand.</p>

      <p>Additionally, while your Saber Storm is active, and at least one
      animated weapon is within 5 feet of you, you gain the following
      benefits:</p>

      <ul>

      <li>You gain a bonus to your AC equal to your Wisdom or Charisma modifier
      (your choice, minimum of +1) if it doesn't already include that
      modifier.</li>

      <li>You gain a bonus to any Constitution saving throw you make to maintain
      your concentration on a power. The bonus equals your Wisdom or Charisma
      modifier (your choice, minimum of +1).</li>

      </ul>

      <p>This feature can animate more than one weapon when you reach higher
      levels: two weapons at 5th level, three weapons at 11th level, and four
      weapons at 17th level. When you use your action to attack with your
      weapons, you can direct them at the same target or at different ones. Make
      a separate attack roll for each weapon.</p>

      <p>At 5th level, the distance your weapon can travel increases to 20 feet.
      This distance increases to 30 feet at 11th level, and 40 feet at 17th
      level.</p>

      <p>You can use this feature twice. You regain all expended uses of it when
      you finish a short or long rest.</p>
