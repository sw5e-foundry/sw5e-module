  description:
    value: >-
      <p><em><strong>Way of Manipulation:</strong> 10th level</em></p>

      <p>You can direct your animated weapons to absorb damage while your Saber
      Storm is activate. When you take damage, you can use your reaction to
      expend a number of force points up to your proficiency bonus to have your
      animated weapon intercept it, and reduce that damage to you by an amount
      equal to five times the number of points spent.</p>
