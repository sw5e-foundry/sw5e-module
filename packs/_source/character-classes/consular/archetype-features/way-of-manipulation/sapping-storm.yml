    value: >-
      <p><em><strong>Way of Manipulation:</strong> 18th level</em></p>

      <p>When you reduce a hostile creature to 0 hit points while Saber Storm is
      active, you gain temporary force points equal to your Wisdom or Charisma
      modifier (your choice, minimum of one). These temporary force points can
      not exceed your Wisdom or Charisma modifier (your choice), and when you
      would spend a force point while you have temporary force points, the
      temporary force points are spent first. When Saber Storm ends, you lose
      any remaining temporary force points.</p>
