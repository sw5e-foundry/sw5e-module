system:
  description:
    value: >-
      <p><em><strong>Way of Lightning:</strong> 18th level</em></p>

      <p>You can increase the power of your simpler lightning force powers. When
      you cast a force power of 1st through 6th level that deals lightning
      damage, you can deal maximum damage with that power.</p>

      <p>You can use this feature with no adverse effects a number of times
      equal to your Wisdom or Charisma modifier (your choice, a minimum of
      once). If you use this feature beyond this before you finish a long rest,
      you take [[/r 2d12]] true damage for each level of the power, immediately
      after you cast it. Each time you use this feature again before finishing a
      long rest, the damage increases by [[/r 1d12]].</p>
