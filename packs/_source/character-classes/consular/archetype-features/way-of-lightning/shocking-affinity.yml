system:
  description:
    value: >-
      <p><em><strong>Way of Lightning:</strong> 3rd level</em></p>

      <p>When you cast a force power that deals lightning damage, you can use
      Wisdom or Charisma as your forcecasting ability for it.</p>

      <p>Additionally, when you cast a damage-dealing force power that requires
      a force attack or saving throw, you can cause that power to instead deal
      lightning damage. If the power would call for a saving throw other than
      Dexterity, it instead calls for a Dexterity saving throw. If </p>

      <p>you hit with the power, or the target fails the power's saving throw,
      affected creatures become <em>shocked</em> until the start of your next
      turn. You can use this feature twice. You gain an additional use at 5th,
      9th, 13th, and 17th level. You regain all expended uses when you finish a
      short or long rest.</p>
