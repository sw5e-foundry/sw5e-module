system:
  description:
    value: >-
      <p><em><strong>Way of the Seer:</strong> 10th level</em></p>

      <p>You can call up visions of the past that relate to an object you hold
      or your immediate surroundings. You spend at least 1 minute in meditation,
      then receive dreamlike, shadowy glimpses of recent events. You can
      meditate in this way for a number of minutes equal to your Wisdom score
      and must maintain concentration during that time, as if you were casting a
      force power. Once you've used this feature, you can't use it again until
      you finish a short or long rest.</p>

      <p><strong><em>Object Reading.</em></strong> Holding an object as you
      meditate, you can see visions of the object's previous owner. After
      meditating for 1 minute, you learn how the owner acquired and lost the
      object, as well as the most recent significant event involving the object
      and that owner. If the object was owned by another creature in the recent
      past (within a number of days equal to your Wisdom score), you can spend 1
      additional minute for each owner to learn the same information about that
      creature.</p>

      <p><strong><em>Area Reading.</em></strong> As you meditate, you see
      visions of recent events in your immediate vicinity (a room, street,
      tunnel, clearing, or the like, up to a 50-foot cube), going back a number
      of days equal to your Wisdom score. For each minute you meditate, you
      learn about one significant event, beginning with the most recent.
      Significant events typically involve powerful emotions, such as battles
      and betrayals, marriages and murders, births and funerals. However, they
      might also include more mundane events that are nevertheless important in
      your current situation.</p>
