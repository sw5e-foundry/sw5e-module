system:
  description:
    value: >-
      <p><em><strong>Way of Tutelage:</strong> 18th level</em></p>

      <p>Your companion has learned almost all that it can from you. As an
      action on its turn, your companion can take the lead, gaining the
      following benefits for 1 minute:</p>

      <ul>

      <li>It gains temporary hit points equal to twice its level.</li>

      <li>Once per turn, when it deals damage or restores hit points, it can
      roll an additional die.</li>

      <li>It gains resistance to kinetic and energy damage.</li>

      </ul>

      <p>This effect ends early if your companion is incapacitated or dies. Once
      your companion has used this feature, it can't use it again until it
      finishes a long rest.</p>
