system:
  description:
    value: >-
      <p><em><strong>Consular:</strong> 2nd level</em></p><p>You learn how to
      defend yourself purely through your strength with the Force. When you are
      hit by an attack, you can use your reaction to shroud yourself in Force
      energy. Until the start of your next turn, you have a bonus to AC equal to
      your Wisdom or Charisma modifier (your choice, minimum of +1). This
      includes the triggering attack.</p><p>You can use this feature twice. You
      gain an additional use at 5th, 9th, 13th, and 17th level. You regain all
      expended uses when you finish a long rest.</p><section
      id="secret-9xs4ioxhxteoL0vn" class="secret"><p><strong>Foundry
      Note</strong></p><p>This feature includes an Active Effect which automates
      the bonus to AC. The bonus assumes you will use your highest modifier
      between Wisdom and Charisma. The limited uses will increase automatically
      at levels 5, 9, 13 and 17.</p></section>
