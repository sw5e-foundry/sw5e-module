  description:
    value: >-
      <p><em><strong>Consular:</strong> 3rd level</em></p>

      <p>You've developed an affinity for one of the three aspects of the Force:
      the Ashla, the Bendu, or the Bogan. Choose one from the following:</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.pWoK7SOUQAk3gc2r]{Ashla}</h3>

      <p>When you successfully cast a light side power, either your or the
      target's (your choice) hit point maximum and current hit points increase
      by an amount equal to the power's level. This effect lasts for 1 minute.
      You can only have one instance of this effect active at a time.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.zK853p6wYJmwR8b4]{Bendu}</h3>

      <p>You can add both your Wisdom and Charisma modifier to your maximum
      number of force points, instead of just one.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.jdV3D1QdvpFG2s9I]{Bogan}</h3>

      <p>Your dark side power damage rolls gain a minimum roll threshold,
      discussed in chapter 7.</p>
