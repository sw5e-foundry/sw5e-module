system:
  description:
    value: >-
      <p><em><strong>Engineer:</strong> 1st level</em></p>

      <p>Your technological experience lends you an uncommon insight that you
      can use to bolster your allies. To do so, you use a bonus action on your
      turn to choose one creature other than yourself within 60 feet of you who
      can hear you. That creature gains one Potent Aptitude die, a [[/r d4]].
      This die changes as you gain engineer levels, as shown in the Potent
      Aptitude column of the engineer table.</p>

      <p>Once within the next 10 minutes, the creature can roll the die and add
      the number rolled to one ability check, attack roll, or saving throw it
      makes. Once the Potent Aptitude die is rolled, it is lost.</p>

      <p>A creature can have only one Potent Aptitude die at a time.</p>

      <p>You can use this feature twice. You gain an additional use at 5th, 9th,
      13th, and 17th level. You regain any expended uses when you finish a short
      or long rest.</p>
    chat: ''
