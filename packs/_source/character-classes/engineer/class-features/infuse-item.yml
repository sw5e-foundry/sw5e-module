system:
  description:
    value: >-
      <p><em><strong>Engineer:</strong> 2nd level</em></p>

      <p>You gain the ability to temporarily enhance a weapon or armor. At the
      end of a long rest, you can touch one unenhanced object that is a suit of
      armor, a shield, or a simple or martial weapon. Until the end of your next
      long rest or until you die, the object becomes an enhanced item, granting
      a +1 bonus to AC if it's armor or a shield or a +1 bonus to attack and
      damage rolls if it's a weapon. </p>

      <p>Once you've used this feature, you can't use it again until you finish
      a long rest.</p>

      <p>This bonus increases to +2 at 10th level and +3 at 15th level.</p>
