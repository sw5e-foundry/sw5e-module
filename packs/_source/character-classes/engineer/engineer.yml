  description:
    value: >-
      <img style="margin:5px;border:0px;float:right"
      src="modules/sw5e-module/icons/packs/Classes/engineer_01.webp"
      /><p>Flinching occasionally as a blaster bolt hits the nearby bulkhead, a
      Sullustan mechanic quickly solders a large wire. He peers through his
      tinted goggles, ignoring the shouts of his ship captain as the enemy
      descends on the hanger. Finally he shouts with pride as the repaired
      coupling powers up, causing the frigate to hum with energy. He gathers his
      tools and runs into the ship moments before it finally takes
      off.</p><p>Inside, the human captain jumps into the cockpit. She nods to
      her droid co-pilot, who quickly begins charting a course home. Before the
      calculations can be completed, enemy Starfighters scream in from the
      clouds. The pilot rolls the ship, nimbly evading incoming fire. She
      reroutes the power to shields, leaving just enough for astronavigation.
      Just as the energy reserves near depletion, the exosphere and stars beyond
      blur into streaks of light. In a flash, they warp to safety.</p><p>A
      Cerean officer surveys the battlefield, looking for weaknesses. When he
      identifies a potential problem, he keys in a quick combination in his
      wristpad. In a blink, a custom suit of armor assembles itself around him.
      As the helmet locks into place, the officer leaps into the air, flying
      overhead and raining destruction on the opposition.</p><p>Every machine
      needs an engineer to run it, and a living crew is no different. Engineers
      are the experts and professionals who rely on skill, bravery, and their
      tools to survive and keep others alive. While they do not claim to be
      fighters, their mere presence can turn the tide of battle or simply keep
      operations running.</p><h2>Behind the Curtain</h2><p>While perhaps not as
      intimidating as a heavily-armored trooper, or as exotic as a
      lighsaber-wielding guardian, engineers are no less vital to group dynamic.
      They are armorers and gunsmiths, electricians and welders, or any other
      facet to be found in facilities across the galaxy. Their work, often
      unsung, is what keeps starships (and their crew)
      intact.</p><h2>Unflappable</h2><p>It takes bravery for a soldier to enter
      a battlefield. It perhaps takes more for someone who is unarmed, and
      untrained in combat, to do the same. Engineers put their lives on the line
      for a living, whether by choice or acknowledging their plights as an
      occupational hazard. Whether they come from an elite training academy or
      learned their talents surviving in the slums, they are no strangers to
      danger and conflict.</p><p>While creating your engineer character,
      consider what your primary skill set is and how you use it. You could be a
      street-smart mechanic who taught yourself how to fix swoop bikes as a
      teenager. Perhaps you are the recent graduate of an esteemed medical
      college, or a rookie pilot in the fledgling Rebel Alliance. What is the
      number one skill you are known for? Why are you willing to enter battles
      when you have no combat training? How do you view the more adventurous
      members of your group, and how do they see you and your role?</p><h3>Quick
      Build</h3><p>You can make an engineer quickly by following these
      suggestions. First, make Intelligence your highest ability score. Your
      next-highest score should be Constitution. Second, choose the scientist
      background.</p>
