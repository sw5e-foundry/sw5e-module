  description:
    value: >-
      <p><em><strong>Unstable Engineering:</strong> 6th level</em></p>

      <p>You can add your governing ability modifier (minimum of +1) to any
      damage you deal with tech powers and class features that don't already
      include that modifier. If the tech power or class feature would damage
      multiple creatures, you can only deal this additional damage to one of
      them.</p>

      <p>If you choose to deal this additional damage, your GM can have you roll
      on the Unstable Engineering Surge table.</p>
