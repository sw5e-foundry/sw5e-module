    value: >-
      <p><em><strong>Armstech Engineering:</strong> 6th level</em></p>

      <p>Once per round, when you deal damage to a creature with your modified
      weapon, you can increase the damage by [[/r 1d6]]. The damage is of the
      same type as the weapon's damage.</p>

      <p>The damage increases to [[/r 2d6]] at 11th level and [[/r 3d6]] at 17th
      level.</p>
