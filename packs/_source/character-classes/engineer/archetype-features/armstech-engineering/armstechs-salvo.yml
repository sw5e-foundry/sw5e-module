    value: >-
      <p><em><strong>Armstech Engineering:</strong> 18th level</em></p>

      <p>When you use your Targeting Matrix feature, and the tech power would
      affect more than one creature, you can instead attack each affected
      creature that would be in the range of the power. Make a separate attack
      roll for each target. On a hit, each target suffers the effects as though
      they failed their saving throw.</p>
