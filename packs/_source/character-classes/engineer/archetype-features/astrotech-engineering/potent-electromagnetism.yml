system:
  description:
    value: >-
      <p><em><strong>Astrotech Engineering:</strong> 3rd level</em></p>

      <p>Once per round, when you deal damage to a droid or construct, you can
      expend one use of your Potent Aptitude to deal an extra [[/r 2d6]] damage
      to that target. The damage is the same type as the source of the
      damage.</p>

      <p>The damage increases when you reach certain levels in this class,
      increasing to [[/r 3d6]] at 5th level, [[/r 5d6]] at 10th level, and [[/r
      8d6]] at 15th level.</p>
