system:
  description:
    value: >-
      <p><em><strong>Astrotech Engineering:</strong> 18th level</em></p>

      <p>As an action, you can end your field in a electromagnetic burst of
      power with an effect determined by the field you were generating.</p>

      <p>Once you've used this feature, you must complete a long rest before you
      can use it again.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.qHLiXj901pgIwyif]{Ionizing
      Burst}</h3>

      <p>Choose up to 10 creatures of your choice that are within 60 feet. Each
      must make a Constitution saving throw. On a failed save, a target takes
      [[/r 14d6]] ion damage and is stunned until the start of your next turn.
      On a success, it takes half damage and isn't stunned.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.1pTRVqkZs6evDXMq]{Jamming
      Burst}</h3>

      <p>Choose up to 10 creatures of your choice that are within 60 feet. Once
      in the next minute, when a chosen creature fails a saving throw caused by
      a tech power or is hit by an attack power, the creature can choose to
      succeed on the saving throw or have the attack miss instead.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.gT09WHlMz3U5Vu4m]{Targeting
      Burst}</h3>

      <p>Choose up to 10 creatures of your choice that are within 60 feet. Each
      creature must succeed on a Constitution saving throw against your tech
      save DC or be blinded for [[/r 1d4+1]] turns. </p>
