system:
  description:
    value: >-
      <p><em><strong>Gadgeteer Engineering:</strong> 18th level</em></p>

      <p>When a creature who has one of your barriers within 30 feet of you that
      you can see takes damage, and that damage is of a type that could be
      affected by that barrier, you can use your reaction to grant them
      resistance to the triggering damage. If that damage is the same type as
      the barrier's chosen damage, you instead grant them immunity. Whether
      resistance or immunity, the barrier immediately drops to 0 hit points.</p>
