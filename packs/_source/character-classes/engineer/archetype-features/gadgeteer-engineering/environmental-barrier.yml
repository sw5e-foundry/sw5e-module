system:
  description:
    value: >-
      <p>You project an environmental barrier that lasts until the end of your
      next short or long rest. The barrier has a number of hit points equal to
      the amount rolled on your Potent Aptitude die + your engineer level.
      Whenever a creature with this barrier takes damage (one of acid, cold,
      fire, force, lightning, necrotic, poison, psychic, or sonic, chosen by you
      when you activate the effect), the barrier takes the damage instead. If
      this damage reduces the barrier to 0 hit points, the creature take any
      remaining damage.</p>
