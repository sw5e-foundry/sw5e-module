  description:
    value: >-
      <p><em><strong>Gadgeteer Engineering:</strong> 3rd level</em></p>

      <p>You learn to create and modify adventuring gear utilizing your
      gadgeteer experience. Over the course of a long rest, you can create your
      modified gadgeteer harness. You must have gadgeteer's implements in order
      to perform this modification.</p>

      <p>Your gadgeteer harness is enhanced, requires attunement, can only be
      used by you, and counts as a tech focus for your tech powers while you are
      attuned to it. Your gadgeteer harness has 4 modification slots to which
      you can affix gadgets, and it gains more at higher levels, as shown in the
      Modification Slots column of the engineer table. For each modification
      installed in excess of your proficiency bonus, your tech point maximum is
      reduced by 1. Over the course of a long rest, you can install, replace, or
      remove a number of modifications up to your Intelligence modifier (minimum
      of one).</p>

      <p>Some modification effects require saving throws. When you use such an
      effect from this class, the DC equals your tech save DC.</p>
