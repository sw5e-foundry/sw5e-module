system:
  description:
    value: >-
      <p>You erect a shelter up to 15 feet long, 10 feet wide, and 10 feet tall,
      with one-foot-thick walls, a roof, and a floor. It has a single door along
      its walls in a location of your choice. The building has temperature
      control and lighting systems, and can withstand harsh winds, heavy rain
      and snow. Any creature inside the shelter is protected from hazardous
      environmental effects outside the shelter such as extreme heat or cold.
      The structure does not provide additional breathing air for anyone inside
      if the environment it is placed in is not breathable. The shelter can
      comfortably support up to 5 Medium creatures. For each Medium creature, it
      can instead support 2 Small creatures. For each Small creature, it can
      instead support 2 Tiny creatures.</p>

      <p>When you reach 11th level, the shelter can extend up to 30 feet long,
      15 feet wide, 15 feet tall, and it can now comfortably support up to 10
      Medium creatures. For each Medium creature, it can instead support 2 Small
      creatures. For each Small creature, it can instead support 2 Tiny
      creatures. Additionally, when a creature completes a long rest while
      within your shelter, they regain all spent Hit Dice, instead of only half.
      When you reach 17th level, the shelter can extend up to 45 feet long, 20
      feet wide, 20 feet tall, and it can now comfortably support up to 10 Large
      creatures. For each Large creature, it can instead support 2 Medium
      creatures. For each Medium creature, it can instead support 2 Small
      creatures. For each Small creature, it can instead support 2 Tiny
      creatures. Additionally, when a creature completes a long rest while
      within your shelter, their exhaustion level is reduced by 2, instead of
      only 1.</p>
