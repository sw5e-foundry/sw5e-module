system:
  description:
    value: >-
      <p><em><strong>Construction Engineering:</strong> 3rd level</em></p>

      <p>When a friendly creature other than you that you can see is hit with a
      ranged attack while within 5 feet of your deployed portable structure, you
      can use your reaction and expend one use of your Potent Aptitude to have
      your structure take the damage instead. If your structure would normally
      have immunity or resistance to this damage, it loses that immunity or
      resistance for this attack. When you do so, the damage is reduced by an
      amount equal to [[/r 1d10]] + your Intelligence modifier + your engineer
      level.</p>
