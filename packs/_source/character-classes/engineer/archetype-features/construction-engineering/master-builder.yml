  description:
    value: >-
      <p><em><strong>Construction Engineering:</strong> 18th level</em></p>

      <p>Your ability with your portable structures has reached untold
      superiority. You gain the following benefits:</p>

      <ul>

      <li>You can have two structures active at a time, instead of only one, as
      you learn to more efficiently use your portable structure.</li>

      <li>Your structures no longer take double damage from the siege
      property.</li>

      <li>Your structures no longer automatically fail Strength, Dexterity, and
      Constitution saving throws. Instead, your structure adds your proficiency
      bonus to the [[/r d20]] roll when it makes one of these saving
      throws.</li></ul>
