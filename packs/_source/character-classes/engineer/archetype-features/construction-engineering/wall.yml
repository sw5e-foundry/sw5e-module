system:
  description:
    value: >-
      <p>You deploy a wall up to 30 feet long, 10 feet high, and 3 feet thick,
      or a ringed wall up to 10 feet in diameter, 10 feet high, and 3 feet
      thick. The wall features ramparts deep enough to support creatures of
      Medium size or smaller, and provides one-quarter cover to any creature on
      its ramparts. The wall includes a ladder on the side of your choice. You
      choose whether the wall contains any openings otherwise. Any openings
      chosen in this way can be seen through on both sides. The wall can be
      climbed, but requires a Strength (Athletics) check against your tech save
      DC for any creature without a climbing speed. A creature can only make
      this check once per turn. </p>

      <p>When you reach 11th level, the wall can deploy up to 45 feet long and
      15 feet high, or a ringed wall up to 15 feet in diameter and 15 feet high.
      Additionally, the wall now provides half cover to any creature on its
      ramparts. When you reach 17th level, the wall can deploy up to 60 feet
      long and 20 feet high, or a ringed wall up to 20 feet in diameter and 20
      feet high. Additionally, the wall now provides three-quarters cover to any
      creature on its ramparts.</p>
