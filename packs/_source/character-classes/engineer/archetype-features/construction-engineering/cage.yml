system:
  description:
    value: >-
      <p>You create a cage that surrounds a cube up to 10 feet on each side
      centered on the target location. The cube is surrounded on all sides
      except the ground by 2-foot-thick walls. The walls and roof are completely
      opaque, and you choose whether the structure has a light source when you
      deploy it that provides bright light within the cube. Otherwise, the space
      within the cube is in complete darkness. The cage is permeable, allowing
      air, water, and sound to pass through it. You can attempt to trap
      unwilling Medium or smaller creatures inside the cage. When you deploy
      this structure in an unwilling creature's space, it must make a Dexterity
      saving throw against your tech save DC. On a successful save, it can
      immediately move to nearest unoccupied space outside of the cage.
      Otherwise, it is trapped within the structure when it is deployed. </p>

      <p>When you reach 11th level, the cage can extend up to 15 feet on each
      side, and it can trap creatures of Large size or smaller. When you reach
      17th level, the cage can extend up to 20 feet on each side, and it can
      trap creatures of Huge size or smaller.</p>
