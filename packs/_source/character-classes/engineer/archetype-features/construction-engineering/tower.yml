system:
  description:
    value: >-
      <p>You erect a tower from a 5-foot square platform centered on the target
      location that rises up to 30 feet. If the tower is created under a
      creature, that creature must succeed on a Dexterity saving throw or be
      lifted by the tower. A creature can choose to fail the save. The tower
      comes equipped with a ladder that reaches from the ground to the platform.
      </p>

      <p>When you reach 11th level, the tower's platform can extend 5 feet by 10
      feet and rise up to 40 feet. When you reach 17th level, the tower's
      platform can cover a 10-foot square, and rise up to 50 feet. Additionally,
      any creature on the tower's platform has advantage on Wisdom (Perception)
      checks that rely on sight.</p>
