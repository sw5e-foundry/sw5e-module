system:
  description:
    value: >-
      <p><em><strong>Armormech Engineering:</strong> 3rd level</em></p>

      <p>When you take damage, you can use your reaction and expend one use of
      your Potent Aptitude to absorb some of that damage. When you do so, the
      damage you take from the attack is reduced by the amount rolled on the die
      + your Intelligence modifier (minimum of +1). You must be wearing your
      modified armor or wielding your modified shield to gain this benefit.</p>
