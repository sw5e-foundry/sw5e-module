system:
  description:
    value: >-
      <p><em><strong>Artificer Engineering:</strong> 3rd level</em></p>

      <p>Once per round, when you hit a creature with your modified lightsaber,
      you can expend one use of your Potent Aptitude to deal an extra [[/r 2d6]]
      damage to that target. The damage is the same type as your modified
      lightsaber's damage.</p>

      <p>The damage increases when you reach certain levels in this class,
      increasing to [[/r 3d6]] at 5th level, [[/r 5d6]] at 11th level, and [[/r
      8d6]] at 17th level.</p>
