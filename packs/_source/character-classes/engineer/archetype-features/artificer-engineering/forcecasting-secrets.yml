  description:
    value: >-
      <p><em><strong>Artificer Engineering:</strong> 6th, 7th, 13th, and 17th
      level</em></p>

      <p>Your study of kyber crystals has awakened a latent force sensitivity.
      Choose two force powers of 1st level. The chosen powers count as tech
      powers for you, but are not included in the number in the Powers Known
      column of the engineer table.</p>

      <p>At 7th level, you learn two additional force powers of 1st or 2nd
      level. At 13th level, you learn two force powers of 1st-3rd level, and at
      17th level, you learn two force powers of 1st-4th level. Whenever you gain
      a level in this class, you can choose one of the force powers you know and
      replace it with another force power of the same level.</p>
