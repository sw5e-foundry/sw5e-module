  description:
    value: >-
      <p><strong><em>Cybertech Engineering:</em></strong><em> 3rd level</em>
      </p>

      <p>You can expend uses of your Potent Aptitude to gain additional tech
      points, or expend tech points to gain additional Potent Aptitude uses.
      </p>

      <p><em>Creating Tech Points.</em> You can transform a single use of Potent
      Aptitude into two tech points as a bonus action on your turn.  These
      additional tech points can exceed your maximum. Any tech points you create
      with this feature vanish when you finish a short rest.</p>

      <p><em>Creating Potent Aptitude.</em> As a bonus action on your turn, you
      can expend two tech points to gain a single use of your Potent
      Aptitude.</p>
