    value: >-
      <p><em><strong>Cybertech Engineering:</strong> 6th, 9th, 13th, and 17th
      level</em></p>

      <p>When you cast a tech power of 1st level or higher, you can choose to
      deal additional damage or provide additional healing with that power. The
      additional damage or healing equals half your engineer level.</p>

      <p>You can use this feature three times. You gain an additional use at
      9th, 13th, and 17th level. You regain all expended uses when you complete
      a long rest.</p>
