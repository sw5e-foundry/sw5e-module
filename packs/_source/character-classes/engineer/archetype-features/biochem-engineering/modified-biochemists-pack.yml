system:
  description:
    value: >-
      <p><em><strong>Biochem Engineering:</strong> 3rd level</em></p>

      <p>You learn to modify and combine your biochemist's kit and poisoner's
      kit, creating a mobile laboratory using your chemistry expertise. Over the
      course of a long rest, you can create your modified biochemist's pack. You
      must have a biochemist's kit, a poisoner's kit, and materials in order to
      perform this modification.</p>

      <p>Your biochemist's pack is enhanced, requires attunement, can only be
      used by you, and counts as a tech focus for your tech powers while you are
      attuned to it. Your modified biochemist's pack has 4 modification slots,
      and it gains more at higher levels, as shown in the Modification Slots
      column of the engineer table. For each modification installed in excess of
      your proficiency bonus, your tech point maximum is reduced by 1. Over the
      course of a long rest, you can install, replace, or remove a number of
      modifications up to your Intelligence modifier (minimum of one).</p>

      <p>Some modification effects require saving throws. When you use such an
      effect from this class, the DC equals your tech save DC.</p>

      <p>Your modified biochemist's pack comes equipped with a chemical
      distribution system, complete with three chemical mixtures: corrosive,
      invigorating, and noxious. As an action, you can activate your distributor
      and target a creature within 30 feet, with an effect determined by the
      mixture.</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.9eigvr3eDzFroJA6]{Corrosive
      Mixture}</h3>

      <p>Your distributor emits a burst of acid. The target must make a
      Dexterity sav-ing throw. On a failed save, a creature takes [[/r 1d6]] +
      your Intelligence modifier acid damage. This mixture's damage increases by
      [[/r 1d6]] when you reach 5th level ([[/r 2d6]]), 11th level ([[/r 3d6]]),
      and 17th level ([[/r 4d6]]).</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.VxN7BdfTkAlck9Sx]{Invigorating
      Mixture}</h3>

      <p>Your distributor emits a bolt of kolto. The target gains [[/r 1d6]] +
      your Intelligence modifier temporary hit points, which last until the end
      of your next turn. The temporary hit points granted by this mixture
      increases by [[/r 1d6]] when you reach 5th level ([[/r 2d6]]), 11th level
      ([[/r 3d6]]), and 17th level ([[/r 4d6]]).</p>

      <h3>@UUID[Compendium.sw5e-module.character-classes.Item.MtUsOc7DCG7bD2Lh]{Noxious
      Mixture}</h3>

      <p>Your distributor emits a cloud of poison. The target must make a
      Constitution saving throw. On a failed save, a creature takes [[/r 1d6]] +
      your Intelligence modifier poison damage. This mixture's damage increases
      by [[/r 1d6]] when you reach 5th level ([[/r 2d6]]), 11th level ([[/r
      3d6]]), and 17th level ([[/r 4d6]]).</p>
    chat: ''
