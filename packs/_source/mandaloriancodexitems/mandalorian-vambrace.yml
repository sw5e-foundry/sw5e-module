  description:
    value: "<p><em><strong>Weapon\_(wrist launcher),\_advanced</strong></em><br /><em><strong>Requires Attunement</strong></em></p>\n<p>You gain a +1 bonus to attack and damage rolls with this enhanced weapon and its reload value increases by 3, to 4. It can have different ammunition types loaded simultaneously, and you can choose which ammunition you're using as you fire it (no action required).</p>\n<p>These vambraces have 5 charges. While wearing and attuned to them, you can use an action or a reaction to expend 0 or more of its charges to activate one of the following powers or effects, using +8 on tech attack rolls and a tech save DC of 16. A tech caster can use their own bonus to tech attack rolls and tech save DC.</p>\n<p><strong>Powers:</strong>\_wire line (0 charges), energy shield (1 charges), greater energy shield (2 charges), or wire tow (2 charges).</p>\n<p><strong>Repulsor:</strong>\_(1 charge), You can use this feature as an action on a creature within melee range or as a reaction, which you take when you are hit by a melee attack, to activate this repulsor. A creature must make a DC 16 Strength saving throw. On a failed save, the creature takes 1d4 kinetic damage and if the creature is Medium or smaller, it is pushed up to 10 feet away from you.</p>\n<p>The vambrace regains 1d3 + 2 expended charges after a long rest.</p>\n<h3>Mandalorian Vestments:</h3>\n<p>While you are attuned to and wearing two or more enhanced items that have this named property, you gain additional properties as shown on page 20 under Mandalorian Vestments. @UUID[Compendium.sw5e-module.mandaloriancodexjournals.JournalEntry.PrU2omVMmPqOwOLZ]{Mandalorian Vestments}</p>"
