  description:
    value: "<p><em><strong>Weapon\_(Vibrospear),\_prototype</strong></em><br /><em><strong>Requires Attunement</strong></em></p>\n<p>You gain a +1 bonus to attack and damage rolls with this enhanced weapon, and when you hit a creature with a melee weapon attack using this weapon, it deals an extra 1d4 kinetic damage.</p>\n<p>This weapon gains the Defensive 1 property. Additionally, if an attack would be made against you using a lightweapon while you have the AC bonus granted by this weapons defensive property, the bonus granted increases by 1 for the attack.</p>\n<p><em>The staff was made of pure beskar, a metal alloy tied with Mandalorian culture. The staff was durable enough to be able to block and deflect lightsaber blows.</em></p>"
