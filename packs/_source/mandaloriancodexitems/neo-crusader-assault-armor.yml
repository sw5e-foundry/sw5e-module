system:
  description:
    value: "<p><em><strong>Requires Attunement</strong></em></p>\n<p>This armor comes equipped with 24 slots that can each hold a single item that weighs less than 2 lb. Additionally, it grants Resistance to\_cold\_and\_fire\_damage and grants a +1 bonus to AC.</p>\n<p>Mandalorian Vestments: Armor.\_While wearing and attuned to this armor and a\_mandalorian helmet, you are able to survive and operate in zero gravity space and other dangerous conditions. Additionally, this armor now grants a +2 bonus to AC, instead of +1. While wearing and attuned to this armor, a\_mandalorian helmet, and\_mandalorian gear, this armor now grants a +3 bonus to AC, instead of +2.</p>\n<p><em>This was the armor of the Mandalorian elite frontline troops, a sight that Republic soldiers were all too familiar with during the war</em></p>"
