system:
  description:
    value: >-
      <p>You have a +1 bonus to AC while wielding this enhanced shield and you
      gain a +1 bonus to attack and damage rolls to attacks made with this
      enhanced shield. You can use a bonus action to make a melee weapon attack
      against a creature within 5 feet of you with the shield. On a hit, the
      creature takes 1d6 slashing damage.</p>

      <p><em>This shield, crafted from beskar iron, could be used for defense
      and offense alike, allowing the wielder to strike their opponent or cut
      them with edges that have been honed to a razor sharpness.</em></p>
