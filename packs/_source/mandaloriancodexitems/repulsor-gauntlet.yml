system:
  description:
    value: "<p><em><strong>Adventuring Gear,\_standard</strong></em></p>\n<p>The gauntlet has 5 charges. While wearing it, you can use an action it on a creature within melee range or reaction, which you can take when you are hit by a melee attack, to expend 1 of its charges to activate it. A creature must make a DC 13 Strength saving throw. On a failed save, the creature takes 1d4 kinetic damage and if the creature is Medium or smaller, it is pushed up to 10 feet away from you.</p>\n<p>The gauntlet regains 1d4 + 1 expended charges after a long rest.</p>\n<p><em>Weaponized repulser technology that creates shockwaves capable of repelling enemies</em></p>"
