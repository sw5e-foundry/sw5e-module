system:
  description:
    value: >-
      <p>You gain a +3 bonus to attack and damage rolls made with this enhanced
      weapon, and when you hit a creature with a weapon attack using this
      weapon, the creature takes an extra 1d12 lightning damage. Additionally
      its brutal number increases by 2 and it gains the reach property</p>

      <p>You also have advantage on Charisma (Persuasion) checks made against
      Mandalorians.</p>

      <p><em>A powerful weapon created and wielded by an ancient Mandalorian
      leader. Based on the traditional design of the mythosaur-bone axes crafted
      on Mandalore, this modern variation is longer and forged from the hull of
      a fallen capital ship and the fabled metal cortosis. It incorporates an
      internal energy cell that imbues the axe with a potent electrical field,
      doubling its lethality.</em></p>
