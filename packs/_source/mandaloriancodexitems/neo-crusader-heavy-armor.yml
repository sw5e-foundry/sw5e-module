  description:
    value: "<p><em><strong>Requires Attunement</strong></em></p>\n<p>This armor comes equipped with 24 slots that can each hold a single item that weighs less than 2 lb. Additionally, it grants advantage on saving throws to be stunned or paralyzed.</p>\n<p>Mandalorian Vestments: Armor.\_While wearing and attuned to this armor and a\_mandalorian helmet, you are able to survive and operate in zero gravity space and other dangerous conditions. Additionally, this armor now grants a +1 bonus to AC. While wearing and attuned to this armor,\_mandalorian helmet, and\_mandalorian gear, this armor now grants a +2 bonus to AC, instead of +1.</p>\n<p><em>This armor is reserved for respected veteran Mandalorians. Immensely sturdy, stabilizers diffuse energy throughout the frame, shielding the wearer from disorienting impacts.</em></p>"
