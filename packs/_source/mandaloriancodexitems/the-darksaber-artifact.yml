    value: "<p><em><strong>Weapon\_(lightkatana),\_artifact</strong></em><br /><em><strong>Requires Attunement</strong></em></p>\n<p>You gain a +3 bonus to attack and damage rolls made with this enhanced weapon. Additionally, the weapon gains the finesse property and ignores resistance to energy damage.</p>\n<p>While attuned to and wielding The Darksaber, you gain the following benefits:</p>\n<p>You have proficiency with the Darksaber</p>\n<p>When you attack a creature that has at least one head with this weapon and roll a 20 on the attack roll, you cut off one of the creature's heads. The creature dies if it can't survive without the lost head. A creature is immune to this effect if it is immune to energy damage, doesn't have or need a head, has legendary actions or villain status, or the GM decides that the creature is too big for its head to be cut off with this weapon. Such a creature instead takes an extra 6d6 energy damage from the hit.</p>\n<p><strong>Symbol of the Manda'lor:</strong>\_You have advantage on Charisma (persuasion) checks against Mandalorians</p>\n<p><strong>Deflection:</strong>\_In response to being hit by a ranged attack, you can use a reaction to reduce the damage you take from the attack by 3d6.</p>\n<p><strong>Charges:</strong>\_The Darksaber has 10 charges for the following properties, and regains 1d6+4 charges at the end of a long rest. You gain the following actions:</p>\n<p><strong>Spark of the Force:</strong>\_By expending three charges as an action, you can hone your emotions to a heightened state. The Darksaber deals an additional 1d8 plus your Charisma or Wisdom modifier in lighting damage for the next minute.</p>\n<p><strong>Magnetic Parry:</strong>\_As a bonus action, You may expend one charge to prepare yourself for combat against lightsabers. Until the start of your next turn, all attacks made against you with lightweapons are at disadvantage as you use the Darksaber's unique nature against these weapons.</p>\n<p><em>The Darksaber was an ancient and unique black-bladed lightsaber created by Tarre Vizsla, the first Mandalorian ever inducted into the Jedi Order. It features a distinctly Mandalorian hilt and an ominous black blade.</em></p>\n<section id=\"the-darksaber-attunement-condition\">\n<h4 id=\"the-darksaber-attunement-condition\">ATTUNEMENT CONDITION</h4>\n<p>The Darksaber is traditionally in the possession of a Mandalorian warrior and is treasured amongst the many clans of Mandalore. To truly be a wielder of this artifact, one must follow the customs of these battle hardened people. This is done by challenging the current wielder to a duel, often times to the death. Other than there being no interference, there is no other rules either combatant must contend themselves to, though this depends on the warrior. If successful in beating the current wielder of the Darksaber, the recipient of the blade is considered its rightful owner.</p>\n<p>Should the blade be claimed in any other way, the user may attune to it, but they cannot use the\_Symbol of The Manda'lor\_feature, and the charges granted by the blade, as well risk being challenged by Mandalorian warriors who seek to reclaim their 'stolen' heritage.</p>\n</section>"
