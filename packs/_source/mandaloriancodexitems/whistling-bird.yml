  description:
    value: "<p>A wrist launcher loaded with this ammunition locks on to one or more targets within range and expels a series of three small explosives. Each explosive hits a creature of your choice that you can see within normal range. An explosive deals 1d4 + 1 fire damage to its target. The explosives all strike simultaneously, and you can direct them to hit one creature or several.<br />These explosives are affected by the\_Countermeasures\_tech power as if they are the\_homing rockets\_tech power.</p>\n<p><em>Named for the whistling noise they make, these tiny darts home in on their targets before exploding.</em></p>"
