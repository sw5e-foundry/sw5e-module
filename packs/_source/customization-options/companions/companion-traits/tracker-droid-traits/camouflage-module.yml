system:
  description:
    value: >-
      <p>You install a camouflage module in your companion. Your companion can
      activate its camouflage module to become invisible. While it is invisible,
      anything it is carrying or wearing is also invisible. It becomes visible
      if it attacks, casts a power, takes a hostile action, or when it
      deactivates the module. Activating or deactivating the module requires an
      action.</p>

      <p>Deduct the time your companion is invisible, in increments of 1 minute,
      from the module's maximum duration of 2 hours. After 2 hours of use, the
      module ceases to function. For every uninterrupted period of 12 hours the
      module goes unused, it regains 1 hour of use.</p>
