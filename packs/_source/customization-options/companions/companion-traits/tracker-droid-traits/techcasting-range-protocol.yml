  description:
    value: >-
      <p>You can cast tech powers with a range of 5 feet or greater through your
      companion while interfaced with it, but your companion must be within 5
      feet of the target of the power. This increases to 10 feet at 5th level,
      20 feet at 9th level, 30 feet at 13th level, 60 feet at 17th level, and
      120 feet at 20th level.</p>
