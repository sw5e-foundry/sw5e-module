system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> 9th level</em></p><p>Your companion
      gets an integrated scomp link which it can use to interface with
      computers. While interfaced, when you or your companion makes an
      Intelligence (slicer's kit) check, you can choose to reroll the check. You
      must use the new roll. You can wait until after you roll the d20 before
      deciding to use this feature, but you must decide before the GM says
      whether the check succeeds or fails.</p>
