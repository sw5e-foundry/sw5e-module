system:
  description:
    value: >-
      <p>You add an overwatch suite to your companion. When you cast the alarm
      tech power, you can choose to have your companion notified when the alarm
      is triggered. If you do so, when the alarm is triggered, your companion
      immediately makes a number of weapon attacks against the triggering
      creature up to your companion's proficiency bonus. If multiple creatures
      trigger the alarm simultaneously, your companion targets each creature
      randomly.</p>
