system:
  description:
    value: >-
      <p>You can preload your companion's blaster with additional ammunition.
      You can preload two additional power cells, or you can replace each power
      cell with 20 slug cartridges. Once on each of your turns, you can reload
      your companion without using an action. Once you've expended the preloaded
      ammunition, you can't reload your companion's blaster in this way again
      until you reload it with an action.</p>
