system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> 5th level</em></p><p>As an action,
      you can reduce your companion's speed and have it create a barrier that
      surrounds in a radius depending on its size. A Small turret's speed is
      reduced to 10 feet and has a 5-foot radius, a Medium turret's speed is
      reduced to 5 feet and has a 10-foot radius, and a Large turret's speed is
      to reduce to 0 and has a 15-foot radius. While active, when damage is
      dealt by a tech power originating from inside the barrier against a target
      outside the barrier, that tech power gains a bonus to damage equal to half
      your Intelligence modifier (rounded up).</p><p>This barrier lasts for 1
      minute. You can end it early as a bonus action on your turn. Once you've
      used this feature, you must complete a short or long rest before you can
      use it again.</p>
