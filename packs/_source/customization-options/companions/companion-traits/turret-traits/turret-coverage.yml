system:
  description:
    value: >-
      <p>As an action, you can have your companion anchor itself to the ground
      or recover itself. While anchored, its speed is reduce to 0, it has
      resistance to energy and kinetic damage, and it provides cover to
      creatures within 5 feet of it, depending on its size. A Small turret
      provides one-quarter cover, a Medium turret provides half cover, and a
      Large turret provides three-quarters cover. If an attack would miss a
      creature by an amount less than or equal to the bonus to AC granted by
      your companion's cover, and the attack would hit your companion, your
      companion instead takes the attack's damage.</p>
