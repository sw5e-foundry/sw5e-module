system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> 9th level,
      @UUID[Compendium.sw5e-module.customization-options.Item.c5ctnvLhnDVXRWV4]{Class
      I Droid}</em></p><p>Your companion can analyze a target, develop a plan on
      how to best overcome any potential obstacle, and execute that plan with
      ruthless efficiency. As a bonus action on your companion's turn, your
      companion can analyze a target it can see within 60 feet of it. For the
      next minute, or until it analyzes another target, it gains the following
      benefits:</p><ul><li><p>When it analyzes a hostile creature, its attack
      and damage rolls made with weapons with the finesse property or blaster
      weapons against that target may use its Intelligence modifier instead of
      Strength or Dexterity.</p></li><li><p>When it analyzes a friendly
      creature, the target can end your companion's Analysis Protocol on them
      (no action required) to add half your companion's Intelligence modifier
      (rounded down, minimum of +1) to one attack roll, ability check, or saving
      throw. Once a friendly creature has benefited from this ability, they can
      not do so again until they complete a short or long rest.</p></li></ul>
