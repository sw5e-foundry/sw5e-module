system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> 9th level,
      @UUID[Compendium.sw5e-module.customization-options.Item.Fes74CVDBZDRkE25]{Class
      III Droid}</em></p><p>You modify your companion's charisma chip, granting
      the following benefits:</p><p>Your companion has advantage on Charisma
      (Performance) checks.</p><p>Your companion can also use its bonus action
      to motivate an ally within 30 feet of it. Until the start of your
      companion's next turn, the ally can add the droid's Charisma modifier
      (minimum of +1) to the first attack roll, ability check, or saving throw
      they make. Your companion can use this feature a number of time equal to
      its Charisma modifier, and it regains all expended uses after it completes
      a long rest.</p>
