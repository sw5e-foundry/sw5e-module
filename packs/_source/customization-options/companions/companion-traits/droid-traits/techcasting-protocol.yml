system:
  description:
    value: >-
      <p>Your companion learns one at-will tech power and one 1st-level tech
      power, which it can cast at its lowest level once per short rest. Your
      companion's techcasting ability is Intelligence. At-will powers chosen by
      your companion do not scale normally at higher levels. Instead, if they
      would scale at 5th level, they instead scale at 11th level, and if they
      would scale at 11th level, they instead scale at 17th level.</p>
