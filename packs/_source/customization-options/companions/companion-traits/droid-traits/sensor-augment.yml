system:
  description:
    value: >-
      <p>You augment your companion with an advanced sensor, granting the
      following benefits:</p><ul><li><p>Your companion has advantage on Wisdom
      (Perception) and Intelligence (Investigation) checks made to detect the
      presence of secret doors.</p></li><li><p>Your companion has advantage on
      saving throws made to avoid or resist traps.</p></li><li><p>Your companion
      has resistance to the damage dealt by traps.</p></li><li><p>Your companion
      can search for traps while traveling at a normal pace, instead of only at
      a slow pace.</p></li></ul>
