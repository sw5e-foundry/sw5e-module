system:
  description:
    value: >-
      <p>You install a flamethrower in your companion. The flamethrower has 1
      charge. As an action, your companion can cast the jet of flame tech power,
      though it does not scale with higher levels, or use 1 charge to cast the
      flame sweep tech power at 1st level. The saving throw is made against your
      companion's tech save DC (8 + your companion's proficiency bonus + your
      companion's Intelligence modifier).</p><p>You can choose this trait
      multiple times. Each time you do so, the flamethrower gains another
      charge, to a maximum of 3. If the flamethrower has multiple charges, you
      can use multiple charges to cast flame sweep at a higher level, 1 point
      per charge. The flamethrower regains all expended charges after a long
      rest.</p>
