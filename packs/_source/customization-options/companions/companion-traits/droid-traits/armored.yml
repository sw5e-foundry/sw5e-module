    value: >-
      <p><em><strong>Prerequisite:
      </strong>@UUID[Compendium.sw5e-module.customization-options.Item.UFZfmScdSsNhAqZU]{Class
      IV Droid}</em></p><p>Your droid has proficiency in light armor. If it
      would already have proficiency in light armor, it instead has proficiency
      in medium armor. If it would already have proficiency in light and medium
      armor, it instead has proficiency in heavy armor. If it would already have
      proficiency in all armor, it instead has proficiency in a skill or tool of
      your choice.</p><section class="secret"
      id="secret-AM6oTtdpq5dr6gy5"><p><strong>Foundry Note</strong></p><p>If you
