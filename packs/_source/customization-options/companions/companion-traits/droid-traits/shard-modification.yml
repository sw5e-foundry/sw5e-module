system:
  description:
    value: >-
      <p>You specially modify your companion to house a shard. Shards are
      sentient crystals native to the planet Orax, roughly a foot in length,
      that communicate with each other through pulses of light. While inhabiting
      a specialized droid host, shards are able to overcome the droid's
      inability to wield the Force, granting the following
      benefits:</p><ul><li><p>Your companion loses the Force Insensitive
      trait.</p></li><li><p>Your companion can cast the sense force force power
      once per day. Wisdom or Charisma (your choice) is your companion's
      forcecasting ability for this power.</p></li></ul>
