system:
  description:
    value: >-
      <p>You install a stun ray in your companion. The stun ray has 1 charge. As
      an action, your companion can use 1 charge to cast the hold droid or
      paralyze humanoid tech power. The saving throw is made against your
      companion's tech save DC (8 + your companion's proficiency bonus + your
      companion's Intelligence modifier).</p><p>You can choose this trait
      multiple times. Each time you do so, the stun ray gains another charge, to
      a maximum of 3. The stun ray regains all expended charges after a long
      rest.</p>
