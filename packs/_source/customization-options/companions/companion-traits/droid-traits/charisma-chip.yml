  description:
    value: >-
      <p><em><strong>Prerequisite:</strong>
      @UUID[Compendium.sw5e-module.customization-options.Item.Fes74CVDBZDRkE25]{Class
      III Droid}</em></p><p>You install a charisma chip in your companion. When
      an ally your companion can see makes an ability check, attack roll, or
      saving throw, your companion can use its reaction to give them advantage
      on the roll. It can do so before or after they roll the d20, but before
      the GM says the roll succeeds or fails. Once your companion uses this
      ability, it can't use it again until it finishes a short or long rest.</p>
