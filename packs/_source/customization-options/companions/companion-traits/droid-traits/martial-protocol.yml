system:
  description:
    value: >-
      <p><em><strong>Prerequisite:</strong> 9th level,
      @UUID[Compendium.sw5e-module.customization-options.Item.UFZfmScdSsNhAqZU]{Class
      IV Droid}</em></p><p>Your companion has martial training that allows it to
      perform special combat maneuvers. It gains the following
      benefits:</p><ul><li><p>It learns two maneuvers of your choice from among
      those available to the fighter class. If a maneuver it uses requires its
      target to make a saving throw to resist the maneuver's effects, the saving
      throw DC equals 8 + your companion's proficiency bonus + your companion's
      Strength or Dexterity modifier (your choice).</p></li><li><p>Your
      companion has two superiority dice, which are d4s. These dice are used to
      fuel its maneuvers. A superiority die is expended when your companion uses
      it. It regain all of its expended superiority dice when it finishes a
      short or long rest.</p></li></ul>
