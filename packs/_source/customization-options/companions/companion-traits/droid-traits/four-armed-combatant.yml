    value: >-
      <p><em><strong>Prerequisite:</strong>
      @UUID[Compendium.sw5e-module.customization-options.Item.UFZfmScdSsNhAqZU]{Class
      IV Droid}</em></p><p>You install two additional arms to improve your
      companion's combat capabilities, granting it four arms which it can use
      independently of one another. Your companion can only gain the benefit of
      items held by two of its arms at any given time, and once per round your
      companion can switch which arms it is benefiting from (no action
      required).</p><p>While your companion has at least 3 arms free, it has a
      climbing speed equal to its walking speed.</p>
