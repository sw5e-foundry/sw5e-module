system:
  description:
    value: >-
      <p>You enhance your companion's durability, granting the following
      benefits:</p><ul><li><p>When your companion rolls a Hit Die to regain hit
      points, the minimum number of hit points your companion can regain from
      the roll equals twice your companion's Constitution modifier (minimum of
      2).</p></li><li><p>Your companion's hit point maximum increases by an
      amount equal to twice its level when you install this protocol. Whenever
      your companion gains a level thereafter, its hit point maximum increases
      by an additional 2 hit points.</p></li></ul>
