system:
  description:
    value: >-
      <p>Your companion can use its pheromones to influence individuals of both
      sexes. Whenever your companion rolls a 1 on a Charisma (Persuasion) check,
      it can reroll the die and must use the new roll. Additionally, once per
      short or long rest, your companion can treat a d20 roll of 9 or lower on a
      Charisma check as a 10. This feature has no effect on droids or
      constructs.</p>
