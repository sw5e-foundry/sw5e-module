system:
  description:
    value: >-
      <p><em><strong>Prerequisite: </strong>Strength 13, size
      Tiny</em></p><p>Despite falling below knee height of other species, your
      companion's size has less impact on its strength and virility. Your
      companion gains the following benefits:</p><ul><li><p>Your companion's
      speed increases by 5 feet</p></li><li><p>Your companion loses the
      Pintsized trait, and it is no longer limited to +3 when determining its
      bonus to attack and damage rolls for weapon attacks using Strength due to
      the Puny trait.</p></li><li><p>Your companion gains the Undersized trait:
      Undersized. Your companion's small stature makes it hard for it to wield
      bigger weapons. It can't use heavy shields or martial weapons with the
      two-handed property unless it has the light property, and if a martial
      weapon has the versatile property, your companion can only wield it in two
      hands.</p></li></ul>
