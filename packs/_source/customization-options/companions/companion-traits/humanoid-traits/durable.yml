system:
  description:
    value: >-
      <p>Hardy and resilient, your companion gains the following benefits:</p>

      <ul>

      <li>When your companion rolls a Hit Die to regain hit points, the minimum
      number of hit points your companion can regain from the roll equals twice
      your companion's Constitution modifier (minimum of 2).</li>

      <li>Your companion's hit point maximum increases by an amount equal to
      twice its level when it chooses this trait. Whenever your companion gains
      a level thereafter, its hit point maximum increases by an additional 2 hit
      points.</li>

      </ul>
