system:
  description:
    value: >-
      <p>When your companion or a creature it can see that can see and
      understand it makes an ability check, attack roll, or saving throw, your
      companion can roll a d4 and add it to their roll (no action required). It
      can use this before or after the roll, but before the GM determines the
      roll's outcome. Once your companion has used this feature, it must
      complete a short or long rest before it can use it again.</p>
