system:
  description:
    value: >-
      <p>Your companion gains proficiency with all blasters, lightweapons, and
      vibroweapons. If your companion is already proficient with all blasters,
      lightweapons or vibroweapons, instead once per turn when it rolls damage
      for a weapon attack using a weapon from a category in which it is
      proficient with all weapons, it can reroll the weapon's damage dice and
      use either total.</p>
