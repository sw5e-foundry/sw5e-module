  description:
    value: >-
      <p><em><strong>Prerequisite: </strong>5th level</em></p><p>As an action on
      its turn, your companion can cower pathetically to distract nearby foes.
      Until the end of its next turn, your companion's allies gain advantage on
      attack rolls against enemies within 10 feet of it that can see
      it.</p><ul><li><p>Once your companion has used this trait, it can't use it
      again until it finishes a short or long rest.</p></li></ul>
