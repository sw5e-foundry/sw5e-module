system:
  description:
    value: >-
      <p>Your companion learns one at-will force power and one 1st-level force
      power. If it does not have a class that knows Force powers, it can cast
      these powers at their lowest level once per long rest. Your companion's
      forcecasting ability is Wisdom or Charisma (depending on power alignment).
      At-will powers chosen by your companion do not scale normally at higher
      levels. Instead, if they would scale at 5th level, they instead scale at
      11th level, and if they would scale at 11th level, they instead scale at
      17th level.</p>
