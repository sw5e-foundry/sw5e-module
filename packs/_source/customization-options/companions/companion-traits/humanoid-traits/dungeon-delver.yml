system:
  description:
    value: >-
      <p>Alert to the hidden traps and secret doors found in many dungeons, your
      companion gains the following benefits:</p>

      <ul>

      <li>Your companion has advantage on Wisdom (Perception) and Intelligence
      (Investigation) checks made to detect the presence of secret doors.</li>

      <li>Your companion has advantage on saving throws made to avoid or resist
      traps.</li>

      <li>Your companion has resistance to the damage dealt by traps.</li>

      <li>Your companion can search for traps while traveling at a normal pace,
      instead of only at a slow pace.</li>

      </ul>
