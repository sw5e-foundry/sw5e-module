system:
  description:
    value: >-
      <p>If your companion moves at least half its speed straight toward a
      creature and hits it with a melee attack, the creature must make a
      Strength saving throw (DC = 8 + your companion's proficiency bonus + its
      Strength modifier). If the creature is larger than your companion, it
      makes this save with advantage. On a failed save, the creature is knocked
      prone, and your companion can make one additional attack against it as a
      bonus action.</p>
