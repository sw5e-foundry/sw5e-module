  description:
    value: "<h2>SENTINEL</h2><p>In order to become a sentinel, your companion must have a Dexterity, Wisdom, or Charisma score of 13 or higher.</p><p>As a sentinel, your companion gains the following class features.</p><h4>PROFICIENCIES</h4><hr /><ul><li>Armor:\_Light armor</li><li>Weapons:\_Simple vibroweapons, simple lightweapons, chakram, doubleblade, doublesaber, doubleshoto, doublesword, hidden blade, lightfoil, light ring, saberwhip, vibrorapier, vibrowhip</li><li>Tools:\_One specialist's kit of your choice</li></ul><hr /><ul><li>Saving Throws:\_Dexterity, Charisma</li><li>Skills:\_Choose three from Acrobatics, Animal Handling, Insight, Intimidation, Perception, Persuasion, Piloting, Stealth, and Technology</li></ul>"
