system:
  description:
    value: >-
      <p>At 7th level, your companion's training allows it to harness the mystic
      energy of focus. Its access to this energy is represented by a number of
      focus points. Your companion has three focus points. It gains an
      additional focus point at 9th, 13th, and 17th level.</p><p>Your companion
      can spend these points to fuel various focus features. Your companion
      knows three such features: Flurry of Blows, Patient Defense, and Step of
      the
      Wind.</p><ul><li><p>@UUID[Compendium.sw5e-module.customization-options.Item.PeXIYcaFVOovJZCy]{Flurry
      of
      Blows}</p></li><li><p>@UUID[Compendium.sw5e-module.customization-options.Item.iHSdbjzVtKkbKg3Y]{Patient
      Defense}</p></li><li><p>@UUID[Compendium.sw5e-module.customization-options.Item.pEEtrfPLrRFe0i8B]{Step
      of the Wind}</p></li></ul><p>When your companion spends a focus point, it
      is unavailable until your companion finishes a short or long rest, at the
      end of which it draws all of its expended focus back into itself. Your
      companion must spend at least 30 minutes of the rest meditating to regain
      its focus points.</p><p>Some of your companion's focus features require
      your target to make a saving throw to resist the feature's effects. The
      saving throw DC is calculated as follows:</p><hr /><p><span
      style="font-family:'Open Sans', sans-serif"><strong
      style="background-repeat:no-repeat;box-sizing:inherit;padding:0px;margin:0px;font-weight:bolder">Focus
      save DC</strong> = 8 + your proficiency bonus + your Wisdom or Charisma
      modifier (your choice)</span></p><hr
      style="background-repeat:no-repeat;box-sizing:inherit;padding:0px;margin:0px;overflow:visible;height:0px;visibility:hidden;color:rgb(255,
      255, 255);font-family:'Open Sans',
      sans-serif;font-size:16px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:left;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;background-color:rgb(18,
      18,
      18);text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"
      />
