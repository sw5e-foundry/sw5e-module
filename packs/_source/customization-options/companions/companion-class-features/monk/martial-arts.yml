system:
  description:
    value: >-
      <p>Beginning when your companion chooses this class at 3rd level, your
      companion's practice of martial arts gives it mastery of combat styles
      that use unarmed strikes and martial artist weapons, which are any simple
      vibroweapons that don't have the two-handed property.</p><p>Your companion
      gains the following benefits while it is unarmed or wielding only martial
      artist weapons and isn't wearing armor or wielding a
      shield:</p><ul><li>Your companion can use Dexterity instead of Strength
      for the attack and damage rolls of its unarmed strikes and martial artist
      weapons.</li><li>Your companion can roll a d4 in place of the normal
      damage of its unarmed strike or martial artist weapons. This die becomes a
      d6 at 7th level and a d8 at 15th level.</li><li>Your companion can use
      Dexterity instead of Strength whenever it would make a Strength
      (Athletics) check to grapple, shove, or trip a creature.</li><li>When your
      companion takes the Attack action with an unarmed strike or a martial
      artist weapon on your turn, it can make one unarmed strike as a bonus
      action.</li><li>Your companion can take the Dash and Disengage actions as
      a bonus action.</li></ul>
