system:
  description:
    value: >-
      <p>As of 18th level, your companion's rage can keep it fighting despite
      grievous wounds. If your companion drops to 0 hit points while it's raging
      and it doesn't die outright, it can make a DC 10 Constitution saving
      throw. If it succeeds, it drops to 1 hit point instead.</p><p>Each time it
      uses this feature after the first, the DC increases by 5. When it finishes
      a short or long rest, the DC resets to 10.</p>
