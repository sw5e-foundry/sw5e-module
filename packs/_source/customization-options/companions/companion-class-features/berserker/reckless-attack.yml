system:
  description:
    value: >-
      <p>Also at 3rd level, your companion can throw all concern for defense to
      attack with fierce desperation. When you make your first attack on your
      turn, you can decide to attack recklessly. Doing so gives you advantage on
      melee weapon attack rolls using Strength during this turn, but attack
      rolls against you have advantage until your next turn.</p><section
      id="secret-BJxI6H3adsf7wdWr" class="secret"><p><strong>Foundry
      Note</strong></p><p>This feature includes and Active Effect for tracking
      whether you are reckless or not but does not automate Advantage on your
      companion's attacks or attacks against it.</p></section>
