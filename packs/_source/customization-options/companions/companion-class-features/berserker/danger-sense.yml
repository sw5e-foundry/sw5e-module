system:
  description:
    value: >-
      <p>At 7th level, your companion gains an uncanny sense of when things
      nearby aren't as they should be, giving it an edge when it dodges away
      from danger.</p><p>Your companion has advantage on Dexterity saving throws
      against effects that it can see, such as traps and powers. To gain this
      benefit, it can't be blinded, deafened, or incapacitated.</p><section
      class="secret" id="secret-KwzpWoGHHyQh04X4"><p><strong>Foundry
      Note</strong></p><p>This feature automates the Advantage on Dexterity
      saving throws but is not automatically disabled when Incapacitated. It can
      be temporarily deactivated in the Effects tab.</p></section>
