system:
  description:
    value: >-
      <p>Beginning when your companion chooses this class at 3rd level, in
      battle, it fights with primal ferocity. On your companion's turns, it can
      enter a rage as a bonus action if it isn't wearing heavy
      armor.</p><p>While raging, your companion gains the following
      benefits:</p><ul><li><p>It has advantage on Strength checks and Strength
      saving throws.</p></li><li><p>When it makes a melee weapon attack using
      Strength, it gains a +2 bonus to the damage roll. This bonus increases to
      +3 at 11th level.</p></li><li><p>It has resistance to kinetic and energy
      damage.</p></li><li><p>If it is able to cast powers, it can't cast them or
      concentrate on them while raging.</p></li></ul><p>Your companion's rage
      lasts for 1 minute. It ends early if your companion is knocked
      unconscious, it dons heavy armor, or if its turn ends and it hasn't
      attacked a hostile creature or taken damage since its last turn. It can
      also end its rage on your turn as a bonus action.</p><p>Your companion can
      use this feature twice. It gains an additional use at 11th level. Your
      companion regains all expended uses when it finishes a long
      rest.</p><section class="secret"
      id="secret-ajxfxbDgbflYTdrW"><p><strong>Foundry Note</strong></p><p>This
      feature includes an Active Effect which automates the Resistance and
      additional damage. This feature will also automatically recharge your Rage
      uses on a Long Rest.</p></section>
