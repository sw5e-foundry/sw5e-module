system:
  description:
    value: >-
      <h4><strong>TECH POWERS KNOWN</strong></h4><p><span
      style="font-family:'Open Sans', sans-serif">Your companion learns two tech
      powers of its choice of no higher level than its Max </span>Power
      Level.</p><p>At-will powers chosen by your companion do not scale normally
      at higher levels. Instead, if they would scale at 5th level, they instead
      scale at 11th level, and if they would scale at 11th level, they instead
      scale at 17th level.</p><h4><strong>TECH POINTS</strong></h4><p><span
      style="font-family:'Open Sans', sans-serif">Your companion has a number of
      tech points equal to their scout level x 0.5, + their Intelligence
      modifier. They regain all expended tech points when they finish a short or
      long rest.</span></p><h4><strong>MAX POWER LEVEL</strong></h4><p>Your
      companion's Max Power Level is 1st.</p><h4><strong>TECHCASTING
      ABILITY</strong></h4><p><span style="font-family:'Open Sans',
      sans-serif">Intelligence is your companion's techcasting ability for its
      tech powers. It uses Intelligence whenever a power refers to its
      techcasting ability. Additionally, it use its Intelligence modifier when
      setting the saving throw DC for a tech power it casts and when making an
      attack roll with one.</span></p><hr /><p><span style="font-family:'Open
      Sans', sans-serif"><strong
      style="background-repeat:no-repeat;box-sizing:inherit;padding:0px;margin:0px;font-weight:bolder">Tech
      save DC</strong> = 8 + its proficiency bonus + its Intelligence
      modifier</span></p><hr /><p><span style="font-family:'Open Sans',
      sans-serif"><strong
      style="background-repeat:no-repeat;box-sizing:inherit;padding:0px;margin:0px;font-weight:bolder">Tech
      attack modifier</strong> = its proficiency bonus + its Intelligence
      modifier</span></p><h4><strong>TECHCASTING FOCUS</strong></h4><p><span
      style="font-family:'Open Sans', sans-serif">Your companion uses a wristpad
      (found in chapter 5 of the Player's Handbook) as a techcasting focus for
      its tech powers.</span></p><section class="secret"
      id="secret-hAKvwtyFmizrnl78"><p><strong>Foundry Note</strong></p><p>Tech
      Powers Known, At-will power scaling and power usage tracking is not yet
      automated for companions and must be manually tracked or adjusted as
      desired.</p></section>
