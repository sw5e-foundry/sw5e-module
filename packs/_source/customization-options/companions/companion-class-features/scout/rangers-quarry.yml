system:
  description:
    value: >-
      <p>Also at 3rd level, your companion learns how to effectively read and
      track its prey. Once on each of its turns, your companion can choose a
      creature it can see within 120 feet and mark it as its quarry (no action
      required). For the next hour, your companion gains the following
      benefits:</p><ul><li>Once per turn, when your companion hits the target
      with a weapon attack, it can deal 1d4 additional damage to it of the same
      type as the weapon's damage. This die increases to a d6 at 7th level and a
      d8 at 15th level.</li><li>Your companion has advantage on any Wisdom
      (Perception) or Wisdom (Survival) check it makes to find the target while
      it's on the same planet as your companion.</li></ul><p>Your companion can
      only have one creature marked in this way at a time. Beginning at 11th
      level, your companion can use its reaction to mark a creature when it
      enters its line of sight, provided it is within range of your companion's
      Ranger's Quarry.</p><p>The duration increases to 8 hours at 11th
      level.</p>
