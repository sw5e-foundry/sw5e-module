system:
  description:
    value: >-
      <p>At 15th level, your companion can take the Dash or Hide actions as a
      bonus action on each of its turns. Additionally, it can remain perfectly
      still for long periods of time to set up ambushes.</p><p>When your
      companion attempts to hide on its turn, it can opt to not move on that
      turn. If it avoids moving, creatures that attempt to detect it take a -10
      penalty to their Wisdom (Perception) checks until the start of your
      companion's next turn. Your companion loses this benefit if it moves or
      falls prone, either voluntarily or because of some external effect. It is
      still automatically detected if any effect or action causes it to no
      longer be hidden.</p><p>If your companion is still hidden on its next
      turn, it can continue to remain motionless and gain this benefit until it
      is detected.</p><p>Additionally, your companion can no longer be tracked
      by unenhanced means, unless it chooses to leave a trail.</p>
