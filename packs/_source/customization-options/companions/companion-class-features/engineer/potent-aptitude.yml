system:
  description:
    value: >-
      <p>Also at 3rd level, your companion's technological experience lends it
      an uncommon insight that it can use to bolster its allies. To do so, it
      uses a bonus action on its turn to choose one creature other than itself
      within 60 feet of it who can hear it. That creature gains one Potent
      Aptitude die, a d4. This die increases to a d6 at 7th level and a d8 at
      15th level.</p><p>Once within the next 10 minutes, the creature can roll
      the die and add the number rolled to one ability check, attack roll, or
      saving throw it makes. The creature can wait until after it rolls the d20
      before deciding to use the Potent Aptitude die, but must decide before the
      GM says whether the roll succeeds or fails. Once the Potent Aptitude die
      is rolled, it is lost.</p><p>A creature can have only one Potent Aptitude
      die at a time.</p><p>Your companion can use this feature once. It gains an
      additional use at 5th and 13th level. It regains any expended uses when it
      finishes a short or long rest.</p>
    chat: ''
