system:
  description:
    value: >-
      <p>Also at 3rd level, your companion knows how to channel the Force to
      create a unique effect. Your companion starts with its choice of one from
      two such effects: Cause Harm or Lend Aid.</p><p>Some Channel the Force
      effects require saving throws. When your companion uses such an effect
      from this class, the DC equals its universal force save
      DC.</p><p><strong><span style="text-decoration:underline">Your companion
      can use this feature a number of times equal to its Wisdom or Charisma
      modifier</span></strong> (your companion's choice, minimum of once). Your
      companion regains all expended uses when it finishes a short or long
      rest.</p><h4>CAUSE HARM</h4><p>As an action, your companion can expend a
      use of its Channel the Force to sap the life from a hostile creature it
      can see within 60 feet. That creature must make a constitution saving
      throw. On a failed save, the creature takes necrotic damage equal to your
      companion's level + its Charisma modifier (minimum of one), or half as
      much on a successful one.</p><h4>LEND AID</h4><p>As a bonus action, your
      companion can expend a use of Channel the Force and touch a beast or
      humanoid within 5 feet of it. That creature regains hit points equal to
      your companion's guardian level + its Wisdom modifier (minimum of one).
      Alternatively, if the beast or humanoid is poisoned or diseased, your
      companion neutralizes the poison or disease. If more than one poison or
      disease afflicts the target, your companion neutralizes one poison or
      disease that it knows is present, or it neutralizes one at random.</p>
