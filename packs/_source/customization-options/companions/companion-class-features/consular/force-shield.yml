system:
  description:
    value: >-
      <p><em><strong>Consular:</strong> 3nd level</em></p><p>Also at 3rd level,
      your companion learns how to defend itself purely through its strength
      with the Force. When your companion is hit by an attack, it can use its
      reaction to shroud itself in Force energy. Until the start of its next
      turn it has a bonus to AC equal to its Wisdom or Charisma modifier (your
      companion's choice, a minimum of +1). This includes the triggering
      attack.</p><p>Your companion can use this feature twice. It gains an
      additional use at 11th level. Your companion regains all expended uses
      when it finishes a long rest.</p>
