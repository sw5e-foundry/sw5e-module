system:
  description:
    value: >-
      <h4><strong>FORCE POWERS KNOWN</strong></h4><p>Your companion learns three
      force powers of its choice of no higher level than its Max Power Level. It
      may learn a force power at the same time it learns its
      prerequisite.</p><p>At-will powers chosen by your companion do not scale
      normally at higher levels. Instead, if they would scale at 5th level, they
      instead scale at 11th level, and if they would scale at 11th level, they
      instead scale at 17th level.</p><h4><strong>FORCE
      POINTS</strong></h4><p><span style="font-family:'Open Sans',
      sans-serif">Your companion does not require force points. Instead, it can
      only cast powers at 1st-level twice. It regains all expended uses after
      completing a long rest.</span></p><h4><strong>MAX POWER
      LEVEL</strong></h4><p><span style="font-family:'Open Sans',
      sans-serif">Your companion's Max Power Level is
      1st.</span></p><h4><strong>FORCECASTING ABILITY</strong></h4><p><span
      style="font-family:'Open Sans', sans-serif">Your companion's forcecasting
      ability varies based on the alignment of the powers you cast. It uses
      Wisdom for light side powers, Charisma for dark side powers, and Wisdom or
      Charisma for universal powers (its choice). It uses this ability score
      modifier whenever a power refers to its forcecasting ability.
      Additionally, it uses this ability score modifier when setting the saving
      throw DC for a force power it casts and when making an attack roll with
      one.</span></p><hr /><p><span style="font-family:'Open Sans',
      sans-serif"><strong
      style="background-repeat:no-repeat;box-sizing:inherit;padding:0px;margin:0px;font-weight:bolder">Force
      save DC</strong> = 8 + its proficiency bonus + its forcecasting ability
      modifier</span></p><hr /><p><span style="font-family:'Open Sans',
      sans-serif"><strong
      style="background-repeat:no-repeat;box-sizing:inherit;padding:0px;margin:0px;font-weight:bolder">Force
      attack modifier</strong> = its proficiency bonus + its forcecasting
      ability modifier</span></p><section class="secret"
      id="secret-KzSQIxqxyQQ5RyAT"><p><strong>Foundry Note</strong></p><p>Force
      Powers Known, At-will power scaling and power usage tracking is not yet
      automated for companions and must be manually tracked or adjusted as
      desired.</p></section>
