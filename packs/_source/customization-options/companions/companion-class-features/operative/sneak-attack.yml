system:
  description:
    value: >-
      <p>Beginning when your companion chooses this class at 3rd level, your
      companion knows how to strike subtly and exploit a foe's distraction. Once
      per turn, it can deal an extra 1d6 damage to one creature it hits with an
      attack if it has advantage on the attack roll. The attack must use a
      finesse or a ranged weapon.</p><p>Your companion doesn't need advantage on
      the attack roll if another enemy of the target is within 5 feet of it,
      that enemy isn't incapacitated, and your companion doesn't have
      disadvantage on the attack roll.</p><p>The amount of extra damage
      increases to 2d6 at 7th level, 3d6 at 11th level, 4d6 at 15th level, and
      5d6 at 17th level.</p><section id="secret-N3aQBzGp3Jsd2YEp"
      class="secret"><p>Foundry Note</p><p>Your companion's sneak attack damage
      will automatically sale as they level up. You can select the damage type
      in the damage roll's dialog box.</p></section>
