name: Companion Classes
type: feat
system:
  description:
    value: >-
      <p><span style="font-family:'Open Sans', sans-serif">When your companion
      reaches 3rd level, it can choose a class that determines how it focuses
      its training, which is detailed at the end of the follower's description.
      Your companion's class grants features at 3rd level, and again at 7th,
      11th, 15th, and 18th level.</span></p><h5><span
