system:
  description:
    value: >-
      <p>Beginning when your companion chooses this class at 3rd level, your
      companion has learned maneuvers that are fueled by special dice called
      superiority dice..</p><h3>Maneuvers Known</h3><p>Your companion learns two
      maneuvers of its choice. Many maneuvers enhance an attack in some way.
      Your companion can use only one maneuver per attack, and it may only use
      each maneuver once per turn.</p><p>Your companion learns an additional
      maneuver at 5th, 7th, 9th, 11th, 13th, 15th, and 17th level. each time
      your companion gains a level, it can also replace one maneuver it knows
      with a different one.</p><h3>Superiority Dice</h3><p>Your companion has
      two superiority dice, which are d4s. This die increases to a d6 at 9th
      level and a d8 at 17th level. A superiority die is expended when your
      companion uses it. Your companion regains all of its expended superiority
      dice when it finishes a short or long rest.</p><p>Your companion gains an
      additional superiority die at 5th, 9th, 13th, and 17th
      level.</p><h3>Maneuver Ability</h3><p>Your companion's maneuver ability
      varies based on the type of the maneuver it uses. It uses Strength,
      Dexterity, or Constitution for physical maneuvers (its choice);
      Intelligence, Wisdom, or Charisma for mental maneuvers (its choice); and
      an ability of its choice for general maneuvers. It uses this ability
      whenever a maneuver refers to its maneuver ability. Additionally, it uses
      this ability modifier when setting the saving throw DC for a maneuver it
      uses.</p><hr /><p><strong>Maneuver save DC</strong> = 8 + your proficiency
      bonus + your maneuver ability modifier</p><hr />
    chat: ''
