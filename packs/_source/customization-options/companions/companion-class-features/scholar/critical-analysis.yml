system:
  description:
    value: >-
      <p>Also at 3rd level, it is able to analyze a target, develop a plan on
      how to best overcome any potential obstacle, and execute that plan with
      ruthless efficiency. As a bonus action on its turn, your companion can
      analyze a target it can see within 60 feet of it. For the next 1 minute,
      or until your companion analyzes another target, it gains the following
      benefits:</p><ul><li><p>When your companion analyzes a hostile creature,
      its attack and damage rolls with weapons with the force property or
      blaster weapons against that target may use its Intelligence modifier
      instead of Strength or Dexterity.</p></li><li><p>When your companion
      analyzes a friendly creature, the target can end your companion's Critical
      analysis on them (no action required) to add your companions Intelligence
      modifier to one attack roll, ability check, or saving throw. Once a
      friendly creature has benefitted from this ability, they can not do so
      again until they complete a short or long rest.</p></li></ul>
