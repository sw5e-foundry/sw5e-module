system:
  description:
    value: >-
      <p>At 15th level, your companion can spend 1 minute spread its knowledge
      and experience, advising those around it. When it does so, your companion
      chooses a skill or tool it is proficient with and a number of friendly
      creatures up to its Intelligence modifier with 30 feet of it who can hear
      it and understand it. Once within the next hour, the next time each
      creature would make an ability check with the chosen skill or tool, they
      may add their proficiency bonus to the roll if they are not already
      proficient. A creature may only benefit from this feature once. If a
      creature is targeted by this feature again before using it, they can
      choose to retain the first benefit or replace it with the new skill or
      tool instead.</p><p>Once your companion has used this feature, it must
      complete a short or long rest before it can use it again.</p>
    chat: ''
