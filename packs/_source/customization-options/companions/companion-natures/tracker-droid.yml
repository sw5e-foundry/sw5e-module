system:
  description:
    value: "<h4>TRACKER DROID COMPANION</h4><p><em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br />Through fabrication of your own or purchase from a vendor, you gain the assistance of a tracker droid companion.</p><hr /><p>Your tracker droid takes a form of your choosing. Once you've selected your tracker droid's appearance, you assign your tracker droid's ability scores using a standard array (16, 14, 12, 10, 8, 6) as you see fit.</p><p></p><h3>TRACKER DROID FEATURES</h3><p>All tracker droids share the following traits.</p><h4>HIT POINTS</h4><hr /><ul><li>Hit Dice:\_1d4 per tracker droid companion level</li><li>Hit Points at 1st Level:\_4 + your tracker droid's Constitution modifier</li><li>Hit Points at Higher Levels:\_1d4 (or 3) + your tracker droid's Constitution modifier per tracker droid level after 1st</li></ul><h4>RESISTANCES AND VULNERABILITIES</h4><hr /><ul><li>Droid Resistances:\_Your tracker droid is resistant to necrotic, poison, and psychic damage, and immune to poison and disease.</li><li>Droid Vulnerabilities:\_Your tracker droid is vulnerable to ion damage. Additionally, your tracker droid has disadvantage on saving throws against effects that would deal ion or lightning damage.</li></ul><h4>PROFICIENCIES AND FEATURES</h4><hr /><ul><li>Skills:\_Two of your choice</li><li>Tools:\_One of your choice, which comes integrated into the droid</li><li>Languages:\_Tracker droids can speak, read, and write Binary. They can understand spoken and written Galactic Basic and one language of your choice, but can not speak it.</li><li>Size:\_Tiny</li><li>Speed:\_20 feet</li><li>Type:\_Droid</li><li>Armor Class:\_Your tracker droid's armor class equals 10 + its Dexterity modifier. Your tracker droid can't wear armor or have it integrated.</li><li>Droid Systems:\_Your tracker droid does not need to eat or drink. Additionally, your tracker droid does not require a tech focus to cast tech powers, and it is a valid target of the\_tracker droid interface\_tech power.</li><li>Droid Weaponry:\_Your tracker droid has an integrated shockprod with which it can make weapon attacks. This weapon can't be removed while your tracker droid is conscious. Your tracker droid's shockprod deals 1 lightning damage on a hit, and it has the finesse property.</li><li>Force Insensitive:\_Your tracker droid can not use force powers or take levels in forcecasting classes.</li><li>Maintenance Mode:\_Rather than sleep, your companion must spend 3 hours performing routine maintenance during a long rest to gain its benefits, during which it has disadvantage on Wisdom (Perception) checks. Additionally, if your companion's long rest would be interrupted, it only needs to complete the long rest instead of restarting it.</li><li>Attitude:\_The tracker droid obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your tracker droid acts on its own.</li></ul>"
    chat: ''
