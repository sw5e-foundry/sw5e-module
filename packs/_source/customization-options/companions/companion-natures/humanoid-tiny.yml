system:
  description:
    value: "<h4>HUMANOID COMPANION</h4><p><em><strong>Prerequisite:</strong> Proficiency in Intimidation or Persuasion</em><br />Through menacing or recruitment, you gain the fidelity of a humanoid companion.</p><hr /><p>Your humanoid takes a form and size of your choosing. Your humanoid's size determines its features. Once you've chosen the size of your humanoid, you assign your humanoid's ability scores using standard array (16, 14, 14, 12, 10, 8) as you see fit.</p><p></p><h3>HUMANOID FEATURES</h3><p>All humanoids share the following features.</p><h4>PROFICIENCIES AND FEATURES</h4><hr /><ul><li>Languages:\_Humanoids can speak, read, and write Galactic Basic and one language of your choice. If your humanoid takes the form of a species that can't speak Galactic Basic, you choose whether or not your humanoid can speak it.</li><li>Type:\_Humanoid</li><li>Armor Class:\_Your humanoid's armor class equals 10 + its Dexterity modifier.</li><li>Attitude:\_The humanoid obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your humanoid acts on its own.</li></ul><p></p><h2 style=\"border-bottom:1px solid var(--color-underline-header)\">TINY HUMANOIDS</h2><p>Tiny humanoids are comprised of diminutive species such as anzellan or patitites.</p><p>As a tiny humanoid, your humanoid companion has the following features.</p><h4>HIT POINTS</h4><hr style=\"border-top:1px solid var(--color-border-light-primary);border-bottom:1px solid var(--color-border-light-highlight)\" /><ul><li>Hit Dice:\_1d4 per humanoid level</li><li>Hit Points at 1st Level:\_4 + your humanoid's Constitution modifier</li><li>Hit Points at Higher Levels:\_1d4 (or 3) + your humanoid's Constitution modifier per humanoid level after 1st</li></ul><h4>PROFICIENCIES AND FEATURES</h4><hr style=\"border-top:1px solid var(--color-border-light-primary);border-bottom:1px solid var(--color-border-light-highlight)\" /><ul><li>Tools:\_One of your choice.</li><li>Size:\_Tiny</li><li>Speed:\_20 ft.</li><li>Pintsized:\_Your humanoid's tiny stature makes it hard for it to wield bigger weapons. Your humanoid can't use medium or heavy shields. Additionally, it can't wield weapons with the two-handed or versatile property, and it can only wield one-handed weapons in two hands unless they have the light property.</li><li>Puny:\_Your humanoid is too small to pack much of a punch. It has disadvantage on Strength saving throws, and when determining its bonus to attack and damage rolls for weapon attacks using Strength, it can't add more than +3.</li><li>Small and Nimble: Your humanoid is too small and fast to effectively target. It has a +1 bonus to AC, and it has advantage on Dexterity saving throws.</li></ul>"
