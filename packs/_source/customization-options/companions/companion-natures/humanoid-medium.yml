system:
  description:
    value: "<h4>HUMANOID COMPANION</h4><p><em><strong>Prerequisite:</strong> Proficiency in Intimidation or Persuasion</em><br />Through menacing or recruitment, you gain the fidelity of a humanoid companion.</p><hr /><p>Your humanoid takes a form and size of your choosing. Your humanoid's size determines its features. Once you've chosen the size of your humanoid, you assign your humanoid's ability scores using standard array (16, 14, 14, 12, 10, 8) as you see fit.</p><p></p><h3>HUMANOID FEATURES</h3><p>All humanoids share the following features.</p><h4>PROFICIENCIES AND FEATURES</h4><hr /><ul><li>Languages:\_Humanoids can speak, read, and write Galactic Basic and one language of your choice. If your humanoid takes the form of a species that can't speak Galactic Basic, you choose whether or not your humanoid can speak it.</li><li>Type:\_Humanoid</li><li>Armor Class:\_Your humanoid's armor class equals 10 + its Dexterity modifier.</li><li>Attitude:\_The humanoid obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your humanoid acts on its own.</li></ul><h2 style=\"border-bottom:1px solid var(--color-underline-header)\"></h2><h2 style=\"border-bottom:1px solid var(--color-underline-header)\">MEDIUM HUMANOIDS</h2><p>Medium humanoids are the most common seen in the galaxy.</p><p>As a medium humanoid, your humanoid companion has the following features.</p><h4>HIT POINTS</h4><hr style=\"border-top:1px solid var(--color-border-light-primary);border-bottom:1px solid var(--color-border-light-highlight)\" /><ul><li>Hit Dice:\_1d8 per humanoid level</li><li>Hit Points at 1st Level:\_8 + your humanoid's Constitution modifier</li><li>Hit Points at Higher Levels:\_1d8 (or 5) + your humanoid's Constitution modifier per humanoid level after 1st</li></ul><h4>PROFICIENCIES AND FEATURES</h4><hr style=\"border-top:1px solid var(--color-border-light-primary);border-bottom:1px solid var(--color-border-light-highlight)\" /><ul><li>Size:\_Medium</li><li>Speed:\_30 ft.</li><li>Armored: Your humanoid has proficiency in light armor. If it would already have proficiency in light armor, it instead has proficiency in medium armor. If it would already have proficiency in light and medium armor, it instead has proficiency in heavy armor. If it would already have proficiency in all armor, it instead has proficiency in a skill or tool of your choice.</li></ul>"
