system:
  description:
    value: >-
      <h4>TURRET COMPANION</h4><p><em><strong>Prerequisite:</strong> Proficiency
      with artillerist's kit</em><br />Through construction of your own or
      coopting someone else's, you gain the use of a turret companion.</p><hr
      /><p>Your turret is a portable companion that you can upgrade over time.
      Your turret uses your Intelligence score, and its Charisma is 6. You
      assign your turret's Strength, Dexterity, Constitution, and Wisdom scores
      using a standard array (16, 14, 12, 8) as you see
      fit.</p><p></p><h3>Turret Features</h3><p>All turrets share the following
      traits.</p><h4>Hit Points</h4><hr /><ul><li><strong>Hit Dice:</strong> 1d6
      per turret companion level</li><li><strong>Hit Points at 1st
      Level:</strong> 6 + your turret's Constitution
      modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d6 (or 4)
      + your turret's Constitution modifier per turret level after
      1st</li></ul><h4>Resistances and Vulnerabilities</h4><hr
      /><ul><li><strong>Turret Resistances:</strong> Your turret is resistant to
      necrotic, poison, and psychic damage, and immune to poison and
      disease.</li><li><strong>Turret Vulnerabilities:</strong> Your turret is
      vulnerable to ion damage. Additionally, your turret has disadvantage on
      saving throws against effects that would deal ion or lightning
      damage.</li></ul><h4>Proficiencies and Features</h4><hr
      /><ul><li><strong>Languages:</strong> Your turret does not understand any
      languages, and it cannot speak.</li></ul><hr
      /><ul><li><strong>Size:</strong> Small</li><li><strong>Speed:</strong>
      Your turret has two modes: undeployed and deployed. While undeployed, your
      turret's speed equals your own and it can take no actions. While deployed,
      your turret has a speed of 25 feet and can take actions. You can deploy or
      undeploy your turret at any time on your turn (no action required), but
      the effect doesn't occur until the start of your next
      turn.</li><li><strong>Type:</strong> Construct</li><li><strong>Armor
      Class:</strong> Your turret uses its Intelligence score for its Armor
      Class.</li><li><strong>Force Insensitive:</strong> Your turret can not use
      force powers or take levels in forcecasting
      classes.</li><li><strong>Integrated Weaponry:</strong> Your turret has an
      integrated vibroweapon and blaster with which it is proficient and can
      make weapon attacks. Neither weapon can be removed while your turret is
      not disabled. Your turret's vibroweapon deals 1d8 kinetic damage on a hit.
      Your turret's blaster has the ammunition (range 100/400) and reload 20
      properties, and it deals 1d6 kinetic or energy damage on it a hit,
      depending on its loaded ammunition. It can use both slug cartridges and
      power cells for ammunition. Your turret can't reload itself. You can
      choose which weapon your turret uses each time it attacks (no action
      required).</li><li><strong>Turret Systems:</strong> Your turret does not
      need to eat or drink. Additionally, your turret does not require a tech
      focus to cast tech powers.</li><li><strong>Attitude:</strong> Your turret
      has a remote control, which you can use to direct it while within 120 feet
      of it (no action required). If you are incapacitated or absent, your
      turret takes no actions unless a trait says otherwise.</li></ul>
    chat: ''
