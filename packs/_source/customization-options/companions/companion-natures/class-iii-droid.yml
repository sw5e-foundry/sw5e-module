system:
  description:
    value: >-
      <h4>DROID COMPANION</h4><p><em><strong>Prerequisite:</strong> Proficiency
      with astrotech's implements</em><br />Through creation of your own or
      capture of another, you gain the services of a droid companion.</p><hr
      /><p>Your droid takes a form of your choosing. The class of droid you
      choose determines its features. Once you've selected your type of droid
      class, you assign your droid's ability scores using standard array (16,
      14, 14, 12, 10, 8) as you see fit.</p><p></p><h3>Droid Features</h3><p>All
      droids share the following features.</p><h4>Resistances and
      Vulnerabilities</h4><hr /><ul><li><strong>Droid Resistances:</strong> Your
      droid is resistant to necrotic, poison, and psychic damage, and immune to
      poison and disease.</li><li><strong>Droid Vulnerabilities:</strong> Your
      droid is vulnerable to ion damage. Additionally, your droid has
      disadvantage on saving throws against effects that would deal ion or
      lightning damage.</li></ul><h4>Proficiencies and Features</h4><hr
      /><ul><li><strong>Type:</strong> Droid</li><li><strong>Armor
      Class:</strong> Your droid's armor class equals 10 + its Dexterity
      modifier.</li><li><strong>Armor Integration:</strong> Your droid can not
      wear armor, but it can have the armor professionally integrated into its
      chassis over the course of a long rest. This work must be done by someone
      proficient with astrotech's implements. Your droid must be proficient in
      armor in order to have it integrated.</li><li><strong>Droid
      Systems:</strong> Your droid does not need to eat or drink. Additionally,
      your droid does not require a tech focus to cast tech
      powers.</li><li><strong>Force Insensitive:</strong> Your droid can not use
      force powers or take levels in forcecasting
      classes.</li><li><strong>Maintenance Mode:</strong> Rather than sleep,
      your droid must spend 3 hours performing routine maintenance during a long
      rest to gain its benefits, during which it has disadvantage on Wisdom
      (Perception) checks. Additionally, if your droid's long rest would be
      interrupted, it only needs to complete the long rest instead of restarting
      it.</li><li><strong>Attitude:</strong> The droid obeys your commands as
      best it can. It acts on your turn, and you determine its actions,
      decisions, attitudes, and so on. If you are incapacitated or absent, your
      droid acts on its own.</li></ul><p></p><h3>Class III Droid</h3><p>Class
      III droids, programmed to interact with humans and said to be the most
      advanced droids ever invented, are subcategorized as protocol droids,
      servant droids, tutor droids, and child care droids.</p><p>As a class III
      droid, your droid companion has the following features.</p><h4>Hit
      Points</h4><hr /><ul><li><strong>Hit Dice:</strong> 1d8 per droid
      level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your droid's
      Constitution modifier</li><li><strong>Hit Points at Higher
      Levels:</strong> 1d8 (or 5) + your droid's Constitution modifier per droid
      level after 1st</li></ul><h4>Proficiencies and Features</h4><hr
      /><ul><li><strong>Languages:</strong> Your droid can speak and understand
      all registered languages</li><li><strong>Size:</strong>
      Medium</li><li><strong>Speed:</strong> 25 ft.</li></ul>
