system:
  description:
    value: >-
      <p>Your turret has an integrated vibroweapon and blaster with which it is
      proficient and can make weapon attacks. Neither weapon can be removed
      while your turret is not disabled. Your turret's vibroweapon deals 1d8
      kinetic damage on a hit. Your turret's blaster has the ammunition (range
      100/400) and reload 20 properties, and it deals 1d6 kinetic or energy
      damage on it a hit, depending on its loaded ammunition. It can use both
      slug cartridges and power cells for ammunition. Your turret can't reload
      itself. You can choose which weapon your turret uses each time it attacks
      (no action required).</p>
