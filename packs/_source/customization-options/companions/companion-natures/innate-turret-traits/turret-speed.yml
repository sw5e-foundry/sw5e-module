system:
  description:
    value: >-
      <p>Your turret has two modes: undeployed and deployed. While undeployed,
      your turret's speed equals your own and it can take no actions. While
      deployed, your turret has a speed of 25 feet and can take actions. You can
      deploy or undeploy your turret at any time on your turn (no action
      required), but the effect doesn't occur until the start of your next
      turn.</p>
