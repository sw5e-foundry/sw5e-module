system:
  description:
    value: "<h4>BEAST COMPANION</h4><p><em><strong>Prerequisite:</strong>\_Proficiency in Animal Handling</em><br />Through spending time in the wilderness or discovering a forlorn creature in a foreign environment, you gain the loyalty of a beast companion.</p><hr /><p>Your beast takes a form of your choosing. Alternatively, your GM can choose what form your beast takes based on your environment. Once you've chosen your beast's appearance, you assign your beast companion's ability scores. Your beast's Intelligence score is 6, and you assign its other ability scores using a standard array (16, 14, 12, 10, 8) as you see fit.</p><h3>BEAST FEATURES</h3><p>All beasts share the following traits.</p><h4>HIT POINTS</h4><hr /><ul><li>Hit Dice:\_1d4 per beast companion level</li><li>Hit Points at 1st Level:\_4 + your beast's Constitution modifier</li><li>Hit Points at Higher Levels:\_1d4 (or 3) + your beast's Constitution modifier per beast level after 1st</li></ul><h4>PROFICIENCIES AND FEATURES</h4><hr /><ul><li>Languages:\_Your beast can understand simple commands spoken in two languages of your choice, as well as hand signals, but it can not speak</li><li>Size:\_Tiny</li><li>Speed:\_20 ft.</li><li>Type:\_Beast</li><li>Armor Class:\_Your beast's armor class equals 10 + its Dexterity modifier.</li><li>Barding:\_Your beast requires proficiency in armor in order to have it made into barding for them, and if the your beast's size increases, the barding must be upgraded accordingly.</li><li>Natural Weapon:\_Your beast companion attacks with a natural weapon, such as claws or a bite, with which it is proficient. On a hit, it deals 1d4 kinetic damage.</li><li>Attitude:\_The beast obeys your commands as best it can. It acts on your turn, and you determine its actions, decisions, attitudes, and so on. If you are incapacitated or absent, your beast acts on its own.</li></ul>"
