  - name: 'Chapter 12: Tech Powers'
    _id: HDX0PIgMDXd5yCZR
    text:
      content: "<h1>Chapter 12: Tech Powers</h1>\n\n<div class=\"sw5e-book-block\"><h4>At-Will</h4>\n\n<hr>\n\n<ul><li>Acid Splash</li><li>Acidic Strike</li><li>Assess the Situation</li><li>Combustive Shot</li><li>Cryogenic Burst</li><li>Echo Blast</li><li>Electrical Burst</li><li>Electroshock</li><li>Encrypted Message</li><li>Extinguish</li><li>Haywire</li><li>Illusory Strike</li><li>Ion Blast</li><li>Ionic Strike</li><li>Jet of Flame</li><li>Light</li><li>Mending</li><li>Minor Defibrillation</li><li>Minor Hologram</li><li>Mobile Lights</li><li>On/Off</li><li>Pheromone Burst</li><li>Poison Spray</li><li>Pressure Crush</li><li>Reboot</li><li>Rime Shot</li><li>Rime Strike</li><li>Short Circuit</li><li>Sonic Shot</li><li>Sonic Strike</li><li>Spectrum Ray</li><li>Storming Shot</li><li>Targeting Shot</li><li>Temporary Boost</li><li>Venomous Strike</li><li>Vortex Shot</li><li>Ward</li><li>Warding Shot</li><li>Wire Line</li></ul>\n\n<h4>1st-level</h4>\n\n<hr>\n\n<ul><li>Absorb Energy</li><li>Acid Wind</li><li>Alarm</li><li>Analyze</li><li>Bacta Pack</li><li>Buffer</li><li>Condense/Vaporize</li><li>Copy</li><li>Countermeasures</li><li>Cryogenic Blast</li><li>Cryogenic Wave</li><li>Decryption Program</li></ul>\n\n<hr>\n\n<ul><li>Detect Enhancement</li><li>Element of Surprise</li><li>Energy Shield</li><li>Execute Command</li><li>Expeditious Retreat</li><li>Flame Sweep</li><li>Flash</li><li>Gleaming Outline</li><li>Hologram</li><li>Holographic Disguise</li><li>Homing Rockets</li><li>Ionic Bond</li><li>Kolto Pack</li><li>Oil Slick</li><li>Overload</li><li>Poison Dart</li><li>Preparedness</li><li>Repair Droid</li><li>Ring of Fire</li><li>Smoke Cloud</li><li>Sonic Fists</li><li>Spectrum Bolt</li><li>Spot the Weakness</li><li>Stack the Deck</li><li>Tactical Barrier</li><li>Target Lock</li><li>Toxin Scan</li><li>Tracer Bolt</li><li>Tracker Droid Interface</li><li>Tranquilizer</li><li>Translation Program</li><li>Voltaic Shield</li></ul>\n\n<h4>2nd-level</h4>\n\n<hr>\n\n<ul><li>Acid Dart</li><li>Capacity Boost</li><li>Cryogenic Volley</li><li>Concealed Caltrops</li><li>Darkvision</li><li>Detect Invisibility</li><li>Detect Traps</li><li>Electromesh</li><li>Energetic Burst</li><li>Enhance Droid</li><li>Flaming Shots</li><li>Frequency Scan</li><li>Glide</li><li>Hold Droid</li><li>Implant Message</li><li>Infiltrate</li><li>Kolto Dispenser</li><li>Lock</li><li>Magnetic Hold</li><li>Magnetic Field</li></ul>\n\n<hr>\n\n<ul><li>Mirror Image</li><li>Motivator Boost</li><li>Overheat</li><li>Paralyze Humanoid</li><li>Pyrotechnics</li><li>Release</li><li>Shared Shielding</li><li>Shatter</li><li>Shocking Ray</li><li>Smuggle</li><li>Toxin Purge</li><li>Translocate</li><li>Truth Serum</li></ul>\n\n<h4>3rd-level </h4>\n\n<hr>\n\n<ul><li>Autonomous Servant</li><li>Bestow Virus</li><li>Cryogenic Suspension</li><li>Debilitating Gas</li><li>Destroy Tech</li><li>Diminish Tech</li><li>Enhance Weapon</li><li>Explosion</li><li>Fabricate Trap</li><li>Greater Hologram</li><li>Greater Light</li><li>Greater Translation Program</li><li>Invisibility to Cameras</li><li>Kolto Cloud</li><li>Protection from Energy</li><li>Read Memory</li><li>Remove Virus</li><li>Scramble Interface</li><li>Sabotage Charges</li><li>Sending</li><li>Slow-release Medpac</li><li>Tactical Advantage</li><li>Tech Override</li><li>Tonal Translocate</li><li>Vertical Maneuvering</li></ul>\n\n<h4>4th-level </h4>\n\n<hr>\n\n<ul><li>Ballistic Shield</li><li>Cloaking Screen</li><li>Corrosive Sphere</li><li>Cryogenic Storm</li><li>Defibrillate</li><li>Elemental Accelerant</li></ul>\n\n<hr>\n\n<ul><li>Holding Cell</li><li>Illusory Terrain</li><li>Kolto Reserve</li><li>Radiation</li><li>Salvo</li><li>Scan Area</li><li>Sensor Probe</li><li>Synchronicity</li><li>Wire Bind</li></ul>\n\n<h4>5th-level </h4>\n\n<hr>\n\n<ul><li>Cryogenic Spray</li><li>Friendly Fire</li><li>Greater Analyze</li><li>Greater Translocate</li><li>Group Hologram</li><li>Immolate</li><li>Mass Repair Droid</li><li>Mislead</li><li>Override Interface</li><li>Paralyze Creature</li><li>Reprogram Droid</li><li>Rewrite Memory</li><li>Shutdown</li><li>Skill Protocol</li><li>Toxic Cloud</li></ul>\n\n<h4>6th-level </h4>\n\n<hr>\n\n<ul><li>Carbon Fog</li><li>Carbonite</li><li>Contingency</li><li>Disperse Energy</li><li>Disintegrate</li><li>Find the Path</li><li>Firestorm</li><li>Kolto Infusion</li><li>Programmed Illusion</li><li>Scrambling Barrier</li><li>Security Protocols</li><li>Superior Translation Program</li></ul>\n\n<h4>7th-level </h4>\n\n<hr>\n\n<ul><li>Cage</li><li>Delayed Explosion</li><li>Greater Sabotage Charges</li><li>Neurotoxin</li><li>Project Hologram</li><li>Tactical Superiority</li></ul>\n\n<h4>8th-level </h4>\n\n<hr>\n\n<ul><li>Antipathy/Sympathy</li><li>Energizing Aura</li><li>Incendiary Cloud</li><li>Scrambling Field</li><li>Stun Dart</li></ul>\n\n<h4>9th-level</h4>\n\n<hr>\n\n<ul><li>Carbonite Explosion</li><li>Greater Explosion</li><li>Greater Salvo</li><li>Invulnerability</li><li>Kolto Waves</li><li>Predictive AI</li></ul></div>\n\n<img src='https://www.gmbinder.com/images/JOgqCfl.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:750px' />\n\n\n\n<h4>Absorb Energy</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you take acid, cold, energy, fire, ion, kinetic, lightning, or sonic damage</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>The power captures some of the incoming energy, lessening its effect on you and storing it for your next melee attack. You have resistance to the triggering damage type until the start of your next turn. Also, the first time you hit with a melee attack on your next turn, the target takes an extra 1d6 damage of the triggering type, and the power ends.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a power slot of 2nd level or higher, the extra damage increases by 1d6 for each slot level above 1st.</p>\n\n<h4>Acid Dart</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A shimmering green dart streaks toward a target within range and bursts in a spray of acid. Make a ranged tech attack against the target. On a hit, the target takes 4d4 acid damage immediately and 2d4 acid damage at the end of its next turn. On a miss, the dart splashes the target with acid for half as much of the initial damage and no damage at the end of its next turn.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the damage (both initial and later) increases by 1d4 for each slot level above 2nd.</p>\n\n<h4>Acid Splash</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You emit a burst of acid. Choose one creature within range that you can see, or choose two creatures within range that are within 5 feet of each other that you can see. A target must succeed on a Dexterity saving throw or take 1d6 acid damage.</p>\n\n<p>This power's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>\n\n<h4>Acid Wind</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot cube)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You produce a breeze full of stinging acid droplets. Each creature in a 15-foot cube originating from you must make a Constitution saving throw. On a failed save, a creature takes 2d4 acid damage and is blinded until the end of your next turn. On a successful save, the creature takes half as much damage and isn't blinded.</p>\n\n\n\n<p>&emsp;<strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d4 for each slot level above 1st.</p>\n\n<h4>Acidic Strike</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and it becomes sheathed in a thick acidic slime until the start of your next turn. Until the start of your next turn, if the target becomes grappled, or succeeds in grappling or maintaining a grapple, the slime is pressed into its body, causing it to immediately take 1d8 acid damage. </p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 acid damage to the target, and the damage the target takes for taking grappling or maintaining a grapple increases to 2d8. Both damage rolls increase by 1d8 at 11th level and 17th level.</p>\n\n<h4>Alarm</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 8 hours, or until the end of your next short or long rest; whichever happens first</li></ul>\n\n<p>You set an alarm against unwanted intrusion. Choose a door, a window, or an area within range that is no larger than a 20-foot cube. Until the power ends, an alarm alerts you whenever a Tiny or larger creature touches or enters the warded area. When you cast the power, you can designate creatures that won't set off the alarm. You also choose whether the alarm is mental or audible. </p>\n\n<p>A silent alarm alerts you with a ping in your mind if you are within 1 mile of the warded area. This ping awakens you if you are sleeping.</p>\n\n<p>An audible alarm produces the sound of a hand bell for 10 seconds within 60 feet.</p>\n\n<h4>Analyze</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You choose one object that you must touch throughout the casting of the power. If it is an enhanced or modified item, you learn its properties and how to use them, whether it requires attunement to use, and how many charges it has, if any. You learn whether any powers are affecting the item and what they are. If the item was created by a power, you learn which power created it.</p>\n\n<p>If you instead touch a creature throughout the casting, you learn what tech powers, if any, are currently affecting it.</p>\n\n\n\n<h4>Antipathy/Sympathy</h4>\n\n<p><em>8th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 hour</li><li><strong>Range:</strong> 60 feet </li><li><strong>Duration:</strong> 10 days</li></ul>\n\n<p>This power attracts or repels creatures of your choice. You target something within range, either a Huge or smaller object or creature or an area that is no larger than a 200-foot cube. Then specify a kind of intelligent creature, such as rancors, kath hounds, or twi'leks. You invest the target with an aura that either attracts or repels the specified creatures for the duration. Choose antipathy or sympathy as the aura's effect.</p>\n\n<p><strong><em>Antipathy.</em></strong> The power causes creatures of the kind you designated to feel an intense urge to leave the area and avoid the target. When such a creature can see the target or comes within 60 feet of it, the creature must succeed on a Wisdom saving throw or become frightened. The creature remains frightened while it can see the target or is within 60 feet of it. While frightened by the target, the creature must use its movement to move to the nearest safe spot from which it can't see the target. If the creature moves more than 60 feet from the target and can't see it, the creature is no longer frightened, but the creature becomes frightened again if it regains sight of the target or moves within 60 feet of it.</p>\n\n<p><strong><em>Sympathy.</em></strong> The power causes the specified creatures to feel an intense urge to approach the target while within 60 feet of it or able to see it. When such a creature can see the target or comes within 60 feet of it, the creature must succeed on a Wisdom saving throw or use its movement on each of its turns to enter the area or move within reach of the target. When the creature has done so, it can't willingly move away from the target. </p>\n\n<p>If the target damages or otherwise harms an affected creature, the affected creature can make a Wisdom saving throw to end the effect, as described below.</p>\n\n<p><strong><em>Ending the Effect.</em></strong> If an affected creature ends its turn while not within 60 feet of the target or able to see it, the creature makes a Wisdom saving throw. On a successful save, the creature is no longer affected by the target and recognizes the feeling of repugnance or attraction as unnatural. In addition, a creature affected by the power is allowed another Wisdom saving throw every 24 hours while the power persists.</p>\n\n<p>A creature that successfully saves against this effect is immune to it for 1 minute, after which time it can be affected again.</p>\n\n<h4>Assess the Situation</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 round</li></ul>\n\n<p>You take a sensory snapshot of a target within range. Your tech grants you a brief insight into the target's defenses. You have advantage on the next attack roll you make against the target before the end of your next turn.</p>\n\n\n\n<p>&emsp;This power benefits additional attacks at higher levels: two attacks at 5th level, three attacks at 11th level, and four attacks at 17th level.</p>\n\n<h4>Autonomous Servant</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 8 hours, or until the end of your next short or long rest; whichever happens first</li></ul>\n\n<p>You touch one Tiny, unenhanced object that isn't attached to another object or a surface and isn't being carried by another creature. The target animates and gains little arms and legs, becoming a creature under your control until the power ends or the creature drops to 0 hit points. See the stat block for its statistics. </p>\n\n<hr>\n\n<h2>Servant</h2>\n\n<blockquote><p><em>Tiny construct, unaligned</em></p>\n\n<hr>\n\n<ul><li><strong>Armor Class</strong> 15 (natural armor)</li><li><strong>Hit Points</strong> 10 (4d4)</li><li><strong>Speed</strong> 30 feet, climb 30 feet</li></ul>\n\n<hr>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>STR</th><th>DEX</th><th>CON</th><th>INT</th><th>WIS</th><th>CHA</th></tr></thead><tbody><tr><td>4 (-3)</td><td>16 (+3)</td><td>10 (+0)</td><td>2 (-4)</td><td>10 (+0)</td><td>1 (-5)</td></tr></tbody></table>\n\n<hr>\n\n<ul><li><strong>Damage Vulnerabilities</strong> ion</li><li><strong>Damage Resistances</strong> necrotic, poison, psychic</li><li><strong>Condition Immunities</strong> charmed, deafened, exhaustion, poisoned</li><li><strong>Senses</strong> blindsight 60 feet (blind beyond this radius), passive Perception 10</li><li><strong>Languages</strong> �</li></ul>\n\n<hr>\n\n<p><strong>Circuitry.</strong> The construct has disadvantage on saving throws against effects that would deal ion or lightning damage.</p>\n\n<h3>Actions</h3>\n\n<p><strong><em>Slam.</em></strong> <em>Melee Weapon Attack:</em> +4 to hit, reach 5 feet, one target. <em>Hit</em> 5 (1d4 + 3) kinetic damage.</p></blockquote>\n\n<p>As a bonus action, you can nonverbally command the creature if it is within 120 feet of you. (If you control multiple creatures with this power, you can command any or all of them at the same time, issuing the same command to each one.) You decide what action the creature will take and where it will move during its next turn, or you can issue a simple, general command, such as to fetch a code cylinder, stand watch, or stack some small objects. If you issue no commands, the servant does nothing other than defend itself against hostile creatures. Once given an order, the servant continues to follow that order until its task is complete.</p>\n\n<p>When the creature drops to 0 hit points, it reverts to its original form, and any remaining damage carries over to that form.</p>\n\n<p>The creature is considered a valid target for the <em>tracker droid interface</em> power.</p>\n\n\n\n\n\n<p>&emsp;<strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, you can animate two additional objects for each slot level above 3rd.</p>\n\n<h4>Bacta Pack</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>You create a luminescent pack of bacta in any space, occupied or unoccupied, within range. The pack remains in its space until it is activated by any creature you choose. If the space you choose is occupied by a creature you have designated, it can use its reaction to immediately activate the pack; otherwise, a creature within 5 feet of the pack can use a bonus action to touch it and activate it.</p>\n\n<p>When the pack is activated by a designated creature, that creature regains hit points equal to 1d6 + your techcasting ability modifier, and the pack is consumed. If the power ends before the pack has been activated, it becomes useless and disintegrates. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, you may either increase the healing of a single pack by 1d6 for each slot level above 1st, or create another pack in a separate space, with one additional pack for each slot level above 1st.</p>\n\n<h4>Ballistic Shield</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>A flickering blue shield surrounds your body. Until the power ends, you have resistance to kinetic, energy, and ion damage.</p>\n\n<h4>Bestow Virus</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You touch a droid, construct, or a creature with a tech focus, and it must succeed on an Intelligence saving throw or receive a tech-based curse for the duration of the power. When you cast this power, choose the nature of the curse from the following options:</p>\n\n<ul><li>Choose one ability score. While cursed, the target has disadvantage on ability checks and saving throws made with that ability score.</li><li>While cursed, the target has disadvantage on attack rolls against you.</li><li>While cursed, the target must make an Intelligence saving throw at the start of each of its turns. If it fails, it wastes its action that turn doing nothing.</li><li>While the target is cursed, your attacks and powers deal an extra 1d8 lightning damage to the target.</li></ul>\n\n\n\n<p>&emsp;A <em>remove virus</em> power ends this effect. At the GM's discretion, you may choose an alternative curse effect, but it should be no more powerful than those described above. The GM has final say on such a curse's effect.</p>\n\n<p><strong>Overcharge Tech.</strong> If you cast this power using a tech slot of 4th level or higher, the duration is concentration, up to 10 minutes. If you use a tech slot of 5th level or higher, the duration is 8 hours. If you use a tech slot of 7th level or higher, the duration is 24 hours. If you use a 9th-level tech slot, the power lasts until it is dispelled. Using a tech slot of 5th level or higher grants a duration that doesn't require concentration.</p>\n\n<h4>Buffer</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You gain 1d4 + 4 temporary hit points for the duration. </p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, you gain 5 additional temporary hit points for each slot level above 1st.</p>\n\n<h4>Cage</h4>\n\n<p><em>7th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 100 feet</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>An immobile, invisible, cube-shaped prison composed of energy springs into existence around an area you choose within range. The prison can be a cage or a solid box as you choose.</p>\n\n<p>A prison in the shape of a cage can be up to 20 feet on a side and is made from 1/2-inch diameter bars spaced 1/2 inch apart.</p>\n\n<p>A prison in the shape of a box can be up to 10 feet on a side, creating a solid barrier that prevents any matter from passing through it and blocking any powers cast into or out of the area.</p>\n\n<p>When you cast the power, any creature that is completely inside the cage's area is trapped. Creatures only partially within the area, or those too large to fit inside the area, are pushed away from the center of the area until they are completely outside the area.</p>\n\n<p>A creature inside the cage can't leave it by unenhanced means. If the creature tries to teleport to leave the cage, it must first make a Charisma saving throw. On a success, the creature can use that power to exit the cage. On a failure, the creature can't exit the cage and wastes the use of the power or effect. </p>\n\n<p>This power can't be dispelled.</p>\n\n\n\n<h4>Capacity Boost</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You empower a blaster weapon you are holding. For the duration, you can reload the weapon once on each of your turns without using an action, and as a bonus action on each of your turns you can make one attack with the weapon.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 5th level or higher, you can make two attacks with your bonus action, instead of one.</p>\n\n<h4>Carbon Fog</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You create a cloud of icy fog in a 20-foot-radius sphere centered on a point you can see. The sphere extends around corners, and its area is heavily obscured. The fog is semi-solid, and its area is considered difficult terrain. Each creature that enters the power's area for the first time on a turn or starts its turn there takes 4d6 cold damage and gains 1 slowed level until the end of its turn. The fog lasts for the duration of the power or until it's dispersed by a wind of moderate or greater speed (at least 10 mph).</p>\n\n<h4>Carbonite</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You attempt to freeze one creature that you can see within range into carbonite. The creature must make a Constitution saving throw. On a failed save, it is restrained as its flesh begins to harden. On a successful save, the creature isn't affected. </p>\n\n<p>A creature restrained by this power must make another Constitution saving throw at the end of each of its turns. If it successfully saves against this power three times, the power ends. If it fails its saves three times, it is turned to stone and subjected to the petrified condition for the duration. The successes and failures don't need to be consecutive; keep track of both until the target collects three of a kind.</p>\n\n<p>If the creature is physically broken while frozen in carbonite, it suffers from similar deformities if it reverts to its original state.</p>\n\n<p>If you maintain your concentration on this power for the entire possible duration, the creature is frozen in carbonite until the effect is removed.</p>\n\n<h4>Carbonite Explosion</h4>\n\n<p><em>9th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 250 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You generate an explosion of cryogenic energy in a 60-foot-radius sphere centered on a point you can see </p>\n\n\n\n<p>within range. Each creature in the affected area must make a Constitution saving throw. On a failed save, the creature takes 8d6 + 20 cold damage and is restrained for 1 minute as it is encased in carbonite. On a successful save, the creature takes half damage and is restrained until the end of its next turn. </p>\n\n<p>As an action, a restrained creature can make a Strength check against your tech save DC, ending this effect on itself on a success.</p>\n\n<p>A creature reduced to 0 hit points by this power dies instantly, as its body shatters into frozen chunks.</p>\n\n<h4>Cloaking Screen</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You or a creature you touch becomes invisible until the power ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person.</p>\n\n<h4>Combustive Shot</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a ranged weapon attack against one creature within your weapon's range, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and is becomes ignited (your techcasting ability modifier). </p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the ranged attack deals an extra 1d6 fire damage to the target, and the ignited damage increases to 1d4 + your tech casting ability modifier. Both damage rolls increase by 1d6 and 1d4, respectively, at 11th level and 17th level.</p>\n\n<h4>Concealed Caltrops</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You scatter a large number of caltrops across ground in a 20-foot radius centered on a point within range. These caltrops pierce deep into the feet and boots of anyone who walks upon them. The area becomes difficult terrain for the duration. When a creature moves into or within the area, it takes 2d4 kinetic damage for every 5 feet it travels.</p>\n\n<p>The caltrops are nearly invisible to the naked eye. Any creature that can't see the area at the time the power is cast must make a Wisdom (Perception) check against your tech save DC to notice the caltrops before entering the area.</p>\n\n\n\n<h4>Condense/Vaporize</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>In an open container, you can create up to 10 gallons of drinkable water. You may also produce a rain that falls within a 30-foot cube and extinguishes open-air flames. You can destroy the same amount of water in an open container, or destroy a 30-foot cube of fog. </p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the amount of water you can create increases by 10 gallons, or the size of the cube increases by 5 feet, for each slot level above 1st.</p>\n\n<h4>Contingency</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 10 minutes</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 10 days</li></ul>\n\n<p>Choose a tech power of 5th-level or lower that you can cast, that has a casting time of 1 action, and that can target you. You cast that power, called the contingent power, as part of casting contingency, expending tech points for both, but the contingent power doesn't come into effect. Instead, it takes effect when a certain circumstance occurs. You describe that circumstance when you cast the two powers. </p>\n\n<p>The contingent power takes effect immediately after the circumstance is met for the first time, whether or not you want it to, and then contingency ends.</p>\n\n<p>The contingent power takes effect only on you, even if it can normally target others. You can use only one contingency power at a time. If you cast this power again, the effect of another contingency power on you ends. Also, contingency ends on you if your tech focus is ever not on your person.</p>\n\n<h4>Copy</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>This power creates a perfect duplicate of any written, drawn, or digital visual, audio or text-based data that you touch onto a datapad or datacard you supply. You can copy up to 10 pages of text or 10 minutes of visual or audio data with one casting of this power. Enhanced documents, such as datacrons, blueprints, or encrypted documents, can't be copied with this power.</p>\n\n<h4>Corrosive Sphere</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You create a globule of acid and hurl it at a point within range, where it explodes in a 20-foot-radius sphere. Each creature in that area must make a Dexterity saving throw. On a failed save, a creature takes 10d4 acid damage and another 5d4 acid damage at the end of its next turn. On a successful save, a creature takes half the initial damage and no damage at the end of its next turn.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 5th level or higher, the initial damage increases by 2d4 for each slot level above 4th.</p>\n\n<h4>Countermeasures</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>For the duration, you gain the following benefits:</p>\n\n<ul><li>You are immune to the <em>homing rockets</em> tech power. </li><li>You and objects you are wearing or carrying cannot be detected by tech powers that reveal your location, such as <em>scan area</em> or <em>frequency scan</em>, unless the caster makes a successful Intelligence saving throw. </li><li>Creatures have disadvantage on Wisdom (Survival) checks to track you.</li></ul>\n\n<h4>Cryogenic Blast</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You release a shard of cryogenic energy at one creature within range. Make a ranged tech attack against the target. On a hit, the target takes 1d10 kinetic damage. Hit or miss, the shard then explodes. The target and each creature within 5 feet of it must succeed on a Dexterity saving throw or take 2d6 cold damage.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the cold damage increases by 1d6 for each slot level above 1st.</p>\n\n<h4>Cryogenic Burst</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You emit a burst of cold energy at a creature within range. Make a ranged tech attack against the target. On a hit, it takes 1d8 cold damage, and gains 1 slowed level until the start of your next turn.</p>\n\n<p>The power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).</p>\n\n\n\n<h4>Cryogenic Spray</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A blast of cold air erupts from you. Each creature in a 60-foot cone must make a Constitution saving throw. On a failed save, a creature takes 8d8 cold damage, and gains 1 slowed level until the start of your next turn. On a successful save, a creature takes half as much damage and isn't slowed.</p>\n\n<p>A creature killed by this power becomes frozen in carbonite.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th.</p>\n\n<h4>Cryogenic Storm</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A storm of cryogenic energy encompasses the ground in a 20-foot-radius, 40-foot-high cylinder centered on a point within range. Each creature in the cylinder must make a Dexterity saving throw. A creature takes 2d8 kinetic damage and 4d6 cold damage on a failed save, or half as much damage on a successful one.</p>\n\n<p>The storm's area of effect becomes difficult terrain until the end of your next turn.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 5th level or higher, the kinetic damage increases by 1d8 for each slot level above 4th.</p>\n\n<h4>Cryogenic Suspension</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose up to six creatures of your choice in a 40-foot cube within range. Each target must succeed on a Dexterity saving throw or be affected by this power for the duration.</p>\n\n<p>An affected target gains 1 slowed level, it takes a -2 penalty to AC and Dexterity saving throws, and it can't use reactions. On its turn, it can use either an action or a bonus action, not both. Regardless of the creature's abilities or items, it can't make more than one melee or ranged attack during its turn.</p>\n\n<p>If the creature attempts to cast a power with a casting time of 1 action, roll a d20. On an 11 or higher, the power doesn't take effect until the creature's next turn, and the creature must use its action on that turn to complete the power. If it can't, the power is wasted.\t</p>\n\n<p>A creature affected by this power makes another Dexterity saving throw at the end of its turn. On a successful save, the effect ends for it.</p>\n\n<h4>Cryogenic Volley</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>An explosion of cold energy erupts from a point you choose within range. Each creature in a 5-foot-radius sphere centered on that point must make a Dexterity saving throw. On a failed save, a creature takes 3d6 cold damage, and gains 1 slowed level until the start of your next turn. On a successful save, a creature takes half as much damage and isn't slowed.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the damage increases by 1d6 for each slot level above 2nd.</p>\n\n<h4>Cryogenic Wave</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot cone)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>A wave of cold energy spreads out from you. Each creature in a 15-foot cone must make a Constitution saving throw. On a failed save, a creature takes 2d6 cold damage and gains 1 slowed level until the end of its next turn. On a success, it takes half as much damage, and suffers no additional effect.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st. At 3rd level or above, a creature gains 2 slowed levels on a failed save. At 5th level or above, a creature gains 3 slowed levels on a failed save. At 7th level or above, a creature gains 4 slowed levels on a failed save.</p>\n\n<h4>Darkvision</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 8 hours, or until the end of your next short or long rest; whichever happens first</li></ul>\n\n<p>You touch a willing creature to grant it the ability to see in the dark. For the duration, that creature has darkvision out to a range of 60 feet.</p>\n\n<h4>Debilitating Gas</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You create a 20-foot-radius sphere of gas centered on a point. The cloud spreads around corners and its area is heavily obscured. It lingers in the air for the duration.</p>\n\n<p>Each creature completely in the cloud at the start of its turn must make a Constitution save against poison. On a failure, the creature does nothing that turn. Creatures that don't need to breathe or are immune to poison automatically succeed.</p>\n\n<p>A wind of 10mph disperses the cloud after 4 rounds. A wind of 20mph disperses it after 1 round.</p>\n\n\n\n<h4>Decryption Program</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You gain insight into an encrypted message you are holding when you cast this power, granting you advantage on ability checks you make to decipher the document. </p>\n\n<h4>Defibrillate</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You touch a creature that has died within the last minute and administer a shock to restore it to life. That creature returns to life with 1 hit point. This power can't return to life a creature that has died of old age, nor can it restore any missing body parts. If the creature is lacking body parts or organs integral for its survival�its head, for instance�the power automatically fails. Once this power has restored a creature to life, it cannot benefit from this power again until it finishes a short or long rest.</p>\n\n<h4>Delayed Explosion</h4>\n\n<p><em>7th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>You create a delayed explosion at a point within range. When the power ends, either because your concentration is broken or because you decide to end it, the explosion occurs. Each creature in a 20-foot-radius sphere centered on that point must make a Dexterity saving throw. A creature takes fire damage equal to the total accumulated damage on a failed save, or half as much damage on a successful one.</p>\n\n<p>The power's base damage is 12d6. If at the end of your turn the explosion has not yet occurred, the damage increases by 1d6.</p>\n\n<p>If the explosion is touched before the interval has expired, the creature touching it must make a Dexterity saving throw. On a failed save, the power ends immediately, causing the explosion. </p>\n\n<p>The fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 8th level or higher, the base damage increases by 1d6 for each slot level above 7th.</p>\n\n<h4>Destroy Tech</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Make a ranged tech attack against a creature within range. On a hit, the target takes 4d8 ion damage. Additionally, if the target has tech points, it must make an Intelligence saving throw. On a failed save, it loses 5 tech points, as though it expended a tech slot.</p>\n\n\n\n<p>&emsp;<strong><em>Overcharge Tech.</em></strong> When you cast this power with a tech slot of 4th level or higher, the ion damage increases by 1d8, and the amount of tech points lost increases by 1 for each slot level above 3rd.</p>\n\n<h4>Detect Enhancement</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>For the duration, you sense the presence of any enhancements within 30 feet of you. If you sense an enhancement in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears an enhancement.</p>\n\n<p>The power is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.</p>\n\n<h4>Detect Invisibility</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>For the duration, you see invisible creatures and objects as if they were visible.</p>\n\n<h4>Detect Traps</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You sense the presence, general location, and nature of any trap within 120 feet of you that is within line of sight. A trap, for this power, includes anything that would inflict a sudden or unexpected effect you consider harmful or undesirable, which was specifically intended by its creator. </p>\n\n<p>While the power is active, you have advantage on Wisdom (Perception) and Intelligence (Investigation) checks to find any traps that are within line of sight.</p>\n\n<h4>Diminish Tech</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>Choose one creature, object, or tech effect within range. Any tech power of 3rd level or lower on the target ends. For each tech power of 4th level or higher on the target, make an ability check using your techcasting ability. The DC equals 10 + the power's level. On a success, the power ends.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, you automatically end the effects of a tech power on the target if the power's level is equal to or less than the level of the tech slot you used.</p>\n\n\n\n<h4>Disintegrate</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A blast of corrosive energy emits from you. Choose a target within range. </p>\n\n<p>A creature targeted by this power must make a Dexterity saving throw. On a failed save, the target takes 10d6 + 40 acid damage. If this damage reduces the target to 0 hit points, it is disintegrated.</p>\n\n<p>A disintegrated creature and everything unenhanced it is wearing or carrying are reduced to a pile of fine gray dust. A creature destroyed in this way can not be revitalized.</p>\n\n<p>This power automatically disintegrates an unenhanced Large or smaller object. If the target is a Huge or larger object, this power disintegrates a 10-foot-cube portion of it. </p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 7th level or higher, the damage increases by 3d6 for each slot level above 6th.</p>\n\n<h4>Disperse Energy</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You have resistance to acid, cold, fire, lightning, and sonic damage for the power's duration.</p>\n\n<p>When you take damage of one of those types, you can use your reaction to gain immunity to that type of damage, including against the triggering damage. If you do so, the resistances end, and you have the immunity until the end of your next turn, at which time the power ends.</p>\n\n<h4>Echo Blast</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You emit a reverberating pulse of sound at a target within range. The target must succeed on a Wisdom saving throw or take 1d8 sonic damage.</p>\n\n<p>This power can hit multiple targets in succession when you reach higher levels: two targets at 5th level, three targets at 11th level, and four targets at 17th level. Each target must be within 30 feet of the previous target, and the last target must be no further than 30 feet away from you. You can not target the same creature twice in succession.</p>\n\n<h4>Electrical Burst</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (5-foot sphere)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You emit a burst of electricity. Each creature within range, other than you, must succeed on a Dexterity saving throw or take 1d6 lightning damage.</p>\n\n\n\n<p>&emsp;This power's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>\n\n<h4>Electromesh</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour </li></ul>\n\n<p>You expel a mass of thick, adhesive mesh at a point of your choice within range. The mesh fill a 20-foot cube from that point for the duration. The mesh is difficult terrain and lightly obscures their area.</p>\n\n<p>If the mesh isn't anchored between two solid masses (such as walls) or layered across a floor, wall, or ceiling, the electromesh collapses on itself, and the power ends at the start of your next turn. Mesh layered over a flat surface has a depth of 5 feet.</p>\n\n<p>Each creature that starts its turn in the mesh or that enters it during its turn must make a Dexterity saving throw. On a failed save, the creature is restrained as long as it remains in the mesh or until it breaks free.</p>\n\n<p>A creature restrained by the mesh can use its action to make a Strength check against your tech save DC. If it succeeds, it is no longer restrained.</p>\n\n<p>The mesh is flammable. Any 5-foot cube of electromesh exposed to fire burns away in 1 round, dealing 2d4 fire damage to any creature that starts its turn in the fire.</p>\n\n<h4>Electroshock</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Lightning springs from you to deliver a shock to a creature you try to touch. Make a melee tech attack against the target. You have advantage on the attack roll if the target is made of metal or wearing armor made of metal. On a hit, the target takes 1d8 lightning damage and becomes shocked until the start of its next turn.</p>\n\n<p>This power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).</p>\n\n<h4>Element of Surprise</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take in response to being damaged by a creature within 60 feet of you that you can see</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You expel a sabotage charge at the creature that attacked you. The creature must make a Dexterity saving throw. It takes 2d10 fire damage on a failed save, or half as much damage on a successful one.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d10 for each slot level above 1st.</p>\n\n\n\n<h4>Elemental Accelerant</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose one creature you can see and one damage type: acid, cold, fire, lightning, or sonic. The target must make a Constitution saving throw. If it fails, the first time on each turn when it takes damage of the chosen type, it takes an extra 2d6 damage of it. The target also loses resistance to the type until the power ends.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> You can target one additional creature for each slot level above 4th. The creatures must be within 30 feet of each other when you target them.</p>\n\n<h4>Encrypted Message</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You point your finger toward a creature within range that possesses a commlink and whisper a message. The target (and only the target) hears the message and can send an encrypted reply that only you can hear. These messages cannot be intercepted or decrypted by unenhanced means.</p>\n\n<p>You can cast this power through solid objects if you are familiar with the target and know it is beyond the barrier. 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood blocks the power. The power doesn't have to follow a straight line and can travel freely around corners or through openings.</p>\n\n<h4>Energetic Burst</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>A creature you touch gains 10 temporary hit points. While it has these hit points, the creature can add 1d4 to its saving throws. Any remaining temporary hit points are lost when the power ends.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power with a tech slot of 3rd level or higher, the target gains 5 additional temporary hit points for each slot level above 2nd. When you cast this power at 4th level or higher, the die size increases for every two slot levels above 2nd (d6 at 4th level, d8 at 6th level, d10 at 8th level).</p>\n\n<h4>Energizing Aura</h4>\n\n<p><em>8th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Energizing light radiates out from you in a 30-foot radius. Creatures of your choice in that radius when you cast this power have advantage on all saving throws, and other creatures have disadvantage on attack rolls against them until the power ends. </p>\n\n<h4>Energy Shield</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you are hit by an attack</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You quickly create an energy shield. Until the start of your next turn, you have a +5 bonus to AC. This includes the triggering attack. </p>\n\n<h4>Enhance Droid</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You touch a droid or construct and upgrade one of its aspects. Choose one of the following effects; the target gains that effect until the power ends. </p>\n\n<ul><li><strong><em>Servomotor.</em></strong> The target has advantage on Strength checks, and its carrying capacity doubles. </li><li><strong><em>Motivator.</em></strong> The target has advantage on Dexterity checks. It also doesn't take damage from falling 20 feet or less if it isn't incapacitated. </li><li><strong><em>Power Core.</em></strong> The target has advantage on Constitution checks. It also gains 2d6 temporary hit points, which are lost when the power ends. </li><li><strong><em>Databanks.</em></strong> The target has advantage on Intelligence checks. </li><li><strong><em>Sensors.</em></strong> The target has advantage on Wisdom checks. </li><li><strong><em>Relations Protocols.</em></strong> The target has advantage on Charisma checks. </li></ul>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, you can target one additional droid or construct for each slot level above 2nd.</p>\n\n<h4>Enhance Weapon</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>An unenhanced weapon you touch becomes an enhanced weapon. Choose one of these damage types: acid, cold, energy, fire, ion, kinetic, or lightning. For the duration, an unenhanced weapon you touch has a +1 to attack rolls and deals an extra 1d4 damage of the chosen type.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a 5th or 6th level tech slot, the bonus to attack rolls increases to +2 and the extra damage increases to 2d4. When you use a slot of 7th level or higher, the bonus increases to +3 and the extra damage increases to 3d4.</p>\n\n\n\n<h4>Execute Command</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You dictate a one-word command to a droid or construct you can see within range. The target must succeed on an Intelligence saving throw or follow the command on its next turn. If the construct has the 'Piloted' trait, and has a pilot controlling it that is not incapacitated, it gains a bonus to the saving throw equal to the pilot's Intelligence modifier. Some typical commands and their effects follow. You might issue a command other than one described here. If you do so, the GM determines how the target behaves. If the target can't follow your command, the power ends.</p>\n\n<p><strong><em>Approach.</em></strong> The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you.</p>\n\n<p><strong><em>Deactivate.</em></strong> The target falls prone and then ends its turn.</p>\n\n<p><strong><em>Drop.</em></strong> The target drops whatever it is holding and then ends its turn.</p>\n\n<p><strong><em>Flee.</em></strong> The target spends its turn moving away from you by the fastest available means.</p>\n\n<p><strong><em>Halt.</em></strong> The target doesn't move and takes no actions. A flying target stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance needed to remain in the air.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, you can affect one additional droid or construct for each slot level above 1st. The creatures must be within 30 feet of each other when you target them.</p>\n\n<h4>Expeditious Retreat</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes </li></ul>\n\n<p>This power gives you a burst of adrenaline that allows you to move at an incredible pace. When you cast this power, and then as a bonus action on each of your turns until the power ends, you can take the Dash action.</p>\n\n<h4>Explosion</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You create an explosion at a point within range. Each creature in a 20-foot-radius sphere centered on that point must make a Dexterity saving throw. A target takes 8d6 fire damage on a failed save, or half as much damage on a successful one.</p>\n\n<p>The fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd.</p>\n\n<h4>Extinguish</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet (5-foot cube)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You spray carbon foam in a 5-foot cube originating from a point within range. Flames within the affected area are instantly quenched, and objects within the affected area cannot be ignited for at least one minute. Any creature in the affected area must make a Constitution saving throw or take 1d4 cold damage.</p>\n\n<p>When you reach 5th level, this power can instead target a 10-foot cube within range. You gain additional options of increasing size when you reach 11th level (15-foot cube), and 17th level (20-foot cube).</p>\n\n<h4>Fabricate Trap</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 hour</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Until dispelled or triggered</li></ul>\n\n<p>When you cast this power, you create a trap that will later trigger in response to a certain condition. You must attach it either to a surface (such as a table or a section of floor or wall) or within an object that can be closed or turned on (such as a book, door, or computer terminal) to conceal the trap. The trap can cover an area no larger than 10 feet in diameter. At the GM's discretion, certain actions may cause the trap to break or be rendered inoperative.</p>\n\n<p>The trap is well disguised, and generally and requires a successful Intelligence (Investigation) check against your tech save DC to be found.</p>\n\n<p>You decide what triggers the trap when you cast the power, such as entering a certain area or powering on the object. You can further refine the trigger so the trap activates only under certain circumstances or according to physical characteristics (such as height or weight) or creature kind (for example, the trap could be set to go off only droids or gungans). You can also set conditions for creatures that don't trigger the trap, such as those who say a certain password.</p>\n\n<p>You may only have one instance of this trap active at a time. If you cast another trap before the previous one is triggered, the other trap becomes inert.</p>\n\n<p>When you create the trap, choose an explosive trap or a power trap:</p>\n\n<p><strong><em>Explosive Trap.</em></strong> When triggered, the trap erupts in a 20-foot-radius sphere centered on the trap. The explosion spreads around corners. Each creature in the area must make a Dexterity saving throw. A creature takes 5d8 acid, cold, fire, lightning, or sonic damage on a failed saving throw (your choice when you create the trap), or half as much damage on a successful one.</p>\n\n\n\n\n\n<p>&emsp;<strong><em>Power Trap.</em></strong> You can store a prepared tech power of 3rd level or lower in the trap by casting it as part of creating the trap. The trap must target a single creature or an area. The power being stored has no immediate effect when cast in this way. When the trap is triggered, the stored power is cast. If the trap has a target, it targets the creature that triggered the trap. If the power affects an area, the area is centered on that creature. If the power requires concentration, it lasts until the end of its full duration.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, the damage of an explosive trap increases by 1d8 for each slot level above 3rd. If you create a power trap, you can store any power of up to the same level as the slot you use for this power.</p>\n\n<h4>Find the Path</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 day</li></ul>\n\n<p>This power calculates out the shortest, most direct physical route to a specific fixed location that you are familiar with on the same planet. If you name a destination that moves (such as a mobile fortress), or a destination that isn't specific (such as \"a Black Sun lair\"), the power fails.</p>\n\n<p>For the duration, as long as you are on the same planet as the destination, you know how far it is and in what direction it lies. While you are traveling there, whenever you are presented with a choice of paths along the way, you automatically determine which path is the shortest and most direct route (but not necessarily the safest route) to the destination.</p>\n\n<h4>Firestorm</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose a point on the ground within range, incinerating everything in a 15-foot radius. All creatures must make a Dexterity saving throw, taking 8d8 fire damage on a failure or half as much on a success. All large or smaller creatures are pushed to the edge of the power's radius. You may choose one creature to be at the very center of the firestorm, if you do so that creature has disadvantage on its saving throw and is knocked prone on a failure.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 7th level or higher, the damage increases by 1d8 and the radius increases by 5 feet for each slot level above 6th.</p>\n\n<h4>Flame Sweep</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot cone)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>A thin sheet of flames shoots forth from you. Each creature in a 15-foot cone must make a Dexterity saving throw. A creature takes 3d6 fire damage on a failed save, or half as much damage on a successful one.</p>\n\n<p>The fire ignites any flammable objects in the area that aren't being worn or carried.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.</p>\n\n<h4>Flaming Shots</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You channel tech power through a blaster weapon you are wielding. When a target takes damage from the chosen weapon, the target takes an extra 1d6 fire damage. The power ends when twelve shots have been fired.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, the number of shots you can take with this power increases by two for each slot level above 3rd.</p>\n\n<h4>Flash</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You create a massive flash of light and explosion of sound at a point within range. Roll 6d10; the total is how many hit points of creatures this power can affect. Creatures within 20 feet of the point are affected in ascending order of their current hit points (ignoring unconscious creatures).</p>\n\n<p>Starting with the creature that has the lowest current hit points, each creature affected by this power is blinded until the end of your next turn. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, roll an additional 2d10 for each slot level above 1st.</p>\n\n\n\n<h4>Frequency Scan</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>For the duration, you can detect electronic transmissions. When you cast the power and as your action on each turn until the power ends, you can focus on any one creature that you can see within 30 feet of you. If the creature you choose does not possess a commlink, or is not a droid or construct, the creature is unaffected.</p>\n\n<p>If the creature possesses a commlink or other communications device, you receive any transmissions it broadcasts or receives for the duration.</p>\n\n<p>Additionally, if the target is a droid or construct, you can read its \"thoughts.\" You initially learn the surface thoughts of the creature�what is most on its mind in that moment. As an action, you can either shift your attention to another creature's thoughts or attempt to probe deeper into the same creature's mind. If you probe deeper, the target must make a Wisdom saving throw. If it fails, you gain insight into its reasoning (if any), and something that looms large in its mind (such as its current objectives). If it succeeds, the power ends. Either way, the target (or its pilot, if it has one) knows that you are probing into its mind, and unless you shift your attention to another creature's thoughts, the creature can use its action on its turn to make an Intelligence check contested by your Intelligence check; if it succeeds, the power ends.</p>\n\n<p>Questions verbally directed at the target creature naturally shape the course of its thoughts, so this power is particularly effective as part of an interrogation.</p>\n\n<p>You can also use this power to detect the presence of droids, constructs, or creatures bearing communications devices you can't see. When you cast the power or as your action during the duration, you can search for transmissions within 30 feet of you. The power can penetrate barriers, but 2 feet of rock, 2 inches of any metal other than lead, or a thin sheet of lead blocks you.</p>\n\n<p>Once you detect the presence of a creature in this way, you can read its thoughts or transmissions for the rest of the duration as described above, even if you can't see it, but it must still be within range.</p>\n\n<h4>Friendly Fire</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You scramble the targeting protocols of nearby machines. Each droid or construct in a 30-foot-radius sphere centered on a point you choose within range must make an Intelligence saving throw. If a construct has the 'Piloted' trait, and has a pilot controlling it that is not incapacitated, it gains a bonus to the saving throw equal to the pilot's Intelligence modifier. On a failed save, the target loses the ability to distinguish friend from foe, regarding all creatures it can see as enemies until the power ends. Each time the target takes damage, it can repeat the saving throw, ending the effect on itself on a success.</p>\n\n<p>Whenever the affected creature chooses another creature as a target, it must choose the target at random from among the creatures it can see within range of the attack, power, or other ability it�s using. If an enemy provokes an opportunity attack from the affected creature, the creature must make that attack if it is able to.</p>\n\n<h4>Gleaming Outline</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>Each object in a 20-foot cube within range is outlined in blue, green, or violet light (your choice). Any creature in the area when the power is cast is also outlined in light if it fails a Dexterity saving throw. For the duration, objects and affected creatures shed dim light in a 10-foot radius.</p>\n\n<p>Any attack roll against an affected creature or object has advantage if the attacker can see it, and the affected creature or object can't benefit from being invisible.</p>\n\n<h4>Glide</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you or a creature within 30 feet of you falls</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>One willing creature gains the ability to glide when falling. For the duration of the power, it falls at a rate of 30 feet per round and can move up to 30 feet horizontally as well on each of its turns. If the creature lands before the power ends, it takes no falling damage and can land on its feet, and the power ends for that creature.</p>\n\n\n\n<h4>Greater Analyze</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 10 minutes</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Name or describe a person, place, or object. This power gives you a summary of significant lore about it. If the thing you named isn't known outside of one planetary system, you gain no information. The more information you already have, the more detailed the information you receive is.</p>\n\n<h4>Greater Explosion</h4>\n\n<p><em>9th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You expell a massive explosion at a point within range. Each creature in a 40-foot-radius sphere centered on that point must make a Dexterity saving throw. A target takes 40d6 fire damage and is knocked prone on a failed save, or half as much damage on a successful one but remain standing.</p>\n\n<p>The fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried.</p>\n\n<h4>Greater Hologram</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You create an image no larger than a 20 foot cube. It appears at a spot you can see and lasts for the duration. It seems completely real, sounds and other sensory effects included. You can't create a sensory effect strong enough to cause damage or a condition.</p>\n\n<p>As long as you are within range of the illusion, you can use your action to make the image to move to any other spot within range. As the image changes location, you can alter it so that its movements appear natural for the image.</p>\n\n<p>Physical interaction with the image reveals it as an illusion. A creature can use its action to determine that it's an illusion with a successful Investigation check. If a creature learns it's an illusion, it can see through the image, and the other sensory qualities become faint to it.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> The power lasts until dispelled without requiring concentration if cast at 6th-level or higher.</p>\n\n<h4>Greater Light</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 hour </li></ul>\n\n<p>A 60-foot-radius sphere of light spreads from a point you choose. The sphere is bright light and sheds dim light for an additional 60 feet.</p>\n\n<p>If you chose an object you are holding or one that isn't being worn or carried, the light shines from and moves with the object. Completely covering the object with something opaque blocks the light.</p>\n\n<p>If any of this power's area overlaps with enhanced darkness made by a power of 3rd level or lower, the darkness is dispelled.</p>\n\n<h4>Greater Sabotage Charges</h4>\n\n<p><em>7th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You create six medium sabotage charges that last for the power's duration. When you cast the power, and as a bonus action on subsequent turns, you can hurl up to two of the charges to points you choose within 120 feet. Each charge explodes if it reaches the point or hits a solid surface. Each creature within 10 feet of the explosion must make a Dexterity save. The explosion deals 4d6 fire damage on a failure, or half damage on a success.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> The number of charges created increases by two for each slot level above 7th.</p>\n\n<h4>Greater Salvo</h4>\n\n<p><em>9th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You launch four projectiles at points you can see within range. Each creature within a 20-foot-radius sphere of each point must make a Dexterity saving throw. A creature takes 15d6 fire damage and 15d6 kinetic damage on a failed save, or half as much damage on a successful one. A creature in the area of more than one fiery burst is affected only once. </p>\n\n<p>The power damages objects in the area and ignites flammable objects that aren't being worn or carried.</p>\n\n<h4>Greater Translation Program</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>This power grants the creature you touch the ability to understand any spoken registered language it hears. Moreover, when the target speaks, any creature that knows at least one registered language and can hear the target understands what it says.</p>\n\n\n\n<h4>Greater Translocate</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Your form shimmers in a holographic configuration, and then collapses. You teleport up to 60 feet to an unoccupied space that you can see. On each of your turns before the power ends, you can use a bonus action to teleport in this way again.</p>\n\n<h4>Group Hologram</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 8 hours, or until the end of your next short or long rest; whichever happens first</li></ul>\n\n<p>This power allows you to change the appearance of any number of creatures that you can see within range. You give each target you choose a new, illusory appearance. An unwilling target can make a Charisma saving throw, and if it succeeds, it is unaffected by this power.</p>\n\n<p>The power disguises physical appearance as well as clothing, armor, weapons, and equipment. You can make each creature seem 1 foot shorter or taller and appear thin, fat, or in between. You can't change a target's body type, so you must choose a form that has the same basic arrangement of limbs. Otherwise, the extent of the illusion is up to you. The power lasts for the duration, unless you use your action to dismiss it sooner.</p>\n\n<p>The changes wrought by this power fail to hold up to physical inspection. For example, if you use this power to add a hat to a creature's outfit, objects pass through the hat, and anyone who touches it would feel nothing or would feel the creature's head and hair. If you use this power to appear thinner than you are, the hand of someone who reaches out to touch you would bump into you while it was seemingly still in midair.</p>\n\n<p>A creature can use its action to inspect a target and make an Intelligence (Investigation) check against your tech save DC. If it succeeds, it becomes aware that the target is disguised.</p>\n\n<h4>Haywire</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You momentarily surround a creature you can see within range with electronic interference and holographic illusions. The target must succeed on an Intelligence saving throw, or it takes 1d6 lightning damage and moves 5 feet in a random direction if it can move and its speed is at least 5 feet. Roll a d4 for the direction: 1, north; 2, south; 3, east; or 4, west. This movement doesn't provoke opportunity attacks, and if the direction rolled is blocked, the target doesn't move.</p>\n\n<p>The power's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>\n\n<h4>Hold Droid</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You emit a paralyzing dart at a droid or construct that you can see within range. The target must succeed on a Constitution saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another Constitution saving throw. On a success, the power ends on the target.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, you can target one additional droid or construct for each slot level above 2nd. The targets must be within 30 feet of each other when you target them.</p>\n\n<h4>Holding Cell</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A sphere of shimmering energy springs into being and encloses a creature or object of Large size or smaller within range. An unwilling creature must make a Dexterity saving throw. On a failed save, the creature is enclosed for the duration.</p>\n\n<p>Nothing�not physical objects, energy, or other power effects�can pass through the barrier, in or out, though a creature in the sphere can breathe. The sphere is immune to all damage, and a creature or object inside can't be damaged by attacks or effects originating from outside, nor can a creature inside the sphere damage anything outside it.</p>\n\n<p>The sphere is weightless and just large enough to contain the creature or object inside. An enclosed creature can use its action to push against the sphere's walls and thus roll the sphere at up to half the creature's speed. Similarly, the globe can be picked up and moved by other creatures.</p>\n\n<p>A disintegrate power targeting the globe destroys it without harming anything inside it.</p>\n\n<h4>Holographic Disguise</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>Until the power ends or you use an action to dismiss it, you can disguise yourself through the use of a hologram emitter. You can appear to be shorter or taller by about a foot and change the appearance of your body weight, but you cannot change the basic structure of your body. The hologram can include your clothes, armor, weapons, and other belongings on your person. </p>\n\n<p>The illusion is only visual, so any sort of physical contact will only interact with the real size and shape of you. A creature can use its action to make an Intelligence (Investigation) check against your tech save DC, seeing through the hologram on a success.</p>\n\n\n\n<h4>Hologram</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You create an image that is no larger than a 15-foot cube. The image appears at a spot within range and lasts for the duration. The image is purely visual. If anything passes through it, it is revealed to be an illusion.</p>\n\n<p>You can use your action to cause the image to move to any spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image.</p>\n\n<p>A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your tech save DC. If a creature discerns the illusion for what it is, the creature can see through the image.</p>\n\n<h4>Homing Rockets</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You lock on to one or more targets within range and expel a series of three small explosives. Each explosive hits a creature of your choice that you can see within range. An explosive deals 1d4 + 1 fire damage to its target. The explosives all strike simultaneously, and you can direct them to hit one creature or several.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the power creates one more explosive for each slot level above 1st.</p>\n\n<h4>Illusory Strike</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and you create an illusory duplicate of yourself in your space that only the target can see. The target has disadvantage on the next attack roll it makes against you before the start of your next turn.</p>\n\n<p>This power creates multiple duplicates when you reach higher levels. At 5th level, you create a second illusory duplicate, and the target has disadvantage on the next two attacks it makes against you before the start of your next turn. The number of duplicates and attacks with disadvantage increases to three at 11th level and four at 17th level.</p>\n\n<h4>Illusory Terrain</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 10 minutes</li><li><strong>Range:</strong> 300 feet</li><li><strong>Duration:</strong> 24 hours </li></ul>\n\n<p>You make terrain in a 150-foot cube in range look, sound, and smell like some other sort of terrain. </p>\n\n<p>The tactile characteristics of the terrain are unchanged, so creatures entering the area are likely to see through the illusion. If the difference isn't obvious by touch, a creature carefully examining the illusion can attempt an Intelligence (Investigation) check against your tech save DC to disbelieve it. A creature who discerns the illusion for what it is, sees it as a vague image superimposed on the terrain.</p>\n\n<h4>Immolate</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Flames wreathe one creature you can see within range. The target must make a Dexterity saving throw. It takes 8d6 fire damage on a failed save, or half as much damage on a successful one. On a failed save, the target also burns for the power's duration. The burning target sheds bright light in a 30-foot radius and dim light for an additional 30 feet. At the end of each of its turns, the target repeats the saving throw. It takes 4d6 fire damage on a failed save, and the power ends on a successful one. These enhanced flames can't be extinguished by unenhanced means.</p>\n\n<p>If damage from this power kills a target, the target is turned to ash.</p>\n\n<h4>Implant Message</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Until dispelled</li></ul>\n\n<p>You implant a message within an object in range, a message that is uttered when a trigger condition is met. Choose an object that you can see and that isn't being worn or carried by another creature. Then speak the message, which must be 25 words or less, though it can be delivered over as long as 10 minutes. Finally, determine the circumstance that will trigger the power to deliver your message.</p>\n\n<p>When that circumstance occurs, the message is recited in your voice and at the same volume you spoke. When you cast this power, you can have the power end after it delivers its message, or it can remain and repeat its message whenever the trigger occurs.</p>\n\n<p>The triggering circumstance can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the object. For example, you could instruct the message to play when any creature moves within 30 feet of the object or when a bell rings within 30 feet of it.</p>\n\n\n\n<h4>Incendiary Cloud</h4>\n\n<p><em>8th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>You create a swirling cloud of smoke shot through with white-hot embers in a 20-foot-radius sphere centered on a point within range. The cloud spreads around corners and is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least 10 miles per hour) disperses it.</p>\n\n<p>When the cloud appears, each creature in it must make a Dexterity saving throw. A creature takes 10d8 fire damage on a failed save, or half as much damage on a successful one. A creature must also make this saving throw when it enters the power's area for the first time on a turn or ends its turn there.</p>\n\n<p>The cloud moves 10 feet directly away from you in a direction that you choose at the start of each of your turns.</p>\n\n<h4>Infiltrate</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>A creature you touch becomes invisible. Anything the target is carrying is invisible as long as it is on the target. The power ends if the target attacks, casts a power, or otherwise take a hostile action.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> You can target one additional creature for each slot level above 2nd.</p>\n\n<h4>Invisibility to Cameras</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 10 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Up to four creatures of your choice become undetectable to electronic sensors and cameras. Anything the target is wearing or carrying is also undetectable, so long as it's on the target's person. The target is still visible to regular vision.</p>\n\n<h4>Invulnerability</h4>\n\n<p><em>9th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>A flickering blue aura shimmers into being around you. Until the power ends, you are immune to all damage.</p>\n\n<h4>Ion Blast</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You create a blast of ion energy. Choose one creature within range that you can see, or choose two creatures within range that are within 5 feet of each other that you can see. A target must succeed on a Dexterity saving throw or take 1d4 ion damage. </p>\n\n<p>This power's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).</p>\n\n<h4>Ionic Bond</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>A beam of ion energy lances out toward a creature within range, forming a sustained line between you and the target. Make a ranged tech attack against that creature. On a hit, the target takes 1d8 ion damage, and on each of your turns for the duration, you can use a bonus action to deal 1d8 ion damage to the target automatically. The power ends if you use your bonus action to do anything else. The power also ends if the target is ever outside the power's range or if it has total cover from you.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the initial damage increases by 1d8 for each slot level above 1st.</p>\n\n<h4>Ionic Strike</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and it becomes wreathed in an ionic discharge. If the target willingly takes a reaction before the start of your next turn, it immediately takes 1d6 ion damage, and the power ends. </p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d6 ion damage to the target, and the damage the target takes for taking reactions increases to 2d6. Both damage rolls increase by 1d6 at 11th level and 17th level.</p>\n\n\n\n<h4>Jet of Flame</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot sphere)</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>A flickering flame appears in your hand. The flame remains there for the duration and harms neither you nor your equipment. The flame sheds bright light in a 10-foot radius and dim light for an additional 10 feet. The power ends if you dismiss it as an action or if you cast it again.</p>\n\n<p>You can also attack with the flame, although doing so ends the power. When you cast this power, or as an action on a later turn, you can hurl the flame at a creature within 30 feet of you. Make a ranged tech attack. On a hit, the target takes 1d8 fire damage. The fire ignites any flammable objects in the area that aren't being worn or carried.</p>\n\n<p>This power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).</p>\n\n<h4>Kolto Cloud</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>As you expel kolto, up to six creatures of your choice that you can see within range regain hit points equal to 1d4 + your techcasting ability modifier. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, the healing increases by 1d4 for each slot level above 3rd.</p>\n\n<h4>Kolto Dispenser</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet (5-foot cube)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You establish a mobile first aid station that radiates kolto in a 5-foot cube you can see within range.</p>\n\n<p>Until the power ends, whenever you or a creature you can see moves into the station's space for the first time on a turn or starts its turn there, you can cause the station to restore 1d6 hit points to that creature (no action required). The station can heal a number of times equal to 1 + your techcasting ability modifier (minimum of twice). After healing that number of times, the station disintegrates. This power has no effect on droids or constructs.</p>\n\n<p>As a bonus action on your turn, you can move the station up to 30 feet to a space you can see.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the healing increases by 1d6 for each slot level above 2nd.</p>\n\n<h4>Kolto Infusion</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose a creature that you can see within range. A surge of kolto energy washes over the creature, causing it to regain 70 hit points. This power also ends blindness, deafness, and any diseases affecting the target. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 7th level or higher, the amount of healing increases by 10 for each slot level above 6th.</p>\n\n<h4>Kolto Pack</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>A creature of your choice that you can see within range regains hit points equal to 1d4 + your techcasting ability modifier. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the healing increases by 1d4 for each slot level above 1st.</p>\n\n<h4>Kolto Reserve</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 8 hours, or until the end of your next short or long rest; whichever happens first</li></ul>\n\n<p>You touch a creature and grant it a small reserve of kolto. The first time the target would drop to 0 hit points as a result of taking damage, the target instead drops to 1 hit point, and the power ends. If the power is still in effect when the target is subjected to an effect that would kill it instantaneously without dealing damage, that effect is instead negated against the target, and the powers ends. This power has no effect on droids or constructs.</p>\n\n<h4>Kolto Waves</h4>\n\n<p><em>9th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A flood of kolto energy flows from you into injured creatures around you. You restore up to 700 hit points, divided as you choose among any number of creatures that you can see within range. Creatures healed by this power are also cured of all diseases and any effect making them blinded or deafened. This power has no effect on droids or constructs.</p>\n\n\n\n<h4>Light</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You touch one object that is no larger than 10 feet in any dimension. Until the power ends, the object sheds bright light in a 20-foot radius and dim light for an additional 20 feet. The light can be colored as you like. Completely covering the object with something opaque blocks the light. The power ends if you cast it again or dismiss it as an action.</p>\n\n<p>If you target an object held or worn by a hostile creature, that creature must succeed on a Dexterity saving throw to avoid the power.</p>\n\n<h4>Lock</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Until dispelled</li></ul>\n\n<p>You touch a closed door, window, gate, chest, or other entryway, and it becomes locked for the duration. You and the creatures you designate when you cast this power can open the object normally. You can also set a password that, when spoken within 5 feet of the object, suppresses this power for 1 minute. Otherwise, it is impassable until it is broken or the power is dispelled or suppressed. Casting <em>release</em> on the object suppresses <em>lock</em> for 10 minutes.</p>\n\n<p>While affected by this power, the object is more difficult to break or force open; the DC to break it or pick any locks on it increases by 10.</p>\n\n<h4>Magnetic Field</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You create a strong magnetic field around you in a 10-foot radius which moves with you, remaining centered on you. The field lasts for the power's duration.</p>\n\n<p>The field has the following effects:</p>\n\n<ul><li>The area is difficult terrain for creatures other than you.</li><li>The attack rolls of ranged weapon attacks which deal kinetic, energy, or ion damage have disadvantage if the attacks pass in or out of the field.</li><li>Communications equipment cannot communicate into or out of the field.</li></ul>\n\n<h4>Magnetic Hold</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>Until the power ends, one willing creature you touch gains the ability affix itself to and move along any metallic surface. It can move up, down, and across vertical surfaces and upside down along ceilings, all while leaving its hands free, at its normal walking speed.</p>\n\n<h4>Mass Repair Droid</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>Choose up to six droids or constructs in a 30-foot-radius sphere centered on a point. Each target regains hit points equal to 3d8 + your techcasting ability modifier. This power only effects droids and constructs.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 6th level or higher, the healing increases by 1d8 for each slot level above 5th.</p>\n\n<h4>Mending</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>This ability repairs a single break or tear in an object you touch, such as broken chain link, two halves of a broken key, a torn strap, or a leaking cup. As long as the break or tear is no larger than 1 foot in any dimension, you mend it, leaving no trace of the former damage.</p>\n\n<h4>Minor Defibrillation</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You generate a static charge that can aid or harm a creature you touch. Make a melee tech attack against the target. On a hit, the target takes 1d10 lightning damage. If the target is a living creature that has 0 hit points, it immediately gains one death saving throw success instead of taking damage.</p>\n\n<p>This power's damage increases by 1d10 when you reach 5th level (2d10), 11th level (3d10), and 17th level (4d10).</p>\n\n\n\n<h4>Minor Hologram</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 10 feet</li><li><strong>Duration:</strong> Up to 1 hour</li></ul>\n\n<p>This ability is a minor tech trick that creates one of the following effects within range.</p>\n\n<ul><li>You create an instantaneous, harmless sensory effect, such as a shower of sparks, a puff of wind, faint musical notes, or an odd odor. </li><li>You instantaneously light or snuff out a source of light. </li><li>You instantaneously clean or soil an object no larger than 1 cubic foot. </li><li>You chill, warm, or flavor up to 1 cubic foot of nonliving material for 1 hour. </li><li>You make a color, a small mark, or a symbol appear on an object or a surface for 1 hour. </li><li>You create a trinket or an illusory image that can fit in your hand and that lasts until the end of your next turn. </li></ul>\n\n<p>If you use this power multiple times, you can have up to three of its non-instantaneous effects active at a time, and you can dismiss such an effect as an action.</p>\n\n<h4>Mirror Image</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>Three illusory duplicates of yourself appear in your space. Until the power ends, the duplicates move with you and mimic your actions, shifting position so it's impossible to track which image is real. You can use your action to dismiss the illusory duplicates.</p>\n\n<p>Each time a creature targets you with an attack during the power's duration, roll a d20 to determine whether the attack instead targets one of your duplicates.</p>\n\n<p>If you have three duplicates, you must roll a 6 or higher to change the attack's target to a duplicate. With two duplicates, you must roll an 8 or higher. With one duplicate, you must roll an 11 or higher.</p>\n\n<p>A duplicate's AC equals 10 + your Dexterity modifier. If an attack hits a duplicate, the duplicate is destroyed. A duplicate can be destroyed only by an attack that hits it. It ignores all other damage and effects. The power ends when all three duplicates are destroyed.</p>\n\n<p>A creature is unaffected by this power if it can't see, if it relies on senses other than sight, such as blindsight, or if it can perceive illusions as false, as with truesight. </p>\n\n<h4>Mislead</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You become invisible at the same time that an illusory double of you appears where you are standing. The double lasts for the duration, but the invisibility ends if you attack or cast a power.</p>\n\n<p>You can use your action to move your illusory double up to twice your speed and make it gesture, speak, and behave in whatever way you choose.</p>\n\n<p>You can see through its eyes and hear through its ears as if you were located where it is. On each of your turns as a bonus action, you can switch from using its senses to using your own, or back again. While you are using its senses, you are blinded and deafened in regard to your own surroundings.</p>\n\n<h4>Mobile Lights</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You create up to four orbs of light within range that hover in the air for the duration. You can also combine the four lights into one glowing vaguely humanoid form of Medium size. Whichever form you choose, each light sheds dim light in a 10-foot radius.</p>\n\n<p>As a bonus action on your turn, you can move the lights up to 60 feet to a new spot within range. A light must be within 20 feet of another light created by this power, and a light winks out if it exceeds the power's range.</p>\n\n\n\n<h4>Motivator Boost</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You imbue a willing droid with heightened speed and maneuverability. Until the power ends, the target's speed is doubled, it gains a +2 bonus to AC, and it has advantage on Dexterity saving throws. </p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, you can target one additional droid for each slot level above 2nd.</p>\n\n<h4>Neurotoxin</h4>\n\n<p><em>7th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You release a series of darts filled with neurotoxin. Choose any number of creatures you can see within range. Each creature  must make a Constitution saving throw. On a failed save, a creature suffers an effect based on its current hit points:</p>\n\n<ul><li>60 hit points or fewer: poisoned for 1 minute</li><li>50 hit points or fewer: poisoned and deafened for 1 minute</li><li>40 hit points or fewer: poisoned, deafened, and blinded for 10 minutes</li><li>30 hit points or fewer: poisoned, blinded, deafened, and stunned for 1 hour</li><li>20 hit points or fewer: killed instantly</li></ul>\n\n<p>This power has no effect on droids or constructs.</p>\n\n<h4>Oil Slick</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>You cover the ground in a 10-foot square within range in oil. For the duration, it is difficult terrain.</p>\n\n<p>When the oil appears, each creature standing in its area must succeed on a Dexterity saving throw or fall prone. A creature that enters the area or ends its turn there must also succeed on a Dexterity saving throw.</p>\n\n<p>The oil is flammable. Any 5 foot square of the oil exposed to fire burns away in one round. Each creature who enters the fire or starts it turn there must make a Dexterity saving throw, taking 3d6 fire damage on a failed save, or half as much on a successful one. The fire ignites any flammable objects in the area that aren't being worn or carried.</p>\n\n<h4>On/Off</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>This power allows you to activate or deactivate any electronic device within range, as long as the device is not being wielded by a creature, and has a clearly defined on or off function that can be easily accessed from the outside of the device. Any device that requires a software-based shutdown sequence to activate or deactivate cannot be affected by <em>on/off</em>.</p>\n\n<h4>Overheat</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>Choose a manufactured metal object, such as a blaster or a suit of heavy or medium metal armor, that you can see within range. You cause the object to glow red-hot. Any creature in physical contact with the object takes 2d8 fire damage when you cast the power. Until the power ends, you can use a bonus action on each of your subsequent turns to cause this damage again.</p>\n\n<p>If an object is held, worn, or integrated, and a creature takes the damage from it, the creature must succeed on a Constitution saving throw or drop the object if it can. If it doesn't�or can't�drop the object, it has disadvantage on attack rolls and ability checks until the start of your next turn.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd.</p>\n\n<h4>Overload</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot cube)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You expel a burst of power. Each creature in a 15-foot cube originating from you must make a Dexterity saving throw. On a failed save, a creature takes 2d6 ion damage and is pushed 10 feet away from you. On a successful save, the creature takes half as much damage and isn't pushed.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.</p>\n\n\n\n<h4>Override Interface</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You choose one droid or construct you can see within range and attempt to remotely override its controls. The target must make an Intelligence saving throw. If the construct has the 'Piloted' trait, and has a pilot controlling it that is not incapacitated, it gains a bonus to the saving throw equal to the pilot's Intelligence modifier. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw. On a failed save, the creature is charmed by you for the duration.</p>\n\n<p>While the droid is charmed, you have a wireless link with it as long as the two of you are on the same planet. Via your tech focus, you can use this link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Move over there,\" or \"Fetch that object.\" If the droid completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability. </p>\n\n<p>You can use your action to take total and precise control of the target. Until the end of your next turn, the droid takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time, you can also cause the creature to use a reaction, but this requires you to use your own reaction as well. </p>\n\n<p>Each time the target takes damage, it makes a new Intelligence saving throw against the power. If the saving throw succeeds, the power ends.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a 6th-level tech slot, the duration is 10 minutes. When you use a 7th-level tech slot, the duration is 1 hour. When you use a tech slot of 8th level or higher, the duration is 8 hours.</p>\n\n<h4>Paralyze Creature</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You emit a paralyzing dart at a creature that you can see within range. The target must succeed on a Constitution saving throw or be poisoned for the duration. While poisoned in this way, the target is paralyzed. At the end of each of its turns, the target can make another Constitution saving throw. On a success, the power ends on the target.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 6th level or higher, you can target one additional creature for each slot level above 5th. The creatures must be within 30 feet of each other when you target them.</p>\n\n<h4>Paralyze Humanoid</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You emit a paralyzing dart at a humanoid that you can see within range. The target must succeed on a Constitution saving throw or be poisoned for the duration. While poisoned in this way, the target is paralyzed. At the end of each of its turns, the target can make another Constitution saving throw. On a success, the power ends on the target.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, you can target one additional humanoid for each slot level above 2nd. The humanoids must be within 30 feet of each other when you target them.</p>\n\n<h4>Pheromone Burst</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (5-foot sphere)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You expel a burst of mood-altering pheromones around you. Each creature within range other than you must succeed on a Charisma saving throw or take 1d4 poison damage and become frightened of you until the start of its next turn. A creature that is immune to the poisoned condition is not frightened.</p>\n\n<p>This power's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).</p>\n\n<h4>Poison Dart</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Make a ranged tech attack against a creature within range. On hit, the target takes 2d8 poison damage and must make a Constitution save. On a failed save, it is also poisoned until the end of your next turn.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d8 for each slot level above 1st.</p>\n\n<h4>Poison Spray</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 10 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You extend your hand toward a creature you can see within range and project a puff of noxious gas. The creature must succeed on a Constitution saving throw or take 1d12 poison damage. </p>\n\n<p>This power's damage increases by 1d12 when you reach 5th level (2d12), 11th level (3d12), and 17th level (4d12).</p>\n\n\n\n<h4>Predictive AI</h4>\n\n<p><em>9th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 8 hours, or until the end of your next short or long rest; whichever happens first</li></ul>\n\n<p>You touch a willing creature, granting them a limited AI companion that can predict the world around them. For the duration, the target can't be surprised and has advantage on attack rolls, ability checks, and saving throws. Additionally, other creatures have disadvantage on attack rolls against the target for the duration.</p>\n\n<p>This power immediately ends if you cast it again before its duration ends.</p>\n\n<h4>Preparedness</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 8 hours, or until the end of your next short or long rest; whichever happens first</li></ul>\n\n<p>You touch a willing creature. For the duration, the target can add 1d8 to its initiative rolls.</p>\n\n<h4>Pressure Crush</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You attempt to crush the body of a creature you touch. The target must make a Strength saving throw. If the creature is grappled or restrained by you or an effect you control, it makes the saving throw with disadvantage. On a failed save, the creature takes 1d12 kinetic damage.</p>\n\n<p>This power's damage increases by 1d12 when you reach 5th level (2d12), 11th level (3d12), and 17th level (4d12).</p>\n\n<h4>Programmed Illusion</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Until dispelled</li></ul>\n\n<p>You create an illusion of an object, a creature, or some other visible phenomenon within range that activates when a specific condition occurs. The illusion is imperceptible until then. It must be no larger than a 30-foot cube, and you decide when you cast the power how the illusion behaves and what sounds it makes. This scripted performance can last up to 5 minutes.</p>\n\n<p>When the condition you specify occurs, the illusion springs into existence and performs in the manner you described. Once the illusion finishes performing, it disappears and remains dormant for 10 minutes. After this time, the illusion can be activated again.</p>\n\n\n\n<p>&emsp;The triggering condition can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the area. For example, you could create an illusion of yourself to appear and warn off others who attempt to open a trapped door, or you could set the illusion to trigger only when a creature says the correct word or phrase.</p>\n\n<p>Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your tech save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.</p>\n\n<h4>Project Hologram</h4>\n\n<p><em>7th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 500 miles</li><li><strong>Duration:</strong> Concentration, up to 24 hours</li></ul>\n\n<p>You create an illusory copy of yourself that lasts for the duration. The copy can appear at any location within range that you have seen before, regardless of intervening obstacles. The illusion looks and sounds like you but is intangible. If the illusion takes any damage, it disappears, and the power ends.</p>\n\n<p>You can use your action to move this illusion up to twice your speed, and make it gesture, speak, and behave in whatever way you choose. It mimics your mannerisms perfectly.</p>\n\n<p>You can see through its eyes and hear through its ears as if you were in its space. On your turn as a bonus action, you can switch from using its senses to using your own, or back again. While you are using its senses, you are blinded and deafened in regard to your own surroundings.</p>\n\n<p>Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your tech save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.</p>\n\n<h4>Protection from Energy</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour </li></ul>\n\n<p>For the duration, the willing creature you touch has resistance to one damage type of your choice: acid, cold, fire, lightning, or sonic.</p>\n\n\n\n<h4>Pyrotechnics</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose an area of unenhanced flame that you can see and that fits within a 5-foot cube within range. You can extinguish the fire in that area, and you create either fireworks or smoke when you do so.</p>\n\n<p><strong><em>Fireworks.</em></strong> The target explodes with a dazzling display of colors. Each creature within 10 feet of the target must succeed on a Constitution saving throw or become blinded until the end of your next turn.</p>\n\n<p><strong><em>Smoke.</em></strong> Thick black smoke spreads out from the target in a 20-foot radius, moving around corners. The area of the smoke is heavily obscured. The smoke persists for 1 minute or until a strong wind disperses it.</p>\n\n<h4>Radiation</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>Dim, greenish light spreads within a 30-foot-radius sphere centered on a point you choose within range. The light spreads around corners, and it lasts until the power ends.</p>\n\n<p>When a creature moves into the power's area for the first time on a turn or starts its turn there, that creature must succeed on a Constitution saving throw or take 4d10 necrotic damage, and it suffers one level of exhaustion and emits a dim, greenish light in a 5-foot radius. This light makes it impossible for the creature to benefit from being invisible. The light and any levels of exhaustion caused by this power go away when the power ends.</p>\n\n<h4>Read Memory</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 10 feet</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>You read the memory of an incapacitated droid or construct within range. The target must have its memory core (and/or other appropriate components) intact.</p>\n\n<p>Until the power ends, you can ask up to five questions. Depending on what it would know or has witnessed, the target provides visual, audio, or text-based data in response. The target can�t provide new information, and can't speculate about future events.</p>\n\n<h4>Reboot</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>Choose a Medium or smaller droid or construct you can see. The target must make a Charisma saving throw. On a failed save, it is incapacitated until the start of your next turn. Each time the creature takes damage or is the target of a hostile power while incapacitated in this way, it can repeat this saving throw, ending the effect on a success.</p>\n\n<h4>Release</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>Choose an object that you can see within range. The object can be a door, a box, a chest, a set of binders, a lock, or another object that contains a mundane or enhanced means that prevents access.</p>\n\n<p>A target that is held shut by a mundane lock or that is stuck or barred becomes unlocked, unstuck, or unbarred. If the object has multiple locks, only one of them is unlocked.</p>\n\n<p>If you choose a target that is held shut with <em>lock</em>, that power is suppressed for 10 minutes, during which time the target can be opened and shut normally.</p>\n\n<h4>Remove Virus</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>At your touch, all tech-based curses affecting one creature or object end. If the object is a cursed enhanced item, its curse remains, but the power breaks its owner's attunement to the object so it can be removed or discarded.</p>\n\n<h4>Repair Droid</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A droid or construct you touch regains a number of hit points equal to 1d8 + your techcasting ability modifier. This power only effects droids and constructs.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the healing increases by 1d8 for each slot level above 1st.</p>\n\n\n\n<h4>Reprogram Droid</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 30 days</li></ul>\n\n<p>You alter the protocols of a droid that you can see within range, forcing it to carry out some service or refrain from some action or course of activity as you decide. The droid must succeed on a Wisdom saving throw or become charmed by you for the duration. While the droid is charmed by you, it takes 5d10 lightning damage each time it acts in a manner directly counter to your instructions, but it can only do so once each day.</p>\n\n<p>You can issue any command you choose, short of an activity that would result in certain death. Should you issue a suicidal command, the power ends. You can end the power early by using an action to dismiss it. The <em>remove virus</em> power also ends it.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 7th or 8th level, the duration is 1 year. When you cast this power using a tech slot of 9th level, the power lasts until it is ended by <em>remove virus</em>.</p>\n\n<h4>Rewrite Memory</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You attempt to alter a droid or construct's memories. One droid or construct that you can see must make a Wisdom saving throw. If you are fighting the creature, it has advantage on the saving throw. On a failed save, the target becomes charmed by you for the duration. The charmed target is incapacitated and unaware of its surroundings, though it can still hear you. If it takes any damage or is targeted by another power, this power ends, and none of the target's memories are modified.</p>\n\n<p>While this charm lasts, you can affect the target's memory of an event that it experienced within the last 24 hours and that lasted no more than 10 minutes. You can permanently eliminate all memory of the event, allow the target to recall the event with perfect clarity and exacting detail, change its memory of the details of the event, or create a memory of some other event.</p>\n\n<p>The target's mind fills in any gaps in the altered memory. If the power ends before you have finished prescribing the modified memories, the creature's memory isn't altered. Otherwise, the modified memories take hold when the power ends.</p>\n\n<p>A modified memory doesn't necessarily affect how the target behaves, particularly if the memory contradicts the target's core programming, alignment, or beliefs. An illogical modified memory, such as implanting a memory of how much the target enjoyed dousing itself in acid, is dismissed, perhaps as a glitch. The DM might deem a modified memory too nonsensical to affect a target in a significant manner.</p>\n\n<p>A <em>remove virus</em> or similar power cast on the target restores its true memory.</p>\n\n\n\n<p>&emsp;<strong><em>Overcharge Tech.</em></strong> If you cast this power using a tech slot of 6th level or higher, you can alter the target's memories of an event that took place up to 7 days ago (6th level), 30 days ago (7th level), 1 year ago (8th level), or any time in the creature's past (9th level).</p>\n\n<h4>Rime Shot </h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round </li></ul>\n\n<p>As part of the action used to cast this power, you must make a ranged weapon attack against one creature within your weapon's range, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and the creature gains 1 slowed level until the end of its turn as the air around it turns frigid. </p>\n\n<p>This power deals additional damage when you reach higher levels. At 5th level the ranged attack deals an extra 1d6 cold damage. This damage increases by 1d6 again at 11th level and 17th level.</p>\n\n<h4>Rime Strike</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and gains 1 slowed level until the start of your next turn, as the cold energy seeps into its being. Additionally, if the target doesn't move at least 5 feet before the start of your next turn, it immediately takes 1d8 cold damage, and the power ends. </p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 cold damage to the target, and the damage the target takes for not moving increases to 2d8. Both damage rolls increase by 1d8 at 11th level and 17th level. </p>\n\n\n\n<h4>Ring of Fire</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> Self </li><li><strong>Duration:</strong> Concentration, up to 1 minute  </li></ul>\n\n<p>A wall of flames erupts out of the ground in a ring around you with a radius of 15 feet and a height of 10 feet. Creatures who start their turn in the ring of fire or pass through it on their turn take 1d6 fire damage. Creatures within the ring of fire who willingly try to move through the fire to escape must succeed on a Wisdom saving throw to do so. Creatures who are immune to fear or fire automatically succeed on this saving throw. </p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage of the ring of fire increases by 1d6 for each slot level above 1st.</p>\n\n<h4>Sabotage Charges</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You create six tiny sabotage charges that last for the power's duration. When you cast the power, and as a bonus action on subsequent turns, you can hurl up to two of the charges to points you choose within 120 feet. Each charge explodes if it reaches the point or hits a solid surface. Each creature within 5 feet of the explosion must make a Dexterity save. The explosion deals 2d6 fire damage on a failure, or half damage on a success.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> The number of charges created increases by two for each slot level above 3rd.</p>\n\n<h4>Salvo</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You launch three projectiles at points you can see within range. Each creature within a 10-foot radius sphere of each point must make a Dexterity saving throw. A creature takes 3d6 fire and 3d6 kinetic damage on a failed save, or half as much damage on a successful one. A creature in the area of more than one sphere is affected only once.</p>\n\n<p>The power damages objects in the area and ignites flammable objects that aren't being worn or carried.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 6th level or higher, you create four projectiles. When you cast this power using a tech slot of 8th level or higher, you create five projectiles.</p>\n\n<h4>Scan Area</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>Program a creature or object that you are familiar with into your tech focus. Using a sonar scan, the tech focus attempts to find a path to the creature's or objects location, as long as that creature or object is within 1,000 feet of you. If the creature or object is moving, you know the direction of its movement.</p>\n\n<p>The power can locate a specific creature or object known to you, or the nearest creature/object of a specific kind (such as a droid or a bothan), so long as you have seen such a creature up close�within 30 feet�at least once. </p>\n\n<h4>Scramble Interface</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You choose one droid or construct you can see within range and scramble its ability to differentiate targets. The target must make an Intelligence saving throw. If the construct has the 'Piloted' trait, and has a pilot controlling it that is not incapacitated, it gains a bonus to the saving throw equal to the pilot's Intelligence modifier. On a failed save, the target loses the ability to distinguish friend from foe, regarding all creatures it can see as enemies until the power ends. Each time the target takes damage, it can repeat the saving throw, ending the effect on itself on a success.</p>\n\n<p>Whenever the affected creature chooses another creature as a target, it must choose the target at random from among the creatures it can see within range of the attack, power, or other ability it's using. If an enemy provokes an opportunity attack from the affected creature, the creature must make that attack if it is able to.</p>\n\n<h4>Scrambling Barrier</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (10-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>An immobile, faintly shimmering barrier springs into existence in a 10-foot radius around you and remains for the duration.</p>\n\n<p>Any tech power of 5th level or lower cast from outside the barrier can't affect creatures or objects within it, even if the power is cast using a higher level tech slot. Such a power can target creatures and objects within the barrier, but the power has no effect on them. Similarly, the area within the barrier is excluded from the areas affected by such powers.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 7th level or higher, the barrier blocks powers of one level higher for each slot level above 6th.</p>\n\n\n\n<h4>Scrambling Field</h4>\n\n<p><em>8th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (10-foot-radius sphere)</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>A 10-foot-radius shimmering sphere of power suppression surrounds you. Within the sphere, powers can't be cast and enhanced items become mundane. Until the power ends, the sphere moves with you, centered on you.</p>\n\n<p>Powers and other enhanced effects are suppressed in the sphere and can't protrude into it. A slot expended to cast a suppressed power is consumed. While an effect is suppressed, it doesn't function, but the time it spends suppressed counts against its duration.</p>\n\n<p><strong><em>Targeted Effects.</em></strong> Powers and other enhanced effects that target a creature or an object in the sphere have no effect on that target.</p>\n\n<p><strong><em>Enhanced Areas.</em></strong> The area of another power or enhanced effect, such as <em>explosion</em>, can't extend into the sphere. If the sphere overlaps an enhanced area, the part of the area that is covered by the sphere is suppressed.</p>\n\n<p><strong><em>Powers.</em></strong> Any active power or other enhanced effect on a creature or an object in the sphere is suppressed while the creature or object is in it.</p>\n\n<p><strong><em>Enhanced Items.</em></strong> The properties and powers of enhanced items are suppressed in the sphere. For example, a +1 lightsaber in the sphere functions as an unenhanced lightsaber.</p>\n\n<p>An enhanced weapon's properties and powers are suppressed if it is used against a target in the sphere or wielded by an attacker in the sphere. If an enhanced weapon or a piece of enhanced ammunition fully leaves the sphere (for example, if you fire an enhanced shot or throw an enhanced vibrospear at a target outside the sphere), the enhancement of the item ceases to be suppressed as soon as it exits.</p>\n\n<p><strong><em>Enhanced Travel.</em></strong> Teleportation fails to work in the sphere, whether the sphere is the destination or the departure point for such enhanced travel. A portal to another location temporarily closes while in the sphere.</p>\n\n<p><strong><em>Creatures and Objects.</em></strong> A creature or object summoned or created by powers temporarily winks out of existence in the sphere. Such a creature instantly reappears once the space the creature occupied is no longer within the sphere.</p>\n\n<p><strong><em>Tech Override/Diminish Tech.</em></strong> Powers and enhanced effects such as <em>tech override</em> have no effect on the sphere. Likewise, the spheres created by different scrambling field powers don't nullify each other.</p>\n\n<h4>Security Protocols</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 10 minutes</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 24 hours </li></ul>\n\n<p>You create a ward that protects up to 2,500 square feet of floor space (an area 50 feet square, or one hundred 5-foot squares or twenty-five 10-foot squares). The secured area can be up to 20 feet tall, and shaped as you desire. You can ward several stories of a stronghold by dividing the area among them, as long as you can walk into each contiguous area while you are casting the power.</p>\n\n<p>When you cast this power, you can specify individuals that are unaffected by any or all of the effects that you choose. You can also specify a password that, when spoken aloud, makes the speaker immune to these effects.</p>\n\n<p>When commanded (no action required), <em>security protocols</em> creates the following effects within the secured area.</p>\n\n<p><strong><em>Corridors.</em></strong> Fog fills all the secured corridors, making them heavily obscured. In addition, at each intersection or branching passage offering a choice of direction, there is a 50 percent chance that a creature other than you will believe it is going in the opposite direction from the one it chooses.</p>\n\n<p><strong><em>Doors.</em></strong> All doors in the secured area are locked, as if sealed by the <em>lock</em> power. In addition, you can cover up to ten doors with an image (equivalent to the illusory object function of the <em>minor hologram</em> power) to make them appear as plain sections of wall.</p>\n\n<p><strong><em>Stairs.</em></strong> Electromesh fills all stairs in the secured area from top to bottom, as the <em>electromesh</em> power. This mesh regrows in 10 minutes if it is burned or torn away while <em>security protocols</em> lasts.</p>\n\n<p><strong><em>Other power effect.</em></strong> You can place your choice of one of the following enhanced effects within the secured area of the stronghold.</p>\n\n<ul><li>Place <em>mobile lights</em> in four corridors. You can designate a simple program that the lights repeat as long as <em>security protocols</em> lasts.</li><li>Place <em>implant message</em> in two locations.</li><li>Place <em>debilitating gas</em> in two locations. The vapors appear in the places you designate; they return within 10 minutes if dispersed by wind while <em>security protocols</em> lasts.</li></ul>\n\n<p>The whole secured area radiates power. A <em>diminish tech</em> cast on a specific effect, if successful, removes only that effect.</p>\n\n<p>You can create a permanently guarded and secured structure by casting this power there every day for one year.</p>\n\n\n\n<h4>Sending</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Unlimited</li><li><strong>Duration:</strong> 1 round </li></ul>\n\n<p>You send a short message of twenty-five words or less to a creature with which you are familiar that possesses a commlink. The creature hears the message, recognizes you as the sender if it knows you, and can answer in a like manner immediately. </p>\n\n<p>You can send the message across any distance and even to other planets, but if the target is on a different planet than you, there is a 5 percent chance that the message doesn't arrive.</p>\n\n<h4>Sensor Probe</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You create a small, temporary, invisible probe that hovers in the air for the duration. You mentally receive visual information from the probe. It has darkvision out to 30 feet. The eye can look in every direction.</p>\n\n<p>As an action, you can move the probe up to 30 feet in any direction. There's no limit on how far away from you it can be. A solid barrier blocks the probe's movement, but it can pass through an opening at least 1 inch in diameter.</p>\n\n<h4>Shared Shielding</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>This power wards a willing creature you touch and creates an energy link between you and the target until the power ends. While the target is within 60 feet of you, it gains a +1 bonus to AC and saving throws, and it has resistance to all damage. Also, each time it takes damage, you take the same amount of damage.</p>\n\n<p>The power ends if you drop to 0 hit points or if you and the target become separated by more than 60 feet. It also ends if the power is cast again on either of the connected creatures. You can also dismiss the power as an action.</p>\n\n<h4>Shatter</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A sudden loud ringing noise, painfully intense, erupts from a point of your choice within range. Each creature in a 10-foot-radius sphere centered on that point must make a Constitution saving throw. A creature takes 3d8 sonic damage on a failed save, or half as much damage on a successful one. A creature made of inorganic material such as stone, crystal, or metal has disadvantage on this saving throw.</p>\n\n<p>An unenhanced object that isn't being worn or carried also takes the damage if it's in the power's area.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd.</p>\n\n<h4>Shocking Ray</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You create three ionic rays and hurl them at targets within range. You can hurl them at one target or several. Make a ranged tech attack for each ray. On a hit, the target takes 2d4 ion damage.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, you create one additional ray for each slot level above 2nd.</p>\n\n<h4>Short Circuit</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You electrocute a creature within range. Make a ranged tech attack against the creature. On a hit, the target takes 1d8 lightning damage. If the target is a droid, construct, or has a tech focus, it has disadvantage on the first attack roll it makes against you until the end of your next turn. </p>\n\n<p>This power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).</p>\n\n<h4>Shutdown </h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You emit an electromagnetic pulse, shutting down all electronic devices, with the exception of your tech focus, that are not held by or under the direct control of a creature. If it is, the creature must succeed on an Intelligence saving throw to stop the device from being shut down. While the power is active, no electronic device in range can be started or restarted.</p>\n\n\n\n<h4>Skill Protocol</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You enhance a droid or construct's protocols. You touch one willing droid or construct and give it expertise in one skill of your choice; until the power ends, the creature doubles its proficiency bonus for ability checks it makes that use the chosen skill.</p>\n\n<p>You must choose a skill in which the target is proficient and that isn't already benefiting from an effect, such as Expertise, that doubles its proficiency bonus.</p>\n\n<h4>Slow-Release Medpac</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>Kolto energy radiates from you in an aura with a 30-foot radius. Until the power ends, the aura moves with you, centered on you. You can use a bonus action to cause one creature in the aura (including you) to regain 2d6 hit points. This power has no effect on droids or constructs.</p>\n\n<h4>Smoke Cloud</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You cause thick smoke to erupt from a point within range, filling a 20-foot-radius sphere. The sphere spreads around corners, and its area is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least 10 miles per hour) disperses it.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the radius of the smoke cloud increases by 20 feet for each slot level above 1st.</p>\n\n<h4>Smuggle</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You dampen sound and light and dull the scent from creatures in your vicinity. For the duration, each creature you choose within 30 feet of you has a +10 bonus to Dexterity (Stealth) checks and can't be tracked except by enhanced means while within this radius. You can choose yourself as well. A creature that receives this bonus leaves behind no traces of its passage.</p>\n\n<h4>Sonic Fists</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>You enhance your fists�or analogous appendages�with sonic energy. For the duration, you have a natural weapon which deals 1d10 sonic damage on a hit. Every time you hit a creature that is no more than one size larger than you with a melee attack with this weapon, you can push it 5 feet away from you.</p>\n\n<h4>Sonic Shot</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a ranged weapon attack against one creature within your weapon's range, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and it becomes wreathed in a sonic barrier until the start of your next turn. If the target willingly moves before then, it immediately takes sonic damage equal to your techcasting ability modifier, becomes deafened until the start of your next turn, and the power ends.</p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the ranged attack deals an extra 1d6 sonic damage to the target, and the damage the target takes for moving increases to 1d6 + your techcasting ability modifier.  Both damage rolls increase by an additional 1d6 at 11th and 17th level.</p>\n\n<h4>Sonic Strike</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and you begin to emanate a disturbing hum. If a hostile creature ends its turn within 5 feet of you before the start of your next turn, it takes 1d4 sonic damage. </p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 sonic damage to the target, and the secondary damage increases by 1d4. Both damage rolls increase by 1d8 and 1d4, respectively, at 11th level and 17th level.</p>\n\n\n\n<h4>Spectrum Bolt</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You fire an undulating, warbling bolt of energy at a creature within range. Make a ranged tech attack against the target. On a hit, the target takes 2d8 + 1d6 damage. Choose one of the d8s. The number rolled on that die determines the attacks damage type, as shown below.</p>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Damage Type</th></tr></thead><tbody><tr><td>1</td><td>Acid</td></tr><tr><td>2</td><td>Cold</td></tr><tr><td>3</td><td>Fire</td></tr><tr><td>4</td><td>Energy</td></tr><tr><td>5</td><td>Ion</td></tr><tr><td>6</td><td>Lightning</td></tr><tr><td>7</td><td>Poison</td></tr><tr><td>8</td><td>Sonic</td></tr></tbody></table>\n\n<p>If you roll the same number on both d8s, the bolt leaps from the target to a different creature of your choice within 30 feet of it. Make a new attack roll against the new target, and make a new damage roll, which could cause the bolt to leap again. A creature can be targeted only once by each casting of this power.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, each target takes 1d6 extra damage of the type rolled for each slot level above 1st.</p>\n\n<h4>Spectrum Ray</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You shoot a beam of energy at a creature that you can see within range. You choose acid, cold, fire, lightning, poison, or sonic for the type of beam you create, and then make a ranged tech attack against the target. If the attack hits, the creature takes 1d8 damage of the type you chose.</p>\n\n<p>This power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8) and 17th level (4d8).</p>\n\n<h4>Spot the Weakness</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Up to three creatures of your choice that you can see within range must make Dexterity saving throws. The first time each turn a target that fails this saving throw makes an attack roll or a saving throw before the power ends, the target must roll a d4 and subtract the number rolled from the attack roll or saving throw.</p>\n\n\n\n<p>&emsp;<strong><em>Overcharge Tech.</em></strong> When you cast this power with a tech slot of 3rd level or higher, you can target one additional creature for every two slot levels above 1st. When you cast this power at 3rd, 6th, or 9th level, the die increases to d6, d8, and d10, respectively.</p>\n\n<h4>Stack the Deck</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You boost up to three creatures of your choice within range. Whenever a target makes an attack roll or a saving throw before the power ends, the target can roll a d4 and add the number rolled to the attack roll or saving throw.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power with a tech slot of 3rd level or higher, you can target one additional creature for every two slot levels above 1st. When you cast this power at 3rd, 6th, or 9th level, the die increases to d6, d8, and d10, respectively.</p>\n\n<h4>Storming Shot</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As a part of the action used to cast this power, you must make a ranged weapon attack against one creature within your weapon's range, otherwise the power fails. On a hit, the target suffers the attack's normal effects and becomes shocked until the end of your next turn. When this power hits a target, if there is a creature within 30 feet who is shocked, an arc of lightning courses between the two creatures, dealing 1d6 lightning damage to both of them. If there are multiple other creatures who are shocked, the lightning leaps to the closest creature.</p>\n\n<p>The power's damage increases when you reach higher levels. At 5th level, the effects of both the ranged weapon attack and discharge deal an extra 1d6 lightning damage. Both damage rolls increase by an additional 1d6 at 11th and 17th level.</p>\n\n<h4>Stun Dart</h4>\n\n<p><em>8th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You emit a tiny crippling dart at a target within range. If the target has 150 hit points or fewer, it is stunned. Otherwise, the power has no effect.</p>\n\n<p>The stunned target must make a Constitution saving throw at the end of each of its turns. On a successful save, this stunning effect ends.</p>\n\n\n\n<h4>Superior Translation Program</h4>\n\n<p><em>6th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 7 days</li></ul>\n\n<p>You grant up to four willing creatures the ability to understand any registered language they read or hear. Additionally, they gain the ability to speak that language, if they are physically capable of speaking it normally. </p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 7th level or higher, you can affect one additional creature for each slot level above 6th.</p>\n\n<h4>Synchronicity</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>A creature you touch isn't inconvenienced by mundane delays. Traffic lights are always green, there's always a waiting elevator, and a taxi is always around the corner. The target can run at full speed through dense crowds and attacks of opportunity provoked by the target's movement are made with disadvantage.</p>\n\n<p>The power also grants advantage to stealth checks, since cover is always available. Additionally, the target has advantage on all ability checks made to drive a vehicle.</p>\n\n<p>If two or more creatures under the effect of the power are attempting to avoid being inconvenienced by each other, the creatures make Charisma checks each time the effects would oppose each other. The higher check of the two's power takes effect.</p>\n\n<h4>Tactical Advantage</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose a willing creature that you can see within range. Until the power ends, the target's speed is doubled, it gains a +2 bonus to AC, it has advantage on Dexterity saving throws, and it gains an additional action on each of its turns. That action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or Use an Object action.</p>\n\n<p>When the power ends, the target can't move or take actions until after its next turn, as a wave of lethargy sweeps over it.</p>\n\n<h4>Tactical Barrier</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes </li></ul>\n\n<p>A shimmering field appears and surrounds a creature of your choice within range, granting it a +2 bonus to AC for the duration.</p>\n\n<h4>Tactical Superiority</h4>\n\n<p><em>7th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose up to two willing creatures that you can see within range. Until the power ends, each targets' speed is doubled, they gain a +2 bonus to AC, they have advantage on Dexterity saving throws, and they gain an additional action on each of their turns. That action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or the Use an Object Action. </p>\n\n<p>When the power ends, each target can't move or take actions until after its next turn, as a wave of lethargy sweeps over it.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 8th-level or higher, you can target one additional creature for each slot level above 7th.</p>\n\n<h4>Target Lock</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You choose a creature you can see within range and mark it as your quarry. Until the power ends, you deal an extra 1d6 damage to the target whenever you hit it with a weapon attack, the target gains no benefit from one-quarter, half, and three-quarters cover against you, and if the target is invisible, you can see it as if it were visible. If the target drops to 0 hit points before this power ends, you can use a bonus action on a subsequent turn of yours to mark a new creature.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd or 4th level, you can maintain your concentration on the power for up to 8 hours. When you use a tech slot of 5th level or higher, you can maintain your concentration on the power for up to 24 hours.</p>\n\n<h4>Targeting Shot</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a ranged weapon attack against one creature within your weapon's range, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and a small target only visible to you marks it. The next attack roll you make against the creature before the end of your next turn can't suffer from disadvantage.</p>\n\n<p>This power deals additional damage when you reach higher levels. At 5th level, the ranged attack deals an extra 1d6 damage. This damage increases by 1d6 again at 11th level and 17th level. The damage is the same type as the weapon's damage.</p>\n\n\n\n<h4>Tech Override</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you see a creature within 60 feet of you casting a tech power</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You attempt to interrupt a creature in the process of casting a tech power. If the creature is casting a power of 3rd level or lower, its power fails and has no effect. If it is casting a power of 4th level or higher, make an ability check using your techcasting ability. The DC equals 10 + the power's level. On a success, the creature's power fails and has no effect.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, the interrupted power has no effect if its level is less than or equal to the level of the tech slot you used.</p>\n\n<h4>Temporary Boost</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You touch one willing creature. Once before the power ends, the target can roll a d4 and add the number rolled to one ability check of its choice. It can roll the die before or after making the ability check. The power then ends.</p>\n\n<p>This power's die increases at higher levels: to a d6 at 5th level, a d8 at 11th level, and a d10 at 17th level.</p>\n\n<h4>Tonal Translocate</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You teleport yourself to an unoccupied space you can see within range. Immediately after you disappear, a thunderous boom sounds, and each creature within 10 feet of the space you left must make a Constitution saving throw, taking 3d10 sonic damage on a failed save, or half as much damage on a successful one. The blast can be heard from up to 300 feet away.</p>\n\n<p>You can bring along objects as long as their weight doesn't exceed what you can carry. You can also teleport one willing creature of your size or smaller who is carrying gear up to its carrying capacity. The creature must be within 5 feet of you when you cast this power, and there must be an unoccupied space within 5 feet of your destination space for the creature to appear in; otherwise, the creature is left behind.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 4th level or higher, the damage increases by 1d10 for each slot level above 3rd.</p>\n\n<h4>Toxic Cloud</h4>\n\n<p><em>5th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You create a 20-foot-radius sphere of poisonous, yellow-green fog centered on a point you choose within range. The fog spreads around corners. It lasts for the duration or until strong wind disperses the fog, ending the power. Its area is heavily obscured.</p>\n\n<p>When a creature enters the power's area for the first time on a turn or starts its turn there, that creature must make a Constitution saving throw. The creature takes 5d8 poison damage on a failed save, or half as much damage on a successful one. Creatures are affected even if they hold their breath or don't need to breathe.</p>\n\n<p>The fog moves 10 feet away from you at the start of each of your turns, rolling along the surface of the ground. The vapors, being heavier than air, sink to the lowest level of the land, even pouring down openings.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th.</p>\n\n<h4>Toxin Purge</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour </li></ul>\n\n<p>You touch a creature. If it is poisoned or diseased, you neutralize the poison or disease. If more than one poison or disease afflicts the target, you neutralize one poison or disease that you know is present, or you neutralize one at random.</p>\n\n<p>For the duration, the target has advantage on saving throws against being poisoned or diseased, and it has resistance to poison damage.</p>\n\n<h4>Toxin Scan</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong>\t1 action </li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong>\tConcentration, up to 10 minutes</li></ul>\n\n<p>For the duration, you can see the presence and location of poisons and diseases within 30 feet of you. You also identify the kind of poison or disease in each case.</p>\n\n<h4>Tracer Bolt</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> 1 round </li></ul>\n\n<p>A flash of light streaks toward a creature of your choice within range. Make a ranged tech attack against the target. On a hit, the target takes 4d6 energy damage, and the next attack roll made against this target before the end of your next turn has advantage. </p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.</p>\n\n\n\n<h4>Tracker Droid Interface</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 hour</li><li><strong>Range:</strong> 10 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You interface a tracker droid with your tech focus, creating a permanent link. </p>\n\n<p>Your tracker droid acts independently of you, but it always obeys your commands. In combat, it acts on your turn.</p>\n\n<p>While your tracker droid is within 100 feet of you, you can communicate with it via your tech focus. Additionally, as an action, you can see through your droid's vision and hear what it hears until the start of your next turn, gaining the benefits of any special senses that the droid has. During this time, you are deaf and blind with regard to your own senses.</p>\n\n<p>You can't maintain an interface between more than one tracker droid and your tech focus at a time. </p>\n\n<p>Finally, when you cast a tech power with a range of touch, your tracker can deliver the power as if it had cast it. Your tracker droid must be within 100 feet of you, and it must use its reaction to deliver the power when you cast it. If the power requires an attack roll, you use your attack modifier for the roll.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 3rd level or higher, you can maintain a link with one more tracker droid for every two slot levels above 1st. Multiple tracker droids act on the same initiative. You can only see through one droid's vision at a time, but you can toggle between droids as a bonus action. Each droid must still be within 100 feet of you.</p>\n\n<h4>Tranquilizer</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> 1 minute </li></ul>\n\n<p>You emit a tranquilizing dart that knocks a creature unconscious. Roll 5d8; if the creature's remaining hit points are less than the total, the creature falls unconscious until the power ends, the sleeper takes damage, or someone uses an action to shake or slap the sleeper awake. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, you can target an additional creature for each slot level above 1st. For each target, roll 5d8 separately.</p>\n\n<h4>Translation Program</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>For the duration, you understand the literal meaning of any spoken registered language that you hear, as long as you have your tech focus. You also understand any written language that you see, but you must be within reach of the surface on which the words are written. It takes about 1 minute to read one page of text. </p>\n\n<p>This power doesn't decode secret messages in a text, nor does it interpret a glyph, such as an ancient Sith rune, that isn't part of a written language.</p>\n\n<h4>Translocate</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Your form shimmers in a holographic configuration, and then collapses. You teleport up to 30 feet to an unoccupied space that you can see.</p>\n\n<h4>Truth Serum</h4>\n\n<p><em>2nd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>You administer a poison to a creature you touched that prevents it from telling lies. The creature touched must make a Constitution saving throw. On a success, nothing happens. On a failure, the creature can't speak a deliberate lie until the power ends.</p>\n\n<p>An affected creature is aware of the power and can thus avoid answering questions to which it would normally respond with a lie. Such a creature can be evasive in its answers as long as it remains within the boundaries of the truth.</p>\n\n<h4>Venomous Strike</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and if you were hidden from it, it takes an additional 1d4 poison damage. </p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 poison damage to the target, and the damage the target takes when you are hidden from it increases to 2d4. Both damage rolls increase by 1d8 and 1d4, respectively, at 11th level and 17th level.</p>\n\n\n\n<h4>Vertical Maneuvering</h4>\n\n<p><em>3rd-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action; or 1 reaction, which you take when you are falling and within 30 feet of a solid surface </li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>If you cast this power as a reaction, your fall is stopped, and you remain aloft. For the duration, as long as you are within 30 feet of a solid surface, you have a flying speed of 40 feet. In addition, you can't be knocked prone, and you have advantage on saving throws made against effects that would push you or pull you. When the power ends, you are gently lowered to the ground, if you are within 30 feet of it.</p>\n\n<h4>Voltaic Shielding</h4>\n\n<p><em>1st-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour </li></ul>\n\n<p>A protective barrier surrounds you, manifesting as crackling lightning that covers you and your gear. You gain 5 temporary hit points for the duration. If a creature hits you with a melee attack while you have these hit points, the creature takes 5 lightning damage.</p>\n\n<p><strong><em>Overcharge Tech.</em></strong> When you cast this power using a tech slot of 2nd level or higher, both the temporary hit points and the lightning damage increase by 5 for each slot.</p>\n\n<h4>Vortex Shot</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> Varies </li><li><strong>Duration:</strong> Instantaneous  </li></ul>\n\n<p>As part of the action used to cast this power, you must make a ranged weapon attack against one creature within your weapon's range, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and each Large or smaller creature within 10 feet of the target must succeed on a Strength saving throw or be pulled to the nearest unoccupied space adjacent to the target. </p>\n\n<p>This power deals additional damage when you reach higher levels. At 5th level, the ranged attack deals an extra 1d6 damage. This damage increases by 1d6 again at 11th level and 17th level. The damage is the same type as the weapon's damage.</p>\n\n<h4>Ward</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You emit a powerful force field that deflects incoming attacks. Until the end of your next turn, you have resistance against kinetic, energy, and ion damage dealt by weapon attacks.</p>\n\n<h4>Warding Shot</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a ranged weapon attack against one creature within your weapon's range, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and a dim barrier surrounds it. The first time it would deal damage before the start of your next turn, that damage is reduced by 1d6. </p>\n\n<p>This power's damage reduction increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>\n\n<h4>Wire Bind</h4>\n\n<p><em>4th-level tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>You produce up to 4 wires, which bind creatures of your choice that you can see within range. A creature can be targeted by more than one wire. </p>\n\n<p>Each target must make a Dexterity saving throw for each wire that targets it. On a failed save, the creature is restrained and falls prone as it is wrapped securely by the wire.</p>\n\n<p>A creature restrained by a wire can use its action to make a Strength or Dexterity check (its choice) against your tech save DC. On a success, it is no longer restrained by that wire. A wire can also be destroyed; each one has AC 15 and 10 hit points, and has immunity to all damage not dealt by melee weapons.</p>\n\n<p>A wire that misses its target or is escaped falls slack and disintegrates, as do all remaining wires when the power ends.</p>\n\n<h4>Wire Line</h4>\n\n<p><em>At-will tech power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You launch a grappling wire toward a creature you can see within range. Make a melee tech attack against the target. If the attack hits, the creature takes 1d6 kinetic damage, and if the creature is Large or smaller, you pull the creature up to 10 feet closer to you.</p>\n\n<p>This power's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>\n\n"
