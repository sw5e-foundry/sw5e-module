        <h3>Biology and Appearance</h3>

        <p>Ithorians have two mouths and four throats, allowing them to speak in stereo. Female Ithorians have two humps on the back of their head, while males have only one. They have glossy, usually brown flesh. Their reflexes and coordination are somewhat slower than that of average humanoids.</p>

        <p>In addition to allowing them to speak their unique stereophonic language, the Ithorians' four throats also have the ability to violently expel air, resulting in a deafening and potentially concussive scream. Despite this fact, most Ithorians go their entire lives without ever resorting to violence, and so the ability remained relatively ambiguous.</p>

        <h3>Society and Culture</h3>

        <p>Ithorians worship the "Mother Jungle," a spiritual entity embodying the lush, tropical ecology of their world, Ithor. They are generally devoted environmentalists, staunch herbivores, and complete pacifists, devoting much time to contemplating their ecology, studying plants and their uses and the overall respecting of all living things. Most Ithorians never set foot on their own planet, instead living in floating cities above their world called herdships. Only three of their continents have been explored and harvested, the other two never having been touched by Ithorian hands. They demonstrate extreme belief in the protection and sustaining of their environment as dictated by their "Law of Life."</p>

        <h3>Names</h3>

        <p>Ithorian names are quite varied in length but most names are soft and melodic. They are often difficult to prounounce by other species, so many Ithorians adopt nicknames.</p>

        <p><strong>Male Names.</strong> Del, Gizorthej, Pexxocl, Steorthibs</p>

        <p><strong>Female Names.</strong> Binshe, Dhu'sha, Mul, Slosh, Vlo</p>

        <p><strong>Surnames.</strong> Afleehl, Crukid, Tondand, Wamunn</p>



        <h3>Ithorian Traits</h3>

        <p>As an Ithorian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Ithorians reach adulthood in their late teens and live an average of 85 years.</p>

        <p><strong><em>Alignment.</em></strong> Ithorians tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Shorter Ithorians stand around 6 feet while taller reach over 7 and a half. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <strong><em>Hold Breath.</em></strong> Ithorians have a great lung capacity<br> and can hold their breath for up to 15 minutes at a<br> time.

        <p><strong><em>Sonic Resistance.</em></strong> Ithorians have resistance to sonic damage.</p>

        <p><strong><em>Sonic Scream.</em></strong> As an action, you can violently expel air in a 15-foot cone. When you do so, each creature in the area of the exhalation must make a Wisdom saving throw (DC = 8 + your proficiency bonus + your Constitution modifier). A creature takes 2d6 sonic damage on a failed save, and half as much damage on a successful one. The damage increases to 4d6 at 5th level, 6d6 at 11th level, and 8d6 at 17th level. This ability has no effect on constructs. You can use this feature a number of times equal to your proficiency bonus. You regain all expended uses when you complete a long rest.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Ithorese. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it.</p>

