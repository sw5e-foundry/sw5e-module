        <h3>Biology and Appearence</h3>

        <p>The rodians are green-skinned humanoids from the planet Rodia. They possess distinctive faces: large, round, multifaceted eyes; tapir-like snouts; and a pair of saucer-shaped antennae on their heads, which served to detect vibrations. The flexible snouts augmented the rodians' finely tuned olfactory senses, collecting and filtering the air. Their characteristically large eyes indicated a primarily nocturnal ancestry and were capable of seeing into the infrared part of the spectrum. Due to their love of fighting and active lifestyles, most rodians kept in good condition, normally lean and wiry; however, some wealthy rodians became complacent and obese.</p>

        <h3>Society and Culture</h3>

        <p>Rodian culture is obsessed with violence and death, due to behaviors and practices that are ingrained since their earliest ancestry. Their densely packed jungle homeworld is ill-suited for agriculture, requiring rodians to compete with vicious predators for most of their food, some of which can wipe out entire rodian villages. As the rodians developed cunning hunting tactics to survive, the hunt became central to their culture. Eventually, having driven most of the other predators on the planet to near extinction, they began to hunt each other in various wars and gladiatorial contests.</p>

        <h3>Names</h3>

        <p>Female names tend to be longer than male names. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Dagon, Dwedd, Gweym, Steech, Xeep</p>

        <p><strong>Female Names.</strong> Heebmu, Iissi, Teezle, Whunam</p>

        <p><strong>Surnames.</strong> Bluchosso, Encekserr, Gieeseaagg</p>



        <h3>Rodian Traits</h3>

        <p>As a rodian, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Rodians reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Rodian culture's violent focus causes them to tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Rodians typically stand 5 to 6 feet tall and weigh 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Adept Climbers.</em></strong> You have a climbing speed of 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hunter.</em></strong> You are proficient in Survival and Stealth.</p>

        <p><strong><em>Keen Hearing and Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve hearing or smell.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Rodese. Rodians can communicate with each other using pheromones. Force-sensitives can detect this communication, though they can't understand it.</p>

