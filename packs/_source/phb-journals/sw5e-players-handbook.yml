  - name: 'Chapter 9: Combat'
    _id: WndQ0nGsV7NXnRgA
    text:
      content: "<h1>Chapter 9: Combat</h1>\n\n\n\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style=\"font-variant: small-caps\">he shriek of blaster fire flying overhead. The <em>clash</em></span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; of a gamorrean's axe striking against a composite shield. The crackle of lightning emenating from a Sith lord's hands. The sharp tang of blood in the air, cutting through the stench of vile monsters. Roars of fury, shouts of triumph, cries of pain. Combat in D&D can be chaotic, deadly, and thrilling.\n\n<p>This chapter provides the rules you need for your characters and monsters to engage in combat, whether it is a brief skirmish or an extended conflict in a dungeon or on a field of battle. Throughout this chapter, the rules address you, the player or Game Master. The Game Master controls all the monsters and nonplayer characters involved in combat, and each other player controls an adventurer. \"You\" can also mean the character or monster that you control.</p>\n\n<h2>The Order of Combat</h2>\n\n<p>A typical combat encounter is a clash between two sides, a flurry of weapon swings, feints, parries, footwork, and force- or tech-casting. The game organizes the chaos of combat into a cycle of rounds and turns. A <strong>round</strong> represents about 6 seconds in the game world. During a round, each participant in a battle takes a <strong>turn.</strong> The order of turns is determined at the beginning of a combat encounter, when everyone rolls initiative. Once everyone has taken a turn, the fight continues to the next round if neither side has defeated the other.</p>\n\n<h3>Surprise</h3>\n\n<p>A band of adventurers sneaks up on a Mandalorian camp, springing from cover to attack them. Kath hounds patrol down a hallway, leashed to their handler, unnoticed by the adventurers until the hound smells one of them. In these situations, one side of the battle gains surprise over the other.</p>\n\n<p>The GM determines who might be surprised. If neither side tries to be stealthy, they automatically notice each other. Otherwise, the GM compares the Dexterity (Stealth) checks of anyone hiding with the passive Wisdom (Perception) score of each creature on the opposing side. Any character or monster that doesn't notice a threat is surprised at the start of the encounter.</p>\n\n<p>If you're surprised, you can't move or take an action on your first turn of the combat, and you can't take a reaction until that turn ends. A member of a group can be surprised even if the other members aren't.</p>\n\n<h3>Your Turn</h3>\n\n<p>On your turn, you can move a distance up to your speed and take one action. You decide whether to move first or take your action first. Your speed�sometimes called your walking speed�is noted on your character sheet.</p>\n\n<p>The most common actions you can take are described in the \"Actions in Combat\" section later in this chapter. Many class features and other abilities provide additional options for your action.</p>\n\n<br>\n\n<h5>Combat Step By Step</h5>\n\n<blockquote><p><strong>&emsp;1. Determine surprise.</strong> The GM determines whether anyone involved in the combat encounter is surprised.</p>\n\n<p><strong>2. Establish positions.</strong> The GM decides where all the characters and monsters are located. Given the adventurers' marching order or their stated positions in the room or other location, the GM figures out where the adversaries are�how far away and in what direction.</p>\n\n<p><strong>3. Roll initiative.</strong> Everyone involved in the combat encounter rolls initiative, determining the order of combatants' turns.</p>\n\n<p><strong>4. Take turns.</strong> Each participant in the battle takes a turn in initiative order.</p>\n\n<p><strong>5. Begin the next round.</strong> When everyone involved in the combat has had a turn, the round ends. Repeat step 4 until the fighting stops.</p></blockquote>\n\n<p>The \"Movement and Position\" section later in this chapter gives the rules for your move.</p>\n\n<p>You can forgo moving, taking an action, or doing anything at all on your turn. If you can't decide what to do on your turn, consider taking the Dodge or Ready action, as described in \"Actions in Combat.\"</p>\n\n<h4>Bonus Actions</h4>\n\n<p>Various class features, powers, and other abilities let you take an additional action on your turn called a bonus action. The Cunning Action feature, for example, allows an operative to take a bonus action. You can take a bonus action only when a special ability, power, or other feature of the game states that you can do something as a bonus action. You otherwise don't have a bonus action to take. </p>\n\n<p>You can take only one bonus action on your turn, so you must choose which bonus action to use when you have more than one available.</p>\n\n<p>You choose when to take a bonus action during your turn, unless the bonus action's timing is specified, and anything that deprives you of your ability to take actions also prevents you from taking a bonus action.</p>\n\n<h4>Object Interaction</h4>\n\n<p>You can also interact with one object or feature of the environment at any time on your turn, even during your move or your action, as your object interaction. For example, you could open a door as you stride toward a foe, you could stow your weapon as you run, or you could grasp a two-handed weapon you are wielding in one hand with your other hand as you attack with it (releasing it requires no action).</p>\n\n<p>If you want to interact with an additional object, you need to use your action or bonus action (your choice. Some enhanced items and other special objects always require an action to use, as stated in their descriptions.</p>\n\n<p>The GM might require you to use an action for any of these activities when it needs special care or when it presents an unusual obstacle. For instance, the GM could reasonably expect you to use an action to open a stuck door or turn a crank to lower a drawbridge.</p>\n\n\n\n<h4>Other Activity on Your Turn</h4>\n\n<p>Lastly, your turn can include a variety of flourishes that require neither your action nor your move.</p>\n\n<p>You can communicate however you are able, through brief utterances and gestures, as you take your turn.</p>\n\n<h5>Interacting with Objects Around You</h5>\n\n<blockquote><p>Here are a few examples of the sorts of thing you can do with your object interaction:</p>\n\n<ul><li>draw or stow a weapon</li><li>open or close a door</li><li>withdraw a stim from your pack</li><li>pick up a dropped weapon</li><li>take an item from a table</li><li>remove a ring from your finger</li><li>stuff some food into your mouth</li><li>plant a banner in the ground</li><li>fish a few chits from your belt pouch</li><li>drink all the beer in a glass</li><li>throw a lever or a switch</li><li>pull a glowstick from a sconce</li><li>take a book from a shelf you can reach</li><li>extinguish a small flame</li><li>don a mask</li><li>pull the hood of your cloak up and over your head</li><li>put your ear to a door</li><li>turn a key in a lock</li><li>hand an item to another character</li></ul></blockquote>\n\n<h3>Reactions</h3>\n\n<p>Certain special abilities, powers, and situations allow you to take a special action called a reaction. A reaction, typically an instant response to a trigger of some kind, can occur on your turn or on someone else's. The opportunity attack, described later in this chapter, is the most common type of reaction.</p>\n\n<p>When you take a reaction, you can't take another one until the start of your next turn. If the reaction interrupts another creature's turn, that creature can continue its turn right after the reaction.</p>\n\n<h2>Movement and Position</h2>\n\n<p>In combat, characters and monsters are in constant motion, often using movement and position to gain the upper hand.</p>\n\n<p>On your turn, you can move a distance up to your speed. You can use as much or as little of your speed as you like on your turn, following the rules here.</p>\n\n<p>Your movement can include jumping, climbing, and swimming. These different modes of movement can be combined with walking, or they can constitute your entire move. However you're moving, you deduct the distance of each part of your move from your speed until it is used up or until you are done moving.</p>\n\n<p>The \"Special Types of Movement'' section in Chapter 8 gives the particulars for jumping, climbing, and swimming.</p>\n\n<h4>Actions That Grant Movement</h4>\n\n<p>If an action, bonus action, or reaction allows you to move as part of its effects, this additional movement does not count towards your speed. If it does not require an action, however, it does count towards your speed.  </p>\n\n\n\n<p>&emsp;For example, if a creature uses the Ataru lightsaber form, since adopting that form uses a bonus action, it does not count towards the creature's speed. A Path of Focus sentinel's Blade Dance feature, however, does count towards it speed since it doesn't use an action.</p>\n\n<h3>Breaking Up Your Move</h3>\n\n<p>You can break up your movement on your turn, using some of your speed before and after your action. For example, if you have a speed of 30 feet, you can move 10 feet, take your action, and then move 20 feet.</p>\n\n<h4>Moving Between Attacks</h4>\n\n<p>If you take an action that includes more than one weapon attack, you can break up your movement even further by moving between those attacks. For example, a fighter with the Extra Attack feature who has a speed of 25 feet could move 10 feet, attack, move 15 feet, and then attack again.</p>\n\n<h4>Using Different Speeds</h4>\n\n<p>If you have more than one speed, such as your walking speed and a flying speed, you can switch back and forth between your speeds during your move. Whenever you switch, subtract the distance you've already moved from the new speed. The result determines how much farther you can move. If the result is 0 or less, you can't use the new speed during the current move.</p>\n\n<p>For example, if you have a flying speed of 30 and a walking speed of 40 because a Jedi cast the <em>burst of speed</em> power on you, you could walk 20 feet, then fly 10 feet, and then land to walk 10 feet more.</p>\n\n<h3>Difficult Terrain</h3>\n\n<p>Combat rarely takes place in bare rooms or on featureless plains. Boulder-strewn caverns, briar-choked forests, treacherous staircases�the setting of a typical fight contains difficult terrain.</p>\n\n<p>Every foot of movement in difficult terrain costs 1 extra foot. This rule is true even if multiple things in a space count as difficult terrain.</p>\n\n<p>Low furniture, rubble, undergrowth, steep stairs, snow, and shallow bogs are examples of difficult terrain. The space of another creature, whether hostile or not, also counts as difficult terrain.</p>\n\n<h3>Being Prone</h3>\n\n<p>Combatants often find themselves lying on the ground, either because they are knocked down or because they throw themselves down. In the game, they are prone, a condition described in appendix A.</p>\n\n<p>You can <strong>drop prone</strong> without using any of your speed. <strong>Standing up</strong> takes more effort, costing an amount of movement equal to half your speed. For example, if your speed is 30 feet, you must spend 15 feet of movement to stand up. You can't stand up if you don't have enough movement left or if your speed is 0.</p>\n\n<p>To move while prone, you must <strong>crawl</strong> or use powers that teleport. Every foot of movement while crawling costs 1 extra foot. Crawling 1 foot in difficult terrain, therefore, costs 3 feet of movement.</p>\n\n\n\n<h3>Moving Around Other Creatures</h3>\n\n<p>You can move through a nonhostile creature's space. In contrast, you can move through a hostile creature's space only if the creature is at least two sizes larger or smaller than you. Remember that another creature's space is difficult terrain for you.</p>\n\n<p>Whether a creature is a friend or an enemy, you can't willingly end your move in its space.</p>\n\n<p>If you leave a hostile creature's reach during your move, you provoke an opportunity attack, as explained later in the chapter.</p>\n\n<h3>Flying Movement</h3>\n\n<p>Flying creatures enjoy many benefits of mobility, but they must also deal with the danger of falling. If a flying creature is knocked prone, has its speed reduced to 0, or is otherwise deprived of the ability to move, the creature falls, unless it has the ability to hover.</p>\n\n<h3>Creature Size</h3>\n\n<p>Each creature takes up a different amount of space. The Size Categories table shows how much space a creature of a particular size controls in combat. Objects sometimes use the same size categories.</p>\n\n<h5>Size Categories</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Size</th><th>Space</th></tr></thead><tbody><tr><td>Tiny</td><td>2 1/2 by 2 1/2 ft.</td></tr><tr><td>Small</td><td>5 by 5 ft.</td></tr><tr><td>Medium</td><td>5 by 5 ft.</td></tr><tr><td>Large</td><td>10 by 10 ft.</td></tr><tr><td>Huge</td><td>15 by 15 ft.</td></tr><tr><td>Gargantuan</td><td>20 by 20 ft. or larger</td></tr></tbody></table>\n\n<h4>Space</h4>\n\n<p>A creature's space is the area in feet that it effectively controls in combat, not an expression of its physical dimensions. A typical Medium creature isn't 5 feet wide, for example, but it does control a space that wide. If a Medium gamorrean stands in a 5-foot-wide doorway, other creatures can't get through unless the gamorrean lets them.</p>\n\n<p>A creature's space also reflects the area it needs to fight effectively. For that reason, there's a limit to the number of creatures that can surround another creature in combat. Assuming Medium combatants, eight creatures can fit in a 5-foot radius around another one. </p>\n\n<p>Because larger creatures take up more space, fewer of them can surround a creature. If five Large creatures crowd around a Medium or smaller one, there's little room for anyone else. In contrast, as many as twenty Medium creatures can surround a Gargantuan one.</p>\n\n<p>If a square costs extra movement, as a square of difficult terrain does, you must have enough movement left to pay for entering it. For example, you must have at least 2 squares of movement left to enter a square of difficult terrain.</p>\n\n\n\n<h4>Squeezing into a Smaller Space</h4>\n\n<p>A creature can squeeze through a space that is large enough for a creature one size smaller than it. Thus, a Large creature can squeeze through a passage that's only 5 feet wide. While squeezing through a space, a creature must spend 1 extra foot for every foot it moves there, and it has disadvantage on attack rolls and Dexterity saving throws. Attack rolls against the creature have advantage while it's in the smaller space.</p>\n\n<h4>Variant: Playing on a Grid</h4>\n\n<blockquote><p>If you play out a combat using a square grid and miniatures or other tokens, follow these rules.</p>\n\n<p><strong><em>Squares.</em></strong> Each square on the grid represents 5 feet.</p>\n\n<p><strong><em>Speed.</em></strong> Rather than moving foot by foot, move square by square on the grid. This means you use your speed in 5-foot segments. This is particularly easy if you translate your speed into squares by dividing the speed by 5. For example, a speed of 30 feet translates into a speed of 6 squares.</p>\n\n<p><strong><em>Entering a Square.</em></strong> To enter a square, you must have at least 1 square of movement left, unless the square is diagonally adjacent to the square you're in (discussed below). </p>\n\n<p><strong><em>Corners.</em></strong> Diagonal movement can't cross the corner of a wall, large tree, or other terrain feature that fills its space.</p>\n\n<p><strong><em>Ranges.</em></strong> To determine the range on a grid between two things�whether creatures or objects�start counting squares from a square adjacent to one of them and stop counting in the space of the other one. Count by the shortest route.</p>\n\n<p><strong><em>Diagonals.</em></strong> When measuring range or moving diagonally, the first diagonal square counts as 5 feet, but the second diagonal square counts as 10 feet. This pattern of 5 feet and then 10 feet continues whenever you're counting diagonally, even if you move horizontally or vertically between different bits of diagonal movement. For instance, a character might move one square diagonally (5 feet), then three squares straight (15 feet), and then another square diagonally (10 feet) for a total movement of 30 feet.</p></blockquote>\n\n<h2>Actions in Combat</h2>\n\n<p>When you take your action on your turn, you can take one of the actions presented here, an action you gained from your class or a special feature, or an action that you improvise. Many creatures have action options of their own in their stat blocks.</p>\n\n<p>When you describe an action not detailed elsewhere in the rules, the GM tells you whether that action is possible and what kind of roll you need to make, if any, to determine success or failure.</p>\n\n<h3>Attack</h3>\n\n<p>The most common action to take in combat is the Attack action, whether you are swinging a vibrosword, firing a blaster, or brawling with your fists. With this action, you make one melee or ranged attack. See the \"Making an Attack\" section for the rules that govern attacks.</p>\n\n<p>Certain features, such as the Extra Attack class feature, allow you to make more than one attack with this action.</p>\n\n\n\n<h3>Cast a Power</h3>\n\n<p>Force- and tech-casters such as consulars and engineers, as well as many creatures, have access to powers and can use them to great effect in combat. Each power has a casting time, which specifies whether the caster must use an action, a reaction, minutes, or even hours to cast the power. Casting a power is, therefore, not necessarily an action. Most powers do have a casting time of 1 action, so a force- or tech-caster often uses his or her action in combat to cast such a power. See chapter 10 for the rules on force- and tech-casting.</p>\n\n<h3>Dash</h3>\n\n<p>When you take the Dash action, you gain extra movement for the current turn. The increase equals your speed, after applying any modifiers. With a speed of 30 feet, for example, you can move up to 60 feet on your turn if you dash.</p>\n\n<p>Any increase or decrease to your speed changes this additional movement by the same amount. If your speed of 30 feet is reduced to 15 feet, for instance, you can move up to 30 feet this turn if you Dash.</p>\n\n<h3>Disengage</h3>\n\n<p>If you take the Disengage action, your movement doesn't provoke opportunity attacks for the rest of the turn.</p>\n\n<h3>Dodge</h3>\n\n<p>When you take the Dodge action, you focus entirely on avoiding attacks. Until the start of your next turn, any attack roll made against you has disadvantage if you can see the attacker, and you make Dexterity saving throws with advantage. You lose this benefit if you are incapacitated (as explained in appendix A) or if your speed drops to 0.</p>\n\n<h3>Guard</h3>\n\n<p>You can defend a creature within 5 feet of you. When you take the Guard action, you focus entirely on preventing attacks from reaching your ally. Until the start of your next turn, any attack roll made against the guarded ally has disadvantage if you can see the attacker, as long as the ally is within 5 feet of you. </p>\n\n<p>Additionally, if an attack would hit the guarded ally, you can instead have it hit you (no action required). If you do so, the attacker chooses the maximum amount of damage instead of rolling.</p>\n\n<h3>Help</h3>\n\n<p>You can lend your aid to another creature in the completion of a task. When you take the Help action, the creature you aid gains advantage on the next ability check it makes to perform the task you are helping with, provided that it makes the check before the start of your next turn.</p>\n\n<p>Alternatively, you can aid a friendly creature in attacking a creature within 5 feet of you. You feint, distract the target, or in some other way team up to make your ally's attack more effective. If your ally attacks the target before your next turn, the first attack roll is made with advantage.</p>\n\n<h3>Hide</h3>\n\n<p>When you take the Hide action, you make a Dexterity (Stealth) check in an attempt to hide, following the rules in chapter 7 for hiding. If you succeed, you gain certain benefits, as described in the \"Unseen Attackers and Targets\" section later in this chapter.</p>\n\n<h4>Improvising an Action</h4>\n\n<blockquote><p>Your character can do things not covered by the actions in this chapter, such as breaking down doors, intimidating enemies, sensing weaknesses in defenses, or calling for a parley with a foe. The only limits to the actions you can attempt are your imagination and your character's ability scores. See the descriptions of the ability scores in chapter 7 for inspiration as you improvise.</p>\n\n<p>When you describe an action not detailed elsewhere in the rules, the GM tells you whether that action is possible and what kind of roll you need to make, if any, to determine success or failure.</p></blockquote>\n\n<h3>Ready</h3>\n\n<p>Sometimes you want to get the jump on a foe or wait for a particular circumstance before you act. To do so, you can take the Ready action on your turn, which lets you act using your reaction before the start of your next turn.</p>\n\n<p>First, you decide what perceivable circumstance will trigger your reaction. Then, you choose the action you will take in response to that trigger, or you choose to move up to your speed in response to it. Examples include \"If the soldier steps on the trapdoor, I'll pull the lever that opens it,\" and \"If the gamorrean steps next to me, I move away.\"</p>\n\n<p>When the trigger occurs, you can either take your reaction right after the trigger finishes or ignore the trigger. Remember that you can take only one reaction per round.</p>\n\n<p>When you ready a power, you cast it as normal but hold its energy, which you release with your reaction when the trigger occurs. To be readied, a power must have a casting time of 1 action, and holding onto the power's effect requires concentration (explained in chapter 10). If your concentration is broken, the power dissipates without taking effect. For example, if you are concentrating on the <em>knight speed</em> power and ready <em>shock,</em> your <em>knight speed</em> power ends, and if you take damage before you release <em>shock</em> with your reaction, your concentration might be broken.</p>\n\n<h3>Search</h3>\n\n<p>When you take the Search action, you devote your attention to finding something. Depending on the nature of your search, the GM might have you make a Wisdom (Perception) check or an Intelligence (Investigation) check.</p>\n\n<h3>Use an Object</h3>\n\n<p>Many objects and items, such as grenades or medpacs, require your action to use. When an object requires your action for its use, you take the Use an Object action. If you would normally have to use your object interaction to draw the item you are using, you can instead do so as part of the Use an Object action. </p>\n\n\n\n<h2>Making an Attack</h2>\n\n<p>Whether you're striking with a melee weapon, firing a weapon at range, or making an attack roll as part of a power, an attack has a simple structure.</p>\n\n<p><strong>1. Choose a target.</strong> Pick a target within your attack's range: a creature, an object, or a location.</p>\n\n<p><strong>2. Determine modifiers.</strong> The GM determines whether the target has cover and whether you have advantage or disadvantage against the target. In addition, powers, special abilities, and other effects can apply penalties or bonuses to your attack roll.</p>\n\n<p><strong>3. Resolve the attack.</strong> You make the attack roll. On a hit, you roll damage, unless the particular attack has rules that specify otherwise. Some attacks cause special effects in addition to or instead of damage. If there's ever any question whether something you're doing counts as an attack, the rule is simple: if you're making an attack roll, you're making an attack.</p>\n\n<h3>Attack Rolls</h3>\n\n<p>When you make an attack, your attack roll determines whether the attack hits or misses. To make an attack roll, roll a d20 and add the appropriate modifiers. If the total of the roll plus modifiers equals or exceeds the target's Armor Class (AC), the attack hits. The AC of a character is determined at character creation, whereas the AC of a creature is in its stat block.</p>\n\n<h4>Modifiers to the Roll</h4>\n\n<p>When a character makes an attack roll, the two most common modifiers to the roll are an ability modifier and the character's proficiency bonus. When a creature makes an attack roll, it uses whatever modifier is provided in its stat block.</p>\n\n<p><strong><em>Ability Modifier.</em></strong> The ability modifier used for a melee weapon attack is Strength, and the ability modifier used for a ranged weapon attack is Dexterity. Weapons that have the finesse or thrown property break this rule. </p>\n\n<p>Some powers also require an attack roll. The ability modifier used for a power attack depends on the force- or tech-casting ability of the force- or tech-caster, as explained in chapter 10.</p>\n\n<p><strong><em>Proficiency Bonus.</em></strong> You add your proficiency bonus to your attack roll when you attack using a weapon with which you have proficiency, as well as when you attack with a power.</p>\n\n<h4>Rolling 1 or 20</h4>\n\n<p>Sometimes fate blesses or curses a combatant, causing the novice to hit and the veteran to miss. </p>\n\n<p>If the d20 roll for an attack is a 20, the attack hits regardless of any modifiers or the target's AC. In addition, the attack is a critical hit, as explained later in this chapter.</p>\n\n<p>If the d20 roll for an attack is a 1, the attack misses regardless of any modifiers or the target's AC.</p>\n\n<h4>Choosing to be Hit</h4>\n\n<p>Sometimes, an attack might miss you when you wanted it to hit. You can choose to allow a miss to hit you (no action required). If you do so, the attacker chooses the maximum amount of damage instead of rolling.</p>\n\n\n\n<h3>Unseen Attackers and Targets</h3>\n\n<p>Combatants often try to escape their foes' notice by hiding, casting the <em>force camouflage</em> power, or lurking in darkness.</p>\n\n<p>When you attack a target that you can't see, you have disadvantage on the attack roll. This is true whether you're guessing the target's location or you're targeting a creature you can hear but not see. If the target isn't in the location you targeted, you automatically miss, but the GM typically just says that the attack missed, not whether you guessed the target's location correctly.</p>\n\n<p>When a creature can't see you, you have advantage on attack rolls against it.</p>\n\n<p>If you are hidden�both unseen and unheard�when you make an attack, you give away your location when the attack hits or misses.</p>\n\n<h3>Melee Attacks</h3>\n\n<p>Used in hand-to-hand combat, a melee attack allows you to attack a foe within your reach. A melee attack typically uses a handheld weapon such as a vibrosword, a lightsaber, or a vibrowhip. A typical monster makes a melee attack when it strikes with its claws, horns, teeth, tentacles, or other body part. A few powers also involve making a melee attack.</p>\n\n<p>Most creatures have a 5-foot <strong>reach</strong> and can thus attack targets within 5 feet of them when making a melee attack. Certain creatures (typically those larger than Medium) have melee attacks with a greater reach than 5 feet, as noted in their descriptions.</p>\n\n<p>When you are <strong>unarmed,</strong> you can fight in melee by making an unarmed strike. Your unarmed strikes are a weapon with which you are proficient and, unless otherwise indicated, they do 1 + your Strength modifier kinetic damage.</p>\n\n<h4>Opportunity Attacks</h4>\n\n<p>In a fight, everyone is constantly watching for enemies to drop their guard. You can rarely move heedlessly past your foes without putting yourself in danger; doing so provokes an opportunity attack. </p>\n\n<p>You can make an opportunity attack when a hostile creature that you can see moves out of your reach. To make the opportunity attack, you use your reaction to make one melee attack against the provoking creature. The attack interrupts the provoking creature's movement, occurring right before the creature leaves your reach.</p>\n\n<p>You can avoid provoking an opportunity attack by taking the Disengage action. You also don't provoke an opportunity attack when you teleport or when someone or something unwillingly moves you without using your movement, action, bonus action, or reaction. For example, you don't provoke an opportunity attack if an explosion hurls you out of a foe's reach or if gravity causes you to fall past an enemy. However, you do provoke an opportunity attack if a power such as <em>force jump</em>, or an ally's Formation fighting style feature, causes you to move out of an enemies' reach, unless that feature says otherwise.</p>\n\n\n\n<h4>Grappling</h4>\n\n<p>When you want to grab a creature or wrestle with it, you can use the Attack action to make a special melee attack, a <strong>grapple</strong>. If you're able to make multiple attacks with the Attack action, this attack replaces one of them.</p>\n\n<h4>Contests in Combat</h4>\n\n<blockquote><p>Battle often involves pitting your prowess against that of your foe. Such a challenge is represented by a contest. This section includes the most common contests that require an action in combat. The GM can use these contests as models for improvising others.</p></blockquote>\n\n<p>The target of your grapple must be no more than one size larger than you, and it must be within your reach. Using at least one free hand, which is occupied for the duration of the grapple, you try to seize the target by making a Strength (Athletics) check contested by the target's Strength (Athletics) or Dexterity (Acrobatics) check (the target chooses the ability to use). If you succeed, you subject the target to the grappled condition (see appendix A). The condition specifies the things that end it, and you can release the target whenever you like (no action required).</p>\n\n<p><strong><em>Escaping a Grapple.</em></strong> A grappled creature can use its action to escape. To do so, it must succeed on a Strength (Athletics) or Dexterity (Acrobatics) check contested by your Strength (Athletics) check.</p>\n\n<p><strong><em>Moving a Grappled Creature.</em></strong> When you move, you can drag or carry the grappled creature with you, but your speed is halved, unless the creature is two or more sizes smaller than you.</p>\n\n<h4>Shoving and Tripping</h4>\n\n<p>Using the Attack action, you can make a special melee attack to <strong>shove</strong> a creature to push it away from you, or to <strong>trip</strong> a creature to knock it prone. If you're able to make multiple attacks with the Attack action, this attack replaces one of them.</p>\n\n<p>The target of your shove or trip must be no more than one size larger than you, and it must be within your reach. You make a Strength (Athletics) check contested by the target's Strength (Athletics) or Dexterity (Acrobatics) check (the target chooses the ability to use). If you win the contest, you either shove the target 5 feet away from you or trip it prone.</p>\n\n<h3>Ranged Attacks</h3>\n\n<p>When you make a ranged attack, you fire a blaster, hurl a vibrodagger, or otherwise strike a foe at a distance. A creature might have a natural ranged weapon. Many powers also involve making a ranged attack.</p>\n\n<h4>Range</h4>\n\n<p>You can make ranged attacks only against targets within a specified range. If a ranged attack, such as one made with a power, has a single range, you can't attack a target beyond this range. Some ranged attacks, such as those made with a blaster, have two ranges. The smaller number is the normal range, and the larger number is the long range. Your attack roll has disadvantage when your target is beyond normal range, and you can't attack a target beyond the long range.</p>\n\n<h4>Ranged Attacks in Close Combat</h4>\n\n<p>Aiming a ranged attack is more difficult when a foe is next to you. When you make a ranged attack with a weapon, a power, or some other means, you have disadvantage on the attack roll if you are within 5 feet of a hostile creature who can see you and who isn't incapacitated.</p>\n\n<h3>Double-Weapon Fighting</h3>\n\n<p>When you take the Attack action and attack with a weapon with the light and double properties that you're wielding in two hands, you can use a bonus action to attack with the other end of the weapon. You don't add your ability modifier to the attack roll of the bonus attack, unless that modifier is negative.</p>\n\n<h3>Two-Weapon Fighting</h3>\n\n<p>When you take the Attack action and attack with a weapon with the light property that you're wielding in one hand, you can use a bonus action to attack with a different light weapon that you're wielding in the other hand. You don't add your ability modifier to the damage roll of the bonus attack, unless that modifier is negative.</p>\n\n<p>If a weapon has the thrown property, you can throw the weapon, instead of making a melee attack with it.</p>\n\n<h2>Cover</h2>\n\n<p>Walls, trees, creatures, and other obstacles can provide cover during combat, making a target more difficult to harm. A target can benefit from cover only when an attack or other effect originates on the opposite side of the cover.</p>\n\n<p>There are four degrees of cover. If a target is behind multiple sources of cover, only the most protective degree of cover applies, not added together.</p>\n\n<p>A target with <strong>one-quarter cover</strong> has a +2 bonus to AC and Dexterity saving throws. A target has one-quarter cover if an obstacle blocks at least one-fourth of its body, such as a thin pillar or a creature of one size category smaller.</p>\n\n<p>A target with <strong>half cover</strong> has a +3 bonus to AC and Dexterity saving throws. A target has half cover if an obstacle blocks at least half of its body, such as a low wall or a creature of the same size category.</p>\n\n<p>A target with <strong>three-quarters cover</strong> has a +5 bonus to AC and Dexterity saving throws. A target has three-quarter cover if about three-quarters of it is obstructed, whether by an obstacle or a creature of one size category larger.</p>\n\n<p>A target with <strong>total cover</strong> can't be targeted directly by an attack or a power, although some powers can reach such a target by including it in an area of effect. A target has total cover if it is completely concealed by an obstacle.</p>\n\n<h4>Variant: Creatures Providing Cover</h4>\n\n<p>Sometimes, creatures in close proximity create a veritable mess of bodies, potentially causing attacks targeting one to hit another. Using this variant, if an attack would miss a creature by an amount less than or equal to the bonus to AC granted by the cover of another creature, and the attack would hit that other creature, the GM might consider having that other creature take the attack's damage.</p>\n\n\n\n<h2>Damage and Healing</h2>\n\n<p>Injury and the risk of death are constant companions of those who explore the worlds of D&amp;D. The thrust of a vibrosword, a well-placed blaster shot, or a shock of lightning from a <em>shock</em> power all have the potential to damage, or even kill, the hardiest of creatures.</p>\n\n<h3>Hit Points</h3>\n\n<p>Hit points represent a combination of physical and mental durability, the will to live, and luck. Creatures with more hit points are more difficult to kill. Those with fewer hit points are more fragile.</p>\n\n<p>A creature's current hit points (usually just called hit points) can be any number from the creature's hit point maximum down to 0. This number changes as a creature takes damage or receives healing.</p>\n\n<p>Whenever a creature takes damage, that damage is subtracted from its hit points. The loss of hit points has no effect on a creature's capabilities until the creature drops to 0 hit points.</p>\n\n<h3>Damage Rolls</h3>\n\n<p>Each weapon, power, and harmful monster ability specifies the damage it deals. You roll the damage die or dice, add any modifiers, and apply the damage to your target. Modified weapons, special abilities, and other factors can grant a bonus to damage.</p>\n\n<p>When attacking with a <strong>weapon,</strong> you add your ability modifier�the same modifier used for the attack roll�to the damage. A <strong>power</strong> tells you which dice to roll for damage and whether to add any modifiers.</p>\n\n<p>If a power or other effect deals damage to <strong>more than one target</strong> at the same time, roll the damage once for all of them. For example, when an engineer casts <em>explosion</em>, the power's damage is rolled once for all creatures caught in the blast.</p>\n\n<h4>Critical Hits</h4>\n\n<p>When you score a critical hit, you get to roll all of the attack's damage dice twice, including any additional damage dice, and add them together. Then add any relevant modifiers as normal. To speed up play, you can roll all the damage dice at once.</p>\n\n<p><strong><em>Critical Hit Range.</em></strong> The critical hit range of a weapon determines on what d20 results a weapon scores a critical hit. Typically, a weapon has a critical hit range of 1, meaning it only scores a critical hit on a 20. A critical hit range of 2, however, would mean the weapon scores a critical hit on a roll of 19 or 20. A critical hit range cannot exceed 5, scoring a critical hit on 16-20.</p>\n\n<h4>Damage Types</h4>\n\n<p>Different attacks, damaging powers, and other harmful effects deal different types of damage. Damage types have no rules of their own, but other rules, such as damage resistance, rely on the types.</p>\n\n<p>The damage types follow, with examples to help a GM assign a damage type to a new effect.</p>\n\n<p><strong><em>Acid.</em></strong> Vials of corrosive liquid or the <em>acid splash</em> tech power deal acid damage.</p>\n\n<p><strong><em>Cold.</em></strong> The chill energy of carbonite and cryogenesis deal cold damage.</p>\n\n\n\n<p>&emsp;<strong><em>Energy.</em></strong> Energy damage is the damage dealt by blaster weapons, lightweapons, and other powers or abilities.</p>\n\n<p><strong><em>Fire.</em></strong> The concussive damage of an explosion or an open flame deal fire damage.</p>\n\n<p><strong><em>Force.</em></strong> Certain force powers that channel the pure energy of the Force deal force damage. </p>\n\n<p><strong><em>Ion.</em></strong> Ion damage is a special damage type that is most effective against droids and constructs. Simple electronics dealt ion damage are disabled until rebooted, unless that damage would destroy them outright. </p>\n\n<p><strong><em>Kinetic.</em></strong> Kinetic damage encompasses all physical damage commonly dealt by vibroweapons.</p>\n\n<p><strong><em>Lightning.</em></strong> The electrifying energy of the <em>force lightning</em> power deals lightning damage.</p>\n\n<p><strong><em>Necrotic.</em></strong> Necrotic damage, dealt by powers like <em>death field</em>, withers matter and even the soul.</p>\n\n<p><strong><em>Poison.</em></strong> Venomous stings and the toxic <em>poison spray</em> power deal poison damage.</p>\n\n<p><strong><em>Psychic.</em></strong> The crippling agony causes by powers like <em>feedback</em> deal psychic damage.</p>\n\n<p><strong><em>Sonic.</em></strong> Debilitating noises cause sonic damage.</p>\n\n<p><strong><em>True.</em></strong> True damage is not dealt by any specific source. Instead, effects that prevent or redirect damage cannot be used to counter the loss of life caused by true damage.</p>\n\n<h3>Damage Resistance and Vulnerability</h3>\n\n<p>Some creatures and objects are exceedingly difficult or unusually easy to hurt with certain types of damage. If a creature or an object has resistance to a damage type, damage of that type is reduced by half against it. If a creature or an object has vulnerability to a damage type, damage of that type is doubled against it.</p>\n\n<p>Multiple instances of resistance or vulnerability that affect the same damage type count as only one instance. For example, if a creature has resistance to lightning damage as well as resistance to all force power damage, the damage of a <em>force lightning</em> is reduced by half, not reduced by three-quarters.</p>\n\n<p>Resistance and then vulnerability are applied after passive modifiers to damage, but before active modifiers. For example, a creature with resistance to kinetic damage, a proficiency bonus of +4, and the Defense fighting mastery is hit by an attack that deals 22 kinetic damage. The 22 damage is first reduced by 4 and then halved, so the creature takes 9 damage. The creature also has the Shield fighting mastery, and uses its reaction to further reduce the damage taken by 4, finally taking only 5 damage.</p>\n\n<h5>Describing the Effects of Damage</h5>\n\n<blockquote><p>Game Masters describe hit point loss in different ways. When your current hit point total is above half your hit point maximum, you typically show no signs of injury. When you drop below half your hit point maximum, you show signs of wear, such as cuts and bruises. An attack that reduces you to 0 hit points strikes you directly, leaving a bleeding injury or other trauma, or it simply knocks you unconscious.</p></blockquote>\n\n\n\n<h3>Healing</h3>\n\n<p>Unless it results in death, damage isn't permanent. Rest can restore a creature's hit points (as explained in chapter 8), and methods such as a <em>benevolence</em> force power or a medpac can remove damage instantly.</p>\n\n<p>When a creature receives healing of any kind, hit points regained are added to its current hit points. A creature's hit points can't exceed its hit point maximum, so any hit points regained in excess of this number are lost. For example, a consular grants an operative 8 hit points of healing. If the operative has 14 current hit points with a maximum of 20, the operative regains 6 hit points from the consular, not 8.</p>\n\n<p>A creature that has died can't regain hit points until a power such as <em>revitalize</em> has restored it to life.</p>\n\n<h4>Hit Dice</h4>\n\n<p>Resting (explained in chapter 8), as well as certain special traits such as the trandoshan's Regenerative, consume Hit Dice to restore hit points. Whenever a creature rolls a Hit Die to restore hit points, they add their Constitution modifier to the roll.</p>\n\n<h3>Dropping to 0 Hit Points</h3>\n\n<p>When you drop to 0 hit points, you either die outright or fall unconscious, as explained in the following sections.</p>\n\n<h4>Instant Death</h4>\n\n<p>Massive damage can kill you instantly. When damage reduces you to 0 hit points and there is damage remaining, you die if the remaining damage equals or exceeds your hit point maximum.</p>\n\n<p>For example, a consular with a maximum of 12 hit points currently has 6 hit points. If she takes 18 damage from an attack, she is reduced to 0 hit points, but 12 damage remains. Because the remaining damage equals her hit point maximum, the consular dies.</p>\n\n<h4>Falling Unconscious</h4>\n\n<p>If damage reduces you to 0 hit points and fails to kill you, you fall unconscious (see appendix A). This unconsciousness ends if you regain any hit points.</p>\n\n<h4>Death Saving Throws</h4>\n\nWhenever you start your turn with 0 hit points, you must make a special saving throw, called a death saving throw, to determine whether you creep closer to death or hang onto life. Unlike other saving throws, this one isn't tied to any ability score. You are in the hands of fate now, aided only by powers and features that improve your chances of succeeding on a saving throw. Roll a d20. If the roll is 10 or higher, you succeed. Otherwise, you fail. A success or failure has no effect by itself. On your third success, you become stable (see below). On your third failure, you die. The successes and failures don't need to be consecutive; keep track of both until you collect three of a kind.<br> The number of both is reset to zero when you<br> regain any hit points or become stable.\n\n\n\n<p>&emsp;<strong><em>Rolling 1 or 20.</em></strong> When you make a death saving throw and roll a 1 on the d20, it counts as two failures. If you roll a 20 on the d20, you regain 1 hit point.</p>\n\n<p><strong><em>Damage at 0 Hit Points.</em></strong> If you take any damage while you have 0 hit points (for example, by catching fire because your limbs were all chopped off next to a pit of lava), you suffer a death saving throw failure. If the damage is from a critical hit, you suffer two failures instead. If the damage equals or exceeds your hit point maximum, you suffer instant death.</p>\n\n<h4>Stabilizing a Creature</h4>\n\n<p>The best way to save a creature with 0 hit points is to heal it. If healing is unavailable, the creature can at least be stabilized so that it isn't killed by a failed death saving throw.</p>\n\n<p>You can use your action to administer first aid to an unconscious creature and attempt to stabilize it, which requires a successful DC 10 Wisdom (Medicine) check, or an Intelligence (Technology) check for a droid or construct.</p>\n\n<p>A <strong>stable</strong> creature doesn't make death saving throws, even though it has 0 hit points, but it does remain unconscious. The creature stops being stable, and must start making death saving throws again, if it takes any damage. A stable creature that isn't healed regains 1 hit point after 1d4 hours.</p>\n\n<h4>Monsters and Death</h4>\n\n<p>Most GMs have a monster die the instant it drops to 0 hit points, rather than having it fall unconscious and make death saving throws.</p>\n\n<p>Mighty villains and special nonplayer characters are common exceptions; the GM might have them fall unconscious and follow the same rules as player characters.</p>\n\n<h3>Knocking a Creature Out</h3>\n\nSometimes an attacker wants to incapacitate a foe, rather than deal a killing blow. When an attacker reduces a creature to 0 hit points with a melee<br> weapon attack or blaster weapon<br> that deals ion or energy damage,<br> the attacker can knock the<br> creature out. The attacker can<br> make this choice the instant<br> the damage is dealt. The<br> creature falls<br> unconscious<br> and is <br>stable.\n\n<img src='https://www.gmbinder.com/images/4Kf8o4R.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:670px' />\n\n\n\n<h2>Temporary Hit Points</h2>\n\n<p>Some powers and special abilities confer temporary hit points to a creature. Temporary hit points aren't actual hit points; they are a buffer against damage, a pool of hit points that protect you from injury.</p>\n\n<p>When you have temporary hit points and take damage, the temporary hit points are lost first, and any leftover damage carries over to your normal hit points. For example, if you have 5 temporary hit points and take 7 damage, you lose the temporary hit points and then take 2 damage.</p>\n\n<p>Because temporary hit points are separate from your actual hit points, they can exceed your hit point maximum. A character can, therefore, be at full hit points and receive temporary hit points.</p>\n\n<p>Healing can't restore temporary hit points, and they can't be added together. If you have temporary hit points and receive more of them, you decide whether to keep the ones you have or to gain the new ones. For example, if a power grants you 12 temporary hit points when you already have 10, you can have 12 or 10, not 22.</p>\n\n<p>If you have 0 hit points, receiving temporary hit points doesn't restore you to consciousness or stabilize you. They can still absorb damage directed at you while you're in that state, but only true healing can save you. </p>\n\n<p>Unless a feature that grants you temporary hit points has a duration, they last until they're depleted or you finish a long rest.</p>\n\n<h3>Temporary Force and Tech Points</h3>\n\n<p>Similar to temporary hit points, some powers, abilities, or features grant temporary force or tech points to a creature. When you would expend force or tech points�whether through a power, ability, or feature�the temporary points are spent first.</p>\n\n<p>You can only have one source of temporary force or tech points. If you have temporary force or tech points and receive more of them, you decide whether to keep the ones you have or gain the new ones.</p>\n\n<p>Unless a feature that grants you temporary force or tech points has a duration, they last until they're depleted or you finish a long rest.</p>\n\n<h2>Underwater Combat</h2>\n\n<p>When adventurers pursue karkarodons back to their undersea domain, fight off gungans in an ancient shipwreck, or find themselves in a flooded dungeon room, they must fight in a challenging environment. Underwater the following rules apply.</p>\n\n<p>When making a <strong>melee weapon attack,</strong> a creature that doesn't have a swimming speed (either natural or granted by a power) has disadvantage on the attack roll unless the weapon is a vibrodagger or vibrospear.\t</p>\n\n<p>A <strong>ranged weapon attack</strong> automatically misses a target beyond the weapon's normal range, but functions normally against a target within normal range.</p>\n\n<p>Creatures and objects that are fully immersed in water have resistance to fire damage.</p>\n\n<h2>Mounted Combat</h2>\n\n<p>A trooper charging into battle on a dewback, an engineer casting powers from the seat of a speeder, or a consular soaring through the sky on shuttle all enjoy the benefits of speed and mobility that a mount can provide.</p>\n\n<p>An appropriately sized vehicle or a willing creature that is at least one size larger than you and that has an appropriate anatomy can serve as a mount, using the following rules.</p>\n\n<h3>Mounting and Dismounting</h3>\n\n<p>Once during your move, you can mount or dismount a vehicle or willing creature that is within 5 feet of you. Doing so costs an amount of movement equal to half your speed. For example, if your speed is 30 feet, you must spend 15 feet of movement to mount a dewback. Therefore, you can't mount it if you don't have 15 feet of movement left or if your speed is 0.</p>\n\n<p>If an effect moves your mount against its will while you're on it, you must succeed on a DC 10 Dexterity saving throw or fall off the mount, landing prone in a space within 5 feet of it. If you're knocked prone while mounted, you must make the same saving throw.</p>\n\n<p>If your mount is knocked prone, you can use your reaction to dismount it as it falls and land on your feet. Otherwise, you are dismounted and fall prone in a space within 5 feet it.</p>\n\n<h4>Controlling a Mount</h4>\n\n<p>While you're mounted, you have two options. You can either control the mount or allow it to act independently. Intelligent creatures act independently.</p>\n\nYou can control a mount only if it has been trained to accept a rider. Domesticated animals, such as dewbacks or kaadu, and similar creatures are assumed to have such training. The initiative of a controlled<br> &emsp;&emsp;&emsp;&emsp;mount changes to match yours when you<br> &emsp;&emsp;&emsp;&emsp;&emsp;mount it. It moves as you direct it, and it has<br> &emsp;&emsp;&emsp;&emsp;&emsp;only three action options: Dash, Disengage,<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;and Dodge. A controlled mount can<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;move and act even on the turn that<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;you mount it. All vehicles are<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;considered controlled mounts,<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;unless a feature says otherwise.\n\n&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;An independent mount retains its<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;place in the initiative order. Bearing<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;a rider puts no restrictions on the<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;actions the mount can take, and it<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;moves and acts as it wishes. It might<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;flee from combat, rush to attack and<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;devour a badly injured foe, or otherwise<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;act against your wishes.\n\n&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;In either case, if the mount provokes<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;an opportunity attack while you're on<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;it, the attacker can target you or the<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;mount.\n\n<img src='https://www.gmbinder.com/images/xOYtlgQ.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:440px' />\n\n\n\n<style>\n\n<p>  .phb#p25:after { display:none; } &lt;/style&gt;</p>\n\n<img src='https://cdn.discordapp.com/attachments/469499280994992128/593986574891352084/sw-combat-scene.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:844px' />"
