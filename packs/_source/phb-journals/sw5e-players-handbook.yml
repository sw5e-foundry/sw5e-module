        <h1>Chapter 2: Species</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">visit to any of the great cities in the worlds of</span><br> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <em>Star Wars</em> overwhelms the senses. Voices chatter in countless different languages. The smells of cooking in dozens of different cuisines mingle with the odors of crowded streets and poor sanitation. Buildings in myriad architectural styles display the diverse origins of their inhabitants. 

        <p>And the people themselves-people of varying size, shape, and color, dressed in a dazzling spectrum of styles and hues-represent many different species, from diminutive bothans and stalwart cereans to majestic twi'leks and towering wookiees, mingling among a variety of human ethnicities.</p>

        <p>Scattered among the members of these more common species are the true exotics: a hulking besalisk here, pushing his way through the crowd, and a sly chiss there, lurking in the shadows with mischief in her eyes. A group of jawas chatters as one of them activates a clever mechanical toy that moves of its own accord. Zabraks and devaronians live and work alongside humans, without fully belonging. And there, well out of the sunlight, is a lone dros-a fugitive from the the Galactic Republic, trying to make his way in a world.</p>

        <h3>Choosing a Species</h3>

        <p>Humans are the most common people in the worlds of <em>Star Wars</em>, but they live and work alongside ithorians, kiffar, mirialan, and countless other fantastic species. Your character belongs to one of these peoples. </p>

        <p>Your choice of species affects many different aspects of your character. It establishes fundamental qualities that exist throughout your character's adventuring career. When making this decision, keep in mind the kind of character you want to play. For example, a bothan can be a good choice for a sneaky operative, a wookiee makes a tough berserker, and a twi'lek can be a master of the Force.</p>

        Your character species not only affects your ability scores and traits but also provides the cues for building your character's story. Each species' description in this chapter includes information to help you roleplay a character of that species, including personality, physical appearance, features of society, and special alignment tendencies. These details are suggestions to help you think about your character; adventurers can deviate widely from the norm for their<br> &emsp;&emsp;&emsp;species. It's worthwhile to consider why your<br> &emsp;&emsp;&emsp;&emsp;character is different, as a helpful way to think<br> &emsp;&emsp;&emsp;&emsp;about your character's background and<br> &emsp;&emsp;&emsp;&emsp; personality.

        <h3>Special Traits</h3>

        <p>The description of each species includes special traits that are common to members of that species. The following entries appear among the traits of most species.</p>

        <h4>Ability Score Increase</h4>

        <p>Every species increases one or more of a character's ability scores.</p>

        <h4>Age</h4>

        <p>The age entry notes the age when a member of the species is considered an adult, as well as the species' expected lifespan. This information can help you decide how old your character is at the start of the game. You can choose any age for your character, which could provide an explanation for some of your ability scores. For example, if you play a young or very old character, your age could explain a particularly low Strength or Constitution score, while advanced age could account for a high Intelligence or Wisdom.</p>

        <h4>Alignment</h4>

        <p>Most species have tendencies toward certain alignments, described in this entry. These are not binding for player characters, but considering why your sith pureblood follows the light side, for example, in defiance of the Sith Empire can help you better define your character.</p>

        <h4>Size</h4>

        <p>Characters of most species are Medium, a size category including creatures that are roughly 4 to 8 feet tall. Members of a few species are Small (between 2 and 4 feet tall), which means that certain rules of the game affect them differently. The most important of these rules is that Small characters have trouble wielding heavy weapons and heavy shields, as explained in chapter 6.</p>

        <h4>Speed</h4>

        <p>Your speed determines how far you can move when traveling (chapter 8) and fighting (chapter 9).</p>

        <h4>Languages</h4>

        <p>By virtue of your species, your character can speak, read, and write certain languages. Each species typically speaks, or at least understands, Galactic Basic as well as having a unique language of their own. Chapter 4 lists the most common languages of the <em>Star Wars</em> universe.</p>

        <img src='https://www.gmbinder.com/images/aGfQe3g.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:819px' />

        <hr>

        <h2>Bith</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Green, pink, white, or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Large cranium, acute senses of smell and hearing</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'9"</td><td>+2d6"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>100 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Clak'dor VII</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Bith</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Bith are craniopods with pale pink, yellow, or green skin, large heads, large lidless eyes, toeless feet, and long fingers. Their thumb and small finger were both fully opposable. The bith's internal systems are different from most humanoids, as the bith have only one lung, and exhale through their skin. Bith also lack a proper nose, instead having highly sensitive olfactory organs hidden in the skin-flaps of their cheeks.</p>

        <p>The other bith senses are also acute. Bith can sense the tonal qualities of sound as well as other species sensed colors. Their eyes, as big as a Menahuun's, can see microscopic details of nearby objects, but are extremely nearsighted as a result. An interesting side effect of their incredible sensors is the effect of sonic grenades, or screamers, on them. It is described as causing their heads to explode. Similarly, bith have high manual dexterity which helps them manipulate fine tools, though their physical prowess with gross motor skills was only average.</p>

        <h3>Society and Culture</h3>

        <p>Bith are one of the galaxy's most ancient civilizations, with a history going back millions of years. This antiquity garners respect in certain quarters, such as among the Gree, who gave them more respect than other, "younger" species. Their society is highly regimented, with everything from mate selection to political leadership controlled by sophisticated computer programs.</p>

        <h3>Names</h3>

        <p>Bith names are quite diverse. Some names look complicated and difficult to pronounce, while others are quite simple. </p>

        <p><strong>Male Names.</strong> Fedu, Jenkiss, Kabadons, Ph'teumkiass </p>

        <p><strong>Female Names.</strong> Duhia, F'hubama, R'hothal, Thidus </p>

        <p><strong>Surnames.</strong> D'intes, Hern, K'sarorn, Nimum, Rumo</p>



        <h3>Bith Traits</h3>

        <p>As a bith, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Bith reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Biths' benevolent nature causes them to tend toward the light side, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Bith typically stand 5 to 6 feet tall and generally weigh about 120 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Detail Oriented.</em></strong> You are practiced at scouring for details. You have advantage on Intelligence (Investigation) checks within 5 feet.</p>

        <p><strong><em>Keen Hearing and Smell.</em></strong> You have advantage on Wisdom (Perception) checks that involve hearing or smell.</p>

        <p><strong><em>Musician.</em></strong> You are proficient in one musical instrument of your choice.</p>

        <p><strong><em>Programmer.</em></strong> Whenever you make an Intelligence (Technology) check related to computers, you are considered to have expertise in the Technology skill.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Bith, and one more language of your choice.</p>

        <img src='https://www.gmbinder.com/images/0VxWnHw.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:251px' />



        <hr>

        <h2>Bothan</h2>

        <blockquote><hr>

