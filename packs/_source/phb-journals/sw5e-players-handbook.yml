  - name: 'Appendix B: Recommended Variant Rules'
    _id: Yz30TCh5N0dN7ygt
    text:
      content: |+
        <h1>Appendix B: Recommended Variant Rules</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">ouse/variant rules are optional additions to GM each</span><br> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; game that in some way enhance or alter game play. Generally, they are done to alleviate stress from the GM, to improve player engagement, or to help a player realize a character goal. This appendix includes a number of variant rule options, all of which I offer at my table.

        <p>I would encourage you to become familiar with the core content of this conversion before you decide if these house rules are right for you.</p>

        <h2>Defense Rolls</h2>

        <p>One of the first variant rules I added to my games was the Defense Rolls, published in the Unearthed Arcana: Variant Rules. Essentially, instead of the GM making attack rolls against the players' static AC, the players make defense rolls against the GM's static attack save DC. Implementing this is easy.</p>

        <h3>Calculating Defense Bonus (DB)</h3>

        <p>Armor class is replaced with Defense Bonus. This bonus is calculated simply by players taking their AC and subtracting 10. If a player had an AC of 16, they would have a DB of +6.</p>

        <h3>Calculating Attack Save DC</h3>

        <p>Attack bonuses you find on monster cards are similar converted to static values, called the attack save DC. To calculate this DC, simply take the listed attack bonus and add 12 to it. For instance, a B1 battle droid's blaster rifle attacks with a +4 modifier. Instead, that droid would have an attack save DC of 16.</p>

        <h3>Making the Roll</h3>

        <p>Instead of the GM making attack rolls, players make defense rolls by rolling a d20 and adding their Defense Bonus. If the roll meets or exceeds the attack save DC, the player successfully defends. If a character fails the the defense roll, the attack hits.</p>

        <p>If the attacker would normally have advantage on the attack roll, you instead apply disadvantage to the defense roll, and vice versa if the attacker would have disadvantage.</p>

        <p>If the defense roll comes up a 1 on the d20, then the attack is a critical hit. If the attacker would normally score a critical hit on a roll of 19 or 20, then the attack is a critical hit on a 1 or 2, and so forth for broader critical ranges.</p>

        <p>Similarly, a 20 on the defense roll would automatically be a successful dodge, regardless of the attack save DC.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>This is the first variant rule I implemented at my table, and it has thus far been universally loved. Keeping players engaged is very important at the table. Additionally, abilities that players have that allow them to know your attack rolls are simpler since the player rolls the dice in the open.</p>

        <p>While I use this rule, and will continue to do so, when my players encounter "boss"-type mobs, I roll attack rolls as normal.</p>

        <p>I especially recommend this rule if you utilize the Space Combat optional rule set. Since the pilot on many larger ships doesn't operate the weapons, using this rule keeps them further engaged.</p>

        <h2>Saving Throw Checks</h2>

        <p>Also published in the Unearthed Arcana: Variant Rules was a rule for your players to roll when they use powers or abilities that call for a save DC. Instead of the GM making saving throws against the players' static save DCs, the players roll a saving throw check against the GM's defense save DC.</p>

        <h3>Calculating Saving Throw Check</h3>

        <p>If players have their save throw DCs calculated, simply subtract 8 from that value. If your consular's force save DC is 15, your saving throw check modifier is +7.</p>

        <h3>Calculating Defense Save DC</h3>

        <p>Monster cards also include potential saving throws, which can easily be converted to a defense save DC. Take the appropriate ability score modifier and add 14 to it. If the monster is proficient in the saving throw (indicated in the <em>saving throw</em> line on the monster card, if it exists), instead use that value. For instance, if a B1 battle droid is forced to make a Dexterity saving throw, its defense save DC would be 16 (14+2).</p>

        <h3>Making the Roll</h3>

        <p>Instead of the GM rolling saving throws for the monsters, players make saving throw checks by rolling a d20 and adding their saving throw check modifier. If the roll meets or exceeds the defense save DC, the creature fails the saving throw. If a character fails the the saving throw check, the creature successfully saves.</p>

        <p>If the defender would normally have advantage on the saving roll, you instead apply disadvantage to the saving throw check, and vice versa if the defender would have disadvantage.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>For all the same reasons as defense rolls. Players enjoy it, and it makes it easier for me to GM. Again, I don't use this rule when players encounter bosses.</p>

        <h2>Force and Tech Prowess</h2>

        <p>When you fail an ability check, if you added your proficiency bonus to the check and you did not have advantage or disadvantage, you can spend 1 force or tech point to reroll the die. You can only use this feature once per ability check, and you must use the new roll.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>This is actually a holdover from before casting ability modifier was added to force and tech points.</p>



        <h2>Simplified Forcecasting</h2>

        <p>The current version of the SW5e PHB has the player using different ability scores depending on the alignment of the powers they are trying to cast: Wisdom for light side, Charisma for dark side, player's choice for universal.</p>

        <p>For new players, this might be too complicated. Consider letting them instead choose between using Wisdom and Charisma as their forcecasting ability.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>This is a wonderful simplification for new players. I, personally, love the alignment determining the forcecasting ability, and I have relatively experienced players, so I haven't felt a need to use this.</p>

        <h2>ASI and a Feat</h2>

        <p>This one is simple. At level 4, 8, 12, 16, and 19, when a player gets the opportunity to choose between adding 2 to their ability scores or a feat, I'm letting them add 1 to an ability score <em>and</em> choose a feat.</p>

        <p>Now, this is going to create more powerful players, which means you need to pit them against more powerful monsters. I, personally, love this rule because I know it helps experienced players realize the exact character they want and helps to differentiate different characters of the same class. Then again, I'm a <em>huge</em> proponent of feats in general.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>I love feats and I love powerful player characters, so as a GM this rule works well for me. It's not for everyone.</p>

        <h2>Crueler Criticals</h2>

        <p>Normally, when you score a critical hit, you roll the damage dice twice and add your modifier once. For instance, if you are wielding a weapon that deals 1d8 kinetic damage and is governed by Strength, on a critical hit you deal 2d8 + your Strength modifier kinetic damage. Sometimes, poor rolls lead to you doing less damage on a critical hit than a normal hit. For instance, you might roll two 1's on your 2d8, which with your +3 Strength modifier is only 5 damage. This feels lackluster.</p>

        <p>With this rule, instead of rolling the damage dice twice, you instead maximize the damage once and then roll the second die. So, using the above example, instead of rolling 2d8 and adding your Strength modifier, you instead roll 1d8, add 8 for the maximum die roll, and then add your Strength modifier. This will make critical hits feel more impactful.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>As indicated above, this variant rule helps make crits more impactful, but it's a double-edged sword, since it can make damage against player's spike, too.</p>

        <h2>Milestone Leveling</h2>

        <p>I won't delve too far into this. The simplified version is that instead of receiving experience for every encounter and leveling up at odd times, the GM chooses when they level up. Additionally, there never has the potential to be an experience, and consequently level, disparity between players.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>Milestone leveling eliminates unnecessary record-keeping, helps maintain narrative significance to leveling up, and streamlines the GM controlling the game.</p>

        <p>Additionally, if you utilize the Space Combat optional rule set, I urge you to use this. The nature of space combat is that there is no ship leveling up. Experience values relative to the amount required to level up will diminish drastically.</p>

        <h2>Bonus Action Consumables</h2>

        <p>Most consumables require an action to use, which makes sense when applying them to others. However, a common adjustment in 5e (which is even more logical in SW5e), is to allow administering such consumables to yourself as a bonus action, instead. This only applies to consumables that confer a positive benefit, such as a repair kit or medpac.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>This is a pretty common house rule at most tables, I believe. I've always used it since I discovered it years ago.</p>

        <h2>Hunted</h2>

        <p>In some eras of <em>Star Wars</em> history, forcecasters are a rarity, and are hunted across the galaxy by the likes of Inquisitors, or if they're unlucky, a Dark Lord of the Sith, in an attempt to crush any foreseen threats to their rule. Should you want your forcecasting players to experience this additional level of drama and suspense, here is an alternate rule to implement:</p>

        <p>Whenever a player casts a force power, others in the Galaxy may detect their presence through ripples in the Force. Each player has a pool of Disturbance Points. This pool of Disturbance Points increases every time a force power is cast by a number of points equal to the level of the force power used (at-will powers are treated as Level 0). </p>

        <p>After each combat, roll a percentile dice for each player that used a force power. If you roll a number equal to or lower than the players Disturbance Pool, they are detected by Jedi Hunters of your determination, who begin to hunt the player they detected.</p>

        <p>During each long rest, decrease each players pool of Disturbance Points by an amount equal to their level.</p>

        <h3>Why I Recommend This Rule</h3>

        <p>I actually run a campaign in the Old Republic era, so I don't use this rule. It <em>is</em> great, however, for those who run in more restricted eras.</p>

