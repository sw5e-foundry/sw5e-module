  - name: 'Appendix A: Conditions'
    _id: 6dtAwlz5MDNU7gqf
    text:
      content: |-
        <h1>Appendix A: Conditions</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">onditions alter a creature's capabilities in a variety of</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ways and can arise as a result of a power, a class feature, a monster's attack, or other effect. Most conditions, such as blinded, are impairments, but a few, such as invisible, can be advantageous.

        <p>A condition lasts either until it is countered (the prone condition is countered by standing up, for example) or for a duration specified by the effect that imposed the condition. </p>

        <p>If multiple effects impose the same condition on a creature, each instance of the condition has its own duration, but the condition's effects don't get worse. A creature either has a condition or doesn't.</p>

        <p>The following definitions specify what happens to a creature while it is subjected to a condition.</p>

        <h4>Blinded</h4>

        <ul><li>A blinded creature can't see and automatically fails any ability check that requires sight.</li><li>Unless a creature benefits from powers or a special sense, attack rolls against the creature have advantage, and the creature's attack rolls have disadvantage.</li></ul>

        <h4>Charmed</h4>

        <ul><li>A charmed creature can't attack the charmer or target the charmer with harmful abilities or enhanced effects.</li><li>The charmer has advantage on any ability check to interact socially with the creature.</li></ul>

        <h4>Corroded</h4>

        <p>Some abilities, effects, and hazards can lead to a special condition called corroded. Corroded is measured in three levels. An effect can give a creature one or more corroded level, as specified in the effect's description.</p>

        <p>For each corroded level a creature has, it takes 1 additional damage from weapons.</p>

        <h4>Deafened</h4>

        <ul><li>A deafened creature can't hear and automatically fails any ability check that requires hearing.</li></ul>

        <h4>Diseased</h4>

        <ul><li>A diseased creature suffers effects that vary based on the disease.</li></ul>

        <h4>Exhaustion</h4>

        <p>Some special abilities and environmental hazards, and the long-term effects of freezing or scorching temperatures, can lead to a special condition called exhaustion. Exhaustion is measured in six levels. An effect can give a creature one or more levels of exhaustion, as specified in the effect's description.</p>

        <h5>Exhaustion Level</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Effect</th></tr></thead><tbody><tr><td>1</td><td>Disadvantage on ability checks</td></tr><tr><td>2</td><td>1 slowed level</td></tr><tr><td>3</td><td>Disadvantage on attack rolls and saving throws</td></tr><tr><td>4</td><td>Hit point maximum halved</td></tr><tr><td>5</td><td>4 slowed levels</td></tr><tr><td>6</td><td>Death</td></tr></tbody></table>

        <p>&emsp;If an already exhausted creature suffers another effect that causes exhaustion, its current exhaustion level increases by the amount specified in the effect's description.</p>

        <p>A creature suffers the effect of its current exhaustion level as well as all lower levels. For example, a creature suffering level 2 exhaustion has 1 slowed level and has disadvantage on ability checks.</p>

        <p>An effect that removes exhaustion reduces its level as specified in the effect's description, with all exhaustion effects ending if a creature's exhaustion level is reduced below 1.</p>

        <p>Finishing a long rest reduces a creature's exhaustion level by 1, provided that the creature has also ingested some food and drink.</p>

        <h4>Frightened</h4>

        <ul><li>A frightened creature has disadvantage on ability checks and attack rolls while the source of its fear is within line of sight.</li><li>The creature can't willingly move closer to the source of its fear.</li></ul>

        <h4>Grappled</h4>

        <ul><li>A grappled creature has its speed reduced to 0.</li><li>The condition ends if the grappler is incapacitated (see the condition).</li><li>The condition also ends if an effect removes the grappled creature from the reach of the grappler or grappling effect.</li></ul>

        <h4>Ignited</h4>

        <ul><li>A creature that is ignited suffers fire damage at the end of each of its turns. A damage value in parentheses appears with this condition—the fire damage the creature takes at the end of its turn.</li><li>If the target or a creature within 5 feet of it uses an action to put out the flames, or if some other effect douses the flames, the creature is no longer ignited.</li></ul>

        <h4>Incapacitated</h4>

        <ul><li>An incapacitated creature can't take actions or reactions.</li><li>An incapacitated creature automatically fails Strength, Dexterity, and Constitution checks.</li></ul>

        <h4>Invisible</h4>

        <ul><li>An invisible creature is considered unseen to other creatures, without the aid of powers or a special sense, as described in "Unseen Attackers and Targets" in Chapter 9. For the purpose of hiding, the creature is heavily obscured. The creature's location can be detected by any noise it makes or any tracks it leaves.</li><li>Unless a creature benefits from powers or a special sense, attack rolls against the creature have disadvantage, and the creature's attack rolls have advantage.</li></ul>



        <h4>Paralyzed</h4>

        <ul><li>A paralyzed creature is incapacitated (see the condition) and can't move or speak.</li><li>The creature automatically fails Strength and Dexterity saving throws, as if it had rolled a 1 on the save. Attack rolls against the creature have advantage.</li><li>Any attack that hits the creature is a critical hit if the attacker is within 5 feet of the creature.</li></ul>

        <h4>Petrified</h4>

        <ul><li>A petrified creature is transformed, along with any object it is wearing or carrying, into a solid inanimate substance (usually stone). Its weight increases by a factor of ten, and it ceases aging.</li><li>The creature is incapacitated (see the condition), can't move or speak, and is unaware of its surroundings.</li><li>Attack rolls against the creature have advantage. </li><li>The creature automatically fails Strength and Dexterity saving throws, as if it had rolled a 1 on the save.</li><li>The creature has resistance to all damage.</li><li>The creature is immune to poison and disease, although a poison or disease already in its system is suspended, not neutralized.</li></ul>

        <h4>Poisoned</h4>

        <ul><li>A poisoned creature has disadvantage on attack rolls and ability checks.</li></ul>

        <h4>Prone</h4>

        <ul><li>A prone creature's only movement option is to crawl, unless it stands up and thereby ends the condition. </li><li>The creature has disadvantage on melee attack rolls.</li><li>The creature has disadvantage on ranged attack rolls against targets within 30 feet.</li><li>An attack roll against the creature has advantage if the attacker is within 5 feet of the creature. Otherwise, the attack roll has disadvantage.</li></ul>

        <h4>Restrained</h4>

        <ul><li>A restrained creature has 4 slowed levels.</li><li>Attack rolls against the creature have advantage, and the creature's attack rolls have disadvantage.</li><li>The creature has disadvantage on Dexterity saving throws.</li></ul>

        <h4>Shocked</h4>

        <ul><li>A shocked creature can't take reactions.</li><li>On its turn, a shocked creature can take either an action or a bonus action, but not both.</li></ul>

        <h4>Slowed</h4>

        <p>Some abilities, effects, and hazards can lead to a special condition called slowed. Slowed is measured in four levels. An effect can give a creature one or more levels of slowed, as specified in the effect's description.</p>

        <h5>Slowed Level</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Effect</th></tr></thead><tbody><tr><td>1</td><td>Speed reduced by 15 feet</td></tr><tr><td>2</td><td>Speed reduced by 25 feet</td></tr><tr><td>3</td><td>Speed reduced by 30 feet</td></tr><tr><td>4</td><td>Speed reduced to 0, and<br> can't benefit from any<br> bonus to speed</td></tr></tbody></table>



        <p>&emsp;If an already slowed creature suffers another effect that causes it to be slowed, its current slowed level increases by the amount specified in the effect's description.</p>

        <p>An effect that removes slowed reduces its level as specified in the effect's description, with all slowed effects ending if a creature's slowed level is reduced below 1.</p>

        <h4>Stunned</h4>

        <ul><li>A stunned creature is incapacitated (see the condition), can't move, and can speak only falteringly.</li><li>The creature automatically fails Strength and Dexterity saving throws, as if it had rolled a 1 on the save.</li><li>Attack rolls against the creature have advantage. </li></ul>

        <h4>Unconscious</h4>

        <ul><li>An unconscious creature is incapacitated (see the condition), can't move or speak, and is unaware of its surroundings</li><li>The creature drops whatever it's holding and falls prone.</li><li>The creature automatically fails Strength and Dexterity saving throws, as if it had rolled a 1 on the save.</li><li>Attack rolls against the creature have advantage.</li><li>Any attack that hits the creature is a critical hit if the attacker is within 5 feet of the creature.</li></ul>

        <h4>Weakened</h4>

        <ul><li>A creature suffering from the weakened condition heals at a slower rate. When an effect restores hit points to the creature, the amount of hit points restored is halved.</li><li>Creatures suffering from this condition can only add half their ability modifier to ability checks, attack rolls, and saving throws, unless that modifier would be negative.</li></ul>

