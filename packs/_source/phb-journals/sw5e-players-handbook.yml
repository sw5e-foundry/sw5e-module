        <h3>Biology and Appearance</h3>

        <p>Trandoshans are a large, bipedal sentient species, with scaly skin which was shed roughly once every standard year and was thought to be very durable. Cold-blooded reptiles, trandoshans had two super-sensitive varied color eyes with horizontal black pupils, which could see far into the infrared range. Each of their four limbs ends in three razor sharp claws. These are perfect for combat, but did not grant them manual dexterity, making a trandoshan's finger movements somewhat clumsy and awkward. </p>

        <h3>Society and Culture</h3>

        <p>Trandoshans worship their goddess, the Scorekeeper, whom they would appease through acts which increased their Jagannath points. This is done by living a lifestyle which was, by non-trandoshan standards, overtly aggressive, leading many trandoshans to become bounty hunters, mercenaries, or slavers. Trandoshans especially prize wookiee pelts, which consequently play a large part in earning Jagannath points-capturing the pelts of particularly infamous wookiees would give the hunter a large increase in Jagganath points. To be shamed or captured during a hunt would zero one's Jagganath points-effectively making their life forfeit in the eyes of the Scorekeeper. They could, however, win all those points back by killing the one who zeroed their score.</p>

        <h3>Names</h3>

        <p>Trandoshan names are quite harsh and contain a lot of elongated sounds, as well as a lot of s's. Differences between male and female names are often very subtle, but there is a higher chance for female names to contain softer sounds.</p>

        <p><strong>Male Names.</strong> Bossk, Tshyrrng, Varrsk, Wuikkekss</p>

        <p><strong>Female Names.</strong> Aksa, Idwiks, Kluks, Mezuus, Shokss</p>

        <p><strong>Surnames.</strong> Dallosss, Druc, Groqisch, Hsac, Nausdot</p>



        <h3>Trandoshan Traits</h3>

        <p>As a trandoshan, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Strength score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Trandoshans reach adulthood in their early teens and rarely live to be older than 70.</p>

        <p><strong><em>Alignment.</em></strong> Trandoshans tend toward the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Trandoshans stand as tall as 7 and a half feet and can weigh over 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hold Breath.</em></strong> You can hold your breath for up to 15 minutes at a time.</p>

        <p><strong><em>Regenerative.</em></strong> When you take damage, you can use your reaction and expend a Hit Die to regain hit points as long as the damage would not reduce your hit points to 0.</p>

        <strong><em>Saving Face.</em></strong> Trandoshans are careful not to show weakness in front of their allies, for fear of losing<br> status. If you miss with an attack roll or fail an ability<br> check or a saving throw, you can gain a bonus to the<br> roll equal to the number of allies you can see within 30<br> feet of you (maximum bonus of +5). Once you use this<br> trait, you can't use it again until you finish a short or<br> long rest.

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Dosh. Dosh is characterized by its harsh grunts, hisses and growls, and its written form that used alphabetic glyphs.</p>

