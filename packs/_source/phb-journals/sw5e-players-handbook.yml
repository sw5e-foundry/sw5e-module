        <div class="sw5e-book-block"><h5>The Fighter</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Proficiency Bonus</th><th>Features</th><th>Combat<br> Superiority</th><th>Superiority<br> Dice</th><th>Maneuvers<br> Known</th></tr></thead><tbody><tr><td>1st</td><td>+2</td><td>Fighting Style, Second Wind</td><td>�</td><td>�</td><td>�</td></tr><tr><td>2nd</td><td>+2</td><td>Action Surge (one use), Combat Superiority</td><td>d4</td><td>2</td><td>1</td></tr><tr><td>3rd</td><td>+2</td><td>Fighter Strategies, Fighter Specialty</td><td>d4</td><td>2</td><td>2</td></tr><tr><td>4th</td><td>+2</td><td>Ability Score Improvement</td><td>d4</td><td>2</td><td>2</td></tr><tr><td>5th</td><td>+3</td><td>Extra Attack</td><td>d6</td><td>3</td><td>4</td></tr><tr><td>6th</td><td>+3</td><td>Ability Score Improvement</td><td>d6</td><td>3</td><td>4</td></tr><tr><td>7th</td><td>+3</td><td>Specialty feature</td><td>d6</td><td>3</td><td>5</td></tr><tr><td>8th</td><td>+3</td><td>Ability Score Improvement</td><td>d6</td><td>3</td><td>5</td></tr><tr><td>9th</td><td>+4</td><td>Indomitable (one use)</td><td>d8</td><td>4</td><td>6</td></tr><tr><td>10th</td><td>+4</td><td>Specialty feature</td><td>d8</td><td>4</td><td>6</td></tr><tr><td>11th</td><td>+4</td><td>Greater Extra Attack</td><td>d8</td><td>4</td><td>7</td></tr><tr><td>12th</td><td>+4</td><td>Ability Score Improvement</td><td>d8</td><td>4</td><td>7</td></tr><tr><td>13th</td><td>+5</td><td>Indomitable (two uses)</td><td>d10</td><td>5</td><td>9</td></tr><tr><td>14th</td><td>+5</td><td>Ability Score Improvement</td><td>d10</td><td>5</td><td>9</td></tr><tr><td>15th</td><td>+5</td><td>Specialty feature</td><td>d10</td><td>5</td><td>10</td></tr><tr><td>16th</td><td>+5</td><td>Ability Score Improvement</td><td>d10</td><td>5</td><td>10</td></tr><tr><td>17th</td><td>+6</td><td>Action Surge (two uses), Indomitable (three uses)</td><td>d12</td><td>6</td><td>11</td></tr><tr><td>18th</td><td>+6</td><td>Specialty feature</td><td>d12</td><td>6</td><td>11</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>d12</td><td>6</td><td>12</td></tr><tr><td>20th</td><td>+6</td><td>Master of Combat</td><td>d12</td><td>6</td><td>12</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a fighter, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d10 per fighter level</li><li><strong>Hit Points at 1st Level:</strong> 10 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier per fighter level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> All armor</li><li><strong>Weapons:</strong> All blasters, all vibroweapons</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Strength, Constitution</li><li><strong>Skills:</strong> Choose two skills from Acrobatics, Animal Handling, Athletics, Lore, Insight, Intimidation, Perception, and Survival</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> mesh armor or <em>(b)</em> a combat suit, blaster rifle or simple blaster, and two power cells</li><li><em>(a)</em> a vibroweapon or heavy pistol and a light or medium physical shield or <em>(b)</em> two vibroweapons</li><li><em>(a)</em> a light pistol and a power cell or <em>(b)</em> two vibrodaggers</li><li><em>(a)</em> a dungeoneer's pack or <em>(b)</em> an explorer's pack</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Fighter</td><td>8d4 x 100 cr</td></tr></tbody></table>



        <h3>Fighting Style</h3>

        <em><strong>Fighter:</strong> 1st level</em><br>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting style options, detailed in Chapter 6. </p>

        <h3>Second Wind</h3>

        <em><strong>Fighter:</strong> 1st level</em><br>

        <p>You have a limited well of stamina that you can draw on to protect yourself from harm. On your turn, you can use a bonus action to regain hit points equal to 1d10 + your fighter level.</p>

        <p>Once you've used this feature, you must finish a short or long rest before you can use it again.</p>

        <h3>Action Surge</h3>

        <em><strong>Fighter:</strong> 2nd level</em><br>

        <p>You can push yourself beyond your normal limits for a moment. On your turn, you can take one additional action on top of your regular action.</p>

        <p>Once you've used this feature, you must finish a short or long rest before you can use it again. Starting at 17th level, you can use it twice before a rest, but only once on the same turn.</p>

        <h3>Combat Superiority</h3>

        <em><strong>Fighter:</strong> 2nd level</em><br>

        <p>You learn maneuvers that are fueled by special dice called superiority dice. See chapter 13 for the maneuvers list.</p>

        <h4>Maneuvers Known</h4>

        <p>You learn one maneuver of your choice, and you earn more at higher levels, as shown in the Maneuvers Known column of the fighter table. Many maneuvers enhance an attack in some way. You can use only one maneuver per attack, and you may only use each maneuver once per turn.</p>

        <p>Each time you learn new maneuvers, you can also replace one maneuver you know with a different one.</p>

        <h4>Superiority Dice</h4>

        <p>You have two superiority dice, which are d4s, and you earn more at higher levels, as shown in the Superiority Dice column of the fighter table. This die changes as you gain fighter levels, as shown in the Combat Superiority column of the fighter table. A superiority die is expended when you use it. </p>

        <p>You regain all of your expended superiority dice when you finish a short or long rest.</p>

        <h4>Maneuver Ability</h4>

        <p>Your maneuver ability varies based on the type of the maneuver you use. You use Strength, Dexterity, or Constitution for physical maneuvers (your choice), Intelligence, Wisdom, or Charisma for mental maneuvers (your choice), and an ability of your choice for general maneuvers. You use this ability whenever a maneuver refers to your maneuver ability. Additionally, you use this ability modifier when setting the saving throw DC for a maneuver you use.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Maneuver save DC</strong> = 8 + your proficiency bonus + <br>your maneuver ability modifier</div>

        <hr>

        <h3>Fighter Strategies</h3>

        <em><strong>Fighter:</strong> 3rd level</em><br>

        <p>You've adopted a fighter strategy, as detailed at the end of the class description. You adopt an additional strategy at 7th, 13th, and 17th level.</p>

        <h3>Fighter Specialty</h3>

        <em><strong>Fighter:</strong> 3rd, 7th, 10th, 15th, and 18th level</em><br>

        <p>You choose a specialty that you strive to emulate in your combat styles and techniques, which is detailed at the end of the class description.</p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Fighter:</strong> 4th, 6th, 8th, 12th, 14th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Extra Attack</h3>

        <em><strong>Fighter:</strong> 5th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h3>Indomitable</h3>

        <em><strong>Fighter:</strong> 9th level</em><br>

        <p>You can reroll a saving throw that you fail. If you do so, you must use the new roll, and you can't use this feature again until you finish a long rest.</p>

        <p>You can use this feature twice between long rests starting at 13th level and three times between long rests starting at 17th level.</p>

        <h3>Greater Extra Attack</h3>

        <em><strong>Fighter:</strong> 11th level</em><br>

        <p>You can attack three times, instead of once, whenever you take the Attack action on your turn.</p>

        <p>Additionally, when you use a bonus action to engage in Double- or Two-Weapon Fighting, you can make two attacks, instead of one.</p>

        <h3>Master of Combat</h3>

        <em><strong>Fighter:</strong> 20th level</em><br>

        <p>You are the master of combat. Your Strength or Dexterity score increases by 2, and your Constitution score increases by 2. Your maximum for those scores increases by 2.</p>

        <p>Additionally, you can attack four times, instead of once, whenever you take the Attack action on your turn.</p>

        <img src='https://www.gmbinder.com/images/4NMSS97.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:300px' />



        <h3>Fighter Strategies</h3>

        <p>The strategies are presented in alphabetical order.</p>

        <h4>Cover Strategist</h4>

        <p>You treat partial cover as one step higher (from one-quarter to half or half to three-quarters). While in cover, your attacks reduce partial cover by one step partial cover as one step lower (from three-quarters to half or half to one-quarter).</p>



        <h4>Cunning Strategist</h4>

        <p>Choose two from the following. You can perform each of the chosen options with your bonus action, instead of your action: </p>

        <ul><li>Dash</li><li>Disengage</li><li>Guard</li><li>Help</li><li>Hide</li><li>Search</li><li>Throwing grenades and setting mines</li><li>While mounted on a controlled beast, having your beast make a single melee attack against a creature within its reach</li><li>While mounted on a vehicle, taking a vehicle action (you can't take the same action twice in one turn)</li></ul>

        <h4>Enduring Strategist</h4>

        <p>You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits. Lastly, you have advantage on saving throws against exhaustion.</p>

        <h4>Mastery Strategist</h4>

        <p>You've mastered a particular style of fighting. Choose one of the Fighting Mastery options, detailed in Chapter 6. </p>

        <h4>Lightweapon Strategist</h4>

        <p>You gain proficiency in all lightweapons. Additionally, you no longer need the ability to cast force powers to learn lightsaber forms, and you learn one lightsaber form of your choice.</p>

        <h4>Maneuver Strategist</h4>

        <p>You learn two additional maneuvers. When you complete a short rest, you can replace one of these maneuvers with another one. When you complete a long rest, you can replace both of these maneuvers with other ones.</p>

        <h4>Skilled Strategist</h4>

        <p>You gain proficiency in a skill and a tool, or two tools.</p>

        <h4>Style Strategist</h4>

        <p>You adopt a second fighting style. Choose one of the fighting style options, detailed in Chapter 6. When you complete a long rest, you can change this style out for another one. </p>

        <h2>Fighter Specialties</h2>

        <p>Different fighters choose different approaches to perfecting their fighting prowess. The fighter specialty you choose to emulate reflects your approach. Your specialty grants you features at 3rd, 7th, 10th, 15th, and 18th level.</p>

        <img src='https://www.gmbinder.com/images/lOxUsBV.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:565px' />



        <h4>Assault Specialist</h4>

        <p>Those fighters who choose to become Assault Specialists focus on the development of raw physical power honed to deadly perfection. Assault Specialists combine rigorous training with physical excellence to deal devastating blows.</p>

        <h3>Brute Force</h3>

        <em><strong>Assault Specialist:</strong> 3rd, 5th, 9th, 13th, and 17th level</em><br>

        <p>Once per turn, when you deal damage with a weapon, you can deal an additional 1d4 damage of the same type as the weapon's damage. If this damage would affect multiple creatures, you can only apply this damage bonus to one of them.</p>

        <p>This damage increases to 1d6 at 5th level, 1d8 at 9th level, 1d10 at 13th level, and 1d12 at 17th level.</p>

        <h3>Remarkable Athlete</h3>

        <em><strong>Assault Specialist:</strong> 3rd level</em><br>

        <p>You can add half your proficiency bonus to any Strength, Dexterity, or Constitution check you make that doesn't already use your proficiency bonus.</p>

        <h3>Brutish Durability</h3>

        <em><strong>Assault Specialist:</strong> 7th level</em><br>

        <p>Once per round, roll 1d6 and add the die to your saving throw total. If applying this bonus to a death saving throw increases the total to 20 or higher, you gain the benefits of rolling a 20 on the d20. You can choose to use this feature before or after you make a saving throw, but you must decide before the GM says whether the save succeeds or fails.</p>

        <h3>Additional Fighting Style</h3>

        <em><strong>Assault Specialist:</strong> 10th level</em><br>

        <p>You can choose a second fighting style option.</p>

        <h3>Devastating Critical</h3>

        <em><strong>Assault Specialist:</strong> 15th level</em><br>

        <p>When you score a critical hit with a weapon attack, you gain a bonus to that weapon's damage roll equal to your fighter level.</p>

        <h3>Survivor</h3>

        <em><strong>Assault Specialist:</strong> 18th level</em><br>

        <p>You attain the pinnacle of resilience in battle. At the start of each of your turns, you regain hit points equal to 5 + your Constitution modifier if you have no more than half your hit points left. You don't gain this benefit if you have 0 hit points.</p>

        <img src='https://www.gmbinder.com/images/erxRoFA.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:1020px' />



        <h4>Heavy Weapons Specialist</h4>

        <p>Some manned instruments of war require their user to have superior physical prowess to overcome their weight and encumbrance. Those fighters who choose to become Heavy Weapons Specialists use their powerful bodies, and powerful armaments, to overwhelm their foes.</p>

        <h3>Rock Steady</h3>

        <em><strong>Heavy Weapons Specialist:</strong> 3rd level</em><br>

        <p>You have learned to use the heft of your weapon to root yourself in place. At the end of each of your turns, if you move less than half your speed while wielding a weapon with the heavy or strength properties, you have advantage on saving throws to avoid being restrained, moved, or knocked prone. This advantage lasts until the end of your next turn.</p>

        <h3>My Little Friend Says Hello There</h3>

        <em><strong>Heavy Weapons Specialist:</strong> 3rd level</em><br>

        <p>You know how to use the sheer size of your weapon to strike fear in those around you. You can add your Strength modifier to any Charisma (Intimidation) check you make while wielding a weapon with the heavy or strength properties that doesn't already include that modifier.</p>



        <h3>Maximum Output</h3>

        <em><strong>Heavy Weapons Specialist:</strong> 7th level</em><br>

        <p>When you take the Attack action while wielding a weapon with the heavy or strength properties, you can forgo one or more attacks. If you do so, the first time you deal damage with the weapon before the start of your next turn, you deal additional damage of the same type as the weapon's damage. If this instance would deal damage to multiple creatures, you can only apply this additional damage to one of them. For each attack you forgo, you deal additional damage equal to 1d12 + half your fighter level. If you miss with the first attack roll you make before the end of your next turn, or one target succeeds on the saving throw against your weapon's burst or rapid property, you instead deal normal weapon damage.</p>

        <h3>Straight Through</h3>

        <em><strong>Heavy Weapons Specialist:</strong> 10th level</em><br>

        <p>When you score a critical hit on your turn while wielding a weapon with the heavy or strength properties, you can make one weapon attack against a creature within 5 feet of the target using your reaction.</p>

        <h3>Overwhelm</h3>

        <em><strong>Heavy Weapons Specialist:</strong> 15th level</em><br>

        <p>When you use your Second Wind while wielding a weapon with the heavy or strength properties, if you hit with the first attack roll you make, or if one creatures fails the saving throw against your weapon's burst or rapid property, before the end of your next turn, you treat the hit as a critical hit. If you miss with the first attack roll you make before the end of your next turn, or one target succeeds on the saving throw against your weapon's burst or rapid property, you instead deal normal weapon damage.</p>

        <h3>Pure Performance</h3>

        <em><strong>Heavy Weapons Specialist:</strong> 18th level</em><br>

        <p>At 18th level, attack rolls you make while wielding a weapon with the heavy or strength properties can't suffer from disadvantage.</p>

        <img src='https://www.gmbinder.com/images/0MwwE14.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:530px' />



        <div class="sw5e-book-block"><h2>Shield Specialist</h2></div>

        <p>Those fighters who choose to become Shield Specialists train to bolster those around them. They can inspire their allies with renewed vigor while simultaneously protecting them from harm.</p>

        <h3>Techcasting</h3>

        <em><strong>Shield Specialist:</strong> 3rd level</em><br>

        <p>You have derived powers from schematics with the aid of your wristpad. See chapter 10 for the general rules of techcasting and chapter 12 for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>You learn 3 tech powers of your choice, and you learn more at higher levels, as shown in the Tech Powers Known column of the Shield Specialist Techcasting table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Tech Points</h4>

        <p>You have a number of tech points equal to half your fighter level, as shown in the Tech Points column of the Shield Specialist Techcasting table, + your Intelligence modifier. You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many tech powers can be overcharged, consuming more tech points to create a greater effect. You can overcharge these powers to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Shield Specialist Techcasting table.</p>

        <p>You may only cast tech powers at 4th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Techcasting Ability</h4>

        <p>Intelligence is your techcasting ability for your tech powers. You use your Intelligence whenever a power refers to your techcasting ability. Additionally, you use your Intelligence modifier when setting the saving throw DC for a tech power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + your proficiency bonus + <br>your Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = your proficiency bonus + <br>your Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>You use a wristpad (found in chapter 5) as a tech focus for your tech powers.</p>

        <h3>Stay in Formation</h3>

        <em><strong>Shield Specialist:</strong> 3rd level</em><br>

        <p>You can take the Guard action as a bonus action on your turn.</p>

        <h3>Rallying Cry</h3>

        <em><strong>Shield Specialist:</strong> 7th level</em><br>

        <p>When you use your Second Wind feature, you can choose up to three allies within 60 feet of you that can see or hear you. Each ally regains hit points equal to your fighter level.</p>

        <div class="sw5e-book-block"><h5>Shield Specialist Techcasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Tech Powers<br> Known</th><th>Tech<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>3</td><td>2</td><td>1st</td></tr><tr><td>4th</td><td>4</td><td>2</td><td>1st</td></tr><tr><td>5th</td><td>5</td><td>3</td><td>1st</td></tr><tr><td>6th</td><td>6</td><td>3</td><td>1st</td></tr><tr><td>7th</td><td>7</td><td>4</td><td>2nd</td></tr><tr><td>8th</td><td>8</td><td>4</td><td>2nd</td></tr><tr><td>9th</td><td>9</td><td>5</td><td>2nd</td></tr><tr><td>10th</td><td>10</td><td>5</td><td>2nd</td></tr><tr><td>11th</td><td>11</td><td>6</td><td>2nd</td></tr><tr><td>12th</td><td>12</td><td>6</td><td>2nd</td></tr><tr><td>13th</td><td>13</td><td>7</td><td>3rd</td></tr><tr><td>14th</td><td>14</td><td>7</td><td>3rd</td></tr><tr><td>15th</td><td>15</td><td>8</td><td>3rd</td></tr><tr><td>16th</td><td>16</td><td>8</td><td>3rd</td></tr><tr><td>17th</td><td>17</td><td>9</td><td>4th</td></tr><tr><td>18th</td><td>18</td><td>9</td><td>4th</td></tr><tr><td>19th</td><td>19</td><td>10</td><td>4th</td></tr><tr><td>20th</td><td>20</td><td>10</td><td>4th</td></tr></tbody></table></div>

        <p>&emsp;You can choose an additional ally at 9th, 13th, and 17th level.</p>

        <h3>Inspiring Surge</h3>

        <em><strong>Shield Specialist:</strong> 10th level</em><br>

        <p>When you use your Action Surge feature, you can choose one creature within 60 feet of you that is allied with you. That creature can make one melee or ranged weapon attack with its reaction, provided that it can see or hear you.</p>

        <h3>Bulwark</h3>

        <em><strong>Shield Specialist:</strong> 15th level</em><br>

        <p>You can extend the benefit of your Indomitable feature to an ally. When you decide to use Indomitable to reroll an Intelligence, a Wisdom, or a Charisma saving throw and you aren't incapacitated, you can choose one ally within 60 feet of you that also failed its saving throw against the same effect. If that creature can see or hear you, it can reroll its saving throw and must use the new roll.</p>

        <h3>Greater Inspiring Surge</h3>

        <em><strong>Shield Specialist:</strong> 18th level</em><br>

        <p>You can choose two allies within 60 feet of you, rather than one, when you using your Inspiring Surge feature.</p>



        <h4>Tactical Specialist</h4>

        <p>Those fighters who choose to become Tactical Specialists employ martial techniques passed down through generations. To a Tactical Specialist, combat is an academic field, sometimes including subjects beyond battle such as armstech or armormech. Not every fighter absorbs the lessons of history, theory, and artistry that are reflected in the Tactical Specialty, but those who do are well-rounded fighters of great skill and knowledge.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Tactical Specialist:</strong> 3rd level</em><br>

        <p>You gain proficiency in your choice of artisan's implements.</p>

        <h3>Improved Combat Superiority</h3>

        <em><strong>Tactical Specialist:</strong> 3rd level</em><br>

        <p>Your tactical skill in combat improves, granting bonuses to your Combat Superiority.</p>

        <h4>Improved Maneuvers </h4>

        <p>You know four maneuvers of your choice, instead of two, and you earn more at higher levels, as shown in the Maneuvers Known column of the Tactical Specialist Combat Superiority table.</p>

        <h4>Improved Superiority Dice</h4>

        <p>You have four superiority dice, instead of two, and you earn more at higher levels, as shown in the Superiority Dice column of the Tactical Specialist Combat Superiority table.</p>

        <h3>Signature Maneuver</h3>

        <em><strong>Tactical Specialist:</strong> 3rd level</em><br>

        <p>You choose a maneuver you know from this class as your signature maneuver. Whenever you use that maneuver, you can use it without expending a Superiority Dice. You may only use this feature once per round.</p>

        <h3>Know Your Enemy</h3>

        <em><strong>Tactical Specialist:</strong> 7th level</em><br>

        <p>If you spend at least 1 minute observing or interacting with another creature outside combat, you can learn</p>

        <div class="sw5e-book-block"><h5>Tactical Specialist<br> Combat Superiority</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Superiority<br> Dice</th><th>Maneuvers<br> Known</th></tr></thead><tbody><tr><td>3rd</td><td>4</td><td>4</td></tr><tr><td>4th</td><td>4</td><td>5</td></tr><tr><td>5th</td><td>5</td><td>6</td></tr><tr><td>6th</td><td>5</td><td>7</td></tr><tr><td>7th</td><td>6</td><td>9</td></tr><tr><td>8th</td><td>6</td><td>10</td></tr><tr><td>9th</td><td>7</td><td>11</td></tr><tr><td>10th</td><td>7</td><td>12</td></tr><tr><td>11th</td><td>8</td><td>14</td></tr><tr><td>12th</td><td>8</td><td>15</td></tr><tr><td>13th</td><td>9</td><td>16</td></tr><tr><td>14th</td><td>9</td><td>17</td></tr><tr><td>15th</td><td>10</td><td>19</td></tr><tr><td>16th</td><td>10</td><td>20</td></tr><tr><td>17th</td><td>11</td><td>21</td></tr><tr><td>18th</td><td>11</td><td>22</td></tr><tr><td>19th</td><td>12</td><td>23</td></tr><tr><td>20th</td><td>12</td><td>24</td></tr></tbody></table></div>

        <p>certain information about its capabilities compared to your own. The GM tells you if the creature is your equal, superior, or inferior in regard to two of the following characteristics of your choice:</p>

        <ul><li>Strength score</li><li>Dexterity score</li><li>Constitution score</li><li>Armor Class</li><li>Current hit points</li><li>Total class levels (if any)</li><li>Fighter class levels (if any)</li></ul>

        <h3>Greater Signature Maneuver</h3>

        <em><strong>Tactical Specialist:</strong> 10th level</em><br>

        <p>You can choose a second signature maneuver. </p>

        <h3>Relentless</h3>

        <em><strong>Tactical Specialist:</strong> 15th level</em><br>

        <p>When you roll initiative and have no Superiority Dice remaining, you regain 1 Superiority Die.</p>

        <h3>Maneuver Mastery</h3>

        <em><strong>Tactical Specialist:</strong> 18th level</em><br>

        <p>Once per round, when you would roll a Superiority Die, you can instead choose the maximum.</p>

        <img src='https://www.gmbinder.com/images/iIVXSKe.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:420px' />



        <h2>Guardian</h2>

        <span style="font-variant: small-caps">A dark-skinned human quickly runs down a corridor, the</span> metal armor under his grey cloak clanking with each step. He rounds the corner into the prison while the lights and power are still out, urging the weakened prisoners to escape. Just then a handful of slavers arrive and ready their blasters. The man draws and ignites a white-bladed lightsaber, ready to die for the strangers behind him.

        <p>A sith pureblood, clad head to toe in black and red armor, charges towards a line of soldiers. Shot after shot deflects off his armor until he reaches his prey, where he unleashes his fury in a series of devastating lightsaber sweeps. </p>

        <p>A zabrak general dramatically leaps to his soon-to-be overrun squad, landing with a flurry of lightsaber attacks. At the arrival of this powerful Jedi, the attackers fall back.</p>

        <p>Guardians are the master of the art of lightsaber combat. They focus on utilizing the everpresent power of the Force to enable devastating attacks, often single-handedly turning the tide of battle.</p>



        <h3>Protector or Destroyer</h3>

        <p>An unstoppable agent of the Force, the guardian channels the power flowing through him into his weapons. Their skills with a lightsaber are unrivalled. Subduing their enemies and bolstering their allies, the guardian uses the Force to control what happens around them.</p>



        <h3>Natural Leaders</h3>

        <p>The guardian's command of the Force lends them a powerful presence. Whether through fear and intimidation or respect and admiration, the guardian is one of the greatest generals on the battlefield. They are a symbol of power to their followers.</p>



        <img src='https://www.gmbinder.com/images/Seb0L2R.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:761px' />

        <h3>Creating a Guardian</h3>

        <p>While creating your guardian, consider your attraction to the Force and its most famous practitioners � the Jedi and the Sith. Are you a member of one of the two orders, or do you walk a different path? Are you a soldier tapping into a latent Force-sensitivity? Were you trained in the force from a young age, or did you discover it as an adult? How do you treat those weaker than you? What was your family like? Do you see the Force as light and dark, or an impartial river of gray?</p>

        <h4>Quick Build</h4>

        <p>You can make a guardian quickly by following these suggestions. First, make Strength your highest ability score, followed by Constitution. Second, choose the Jedi or Sith background.</p>



        <div class="sw5e-book-block"><h5>The Guardian</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Proficiency<br> Bonus</th><th>Features</th><th>Force Powers<br> Known</th><th>Force<br> Points</th><th>Max Power<br> Level</th><th>Focused<br> Strikes</th></tr></thead><tbody><tr><td>1st</td><td>+2</td><td>Forcecasting, Channel the Force</td><td>5</td><td>2</td><td>1st</td><td>�</td></tr><tr><td>2nd</td><td>+2</td><td>Force-Empowered Strikes, Fighting Style</td><td>7</td><td>4</td><td>1st</td><td>2d8</td></tr><tr><td>3rd</td><td>+2</td><td>Guardian Aura, Guardian Focus</td><td>9</td><td>6</td><td>1st</td><td>2d8</td></tr><tr><td>4th</td><td>+2</td><td>Ability Score Improvement</td><td>10</td><td>8</td><td>1st</td><td>2d8</td></tr><tr><td>5th</td><td>+3</td><td>Extra Attack</td><td>12</td><td>10</td><td>2nd</td><td>3d8</td></tr><tr><td>6th</td><td>+3</td><td>Force Purity</td><td>13</td><td>12</td><td>2nd</td><td>3d8</td></tr><tr><td>7th</td><td>+3</td><td>Focus feature</td><td>14</td><td>14</td><td>2nd</td><td>3d8</td></tr><tr><td>8th</td><td>+3</td><td>Ability Score Improvement</td><td>15</td><td>16</td><td>2nd</td><td>3d8</td></tr><tr><td>9th</td><td>+4</td><td>Guardian Aura (15-foot radius)</td><td>17</td><td>18</td><td>3rd</td><td>4d8</td></tr><tr><td>10th</td><td>+4</td><td>Guardian Aura (two auras)</td><td>18</td><td>20</td><td>3rd</td><td>4d8</td></tr><tr><td>11th</td><td>+4</td><td>Improved Force-Empowered Strikes</td><td>19</td><td>22</td><td>3rd</td><td>4d8</td></tr><tr><td>12th</td><td>+4</td><td>Ability Score Improvement</td><td>20</td><td>24</td><td>3rd</td><td>4d8</td></tr><tr><td>13th</td><td>+5</td><td>�</td><td>22</td><td>26</td><td>4th</td><td>5d8</td></tr><tr><td>14th</td><td>+5</td><td>Cleansing Touch</td><td>23</td><td>28</td><td>4th</td><td>5d8</td></tr><tr><td>15th</td><td>+5</td><td>Focus feature</td><td>24</td><td>30</td><td>4th</td><td>5d8</td></tr><tr><td>16th</td><td>+5</td><td>Ability Score Improvement</td><td>25</td><td>32</td><td>4th</td><td>5d8</td></tr><tr><td>17th</td><td>+6</td><td>Guardian Aura (30-foot radius)</td><td>27</td><td>34</td><td>5th</td><td>6d8</td></tr><tr><td>18th</td><td>+6</td><td>Guardian Aura (three auras)</td><td>28</td><td>36</td><td>5th</td><td>6d8</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>29</td><td>38</td><td>5th</td><td>6d8</td></tr><tr><td>20th</td><td>+6</td><td>Focus feature</td><td>30</td><td>40</td><td>5th</td><td>6d8</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a guardian, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d10 per guardian level</li><li><strong>Hit Points at 1st Level:</strong> 10 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier per guardian level after 1st.</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor, medium armor</li><li><strong>Weapons:</strong> All lightweapons, all vibroweapons</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Constitution, Charisma</li><li><strong>Skills:</strong> Choose two from Acrobatics, Athletics, Deception, Insight, Intimidation, Lore, Perception, Persuasion, and Piloting</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> mesh armor, <em>(b)</em> a combat suit, and a light physical shield</li><li><em>(a)</em> a lightweapon or vibroweapon and a light or medium physical shield or <em>(b)</em> two lightweapons or vibroweapons</li><li><em>(a)</em> a priest's pack or <em>(b)</em> an explorer's pack</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Guardian</td><td>8d4 x 100 cr</td></tr></tbody></table>



        <h3>Forcecasting</h3>

        <em><strong>Guardian:</strong> 1st level</em><br>

        <p>In your meditations on the Force, you have learned powers, fragments of knowledge that imbue you with an abiding force ability. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 5 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the guardian table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your guardian level x 2, as shown in the Force Points column of the guardian table, + your Wisdom or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the guardian table.</p>

        <p>You may only cast force powers at 4th and 5th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Forcecasting Ability</h4>

        <p>Your forcecasting ability varies based on the alignment of the powers you cast. You use Wisdom for light side powers, Charisma for dark side powers, and Wisdom or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>

        <h3>Channel the Force</h3>

        <em><strong>Guardian:</strong> 1st level</em><br>

        <p>You know how to channel the Force to create a unique effect. You start with your choice of one from two such effects: Cause Harm or Lend Aid. At 3rd level, your Guardian Focus grants you an additional effect. When you use your Channel the Force, you choose which effect to create.</p>

        <p>Some Channel the Force effects require saving throws. When you use such an effect from this class, the DC equals your universal force save DC.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain all expended uses when you finish a short or long rest.</p>



        <h4>Cause Harm</h4>

        <p>As an action, you can expend a use of your Channel the Force to sap the life from a hostile creature you can see within 60 feet. That creature must make a Constitution saving throw. On a failed save, the creature takes necrotic damage equal to your guardian level + your Charisma modifier (minimum of +1), or half as much on a successful one.</p>

        <h4>Lend Aid</h4>

        <p>As a bonus action, you can expend a use of your Channel the Force and touch a beast or humanoid within 5 feet of you. That creature regains hit points equal to your guardian level + your Wisdom modifier (minimum of +1). Alternatively, if the beast or humanoid is poisoned or diseased, you neutralize the poison or disease. If more than one poison or disease afflicts the target, you neutralize one poison or disease that you know is present, or you neutralize one at random.</p>

        <h3>Force-Empowered Strikes</h3>

        <em><strong>Guardian:</strong> 2nd level</em><br>

        <p>When you hit a creature with a melee weapon attack, you can expend force points to deal additional damage to the target, which is the same type as the weapon's damage. The additional damage is 1d8 for each point spent in this way. You can't deal more additional damage than the amount shown in the Focused Strikes column of the guardian table. </p>

        <h3>Fighting Style</h3>

        <em><strong>Guardian:</strong> 2nd level</em><br>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting style options, detailed in Chapter 6. </p>

        <h3>Guardian Aura</h3>

        <em><strong>Guardian:</strong> 3rd, 9th, 10th, 17th, and 18th level</em><br>

        <p>You gain an aura of your choice, as detailed at the end of the class description. The range of your auras increases to 15 feet at 9th level and 30 feet at 17th level, and you gain an additional aura at 10th and 18th level.</p>

        <h3>Guardian Focus</h3>

        <em><strong>Guardian:</strong> 3rd, 7th, 15th, and 20th level</em><br>

        <p>You begin to focus your studies on a specific lightsaber form, which is detailed at the end of the class description. </p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Guardian:</strong> 4th, 8th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>



        <h3>Extra Attack</h3>

        <em><strong>Guardian:</strong> 5th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h3>Force Purity</h3>

        <em><strong>Guardian:</strong> 6th level</em><br>

        <p>The Force flowing through you makes you immune to poison and disease.</p>

        <h3>Improved Force-Empowered Strikes</h3>

        <em><strong>Guardian:</strong> 11th level</em><br>

        <p>You are so in tune with the Force that all your melee weapon strikes carry the power of the Force with them. Whenever you hit a creature with a melee weapon attack, the creature takes an extra 1d8 damage. The damage is the same type as the weapon's damage.</p>

        <h3>Cleansing Touch</h3>

        <em><strong>Guardian:</strong> 14th level</em><br>

        <p>You can use your action and expend a use of your Channel the Force ability to end one force power on yourself or on one willing creature that you touch.</p>

        <h3>Guardian Auras</h3>

        <p>The auras are presented in alphabetical order. If multiple guardians grant the same aura, affected creatures can only benefit from it once. You must be conscious to grant the benefits of your auras.</p>

        <h4>Aura of Conquest</h4>

        <p>Whenever a creature who is frightened of you starts its turn within 5 feet of you, its gains 4 slowed levels and takes psychic damage equal to half your guardian level.</p>

        <h4>Aura of Conviction</h4>

        <p>You and friendly creatures within 5 feet of you have advantage on saving throws against effects that would cause you to be charmed or frightened.</p>

        <h4>Aura of Hatred</h4>

        <p>You and friendly creatures within 5 feet of you gain a bonus to the first melee weapon damage rolls you make each round equal to your Charisma modifier (minimum of +1), as long as it doesn't already include that modifier. </p>

        <h4>Aura of Presence</h4>

        <p>Whenever you or a friendly creature within 5 feet of you must make a saving throw, the creature gains a bonus to the saving throw equal to your Wisdom modifier (minimum of +1). </p>

        <h4>Aura of Protection</h4>

        <p>Whenever a creature within 5 feet of you takes damage, you can use your reaction to take that damage instead of that creature taking it. This feature doesn't transfer any other effects that might accompany the damage, and this damage can't be reduced in any way.</p>

        <h4>Aura of Vigor</h4>

        <p>Whenever a friendly creature starts its turn within 5 feet of you, that creature gains temporary hit points equal to your Wisdom or Charisma modifier (your choice, minimum of one).</p>

        <h4>Aura of Warding</h4>

        <p>You and friendly creatures within 5 feet of you have resistance to damage from force powers.</p>

        <h2>Guardian Foci</h2>

        <p>Different guardians focus on different lightsaber styles, called Forms, as they hone their powers. Your focus grants you features at 3rd, 7th, 15th, and 20th level.</p>

        <img src='https://www.gmbinder.com/images/F1iR9gg.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:490px' />



        <h4>Makashi Form </h4>

        <p>Makashi Form, also known as Contention Form, encourages precision and efficiency over power, using jabs, parries and light cuts over slashes, blocks and chops. Those guardians who focus on Makashi Form utilize calculated blade manipulation, intense focus, and expert timing to confuse and trap their opponents.</p>

        <h3>Form Basics</h3>

        <em><strong>Makashi Form:</strong> 3rd level</em><br>

        <p>You gain the Makashi lightsaber form, detailed in Chapter 6. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Ysalamiri</h3>

        <em><strong>Makashi Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter an offensive stance for one minute. While in this stance, you add your Wisdom or Charisma modifier (your choice) to the first melee weapon attack and damage rolls you make each turn.</p>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Makashi Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>Makashi Riposte</h4>

        <p>When another creature damages you with a melee attack, you can expend a use of your Channel the Force and use your reaction to attempt to deflect the attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your guardian level.</p>

        <p>If you reduce the damage to 0, you can immediately make a single melee weapon attack against that creature as a part of the reaction.</p>

        <h3>Shatterpoint</h3>

        <em><strong>Makashi Form:</strong> 7th level</em><br>

        If you spend at least 1 minute observing or interacting with another creature outside combat, you can use your connection to the Force to sense their<br> strengths and weaknesses, and learn certain<br> information about its capabilities<br> compared to your own. The GM tells<br> you if the creature is your equal,<br> superior, or inferior in regard<br> to two of the following<br> characteristics of your<br> choice:



        <ul><li>Strength score</li><li>Dexterity score</li><li>Wisdom score</li><li>Charisma score</li><li>Armor Class</li><li>Current hit points</li><li>Total class levels (if any)</li><li>Total Forcecaster levels (if any)</li></ul>

        <h3>Glancing Blow</h3>

        <em><strong>Makashi Form:</strong> 15th level</em><br>

        <p>When an attacker that you can see hits you with an attack, you can use your reaction to halve the attack's damage against you.</p>

        <h3>Master of Contention</h3>

        <em><strong>Makashi Form:</strong> 20th level</em><br>

        <p>You are a duelist of the highest caliber.  Your Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for those scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic and energy damage, and you ignore resistance to kinetic and energy damage.</li><li>All melee attacks have disadvantage against you.</li><li>Your melee weapon attacks inflict an additional damage die.</li></ul>

        This effect ends early if<br> you are incapacitated or die.<br> Once you've used this<br> feature, you can't use it<br> again until you<br> finish a long rest.

        <img src='https://www.gmbinder.com/images/7D6BGbm.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:628px' />



        <h4>Niman Form</h4>

        <p>Niman Form, also known as Moderation Form, strikes a balance between bladework and force powers. Those guardians who focus on Niman Form weave Force manipulation with their melee weapon strikes, pushing their opponents off-balance to create an opening.</p>

        <h3>Form Basics</h3>

        <em><strong>Niman Form:</strong> 3rd level</em><br>

        <p>You gain the Niman lightsaber form, detailed in Chapter 6. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Rancor</h3>

        <em><strong>Niman Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter a balanced stance for one minute. As a part of this bonus action, and as a bonus action on each of your turns, when you use your action to cast a force power, you can make one melee weapon attack. Additionally, for the duration, you can use Wisdom or Charisma instead of Strength or Dexterity for the attack and damage rolls of your melee weapon attacks. You must use the same modifier for both rolls.</p>



        <p>&emsp; This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Niman Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>Telekinetic Slash</h4>

        <p>When you deal damage with an at-will force power that requires a force attack or a saving throw, you can expend a use of your Channel the Force and expend force points to deal additional damage to the target, which is the same type as the power's damage. The additional damage is 1d8 for each point spent in this way. You can't deal more additional damage than the amount shown in the Focused Strikes column of the guardian table.</p>

        <h3>Enlightenment</h3>

        <em><strong>Niman Form:</strong> 7th level</em><br>

        <p>You can add half your Wisdom or Charisma modifier (your choice, minimum of one) to any saving throw you make that doesn't already include that modifier. </p>

        <h3>Redirect</h3>

        <em><strong>Niman Form:</strong> 15th level</em><br>

        <p>When you would be affected by a weapon or force power that requires a Dexterity saving throw or attack roll and would affect only you, you can use your reaction to redirect that power to another target within 30 feet. If the weapon or power required a melee or ranged attack, make a melee or ranged force attack against the new target, as appropriate. If it required a Dexterity saving throw, the new target must make a Dexterity saving throw against your universal force save DC.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Master of Moderation</h3>

        <em><strong>Niman Form:</strong> 20th level</em><br>

        <p>The Force flows in perfect concert with your weapon attacks. Your Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for these scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic and energy damage from unenhanced weapons.</li><li>You have advantage on saving throws against force powers. Additionally, you have resistance against the damage of force powers.</li><li>When you use your action to cast an at-will force power that targets only one creature, you can target an additional creature within 5 feet of the original target and within the power's range.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/O0yLCKg.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:533px' />



        <h4>Shien/Djem So Form</h4>

        <p>Shien/Djem So Form, also known as Perseverance Form, utilizes a force-enhanced strength to overwhelm opponents. Those guardians who focus on Shien/Djem So Form actively attempt to force an opening rather than waiting for the opportunity to present itself.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Shien/Djem So Form:</strong> 3rd level</em><br>

        <p>You gain proficiency in heavy armor.</p>

        <h3>Form Basics</h3>

        <em><strong>Shien/Djem So Form:</strong> 3rd level</em><br>

        <p>You gain your choice of the Shien or Djem So lightsaber form, detailed in Chapter 6. If you already know the chosen form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Krayt Dragon</h3>

        <em><strong>Shien/Djem So Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can take a threatening stance for one minute. While in this stance, the first time you hit with a melee weapon attack using Strength each turn, you can attempt to damage another creature within 5 feet of the original target and within your reach. If the original attack roll would hit the second creature, it takes damage equal to your Strength modifier. The damage is of the same type dealt by the original attack.</p>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Shien/Djem So Form:</strong> 3rd level</em><br>

        <p>You gain one of the following Channel the Force options. Choose Blade Barrier for Shien or Falling Avalanche for Djem So.</p>

        <h4>Blade Barrier</h4>

        <p>On your turn, when you deal melee weapon damage that includes your Strength modifier, you can forgo your Strength modifier to the damage roll, expend a use of your Channel the Force (no action required), and reduce your speed by half. If you do so, energy and kinetic damage you take from weapons before the end of your next turn is reduced by an amount equal to your Strength modifier. You can not use this feature if you have moved more than half your speed this turn.</p>

        <h4>Falling Avalanche</h4>

        <p>On your turn, you can expend a use of your Channel the Force (no action required) and reduce your speed by half to gain advantage on the next ability check or attack roll you make using Strength before the end of your next turn. You can not use this feature if you have moved more than half your speed this turn.</p>

        <div class="sw5e-book-image-row"><img src='https://www.gmbinder.com/images/qzvePJ1.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:775px' />

        <img src='https://www.gmbinder.com/images/CjyN1px.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:363px' /></div><h3>Determination</h3>

        <em><strong>Shien/Djem So Form:</strong> 7th level</em><br>

        <p>You gain one of the following features. Choose Aggressive Negotiations for Shien or Reliable Vigor for Djem So.</p>



        <h4>Aggressive Negotiations</h4>

        <p>You gain proficiency in Intimidation or Persuasion. Additionally, while you are wielding a weapon with which you are proficient, you can't have disadvantage on Charisma (Intimidation) and Charisma (Persuasion) checks, and if the target would make a contested check, they can't have advantage on it.</p>

        <h4>Reliable Vigor</h4>

        <p>If your total for a Strength check or saving throw is less than your guardian level, you can use your guardian level in place of the total.</p>

        <h3>Presence</h3>

        <em><strong>Shien/Djem So Form:</strong> 15th level</em><br>

        <p>You gain one of the following features. Choose Precise Reflection for Shien or Brutal Strikes for Djem So.</p>

        <h4>Precise Reflection</h4>

        <p>When you hit with an attack made by the <em>saber reflect</em> power, you can expend force points to deal additional damage to the target, which is the same type as the weapon's damage. The additional damage is 1d8 for each point spent in this way. You can't deal more additional damage than the amount shown in the Focused Strikes column of the guardian table.</p>

        <h4>Brutal Strikes</h4>

        <p>The Force flowing through you grants you incredible strength. When you roll a 1 or 2 on a Force-Empowered Strikes or Improved Force-Empowered Strikes damage die, you can reroll the die and must use the new roll, even if the new roll is a 1 or a 2.</p>

        <p>Additionally, when you spend force points to use your Force-Empowered Strikes feature, you gain temporary hit points equal to twice the number of points spent.</p>

        <h3>Master of Perseverance</h3>

        <em><strong>Shien/Djem So Form:</strong> 20th level</em><br>

        <p>Your might overwhelms even the most implacable of foes. Your Strength and Constitution scores increase by 2. Your maximum for these scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic and energy damage from unenhanced weapons.</li><li>Once per turn, when you hit with a melee weapon attack using Strength, you can use your Force-Empowered Strikes feature at 1st-level without expending force points. You gain temporary hit points equal to the extra damage dealt.</li><li>When a creature within 5 feet of you makes an attack roll against you, you can use your reaction to make a single weapon attack with advantage against that creature. If the attack hits, you impose disadvantage on the triggering attack roll.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/qzvePJ1.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:775px' />



        <h4>Soresu Form</h4>

        <p>Soresu Form, also known as Resilience Form, relies on tight bladework and subtle dodges to provide maximum defensive coverage, minimizing exposure to ranged weaponry. Those guardians who focus on Soresu Form use broad footwork to move around the playing field, making broad, short sweeping motions that protect the body.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Soresu Form:</strong> 3rd level</em><br>

        <p>You gain proficiency in heavy armor.</p>

        <h3>Form Basics</h3>

        <em><strong>Soresu Form:</strong> 3rd level</em><br>

        <p>You gain the Soresu lightsaber form, detailed in Chapter 6. If you already know this form, you can instead choose another lightsaber form.</p>

        <h3>The Way of the Mynock</h3>

        <em><strong>Soresu Form:</strong> 3rd level</em><br>

        <p>As a bonus action, you can enter a defensive stance for one minute. As a part of this bonus action, and as a bonus action on each of your turns, you can cast the <em>saber ward</em> power. When you do so, you have a number of special reactions equal to your proficiency bonus that you can only use to cast the <em>saber reflect</em> force power. You can only take one reaction per turn.</p>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Channel the Force</h3>

        <em><strong>Soresu Form:</strong> 3rd level</em><br>

        <p>You gain the following Channel the Force option.</p>

        <h4>Advancing Defender</h4>

        <p>When you cast the <em>saber reflect</em> power, you can expend a use of your Channel the Force to move up to 10 feet as a part of that same reaction. This movement does not provoke opportunity attacks.</p>

        <h3>Circle of Shelter</h3>

        <em><strong>Soresu Form:</strong> 7th level</em><br>

        <p>You learn to fend off strikes directed at you or other creatures nearby. If you or a creature you can see within 5 feet of you is hit by an attack, you can use your reaction to ward the creature if you're wielding a melee weapon or a shield. Roll 1d8 and add the number rolled to the target's AC against that attack. If the attack still hits, the target has resistance against the attack's damage. </p>

        <p>You can use this feature a number of times equal to your proficiency bonus, as shown in the guardian table, and you regain all expended uses when you finish a long rest.</p>



        <h3>Stand Against the Tide</h3>

        <em><strong>Soresu Form:</strong> 15th level</em><br>

        <p>When a hostile creature misses you with a melee attack, you can use your reaction to force that creature to repeat the same attack against another creature (other than itself) of your choice.</p>

        <h3>Master of Resilience</h3>

        <em><strong>Soresu Form:</strong> 20th level</em><br>

        <p>Your presence on the field of battle is an inspiration to your allies. Your Constitution and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for those scores increases by 2. Additionally, you can use your action to gain the following benefits for 1 minute:</p>

        <ul><li>You have resistance to kinetic and energy damage from unenhanced weapons.</li><li>When you use the <em>saber reflect</em> force power, you can make a single melee attack on an enemy within 5ft of you as a part of that same reaction.</li><li>You have advantage on Dexterity saving throws, as do your allies within 30 feet of you.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/os8Mt8S.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:615px' />



        <h2>Monk</h2>

        <span style="font-variant: small-caps">Her vibrostaff a blur as they deflect an incoming hail of</span> blaster bolts, a human springs over a barricade and throws herself into the massed ranks of pirates on the other side. She whirls among them, knocking their blows aside and sending them reeling, until at last she stands alone.

        <p>Taking a deep breath, a zabrak covered in tattoos settles into a battle stance. As the first charging mercenaries reach him, he exhales and a blast of negative energy courses from his hands, engulfing his foes.</p>

        <p>Moving with the silence of the night, a black-clad mirialan steps into a shadow beneath an arch and nimbly climbs to the balcony a stone's throw above her. She slides her blade free of its cloth-wrapped scabbard and peers through the open window at the warlord, so vulnerable in the grip of sleep.</p>

        <p>Whatever their discipline, monks are united in their ability to harness the energy that flows in their bodies. Whether channeled as a striking display of combat prowess or a subtler focus of defensive ability and speed, this energy infuses all that a monk does.</p>



        <h3>The Power of Focus</h3>

        <p>Monks make careful study of a mystical energy that most monastic orders call focus. This energy is an element of the power that suffuses the galaxy�specifically, the element that flows through living bodies. Monks harness this energy within themselves to create powerful effects and exceed their bodies' physical capabilities, and some of their special attacks can hinder the flow of focus in their opponents. Using this energy, monks channel uncanny speed and strength into their unarmed strikes. As they gain experience, their martial training and their mastery of focus gives them more power over their bodies and the bodies of their foes.</p>



        <h3>Training and Asceticism</h3>

        <p>Most monks live entirely apart from the surrounding population, secluded from anything that might impede their spiritual progress. Others are sworn to isolation, emerging only to serve as spies or assassins at the command of their leader, a noble patron, or some other power.</p>

        <p>The majority of monks don't shun their neighbors, making frequent visits to nearby towns or villages and exchanging their service for food and other goods. As versatile warriors, monks often end up protecting their neighbors from monsters or brigands.</p>

        <p>For a monk, becoming an adventurer means leaving a structured, communal lifestyle to become a wanderer. This can be a harsh transition, and monks don't undertake it lightly. Those who leave their cloisters take their work seriously, approaching their adventures as personal tests of their physical and spiritual growth. </p>



        <img src='https://www.gmbinder.com/images/gFdtzpD.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:570px' />

        <h3>Creating a Monk</h3>

        <p>As you make your monk character, think about your connection to the monastery where you learned your skills and spent your formative years. Were you an orphan or a child left on the monastery's threshold? Did your parents promise you to the monastery in gratitude for a service performed by the monks? Did you enter this secluded life to hide from a crime you committed? Or did you choose the monastic life for yourself?</p>

        <p>Consider why you left. Did the head of your monastery choose you for a particularly important mission beyond the cloister? Perhaps you were cast out because of some violation of the community's rules. Did you dread leaving, or were you happy to go? Is there something you hope to accomplish outside the monastery? Are you eager to return to your home?</p>

        <p>As a result of the structured life of a monastic community and the discipline required to harness focus, monks are typically lawful in alignment.</p>

        <h4>Quick Build</h4>

        <p>You can make a monk quickly by following these suggestions. First, make Dexterity your highest ability score, followed by Wisdom. Second, choose the agent background.</p>



