      content: |+
        <h1>Chapter 3: Classes</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">dventurers are extraordinary people, driven by a thirst</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; for excitement into a life that others would never dare lead. They are heroes, compelled to explore the dark places of the world and take on the challenges that lesser women and men can't stand against. 

        <p>Class is the primary definition of what your character can do. It's more than a profession; it's your character's calling. Class shapes the way you think about the world and interact with it and your relationship with other people and powers in the galaxy. A fighter, for example, might view the world in pragmatic terms of strategy and maneuvering, and see herself as just a pawn in a much larger game. A consular, by contrast, might see himself as a willing servant of the Force. While the fighter has contacts in a mercenary company or army, the consular might know a number of Jedi or Sith who share his faith.</p>

        <p>Your class gives you a variety of special features, such as a fighter's mastery of weapons and armor, and an engineer's powers. At low levels, your class gives you only two or three features, but as you advance in level you gain more and your existing features often improve. Each class entry in this chapter includes a table summarizing the benefits you gain at every level, and a detailed explanation of each one.</p>

        <p>&emsp;Adventurers sometimes advance in more than one class. An operative might switch direction in life and become an engineer. A berserker might discover latent force sensitivity and dabble in the guardian class while continuing to advance as a berserker. Sith purebloods are known to combine martial mastery with force training and advance as fighters and consulars simultaneously. Optional rules for combining classes in this way, called multiclassing, appear in chapter 6.</p>

        <blockquote><p>Many classes and archetypes add material costs to obtain features integral to the class while most others don't. Your GM can choose to waive the time and cost component if they choose to do so.</p>

        <p>Additionally, certain classes and subclasses will often find themselves with a singular force or tech point, with which they can do nothing. Any character with the force- or tech-casting feature also gains the following feature:</p>

        <p>When you fail an ability check, if you added your proficiency bonus to the check and you did not have advantage or disadvantage, you can spend 1 force or tech point to reroll the die. You can only use this feature once per ability check, and you must use the new roll.</p></blockquote>

        <p>Choose from the following class options:</p>

        <div class="sw5e-book-block"><h5>Classes</h5>

