8th</td><td>d10</td><td>8</td></tr><tr><td>17</td><td>+6</td><td>�</td><td>27</td><td>34</td><td>9th</td><td>d12</td><td>9</td></tr><tr><td>18</td><td>+6</td><td>Discipline feature</td><td>28</td><td>36</td><td>9th</td><td>d12</td><td>9</td></tr><tr><td>19</td><td>+6</td><td>Ability Score Improvement</td><td>29</td><td>38</td><td>9th</td><td>d12</td><td>9</td></tr><tr><td>20</td><td>+6</td><td>Tech Mastery</td><td>30</td><td>40</td><td>9th</td><td>d12</td><td>9</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As an engineer, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per engineer level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your Constitution modifier per engineer level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons</li><li><strong>Tools:</strong> Tinker's implements and one of your choice</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Constitution, Intelligence</li><li><strong>Skills:</strong> Choose three from Investigation, Lore, Medicine, Nature, Piloting, and Technology</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> a simple vibroweapon or <em>(b)</em> a simple blaster and two power cells</li><li><em>(a)</em> a dungeoneer's pack or <em>(b)</em> an explorer's pack</li><li>A combat suit, a set of tinker's implements, a vibrodagger, and a wristpad</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

