        <h3>Biology and Appearance</h3>

        <p>While Tuskens, also known as Tusken Raiders or Sand People, are easily recognizable by their full-body clothing, goggles, and mouth filters, little of their true physical appearance can be discerned. From birth, Tuskens are covered in wraps, and, barring very rare occasions, will not bare any part of their skin in sight of another person. This, combined with their hostility to outsiders and Tatooine's remote and arid nature, makes even study of Tusken corpses difficult.</p>

        <h3>Society and Culture</h3>

        <p>Tuskens are a primative, tribal race, mostly living in small clans scattered throughout Tatooine's deserts. Due to the harsh and unforgiving desert environment, Tusken clans are often xenophobic and territorial, but it is not unknown for them to adopt members of other species into the clan. They believe that all water is sacred and promised to them alone, and are infamous among the other residents of Tatooine for raiding and pillaging settlements and farms.</p>

        <p>Tusken clans are usually very stratified, with males as hunters and warriors, while females and children maintain the camp. Tusken warriors hold their bond with their gaderffii weapons and Bantha mounts as sacred, and will choose death before relinquishing either.</p>

        <h3>Names</h3>

        <p>Tusken naming traditions vary between clans, but most are made up of harsh, guttural sounds. Tuskens do not use surnames.</p>

        <p><strong>Male Names.</strong> Ur Ur, A'Koba, Qeruru'rr, Gr'Karr</p>

        <p><strong>Female Names.</strong> K'Yark, Reirin, K'Orou, Ursarr'u</p>



        <h3>Tusken Traits</h3>

        <p>As a Tusken, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Strength or Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Tuskens are considered adults when they turn 15. Because of the harsh and unforgiving climate of their home world, they rarely live longer than half a century.</p>

        <p><strong><em>Alignment.</em></strong> Tusken culture's violent focus and disregard of those outside the tribe causes them to tend towards chaotic dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Tusken stand between 5 and 6 feet tall and weigh around 155 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Aggressive.</em></strong> As a bonus action, you can move up to your speed toward an enemy of your choice that you can see or hear. You must end this move closer to the enemy than you started.</p>

        <p><strong><em>Animal Handler.</em></strong> You are proficient in Animal Handling. </p>

        <p><strong><em>Intimidating Roar.</em></strong> Once per day, you can cast the <em>fear</em> force power. Charisma is your forcecasting ability for this power.</p>

        <p><strong><em>Survivors of the Sands.</em></strong> You are proficient in Survival. Additionally, you don't treat desert terrain as difficult terrain. Lastly, you have advantage on Constitution saving throws made to avoid exhaustion due to extreme heat.</p>

        <p><strong><em>Tusken Weaponry.</em></strong> You have proficiency with the slugthrower and vibromace. </p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Tusken. Tusken is a guttural language characterized by its barks, growls, and roars. While Tuskens typically understand Galactic Basic, it is rare to hear them speak anything but Tusken.</p>

        <img src='https://www.gmbinder.com/images/BjLMMtq.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:365px' />



        <hr>

        <h2>Twi'lek</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue, brown, dark grey, green, orange, pink, purple, red, tan, teal, white, yellow, or striped</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>None</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, blue, brown, green, hazel, orange, pink, purple, or yellow</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Lekku, sharp claw-like nails, males often file their teeth to points</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'3"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>125 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Ryloth</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Twi'leki</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearence</h3>

        <p>Twi'leks are usually thin, although corpulent individuals were known to exist. Twi'leks are omnivores; this diet is essential given that food is scarce on their homeworld, Ryloth. Twi'leks possess multiple stomachs, an unusual trait that enables them to eat almost any food. When traveling off their homeworld, twi'leks rarely refuse food, which frequently leads to obesity among starfarers. Twi'lek society also considers obesity as a sign of influence and success.</p>

        <h3>Society and Culture</h3>

        <p>The natural grace and exotic beauty of the female twi'leks make them a popular target among slave traders. Slavery is the main currency of Ryloth. Some see it as a chance to make money by kidnapping or selling orphaned children, while others see slavery as a way of saving children from growing up in Ryloth's harsh environment. A number of twi'leks believe that slavery is an efficient way to proliferate their species and preserve their culture, as the twi'leks lack their own means of inter-planetary travel. Regardless of how it came about, many twi'leks live as slaves or entertainers and are considered status symbols, especially the females of rarer skin hues. Twi'leks that manage to escape from captivity usually turned to a life of thievery or prostitution, with both genders making use of their powers of seduction.</p>

        <h3>Names</h3>

        <p>Twi'lek names combine their first name and a clan name into a single name, rather than having a separate surname.</p>

        <p><strong>Male Names.</strong> Ecrizsati, Gaj'mogos, Ukelweko</p>

        <p><strong>Female Names.</strong> Arag'mure, Oanicfuba, Unaecripi</p>



        <h3>Twi'lek Traits</h3>

        <p>As a twi'lek, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Twi'leks reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Twi'leks harsh upbringing cause them to<br> tend toward the dark side, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Twi'leks stand between 5 and 7 feet tall and weigh up to 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Elegant Dancers.</em></strong> You have proficiency with the Performance skill.</p>

        <p><strong><em>Natural Antitoxins.</em></strong> You have advantage on saving throws against poison and disease, and you have resistance against poison damage (explained in Chapter 9).</p>

        <p><strong><em>Unarmed Combatant.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Twi'leki. You can communicate non-verbally with other twi'leks through a complex language of subtle head-tail motions.</p>

        <img src='https://www.gmbinder.com/images/B5LmpQ6.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:245.5px' />



        <hr>

        <h2>Weequay</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Brown, gray, red, or yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black or blond</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, gold, or gray</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Tough, leathery skin that provided resistance to blasterfire</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'5"</td><td>+2d8"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>120 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Sriluur</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Sriluurian</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Weequays are humanoids with thick, leathery skin that ranges in color from tan to dark brown. Their faces are lipless, with a frill along each of their jowls.</p>

        <h3>Society and Culture</h3>

        <p>Weequays have the ability to communicate with members of their own clan through smell by exuding complex pheromones. This pheromonal language can not be understood by any other species, or even by Weequays of another clan. Only Jedi senses can even tell that two Weequay are communicating. Since each Weequay's pheromones are unique, Weequay have no need for a name within their clan. As a result, speech is only a secondary form of communication for Weequay, and they seldom speak a whole sentence, resulting in Humans mistakenly believing the species to be unintelligent.</p>

        <p>Male Weequay often tie their hair into a long braid each year spent away from their homeworld as a tribute to their home. When they returned, they shaved their braids. Weequays serving the Hutts were often very close to their homeworld, and would only have one or two braids. Female Weequay were usually bald, and did not follow this tradition.</p>

        <h3>Names</h3>

        <p>Only Weequay who have to live among other clans, or among non-Weequay, take a personal name. Even then, some are simply referred to as "Weequay". In Weequay culture, individual identity is much less important than the clan. As long as the clan survives, a single Weequay is expendable. This results in a sometimes brutal culture.</p>

        <p><strong>Male Names.</strong> Chublu, Fah, Kreakk, Og-Rollo, Yurrenn</p>

        <p><strong>Female Names.</strong> Gila, Qommi, Palsa, Sex, Xelror</p>

        <p><strong>Surnames.</strong> Britreg, Dlur, Klanz, Maub, Semu</p>



        <h3>Weequay Traits</h3>

        <p>As a weequay, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Weequay reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Weequay ruthlessness and greed cause them to tend toward chaotic dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Weequay typically stand about 6 feet tall and weigh 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Charming.</em></strong> You have proficiency in Deception or Persuasion.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Tanned.</em></strong> You have tough, leathery skin. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier. Additionally, You have advantage on Constitution saving throws made to avoid exhaustion due to extreme heat.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Sriluurian. You can communicate with other Weequay within 30 feet without speaking through use of pheromones. Force attuned individuals can detect the communication but can't understand it.</p>

        <img src='https://www.gmbinder.com/images/rULowc8.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:301px' />



        <hr>

        <h2>Wookiee</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Gray</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Different shades of black, brown, and white in varying combinations</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Blue, green, yellow, golden, brown, or<br> red</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Tall, hair covered, retractable climbing claws, long life spans</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>6'3"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>190 lb.</td><td>x(2d6) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworld</em></strong></td><td>&nbsp;&nbsp;</td><td>Kashyyyk</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Shyriiwook</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Wookiees are a tall species of furry giants from the planet Kashyyyk, who can grow to a height of over eight feet. They are covered from head to toe in a thick, shaggy coat of hair with water-shedding properties that notably came in shades of brown, black, gray, and white. The species has two sexes, female and male. The latter grows long beards in adult life. Wookiee eye colors are usually blue, green, yellow, golden, brown, or red.</p>

        <h3>Society and Culture</h3>

        Wookiees greatly value honor and loyalty. Therefore, their notion of "family" encompassed much more than just blood ties. A part of that most sacred tradition was the social institution of life debt: when a wookiee's life was saved by someone else, regardless of the species, they would frequently devote themselves to a lifetime of service to their savior and their family. Through the mechanism of the life debt, the People of the Trees used to develop unbreakable bonds with their boon companions and true friends, forming a "honor<br> family."

        <h3>Names</h3>

        <p>Wookiee names are diverse; some names are simple and short while others are long and complicated. The majority of names often have softer big sounds and more melodic tones to them. Since offworlders have trouble using wookiees' real names, they often adopt simpler nicknames to go by.</p>

        <p><strong>Male Names.</strong> Fubbodrrl, Gurrfupayyc, Kioerrr, Lavgaeffoak, Snrowbishutchuh, Zufiaarkaykkk</p>

        <p><strong>Female Names.</strong> Bulabba, Bonbaegnh, Hopakleupo, Keumnebheu, Onninh, Osstatiemmyock</p>



        <h3>Wookiee Traits</h3>

        <p>As a wookiee, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Strength score<br> increases by 2, and your Constitution score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Wookiees reach adulthood at about 40 and can live to be 400.</p>

        <p><strong><em>Alignment.</em></strong> Wookiees tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Wookiees tend to tower over other species, reaching heights over 8 feet and weighing 300 pounds. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Claws.</em></strong> Your claws are a natural weapon, which you can use to make unarmed strikes. Additionally, your unarmed strikes deal 1d4 kinetic damage.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Hide.</em></strong> You have a thick hide. While you are unarmored or wearing light armor, your AC is 13 + your Dexterity modifier. Additionally, you have advantage on Constitution saving throws made to avoid exhaustion due to extreme cold.</p>

        <p><strong><em>Powerful Build.</em></strong> Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>

        <p><strong><em>Treeclimber.</em></strong> You have a climbing speed of 30 feet. You have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Shyriiwook. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it.</p>

        <img src='https://www.gmbinder.com/images/ZUQ5ISz.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:270px' />



        <hr>

        <h2>Zabrak</h2>

        <blockquote><hr>

        <h4>Visual Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Skin Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Pale to dark brown, red, orange and yellow</td></tr><tr><td><strong><em>Hair Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Black, blonde, brown, red, or purple</td></tr><tr><td><strong><em>Eye Color</em></strong></td><td>&nbsp;&nbsp;</td><td>Yellow, green, orange, brown, blue, red, or purple</td></tr><tr><td><strong><em>Distinctions</em></strong></td><td>&nbsp;&nbsp;</td><td>Horns, two hearts, facial tattoos</td></tr></tbody></table>

        <hr>

        <h4>Physical Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>5'1"</td><td>+2d12"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>120 lb.</td><td>x(2d4) lb.</td></tr></tbody></table>

        <hr>

        <h4>Sociocultural Characteristics</h4>

        <table class="sw5e-book-table"><thead><tr><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Homeworlds</em></strong></td><td>&nbsp;&nbsp;</td><td>Iridonia, Dathomir</td></tr><tr><td><strong><em>Language</em></strong></td><td>&nbsp;&nbsp;</td><td>Zabraki</td></tr></tbody></table></blockquote>



        <h3>Biology and Appearance</h3>

        <p>Zabrak are near-human, but have a number of significant physical characteristics that set them apart from baseline Humanity. The most striking of these are a series of vestigial horns that crown the heads of both males and females. These horns grow at puberty in varying patterns and signified that their rite of passage is drawing near.</p>

        <p>In addition to their horns, another of the traits that make zabrak instantly recognizable are their facial tattoos, which are made up of thin lines received during their rite of passage. These could symbolize many things, including but not limited to family lineage, place of birth, or even a design that reflected their individual personalities.</p>

        <p>Lastly, zabraks possess a second heart.</p>

        <h3>Society and Culture</h3>

        <p>Zabrak are often seen by most other species as being single-minded, an observation that is not terribly incorrect. This single-minded determination comes from the fact that they are a species with a strong sense of self-assuredness, confident that they are able to accomplish any task that they set out to do. However, this does not lead a zabrak to develop a sense of prideful superiority towards others. Though it is not uncommon to see competition between colonies, this is not seen as a negative. The zabraks believe that the various experiences of the different colonies only serve to add to the species' overall value throughout the galaxy.</p>

        <h3>Names</h3>

        <p>Zabrak names are usually derived from the animals living on their planet. Zabraks don't use surnames.</p>

        <p><strong>Male Names.</strong> Kadro, Muraa, Neqama, Ruvroo, Xadra</p>

        <p><strong>Female Names.</strong> Blostopa, Mega, Novrar, Rebroke</p>



        <h3>Zabrak Traits</h3>

        <p>As a zabrak, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Strength or Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Zabraks reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Zabraks tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Zabraks stand anywhere from 5 to 7 feet tall and weigh up to 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Coercive.</em></strong> You have proficiency with Persuasion or Intimidation (your choice).</p>

        <p><strong><em>Crafters.</em></strong> You have proficiency with with one set of artisan's implements of your choice.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Second Heart.</em></strong> When you are reduced to 0 hit points but not killed outright, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>

        <p><strong><em>Unarmed Combatant.</em></strong> Your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Zabraki.</p>

        <img src='https://www.gmbinder.com/images/TXlLpKD.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:416px' />



