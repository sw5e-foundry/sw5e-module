    text:
      content: |-
        <h1>Chapter 1: Step-By-Step Characters</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">our first step in playing an adventurer in the<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Dungeons and Dragons</span> game is to imagine and create a character of your own. Your character is a combination of game statistics, roleplaying hooks, and your imagination. You choose a species (such as human or twi'lek) and a class (such as sentinel or scout). You also invent the personality, appearance, and backstory of your character. Once completed, your character serves as your representative in the game, your avatar in the <em>Star Wars</em> galaxy.

        <p>Before you dive into step 1 below, think about the kind of adventurer you want to play. You might be a courageous fighter, a skulking scoundrel, a fervent consular, or a cruel guardian. Or you might be more interested in an unconventional character, such as a brawny scoundrel who likes hand-to-hand combat, or a sharpshooter who picks off enemies from afar. Do you like non-Human species like Twi'leks or Wookiees? Try building a character of one of those species. Do you want your character to be the toughest adventurer at the table? Consider the fighter class. If you don't know where else to begin, take a look at the illustrations in any <em>Star Wars</em> book to see what catches your interest.</p>

        <p>Once you have a character in mind, follow these steps in order, making decisions that reflect the character you want. Your conception of your character might evolve with each choice you make. What's important is that you come to the table with a character you're excited to play.</p>

        <p>Throughout this section, we use the term character sheet to mean whatever you use to track your character, whether it's a formal <strong>character sheet</strong> (like the one at the end of these rules), some form of digital record, or a piece of notebook paper. An official D&amp;D character sheet is a fine place to start until you know what information you need and how you use it during the game.</p>

        <h5>Building Han Solo</h5>

        <blockquote><p>Each step of character creation includes an example of that step, with a player building the iconic character Han Solo, as he is portrayed during the events of Episode IV.</p></blockquote>

        <h3>1. Choose a Species</h3>

        <p>Every character belongs to a species, one of the many intelligent humanoid species in the <em>Star Wars</em> worlds. The most common species in the galaxy is human, but there are a myriad of near-Human species available for play, including the four-armed Besalisks, the cunning Trandoshans, the dexterous Twi'leks, and the utilitarian droid. The <strong>Species</strong> chapter provides more information about these species.</p>

        <p>The species you choose contributes to your character's identity in an important way, by establishing a general appearance and the natural talents gained from culture and ancestry. Your character's species grants particular special traits, such as special senses, proficiency with certain weapons or tools, proficiency in one tools, proficiency in one or more skills, or the ability to use minor powers. </p>

        <p>These traits sometimes dovetail with the capabilities of certain classes (see step 2). For example, the special traits of Lanniks make them exceptional consulars, and Jawas tend to be powerful engineers. Sometimes playing against type can be fun, too. Ugnaught soldiers and Wookiee sentinels, for example, can be unusual but memorable characters.</p>

        <p>Your species also increases one or more of your ability scores, which you determine in step 3. Note these increases and remember to apply them later.</p>

        <p>Record the traits granted by your species on your character sheet. Be sure to note your starting languages and your base speed as well.</p>

        <h5>Building Han Solo, Step 1</h5>

        <blockquote><p>Since Han Solo is a human, we record all the special traits of humans on our character, including his speed of 30 feet and the languages he knows: Galactic Basic and Shyriiwook.</p></blockquote>

        <h3>2. Choose a Class</h3>

        <p>Every adventurer is a member of a class. Class broadly describes a character's vocation, what special talents he or she possesses, and the tactics he or she is most likely to employ when exploring a city, fighting monsters, or engaging in a tense negotiation. The character classes are described in the <strong>Classes</strong> chapter.</p>

        <p>Your character receives a number of benefits from your choice of class. Many of these benefits are <strong>class features</strong> � capabilities (including force- or tech-casting) that set your character apart from members of other classes. You also gain a number of <strong>proficiencies</strong>: armor, weapons, skills, saving throws, and sometimes tools. Your proficiencies define many of the things your character can do particularly well, from using certain weapons to telling a convincing lie.</p>

        <p>On your character sheet, record all the features that your class gives you at 1st level.</p>

        <h4>Level</h4>

        <p>Typically, a character starts at 1st level and advances in level by adventuring and gaining <strong>experience points</strong> (XP). A 1st-level character is inexperienced in the adventuring world, although he or she might have been a soldier or a pirate and done dangerous things before.</p>

        <p>Starting off at 1st level marks your character's entry into the adventuring life. If you're already familiar with the game, or if you are joining an existing D&amp;D campaign, your GM might decide to have you begin at a higher level, on the assumption that your character has already survived a few harrowing adventures.</p>

        <h5>Quick Build</h5>

        <blockquote><p>Each class description in the Classes section includes a section offering suggestions to quickly build a character of that class, including how to assign your highest ability scores, a background suitable to the class, and starting powers.</p></blockquote>



        <p>Record your level on your character sheet. If you're starting at a higher level, record the additional elements your class gives you for your levels past 1st. Also record your experience points. A 1st-level character has 0 XP. A higher-level character typically begins with the minimum amount of XP required to reach that level (see "Beyond 1st Level" later in this section).</p>

        <h4>Hit Points and Hit Dice</h4>

        <p>Your character's hit points define how tough your character is in combat and other dangerous situations. Your hit points are determined by your Hit Dice (short for Hit Point Dice).</p>

        <p>At 1st level, your character has 1 Hit Die, and the die type is determined by your class. You start with hit points equal to the highest roll of that die, as indicated in your class description. (You also add your Constitution modifier, which you'll determine in step 3.) This is also your <strong>hit point maximum</strong>.</p>

        <p>Record your character's hit points on your character sheet. Also record the type of Hit Die your character uses and the number of Hit Dice you have. After you rest, you can spend Hit Dice to regain hit points (see "Resting" in the Adventuring section). Whenever you roll a Hit Die to regain hit points, you add your Constitution modifier to the roll.</p>

        <h4>Proficiency Bonus</h4>

        <p>The table that appears in your class description shows your proficiency bonus, which is +2 for a 1st-level character. Your proficiency bonus applies to many of the numbers you'll be recording on your character sheet:</p>

        <ul><li>Attack rolls using weapons you're proficient with</li><li>Attack rolls with powers you cast</li><li>Ability checks using skills you're proficient in</li><li>Ability checks using tools you're proficient with</li><li>Saving throws you're proficient in</li><li>Saving throw DCs for powers you cast (explained in each force- or tech-casting class)</li></ul>

        <p>Your class determines your weapon proficiencies, your saving throw proficiencies, and some of your skill and tool proficiencies. (Skills are described in "Using Ability Scores", tools in "Equipment.") Your background gives you additional skill and tool proficiencies, and some species give you more proficiencies. Be sure to note all of these proficiencies, as well as your proficiency bonus, on your character sheet.</p>

        <p>Your proficiency bonus can't be added to a single die roll or other number more than once. Occasionally,</p>

        <p>your proficiency bonus might be modified (doubled or halved, for example) before you apply it. If a circumstance suggests that your proficiency bonus applies more than once to the same roll or that it should be multiplied more than once, you nevertheless add it only once, multiply it only once, and halve it only once.</p>

        <h5>Building Han Solo, Step 2</h5>

        <blockquote><p>Han Solo is best depicted as an operative, so we make a note of the operative's proficiencies and 1st-level class features on the character sheet.</p>

        <p>As a 1st-level operative, Han has 1 Hit Die�a d8�and starts with hit points equal to 8 + his Constitution modifier. Make a note of this; we will record the final number after we determine Han's Constitution score (see step 3). Also make note of the proficiency bonus for a 1st-level character, which is +2.</p></blockquote>

        <h3>3. Determine Ability Scores</h3>

        <p>Much of what your character does in the game depends on his or her six abilities: <strong>Strength</strong>, <strong>Dexterity</strong>, <strong>Constitution</strong>, <strong>Intelligence</strong>, <strong>Wisdom</strong>, and <strong>Charisma</strong>. Each ability has a score, which is a number you record on your character sheet.</p>

        <p>The six abilities and their use in the game are described in the <strong>Using Ability Scores</strong> chapter. You generate your character's six <strong>ability scores</strong> randomly. Roll four 6-sided dice and record the total of the highest three dice on a piece of scratch paper. Do this five more times, so that you have six numbers. If you want to save time or don't like the idea of randomly determining ability scores, you can use the following scores instead: 15, 14, 13, 12, 10, 8.</p>

        <p>Now take your six numbers and write each number beside one of your character's six abilities to assign scores to Strength, Dexterity, Constitution, Intelligence, Wisdom, and Charisma. Afterward, make any changes to your ability scores as a result of your species choice.</p>

        <p>After assigning your ability scores, determine your <strong>ability modifiers</strong> using the Ability Scores and Modifiers table. To determine an ability modifier without consulting the table, subtract 10 from the ability score and then divide the result by 2 (round down). Write the modifier next to each of your scores.</p>

        <h5>Building Han Solo, Step 3</h5>

        <blockquote><p>We will use the standard set of scores (15, 14, 13, 12, 10, 8) for Han's abilities. Han is talented and nimble, so we'll put his highest score, 15, in Dexterity. His next-highest, 14, goes in Charisma.  He then applies the 13 to Intelligence, the 12 to Constitution, the 10 to Wisdom and the 8 to Strength. After applying his special benefits (increasing Han's Dexterity by 2, and his Intelligence and Charisma by 1), Han's ability scores and modifiers look like this: Strength 8 (-1), Dexterity 17 (+3), Constitution 12 (+1), Intelligence 14 (+2), Wisdom 10 (+0), Charisma 15 (+2).</p>

        <p>We then fill in Han's final hit points: 8 + his Constitution modifier of +1, for a total of 9 hit points.</p></blockquote>

        <img src='https://cdn.discordapp.com/attachments/469499280994992128/539183142175637514/image0.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:360px' />



        <h4>Variant: Customizing Ability Scores</h4>

        <p>At your Game Master's option, you can use this variant for determining your ability scores. The method described here allows you to build a character with a set of ability scores you choose individually.</p>

        <p>You have 27 points to spend on your ability scores. The cost of each score is shown on the Ability Score Point Cost table. For example, a score of 14 costs 7 points. Using this method, 15 is the highest ability score you can end up with, before applying special increases. You can't have a score lower than 8.</p>

        <p>This method of determining ability scores enables you to create a set of three high numbers and three low ones (15, 15, 15, 8, 8, 8), a set of numbers that are above average and nearly equal (13, 13, 13, 12, 12, 12), or any set of numbers between those extremes.</p>

        <h5>Ability Score Point Cost</h5>

        <table class="sw5e-book-table"><thead><tr><th>Score</th><th>Cost</th></tr></thead><tbody><tr><td>8</td><td>0</td></tr><tr><td>9</td><td>1</td></tr><tr><td>10</td><td>2</td></tr><tr><td>11</td><td>3</td></tr><tr><td>12</td><td>4</td></tr><tr><td>13</td><td>5</td></tr><tr><td>14</td><td>7</td></tr><tr><td>15</td><td>9</td></tr></tbody></table>

        <h3>4. Describe Your Character</h3>

        <p>Once you know the basic game aspects of your character, it's time to flesh him or her out as a person. Your character needs a name. Spend a few minutes thinking about what he or she looks like and how he or she behaves in general terms.</p>

        <p>Using the information in the <strong>Personality and Background</strong> chapter, you can flesh out your character's physical appearance and personality traits. Choose your character's <strong>alignment</strong> (the moral compass that guides his or her decisions) and <strong>ideals</strong>. The <strong>Personality and Background</strong> chapter also helps you identify the things your character holds most dear, called <strong>bonds</strong>, and the <strong>flaws</strong> that could one day undermine him or her.</p>

        <p>Your character's <strong>background</strong> describes where he or she came from, his or her original occupation, and the character's place in the D&amp;D world. Your GM might offer additional backgrounds beyond the ones included in the Personality and Background section, and might be willing to work with you to craft a background that's a more precise fit for your character concept.</p>

        <p>A background gives your character a background feature (a general benefit) and proficiency in two skills, and it might also give you additional languages or proficiency with certain kinds of tools. Record this information, along with the personality information you develop, on your character sheet.</p>

        <h5>Ability Scores and Modifiers</h5>

        <table class="sw5e-book-table"><thead><tr><th>Score</th><th>Modifier</th></tr></thead><tbody><tr><td>1</td><td>-5</td></tr><tr><td>2-3</td><td>-4</td></tr><tr><td>4-5</td><td>-3</td></tr><tr><td>6-7</td><td>-2</td></tr><tr><td>8-9</td><td>-1</td></tr><tr><td>10-11</td><td>+0</td></tr><tr><td>12-13</td><td>+1</td></tr><tr><td>14-15</td><td>+2</td></tr><tr><td>16-17</td><td>+3</td></tr><tr><td>18-19</td><td>+4</td></tr><tr><td>20-21</td><td>+5</td></tr><tr><td>22-23</td><td>+6</td></tr><tr><td>24-25</td><td>+7</td></tr><tr><td>26-27</td><td>+8</td></tr><tr><td>28-29</td><td>+9</td></tr><tr><td>30</td><td>+10</td></tr></tbody></table>

        <img src='https://www.gmbinder.com/images/6vljPk5.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:450px' />



        <h5>Building Han Solo, Step 4</h5>

        <blockquote><p>We then fill in some of Han's basic details: his name, his sex (male), his height and weight, and his alignment (chaotic light). His high Dexterity and Charisma represent his capability and power of presence, and his low Strength represent an unexceptional burliness.</p>

        <p>Han is a notorious scoundrel, so we choose the scoundrel background. Make a note of the proficiencies and special feature this background gives. We choose the Silver-Tongued feat for Han's background feat, adding the bonus to Han's Charisma, bring the total to 16, and the modifier to +3.</p>

        <p>We know that Han is both daring and rash, and has a propensity to gamble, so we choose the fourth and sixth personality traits. We choose the ideal of independence from the list in the background, noting that Han recognizes no one as his master.</p>

        <p>Han's bond is his flight from Jabba the Hutt, so we choose the first option. His flaw is that he often chooses himself and his ship over others, so we choose the sixth option.</p></blockquote>

        <h4>Your Character's Abilities</h4>

        <p>Take your character's ability scores and species into account as you flesh out his or her appearance and personality. A very strong character with low Intelligence might think and behave very differently from a very smart character with low Strength.</p>

        <p>For example, high Strength usually corresponds with a burly or athletic body, while a character with low Strength might be scrawny or plump.</p>

        <p>A character with high Dexterity is probably lithe and slim, while a character with low Dexterity might be either gangly and awkward or heavy and thick-fingered.</p>

        <p>A character with high Constitution usually looks healthy, with bright eyes and abundant energy. A character with low Constitution might be sickly or frail.</p>

        <p>A character with high Intelligence might be highly inquisitive and studious, while a character with low Intelligence might speak simply or easily forget details.</p>

        <p>A character with high Wisdom has good judgment, empathy, and a general awareness of what's going on. A character with low Wisdom might be absent-minded, foolhardy, or oblivious.</p>

        <p>A character with high Charisma exudes confidence, which is usually mixed with a graceful or intimidating presence. A character with a low Charisma might come across as abrasive, inarticulate, or timid.</p>

        <h3>5. Choose Equipment</h3>

        <p>Your class and background determine your character's <strong>starting equipment</strong>, including weapons, armor, and other adventuring gear. Record this equipment on your character sheet. All such items are detailed in the Equipment section. Instead of taking the gear given to you by your class and background, you can purchase your starting equipment. You have a number of <strong>credits</strong> (cr) to spend based on your class, as shown in the Equipment section. Extensive lists of equipment, with prices, also appear in that section. </p>



        <p>&emsp;Your Strength score limits the amount of gear you can carry. Try not to purchase equipment with a total weight (in pounds) exceeding your Strength score times 15. "<strong>Using Ability Scores</strong>" has more information on carrying capacity.</p>

        <h4>Armor Class</h4>

        <p>Your <strong>Armor Class</strong> (AC) represents how well your character avoids being wounded in battle. Things that contribute to your AC include the armor you wear, the shield you carry, and your Dexterity modifier. Not all characters wear armor or carry shields, however.</p>

        <p>Without armor or a shield, your character's AC equals 10 + his or her Dexterity modifier. If your character wears armor, carries a shield, or both, calculate your AC using the rules in the Equipment section. Record your AC on your character sheet.</p>

        <p>Your character needs to be proficient with armor and shields to wear and use them effectively, and your armor and shield proficiencies are determined by your class. There are drawbacks to wearing armor or carrying a shield if you lack the required proficiency, as explained in the Equipment section.</p>

        <p>Some powers and class features give you a different way to calculate your AC. If you have multiple features that give you different ways to calculate your AC, you choose which one to use.</p>

        <h4>Weapons</h4>

        <p>For each weapon your character wields, calculate the modifier you use when you attack with the weapon and the damage you deal when you hit.</p>

        <p>When you make an attack with a weapon, you roll a d20 and add your proficiency bonus (but only if you are proficient with the weapon) and the appropriate ability modifier.</p>

        <ul><li>For attacks with <strong>melee weapons</strong>, use your Strength modifier for attack and damage rolls. A weapon that has the finesse property, such as a vibrorapier, can use your Dexterity modifier instead.</li><li>For attacks with <strong>ranged weapons</strong>, use your Dexterity modifier for attack and damage rolls. A weapon that has the thrown property, such as a vibrodagger, can use your Strength modifier instead.</li></ul>

        <h5>Building Han Solo, Step 5</h5>

        <blockquote><p>We now write down the starting equipment from the operative class and the scoundrel background. His starting equipment includes a combat suit, giving him an Armor Class of 14.</p>

        <p>For Han's weapons, we choose a vibrodagger and a light pistol. His light pistol is a ranged weapon, and the vibrodagger has the finesse property, so Han uses his Dexterity modifier for his attacks and damage. His attack bonus is his Dexterity modifier (+3) plus his proficiency bonus (+2), for a total of +5. The light pistol deals 1d4 energy damage, and Han adds his Dexterity modifier to the damage when he hits, for a total of 1d4+3 energy damage. The vibrodagger deals the same amount of damage, but is kinetic instead of energy.</p></blockquote>



        <h3>6. Come Together</h3>

        <p>Most <em>Star Wars</em> characters don't work alone. Each character plays a role within a <strong>party</strong>, a group of adventurers working together for a common purpose. Teamwork and cooperation greatly improve your party's chances to survive the many perils in the worlds of <em>Star Wars</em>. Talk to your fellow players and your GM to decide whether your characters know one another, how they met, and what sorts of quests the group might undertake.</p>

        <h4>Beyond 1st Level</h4>

        <p>As your character goes on adventures and overcomes challenges, he or she gains experience, represented by experience points. A character who reaches a specified experience point total advances in capability. This advancement is called gaining a level.</p>

        <h4>Class Features and Hit Dice</h4>

        <p>When your character gains a level, his or her class often grants additional features, as detailed in the class description. Some of these features allow you to increase your ability scores, either increasing two scores by 1 each or increasing one score by 2. You can't increase an ability score above 20. In addition, every character's proficiency bonus increases at certain levels.</p>

        <p>Each time you gain a level, you gain 1 additional Hit Die. Roll that Hit Die, add your Constitution modifier to the roll, and add the total to your hit point maximum (minimum of 1 hit point). Alternatively, you can use the fixed value shown in your class entry, which is the average result of the die roll (rounded up).</p>

        <h5>Character Advancement </h5>

        <table class="sw5e-book-table"><thead><tr><th>Experience Points</th><th>Level</th><th>Proficiency Bonus</th></tr></thead><tbody><tr><td>0</td><td>1</td><td>+2</td></tr><tr><td>300</td><td>2</td><td>+2</td></tr><tr><td>900</td><td>3</td><td>+2</td></tr><tr><td>2,700</td><td>4</td><td>+2</td></tr><tr><td>6,500</td><td>5</td><td>+3</td></tr><tr><td>14,000</td><td>6</td><td>+3</td></tr><tr><td>23,000</td><td>7</td><td>+3</td></tr><tr><td>34,000</td><td>8</td><td>+3</td></tr><tr><td>48,000</td><td>9</td><td>+4</td></tr><tr><td>64,000</td><td>10</td><td>+4</td></tr><tr><td>85,000</td><td>11</td><td>+4</td></tr><tr><td>100,000</td><td>12</td><td>+4</td></tr><tr><td>120,000</td><td>13</td><td>+5</td></tr><tr><td>140,000</td><td>14</td><td>+5</td></tr><tr><td>165,000</td><td>15</td><td>+5</td></tr><tr><td>195,000</td><td>16</td><td>+5</td></tr><tr><td>225,000</td><td>17</td><td>+6</td></tr><tr><td>265,000</td><td>18</td><td>+6</td></tr><tr><td>305,000</td><td>19</td><td>+6</td></tr><tr><td>355,000</td><td>20</td><td>+6</td></tr></tbody></table>



        <p>&emsp;When your Constitution modifier increases by 1, your hit point maximum increases by 1 for each level you have attained. For example, if your 7th-level soldier has a Constitution score of 17, when he reaches 8th level, he increases his Constitution score from 17 to 18, thus increasing his Constitution modifier from +3 to +4. His hit point maximum then increases by 8.</p>

        <h4>XP and Proficiency Bonus Progression</h4>

        <p>The Character Advancement table summarizes the XP you need to advance in levels from level 1 through level 20, and the proficiency bonus for a character of that level. Consult the information in your character's class description to see what other improvements you gain at each level.</p>

        <img src='https://cdn.discordapp.com/attachments/469499280994992128/538811115447255065/image0.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:635px' />



