        <h3>Techcasting</h3>

        <em><strong>Engineer:</strong> 1st level</em><br>

        <p>During your training you have derived powers from schematics with the aid of your wristpad. See chapter 10 for the general rules of techcasting and chapter 12 for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>You learn 6 tech powers of your choice, and you learn more at higher levels, as shown in the Tech Powers Known column of the engineer table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Tech Points</h4>

        <p>You have a number of tech points equal to your engineer level x 2, as shown in the Tech Points column of the engineer table, + your Intelligence modifier. You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many tech powers can be overcharged, consuming more tech points to create a greater effect. You can overcharge these powers to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the engineer table.</p>

        <p>You may only cast tech powers at 6th, 7th, 8th, and 9th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Techcasting Ability</h4>

        <p>Intelligence is your techcasting ability for your tech powers. You use your Intelligence whenever a power refers to your techcasting ability. Additionally, you use your Intelligence modifier when setting the saving throw DC for a tech power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + your proficiency bonus + <br>your Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = your proficiency bonus + <br>your Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>You use a wristpad (found in chapter 5) or the tools in which you are granted proficiency by this class as a tech focus for your tech powers.</p>

        <h3>Potent Aptitude</h3>

        <em><strong>Engineer:</strong> 1st level</em><br>

        <p>Your technological experience lends you an uncommon insight that you can use to bolster your allies. To do so, you use a bonus action on your turn to choose one creature other than yourself within 60 feet of you who can hear you. That creature gains one Potent Aptitude die, a d4. This die changes as you gain engineer levels, as shown in the Potent Aptitude column of the engineer table.</p>



        <p>Once within the next 10 minutes, the creature can roll the die and add the number rolled to one ability check, attack roll, or saving throw it makes. The creature can wait until after it rolls the d20 before deciding to use the Potent Aptitude die, but must decide before the GM says whether the roll succeeds or fails. Once the Potent Aptitude die is rolled, it is lost.</p>

        <p>A creature can have only one Potent Aptitude die at a time.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain any expended uses when you finish a short or long rest.</p>

        <h3>Infuse Item</h3>

        <em><strong>Engineer:</strong> 2nd level</em><br>

        <p>You gain the ability to temporarily enhance a weapon or armor. At the end of a long rest, you can touch one unenhanced object that is a suit of armor, a shield, or a simple or martial weapon. Until the end of your next long rest or until you die, the object becomes an enhanced item, granting a +1 bonus to AC if it's armor or a shield or a +1 bonus to attack and damage rolls if it's a weapon. </p>

        <p>Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <p>This bonus increases to +2 at 10th level and +3 at 15th level.</p>

        <h3>Tool Expertise</h3>

        <em><strong>Engineer:</strong> 2nd level</em><br>

        <p>You gain expertise in any tool proficiencies you gain from this class.</p>

        <h3>Engineering Discipline</h3>

        <em><strong>Engineer:</strong> 3rd, 6th, 14th, and 18th level</em><br>

        <p>You begin to focus on a specific engineering discipline, which is detailed at the end of the class description. </p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Engineer:</strong> 4th, 8th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Tech Mastery</h3>

        <em><strong>Engineer:</strong> 20th level</em><br>

        <p>Your mastery of technology is unrivaled. Your Constitution and Intelligence scores increase by 2. Your maximum for those scores increases by 2.</p>

        <p>Additionally, when you roll initiative and have no uses of Potent Aptitude left, you regain one use.</p>

        <h2>Engineering Disciplines</h2>

        <p>Each discipline focuses on maximizing the personal use of a certain tool. Your discipline grants you features at 3rd, 6th, 14th, and 18th level.</p>



        <h4>Armormech Engineering</h4>

        <p>Those engineers who choose the Armormech Engineering discipline focus on the ability to work with hard metals and electronic shielding to construct and enhance all types of personal armor.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Armormech Engineering:</strong> 3rd level</em><br>

        <p>You gain proficiency in armormech's implements, medium armor, and heavy armor. Additionally, when you engage in crafting with armormech's implements, the rate at which you craft doubles.</p>

        <h3>Modified Armor</h3>

        <em><strong>Armormech Engineering:</strong> 3rd level</em><br>

        <p>You learn to modify one unenhanced suit of armor or shield utilizing your armormech knowledge. Over the course of a long rest, you can modify one suit of armor or a shield. You must have the armor or shield and armormech's implements in order to perform this modification.</p>



        <p>&emsp;Your modified armor or shield is enhanced, requires attunement, can only be used by you, and counts as a tech focus for your tech powers while you are attuned to it. Your modified armor has 4 modification slots, and it gains more at higher levels, as shown in the Modification Slots column of the engineer table. For each modification installed in excess of your proficiency bonus, your tech point maximum is reduced by 1. Over the course of a long rest, you can install, replace, or remove a number of modifications up to your Intelligence modifier (minimum of one).</p>

        <p>Some modification effects require saving throws. When you use such an effect from this class, the DC equals your tech save DC.</p>

        <p>At 9th level, you can maintain both a modified suit of armor and shield. Each modified item has modification slots as shown in the Modification Slots column of the engineer table.</p>

        <h3>Damage Absorption</h3>

        <em><strong>Armormech Engineering:</strong> 3rd level</em><br>

        <p>When you take damage, you can use your reaction and expend one use of your Potent Aptitude to absorb some of that damage. When you do so, the damage you take from the attack is reduced by the amount rolled on the die + your Intelligence modifier (minimum of +1). You must be wearing your modified armor or wielding your modified shield to gain this benefit.</p>

        <h3>Extra Attack</h3>

        <em><strong>Armormech Engineering:</strong> 6th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn. You must be wearing your modified armor or wielding your modified shield to gain this benefit.</p>

        <h3>Armormech's Celerity</h3>

        <em><strong>Armormech Engineering:</strong> 14th and 17th level</em><br>

        <p>When you take the Attack action or use your action to a cast a tech power of 1st-level or higher, you can make one weapon attack as a bonus action.</p>

        <p>You can use this feature five times. You gain an additional use at 17th level. You regain all expended uses when you complete a long rest.</p>

        <h3>Suit Reliability</h3>

        <em><strong>Armormech Engineering:</strong> 18th level</em><br>

        <p>Your suit is like a second skin. Whenever you make an ability check or saving throw that uses Strength, Dexterity,or Constitution, you can treat a d20 roll of 9 or lower as a 10. You must be wearing your modified armor or wielding your modified shield to gain this benefit.</p>

        <img src='https://www.gmbinder.com/images/68MyqCJ.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:480px' />



        <h3>Armormech Modifications</h3>

        <p>If a modification has prerequisites, you must meet them to install it. You can install the modification at the same time that you meet its prerequisites.</p>

        <h4>Absorption Shield</h4>

        <em><strong>Prerequisite:</strong> Physical Shield</em><br>

        <p>You modify your physical shield to block incoming damage. As a bonus action you can activate this ability and gain temporary hit points equal to 1d4 + Intelligence modifier, which last for one hour.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain any expended uses when you finish a long rest.</p>

        <h4>Accelerated Movement</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>You reduce the weight of your modified armor's bulk and increase the power to joints. If the armor has a Strength requirement, you ignore it. The modified armor's weight is reduced by 15 lbs. While wearing your modified armor your speed increases by 10 feet. This applies to all movement speeds you have while wearing your armor.</p>

        <h4>Adaptable Armor</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>You integrate deployable hooks and fins into your armor, augmenting its mobility. While wearing your modified armor, you gain a climbing speed equal to your walking speed, and you can move up, down, and across vertical surfaces and upside down along ceilings, while leaving your hands free. Additionally, you gain a swim speed equal to your walking speed.</p>

        <h4>Advanced Power Fist</h4>

        <em><strong>Prerequisite:</strong> 11th level, Prototype Power Fist</em><br>

        <p>You further modify your modified armor's gauntlet with increased reinforcement and weight. Your modified armor's unarmed strike deals 1d8 kinetic damage. Additionally, your critical hit range with your unarmed strikes increases by 1.</p>

        <h4>Artificially Intelligent</h4>

        <em><strong>Prerequisite:</strong> 9th level, Armor</em><br>

        <p>You install an artificial intelligence into your modified armor. While wearing your modified armor, when you make an ability check, your armor's artificial intelligence can take the Help action.</p>

        <p>You can use this feature four times. You gain an additional use at 13th and 17th level. You regain all expended uses when you complete a long rest.</p>

        <h4>Bonded Plates</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to AC against melee attacks. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Collapsible Suit</h4>

        <em><strong>Prerequisite:</strong> 5th level, Armor</em><br>

        <p>Your modified armor can collapse into a case for easy storage. When transformed this way the armor is indistinguishable from a normal case and weighs one-</p>



        <p>third its normal weight. As an action you can don or doff the armor, allowing it to transform as needed.</p>

        <h4>Darkvision Visor</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>While wearing your modified armor, you have darkvision to a range of 60 feet. If you already have darkvision, this modification increases its range by 30 feet.</p>

        <h4>Enhanced Endurance</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>When you are reduced to 0 hit points while wearing your modified armor but not killed outright, you can drop to 1 hit point instead. You can't use this feature again until you finish a long rest.</p>

        <h4>Electroshock Shield</h4>

        <em><strong>Prerequisite:</strong> Shield Generator</em><br>

        <p>You install electroshockers in your shield generator. Whenever an enemy misses you with a melee attack, you can use your reaction to do 1d4 + your Intelligence modifier lightning damage to the attacker.</p>

        <h4>Flight</h4>

        <em><strong>Prerequisite:</strong> 9th level, Armor</em><br>

        <p>You integrate a propulsion system into your modified armor. While wearing your modified armor you have an enhanced flying speed of 30 feet.</p>

        <h4>Grappling Harpoon</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>Your modified armor gains an integrated grappling harpoon set into your gauntlet. With this harpoon, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d6 kinetic damage. This attack can target a surface, object, or creature.</p>

        <p>A creature struck by this attack is impaled by the harpoon. As an action, a creature can attempt to remove the harpoon. Removing the harpoon requires a Strength check. While the harpoon is stuck in the target, you are connected to the target by a 60 foot cable.</p>

        <p>While the harpoon is deployed, you can use your bonus action to activate the reel, pulling yourself to the location if the target is larger than you. A creature or object your size or smaller is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>

        <p>Once you've used this feature, you can't use it again until you recover and reinsert the harpoon as an action.</p>

        <h4>Heavy Suit</h4>

        <em><strong>Prerequisite:</strong> 5th level, Armor</em><br>

        <p>You enhance your suit, making it difficult to move. As a bonus action, you can anchor or deanchor your feet to the ground. While anchored, your speed is 0, you have advantage on Strength checks and Strength saving throws, and your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples.</p>



        <h4>Infiltration Suit</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>You install a cloaking device in your modified armor. This device has 2 charges. As an action you can use 1 charge to cast <em>infiltrate</em> targeting yourself.</p>

        <p>The cloaking device regains all expended charges after a long rest.</p>

        <h4>Magnetized Shield</h4>

        <em><strong>Prerequisite:</strong> Physical Shield</em><br>

        <p>You modify your physical shield such that when a melee weapon attack misses you by an amount less than or equal to your bonus to AC from your shield, the attacking creature must make a Strength check against your tech save DC. On a failed save, the creature's weapon adheres to the shield. As an action, a creature can repeat this check. On a success, the weapon is freed. </p>

        <h4>Overload Shield</h4>

        <em><strong>Prerequisite:</strong> Shield Generator</em><br>

        <p>You modify your shield generator to overload. As an action you can overload your shield. Each Large or smaller creature within 5 feet of you must make a Dexterity or Strength saving throw (their choice) against your tech save DC. On a failed save, they are pushed back 5 feet and knocked prone.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain any expended uses when you finish a long rest.</p>

        <h4>Power Fist</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>You modify your modified armor gauntlet with increased reinforcement and weight. Your modified armor's unarmed strike deals 1d4 kinetic damage.</p>

        <p>Additionally, when you take the Attack action and make an unarmed strike, you can make an additional unarmed strike as a bonus action.</p>

        <h4>Prototype Power Fist</h4>

        <em><strong>Prerequisite:</strong> 5th level, Power Fist</em><br>

        <p>You further modify your modified armor gauntlet with increased reinforcement and weight. Your modified armor's unarmed strike deals 1d6 kinetic damage and has the following property.</p>

        <p>If you or your target move at least 10 feet in a straight line immediately before making an unarmed strike, the first unarmed strike you make deals additional damage equal to your Intelligence modifier.</p>

        <h4>Reinforced Underlay</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to AC against ranged attacks. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Resistance</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>You tune your modified armor against certain forms of damage. Choose acid, cold, fire, ion, lightning, or sonic damage. While wearing your modified armor you have resistance to that type of damage. </p>

        <p>You can select this modification multiple times. Each time you do so, you must choose a different damage type.</p>

        <h4>Sealed Suit</h4>

        <em><strong>Prerequisite:</strong> 5th level, Armor</em><br>

        <p>As a bonus action you can hermetically seal your modified armor, giving you an air supply for up to 1 hour and making you immune to poison (but not curing you of existing poisoned conditions). Your armor regains 1 minute of air for every minute that you are not submerged and the armor is not sealed.</p>

        <p>Additionally, while you are wearing your modified armor you are considered adapted to cold and hot climates as well as high altitude, as described in chapter 5 of the Dungeon Master's Guide. </p>

        <h4>Sentient Armor</h4>

        <em><strong>Prerequisite:</strong> 13th level, Artificially Intelligent</em><br>

        <p>Your artificial intelligence has learned to control the suit without you being in it. It is now a valid target of the <em>tracker droid interface</em> tech power.</p>

        <p>While your armor is acting independently, it uses your ability scores, saving throws, and skills, and it has hit points equal to your engineer level. If reduced to 0 hit points, it falls directly to the ground, and it can not be equipped again until you finish a long rest.</p>

        <h4>Shield Amplifier</h4>

        <em><strong>Prerequisite:</strong> Shield Generator</em><br>

        <p>You modify your shield generator to project outward. As a bonus action you can amplify your shield until the start of your next turn. Each creature within 5 feet of you gains a bonus to AC equal to your shield's bonus.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain any expended uses when you finish a long rest.</p>

        <h4>Shield Anchor</h4>

        <em><strong>Prerequisite:</strong> Physical Shield</em><br>

        <p>You modify your shield to be used as a portable source of cover. As an action, you can anchor or deanchor the shield. While anchored, you gain no benefit from a shield, and it does not require the use of a hand. Instead, while anchored, a light shield provides one-quarter cover, a medium shield provides half cover, and a heavy shield provides three-quarters cover.</p>

        <h4>Tech Blast</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>You modify your modified armor gauntlet with a blaster weapon with which you are proficient. The weapon uses your Intelligence modifier for its attack and damage rolls, and deals 1d8 energy damage on a hit. It has a normal range of 30 feet and a long range of 120 feet.</p>

        <h4>Weapon Integration Armoring</h4>

        <em><strong>Prerequisite:</strong> Armor</em><br>

        <p>You can integrate a single weapon that weighs no more than 8 lb. into your armor. While integrated, that weapon gains the hidden property. Additionally, you have advantage on Strength saving throws to avoid being disarmed.</p>



        <h4>Armstech Engineering</h4>

        <p>Those engineers who choose the Armstech Engineeering discipline focus on the skill of constructing and modifying blasters and vibroweapons.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Armstech Engineering:</strong> 3rd level</em><br>

        <p>You gain proficiency in armstech's implements, medium armor, martial blasters, and martial vibroweapons. Additionally, when you engage in crafting with armstech's implements, the rate at which you craft doubles.</p>

        <h3>Modified Weaponry</h3>

        <em><strong>Armstech Engineering:</strong> 3rd level</em><br>

        <p>You learn to modify one unenhanced weapon with which you are proficient utilizing your armstech experience. Over the course of a long rest, you can modify the weapon. You must have the weapon and armstech's implements in order to perform this modification.</p>

        Your modified weapon is enhanced, requires attunement, can only be used by you, and counts as a tech focus for your tech powers while you are attuned to it. Your modified weapon has 4 modification slots, and it gains more at higher levels, as shown in the Modification Slots column of the engineer table. For each modification installed in excess of your proficiency bonus, your tech point maximum is reduced by 1. Over the course of a long rest, you<br> can install, replace, or remove a number of modifications up to your Intelligence modifier (minimum of one).

        Some modification effects require saving throws. When you use such an effect from this class, the<br> DC equals your tech save DC.

        At 9th level, you can maintain two modified weapons. Each modified weapon has modification<br> slots as shown in the Modification Slots column of<br> the engineer table.

        <h3>Close Call</h3>

        <em><strong>Armstech Engineering:</strong> 3rd level</em><br>

        <p>When you make an attack roll with your modified weapon and miss, you can expend one use of your Potent Aptitude to attempt to turn that miss into a hit. Roll the die and add it to the attack roll. </p>

        <h3>Armstech's Strike</h3>

        <em><strong>Armstech Engineering:</strong> 6th level</em><br>

        <p>Once per round, when you deal damage to a creature with your modified weapon, you can increase the damage by 1d6. The damage is of the same type as the weapon's damage.</p>

        <p>The damage increases to 2d6 at 11th level and 3d6 at 17th level.</p>



        <h3>Targeting Matrix</h3>

        <em><strong>Armstech Engineering:</strong> 14th and 17th level</em><br>

        <p>When you cast a tech power that allows you to force creatures in an area to make a saving throw, you can instead make an attack roll with your modified weapon against a single target that would be in the range of the power. On a hit, the target suffers the effects as though they failed their saving throw. If the power would affect more than one creature, it instead affects only one.</p>

        <p>You can use this feature five times. You gain an additional use at 17th level. You regain any expended uses when you finish a long rest.</p>

        <h3>Armstech's Salvo</h3>

        <em><strong>Armstech Engineering:</strong> 18th level</em><br>

        <p>When you use your Targeting Matrix feature, and the tech power would affect more than one creature, you can instead attack each affected creature that would be in the range of the power. Make a separate attack roll for each target. On a hit, each target suffers the effects as though they failed their saving throw.</p>

        <img src='https://www.gmbinder.com/images/96P54SK.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:685px' />



        <h3>Armstech Modifications</h3>

        <p>If a modification has prerequisites, you must meet them to install it. You can install the modification at the same time that you meet its prerequisites.</p>

        <h4>Accuracy Focus</h4>

        <em><strong>Prerequisite:</strong> 5th level, Blaster</em><br>

        <p>You gain a +1 bonus to attack rolls made with this weapon. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Amplifying Barrel</h4>

        <em><strong>Prerequisite:</strong> 5th level, Blaster</em><br>

        <p>You gain a +1 bonus to damage rolls made with this weapon. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Bayonet</h4>

        <em><strong>Prerequisite:</strong> Blaster</em><br>

        <p>You affix a short blade to the barrel of your modified blaster weapon, allowing you to make a melee weapon attack with it. The blade is a vibroweapon weapon with the finesse property that you are proficient with, and deals 1d6 kinetic damage.</p>

        <h4>Burst Core</h4>

        <em><strong>Prerequisite:</strong> Blaster</em><br>

        <p>Your weapon gains the burst property, with a burst number equal to its reload number.</p>

        <h4>Booming Strikes</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You pack extra power into your modified weapon. Once per turn, when you hit with the weapon, you can deal an additional 1d6 damage. If you do so, the weapon makes a loud boom which can be heard 100 feet away. If you are hidden, Intelligence (Investigation) and Wisdom (Perception) checks made to locate you that rely on sound have advantage.</p>

        <h4>Celerity Oscillator</h4>

        <p>Once per turn, when you deal damage with your modified weapon, your walking speed increases by 10 feet until the start of your next turn, and the damaged creature can't make opportunity attacks against you for the rest of your turn.</p>

        <h4>Collapsible Frame</h4>

        <em><strong>Prerequisite:</strong> Vibroweapon</em><br>

        <p>You install an expandable hilt on your modified weapon. Your modified weapon gains the reach property.</p>

        <h4>Compensation Oscillator</h4>

        <em><strong>Prerequisite:</strong> Vibroweapon with the dexterity property</em><br>

        <p>You install a compensation oscillator in your modified vibroweapon, removing the dexterity property from it.</p>

        <h4>Contoured Grip </h4>

        <em><strong>Prerequisite:</strong> 5th level, Vibroweapon</em><br>

        <p>You gain a +1 bonus to attack rolls made with this weapon. This bonus increases to +2 at 9th level and +3 at 13th level.</p>



        <h4>Expanded Magazine</h4>

        <em><strong>Prerequisite:</strong> Blaster</em><br>

        <p>Your modified weapon can be more efficiently reloaded. You can reload your modified weapon once without using an action. You can't use this feature again until you reload the weapon with an action.</p>

        <h4>Flashlight</h4>

        <p>You affix a targeted light to your weapon. As a bonus action, you can toggle the light on or off. While on, your weapon sheds bright light in a 60-foot cone.</p>

        <h4>Harpoon Reel</h4>

        <p>You install a secondary firemode that launches a harpoon attached to a tightly coiled cord. With this harpoon, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d6 kinetic damage. This attack can target a surface, object, or creature.</p>

        <p>A creature struck by this attack is impaled by the harpoon. As an action, a creature can attempt to remove the harpoon. Removing the harpoon requires a Strength check. While the harpoon is stuck in the target, you are connected to the target by a 60 foot cable.</p>

        <p>While connected in this manner, you can use your bonus action to activate the reel, pulling yourself to the location if the target is your size or larger. A creature or object smaller than you is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>

        <p>Once you've used this feature, you can't use it again until you recover and reinsert the harpoon as an action.</p>

        <h4>Imbue Weapon</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You modify your weapon to carry a charge. Over the course of a short rest, you can cast an at-will tech power, channeling it into your weapon. The next time you hit with your weapon, the stored power is released. If the power would require an attack roll, make a tech attack roll. If the power would require a saving throw, the target must make the saving throw as normal. On a hit, or a failure, the target suffers the power's normal effects. </p>

        <h4>Improved Burst Core</h4>

        <em><strong>Prerequisite:</strong> 9th level, Burst Core</em><br>

        <p>Your weapon's burst number is reduced to half its reload number.</p>

        <h4>Integrated Magazine</h4>

        <em><strong>Prerequisite:</strong> Expanded Magazine</em><br>

        <p>Your modified weapon can be more efficiently reloaded. You can reload your modified weapon twice without using an action. You can't use this feature again until you reload the weapon with an action.</p>

        <h4>Jagged Oscillator</h4>

        <em><strong>Prerequisite:</strong> Vibroweapon</em><br>

        <p>When you critically hit with the weapon, you deal an additional 1d8 kinetic damage.</p>

        <h4>Keen Oscillator</h4>

        <em><strong>Prerequisite:</strong> 5th level, Jagged Oscillator</em><br>

        <p>Your weapon's critical hit range increases by 1.</p>



        <h4>Neutronium Edge</h4>

        <em><strong>Prerequisite:</strong> 5th level, Vibroweapon</em><br>

        <p>You gain a +1 bonus to damage rolls made with this weapon. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Overcharge Weapon</h4>

        <em><strong>Prerequisite:</strong> 11th level, Booming Strikes</em><br>

        <p>You gain the ability to channel your tech power to enhance your weapon's damage. You can expend one tech slot to deal additional damage to the target. The extra damage is 1d6 for a 1st-level tech slot, plus 1d6 for each slot level higher than 1st, to a maximum of 5d6. The damage is the same type as the weapon damage. If you also use your Booming Strikes with an attack, you add this damage to the extra damage of your Booming Strikes.</p>

        <h4>Power Loop</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>When you hit with the weapon, you can choose to channel the energy generated, gaining temporary hit points equal to half the damage dealt.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h4>Recoil Dampener</h4>

        <em><strong>Prerequisite:</strong> Blaster with the strength property</em><br>

        <p>You install a recoil dampener in your modified blaster, removing the strength property from it.</p>

        <h4>Returning Weapon Guard</h4>

        <em><strong>Prerequisite:</strong> Vibroweapon</em><br>

        <p>You install a retractible chain in your modified vibroweapon. If the weapon does not already have the thrown property, it gains it with a range of 20/60. Additionally, it gains the returning property.</p>

        <h4>Screening Weapon</h4>

        <p>You modify your modified weapon with a sound dampening module. When you make a weapon attack with your weapon while hidden, Investigation and Perception checks made to locate you that rely on sound have disadvantage.</p>

        <h4>Shock Absorber</h4>

        <p>You add a reclamation device to your modified weapon to gather energy from the surroundings when it is present. While wielding your modified weapon, you can cast the <em>absorb energy</em> tech power and the power's extra damage applies to both melee and ranged weapon attacks.</p>

        <h4>Siege Weapon</h4>

        <p>You modify your weapon to be more effective against barriers. Your weapon deals double damage against structures.</p>

        <h4>Shocking Harpoon</h4>

        <em><strong>Prerequisite:</strong> 9th level, Harpoon Reel</em><br>

        <p>After hitting a creature with the harpoon fire mode, you can use the connection to deliver an at-will tech power. As a bonus action, you can cast an at-will tech power at the target with a range of touch. If the power </p>



        <p>requires an attack roll, you have advantage. If the target requires a saving throw, the target has disadvantage. </p>

        <p>Once you've used this feature, you can't use it again until you recover the harpoon.</p>

        <h4>Shocking Oscillator</h4>

        <em><strong>Prerequisite:</strong> 9th level, Vibroweapon</em><br>

        <p>When you hit with the weapon, you can create an electronic burst. Each creature in a 15-foot cone centered on the creature you hit must make a Dexterity saving throw against your tech save DC, taking 1d8 lightning damage on a failed save or half as much on a successful one.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h4>Snap Fire</h4>

        <em><strong>Prerequisite:</strong> 9th level, Blaster</em><br>

        <p>You modify your modified blaster weapon for quick shots. You can use your reaction to take a opportunity attack with your modified weapon if an enemy comes within 10 feet of you. You have disadvantage on this attack. </p>

        <h4>Staggering Oscillator</h4>

        <em><strong>Prerequisite:</strong> Vibroweapon</em><br>

        <p>When you hit with the weapon, you can force the target to make a Strength saving throw. On a failed save, the creature is pushed back 10 feet and knocked prone.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Tracker</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You add a tracking mechanism to your modified weapon. The tracker has 3 charges. As a bonus action you can use 1 charge to cast <em>target lock</em>. As an action you can use 2 charges to cast <em>detect invisibility</em>.</p>

        <p>The tracker regains all expended charges after a long rest.</p>

        <h4>Truelight</h4>

        <em><strong>Prerequisite:</strong> 11th level, Flashlight</em><br>

        <p>You modify your flashlight with a toggle allowing you to briefly gain enhanced sight. As a bonus action, you can activate the truesight feature of your flashlight. When toggled on, for the next minute your flashlight now automatically dispel illusions and can detect invisibility, as with truesight.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Venomous Oscillator</h4>

        <em><strong>Prerequisite:</strong> 9th level, Vibroweapon</em><br>

        <p>As a bonus action, you can coat your weapon in a thin layer of poison for 1 minute. The next time you hit with the weapon, the creature must make a Constitution saving throw against your tech save DC. On a failed save, a creature takes 1d10 poison damage and becomes poisoned for 1 minute.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>



        <h4>Gadgeteer Engineering</h4>

        <p>Those engineers who choose the Gadgeteer discipline focus on the ability to craft reusable consumables and items that augment and complement their techcasting abilities.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Gadgeteer Engineering:</strong> 3rd level</em><br>

        <p>You gain proficiency in gadgeteer's implements. Additionally, when you engage in crafting with gadgeteer's implements, the rate at which you craft doubles.</p>

        <h3>Gadgeteer Harness</h3>

        <em><strong>Gadgeteer Engineering:</strong> 3rd level</em><br>

        <p>You learn to create and modify adventuring gear utilizing your gadgeteer experience. Over the course of a long rest, you can create your modified gadgeteer harness. You must have gadgeteer's implements in order to perform this modification.</p>

        <p>Your gadgeteer harness is enhanced, requires attunement, can only be used by you, and counts as a tech focus for your tech powers while you are attuned to it. Your gadgeteer harness has 4 modification slots to which you can affix gadgets, and it gains more at higher levels, as shown in the Modification Slots column of the engineer table. For each modification installed in excess of your proficiency bonus, your tech point maximum is reduced by 1. Over the course of a long rest, you can install, replace, or remove a number of modifications up to your Intelligence modifier (minimum of one).</p>

        <p>Some modification effects require saving throws. When you use such an effect from this class, the DC equals your tech save DC.</p>



        <h3>Projected Barrier</h3>

        <em><strong>Gadgeteer Engineering:</strong> 3rd level</em><br>

        <p>As a bonus action while wearing your gadgeteer harness, you can expend a use of your Potent Aptitude to project a barrier on a friendly creature you can see within 30 feet. A creature can only have one barrier active at a time.</p>

        <h4>Environmental Barrier</h4>

        <p>You project an environmental barrier that lasts until the end of your next short or long rest. The barrier has a number of hit points equal to the amount rolled on your Potent Aptitude die + your engineer level. Whenever a creature with this barrier takes damage (one of acid, cold, fire, force, lightning, necrotic, poison, psychic, or sonic, chosen by you when you activate the effect), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, the creature take any remaining damage. </p>

        <h4>Physical Barrier</h4>

        <p>You project a physical barrier that lasts until the end of your next short or long rest. The barrier has a number of hit points equal to the amount rolled on your Potent Aptitude die + half your engineer level. Whenever a creature with this barrier takes damage (one of energy, ion, or kinetic, chosen by you when you activate the effect), the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, the creature take any remaining damage. </p>

        <h3>Versatile Direction</h3>

        <em><strong>Gadgeteer Engineering:</strong> 6th, 9th, 13th, and 17th level</em><br>

        <p>You can take a second bonus action on each of your turns. You can use this feature three times. You gain an additional use at 9th, 13th, and 17th level. You regain all expended uses when you finish a long rest.</p>

        <h3>Reinforced Barriers</h3>

        <em><strong>Gadgeteer Engineering:</strong> 14th level</em><br>

        <p>When you cast a tech power while you have a barrier active, you can restore hit points to the barrier, provided it is within 30 feet of you. You restore a number of hit points equal to twice the power's level, or 1 hit point for an at-will power. This can't increase a barrier's hit points above its initial hit points. If you have multiple barriers active, you can divide these hit points between them as you see fit.</p>

        <h3>Adaptive Barrier</h3>

        <em><strong>Gadgeteer Engineering:</strong> 18th level</em><br>

        <p>When a creature who has one of your barriers within 30 feet of you that you can see takes damage, and that damage is of a type that could be affected by that barrier, you can use your reaction to grant them resistance to the triggering damage. If that damage is the same type as the barrier's chosen damage, you instead grant them immunity. Whether resistance or immunity, the barrier immediately drops to 0 hit points.</p>

        <img src='https://www.gmbinder.com/images/rMiCs3H.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:248px' />



        <h3>Gadgeteer Modifications</h3>

        <p>If a modification has prerequisites, you must meet them to install it. You can install the modification at the same time that you meet its prerequisites.</p>

        <h4>Advanced Grounding System</h4>

        <em><strong>Prerequisite:</strong> 13th level, Prototype Grounding System</em><br>

        <p>While wearing your gadgeteer harness you have immunity to lightning damage.</p>

        <h4>Auto-Injection Regenerator</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You install a special kolto injector into your gadgeteer harness that can inject you with kolto in response to pain. When you take damage, you can use your reaction and expend a Hit Die to regain health as long as the damage would not reduce your hit points to 0.</p>

        <h4>Autothrusters</h4>

        <em><strong>Prerequisite:</strong> Jet Pack</em><br>

        <p>You can take the Dash and Disengage actions as a bonus action while your jet pack is active.</p>

        <h4>Climbing Gloves</h4>

        <p>You craft a set of gloves with a powerful assisted grip. While wearing these gloves, you have a climbing speed of 20 feet, and you have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <h4>Darkvision Goggles</h4>

        <p>You craft a pair of sight-enhancing goggles. While wearing these goggles, you have darkvision to a range of 60 feet. If you already have darkvision, this modification increases its range by 30 feet.</p>

        <h4>Extended Tank</h4>

        <em><strong>Prerequisite:</strong> 5th level, Jet Pack</em><br>

        <p>Your jet pack now lasts up to 10 minutes when activated.</p>

        <h4>Flame Vents</h4>

        <em><strong>Prerequisite:</strong> 9th level, Jet Pack</em><br>

        <p>You learn the <em>flame sweep</em> tech power and can cast it at first level without using tech points. Once you have used this ability, you cannot use it again until you finish a short or long rest.</p>

        <p>Additionally, while your jet pack is active, you can cast <em>flame sweep</em> using your bonus action instead of your action.</p>

        <h4>Frailcasting Inhibitor</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to the tech save DC of powers you cast that requires a Strength or Constitution saving throw. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Grounding System</h4>

        <p>While wearing your gadgeteer harness you are immune to the shocked condition.</p>

        <h4>Integrated Amplifier</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to melee tech attack rolls. This bonus increases to +2 at 9th level and +3 at 13th level.</p>



        <h4>Integrated Rangefinder</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to ranged tech attack rolls. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Intelligence Core Override</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You can cast the <em>override interface</em> tech power at 5th level without spending tech points.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h4>Jet Pack</h4>

        <p>You integrate a jet pack into your gadgeteer harness to grant you temporary, limited flight. Activating or deactivating the jets requires a bonus action and, while active, you have a flying speed of 30 feet. </p>

        <p>The jet pack last for 1 minute before deactivating. Once the jets have been activated, they can't be activated again until you finish a short or long rest.</p>

        <p>Your jet pack's speed increases to 40 feet at 5th level, 50 feet at 9th level, 60 feet at 13th level, 70 feet at 17th level, and 80 feet at 20th level.</p>

        <h4>Mechanical Arm</h4>

        <p>You create a mechanical arm which mounts to your shoulder, which you can use independently. You can only gain the benefit of items held by two of your arms at any given time.</p>

        <p>You can choose this modification twice.</p>

        <h4>Mimicker</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You create a device that attaches to your gadgeteer harness. Your mimicker casts a shadow that makes you appear to be standing in a place near your actual location, causing any creature to have disadvantage on attack rolls against you. If you take damage, the property ceases to function for 1 minute. Your mimicker is suppressed while you are incapacitated, restrained, or otherwise unable to move.</p>

        <h4>Miniaturized Hydraulics</h4>

        <p>Your gadgeteer harness can store 20 pounds of equipment without adding to your encumbrance.</p>

        <h4>Oil Spill</h4>

        <p>As an action, you can cast the <em>oil slick</em> tech power without expending tech points. When you cast the power in this way, the oil will remain in place for the full duration of the power.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Powered Grappling Hook</h4>

        <em><strong>Prerequisite:</strong> 9th level, Wrist-Mounted Grappling Hook</em><br>

        <p>While your wrist-mounted grappling hook is deployed, when you cast a tech power with a range of touch, your hook can deliver the power as if it had cast it.</p>

        <h4>Prototype Grounding System</h4>

        <em><strong>Prerequisite:</strong> 9th level, Grounding System</em><br>

        <p>While wearing your gadgeteer harness you have resistance to lightning damage.</p>



        <h4>Rendcasting Inhibitor</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to the tech save DC of powers you cast that requires a Dexterity or Intelligence saving throw. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Quick Start Engine</h4>

        <em><strong>Prerequisite:</strong> 5th level, Jet Pack</em><br>

        <p>You can now activate your Jet Pack as an object interaction rather than as a bonus action.</p>

        <h4>Recycled Adrenals</h4>

        <p>You can augment a single adrenal to regain its charge. This adrenal can only be used by you, and it can only affect you. Once you've used this adrenal, you can't use it again until you finish a long rest.</p>

        <h4>Recycled Explosives</h4>

        <p>You can augment a single explosive to regain its charge. This explosive can only be used by you, and it uses your tech save DC instead of its own, unless its own DC would be higher. Once you've used this explosive, you can't use it again until you finish a long rest.</p>

        <h4>Recycled Stimpacs</h4>

        <p>You can augment a single stimpac to regain its charge. This stimpac can only be used by you, and it can only affect you. Once you've used this stimpac, you can't use it again until you finish a long rest.</p>

        <h4>Sentry Turret</h4>

        <p>You learn how to craft small sentry turrets shaped like globes that can adhere to any surface. As an action or bonus action (your choice), you can throw a sentry to a point you can see within range (30 feet + your Strength modifier x 5). At the end of each of your turns, a deployed sentry automatically targets a hostile creature within 10 feet of it. If multiple targets are available, one is chosen at random. The target must make a Dexterity saving throw. On a failed save, it takes 1d4 energy damage and gains 1 slowed level until the end of your next turn. If a creature would be targeted by more than one of these sentries, it only makes this saving throw once, taking an additional d4 damage for each sentry beyond the first.</p>

        <p>The sentries have 1 hit point, an armor class of 10, and can be repaired over the course of a long rest. Each sentry lasts for 1 minute before deactivating. You can maintain a number of sentries equal to your Intelligence modifier. Once a sentry has been activated, it can't be activated again until you finish a short or long rest.</p>

        <h4>Shocking Hook</h4>

        <em><strong>Prerequisite:</strong> 9th level, Wrist-Mounted Grappling Hook</em><br>

        <p>After hitting a creature with your grappling hook, you can use the connection to deliver an at-will tech power. As a bonus action, you can cast an at-will tech power at the target with a range of touch. If the power requires an attack roll, you have advantage. If the target requires a saving throw, the target has disadvantage. </p>

        <p>Once you've used this feature, you can't use it again until you recover the hook.</p>

        <h4>Stealth Field Generator</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You create an augmented belt that functions as a portable, personal cloaking device. Activating or deactivating the generator requires a bonus action and, while active, you have advantage on Dexterity (Stealth) ability checks that rely on sight. The generator lasts for 1 minute. This effect ends early if you make an attack or cast a force- or tech- power.</p>

        <p>Once the belt has been activated, it can't be activated again until you finish a short or long rest.</p>

        <h4>Shocking Barrier</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You enhanced your barriers. Whenever a creature with one of your barriers active takes damage from a creature within 5 feet of it, the damaged creature can roll your Potent Aptitude die, dealing the result of the die as lightning damage to the creature that damaged it.</p>

        <h4>Truesight Goggles</h4>

        <em><strong>Prerequisite:</strong> 11th level, Darkvision Goggles</em><br>

        <p>You modify your goggles with a toggle allowing you to briefly gain enhanced sight. As a bonus action, you can activate the truesight feature of your goggles. When toggled on, for the next minute your goggles now automatically dispel illusions and can detect invisibility, as with truesight.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Weapon Integration</h4>

        <p>You can integrate a single weapon that weighs no more than 8 lb. into your gadgeteer harness. While integrated, that weapon gains the hidden and fixed properties. </p>

        <h4>Withercasting Inhibitor</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain a +1 bonus to the tech save DC of powers you cast that requires a Wisdom or Charisma saving throw. This bonus increases to +2 at 9th level and +3 at 13th level.</p>

        <h4>Wrist-Mounted Grappling Hook</h4>

        <p>You craft a wrist-mounted grappling hook weapon attached to a tightly coiled cord. With this contraption, you can make a ranged weapon attack with a range of 30/60. On a hit, it deals 1d4 kinetic damage. This attack can target a surface, object, or creature.</p>

        <p>A creature struck by this attack is impaled by the hook. As an action, a creature can attempt to remove the hook. Removing the hook requires a Strength check. While the hook is stuck in the target, you are connected to the target by a 60 foot cable.</p>

        <p>While the hook is deployed, you can use your bonus action to activate the reel, pulling yourself to the location if the target is your size or larger. A creature or object smaller than you is pulled to you. Alternatively, you can opt to release the cable (no action required).</p>

        <p>Once you've used this feature, you can't use it again until you recover and reinsert the hook as an action.</p>



        <h4>Unstable Engineering</h4>

        <p>Those engineers who choose the Unstable Engineering discipline create and use untested combinations, resulting in powerful�and often unpredictable�effects.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Unstable Engineering:</strong> 3rd level</em><br>

        <p>You gain proficiency in your choice of artisan's implements. Additionally, when you engage in crafting with tinker's implements, the rate at which you craft doubles.</p>

        <h3>Modified Tinkercannon</h3>

        <em><strong>Unstable Engineering:</strong> 3rd, 9th, and 17th level</em><br>

        <p>You learn to enhance your tinker's implements with unstable science, modifying them into a harness with a cannon. Over the course of a long rest, you can modify your tinker's implements to create a tinkercannon. You must have tinker's implements in order to perform this modification.</p>

        <p>Whenever you cast a tech power of 1st level or higher while wielding your tinkercannon, you risk unexpected complications. Your GM can have you roll a d20. If you roll a 1, roll on the Unstable Engineering Surge table to create a random effect. </p>

        Additionally, your tinkercannon come equipped with four overrides, and they gain more at higher levels, as shown in the Modification Slots column of the engineer table. Each time you trigger an Unstable Engineering Surge, you can use an override to reroll the percentile dice. You must use the new result, you can only do this once per surge, and each time you do so in excess<br> of your proficiency bonus (resetting on a long<br> rest) your maximum tech points is reduced by<br> 1 until you complete a long rest. You regain all expended overrides when you complete a long<br> rest.

        <h3>Unstable Volley</h3>

        <em><strong>Unstable Engineering:</strong> 3rd, 9th,<br> &emsp;and 17th level</em><br>

        While wielding your tinkercannon,<br> as a bonus action you can expend one<br> use of your Potent Aptitude to launch<br> a volley of unstable energy at a<br> surface located within 30 feet of<br> you that you can see. This energy<br> adheres to the surface for 1 minute,<br> after which it erupts. As a part of<br> this bonus action, or as a bonus<br> action on a following turn, you<br> can cause the energy to erupt<br> early. Each creature within 5<br> feet of it must make a<br> Dexterity saving throw against<br> your tech save DC. A creature<br> takes 1d6 lightning damage<br> on a failed save, or half as much<br> on a successfu one. 

        The range at which you can launch your<br> volley increases to 60 feet at 9th level, and<br> 120 feet at 17th level.



        <p>&emsp;This damage increases when you reach certain levels in this class, increasing to 2d6 at 5th level, 3d6 at 11th level, and 4d6 at 17th level.</p>

        <h3>Creative Destruction</h3>

        <em><strong>Unstable Engineering:</strong> 6th level</em><br>

        <p>You can add your governing ability modifier (minimum of +1) to any damage you deal with tech powers and class features that don't already include that modifier. If the tech power or class feature would damage multiple creatures, you can only deal this additional damage to one of them.</p>

        <p>If you choose to deal this additional damage, your GM can have you roll on the Unstable Engineering Surge table.</p>

        <h3>Experimental Overrides </h3>

        <em><strong>Unstable Engineering:</strong> 14th level</em><br>

        <p>You gain a modicum of control over your surges. Whenever you roll on the Unstable Engineering Surge table and use one of your overrides, you can choose either total.</p>

        <h3>Engineering Bombardment</h3>

        <em><strong>Unstable Engineering:</strong> 18th level</em><br>

        <p>The harmful energies of your tech powers and class features intensify. When you roll damage for a tech power or class feature and roll the highest number possible on any of the dice, you can roll it again and use both results. You can only use this ability once per tech power or class feature.</p>

