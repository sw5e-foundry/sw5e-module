        <h3>Biology and Appearence</h3>

        <p>Due to Dorin having a unique atmosphere composed of helium and a gas unique to their world, the kel dors are forced to wear an antiox breath mask and protective goggles whenever in atmospheres of a different composition. Without their protective goggles, kel dors were considered effectively blind when away from Dorin. They were also able to survive in the vacuum of space for a short time, though it was unknown exactly how long they could withstand it.</p>

        <p>The kel dors also have heightened reflexes, a result of the extrasensory organs in their heads. They are typically quick and wise. </p>

        <h3>Society and Culture</h3>

        <p>Kel dors are noted for their simple approach to justice, and they typically see moral issues in black and white. On the one hand, the kel dor are noted for their hospitality; they would never turn away a stranger in need. Yet, kel dors are not averse to taking the law into their own hands, and have no compunctions about putting to death a thief who was merely stealing to feed himself.</p>

        <p>Kel dor Force-sensitives are often trained as Baran Do Sages, who have an honored place in kel dor culture. They often serve as advisers to rich and powerful kel dor families. Wars and disasters have been averted simply by the insight of a Baran Do Sage.</p>

        <h3>Names</h3>

        <p>Kel dor names are base on sound generated by Dorin's unique atmosphere. Surnames are based on ancient family trades.</p>

        <p><strong>Male Names.</strong> Bil, I'zers, Nullo, Taciss, Zaln</p>

        <p><strong>Female Names.</strong> Arri'ku, Bhi're, Chu, So'ro, Thirza</p>

        <p><strong>Surnames.</strong> Andugai, Borak, Haimnech, Vitchess</p>



        <h3>Kel Dor Traits</h3>

        <p>As a kel dor, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Wisdom score increases by 2, and your Dexterity score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Kel dor reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Kel dors' structured nature causes them to tend toward lawful balanced, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Kel dor typically stand around 6 feet tall and weigh about 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your natural evolution allows you to see what others do not in dim and dark conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Foreign Biology.</em></strong> You cannot breathe oxygen. The kel dors have created a breathing apparatus to negate the negative effects of living in an oxygen rich environment, but if your mask is removed while you are in such an environment, you lose consciousness.</p>

        <p><strong><em>Life in the Void.</em></strong> You can survive for one hour within the vacuum of space. You have resistance to Necrotic damage.</p>

        <p><strong><em>Telepathy.</em></strong> You can communicate telepathically with creatures within 30 feet of you. You must share a language with the target in order to communicate in this way. </p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Kel Dor. </p>

