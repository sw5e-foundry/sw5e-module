d>+6</td><td>Sentinel Ideals (four manifestations)</td><td>32</td><td>51</td><td>7th</td><td>d12</td></tr><tr><td>18th</td><td>+6</td><td>Calling feature</td><td>33</td><td>54</td><td>7th</td><td>d12</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>34</td><td>57</td><td>7th</td><td>d12</td></tr><tr><td>20th</td><td>+6</td><td>Center of the Force</td><td>35</td><td>60</td><td>7th</td><td>d12</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a sentinel, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per sentinel level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your Constitution modifier per sentinel level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor</li><li><strong>Weapons:</strong> Simple vibroweapons, simple lightweapons, chakram, doubleblade, doublesaber, doubleshoto, doublesword, hidden blade, lightfoil, light ring, saberwhip, techblade vibrorapier, vibrowhip</li><li><strong>Tools:</strong> One specialist's kit of your choice</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Dexterity, Charisma</li><li><strong>Skills:</strong> Choose three from Acrobatics, Animal Handling, Insight, Intimidation, Perception, Persuasion, Piloting, Stealth, and Technology</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> two simple lightweapons or vibroweapons or <em>(b)</em> one lightweapon or vibroweapon with which you are proficient</li><li><em>(a)</em> a dungeoneer's pack or <em>(b)</em> an explorer's pack</li><li>A specialist's kit with which you are proficient</li><li>A combat suit and a light physical shield</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Sentinel</td><td>6d4 x 100 cr</td></tr></tbody></table>



        <h3>Forcecasting</h3>

        <em><strong>Sentinel:</strong> 1st level</em><br>

        <p>In your meditations on the force, you have learned powers, fragments of knowledge that imbue you with an abiding force ability. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 7 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the sentinel table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your sentinel level x 3, as shown in the Force Points column of the sentinel table, + your Wisdom or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the sentinel table.</p>

        <p>You may only cast force powers at 5th, 6th, and 7th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Forcecasting Ability</h4>

        <p>Your forcecasting ability varies based on the alignment of the powers you cast. You use Wisdom for light side powers, Charisma for dark side powers, and Wisdom or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>

        <h3>Led by the Force</h3>

        <em><strong>Sentinel:</strong> 1st level</em><br>

        <p>You can add half your proficiency bonus to any ability check you make that doesn't already include your proficiency bonus.</p>

        <h3>Force-Empowered Self</h3>

        <em><strong>Sentinel:</strong> 2nd level</em><br>

        <p>Your training allows you to harness the mystical energy of the Force throughout your body. You learn three effects: Deflection, Double Strike, and Slow Time. Each effect costs 1 point and uses a d4, which changes as you gain sentinel levels, as shown in the Kinetic Combat column of the sentinel table. You can only use each effect once per round.</p>



        <h4>Deflection</h4>

        <p>When you are the target of an attack, you can roll a Kinetic Combat die and add it to your AC against one attack before the start of your next turn (no action required). You can do so before or after the attack is made, but you must choose to do so before the GM determines if the attack hits.</p>

        <h4>Double Strike</h4>

        <p>When you hit a creature with a weapon attack, you can roll a Kinetic Combat die and deal additional damage of the same type equal to the amount rolled.</p>

        <h4>Slow Time</h4>

        <p>When you move on your turn, you can roll a Kinetic Combat die to increase your speed by 5 x the amount rolled until the end of your turn.</p>

        <h3>Sentinel Ideals</h3>

        <em><strong>Sentinel:</strong> 2nd, 6th, 9th, 11th, and 17th level</em><br>

        <p>You adopt ideals that exemplify your bond with the Force. You adopt two ideals of your choice, as detailed at the end of the class description. You adopt an additional ideal at 6th and 11th level. </p>

        <p>You can manifest your ideals a combined total of twice. You gain an additional use at 9th and 17th level. You regain all expended uses when you finish a long rest. </p>

        <h3>Sentinel Calling</h3>

        <em><strong>Sentinel:</strong> 3rd, 7th, 13th, and 18th level</em><br>

        <p>You choose a sentinel calling, which is detailed at the end of the class description. </p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Sentinel:</strong> 4th, 8th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Extra Attack</h3>

        <em><strong>Sentinel:</strong> 5th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h3>Battle Readiness</h3>

        <em><strong>Sentinel:</strong> 10th level</em><br>

        <p>You have fully learned how to meld your physical self with the Force. When you take the Dodge or Disengage actions, or use your action to cast a force power, you can make one melee weapon attack as a bonus action.</p>

        <h3>Enlightened Evasion</h3>

        <em><strong>Sentinel:</strong> 15th level</em><br>

        <p>When you are subjected to an effect that forces you to make a saving throw, you can spend 2 force points to add your Wisdom or Charisma modifier (your choice, minimum of one) to the saving throw if doesn't already include that modifier. If you do so, you instead take no damage if you succeed on the saving throw, and only half damage if you fail. You can wait until after you roll the d20 to use this feature, but you must decide before the GM says it succeeds or fails.</p>



        <h3>Center of the Force</h3>

        <em><strong>Sentinel:</strong> 20th level</em><br>

        <p>You are perfectly centered with the Force. Your Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for those scores increases by 2.</p>

        <p>Additionally, once per turn, when you would roll a Kinetic Combat die, you can instead choose the maximum.</p>

        <h3>Sentinel Ideals</h3>

        <p>The ideals are presented in alphabetical order. You can't benefit from a Sentinel Ideal option more than once, even if you later get to choose again.</p>

        <h4>Ideal of the Agile</h4>

        <p>You gain a swimming speed and a climbing speed equal to your walking speed. When you make a long jump, you can cover a number of feet up to twice your Wisdom or Charisma score (your choice). When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Wisdom or Charisma modifier (your choice).</p>

        <p>Additionally, as a bonus action, you can manifest this ideal in a brief surge of energy. For the next minute, opportunity attacks against you are made with disadvantage.</p>

        <h4>Ideal of the Artisan</h4>

        <p>Choose one of your skill or tool proficiencies. When you make an ability check with the chosen skill or tool, you can add half your Wisdom or Charisma modifier (your choice, minimum of one) to any check you make that doesn't already include that modifier.</p>

        <p>Additionally, as an action, you can manifest this ideal in a brief surge of energy. For the next 10 minutes, the bonus increases to your Wisdom or Charisma modifier, and you can choose a second skill or tool to extend this feature to.</p>

        <h4>Ideal of the Contender</h4>

        <p>Your unarmed strike damage increases by one step (from 1 to d4, d4 to d6, or d6 to d8), and your unarmed strikes gain the finesse property.</p>

        <p>Additionally, as a bonus action, you can manifest this ideal in a brief surge of energy. For the next minute, your unarmed strikes count as enhanced for the purpose of overcoming resistance and immunity to unenhanced attacks and damage, and you can use your Wisdom or Charisma modifier (your choice) instead of Strength for checks made to grapple a target or escape a grapple.</p>

        <h4>Ideal of the Fighter</h4>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting style options, detailed in Chapter 6. </p>

        <p>Additionally, as a bonus action, you can manifest this ideal in a brief surge of energy. For the next minute, you know the fighting mastery that corresponds with the fighting style you chose with this feature. If you already know that fighting mastery, you instead learn another of your choice for the duration.</p>



        <h4>Ideal of the Hunter</h4>

        <p>You gain darkvision out to a range of 60 feet. If you already have darkvision, this ideal increases its range by 30 feet.</p>

        <p>Additionally, as a bonus action, you can manifest this ideal in a brief surge of energy. For the next minute, you can see normally in enhanced darkness, and you gain blindsight to 10 feet.</p>

        <h4>Ideal of the Steadfast</h4>

        <p>When you would make a melee weapon attack roll, you can instead force the target to make a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon). If you would have advantage on your attack roll, the creature instead has disadvantage on their saving throw, and if you would have disadvantage on your attack roll, the creature instead has advantage on their saving throw. On a failed save, the target takes normal weapon damage and is subjected to any additional effects that would occur on a hit.</p>

        <p>Additionally, as a bonus action, you can manifest this ideal in a brief surge of energy. For the next minute, when a creature succeeds on the saving throw, they take half the normal weapon damage, and when a creature rolls a 1 on the saving throw, they treat the damage as if you had rolled the maximum.</p>

        <h4>Ideal of the Titan</h4>

        <p>You gain proficiency in medium armor.</p>

        <p>Additionally, as a bonus action, you can manifest this ideal in a brief surge of energy. For the next minute, you have advantage on ability checks and attack rolls that would forcefully move another creature, and the distance they would be moved increases by 5 feet.</p>

        <h4>Ideal of the Tranquil</h4>

        <p>When you finish a short or long rest, you gain a number of temporary force points equal to half your Wisdom or Charisma modifier (your choice, minimum of one). When you would spend a force point while you have temporary force points, the temporary force points are spent first. All temporary force points are lost at the end of your next short or long rest.</p>

        <p>Additionally, as an action, you can manifest this ideal in a brief surge of energy. You regain a number of force points equal to half your Wisdom or Charisma modifier (your choice, minimum of one).</p>

        <h4>Ideal of the Vigorous</h4>

        <p>When you roll a Hit Die to regain hit points, you may use your Wisdom or Charisma modifier in place of your Constitution modifier when determining the number of hit points you regain.</p>

        <p>Additionally, as an action, you can manifest this ideal in a brief surge of energy. You gain a number of temporary hit points equal to half your sentinel level + your Wisdom or Charisma modifier (your choice, minimum of one).</p>

        <h2>Sentinel Callings</h2>

        <p>Different sentinels select different callings, called Paths, to follow as they hone their powers. Your calling grants you features at 3rd, 7th, 13th, and 18th level.</p>



        <h4>Path of Aggression</h4>

        <p>From the murky depths of the dark side comes seething fury. Those sentinels who follow the Path of Aggression charge their weapon with lightning, culminating in a massive discharge that can ravage their opponents.</p>

        <h3>Voltaic Slash</h3>

        <em><strong>Path of Aggression:</strong> 3rd level</em><br>

        <p>Starting when you choose this calling at 3rd level, you learn the <em>lightning charge</em> force power, which does not count against your total powers known. Additionally, you can use Wisdom or Charisma as your forcecasting ability for it, and when you deal lightning damage with the <em>lightning charge</em> force power, you deal additional lightning damage equal to half your Wisdom or Charisma modifier (your choice, minimum of one) if it doesn't already include that modifier.</p>

        <h3>Thunderous Momentum</h3>

        <em><strong>Path of Aggression:</strong> 3rd level</em><br>

        <p>Your stride becomes nigh unbreakable. You are immune to the shocked condition, and each slowed level only reduces your speed by 5 feet, unless it would reduce your speed to 0.</p>



        <h3>Entropic Rush</h3>

        <em><strong>Path of Aggression:</strong> 7th level</em><br>

        <p>You've learned to move with speed and precision, discharging your lightning in a massive burst. When you move at least half your speed before casting <em>lightning charge</em>, you make the attack roll with advantage. Additionally, on a hit, the lightning can leap a second time, to a third creature within range or back to the first creature.</p>

        <h3>Living Current</h3>

        <em><strong>Path of Aggression:</strong> 13th level</em><br>

        <p>You've learned to channel the damage done to you to enhance your strikes. The first time you deal damage on your turn, if you took damage since the start of your last turn, you can deal additional lightning damage equal to your Kinetic Combat die + half the amount of damage taken.</p>

        <p>You can use this feature five times. You gain an additional use at 17th level. You regain all expended uses when you finish a short or long rest.</p>

        <h3>Retaliatory Strike</h3>

        <em><strong>Path of Aggression:</strong> 18th level</em><br>

        <p>When a creature hits you with an attack while within 5 feet of you, you can use your reaction to cast the <em>lightning charge</em> force power, targeting them.</p>

        <div class="sw5e-book-image-row"><img src='https://www.gmbinder.com/images/DSR5EWH.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:730px' />



        <img src='https://www.gmbinder.com/images/7vgeb0Z.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:870px' /></div><br>

        <h4>Path of Focus</h4>

        <p>The ways of the Force can reveal themselves to a sentinel through intense concentration and, most importantly, focus. Those sentinels who follow the Path of Focus use debilitating bursts of lightsaber strikes and force powers to exhaust their foes, crushing any hopes they had of mounting an effective defense.</p>

        <h3>Focused Burst</h3>

        <em><strong>Path of Focus:</strong> 3rd level</em><br>

        <p>You learn the <em>burst</em> force power, which does not count against your total powers known. Additionally, you can use The Double Strike Force-Empowered Self options when you cast it as your action. If more than one creature would be affected, only one creature takes the additional damage. Finally, you add your Wisdom or Charisma modifier (your choice, minimum of +1) to damage rolls with it, and creatures that succeed on their saving throw take half damage, instead of none.</p>

        <h3>Blade Dance</h3>

        <em><strong>Path of Focus:</strong> 3rd level</em><br>

        <p>When you deal damage to a creature within 5 feet of you, you can move up to 10 feet without provoking opportunity attacks.</p>

        <h3>Blade Storm</h3>

        <em><strong>Path of Focus:</strong> 7th level</em><br>

        <p>Your bursts become even more overwhelming. Once on your turn, when a creature takes damage from you twice, you can immediately make one additional attack against that creature (no action required). This attack uses your Kinetic Combat die instead of the weapon's damage die.</p>

        <h3>Focused Flow</h3>

        <em><strong>Path of Focus:</strong> 13th level</em><br>

        <p>Whenever you use a Force-Empowered Self feature, you may instead expend no force points and roll a d4 in place of your Kinetic Combat die.</p>

        <h3>Master Strike</h3>

        <em><strong>Path of Focus:</strong> 18th level</em><br>

        &emsp;&emsp;At 18th level, your bursts can overpower even<br>&emsp;&emsp;&emsp;&emsp; the fiercest of foes. Once on your turn,<br>&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp; when a creature takes damage from <br>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp; you three times, you can force it to<br>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp; make a Constitution saving throw<br>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp; against your universal force<br>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp; save DC. On a failed save,<br>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; it becomes stunned<br>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;&nbsp; until the end of its<br>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; next turn.



        <h4>Path of the Forceblade</h4>

        <p>Some few master their weapon in ways that differ from their peers. Those sentinels who follow the Path of the Forceblade channel the Force into their weapon, forming a unique connection that grants you greater control over the weapon; it becomes an extension of their will.</p>

        <h3>Phasethrow</h3>

        <em><strong>Path of the Forceblade:</strong> 3rd level</em><br>

        <p>You learn the <em>saber throw</em> force power, which does not count against your total powers known. Additionally, you no longer have disadvantage on the attack roll with it if you are within 5 feet of a hostile creature, and you can use the Double Strike Force-Empowered Self options when you cast it as your action and hit a target. Finally, when you hit a creature with the <em>saber throw</em> force power, you deal additional damage equal to half your Wisdom or Charisma modifier (your choice, minimum of +1) if it doesn't already include that modifier.</p>

        <h3>Forceblade Bond</h3>

        <em><strong>Path of the Forceblade:</strong> 3rd level</em><br>

        <p>You learn how to bond with a light- or vibro-weapon through the Force, making it part of you.</p>

        <p>You perform the ritual over the course of 1 hour, which can be done during a short rest. The weapon must be within your reach throughout the ritual, at the conclusion of which you touch the weapon and forge the bond, gaining the following benefits:</p>

        <ul><li>You can't be disarmed of that<br> weapon while you are conscious. </li><li>If the weapon is within 60 feet of you and<br> you can see it, you can summon that weapon as a bonus action on your turn, causing it to travel instantly to you. If you have a free hand, you catch the weapon. Otherwise, it lands at your feet.</li><li>You can use Wisdom or Charisma instead of Strength or Dexterity for the attack and damage rolls.</li></ul>

        <p>You can have two weapons bonded to you in this way at a time, and you can summon both of them to you with the same bonus action.</p>

        <h3>Twin Saber Throw</h3>

        <em><strong>Path of the Forceblade:</strong> 7th, 9th, 13th,<br> &emsp;and 17th level</em><br>

        When you cast <em>saber throw</em> while<br> wielding your forceblade, you can<br> attack the same target multiple times.

        Additionally, when you deal damage to a creature within 30 feet of you with your forceblade, you can<br> use your bonus action to teleport to within 5 feet<br> of that creature and make a melee weapon<br> attack against that creature. This attack uses<br> your Kinetic Combat die instead of your<br> weapon's damage die. You can use this<br> feature three times. You gain an additional<br> use at 9th, 13th, and 17th level. You regain all expended uses when you complete a long rest.



        <h3>Disruptive Throw</h3>

        <em><strong>Path of the Forceblade:</strong> 13th level</em><br>

        <p>When you are the target of a ranged attack, and the source is within range of your <em>saber throw</em> force power, you can use your reaction to throw your forceblade at the source of the attack. Make a ranged force attack. On a hit, this attack deals damage using your Kinetic Combat die instead of the weapon's damage die and you impose disadvantage on the triggering attack roll.</p>

        <h3>Forceblade Mastery</h3>

        <em><strong>Path of the Forceblade:</strong> 18th level</em><br>

        <p>You've mastered controlling your forceblade with your mind, using it to keep your enemies at bay. As an action, you can telekinetically control your forceblade and have it strike any number of creatures within 10 feet of you, spending 1 force point per target. Each target must make a Dexterity saving throw (DC = 8 + your bonus to weapon attack rolls with that weapon). On a failed save, it takes damage using your Kinetic Combat die + half your sentinel level, is pushed back 10 feet and knocked prone.</p>

        <img src='https://www.gmbinder.com/images/O1BiqgC.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:710px' />



        <h4>Path of Shadows</h4>

        In darkness, there is protection. Those<br> sentinels who follow the Path of Shadows<br> utilize a calculated plan, becoming masters<br> of stealth and ambush who forgo the head-on<br> attack for the vulnerable flank.

        <h3>Dead Silence</h3>

        <em><strong>Path of Shadows:</strong> 3rd level</em><br>

        <p>You learn the <em>psychic charge</em> force power, which does not count against your total powers known. Additionally, you can use Wisdom or Charisma as your forcecasting ability for it, and when you hit a creature with the <em>psychic charge</em> force power and the target tries to speak, it takes additional damage equal to your Wisdom or Charisma modifier (your choice, minimum of +1), and its voice does not produce sound until the end of your next turn.</p>

        <h3>Cloak of Shadows</h3>

        <em><strong>Path of Shadows:</strong> 3rd level</em><br>

        <p>You can take the Hide action as a bonus action on your turn. Additionally, you can try to hide when you are lightly obscured from the creature from which you are hiding.</p>

        <h3>Shadow Strike</h3>

        <em><strong>Path of Shadows:</strong> 7th level</em><br>

        <p>You learn to strike from the shadows. Once per turn, you can deal an extra 1d6 damage to one creature you hit with an attack if you have advantage on the roll. </p>

        <p>The extra damage increases to 2d6 at 11th level and 3d6 at 17th level.</p>

        <h3>Shadow Step</h3>

        <em><strong>Path of Shadows:</strong> 13th level</em><br>

        You gain the ability to step from one shadow into another. While you are in dim light or darkness, as a bonus action you can teleport up to 60 feet to an unoccupied space you can see that is also in dim<br> light or darkness. You then have advantage on the<br> first melee attack you make before the end of the<br> turn.

        <h3>Shadow's Wrath</h3>

        <em><strong>Path of Shadows:</strong> 18th level</em><br>

        Your training has taught you advanced techniques while you maneuver in the shadows. While you are hidden from your target, the first attack roll you<br> make each round does not automatically reveal<br> your presence. Make a Dexterity (Stealth) check<br> against your target's Wisdom (Perception) check.<br> On a success, you remain hidden. If you are also invisible, you remain invisible.

        <img src='https://www.gmbinder.com/images/k2IV7lG.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:1080px' />

