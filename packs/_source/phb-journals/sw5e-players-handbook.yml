        <h1>Chapter 13: Maneuvers</h1>

        <div class="sw5e-book-block"><h4>General</h4>

        <hr>

        <ul><li>Ace Pilot</li><li>Acrobat</li><li>All In</li><li>Animal Handler</li><li>Assess the Situation</li><li>Brawny</li><li>Charmer</li><li>Daring Escape</li><li>Deliberate Movement</li><li>Double Bluff</li><li>Empathic</li><li>Evasive Footwork</li><li>Feinting Attack</li><li>Inner Strength</li><li>Investigator</li><li>Loremaster</li><li>Maneuvering Attack</li><li>Measured Action</li><li>Medic</li><li>Naturalist</li><li>One with Shadows</li><li>Parry (Improved)</li><li>Perceptive</li><li>Performer</li><li>Precise Movements</li><li>Precision Attack</li><li>Quick-Fingered</li><li>Raise the Stakes</li><li>Self-Preservation</li><li>Silver-Tongued</li><li>Steady the Nerves</li><li>Stealthy</li><li>Survivalist</li><li>Techie</li><li>Threatening</li><li>Vanity</li></ul>

        <h4>Mental</h4>

        <hr>

        <ul><li>Administer Aid</li><li>Administer Aid (Greater)</li><li>Administer Aid (Improved)</li><li>Adrenaline Hit</li><li>Automatic Startup Sequence</li><li>Blind Luck</li><li>Call the Guards</li><li>Call to Arms</li><li>Call to Arms (Improved)</li><li>Charge</li><li>Charming Presence</li><li>Covering Fire</li><li>Distracting Blow</li><li>Effective Flanking</li><li>Effective Flanking (Greater)</li><li>Effective Flanking (Improved)</li><li>Emergency Prescription</li><li>Encouraging Pace</li><li>Encouraging Speech</li><li>Enhancement Injection</li><li>Fast Access Programs</li><li>Firewall</li><li>Force Resonance</li><li>Fortune and Glory</li><li>Goading Attack</li><li>Hacked Communications</li><li>Heads Up</li><li>Incite</li><li>Intimidating Presence</li><li>Menacing Attack</li><li>Mind Over Matter</li><li>Neuroblock</li><li>One with the Force</li><li>Overcapacity Powers</li><li>Overwhelming Wit</li><li>Rally</li><li>Reassure</li><li>Remove Toxins</li><li>Runtime Extension</li><li>Short Round</li><li>Subtle Execution</li><li>Targeted Strike</li><li>Tyrannical Strike</li><li>You Call This Archaeology?</li></ul>

        <h4>Physical</h4>

        <hr>

        <ul><li>Body Over Bother</li><li>Calling Card</li><li>Charging Attack</li><li>Commander's Strike</li><li>Commander's Strike (Greater)</li><li>Commander's Strike (Improved)</li><li>Crippling Blow</li><li>Disarming Blow</li><li>Exploit Weakness</li><li>Lunging Attack</li><li>No Escape</li><li>One Step Ahead</li><li>Parry</li><li>Penetrating Shot</li><li>Played Their Hand</li><li>Pure Sabacc</li><li>Pushing Attack</li><li>Rampage</li><li>Rattle</li><li>Return Fire</li><li>Riposte</li><li>Riposte (Improved)</li><li>Strikeforce</li><li>Sweeping Attack</li><li>Sweeping Attack (Improved)</li><li>Tenacity</li><li>Trip Attack</li><li>Unrelenting Grasp</li><li>Weak Point Strike</li><li>World on Fire</li><li>Wrestle and Drag</li></ul></div>

