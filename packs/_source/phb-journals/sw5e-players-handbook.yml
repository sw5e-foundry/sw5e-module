        <img src='https://www.gmbinder.com/images/ZA5SjCf.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:200px' />

        <img src='https://www.gmbinder.com/images/os8Mt8S.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:230px' />

        <img src='https://www.gmbinder.com/images/7vgeb0Z.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:195px' />

        <img src='https://www.gmbinder.com/images/tVrUTNS.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:220px' />

        <img src='https://www.gmbinder.com/images/6tuXtEr.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:134px' />

        <img src='https://www.gmbinder.com/images/XQCbhQJ.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:190px' /></div><h2>Berserker</h2>

        <span style="font-variant: small-caps">A massive wookiee hunter prowls through the forest, hefting</span> his vibroaxe. With a roar he charges at the pair of trandoshans who dared poach his kin.

        <p>A gamorrean snarls at the latest challenger to his authority over their savage tribe, ready to break his neck with his bare hands as he did to the last six rivals. </p>

        <p>Frothing at the mouth, a nikto slams his helmet into the face of his foe, then turns to drive his armored elbow into the gut of another.</p>

        <p>These berserkers, different as they might be, are defined by their rage: unbridled, unquenchable, and unthinking fury. More than a mere emotion, their anger is the ferocity of a cornered predator, the unrelenting assault of a storm, the churning turmoil of the sea. For every berserker, rage is a power that fuels not just a battle frenzy but also uncanny reflexes, resilience, and feats of strength.</p>



        <h3>Primal Instinct</h3>

        People of towns and cities take pride in how their civilized ways set them apart from animals, as if denying one's own nature was a mark of<br> superiority. To a berserker, though,<br> civilization is no virtue, but a sign<br> of weakness. The strong embrace their<br> animal nature keen instincts, primal physicality, and ferocious rage. Berserkers are uncomfortable when hedged in by walls and crowds. They thrive where the civilized don't.

        <p>Berserkers come alive in the chaos of combat. They can enter a berserk state where rage takes over, giving them superhuman strength and resilience. A berserker can draw on this reservoir of fury only a few times without resting, but those few rages are usually sufficient to defeat whatever threats arise.</p>



        <h3>A Life of Danger</h3>

        <p>Not every person deemed "berserkers" by scions of civilized society has the berserker class. A true berserker among these people is as uncommon as a skilled fighter in a town, and he or she plays a similar role as a protector of the people and a leader in times of war. Life in the wild places of the world is fraught with peril: rival tribes, deadly weather, and terrifying monsters. Berserkers charge headlong into that danger so that their people don't have to.</p>

        <p>Their courage in the face of danger makes berserkers perfectly suited for adventuring. Wandering is often a way of life for their native tribes, and the rootless life of the adventurer is little hardship for a berserker. Some berserkers miss the close-knit family structures of the tribe, but eventually find them replaced by the bonds formed among the members of their adventuring parties.</p>



        <img src='https://www.gmbinder.com/images/fwgM1ml.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:573px;mix-blend-mode:darken' />

        <h3>Creating a Berserker</h3>

        <p>When creating a berserker character, think about where your character comes from and his or her place in the world. Talk with your GM about an appropriate origin for your berserker. Did you come from a remote planet, making you a stranger in the area of the campaign? Or is the campaign set in a rough-and-tumble frontier where berserkers are common?</p>

        <p>What led you to take up the adventuring life? Were you lured to settled planets by the promise of riches? Did you join forces with soldiers of those lands to face a shared threat? Did monsters or an invading horde drive you out of your homeland, making you a rootless refugee? Perhaps you were a prisoner of war, brought in chains to "civilized" lands and only now able to win your freedom. Or you might have been cast out from your people because of a crime you committed, a taboo you violated, or a coup that removed you from a position of authority.</p>

        <h4>Quick Build</h4>

        <p>You can make a berserker quickly by following these suggestions. First, put your highest ability score in Strength, followed by Constitution. Second, choose the mercenary background.</p>



        <div class="sw5e-book-block"><h5>The Berserker</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Proficiency<br> Bonus</th><th>Features</th><th>Rages</th><th>Rage<br> Damage</th><th>Berserker<br> Instincts</th></tr></thead><tbody><tr><td>1st</td><td>+2</td><td>Rage, Unarmored Defense</td><td>2</td><td>+2</td><td>�</td></tr><tr><td>2nd</td><td>+2</td><td>Reckless Attack, Berserker Instincts</td><td>2</td><td>+2</td><td>2</td></tr><tr><td>3rd</td><td>+2</td><td>Danger Sense, Berserker Approach</td><td>3</td><td>+2</td><td>2</td></tr><tr><td>4th</td><td>+2</td><td>Ability Score Improvement</td><td>3</td><td>+2</td><td>2</td></tr><tr><td>5th</td><td>+3</td><td>Extra Attack</td><td>3</td><td>+2</td><td>2</td></tr><tr><td>6th</td><td>+3</td><td>Approach feature</td><td>4</td><td>+2</td><td>2</td></tr><tr><td>7th</td><td>+3</td><td>Feral Impulse</td><td>4</td><td>+2</td><td>3</td></tr><tr><td>8th</td><td>+3</td><td>Ability Score Improvement</td><td>4</td><td>+2</td><td>3</td></tr><tr><td>9th</td><td>+4</td><td>Brutal Critical (one die)</td><td>4</td><td>+3</td><td>3</td></tr><tr><td>10th</td><td>+4</td><td>Approach feature</td><td>4</td><td>+3</td><td>3</td></tr><tr><td>11th</td><td>+4</td><td>Relentless Rage</td><td>4</td><td>+3</td><td>3</td></tr><tr><td>12th</td><td>+4</td><td>Ability Score Improvement</td><td>5</td><td>+3</td><td>3</td></tr><tr><td>13th</td><td>+5</td><td>Brutal Critical (two dice)</td><td>5</td><td>+3</td><td>4</td></tr><tr><td>14th</td><td>+5</td><td>Approach feature</td><td>5</td><td>+3</td><td>4</td></tr><tr><td>15th</td><td>+5</td><td>Persistent Rage</td><td>5</td><td>+3</td><td>4</td></tr><tr><td>16th</td><td>+5</td><td>Ability Score Improvement</td><td>5</td><td>+4</td><td>4</td></tr><tr><td>17th</td><td>+6</td><td>Brutal Critical (three dice)</td><td>6</td><td>+4</td><td>5</td></tr><tr><td>18th</td><td>+6</td><td>Indomitable Might</td><td>6</td><td>+4</td><td>5</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>6</td><td>+4</td><td>5</td></tr><tr><td>20th</td><td>+6</td><td>Primal Champion</td><td>Unlimited</td><td>+4</td><td>5</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a berserker, you gain the follow class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d12 per berserker level</li><li><strong>Hit Points at 1st Level:</strong> 12 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d12 (or 7) + your Constitution modifier per berserker level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor, medium armor</li><li><strong>Weapons:</strong> All vibroweapons, simple blasters</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Strength, Constitution</li><li><strong>Skills:</strong> Choose two from Animal Handling, Athletics, Intimidation, Nature, Perception, Survival</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> a vibroweapon and a light or medium physical shield or <em>(b)</em> two vibroweapons</li><li><em>(a)</em> two techaxes or <em>(b)</em> two vibrospears</li><li><em>(a)</em> a dungeoneer's pack or <em>(b)</em> an explorer's pack</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Berserker</td><td>5d4 x 100 cr</td></tr></tbody></table>



        <h3>Rage</h3>

        <em><strong>Berserker:</strong> 1st level</em><br>

        <p>In battle, you fight with primal ferocity. On your turn, you can enter a rage as a bonus action if you aren't wearing heavy armor.</p>

        <p>While raging, you gain the following benefits:</p>

        <ul><li>You have advantage on Strength checks and Strength saving throws.</li><li>When you make a melee weapon attack using Strength, you gain a bonus to the damage roll that increases as you gain levels as a berserker, as shown in the Rage Damage column of the berserker table.</li><li>You have resistance to kinetic and energy damage.</li></ul>

        <p>If you are able to cast powers, you can't cast them or concentrate on them while raging.</p>

        <p>Your rage lasts for 1 minute. It ends early if you are knocked unconscious, you don heavy armor, or if your turn ends and you haven't taken a hostile action or taken damage since your last turn. You can also end your rage on your turn as a bonus action.</p>

        <p>You can enter a rage a number of times as shown for your berserker level in the Rages column of the berserker table. You regain all expended uses when you complete a long rest.</p>

        <h3>Unarmored Defense</h3>

        <em><strong>Berserker:</strong> 1st level</em><br>

        <p>While you are not wearing any armor, your Armor Class equals 10 + your Dexterity modifier + your Constitution modifier. You can use a shield and still gain this benefit.</p>

        <h3>Reckless Attack </h3>

        <em><strong>Berserker:</strong> 2nd level</em><br>

        <p>You can throw aside all concern for defense to attack with fierce desperation. When you make your first attack on your turn, you can decide to attack recklessly. Doing so gives you advantage on melee weapon attack rolls using Strength during this turn, but attack rolls against you have advantage until your next turn.</p>

        <h3>Berserker Instincts</h3>

        <em><strong>Berserker:</strong> 2nd level</em><br>

        <p>You've honed two instincts, as detailed at the end of the class description. You hone an additional instinct at 7th, 13th, and 17th level.</p>

        <h3>Danger Sense</h3>

        <em><strong>Berserker:</strong> 3rd level</em><br>

        <p>You gain an uncanny sense of when things nearby aren't as they should be, giving you an edge when you dodge away from danger. You have advantage on Dexterity saving throws against effects that you can see, such as traps and powers. To gain this benefit, you can't be blinded, deafened, or incapacitated.</p>

        <h3>Berserker Approach</h3>

        <em><strong>Berserker:</strong> 3rd, 6th, 10th, and 14th level</em><br>

        <p>You choose an approach that shapes the nature of your rage which is detailed at the end of the class description. </p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Berserker:</strong> 4th, 8th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Extra Attack</h3>

        <em><strong>Berserker:</strong> 5th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h3>Feral Impulse</h3>

        <em><strong>Berserker:</strong> 7th level</em><br>

        <p>Your instincts are so honed that you have advantage on initiative rolls.</p>

        <p>Additionally, if you are surprised at the start of combat and aren't incapacitated, you can act normally on your first turn, but only if you enter your rage before doing anything else on that turn.</p>

        <h3>Brutal Critical</h3>

        <em><strong>Berserker:</strong> 9th, 13th, and 17th level</em><br>

        <p>You can roll one additional weapon damage die when determining the extra damage for a critical hit with a melee attack. </p>

        <p>This increases to two additional dice at 13th level and three additional dice at 17th level.</p>

        <h3>Relentless Rage</h3>

        <em><strong>Berserker:</strong> 11th level</em><br>

        <p>Your rage can keep you fighting despite grievous wounds. If you drop to 0 hit points while you're raging and don't die outright, you can make a DC 10 Constitution saving throw. If you succeed, you drop to 1 hit point instead. Each time you use this feature after the first, the DC increases by 5. When you finish a short or long rest, the DC resets to 10.</p>

        <h3>Persistent Rage</h3>

        <em><strong>Berserker:</strong> 15th level</em><br>

        <p>Your rage is so fierce that it ends early only if you fall unconscious or if you choose to end it.</p>

        <h3>Indomitable Might</h3>

        <em><strong>Berserker:</strong> 18th level</em><br>

        <p>If your total for a Strength check is less than your Strength score, you can use that score in place of the total.</p>

        <h3>Primal Champion</h3>

        <em><strong>Berserker:</strong> 20th level</em><br>

        <p>You embody the power of the wilds. Your Strength or Dexterity score increases by 2, and your Constitution score increases by 2. Your maximum for those scores increases by 2.</p>

        <p>Additionally, you can enter rage an unlimited number of times, and entering rage no longer requires your bonus action on your turn.</p>



        <h3>Berserker Instincts</h3>

        <p>The instincts are presented in alphabetical order. If an instinct has prerequisites, you must meet them to learn it. You can learn an instinct at the same time you meet its prerequisites. You can't take an instinct more than once.</p>

        <h4>Acklay's Instinct</h4>

        <p>While raging, you have advantage on Constitution saving throws.</p>

        <h4>Bantha's Instinct</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>Your carrying capacity and the weight you can push, drag, or lift doubles. If it would already double, it instead triples. Additionally, you have advantage on Strength checks made to push, pull, lift, or break objects.</p>

        <h4>Blurrg's Instinct</h4>

        <p>Whether mounted or on foot, your travel pace is doubled, as is the travel pace of up to ten companions while they're within 60 feet of you and you're not incapacitated. </p>

        <h4>Boggdo's Instinct</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>While raging you have a flying speed equal to your current walking speed, though you fall if you end your turn in the air and nothing else is holding you aloft.</p>

        <h4>Chirodactyl's Instinct</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>While raging, you have blindsight to a range of 30 feet, and you have advantage on Wisdom (Perception) checks that rely on sound, as long as you aren't deafened.</p>

        <h4>Dewback's Instinct</h4>

        <p>Choose three damage types other than true damage. While raging, you have resistance to the chosen damage types.</p>

        <h4>Fighter's Instinct</h4>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the Fighting Style options, detailed in Chapter 6. </p>

        <h4>Fyrnock's Instinct</h4>

        <p>While raging, you can use your bonus action to leap up to 30 feet to an empty space you can see. When you land you deal kinetic damage equal to your Strength modifier to each creature within 5 feet of where you land. You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain all expended uses when you complete a long rest.</p>

        <h4>Hawk's Instinct</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>You can see up to 1 mile away with no difficulty. You are able to discern even fine details as though looking at something no more than 100 feet away from you. Additionally, dim light doesn't impose disadvantage on your Wisdom (Perception) checks.</p>



        <h4>Katarn's Instinct</h4>

        <p>You gain a climbing speed equal to your movement speed.</p>

        <h4>Loth-cat's Instinct</h4>

        <p>While you're raging, other creatures have disadvantage on opportunity attack rolls against you, and you can take the Dash action as a bonus action on your turn.</p>

        <h4>Predator's Instinct</h4>

        <p>Your speed increases by 10 feet.</p>

        <h4>Rancor's Instinct</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>While you're raging any creature within 5 feet of you that's hostile to you has disadvantage on attack rolls against targets other than you or another character with this feature. An enemy is immune to this effect if it can't see or hear you or if it can't be frightened.</p>

        <h4>Tactician's Instinct</h4>

        <p>When you use your Reckless Attack feature, you can choose to not have advantage on your attack rolls this turn. If you do so, friendly creatures within 5 feet of a hostile creature that is within 5 feet of you have advantage on attack rolls against that creature.</p>

        <h4>Tracker's Instinct</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>You can track other creatures while traveling at a fast pace, and you can move stealthily while traveling at a normal pace.</p>

        <h4>Terentatek's Instinct</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>When you are forced to make a saving throw against a force power, you can immediately use your reaction to move up to half your speed towards the source power's caster. If you end this movement within 5 feet of the target, you can immediately make one melee weapon attack against the target as a part of that reaction.</p>

        <h4>Varactyl's Instinct</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>While raging, you have advantage on Dexterity checks, your attack rolls can't suffer from disadvantage, and each slowed level only reduces your speed by 5 feet, unless it would reduce your speed to 0.</p>

        <h2>Berserker Approaches</h2>

        For berserkers, rage is an internal<br> reservoir where pain, grief, and<br> anger are forged into a fury hard<br> as steel. Your approach grants you<br> features at 3rd, 6th, 10th, and 14th<br> level.

        <img src='https://www.gmbinder.com/images/gb8mhq2.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:325px' />



        <h4>Ballistic Approach</h4>

        <p>For many, rushing an opponent with guns blazing is a last resort. For Berserkers of the Ballistic Approach, this isn't a last resort; it's the primary plan. Leading with a blaster and pure, unbridled rage, the berserker never lets an empty gun diminish their fury.</p>

        <h3>Firestorm</h3>

        <em><strong>Ballistic Approach:</strong> 3rd level</em><br>

        <p>You gain proficiency in martial blasters with the burst or rapid property. Additionally, you've learned to use ranged weapons with untold fury. While wielding a blaster with which you are proficient, you gain the following benefits:</p>



        <ul><li>You can use your choice of Strength or Dexterity modifier for the attack and damage rolls of blaster weapons against targets within 30 feet of you. You must use the same modifier for both rolls.</li><li>When you use a blaster as an improvised weapon, you are considered proficient with it.</li></ul>

        <h3>Explosive</h3>

        <em><strong>Ballistic Approach:</strong> 3rd and 9th level</em><br>

        <p>While raging, you gain the following benefits:</p>

        <ul><li>When you roll a 1 or 2 on a damage die for an attack made with a blaster weapon, you can reroll the die and must use the new roll, even if the new roll is a 1 or a 2.</li><li>You add your rage damage to damage rolls from ranged weapon attacks using Strength. </li><li>At 9th level, when a creature rolls a 1 on a saving throw against your burst or rapid property, you can add your Brutal Critical dice to the damage.</li></ul>

        <h3>Rampage</h3>

        <em><strong>Ballistic Approach:</strong> 6th level</em><br>

        <p>While raging, when you deal damage with a blaster with which you are proficient, and you added your Strength modifier to the damage roll, you can use a bonus action to move up to half your speed towards your target. You must end this movement closer to your target than you started. If you end this movement within 5 feet of your target, you can make one melee weapon attack with your blaster as a part of this bonus action.</p>

        <h3>Down, Not Out</h3>

        <em><strong>Ballistic Approach:</strong> 10th level</em><br>

        <p>When you are hit with an attack by a creature within 30 feet of you, you can use your reaction to make a single attack against that creature with a blaster with which you are proficient.</p>

        <h3>Brawn</h3>

        <em><strong>Ballistic Approach:</strong> 14th level</em><br>

        <p>When you use the burst property of a blaster with which are you proficient, you can apply your rage damage bonus to every target that takes damage, instead of just one. Additionally, when a Large or smaller creature fails the saving throw against your burst or rapid property while within 30 feet of you, it is knocked prone.</p>

        <img src='https://www.gmbinder.com/images/ahaCpxp.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:535px' />



        <h4>Marauder Approach</h4>

        <p>Few things are more terrifying than being in the path of a Berserker who has learned the ways of the Force. Those who follow this path unlock something deep within them, a well of untamed power from the depths of their fury. When a marauder unleashes their rage, they channel their brute strength into primal might, and uses it to devastate his foes in a hail of fire, blades, and blood. Due to the uncontrolled nature of their powers, marauders have a dangerous predilection for the strength and raw power offered by the dark side, and many fall into it's clutches. Even those who do not are always temped by the voices of fury barely contained within.</p>

        <h3>Forcecasting</h3>

        <em><strong>Marauder Approach:</strong> 3rd level</em><br>

        <p>You have derived powers from your primal connection to the Force. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 4 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the Marauder Approach Forcecasting table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your berserker level, as shown in the Force Points column of the Marauder Approach Forcecasting table, + your Wisdom or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the Marauder Approach Forcecasting table.</p>

        <p>You may only cast force powers at 4th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Forcecasting Ability</h4>

        Your forcecasting ability varies based on the<br> alignment of the powers you cast. You use<br> Wisdom for light side powers, Charisma<br> for dark side powers, and Wisdom or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>



        <h3>Furious Force</h3>

        <em><strong>Marauder Approach:</strong> 3rd level</em><br>

        <p>You can cast force powers while raging as long as the power's casting time is no more than 1 action, the power does not require concentration, and you are not wearing heavy armor. While raging, you add your rage damage to damage rolls from force powers you cast that require a force attack or saving throw. If a force power damages more than one target, you may only apply your rage damage to one of them. </p>

        <p>Casting force powers during rage counts as attacking for the purposes of maintaining rage, and you can use your Reckless Attack feature to gain advantage when casting a force power that requires a force attack.</p>

        <div class="sw5e-book-image-row"><img src='https://www.gmbinder.com/images/0ndBugv.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:455px' />

        <img src='https://www.gmbinder.com/images/tVrUTNS.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:825px' /></div><h3>Reckless Power</h3>

        <em><strong>Marauder Approach:</strong> 6th level</em><br>

        <p>Weapons and the force are equally an extension of your rage. While you are raging and you use your action to cast a force power, you can make a single melee weapon attack as a bonus action.</p>

        <div class="sw5e-book-block"><h5>Marauder Approach Forcecasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Force Powers<br> Known</th><th>Force<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>4</td><td>3</td><td>1st</td></tr><tr><td>4th</td><td>6</td><td>4</td><td>1st</td></tr><tr><td>5th</td><td>7</td><td>5</td><td>1st</td></tr><tr><td>6th</td><td>8</td><td>6</td><td>1st</td></tr><tr><td>7th</td><td>10</td><td>7</td><td>2nd</td></tr><tr><td>8th</td><td>11</td><td>8</td><td>2nd</td></tr><tr><td>9th</td><td>12</td><td>9</td><td>2nd</td></tr><tr><td>10th</td><td>13</td><td>10</td><td>2nd</td></tr><tr><td>11th</td><td>14</td><td>11</td><td>2nd</td></tr><tr><td>12th</td><td>15</td><td>12</td><td>2nd</td></tr><tr><td>13th</td><td>17</td><td>13</td><td>3rd</td></tr><tr><td>14th</td><td>18</td><td>14</td><td>3rd</td></tr><tr><td>15th</td><td>19</td><td>15</td><td>3rd</td></tr><tr><td>16th</td><td>20</td><td>16</td><td>3rd</td></tr><tr><td>17th</td><td>22</td><td>17</td><td>4th</td></tr><tr><td>18th</td><td>23</td><td>18</td><td>4th</td></tr><tr><td>19th</td><td>24</td><td>19</td><td>4th</td></tr><tr><td>20th</td><td>25</td><td>20</td><td>4th</td></tr></tbody></table></div>

        <h3>Powerful Presence</h3>

        <em><strong>Marauder Approach:</strong> 10th level</em><br>

        <p>As a bonus action, you unleash a battle cry infused with force energy. Choose up to ten other creatures of within 60 feet of you that can hear you. Friendly creatures have advantage on attack rolls and saving throws until the start of your next turn, and hostile creatures have disadvantage on attack rolls and saving throws until the end of your next turn.</p>

        <p>Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Force Storm</h3>

        <em><strong>Marauder Approach:</strong> 14th level</em><br>

        <p>You can expel the might of your rage all at once to unleash a devastating storm of force energy. As an action, you can end your rage early, forcing each creature within 15 feet of you to make a Dexterity saving throw against your universal force save DC. On a failed save, a creature takes 1d12 force damage for each round you've spent in rage, or half as much on a successful one. </p>

        <div class="sw5e-book-image-row"><img src='https://www.gmbinder.com/images/tVrUTNS.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:825px' />

        <img src='https://www.gmbinder.com/images/0ndBugv.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:455px' /></div><h4>Precision Approach</h4>

        <p>Some berserkers have learned to channel their rage into a method of increasing their focus and precision to supernatural levels. Those berserkers who choose the Precision Approach hone their rage to a fine point, becoming agile warriors who ruthlessly dispatch their foes.</p>

        <h3>Careful Steps</h3>

        <em><strong>Precision Approach:</strong> 3rd level</em><br>

        <p>You gain skills that represent your precise movement. You gain proficiency in your choice of Acrobatics or Stealth. While raging, you have advantage on checks you make with the chosen skill.</p>

        <h3>Focused Rage</h3>

        <em><strong>Precision Approach:</strong> 3rd level</em><br>

        <p>You hone your rage to a razor sharp focus. While raging, when you make a melee weapon attack using Dexterity, you add your rage damage to the damage roll. Additionally, you can use your Reckless Attack feature to give you advantage on melee weapon attacks using Dexterity during your turn.</p>

        <h3>Battle Anticipation</h3>

        <em><strong>Precision Approach:</strong> 6th level</em><br>

        <p>While raging, your critical hit range with melee weapon attacks using Dexterity increases by 1.</p>

        <h3>Improved Danger Sense</h3>

        <em><strong>Precision Approach:</strong> 10th level</em><br>

        <p>While raging, when you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage against effects that you can see, such as traps and powers, you are treated as proficient in the save, and you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>

        <h3>Calm Within the Storm</h3>

        <em><strong>Precision Approach:</strong> 14th level</em><br>

        <p>The precision with which you act during your rage causes you to become a storm of reactive lethality. When you use your Reckless Attack feature, you can make a number of opportunity attacks equal to your proficiency bonus without using your reaction, and when a creature within 5 feet of you misses you with an attack, you can use your reaction to make a melee weapon attack using Dexterity against that creature. You can only take one reaction per turn.</p>

        <img src='https://www.gmbinder.com/images/WTnjBcN.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:550px' />



        <h4>Warchief Approach</h4>

        <p>For some berserkers, it is their duty or birthright to lead their tribe and kin to battle and victory. The Warchief Approach is one forged from alliances, bonds, and strategy. In combat, your rages are less mindless, and more focused. Ignoring the distractions of unimportant events, your attention hones in on the battlefield and how best to direct and control it. You guide your allies' strikes, and your presence is enough to wash away their fatigue.</p>



        <h3>Savage Diplomat</h3>

        <em><strong>Warchief Approach:</strong> 3rd level</em><br>

        <p>Your path necessitates that you build relationships with others, for the betterment of your tribe or yourself. You gain proficiency in one of the following skills of your choice: Persuasion or Intimidation. You can choose to learn one language in place of the skill proficiency.</p>

        <h3>Commanding Rage</h3>

        <em><strong>Warchief Approach:</strong> 3rd level</em><br>

        <p>You become more aware of your allies, and their intent when fighting at your side. While you are raging, when an ally within 10 feet of you makes an attack roll against an enemy, you can use your reaction to grant advantage to that attack and add your rage damage bonus to the damage roll, if the attack hits.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain all expended uses when you complete a short or long rest.</p>

        <h3>Inspiring Presence</h3>

        <em><strong>Warchief Approach:</strong> 6th level</em><br>

        <p>Your mere presence on the battlefield rallies your allies. When you rage, choose up to 3 allies that you can see within 30 feet of you. Each creature gains temporary hit points equal to half your berserker level + your Charisma modifier (minimum of +1).</p>

        <h3>Raid Planning</h3>

        <em><strong>Warchief Approach:</strong> 10th level</em><br>

        <p>You learn to flare up your allies' drive for combat, urging them to follow you into the fray. During a long rest, you tell sagas, sing battle songs, and give inspiring speeches. At the end of the long rest choose up to 5 creatures that can hear and understand you (which can include yourself) to add your Charisma modifier (minimum of +1) to their next initiative roll, and a 10 foot bonus to their speed on their first turn of combat.</p>

        <h3>War Chant</h3>

        <em><strong>Warchief Approach:</strong> 14th level</em><br>

        <p>You have memorized the litanies, songs, and chants of your people and their dedication to war. When you enter a rage on your turn, you can enter a commanding rage for one minute. When you do so, during this turn and at the start of each of your turns, you have a number of special reactions equal to your proficiency bonus you can only use for your Commanding Rage feature. When you use Commanding Rage with these special reactions, they do not count against your uses of that feature. You can only use one reaction per turn. Additionally, during this rage, when an enemy within 10 feet of you makes an attack roll against an ally, you can use your reaction to reduce the attack by an amount equal to your Charisma modifier.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <img src='https://www.gmbinder.com/images/Fztc5iP.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:835px' />



        <h2>Consular</h2>

        <span style="font-variant: small-caps">A twi'lek in black robes steps on a terrified rodian, who </span> scampers away on the ground. Lightning sparks from his fingers, illuminating his red and black tattoos. The rodian's pleas for mercy fall on deaf ears as the Sith channels his lightning into his failed apprentice, leaving nothing but a charred husk behind.

        <p>Sitting cross-legged on a dense patch of grass, a miraluka mystic meditates on the Force. With every breath, the trees sway with a rhythmic breeze. Though she lacks simple vision, she can see the Force as it moves everything around her. </p>

        <p>A drably-robed human focuses inward, channeling the Force into the ground around him. Slowly, all the debris within arms reach rises into the air around him; with a flick of his wrist, he clears the air, sending his projectiles to pound on the approaching tank.</p>

        <p>Consulars are the supreme wielders of the Force, defined and united by the powers they cast. Drawing on the omnipresent Force that permeates the universe, consulars cast powers of rejuvenating healing and destructive lightning, draining life-force and manipulating minds; the most powerful with the Force can even experience brief glimpses of the future. </p>



        <h3>Strong with the Force</h3>

        <p>Refraining from drawing their lightsabers except as a measure of last resort, consulars spend a great deal of time studying the mysteries of the Force. Their knowledge allows them to channel the Force to greater heights, unlocking unrivaled power, and twisting those powers to greater effect. </p>



        <h3>Sage or Sorcerer</h3>

        <p>Consulars who follow the light side of the Force, using their powers to better their communities and people, are often called sages, while consulars who fall to the dark side and subjugate or cast aside all in their path are commonly called sorcerers. Alternatively, they may tend toward the middle, refraining from politics and war, spending their time in isolation and study.</p>



        <img src='https://www.gmbinder.com/images/LbMaFdP.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:600px;mix-blend-mode:darken' />

        <h3>Creating a Consular</h3>

        <p>While creating your consular, consider your personal philosophy in regards to the Force and its most famous practitioners � the Jedi and the Sith. Are you a member of one of the two orders, or do you walk a different path? Perhaps you were ostracized from your primitive village out of superstition or jealousy. You may have been brutally trained from a young age in the dark side, fueling your innate thirst for power, or perhaps you were trained as a padawan in one of the Jedi temples. How do you treat strangers, and how do they treat you once they know your abilities? What was your family like, or what did you have instead of a family? Do you see the Force as light and dark, or an impartial river of gray? </p>

        <h4>Quick Build</h4>

        <p>You can make a consular quickly by following these suggestions. First, make Wisdom or Charisma your highest ability score, followed by Dexterity. Second, choose the Jedi or Sith background.</p>



