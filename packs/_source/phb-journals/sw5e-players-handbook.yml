        <h3>Biology and Appearence</h3>

        <p>The duros are humanoids with smooth blue-green skin, red eyes, lipless mouths, long thin noseless faces and green blood. Olfactory organs beneath their eyes are responsible for their sense of smell. Both females and males are bald, though both genders are easily distinguished. Their large red goggle-like eyes have slit pupils. Duros females lay eggs as they are descended from ancient reptiles, and they are born in a larval grub stage. Unlike similar species, the duros take care of their offspring from birth.</p>

        <h3>Society and Culture</h3>

        <p>Their home planet Duro is primarily uninhabited due to massive pollution on the world over time. Instead, it is covered with automated farms for food production. The duros live in twenty orbital space cities above the planet.</p>

        <p>The duros also established a vast, grand starship construction industry in the Duro system. The duros set up their government around a consortium of starship construction corporations, with all important political decisions made by the stockholders of the corporations. This meant that any duros that held stock in a company could participate in the administration of the system.</p>

        With their strong memories, some duros also choose to become extraordinary storytellers, renowned<br> galaxy-wide for their ability to learn a wide range of<br> narratives by heart, and perform them all with<br> stunning accuracy. 

        <h3>Names</h3>

        Duros names are generally melodic, with female<br> names having softer intonations. Surnames are<br> familial.

        <p><strong>Male Names.</strong> Cir, Fod, Mom, Rur, Zim</p>

        <p><strong>Female Names.</strong> Chochi, Fumsu, Kaleshef, Raada</p>

        <p><strong>Surnames.</strong> Dektuks, Jimoks, Silt, Tuzig, Zhoks</p>



        <h3>Duros Traits</h3>

        <p>As a duros, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Duros reach adulthood in their 20s and live an average of 150 years.</p>

        <p><strong><em>Alignment.</em></strong> Duros tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Duros stand around 6 feet tall and weigh around 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Galactic Traveler.</em></strong> You have proficiency in Lore.</p>

        <p><strong><em>Pilot.</em></strong> You have proficiency in Piloting.</p>

        <p><strong><em>Tech Resistance.</em></strong> Growing up around technology leaves an impact on duros. You have advantage on Dexterity and Intelligence saving throws against tech powers.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Durese. Durese is a common interstellar tongue used by prominent spacers and traders.</p>

