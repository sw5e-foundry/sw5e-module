  - name: 'Chapter 5: Equipment'
    _id: H6cvE7vyHSdxmV5U
    text:
      content: "<h1>Chapter 5: Equipment</h1>\n\n\n\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style=\"font-variant: small-caps\">he marketplace of a large city teems with buyers and</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; sellers of many sorts: Jawas peddling refurbished wares (or trying to steal from careless travelers), Ugnauts selling various technology scrap, Twi'lek armstechs and Mirialan synthweavers. In the largest cities, almost anything imaginable is offered for sale, from exotic spices and luxurious clothing to speeders and spaceships.\t\t\n\n<p>For an adventurer, the availability of armor, weapons, backpacks, rope, and similar goods is of paramount importance, since proper equipment can mean the difference between life and death in a stronghold or the untamed wilds. This chapter details the mundane and exotic merchandise that adventurers commonly find useful in the face of the threats that the worlds of D&amp;D present.</p>\n\n<h5>Variant: Starting Wealth by Class</h5>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Berserker</td><td>5d4 x 100 cr</td></tr><tr><td>Consular</td><td>5d4 x 100 cr</td></tr><tr><td>Engineer</td><td>6d4 x 100 cr</td></tr><tr><td>Fighter</td><td>8d4 x 100 cr</td></tr><tr><td>Guardian</td><td>8d4 x 100 cr</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Monk</td><td>4d4 x 100 cr</td></tr><tr><td>Operative</td><td>7d4 x 100 cr</td></tr><tr><td>Scholar</td><td>6d4 x 100 cr</td></tr><tr><td>Scout</td><td>8d4 x 100 cr</td></tr><tr><td>Sentinel</td><td>6d4 x 100 cr</td></tr></tbody></table></div>\n\n<h2>Wealth</h2>\n\n<p>Wealth generally appears in the form of credits. The Galactic Republic and Sith Empire have their own mints, but in most worlds, the chits are interchangeable. Other trade goods, gemstones, artifacts, and property can reflect your character's financial well-being. Members of the lower class trade in goods, bartering for what they need and paying taxes in raw materials. Members of the nobility trade either in legal rights, such as the rights to a mine, a port, or a company, or in high denomination credits. Only merchants, adventurers, and those offering professional services for hire commonly deal in credits.</p>\n\n<h3>Currency</h3>\n\n<p>Credits come in a variety of denominations: from a single chit to cards loaded with incredible value. While the Republic and Empire have their own currencies, in most worlds they can be used interchangeably.</p>\n\n<p>With ten credits, a character can buy a power cell, a stylus, or a glowrod. A skilled (but not exceptional) artisan can earn ten credits a day. The credit is the standard unit of measure for wealth, even if the chit itself is not commonly used. When merchants discuss deals that involve goods or services worth hundreds or thousands of credits, the transactions don't usually involve the exchange of individual chits. Rather, the credit is a standard measure of value, and the actual exchange is in credit cards, letters of credit, or valuable goods.\t\t\t</p>\n\n<p>A standard chit weighs about a third of an ounce, so fifty chits weigh a pound.\t</p>\n\n<h3>Selling Treasure\t\t\t\t\t\t\t\t\t\t</h3>\n\n<p>Opportunities abound to find treasure, equipment, weapons, armor, and more in the dungeons you explore. Normally, you can sell your treasures and trinkets when you return to a town or other settlement, provided that you can find buyers and merchants interested in your loot.</p>\n\n<h4>Arms, Armor, and Other Equipment</h4>\n\n<p>As a general rule, undamaged weapons, armor, and other equipment fetch half their cost when sold in a market. Used weapons and armor aren't always in good enough condition to sell.\t\t\t\t\t\t\t\t\t\t</p>\n\n<h4>Enhanced Items</h4>\n\n<p>Selling enhanced items can be problematic. Finding someone to find an overtuned blaster isn't hard, but the most unique of items are beyond all but the wealthiest denizens. Likewise, aside from a few common enhanced items, you won't normally come across enhanced items to purchase. The value of special equipment is far beyond simple credits and should always be treated as such.</p>\n\n<h4>Gems, Jewelry, and Art Objects</h4>\n\n<p>These items retain their full value in the marketplace, and you can either trade them in for credits or use them as currency for other transactions. For exceptionally valuable treasures, the GM might require you to find a buyer in a large city or even another planet.</p>\n\n<h4>Trade Goods</h4>\n\n<p>In the Outer Rim, many people conduct transactions through barter. Like gems and art objects, trade goods�raw materials like bags of salt, livestock, and so on�retain their full value in the market and can be used as currency.</p>\n\n<h3>At Higher Levels</h3>\n\n<p>As characters progress to higher levels, there is an expectation of increased wealth, be it in the shape of coin or equipment. The below table serves as a target for how much each character should have earned at certain levels.</p>\n\n<h5>Wealth by Level</h5>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Level</th><th>Wealth</th></tr></thead><tbody><tr><td>1st</td><td>1,000 cr</td></tr><tr><td>2nd</td><td>2,000 cr</td></tr><tr><td>3rd</td><td>3,500 cr</td></tr><tr><td>4th</td><td>5,000 cr</td></tr><tr><td>5th</td><td>10,000 cr</td></tr><tr><td>6th</td><td>20,000 cr</td></tr><tr><td>7th</td><td>35,000 cr</td></tr><tr><td>8th</td><td>50,000 cr</td></tr><tr><td>9th</td><td>75,000 cr</td></tr><tr><td>10th</td><td>125,000 cr</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Level</th><th>Wealth</th></tr></thead><tbody><tr><td>11th</td><td>175,000 cr</td></tr><tr><td>12th</td><td>250,000 cr</td></tr><tr><td>13th</td><td>350,000 cr</td></tr><tr><td>14th</td><td>500,000 cr</td></tr><tr><td>15th</td><td>750,000 cr</td></tr><tr><td>16th</td><td>1,250,000 cr</td></tr><tr><td>17th</td><td>2,500,000 cr</td></tr><tr><td>18th</td><td>5,000,000 cr</td></tr><tr><td>19th</td><td>7,500,000 cr</td></tr><tr><td>20th</td><td>10,000,000 cr</td></tr></tbody></table></div>\n\n\n\n<h2>Armor and Shields</h2>\n\n<p>The different worlds of <em>Star Wars</em> are a vast tapestry made up of many different cultures, each with its own technology level. For this reason, adventurers have access to a variety of armor types, ranging from basic combat suits to heavy battle armor, with several other kinds of armor in between. The Armor table collects the most commonly available types of armor found in the game and separates them into three categories: light armor, medium armor, and heavy armor. Many warriors supplement their armor with a shield.</p>\n\n<p>The Armor table shows the cost, weight, and other properties of the common types of armor worn in the worlds of <em>Star Wars</em>.</p>\n\n\n\n<h3>Armor and Shield Proficiency</h3>\n\n<p>Anyone can put on a suit of armor or wield a shield. Only those proficient in the armor's use know how to wear it effectively, however. Your class gives you proficiency with certain types of armor. If you wear armor that you lack proficiency with, you have disadvantage on any ability check, saving throw, or attack roll that involves Strength or Dexterity, and you can't force- or tech-cast.</p>\n\n<p>If you have proficiency in armor, you have proficiency in the appropriate shield as well.</p>\n\n<h5>Variant: Equipment Sizes</h5>\n\n<blockquote><p>In most campaigns, you can use or wear any equipment that you find on your adventures, within the bounds of common sense. For example, a burly wookiee won't fit in a jawa's combat suit, and an ugnaught would be swallowed up in a gamorrean's hooded cloak. </p>\n\n<p>The GM can impose more realism. For example, a suit of armor made for one human might not fit another one without significant alterations, and a guard's uniform might be visibly ill-fitting when an adventurer tries to wear it as a disguise.</p>\n\n<p>Using this variant, when adventurers find armor, clothing, and similar items that are made to be worn, they might need to visit an armormech, synthweaver, or similar expert to make the item wearable. The cost for such work varies from 10 to 40 percent of the market price of the item. The GM can either roll 1d4x100 or determine the increase in cost based on the extent of the alterations required.</p></blockquote>\n\n<h3>Armor Class (AC)</h3>\n\n<p>Armor protects its wearer from attacks. The armor (and shield) you wear determines your armor class (AC).</p>\n\n<h3>Armor Properties</h3>\n\n<p>Many armors and shield have special properties related to their use, as shown in the Armor table.</p>\n\n<h4>Bulky</h4>\n\n<p>While wearing armor with the bulky property, you have disadvantage on Dexterity (Stealth) checks that rely on sound.</p>\n\n<h4>Obtrusive</h4>\n\n<p>While wielding a shield with the obtrusive property, you have disadvantage on Dexterity (Stealth) checks that rely on sight.</p>\n\n<h4>Strength</h4>\n\n<p>While wearing armor or wielding a shield with the strength property, your speed is reduced by 10 unless you meet the strength requirement. </p>\n\n<img src='https://www.gmbinder.com/images/KulkaIH.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:810px' />\n\n\n\n<h3>Light Armor</h3>\n\n<p>Made from supple and thin materials, light armor favors agile adventurers since it offers some protection without sacrificing mobility. If you wear light armor, you add your Dexterity modifier to the base number from your armor type to determine your Armor Class.</p>\n\n<h4>Combat Suit</h4>\n\n<p>Combat suits are seen all over the galaxy, and can be found for sale by almost any merchant who dealt in weapons and armor. Many such suits are used by military organizations, such as the Galactic Republic's military, as well as by mercenaries, criminals, bounty hunters and even some Jedi.</p>\n\n<p>The suit itself offers decent protection from most types of attacks while maintaining maximum flexibility and minimum weight. However this armor is only recommended for light skirmishes.</p>\n\n<h4>Fiber Armor</h4>\n\n<p>Fiber armor is a type of armor that offers more protection than the lighter combat suit. Fiber armor is heavier overall than combat suits, and not quite as flexible, but many consider the trade-offs worthwhile. It is a good source of defense from physical attacks and light blaster fire.</p>\n\n<h3>Medium Armor</h3>\n\n<p>Medium armor offers more protection than light armor, but it also impairs movement more. If you wear medium armor, you add your Dexterity modifier, to a maximum of +2, to the base number from your armor type to determine your Armor Class.</p>\n\n<h4>Mesh armor</h4>\n\n<p>Providing solid protection for a minimal cost, mesh armor is considered excellent protection for entrenched troops or guards. However, this protection comes at a cost of mobility, limiting its uses by rapidly advancing infantry. Still, it provides more mobility than battle armor.</p>\n\n<h4>Weave Armor</h4>\n\nWeave armor was constructed<br> from a mesh of metal or<br> composite plates and a<br> padded jumpsuit. Variants<br> of the armor included less<br> plates and more padding for<br> a lighter, though less protect-<br>ive armor, and heavier plating<br> with molded pieces to fit the<br> wearer. Though the armor was<br> available unmodified, most users<br> personalized their armor.\n\n<h4>Composite Armor</h4>\n\n<p>Composite armor is a type of armored suit that offers a good balance of mobility and protection against most types of weapons. The micro-hydraulics of this type of powered armor provide the operator with protection, but are more bulky than mesh or weave armors. This type of armor is rarely seen outside of professional mercenaries' and soldiers' use.</p>\n\n<h3>Heavy Armor</h3>\n\n<p>Of all the armor categories, heavy armor offers the best protection. These suits of armor cover the entire body and are designed to stop a wide range of attacks. Only proficient warriors can manage their weight and bulk. Heavy armor doesn't let you add your Dexterity modifier to your Armor Class, but it also doesn't penalize you if your Dexterity modifier is negative.</p>\n\n<h4>Battle Armor</h4>\n\n<p>Battle armor is an armor that reduced weight, but restricts movement. The armor is commonly used by mercenaries, bounty hunters, soldiers, and civilians that live in dangerous areas.</p>\n\n<h4>Assault Armor</h4>\n\n<p>Assault armor improved on battle armor, with the benefit of micro-hydraulics that boost the efficacy of the operator. It offers better protection, but increased weight.</p>\n\n<h4>Heavy Exoskeleton</h4>\n\n<p>Heavy exoskeletons are virtually the heaviest armor acquirable during the Galactic War. It is ideal for extreme combat situations that involved direct damage and also offers a very good level of protection in sacrifice of dexterity. Some consider it claustrophobic but that was the trade-off for safety.</p>\n\n<h3>Shields</h3>\n\n<p>Shields come in varying weights, sizes, and materials. Light shields are smaller and mounted to the forearm, while medium and heavy shields are held in hand. You can only benefit from one shield at a time.</p>\n\n<p><strong><em>Physical Shields.</em></strong> Physical shields are made entirely of physical materials. They are cheaper than their generator counterparts, but heavier. </p>\n\n<p><strong><em>Shield Generators.</em></strong> Shield generators are made almost entirely of energy barriers. Medium and heavy shield generators have a physical handheld component from which the barrier emanates; medium shield generators are orbs that are slightly larger than a fist, while heavy shield generators project from a large cross.</p>\n\n<h4>Light Shields</h4>\n\n<p>A light shield is generally affixed to the forearm. While a light shield does not fill the hand, you gain no benefit from it while the hand is full. You gain no benefit from a light shield while wielding a weapon with the heavy property.</p>\n\n<h4>Medium Shields</h4>\n\n<p>A medium shield is a common defensive technology that protects the user from blaster fire, the elements, or other hazards. Medium shields are used in conjunction with any one-handed weapon.</p>\n\n<h4>Heavy Shields</h4>\n\n<p>Heavy shields are much larger and more cumbersome, but they offer more protection than their smaller counterparts. Their unwieldy size, however, requires the use of a one-handed weapon with the light property in the other hand.</p>\n\n<img src='https://www.gmbinder.com/images/YBBiqaE.jpg' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:200px;mix-blend-mode:darken' />\n\n\n\n<div class=\"sw5e-book-block\"><h5>Armor and Shields</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Armor|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|  |:---|---:|:---|-:|:---| |<em>Light Armor</em>\t|||||| | &emsp;Combat suit      \t\t|\t 100 cr&nbsp;&nbsp;|\t11 + Dex modifier|10 lb&nbsp;&nbsp;|�| | &emsp;Fiber armor\t\t        |\t 450 cr&nbsp;&nbsp;|\t12 + Dex modifier|13 lb&nbsp;&nbsp;|�| |<em>Medium Armor</em>\t|||||| | &emsp;Mesh armor\t\t        |\t 500 cr&nbsp;&nbsp;|\t13 + Dex modifier (max 2)|20 lb&nbsp;&nbsp;|�| | &emsp;Weave armor\t\t\t    |  1,000 cr&nbsp;&nbsp;|\t14 + Dex modifier (max 2)|25 lb&nbsp;&nbsp;|�| | &emsp;Composite armor\t        |  2,500 cr&nbsp;&nbsp;|\t15 + Dex modifier (max 2)|45 lb&nbsp;&nbsp;|Bulky| |<em>Heavy Armor</em>\t|||||| | &emsp;Battle armor\t\t\t    |    750 cr&nbsp;&nbsp;|\t16\t|55 lb&nbsp;&nbsp;|Bulky, strength 13| | &emsp;Assault armor\t        |  2,000 cr&nbsp;&nbsp;|\t17\t|60 lb&nbsp;&nbsp;|Bulky, strength 15| | &emsp;Heavy exoskeleton   \t    |  9,000 cr&nbsp;&nbsp;|\t18\t|65 lb&nbsp;&nbsp;|Bulky, strength 17| |<em>Shield</em>\t\t|||||| | &emsp;Light physical shield    |     50 cr&nbsp;&nbsp;|\t+1\t| 6 lb&nbsp;&nbsp;|�| | &emsp;Light shield generator\t|    125 cr&nbsp;&nbsp;|\t+1\t| 2 lb&nbsp;&nbsp;|�| | &emsp;Medium physical shield   |\t 150 cr&nbsp;&nbsp;|\t+2\t|18 lb&nbsp;&nbsp;|Strength 13| | &emsp;Medium shield generator\t|\t 375 cr&nbsp;&nbsp;|\t+2\t| 6 lb&nbsp;&nbsp;|�| | &emsp;Heavy physical shield\t|\t 500 cr&nbsp;&nbsp;|\t+3\t|36 lb&nbsp;&nbsp;|Obtrusive, strength 15| | &emsp;Heavy shield generator\t|  1,250 cr&nbsp;&nbsp;|\t+3\t|12 lb&nbsp;&nbsp;|�|</p></div>\n\n<h3>Getting Into and Out of Armor</h3>\n\n<p>The time it takes to don or doff armor depends on the armor's category. If you have help, you can reduce the time it takes to don or doff armor by half.</p>\n\n<strong><em>Don.</em></strong> This is the time it takes to<br> put on armor or wield your shield.<br> You benefit from the armor only<br> if you take the full time to don<br> the suit of armor.\n\n<strong><em>Doff.</em></strong> This is the time it<br> takes to remove armor or<br> store your shield. \n\n<h3>Donning and Doffing Armor</h3>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Category</th><th>Don</th><th>Doff</th></tr></thead><tbody><tr><td>Light armor</td><td>1 minute</td><td>1 minute</td></tr><tr><td>Medium armor</td><td>5 minutes</td><td>1 minute</td></tr><tr><td>Heavy armor</td><td>10 minutes</td><td>5 minutes</td></tr><tr><td>Light shield</td><td>1 reaction</td><td>1 reaction</td></tr><tr><td>Medium shield</td><td>1 bonus action</td><td>1 bonus action</td></tr><tr><td>Heavy shield</td><td>1 action</td><td>1 action</td></tr></tbody></table>\n\n<img src='https://www.gmbinder.com/images/yOuRSWV.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:840px' />\n\n\n\n<h2>Weapons</h2>\n\n<p>Your class grants proficiency in certain weapons, reflecting both the class's focus and the tools you are most likely to use. Whether you favor a vibroweapon or a blaster, your weapon and your ability to wield it effectively can mean the difference between life and death while adventuring. The Weapons tables show the most common weapons used in the worlds of <em>Star Wars</em>, their price and weight, the damage they deal when they hit, and any special properties they possess. Every weapon is classified as a blaster, lightweapon, or vibroweapon. A vibroweapon or lightweapon is used to attack a target within 5 feet of you, whereas a blaster is used to attack a target at a distance. Lightweapons are generally used in melee, but due to their nature require separate proficiency.</p>\n\n<h3>Weapon Proficiency</h3>\n\n<p>Your species, class, and feats can grant you proficiency with certain weapons or categories of weapons. The two categories are simple and martial. Most people can use simple weapons, which are commonly seen in the hands of the unspecialized, with proficiency. Martial weapons, such as vibroswords or sniper rifles, require more specialized training to use effectively. Most warriors use martial weapons because these weapons put their fighting style and training to best use. Proficiency with a weapon allows you to add your proficiency bonus to the attack roll for any attack you make with that weapon. If you make an attack roll using a weapon with which you lack proficiency, you do not add your proficiency bonus to the attack roll.</p>\n\n<h3>Improvised Weapons</h3>\n\n<p>Sometimes characters don't have their weapons and have to attack with whatever is close at hand. An improvised weapon includes any object you can wield in one or two hands, such as broken glass, a table leg, a frying pan, a wagon wheel, or a dead jawa.</p>\n\n<p>In many cases, an improvised weapon is similar to an actual weapon and can be treated as such. At the GM's discretion, a character proficient with a weapon can use a similar object as if it were that weapon and use his or her proficiency bonus.</p>\n\n<p>An object that bears no resemblance to a weapon deals 1d4 kinetic damage. If a character uses a ranged weapon to make a melee attack, or throws a melee weapon that does not have the thrown property, it also deals 1d4 damage. An improvised thrown weapon has a normal range of 20 feet and a long range of 60 feet.</p>\n\n<h3>Weapon Properties</h3>\n\n<p>Many weapons have special properties related to their use, as shown in the Weapons table.</p>\n\n<h4>Ammunition</h4>\n\n<p>You can use a weapon that has the ammunition property to make a ranged attack only if you have ammunition to fire from the weapon. Each time you attack with the weapon, you expend one piece of ammunition. If you use a weapon that has the ammunition property to make a melee attack, you treat the weapon as an improvised weapon. </p>\n\n\n\n<h4>Auto</h4>\n\n<p>Automatic weapons can only fire in burst or rapid modes. If the weapon has both burst and rapid properties, you choose which mode to use. You can only use one mode at a time.</p>\n\n<h4>Burst</h4>\n\n<p>When you would make a ranged weapon attack with a weapon with the burst property, you can instead spray a 10-foot-cube area within range with shots, consuming ammunition equal to the burst number. Each creature in the area must make a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon) or take the weapon's normal damage. If the targeted area is beyond normal range but within long range, affected targets have advantage on the save.</p>\n\n<h4>Dexterity</h4>\n\n<p>A weapon with this special property requires more skill to control. While wielding it, you have disadvantage on attack rolls unless you meet the Dexterity requirement. </p>\n\n<h4>Disguised</h4>\n\n<p>You have advantage on Charisma (Deception) checks made to hide the nature of a disguised weapon.</p>\n\n<h4>Double</h4>\n\n<p>This weapon can be used with one or two hands. A damage value in parentheses appears with the property�the damage when the weapon is used with Double-Weapon Fighting. See the rules for Double-Weapon Fighting in chapter 9.</p>\n\n<h4>Finesse</h4>\n\n<p>When making an attack with a finesse weapon, you use your choice of your Strength or Dexterity modifier for the attack and damage rolls. You must use the same modifier for both rolls.</p>\n\n<h4>Fixed</h4>\n\n<p>A weapon with the fixed property does not fill the hand, but you can't use the weapon while the hand is full. Additionally, you have a +10 bonus to ability checks and saving throws to avoid being disarmed of this weapon.</p>\n\n<h4>Heavy</h4>\n\n<p>When you hit with an attack roll using Strength with this weapon, you deal additional damage equal to half your Strength modifier (rounded up, minimum of +1).</p>\n\n<h4>Hidden</h4>\n\n<p>You have advantage on Dexterity (Sleight of Hand) checks made to conceal a hidden weapon.</p>\n\n<h4>Light</h4>\n\n<p>A light weapon is small and easy to handle, making it ideal for use when engaging in Double- or Two-Weapon Fighting. See the rules for Double- and Two-Weapon Fighting in chapter 9.</p>\n\n<h4>Luminous</h4>\n\n<p>A weapon with the luminous property sheds dim light in a 5-foot radius while activated. Additionally, Dexterity (Stealth) checks made while the weapon is activated have disadvantage.</p>\n\n\n\n<h4>Range</h4>\n\n<p>A weapon that can be used to make a ranged attack has a range shown in parentheses after the ammunition or thrown property. The range lists two numbers. The first is the weapon's normal range in feet, and the second indicates the weapon's maximum range. When attacking a target beyond normal range, you have disadvantage on the attack roll. You can't attack a target beyond the weapon's long range.</p>\n\n<h4>Rapid</h4>\n\n<p>When you would make a ranged weapon attack with a weapon with the rapid property, you can instead unload on a single target, consuming ammunition equal to the rapid number. The target must make a Dexterity saving throw (DC = 8 + your bonus to attacks with the weapon). On a failed save, roll the weapon's damage dice twice and add them together, adding relevant modifiers as normal. If the target is beyond normal range but within long range, it has advantage on the save.</p>\n\n<h4>Reach</h4>\n\n<p>This weapon adds 5 feet to your reach with it.</p>\n\n<h4>Reload</h4>\n\n<p>A limited number of shots can be made with a weapon that has the reload property. A character must then reload it using an action or a bonus action (the character's choice). You must have one free hand to reload.</p>\n\n<h4>Returning </h4>\n\n<p>When you throw a weapon with the returning property, it automatically returns to your hand after the attack is complete, whether you hit or miss.</p>\n\n<h4>Special</h4>\n\n<p>A weapon with the special property has unusual rules governing its use, explained in the weapon's description (see \"Special Weapons\" later in this section).</p>\n\n<h4>Strength</h4>\n\n<p>A weapon with this special property has a heavy kickback. While wielding it, you have disadvantage on attack rolls unless you meet the Strength requirement. If the weapon has the burst or rapid property, you must meet the Strength requirement to use this feature.</p>\n\n<h4>Thrown</h4>\n\n<p>If a weapon has the thrown property, you can throw the weapon to make a ranged attack. If the weapon is a melee weapon, you use the same ability modifier for that attack roll and damage roll that you would use for a melee attack with the weapon. </p>\n\n<h4>Two-Handed</h4>\n\n<p>This weapon requires two hands to use.</p>\n\n<h4>Versatile</h4>\n\n<p>This weapon can be used with one or two hands. A damage value in parentheses appears with the property�the damage when the weapon is used with two hands to make a melee attack.\t</p>\n\n<h3>Special Weapons</h3>\n\n<p>Weapons with special rules are described below.</p>\n\n<h4>Needler</h4>\n\n<p>The needler includes a specialized compartment for poison. One dose of poison, when installed in this compartment, retains its potency for 1 hour before drying. One dose of poison is effective for the next 10 shots fired by the weapon.</p>\n\n<h4>Net</h4>\n\n<p>A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on formless or Huge or larger creatures. A creature can use its action to make a DC 13 Strength check, freeing itself or another creature within its reach on a success. The net has an AC of 10, 5 hit points, and immunity to all damage not dealt by melee weapons. Destroying the net frees the creature without harming it and immediately ends the net's effects. While a creature is restrained by a net, you can make no further attacks with it.</p>\n\n<h4>Tranquilizer Rifle </h4>\n\n<p>The tranquilizer rifle includes a specialized compartment for poison. One dose of poison, when installed in this compartment, retains its potency for 1 hour before drying. One dose of poison is effective for the next 4 shots fired by the weapon.</p>\n\n<h4>Vibrodart</h4>\n\n<p>Due to their diminutive size, vibrodarts make ineffective melee weapons. Melee attack rolls made with them are made at disadvantage.</p>\n\n<h4>Vibrolance</h4>\n\n<p>You have disadvantage when you use a vibrolance to attack a target within 5 feet of you. Also, a lance requires two hands to wield when you aren't mounted.</p>\n\n<h4>Wrist Launcher</h4>\n\n<p>Rather than traditional power cells, the wrist launcher fires specialized projectiles in the form of darts, small missiles, or specialized canisters. </p>\n\n<img src='https://www.gmbinder.com/images/VnnGzhK.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:760px' />\n\n<div class=\"sw5e-book-block\"><h5>Blasters</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| &emsp;Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties|  |:---|---:|:---|-:|:---| |\t<em>Simple Blasters</em>\t||||| | &emsp;Blaster carbine\t\t|  300 cr&nbsp;&nbsp;|1d6 energy\t\t| 8 lb&nbsp;&nbsp;\t|Ammunition (range 60/240), reload 16, 