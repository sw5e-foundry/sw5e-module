        <h3>Biology and Appearance</h3>

        A bipedal mammalian species, Devaronians evolved in the dense jungles of Devaron as a hunter-gather species. Their bodies are denser than most humanoids' and as a result they were heavier than their<br> appearance would tend to indicate. Devaronians have<br> silver-based blood, which appears thick and black<br> when exposed. They possess a unique blood filtration<br> and cleansing system which processes through two<br> livers. Because their bodies are constantly cleansed of<br> toxins and carcinogens, the species is highly resistant<br> to poison. To this end, sulfur is used as a stimulant on<br> Devaron to enhance speed and strength, because<br> inhaling it causes the substance to enter the<br> bloodstream rapidly. Their livers struggle to eliminate<br> sulfur from their system, meaning that long-term use<br> can be dangerous.

        <h3>Society and Culture</h3>

        <p>Devaronian males are driven by an urge to wander, usually taking the first opportunity to move on from one place to another; they are often found traveling the galaxy as tramp freighter captains and scouts. Female Devaronians, on the other hand, are content to remain in a single location, raising the young and running the government of Devaron. The males send money back to their homeworld to support their families, but otherwise hardly ever return. The females are content with this arrangement, as they tend to view the restless males as disruptive to home life. </p>

        <h3>Names</h3>

        <p>Devaronian names are dark, complex and often guttural, with some harsher tones mixed in here and there.</p>

        <p><strong>Male Names.</strong> Cir, Gremegris, Keirtihk, Kucx, Niruhk</p>

        <p><strong>Female Names.</strong> Crilnuy, Ghal, Milma, Nola, Taoluel </p>

        <p><strong>Surnames.</strong> Breiz, Droddost, G'vaulnel, Raokt</p>



        <h3>Devaronian Traits</h3>

        <p>As a devaronian, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Constitution score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Devaronians reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Devaronians' greediness causes them to tend toward chaotic balanced, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Devaronians typically stand between 5 and 6 feet tall and weigh about 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Jungle Dweller.</em></strong> Growing up in the jungles of Devaron has left an impact. You are proficient in Survival. Additionally, you don't treat jungle terrain as difficult terrain.</p>

        <p><strong><em>Tech Resistance.</em></strong> Growing up around technology leaves an impact on devaronians. You have advantage on Dexterity and Intelligence saving throws against tech powers.</p>

        <p><strong><em>Two Livered.</em></strong> Devaronians have two livers, which makes them adept at filtering toxins. You have advantage on saving throws against poison, and you have resistance against poison damage (explained in chapter 9).</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Devaronese. Devaronese is characterized by grunts and grumbles. It is rare to hear a Devaronian speak it anywhere other than their homeworld of Devaron.</p>

