  - name: 'Chapter 4: Personality and Backgrounds'
    _id: ZrmB5Yl0IwfWGKvL
    text:
      content: "<h1>Chapter 4: Personality and Backgrounds</h1>\n\n\n\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style=\"font-variant: small-caps\">haracters are defined by much more than their species</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;  and class. They're individuals with their own stories, interests, connections, and capabilities beyond those that class and species define. This section expounds on the details that distinguish characters from one another, including the basics of name and physical description, the rules of backgrounds and languages, and the finer points of personality and alignment.\n\n<h2>Character Details</h2>\n\n<p>Your character's name and physical description might be the first things that the other players at the table learn about you. It's worth thinking about how these characteristics reflect the character you have in mind.</p>\n\n<h3>Name</h3>\n\n<p>Your character's species description includes sample names for members of that species. Put some thought into your name even if you're just picking one from a list.</p>\n\n<h3>Sex</h3>\n\n<p>You can play a male or female character without gaining any special benefits or hindrances. Think about how your character does or does not conform to the broader culture's expectations of sex, gender, and sexual behavior.</p>\n\n<p>You don't need to be confined to binary notions of sex and gender. Some species believe in companionship that doesn't take into account gender. You could also play a female character who presents herself as a man or a man who feels trapped in a female body. Likewise, your character's sexual orientation is for you to decide.</p>\n\n<h3>Height and Weight</h3>\n\n<p>You can decide your character's height and weight, using the information provided in your species description. Think about what your character's ability scores might say about his or her height and weight. A weak but agile character might be thin. A strong and Durable character might be tall or heavy.</p>\n\n<p>You can also roll randomly for your character's height and weight using that species's Physical Characteristics table, as shown above. The first dice roll given in the second column determines the character's extra height (in inches) beyond the base height. That same number multiplied by the second dice roll or quantity given in the second column determines the character's extra weight (in pounds) beyond the base weight.</p>\n\n<p>For example, as a human, Obi-Wan has a height of 4 feet 8 inches plus 2d10 inches. We roll 2d10 and gets a total of 12, so Obi-Wan stands 5 feet 8 inches tall. Then we use that same roll of 12 and multiplies it by 2d4 pounds. His 2d4 roll is 3, so Obi-Wan weighs an extra 36 pounds (12x3) on top of his base 110 pounds, for a total of 146 pounds.</p>\n\n<br>\n\n<hr>\n\n<h2>Human</h2>\n\n<blockquote><hr>\n\n<h4>Physical Characteristics</h4>\n\n<table class=\"sw5e-book-table\"><thead><tr><th></th><th></th><th></th><th></th></tr></thead><tbody><tr><td><strong><em>Height</em></strong></td><td>&nbsp;&nbsp;</td><td>4'8\"</td><td>+2d10\"</td></tr><tr><td><strong><em>Weight</em></strong></td><td>&nbsp;&nbsp;</td><td>110 lb.</td><td>x(2d4) lb.</td></tr></tbody></table></blockquote>\n\n<h3>Other Physical Characteristics</h3>\n\n<p>You choose your character's age and the color of his or her hair, eyes, and skin. To add a touch of distinctiveness, you might want to give your character an unusual or memorable physical characteristic, such as a scar, a limp, or a tattoo.</p>\n\n<h3>Alignment</h3>\n\n<p>A typical creature in the galaxy has an alignment, which broadly describes its moral and personal attitudes. Alignment is a combination of two factors: one identifies morality, and is typically defined in terms of the Force: (light, dark, or balanced), and the other describes attitudes toward society and order (lawful, chaotic, or neutral). Thus, nine distinct alignments define the possible combinations.</p>\n\n<p>These brief summaries describe the typical behavior of a creature with that alignment. Individuals might vary significantly from that typical behavior, and few people are perfectly and consistently faithful to the precepts of their alignment. </p>\n\n<p>You can pick your alignment or roll to determine it randomly. Roll separately for Morality and Society.</p>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Morality</th></tr></thead><tbody><tr><td>1-2</td><td><strong>Light:</strong> Usually the needs of others outweigh my own, (...)</td></tr><tr><td>3-4</td><td><strong>Dark:</strong> Usually my needs outweigh others', (...)</td></tr><tr><td>5-6</td><td><strong>Balanced:</strong> Usually circumstances dictate whose needs are more important, (...)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Society</th></tr></thead><tbody><tr><td>1-2</td><td><strong>Lawful:</strong> (...) but the means are as important as the end.</td></tr><tr><td>3-4</td><td><strong>Chaotic:</strong> (...) but the ends justify the means.</td></tr><tr><td>5-6</td><td><strong>Neutral:</strong> (...) but either the ends or the means may be more important, depending.</td></tr></tbody></table>\n\n<h4>Alignment in the Galaxy</h4>\n\n<p>For many thinking creatures, alignment is a moral choice. Humans and ugnaughts can choose whether to follow the paths of darkness or light, of law or chaos. Lanniks tend to follow the light side, while sith purebloods tend toward the dark. Chiss are lawful, while aqualish are often chaotic.</p>\n\n\n\n<h3>Languages</h3>\n\n<p>Your species indicates the languages your character can speak by default, and your background might give you access to one or more additional languages of your choice. Note these languages on your character sheet.</p>\n\n<p>Choose your languages based on the species you commonly interact with. If you have a wookiee sidekick, you might understand-if not speak-Shyriiwook. Alternatively, if you commonly trade with Jawas, you might speak Jawaese.</p>\n\n<p>A list of the most commonly spoken languages of <em>Star Wars</em> can be found below in the Common Languages table.</p>\n\n<h5>Common Languages</h5>\n\n<div class=\"sw5e-book-block\"><p>|| |:--:| |   Binary  | |\tBith\t| |\tBothese\t| |   Catherese   | |   Cerean  | |\tCheunh\t| |   Devaronese  | |\tDosh\t| |\tDurese\t| |   Ewokese | |\tGalactic Basic\t| |   Gamorrese   | |   Gungan  | |\tHuttese\t|</p>\n\n<p>|| |:--:| |   Ithorese    | |\tJawaese\t| |\tKel Dor\t| |\tMon Cal\t| |   Nautila | |\tRodese\t| |\tShyriiwook\t| |\tSith\t| |   Sriluurian  | |\tTogruti\t| |   Tusken  | |\tTwi'leki\t| |\tZabraki\t|</p></div>\n\n<h3>Personal Characteristics</h3>\n\n<p>Fleshing out your character's personality�the array of traits, mannerisms, habits, beliefs, and flaws that give a person a unique identity�will help you bring him or her to life as you play the game. Four categories of characteristics are presented here: personality traits, ideals, bonds, and flaws. Beyond those categories, think about your character's favorite words or phrases, tics and habitual gestures, vices and pet peeves, and whatever else you can imagine.</p>\n\n<p>Each background presented later in this chapter includes suggested characteristics that you can use to spark your imagination. You're not bound to those options, but they're a good starting point.</p>\n\n<h4>Personality Traits</h4>\n\n<p>Give your character two personality traits. Personality traits are small, simple ways to help you set your character apart from every other character. Your personality traits should tell you something interesting and fun about your character. They should be self-descriptions that are specific about what makes your character stand out. \"I'm smart\" is not a good trait, because it describes a lot of characters. \"I've read every book I can get my hands on\" tells you something specific about your character's interests and disposition.</p>\n\n\n\n<p>Personality traits might describe the things your character likes, his or her past accomplishments, things your character dislikes or fears, your character's self-attitude or mannerisms, or the influence of his or her ability scores.</p>\n\n<p>A useful place to start thinking about personality traits is to look at your highest and lowest ability scores and define one trait related to each. Either one could be positive or negative: you might work hard to overcome a low score, for example, or be cocky about your high score.</p>\n\n<h4>Ideals</h4>\n\n<p>Describe one ideal that drives your character. Your ideals are the things that you believe in most strongly, the fundamental moral and ethical principles that compel you to act as you do. Ideals encompass everything from your life goals to your core belief system.</p>\n\n<p>Ideals might answer any of these questions: What are the principles that you will never betray? What would prompt you to make sacrifices? What drives you to act and guides your goals and ambitions? What is the single most important thing you strive for?</p>\n\n<p>You can choose any ideals you like, but your character's alignment is a good place to start defining them. Each background in this chapter includes six suggested ideals. Five of them are linked to aspects of alignment: dark, light, or neutral. The last one has more to do with the particular background than with moral or ethical perspectives.</p>\n\n<h4>Bonds</h4>\n\n<p>Create one bond for your character. Bonds represent a character's connections to people, places, and events in the world. They tie you to things from your background. They might inspire you to heights of heroism, or lead you to act against your own best interests if they are threatened. They can work very much like ideals, driving a character's motivations and goals.</p>\n\n<p>Bonds might answer any of these questions: Whom do you care most about? To what place do you feel a special connection? What is your most treasured possession?</p>\n\n<p>Your bonds might be tied to your class, your background, your species, or some other aspect of your character's history or personality. You might also gain new bonds over the course of your adventures.</p>\n\n<h4>Flaws</h4>\n\n<p>Finally, choose a flaw for your character. Your character's flaw represents some vice, compulsion, fear, or weakness�in particular, anything that someone else could exploit to bring you to ruin or cause you to act against your best interests. More significant than negative personality traits, a flaw might answer any of these questions: What enrages you? What's the one person, concept, or event that you are terrified of? What are your vices?</p>\n\n\n\n<h2>Inspiration</h2>\n\n<p>Inspiration is a rule the game master can use to reward you for playing your character in a way that's true to his or her personality traits, ideal, bond, and flaw. By using inspiration, you can draw on your personality trait of compassion for the downtrodden to give you an edge in negotiating with the Beggar Prince. Or inspiration can let you call on your bond to the defense of your home village to push past the effect of a power that has been laid on you.</p>\n\n<h3>Gaining Inspiration</h3>\n\n<p>Your GM can choose to give you inspiration for a variety of reasons. Typically, GMs award it when you play out your personality traits, give in to the drawbacks presented by a flaw or bond, and otherwise portray your character in a compelling way. Your GM will tell you how you can earn inspiration in the game.</p>\n\n<p>You either have inspiration or you don't - you can't stockpile multiple \"inspirations\" for later use.</p>\n\n<h3>Using Inspiration</h3>\n\n<p>If you have inspiration, you can expend it when you make an attack roll, saving throw, or ability check. Spending your inspiration gives you advantage on that roll.</p>\n\n<p>Additionally, if you have inspiration, you can reward another player for good roleplaying, clever thinking, or simply doing something exciting in the game. When another player character does something that really contributes to the story in a fun and interesting way, you can give up your inspiration to give that character inspiration.</p>\n\n<h2>Backgrounds</h2>\n\n<p>Every story has a beginning. Your character's background reveals where you came from, how you became an adventurer, and your place in the world. Your fighter might have been a pit fighter or a grizzled soldier. Your consular could have been a student or an envoy. Your operative might have gotten by as a government agent or commanded audiences as an entertainer.</p>\n\n<p>Choosing a background provides you with important story cues about your character's identity. The most important question to ask about your background is what changed? Why did you stop doing whatever your background describes and start adventuring? Where did you get the money to purchase your starting gear, or, if you come from a wealthy background, why don't you have more money? How did you learn the skills of your class? What sets you apart from ordinary people who share your background?</p>\n\n<p>The sample backgrounds in this chapter provide both concrete benefits (features, proficiencies, and languages) and roleplaying suggestions.</p>\n\n\n\n<h4>Proficiencies</h4>\n\n<p>Each background gives a character proficiency in two skills. Skills are described in chapter 7.</p>\n\n<p>In addition, most backgrounds give a character proficiency with one or more tools. Tools and tool proficiencies are detailed in chapter 5.</p>\n\n<p>If a character would gain the same proficiency from two different sources, he or she can choose a different proficiency of the same kind (skill or tool) instead.</p>\n\n<h4>Languages</h4>\n\n<p>Some backgrounds also allow characters to learn additional languages beyond those given by species. See \"Languages\" earlier in this chapter.</p>\n\n<h4>Equipment</h4>\n\n<p>Each background provides a package of starting equipment. If you use the optional rule from chapter 5 to spend coin on gear, you do not receive the starting equipment from your background.</p>\n\n<h4>Background Feat</h4>\n\n<p>Each background gives a character a starting feat. Feats are described in chapter 6. </p>\n\n<h4>Suggested Characteristics</h4>\n\n<p>A background contains suggested personal characteristics based on your background. You can pick characteristics, roll dice to determine them randomly, or use the suggestions as inspiration for characteristics of your own creation.</p>\n\n<h3>Customizing a Background</h3>\n\n<p>You might want to tweak some of the features of a background so it better fits your character or the campaign setting. To customize a background, you can replace one feature with any other one, choose any two skills, a total of two tool proficiencies or languages, and a feat from the sample backgrounds. You can either use the equipment package from your background or spend coin on gear as described in chapter 5. (If you spend credits, you can't also take the equipment package suggested &nbsp;&nbsp;&nbsp;&nbsp;for your class.) Finally, choose two personality traits, &nbsp;&emsp;&emsp;one ideal, one bond, and one flaw. If you can't find a &nbsp;&nbsp;&nbsp;feature that matches your desired background, work &nbsp;&nbsp;&nbsp;with your GM to create one.</p>\n\n<img src='https://www.gmbinder.com/images/fCleZ2B.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:855px' />\n\n<h2>Agent</h2>\n\n<p>Many organizations active in the galaxy aren't bound by strictures of geography. These factions pursue their agendas without regard for political boundaries, and their members operate anywhere the organization deems necessary. These groups employ listeners, rumormongers, smugglers, mercenaries, cache-holders (people who guard caches of wealth or items for use by the faction's operatives), haven keepers, and message drop minders, to name a few. At the core of every faction are those who don't merely fulfill a small function for that organization, but who serve as its hands, head, and heart. As a prelude to your adventuring career (and in preparation for it), you served as an agent of a particular faction. You might have operated openly or secretly, depending on the faction and its goals, as well as how those goals mesh with your own. Becoming an adventurer doesn't necessarily require you to relinquish membership in your faction (though you can choose to do so), and it might enhance your status in the faction.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Investigation, Lore, and Persuasion</li><li><strong>Languages:</strong> Two of your choice</li><li><strong>Equipment:</strong> Badge or emblem of your faction, a copy of a seminal faction text (or a code-book for a covert faction), a set of common clothes, and a pouch containing 150 cr</li></ul>\n\n<h3>Feature: Safe Haven</h3>\n\n<p>As a faction agent, you have access to a secret network of supporters and operatives who can provide assistance on your adventures. You know a set of secret signs and passwords you can use to identify such operatives, who can provide you with access to a hidden safe house, free room and board, or assistance in finding information. These agents never risk their lives for you or risk revealing their true identities.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Alert</td></tr><tr><td>7</td><td>Observant</td></tr><tr><td>8</td><td>Practiced</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Agents are shaped by their experience in their faction's communities. Their study of the history and tenets of their faction and their relationships to it affect their mannerisms and ideals. Their flaws might be some hidden hypocrisy or heretical idea, or an ideal or bond taken to an extreme.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I idolize a particular hero of my faction, and constantly refer to that person's deeds and example.</td></tr><tr><td>2</td><td>I can find common ground between the fiercest enemies, empathizing with them and always working towards peace.</td></tr><tr><td>3</td><td>I see omens in every event and action.</td></tr><tr><td>4</td><td>Nothing can shake my optimistic attitude.</td></tr><tr><td>5</td><td>I quote (or misquote) sacred texts and proverbs in almost every situation.</td></tr><tr><td>6</td><td>I am tolerant (or intolerant) of other factions and respect (or condemn) them.</td></tr><tr><td>7</td><td>I've enjoyed fine food, drink, and high society among my faction's elite. Rough living grates on me.</td></tr><tr><td>8</td><td>I have little practical experience dealing with people in the  world.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Tradition.</strong> The ancient traditions of worship and sacrifice must be preserved and upheld. (Lawful)</td></tr><tr><td>2</td><td><strong>Charity.</strong> I always try to help those in need, no matter what the personal cost. (Light)</td></tr><tr><td>3</td><td><strong>Change.</strong> We must help bring about the changes the gods are constantly working in the world. (Chaotic)</td></tr><tr><td>4</td><td><strong>Power.</strong> I hope to one day rise to the top of my faith's religious hierarchy. (Lawful)</td></tr><tr><td>5</td><td><strong>Faith.</strong> I trust that my leader will guide my actions, I have faith that if I work hard, things will go well. (Lawful)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I seek to prove myself worthy of my leader's favor by matching my actions against his or her teachings. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I would die to recover an artifact of my faction that was lost long ago.</td></tr><tr><td>2</td><td>I will someday get revenge on the corrupt faction hierarchy who branded me a heretic.</td></tr><tr><td>3</td><td>I owe my life to the faction member who took me in when my parents died.</td></tr><tr><td>4</td><td>Everything I do is for the common people.</td></tr><tr><td>5</td><td>I will do anything to protect the faction where I served.</td></tr><tr><td>6</td><td>I seek to preserve a sacred text that my enemies consider heretical and seek to destroy.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I judge others harshly, and myself even more severely.</td></tr><tr><td>2</td><td>I put too much trust in those who wield power within my faction's hierarchy.</td></tr><tr><td>3</td><td>My piety sometimes leads me to blindly trust those that profess faith in my faction.</td></tr><tr><td>4</td><td>I am inflexible in my thinking.</td></tr><tr><td>5</td><td>I am suspicious of strangers and expect the worst of them.</td></tr><tr><td>6</td><td>Once I pick a goal, I become obsessed with it to the detriment of everything else in my life.</td></tr></tbody></table>\n\n\n\n<h2>Bounty Hunter </h2>\n\n<p>Before you became an adventurer, your life was already full of conflict and excitement, because you made a living tracking down people for pay. Unlike some people who collect bounties, though, you aren't a savage who follows quarry into or through the wilderness. You're involved in a lucrative trade, in the place where you live, that routinely tests your skills and survival instincts. What's more, you aren't alone, as a bounty hunter in the wild would be: you routinely interact with both the criminal subculture and other bounty hunters, maintaining contacts in both areas to help you succeed.</p>\n\n<p>You might be a cunning thief-catcher, prowling the rooftops to catch one of the myriad burglars of the city. Perhaps you are someone who has your ear to the street, aware of the doings of street gangs. You might be a \"velvet mask\" bounty hunter, one who blends in with high society and noble circles in order to catch the criminals that prey on the rich, whether pickpockets or con artists. As a member of an adventuring party, you might find it more difficult to pursue a personal agenda that doesn't fit with the group's objectives - but on the other hand, you can take down much more formidable targets with the help of your companions.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Persuasion, and Stealth</li><li><strong>Tool Proficiencies:</strong> Your choice of demolitions kit, security kit, or slicer's kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of clothes appropriate to your duties, a set of binders, and a pouch containing 200 cr</li></ul>\n\n<h3>Feature: Ear to the Ground</h3>\n\n<p>You are in frequent contact with people in the segment of society that your chosen quarries move through. These people might be associated with the criminal underworld, the rough-and-tumble folk of the streets, or members of high society. This connection comes in the form of a contact in any city you visit, a person who provides information about the people and places of the local area.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Charmer</td></tr><tr><td>4</td><td>Stealthy</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Alert</td></tr><tr><td>8</td><td>Athlete</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Your bond might involve other bounty hunters or the organizations or individuals that employ you. Your ideal could be associated with your determination always to catch your quarry or your desire to maintain your reputation for being dependable.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I always have a plan for what to do when things go wrong.</td></tr><tr><td>2</td><td>I am always calm, no matter what the situation. I never raise my voice or let my emotions control me.</td></tr><tr><td>3</td><td>The first thing I do in a new place is note the locations of everything valuable � or where such things could be hidden.</td></tr><tr><td>4</td><td>I would rather make a new friend than a new enemy.</td></tr><tr><td>5</td><td>I am incredibly slow to trust. Those who seem the fairest often have the most to hide.</td></tr><tr><td>6</td><td>I don't pay attention to the risks in a situation. Never tell me the odds.</td></tr><tr><td>7</td><td>The best way to get me to do something is to tell me I can't do it.</td></tr><tr><td>8</td><td>I blow up at the slightest insult.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Honor.</strong> I don't steal from others in the trade. (Lawful)</td></tr><tr><td>2</td><td><strong>Freedom.</strong> Chains are meant to be broken, as are those who would forge them. (Chaotic)</td></tr><tr><td>3</td><td><strong>Charity.</strong> I steal from the wealthy so that I can help people in need. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I will do whatever it takes to become wealthy. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I'm loyal to my friends, not to any ideals, and everyone else can jog on for all I care. (Neutral)</td></tr><tr><td>6</td><td><strong>Redemption.</strong> There's a spark of good in everyone. (Light)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I'm trying to pay off an old debt I owe to a generous benefactor.</td></tr><tr><td>2</td><td>My ill-gotten gains go to support my family.</td></tr><tr><td>3</td><td>Something important was taken from me, and I aim to steal it back.</td></tr><tr><td>4</td><td>I will become the greatest thief that ever lived.</td></tr><tr><td>5</td><td>I'm guilty of a terrible crime. I hope I can redeem myself for it.</td></tr><tr><td>6</td><td>Someone I loved died because of a mistake I made. That will never happen again.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>When I see something valuable, I can't think about anything but how to steal it.</td></tr><tr><td>2</td><td>When faced with a choice between money and my friends, I usually choose the money.</td></tr><tr><td>3</td><td>If there's a plan, I'll forget it. If I don't forget it, I'll ignore it.</td></tr><tr><td>4</td><td>I have a �tell� that reveals when I'm lying.</td></tr><tr><td>5</td><td>I turn tail and run when things look bad.</td></tr><tr><td>6</td><td>An innocent person is in prison for a crime that I committed. I'm okay with that.</td></tr></tbody></table>\n\n\n\n<h2>Criminal</h2>\n\n<p>You are an experienced criminal with a history of breaking the law. You have spent a lot of time among other criminals and still have contacts within the criminal underworld. You're far closer than most people to the world of murder, theft, and violence that pervades the underbelly of civilization, and you have survived up to this point by flouting the rules and regulations of society.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Intimidation, Sleight of Hand, and Stealth</li><li><strong>Tool Proficiencies:</strong> One type of gaming set, your choice of demolitions kit, security kit, or slicer's kit</li><li><strong>Equipment:</strong> A set of common clothes with a hood, a gaming set (one of your choice), and a belt pouch containing 150 cr</li></ul>\n\n<h4>Criminal Specialty</h4>\n\n<p>Individual criminals often have particular specialties, whether a part of an organization or a solo endeavor. Choose the role you played in your criminal life, or roll on the table below.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>1</td><td>Blackmailer</td></tr><tr><td>2</td><td>Burglar</td></tr><tr><td>3</td><td>Enforcer</td></tr><tr><td>4</td><td>Fence</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>5</td><td>Highway robber</td></tr><tr><td>6</td><td>Hired killer</td></tr><tr><td>7</td><td>Pickpocket</td></tr><tr><td>8</td><td>Thug</td></tr></tbody></table></div>\n\n<h3>Feature: Criminal Contact</h3>\n\n<p>You have a reliable and trustworthy contact who acts as your liaison to a network of other criminals. You know how to get messages to and from your contact, even over great distances; specifically, you know the local messengers, corrupt caravan masters, and seedy sailors who can deliver messages for you.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Threatening</td></tr><tr><td>3</td><td>Quick-Fingered</td></tr><tr><td>4</td><td>Stealthy</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Feigned Confidence</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Criminals might seem like villains on the surface, and many of them are villainous to the core. But some have an abundance of endearing, if not redeeming, characteristics. There might be honor among thieves, but criminals rarely show any respect for law or authority. </p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I always have a plan for what to do when things go wrong.</td></tr><tr><td>2</td><td>I am always calm, no matter what the situation. I never raise my voice or let my emotions control me.</td></tr><tr><td>3</td><td>The first thing I do in a new place is note the locations of everything valuable � or where such things could be hidden.</td></tr><tr><td>4</td><td>I would rather make a new friend than a new enemy.</td></tr><tr><td>5</td><td>I am incredibly slow to trust. Those who seem the fairest often have the most to hide.</td></tr><tr><td>6</td><td>I don't pay attention to the risks in a situation. Never tell me the odds.</td></tr><tr><td>7</td><td>The best way to get me to do something is to tell me I can't do it.</td></tr><tr><td>8</td><td>I blow up at the slightest insult.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Honor.</strong> I don't steal from others in the trade. (Lawful)</td></tr><tr><td>2</td><td><strong>Freedom.</strong> Chains are meant to be broken, as are those who would forge them. (Chaotic)</td></tr><tr><td>3</td><td><strong>Charity.</strong> I steal from the wealthy so that I can help people in need. (Light)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I will do whatever it takes to become wealthy. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I'm loyal to my friends, not to any ideals, and everyone else can take a trip down the Styx for all I care. (Neutral)</td></tr><tr><td>6</td><td><strong>Redemption.</strong> There's a spark of good in everyone. (Light)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I'm trying to pay off an old debt I owe to a generous benefactor.</td></tr><tr><td>2</td><td>My ill-gotten gains go to support my family.</td></tr><tr><td>3</td><td>Something important was taken from me, and I aim to steal it back.</td></tr><tr><td>4</td><td>I will become the greatest thief that ever lived.</td></tr><tr><td>5</td><td>I'm guilty of a terrible crime. I hope I can redeem myself for it.</td></tr><tr><td>6</td><td>Someone I loved died because of a mistake I made. That will never happen again.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>When I see something valuable, I can't think about anything but how to steal it.</td></tr><tr><td>2</td><td>When faced with a choice between money and my friends, I usually choose the money.</td></tr><tr><td>3</td><td>If there's a plan, I'll forget it. If I don't forget it, I'll ignore it.</td></tr><tr><td>4</td><td>I have a �tell� that reveals when I'm lying.</td></tr><tr><td>5</td><td>I turn tail and run when things look bad.</td></tr><tr><td>6</td><td>An innocent person is in prison for a crime that I committed. I'm okay with that.</td></tr></tbody></table>\n\n\n\n<h2>Entertainer</h2>\n\n<p>You thrive in front of an audience, knowing how to entrance them, entertain them, and even inspire them. Your poetics can stir the hearts of those who hear you, awakening grief or joy, laughter or anger. Your music raises their spirits or captures their sorrow. Your dance steps captivate, your humor cuts to the quick. Whatever techniques you use, your art is your life.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Acrobatics, Insight, Performance, and Sleight of Hand</li><li><strong>Tool Proficiencies:</strong> Disguise kit, one type of musical instrument</li><li><strong>Equipment:</strong> A musical instrument (one of your choice), the favor of an admirer (love letter, lock of hair, or trinket), a costume, and a belt pouch containing 150 cr</li></ul>\n\n<h4>Entertainer Routines</h4>\n\n<p>A good entertainer is versatile, spicing up every performance with a variety of different routines. Choose one to three routines or roll on the table below to define your expertise as an entertainer.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d10</th><th>Entertainer Routine</th></tr></thead><tbody><tr><td>1</td><td>Actor</td></tr><tr><td>2</td><td>Dancer</td></tr><tr><td>3</td><td>Fire-eater</td></tr><tr><td>4</td><td>Jester</td></tr><tr><td>5</td><td>Juggler</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d10</th><th>Entertainer Routine</th></tr></thead><tbody><tr><td>6</td><td>Instrumentalist</td></tr><tr><td>7</td><td>Poet</td></tr><tr><td>8</td><td>Singer</td></tr><tr><td>9</td><td>Storyteller</td></tr><tr><td>10</td><td>Tumbler</td></tr></tbody></table></div>\n\n<h3>Feature: By Popular Demand</h3>\n\n<p>You can always find a place to perform, usually in an inn or cantina but possibly with a circus, at a theater, or even in a noble's court. At such a place, you receive free lodging and food of a modest or comfortable standard (depending on the quality of the establishment), as long as you perform each night. In addition, your performance makes you something of a local figure. When strangers recognize you in a town where you have performed, they typically take a liking to you.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Acrobat</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Performer</td></tr><tr><td>4</td><td>Quick-Fingered</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Entertainer</td></tr><tr><td>7</td><td>Practiced</td></tr><tr><td>8</td><td>Actor</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Successful entertainers have to be able to capture and hold an audience's attention, so they tend to have flamboyant or forceful personalities. They're inclined toward the romantic and often cling to high-minded ideals about the practice of art and the appreciation of beauty.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I know a story relevant to almost every situation.</td></tr><tr><td>2</td><td>Whenever I come to a new place, I collect local rumors and spread gossip.</td></tr><tr><td>3</td><td>I'm a hopeless romantic, always searching for that �special someone.�</td></tr><tr><td>4</td><td>Nobody stays angry at me or around me for long, since I can defuse any amount of tension.</td></tr><tr><td>5</td><td>I love a good insult, even one directed at me.</td></tr><tr><td>6</td><td>I get bitter if I'm not the center of attention.</td></tr><tr><td>7</td><td>I'll settle for nothing less than perfection.</td></tr><tr><td>8</td><td>I change my mood or my mind as quickly as I change key in a song.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Beauty.</strong> When I perform, I make the world better than it was. (Light)</td></tr><tr><td>2</td><td><strong>Tradition.</strong> The stories, legends, and songs of the past must never be forgotten, for they teach us who we are. (Lawful)</td></tr><tr><td>3</td><td><strong>Creativity.</strong> The world is in need of new ideas and bold action. (Chaotic)</td></tr><tr><td>4</td><td><strong>Greed.</strong> I'm only in it for the money and fame. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I like seeing the smiles on people's faces when I perform. That's all that matters. (Neutral)</td></tr><tr><td>6</td><td><strong>Honesty.</strong> Art should reflect the soul; it should come from within and reveal who we really are. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My instrument is my most treasured possession, and it reminds me of someone I love.</td></tr><tr><td>2</td><td>Someone stole my precious instrument, and someday I'll get it back.</td></tr><tr><td>3</td><td>I want to be famous, whatever it takes.</td></tr><tr><td>4</td><td>I idolize a hero of the old tales and measure my deeds against that person's.</td></tr><tr><td>5</td><td>I will do anything to prove myself superior to my hated rival.</td></tr><tr><td>6</td><td>I would do anything for the other members of my old troupe.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I'll do anything to win fame and renown.</td></tr><tr><td>2</td><td>I'm a sucker for a pretty face.</td></tr><tr><td>3</td><td>A scandal prevents me from ever going home again. That kind of trouble seems to follow me around.</td></tr><tr><td>4</td><td>I once satirized a noble who still wants my head. It was a mistake that I will likely repeat.</td></tr><tr><td>5</td><td>I have trouble keeping my true feelings hidden. My sharp tongue lands me in trouble.</td></tr><tr><td>6</td><td>Despite my best efforts, I am unreliable to my friends.</td></tr></tbody></table>\n\n\n\n<h2>Force Adept</h2>\n\n<p>You are keenly attuned to the flow of the mysterious energy field known as the Force.  With proper training, you could learn to consciously sense and manipulate that energy further.  As it is, you may appear to have heightened senses, extremely quick reflexes, an intuitive understanding of others, or an uncanny ability to persuade people to your way of thinking. Your powers may have lain dormant for a long time, perhaps you felt something inside of you but never knew what it was. Perhaps your abilities were awoken by a strong encounter with another force-sensitive with the powers of the Force, or an object associated with the Force, such as a lightsaber.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Perception, and Persuasion</li><li><strong>Tool Proficiencies:</strong> Two of your choice of artisan's implements, gaming sets, or musical instruments</li><li><strong>Equipment:</strong> A set of common clothes, a sturdy knife, and a belt pouch containing 150 cr</li></ul>\n\n<h3>Feature: Guided by the Force</h3>\n\n<p>When you attempt to learn a piece of knowledge, you often instinctively know where or from whom you can obtain it. Usually, this information comes from a seemingly random person, book, or data file. Your GM might rule that the knowledge you seek is secreted away in an almost inaccessible place, or that it simply cannot be found.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Perceptive</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Competitor</td></tr><tr><td>7</td><td>Entertainer</td></tr><tr><td>8</td><td>Force-Sensitive</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Force adepts can come from all walks of life and have varied life experiences.  Often, though, there is an underlying influence that the Force has on the personalities of Force Adepts, especially once they begin to be conscious of their connection to the Force. </p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I see omens in every event and action. The Force tries to speak to us, we just need to listen.</td></tr><tr><td>2</td><td>I am always calm, no matter what the situation. I never raise my voice or let my emotions control me.</td></tr><tr><td>3</td><td>The Force has chosen me for a greater purpose.  I am destined for greatness.</td></tr><tr><td>4</td><td>I would rather make a new friend than a new enemy. We are all connected to each other.</td></tr><tr><td>5</td><td>I've always been good at everything and things come to me naturally, but I am proud of my accomplishments.</td></tr><tr><td>6</td><td>I don�t pay attention to the risks in a situation. The odds are always in my favor.</td></tr><tr><td>7</td><td>The best way to get me to do something is to tell me I can�t do it.</td></tr><tr><td>8</td><td>My emotions sometimes get the most of me, but they help me succeed.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Dilligence.</strong> I seek to prove myself worthy of the Force by matching my actions against the Jedi teachings. (Lawful)</td></tr><tr><td>2</td><td><strong>Change.</strong> We must help bring about the changes the Force is constantly working in the world. (Chaotic)</td></tr><tr><td>3</td><td><strong>Redemption.</strong> There's a spark of good in everyone. (Light)</td></tr><tr><td>4</td><td><strong>Power.</strong> I will do whatever it takes to have power. (Dark)</td></tr><tr><td>5</td><td><strong>Faith.</strong> I trust that the Force will guide my actions; I have faith that if I work hard, things will go well. (Neutral)</td></tr><tr><td>6</td><td><strong>Growth.</strong> Self-improvement is an unending chore, but one that must be done. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I'm searching for instruction in the ways of the Force.</td></tr><tr><td>2</td><td>I am fully dedicated to the will of the Force.  It leads and I follow.</td></tr><tr><td>3</td><td>I must return a relic to the temple it was taken from.</td></tr><tr><td>4</td><td>I will become the greatest user of the Force that ever lived.</td></tr><tr><td>5</td><td>I�m guilty of a terrible crime. I hope I can redeem myself for it.</td></tr><tr><td>6</td><td>Someone I loved died because of a mistake I made. That will never happen again.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>My faith in the Force sometimes leads me to blindly trust others that profess that same faith.</td></tr><tr><td>2</td><td>The Jedi and Sith worship the Force as a religion. I think they are idiots for worshipping a hammer.</td></tr><tr><td>3</td><td>I'm convinced of the significance of my destiny, and blind to my shortcomings and the risk of failure.</td></tr><tr><td>4</td><td>I have trouble trusting in my allies that don't share my connection to the Force.</td></tr><tr><td>5</td><td>I remember every insult I've received and nurse a silent resentment toward anyone who's ever wronged me.</td></tr><tr><td>6</td><td>Once I pick a goal, I become obsessed with it to the detriment of everything else in my life.</td></tr></tbody></table>\n\n\n\n<h2>Gambler</h2>\n\n<p>You are a skilled gambler who spends most of your time in casinos, bar rooms, and gambling dens. Are your activities legal, or do you break the law? Have you ever cheated in a game, or do you play by the rules? No matter what, your life has been one of excitement, chance, and danger.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Intimidation, and Sleight of Hand</li><li><strong>Tool Proficiencies:</strong> Two types of gaming sets</li><li><strong>Equipment:</strong> A set of common clothes, a set of dice, a deck of playing cards, a lucky charm, and a belt pouch containing 100 cr.</li></ul>\n\n<h3>Feature: Let's Make It Interesting</h3>\n\n<p>You can convince nearly anyone to put up something they aren't normally willing to part with (property or information) in a game of chance. Your GM might rule that they will only agree to a game of their choosing, and they may only agree if they feel the odds are in their favor.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Threatening</td></tr><tr><td>4</td><td>Quick-Fingered</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Keen Mind</td></tr><tr><td>7</td><td>Observant</td></tr><tr><td>8</td><td>Practiced</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Gambling is your passion, for better or for worse. Most gamblers see their vices as virtues, and overlook things in their pursuit of the rush.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I like to impress everyone I meet with a simple trick or a quick joke.</td></tr><tr><td>2</td><td>I constantly make side bets on everything that happens around me.</td></tr><tr><td>3</td><td>No matter how high the stakes, I always appear calm.</td></tr><tr><td>4</td><td>I try to be unpredictable, so no one will know when I'm bluffing.</td></tr><tr><td>5</td><td>I never back down from a challenge.</td></tr><tr><td>6</td><td>I can't get satisfaction out of something if the stakes are too low.</td></tr><tr><td>7</td><td>I tend to make friends out of enemies, and enemies out of friends.</td></tr><tr><td>8</td><td>I prefer one game above all others.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Risk.</strong> Nothing worth doing is ever a sure thing. (Chaotic)</td></tr><tr><td>2</td><td><strong>Victory.</strong> Never make a bet unless you're sure you can win. (Lawful)</td></tr><tr><td>3</td><td><strong>Greed.</strong> Anything that isn't mine soon will be. (Dark)</td></tr><tr><td>4</td><td><strong>Charity.</strong> I share my winnings with the less fortunate. (Light)</td></tr><tr><td>5</td><td><strong>Surprise.</strong> Life is a game worth playing, because you never know how the dice will land. (Any)</td></tr><tr><td>6</td><td><strong>Laziness.</strong> Working is for chumps. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I owe a lot of money to the wrong kind of people.</td></tr><tr><td>2</td><td>I still keep the first coin I ever won. It's my good luck charm.</td></tr><tr><td>3</td><td>Most of my winnings go to my home.</td></tr><tr><td>4</td><td>Someday I will own my own casino.</td></tr><tr><td>5</td><td>I lost a large sum of money to a con artist; I seek to get it back.</td></tr><tr><td>6</td><td>I hide my gambling behind a normal life. My friends have no idea who I really am.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I can't step away from the table when I'm losing.</td></tr><tr><td>2</td><td>I spend money faster than I can make it.</td></tr><tr><td>3</td><td>Everyone has a price. Mine happens to be pretty low.</td></tr><tr><td>4</td><td>I assume everyone is hiding something from me.</td></tr><tr><td>5</td><td>I tend to value money more than people.</td></tr><tr><td>6</td><td>I like to think I could drink anyone under the table, but I'm really a lightweight.</td></tr></tbody></table>\n\n\n\n<h2>Investigator</h2>\n\n<p>Rarer than watch or patrol members are a community's investigators, who are responsible for solving crimes after the fact. Though such folk are seldom found in rural areas, nearly every settlement of decent size has at least one or two watch members who have the skill to investigate crime scenes and track down criminals.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Perception, and Survival</li><li><strong>Languages:</strong> Two of your choice</li><li><strong>Equipment:</strong> A uniform in the style of your unit and indicative of your rank, a horn with which to summon help, a set of binders, and a pouch containing 100 cr</li></ul>\n\n<h3>Feature: Watcher's Eye</h3>\n\n<p>Your experience in enforcing the law, and dealing with lawbreakers, gives you a feel for local laws and criminals. You can easily find the local outpost of the watch or a similar organization, and just as easily pick out the dens of criminal activity in a community, although you're more likely to be welcome in the former locations rather than the latter.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Perceptive</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Alert</td></tr><tr><td>7</td><td>Observant</td></tr><tr><td>8</td><td>Keen Mind</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Years of service in the City Watch have led to the rigid discipline most often seen in military service. Working with your comrades has created a strong family bond and pride in your community.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I'm always polite and respectful.</td></tr><tr><td>2</td><td>I'm haunted by memories of war. I can't get the images of violence out of my mind.</td></tr><tr><td>3</td><td>I've lost too many friends, and I'm slow to make new ones.</td></tr><tr><td>4</td><td>I'm full of inspiring and cautionary tales from my guard service relevant to almost every combat situation.</td></tr><tr><td>5</td><td>I can stare down a hell hound without flinching.</td></tr><tr><td>6</td><td>I enjoy being strong and like breaking things.</td></tr><tr><td>7</td><td>I have a crude sense of humor.</td></tr><tr><td>8</td><td>I face problems head-on. A simple, direct solution is the best path to success.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Greater Good.</strong> Our lot is to lay down our lives in defense of others. (Light)</td></tr><tr><td>2</td><td><strong>Responsibility.</strong> I do what I must and obey just authority. (Lawful)</td></tr><tr><td>3</td><td><strong>Independence.</strong> When people follow orders blindly, they embrace a kind of tyranny. (Chaotic)</td></tr><tr><td>4</td><td><strong>Might.</strong> In life as in war, the stronger force wins. (Dark)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Ideals aren't worth killing over or going to war for. (Neutral)</td></tr><tr><td>6</td><td><strong>Nation.</strong> My city, nation, or people are all that matter. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I would still lay down my life for the people I served with.</td></tr><tr><td>2</td><td>Someone saved my life on the battlefield. To this day, I will never leave a friend behind.</td></tr><tr><td>3</td><td>My honor is my life.</td></tr><tr><td>4</td><td>I'll never forget the crushing defeat my company suffered or the enemies who dealt it.</td></tr><tr><td>5</td><td>Those who fight beside me are those worth dying for.</td></tr><tr><td>6</td><td>I fight for those who cannot fight for themselves.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>The monstrous enemy we faced in battle still leaves me quivering with fear.</td></tr><tr><td>2</td><td>I have little respect for anyone who is not a proven warrior.</td></tr><tr><td>3</td><td>I made a terrible mistake in battle that cost many lives, and I would do anything to keep that mistake secret.</td></tr><tr><td>4</td><td>My hatred of my enemies is blind and unreasoning.</td></tr><tr><td>5</td><td>I obey the law, even if the law causes misery.</td></tr><tr><td>6</td><td>I'd rather eat my armor than admit when I'm wrong.</td></tr></tbody></table>\n\n\n\n<h2>Jedi</h2>\n\n<p>You are a devout follower of the Jedi Order: an ancient, monastic peacekeeping organization united in its observance of the light side of the Force. A noble order of protectors noted for their ability to tap into the power of the Force, the Jedi serve as guardians of peace and justice in the Galactic Republic. You follow the Jedi Code:</p>\n\n<div class=\"sw5e-book-block\">*\"There is no emotion, there is peace.<br>\n\nThere is no ignorance, there is knowledge.<br>\n\nThere is no passion, there is serenity.<br>\n\nThere is no chaos, there is harmony.<br>\n\n<p>There is no death, there is the Force.\"*</p></div>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Lore, and Persuasion</li><li><strong>Tool Proficiencies:</strong> Artificer's tools</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A copy of the Jedi code, a set of common clothes including a robe, and a belt pouch containing 150 cr</li></ul>\n\n<h3>Feature: Shelter of the Faithful</h3>\n\n<p>As a Jedi, you command the respect of those who are loyal to the Jedi Order. You and your adventuring companions can expect to receive free healing and care at any Jedi temple, and those who support your religion will support you (but only you) at a modest lifestyle.</p>\n\n<p>You might also have ties to a specific Jedi temple and have a residence there. This could be the temple where you trained, or a temple where you have found a new home. While near your temple, you can call upon the Jedi for assistance, provided the assistance you ask for is not hazardous and you remain in good standing with your temple.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Formfighting Dabbler</td></tr><tr><td>8</td><td>Force-Sensitive</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Jedi are shaped by their experience in their temple. Their study of the history and tenets of the Jedi Order and their relationships to temples, shrines, or hierarchies affect their mannerisms and ideals. Their flaws might be some hidden hypocrisy or heretical idea, or an ideal or bond taken to an extreme.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I idolize a particular Jedi, and constantly refer to that person's deeds and example.</td></tr><tr><td>2</td><td>I can find common ground between the fiercest enemies, empathizing with them and always working towards peace.</td></tr><tr><td>3</td><td>I see omens in every event and action. The Force tries to speak to us, we just need to listen</td></tr><tr><td>4</td><td>Nothing can shake my optimistic attitude.</td></tr><tr><td>5</td><td>I quote (or misquote) sacred Jedi texts and proverbs in almost every situation.</td></tr><tr><td>6</td><td>I am tolerant (or intolerant) of those who don't support the Jedi.</td></tr><tr><td>7</td><td>I've enjoyed fine food, drink, and high society. Rough living grates on me.</td></tr><tr><td>8</td><td>I've spent so long in the Jedi temple that I have little practical experience dealing with people in the  world.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Tradition.</strong> The ancient traditions of worship and sacrifice must be preserved and upheld. (Lawful)</td></tr><tr><td>2</td><td><strong>Charity.</strong> I always try to help those in need, no matter what the personal cost. (Light)</td></tr><tr><td>3</td><td><strong>Change.</strong> We must help bring about the changes the Force is constantly working in the world. (Chaotic)</td></tr><tr><td>4</td><td><strong>Power.</strong> I hope to one day rise to the rank of Jedi Master. (Lawful)</td></tr><tr><td>5</td><td><strong>Faith.</strong> I trust that the Force will guide my actions; I have faith that if I work hard, things will go well. (Lawful)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I seek to prove myself worthy of the Force by matching my actions against the Jedi teachings. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I would die to recover an ancient Jedi relic that was lost long ago.</td></tr><tr><td>2</td><td>I will someday get revenge on those who razed my temple.</td></tr><tr><td>3</td><td>I owe my life to the Jedi who took me in when my parents died.</td></tr><tr><td>4</td><td>Everything I do is for the common people.</td></tr><tr><td>5</td><td>I will do anything to protect the temple where I served.</td></tr><tr><td>6</td><td>I seek to preserve a sacred text that my enemies seek to destroy.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I judge others harshly, and myself even more severely.</td></tr><tr><td>2</td><td>I put too much trust in those who wield power within my temple's hierarchy.</td></tr><tr><td>3</td><td>My piety sometimes leads me to blindly trust those that profess faith in the Force.</td></tr><tr><td>4</td><td>I am inflexible in my thinking.</td></tr><tr><td>5</td><td>I am suspicious of strangers and expect the worst of them.</td></tr><tr><td>6</td><td>Once I pick a goal, I become obsessed with it to the detriment of everything else in my life.</td></tr></tbody></table>\n\n\n\n<h2>Mandalorian</h2>\n\n<p>You are a child of Mandalore. As a member of the most renowned warrior culture in history, your people are known for being strong and hardy. Mandalorian culture is built around the honor and glory that come from victory in battle.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Intimidation, Piloting, and Survival</li><li><strong>Tool Proficiencies:</strong> One set of artisan's implements</li><li><strong>Languages:</strong> Mando'a </li><li><strong>Equipment:</strong> A set of traveler's clothes, a trophy from a previous victory, and a pouch containing 200 cr</li></ul>\n\n<h4>Mandalorian Clan</h4>\n\n<p>Mandalorian culture is built on the backbone of various clans. The clan you are a part of has it's own history, allegiances, and fueds which shape your persepctive. Choose an option or roll on the table below to determine your clan.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Clan</th></tr></thead><tbody><tr><td>1</td><td>Vizsla</td></tr><tr><td>2</td><td>Fett</td></tr><tr><td>3</td><td>Kryze</td></tr><tr><td>4</td><td>Ordo</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Clan</th></tr></thead><tbody><tr><td>5</td><td>Wren</td></tr><tr><td>6</td><td>Lok</td></tr><tr><td>7</td><td>Cadera</td></tr><tr><td>8</td><td>Clanless</td></tr></tbody></table></div>\n\n<h3>Feature: Child of Mandalore</h3>\n\n<p>Other Mandalorians know, and will look out for you. If you're ever in need of a place to stay, or a meal to eat, other Mandalorians  will help you as long as your clans aren't feuding. This could be in the form of shelters, meals, even healing. If the Mandalorians are of your clan or a clan friendly to you, they may be willing to help you even at cost to themselves.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Threatening</td></tr><tr><td>3</td><td>Ace Pilot</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Durable</td></tr><tr><td>7</td><td>Weapon Expert</td></tr><tr><td>8</td><td>Athlete</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Mandalorians are a meritocracy where birthplace, rank, status, and citizenship mean nothing. You are what you do. Mandalorians live by the Resol'nare (the \"Six Actions\"). As a true Mandalorian you should strive to live by this code as much as possible by remaining honorable. Your flaw(s) might consist of any dishonor you've committed, or even being too honorable.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I try and bring my culture to outsiders.</td></tr><tr><td>2</td><td>I always put my clan first.</td></tr><tr><td>3</td><td>I follow the Resol'nare to the letter.</td></tr><tr><td>4</td><td>I love a good spar.</td></tr><tr><td>5</td><td>I enjoy traveling the galaxy.</td></tr><tr><td>6</td><td>I keep a small trophy on me to remind me of a past victory.</td></tr><tr><td>7</td><td>I view the force as dishonorable in combat.</td></tr><tr><td>8</td><td>I've seen the horrors of battle and try to prevent it.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Tradition</strong> I live by my clan's ways, and will continue to do so. (Lawful)</td></tr><tr><td>2</td><td><strong>Power</strong> I strive to be the best warrior, no matter who stands in my way. (Dark)</td></tr><tr><td>3</td><td><strong>Respect</strong> I have earned the respect of many, and I intend to keep it. (Light)</td></tr><tr><td>4</td><td><strong>Freedom</strong> I enjoy having the ability to do whatever I want. (Chaotic)</td></tr><tr><td>5</td><td><strong>Comradery</strong> I'll put everything on the line for those dear to me. (Any)</td></tr><tr><td>6</td><td><strong>Aspiration</strong> I'll succeed in my goals, it just takes time and effort. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I lost someone dear to me in battle, I will always honor them.</td></tr><tr><td>2</td><td>Honor is everything to me.</td></tr><tr><td>3</td><td>I will lay down my life for those beside me.</td></tr><tr><td>4</td><td>I must keep the traditions of my ancestors alive.</td></tr><tr><td>5</td><td>No matter where I go, Mandalore is my home.</td></tr><tr><td>6</td><td>In death, I will find glory.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I look down on outsiders.</td></tr><tr><td>2</td><td>I have no respect for anyone who flees. Cowardice is unacceptable.</td></tr><tr><td>3</td><td>I don't see much use in talking, a blaster is all I need to make my point.</td></tr><tr><td>4</td><td>I stick to my traditions no matter what, even at the cost of others.</td></tr><tr><td>5</td><td>I retreated once, and I've regretted it ever since.</td></tr><tr><td>6</td><td>I value a victory regardless of the ethics behind the victory.</td></tr></tbody></table>\n\n\n\n<h2>Mercenary</h2>\n\n<p>As a sell-sword who fought battles for coin, you're well acquainted with risking life and limb for a chance at a share of treasure. Now, you look forward to fighting foes and reaping even greater rewards as an adventurer. Your experience makes you familiar with the ins and outs of mercenary life, and you likely have harrowing stories of events on the battlefield. You might have served with a large outfit or a smaller band of sell-swords, maybe even more than one. </p>\n\n<p>Now you're looking for something else, perhaps greater reward for the risks you take, or the freedom to choose your own activities. For whatever reason, you're leaving behind the life of a soldier for hire, but your skills are undeniably suited for battle, so now you fight on in a different way.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Investigation, Persuasion, and Piloting</li><li><strong>Tool Proficiencies:</strong> One type of gaming set</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A uniform of your company (traveler's clothes in quality), an insignia of your rank, a gaming set (one of your choice), and a pouch containing the remainder of your last wages (100 cr)</li></ul>\n\n<h3>Feature: Mercenary Life</h3>\n\n<p>You know the mercenary life as only someone who has experienced it can. You are able to identify mercenary companies by their emblems, and you know a little about any such company, including the names and reputations of its commanders and leaders, and who has hired them recently. You can find the cantinas and feasthalls where mercenaries abide in any area, as long as you speak the language, and if you spend at least an hour in such a location you can come across one of the following bits of information: a job offer, significant rumor, referral to a skilled merchant, blacksmith, etc., or a hint towards the pursuit of your current quest. Additionally, you can find mercenary work between adventures sufficient to maintain a comfortable lifestyle (see \"Practicing a Profession\" under \"Downtime Activities\" in chapter 8 of the Player's Handbook).</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Charmer</td></tr><tr><td>4</td><td>Ace Pilot</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Weapon Expert</td></tr><tr><td>8</td><td>Durable</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Mercenaries are shaped by their lively nature, for the better and the worse. They tend to be driven by either their commitment to money or something more valuable.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I do not fear death, but accept it as part of life.</td></tr><tr><td>2</td><td>I have a crude sense of humor.</td></tr><tr><td>3</td><td>I face problems head-on. A simple, direct solution is the best path to success.</td></tr><tr><td>4</td><td>I find it good luck to have a flask of ale on me even when the most of my other belongings are gone.</td></tr><tr><td>5</td><td>I ask a lot of questions.</td></tr><tr><td>6</td><td>I never pass up a friendly wager.</td></tr><tr><td>7</td><td>I am always polite and respectful when speaking to those above my station.</td></tr><tr><td>8</td><td>I like a job well done, especially if I'm not the one doing it.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Greed.</strong> I'm only doing it for the money. (Dark)</td></tr><tr><td>2</td><td><strong>Fairness.</strong> We all did the work. it is only right that everyone gets a share of the reward. (Lawful)</td></tr><tr><td>3</td><td><strong>Live and Let Live.</strong> You may not have a family left, but your enemy may. A little compassion goes a long way. (Light)</td></tr><tr><td>4</td><td><strong>Measure of Last Resort.</strong> Sometimes we have to do things that we REALLY don't want to do, but we must remember that we only do them because we have to. (Chaotic)</td></tr><tr><td>5</td><td><strong>Debts.</strong> I never leave a favor left undone and nor will I leave those whom owe me favors on the hook. (Neutral)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I have heard a tale of a legendary person of my class. I strive to be more like them. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I have a personal debt that must be paid.</td></tr><tr><td>2</td><td>I am with friends whom I trust with my life as they should trust me with theirs.</td></tr><tr><td>3</td><td>I come from a family that dislikes weaknesses, so I push myself to know my weaknesses.</td></tr><tr><td>4</td><td>My life is my honor. I shall, until death, shape my life to what I want it to be.</td></tr><tr><td>5</td><td>Without a purpose in the world, I find myself to be broken which I do not like.</td></tr><tr><td>6</td><td>I secretly pursue a love interest that is forbidden by a family whether it is my own or my love's family.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am always looking for the bigger pay.</td></tr><tr><td>2</td><td>I can't tell a lie for the life of me.</td></tr><tr><td>3</td><td>I judge too easily by special appearance and pride.</td></tr><tr><td>4</td><td>I am almost always carrying some ale in with my gear.</td></tr><tr><td>5</td><td>I believe that I am the only skilled person of the group and am even open about it.</td></tr><tr><td>6</td><td>I will never let a comrade stand alone, even if it gets me killed.</td></tr></tbody></table>\n\n\n\n<h2>Noble</h2>\n\n<p>You understand wealth, power, and privilege. You carry a noble title, and your family owns land, collects taxes, and wields significant political influence. You might be a pampered aristocrat unfamiliar with manual labor, a former merchant just elevated to the nobility, or an honest, hard-working landowner who cares deeply about the people who live and work on your land.</p>\n\n<p>Work with your GM to come up with an appropriate title and determine how much authority that title carries, as well as your family and their influence on you. Is your family old and established, or was your title only recently bestowed? How much influence do they wield, how do people regard them?</p>\n\n<p>What's your position in the family? Are you the heir to the head of the family or the head itself? Are you far down the line of succession? How does the head of your family feel about your adventuring career? Are you in your family's good graces? </p>\n\n<p>Does your family have a coat of arms you might wear, a signet ring, or particular colors? </p>\n\n<p>These details help establish your family and your title as features of the world of the campaign.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Lore, and Persuasion</li><li><strong>Tool Proficiencies:</strong> One type of gaming set</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of fine clothes, a signet ring, a letter of pedigree, and a purse containing 250 cr</li></ul>\n\n<h3>Feature: Position of Privilege</h3>\n\n<p>Thanks to your noble birth, people are inclined to think the best of you. You are welcome in high society, and people assume you have the right to be wherever you are. The common folk make every effort to accommodate you and avoid your displeasure, and other people of high birth treat you as a member of the same social sphere. You can secure an audience with a local noble if you need to.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Loremaster</td></tr><tr><td>4</td><td>Charmer</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Inspiring Leader</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Nobles are born and raised to a very different lifestyle than most people ever experience, and their personalities reflect that upbringing. A noble title comes with a plethora of bonds�responsibilities to family, to other nobles (including the sovereign), to the people entrusted to the family's care, or even to the title itself. But this responsibility is often a good way to undermine a noble.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>My eloquent flattery makes everyone I talk to feel like the most wonderful and important person in the world.</td></tr><tr><td>2</td><td>The common folk love me for my kindness and generosity.</td></tr><tr><td>3</td><td>No one could doubt by looking at my regal bearing that I am a cut above the unwashed masses.</td></tr><tr><td>4</td><td>I take great pains to always look my best and follow the latest fashions.</td></tr><tr><td>5</td><td>I don't like to get my hands dirty, and I won't be caught dead in unsuitable accommodations.</td></tr><tr><td>6</td><td>Despite my noble birth, I do not place myself above other folk. We all have the same blood.</td></tr><tr><td>7</td><td>My favor, once lost, is lost forever.</td></tr><tr><td>8</td><td>If you do me an injury, I will crush you, ruin your name, and salt your fields.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Respect.</strong> Respect is due to me because of my position, but all people regardless of station deserve to be treated with dignity. (Light)</td></tr><tr><td>2</td><td><strong>Responsibility.</strong> It is my duty to respect the authority of those above me, just as those below me must respect mine. (Lawful)</td></tr><tr><td>3</td><td><strong>Independence.</strong> I must prove that I can handle myself without the coddling of my family. (Chaotic)</td></tr><tr><td>4</td><td><strong>Power.</strong> If I can attain more power, no one will tell me what to do. (Dark)</td></tr><tr><td>5</td><td><strong>Family.</strong> Blood runs thicker than water. (Any)</td></tr><tr><td>6</td><td><strong>Noble Obligation.</strong> It is my duty to protect and care for the people beneath me. (Light)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I will face any challenge to win the approval of my family.</td></tr><tr><td>2</td><td>My house's alliance with another noble family must be sustained at all costs.</td></tr><tr><td>3</td><td>Nothing is more important than the other members of my family.</td></tr><tr><td>4</td><td>I am in love with the heir of a family that my family despises.</td></tr><tr><td>5</td><td>My loyalty to my sovereign is unwavering.</td></tr><tr><td>6</td><td>The common folk must see me as a hero of the people.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I secretly believe that everyone is beneath me.</td></tr><tr><td>2</td><td>I hide a truly scandalous secret that could ruin my family forever.</td></tr><tr><td>3</td><td>I too often hear veiled insults and threats in every word addressed to me, and I'm quick to anger.</td></tr><tr><td>4</td><td>I have an insatiable desire for carnal pleasures.</td></tr><tr><td>5</td><td>In fact, the world does revolve around me.</td></tr><tr><td>6</td><td>By my words and actions, I often bring shame to my family.</td></tr></tbody></table>\n\n\n\n<h2>Nomad</h2>\n\n<p>You grew up in the wilds, far from civilization and the comforts of town and technology. You've witnessed the migration of herds larger than forests, survived weather more extreme than any city-dweller could comprehend, and enjoyed the solitude of being the only thinking creature for miles in any direction. The wilds are in your blood, whether you were a nomad, an explorer, a recluse, a hunter-gatherer, or even a marauder. Even in places where you don't know the specific features of the terrain, you know the ways of the wild.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Animal Handling, Athletics, Medicine, and Survival</li><li><strong>Tool Proficiencies:</strong> One type of musical instrument</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A walking stick, a hunting trap, a trophy from an animal you killed, a set of traveler's clothes, and a belt pouch containing 100 cr</li></ul>\n\n<h3>Feature: Wanderer</h3>\n\n<p>You have an excellent memory for maps and geography, and you can always recall the general layout of terrain, settlements, and other features around you. In addition, you can find food and fresh water for yourself and up to five other people each day, provided that the land offers berries, small game, water, and so forth.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Animal Handler</td></tr><tr><td>2</td><td>Brawny</td></tr><tr><td>3</td><td>Medic</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Entertainer</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Dungeon Delver</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Often considered rude and uncouth among civilized folk, nomads have little respect for the niceties of life in the cities. The ties of tribe, clan, family, and the natural world are the most important bonds to nomads.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I'm driven by a wanderlust that led me away from home.</td></tr><tr><td>2</td><td>I watch over my friends as if they were a litter of newborn pups.</td></tr><tr><td>3</td><td>I once ran twenty-five miles without stopping to warn my clan of an approaching horde. I'd do it again if I had to.</td></tr><tr><td>4</td><td>I have a lesson for every situation, drawn from observing nature.</td></tr><tr><td>5</td><td>I place no stock in wealthy or well-mannered folk. Money and manners won't save you from a hungry rancor.</td></tr><tr><td>6</td><td>I'm always picking things up, absently fiddling with them, and sometimes accidentally breaking them.</td></tr><tr><td>7</td><td>I feel far more comfortable around animals than people.</td></tr><tr><td>8</td><td>I was, in fact, raised by wampas.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Change.</strong> Life is like the seasons, in constant change, and we must change with it. (Chaotic)</td></tr><tr><td>2</td><td><strong>Greater Good.</strong> It is each person's responsibility to make the most happiness for the whole tribe. (Light)</td></tr><tr><td>3</td><td><strong>Honor.</strong> If I dishonor myself, I dishonor my whole clan. (Lawful)</td></tr><tr><td>4</td><td><strong>Might.</strong> The strongest are meant to rule. (Dark)</td></tr><tr><td>5</td><td><strong>Nature.</strong> The natural world is more important than all the constructs of civilization. (Neutral)</td></tr><tr><td>6</td><td><strong>Glory.</strong> I must earn glory in battle, for myself and my clan. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My family, clan, or tribe is the most important thing in my life, even when they are far from me.</td></tr><tr><td>2</td><td>An injury to the unspoiled wilderness of my home is an injury to me.</td></tr><tr><td>3</td><td>I will bring terrible wrath down on the Darkdoers who destroyed my homeland.</td></tr><tr><td>4</td><td>I am the last of my tribe, and it is up to me to ensure their names enter legend.</td></tr><tr><td>5</td><td>I suffer awful visions of a coming disaster and will do anything to prevent it.</td></tr><tr><td>6</td><td>It is my duty to provide children to sustain my tribe.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am too enamored of ale, wine, and other intoxicants.</td></tr><tr><td>2</td><td>There's no room for caution in a life lived to the fullest.</td></tr><tr><td>3</td><td>I remember every insult I've received and nurse a silent resentment toward anyone who's ever wronged me.</td></tr><tr><td>4</td><td>I am slow to trust members of other species, tribes, and societies.</td></tr><tr><td>5</td><td>Violence is my answer to almost any challenge.</td></tr><tr><td>6</td><td>Don't expect me to save those who can't save themselves. It is nature's way that the strong thrive and the weak perish.</td></tr></tbody></table>\n\n\n\n<h2>Outlaw</h2>\n\n<p>You are a notorious free adventurer who, due to unfortunate circumstances, has lost favor with the law. However, being of the common people, they protect you due to your just nature. A protector of the people, a thorn in the side of authorities.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Acrobatics, Athletics, Insight, and Survival</li><li><strong>Tool Proficiencies:</strong> Disguise kit</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A hunting trap, an iron pot, a set of traveler's clothes, and a pouch containing 150 cr</li></ul>\n\n<h4>Defining Event</h4>\n\n<p>Though you were once just a commoner, a specific event caused you to drastically change your lifestyle and take off for a life of dangerous wandering, or perhaps revenge. Choose or randomly determine a defining event that marked you as an outlaw.</p>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d10</th><th>Defining Event</th></tr></thead><tbody><tr><td>1</td><td>I stood up to a tyrant's agents.</td></tr><tr><td>2</td><td>I stole from a corrupt Lord to help the poor.</td></tr><tr><td>3</td><td>I broke into a tyrant's castle and stole weapons to arm the people.</td></tr><tr><td>4</td><td>I failed to assassinate a tyrant.</td></tr><tr><td>5</td><td>I loved a noble, and was caught in bed with them.</td></tr><tr><td>6</td><td>I robbed a bank with unfair interest rates.</td></tr><tr><td>7</td><td>I murdered a pedophilic priest to save local children.</td></tr><tr><td>8</td><td>I received a heroic calling from a mysterious creature.</td></tr><tr><td>9</td><td>I was framed for a crime I didn't commit.</td></tr><tr><td>10</td><td>Outlaw by choice.</td></tr></tbody></table>\n\n<h3>Feature: Notorious</h3>\n\n<p>Since you come from the ranks of the common folk, you fit among them with ease. You can find a place to hide, rest, or recuperate among other commoners, unless you've shown yourself to be a danger to them. They will shield you from the law or anyone else searching for you, though they will not risk their lives for you.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Acrobat</td></tr><tr><td>2</td><td>Brawny</td></tr><tr><td>3</td><td>Empathic</td></tr><tr><td>4</td><td>Survivalist</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Alert</td></tr><tr><td>8</td><td>Observant</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>An outlaw is a hero for the common people who takes pride in his humble origins and revels in disrupting authority to help those he's close to.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I judge people by their actions, not their words.</td></tr><tr><td>2</td><td>If someone is in trouble, I'm always ready to lend help.</td></tr><tr><td>3</td><td>When I set my mind to something, I follow through no matter what gets in my way.</td></tr><tr><td>4</td><td>I have a strong sense of fair play and always try to find the most equitable solution to arguments.</td></tr><tr><td>5</td><td>I'm confident in my own abilities and do what I can to instill confidence in others.</td></tr><tr><td>6</td><td>Thinking is for other people. I prefer action.</td></tr><tr><td>7</td><td>I misuse long words in an attempt to sound smarter.</td></tr><tr><td>8</td><td>I get bored easily. When am I going to get on with my destiny?</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Respect.</strong> People deserve to be treated with dignity and respect. (Light)</td></tr><tr><td>2</td><td><strong>Fairness.</strong> No one should get preferential treatment before the law, and no one is above the law. (Lawful)</td></tr><tr><td>3</td><td><strong>Freedom.</strong> Tyrants must not be allowed to oppress the people. (Chaotic)</td></tr><tr><td>4</td><td><strong>Might.</strong> If I become strong, I can take what I want�what I deserve. (Dark)</td></tr><tr><td>5</td><td><strong>Sincerity.</strong> There's no good in pretending to be something I'm not. (Neutral)</td></tr><tr><td>6</td><td><strong>Destiny.</strong> Nothing and no one can steer me away from my higher calling. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I have a family, but I have no idea where they are. One day, I hope to see them again.</td></tr><tr><td>2</td><td>I worked the land, I love the land, and I will protect the land.</td></tr><tr><td>3</td><td>A proud noble once gave me a horrible beating, and I will take my revenge on any bully I encounter.</td></tr><tr><td>4</td><td>My tools are symbols of my past life, and I carry them so that I will never forget my roots.</td></tr><tr><td>5</td><td>I protect those who cannot protect themselves.</td></tr><tr><td>6</td><td>I wish my childhood sweetheart had come with me to pursue my destiny.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>The tyrant who rules my land will stop at nothing to see me killed.</td></tr><tr><td>2</td><td>I'm convinced of the significance of my destiny, and blind to my shortcomings and the risk of failure.</td></tr><tr><td>3</td><td>The people who knew me when I was young know my shameful secret, so I can never go home again.</td></tr><tr><td>4</td><td>I have a weakness for the vices of the city, especially hard drink.</td></tr><tr><td>5</td><td>Secretly, I believe that things would be better if I were a tyrant lording over the land.</td></tr><tr><td>6</td><td>I have trouble trusting in my allies.</td></tr></tbody></table>\n\n\n\n<h2>Pirate</h2>\n\n<p>You are an experienced pirate. Banditry and raiding are common in the Outer Rim, and little negative stigma is given to pirates.  Those that prey on the Empire are sometimes even held in high regard as bold warriors. However, you still have contacts within the criminal underworld and you're far closer than most people to the world of murder, theft, and violence that pervades the underbelly of civilization, and you have survived up to this point by flouting the rules and regulations of finer society.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Deception, Intimidation, and Piloting</li><li><strong>Tool Proficiencies:</strong> One type of gaming set, your choice of demolitions kit, security kit, or slicer's kit</li><li><strong>Equipment:</strong> One set of traveler's clothes, a gaming set you are proficient with, poorly wrought maps of Outer Rim worlds in your territory, a small piece of jewelry worth 100 cr from some exotic planet, and a pouch containing 50 cr</li></ul>\n\n<h3>Feature: Galactic Scourge</h3>\n\n<p>You've been from one end of the galaxy to the other. You know the most lucrative trade routes. You have expert knowledge of the various hyperlanes. In addition to this, you know a large number of the models and designs of common space ships that are found in the galaxy. Further, the bonds you formed with your crew are strong, and you can call on their aid even if you've been away from their side for some time. You can expect your former comrades to offer you passage aboard ship, reasonable aid, or shelter when you are in need. Keep in mind that this bond goes both ways, and they may come to you expecting the same.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Silver-Tongued</td></tr><tr><td>3</td><td>Threatening</td></tr><tr><td>4</td><td>Ace Pilot</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Feigned Confidence</td></tr><tr><td>8</td><td>Force of Personality</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Despite the cutthroat nature of the business, pirates come in all shapes and personalities. Some are bloodthirsty brigands who leave no survivors, others are free spirits who believe in strength over weakness. The hardened warriors of deep space can be implacable foes who often form unshakable bonds with their crewmates. The same circumstances that give them their edge can also grind them down, leaving them vulnerable to greed, shame, and the scars of fear and horror left by battle.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I respect my captain and trust my crew. It may be all that saves my life one day.</td></tr><tr><td>2</td><td>Whether the credits comes from the split of the spoils or from a side wager, I'll get my hands on it.</td></tr><tr><td>3</td><td>When my blood gets up, my swearing could boil the icy tundra of Hoth.</td></tr><tr><td>4</td><td>I enjoy spreading the tales of my exploits, no matter who hears.</td></tr><tr><td>5</td><td>I never let witnesses escape from a raid.</td></tr><tr><td>6</td><td>I take what I need, but I don't kill without reason.</td></tr><tr><td>7</td><td>I always have an exit planned.</td></tr><tr><td>8</td><td>I assume everyone else wants to take what I have.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Equal Shares.</strong> All hands who spend sweat and blood earn their share of the credits. (Lawful)</td></tr><tr><td>2</td><td><strong>Adventure.</strong> I'm far from home, and everything is strange and wonderful! (Chaotic)</td></tr><tr><td>3</td><td><strong>Greater Good.</strong> I raid to weaken the Empire that threatens my people, but I don't steal from civilians.  (Light)</td></tr><tr><td>4</td><td><strong>Strength.</strong> The weak exist to feed the strong, and I am strong. (Dark)</td></tr><tr><td>5</td><td><strong>Crew.</strong> A ship is nothing without her crew. Protect your mates. (Neutral)</td></tr><tr><td>6</td><td><strong>Ambition.</strong> One day I will be so much more than a captain. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My band and I will be known across the world, and we'll never be forgotten.</td></tr><tr><td>2</td><td>My ill-gotten gains go to support my family.</td></tr><tr><td>3</td><td>Everything I do is for the good of my people.</td></tr><tr><td>4</td><td>My ship and many of her crew were lost to treachery, and I won't rest until I discover who was behind it.</td></tr><tr><td>5</td><td>My ship comes first, and all other loyalties simply pale in comparison.</td></tr><tr><td>6</td><td>A crew member of a ship we raided saved my life, and I don't know how to resolve that debt.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I never back down from a fight.</td></tr><tr><td>2</td><td>When faced with a choice between money and my friends, I usually choose the money.</td></tr><tr><td>3</td><td>I was drunk on watch when my ship was lost to an ambush. I can't set the shame aside.</td></tr><tr><td>4</td><td>I feel I'm entitled to a greater share of the spoils, no matter the circumstances.</td></tr><tr><td>5</td><td>I won't let myself be captured. If a raid goes sour, I'm the first to run for cover.</td></tr><tr><td>6</td><td>I get lost in the thrill of the raid and can't focus on the details of a plan.</td></tr></tbody></table>\n\n\n\n<h2>Scientist</h2>\n\n<p>Nothing excites you more than pushing the boundaries of scientific knowledge. Most of your time is spent in a lab performing experiments to further your interests. Few people understand the work you do. You can solve complex problems most people can't begin to wrap their heads around, and can solve simple problems in unexpected ways that surprise most people. </p>\n\n<p>What is your scientific field of interest? Is it your insatiable curiousity, or a personal goal that drives you? Did you leave your lab voluntarily, or were you kicked out? One thing is for sure - there are too many interesting research ideas, and too little time.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Lore, Medicine, Nature, and Technology</li><li><strong>Tool Proficiencies:</strong> One of your choice</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of common clothes, a datapad, a book on your field of research, a pouch containing 100 cr</li></ul>\n\n<h4>Field of Research</h4>\n\n<p>While scientist's are widely knowledgeable, they also choose a focus for their studies. Choose an option or roll on the table below to define your field of research.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Field of Research</th></tr></thead><tbody><tr><td>1</td><td>Biology</td></tr><tr><td>2</td><td>Artificial Intelligence</td></tr><tr><td>3</td><td>Chemistry</td></tr><tr><td>4</td><td>Geology</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Field of Research</th></tr></thead><tbody><tr><td>5</td><td>Physics</td></tr><tr><td>6</td><td>the Force</td></tr><tr><td>7</td><td>Astrogation</td></tr><tr><td>8</td><td>Medicine</td></tr></tbody></table></div>\n\n<h3>Feature: Scientific Method</h3>\n\n<p>You are well acquainted with your field of research from having read numerous journals or having attended scientific conferences. Concepts that are complicated, involving technical jargon that usually goes over most people's heads, are simple to you. You fully understand concepts, can recall key information, and know how to use equipment related to your field, unless the research was hidden from the public, in which case you may only partially understand it. You also recognize well-known figures in your field.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Loremaster</td></tr><tr><td>2</td><td>Medic</td></tr><tr><td>3</td><td>Naturalist</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Crafter</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Tech Dabbler</td></tr><tr><td>8</td><td>Keen Mind</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Scientist are interested in things most don't care about. Their research is their life, and drives their personality traits. Their flaws, ideals, and bond are a result of their hours spent researching.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I look up to a renowned scientist in my field, and often talk about their work.</td></tr><tr><td>2</td><td>I constantly compare my current situation to my past experiments, many of which went terrifyingly wrong.</td></tr><tr><td>3</td><td>I believe scientific results always comes first.</td></tr><tr><td>4</td><td>I only speak in short incomplete and concise sentences, as they are optimized for efficient communication.</td></tr><tr><td>5</td><td>I often get lost in my own thoughts and contemplation, becoming oblivious to my surroundings.</td></tr><tr><td>6</td><td>I am unable to think logically under great stress, and begin to shout random scientific words.</td></tr><tr><td>7</td><td>I do not believe in etiquette and disregard social expectations.</td></tr><tr><td>8</td><td>I was, in fact, grown and raised in a laboratory.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Transparency.</strong> All discoveries should be open to everyone. (Light)</td></tr><tr><td>2</td><td><strong>Logic.</strong> Emotions must not cloud our sense of what is right and true, or our logical thinking. (Lawful)</td></tr><tr><td>3</td><td><strong>Greed.</strong> I'm only in it for the money and fame. (Dark)</td></tr><tr><td>4</td><td><strong>Free Thinking.</strong> Inquiry and curiosity are the pillars of progress. (Chaotic)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Meddling in the affairs of others only causes trouble. (Balanced)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I work hard to be the best there is at my craft. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>My research is also my best companion.</td></tr><tr><td>2</td><td>I will get revenge on the criminals that stole my research.</td></tr><tr><td>3</td><td>The school I studied at is the most important place in the world to me.</td></tr><tr><td>4</td><td>One day I will return to my home planet and prove that I am the greatest scientist of them all.</td></tr><tr><td>5</td><td>I believe my research will be the key to saving the life of a loved one.</td></tr><tr><td>6</td><td>I owe my instructor a great debt for forging me into the person I am today.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I believe only other scientists deserve my respect.</td></tr><tr><td>2</td><td>I fail to understand why people don't understand my technical jargon.</td></tr><tr><td>3</td><td>I experiment on myself without thinking about the long term consequences.</td></tr><tr><td>4</td><td>I am paranoid that people are out to steal my research.</td></tr><tr><td>5</td><td>I believe I work better when under the influence of intoxicants.</td></tr><tr><td>6</td><td>I work on my research to the point where I ignore my own bodily needs.</td></tr></tbody></table>\n\n\n\n<h2>Scoundrel</h2>\n\n<p>You have always had a way with people. You can tease out their heart's desires after a few minutes of conversation, and with a few leading questions you can read them like they were children's books. It's a useful talent, and one that you're perfectly willing to use for your advantage. You know what people want and you promise to deliver, coaxing people into otherwise foolish decisions. You make the improbable sound plausible, and come ahead on every deal.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Performance, and Sleight of Hand</li><li><strong>Tool Proficiencies:</strong> Disguise Kit, Forgery Kit</li><li><strong>Equipment:</strong> A set of fine clothes, a disguise kit, a memento of a former con, and a belt pouch containing 150 cr</li></ul>\n\n<h4>Favorite Schemes</h4>\n\n<p>Every scoundrel has an angle they use in preference to other schemes. Choose a favorite scam or roll on the table below.</p>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Scam</th></tr></thead><tbody><tr><td>1</td><td>I cheat at games involving chance.</td></tr><tr><td>2</td><td>I shave creds or forge documents.</td></tr><tr><td>3</td><td>I insinuate myself into people's lives to prey on their weakness and secure their fortunes.</td></tr><tr><td>4</td><td>I put on new identities like clothes.</td></tr><tr><td>5</td><td>I run sleight-of-hand cons on street corners.</td></tr><tr><td>6</td><td>I convince people that worthless junk is worth their hard-earned money.</td></tr></tbody></table>\n\n<h3>Feature: False Identity </h3>\n\n<p>You have created a second identity that includes documentation, established acquaintances, and disguises that allow you to assume that persona.</p>\n\n<p>Additionally, you can forge documents including official papers and personal letters, as long as you have seen an example of the kind of document or the handwriting you are trying to copy.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Performer</td></tr><tr><td>4</td><td>Quick-Fingered</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Force of Personality</td></tr><tr><td>7</td><td>Snappy Interjection</td></tr><tr><td>8</td><td>Actor</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics </h4>\n\n<p>Scoundrels are colorful characters who conceal their true selves behind the masks they construct. They reflect what people want to see, what they want to believe, and how they see the world. But their true selves are sometimes plagued by an uneasy conscience, an old enemy, or deep-seated trust issues.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I fall in and out of love easily, and am always pursuing someone.</td></tr><tr><td>2</td><td>I have a joke for every occasion, especially occasions where humor is inappropriate.</td></tr><tr><td>3</td><td>Flattery is my preferred trick for getting what I want.</td></tr><tr><td>4</td><td>I'm a born gambler who can't resist taking a risk for a potential payoff.</td></tr><tr><td>5</td><td>I lie about almost everything, even when there's no good reason to.</td></tr><tr><td>6</td><td>Sarcasm and insults are my weapons of choice.</td></tr><tr><td>7</td><td>I keep multiple symbols on me and invoke whatever power might come in useful at any given moment.</td></tr><tr><td>8</td><td>I pocket anything I see that might have some value.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Independence.</strong> I am a free spirit� no one tells me what to do. (Chaotic)</td></tr><tr><td>2</td><td><strong>Fairness.</strong> I never target people who can't afford to lose a few creds. (Lawful)</td></tr><tr><td>3</td><td><strong>Charity.</strong> I distribute the money I acquire to the people who really need it. (Light)</td></tr><tr><td>4</td><td><strong>Creativity.</strong> I never run the same con twice. (Any)</td></tr><tr><td>5</td><td><strong>Friendship.</strong> Material goods come and go. Bonds of friendship last forever. (Light)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I'm determined to make something of myself. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I fleeced the wrong person and must work to ensure that this individual never crosses paths with me or those I care about.</td></tr><tr><td>2</td><td>I owe everything to my mentor�a horrible person who's probably rotting in jail somewhere.</td></tr><tr><td>3</td><td>Somewhere out there, I have a child who doesn't know me. I'm making the world better for him or her.</td></tr><tr><td>4</td><td>I come from a noble family, and one day I'll reclaim my lands and title from those who stole them from me.</td></tr><tr><td>5</td><td>A powerful person killed someone I love. Some day soon, I'll have my revenge.</td></tr><tr><td>6</td><td>I swindled and ruined a person who didn't deserve it, and I seek to atone for my misdeeds.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I can't resist a pretty face.</td></tr><tr><td>2</td><td>I'm always in debt. I spend my ill-gotten gains on decadent luxuries faster than I bring them in.</td></tr><tr><td>3</td><td>I'm convinced that no one could ever fool me the way I fool others.</td></tr><tr><td>4</td><td>I'm too greedy for my own good. I can't resist taking a risk if there's money involved.</td></tr><tr><td>5</td><td>I can't resist swindling people who are more powerful than me.</td></tr><tr><td>6</td><td>I hate to admit it and will hate myself for it, but I'll run and preserve my own hide if the going gets tough.</td></tr></tbody></table>\n\n\n\n<h2>Sith</h2>\n\n<p>You are an acolyte of the Sith Order: an ancient order of Force-wielders devoted to the dark side of the Force. Emerging as a divergent faction to the Jedi Order, the Sith are mortal enemies of the Jedi and fight against them. Driven by emotions such as hate, anger, and greed, the Sith are deceptive and ultimately obsessed with amassing power no matter the cost. You follow the Sith Code:</p>\n\n<div class=\"sw5e-book-block\">*\"Peace is a lie. There is only passion.<br>\n\nThrough passion I gain strength.<br>\n\nThrough strength I gain power.<br>\n\nThrough power I gain victory.<br>\n\nThrough victory my chains are broken.<br>\n\n<p>The Force shall free me.\"*</p></div>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Insight, Intimidation, and Lore</li><li><strong>Tool Proficiencies:</strong> Artificer's tools</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A copy of the Sith code, a set of common clothes including a robe, and a belt pouch containing 150 cr</li></ul>\n\n<h3>Feature: Feared</h3>\n\n<p>As a Sith, you instill fear in those who are aware of your standing. When you are in a civilized environment, you can get away with minor criminal offenses, such as refusing to pay for food at a cantina or cutting through doors at a local shop, since most people will not report your activity to the authorities.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Empathic</td></tr><tr><td>3</td><td>Threatening</td></tr><tr><td>4</td><td>Loremaster</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Linguist</td></tr><tr><td>6</td><td>Crafter</td></tr><tr><td>7</td><td>Formfighting Dabbler</td></tr><tr><td>8</td><td>Force-Sensitive</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Sith are shaped by their training. They study the Sith code and use it to oppress the weak and quell resistance. Their study of the Sith code affects their mannerisms and ideals. Their flaws might be some hidden hypocrisy or heretical idea, or an ideal or bond taken to an extreme.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I idolize a particular Sith, and constantly refer to that person's deeds and example.</td></tr><tr><td>2</td><td>I seek power above all else.</td></tr><tr><td>3</td><td>I prefer using a lightsaber to solve my problems.</td></tr><tr><td>4</td><td>I have a plan for any situation.</td></tr><tr><td>5</td><td>I believe everyone is beneath me.</td></tr><tr><td>6</td><td>I prefer to let someone else do my dirty work.</td></tr><tr><td>7</td><td>Hatred and anger drive every decision I make.</td></tr><tr><td>8</td><td>Lying and scheming are second nature to me.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Patience.</strong> I will defeat my enemies in the end, I'm in no rush. (Lawful)</td></tr><tr><td>2</td><td><strong>Disdain.</strong> I never try to help those in need, regardless of how simple it would be. (Dark)</td></tr><tr><td>3</td><td><strong>Knowledge.</strong> The path to power and self-improvement is through knowledge. (Neutral)</td></tr><tr><td>4</td><td><strong>Power.</strong> I hope to one day rise to the rank of Dark Lord of the Sith. (Dark)</td></tr><tr><td>5</td><td><strong>Might.</strong> If I become strong, I can take what I want�what I deserve. (Dark)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> I'll succeed in my goals at any cost. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I would die to recover an ancient Sith relic that was lost long ago.</td></tr><tr><td>2</td><td>I care only about myself.</td></tr><tr><td>3</td><td>I owe my life to the Sith who took me in when my parents died.</td></tr><tr><td>4</td><td>My enemies will be defeated, even if it costs me my life.</td></tr><tr><td>5</td><td>Someone I love was killed. Some day soon, I'll have my revenge.</td></tr><tr><td>6</td><td>My loyalty to my master is unwavering.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I am too merciful, and empathize with those I shouldn't.</td></tr><tr><td>2</td><td>I put too much trust in those who rule over me.</td></tr><tr><td>3</td><td>I will never fully trust anyone other than myself.</td></tr><tr><td>4</td><td>I am inflexible in my thinking.</td></tr><tr><td>5</td><td>My pride will probably lead to my destruction.</td></tr><tr><td>6</td><td>Failure frightens me, and I get desperate if I think I might fail.</td></tr></tbody></table>\n\n\n\n<h2>Smuggler</h2>\n\n<p>You have spent your life hiding in the darkness, making shady deals behind closed doors. What led you to engage in a life of crime? Do you crave the thrill of lawbreaking, or did you enter the profession to pay off a debt, risking your hide on behalf of a less than honorable noble? A smuggler is an individual trained in the art of acquisition, a professional thug who can deliver anything... for a price. Smugglers tend to be bolder criminals than most, preferring bribery or distraction over subterfuge and stealth.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Deception, Piloting, Sleight of Hand, and Stealth</li><li><strong>Tool Proficiencies:</strong> One type of gaming set and your choice of demolitions kit, security kit, or slicer's kit</li><li><strong>Equipment:</strong> A fusion cutter, a set of dark common clothes including a hood, and a belt pouch containing 150 cr</li></ul>\n\n<h3>Feature: Careful Selection</h3>\n\n<p>Some close brushes with the law have taught you that not every city guard can be bribed, and some people are simply too keen to miss minute discrepancies. This feature allows you to study a person and gain insight into whether or not they would accept a bribe, or to pick up on whether they are exceptionally more perceptive than you. It does not reveal how expensive a bribe may be for a given situation, however.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Silver-Tongued</td></tr><tr><td>2</td><td>Ace Pilot</td></tr><tr><td>3</td><td>Quick-Fingered</td></tr><tr><td>4</td><td>Stealthy</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Specialist</td></tr><tr><td>7</td><td>Feigned Confidence</td></tr><tr><td>8</td><td>Force of Personality</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Smugglers might seem like villains on the surface, and many of them are nefarious to the core. But some have an abundance of endearing, if not redeeming, characteristics. There might be honor among thieves, but spies rarely show any respect for law or authority. </p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I am extremely sociable, especially over a mug of ale.</td></tr><tr><td>2</td><td>I always keep my wares close to me, you never know who might stumble across them otherwise.</td></tr><tr><td>3</td><td>The best way to hide is out in the open.</td></tr><tr><td>4</td><td>I'm a terrible gossip.</td></tr><tr><td>5</td><td>Being seen with any unsavory figures is a sure way to undermine my work, which is why I work out of sight.</td></tr><tr><td>6</td><td>Deflecting questions has become second nature to me, so I rarely answer straight.</td></tr><tr><td>7</td><td>I have dozens of identities and live in constant fear of answering to the wrong name.</td></tr><tr><td>8</td><td>I act irrationally confident in the face of danger, nobody suspects anything when you seem like you're in charge.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Morals.</strong> I only smuggle things to improve the lives of the common folk. (Light)</td></tr><tr><td>2</td><td><strong>Ruthless.</strong> I will rise to the top of the heap by any means necessary. (Dark)</td></tr><tr><td>3</td><td><strong>Friendship.</strong> My associates are dear to me, and I want them to rise with me when I hit it big. (Lawful)</td></tr><tr><td>4</td><td><strong>Dauntless.</strong> No border crossing or bribe is too difficult- that's just the coward's way of saying exciting! (Chaotic)</td></tr><tr><td>5</td><td><strong>Greater Good.</strong> I work for a greater cause, and ply my trade only in service to it. (Any)</td></tr><tr><td>6</td><td><strong>Unperturbed.</strong> I only want to make a living for myself, and smuggling is just an edge I can use to do so. (Neutral)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>A corrupt official shut me down back in my honest days. I aim to show him a thing or two about recovery.</td></tr><tr><td>2</td><td>I never wanted to be a criminal, but it pays the bills.</td></tr><tr><td>3</td><td>A bloodthirsty pirate stole a shipment from me and killed a dear friend of mine. I will have my vengeance.</td></tr><tr><td>4</td><td>Someone I cared about discovered my profession and has publicly denounced me, and I am caught between protecting my reputation and restoring our relationship.</td></tr><tr><td>5</td><td>My love interest is someone who once stole from right under my nose- but they have no idea who I am or how much I admire them for their accomplishment.</td></tr><tr><td>6</td><td>My business partners are closer to me than my family.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>\"Trust nobody, not even yourself.\" I am plagued by paranoia.</td></tr><tr><td>2</td><td>I'm so charismatic that sometimes I woo myself. Who am I, Narcissus?</td></tr><tr><td>3</td><td>Money is my greatest motivator. I'll do almost anything given enough of it, even if I'll regret it later.</td></tr><tr><td>4</td><td>I would betray anyone to save my own skin.</td></tr><tr><td>5</td><td>I detach myself from the results of my actions in order to sleep better at night.</td></tr><tr><td>6</td><td>Someone who knows me well might call me \"two-faced\" but those who don't have no idea what hit 'em.</td></tr></tbody></table>\n\n\n\n<h2>Soldier</h2>\n\n<p>War has been your life for as long as you care to remember. You trained as a youth, studied the use of weapons and armor, learned basic survival techniques, including how to stay alive on the battlefield. You might have been part of a standing national army, a mercenary company, or perhaps a member of a local militia who rose to prominence during a recent war.</p>\n\n<p>When you choose this background, work with your GM to determine which military organization you were a part of, how far through its ranks you progressed, and what kind of experiences you had during your military career. Was it a standing army, a town guard, a village militia, or perhaps a private company.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Athletics, Intimidation, Persuasion, and Piloting</li><li><strong>Tool Proficiencies:</strong> One type of gaming set</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> An insignia of rank, a trophy taken from a fallen enemy, a gaming set (one of your choice), a set of common clothes, and a belt pouch containing 100 cr</li></ul>\n\n<h4>Specialty</h4>\n\n<p>During your time as a soldier, you had a specific role to play in your unit or army. Roll a d8 or choose from the options in the table below to determine your role:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>1</td><td>Officer</td></tr><tr><td>2</td><td>Scout</td></tr><tr><td>3</td><td>Infantry</td></tr><tr><td>4</td><td>Medic</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>5</td><td>Quartermaster</td></tr><tr><td>6</td><td>Pilot</td></tr><tr><td>7</td><td>Artisan</td></tr><tr><td>8</td><td>Support Staff</td></tr></tbody></table></div>\n\n<h3>Feature: Military Rank</h3>\n\n<p>You have a military rank from your career as a soldier. Soldiers loyal to your former military organization still recognize your authority and influence, and they defer to you if they are of a lower rank. You can invoke your rank to exert influence over other soldiers and requisition simple equipment for temporary use. You can also usually gain access to friendly military encampments where your rank is recognized.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Brawny</td></tr><tr><td>2</td><td>Threatening</td></tr><tr><td>3</td><td>Charmer</td></tr><tr><td>4</td><td>Ace Pilot</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Competitor</td></tr><tr><td>6</td><td>Linguist</td></tr><tr><td>7</td><td>Weapon Expert</td></tr><tr><td>8</td><td>Healer</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>The horrors of war combined with the rigid discipline of military service leave their mark on all soldiers, shaping their ideals, creating strong bonds, and often leaving them scarred and mentally vulnerable.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>I'm always polite and respectful.</td></tr><tr><td>2</td><td>I'm haunted by memories of war. I can't get the images of violence out of my mind.</td></tr><tr><td>3</td><td>I've lost too many friends, and I'm slow to make new ones.</td></tr><tr><td>4</td><td>I'm full of inspiring and cautionary tales from my military experience relevant to almost every combat situation.</td></tr><tr><td>5</td><td>I can stare down a hell hound without flinching.</td></tr><tr><td>6</td><td>I enjoy being strong and like breaking things.</td></tr><tr><td>7</td><td>I have a crude sense of humor.</td></tr><tr><td>8</td><td>I face problems head-on. A simple, direct solution is the best path to success.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Greater Good.</strong> Our lot is to lay down our lives in defense of others. (Light)</td></tr><tr><td>2</td><td><strong>Responsibility.</strong> I do what I must and obey just authority. (Lawful)</td></tr><tr><td>3</td><td><strong>Independence.</strong> When people follow orders blindly, they embrace a kind of tyranny. (Chaotic)</td></tr><tr><td>4</td><td><strong>Might.</strong> In life as in war, the stronger force wins. (Dark)</td></tr><tr><td>5</td><td><strong>Live and Let Live.</strong> Ideals aren't worth killing over or going to war for. (Neutral)</td></tr><tr><td>6</td><td><strong>Nation.</strong> My city, nation, or people are all that matter. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I would still lay down my life for the people I served with.</td></tr><tr><td>2</td><td>Someone saved my life on the battlefield. To this day, I will never leave a friend behind.</td></tr><tr><td>3</td><td>My honor is my life.</td></tr><tr><td>4</td><td>I'll never forget the crushing defeat my company suffered or the enemies who dealt it.</td></tr><tr><td>5</td><td>Those who fight beside me are those worth dying for.</td></tr><tr><td>6</td><td>I fight for those who cannot fight for themselves.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>The monstrous enemy we faced in battle still leaves me quivering with fear.</td></tr><tr><td>2</td><td>I have little respect for anyone who is not a proven warrior.</td></tr><tr><td>3</td><td>I made a terrible mistake in battle cost many lives� and I would do anything to keep that mistake secret.</td></tr><tr><td>4</td><td>My hatred of my enemies is blind and unreasoning.</td></tr><tr><td>5</td><td>I obey the law, even if the law causes misery.</td></tr><tr><td>6</td><td>I'd rather eat my armor than admit when I'm wrong.</td></tr></tbody></table>\n\n\n\n<h2>Spacer</h2>\n\n<p>Aboard a star ship in the cold vacuum of space is where you feel most at home. You've spent the majority of your life travelling the stars. Life aboard ships has given you a good understanding of their inner workings. You might be especially skilled as a ship mechanic, a pilot, or support staff.</p>\n\n<hr>\n\n<ul><li><strong>Skill Proficiencies:</strong> Choose two from Insight, Investigation, Piloting, and Technology</li><li><strong>Tool Proficiencies:</strong> Your choice of chef's kit, mechanic's kit, or one type of gaming set</li><li><strong>Languages:</strong> One of your choice</li><li><strong>Equipment:</strong> A set of tools or a gaming set (one of your choice), a set of common clothes, a small souvenir from your travels, and a belt pouch containing 100 cr</li></ul>\n\n<h4>Specialty</h4>\n\n<p>During your time as a spacer, you had a specific role to play aboard the ship. Roll a d8 or choose from the options in the table below to determine your role:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>1</td><td>Pilot</td></tr><tr><td>2</td><td>Mechanic</td></tr><tr><td>3</td><td>Support Staff</td></tr><tr><td>4</td><td>Guard</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Specialty</th></tr></thead><tbody><tr><td>5</td><td>Ship Medic</td></tr><tr><td>6</td><td>Captain</td></tr><tr><td>7</td><td>Communications Officer</td></tr><tr><td>8</td><td>Ship Cook</td></tr></tbody></table></div>\n\n<h3>Feature: Well-Traveled</h3>\n\n<p>As a spacer, you've been from one end of the galaxy to the other. You've traveled along many of the trade routes, and know the safest routes. You have expert knowledge of the various hyperlanes. In addition to this, you know a large number of the models and designs of common space ships that are found in the galaxy.</p>\n\n<h3>Background Feat</h3>\n\n<p>As a further embodiment of the experience and training of your background, you can choose from the following feats:</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>1</td><td>Empathic</td></tr><tr><td>2</td><td>Investigator</td></tr><tr><td>3</td><td>Ace Pilot</td></tr><tr><td>4</td><td>Techie</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Feat</th></tr></thead><tbody><tr><td>5</td><td>Specialist</td></tr><tr><td>6</td><td>Competitor</td></tr><tr><td>7</td><td>Galvanizing Presence</td></tr><tr><td>8</td><td>Inspiring Leader</td></tr></tbody></table></div>\n\n<h4>Suggested Characteristics</h4>\n\n<p>Spacers come from all walks of life, and the responsibilities of life aboard a ship make them generally reliable as well. Spending so much time on their ship shapes their outlook and forms their most important attachments.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8</th><th>Personality Trait</th></tr></thead><tbody><tr><td>1</td><td>My crewmates know they can rely on me, no matter what.</td></tr><tr><td>2</td><td>I work hard so that I can play hard when the work is done.</td></tr><tr><td>3</td><td>I enjoy traveling into new systems and making new friends over a drink.</td></tr><tr><td>4</td><td>I stretch the truth for the sake of a good story.</td></tr><tr><td>5</td><td>To me, a bar brawl is a nice way to get to know a new city.</td></tr><tr><td>6</td><td>I never pass up a friendly wager.</td></tr><tr><td>7</td><td>The best way to get me to do something is to tell me I can't do it.</td></tr><tr><td>8</td><td>I like a job well done, especially if I can convince someone else to do it.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Ideal</th></tr></thead><tbody><tr><td>1</td><td><strong>Respect.</strong> The thing that keeps a ship together is mutual respect between captain and crew. (Light)</td></tr><tr><td>2</td><td><strong>Fairness.</strong> We all do the work, so we all share in the rewards. (Lawful)</td></tr><tr><td>3</td><td><strong>Freedom.</strong> Space is freedom � the freedom to go anywhere and do anything. (Chaotic)</td></tr><tr><td>4</td><td><strong>Mastery.</strong> I'm a predator, and the other ships we come across are my prey. (Dark)</td></tr><tr><td>5</td><td><strong>People.</strong> I'm committed to my crewmates, not to ideals. (Neutral)</td></tr><tr><td>6</td><td><strong>Aspiration.</strong> Someday, I'll own my own ship and chart my own destiny. (Any)</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Bond</th></tr></thead><tbody><tr><td>1</td><td>I'm loyal to my captain first, everything else second.</td></tr><tr><td>2</td><td>The ship is most important�crewmates and captains come and go.</td></tr><tr><td>3</td><td>I'll always remember my first ship.</td></tr><tr><td>4</td><td>I will become the greatest captain that ever lived.</td></tr><tr><td>5</td><td>I was cheated out of my fair share of the profits, and I want to get my due.</td></tr><tr><td>6</td><td>Ruthless space pirates murdered my captain and crewmates, stole all we owned, and left me to die. Vengeance will be mine.</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d6</th><th>Flaw</th></tr></thead><tbody><tr><td>1</td><td>I follow orders, even if I think they're wrong.</td></tr><tr><td>2</td><td>I'll say anything to avoid having to do extra work.</td></tr><tr><td>3</td><td>Once someone questions my courage, I never back down no matter how dangerous the situation.</td></tr><tr><td>4</td><td>Once I start drinking, it's hard for me to stop.</td></tr><tr><td>5</td><td>I can't help but pocket loose coins and other trinkets I come across.</td></tr><tr><td>6</td><td>My pride will probably lead to my destruction.</td></tr></tbody></table>\n\n\n\n<style>\n\n<p>  .phb#p25:after { display:none; } &lt;/style&gt;</p>\n\n<img src='https://www.gmbinder.com/images/2ETxkMF.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:2600px' />"
