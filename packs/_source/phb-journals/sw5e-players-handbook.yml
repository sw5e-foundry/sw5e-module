        <h1>Introduction</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">he Dungeons and Dragons roleplaying game is about</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; storytelling in worlds of swords and sorcery. It shares elements with childhood games of make-believe. Like those games, D&D is driven by imagination. It's about picturing the towering castle beneath the stormy night sky and imagining how a fantasy adventurer might react to the challenges that scene presents.

        This overhaul is designed as a <em>Star Wars</em> reskinning of the core <span style="font-variant: small-caps">Dungeons and Dragons</span> experience. The rules are generally the same, and so an experienced player of 5th Edition should have no trouble jumping right in to a <em>Star Wars</em> themed campaign. For the less experienced player, this Introduction will cover the basics of the 5th Edition of <span style="font-variant: small-caps">Dungeons and Dragons</span>, appropriately reskinned for the setting.

        <div class="descriptive sw5e-book-block"><br>

        <p><strong>Game Master (GM):</strong> After traveling the streets of Nar Shaddaa, you find yourself at the entrance to the Black Sun compound. Security cameras scan the surrounding area, and a cadre of bored-looking guardsmen wait impatiently by the door. Two twi'lek urchins plead for handouts from the Black Sun mercenaries, only to be yelled at and pushed away. A shimmering barrier covers the entrance to the compound, with a manned security console on its left side.</p>

        <p><strong>Rickey (playing Vinto):</strong> I want to talk my way into the compound. I approach the guards.</p>

        <p><strong>Drew (playing Dash):</strong> I want to throw a grenade and then shoot them all.</p>

        <p><strong>Eric (playing Kodo):</strong> ...</p></div>

        <p>Unlike a game of make-believe, D&amp;D gives structure to the stories, a way of determining the consequences of the adventurers' action. Players roll dice to resolve whether their attacks hit or miss or whether their </p>

        <div class="descriptive sw5e-book-block"><br>

        <p><strong>Game Master (GM):</strong> OK, one at a time. Rickey, you're approaching the guardsmen?</p>

        <p><strong>Rickey:</strong> Yeah. Do they seem to be doing anything?</p>

        <p><strong>GM:</strong> Make a Wisdom check.</p>

        <p><strong>Rickey:</strong> Does my Perception skill apply?</p>

        <p><strong>GM:</strong> Sure!</p>

        <p><strong>Rickey (rolling a d20):</strong> Ugh. Seven.</p>

        <p><strong>GM:</strong> You can see a couple of them crouching over the ground but you can't make out what they're doing. And Drew, Dash is prepping a grenade?</p>

        <p><strong>Drew:</strong> Yup!</p>

        <p><strong>GM:</strong> Okay. Eric, what's Kodo doing?</p>

        <p><strong>Eric:</strong> ...</p></div>

        <p>adventurers can scale a cliff, roll away from the strike of a Force-wielder's shock, or pull off some other dangerous task. Anything is possible, but the dice make some outcomes more probable than others.</p>

        In the <em>Star Wars</em> <span style="font-variant: small-caps">Dungeons and Dragons</span> game, each player creates an adventurer (also called a character) and teams up with other adventurers (played by friends). Working together, the group might explore a planet-encompassing city like Coruscant, the wilds of Kashyyyk, or the war-torn expanse of Oricon. The adventurers can solve puzzles, talk with other characters, battle the legendary Jedi or Sith, and discover special modified items and other treasure.

        <p>One player, however, takes on the role of the Game Master (GM), the game's lead storyteller and referee. The GM creates adventures for the characters, who navigate its hazards and decide which paths to explore. The GM might describe the entrance to a Black Sun compound, and the players decide what they want their adventurers to do. Will they charge in, guns blazing? Convince the guardsmen they belong there? Or use other means to find an entrance?</p>

        <p>Then the GM determines the results of the adventurers' actions and narrates what they experience. Because the GM can improvise to react to anything the players attempt, D&amp;D is infinitely flexible, and each adventure can be exciting and unexpected.</p>

        <p>The game has no real end; when one story or quest wraps up, another one can begin, creating an ongoing story called a <strong>campaign</strong>. Many people who play the game keep their campaigns going for months or years, meeting with their friends every week or so to pick up the story where they left off. The adventurers grow in might as the campaign continues. Each force defeated, each adventure completed, and each relic recovered not only adds to the continuing story, but also earns the adventurers new capabilities. This increase in power is reflected by an adventurer's level.</p>

        There's no winning and losing in <em>any</em> <span style="font-variant: small-caps">Dungeons and Dragons</span> game�at least, not the way those terms are usually understood. Together, the GM and the players create an exciting story of bold adventurers who confront deadly perils. Sometimes an adventurer might come to a grisly end, torn apart by ferocious monsters or done in by a nefarious villain. Even so, the other adventurers can beseech a powerful Jedi to revive their fallen comrade, or the player might choose to create a new character to carry on. The group might fail to complete an adventure successfully, but if everyone had a good time and created a memorable story, they all win.

        <h2>Worlds of Adventure</h2>

        The many worlds of the <em>Star Wars</em> <span style="font-variant: small-caps">Dungeons and Dragons</span> game are places of mysticism and monsters, of brave warriors and spectacular adventures. They begin with a foundation of science fiction and fantasy and then add the creatures, places, and mystery that make these worlds unique.



        <p>Naturally, this conversion is designed to explore the myriad worlds of the <em>Star Wars</em> universe. I personally designed it to be used in the Old Republic era as characterized by the <strong>Knights of the Old Republic</strong> games and <strong>The Old Republic</strong> MMORPG. Utilizing this timeframe allows greater justification for a prevalence of force-wielders.</p>

        <p>All these worlds share characteristics, but each world is set apart by its own history and cultures, distinctive monsters and species, fantastic geography, ancient ruins, and scheming villains. Some worlds are dominated by one great story, like the Separatists' war on Ord Mantell. Ultimately they're all <em>Star Wars</em> worlds, and you can use the rules in this book to create a character and play in any one of them.</p>

        <p>Your GM might set the campaign on one of these worlds or on one that he or she created. Because there is so much diversity among the worlds of <em>Star Wars</em>, you should check with your GM about any house rules that will affect your play of the game. Ultimately, the Game Master is the authority on the campaign and its setting, even if the setting is a canon world.</p>

        <h2>Using This Book</h2>

        <p>The <em>Player's Handbook</em> is divided into twelve chapters.</p>

        <p><strong>Chapters 1-6</strong> are about creating a character, providing the rules and guidance you need to make the character you'll play in the game. It includes information on the various species, classes, backgrounds, equipment, and other customization options that you can choose from. Many of the rules in these chapters rely on material found later in the book. If you come across a game concept that you don't understand, consult the book's table of contents. </p>

        <p><strong>Chapters 7-9</strong> details the rules of how to play the game, beyond the basics described in this introduction. It covers the kinds of die rolls you make to determine success or failure at the tasks your character attempts, and describes the three broad categories of activity in the game: exploration, interaction, and combat.</p>

        <p><strong>Chapters 10-12</strong> is all about the Force and technology. It covers the nature of casting in the worlds of <em>Star Wars</em>, the rules for them, and the huge variety of powers available to characters in the game.</p>

        <h2>How to Play</h2>

        The play of the <span style="font-variant: small-caps">Dungeons and Dragons</span> game unfolds according to this basic pattern.

        <p><strong>1. The GM describes the environment.</strong> The GM tells the players where their adventurers are and what's around them, presenting the basic scope of options that present themselves (how many doors lead out of a room, what's on a table, who's in the cantina, and so on).</p>

        <p><strong>2. The players describe what they want to do.</strong> Sometimes one player speaks for the whole party, saying, "We'll take the east door," for example. Other times, different adventurers do different things: one adventurer might search a container while a second examines a symbol engraved on a wall and a third keeps watch for enemies. The players don't need to take turns, but the GM listens to every player and decides how to resolve those actions.</p>

        <p>Sometimes, resolving a task is easy. If an adventurer wants to walk across a room and open a door, the GM might just say that the door opens and describe what lies beyond. But the door might be locked, the floor might hide a deadly trap, or some other circumstance might make it challenging for an adventurer to complete a task. In those cases, the GM decides what happens, often relying on the roll of a die to determine the results of an action.</p>

        <p><strong>3. The GM narrates the results of the adventurers' actions.</strong> Describing the results often leads to another decision point, which brings the flow of the game right back to step 1.</p>

        <p>This pattern holds whether the adventurers are cautiously exploring a ruin, talking to a devious noble, or locked in mortal combat against a mighty rancor. In certain situations, particularly combat, the action is more structured and the players (and GM) do take turns choosing and resolving actions. But most of the time, play is fluid and flexible, adapting to the circumstances of the adventure.</p>

        <p>Often the action of an adventure takes place in the imagination of the players and GM, relying on the GM's verbal descriptions to set the scene. Some GMs like to use music, art, or recorded sound effects to help set the mood, and many players and GMs alike adopt different voices for the various adventurers, monsters, and other characters they play in the game. Sometimes, a GM might lay out a map and use tokens or miniature figures to represent each creature involved in a scene to help the players keep track of where everyone is.</p>

        <h3>Game Dice</h3>

        <p>The game uses polyhedral dice with different numbers of sides. You can find dice like these in game stores and in many bookstores.</p>

        <p>In these rules, the different dice are referred to by the letter d followed by the number of sides: d4, d6, d8, d 10, d12, and d20. For instance, a d6 is a six-sided die (the typical cube that many games use).</p>

        <p>Percentile dice, or d100, work a little differently. You generate a number between 1 and 100 by rolling two different ten-sided dice numbered from 0 to 9. One die (designated before you roll) gives the tens digit, and the other gives the ones digit. If you roll a 7 and a 1, for example, the number rolled is 71. Two 0s represent 100. Some ten-sided dice are numbered in tens (00, 10, 20, and so on), making it easier to distinguish the tens digit from the ones digit. In this case, a roll of 70 and 1 is 71, and 00 and 0 is 100.</p>

        <p>When you need to roll dice, the rules tell you how many dice to roll of a certain type, as well as what modifiers to add. For example, "3d8 + 5" means you roll three eight-sided dice, add them together, and add 5 to the total.</p>

        <p>The same d notation appears in the expressions "1d5", "1d3" and "1d2." To simulate the roll of a d5 or d3, roll a d10 or d6, respectively, and divide the number rolled by 2 (round up). To simulate the roll of 1d2, roll any die and assign a 1 or 2 to the roll depending on whether it was odd or even. (Alternatively, if the number rolled is more than half the number of sides on the die, it's a 2.)</p>



        <h3>The D20</h3>

        Does an adventurer's vibroblade swing hurt a rancor or just bounce off its leathery hide? Will the guard believe an outrageous bluff? Can a character swim across a raging river? Can a character avoid the main blast of a Sith's <em>force storm</em>, or does he or she take full damage from the tempest? In cases where the outcome of an action is uncertain, the <span style="font-variant: small-caps">Dungeons and Dragons</span> game relies on rolls of a 20-sided die, a d20, to determine success or failure. 

        <p>Every character and monster in the game has capabilities defined by six <strong>ability scores</strong>. The abilities are Strength, Dexterity, Constitution, Intelligence, Wisdom, and Charisma, and they typically range from 3 to 18 for most adventurers. (Monsters might have scores as low as 1 or as high as 30.) These ability scores, and the <strong>ability modifiers</strong> derived from them, are the basis for almost every d20 roll that a player makes on a character's or monster's behalf.</p>

        <p>Ability checks, attack rolls, and saving throws are the three main kinds of d20 rolls, forming the core of the rules of the game. All three follow these simple steps.</p>

        <p><strong>1. Roll the die and add a modifier.</strong> Roll a d20 and add the relevant modifier. This is typically the modifier derived from one of the six ability scores, and it sometimes includes a proficiency bonus to reflect a character's particular skill. (See chapter 1 for details on each ability and how to determine an ability's modifier.)</p>

        <p><strong>2. Apply circumstantial bonuses and penalties.</strong> A class feature, a power, a particular circumstance, or some other effect might give a bonus or penalty to the check.</p>

        <p><strong>3. Compare the total to a target number.</strong> If the total equals or exceeds the target number, the ability check, attack roll, or saving throw is a success. Otherwise, it's a failure. The GM is usually the one who determines target numbers and tells players whether their ability checks, attack rolls, and saving throws succeed or fail.</p>

        <p>The target number for an ability check or a saving throw is called a <strong>Difficulty Class</strong> (DC). The target number for an attack roll is called an <strong>Armor Class</strong> (AC).</p>

        <p>This simple rule governs the resolution of most tasks in D&amp;D play. Chapter 7 provides more detailed rules for using the d20 in the game.</p>

        <h3>Advantage and Disadvantage</h3>

        <p>Sometimes an ability check, attack roll, or saving throw is modified by special situations called <strong>advantage</strong> and <strong>disadvantage</strong>. Advantage reflects the positive circumstances surrounding a die roll, while disadvantage reflects the opposite. When you have either advantage or disadvantage, you roll a second die when you make the roll. Use the higher of the two rolls if you have advantage, and use the lower roll if you have disadvantage. For example, if you have disadvantage on a d20 roll, roll a 17 and a 5, you use the 5. If you instead have advantage and roll those numbers, you use the 17. More detailed rules for advantage and disadvantage are presented in chapter 7.  </p>

        <h3>Specific Beats General</h3>

        <p>This book contains rules, especially in parts 2 and 3, that govern how the game plays. That said, many special traits, class features, powers, unique items, monster abilities, and other game elements break the general rules in some way, creating an exception to how the rest of the game works. Remember this: If a specific rule contradicts a general rule, the specific rule wins.</p>

        <p>Exceptions to the rules are often minor. For instance, many adventurers don't have proficiency with sniper rifles, but every Chiss does because of a special trait. That trait creates a minor exception in the game. Other examples of rule-breaking are more conspicuous. For instance, an adventurer can't normally leap 30 feet, but some powers make that possible. The Force and technology account for most of the major exceptions to the rules.</p>

        <h3>Round Appropriately</h3>

        <p>Follow standard rules for rounding; if a number ends in one-half or greater, round up, while if a number ends in less than one-half, round down.</p>

        <h3>Targets</h3>

        <p>Many features and powers include specific language on what is a valid target, typically citing ally, friendly creature or hostile creature. The definition of each is included below.</p>

        <h4>Ally</h4>

        <p>An ally is any creature that would be considered friendly or neutral to you, but does not include you.</p>

        <h4>Friendly Creature</h4>

        <p>A friendly creature is any creature that could be considered an ally to you, as well as you.</p>

        <h4>Hostile Creature</h4>

        <p>A hostile creature is any creature that is antagonistic towards you.</p>

        <h2>Adventures</h2>

        The <span style="font-variant: small-caps">Dungeons and Dragons</span> game consists of a group of characters embarking on an adventure that the Game Master presents to them. Each character brings particular capabilities to the adventure in the form of ability scores and skills, class features, special traits, equipment, and special items. Every character is different, with various strengths and weaknesses, so the best party of adventurers is one in which the characters complement each other and cover the weaknesses of their companions. The adventurers must cooperate to successfully complete the adventure.



        <p>The adventure is the heart of the game, a story with a beginning, a middle, and an end. An adventure might be created by the Game Master or purchased off the shelf, tweaked and modified to suit the GM's needs and desires. In either case, an adventure features a wonderous setting, whether it's an underground enclave, a crumbling temple, a stretch of wilderness, or a bustling city. It features a rich cast of characters: the adventurers created and played by the other players at the table, as well as nonplayer characters (NPCs). Those characters might be patrons, allies, enemies, hirelings, or just background extras in an adventure. Often, one of the NPCs is a villain whose agenda drives much of an adventure's action.</p>

        <p>Over the course of their adventures, the characters are confronted by a variety of creatures, objects, and situations that they must deal with in some way. Sometimes the adventurers and other creatures do their best to kill or capture each other in combat. At other times, the adventurers talk to another creature (or even a mystical object) with a goal in mind. And often, the adventurers spend time trying to solve a puzzle, bypass an obstacle, find something hidden, or unravel the current situation. Meanwhile, the adventurers explore the world, making decisions about which way to travel and what they'll try to do next.</p>

        <p>Adventures vary in length and complexity. A short adventure might present only a few challenges, and it might take no more than a single game session to complete. A long adventure can involve hundreds of combats, interactions, and other challenges, and take dozens of sessions to play through, stretching over weeks or months of real time. Usually, the end of an adventure is marked by the adventurers heading back to safety to rest and enjoy the spoils of their labors.</p>

        <p>But that's not the end of the story. You can think of an adventure as a single episode of a TV series, made up of multiple exciting scenes. A campaign is the whole series�a string of adventures joined together, with a consistent group of adventurers following the narrative from start to finish.</p>

        <h3>The Force and Technology</h3>

        <p>Few <em>Star Wars</em> adventures end without interacting with a force- or tech-caster. Whether helpful or harmful, powers appear frequently in the life of an adventurer, and it is the focus of chapters 10, 11, and 12.</p>

        <p>In the worlds of <em>Star Wars</em>, practitioners of the Force are uncommon, set apart from the masses of people by their extraordinary talent. </p>

        <p>For adventurers, though, the Force and technology are key to their survival. Without the healing prowess of a Jedi or a sawbones, adventurers would quickly succumb to their wounds. Without the uplifting support of a scholar, soldiers might be overwhelmed by powerful foes. Without the sheer power and versatility of a consular, every threat would be magnified tenfold.</p>

        <p>The Force and technology are also a favored tool of villains. Many adventures are driven by the machinations of casters who are hell-bent on using power for some ill end. A mercenary leader subjugates the surrounding community, a renegade Sith saps the life from their victims, a vindictive droid takes over a space station with the intent of destroying its oppressors�these are just a few of the threats that adventurers might face. With power of their own, in the form of the Force and special items, the adventurers might prevail!</p>

        <h3>The Three Pillars of Adventuring </h3>

        <p>Adventurers can try to do anything their players can imagine, but it can be helpful to talk about their activities in three broad categories: exploration, social interaction, and combat.</p>

        <h4>Exploration</h4>

        <p>Exploration includes both the adventurers' movement through the world and their interaction with objects and situations that require their attention. Exploration is the give-and-take of the players describing what they want their characters to do, and the Game Master telling the players what happens as a result. On a large scale, that might involve the characters spending a day crossing the deserts of Tatooine or an hour making their way through the winding passages of an abandoned base. On the smallest scale, it could mean one character flipping a switch in a room to see what happens.</p>

        <h4>Social Interaction</h4>

        <p>Social interaction features the adventurers talking to someone (or something) else. It might mean demanding that a captured scout reveal the least well guarded entrance to the mercenary base, getting information from a rescued prisoner, pleading for mercy from the leader of a group of criminals, or persuading an informant to garner information about a distant location.</p>

        <p>The rules in chapters 7 and 8 support exploration and social interaction, as do many class features in chapter 3 and personality traits in chapter 4.</p>

        <h4>Combat</h4>

        <p>Combat, the focus of chapter 9, involves characters and other creatures swinging weapons, casting powers, maneuvering for position, and so on�all in an effort to defeat their opponents, whether that means killing every enemy, taking captives, or forcing a rout. Combat is the most structured element of a D&amp;D session, with creatures taking turns to make sure that everyone gets a chance to act. Even in the context of a pitched battle, there's still plenty of opportunity for adventurers to attempt wacky stunts like surfing down a flight of stairs on a shield, to examine the environment (perhaps by flipping a mysterious switch), and to interact with other creatures, including allies, enemies, and neutral parties.</p>

