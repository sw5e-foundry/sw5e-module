>Force Reflect</li><li><div style=\"color:blue\">Heal</div></li><li><div style=\"color:blue\">Heroism</div></li><li><div style=\"color:red\">Hex</div></li><li><div style=\"color:red\">Improved Feedback</div></li><li>Malacia</li><li>Phasestrike</li><li><div style=\"color:blue\">Project</div></li><li><div style=\"color:blue\">Sanctuary</div></li><li><div style=\"color:red\">Sap Vitality</div></li><li>Sense Emotion</li><li>Sense Force</li><li>Shadow Sight</li><li>Slow Descent</li><li><div style=\"color:red\">Sustained Lightning</div></li><li>Telemetry</li><li>Tremor</li><li><div style=\"color:blue\">Valor</div></li><li><div style=\"color:red\">Wound</div></li></ul>\n\n<h4>2nd-level</h4>\n\n<hr>\n\n<ul><li><div style=\"color:red\">Affliction</div></li><li>Animate Weapon</li><li>Battle Meditation</li><li><div style=\"color:blue\">Calm Emotions</div></li><li>Coerce Mind</li><li>Danger Sense</li><li><div style=\"color:red\">Dark Shear</div></li><li><div style=\"color:red\">Darkness</div></li><li><div style=\"color:red\">Drain Vitality</div></li><li><div style=\"color:blue\">Force Barrier</div></li><li><div style=\"color:blue\">Force Blind/Deafen</div></li><li>Force Blur</li><li>Force Camouflage</li><li>Force Concealment</li><li>Force Confusion</li><li><div style=\"color:blue\">Force Enlightenment</div></li><li>Force Throw</li><li>Force Sight</li><li>Force Vision</li><li><div style=\"color:red\">Hallucination</div></li><li>Improved Saber Throw</li><li>Locate Object</li><li><div style=\"color:red\">Mind Spike</div></li><li>Phasewalk</li><li>Rescue</li><li><div style=\"color:blue\">Restoration</div></li><li><div style=\"color:blue\">Stun</div></li><li><div style=\"color:blue\">Stun Droid</div></li></ul>\n\n<h4>3rd-level</h4>\n\n<hr>\n\n<ul><li><div style=\"color:blue\">Aura of Vigor</div></li><li><div style=\"color:blue\">Beacon of Hope</div></li></ul>\n\n<hr>\n\n<ul><li><div style=\"color:red\">Bestow Curse</div></li><li><div style=\"color:blue\">Call Lightning</div></li><li><div style=\"color:red\">Choke</div></li><li>Convulsion</li><li><div style=\"color:red\">Dark Aura</div></li><li><div style=\"color:red\">Force Lightning</div></li><li>Force Repulse</li><li><div style=\"color:red\">Force Scream</div></li><li>Force Suppression</li><li><div style=\"color:blue\">Force Trance</div></li><li>Force Weapon</li><li><div style=\"color:red\">Horror</div></li><li><div style=\"color:red\">Improved Dark Side Tendrils</div></li><li>Knight Speed</li><li>Mass Malacia</li><li><div style=\"color:blue\">Morichro</div></li><li><div style=\"color:red\">Plague</div></li><li><div style=\"color:blue\">Plant Surge</div></li><li>Psychometry</li><li><div style=\"color:blue\">Remove Curse</div></li><li>Sever Force</li><li><div style=\"color:blue\">Share Life</div></li><li>Telekinetic Shield</li><li><div style=\"color:blue\">Telekinetic Storm</div></li></ul>\n\n<h4>4th-level</h4>\n\n<hr>\n\n<ul><li><div style=\"color:blue\">Aura of Purity</div></li><li><div style=\"color:blue\">Disable Droid</div></li><li><div style=\"color:red\">Dominate Beast</div></li><li><div style=\"color:red\">Drain Life</div></li><li>Force Immunity</li><li>Freedom of Movement</li><li><div style=\"color:blue\">Grasping Vine</div></li><li><div style=\"color:red\">Hysteria</div></li><li>Improved Force Camouflage</li><li>Locate Creature</li><li>Mind Trap</li><li><div style=\"color:red\">Shocking Shield</div></li><li><div style=\"color:red\">Shroud of Darkness</div></li></ul>\n\n<h4>5th-level</h4>\n\n<hr>\n\n<ul><li>Control Pain</li><li><div style=\"color:red\">Dominate Mind</div></li><li>Force Breach</li><li><div style=\"color:red\">Greater Feedback</div></li><li>Greater Saber Throw</li><li>Force Meld</li><li>Improved Battle Meditation</li><li><div style=\"color:blue\">Improved Force Barrier</div></li></ul>\n\n<hr>\n\n<ul><li><div style=\"color:red\">Improved Force Scream</div></li><li><div style=\"color:blue\">Improved Heal</div></li><li>Improved Phasestrike</li><li>Improved Phasewalk</li><li><div style=\"color:blue\">Improved Restoration</div></li><li><div style=\"color:red\">Insanity</div></li><li>Mass Animation</li><li><div style=\"color:blue\">Revitalize</div></li><li><div style=\"color:red\">Siphon Life</div></li><li><div style=\"color:blue\">Skill Empowerment</div></li><li><div style=\"color:blue\">Stasis</div></li><li>Telekinesis</li></ul>\n\n<h4>6th-level</h4>\n\n<hr>\n\n<ul><li><div style=\"color:red\">Crush</div></li><li>Eruption</li><li><div style=\"color:red\">Force Chain Lightning</div></li><li><div style=\"color:blue\">Greater Heal</div></li><li>Improved Force Immunity</li><li>Mass Coerce Mind</li><li>Master Malacia</li><li><div style=\"color:red\">Mind Prison</div></li><li><div style=\"color:red\">Rage</div></li><li><div style=\"color:red\">Scourge</div></li><li><div style=\"color:blue\">Telekinetic Burst</div></li><li>True Sight</li><li><div style=\"color:blue\">Wall of Light</div></li><li><div style=\"color:red\">Wrack</div></li></ul>\n\n<h4>7th-level </h4>\n\n<hr>\n\n<ul><li><div style=\"color:blue\">Destroy Droid</div></li><li><div style=\"color:red\">Force Lightning Cone</div></li><li><div style=\"color:blue\">Force Mend</div></li><li>Force Project</li><li><div style=\"color:blue\">Improved Revitalize</div></li><li>Master Saber Throw</li><li>Master Speed</li><li><div style=\"color:red\">Ruin</div></li><li>Whirlwind</li></ul>\n\n<h4>8th-level </h4>\n\n<hr>\n\n<ul><li><div style=\"color:red\">Death Field</div></li><li><div style=\"color:red\">Dominate Monster</div></li><li>Earthquake</li><li>Force Link</li><li><div style=\"color:red\">Maddening Darkness</div></li><li>Master Force Immunity</li><li><div style=\"color:blue\">Master Force Barrier</div></li><li><div style=\"color:red\">Master Force Scream</div></li><li>Mind Blank</li><li><div style=\"color:blue\">Stasis Field</div></li><li><div style=\"color:blue\">Telekinetic Wave</div></li></ul>\n\n<h4>9th-level </h4>\n\n<hr>\n\n<ul><li><div style=\"color:red\">Force Storm</div></li><li><div style=\"color:red\">Kill</div></li><li><div style=\"color:red\">Mass Hysteria</div></li><li>Master Battle Meditation</li><li><div style=\"color:blue\">Master Heal</div></li><li><div style=\"color:red\">Master Feedback</div></li><li><div style=\"color:blue\">Master Revitalize</div></li><li>Precognition</li><li><div style=\"color:blue\">Will of the Force</div></li></ul></div>\n\n<img src='https://www.gmbinder.com/images/hBOGYMT.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:610px' />\n\n\n\n<h4>Affect Mind</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose a target within range that isn't hostile toward you. The target must make a Wisdom saving throw. On a failed save, you have advantage on all Charisma checks directed at that target. </p>\n\n<p>On a successful save, the creature does not realize that you tried to use the Force to influence its mood, but it becomes immune to this power for one day. This power has no effect on droids or constructs.</p>\n\n<h4>Affliction</h4>\n\n<p><em>2nd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Slow</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose a creature that you can see within range. That creature must make a Constitution saving throw. On a failed save, the target gains 1 slowed level, it takes a -2 penalty to AC and Dexterity saving throws, and it can't use reactions. On its turn, it can use either an action or a bonus action, not both. Regardless of the creature's abilities or items, it can't make more than one melee or ranged attack during its turn.</p>\n\n<p>If the creature attempts to cast a power with a casting time of 1 action, roll a d20. On an 11 or higher, the power doesn't take effect until the creature's next turn, and the creature must use its action on that turn to complete the power. If it can't, the power is wasted.\t</p>\n\n<p>The creatures makes another Constitution saving throw at the end of its turn. On a successful save, the effect ends.</p>\n\n<h4>Animate Weapon</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Disarm</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>You select a light- or vibro-weapon within this power's range that is not worn or carried by a conscious creature other than you, and use the Force to cause it to levitate, acting as an extension of your will for the duration or until you cast this power again. When you use this power, you can cause the weapon to move up to 20 feet and make a melee force attack against a creature within 5 feet of it. On a hit, the target takes 1d8 + your forcecasting ability modifier damage. The type is of the normal damage dealt by the weapon.</p>\n\n<p>While the weapon is animated, on each of your turns you can use a bonus action to move the weapon up to 20 feet and repeat the attack against a creature within 5 feet of it. At any time, you can end this force power to return the animated weapon to your hand.</p>\n\n<p>An enemy can attempt to gain control of the weapon by using its action to make a Strength (Athletics) check against your force save DC. On a success, the creature gains control of the weapon and the power ends.</p>\n\n\n\n<p>&emsp;<strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, the weapon's damage increases by 1d8 for every two slot levels above 2nd.</p>\n\n<h4>Armor of Abeloth</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour </li></ul>\n\n<p>A protective force surrounds you, manifesting as shimmering light that covers you and your gear. You gain 5 temporary hit points for the duration. If a creature hits you with a melee attack while you have these hit points, the creature takes 5 psychic damage.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, both the temporary hit points and the psychic damage increase by 5 for each slot.</p>\n\n<h4>Aura of Purity</h4>\n\n<p><em>4th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Restoration</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 10 minutes </li></ul>\n\n<p>Purifying energy radiates from you in a 30-foot radius. Until the power ends, the aura moves with you, centered on you. Each nonhostile creature in the aura (including you) can't become diseased, has resistance to poison damage, and has advantage on saving throws against effects that cause any of the following conditions: blinded, charmed, deafened, frightened, paralyzed, poisoned, and stunned. </p>\n\n<h4>Aura of Vigor</h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Valor</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Envigorating energy radiates from you in a 30-foot radius. Until the power ends, the aura moves with you, centered on you. Each nonhostile creature in the aura (including you) deals an extra 1d4 damage with weapon attacks.</p>\n\n<h4>Battle Insight</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 round</li></ul>\n\n<p>You center your focus on a target within range. Through the Force, you gain a brief insight into the target's defenses. On your next turn, you gain advantage on your first attack roll against the target, provided that this power hasn't ended.</p>\n\n<p>This power benefits additional attacks at higher levels: two attacks at 5th level, three attacks at 11th level, and four attacks at 17th level.</p>\n\n\n\n<h4>Battle Meditation</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (5-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You exude an aura out to 5 feet that boosts the morale and overall battle prowess of you and your allies while simultaneously reducing the opposition's combat-effectiveness by eroding their will to fight. </p>\n\n<p>Whenever you or a friendly creature within your meditation makes an attack roll or a saving throw, they can roll a d4 and add the number rolled to the attack roll or saving throw. </p>\n\n<p>Whenever a hostile creature enters your meditation or starts its turn there, it must make a Charisma saving throw. On a failed save, it must roll a d4 and subtract the number rolled from each attack roll or saving throw it makes before the end of your next turn. On a successful save, it is immune to this power for 1 day.</p>\n\n<h4>Battle Precognition</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 8 hours</li></ul>\n\n<p>Your attunement to the Force warns you when you are about to enter danger. Until the power ends, your base AC becomes 13 + your Dexterity modifier. This power has no effect if you are wearing armor.</p>\n\n<h4>Beacon of Hope </h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Heroism </li><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> 30 feet </li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>This power bestows hope and vitality. Choose any number of creatures within range. For the duration, each target has advantage on Wisdom saving throws and death saving throws, and regains the maximum number of hit points possible from any healing.</p>\n\n<h4>Beast Trick</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 24 hours</li></ul>\n\n<p>This power lets you distract a beast. Choose a beast that you can see within range. If the beast's Intelligence is 4 or higher, the power fails. Otherwise, the beast must succeed on a Wisdom saving throw or be charmed by you for the power's duration. If you or one of your companions harms the target, the power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, you can affect one additional beast for each slot level above 1st.</p>\n\n<h4>Bestow Curse</h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Curse</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You touch a creature, and that creature must succeed on a Wisdom saving throw or become cursed for the duration of the power. When you cast this power, choose the nature of the curse from the following options:</p>\n\n<ul><li>Choose one ability score. While cursed, the target has disadvantage on ability checks and saving throws made with that ability score.</li><li>While cursed, the target has disadvantage on attack rolls against you.</li><li>While cursed, the target must make a Wisdom saving throw at the start of each of its turns. lf it fails, it wastes its action that turn doing nothing.</li><li>While the target is cursed, your attacks and powers deal an extra 1d8 necrotic damage to the target.</li></ul>\n\n<p>A remove curse power ends this effect. At the GM's discretion, you may choose an alternative curse effect, but it should be no more powerful than those described above. The GM has final say on such a curse's effect. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> If you cast this power using a force slot of 4th level or higher, the duration is concentration, up to 10 minutes. If you use a force slot of 5th Level or higher, the duration is 8 hours. If you use a force slot of 7th level or higher, the duration is 24 hours. If you use a 9th level force slot, the power lasts until it is dispelled. Using a force slot of 5th Level or higher grants a duration that doesn't require concentration.</p>\n\n<h4>Breath Control</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>You are able to slow your metabolism in such a way that you can stop breathing and resist the effect of toxins in your body. If you are poisoned, you neutralize the poison. If more than one poison afflicts you, you neutralize one poison that you know is present, or you neutralize one at random.</p>\n\n<p>For the duration, you have advantage on saving throws against being poisoned, resistance to poison damage, and you no longer need to breathe.</p>\n\n\n\n<h4>Burst</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (5-foot sphere)</li><li><strong>Duration:</strong> Instantaneous\t </li></ul>\n\n<p>You cause the earth to burst from beneath your feet. Each creature within range, other than you, must succeed on a Dexterity saving throw or take 1d8 kinetic damage.</p>\n\n<p>This power's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).</p>\n\n<h4>Burst of Speed</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour </li></ul>\n\n<p>You touch a creature. The target's speed increases by 10 feet until the power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, you can target one additional creature for each slot level above 1st.</p>\n\n<h4>Call Lightning</h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>As you align yourself with nature through the Force, a 10-foot tall, 60-foot radius storm cloud cylinder appears, centered on a point you can see within range above you, with you as the center point. The power fails if your location can't accommodate the cloud's size or height. When you cast the power, choose a point under the cloud for lightning to strike. Each creature within 5 feet must make a Dexterity save, taking 3d10 lightning damage on a fail and half on a success. While the power persists, you can use your action to call lightning to a point in range again.</p>\n\n<p>If you're outdoors and in a storm, the power gives you control of the storm rather than creating a new one. The lightning damage also increases by 1d10.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the damage increases by 1d10 for each slot level above 3rd.</p>\n\n<h4>Calm Emotions</h4>\n\n<p><em>2nd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Sense Emotion</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>You attempt to suppress strong emotions in a group of people. Each humanoid in a 20-foot-radius sphere centered on a point you choose within range must make a Charisma saving throw a creature can choose to fail this saving throw if it wishes. If a creature fails its saving throw, choose one of the following two effects.</p>\n\n\n\n<ul><li>You can suppress any effect causing a target to be charmed or frightened. When this power ends, any suppressed effect resumes, provided that its duration has not expired in the meantime. </li><li>You can make a target indifferent about creatures of your choice that it is hostile toward. This indifference ends if the target is attacked or harmed by a power or if it witnesses any of its friends being harmed. </li></ul>\n\n<p>When the power ends, the creature becomes hostile again, unless the GM rules otherwise.</p>\n\n<h4>Choke</h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You make a constricting gesture at a creature within range. The target must make a Constitution saving throw. On a failed save target takes 5d8 force damage and is restrained until the end of your next turn. On a successful save, the target takes half as much damage and is not restrained.</p>\n\n<p>You can use a bonus action while the target is restrained to move the target up to 5 feet in any direction.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the damage increases by 1d8 for each slot level above 3rd.</p>\n\n<h4>Cloud Mind</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>Roll 5d8; the total is how many hit points of creatures this power can affect. Creatures within 20 feet of a point you choose are affected in order of their current hit points.</p>\n\n<p>Starting with the creature that has the lowest current hit points, each creature affected by this power falls unconscious. If the power ends, the sleeper takes damage, or someone uses an action wake the sleeper, they will be awoken.</p>\n\n<p>Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected.</p>\n\n<p>This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, you can roll an additional 2d8 for each slot level above 1st. </p>\n\n\n\n<h4>Coerce Mind</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Affect Mind</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 8 hours </li></ul>\n\n<p>You suggest a course of activity (limited to a sentence or two) and influence with the Force a creature you can see within range that can hear and understand you.  Creatures that can't be charmed are immune to this effect. The suggestion must be worded in such a manner as to make the course of action sound reasonable. Asking the creature to harm itself automatically negates the effect of the power.</p>\n\n<p>The target must make a Wisdom saving throw. On a failed save, it pursues the course of action you described to the best of its ability. The suggested course of action can continue for the entire duration. If the suggested activity can be completed in a shorter time, the power ends when the subject finishes what it was asked to do.</p>\n\n<p>You can also specify conditions that will trigger a special activity during the duration. For example, you might suggest that a soldier give her speeder to the first vagrant she meets. If the condition isn't met before the power expires, the activity isn't performed.</p>\n\n<p>If you or any of your companions damage the target, the power ends. This power has no effect on droids or constructs.</p>\n\n<h4>Comprehend Speech</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>For the duration, you understand the literal meaning of any spoken language that you hear.</p>\n\n<h4>Control Pain</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Body</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You use the Force to push your body beyond its normal limits. You can't die from damage or from failed death saving throws while this power is in effect, but the effort taxes you. If you have 0 hit points while you are under the effect of this power, you do not fall unconscious, and continue acting and fighting normally. While you remain at 0 hit points, you must make a death saving throw at the start of each of your turns. Each time you fail a death saving throw, you suffer a cumulative -1 penalty to attack rolls, ability checks, and saving throws (including death saving throws). This penalty lasts until you regain hit points. Successful death saving throws have no effect, but a natural 20 restores 1 hit point as usual. </p>\n\n<p>If you have 0 hit points when this power ends, you die instantly.</p>\n\n<h4>Convulsion</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Tremor</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose a point you can see on the ground within range. A fountain of churned earth and stone erupts in a 20-foot cube centered on that point. Each creature in that area must make a Dexterity saving throw. A creature takes 3d12 kinetic damage on a failed save, or half as much damage on a successful one. Additionally, the ground in that area becomes difficult terrain until cleared. Each 5-foot-square portion of the area requires at least 1 minute to clear by hand.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the damage increases by 1d12 for each slot level above 3rd.</p>\n\n<h4>Crush</h4>\n\n<p><em>6th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Choke</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You make a crushing gesture at a creature within range. The target must make a Constitution saving throw. On a failed save target takes 10d8 force damage and is paralyzed until the end of your next turn. On a successful save, the target takes half as much damage and is not paralyzed.</p>\n\n<p>You can use a bonus action while the target is paralyzed to move the target up to 10 feet in any direction.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 7th level or higher, the damage increases by 1d8 for each slot level above 6th.</p>\n\n<h4>Curse </h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Denounce</li><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> 30 feet </li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Up to three creatures of your choice that you can see within range must make Charisma saving throws. The first time each turn a target that fails this saving throw makes an attack roll or a saving throw before the power ends, the target must roll a d4 and subtract the number rolled from the attack roll or saving throw.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power with a force slot of 3rd level or higher, you can target one additional creature for every two slot levels above 1st. When you cast this power at 3rd, 6th, or 9th level, the die increases to d6, d8, and d10, respectively.</p>\n\n\n\n<h4>Danger Sense</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You put your faith in the Force, feeling out the future and seeing whether your actions will lead to fortune or ruin. The GM chooses from the following possible omens:</p>\n\n<ul><li><strong>Peace</strong>, for results which are not dangerous</li><li><strong>Danger</strong>, for results which are dangerous but perhaps still worth the danger</li><li><strong>Ruin</strong>, for results which are certain to end in death or tragedy</li></ul>\n\n<p>The power doesn't take into account any possible circumstances that might change the outcome, such as the use of additional powers or the loss or gain of a companion.</p>\n\n<p>If you use this power two or more times before completing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a neutral result regardless of the actual outcome.</p>\n\n<h4>Dark Aura</h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Hex</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You manifest a mantle of malevolent dark side energy for the duration.</p>\n\n<p>Until the power ends, any attack you make deals an extra 1d8 necrotic damage when you hit a creature within 10 feet of you. Any creature that takes this damage can't regain hit points until the start of your next turn.</p>\n\n<p>Additionally, any creature of your choice that you can see that starts its turn within 10 feet of you gains 1 slowed level until the start of your next turn.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 5th level or higher, the extra damage increases by 1d8 for for every two slot levels above 3rd.</p>\n\n<h4>Dark Shear</h4>\n\n<p><em>2nd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You create a weapon of imperceptible Force energy that lasts until the power ends. It counts as a simple lightweapon with which you are proficient. It deals 2d6 psychic damage, and has the finesse, light, and thrown properties (range 20/60). When you attack while within dim light or darkness, you have advantage.</p>\n\n<p>If you drop the weapon or throw it, it disappears at the end of the turn. While the power lasts, you can use a bonus action to make the weapon reappear in your hand.</p>\n\n\n\n<p>&emsp;<strong><em>Force Potency.</em></strong> When you cast this power using a 3rd or 4th level force slot, the damage increases by 1d6 (3d6). At 5th or 6th level, the damage increases by 2d6 (4d6). At 7th level or higher, the damage increases by 3d6 (5d6). </p>\n\n<h4>Dark Side Tendrils</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> Self (10-foot radius) </li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Tendrils of dark energy erupt from you and batter all creatures within 10 feet of you. Each creature in that area must make a Strength saving throw. On a failed save, a target takes 2d6 necrotic damage and can't take reactions until its next turn. On a successful save, the creature takes half damage, but suffers no other effect.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a power slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.</p>\n\n<h4>Darkness</h4>\n\n<p><em>2nd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>Darkness spreads from a point you choose within range to fill a 15-foot-radius sphere until the power ends. The darkness spreads around corners. A creature with darkvision can't see through this darkness, and unenhanced light can't illuminate it.</p>\n\n<p>If the point you choose is on an object you are holding or one that isn't being worn or carried, the darkness comes from the object and moves with it. Completely covering the source of the darkness with an opaque object blocks the darkness.</p>\n\n<p>If this power's area overlaps with light created by a 2nd-level power or lower, the light is dispelled.</p>\n\n<h4>Death Field</h4>\n\n<p><em>8th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Siphon Life</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet (30-foot cube)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You draw the life force from every creature in a 30-foot cube centered on a point you choose within range. Each creature in that area must make a Constitution saving throw. A creature takes 10d8 necrotic damage on a failed save, or half as much damage on a successful one. If you reduce a hostile creature to 0 hit points, you gain temporary hit points equal to half the damage dealt. This power has no effect on droids or constructs.</p>\n\n\n\n<h4>Denounce</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A target of your choice within range must make a Charisma saving throw. On a failed save, when the target makes their next attack roll or saving throw they must roll a d4 and subtract the number from it. The power then ends.</p>\n\n<p>This power's die increases at higher levels: to a d6 at 5th level, a d8 at 11th level, and a d10 at 17th level.</p>\n\n<h4>Destroy Droid</h4>\n\n<p><em>7th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Disable Droid</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet (30-foot cube)</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>Choose a point that you can see within range. Each droid or construct  must succeed on a Constitution saving throw or be paralyzed for the duration. At the beginning of each of its turns, an affected target takes energy damage equal to twice your forcecasting ability modifier and then repeats this saving throw. On a success, the power ends on the target.</p>\n\n<h4>Disable Droid</h4>\n\n<p><em>4th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Stun Droid</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet (15-foot cube)</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>Choose a point that you can see within range. Each droid or construct must succeed on a Constitution saving throw or be paralyzed for the duration. At the beginning of each of its turns, an affected creature takes energy damage equal to your forcecasting ability modifier and then repeats this saving throw. On a success, the power ends on the target.</p>\n\n<h4>Disperse Force</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Saber Ward</li><li><strong>Casting Time:</strong> 1 reaction, which you take when you take cold, energy, fire, ion, lightning, or sonic damage</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>This power absorbs damage from certain incoming attacks, lessening its effect on you and distributing it throughout your body. You have resistance to the triggering damage type until the start of your next turn. Also, you gain 5 temporary hit points to potentially absorb the attack. These temporary hit points last until the start of your next turn.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the temporary hit points increases by 5 for each slot level above 1st.</p>\n\n<h4>Dominate Beast</h4>\n\n<p><em>4th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A beast you can see must succeed on a Wisdom save or be charmed. If you or your companions are fighting it, it has advantage on this saving throw.</p>\n\n<p>While it's charmed, you have a telepathic link to it if you're on the same planet. You can use this link to issue commands while you are conscious, no action required, which it does its best to obey. You can specify a simple and general course of action. If it completes the order and doesn't receive further orders, it focuses on defending itself.</p>\n\n<p>You can use your action to take total control of the target. Until the end of your next turn, the beast takes only the actions you decide and nothing you don't allow it to. You can also have the beast use a reaction, but this takes your reaction as well.</p>\n\n<p>If the beast takes damage, it makes another Wisdom save. On a success, the power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a 5th-level force slot, the duration is up to 10 minutes. At a 6th-level slot, the duration is up to 1 hour. At a slot of 7th or higher, the duration is up to 8 hours.</p>\n\n<h4>Dominate Mind</h4>\n\n<p><em>5th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Dominate Beast</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>You attempt to beguile a humanoid that you can see within range. It must succeed on a Wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw.</p>\n\n<p>While the target is charmed, you have a telepathic link with it as long as you are within 1 mile of it. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability.</p>\n\n<p>You can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time you can also cause the creature to use a reaction, but this requires you to use your own reaction as well.</p>\n\n\n\n\n\n<p>&emsp;Each time the target takes damage, it makes a new Wisdom saving throw against the power. If the saving throw succeeds, the power ends. </p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a 6th-level force slot, the duration is 10 minutes. When you use a 7th-level force slot, the duration is 1 hour. When you use a force slot of 8th level or higher, the duration is 8 hours.</p>\n\n<h4>Dominate Monster</h4>\n\n<p><em>8th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Dominate Mind</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour </li></ul>\n\n<p>You attempt to beguile a creature that you can see within range. It must succeed on a Wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw.</p>\n\n<p>While the creature is charmed, you have a telepathic link with it as long as you are within 1 mile of it. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability.</p>\n\n<p>You can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time, you can also cause the creature to use a reaction, but this requires you to use your own reaction as well.</p>\n\n<p>Each time the target takes damage, it makes a new Wisdom saving throw against the power. If the saving throw succeeds, the power ends. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power with a 9th-level force slot, the duration is concentration, up to 8 hours.</p>\n\n<h4>Drain Life</h4>\n\n<p><em>4th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Drain Vitality</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You draw the life force from a creature you can see within range. The target must make a Constitution saving throw. The target takes 8d8 necrotic damage on a failed save, or half as much damage on a successful one. If you reduce a hostile creature to 0, you gain temporary hit points equal to half the damage dealt. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 5th level or higher, the damage increases by 1d8 for each slot level above 4th.</p>\n\n<h4>Drain Vitality</h4>\n\n<p><em>2nd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Sap Vitality</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You draw the willpower from a creature you can see within range. Make a ranged force attack against the target. On a hit, the target takes 2d6 necrotic damage and it deals only half damage with weapon attacks that use Strength until the power ends.</p>\n\n<p>At the end of each of the target's turns, it can make a Constitution saving throw against the power. On a success, the power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, the damage increases by 1d6 for each slot level above 2nd.</p>\n\n<h4>Dun Moch</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You attempt to manipulate a creature into fighting you. One creature that you can see within range must make a Wisdom saving throw. On a failed save, the creature is drawn to you, compelled by your demands. For the duration, it has disadvantage on attack rolls against creatures other than you, and must make a Wisdom saving throw each time it attempts to move to a space that is more than 30 feet away from you; if it succeeds on this saving throw, this power doesn't restrict the target's movement for that turn.</p>\n\n<p>The power ends if you attack any other creature, if you cast a power that targets a hostile creature other than the target, if a creature friendly to you damages the target or casts a harmful power on it, or if you end your turn more than 30 feet away from the target. This power has no effect on droids or constructs.</p>\n\n\n\n<h4>Earthquake</h4>\n\n<p><em>8th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Eruption</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 500 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>You create a seismic disturbance at a point on the ground that you can see within range. For the duration, an intense tremor rips through the ground in a 100-foot-radius circle centered on that point and shakes creatures and structures in contact with the ground in that area.</p>\n\n<p>The ground in the area becomes difficult terrain. Each creature on the ground that is concentrating must make a Constitution saving throw. On a failed save, the creature's concentration is broken.</p>\n\n<p>When you cast this power and at the end of each turn you spend concentrating on it, each creature on the ground in the area must make a Dexterity saving throw. On a failed save, the creature is knocked prone. </p>\n\n<p>This power can have additional effects depending on the terrain in the area, as determined by the GM.</p>\n\n<p><strong><em>Fissures.</em></strong> Fissures open throughout the power's area at the start of your next turn after you cast the power. A total of 1d6 such fissures open in locations chosen by the GM. Each is 1d10 x 10 feet deep, 10 feet wide, and extends from one edge of the power's area to the opposite side. A creature standing on a spot where a fissure opens must succeed on a Dexterity saving throw or fall in. A creature that successfully saves moves with the fissure's edge as it opens.</p>\n\n<p>A fissure that opens beneath a structure causes it to automatically collapse (see below).</p>\n\n<p><strong><em>Structures.</em></strong> The tremor deals 50 kinetic damage to any structure in contact with the ground in the area when you cast the power and at the start of each of your turns until the power ends. If a structure drops to 0 hit points, it collapses and potentially damages nearby creatures. A creature within half the distance of a structure's height must make a Dexterity saving throw. On a failed save, the creature takes 5d6 kinetic damage, is knocked prone, and is buried in the rubble, requiring a DC 20 Strength (Athletics) check as an action to escape. The GM can adjust the DC higher or lower, depending on the nature of the rubble. On a successful save, the creature takes half as much damage and doesn't fall prone or become buried.</p>\n\n<h4>Enfeeble</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Dark energy courses from your hand at a creature within range. The target must succeed on a Wisdom saving throw. If it is missing any hit points, it takes 1d12 necrotic damage. Otherwise, it takes 1d8.</p>\n\n<p>The power's damage increases by one die when you reach 5th, 11th, and 17th level.</p>\n\n<h4>Eruption</h4>\n\n<p><em>6th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Convulsion</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You cause up to six pillars of stone to burst from places on the ground that you can see within range. Each pillar is a cylinder that has a diameter of 5 feet and a height of up to 30 feet. The ground where a pillar appears must be wide enough for its diameter, and you can target the ground under a creature if that creature is Medium or smaller. Each pillar has AC 5 and 30 hit points. When reduced to 0 hit points, a pillar crumbles into rubble, which creates an area of difficult terrain with a 10 - foot radius that lasts until the rubble is cleared. Each 5-foot-diameter portion of the area requires at least 1 minute to clear by hand.</p>\n\n<p>If a pillar is created under a creature, that creature must succeed on a Dexterity saving throw or be lifted by the pillar. A creature can choose to fail the save. </p>\n\n<p>If a pillar is prevented from reaching its full height because of a ceiling or other obstacle, a creature on the pillar takes 6d6 kinetic damage and is restrained, pinched between the pillar and the obstacle. The restrained creature can use an action to make a Strength or Dexterity check (the creature's choice) against the power's save DC. On a success, the creature is no longer restrained and must either move off the pillar or fall off it.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 7th level or higher, you can create two additional pillars for each slot level above 6th.</p>\n\n<h4>Fear </h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> 60 feet </li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You awaken the sense of mortality in one creature you can see within range. The target must succeed on a Wisdom saving throw or become frightened for the duration. A target with 25 hit points or fewer makes the saving throw with disadvantage. A frightened creature can repeat this save at the end of each of its turns, ending this effect on a success. This power has no effect on constructs or droids.</p>\n\n<h4>Feedback</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You unleash a burst of psychic energy at a target within range. If the target can hear you (though it need not understand you), it must succeed on an Intelligence saving throw or take 1d4 psychic damage and have disadvantage on the next attack roll it makes before the end of its next turn.</p>\n\n<p>This power's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).</p>\n\n\n\n<h4>Force Barrier</h4>\n\n<p><em>2nd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 8 hours</li></ul>\n\n<p>This power bolsters your allies with toughness and resolve. Choose up to three creatures within range. Each target's hit point maximum and current hit points increase by 5 for the duration.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, a target's hit points increase by an additional 5 for each slot level above 2nd.</p>\n\n<h4>Force Blind/Deafen</h4>\n\n<p><em>2nd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>You can blind or deafen a foe. Choose one creature that you can see within range to make a Constitution saving throw. If it fails, the target is either blinded or deafened (your choice) for the duration. At the end of each of its turns, the target can make a Constitution saving throw. On a success, the power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.</p>\n\n<h4>Force Blinding</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot cone)</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You use the Force to emit a blinding flash of light from your hand. Roll 6d10, the total is how many hit points of creatures this power can effect. Creatures in a 15-foot cone originating from you are affected in ascending order of their current hit points (ignoring unconscious creatures and creatures that can't see).</p>\n\n<p>Starting with the creature that has the lowest current hit points, each creature affected by this power is blinded until the power ends. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for the creature to be affected.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, roll an additional 2d10 for each slot level above 1st.</p>\n\n<h4>Force Blur</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Mask </li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You use the Force to weave an illusion that blurs your form, shifting and wavering to all who can see you. For the duration, any creature has disadvantage on attack rolls against you. An attacker is immune to this effect if it doesn't rely on sight, as with blindsight, or can see through illusions, as with truesight.</p>\n\n<h4>Force Body</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>This power enables you to use your health to fuel your force powers. For the duration, when you cast a force power, you can choose to pay up to half the cost of the force power using your hit points instead of your tech points. When you do so, your maximum hit points are reduced by the same amount until you complete a long rest.</p>\n\n<p>You may end this effect at any time. If you cast a force power that would reduce your hit points to 0, the power automatically fails and this effect ends.</p>\n\n<h4>Force Breach</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet (20-foot cube)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose a spot within range. All force powers of 5th level or lower in the area end. For each force power of 6th level or higher in the area, make an ability check using your forcecasting ability. The DC equals 10 + the power's level. On a successful check, the force power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 6th level or higher, you automatically end the effects of a force power on the target if the power's level is equal to or less than the level of the force slot you used.</p>\n\n<h4>Force Camouflage</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 hour </li></ul>\n\n<p>You become invisible until the power ends. Anything you are wearing or carrying is invisible as long as it is on your person. The power ends if you attack, cast a power, or otherwise take a hostile action.</p>\n\n\n\n<h4>Force Chain Lightning</h4>\n\n<p><em>6th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Lightning</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You create a bolt of lightning that arcs toward a target of your choice that you can see within range. Three bolts then leap from that target to as many as three other targets, each of which must be within 30 feet of the first target. A target can be a creature or an object and can be targeted by only one of the bolts.</p>\n\n<p>A target must make a Dexterity saving throw. The target takes 10d8 lightning damage on a failed save, or half as much damage on a successful one.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 7th level or higher, one additional bolt leaps from the first target to another target for each slot level above 6th.</p>\n\n<h4>Force Concealment</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 24 hours</li></ul>\n\n<p>You shroud or alter the aura of a creature or object you touch so that Force powers reveal false information about it. The target can be a willing creature or an object that isn't being carried or worn by another creature.</p>\n\n<p>When you cast the power, choose one or both of the following effects. The effect lasts for the duration. If you cast this power on the same creature or object every day for 30 days, placing the same effect on it each time, the effect lasts until it is dispelled.</p>\n\n<p><strong><em>False Aura.</em></strong> You change the way the target appears to powers and Force-based enhanced effects, such as <em>sense force</em>, that detects the presence of the Force. You can make a Force-based unenhanced object or creature appear enhanced and to radiate a Force aura, or a Force-based enhanced object or creature appear unenhanced and to radiate no Force aura. When you use this effect on an object, you can make the false aura apparent to any creature that handles the item.</p>\n\n<p><strong><em>Cloak.</em></strong> You can change the way the target's affinity in the Force appears to the <em>force sight</em> power. For example, a Sith Lord with great power in the dark side of the Force can appear instead to have very little strength in the Force, with an affinity towards the light side.</p>\n\n<h4>Force Confusion</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Preqrequisite:</strong> Mind Trick</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>One humanoid of your choice that you can see within range must succeed on a Wisdom saving throw or become charmed by you for the duration. The </p>\n\n\n\n<p>charmed target must use its action before moving on each of its turns to make a melee attack against a creature other than itself that you mentally choose.</p>\n\n<p>The target can act normally on its turn if you choose no creature or if none are within its reach.</p>\n\n<p>On your subsequent turns, you must use your action to maintain control over the target, or the power ends. Also, the target can make a Wisdom saving throw at the end of each of its turns. On a success, the power ends.</p>\n\n<h4>Force Disarm</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You select a weapon or object being worn or carried by a Large or smaller creature within range. The creature must make a Strength or Dexterity saving throw (the creature chooses the ability to use). If the item is being carried, this save is made with advantage. On a failed save, the item is pulled directly to you. If you have a free hand, you catch the weapon. Otherwise, it lands at your feet.</p>\n\n<h4>Force Enlightenment</h4>\n\n<p><em>2nd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Guidance</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour </li></ul>\n\n<p>You touch a creature and enhance it with the Force. Choose one of the following effects; the target gains that effect until the power ends.</p>\n\n<ul><li><strong><em>Strength.</em></strong> The target has advantage on Strength checks, and his or her carrying capacity doubles.</li><li><strong><em>Dexterity.</em></strong> The target has advantage on Dexterity checks. It also doesn't take damage from falling 20 feet or less if it isn't incapacitated.</li><li><strong><em>Endurance.</em></strong> The target has advantage on Constitution checks. It also gains 2d6 temporary hit points, which are lost when the power ends.</li><li><strong><em>Cunning.</em></strong> The target has advantage on Intelligence checks.</li><li><strong><em>Wisdom.</em></strong> The target has advantage on Wisdom checks.</li><li><strong><em>Splendor.</em></strong> The target has advantage on Charisma checks.</li></ul>\n\n<p>This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.</p>\n\n\n\n<h4>Force Focus</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Technique</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You let the Force guide you, empowering your strikes. Until the power ends, your weapon attacks deal an extra 1d4 force damage on a hit.</p>\n\n<h4>Force Imbuement</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>The crystal inside of a simple lightweapon or the material of a simple vibroweapon or an improvised weapon you are holding is imbued with the power of the Force. For the duration, you can use your forcecasting ability instead of Strength for the attack and damage rolls of melee attacks using that weapon, and the weapon's damage die becomes a d8. The weapon also becomes enhanced, if it isn't already, and you become proficient with it, if you aren't already. The power ends if you cast it again or if you let go of the weapon.</p>\n\n<h4>Force Immunity</h4>\n\n<p><em>4th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>An immobile, faintly shimmering barrier springs into existence around you and remains for the duration. The barrier moves with you. Any force power of 3rd level or lower cast from outside the barrier can't affect you, even if the power is cast using a higher level force slot. Such a power can target you, but the power has no effect on you. Similarly, the area within the barrier is excluded from the areas affected by such powers.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 5th level or higher, the barrier blocks powers of one level higher for each slot level above 4th.</p>\n\n<h4>Force Jump</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Leap</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Using the Force to augment the strength in your legs, you leap up to 30 feet to an unoccupied space you can see, provided you have a direct path to the space.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, your jump distance increases by 5 feet for each slot level above 1st.</p>\n\n<h4>Force Leap</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>Until the end of your next turn, you can use your forcecasting ability score instead of your Strength score when you jump, and always count as having made a running start before jumping.</p>\n\n<h4>Force Lightning </h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Shock</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (100-foot line)</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A stroke of lightning forming a line 100 feet long and 5 feet wide blasts out from you in a direction you choose. Each creature in the line must make a Dexterity saving throw. A creature takes 8d6 lightning damage on a failed save, or half as much damage on a successful one. </p>\n\n<p>The lightning ignites flammable objects in the area that aren't being worn or carried.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd.</p>\n\n<h4>Force Lightning Cone</h4>\n\n<p><em>7th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Chain Lightning</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (60-foot cone)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Lightning arcs from your hands. Each creature in a 60-foot cone must make a Dexterity saving throw. A creature takes 12d6 lightning damage on a failed save, or half as much on a successful one.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 8th level or higher, the damage increases by 2d6 for each slot level above 7th.</p>\n\n<h4>Force Link</h4>\n\n<p><em>8th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Meld</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Unlimited</li><li><strong>Duration:</strong> 24 hours </li></ul>\n\n<p>You create a telepathic link between yourself and a willing creature with which you are familiar. Until the power ends, you and the target can instantaneously share words, images, sounds, and other sensory messages with one another through the link, and the target recognizes you as the creature it is communicating with. The power enables a creature with an Intelligence score of at least 1 to understand the meaning of your words and take in the scope of any sensory messages you send to it. This power has no effect on droids or constructs.</p>\n\n\n\n<h4>Force Mask</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Mind Trick</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>Until the power ends or you use an action to dismiss it, you can disguise yourself through use of the Force in many ways. You can appear to be shorter or taller by about a foot and change the appearance of your body and weight, but you cannot change the basic structure of your body. This effect can include your clothes, weapons, and other belongings on your person.</p>\n\n<p>This effect is only visual, so any sort of physical contact will only interact with the real size and shape of you. A creature that uses its action to examine you can identify this effect with a successful Intelligence (Investigation) check against your force save DC. </p>\n\n<h4>Force Meld</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Whisper</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You forge a telepathic link among up to eight willing creatures of your choice within range, psychically linking each creature to all the others for the duration. Droids, constructs, and creatures with Intelligence scores of 2 or less aren't affected by this power.</p>\n\n<p>Until the power ends, the targets can communicate telepathically through the bond whether or not they have a common language. The communication is possible over any distance, though it can't extend beyond a single planet.</p>\n\n<h4>Force Mend</h4>\n\n<p><em>7th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You touch a creature and stimulate its natural healing ability. The target regains 4d8+15 hit points. For the duration of the power, the target regains 1 hit point at the start of each of its turns (10 hit points each minute).</p>\n\n<p>If the creature has a severed part you hold it to the stump, the power instantaneously causes the limb to knit to the stump.</p>\n\n<p>This power has no effect on droids or constructs.</p>\n\n<h4>Force Project</h4>\n\n<p><em>7th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 day</li></ul>\n\n<p>You create an illusory copy of yourself that lasts for the duration. The copy can appear at any location that you have seen before, regardless of intervening obstacles. The illusion looks and sounds like you but is intangible. If the illusion takes any damage, it disappears, and the power ends. </p>\n\n<p>You can use your action to move this illusion up to twice your speed, and make it gesture, speak, and behave in whatever way you choose. It mimics your mannerisms perfectly.</p>\n\n<p>You can see through its eyes and hear through its ears as if you were in its space. On your turn as a bonus action, you can switch from using its senses to using your own, or back again. While you are using its senses, you are blinded and deafened in regard to your own surroundings.</p>\n\n<p>Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your force save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.</p>\n\n<h4>Force Propel</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Push/Pull</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose one or more creatures or objects not being worn or carried within 60 feet that weigh up to a combined total of 15 pounds. The creatures or objects immediately move 60 feet in a direction of your choice. If the creatures or objects end this movement in the air, they immediately fall to the ground. If the creatures or objects collide with any one target during its travel, both the creatures or objects and the target take 3d8 kinetic damage. If the target is a creature, it must make a Dexterity saving throw. On a failed save, it takes the kinetic damage, or half as much on a successful one.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the maximum weight increases by 15 pounds and the damage increases by 1d8 for each slot level above 1st.</p>\n\n\n\n<h4>Force Push/Pull</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You gain the minor ability to move or manipulate creatures and objects with the Force. You can exert fine control on objects with your telekinetic grip, such as manipulating a simple tool, opening a door or a container, stowing or retrieving an item from an open container, or pouring the contents from a vial. Alternatively, you can push or pull a creature or object you can see. </p>\n\n<p>You use the Force to move a Medium or smaller creature or object not being worn or carried within range. The target must make a Strength saving throw. An object automatically fails this saving throw. On a failed save, the creature or object moves a number of feet in a direction of your choice based on its size. A Tiny creature or object can be moved up to 20 feet, a Small creature or object can be moved up to 10 feet, and a Medium creature or object can be moved up to 5 feet. If at the end of this movement the creature or object strikes another creature or object, it must make a Dexterity saving throw. An object automatically fails this saving throw. On a failed save, they both take 1d4 kinetic damage.</p>\n\n<p>This power improves when you reach higher levels. At 5th level, you can move a Tiny creature or object up to 30 feet, a Small creature or object up to 20 feet, a Medium creature or object up to 10 feet, and the power's damage increases to 2d4 kinetic damage. At 11th level, you can move a Small creature or object up to 30 feet, a Medium creature up to 20 feet, and the power's damage increases to 3d4 kinetic damage. At 17th level, you can move a Medium creature to up 30 feet, and the power's damage increases to 4d4 kinetic damage.</p>\n\n<h4>Force Reflect</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Saber Reflect</li><li><strong>Casting Time:</strong> 1 reaction, which you take in response to being hit by a ranged attack</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>In response to being attacked, you attempt to deflect the attack with the Force. When you use this power, the damage you take from the attack is reduced by 1d10. If you reduce the damage to 0 and the damage is energy, force, ion, kinetic, lightning, necrotic, or sonic, you can reflect the attack at a target within range as part of the same reaction. Make a ranged force attack at a target you can see. The attack has a normal range of 30 feet and a long range of 90 feet. On a hit, the target takes the triggering attack's normal damage.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the damage reduction increases by 1d10 for each slot level above 1st.</p>\n\n<h4>Force Repulse</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (20-foot radius)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You release an omnidirectional telekinetic burst. Each creature within 20 feet must make a Dexterity saving throw. On a failed save, a creature takes 8d6 force damage and is pushed back 5 feet. On a successful save, a creature takes half damage and isn't pushed.</p>\n\n<p>All small objects that are not worn or carried are also pushed 5 feet back.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd.</p>\n\n<h4>Force Scream</h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot radius)</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You emit a scream imbued with the power of the Force. Each creature you choose within 15 feet of you must succeed on a Constitution saving throw. On a failed save, a creature take 4d6 psychic damage, 4d6 sonic damage, and is deafened until the end of its next turn. On a successful save, it takes half as much damage and isn't deafened.</p>\n\n<h4>Force Shunt</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You use the Force to thrust a creature you can see to the ground. The target must make a Strength saving throw. On a failed save, a creature takes 1d4 kinetic damage and falls prone. </p>\n\n<p>This power's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).</p>\n\n<h4>Force Sight</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Sense Force</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self </li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You shift your vision to see through use of the Force; colors fade and inanimate objects appear as shades of gray. For the duration, you gain the following benefits.</p>\n\n<ul><li>Living things glow with the power of the Force. Those with an affinity for the light side glow blue, those with an affinity for the dark side glow red, and those with no attunement to either side of the Force glow yellow. How bright they glow is determined by how strong their connection to the Force is.</li><li>You gain blindsight to 30 feet.</li><li>You have advantage on Wisdom (Perception) checks that rely on sight against living targets within 30 feet.</li></ul>\n\n\n\n<h4>Force Storm</h4>\n\n<p><em>9th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Lightning Cone</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A crackling storm of lightning with a diameter of 60 feet and a height of 120 feet appears in a location you choose within range. Whenever a creature enters the storm or starts its turn there, it must make a Dexterity saving throw. On a failed save, it takes 30d6 lightning damage or half as much as a successful one.</p>\n\n<p>The power damages objects in the area and ignites flammable objects that aren't being worn or carried.</p>\n\n<h4>Force Suppression</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose one creature, object, or force effect within range. Any force power of 3rd level or lower on the target ends. For each force power of 4th level or higher on the target, make an ability check using your forcecasting ability. The DC equals 10 + the power's level. On a success, the power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, you automatically end the effects of a force power on the target if the power's level is equal to or less than the level of the force slot you used.</p>\n\n<h4>Force Technique</h4>\n\n<p><em>At-will light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You imbue your weapon with the purifying light of the Force. As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and it becomes wreathed in a glowing barrier of force energy until the start of your next turn. If the target willingly moves before then, it immediately takes 1d8 force damage, and the power ends.</p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 force damage to the target, and the damage the target takes for moving increases to 2d8. Both damage rolls increase by 1d8 at 11th level and 17th level.</p>\n\n<h4>Force Throw </h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Push/Pull</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You use the Force to move a Large or smaller creature or object not being worn or carried within </p>\n\n\n\n<p>range. The target must make a Strength saving throw. An object automatically fails this saving throw. On a failed save, the creature or object moves a number of feet in a direction of your choice based on its size. A Tiny creature or object can be moved up to 90 feet, a Small creature or object can be moved up to 60 feet, a Medium creature or object can be moved up to 30 feet, and a Large creature or object can be moved up to 10 feet. If at the end of this movement the creature or object strikes another creature or object, they both take 2d8 force damage.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, the range you can throw a creature or object increases by 10 feet, to a maximum of 90 feet, and the power's damage increases by 1d8.</p>\n\n<h4>Force Trance </h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>You make a calming gesture, and up to three willing creatures of your choice that you can see within range fall unconscious for the power's duration. The power ends on a target early if it takes damage or someone uses an action to shake or slap it awake. If a target remains unconscious for the full duration, that target gains the benefit of a short rest, and it can't be affected by this power again until it finishes a long rest. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, you can target one additional willing creature for each slot level above 3rd.</p>\n\n<h4>Force Vision</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You receive a vision of the future through the Force, giving you or one willing creature you can see within range a chance to change fate. When the chosen creature makes an ability check, an attack roll, or a saving throw before the power ends, it can dismiss this power on itself to roll an additional d20 and choose which of the d20s to use. Alternatively, when an attack roll is made against the chosen creature, it can dismiss this power on itself to roll a d20 and choose which of the d20s to use, the one it rolled or the one the attacker rolled. </p>\n\n<p>If the original d20 roll has advantage or disadvantage, the creature rolls the additional d20 after advantage or disadvantage has been applied to the original roll.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.</p>\n\n\n\n<h4>Force Weapon</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Imbuement</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You touch an unenhanced weapon with which you are proficient. While you wield it for the duration, that weapon becomes an enhanced weapon with a +1 bonus to attack rolls and damage rolls. Additionally, you can use your forcecasting ability modifier instead of your Strength or Dexterity modifier for attacks and damage rolls when attacking with that weapon.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 5th level or higher, the bonus increases to +2. When you use a force slot of 7th level or higher, the bonus increases to +3.</p>\n\n<h4>Force Whisper</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You use the Force to carry a message in your voice to another creature within range. The target (and only the target) hears the message and can reply in a whisper that only you can hear.</p>\n\n<p>You can cast this power through solid objects if you are familiar with the target and know it is beyond the barrier. An enhanced silence effect, 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood blocks the power. The power doesn't have to follow a straight line and can travel freely around corners or through openings.</p>\n\n<h4>Freedom of Movement</h4>\n\n<p><em>4th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You touch a willing creature. Its movement is unaffected by difficult terrain, and powers and enhanced effects can't reduce its speed or cause it to be paralyzed or restrained.</p>\n\n<p>The target can spend 5 feet of movement to automatically escape from unenhanced restraints. Additionally, being underwater imposes no penalties on its movement or attacks. </p>\n\n<h4>Give Life</h4>\n\n<p><em>At-will light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> Touch </li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Placing your hand on another creature you can transfer your own life force to them. You spend and roll one of your hit dice and the creature regains that many hit points. This power has no effect on droids or constructs.</p>\n\n<h4>Grasping Vine</h4>\n\n<p><em>4th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Plant Surge</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You make a vine sprout from the ground in an unoccupied space you can see. When you cast this power, you can make the vine whip a creature up to 30 feet from it, if you can see the target. The creature must pass a Dexterity save or be pulled 20 feet directly toward the vine.</p>\n\n<p>Until the power ends, you can use your bonus action to have the vine lash out again.</p>\n\n<h4>Greater Feedback</h4>\n\n<p><em>5th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Feedback</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You choose a point within range and cause psychic energy to explode there. Each creature in a 20-foot-radius sphere centered on that point must make an Intelligence saving throw. A creature with an Intelligence score of 2 or lower can't be affected by this power. A target takes 8d6 psychic damage on a failed save, or half as much damage on a successful one.</p>\n\n<p>After a failed save, a target has muddled thoughts for 1 minute. During that time, it rolls a d6 and subtracts the number rolled from all its attack rolls and ability checks, as well as its Constitution saving throws to maintain concentration. The target can make a Wisdom saving throw at the end of each of its turns, ending the effect on itself on a success.</p>\n\n<h4>Greater Heal</h4>\n\n<p><em>6th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Heal</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose a creature that you can see within range. A surge of positive energy washes through the creature, causing it to regain 70 hit points. This power also ends blindness, deafness, and any diseases affecting the target. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 7th level or higher, the healing increases by 10 for each slot level above 6th.</p>\n\n\n\n<h4>Greater Saber Throw</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Saber Throw</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>As a part of the action used to cast this power, you must make a ranged force attack with a lightweapon or vibroweapon against one target within the power's range, otherwise the power fails. On a hit, the target takes 6d8 damage of the same type as the weapon's damage and must make a Constitution saving throw against an additional effect depending on your choice of casting ability:</p>\n\n<p><strong><em>Wisdom.</em></strong> The target takes an additional 4d6 force damage and it gains four levels of slowed until the end of its next turn. On a success, the target takes half as much damage and its speed isn't reduced.</p>\n\n<p><strong><em>Charisma.</em></strong> The target takes an additional 4d6 necrotic damage and cannot regain hit points until the end of its next turn. On a success, the target takes half as much damage and its healing capability is unaffected.</p>\n\n<p>The weapon then immediately returns to your hand.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 6th level or higher, the force or necrotic damage increases by 1d6 for each slot above 5th.</p>\n\n<h4>Guidance</h4>\n\n<p><em>At-will light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You touch one willing creature. Once before the power ends, the target can roll a d4 and add the number rolled to one ability check of its choice. It can roll the die before or after making the ability check. The power then ends.</p>\n\n<p>This power's die increases at higher levels: to a d6 at 5th level, a d8 at 11th level, and a d10 at 17th level.</p>\n\n<h4>Hallucination</h4>\n\n<p><em>2nd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You craft a dangerous illusion in the mind of a creature that you can see within range. The target must make a Wisdom saving throw. On a failed save, you create a phantasmal object, creature, or other visible phenomenon of your choice that is no larger than a 10-foot cube and that is perceivable only to the target for the duration. This power has no effect on droids or constructs.</p>\n\n<p>The hallucination includes sound, temperature, and other stimuli, also evident only to the creature.</p>\n\n<p>The target can use its action to examine the hallucination with an Intelligence (Investigation) check against your force power save DC. If the check succeeds, the target realizes that the hallucination is an illusion, and the power ends.</p>\n\n\n\n<p>&emsp;While a target is affected by the power, the target treats the hallucination as if it were real. The target rationalizes any illogical outcomes from interacting with the hallucination. For example, a target attempting to walk across a phantasmal bridge that spans a chasm falls once it steps onto the bridge. If the target survives the fall, it still believes that the bridge exists and comes up with some other explanation for its fall - it was pushed, it slipped, or a strong wind might have knocked it off.</p>\n\n<p>An affected target is so convinced of the hallucination's reality that it can even take damage from the illusion. A hallucination created to appear as a creature can attack the target. Similarly, a hallucination created to appear as fire, a pool of acid, or lava can burn the target. Each round on your turn, the hallucination can deal 1d6 psychic damage to the target if it is in the hallucination's area or within 5 feet of the hallucination, provided that the illusion is of a creature or hazard that could logically deal damage, such as by attacking. The target perceives the damage as a type appropriate to the illusion.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force power slot of 3rd level or higher, the range increases by 20 feet, the image dimensions increase by 5 feet, and you can target one additional creature for every two slot levels above 2nd.</p>\n\n<h4>Heal</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A creature you touch regains a number of hit points equal to 1d8 + your forcecasting ability modifier. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the healing increases by 1d8 for each slot level above 1st.</p>\n\n<h4>Heroism</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A willing creature you touch is imbued with bravery. Until the power ends, the creature is immune to being frightened and gains temporary hit points equal to your forcecasting ability modifier at the start of each of its turns. When the power ends, the target loses any remaining temporary hit points from this power. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, you can target one additional creature for each slot level above 1st.</p>\n\n\n\n<h4>Hex</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>You curse an opponent within range. Until the power ends, you deal an extra 1d6 necrotic damage to the target whenever you hit it with an attack. Also, choose one ability when you cast the power. The target has disadvantage on ability checks made with the chosen ability.</p>\n\n<p>If the target drops to 0 hit points before this power ends, you can use a bonus action on a subsequent turn of yours to curse a new creature.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd or 4th level, you can maintain your concentration on the power for up to 8 hours. When you use a force slot of 5th level or higher, you can maintain your concentration on the power for up to 24 hours.</p>\n\n<h4>Horror</h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Fear</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot cone)</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>You project a phantasmal image of a creature's worst fears. Each creature in a 30-foot cone must succeed on a Wisdom saving throw or drop whatever it is holding and become frightened for the duration. This power has no effect on constructs or droids.</p>\n\n<p>While frightened by this power, a creature must take the Dash action and move away from you by the safest </p>\n\n<p>available route on each of its turns, unless there is nowhere to move. If the creature ends its turn in a location where it doesn't have line of sight to you, the creature can make a Wisdom saving throw. On a successful save, the power ends for that creature.</p>\n\n<h4>Hysteria</h4>\n\n<p><em>4th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Hallucination</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You tap into the nightmares of a creature you can see within range and create an illusory manifestation of its deepest fears, visible only to that creature. The target must succeed on a Wisdom saving throw or become frightened for the duration. At the end of each of the target's turns before the power ends, the target must succeed on a Wisdom saving throw or take 4d10 psychic damage. On a successful save, the power ends. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force power slot of 5th level or higher, the damage increases by 1d10 for each slot level above 4th.</p>\n\n<h4>Improved Battle Meditation</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Battle Meditation</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You exude an aura out to 15 feet that boosts the morale and overall battle prowess you and your allies while simultaneously reducing the opposition's combat-effectiveness by eroding their will to fight. </p>\n\n<p>Whenever you or a friendly creature within your meditation makes an attack roll or a saving throw, they can roll a d6 and add the number rolled to the attack roll or saving throw. </p>\n\n<p>Whenever a hostile creature enters your meditation or starts its turn there, it must make a Charisma saving throw. On a failed save, it must roll a d6 and subtract the number rolled from each attack roll or saving throw it makes before the end of your next turn. On a successful save, it is immune to this power for 1 day.</p>\n\n<h4>Improved Dark Side Tendrils</h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Dark Side Tendrils</li><li><strong>Casting time:</strong> 1 action </li><li><strong>Range:</strong> 150 feet </li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>You summon a 20-foot-radius sphere of inky blackness at a point within range. No light, enhanced or otherwise, can illuminate the area, creatures fully within the area are blinded, and the area is difficult terrain. Any creature that starts its turn in the area takes 2d6 necrotic damage. Any creature that ends its turn in the area must succeed on a Strength saving throw or take 2d6 poison damage as tendrils of dark energy caress it.</p>\n\n<h4>Improved Feedback</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Feedback</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You unleash a blast of psychic energy at a target within range. If the target can hear you (though it need not understand you), it must succeed on an Intelligence saving throw. On a failed save, it takes 3d6 psychic damage and must immediately use its reaction, if available, to move as far as its speed allows away from you. The creature doesn't move into obviously dangerous ground, such as a fire or a pit. On a successful save, the target takes half as much damage and doesn't have to move away. A deafened creature automatically succeeds on the save.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.</p>\n\n\n\n<h4>Improved Force Barrier</h4>\n\n<p><em>5th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Barrier</li><li><strong>Casting Time:</strong> 10 minutes</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>This power further bolsters your allies with toughness and resolve. Choose up to twelve creatures within range. Each target gains the following benefits:</p>\n\n<ul><li>The becomes immune to poison and disease. Any currently existing poison or diseases still exist.</li><li>The creature becomes immune to being frightened by powers.</li><li>The creature's hit point maximum and current hit points increase by 2d10 for the duration.</li></ul>\n\n<p>These benefits last for 24 hours or until the end of your next long rest, whichever happens first.</p>\n\n<h4>Improved Force Camouflage</h4>\n\n<p><em>4th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Camouflage</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A willing creature you touch becomes invisible until the power ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person. </p>\n\n<h4>Improved Force Immunity</h4>\n\n<p><em>6th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Immunity</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>An immobile, faintly shimmering barrier springs into existence in a 15-foot radius around you and remains for the duration. The barrier moves with you.</p>\n\n<p>Any force power of 5th level or lower cast from outside the barrier can't affect creatures or objects within it, even if the power is cast using a higher level force slot. Such a power can target creatures and objects within the barrier, but the power has no effect on them. Similarly, the area within the barrier is excluded from the areas affected by such powers.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 7th level or higher, the barrier blocks powers of one level higher for each slot level above 6th.</p>\n\n<h4>Improved Force Scream</h4>\n\n<p><em>5th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Scream</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot radius)</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You emit a violent scream imbued with the power of the Force. Each creature you choose within 30 feet of you must succeed on a Constitution saving throw. On a </p>\n\n\n\n<p>failed save, a creature take 5d6 psychic damage, 5d6 sonic damage, is deafened until the end of its next turn, and is knocked prone. On a successful save, it takes half as much damage and isn't deafened or knocked prone.</p>\n\n<h4>Improved Heal</h4>\n\n<p><em>5th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Heal</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>A wave of healing energy washes out from a point of your choice within range. Choose up to six creatures in a 30-foot-radius sphere centered on that point. Each target regains hit points equal to 3d8 + your forcecasting ability modifier. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 6th level or higher, the healing increases by 1d8 for each slot level above 5th.</p>\n\n<h4>Improved Phasestrike</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Phasestrike</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose up to five creatures you can see within range. Make a melee force attack against each one. On hit, a target takes 6d10 force damage. You can then teleport to an unoccupied space you can see within 5 feet of one of the creatures you chose.</p>\n\n<h4>Improved Phasewalk</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Phasewalk</li><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You teleport up to 60 feet to an unoccupied space you can see. On each of your turns before the power ends, you can use a bonus action to teleport in this way again.</p>\n\n<h4>Improved Restoration </h4>\n\n<p><em>5th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Restoration</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You imbue a creature you touch with positive energy to undo a debilitating effect. You can reduce the target's exhaustion level by one, or end one of the following effects on the target:</p>\n\n<ul><li>One effect that charmed the target.</li><li>One curse, including the target's attunement to a cursed item.</li><li>Any reduction to one of the target's ability scores.</li><li>One effect reducing the target's hit point maximum.</li></ul>\n\n\n\n<h4>Improved Revitalize</h4>\n\n<p><em>7th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Revitalize</li><li><strong>Casting Time:</strong> 10 minutes</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You return a dead creature you touch to life, provided that it has been dead no longer than 1 hour. If the creature's soul is both willing and at liberty to rejoin the body, the creature returns to life with all its hit points. This power has no effect on droids or constructs.\t</p>\n\n<p>This power also neutralizes any poisons and cures diseases that affected the creature at the time it died. </p>\n\n<p>This power closes all mortal wounds and restores any missing body parts.\t</p>\n\n<p>Coming back from the dead is an ordeal. The target takes a -4 penalty to all attack rolls, saving throws, and ability checks. Every time the target finishes a long rest, the penalty is reduced by 1 until it disappears.</p>\n\n<h4>Improved Saber Throw</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Saber Throw</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>As a part of the action used to cast this power, you must make a ranged force attack with a lightweapon or vibroweapon against one target within the power's range, otherwise the power fails. On a hit, the target takes 2d8 damage of the same type as the weapon's damage and must make a Constitution saving throw. On a failed save, the target gains 1 slowed level until the end of its next turn and the weapon then immediately returns to your hand. The next attack made against the target that hits it before the end of the target's next turn deals an additional 1d10 force damage. On a successful save, the target takes half as much additional force damage on the next attack that hits it, and suffers no additional effect. The weapon then immediately returns to your hand.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 3rd level or higher, the force damage increases by 1d10 for each slot level above 2nd.</p>\n\n<h4>Insanity</h4>\n\n<p><em>5th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Horror</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot sphere)</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>This power assaults and twists creatures' minds, spawning delusions and provoking uncontrolled action. Each creature in a 30-foot-radius sphere centered on you must succeed on a Wisdom saving throw when you cast this power or be affected by it.</p>\n\n<p>An affected target can't take reactions and must roll a d8 at the start of each of its turns to determine its behavior for that turn. This power has no effect on constructs or droids.</p>\n\n\n\n<table class=\"sw5e-book-table\"><thead><tr><th>d8&nbsp;&nbsp;</th><th>Behavior</th></tr></thead><tbody><tr><td>1</td><td>The creature uses all its movement to move in a random direction. To determine the direction, roll a d8 and assign a direction to each die face. The creature doesn't take an action this turn.</td></tr><tr><td>2-6</td><td>The creature doesn't move or take actions this turn.</td></tr><tr><td>7-8</td><td>The creature uses its action to make a melee attack against a randomly determined creature within its reach. If there is no creature within its reach, the creature does nothing this turn.</td></tr></tbody></table>\n\n<p>At the end of each of its turns, an affected target can make a Wisdom saving throw. If it succeeds, this effect ends for that target.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a power slot of 6th level or higher, the radius of the sphere increases by 5 feet for each force slot level above 5th.</p>\n\n<h4>Kill</h4>\n\n<p><em>9th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Ruin</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You compel one creature you can see within range to die instantly. If the creature you choose has 100 hit points or fewer, it dies. Otherwise, the power has no effect.</p>\n\n<h4>Knight Speed</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Burst of Speed</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose a willing creature that you can see within range. Until the power ends, the target's speed is doubled, it gains a +2 bonus to AC, it has advantage on Dexterity saving throws, and it gains an additional action on each of its turns. That action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or Use an Object action.</p>\n\n<p>When the power ends, the target can't move or take actions until after its next turn, as a wave of lethargy sweeps over it.</p>\n\n\n\n<h4>Lightning Charge</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You imbue your weapon with debilitating force lightning. As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and the lightning leaps from the target to a different creature of your choice that you can see within 5 feet of it. The second creature takes lightning damage equal to your forcecasting ability modifier.</p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 lightning damage to the target, and the lightning damage to the second creature increases to 1d8 + your forcecasting ability modifier. Both damage rolls increase by 1d8 at 11th level and 17th level.</p>\n\n<h4>Locate Creature</h4>\n\n<p><em>4nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Locate Object</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Describe or name a creature familiar to you. You sense the direction to the creature's location, as long as its within 1000 feet of you. If the creature is in motion, you know the direction of its movement. The power can locate a specific creature known to you or the nearest of a specific kind, as long as you have seen it while within 30 feet of it. If the creature is in a different form, the power doesn't work. This power can't locate a creature if running water at least 10 feet wide blocks a direct path between you and the creature.</p>\n\n<h4>Locate Object</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>Describe or name an object. You sense the direction to the object's location, as long as its within 1000 feet of you. If the object is in motion, you know the direction of its movement. The power can locate a specific object known to you, as long as you have seen it while within 30 feet of it. Alternatively, the power can locate the nearest object of a particular kind. This power can't locate an object if any thickness of lead blocks a direct path between you and the object.</p>\n\n<h4>Maddening Darkness</h4>\n\n<p><em>8th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Shroud of Darkness</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>Terrifying darkness spreads from a point you choose within range to fill a 60-foot-radius sphere until the power ends. The darkness spreads around corners. A creature with darkvision can't see through this darkness. Unenhanced light, as well as light created by powers of 8th level or lower, can't illuminate the area.</p>\n\n<p>Shrieks, gibbering, and mad laughter can be heard within the sphere. Whenever a creature starts its turn in the sphere, it must make a Wisdom saving throw, taking 8d8 psychic damage on a failed save, or half as much damage on a successful one.</p>\n\n<h4>Malacia</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Mind Trick</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A creature of your choice that you can see within range is overcome with a sense of dizziness and nausea, as you disturb its equilibrium with the Force. The creature must succeed on a Wisdom saving throw or fall prone, becoming incapacitated and unable to stand up for the duration.</p>\n\n<p>At the end of each of its turns, and each time it takes damage, the target can make another Wisdom saving throw. The target has advantage on the saving throw if it's triggered by damage. On a success, the power ends. This power has no effect on droids or constructs.</p>\n\n<h4>Mass Animation</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Animate Weapon</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You snag several objects using the Force and whip them into the air around you, controlling them to attack at your command. Choose up to ten unenhanced objects within range that are not being worn or carried. Medium targets count as two objects, Large targets count as four objects, Huge targets count as eight objects. You can't control any object larger than Huge. Each object animates and hovers near you, remaining within 100 feet of you for the duration. An animated object behaves as though it is a construct, with AC, hit points, and attacks determined by its size, and a flying speed of 30 feet.</p>\n\n\n\n\n\n<p>&emsp;As a bonus action, you can mentally direct any object controlled by this power. If you control multiple objects, you can command any or all of them at the same time. You decide what action the object will take and where it will move. The objects act at the end of your turn. If you command an object to attack, it can make a single melee attack against a creature within 5 feet of it. It makes a slam attack with an attack bonus and kinetic damage determined by its size.</p>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Size</th><th>HP</th><th>AC</th><th>Attack</th></tr></thead><tbody><tr><td>Tiny</td><td>20</td><td>16</td><td>+6 to hit, 1d4 + 3 damage</td></tr><tr><td>Small</td><td>25</td><td>15</td><td>+6 to hit, 1d8 + 2 damage</td></tr><tr><td>Medium</td><td>40</td><td>13</td><td>+5 to hit, 2d6 + 1 damage</td></tr><tr><td>Large</td><td>50</td><td>10</td><td>+6 to hit, 2d10 + 2 damage</td></tr><tr><td>Huge</td><td>80</td><td>10</td><td>+8 to hit, 2d12 + 4 damage</td></tr></tbody></table>\n\n<p><strong><em>Force Potency.</em></strong> If you cast this power using a force slot of 6th level or higher, you can animate two additional objects for each slot level above 5th.</p>\n\n<h4>Mass Coerce Mind</h4>\n\n<p><em>6th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Coerce Mind</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 24 hours </li></ul>\n\n<p>You suggest a course of activity (limited to a sentence or two) and influence with the Force up to twelve creatures of your choice that you can see within range and that can hear and understand you. Creatures that can't be charmed are immune to this effect. The suggestion must be worded in such a manner as to make the course of action sound reasonable. Asking the creature to harm itself automatically negates the effect of the power.</p>\n\n<p>Each target must make a Wisdom saving throw. On a failed save, it pursues the course of action you described to the best of its ability. The suggested course of action can continue for the entire duration. If the suggested activity can be completed in a shorter time, the power ends when the subject finishes what it was asked to do.</p>\n\n<p>You can also specify conditions that will trigger a special activity during the duration. For example, you might suggest that a group of soldiers give all their money to the first beggar they meet. If the condition isn't met before the power ends, the activity isn't performed. If you or any of your companions damage a creature affected by this power, the power ends for that creature. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a 7th-level force slot, the duration is 10 days. When you use an 8th-level force slot, the duration is 30 days. When you use a 9th-level force slot, the duration is a year and a day.</p>\n\n<h4>Mass Hysteria</h4>\n\n<p><em>9th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Hysteria</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Drawing on the deepest fears of a group of creatures, you create illusory creatures in their minds, manifesting their worst nightmares as an implacable threat visible only to them. Each creature in a 30-foot-radius sphere is frightened for the duration of the power. At the end of each of the frightened creature's turns, it must succeed on a Wisdom saving throw or take 5d10 psychic damage. On a successful save, the power ends for that creature. This power has no effect on droids or constructs.</p>\n\n<h4>Mass Malacia</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Malacia</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet (30-foot cube)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Each creature in a 30-foot cube within range must make a Wisdom saving throw. On a failed save, the creature becomes charmed for the duration. While charmed by this power, the creature is incapacitated and has a speed of 0.</p>\n\n<p>The power ends for an affected creature if it takes any damage or if someone else uses an action to shake the creature out of its stupor. This power has no effect on droids or constructs.</p>\n\n<h4>Master Battle Meditation</h4>\n\n<p><em>9th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Battle Meditation</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (30-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You exude an aura out to 30 feet that boosts the morale and overall battle prowess you and your allies while simultaneously reducing the opposition's combat-effectiveness by eroding their will to fight. </p>\n\n<p>Whenever you or a friendly creature within your meditation makes an attack roll or a saving throw, they can roll a d8 and add the number rolled to the attack roll or saving throw. </p>\n\n<p>Whenever a hostile creature enters your meditation or starts its turn there, it must make a Charisma saving throw. On a failed save, it must roll a d8 and subtract the number rolled from each attack roll or saving throw it makes before the end of your next turn. On a successful save, it is immune to this power for 1 day.</p>\n\n\n\n<h4>Master Feedback</h4>\n\n<p><em>9th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Greater Feedback</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You unleash the power of your mind to blast the intellect of up to ten creatures of your choice that you can see within range. Creatures that have an Intelligence score of 2 or lower are unaffected.</p>\n\n<p>Each target must make an Intelligence saving throw. On a failed save, a target takes 14d6 psychic damage and is stunned. On a successful save, a target takes half as much damage and isn't stunned. </p>\n\n<p>A stunned target can make a Wisdom saving throw at the end of each of its turns. On a successful save, the stunning effect ends.</p>\n\n<h4>Master Force Barrier</h4>\n\n<p><em>8th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Force Barrier</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>This power massively bolsters your allies with toughness and resolve. Creatures of your choice in a 30-foot radius around you when you cast this power gain the following benefits:</p>\n\n<ul><li>The creature sheds dim light in a 5-foot radius.</li><li>The creature has advantage on all saving throws</li><li>Other creatures have disadvantage on attack rolls against them.</li><li>When a dark side creature hits them with a melee attack, that creature must make a Constitution saving throw or be blinded until the power ends.</li></ul>\n\n<h4>Master Force Immunity</h4>\n\n<p><em>8th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Force Immunity</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (10-foot-radius sphere)</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>A 10-foot-radius faintly shimmering barrier surrounds you. Within the sphere, powers can't be cast and enhanced items become mundane. Until the power ends, the sphere moves with you, centered on you.</p>\n\n<p>Powers and other enhanced effects are suppressed in the sphere and can't protrude into it. A slot expended to cast a suppressed power is consumed. While an effect is suppressed, it doesn't function, but the time it spends suppressed counts against its duration.</p>\n\n<p><strong><em>Targeted Effects.</em></strong> Powers and other enhanced effects that target a creature or an object in the sphere have no effect on that target.</p>\n\n<p><strong><em>Enhanced Areas.</em></strong> The area of another power or enhanced effect, such as <em>force storm</em>, can't extend into the sphere. If the sphere overlaps an enhanced area, the part of the area that is covered by the sphere is suppressed.</p>\n\n\n\n<p>&emsp;<strong><em>Powers.</em></strong> Any active power or other enhanced effect on a creature or an object in the sphere is suppressed while the creature or object is in it.</p>\n\n<p><strong><em>Enhanced Items.</em></strong> The properties and powers of enhanced items are suppressed in the sphere. For example, a +1 vibrosword in the sphere functions as an unenhanced vibrosword.</p>\n\n<p>An enhanced weapon's properties and powers are suppressed if it is used against a target in the sphere or wielded by an attacker in the sphere. If an enhanced weapon or a piece of enhanced ammunition fully leaves the sphere (for example, if you fire an enhanced shot or throw an enhanced saberspear at a target outside the sphere), the enhancement of the item ceases to be suppressed as soon as it exits.</p>\n\n<p><strong><em>Enhanced Travel.</em></strong> Teleportation fails to work in the sphere, whether the sphere is the destination or the departure point for such enhanced travel. A portal to another location temporarily closes while in the sphere.</p>\n\n<p><strong><em>Creatures and Objects.</em></strong> A creature or object summoned or created by powers temporarily winks out of existence in the sphere. Such a creature instantly reappears once the space the creature occupied is no longer within the sphere.</p>\n\n<p><strong><em>Tech Override/Sever Force.</em></strong> Powers and enhanced effects such as <em>sever force</em> have no effect on the sphere. Likewise, the spheres created by different scrambling field powers don't nullify each other.</p>\n\n<h4>Master Force Scream</h4>\n\n<p><em>8th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Force Scream</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (60-foot radius)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You emit a cacophonous scream imbued with the power of the Force. Each creature you choose within 60 feet of you must succeed on a Constitution saving throw. On a failed save, a creature takes 6d6 psychic damage, 6d6 sonic damage, is deafened and blinded for 1 minute, and knocked prone. On a successful save, it takes half as much damage and isn't deafened, blinded, or knocked prone.</p>\n\n<p>A creature blinded by this power makes another Constitution saving throw at the end of each of its turns. On a successful save, it is no longer blinded.</p>\n\n<h4>Master Heal</h4>\n\n<p><em>9th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Greater Heal</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>A wave of healing energy washes over the creature you touch. The target regains all its hit points. If the creature is charmed, frightened, paralyzed, or stunned, the condition ends. If the creature is prone, it can use its reaction to stand up. This power has no effect on droids or constructs.</p>\n\n\n\n<h4>Master Malacia</h4>\n\n<p><em>6th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Mass Malacia</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose one creature that you can see within range. The creature reels with extreme dizziness and nausea for the duration. Creatures that can't be charmed are immune to this power.</p>\n\n<p>The affected creature must use all of its movement to writhe in discomfort without leaving its space and has disadvantage on Dexterity saving throws and attack rolls. While the target is affected by this power, other creatures have advantage on attack rolls against it. As an action, an affected creature makes a Wisdom saving throw to regain control of itself. On a successful save, the power ends. This power has no effect on droids or constructs.</p>\n\n<h4>Master Revitalize</h4>\n\n<p><em>9th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Improved Revitalize</li><li><strong>Casting Time:</strong> 1 hour</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You return a dead creature you touch to life, provided that it has been dead no longer than 1 day. If the creature's soul is both willing and at liberty to rejoin the body, the creature returns to life with all its hit points. This power has no effect on droids or constructs.</p>\n\n<p>This power closes all wounds, neutralizes any poison, cures all diseases, and lifts any curses affecting the creature when it died. The power replaces damaged or missing organs and limbs.</p>\n\n<h4>Master Saber Throw</h4>\n\n<p><em>7th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Greater Saber Throw</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (90-foot line)</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>When you cast this power, you must be wielding at least one lightweapon or vibroweapon, otherwise the power fails. When you cast this power, you can throw two weapons, striking creatures in two lines originating from yourself, both 90 feet long and 5 feet wide, or you can throw one weapon in a 90-foot long, 5-foot wide line of your choice originating from yourself and change its direction to move in a second identical line of your choice within range. Each creature in a line must make a Dexterity saving throw. A creature takes 5d8 damage of the same type as the weapon's damage and 5d8 force damage on a failed save, or half as much damage on a successful one. A creature in the area of more than one line is affected only once. The weapons then immediately return to your hand.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 8th level or higher, the weapon damage and force damage each increase by 1d8 for each slot level above 7th.</p>\n\n<h4>Master Speed</h4>\n\n<p><em>7th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Knight Speed</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose up to two willing creatures that you can see within range. Until the power ends, each targets' speed is doubled, they gain a +2 bonus to AC, they have advantage on Dexterity saving throws, and they gain an additional action on each of their turns. That action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or the Use an Object Action. </p>\n\n<p>When the power ends, each target can't move or take actions until after its next turn, as a wave of lethargy sweeps over it.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 8th-level or higher, you can target one additional creature for each slot level above 7th.</p>\n\n<h4>Mind Blank</h4>\n\n<p><em>8th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Mind Trap</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 24 hours </li></ul>\n\n<p>Until the power ends, one willing creature you touch is immune to psychic and sonic damage, any effect that would sense its emotions or read its thoughts, and the charmed condition. The power foils powers or effects of similar power used to affect the target's mind or to gain information about the target.</p>\n\n<h4>Mind Prison</h4>\n\n<p><em>6th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Mind Trap</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You attempt to bind a creature within an illusory cell that only it perceives. One creature you can see within range must make an Intelligence saving throw. The target succeeds automatically if it is immune to being charmed. On a successful save, the target takes 5d10 psychic damage, and the power ends. On a failed save, the target takes 5d10 psychic damage, and you make the area immediately around the target's space appear dangerous to it in some way. You might cause the target to perceive itself as being surrounded by fire, a storm of blaster-fire, or deadly toxic gas, for example. Whatever form the illusion takes, the target can't see or hear anything beyond it and is restrained for the power's duration. If the target is moved out of the illusion, makes a melee attack through it, or reaches any part of its body through it, the target takes 10d10 psychic damage, and the power ends. This power has no effect on droids or constructs.</p>\n\n\n\n<h4>Mind Spike</h4>\n\n<p><em>2nd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>Choose one creature you can see. The target must make a Wisdom saving throw. A creature takes 3d8 psychic damage on a failed save, or half as much damage on a successful one. Additionally, on a failed save, you always know the target's location, but only while the two of you are on the same planet. The target can't become hidden from you, and if it's invisible, it gains no benefits from this condition against you. This power has no effect on droids or constructs.</p>\n\n<h4>Mind Trap</h4>\n\n<p><em>4th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Confusion</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You attempt to trap the mind of your target in a psychic cage. The target must make a Charisma saving throw. On a failed save, the creature is incapacitated for the duration as its mind is trapped. It can think, but it can't have any contact with or perceive the outside world. If the creature takes damage, it makes another Charisma save. On a success, the power ends. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 6th level or higher, after 1 minute of concentration the power's duration becomes 24 hours and it no longer requires your concentration.</p>\n\n<h4>Mind Trick</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose a target within range that isn't hostile toward you. The target must make a Wisdom saving throw. On a failed save, the target has disadvantage on Wisdom (Perception) and Intelligence (Investigation) checks. </p>\n\n<p>On a successful save, the creature realizes that you tried to use the Force to influence its awareness and becomes hostile toward you. A creature prone to violence might attack you. Another creature might seek retribution in other ways (at the GM's discretion), depending on the nature of your interaction with it. This power has no effect on droids or constructs.</p>\n\n<h4>Morichro</h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Cloud Mind</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You touch a willing creature and put it into a cataleptic state that is indistinguishable from death. </p>\n\n\n\n<p>&emsp;For the power's duration, or until you use an action to touch the target and dismiss the power, the target appears dead to all outward inspection and to powers used to determine the target's status. The target is blinded and incapacitated, and its speed drops to 0. The target has resistance to all damage except psychic damage. If the target is diseased or poisoned when you cast the power, or becomes diseased or poisoned while under the power's effect, the disease and poison have no effect until the power ends. This power has no effect on droids or constructs.</p>\n\n<h4>Necrotic Charge</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and you can choose to deal up to 1d8 of necrotic damage, which you suffer as well. This damage can't be reduced or negated in any way. </p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 necrotic damage to the target, and you can increase the secondary damage to 2d8. Both damage rolls increase by 1d8 at 11th level and 17th level.</p>\n\n<h4>Necrotic Touch</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You attempt to drain the essence from a creature. Make a melee force attack against the target. If the attack hits, the creature takes 1d6 necrotic damage, and you gain temporary hit points equal to the damage dealt until the end of your next turn.</p>\n\n<p>This power's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>\n\n<h4>Phasestrike</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<p> - <strong>Casting Time:</strong> 1 bonus action</p>\n\n<ul><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Until the power ends, your movement doesn't provoke opportunity attacks.</p>\n\n<p>Once before the power ends, you can give yourself advantage on one weapon attack roll on your turn. That attack deals an extra 1d8 force damage on a hit. Whether you hit or miss, your walking speed increases by 30 feet until the end of that turn.</p>\n\n\n\n<h4>Phasewalk</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You teleport up to 30 feet to an unoccupied space that you can see.</p>\n\n<h4>Plague</h4>\n\n<p><em>3rd-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Affliction</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose up to six creatures of your choice in a 40-foot cube within range. Each target must succeed on a Constitution saving throw or be affected by this power for the duration.</p>\n\n<p>An affected target gains 1 slowed level, it takes a -2 penalty to AC and Dexterity saving throws, and it can't use reactions. On its turn, it can use either an action or a bonus action, not both. Regardless of the creature's abilities or items, it can't make more than one melee or ranged attack during its turn.</p>\n\n<p>If the creature attempts to cast a power with a casting time of 1 action, roll a d20. On an 11 or higher, the power doesn't take effect until the creature's next turn, and the creature must use its action on that turn to complete the power. If it can't, the power is wasted.\t</p>\n\n<p>A creature affected by this power makes another Constitution saving throw at the end of its turn. On a successful save, the effect ends for it.</p>\n\n<h4>Plant Surge</h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action or 8 hours</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>If you cast this power using 1 action, all normal plants in a 100-foot radius centered on a point become overgrown. Moving through the area spends 4 feet of movement for every 1 foot moved. You can exclude areas of any size within the power's area from being affected.</p>\n\n<p>If you cast this power over 8 hours, all plants in a half-mile radius centered on a point yield twice the normal amount of food when harvested for 1 year.</p>\n\n<h4>Precognition</h4>\n\n<p><em>9th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Danger Sense</li><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 8 hours </li></ul>\n\n<p>Your mastery of the Force gives you a limited ability to see into the immediate future. For the duration, you can't be surprised and you have advantage on attack rolls, ability checks, and saving throws. Additionally, other creatures have disadvantage on attack rolls against you for the duration.</p>\n\n<h4>Project</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You lift three piles of debris or small objects from the ground and hurl them. Each pile hits a creature of your choice that you can see within range. The pile deals 1d4+1 force damage to its target. The piles all strike simultaneously and you can direct them to hit one creature or several.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, you lift and throw an additional pile of debris for each slot level above 1st.</p>\n\n<h4>Psychic Charge</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and its mouth is covered by a violet veil until the start of your next turn. If the target willingly speaks before then, it immediately takes 1d8 psychic damage, and the power ends.</p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 psychic damage to the target, and the damage the target takes for speaking increases to 2d8. Both damage rolls increase by 1d8 at 11th level and 17th level.</p>\n\n<h4>Psychometry</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Telemetry</li><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>For the duration, you gain the ability to \"communicate\" telepathically with inanimate objects you touch. You can ask up to five questions and receive answers from objects, usually in the form of an auditory or visual hallucination. For example, touching the rusted, broken remains of a lightsaber and asking how it got there may result in a brief vision of a disgruntled Jedi Knight casting it to the ground on that spot. An object \"questioned\" in this way can only provide information relating to its past. The DM has the final say on what objects can be questioned, and to what extent.</p>\n\n\n\n<h4>Rage</h4>\n\n<p><em>6th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You endow yourself with endurance and martial prowess fueled by the Force. Until the power ends, you can't cast powers, and you gain the following benefits:</p>\n\n<ul><li>You gain 50 temporary hit points. If any of these remain when the power ends, they are lost.</li><li>You have advantage on attack rolls that you make with lightweapons and vibroweapons.</li><li>When you hit a target with a weapon attack, that target takes an extra 2d12 force damage.</li><li>You have proficiency with all armor, lightweapons, and vibroweapons.</li><li>You have proficiency in Strength and Constitution saving throws.</li><li>You can attack twice, instead of once, when you take the Attack action on your turn. You ignore this benefit if you already have a feature, like Extra Attack, that gives you extra attacks.</li></ul>\n\n<p>Immediately after the power ends, you must succeed on a DC 15 Constitution saving throw or suffer one level of exhaustion.</p>\n\n<h4>Rebuke</h4>\n\n<p><em>At-will light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You strike a creature with the righteous fury of the Force. Make a melee force attack against the target, if the attack hits, the target takes force damage depending on its alignment: a dark-aligned creature takes 1d12 force damage, a balanced or unaligned creature takes 1d10 force damage, and a light-aligned creature takes 1d8 force damage.</p>\n\n<p>The power's damage increases by one die when you reach 5th, 11th, and 17th level.</p>\n\n<h4>Remove Curse</h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>At your touch, all curses affecting one creature or object end. If the object is a cursed enhanced item, its curse remains, but the power breaks its owner's attunement to the object so it can be removed or discarded.</p>\n\n<h4>Rescue</h4>\n\n<p><em>2nd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You pull one willing ally you can see within 30 feet of you to an unoccupied space within 5 feet of you. The target must use their reaction to accept the pull.</p>\n\n<h4>Resistance</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You touch one willing creature. Once before the power ends, the target can roll a d4 and add the number rolled to one saving throw of its choice. It can roll the die before or after the saving throw. The power then ends.</p>\n\n<p>This power's die increases at higher levels: to a d6 at 5th level, a d8 at 11th level, and a d10 at 17th level.</p>\n\n<h4>Restoration</h4>\n\n<p><em>2nd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> Touch </li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You touch a creature and end either one disease or one condition afflicting it. The condition can be blinded, deafened, paralyzed, or poisoned. This power has no effect on droids or constructs.</p>\n\n<h4>Revitalize</h4>\n\n<p><em>5th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Spare the Dying</li><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You return a dead creature you touch to life, provided that it has been dead no longer than 10 minutes. If the creature's soul is both willing and at liberty to rejoin the body, the creature returns to life with 1 hit point. This power has no effect on droids or constructs.</p>\n\n<p>This power also neutralizes any poisons and cures diseases that affected the creature at the time it died. </p>\n\n<p>This power closes all mortal wounds, but it doesn't restore missing body parts. If the creature is lacking body parts or organs integral for its survival�its head, for instance�the power automatically fails.</p>\n\n<p>Coming back from the dead is an ordeal. The target takes a -4 penalty to all attack rolls, saving throws, and ability checks. Every time the target finishes a long rest, the penalty is reduced by 1 until it disappears. </p>\n\n<h4>Ruin</h4>\n\n<p><em>7th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Wound</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You channel the dark side of the Force to desecrate a creature you can see within range, causing waves of intense pain to assail it. If the target has 100 hit points or fewer, it is subject to crippling pain. Otherwise, the power has no effect on it. </p>\n\n\n\n\n\n<p>&emsp;While the target is affected by crippling pain, any speed it has can be no higher than 10 feet. The target also has disadvantage on attack rolls, ability checks, and saving throws, other than Constitution saving throws. Finally, if the target tries to cast a power, it must first succeed on a Constitution saving throw, or the casting fails and the power is wasted.</p>\n\n<p>A target suffering this pain can make a Constitution saving throw at the end of each of its turns. On a successful save, the pain ends.</p>\n\n<h4>Saber Reflect</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take in response to being dealt damage by a ranged attack</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>In response to being attacked, you raise your weapon to attempt to deflect. When you use this power, the damage you take from the attack is reduced by 1d6. If you reduce the damage to 0, you're wielding a lightweapon or vibroweapon, and the damage is energy or ion, you can reflect the attack at a target within range as part of the same reaction. Make a ranged force attack at a target you can see. The attack has a normal range of 20 feet and a long range of 60 feet. On a hit, the target takes the triggering attack's normal damage. </p>\n\n<p>The power's damage reduction increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).</p>\n\n<h4>Saber Throw</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>As a part of the action used to cast this power, you must make a ranged force attack with a lightweapon or vibroweapon against one target within the power's range, otherwise the power fails. On a hit, the target takes 1d8 damage of the same type as the weapon's damage. The weapon then immediately returns to your hand.</p>\n\n<p>This power can hit multiple targets when you reach higher levels: two targets at 5th level, three targets at 11th level, and four targets at 17th level. Each target must be within 30 feet of the previous target, you must make a separate attack roll for each target, and the last target must be no further than 30 feet away from you. You can not hit the same target twice in succession.</p>\n\n<h4>Saber Ward</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>You take a defensive stance. Until the end of your next turn, you have resistance against kinetic, energy, and ion damage dealt by weapons.</p>\n\n<h4>Sanctuary</h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 bonus action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>Until the power ends, any creature who targets the warded creature with an attack, a harmful power, or a hostile action must first make a Wisdom saving throw. On a failed save, the creature must choose a new target or lose the attack or power. This power doesn't protect the warded creature from area effects.</p>\n\n<p>If the warded creature makes an attack, casts a power that affects an enemy creature, or takes a hostile action this power ends.</p>\n\n<h4>Sap Vitality</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Make a melee force attack against a creature you can reach. On a hit, the target takes 3d10 necrotic damage.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the damage increases by 1d10 for each slot level above 1st.</p>\n\n<h4>Scourge</h4>\n\n<p><em>6th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Plague</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>For the power's duration, your eyes become an inky void imbued with dread power. One creature of your choice within 60 feet of you that you can see must succeed on a Constitution saving throw or be affected by one of the following effects of your choice for the duration. On each of your turns until the power ends, you can use your action to target another creature but can't target a creature again if it has succeeded on a saving throw against this casting of <em>scourge.</em></p>\n\n<p><strong><em>Asleep.</em></strong> The target falls unconscious. It wakes up if it takes any damage or if another creature uses its action to shake the sleeper awake.</p>\n\n<p><strong><em>Panicked.</em></strong> The target is frightened of you. On each of its turns, the frightened creature must take the Dash action and move away from you by the safest and shortest available route, unless there is nowhere to move. If the target moves to a place at least 60 feet away from you where it can no longer see you, this effect ends.</p>\n\n<p><strong><em>Sickened.</em></strong> The target has disadvantage on attack rolls and ability checks. At the end of each of its turns, it can make another Constitution saving throw. If it succeeds, the effect ends.</p>\n\n\n\n<h4>Seethe</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You seethe with anger, letting the dark side of the Force flow through and empower you. As part of the action to cast this power, you spend one of your Hit Dice to recover hit points.</p>\n\n<h4>Sense Emotion </h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> Self </li><li><strong>Duration:</strong> Concentration, up to 10 minutes </li></ul>\n\n<p>You attune your senses to pick up the emotions of others for the duration. When you cast the power, and as your action on each turn until the power ends, you can focus your senses on one humanoid you can see within 30 feet of you. You instantly learn the target's prevailing emotion, whether it's love, anger, pain, fear, calm, or something else, and you have advantage on Wisdom (Insight) checks against the target. If the target isn't actually humanoid or it is immune to being charmed, you sense that it is calm.</p>\n\n<h4>Sense Force</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>For the duration, you sense the use of the Force, or its presence in an inanimate object within 30 feet of you. If you sense the Force in this way, you can use your action to determine the direction from which it originates and, if it's in line of sight, you see a faint aura around the person or object from which the Force emanates.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a 3rd-level force slot, the range increases to 60 feet. When you use a 5th-level force slot, the range increases to 500 feet. When you use a 7th-level force slot, the range increases to 1 mile. When you use a 9th-level force slot, the range increases to 10 miles.</p>\n\n<h4>Sever Force</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you see a creature within 60 feet of you casting a force power</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You attempt to interrupt a creature in the process of casting a force power. If the creature is casting a power of 3rd level or lower, its power fails and has no effect. If it is casting a power of 4th level or higher, make an ability check using your forcecasting ability. The DC equals 10 + the power's level. On a success, the creature's power fails and has no effect.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the interrupted power has no effect if its level is less than or equal to the level of the force slot you used.</p>\n\n<h4>Shadow Sight</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour</li></ul>\n\n<p>You enhance your eyesight with the Force, allowing you to better see in the dark. For the duration, you have darkvision out to 60 feet.</p>\n\n<h4>Share Life</h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Give Life</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You sacrifice some of your health to mend another creature's injuries. You take 4d8 necrotic damage, and one creature of your choice that you can see within range regains a number of hit points equal to twice the necrotic damage you take. This power has no effect on droids or constructs.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 4th level or higher, the damage increases by 1d8 for each slot level above 3rd.</p>\n\n<h4>Shock</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You hurl a bolt of lightning at a target within range, making a ranged force attack. On a hit, the target takes 1d10 lightning damage. The lightning ignites flammable objects in the area that aren't being worn or carried.</p>\n\n<p>This power's damage increases by 1d10 when you reach 5th level (2d10), 11th level (3d10), and 17th level (4d10).</p>\n\n<h4>Shocking Shield</h4>\n\n<p><em>4th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Shock</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 10 minutes</li></ul>\n\n<p>Lightning courses in a sphere surrounding your body, shedding bright light in a 10-foot radius and dim light for an additional 10 feet. You can use your action to end the power early.</p>\n\n<p>Whenever a creature within 5 feet of you hits you with a melee attack, it takes 2d8 lightning damage.</p>\n\n\n\n<h4>Shroud of Darkness</h4>\n\n<p><em>4th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Darkness</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You become heavily obscured to others. Dim light within 10 feet of you becomes darkness, and bright light becomes dim light.</p>\n\n<p>Until the power ends, you have resistance to force damage. Additionally, whenever a creature within 10 feet of you hits you with an attack, it takes 2d8 necrotic damage.</p>\n\n<h4>Siphon Life</h4>\n\n<p><em>5th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Drain Life</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A tendril of inky darkness reaches out from you, touching a creature you can see within range to drain life from it. The target must make a Dexterity saving throw. On a successful save, the target takes 2d8 necrotic damage, and the power ends. On a failed save, the target takes 4d8 necrotic damage, and until the power ends, you can use your action on each of your turns to automatically deal 4d8 necrotic damage to the target. The power ends if you use your action to do anything else, if the target is ever outside the power's range, or if the target has total cover from you.</p>\n\n<p>Whenever the power deals damage to a target, you regain hit points equal to half the amount of necrotic damage the target takes.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th.</p>\n\n<h4>Skill Empowerment</h4>\n\n<p><em>5th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Concentration, up to 1 hour</li></ul>\n\n<p>Your power with the Force deepens a creature's understanding of its own talent. You touch one willing creature and give it expertise in one skill of your choice; until the power ends, the creature doubles its proficiency bonus for ability checks it makes that use the chosen skill.</p>\n\n<p>You must choose a skill in which the target is proficient and that isn't already benefiting from an effect, such as Expertise, that doubles its proficiency bonus.</p>\n\n<h4>Slow</h4>\n\n<p><em>At-will dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 15 feet</li><li><strong>Duration:</strong> 1 hour </li></ul>\n\n<p>A hostile creature of your choice must make a Constitution saving throw. On a failed save, the target gains 1 slowed level until the power ends. At the end of each of the creature's turns, it repeats this saving throw, ending the effect on a success.</p>\n\n<p>This power can affect multiple targets when you reach higher levels: two targets at 5th level, three targets at 11th level, and four targets at 17th level. </p>\n\n<h4>Slow Descent</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 reaction, which you take when you or a creature within 60 feet of you falls</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>Choose up to five falling creatures within range. A falling creature's rate of descent slows to 60 feet per round until the power ends. If the creature lands before the power ends, it takes no falling damage and can land on its feet, and the power ends for that creature.</p>\n\n<h4>Sonic Charge</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Varies</li><li><strong>Duration:</strong> 1 round</li></ul>\n\n<p>As part of the action used to cast this power, you must make a melee weapon attack against one creature within your reach, otherwise the power fails. On a hit, the target suffers the attack's normal effects, and you begin to emanate a disturbing hum until the start of your next turn. If a hostile creature ends its turn within 5 feet of you, it takes 1d4 sonic damage.</p>\n\n<p>This power's damage increases when you reach higher levels. At 5th level, the melee attack deals an extra 1d8 sonic damage to the target, and the secondary damage increases by 1d4. Both damage rolls increase by 1d8 and 1d4, respectively, at 11th level and 17th level.</p>\n\n\n\n<h4>Sound Trick</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> 1 minute</li></ul>\n\n<p>You use the Force to produce an effect within range. You create one of the following special effects within range:</p>\n\n<ul><li>Your voice booms up to three times as loud as normal, and you can alter its tone, for 1 minute.</li><li>You cause harmless tremors in the ground for 1 minute.</li><li>You create an instantaneous sound that originates from a point of your choice within range, such as a rumble of thunder, the cry of a bird, or ominous whispers.</li><li>You gain the ability to speak like another species for 1 minute, allowing you to speak in a language you know but otherwise lack the physical ability to speak, such as a Wookiee speaking Basic.</li><li>You create an instantaneous, harmless sensory effect, such as falling leaves, a puff of wind, a billowing of someone's clothes, or a flickering of unenhanced light fixtures within range.</li></ul>\n\n<p>A wary creature can use its action to make an Intelligence (Investigation) check against your force save DC, discerning that the effects are illusory on a success.</p>\n\n<p>If you cast this power multiple times, you can have up to three of its 1-minute effects active at a time, and you can dismiss such an effect as an action.</p>\n\n<h4>Spare the Dying</h4>\n\n<p><em>At-will light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You touch a living creature that has 0 hit points. The creature becomes stable. This power has no effect on droids or constructs.</p>\n\n<h4>Spirit Blade</h4>\n\n<p><em>At-will universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You conjure a blade of spirit energy and attempt to strike one creature. Make a melee force attack against the target. If the attack hits, the creature takes 1d10 necrotic damage.</p>\n\n<p>This power can make multiple attacks at higher levels: two attacks at 5th level, three attacks at 11th level, and four attacks at 17th level. Each attack can target the same creature or different ones. Make a separate attack roll for each target.</p>\n\n<h4>Stasis</h4>\n\n<p><em>5th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Stun</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose a creature that you can see within range. The target must succeed on a Wisdom saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another Wisdom saving throw. On a success, the power ends on the target. This power has no effect on droids or constructs. </p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 6th level or higher, you can target an additional creature for each slot level above 5th. The creatures must be within 30 feet of each other when you target them.</p>\n\n<h4>Stasis Field</h4>\n\n<p><em>8th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Stasis</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 120 feet (30-foot cube)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>Choose a point that you can see within range. Each creature within range of that point must succeed on a Wisdom saving throw or be paralyzed for the duration. At the end of each of a target's turns, it can make another Wisdom saving throw. On a success, the power ends on the target. This power has no effect on droids or constructs. </p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 9th level, the size of the cube increases to 40 feet.</p>\n\n<h4>Stun</h4>\n\n<p><em>2nd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>Choose a humanoid that you can see within range. The target must succeed on a Wisdom saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another Wisdom saving throw. On a success, the power ends on the target.</p>\n\n<h4>Stun Droid</h4>\n\n<p><em>2nd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute </li></ul>\n\n<p>Choose a droid or construct that you can see within range. The target must succeed on a Constitution saving throw or be paralyzed for the duration. At the beginning of each of its turns, the target takes energy damage equal to your forcecasting ability modifier. At the end of each of its turns, the target can make another Constitution saving throw. On a success, the power ends on the target.</p>\n\n\n\n<h4>Sustained Lightning</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Shock</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 30 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You lash out against a creature within range with continual jolts of Force lightning. Make a ranged force attack against that creature. On a hit, the target takes 1d12 lightning damage, and on each of your turns for the duration, you can use your action to deal 1d12 lightning damage to the target automatically. The power ends if you use your action to do anything else. The power also ends if the target is ever outside the power's range or if it has total cover from you.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the initial damage increases by 1d12 for each slot level above 1st.</p>\n\n<h4>Telekinesis</h4>\n\n<p><em>5th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Throw</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You gain the ability to move or manipulate creatures and objects with the Force. When you cast this power, and as your action each round for the duration, you can exert your will on one creature or object that you can see within range, causing the appropriate effect below. You can affect the same target round after round, or choose a new one at any time. If you switch targets, the prior target is no longer affected by the power.</p>\n\n<p><strong><em>Creature.</em></strong> You can try to move a Huge or smaller creature. The target must make a Strength saving throw. On a failed save, you move the creature up to 30 feet in any direction, including upward but not beyond the range of this power. Until the end of your next turn, the creature is restrained in your telekinetic grip. A creature lifted upward is suspended in mid-air.</p>\n\n<p>On subsequent rounds, you can use your action to attempt to maintain your telekinetic grip on the creature by repeating the contest.</p>\n\n<p><strong><em>Object.</em></strong> You move an object that isn't being worn or carried and weighs up to 2,500 lbs up to 30 feet in any direction, but not beyond the range of this power.</p>\n\n<p>You can exert fine control on objects with your telekinetic grip, such as manipulating a simple tool, opening a door or a container, stowing or retrieving an item from an open container, or pouring the contents from a vial.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 6th level or higher, the maximum object weight increases by 2,500 lbs for every slot level above 5th.</p>\n\n<h4>Telekinetic Burst</h4>\n\n<p><em>6th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Telekinetic Storm</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (60-foot line)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A beam of Force energy flashes out from your hand in a 5-foot-wide, 60-foot-long line. Each creature in the line must make a Constitution saving throw. On a failed save, a creature takes 8d6 force damage and is knocked prone. On a successful save, it takes half as much damage and isn't knocked prone. </p>\n\n<p>You can create a new telekinetic gust as your action on your turn until the power ends.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 7th level or higher, the damage increases by 2d6 for each slot level above 6th.</p>\n\n<h4>Telekinetic Shield</h4>\n\n<p><em>3rd-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Animate Weapon</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You lift three piles of debris or small objects from the ground and interpose them between you and your opponents for the duration. </p>\n\n<p>While at least three piles remain, you have three-quarters cover. While two piles remain, you have half cover. While only one pile remains, you have one-quarter cover. The piles don't hinder your attacks. When you cast the power, or as an action on a subsequent turn, you can direct up to two piles to attack up to two creatures you can see within 30 feet. Make a ranged force attack roll for each pile. On a hit, a creature takes 2d6 kinetic plus 1d10 force damage. The pile is destroyed whether it hits or misses.</p>\n\n<p><strong><em>Force Potency.</em></strong> If you cast this power with a force slot of 4th level or higher, the power creates one additional pile for each level above 3rd. </p>\n\n<h4>Telekinetic Storm</h4>\n\n<p><em>3rd-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Turbulence</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self (15-foot radius)</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You stir the Force around you, creating a turbulent field of telekinetic energy that buffets enemies around you. The field extends out to a distance of 15 feet around you for the duration.</p>\n\n<p>When you cast this power, you can designate any number of creatures you can see to be unaffected by it. An affected creature gains 1 slowed level while in the area, and when the creature enters the area for the first time on a turn or starts its turn there, it must make a Constitution saving throw. On a failed save, the creature takes 3d8 force damage. On a successful save, the creature takes half as much damage.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force power slot of 4th level or higher, the damage increases by 1d8 for each slot level above 3rd.</p>\n\n\n\n<h4>Telekinetic Wave</h4>\n\n<p><em>8th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Telekinetic Burst</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 150 feet</li><li><strong>Duration:</strong> Instantaneous </li></ul>\n\n<p>You manipulate the Force in a 60-foot radius centered on a point you choose within range. Each creature in that area must make a Constitution saving throw. On a failed save, a creature takes 12d6 force damage, is knocked prone, and moved 5 feet in a direction of your choice. On a successful save, it takes half as much damage and isn't knocked prone or moved.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 9th level, the damage increases by 2d6.</p>\n\n<h4>Telemetry</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 minute</li><li><strong>Range:</strong> Touch</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You choose one object that you must touch throughout the casting of the power. If it is an enhanced or modified item, you learn its properties and how to use them, whether it requires attunement to use, and how many charges it has, if any. You learn whether any powers are affecting the item and what they are.</p>\n\n<p>If the item was created by a power, you learn which power created it. If you instead touch a creature throughout the casting, you learn what force powers, if any, are currently affecting it.</p>\n\n<h4>Tremor</h4>\n\n<p><em>1st-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Burst</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 10 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You cause a tremor in the ground within range. Each creature other than you in a 5-foot-radius sphere centered on that point must make a Dexterity saving throw. On a failed save, a creature takes 1d8 kinetic damage and is knocked prone. On a successful save, the creature takes half as much damage and isn't knocked prone. If the ground in that area is loose earth or stone, it becomes difficult terrain until cleared, with each 5-foot-diameter portion requiring at least 1 minute to clear by hand.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the damage increases by 1d8 for each slot level above 1st.</p>\n\n<h4>True Sight</h4>\n\n<p><em>6th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Force Sight</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> 1 hour </li></ul>\n\n<p>You shift your vision to see through use of the Force, </p>\n\n\n\n<p>giving you the ability to see things as they actually are. For the duration, you have truesight and notice secret doors hidden by powers, all out to a range of 120 feet.</p>\n\n<h4>Turbulence</h4>\n\n<p><em>At-will light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>Choose one creature, or choose two creatures that are within 5 feet of each other, within range. A target must succeed on a Dexterity saving throw or take 1d6 force damage.</p>\n\n<p>This power's damage increases by 1d6 when you reach 5th, 11th, and 17th level.</p>\n\n<h4>Valor </h4>\n\n<p><em>1st-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Resistance</li><li><strong>Casting Time:</strong> 1 action </li><li><strong>Range:</strong> 30 feet </li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>You bless up to three creatures of your choice within range. Whenever a target makes an attack roll or a saving throw before the power ends, the target can roll a d4 and add the number rolled to the attack roll or saving throw.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power with a force slot of 3rd level or higher, you can target one additional creature for every two slot levels above 1st. When you cast this power at 3rd, 6th, or 9th level, the die increases to d6, d8, and d10, respectively.</p>\n\n<h4>Wall of Light</h4>\n\n<p><em>6th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 90 feet</li><li><strong>Duration:</strong> Concentration, up to 10 minutes</li></ul>\n\n<p>You conjure an immense manifestation of destructive light side Force energy. The wall appears within range and lasts for the duration. You can make a straight wall up to 100 feet long, 20 feet high, and 5 feet thick, or a ringed wall up to 60 feet in diameter, 20 feet high, and 5 feet thick. The wall provides three-quarters cover and its space is difficult terrain.</p>\n\n<p>When a creature enters the wall's area for the first time on a turn or starts its turn there, it must make a Dexterity saving throw. On a failed save, the creature takes 6d10 force damage, or half as much on a success.</p>\n\n<h4>Whirlwind</h4>\n\n<p><em>7th-level universal power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 300 feet</li><li><strong>Duration:</strong> Concentration, up to 1 minute</li></ul>\n\n<p>A whirlwind howls down to a point that you can see on the ground within range. The whirlwind is a 10-foot-radius, 30-foot-high cylinder centered on that point. Until the power ends, you can use your action to move </p>\n\n\n\n<p>the whirlwind up to 30 feet in any direction along the ground. The whirlwind sucks up any Medium or smaller objects that aren't secured to anything and that aren't worn or carried by anyone.</p>\n\n<p>A creature must make a Dexterity saving throw the first time on a turn that it enters the whirlwind or that the whirlwind enters its space, including when the whirlwind first appears. A creature takes 10d6 kinetic damage on a failed save, or half as much damage on a successful one. Additionally, a Large or smaller creature that fails the save must succeed on a Strength saving throw or become restrained in the whirlwind until the power ends. When a creature starts its turn restrained by the whirlwind, the creature is pulled 5 feet higher inside it, unless the creature is at the top. A restrained creature moves with the whirlwind and falls when the power ends, unless the creature has some means to stay aloft.</p>\n\n<p>A restrained creature can use an action to make a Strength or Dexterity check against your force save DC. If successful, the creature is no longer restrained by the whirlwind and is hurled 3d6x10 feet away from it in a random direction.</p>\n\n<h4>Will of the Force</h4>\n\n<p><em>9th-level light side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> Self</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You sublimate yourself before the will of the Force, attempting to use it to affect change in the galaxy around you. </p>\n\n<p>The basic use of this power is to duplicate any other light side or universal force power of 8th level or lower. You don't need to meet any requirements in that power; it simply takes effect. Alternatively, you can create one of the following effects of your choice:</p>\n\n<ul><li>You summon one object to you of up to 250,000 cr in value that isn't an enhanced item. The object can be no more than 300 feet in any dimension, and it appears in an unoccupied space you can see on the ground.</li><li>You allow up to twenty creatures that you can see to regain all hit points, and you end all effects on them described in the <em>improved restoration</em> power.</li><li>You grant up to ten creatures that you can see resistance to a damage type you choose.</li><li>You grant up to ten creatures you can see immunity to a single power or other specific enhanced effect for 8 hours. For instance, you could make yourself and all your companions immune to the Manifestation of Abeloth's Will ability.</li><li>You undo a single recent event by forcing a reroll of any roll made within the last round (including your last turn). Reality reshapes itself to accommodate the new result. For example, <em>will of the force</em> could undo an opponent's successful save, a foe's critical hit, or a friend's failed save. You can force the reroll to be made with advantage or disadvantage, and you can choose whether to use the reroll or the original roll.</li></ul>\n\n<p>You might be able to achieve something beyond the scope of the above examples. State your wish to the DM as precisely as possible. The DM has great latitude </p>\n\n<p>in ruling what occurs in such an instance; the greater the wish, the greater the likelihood that something goes wrong. This power might simply fail, the effect you desire might only be partly achieved, or you might suffer some unforeseen consequence as a result of how you worded the wish. For example, wishing that a villain were dead might propel you forward in time to a period when that villain is no longer alive, effectively removing you from the game. Similarly, wishing for a legendary enhanced item or artifact might instantly transport you to the presence of the item's current owner.</p>\n\n<p>The stress of casting this power to produce any effect other than duplicating another power weakens you. After enduring that stress, each time you cast a power until you finish a long rest, you take 1d10 necrotic damage per level of that power, which can't be reduced or prevented in any way. Additionally, your Strength drops to 3, if it isn't 3 or lower already, for 2d4 days. For each of those days that you spend resting and doing nothing more than light activity, your remaining recovery time decreases by 2 days. Additionally, there is a 33 percent chance that you are unable to cast <em>will of the force</em> ever again if you suffer this stress. Finally, if you are reduced to 0 hit points as a result of this necrotic damage, or at any point before you have fully recovered from the Strength reduction, you immediately die and cannot be resurrected as your body fades away, absorbed into the living Force.</p>\n\n<h4>Wound</h4>\n\n<p><em>1st-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You make a piercing gesture at a creature within range. Make a ranged force attack against the target. On a hit, the target takes 2d8 necrotic damage and must make a Constitution saving throw. On a failed save, it is also poisoned until the end of your next turn.</p>\n\n<p><strong><em>Force Potency.</em></strong> When you cast this power using a force slot of 2nd level or higher, the damage increases by 1d8 for each slot level above 1st.</p>\n\n<h4>Wrack</h4>\n\n<p><em>6th-level dark side power</em></p>\n\n<hr>\n\n<ul><li><strong>Prerequisite:</strong> Plague</li><li><strong>Casting Time:</strong> 1 action</li><li><strong>Range:</strong> 60 feet</li><li><strong>Duration:</strong> Instantaneous</li></ul>\n\n<p>You wrack the body of a creature that you can see with a virulent, disease-like condition. The target must make a Constitution saving throw. On a failed save, it takes 14d6 necrotic damage, or half as much damage on a successful save. The damage can't reduce the target's hit points below 1. If the target fails the saving throw, its hit point maximum is reduced for 1 hour by an amount equal to the necrotic damage it took. Any effect that removes a disease allows a creature's hit point maximum to return to normal immediately.</p>\n\n<p><strong><em>Force Potency.</em></strong> If you cast this power using a force slot of 7th level or higher, the power deals an extra 2d6 damage for each slot level above 6th.</p>\n\n"
