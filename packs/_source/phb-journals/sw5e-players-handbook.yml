        <h3>Biology and Appearence</h3>

        <p>Togruta have rusty skin tones ranging in hue from blue to red to green, with white pigmentation on their faces, greyish lips, and white stripes adorn various parts of their bodies. The pattern of stripes varies from individual to individual. This red and white pattern was a phenotype left over from their ancestor's camouflage that helped them to blend in with Shili's natural surroundings.</p>

        <p>Their heads bear two montrals, with three to four head-tails, whose stripes were darker than those of the montrals. Togruta have the ability to sense the proximity and movement of physical objects around them by means of their hollow montrals, which detect space ultrasonically. Young togrutas' montrals and posterior head-tail do not fully grow until adolescence, when their montrals curve and their final head-tail grows to the length of their other head-tails.</p>

        <h3>Society and Culture</h3>

        <p>Togruta have a strong sense of unity and togetherness. On their native homeworld of Shili, they rely on each other and  band together to take a stand against the massive monsters that hunt them. The creatures of Shili most often attack in groups, which was even more reason for the native togruta to work together. While most of Shili is covered in the scrublands where the togruta hunt their herbivorous prey, the togruta live in small communities in the forest valleys.</p>

        <h3>Names</h3>

        Togruta names are typically long. Surnames are<br> familial.

        <p><strong>Male Names.</strong> Acanaar, Mukraas, Obolak, Tokrym</p>

        <p><strong>Female Names.</strong> Akoma, Maasha, Okohlo, Shola</p>

        <p><strong>Surnames.</strong> Hyl, Na, Nim, Ris, Resh, Vaal, Zin</p>



        <h3>Togruta Traits</h3>

        <p>As a togruta, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Wisdom score<br> increases by 2, and your Strength or Dexterity score<br> increases by 1.

        <p><strong><em>Age.</em></strong> Togruta reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Togruta culture focuses on unity which causes them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Togruta typically stand between 5 and 6 feet tall and weigh 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Montral Reception.</em></strong> You have tremorsense out to 30 feet. You can detect and pinpoint the origin of vibrations within a specific radius, provided that you and the source of the vibrations are in contact with the same ground or substance. Tremorsense can't be used to detect flying or incorporeal creatures.</p>

        <p><strong><em>Wild Hunters.</em></strong> You have proficiency with the Survival skill.</p>

        <strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Togruti. Togruti is an ornate language characterized by trills and long vowel sounds which are modified by subtle tremors in the togruta's head-tails. This language is heavily influenced by Basic, but also incorporates some native idioms, which cause Basic-speaking togruta to use seemingly strange<br> expressions.

