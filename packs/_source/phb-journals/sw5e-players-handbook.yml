nt</td><td>d10</td><td>16</td><td>4</td><td>+25 ft.</td></tr><tr><td>17th</td><td>+6</td><td>Order feature</td><td>d12</td><td>17</td><td>5</td><td>+30 ft.</td></tr><tr><td>18th</td><td>+6</td><td>Empty Body</td><td>d12</td><td>18</td><td>5</td><td>+30 ft.</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>d12</td><td>19</td><td>5</td><td>+30 ft.</td></tr><tr><td>20th</td><td>+6</td><td>Perfect Self</td><td>d12</td><td>20</td><td>5</td><td>+30 ft.</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a monk, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per monk level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your Constitution modifier per monk level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> None</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons, chakrams, techblades</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Strength, Dexterity</li><li><strong>Skills:</strong> Choose two from Acrobatics, Athletics, Insight, Lore, Perception, and Stealth</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> a vibroweapon with which you are proficient or <em>(b)</em> a simple blaster and a power cell</li><li><em>(a)</em> a dungeoneer's pack or <em>(b)</em> an explorer's pack</li><li>10 vibrodarts</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Monk</td><td>4d4 x 100 cr</td></tr></tbody></table>



        <h3>Martial Arts</h3>

        <em><strong>Monk:</strong> 1st level</em><br> 

        <p>Your practice of martial arts gives you mastery of combat styles that use unarmed strikes and monk weapons, which are chakrams, techblades, and any simple vibroweapons that don't have the two-handed property.</p>

        <p>You gain the following benefits while you are unarmed or wielding only monk weapons and you aren't wearing armor or wielding a shield:</p>

        <ul><li>Your unarmed strikes and monk weapons gain the finesse property.</li><li>You can roll a d4 in place of the normal damage of your unarmed strike or monk weapon. This die changes as you gain monk levels, as shown in the Martial Arts column of the monk table.</li><li>You can use Dexterity instead of Strength whenever you would make a Strength (Athletics) check to grapple, shove, or trip a creature.</li><li>When you use the Attack action with an unarmed strike or a monk weapon on your turn, you can make one unarmed strike as a bonus action. </li><li>You can take the Dash and Disengage actions as a bonus action.</li></ul>

        <h5>Variant: Monks with Lightweapons</h5>

        <blockquote><p>If monks gain lightweapon proficiency, consider letting them use lightweapons as monk weapons, provided the lightweapon has a vibroweapon analogue that would also count as a monk weapon. For instance, chakrams count as monk weapons. If a monk gains proficiency with a light ring, they could also use it as a monk weapon.</p></blockquote>

        <h3>Unarmored Defense</h3>

        <em><strong>Monk:</strong> 1st level</em><br>

        <p>While you are wearing no armor and not wielding a shield, your AC equals 10 + your Dexterity modifier + your Wisdom or Charisma modifier (your choice).</p>

        <h3>Focus</h3>

        <em><strong>Monk:</strong> 2nd and 11th level</em><br>

        <p>Your training allows you to harness the mystic energy of focus. Your access to this energy is represented by a number of focus points. Your monk level determines the number of points you have, as shown in the Focus Points column of the monk table.</p>

        <p>You can spend these points to fuel various focus features. You start knowing three such features: Flurry of Blows, Patient Defense, and Step of the Wind. You learn more focus features as you gain levels in this class.</p>

        <p>When you spend a focus point, it is unavailable until you finish a short or long rest, at the end of which you draw all of your expended focus back into yourself. You must spend at least 30 minutes of the rest meditating to regain your focus points.</p>

        <p>You use your choice of Wisdom or Charisma for your focus ability. You use the chosen ability modifier whenever a feature refers to your focus ability. Additionally, you use the chosen ability modifier when making an attack with a focus feature or setting the saving throw DC for one.</p>



        <hr>

        <div class="sw5e-book-block"><strong>Focus save DC</strong> = 8 + your proficiency bonus + <br>your Wisdom or Charisma modifier (your choice)

        <hr>

        <strong>Focus attack modifier</strong> = your proficiency bonus + <br>your Wisdom or Charisma modifier (your choice)</div>

        <hr>

        <h4>Flurry of Blows</h4>

        <p>When you make your Martial Arts bonus action attack, you can spend 1 focus point to make an additional unarmed strike (no action required). At 11th level, you can instead spend 2 focus points to make two additional unarmed strikes.</p>

        <h4>Patient Defense</h4>

        <p>When you use your bonus action to Disengage, you can spend 1 focus point to also Dodge (no action required). At 11th level, you can instead spend 2 focus points to Dodge and gain an additional reaction until the start of your next turn. You can only take one reaction per turn.</p>

        <h4>Step of the Wind</h4>

        <p>When you use your bonus action to Dash, you can spend 1 focus point to double your jump distance for the turn. At 11th level, you can instead spend 2 focus points to gain a flying speed equal to your walking speed until the end of your turn, though you fall if you end your speed in the air and nothing else is holding you aloft.</p>

        <h3>Monastic Vows</h3>

        <em><strong>Monk:</strong> 2nd, 7th, 13th, and 17th level</em><br>

        <p>You've sworn two vows, as detailed at the end of the class description. You swear an additional vow at 7th, 13th, and 17th level.</p>

        <h3>Unarmored Movement</h3>

        <em><strong>Monk:</strong> 3rd and 9th level</em><br>

        <p>Your speed increases by 10 feet while you are not wearing armor or wielding a shield. This bonus increases when you reach certain monk levels, as shown in the Unarmored Movement column of the monk table.</p>

        <p>At 9th level, you gain the ability to move along vertical surfaces and across liquids on your turn without falling during the move.</p>

        <h3>Deflect Missiles</h3>

        <em><strong>Monk:</strong> 3rd level</em><br>

        <p>You can use your reaction to deflect a projectile when you are dealt damage by a ranged weapon attack. When you do so, the damage you take from the attack is reduced by 1d10 + your Dexterity modifier + your monk level.</p>

        <p>If you reduce the damage to 0, and the damage is kinetic, energy, or ion, you can redirect it at another target if you have a weapon capable of doing so. You can spend 1 focus point to make a ranged attack with a range of 20/60 as you deflect the projectile, as part of the same reaction. You make this attack with proficiency, regardless of your weapon proficiencies, and the projectile counts as a monk weapon for the attack.</p>



        <h3>Monastic Order</h3>

        <em><strong>Monk:</strong> 3rd, 6th, 11th, and 17th level</em><br>

        <p>You commit yourself to one monastic order, which is detailed at the end of the class description. </p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Monk:</strong> 4th, 8th, 10th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Slow Fall</h3>

        <em><strong>Monk:</strong> 4th level</em><br>

        <p>You can use your reaction when you fall to reduce any falling damage you take by an amount equal to five times your monk level.</p>

        <h3>Extra Attack</h3>

        <em><strong>Monk:</strong> 5th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h3>Stunning Strike</h3>

        <em><strong>Monk:</strong> 5th level</em><br>

        <p>You can interfere with an opponent's body. When you hit another creature with a melee weapon attack, you can spend 1 focus point to attempt a stunning strike. The target must succeed on a Constitution saving throw or be stunned until the end of your next turn.</p>

        <h3>Enhanced Strikes</h3>

        <em><strong>Monk:</strong> 6th level</em><br>

        <p>Your unarmed strikes count as enhanced for the purpose of overcoming resistance and immunity to unenhanced attacks and damage.</p>

        <h3>Evasion</h3>

        <em><strong>Monk:</strong> 7th level</em><br>

        <p>Your instinctive agility lets you dodge out of the way of certain area effects. When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>

        <h3>Stillness of Mind</h3>

        <em><strong>Monk:</strong> 7th level</em><br>

        <p>You can use your action or bonus action to end one effect on yourself that is causing you to be charmed or frightened.</p>

        <h3>Purity of Body</h3>

        <em><strong>Monk:</strong> 13th level</em><br>

        <p>You are immune to disease and poison and resistant to poison damage.</p>

        <h3>Diamond Soul</h3>

        <em><strong>Monk:</strong> 14th level</em><br>

        <p>Your mastery of focus grants you proficiency in all saving throws, and when you fail a saving throw, you can spend 1 focus point to reroll it, taking the new roll.</p>

        <h3>Timeless Vessel</h3>

        <em><strong>Monk:</strong> 15th level</em><br>

        <p>Your focus sustains you so that you suffer none of the frailty of old age, and you can't be aged abnormally. You can still die of old age, however. Additionally, when you complete a short rest, you can expend a Hit Die to remove 1 level of exhaustion or slowed.</p>

        <h3>Empty Body</h3>

        <em><strong>Monk:</strong> 18th level</em><br>

        <p>You can use your action to spend 4 focus points to become invisible for 1 minute. During that time, you also have resistance to all damage but force damage.</p>

        <h3>Perfect Self</h3>

        <em><strong>Monk:</strong> 20th level</em><br>

        <p>You've gained perfect control over your body. Your Dexterity and Wisdom or Charisma scores (your choice) increase by 2. Your maximum for those scores increases by 2. Additionally, when you roll for initiative and have fewer than 6 focus points remaining, you regain up to 6 focus points.</p>

        <h3>Monastic Vows</h3>

        <p>The vows are presented in alphabetical order. If a vow has prerequisites, you must meet them to learn it. You can learn a vow at the same time you meet its prerequisites. You can't take a vow more than once.</p>

        <h4>Vow of Deflection</h4>

        <p>You can use your reaction to divert a strike when you are dealt damage by a melee weapon attack. When you do so, the damage taken by the attack is reduced by 1d10 + your Dexterity modifier + your monk level.</p>

        <h4>Vow of the Devoted</h4>

        <p>You gain a limited ability to manipulate the Force. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <p><strong><em>Force Powers Known.</em></strong> You learn 2 force powers of your choice. You learn an additional power at 3rd, 5th, 7th, 9th, 11th, 13th, 15th, and 17th level. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite. You may only learn universal powers in this way.</p>

        <p><strong><em>Force Points.</em></strong> Rather than force points, powers you learn through this vow are cast using your focus points, at 1 focus point per power level. You may only cast universal powers in this way.</p>

        <p><strong><em>Max Power Level.</em></strong> Many force powers can be overpowered, consuming more focus points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels. Your Max Power Level is 1st. It increases to 2nd at 7th level, 3rd at 13th level, and 4th at 17th level. You may only cast force powers at 4th-level once. You regain the ability to do so after a long rest.</p>

        <p><strong><em>Forcecasting Ability.</em></strong> You use your focus ability whenever a power refers to your forcecasting ability. If a power you cast with focus points calls for a saving throw, you use your focus save DC. If a power you cast with focus points calls for an attack roll, you use your focus attack modifier.</p>



        <h4>Vow of Fate</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>When you finish a short or long rest, roll a d20 and record the number rolled. Once before your next short or long rest, you can replace any attack roll, saving throw, or ability check made by you or a creature within 5 feet of you with this roll. You must choose to do so before the roll. </p>

        <h4>Vow of the Fighter</h4>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting Style options, detailed in Chapter 6. </p>

        <h4>Vow of the Focused</h4>

        <p>You can substitute Strength, Constitution, or Intelligence (chosen when you take this vow) for Wisdom or Charisma for your monk class features, except for other vows and Monastic Tradition features.</p>

        <h4>Vow of Fortitude</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>You can use your action or bonus action to end one effect on yourself that is causing you to be blinded or deafened. </p>

        <h4>Vow of Freedom</h4>

        <p>You ignore unenhanced difficult terrain, and when you would use your action to break free of an effect that is grappling or restraining you, you can instead use your bonus action.</p>

        <h4>Vow of Intuition</h4>

        <p>You can no longer have disadvantage on attack rolls against creatures within 10 feet of you due to not being able to see them.</p>

        <h4>Vow of the Limber</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>When you make your first unarmed strike on your turn, you can choose to spend 1 focus point. If you do so, your reach with your unarmed strikes increases by 5 feet until the end of your turn.</p>

        <h4>Vow of the Nemesis</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>As a bonus action, you can choose one creature within 30 feet that you can see. The creature must make a Wisdom saving throw against your focus save DC. On a successful save, the creature becomes immune to this feature for 24 hours. On a failed save, for the next minute, the creature has disadvantage on attack rolls against creatures other than you, and it must make an additional Wisdom saving throw each time it attempts to move to a space that is more than 30 feet away from you; if it succeeds on this saving throw, this feature doesn't restrict its movement for that turn. </p>

        <p>This feature ends early if you attack another creature, if you target another hostile creature with a power or class feature, if a friendly creature damages the target, if a friendly creature targets it with a power or class feature, or if you target another creature with this feature.</p>

        <h4>Vow of the Open Mind</h4>

        <p>You gain proficiency in a skill of your choice. Additionally, you can spend 1 focus point and 10 minutes meditating on a skill in which you are proficient. If you do so, when you make an ability check with the chosen skill, you can add your Wisdom or Charisma modifier to the check if it doesn't already include that modifier. You can only have one instance of this feature active at a time.</p>

        <h4>Vow of Precision</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>Your critical hit range with unarmed strikes increases by 1.</p>

        <h4>Vow of Requital</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>When you take the Dodge action and an attack made by a creature within 5 feet of you misses you before the start of your next turn, you can use your reaction to make one melee weapon attack with a monk weapon or unarmed strike against that creature.</p>

        <h4>Vow of Restoration</h4>

        <p>When you would make an unarmed strike, you can spend 1 focus point to instead touch a willing creature within your reach. Roll your Martial Arts die. The target gains hit points equal to the amount rolled + your Wisdom or Charisma modifier (your choice, minimum of +1).</p>

        <h4>Vow of the Sentry</h4>

        <p>You gain proficiency in light and medium armor. Additionally, you can now gain the benefits of your Martial Arts and Unarmored Movement features while wearing light or medium armor as long as you are not wielding a shield.</p>

        <h4>Vow of Serenity</h4>

        <p>Your maximum focus increases by an amount equal to half your Wisdom or Charisma modifier (your choice, minimum of +1).</p>

        <h4>Vow of Spirit</h4>

        <p>You can use your choice of Wisdom or Charisma instead of Strength or Dexterity for the attack and damage rolls of your unarmed strikes and monk weapons. You must use the same modifier for both rolls.</p>

        <h4>Vow of the Versatile</h4>

        <p>When you would make an unarmed strike as part of your Martial Arts bonus action attack or your Flurry of Blows, you can instead make a weapon attack with a monk weapon you are wielding, using your Martial Arts die in place of the weapon's damage.</p>

        <h2>Monastic Orders</h2>

        <p>Orders of monastic pursuit are common in the locales scattered across the galaxy. Each order is based in a specific culture and is mutually exclusive, despite relying on the same basic techniques. Your order grants you features at 3rd, 6th, 11th, and 17th level.</p>



        <h4>Crimson Order</h4>

        <p>Monks of the Crimson Order are unyielding in their resolve. They pledge themselves to a singular entity or belief, and uphold their service with solemnity and diligence. </p>

        <h3>Crimson Armaments</h3>

        <em><strong>Crimson Order:</strong> 3rd level</em><br>

        <p>You gain proficiency in light and medium armor. If you are already proficient in light and medium armor, you instead gain proficiency in heavy armor. Additionally, you can now gain the benefits of your Martial Arts and Unarmored Movement features while wearing armor as long as you are not wielding a shield.</p>

        <p>Additionally, you've learned to adapt to new weaponry. Over the course of an hour, which can be performed during a short rest, you can perform a kata with a weapon of your choice. You gain proficiency in that weapon if you do not already have proficiency, and it becomes a monk weapon for you. You can only adapt to one weapon at a time, and if you attempt to adapt to another weapon you immediately lose your proficiency with the chosen weapon.</p>

        <h3>Crimson Squall</h3>

        <em><strong>Crimson Order:</strong> 6th, 11th, and 17th level</em><br>

        <p>You've learned to enhance your kata. As a bonus action while wielding a monk weapon, you can expend 1 focus point to cause the area within 5 feet of you to become difficult terrain for 1 minute. This area travels with you, and creatures within the area can not make opportunity attacks.</p>

        At 11th level, the range of this area increases to<br> 15 feet, and at 17th level, the range of this area increases to 30 feet.

        <h3>Vigilant Sentinel</h3>

        <em><strong>Crimson Order:</strong> 11th level</em><br>

        When you attempt to perceive your surroundings on your turn, you can opt to not move on that turn.<br> If you avoid moving, you gain a +10 bonus<br> to your Wisdom (Perception) checks until<br> the start of your next turn. You lose<br> this benefit if you move or<br> fall prone, either<br> voluntarily or<br> because of<br> some external<br> effect.



        <h3>Sovereign Protector</h3>

        <em><strong>Crimson Order:</strong> 17th level</em><br>

        <p>Your mastery of focus has allowed you to unlock your fullest potential in combat. As a bonus action, you can gain the following effects for 1 minute.</p>

        <ul><li>Your speed is doubled.</li><li>Your AC increases by 2.</li><li>You have advantage on Dexterity saving throws.</li><li>You gain an additional action of each of your turns. This action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or Use an Object action.</li></ul>

        <p>This effect ends early if you are incapacitated or die. Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/5JR9GaI.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:750px' />



        <h4>Echani Order</h4>

        <p>Monks of the Echani Order train relentlessly both with and without their weapons, to the point where the weapon becomes an extension of the body. Founded on a mastery of sword fighting, the tradition has expanded to include many different weapons.</p>

        <h3>Echani Weapons</h3>

        <em><strong>Echani Order:</strong> 3rd level</em><br>

        <p>Your special martial arts training leads you to master the use of certain weapons. You gain the following benefits. Choose two types of weapons to be your Echani weapons: one vibroweapon and one blaster. Each of these weapons can be any simple or martial </p>



        <p>weapon that lacks the special property. You gain proficiency with these weapons if you don't already have it. Weapons of the chosen types are monk weapons for you. Many of this order's features work only with your Echani weapons. When you reach 6th, 11th, and 17th level in this class, you can choose another type of weapon to be an Echani weapon for you, following the criteria above.</p>

        <h4>Agile Parry</h4>

        <p>If you make an unarmed strike as part of the Attack action on your turn and are holding an Echani weapon, you can use it to defend yourself if it is a melee weapon. You gain a +2 bonus to AC until the start of your next turn, while the weapon is in your hand and you aren't incapacitated.</p>

        <h4>Echani's Shot</h4>

        <p>You can use a bonus action on your turn to make your ranged attacks with an Echani weapon more deadly. When you do so, any target you hit with a ranged attack using an Echani weapon takes an extra 1d4 damage of the weapon's type. You retain this benefit until the end of the current turn.</p>

        <h3>One with the Blade</h3>

        <em><strong>Echani Order:</strong> 6th level</em><br>

        <p>You extend your focus into your Echani weapons, granting you the following benefits.</p>

        <h4>Enhanced Echani Weapons</h4>

        <p>Your attacks with your Echani weapons count as enhanced for the purpose of overcoming resistance and immunity to unenhanced attacks and damage.</p>

        <h4>Deft Strike</h4>

        <p>When you hit a target with an Echani weapon, you can spend 1 focus point to cause the weapon to deal extra damage to the target equal to your Martial Arts die. You can use this feature only once on each of your turns.</p>

        <h3>Sharpen the Blade</h3>

        <em><strong>Echani Order:</strong> 11th level</em><br>

        <p>You gain the ability to augment your weapons further with your focus. As a bonus action, you can expend up to 3 focus points to grant one Echani weapon you touch a bonus to attack and damage rolls when you attack with it. The bonus equals the number of points you spent. This bonus lasts for 1 minute or until you use this feature again. This feature has no effect on an enhanced weapon that already has a bonus to attack and damage rolls.</p>

        <h3>Unerring Accuracy</h3>

        <em><strong>Echani Order:</strong> 17th level</em><br>

        <p>Your mastery of weapons grants you extraordinary accuracy. If you miss with an attack roll using a monk weapon on your turn, you can reroll it. You can use this feature only once on each of your turns. </p>

        <img src='https://www.gmbinder.com/images/WActKA4.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:920px' />



        <h4>Matukai Order</h4>

        <p>Monks of the Matukai Order center their philosophy around  a balance and harmony between the spiritual Force and the physical body, using exercise as a form of meditation. They channel the Force through their bodies, turning themselves into exceptional warriors.</p>

        <h3>Force-Enhanced Strikes</h3>

        <em><strong>Matukai Order:</strong> 3rd level</em><br>

        <p>You learn to channel the Force into your unarmed strikes and monk weapons, further enhancing your melee strikes. When you hit a creature with an unarmed strike or melee weapon attack with a monk weapon, you can spend 1 focus point to force the creature to make a Strength saving throw. On a failed save, it takes 2d6 force damage and is pushed up to 15 feet away from you. On a successful save, the creature only takes half as much damage and isn't pushed.</p>

        <h3>Instinctive Leap</h3>

        <em><strong>Matukai Order:</strong> 6th level</em><br>

        <p>When a hostile creatures moves to within 5 feet of you, you can use your reaction to disengage and leap up to half your speed. If you end this movement in the air, you immediately fall to the ground.</p>

        <h3>Absorb Damage</h3>

        <em><strong>Matukai Order:</strong> 11th, 13th, and 17th level</em><br>

        <p>You learn to channel the Force into your skin and bones, greatly enhancing your durability. You can use a bonus action to channel the Force throughout your body. Until the start of your next turn, you have resistance to kinetic and energy damage.</p>

        <p>You can use this feature four times. You gain an additional use at 13th and 17th level. You regain all expended uses when you finish a long rest.</p>

        <h3>Control the Field</h3>

        <em><strong>Matukai Order:</strong> 17th level</em><br>

        Whenever you use your Instinctive<br> Leap feature, you can leap your entire<br> movement speed instead of only half.<br> Additionally, when you land, you can<br> make an unarmed strike with advantage<br> against a creature within 5 feet of you as<br> part of the same reaction. On a hit, this attack<br> deals an additional 2d6 force damage.

        <img src='https://www.gmbinder.com/images/y7y9lEX.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:1050px' />



        <h4>Nightsister Order</h4>

        <p>Monks of the Nightsister Order utilize an innate Force-sensitivity to commune with death. They learn to channel this power to drain the life of their foes to prolong their own existence. Males who join this order are called Nightbrothers.</p>

        <h3>Ichor Lightning</h3>

        <em><strong>Nightsister Order:</strong> 3rd level</em><br>

        <p>You gain a new attack option that you can use with the Attack action. This special attack is a ranged focus attack with a range of 30 feet. You are proficient with it, and you add your focus ability modifier to its attack and damage rolls. Its damage is necrotic, and it uses your Martial Arts die for its damage die.</p>



        <p>&emsp;When you would make an unarmed strike as part of your Martial Arts bonus action attack or your Flurry of Blows, you can replace the attack with this one.</p>

        <p>When you reduce a creature to 0 hit points with this attack, you gain temporary hit points equal to your focus ability modifier + your monk level (your choice, minimum of one).</p>

        <h3>Dark Magick</h3>

        <em><strong>Nightsister Order:</strong> 6th level</em><br>

        <p>You can use your action to force each creature within 30 feet of you that can see you to make a Wisdom saving throw against your focus save DC or be charmed or frightened (your choice) of you until the end of your next turn. </p>

        <h3>Mastery of Death</h3>

        <em><strong>Nightsister Order:</strong> 11th level</em><br>

        <p>When you are reduced to 0 hit points, you can expend 1 focus point (no action required) to have 1 hit point instead.</p>

        <h3>Spirit Blade Assault</h3>

        <em><strong>Nightsister Order:</strong> 17th level</em><br>

        As an action, you conjure a blade of spirit energy and strike one creature within 5 feet of you with it, expending 1 to 10 focus points. The target must make a Constitution saving throw. On a failed save, it takes<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;2d10 necrotic damage per focus point<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;spent, or half as much on a successful<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;one. 

        <img src='https://www.gmbinder.com/images/R0ZTJew.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:685px' />



        <h2>Operative</h2>

        <span style="font-variant: small-caps">A Bothan spy takes a moment to adjust her infrared goggles.</span> Nimbly sidestepping the laser grid in the room, she slips to the computer at the far end. Counting down the seconds in her head, she slices the mainframe. Twenty seconds. Ten seconds. A handful of soldiers bursts into the room, but she is already gone � with the data in hand.

        <p>With a wary eye on the door, a scruffy-looking Duros plays pazaak in a seedy cantina. When two city guards appear at the exit, he smiles and reaches under the table. Before they can move in, the smuggler flips the table and opens fire. The crowd scatters in panic, giving him just enough cover to escape. </p>

        <p>A gorgeous young human dances before an intoxicated senator in his parlor. She winks enticingly through her golden blonde hair as she sways closer. Leaning in for a kiss, the senator is instead surprised by the barrel of a hold-out blaster pistol shoved into his mouth. He has no time to shout before the assassin pulls the trigger. </p>

        <p>Operatives, whether good, bad, or neutral, are those who focus on a specific practice and utilize it to get the upper hand. They can come from any world or region in the galaxy, with origins from the lowliest scoundrel to the once social elite.</p>



        <h3>Evading Danger</h3>

        <p>Operatives have a knack for getting out of trouble. They have an instinct for self-preservation that keeps them alive, but it's usually tempered with a need to experience the thrills that their profession has to offer, and many adventurous operatives are also saddled with a sense of honor that sometimes makes them go against their natural inclinations. No matter what their immediate concerns may be, survival is the name of the game.</p>



        <h3>Outside the Law</h3>

        <p>Operatives don't often start out seeking to defy authority and break the law. Some are thrust into the profession as a means of rebellion. Others wind up on the wrong side of the law due to bad luck, poor decisions, or circumstances beyond their control. The skills they pick up along the way make them great members of any mission team.</p>



        <img src='https://www.gmbinder.com/images/62G6gbZ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:460px;mix-blend-mode:darken' />

        <h3>Creating an Operative</h3>

        <p>While creating your operative character, consider how you first started on your path. Maybe you were raised on the street and fell into the criminal element as a means of survival. You could be a simple trader who decided to strike against the Sith Empire when it encroached on your business. What would you say is your greatest skill set? What is your core, the truest essence about yourself that keeps you focused? Why would society treat you as a criminal, yet your allies hold you as a loyal companion?</p>

        <h4>Quick Build</h4>

        <p>You can make an operative quickly by following these suggestions. First, make Dexterity your highest ability score, followed by Intelligence or Charisma. Second, choose the gambler background.</p>



        <div class="sw5e-book-block"><h5>The Operative</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Proficiency<br> Bonus</th><th>Features</th><th>Sneak<br> Attack</th><th>Operative<br> Exploits</th></tr></thead><tbody><tr><td>1st</td><td>+2</td><td>Expertise, Sneak Attack</td><td>1d6</td><td>�</td></tr><tr><td>2nd</td><td>+2</td><td>Cunning Action, Operative Exploits</td><td>1d6</td><td>2</td></tr><tr><td>3rd</td><td>+2</td><td>Bad Feeling, Operative Practice</td><td>2d6</td><td>2</td></tr><tr><td>4th</td><td>+2</td><td>Ability Score Improvement</td><td>2d6</td><td>2</td></tr><tr><td>5th</td><td>+3</td><td>Uncanny Dodge</td><td>3d6</td><td>2</td></tr><tr><td>6th</td><td>+3</td><td>Expertise</td><td>3d6</td><td>2</td></tr><tr><td>7th</td><td>+3</td><td>Evasion</td><td>4d6</td><td>3</td></tr><tr><td>8th</td><td>+3</td><td>Ability Score Improvement</td><td>4d6</td><td>3</td></tr><tr><td>9th</td><td>+4</td><td>Practice feature</td><td>5d6</td><td>3</td></tr><tr><td>10th</td><td>+4</td><td>Ability Score Improvement</td><td>5d6</td><td>3</td></tr><tr><td>11th</td><td>+4</td><td>Reliable Talent</td><td>6d6</td><td>3</td></tr><tr><td>12th</td><td>+4</td><td>Ability Score Improvement</td><td>6d6</td><td>3</td></tr><tr><td>13th</td><td>+5</td><td>Practice feature</td><td>7d6</td><td>4</td></tr><tr><td>14th</td><td>+5</td><td>Blindsense</td><td>7d6</td><td>4</td></tr><tr><td>15th</td><td>+5</td><td>Slippery Mind</td><td>8d6</td><td>4</td></tr><tr><td>16th</td><td>+5</td><td>Ability Score Improvement</td><td>8d6</td><td>4</td></tr><tr><td>17th</td><td>+6</td><td>Practice feature</td><td>9d6</td><td>5</td></tr><tr><td>18th</td><td>+6</td><td>Elusive</td><td>9d6</td><td>5</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>10d6</td><td>5</td></tr><tr><td>20th</td><td>+6</td><td>Stroke of Luck</td><td>10d6</td><td>5</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As an operative, you have the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per operative level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your Constitution modifier per operative level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons, blaster pistol, hidden blade, techblade, vibrorapier</li><li><strong>Tools:</strong> One specialist's kit of your choice</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Dexterity, Intelligence</li><li><strong>Skills:</strong> Choose any four</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> a vibroweapon with which you are proficient or <em>(b)</em> a simple blaster and a power cell</li><li><em>(a)</em> a simple blaster and two power cells or <em>(b)</em> a simple vibroweapon and a light physical shield</li><li><em>(a)</em> a burglar's pack, <em>(b)</em> a dungeoneer's pack, or <em>(c)</em> an explorer's pack</li><li>A tool with which you are proficient</li><li>A combat suit and a vibrodagger</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Operative</td><td>7d4 x 100 cr</td></tr></tbody></table>



        <h3>Expertise</h3>

        <em><strong>Operative:</strong> 1st and 6th level</em><br>

        <p>Choose two of your skill proficiencies, or one of skill proficiencies and one of your tool proficiencies, or two of your tool proficiencies. You gain expertise in those skills or tools.</p>

        <p>At 6th level, you can choose two more of your proficiencies (in skills or tools) to gain this benefit.</p>

        <h3>Sneak Attack</h3>

        <em><strong>Operative:</strong> 1st level</em><br>

        <p>You know how to strike subtly and exploit a foe's distraction. Once per turn, you can deal an extra 1d6 damage to one creature you hit with a weapon attack if you have advantage on the attack roll. This damage is the same as the weapon's damage, and the attack must use a finesse or a ranged weapon. </p>

        <p>You don't need advantage on the attack roll if another enemy of the target is within 5 feet of it, that enemy isn't incapacitated, and you don't have disadvantage on the attack roll.</p>

        <p>The amount of the extra damage increases as you gain levels in this class, as shown in the Sneak Attack column of the operative table.</p>

        <h3>Cunning Action</h3>

        <em><strong>Operative:</strong> 2nd level</em><br>

        <p>Your quick thinking and agility allow you to move and act quickly. You can take the Dash, Disengage, and Hide actions as a bonus action.</p>

        <h3>Operative Exploits</h3>

        <em><strong>Operative:</strong> 2nd, 7th, 13th, and 17th level</em><br>

        <p>You've adopted two exploits, as detailed at the end of the class description. You adopt an additional exploit at 7th, 13th, and 17th level.</p>

        <h3>Bad Feeling</h3>

        <em><strong>Operative:</strong> 3rd level</em><br>

        <p>You have a wary eye, bordering on paranoia. When you roll for initiative, you can move up to your speed. This movement happens before the initiative order is determined. </p>

        <p>Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Operative Practice</h3>

        <em><strong>Operative:</strong> 3rd, 9th, 13th, and 17th level</em><br>

        <p>You choose a practice that you emulate in the exercise of your operative abilities, which is detailed at the end of the class description. Your practice choice grants you features at 3rd level and then again at 9th, 13th, and 17th level.</p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Operative:</strong> 4th, 8th, 10th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Uncanny Dodge</h3>

        <em><strong>Operative:</strong> 5th level</em><br>

        <p>When an attacker that you can see deals damage to you with an attack, you can use your reaction to halve the attack's damage against you.</p>

        <h3>Evasion</h3>

        <em><strong>Operative:</strong> 7th level</em><br>

        <p>When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>

        <h3>Reliable Talent</h3>

        <em><strong>Operative:</strong> 11th level</em><br>

        <p>You have refined your chosen skills until they approach perfection. Whenever you make an ability check that lets you add your proficiency bonus, you can treat a d20 roll of 9 or lower as a 10.</p>

        <h3>Blindsense</h3>

        <em><strong>Operative:</strong> 14th level</em><br>

        <p>If you are able to hear, you are aware of the location of any hidden or invisible creature within 10 feet of you.</p>

        <h3>Slippery Mind</h3>

        <em><strong>Operative:</strong> 15th level</em><br>

        <p>You have acquired greater mental strength. You gain proficiency in Wisdom saving throws. </p>

        <h3>Elusive</h3>

        <em><strong>Operative:</strong> 18th level</em><br>

        <p>You are so evasive that attackers rarely gain the upper hand against you. No attack roll has advantage against you while you aren't incapacitated.</p>

        <h3>Stroke of Luck</h3>

        <em><strong>Operative:</strong> 20th level</em><br>

        <p>You have an uncanny knack for succeeding when you need to. Your Dexterity and Intelligence scores increase by 2. Your maximum for those scores increases by 2. Additionally, if your attack misses a target within range, you can turn the miss into a hit. Alternatively, if you fail an ability check, you can treat the d20 roll as a 20.</p>

        <p>Once you've used this feature, you can't use it again until you finish a short or long rest.</p>

        <h3>Operative Exploits</h3>

        <p>The exploits are presented in alphabetical order. If an exploit has prerequisites, you must meet them to learn it. You can learn an exploit at the same time you meet its prerequisites.</p>

        <h4>Commander's Exploit</h4>

        <p>You gain proficiency in medium armor.</p>

        <h4>Explorer's Exploit</h4>

        <p>You can hold your breath twice as long as you are normally able to, and take half as much damage from fall damage.</p>



        <h4>Fate's Exploit</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>When you finish a short or long rest, roll a d20 and record the number rolled. Once before your next short or long rest, you can replace any attack roll, saving throw, or ability check made by you or a creature within 5 feet of you with this roll. You must choose to do so before the roll. </p>

        <h4>Fighter's Exploit</h4>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting Style options, detailed in Chapter 6. </p>

        <h4>Freedom's Exploit</h4>

        <p>You ignore unenhanced difficult terrain, and when you would use your action to break free of an effect that is grappling or restraining you, you can instead use your bonus action.</p>

        <h4>Guerrilla's Exploit</h4>

        <p>You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits. Lastly, you have advantage on saving throws against exhaustion.</p>

        <h4>Learner's Exploit</h4>

        <p>You gain proficiency in a skill and a tool, or two tools.</p>

        <p>You can select this exploit multiple times, each time choosing a new skill and a tool, or two new tools.</p>

        <h4>Mentor's Exploit</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>Once per turn, whenever both you and a friendly creature within 60 feet that can see and hear you both have to make a saving throw to resist the same effect, you can choose to have disadvantage on the save. If you do so, the friendly creature gains advantage on the save. You can use this feature before or after you both make the saving throw, but you must do so before the GM says whether the save succeeds or fails.</p>

        <h4>Skill's Exploit</h4>

        <p>You learn an exploit that enhances your ability to apply your knowledge to combat situations. You can take this exploit multiple times.</p>

        <p>When you take the Attack action, you can use one of your skill exploits granted by this feature. You can use these features a combined number of times equal to your Intelligence modifier (a minimum of once). You regain any expended uses when you finish a long rest.</p>

        <p>Choose from the following. You must be proficient in the skill in order to take that skill's exploit. </p>

        <p><strong><em>Aim (Stealth).</em></strong> You attempt to line up a strike against a creature you can see that you are hidden from. Make a Dexterity (Stealth) check contested by the target's Wisdom (Perception) check. If your check succeeds, you gain a +10 bonus to the first attack roll you make against the target before the end of your next turn. If your check fails, you are no longer hidden from the target.</p>



        <p>&emsp;<strong><em>Angle (Perception).</em></strong> You attempt to predict the behavior of a humanoid you can see within 30 feet. Make a Wisdom (Perception) check contested by the target's Dexterity (Sleight of Hand) check. If your check succeeds, the first attack roll the target makes before the start of your next turn has disadvantage, and the first saving throw the creature makes before the start of your next turn has disadvantage. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Battle Cry (Intimidation).</em></strong> You attempt to demoralize one humanoid you can see within 30 feet of you that can see and hear you. Make a Charisma (Intimidation) check contested by the target's Wisdom (Insight) check. If your check succeeds, the target is frightened until the end of your next turn. If the target was already frightened of you, it must immediately drop whatever it is holding. On its next turn, if it is still frightened of you, it must take the Dash action and move away from you by the safest available route on its turn, unless there is nowhere to move. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Charm (Persuasion).</em></strong> You attempt to convince one humanoid you can see within 30 feet that can hear and understand you. Make a Charisma (Persuasion) check contested by the target's Wisdom (Insight) check. If you have dealt damage to the creature in the last hour, it has advantage on the check. If your check succeeds, the target is charmed by you until the start of your next turn, and it has disadvantage on the first attack roll it makes against a creature before the end of its next turn. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Confuse Beast (Animal Handling).</em></strong> You attempt to confuse one beast on the battlefield. Make a Wisdom (Animal Handling) check contested by the target's Wisdom (Insight) check. If your check succeeds, the beast cannot take actions or reactions until the end of your next turn. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Distract (Performance).</em></strong> You attempt to distract one beast or humanoid you can see within 30 feet of you that can see and hear you. Make a Charisma (Performance) check contested by the target's Wisdom (Insight) check. If your check succeeds, the next attack roll made against the target before the start of its next turn has advantage. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Emulate Predator (Nature).</em></strong> You attempt to emulate the sounds of a natural predator of a beast or plant you can see within 30 feet. Make an Intelligence (Nature) check contested by the target's Wisdom (Insight) check. If your check succeeds, the target must take the Dash action and move away from you by the safest available route on its turn, unless there is nowhere to move. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Feint (Deception).</em></strong> You attempt to divert the attention of a target you can see within 30 feet. Make a Charisma (Deception) check contested by the target's Wisdom (Insight) check. If your check succeeds, the first attack roll made against the target before the start of </p>



        <p>your next turn by someone other than you has advantage, and the target has disadvantage on the first saving throw they make against an effect caused by a creature other than you before the start of your next turn. If your check fails, the target can't be deceived by you in this way for 1 hour.</p>

        <p><strong><em>Hacktivate (Technology).</em></strong> You attempt to determine the weaknesses in a droid you can see within 30 feet. Make an Intelligence (Technology) check contested by the target's Intelligence (Technology) check. If your check succeeds, you have advantage on the next attack roll you make against the target before the end of your turn, and if you hit, you deal additional damage equal to your Intelligence modifier. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Instruct (Investigation).</em></strong> You attempt to find a weakness in your target. Make an Intelligence (Investigation) check contested by the target's Charisma (Deception) check. If your check succeeds, if a friendly creature makes an attack roll against the target and they can see and hear you, you can use your reaction to grant them advantage on the roll. If you do so, and they hit, they deal additional damage equal to your bonus to Investigation checks. This damage is the same type as the attack's damage. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Intuit (Insight).</em></strong> You attempt to determine the motivations of one humanoid you can see within 30 feet. Make a Wisdom (Insight) check contested by the target's Charisma (Deception) check. If your check succeeds, the target can't have advantage on ability checks, attack rolls, or saving throws against you until the end of your next turn. If your check fails, the target instead can't have disadvantage on ability checks, attack rolls, or saving throws against you until the end of your next turn.</p>

        <p><strong><em>Pocket Sand (Sleight of Hand).</em></strong> You attempt to blind one beast or humanoid you can see within 15 feet of you. Make a Dexterity (Sleight of Hand) check contested by the target's Wisdom (Perception) check. If your check succeeds, the target is blinded until the end of your turn. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Precision Strike (Medicine).</em></strong> You attempt to strike a pressure point in one humanoid within your reach. Make a Wisdom (Medicine) check contested by the target's Strength (Athletics) or Dexterity (Acrobatics) check (the target chooses the ability to use). If your check succeeds, they are incapacitated until the end of their next turn. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Snare (Survival).</em></strong> You attempt to cause a creature within 30 feet of you to stumble. Make a Wisdom (Survival) check contested by the target's Wisdom (Perception) check. If your check succeeds, and the target moves towards you before the start of your next turn, it gains 1 slowed level, and you can use your reaction to cause it to fall prone. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <p><strong><em>Spin (Piloting).</em></strong> You attempt to confound a piloted construct you can see within 30 feet. Make an </p>

        <p>Intelligence (Piloting) check contested by the target's Intelligence (Piloting) check. If your check succeeds, the target has disadvantage on attack rolls against you, and you have advantage on Dexterity saving throws against the target, until the start of your next turn. If your check fails, the target instead has advantage on attack rolls against you, and you have disadvantage on Dexterity saving throws against the target, until the start of your next turn.</p>

        <p><strong><em>Study (Lore).</em></strong> You attempt to anticipate your target's action. Make an Intelligence (Lore) check contested by the target's Charisma (Deception) check. If your check succeeds, you have advantage on the first ability check, attack roll or saving throw you make against that creature before the end of your next turn. Alternatively, before the end of your next turn, you can use your reaction to grant disadvantage on the first ability check, attack roll, or saving throw the target makes against you. If your check fails, you instead have disadvantage on the first ability check, attack roll or saving throw you make against that creature before the end of your next turn.</p>

        <p><strong><em>Tumble (Acrobatics).</em></strong> You attempt to make a quick tumble, immediately moving 10 feet. If you begin or end this movement within a creature's reach, make a Dexterity (Acrobatics) check contested by it's Strength (Athletics) or Dexterity (Acrobatics) check (the target chooses the ability to use). If your check succeeds, this movement does not provoke opportunity attacks from it, and you have advantage on the first attack roll you make against it before the end of your turn. If your check fails, you immediately fall prone.</p>

        <p><strong><em>Wrestle (Athletics).</em></strong> You attempt to grab and pin a creature within 5 feet of you with at least one free hand. The target must be no more than one size larger than you. Make a Strength (Athletics) check contested by the target's Strength (Athletics) or Dexterity (Acrobatics) check (the target chooses the ability to use). If your check succeeds, the target is both grappled and restrained by you. If the target stops being grappled, it also stops being restrained. If your check fails, you can't use this feature on this target again for 1 hour.</p>

        <h4>Technologist's Exploit</h4>

        <p>You learn and can cast one 1st-level tech power once per long rest. Your techcasting ability is Intelligence. You require use of a wristpad for this power.</p>

        <p>You can select this exploit multiple times. Each time you do so, you must choose a different power.</p>

        <h4>Weaponmaster's Exploit</h4>

        <p>You gain proficiency in three blasters or vibroweapons that lack the heavy and strength properties.</p>

        <p>You can select this exploit multiple times. Each time you do so, you must choose different weapons.</p>

        <h2>Operative Practices</h2>

        <p>Operatives share, including their emphasis on perfecting their skills, their precise and deadly approach to combat, and their increasingly quick reflexes, though their practices differ. Your practice grants you features at 3rd, 9th, 13th, and 17th level.</p>



        <h4>Acquisitions Practice</h4>

        <p>Many operatives are hired for the procurement of valuable artifacts, but only the true masters of the art can slip through the tightest security and make off with untold riches, whether they do it for a profit, or for sport. Those operatives who choose the Acquisitions Practice apply a mixture of stealth and impressive acrobatics to surpass any kind of defenses they are met with.</p>

        <h3>Fast and Agile</h3>

        <em><strong>Acquisitions Practice:</strong> 3rd level</em><br>

        <p>You can use the bonus action granted by your Cunning Action to make a Dexterity (Sleight of Hand) check, use your demolitions kit or security kit to disarm a trap or open a lock, or take the Use an Object action.</p>

        <p>Additionally, climbing no longer costs you extra movement, and you gain the ability to move in flying leaps with incredible speed, precision, and power. When you move, instead of using your walking speed, you may take two short movements by flying. Each movement is at half your speed, and you must end each one on a solid object, a surface, or on the ground. If you do not, you fall and your movement ends. If you Dash, your bonus movement is applied to your normal speed, not this movement. </p>

        <h3>Deft Hands</h3>

        <em><strong>Acquisitions Practice:</strong> 3rd level</em><br>

        You learn a number of<br> techniques to distract<br> and confuse your<br> opponents. When<br> you deal Sneak<br> Attack damage,<br> you may choose<br> to forgo two of<br> your Sneak<br> Attack dice<br> to perform<br> a deft hand<br> maneuver.



        <p>&emsp;Some of your deft hand maneuvers require your target to make a saving throw to resist the deft hand maneuver's effects. The saving throw DC is as follows:</p>

        <hr>

        <div class="sw5e-book-block"><strong>Deft Hands save DC</strong> = 8 + your proficiency bonus + <br>your Dexterity modifier</div>

        <hr>

        <h4>Hinder</h4>

        <p>You attempt to distract your target in order to hinder their movement. The target must make a Constitution saving throw. On a failed save, it gains 1 slowed level until the end of its next turn and it makes the first Dexterity saving throw before the end of its next turn with disadvantage.</p>

        <h4>Pilfer</h4>

        <p>You attempt to pick your target's pockets. The target must make a Wisdom saving throw. On a failed save, you have advantage on the first Dexterity (Sleight of Hand) check you make against the target before the end of your next turn.</p>

        <h4>Tumble</h4>

        <p>You attempt to nimbly roll away. You immediately move 10 feet in a direction of your choice, and the target must make a Dexterity saving throw. On a failed save, this movement does not provoke opportunity attacks from the creature.</p>

        <h3>Supreme Sneak</h3>

        <em><strong>Acquisitions Practice:</strong> 9th level</em><br>

        <p>You have advantage on a Dexterity (Stealth) check if you move no more than half your speed on the same turn. Additionally, as long as you aren't incapacitated, you no longer take damage from falling less than 100 feet, and have resistance to falling damage.</p>

        <h3>Aerial Agility</h3>

        <em><strong>Acquisitions Practice:</strong> 13th level</em><br>

        <p>Your agility in the air grants you the following benefits:</p>

        <ul><li>When you move, you can instead take 3 short movements by flying.</li><li>Whenever you end your flying movement and you are within 5 feet of a climbable surface, you can grab onto that surface as though you were climbing upon it.</li></ul>

        <h3>Thief's Reflexes</h3>

        <em><strong>Acquisitions Practice:</strong> 17th level</em><br>

        <p>You can take two turns during the first round of any combat. You take your first turn at your normal initiative and your second turn at your initiative minus 10. You can't use this feature when you are surprised.</p>

        <p>Additionally, you learn to utilize the momentum of your fall to make deadly vertical strikes. Whenever you fall at least 50 feet and land within 5 feet of an enemy creature you can use your reaction to make one weapon attack against that creature. If the attack is a Sneak Attack, you can deal three additional weapon dice worth of damage and the creature must make a Dexterity saving throw or be knocked prone.</p>

        <img src='https://www.gmbinder.com/images/rBgHouo.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:295px' />



        <h4>Beguiler Practice</h4>

        <p>Those operatives who choose the Beguiler Practice augment their natural wiles and charm with subtle utilization of the Force. They tap into these powers to cloud the minds of their foes, distracting and diverting before abruptly dispatching them.</p>

        <h3>Forcecasting</h3>

        <em><strong>Beguiler Practice:</strong> 3rd level</em><br>

        <p>You have derived powers from your emotional connection to the Force. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 4 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the Beguiler Practice Forcecasting table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your operative level, as shown in the Force Points column of the Beguiler Practice Forcecasting table, + your Wisdom or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max<br> Power Level column of the Beguiler Practice Forcecasting table.

        You may only cast<br> force powers at 4th-level once.<br> You regain the ability to do so<br> after a long rest.



        <h4>Forcecasting Ability</h4>

        <p>Your forcecasting ability varies based on the alignment of the powers you cast. You use your Wisdom for light side powers, Charisma for dark side powers, and Wisdom or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>

        <img src='https://www.gmbinder.com/images/jMmQQuW.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:640px' />



        <h3>Fascinating Display</h3>

        <em><strong>Beguiler Practice:</strong> 3rd level</em><br>

        <p>You can spend 1 minute attemping to distract and enthrall those around you. Choose a number of humanoids within 60 feet of you who watched your display for the duration, up to a number equal to your Charisma modifier (minimum of one). Each target must succeed on a Wisdom saving throw (DC = 8 + your proficiency bonus + your Charisma modifier) or be charmed by you. While charmed in this way, the target idolizes you, speaking glowingly of you to anyone who talks to it. Additionally, it hinders anyone who opposes you, although it avoids violence unless it was already inclined to fight on your behalf. This effect ends on a target after 1 hour, if it takes any damage, if you attack it, or if it witnesses you attacking or damaging any of its allies. If a target succeeds on this saving throw, the target has no hint you tried to charm it.</p>

        <p>Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h3>Mesmerizing Presence</h3>

        <em><strong>Beguiler Practice:</strong> 9th level</em><br>

        <p>You have advantage on attack rolls against creatures charmed by you.</p>

        <h3>Enthralling Vigor</h3>

        <em><strong>Beguiler Practice:</strong> 13th level</em><br>

        <p>Whenever a creature fails a Wisdom or Charisma saving throw against a force power or class feature you use, you can gain temporary hit points equal to half your operative level + your Charisma modifier (minimum of +1).</p>

        <p>You can use this feature five times. You gain an additional use at 17th level. You regain all expended uses when you finish a short or long rest.</p>

        <h3>Distracting Countenance</h3>

        <em><strong>Beguiler Practice:</strong> 17th level</em><br>

        As a bonus action, you can mask yourself<br> with the Force for 1 minute or until you<br> are incapacitated. For the duration,<br> whenever any creature tries to<br> attack you for the first time on a<br> turn, the attacker must make a<br> Charisma saving throw (DC = 8 +<br> your proficiency bonus + your<br> Charisma modifier). On a failed<br> save, it can't attack you on this<br> turn, and it must choose a new<br> target for its attack or the attack<br> is wasted. On a successful save,<br> it can attack you on this turn, but<br> it has disadvantage on any<br> saving throw it makes against<br> your powers on your next<br> turn.

        <div class="sw5e-book-block"><h5>Beguiler Practice Forcecasting</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Force Powers<br> Known</th><th>Force<br> Points</th><th>Max Power<br> Level</th></tr></thead><tbody><tr><td>3rd</td><td>4</td><td>3</td><td>1st</td></tr><tr><td>4th</td><td>6</td><td>4</td><td>1st</td></tr><tr><td>5th</td><td>7</td><td>5</td><td>1st</td></tr><tr><td>6th</td><td>8</td><td>6</td><td>1st</td></tr><tr><td>7th</td><td>10</td><td>7</td><td>2nd</td></tr><tr><td>8th</td><td>11</td><td>8</td><td>2nd</td></tr><tr><td>9th</td><td>12</td><td>9</td><td>2nd</td></tr><tr><td>10th</td><td>13</td><td>10</td><td>2nd</td></tr><tr><td>11th</td><td>14</td><td>11</td><td>2nd</td></tr><tr><td>12th</td><td>15</td><td>12</td><td>2nd</td></tr><tr><td>13th</td><td>17</td><td>13</td><td>3rd</td></tr><tr><td>14th</td><td>18</td><td>14</td><td>3rd</td></tr><tr><td>15th</td><td>19</td><td>15</td><td>3rd</td></tr><tr><td>16th</td><td>20</td><td>16</td><td>3rd</td></tr><tr><td>17th</td><td>22</td><td>17</td><td>4th</td></tr><tr><td>18th</td><td>23</td><td>18</td><td>4th</td></tr><tr><td>19th</td><td>24</td><td>19</td><td>4th</td></tr><tr><td>20th</td><td>25</td><td>20</td><td>4th</td></tr></tbody></table></div>

        <p>&emsp;Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <img src='https://cdn.discordapp.com/attachments/469499280994992128/489132943999238195/sw5.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:680px' />

        <h4>Gunslinger Practice</h4>

        <p>Those operatives who choose the Gunslinger Practice are the masters of the trick shot. The Gunslinger and his blaster are the perfect team, utilizing knowledge of their enemies' vulnerabilities to take advantage of every opportunity.</p>

        <h3>Dive For Cover</h3>

        <em><strong>Gunslinger Practice:</strong> 3rd, 5th, 9th, 13th, and 17th level</em><br>

        <p>You learn to quickly move into cover when under fire. Once per round, when you are the target of a ranged attack, or you are subjected to an effect that allows you to make a Dexterity saving throw, and there is cover within 10 feet of you, you can move up to 10 feet (no action required). You must end this movement in cover.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain all expended uses when you complete a long rest.</p>

        <h3>Trick Shooter</h3>

        <em><strong>Gunslinger Practice:</strong> 3rd level</em><br>

        You learn a number of trick shots you can use to debilitate enemies and impress allies. When you deal Sneak Attack damage to a creature,<br> you may choose to forgo<br> two of your Sneak Attack<br> dice to make the attack a trick shot. 

        <p>Some of your trick shots require your target to make a saving throw to resist the trick shot's effects. The saving throw DC is calculated as follows: </p>

        <hr>

        <div class="sw5e-book-block"><strong>Trick Shot save DC</strong> = 8 + your proficiency bonus + <br>your Dexterity modifier</div>

        <hr>

        <h4>Blinding Shot</h4>

        <p>You attempt to blind the target. The target must make a Constitution saving throw or be blinded until the end of your next turn. </p>

        <h4>Brutal Shot</h4>

        <p>You attempt to knock the target prone. The target must make a Strength saving throw or be knocked prone.  </p>

        <h4>Hampering Shot</h4>

        <p>You attempt to hobble the enemy's movement. The target must make a Dexterity saving throw. If it fails, it gains 1 slowed level and it has disadvantage on Dexterity saving throws until the end of its next turn.</p>

        <h3>Spinning Flourish</h3>

        <em><strong>Gunslinger Practice:</strong> 9th level</em><br>

        <p>You can flourish your weapon in an intimidating or charming manner. As an action, you can cause one creature within 60 feet to make a Wisdom saving throw (DC = 8 + your proficiency bonus + your Dexterity modifier). On a failed save, the target is charmed or frightened by you (your choice) until the end of your next turn. </p>



        <h3>Ricochet Shot</h3>

        <em><strong>Gunslinger Practice:</strong> 13th level</em><br>

        <p>You learn how to work all the angles. Once per turn, when you take the Attack action and miss with a ranged weapon attack, you can repeat the attack against a different target within 10 feet of the original target (no action required).</p>

        <h3>Quickdraw</h3>

        <em><strong>Gunslinger Practice:</strong> 17th level</em><br>

        <p>You learn to perform miracles with just a blaster and some nerve. On your first turn in combat, if you aren't surprised, you can use your action to attack creatures that have not yet acted. Choose up to six such creatures that you can see, making a ranged weapon attack against each. On a hit, you deal normal weapon damage and can apply a single trick shot to each attack made this way. </p>

        Once you've used this feature, you must<br> complete a short or long rest before you<br> can use it again.

        <img src='https://www.gmbinder.com/images/XjjiVJp.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:730px' />



        <h4>Sharpshooter Practice</h4>

        <p>Those operatives who choose the Sharpshooter Practice are bringers of death. Striking from a safe distance, the Sharpshooter uses precision shooting to control the battlefield and bring targets down quickly.</p>

        <h3>Assume the Position</h3>

        <em><strong>Sharpshooter Practice:</strong> 3rd level</em><br>

        <p>You don't need advantage on your attack roll to use your Sneak Attack if your target is greater than 30 feet from you and no enemies are within 5 feet of you. Additionally, standing up from prone now only costs 5 feet of movement.</p>

        <p>Additionally, you gain proficiency with two martial blasters of your choice.</p>

        <h3>Placed Shots</h3>

        <em><strong>Sharpshooter Practice:</strong> 3rd level</em><br>

        <p>You perfect the art of placing distant shots for maximum effectiveness in debilitating and controlling your enemies. When you deal Sneak Attack damage to a creature, you may choose to forgo two of your Sneak Attack dice to make the attack a placed shot. </p>



        <p>&emsp;Some of your placed shots require your target to make a saving throw to resist the placed shot's effects. The saving throw DC is calculated as follows: </p>

        <hr>

        <div class="sw5e-book-block"><strong>Placed Shot save DC</strong> = 8 + your proficiency bonus + <br>your Dexterity modifier</div>

        <hr>

        <h4>Disarming Shot</h4>

        <p>You attempt to disarm a creature with your attack. The target must succeed on a Strength saving throw or be forced to drop one item of your choice that it's holding. The object lands at its feet.</p>

        <h4>Penetrating Shot</h4>

        <p>You attempt to damage another target with the same attack. Choose a second target within 15 feet of and directly behind your initial target. If the original attack roll would hit the second target, it takes two dice worth of Sneak Attack damage.</p>

        <p>The damage is of the same type dealt by the original attack.</p>

        <h4>Suppressive Shot</h4>

        <p>You attempt to pin the target to its location. The target must succeed on a Wisdom saving throw or be frightened of you until the end of its next turn.</p>

        <h3>Head Shot</h3>

        <em><strong>Sharpshooter Practice:</strong> 9th level</em><br>

        <p>You are at your deadliest when your enemies are unaware of the danger they are in. You have advantage on attack rolls against any creature that hasn't taken a turn in combat yet. </p>

        <p>Additionally, any hit you score against a creature that is surprised is a critical hit.</p>

        <h3>Distracting Shot</h3>

        <em><strong>Sharpshooter Practice:</strong> 13th level</em><br>

        <p>You are able to defend your compatriots from afar. When a friendly creature you can see within your weapon's normal range is the target of a ranged attack, or forced to make a saving throw, and the source of the effect is within your weapon's normal range, you can use your reaction to make a ranged weapon attack against the source. On a hit, instead of dealing damage, the target of your attack has disadvantage on the attack roll against your ally, or your ally has advantage on the saving throw to resist the effect.</p>

        <h3>Double Tap</h3>

        <em><strong>Sharpshooter Practice:</strong> 17th level</em><br>

        <p>You've learned to capitalize when you have the advantage. When you take the Attack action and make an attack with advantage, you can choose to forgo the advantage. If you do, you can make an additional attack against the target or another creature within 5 feet of it (no action required). Both attacks can benefit from your Sneak Attack damage, instead of only one.</p>

        <img src='https://www.gmbinder.com/images/PdcqYka.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:513px' />



        <h2>Scholar</h2>

        <span style="font-variant: small-caps">An overwhelming horde of tusken raiders bears down on a</span> chiss and her fellow adventurers. She gives the order and her allies unleash a single coordinated attack cutting deep into their lines. Under her command the enemy is quickly routed against all odds, all according to plan.

        <p>Deep within the once thought abandoned ruins, a nautolan tends to his companions wounds as they rest. Countless long nights of study and training have conditioned him to keep going even when all others have exhausted themselves. He will see them through this.</p>

        <p>A twi'lek in fine vestments addresses a gathering crowd. What was the making of an angry mob begins to disperse, his mere presence putting them at ease, giving his companions time to make their escape. </p>

        <p>Scholars are master of the mundane arts, using methodical practices to turn the tables to their advantage. From years of study and testing, scholars take in the situation around them and quickly formulate the means to achieve whatever they have minds set to. Whatever pursuit they follow, a scholar will have a plan for anything that comes their way.</p>



        <h3>The Pursuit of Knowledge</h3>

        A true scholar is never satisfied. They are always<br> seeking out a new answer to a new question. This<br> often goes hand-in-hand with seeking a life of<br> adventure, to explore new, hidden areas, or<br> accompany those that do. The life of a scholar often<br> times begins in the mundane, as a teacher or sage.<br> Sometimes they serve as doctors, diplomats, or as<br> officers in the military.



        <h3>To Learn, To Know</h3>

        For scholars, mundane life is often too slow. When life<br> becomes stagnant or when an answer cannot be<br> found, the call to adventure rings louder. Scholars will<br> often go to ancient, forgotten, and often dangerous<br> places to find something to quench their thirst for<br> knowledge.



        <img src='https://www.gmbinder.com/images/cPxvPXQ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:330px' />

        <h3>Creating a Scholar</h3>

        As you create a scholar, it's important to think of where<br> you gained your knowledge. Did you serve as an<br> apprentice under a master? Did you attend college or<br> other formal education? Perhaps you gained it on your<br> own, searching out and pouring over dusty tomes<br> found in forgotten places. Where did your thirst for<br> knowledge come from? Insatiable curiosity? Always<br> wanting to know the right answer? Or do you have<br> something to prove? Think about what field you wish to<br> pursue and think of what is driving you in that<br> direction.

        <h4>Quick Build</h4>

        <p>You can make a scholar quickly by following these suggestions. First, make Intelligence your highest ability score. Your next-highest score should be Dexterity. Second, choose the noble background.</p>



        <div class="sw5e-book-block"><h5>The Scholar</h5>

        <table class="sw5e-book-table"><thead><tr><th>Level</th><th>Proficiency<br> Bonus</th><th>Features</th><th>Academic<br> Superiority</th><th>Superiority<br> Dice</th><th>Maneuvers<br> Known</th><th>Discoveries</th></tr></thead><tbody><tr><td>1st</td><td>+2</td><td>Academic Superiority, Critical Analysis</td><td>d4</td><td>3</td><td>1</td><td>�</td></tr><tr><td>2nd</td><td>+2</td><td>Discovery, Sage Advice (long rest)</td><td>d4</td><td>3</td><td>2</td><td>2</td></tr><tr><td>3rd</td><td>+2</td><td>Expertise, Academic Pursuit</td><td>d4</td><td>4</td><td>4</td><td>4</td></tr><tr><td>4th</td><td>+2</td><td>Ability Score Improvement</td><td>d4</td><td>4</td><td>5</td><td>4</td></tr><tr><td>5th</td><td>+3</td><td>Multitasker</td><td>d6</td><td>5</td><td>6</td><td>5</td></tr><tr><td>6th</td><td>+3</td><td>Pursuit feature</td><td>d6</td><td>5</td><td>7</td><td>5</td></tr><tr><td>7th</td><td>+3</td><td>�</td><td>d6</td><td>6</td><td>9</td><td>5</td></tr><tr><td>8th</td><td>+3</td><td>Ability Score Improvement</td><td>d6</td><td>6</td><td>10</td><td>5</td></tr><tr><td>9th</td><td>+4</td><td>Pursuit feature</td><td>d8</td><td>7</td><td>11</td><td>6</td></tr><tr><td>10th</td><td>+4</td><td>Expertise</td><td>d8</td><td>7</td><td>12</td><td>6</td></tr><tr><td>11th</td><td>+4</td><td>�</td><td>d8</td><td>8</td><td>14</td><td>7</td></tr><tr><td>12th</td><td>+4</td><td>Ability Score Improvement</td><td>d8</td><td>8</td><td>15</td><td>7</td></tr><tr><td>13th</td><td>+5</td><td>Sage Advice (short rest)</td><td>d10</td><td>9</td><td>16</td><td>8</td></tr><tr><td>14th</td><td>+5</td><td>Calm and Collected</td><td>d10</td><td>9</td><td>17</td><td>8</td></tr><tr><td>15th</td><td>+5</td><td>�</td><td>d10</td><td>10</td><td>19</td><td>8</td></tr><tr><td>16th</td><td>+5</td><td>Ability Score Improvement</td><td>d10</td><td>10</td><td>20</td><td>8</td></tr><tr><td>17th</td><td>+6</td><td>Pursuit feature</td><td>d12</td><td>11</td><td>21</td><td>9</td></tr><tr><td>18th</td><td>+6</td><td>Adaptable Intellectual</td><td>d12</td><td>11</td><td>22</td><td>9</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>d12</td><td>12</td><td>23</td><td>9</td></tr><tr><td>20th</td><td>+6</td><td>Knowledge Unbound</td><td>d12</td><td>12</td><td>24</td><td>9</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a scholar, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d8 per scholar level</li><li><strong>Hit Points at 1st Level:</strong> 8 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d8 (or 5) + your Constitution modifier per scholar level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor</li><li><strong>Weapons:</strong> Simple blasters, simple vibroweapons, techblades</li><li><strong>Tools:</strong> Any one</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Intelligence, Wisdom</li><li><strong>Skills:</strong> Choose three from Deception, Insight, Intimidation, Investigation, Lore, Medicine, Nature, Persuasion, and Survival</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> a simple vibroweapon or <em>(b)</em> a simple blaster and two power cells</li><li><em>(a)</em> a entertainer's pack, <em>(b)</em> an explorer's pack, or <em>(c)</em> a scholar's pack</li><li>A tool with which you are proficient</li><li>A combat suit</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Scholar</td><td>6d4 x 100 cr</td></tr></tbody></table>



        <h3>Academic Superiority</h3>

        <em><strong>Scholar:</strong> 1st level</em><br>

        <p>You learn maneuvers that are fueled by special dice called superiority dice. See chapter 13 for the maneuvers list.</p>

        <h4>Maneuvers Known</h4>

        <p>You learn one maneuver of your choice, and you earn more at higher levels, as shown in the Maneuvers Known column of the scholar table. Many maneuvers enhance an attack in some way. You can use only one maneuver per attack, and you may only use each maneuver once per turn.</p>

        <p>Each time you learn new maneuvers, you can also replace one maneuver you know with a different one.</p>

        <h4>Superiority Dice</h4>

        <p>You have three superiority dice, which are d4s, and you earn more at higher levels, as shown in the Superiority Dice column of the scholar table. This die changes as you gain scholar levels, as shown in the Academic Superiority column of the scholar table. A superiority die is expended when you use it. </p>

        <p>You regain all of your expended superiority dice when you finish a short or long rest.</p>

        <h4>Maneuver Ability</h4>

        <p>Your maneuver ability varies based on the type of the maneuver you use. You use Strength, Dexterity, or Constitution for physical maneuvers (your choice), Intelligence, Wisdom, or Charisma for mental maneuvers (your choice), and an ability of your choice for general maneuvers. You use this ability whenever a maneuver refers to your maneuver ability. Additionally, you use this ability modifier when setting the saving throw DC for a maneuver you use.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Maneuver save DC</strong> = 8 + your proficiency bonus + <br>your maneuver ability modifier</div>

        <hr>

        <h3>Critical Analysis</h3>

        <em><strong>Scholar:</strong> 1st level</em><br>

        <p>You are able to analyze a target, develop a plan on how to best overcome any potential obstacle, and execute that plan with ruthless efficiency. As a bonus action on your turn, you can analyze a target you can see within 60 feet of you. For the next minute, or until you analyze another target, you gain the following benefits:</p>

        <ul><li>When you analyze a hostile creature, your attack and damage rolls made with weapons with the finesse property or blaster weapons against that target may use your Critical Analysis ability modifier, which is Intelligence, instead of Strength or Dexterity. You must use the same modifier for both rolls.</li><li>When you analyze a friendly creature, the target can end your Critical Analysis on them (no action required) to add your Critical Analysis ability modifier to one attack roll, ability check, or saving throw. Once a friendly creature has benefited from this ability, they can not do so again until they complete a short or long rest.</li></ul>

        <h3>Discovery</h3>

        <em><strong>Scholar:</strong> 2nd level</em><br>

        <p>As you adventure, your studies have helped you discover new practices you can apply to your skills. You master two discoveries of your choice. Your discovery options are detailed at the end of the class description. When you gain certain scholar levels, you gain additional discoveries of your choice, as shown in the Discoveries column of the scholar table.</p>

        <p>Additionally, when you gain a level in this class, you can choose one of the discoveries you know and replace it with another discovery that you could learn at that level.</p>

        <h3>Sage Advice</h3>

        <em><strong>Scholar:</strong> 2nd and 13th level</em><br>

        <p>You can spend 1 minute spreading your knowledge and experience, advising those around you. When you do so, choose a skill or tool you are proficient with and a number of friendly creatures up to your Intelligence modifier within 30 feet of you who can hear you and who can understand you. Once within the next hour, the next time each creature would make an ability check with the chosen skill or tool, they may add their proficiency bonus to the roll if they are not already proficient. A creature may only benefit from this feature once. If a creature is targeted by this feature again before using it, they can choose to retain the first benefit or replace it with the new skill or tool instead.</p>

        <p>Once you've used this feature, you can't use it again until you finish a long rest. Starting at 13th level, you regain the ability to use it after you complete a short or long rest.</p>

        <h3>Expertise</h3>

        <em><strong>Scholar:</strong> 3rd and 10th level</em><br>

        <p>Choose two of your skill proficiencies, or one of skill proficiencies and one of your tool proficiencies, or two of your tool proficiencies. You gain expertise in those skills or tools.</p>

        <p>At 10th level, you can choose another two proficiencies (in skills or tools) to gain this benefit.</p>

        <h3>Academic Pursuit</h3>

        <em><strong>Scholar:</strong> 3rd, 6th, 9th, and 17th level</em><br>

        <p>You dedicate your studies towards a pursuit, which is detailed at the end of the class description. </p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Scholar:</strong> 4th, 8th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Multitasker</h3>

        <em><strong>Scholar:</strong> 5th level</em><br>

        <p>You can take a second reaction each round. You can only take one reaction per turn.</p>

        <p>Additionally, when a friendly creature you can see that can hear you is forced to make a saving throw, you can use your reaction to target them with your Critical Analysis feature.</p>



        <h3>Calm and Collected</h3>

        <em><strong>Scholar:</strong> 14th and 17th level</em><br>

        <p>When you make a saving throw caused by an effect you can see, you may gain a bonus to the saving throw equal to your Intelligence modifier. </p>

        <p>You can use this feature five times. You gain an additional use at 17th level. You regain all expended uses when you complete a long rest.</p>

        <h3>Adaptable Intellectual</h3>

        <em><strong>Scholar:</strong> 18th level</em><br>

        <p>You are able to effectively prepare for any mission on hand. At the end of a long rest, you may choose one of the discoveries you know and replace it with another discovery that you could learn at that level.</p>

        <h3>Knowledge Unbound</h3>

        <em><strong>Scholar:</strong> 20th level</em><br>

        <p>You are the pinnacle of your pursuit. Your Intelligence score increases by 4. Your maximum for that score increases by 4. Additionally, you can use any maneuver you know without expending a superiority die, rolling a d4 instead.</p>

        <h3>Discoveries</h3>

        <p>The discoveries are presented in alphabetical order. If a discovery has prerequisites, you must meet them to learn it. You can learn the discovery at the same time you meet its prerequisites.</p>

        <h4>Academic Memory</h4>

        <p>You can recall anything you have read in the past month that you understand. This includes but is not limited to books, maps, signs, and lists.</p>

        <h4>Adaptive</h4>

        <em><strong>Prerequisite:</strong> 15th level</em><br>

        <p>When the target of your Critical Analysis feature is reduced to 0 hit points, you can use your reaction to change the target of your analysis to another creature within range.</p>

        <h4>Ambassador</h4>

        <p>You learn three additional languages of your choice.</p>

        <p>You may choose this discovery multiple times.</p>

        <h4>Clever Applications</h4>

        <p>You gain proficiency with improvised weapons, and they gain the finesse property for you. Additionally, when you make an attack with an improvised weapon, it deals 1d6 damage.</p>

        <p>You can use your Sage Advice feature to give friendly creatures improvised weapon proficiency if they don't already have it, following the same rules of that feature as if it were a skill or tool. The friendly creatures retain this proficiency for the entire duration instead.</p>

        <h4>Expert's Advice</h4>

        <p>When you use your Sage Advice feature, the first time each targeted creature makes the chosen skill check, they gain an additional bonus to the roll equal to half your Critical Analysis ability modifier.</p>

        <h4>Hardened Mind</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>You have advantage on saving throws against illusions and on Intelligence checks to discern them from reality.</p>

        <p>You also gain resistance to psychic damage.</p>

        <img src='https://www.gmbinder.com/images/xXdWCYs.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:635px' />



        <h4>Lifelong Learning</h4>

        <p>You gain proficiency in a skill and a tool, or two tools.</p>

        <p>You can select this discovery multiple times, each time choosing a new skill and a tool, or two new tools.</p>

        <h4>Lingering Advice</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>When you use your Sage Advice feature, the targeted creatures retain the benefit from your instruction for the full duration.</p>

        <h4>Malleable Maneuvering</h4>

        <p>You learn two additional maneuvers. When you complete a short rest, you can replace one of these maneuvers with another one. When you complete a long rest, you can replace both of these maneuvers with other ones.</p>

        <h4>Master's Advice</h4>

        <em><strong>Prerequisite:</strong> 11th level, Expert's Advice</em><br>

        <p>When you use your Sage Advice feature, the first time each targeted creature makes the chosen skill check, they gain an additional bonus to the roll equal to your Critical Analysis ability modifier.</p>

        <h4>Mental Prowess</h4>

        <p>When you make a Strength (Athletics) or Dexterity (Acrobatics) check to grapple a creature or break out of a grapple, net, and other restraining equipment, you can use your Critical Analysis ability modifier instead of Strength or Dexterity. </p>

        <h4>Moderately Armored</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain proficiency in medium armor.</p>

        <h4>Perfect Maneuver</h4>

        <p>When you roll a 1 on a superiority die, you can reroll the die and must use the new roll. </p>

        <h4>Quick Analysis</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>When you roll initiative and aren't surprised, you can use your reaction to use your Critical Analysis feature.</p>

        <h4>Rancor's Discipline</h4>

        <p>You can substitute Wisdom or Charisma (chosen when you study this discipline) for Intelligence for your scholar class features, except for other discoveries and Academic Pursuit features.</p>

        <h4>Reliable Sources</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>When you make an Intelligence (Lore) or Intelligence (Nature) skill check that lets you add your proficiency bonus, you can treat a d20 roll of 9 or lower as a 10.</p>

        <h4>Resolute</h4>

        <p>When you make a saving throw to resist charm and fear effects, you may add your Intelligence modifier to the roll.</p>

        <h4>Running on Fumes</h4>

        <p>You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits. Lastly, you have advantage on saving throws against exhaustion.</p>

        <h4>Survival Expert</h4>

        <p>When you make a Survival skill check, you may use your Critical Analysis ability modifier instead of your Wisdom modifier.</p>

        <p>Additionally, you have advantage on saving throws against poison.</p>

        <h4>Targeted Analysis</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>Your attack rolls against the target of your Critical Analysis feature cannot suffer from disadvantage.</p>

        <h4>Tech Amateur</h4>

        <p>You learn and can cast one 1st-level tech power once per long rest. Your techcasting ability is Intelligence. You require use of a wristpad for this power.</p>

        <p>You can select this discovery multiple times. Each time you do so, you must choose a different power.</p>

        <h4>Universal Language</h4>

        <p>You can communicate simple ideas with any creature with an Intelligence score of 6 or higher through basic expressions and gestures.</p>

        <h2>Academic Pursuits</h2>

        <p>Your pursuit is a representation of which fields you have studied or how you practically apply your knowledge. Your pursuit grants you features at 3rd, 6th, 9th, and 17th level.</p>

        <img src='https://www.gmbinder.com/images/oOPlRxo.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:615px' />



        <div class="sw5e-book-block"><h2>Gambler Pursuit</h2></div>

        <p>Not all studied men and women use their intelligence and skill for the pursuit of knowledge, but instead turn to the various casinos and betting halls of the galaxy. Those scholars who choose the Gambler Pursuit use their knowledge of probability and risk to attempt to master games of chance and build their fortune, or lose it all along the way.</p>

        <h3>Gambler's Aptitude</h3>

        <em><strong>Gambler Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency with your choice of gaming set and your choice of the Insight, Deception, Persuasion, or Sleight of Hand skills. Additionally, you can't have disadvantage on checks you make with them.</p>

        <h3>Risk versus Reward</h3>

        <em><strong>Gambler Pursuit:</strong> 3rd, 9th, 13th, and 17th level</em><br>

        <p>When you make your first attack on your turn against the target of your Critical Analysis feature, you can decide to gamble by rolling a d6. On a roll of 4 or higher, you have advantage on attack rolls against that creature until the start of your next turn. On a roll of 3 or lower, that creature instead has advantage on attack rolls against you until the start of your next turn.</p>

        <p>This die increases to d8 at 9th level, d10 at 13th level, and d12 at 17th level.</p>

        <h3>Lucky Number 7</h3>

        <em><strong>Gambler Pursuit:</strong> 6th level</em><br>

        <p>Whenever you roll a 7 on an attack roll against the target of your Critical Analysis feature, the attack automatically hits and you regain an expended superiority die. </p>

        <p>When attacking with advantage or disadvantage, this effect applies if either roll is a 7. If both rolls are a 7, the attack is a critical hit.</p>

        <h3>Tell Me the Odds</h3>

        <em><strong>Gambler Pursuit:</strong> 9th, 13th, and 17th level</em><br>

        <p>If the target of your Critical Analysis hits you with a weapon attack roll, you can use your reaction to roll a d8. On a 4 or higher, you impose disadvantage on the roll. If the target already had disadvantage, they must instead reroll one of the dice once (your choice).</p>

        <p>This die increases to d10 at 13th level and d12 at 17th level.</p>

        <h3>Borrowed Luck</h3>

        <em><strong>Gambler Pursuit:</strong> 17th level</em><br>

        <p>You have gained the ability to unnaturally alter luck in your favor. Once per round, after an attack roll, saving throw, or ability check is rolled by you or a creature that you can see, you can replace the number on the d20 with a 7. Note the number on the d20 of the roll that you replaced. That number becomes your borrowed luck roll.</p>

        <p>While you have a borrowed luck roll, you can expend it and replace any ability check, attack roll, or saving throw made by you or a creature that you can see with the value of the borrowed luck roll. You can only have one borrowed luck roll at a time, and you lose any </p>

        <p>unused borrowed luck rolls when you complete a short or long rest.</p>

        <h3>Gambler Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect your deep understanding of chance. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order. </p>

        <h4>Ace Up Your Sleeve</h4>

        <p>Whenever you make a Dexterity (Sleight of Hand) or Charisma (Deception) check, you can expend a superiority die, adding the result to your total for the check.</p>

        <h4>Against the House</h4>

        <p>Whenever you would make a Charisma (Persuasion) check involving haggling, you can instead challenge the target to a game of chance. If they accept your offer, you can make an ability check with an available gaming set. If you win the challenge, you automatically succeed on the Charisma (Persuasion) check.</p>

        <h4>Ante Up</h4>

        <p>When you roll initiative, are not surprised, and end up first in the initiative order, you can take one additional action on top of your regular action and a possible bonus action during your first turn in combat.</p>

        <h4>Calculated Bluff</h4>

        <p>When you make an ability check using Charisma, you can choose to instead make the check using your Intelligence or Wisdom modifier (your choice).</p>

        <h4>Cold Read</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>As an action, you may make a Wisdom (Insight) check contested by a target's Charisma (Deception) check. On a success, you know the next action the target intends to take, so long as the situation does not change dramatically.</p>

        <h4>Feeling the Pressure</h4>

        <em><strong>Prerequisite:</strong> 13th level</em><br>

        <p>Whenever you roll a 4 or higher on your Risk Versus Reward feature, the target of your Critical Analysis feature also has disadvantage on attack rolls made against you until the start of your next turn.</p>

        <h4>Take a Chance</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>Before making an attack roll, you can expend a superiority die. On a miss, you lose that superiority die and do not benefit from it in any way. On a hit, you can choose two other maneuvers that you know, and subject the target to both maneuvers, without expending additional superiority dice.</p>

        <h4>The Magic Number</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>Whenever you roll a 7 on an ability check or saving throw, you can reroll the ability check or saving throw with advantage.</p>



        <div class="sw5e-book-block"><h2>Physician Pursuit</h2></div>

        <p>Physicians study the medical, anatomical, and biological sciences. Those scholars who choose the Physician Pursuit use their knowledge to mend their allies on the field and deal crippling blows with surgical precision.</p>

        <h3>Medical Practitioner</h3>

        <em><strong>Physician Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency with biochemist's kits and your choice of the Medicine or Nature skills. Additionally, you can't have disadvantage on checks you make with them.</p>

        <h3>Remote Healer</h3>

        <em><strong>Physician Pursuit:</strong> 3rd level</em><br>

        <p>You have learned to deploy medicine from a range. When you use a maneuver targeting an ally that is the target of your Critical Analysis feature, that maneuver's range becomes 30 feet.</p>

        <h3>Field Surgeon</h3>

        <em><strong>Physician Pursuit:</strong> 6th and 11th level</em><br>

        <p>Whenever you expend superiority dice to restore hit points or grant temporary hit points to a creature, you can roll an additional d6 and add it to the roll. This die increases to d8 at 9th level, d10 at 13th level, and d12 at 17th level.</p>

        <p>Additionally, whenever you expend superiority dice to restore hit points or grant temporary hit points to a creature, if the creature is the target of your Critical Analysis, you can instead choose the maximum on both dice. Once you've used this feature, you must finish a short or long rest before you can use it again. Starting at 11th level, you can use it twice before a rest, but only once on the same turn.</p>

        <h3>Resuscitate</h3>

        <em><strong>Physician Pursuit:</strong> 9th level</em><br>

        <p>Through your medical studies you have learned to delay seemingly inevitable death. As a bonus action, you can stabilize a creature you can touch that has 0 hit points. </p>

        <p>Additionally, as an action, you can tend to a creature you can touch that has died since the end of your last turn. The creature immediately regains 1 hit point and stabilizes. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h3>Panacea</h3>

        <em><strong>Physician Pursuit:</strong> 17th level</em><br>

        <p>You've developed the formula to concoct a cure-all miracle solution: a panacea. Over the course of 10 minutes, you can expend rare medical supplies worth 1,000 cr to create your panacea in a simple syringe. The panacea retains its potency for 24 hours. As a bonus action, a creature can use the panacea. Alternatively, as an action, they can administer it to another creature within 5 feet.</p>

        <p>The target has its exhaustion level reduced by one and regains all of its hit points. If the target is diseased, poisoned, paralyzed, or stunned, the condition ends.</p>

        <p>&emsp;Once you create a panacea, you can't create another until you finish a long rest.</p>

        <img src='https://www.gmbinder.com/images/AUdzKBb.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:420px' />



        <h3>Physician Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect the progress of your studies into the medical arts. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order.</p>

        <h4>Advanced Remote Healer</h4>

        <em><strong>Prerequisite:</strong> 11th level</em><br>

        <p>The range of your Remote Healer feature increases to 60 feet.</p>

        <h4>Experimental Treatments</h4>

        <p>Your medication and treatments are known to be untested and unstable. Immediately after you use a maneuver that causes a creature to regain hit points or gain temporary hit points, you can choose to roll on the Side Effects table to the right. The condition or effect lasts until the creature completes a long rest, or you use this feature again.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain all expended uses when you finish a short or long rest.</p>

        <h4>From the Brink</h4>

        <em><strong>Prerequisite:</strong> 7th level</em><br>

        <p>If the target of your Critical Analysis feature would be reduced to 0 hp, you may use your reaction and end your Critical Analysis feature to have them be reduced to 1 hp instead. Once a creature has benefited from this feature, they must complete a long rest before they can do so again.</p>

        <h4>Health Advisor</h4>

        <p>Whenever a creature that is a target of your Critical Analysis feature begins their turn, you can use your reaction to give them temporary hit points equal to one-fourth your scholar level + your proficiency bonus, as shown in the scholar table, which last until the start of their next turn.</p>

        <h4>Patient Protector</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You can treat creatures within 5 feet of the target of your Critical Analysis feature as if they were also targets of your Critical Analysis.</p>

        <h4>Surgical Precision</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br> 

        <p>When you hit a creature that is the target of your Critical Analysis feature with a weapon attack, it takes additional damage equal to your Dexterity modifier.</p>

        <h4>Tend the Wounded</h4>

        <p>If you or any friendly creatures you can touch regain hit points by spending one or more Hit Dice at the end of a short rest, each of those creatures regain 1d4 extra hit points.</p>

        <p>This die increases when you reach certain levels in this class: 1d6 at 5th level, 1d8 at 9th level, 1d10 at 13th level, and to 1d12 at 17th level.</p>

        <h5>Side Effects</h5>

        <table class="sw5e-book-table"><thead><tr><th>d20</th><th>Side Effects</th></tr></thead><tbody><tr><td>1</td><td>The creature turns out to be allergic to this specific treatment. Every ability score is reduced by 1.</td></tr><tr><td>2</td><td>The creature starts sneezing uncontrollably. Any attack rolls with a die roll value of 19 results in a miss due to a poorly timed sneeze.</td></tr><tr><td>3</td><td>The creature's legs become swollen. The creature gains 1 slowed level.</td></tr><tr><td>4</td><td>The creature becomes one size larger or smaller.</td></tr><tr><td>5</td><td>The skin at their joints turns into a wooden material, giving them a bonus of +2 to AC.</td></tr><tr><td>6</td><td>The creature's body starts producing powerful stomach acid in high amounts. The creature can use an action to spew stomach acid in a 15 feet cone. The DC for this saving throw equals 8 + your proficiency bonus + your Constitution modifier. A creature takes 2d6 acid damage on a failed save, and half as much damage on a successful one. The damage increases to 3d6 at 5th level, 4d6 at 11th level, and 5d6 at 17th level.</td></tr><tr><td>7</td><td>The creature becomes mute and has uncontrollable gas. They have disadvantage on Dexterity (Stealth) checks that rely on smell.</td></tr><tr><td>8</td><td>The creature's eyes glows bright red. The creature also gains darkvision, but if they already have darkvision they get a light headache instead.</td></tr><tr><td>9</td><td>The creature gains advantage on perception checks based on hearing, but everything seems uncomfortably loud to them. They gain vulnerability to sonic damage.</td></tr><tr><td>10</td><td>The treatment slows down their brain function, reducing their Intelligence by 4.</td></tr><tr><td>11</td><td>The creature's skin turns dark purple. If they are already purple, they turn bright pink instead.</td></tr><tr><td>12</td><td>The creature becomes covered in sickly, green pustules. When the creature is hit by a melee attack, the attacker takes 1d4 poison damage.</td></tr><tr><td>13</td><td>The creature's skin starts to seriously bloat up from internal pressure build-up, and a strong impact may cause it to explode. Whenever the creature takes damage, the creature has to pass a concentration check or the creature takes kinetic damage equal to half their maximum hit points. Other creatures within 10 feet of the explosion also take a fourth of the damage. Once this explosion occurs, their skin becomes very soft.</td></tr><tr><td>14</td><td>The creature rapidly grows body hair all over, including the face, until they resemble a wookiee. If they are already a wookiee, the reverse effect occurs; all hair immediately falls off, leaving the skin bare.</td></tr><tr><td>15</td><td>The creature's body temperature fluctuates to extremes. They gain resistance to cold and fire damage.</td></tr><tr><td>16</td><td>The creature becomes ravenous. Every hour they haven't eaten a meal they gain a level of exhaustion.</td></tr><tr><td>17</td><td>The creature believes they are the chosen one.</td></tr><tr><td>18</td><td>The creature has a difficult time resting. The amount they heal from Hit Dice is now halved.</td></tr><tr><td>19</td><td>The creature's movement speed is increased by 15 feet, and opportunity attacks on them have disadvantage.</td></tr><tr><td>20</td><td>The creature gains 10d10 hit points, and they feel happy and carefree.</td></tr></tbody></table>



        <div class="sw5e-book-block"><h2>Politician Pursuit</h2></div>

        <p>Politicians study social &amp; political sciences. Those scholars who choose the Politician Pursuit know how to best present themselves to manipulate the masses into doing their bidding or allow them and their allies to carry out their business without impediment. They also understand the importance of self-preservation for a political figure.</p>

        <h3>Silver Tongue</h3>

        <em><strong>Politician Pursuit:</strong> 3rd level</em><br>

        <p>You learn your choice of two languages and your choice of Charisma skill. Additionally, you can't have disadvantage on checks you make with it.</p>

        <h3>Motivating Diplomat</h3>

        <em><strong>Politician Pursuit:</strong> 3rd level</em><br>

        <p>When you are the target of your Critical Analysis feature, you and all allies within 10 feet of you gain a bonus to their AC equal to half your Critical Analysis ability modifier.</p>

        <h3>Force of Personality</h3>

        <em><strong>Politician Pursuit:</strong> 6th level</em><br>

        <p>As an action, you suggest a course of activity (limited to a sentence or two) to influence a creature you can see within range that can hear and understand you. Creatures that can't be charmed are immune to this effect. The suggestion must be worded in such a manner as to make the course of action sound reasonable. Asking the creature to stab itself, throw itself onto a spear, immolate itself, or do some other obviously harmful act ends the effect.</p>

        <p>The target must make a Wisdom saving throw against your maneuver save DC. On a failed save, the target is charmed by you, and it pursues the course of action you described to the best of its ability. The suggested course of action can continue for up to 24 hours. If the suggested activity can be completed in a shorter time, the effect ends when the subject finishes what it was asked to do.</p>

        <p>You can also specify conditions that will trigger a special activity during the duration. For example, you might suggest that an officer givers her gun to the first smuggler she meets. If the condition isn't met before the effect ends, the activity isn't performed.</p>

        <p>If you or any of your companions damage the target, the effect ends.</p>

        <p>You can use this feature three times. You gain an additional use at 9th, 13th, and 17th level. You regain all expended uses when you finish a long rest.</p>

        <h3>Reassemble</h3>

        <em><strong>Politician Pursuit:</strong> 9th level</em><br>

        <p>You may use to a bonus action to call your allies towards you. When you do so, choose a number of creatures that you can see within 60 feet of you equal to your Critical Analysis ability modifier (minimum of one). They can use their reaction to immediately move a number of feet equal to their speed. This movement does not provoke opportunity attacks, and they must end this movement closer to you than they started.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again. </p>

        <h3>Beguiling Presence</h3>

        <em><strong>Politician Pursuit:</strong> 17th level</em><br>

        <p>Humanoids within 60 feet are particularly susceptible to your presence. Humanoids within range have disadvantage on saving throws against any charm or fear effects that originate from you. </p>

        <h3>Politician Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect the progress of your studies into the political world. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order.</p>

        <h4>Charming Feint</h4>

        <p>Allies within range of your Motivating Diplomat feature also gain a bonus to their damage rolls equal to half your Critical Analysis ability modifier.</p>

        <h4>Demanding Leader</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br> 

        <p>The range of each of your maneuvers increases by 10 feet. If the range is touch, it becomes 10 feet.</p>

        <h4>Dominating Presence</h4>

        <em><strong>Prerequisite:</strong> 15th level</em><br>

        <p>As a bonus action, you can call out to a humanoid who can understand you that is charmed by you or frightened of you to direct their next action. The target must succeed a Wisdom saving throw against your maneuver save DC. On a failed save, until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do.</p>

        <p>During this time you can use your reaction to force the creature to use its reaction.</p>

        <p>Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <h4>Influencer</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>The range on the your Motivating Diplomat feature is increased to 15 feet. </p>

        <h4>Reliable Words</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>When you make a Deception, Intimidation, or Persuasion skill check, you may treat any roll 9 or lower as if you had rolled a 10.</p>

        <h4>Social Opportunist</h4>

        <p>You can add half your proficiency bonus to any Charisma check you make that doesn't already include your proficiency bonus.</p>

        <h4>Tyrant's Ferocity</h4>

        <p>You have advantage on any attack against a creature that is charmed by you or frightened of you.</p>



        <div class="sw5e-book-block"><h2>Tactician Pursuit</h2></div>

        <p>Tacticians study strategy and the ways of war. Those scholars who choose the Tactician Pursuit train themselves and their allies in combat maneuvers to deftly eliminate their foes through clever positioning, and fierce, timely attacks.</p>

        <h3>Battle Display</h3>

        <em><strong>Tactician Pursuit:</strong> 3rd level</em><br>

        <p>You gain proficiency in martial blasters and martial vibroweapons. </p>

        <h3>Tactical Mastery</h3>

        <em><strong>Tactician Pursuit:</strong> 3rd level</em><br>

        <p>You learn to better command your allies to victory from afar. Your Critical Analysis range is increased to 90 feet. </p>

        <h3>Fire as One</h3>

        <em><strong>Tactician Pursuit:</strong> 6th level</em><br>

        <p>You can focus your target down with the help with an ally. Once per round, whenever the creature that is the target of your Critical Analysis feature is attacked by someone other than you, you can use your reaction to make one weapon attack against them. </p>

        <h3>Battlefield Survey</h3>

        <em><strong>Tactician Pursuit:</strong> 9th level</em><br>

        <p>You become a master at leading your allies around in a battlefield you have studied. When you spend 10 minutes observing an area that is within 120 feet from you, or by using a detailed map, select a number of creatures up to your Critical Analysis ability modifier. You and those selected allies ignore unenhanced difficult terrain, and have advantage on Dexterity (Stealth) checks in that area. </p>

        <h3>All-Out Attack</h3>

        <em><strong>Tactician Pursuit:</strong> 17th level</em><br>

        <p>You can use your action to initiate an all-out attack. Choose a number of allies up to your Critical Analysis ability modifier within 60 feet who can see or hear you. The chosen allies may then immediately use their reaction to make one weapon attack against a target of your choice. You may choose the target for each attack separately.</p>

        <p>Once you use this feature, you cannot use it again until you finish a short or long rest.</p>

        <h3>Tactician Discoveries</h3>

        <p>When you select this pursuit, you gain access to new discoveries which reflect your mastery in the field of combat. Whenever you learn a new discovery, you can choose from any of the following as well. The discoveries are listed in alphabetical order.</p>

        <h4>Commander's Armor</h4>

        <em><strong>Prerequisite:</strong> 5th level</em><br>

        <p>You gain proficiency in medium armor. If you are already proficient in medium armor, you instead gain proficiency in heavy armor.</p>

        <h4>Contingency Plan</h4>

        <em><strong>Prerequisite:</strong> 9th level</em><br>

        <p>When the target of your Critical Analysis feature scores a critical hit, you can use your reaction and expend a superiority die to treat the attack as a normal hit instead.</p>

        <h4>Fighting Style</h4>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting style options, detailed in Chapter 6. </p>

        <h4>Firing Command</h4>

        <p>You can take the Help action as a bonus action. Additionally, when you take the Help action to assist an ally attacking the target of your Critical Analysis, it has a range of 30 feet.</p>

        <h4>Observant Leader</h4>

        <p>You have advantage Wisdom (Perception) checks that rely on sight.</p>

        <h4>Studied Commander</h4>

        <p>When you make an Intelligence (Lore) or Intelligence (Technology) check related to battles, tactics, or weaponry, you may expend a superiority die and add it to the roll.</p>

        <h4>Tactical Retreat</h4>

        <p>When you take the Dash action, opportunity attacks made against you are made at disadvantage.</p>

        <h4>Unbound Commander</h4>

        <em><strong>Prerequisite:</strong> 12th level</em><br>

        <p>You learn to command your allies to victory from afar. Your Critical Analysis range is increased to 120 feet. </p>

        <img src='https://www.gmbinder.com/images/N4eG6QM.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:500px' />



        <h2>Scout</h2>

        <span style="font-variant: small-caps">Rough and grizzled looking, a human stalks alone through</span> the shadows of trees, hunting the quarry he knows is planning a raid on a nearby settlement. Clutching a techblade in each hand, he becomes a whirlwind of steel, cutting down one enemy after another.

        After tumbling away from the shrapnel of a missile's<br> explosion, a bothan finds her feet and quick-fires two<br> shots from her carbine at the oncoming tank.<br> Shrugging off the wave of fear that threatens to<br> permeate her entire being, she strafes around her foe,<br> firing shot after shot to try to penetrate the tank's thick<br> armor.

        <p>Glancing at his wristpad, a sullustan looks through the eyes of his tracker droid. Transmitting instructions, he sends his droid to distract the houk he's been tracking while he readies his sniper rifle for the shot.</p>

        <p>Scouts are the first on the trail and the last to lose it, tracking their quarry for miles unimpeded. They are adaptable, wielding both tech powers and their weaponry to overcome their foes.</p>



        <h3>Deadly Hunters</h3>

        <p>Warriors in their own right, scouts specialize in tracking and hunting the monsters that threaten civilization�humanoid raiders, rampaging beasts and monstrosities, terrible Force-wielders, and renegade droids. They learn to track their quarry as a predator does, moving stealthily through any terrain and hiding themselves in brush and rubble. Scouts focus their combat training on techniques that are particularly useful against their specific favored foes.</p>

        Scouts acquire the ability to cast tech powers<br> through utilization of a wristpad. Their powers, like<br> their combat abilities, emphasize speed, stealth, and<br> the hunt. A scout's talents and abilities are honed with<br> deadly focus on the grim task of protecting the<br> civilization.



        <h3>Independent Adventurers</h3>

        <p>Though a scout might make a living as a bounty hunter, a guide, or a tracker, a scout's true calling is to defend civilization from the ravages of monsters and humanoid hordes that press in. In some places, scouts gather in secretive orders, though many scouts are independent almost to a fault, knowing that, when a rancor or a band of pirates attacks, a scout might be the first�and possibly the last�line of defense. This fierce independence makes scouts well suited to adventuring, since they are accustomed to life far from the comforts of a dry bed and a hot bath. Faced with city-bred adventurers who grouse and whine about the hardships of the wild, scouts respond with some mixture of amusement, frustration, and compassion. But they quickly learn that other adventurers who can carry their own weight in a fight against civilization's foes are worth any extra burden. Coddled city folk might not know how to feed themselves or find fresh water in the wild, but they make up for it in other ways.</p>



        <img src='https://www.gmbinder.com/images/8Nj1Jxq.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:386px' />

        <h3>Creating a Scout</h3>

        <p>As you create your scout character, consider the nature of the training that gave you your particular capabilities. Did you train with a single mentor, tracking together until you mastered the scout's ways? Did you leave your apprenticeship, or was your mentor slain�perhaps by some kind of bestial monstrosity on which you've sworn revenge? Or perhaps you learned your skills as part of a band of mercenaries. </p>

        <p>What's the source of your particular hatred of a certain kind of enemy? Did a monster kill someone you loved or destroy your home village? Or did you see too much of the destruction these monsters cause and commit yourself to reining in their depredations? Is your adventuring career a continuation of your work, or a significant change?</p>

        <p>What made you join up with a band of adventurers? Do you find it challenging to teach new allies the ways of the wild, or do you welcome the relief from solitude that they offer?</p>

        <h4>Quick Build</h4>

        <p>You can make a scout quickly by following these suggestions. First, make Strength or Dexterity your highest ability modifier, depending on whether you want to focus on melee combat or on ranged weapons (or finesse weapons). Your next-highest score should be Intelligence. Second, choose the bounty hunter background.</p>



