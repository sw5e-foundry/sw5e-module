        <h4>Ace Pilot</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Piloting</em><br>

        <p>When you make an Piloting check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Acrobat</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Acrobatics</em><br>

        <p>When you make an Acrobatics check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Administer Aid</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>As an action, you can expend a superiority die to tend to a creature you can touch. The creature regains a number of hit points equal to the number rolled + your maneuver ability modifier.</p>

        <h4>Administer Aid (Greater)</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Administer Aid (Improved) <em>maneuver</em><br>

        <p>You can use your Administer Aid maneuver as an action, bonus action, or reaction on your turn.</p>

        <h4>Administer Aid (Improved)</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Administer Aid <em>maneuver</em><br>

        <p>You can use your Administer Aid maneuver as an action or bonus action.</p>

        <h4>Adrenaline Hit</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>You can use an action and expend one superiority die to inject a creature with regenerative medication that temporarily enhances their agility. When you do so, a creature you can touch regains hit points equal to the superiority die roll. Additionally, until the start of your next turn, when that creature would take damage, the amount is reduced by an amount equal to your maneuver ability modifier.</p>

        <h4>All In</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>When you make an attack roll, and the result is less than 20, you can expend a superiority die and roll it, adding it to the roll. If the resulting sum is 20 or 23, the attack is considered a critical hit.</p>

        <h4>Animal Handler</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Animal Handling</em><br>

        <p>When you make an Animal Handling check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Assess the Situation</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>You can expend one superiority die to make a Wisdom (Perception) or Intelligence (Investigation) check as a bonus action, adding the superiority die to the check.</p>

        <h4>Automatic Startup Sequence</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>

        <p>When a creature makes a saving throw against a tech power you cast, you may expend a superiority die, subtracting the number rolled from their total. You can use this maneuver before or after the creature makes saving throw, but before the GM determines whether or not the creature fails.</p>

        <h4>Blind Luck</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When you fail an ability check, you can expend a superiority die. If the result of your ability check plus the superiority die is within a range equal to half your proficiency bonus above or below the check's DC, you pass the check instead. </p>

        <h4>Brawny</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Athletics</em><br>

        <p>When you make an Athletics check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Body Over Bother</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you are forced to make an Strength, Dexterity, or Constitution saving throw, you can expend a superiority die to change the saving throw ability to your maneuver ability modifier.</p>

        <h4>Calling Card</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>As a bonus action, you can expend a superiority die to throw a sonic charge at a target you can see within 30 feet. When you do so, the target and each creature of your choice within 5 feet of it must make Dexterity saving throws, taking sonic damage on a failure. The sonic damage equals the number rolled on the superiority die. </p>

        <h4>Call the Guards</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>When a creature makes an attack roll against you, you can use your reaction and expend a superiority die and command a willing ally within 5 feet of that creature to use their reaction to intercede. The creature is then forced to make an attack on the ally instead. If the attack misses, the ally can immediately make a weapon attack against that creature as a part of that same reaction. Roll the superiority die, and add the result to the ally's attack roll.</p>



        <h4>Call to Arms</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>If you are surprised at the start of combat and aren't incapacitated, you can expend one superiority die to act normally.</p>

        <h4>Call to Arms (Improved)</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Call to Arms (Improved)<br> &emsp;<em>maneuver</em><br>

        <p>When you use your Call to Arms maneuver, you can roll the superiority die and extend the benefits of the maneuver to a number of allies up to the result of the roll, provided those allies can see or hear you.</p>

        <h4>Charge</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>As a bonus action on your turn, you can expend one superiority die to spurn your allies to move. Until the start of your next turn, creatures you choose within 10 feet of you who can see or hear you can move an additional distance equal to 5 times the superiority die rolled on their turn and ignore unenhanced difficult terrain.</p>

        <h4>Charging Attack</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>If you move at least 10 feet towards your target before successfully hitting them with a melee attack, you may expend a superiority die, causing the target to take additional damage equal to the result, and forcing it to make a Strength saving throw. On a failed save the creature is knocked prone.</p>

        <h4>Charmer</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>When you make an Persuasion check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Charming Presence</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>As an action, you can make a Charisma (Persuasion) check and expend one superiority die to attempt to charm a humanoid creature who can see or hear you within 60 feet. Add the superiority die to the roll. The target makes a contested Wisdom (Insight) check. If your check succeeds, the target is charmed by you until the end of your next turn.</p>

        <h4>Commander's Strike</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you take the Attack action on your turn, you can forgo one of your attacks and use a bonus action to direct one of your companions to strike. When you do so, choose a friendly creature who can see or hear you and expend one superiority die. That creature can immediately use its reaction to make one weapon attack, adding the superiority die to the attack's damage roll.</p>

        <h4>Commander's Strike (Greater)</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Commander's Strike (Improved)<br> &emsp;<em>maneuver</em><br>

        <p>When you use the Commander's Strike maneuver, you can choose to forgo an attack or use your bonus action, rather than both. All the other rules of Commander's Strike still apply to you.</p>

        <h4>Commander's Strike (Improved)</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Commander's Strike <em>maneuver</em><br>

        <p>When you use the Commander's Strike maneuver, you no longer have to forgo an attack as a part of that maneuver. All the other rules of Commander's Strike still apply to you.</p>

        <h4>Covering Fire</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When you hit a creature with a ranged weapon attack, you can expend one superiority die to maneuver one of your comrades into a more advantageous position. You add the superiority die to the attack's damage roll, and you choose a friendly creature who can see or hear you. </p>

        <p>That creature can use its reaction to move up to half its speed without provoking opportunity attacks from the target of your attack.</p>

        <h4>Crippling Blow</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to cripple the creature. You add the superiority die to the attack's damage roll and the creature's gains 1 slowed level until the end of their next turn.</p>

        <h4>Daring Escape</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>You can expend one superiority die to take the Disengage action as a bonus action on your turn. Until the end of this turn, you have advantage on ability checks and saving throws to break effects that would grapple, restrain or slow you.</p>

        <h4>Deliberate Movement</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>You can expend one superiority die to take the Dash action as a bonus action and ignore the effects of standard difficult terrain until the end of your turn.</p>

        <h4>Disarming Blow</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to attempt to disarm the target, forcing it to drop one item of your choice that it's holding. You add the superiority die to the attack's damage roll, and the target must make a Strength saving throw. On a failed save, it drops the object you choose. If you have a free hand and are within 5 feet of the creature, you can catch the item. Otherwise, the object lands at the creature's feet.</p>



        <h4>Distracting Blow</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to distract the creature, giving your allies an opening. You add the superiority die to the attack's damage roll. The next attack roll against the target by an attacker other than you has advantage if the attack is made before the start of your next turn.</p>

        <h4>Double Bluff</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>If on the same round of combat that you have missed a weapon attack, an enemy also misses you with a weapon attack, you can expend a superiority die and make a single weapon attack, adding the results of your superiority die to both the attack and damage rolls.</p>

        <h4>Effective Flanking</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>As a bonus action, you choose a target within 30 feet that you can see to make a Wisdom saving throw. On a failed save, roll a superiority die; the result is added to both the attack and damage roll for the first attack against the creature before the start of your next turn.</p>

        <h4>Effective Flanking (Greater)</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Effective Flanking (Improved)<br> &emsp;<em>maneuver</em><br>

        <p>When you use the Effective Flanking maneuver, you add your maneuver ability modifier to both the attack and damage roll for the first attack against the creature before the start of your next turn.</p>

        <h4>Effective Flanking (Improved)</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Effective Flanking <em>maneuver</em><br>

        <p>When you use the Effective Flanking maneuver, you add your maneuver ability modifier to either the attack or damage roll (your choice) for the first attack against the creature before the start of your next turn.</p>

        <h4>Emergency Prescription</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>As an action, you can expend one superiority die and touch a creature. That creature regains hit points equal to result of the die + your maneuver ability modifier, and when that creature makes their first ability check, attack roll, or saving throw before the start of your next turn they roll the superiority die and add it to the roll.</p>

        <h4>Empathic</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Insight</em><br>

        <p>When you make an Insight check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Encouraging Pace</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>You can use a bonus action to expend a superiority die. When you do so, a number of friendly creatures equal to your maneuver ability modifier can immediately use their reaction to move a number of feet equal to 5 times the number rolled on the superiority die.</p>

        <h4>Encouraging Speech</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>You can expend a superiority die to give an encouraging speech, spending the next minute rallying your allies. You grant a number of creature up to your maneuver ability modifier temporary hit points equal to the amount rolled on the superiority die + your proficiency bonus, as shown in the scholar table.</p>

        <h4>Enhancement Injection</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>As an action, you can expend one superiority die to inject a creature you can touch with enhancements, granting them temporary hit points equal to the superiority die roll + your maneuver ability modifier, which last for 1 minute. Additionally, when the target makes a Strength or Constitution check or saving throw while it has these temporary hit points, it gains a bonus equal to your maneuver ability modifier.</p>

        <h4>Exploit Weakness</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend a superiority die and deal additional true damage equal to the number rolled. </p>

        <h4>Evasive Footwork</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>When you move, you can expend one superiority die, rolling the die and adding the number rolled to your AC until you stop moving.</p>

        <h4>Fast Access Programs</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>

        <p>When you cast a tech power of 1st-level or higher that has a casting time of 1 action, you can expend a superiority die to change the casting time to 1 bonus action for this casting.</p>

        <h4>Feinting Attack</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>You can expend one superiority die and use a bonus action on your turn to feint, choosing one creature within 5 feet of you as your target. You have advantage on your next attack roll against that creature this turn. If that attack hits, add the superiority die to the attack's damage roll.</p>

        <h4>Firewall</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>

        <p>When you or an ally you can see within 60 feet make a saving throw against a tech power, you can use your reaction to expend a superiority die, adding the number rolled to the result of that saving throw.</p>



        <h4>Force Resonance</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <p>Immediately after you deal damage to a target with a force attack, you can expend a superiority die and target a second creature that you can see within 30 feet of the first creature. Roll the die, and the second creature takes force damage equal to the roll + your forcecasting modifier. </p>

        <h4>Fortune and Glory </h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <p>When you would make a weapon attack against a target within 30 feet, you can instead manipulate the Force to expend a superiority die and make a Sleight of Hand check using your universal forcecasting ability to plant something on the target, conceal an object on the target, lift the target's purse, or take something from its pocket. Roll the superiority die, and add the result to the check.</p>

        <h4>Goading Attack</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to attempt to goad the target into attacking you. You add the superiority die to the attack's damage roll, and the target must make a Wisdom saving throw. On a failed save, the target has disadvantage on all attack rolls against targets other than you until the end of your next turn.</p>

        <h4>Heads Up</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When a friendly creature who can see or hear you makes a saving throw, you can use your reaction and expend a superiority die, adding the number rolled to the result of the saving throw. You can use this maneuver before or after making the saving throw, but before any effects of the saving throw are determined.</p>

        <h4>Hacked Communications</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Technology</em><br>

        <p>As an action, you may expend a superiority die, and choose any number of creatures that you can see within 60 feet of you that have commlinks, headcomms, or other such communications devices. Each creature must succeed on a Constitution saving throw or take sonic damage equal to the number rolled on the dice + your maneuver ability modifier (minimum of one). Additionally, on a failed save, their communication devices are disabled until rebooted.</p>

        <h4>Incite</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>On your turn, you can use an action and expend one superiority die to bolster the resolve of one of an ally. When you do so, choose an ally who can see or hear you within 30 feet of you. The ally can add your maneuver ability modifier to every damage roll they make until the start of your next turn. </p>

        <h4>Inner Strength</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>As an action, you can expend and roll one superiority die, gaining temporary hit points equal to the result of the roll + your maneuver ability modifier.</p>

        <h4>Intimidating Presence</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Intimidation</em><br>

        <p>As an action, you can make a Charisma (Intimidation) check and expend one superiority die to attempt to frighten a humanoid creature who can see or hear you within 60 feet. Add the superiority die to the roll. The target makes a contested Wisdom (Insight) check. If your check succeeds, the target is frightened of you until the end of your next turn.</p>

        <h4>Investigator</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Investigation</em><br>

        <p>When you make an Investigation check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Loremaster</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Lore</em><br>

        <p>When you make an Lore check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Lunging Attack</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you make a melee weapon attack on your turn, you can expend one superiority die to increase your reach for that attack by 5 feet. If you hit, you add the superiority die to the attack's damage roll.</p>

        <h4>Maneuvering Attack</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to maneuver one of your comrades into a more advantageous position. You add the superiority die to the attack's damage roll, and you choose a friendly creature who can see or hear you. </p>

        <p>That creature can use its reaction to move up to half its speed without provoking opportunity attacks from the target of your attack.</p>

        <h4>Measured Action</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>As a reaction when you make a roll for a contested ability check, you can expend a superiority die to add to the roll. You can use this maneuver before or after making the contested ability check roll, but before any effects of the contested ability check are determined.</p>



        <h4>Medic</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>When you make an Medicine check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Menacing Attack </h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to attempt to frighten the target. You add the superiority die to the attack's damage roll, and the target must make a Wisdom saving throw. On a failed save, it is frightened of you until the end of your next turn.</p>

        <h4>Mind Over Matter</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When you are forced to make an Intelligence, Wisdom, or Charisma saving throw, you can expend a superiority die to change the saving throw ability to your maneuver ability modifier.</p>

        <h4>Naturalist</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Nature</em><br>

        <p>When you make an Nature check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Neuroblock</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>When you make an attack roll, you can expend a superiority die and add it to the attack roll. On a hit, the creature's next attack has disadvantage and it cannot regain hit points until the start of your next turn.</p>

        <h4>No Escape</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>Whenever you or a creature you can see makes an opportunity attack, you can expend a superiority die. If the attack hits, roll the superiority die and add the result to the damage roll. Additionally, the affected creature gains 4 slowed levels until the start of its next turn.</p>

        <h4>One with the Force</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <p>Once per turn, when you make a Constitution saving throw to maintain concentration on a force power, you can expend a superiority die and add the number rolled to the saving throw.</p>

        <h4>One Step Ahead</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you roll initiative and you are not surprised, you can expend a superiority die and add the number rolled to your initiative.</p>

        <h4>One With Shadows</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>When you are in an area of dim light or darkness, you can use your action and expend one superiority die to become invisible until you move or take a hostile action.</p>

        <h4>Overcapacity Powers</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>

        <p>When you cast a tech power of 1st-level or higher, you may expend a superiority die to cast the power at a higher level, provided it does not exceed your Maximum Power Level. Roll the superiority die, and add it to the level at which you are casting the power. You can choose to cast it at this new power level or lower.</p>

        <h4>Overwhelming Wit</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <p>Once per round, when a creature succeeds on a force power you cast or your class feature that requires a Wisdom or Charisma saving throw, you can expend a superiority die to make a universal forcecasting ability check with proficiency, substituting the result of the roll for the save DC for that power.</p>

        <h4>Parry</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When another creature damages you with a melee attack, you can use your reaction and expend one superiority die to reduce the damage by the number you roll on your superiority die + your maneuver ability modifier.</p>

        <h4>Parry (Improved)</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Parry <em>maneuver</em><br>

        <p>Parry becomes a general maneuver for you.</p>

        <h4>Penetrating Shot</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you hit a creature with a ranged weapon attack, you can expend one superiority die to attempt to damage another creature with the same attack. Choose up to two creatures within 15 feet of and directly behind your initial target. If the original attack roll would hit the second creature(s), it takes damage equal to the number you roll on your superiority die.</p>

        <p>The damage is of the same type dealt by the original attack.</p>

        <h4>Perceptive</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Perception</em><br>

        <p>When you make an Perception check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>



        <h4>Performer</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Performance</em><br>

        <p>When you make an Performance check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Played Their Hand</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When a creature hits you with an opportunity attack while within 5 feet of you, you can use your reaction and expend a superiority die to impose disadvantage on the attack roll. If the attack misses, you can make a Dexterity (Sleight of Hand) check contested by the attacker's Strength (Athletics) or Dexterity (Acrobatics) check (their choice) as a part of this reaction. On a success, the target drops the weapon it made the attack with. If you are within 5 feet of the target, and you have a free hand, you can catch the item. Otherwise, the object lands at its feet.</p>

        <h4>Precise Movements</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>When you or a friendly creature you can see that can see or hear you moves, you can expend a superiority die to give them verbal guidance and encouragement. Roll a superiority die. The creature's speed increases by 5 times the number rolled, and they can move through the space of hostile creatures as if it were difficult terrain.</p>

        <h4>Precision Attack</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>When you make a weapon attack roll against a creature, you can expend one superiority die to add it to the roll. You can use this maneuver before or after making the attack roll, but before any effects of the attack are applied.</p>

        <h4>Pure Sabacc </h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you score a critical hit with a weapon attack, you can expend a superiority die and roll it. On a roll of 4 or higher, you deal maximum damage on the weapon's damage roll, including the superiority die. On a roll of 3 or lower, you instead deal the minimum.</p>

        <h4>Pushing Attack</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to attempt to drive the target back. You add the superiority die to the attack's damage roll, and if the target is Large or smaller, it must make a Strength saving throw. On a failed save, you push the target up to 15 feet away from you.</p>

        <h4>Quick-Fingered</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Sleight of Hand</em><br>

        <p>When you make an Sleight of Hand check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Raise the Stakes</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>Whenever a creature makes an attack roll against you, you can use your reaction to expend a superiority die. Roll the die and subtract the result from the enemy's attack roll, but add the result to their damage roll on a hit.</p>

        <h4>Rally</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>On your turn, you can use a bonus action and expend one superiority die to bolster the resolve of one of your companions. When you do so, choose a friendly creature who can see or hear you. That creature gains temporary hit points equal to the superiority die roll + your maneuver ability modifier.</p>

        <h4>Rampage</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you reduce a creature to 0 hit points, you can use your bonus action to expend a superiority die and move up to half your speed. If you end this movement within 5 feet of a creature, you can make a single melee weapon attack against that creature, adding the result of the superiority die to the attack roll.</p>

        <h4>Rattle</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Intimidation</em><br>

        <p>On your turn, when you hit with a weapon attack, you can use a bonus action and expend and roll one superiority die to menace your target, dealing extra psychic damage equal to to the amount rolled and forcing it to succeed on a Wisdom saving throw or be frightened of you until the end of your next turn. As an action, the creature can make a Wisdom check to steel its resolve and end this condition.</p>

        <h4>Reassure</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>As an action, you can expend a superiority die and call out to a creature within 60 feet that can see or hear you that is charmed, frightened, or stunned. When you do so, that creature immediately makes another saving throw, adding the amount rolled to the save.</p>

        <h4>Remove Toxins</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>As an action, you can expend a superiority die to purge the toxins from a creature you can touch. The target regains hit points equal to the number rolled and, if it is poisoned or diseased, you neutralize the poison or disease. If more than one poison or disease afflicts the target, you neutralize one poison or disease that you know is present, or you neutralize one at random.</p>

        <h4>Return Fire</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When a creature misses you with a ranged attack, you can use your reaction and expend one superiority die to make a ranged weapon attack against the creature. If you hit, you add the superiority die to the attack's damage roll.</p>



        <h4>Riposte</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When a creature misses you with a melee attack, you can use your reaction and expend one superiority die to make a melee weapon attack against the creature. If the attack hits, you add the superiority die to the attack's damage roll.</p>

        <h4>Riposte (Improved)</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Riposte <em>maneuver</em><br>

        <p>When a creature misses an ally within 30 feet you can see with a melee attack, and that ally can see or hear you, you can expend one superiority die (no action required), and the chosen ally use their reaction to make a melee weapon attack against the creature. If the attack hits, the ally adds the superiority die to the attack's damage roll.</p>

        <h4>Runtime Extension</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>

        <p>When a tech power you cast with a duration of 1 minute or longer reaches the end of its duration, you may expend a superiority die to extend the duration of the power a number of rounds equal to the number rolled on your superiority die.</p>

        <h4>Self-Preservation</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>As a reaction when you make a saving throw against an effect you can see, you can expend a superiority die and add the result. You can use this maneuver before or after making the saving throw, but before any effects of the saving throw are determined.</p>

        <h4>Short Round</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <p>When you cast a force power of 1st-level or higher that has a casting time of 1 action, you can expend a superiority die to change the casting time to 1 bonus action for this casting.</p>

        <h4>Silver-Tongued</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Deception</em><br>

        <p>When you make an Deception check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Steady the Nerves</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Persuasion</em><br>

        <p>As an action, you can expend one superiority die to strengthen your allies' defenses. Roll a superiority die. Until the end of your next turn, you and all allies within 5 feet of you when you use this action has a bonus to any saving throws they make equal to amount rolled.</p>

        <h4>Stealthy</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Stealth</em><br>

        <p>When you make an Stealth check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Strikeforce </h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <p>When you make a melee weapon attack against a creature, you can expend one superiority die and add the number rolled to the attack roll. On a hit, the target takes additional force damage equal to the number rolled. </p>

        <h4>Subtle Execution</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast tech powers</em><br>

        <p>When you cast a tech power, you may expend a superiority die to cast the power without any visual or auditory cues. Creatures have disadvantage on any Intelligence (Investigation) or Wisdom (Perception) checks made to determine if you were the caster.</p>

        <h4>Survivalist</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Survival</em><br>

        <p>When you make an Survival check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Sweeping Attack</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you hit a creature with a melee weapon attack, you can expend one superiority die to attempt to damage another creature with the same attack. Choose another creature within 5 feet of the original target and within your reach. If the original attack roll would hit the second creature, it takes damage equal to the number you roll on your superiority die. The damage is of the same type dealt by the original attack.</p>

        <h4>Sweeping Attack (Improved)</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong></em> Sweeping Attack <em>maneuver</em><br>

        <p>When you use the Sweeping Attack maneuver, you add your maneuver ability modifier to the damage roll of the second creature.</p>

        <h4>Targeted Strike</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <p>When an ally makes an attack against a creature, you can use your reaction to expend a superiority die. You add the superiority die to the attack roll, and the damage roll if it hits. You can use this maneuver before or after the attack roll, but before the GM determines whether or not the attack hits.</p>



        <h4>Techie</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Technology</em><br>

        <p>When you make an Technology check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Tenacity</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>As a bonus action, you can expend and roll a superiority die and move to an unoccupied space you can see up to a distance equal to 5 x the result of the roll. If you begin this movement hidden from a creature, and you end this movement in a space that could be hidden from the creature, this movement does not reveal your presence to that creature.</p>

        <h4>Threatening</h4>

        <em><strong>General maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Intimidation</em><br>

        <p>When you make an Intimidation check, you can expend a superiority die, rolling the die and adding it to the d20 roll. You can wait until after rolling the d20 before doing so, but you must decide before the GM says whether the roll succeeds or fails.</p>

        <h4>Trip Attack</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die to attempt to knock the target down. You add the superiority die to the attack's damage roll, and if the target is Large or smaller, it must make a Strength saving throw. On a failed save, you knock the target prone.</p>

        <h4>Tyrannical Strike</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency with Intimidation</em><br>

        <p>When you hit a creature with a weapon attack, you can expend one superiority die and use your reaction to issue a one-word command to a creature who can see or hear you. You add the superiority die to the attack's damage roll, and the target must succeed on a Wisdom saving throw. On a failed save, the target must follow the command on its next turn. </p>

        <p>The target automatically succeeds if it is immune to charm, it doesn't understand your language, or if your command is directly harmful to it.</p>

        <h4>Unrelenting Grasp</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Athletics</em><br>

        <p>When you hit a creature within 5 feet of you with an opportunity attack, you may expend a superiority die. The creature takes additional damage equal to your superiority die, and you may attempt to grapple the target as part of the same reaction.</p>

        <h4>Vanity</h4>

        <em><strong>General maneuver</strong></em><br>

        <p>When you reduce a hostile creature to 0 hit points, you can expend and roll a superiority die (no action required), regaining a number of hit points equal to the result of the roll + your maneuver ability modifier.</p>

        <h4>Weak Point Strike</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Medicine</em><br>

        <p>When you hit a creature with a weapon attack, you can expend a superiority die to temporarily daze the creature. Add the number rolled to the damage of the weapon attack and the creature must succeed on a Constitution saving throw or be stunned until the end of its next turn.</p>

        <h4>World on Fire</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <p>On your turn, when you hit with a weapon attack, you can use a bonus action to expend and roll one superiority die to ignite phosphorescent powder on your target, dealing extra fire damage equal to the result of the roll. Additionally, the target sheds dim light in a 5-foot radius and can't become invisible until the end of your next turn, and becomes visible if it was already invisible. </p>

        <h4>Wrestle and Drag</h4>

        <em><strong>Physical maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> Proficiency in Athletics</em><br>

        <p>When you make a Strength (Athletics) check to grapple or shove a creature, you can expend a superiority die. Until the end of your turn, you can drag the grappled creature with you without your speed being halved. Additionally, if the creature is moved at least 5 feet, you can roll the superiority die, dealing kinetic damage to the creature equal to the result of the roll.</p>

        <h4>You Call This Archaeology?</h4>

        <em><strong>Mental maneuver</strong></em><br>

        <em><strong>Prerequisite:</strong> The ability to cast force powers</em><br>

        <p>When you or a friendly creature that you can see reduces a hostile creature to 0 hit points, you can use your reaction and expend a superiority die to give yourself or that friendly creature temporary hit points equal to the number rolled + your universal forcecasting modifier.</p>

