        <h3>Biology and Appearance</h3>

        The Cereans' enlarged skulls, extending above their foreheads, house complex binary brains, provided with sufficient blood by an extra heart in their heads. The binary structure of Cerean thinking helps them to ponder two sides of an issue at once. It also enables them to process information and solve problems rapidly and provides a highly advanced capacity for concentration and meditation. Because of their thoughtful nature, they tend to be calm, rational and analytical, preferring peaceful philosophies and a lifestyle which works in harmony with nature. Though the quick-thinking Cereans have equally quick reflexes, they are commonly not as well coordinated as<br> humans. 

        <h3>Society and Culture</h3>

        <p>Cereans developed a low-tech society on their homeworld and prefer to live in isolation from the wider galaxy. Preserving the natural beauty of Cerea, the planet is home to many Outsider Citadels where it is permissible to use offworld technology, though it could not be removed from the Citadel. Meditation is a core part of a Cerean's daily rituals, with many employing specially-forged kasha crystals as a focusing tool. By focusing one's thoughts while in contact with such crystals, distractions are eliminated, creating an exceptional meditation environment. Cerean Jedi sometimes incorporate these crystals into their lightsabers, providing great focus, even during intense physical combat.</p>

        <h3>Names</h3>

        <p>Cerean male first names are often hyphenated, while females are not. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Ji-Cheelia, Ki-Adi, Pick-toh, Sauli-Fanz</p>

        <p><strong>Female Names.</strong> Dreash, Kilniavy, Melm, Rharoth</p>

        <p><strong>Surnames.</strong> Codux, Emkom, Kyureft, Lonnik, Mundi</p>



        <h3>Cerean Traits</h3>

        <p>As a cerean, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Cereans reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> Cereans' altruistic nature causes them to tend toward the light side, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Cereans typically stand between 6 and 7 feet tall and weigh about 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Closed Mind.</em></strong> Cereans have a natural attunement for the Force, which makes them resistant to its powers. You have advantage on Wisdom and Charisma saving throws against force powers.</p>

        <p><strong><em>Intuitive Initiative.</em></strong> You can choose to reroll Initiative checks, but you must use the new roll.</p>

        <p><strong><em>Perceptive.</em></strong> You have proficiency in Perception.</p>

        <p><strong><em>Strong-Legged.</em></strong> When you make a long jump, you can cover a number of feet up to twice your Strength score. When you make a high jump, you can leap a number of feet up into the air equal to 3 + twice your Strength modifier.</p>

        <p><strong><em>Trance.</em></strong> You only need 3 hours of sleep during a long rest to gain its benefits, instead of 6. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it to gain its benefits.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Cerean. Cerean is characterized by its gravelly sounds.</p>

