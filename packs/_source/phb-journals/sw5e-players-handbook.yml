        <h3>Biology and Appearance</h3>

        <p>Nautolans possess physiology common to amphibious species, including low light vision and excellent swimming skills. Their bony endoskeleton and dense cartilage make them tough and resistant to glancing blows. An egg-laying species, Nautolans emerge from their egg as a tadpole that develops arms, legs, and head-tails during their second year of life. Roughly the same size as a Human infant during this time, their limbs are weak and unable to support their weight, forcing youthful Nautolans to remain in aquatic environments for much of their childhood. </p>

        <h3>Society and Culture</h3>

        <p>The society developed by the Nautolans on Glee Anselm is centralized around local families and governments. The centralized government of Glee Anselm is comprised of representatives from the Council of Elders that govern each settlement. Elders are elected on merit, and can be made up of youthful politicians as well as the most aged members of the society. A culture that promotes life-long mates, Nautolan families are characterized by their loyalty between spouses and the equality of the sexes in the household. Arranged marriages are not uncommon. </p>

        <p>No cultural affinity for the Force ever developed on Glee Anselm, though members of the Nautolan species recognize its importance and respected those among them that were Forceful.</p>

        <h3>Names</h3>

        <p>Nautolan names are generally short and melodic. Female names usually end in a vowel. Surnames are familial.</p>

        <p><strong>Male Names.</strong> Brod, Knirkoc, Peng, Tikuwik, Zesufreat</p>

        <p><strong>Female Names.</strong> Doli, Hahi, Thamlymyo, Usha, Zezu</p>

        <p><strong>Surnames.</strong> Iarre, Rirrall, Sompanong, Uzumdall</p>



        <h3>Nautolan Traits</h3>

        <p>As a Nautolan, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Nautolans reach adulthood in their early teens and live about 70 years on average.</p>

        <strong><em>Alignment.</em></strong> Nautolans' benevolence cause them to<br> tend toward the light side, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Nautolans typically stand 5 to 6 feet tall and rarely weigh more than 160 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 35 feet.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Darkvision.</em></strong> Accustomed to life underwater, you have superior vision in low light conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Insightful.</em></strong> Nautolan head tentacles are adept at determining moods. You have advantage on Wisdom (Insight) checks to determine emotions.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Nautila. Nautila is unique in that it can only be properly pronounced underwater due to its use of pheromones in addition to spoken sounds. In any other environment, the language loses a great amount of detail; Nautolans find this annoying.</p>

