        <h3>Biology and Appearance</h3>

        <p>Humans are an intelligent species that originated on Coruscant, but can be found on many other planets across the galaxy, including Naboo, Tatooine, and Alderaan. They come in two sexes, male and female, and give birth to live young. They are bipedal beings with a bilateral symmetry, having a front and a back end, as well as an upside and downside. Their bodies are comprised of a torso with a head and four limbs attached to it. The upper limbs, or arms, end in hands which had five fingers each; the lower ones, called legs, end in feet. The human fingers have multiple points of articulation, and one of them is an opposable thumb that allowed for fine manipulation. Finally, they have one head perched atop their torso. Many other species, including twi'leks, mon calamari, or zabraks, are referred to as "humanoids" because of their structural resemblance to humans.</p>

        <h3>Society and Culture</h3>

        <p>Humans can occupy a variety of employs, from politicians to bounty hunters, swoop racers, smugglers, or even a farmer. There exist many planetary groups of humans with their own cultures, such as the Alderaanians or the Pamarthens. Humans are the most populous species in the Galaxy.</p>

        <h3>Names</h3>

        <p>Humans are the most populace species in the Galaxy, and thus their names vary drastically based on the planet or culture with whom they reside.</p>

        <p><strong>Male Names.</strong> Koth, Liorz, Satapak, Tin, Vuc</p>

        <p><strong>Female Names.</strong> Dhetia, Jhilk, Risha, Thinnih, Tonu</p>

        <p><strong>Surnames.</strong> Jauli, Kudi, Melmi, Windu, Wobec</p>



        <h3>Human Traits</h3>

        <p>As a human, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> One ability score of your choice increases by 2, and two other ability scores of your choice increase by 1. Alternatively, four ability scores of your choice each increase by 1.</p>

        <p><strong><em>Age.</em></strong> Humans reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Humans tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Humans vary widely in height and build, from barely 5 feet to well over 6 feet tall. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Defiant.</em></strong> Humans are known to be stubborn and often refuse to give up, even against the worst odds. When you or a creature you can see that can see and understand you makes an ability check, attack roll, or saving throw, you can roll a d4 and add it to their roll (no action required). You can use this before or after the roll, but before the GM determines the roll's outcome. Once you've used this feature, you must complete a short or long rest before you can use it again.</p>

        <p><strong><em>Proficiency.</em></strong> You gain proficiency in one skill, one tool, and one weapon of your choice.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and one extra language of your choice. Humans typically learn the languages of other peoples they deal with, including obscure dialects. They are fond of sprinkling their speech with words borrowed from other tongues: trandoshan curses, twi'lek musical expressions, chiss military phrases, and so on.</p>

