aber\t\t\t|  500 cr&nbsp;&nbsp;|1d6 energy\t\t|2 lb&nbsp;&nbsp;|Finesse, hidden, light, luminous| |\t<em>Martial Lightweapons</em>\t||||||| | &emsp;Doublesaber\t\t\t|1,400 cr&nbsp;&nbsp;|1d8 energy\t\t|4 lb&nbsp;&nbsp;|Double (1d8 energy), finesse, luminous| | &emsp;Doubleshoto\t\t\t|1,250 cr&nbsp;&nbsp;|1d6 energy\t\t|4 lb&nbsp;&nbsp;|Double (1d6 energy), finesse, light, luminous| | &emsp;Greatsaber\t\t\t|1,000 cr&nbsp;&nbsp;|2d6 energy\t\t|4 lb&nbsp;&nbsp;|Dexterity 11, luminous, two-handed| | &emsp;Lightfoil\t\t\t|  500 cr&nbsp;&nbsp;|1d8 energy\t\t|2 lb&nbsp;&nbsp;|Finesse, hidden, luminous| | &emsp;Light ring\t\t\t|  500 cr&nbsp;&nbsp;|1d6 energy\t\t|3 lb&nbsp;&nbsp;|Finesse, hidden, luminous, returning, thrown (range 30/90)\t| | &emsp;Lightsaber pike\t\t|  400 cr&nbsp;&nbsp;|1d10 energy\t\t|6 lb&nbsp;&nbsp;|Dexterity 11, luminous, reach, two-handed| | &emsp;Martial lightsaber  |  300 cr&nbsp;&nbsp;|1d8 energy\t\t|2 lb&nbsp;&nbsp;|Hidden, luminous, versatile (1d10)| | &emsp;Saberspear\t\t\t|  450 cr&nbsp;&nbsp;|2d4 energy\t\t|2 lb&nbsp;&nbsp;|Luminous| | &emsp;Saberwhip\t\t\t|  300 cr&nbsp;&nbsp;|1d4 energy\t\t|2 lb&nbsp;&nbsp;|Finesse, hidden, luminous, reach|</p>\n\n\n\n<h5>Vibroweapons</h5>\n\n<p>|Name&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;|Cost&nbsp;&nbsp;|Damage&emsp;&nbsp;&nbsp;|Weight&nbsp;&nbsp;|Properties&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;| |:---|---:|:---|-:|:---| |\t<em>Simple Vibroweapons</em>\t||||| | &emsp;Techaxe\t\t\t    |   75 cr&nbsp;&nbsp;|1d6 kinetic\t\t|2 lb&nbsp;&nbsp;|Light, thrown (range 20/60)\t| | &emsp;Vibrodagger\t\t\t|   50 cr&nbsp;&nbsp;|1d4 kinetic\t\t|1 lb&nbsp;&nbsp;|Finesse, light, thrown (range 20/60)| | &emsp;Vibrodart\t\t\t|    5 cr&nbsp;&nbsp;|1d4 kinetic\t\t|1/4 lb&nbsp;&nbsp;|Finesse, special, thrown (range 20/60)\t| | &emsp;Vibroknuckler\t\t|   60 cr&nbsp;&nbsp;|1d6 kinetic\t\t|2 lb&nbsp;&nbsp;|Hidden, light| | &emsp;Vibromace\t\t\t|   80 cr&nbsp;&nbsp;|1d8 kinetic\t\t|12 lb&nbsp;&nbsp;|Heavy, two-handed| | &emsp;Vibrostaff\t\t\t|  100 cr&nbsp;&nbsp;|1d6 kinetic\t\t|4 lb&nbsp;&nbsp;|Versatile (2d4)| | &emsp;Vibrospear\t\t\t|  120 cr&nbsp;&nbsp;|1d6 kinetic\t\t|3 lb&nbsp;&nbsp;|Thrown (range 20/60), versatile (1d8)| |\t<em>Martial Vibroweapons</em>\t||||| | &emsp;Chakram\t\t\t\t|  250 cr&nbsp;&nbsp;|1d6 kinetic\t\t|3 lb&nbsp;&nbsp;|Finesse, returning, thrown (range 30/90)\t| | &emsp;Doubleblade      \t|  625 cr&nbsp;&nbsp;|1d6 kinetic\t\t|5 lb&nbsp;&nbsp;|Double (1d6 kinetic), finesse, light| | &emsp;Doublesword      \t|  700 cr&nbsp;&nbsp;|1d8 kinetic\t\t|5 lb&nbsp;&nbsp;|Double (1d8 kinetic), finesse | | &emsp;Hidden blade\t\t|  200 cr&nbsp;&nbsp;|1d4 kinetic\t\t|1 lb&nbsp;&nbsp;|Finesse, fixed, hidden, light\t| | &emsp;Net\t\t\t\t\t|  100 cr&nbsp;&nbsp;|� \t\t\t\t|3 lb&nbsp;&nbsp;|Light, finesse, special, thrown (range 15)| | &emsp;Techblade\t\t\t|  250 cr&nbsp;&nbsp;|1d6 kinetic\t\t|3 lb&nbsp;&nbsp;|Finesse, light| | &emsp;Techstaff    \t    |  600 cr&nbsp;&nbsp;|2d4 kinetic\t\t|8 lb&nbsp;&nbsp;|Double (2d4 kinetic)\t| | &emsp;Vibroaxe\t\t\t|  300 cr&nbsp;&nbsp;|1d10 kinetic\t\t|11 lb&nbsp;&nbsp;|Dexterity 11, heavy, two-handed| | &emsp;Vibrobaton\t\t\t|  225 cr&nbsp;&nbsp;|2d4 kinetic\t\t|4 lb&nbsp;&nbsp;|�| | &emsp;Vibroblade\t\t\t|  150 cr&nbsp;&nbsp;|1d8 kinetic\t\t|2 lb&nbsp;&nbsp;|Versatile (1d10)| | &emsp;Vibrolance\t\t\t|  100 cr&nbsp;&nbsp;|1d12 kinetic\t\t|6 lb&nbsp;&nbsp;|Reach, special| | &emsp;Vibropike\t\t\t|  200 cr&nbsp;&nbsp;|1d10 kinetic\t\t|6 lb&nbsp;&nbsp;|Dexterity 11, reach, two-handed| | &emsp;Vibrorapier\t\t\t|  250 cr&nbsp;&nbsp;|1d8 kinetic\t\t|2 lb&nbsp;&nbsp;|Finesse| | &emsp;Vibrosword\t\t\t|  500 cr&nbsp;&nbsp;|2d6 kinetic\t\t|6 lb&nbsp;&nbsp;|Dexterity 11, two-handed| | &emsp;Vibrowhip\t\t\t|  150 cr&nbsp;&nbsp;|1d4 kinetic\t\t|3 lb&nbsp;&nbsp;|Finesse, reach|</p></div>\n\n<img src='https://www.gmbinder.com/images/khRas0M.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:500px' />\n\n\n\n<h2>Adventuring Gear</h2>\n\n<p>This section describes items that have special rules or require further explanation.</p>\n\n<h3>Equipment Packs</h3>\n\n<p>The starting equipment you get from your class includes a collection of useful adventuring gear, put together in a pack. The contents of these packs are listed here. If you are buying your starting equipment, you can purchase a pack for the price shown, which might be cheaper than buying the items individually.</p>\n\n<h4>Burglar's Pack</h4>\n\n<p>Costs 290 credits. Includes a backpack, two glow rods, a hydrospanner, a fusion cutter, a chronometer, a grappling hook, 5 days of field rations, and a canteen.</p>\n\n<h4>Diplomat's Pack</h4>\n\n<p>Costs 330 credits. Includes a chest, a set of fine clothes, a datapad, 5 datacards, a stylus, 5 days of field rations, and a canteen.</p>\n\n<h4>Dungeoneer's Pack</h4>\n\n<p>Costs 320 credits. Includes a backpack, five glow rods, a fusion cutter, a grappling hook, a chronometer, 10 days of field rations, a canteen, and 50 feet of fibercord cable strapped to the side of it.</p>\n\n<h4>Entertainer's Pack</h4>\n\n<p>Costs 420 credits. Includes a backpack, a bedroll, two costumes, two glowrods, 5 days of field rations, a canteen, and a disguise kit.</p>\n\n<h4>Explorer's Pack</h4>\n\n<p>Costs 250 credits. Includes a backpack, a bedroll, a blanket, a mess kit, two glowrods, a commlink, 10 days of field rations, a canteen, and 50 feet of fibercord cable strapped to the side of it.</p>\n\n<h4>Priest's Pack</h4>\n\nCosts 275 credits. Includes a<br> backpack, a blanket, two glowrods,<br> a datapad, a traumakit, 5 days of<br> field rations, and a canteen.\n\n<h4>Scholar's Pack</h4>\n\nCosts 290 credits. Includes a<br> backpack, a datapad, 5 datacards,<br> a stylus, a holorecorder, 5 days<br> of field rations, and a canteen.\n\n<h4>Technologist's Pack</h4>\n\nCosts 670 credits. Includes a<br> backpack, chronometer, respirator,<br> datapad, holocomm, commlink, bedroll, canteen, and 5 days of field rations.\n\n<h3>Ammunition</h3>\n\n<h4>Dart</h4>\n\n<p>This wrist launcher ammunition deals 1d6 kinetic damage on a hit.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Dart</td><td>5 cr</td><td>�</td></tr><tr><td>Missile, fragmentation</td><td>100 cr</td><td>1/2 lb</td></tr><tr><td>Power cell</td><td>10 cr</td><td>1 lb</td></tr><tr><td>Projector canister, cryo</td><td>350 cr</td><td>2 lb</td></tr><tr><td>Projector canister, incendiary</td><td>325 cr</td><td>2 lb</td></tr><tr><td>Slug cartridge</td><td>2 cr</td><td>�</td></tr></tbody></table></div>\n\n<h4>Missile, Fragmentation</h4>\n\n<p>This wrist launcher ammunition deals 1d6 kinetic damage on a hit. Additionally, hit or miss, the missile then explodes. The target and each creature within 5 feet must make a DC 14 Dexterity saving throw, taking 1d10 kinetic damage on a failed save or half as much on a successful one.</p>\n\n<h4>Power Cell</h4>\n\n<p>Power cells fuel blaster weapons that deal energy or ion damage. Additionally, power cells are used to energize certain tools.</p>\n\n<h4>Projector Canister, Cryo</h4>\n\n<p>When triggered, this wrist launcher ammunition produces a beam of carbonite energy in a line 15 feet long and 5 feet wide or a 15-foot cone. A single fuel canister holds enough fuel for three attacks in a line or a single attack in a cone. Each creature must make a DC 14 Constitution saving throw. On a failed save, a creature takes 1d4 cold damage and gains 1 slowed level until the end of your next turn. On a successful save, a creature takes half damage and isn't slowed. If this damage reduces a creature to 0 hit points, that creature is frozen in carbonite for 1 hour. If you lack proficiency in the wrist launcher, you must roll the damage dice twice and take the lesser total.</p>\n\n<h4>Projector Canister, Incendiary</h4>\n\n<p>When triggered, this wrist launcher ammunition produces a burst of flame in a line 15 feet long and 5 feet wide or a 15-foot cone. A single fuel canister holds enough fuel for three attacks in a line or a single attack in a cone. Each creature must make a DC 14 Dexterity saving throw, taking 1d8 fire damage or half as much on a successful one. The fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried. If you lack proficiency in the wrist launcher, you must roll the damage dice twice and take the lesser total.</p>\n\n<h4>Slug Cartridge</h4>\n\n<p>Slug cartridges are ammunition for blaster weapons that deal kinetic damage. When you reload a weapon that uses cartridges, you can reload any number of cartridges up to the weapon's reload number as a part of the same action.</p>\n\n<img src='https://www.gmbinder.com/images/yainsZs.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:320px' />\n\n\n\n<h3>Communications</h3>\n\n<h4>Commlink</h4>\n\n<p>Commlinks are standard handheld communication devices, fitted with microphones and receivers. Standard, personal commlinks have a range of up to 30 miles, but are reduced in dense, urban areas or areas of high level interference.</p>\n\n<h4>Comm Jammer</h4>\n\n<p>A comm jammer is a device used to scramble communications. A comm jammer can block transmissions from unenhanced communications devices in a 100 foot radius.</p>\n\n<h4>Headcomm</h4>\n\n<p>A headcomm can be installed in a helmet or worn independently. It functions as a hands-free commlink.</p>\n\n<h4>Holocomm</h4>\n\nA holocomm is a communications unit that utilizes<br> the HoloNet. It enables users to send and receive<br> messages through holographic-based transmission<br> networks.\n\n<h4>Holotrace Device</h4>\n\n<p>A holotrace device is a wrist-worn gadget that can be used to trace a holographic transmission back to its source.</p>\n\n<h4>Pocket Scrambler</h4>\n\n<p>A pocket scrambler is a simple add-on to any commlink that automatically encodes any messages sent out. The transmitted message can only be read by a device equipped with a matched scrambler.</p>\n\n<h3>Data Recording and Storage\t</h3>\n\n<h4>Code Cylinder</h4>\n\n<p>Code cylinders are security devices in the shape of short cylinders that contain coded information about their bearers and grant them access to secure areas.</p>\n\n<h4>Datacard</h4>\n\n<p>A datacard or data disk is a flat, hand-held device used in conjunction with a datapad to store information.</p>\n\n<h4>Datacron   </h4>\n\nA datacron is a type of holocron that can be accessed by non-Force-sensitives and are mainly used to store encrypted data. They are complete with an interactive projection<br> to access<br> the infor-<br>mation.\n\n<h4>Datapad</h4>\n\nA datapad is a<br> small electronic<br> device used for the<br> input, storage and<br> displaying of inform-<br>ation. It features a<br> holoprojective surface<br> for 3D viewing. \n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Communications</em></td><td></td><td></td></tr><tr><td>Commlink</td><td>50 cr</td><td>1/2 lb</td></tr><tr><td>Comm jammer</td><td>450 cr</td><td>3 lb</td></tr><tr><td>Headcomm</td><td>200 cr</td><td>1 lb</td></tr><tr><td>Holocomm</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Holotrace device</td><td>1,000 cr</td><td>5 lb</td></tr><tr><td>Pocket scrambler</td><td>800 cr</td><td>1 lb</td></tr><tr><td><em>Data Recording and Storage</em></td><td></td><td></td></tr><tr><td>Code cylinder</td><td>20 cr</td><td>1/2 lb</td></tr><tr><td>Datacard</td><td>5 cr</td><td>�</td></tr><tr><td>Datacron</td><td>1,000 cr</td><td>2 lb</td></tr><tr><td>Datapad</td><td>100 cr</td><td>1/2 lb</td></tr><tr><td>Holocron</td><td>1,000 cr</td><td>2 lb</td></tr><tr><td>Holorecorder</td><td>100 cr</td><td>1 lb</td></tr><tr><td>Stylus pen</td><td>10 cr</td><td>1/2 lb</td></tr><tr><td>Wristpad</td><td>600 cr</td><td>2 lb</td></tr></tbody></table></div>\n\n<h4>Holocron</h4>\n\n<p>Holocrons are information-storage devices used by force wielders that contain ancient lessons or valuable information in holographic form. They appear as palm-sized, glowing polyhedrons of crystalline material and hardware, and can only be activated and used through the power of the Force.</p>\n\n\n\n<h4>Holorecorder</h4>\n\n<p>A holorecorder is a device used to record and project holograms. Some droid models are equipped with internal holorecorders.</p>\n\n<h4>Stylus Pen</h4>\n\n<p>A stylus pen is designed to write on both solid surfaces and touch screen interfaces.</p>\n\n<h4>Wristpad</h4>\n\n<p>A wristpad is a harness with an integrated datapad and holoprojector interface that fits on the forearm and includes self-charging battery packs.</p>\n\n<img src='https://www.gmbinder.com/images/U4cHqYD.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:300px' />\n\n<img src='https://www.gmbinder.com/images/NIczKet.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:255px' />\n\n\n\n<h3>Explosives</h3>\n\n<h4>Grenade, Fragmentation</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Dexterity saving throw. A creature takes 2d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Grenade, Gas</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. The grenade explodes, filling the air in a 10-foot-radius sphere with yellow-green fog for 1 minute. The fog spreads around corners, and its area is heavily obscured. It lasts for 1 minute or until a wind of at least 10 miles per hour disperses it.</p>\n\n<p>When a creature enters the fog or starts its turn there, it creature must make a DC 14 Constitution saving throw. The creature takes 2d6 poison damage on a failed save, or half as much damage on a successful one. Additionally, on a failed save, the creature is poisoned while it is in the cloud. Droids, constructs and humanoids wearing appropriate protective equipment are unaffected.</p>\n\n<h4>Grenade, Ion</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Dexterity saving throw. A creature takes 2d6 ion damage on a failed save, or half as much as on a successful one. Any electronics within the blast radius are disabled until rebooted. </p>\n\n<h4>Grenade, Plasma</h4>\n\n<p>Grenades can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 10 feet must make a DC 14 Dexterity saving throw. A creature takes 2d10 energy damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Mine, Fragmentation</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, each creature within 15 feet of it must make a DC 14 Dexterity saving throw. A creature takes 2d10 kinetic damage on a failed save, or half as much as on a successful one.</p>\n\n<h4>Mine, Gas</h4>\n\nMines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach,<br> which arms at the start of your<br> next turn. When detonated, the<br> mine sets fills the air in a 15-foot-<br>radius sphere with yellow-green fog<br> for 1 minute. The fog spreads around corners, and its area is heavily obscured. It lasts for 1 minute or until a wind of at least 10 miles per hour disperses it.\n\n<p>When a creature enters the fog or starts its turn there, it creature must make a DC 14 Constitution saving throw. The creature takes 2d6 poison damage on a failed save, or half as much damage on a successful one. Additionally, on a failed save, the creature is poisoned while it is in the cloud. Droids, constructs and humanoids wearing appropriate protective equipment are unaffected.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Explosives</em></td><td></td><td></td></tr><tr><td>Grenade, fragmentation</td><td>100 cr</td><td>1 lb</td></tr><tr><td>Grenade, gas</td><td>300 cr</td><td>1 lb</td></tr><tr><td>Grenade, ion</td><td>250 cr</td><td>1 lb</td></tr><tr><td>Grenade, plasma</td><td>125 cr</td><td>1 lb</td></tr><tr><td>Mine, fragmentation</td><td>200 cr</td><td>2 lb</td></tr><tr><td>Mine, gas</td><td>625 cr</td><td>2 lb</td></tr><tr><td>Mine, incendiary</td><td>550 cr</td><td>2 lb</td></tr><tr><td>Thermal detonator</td><td>2,000 cr</td><td>1 lb</td></tr></tbody></table></div>\n\n\n\n<h4>Mine, Incendiary</h4>\n\n<p>Mines can be set to detonate when a creature comes within up to 15 feet of it or paired with a remote detonator. As an action, you can prime and set a mine on a surface you can reach, which arms at the start of your next turn. When detonated, the mine sets the ground in a 15-foot radius ablaze for 1 minute. The fire ignites any flammable objects in the area that aren't being worn or carried.</p>\n\n<p>When a creature enters the fire or starts its turn there, it creature must make a DC 14 Dexterity saving throw. The creature takes 2d8 fire damage on a failed save, or half as much damage on a successful one. </p>\n\n<h4>Thermal Detonator</h4>\n\n<p>Thermal detonators are unique in that can only be turned off by whoever turned them on. They can be set to detonate on impact or with a timer that causes them to explode on initiative count 20 (losing all initiative ties). As an action, you can throw a grenade at a point you can see within 30 feet + your Strength modifier x 5. Each creature within 20 feet must make a DC 14 Dexterity saving throw. A creature takes 2d6 fire and 2d10 kinetic damage on a failed save, or half as much as on a successful one. Additionally, on a failed save, the creature is knocked prone. </p>\n\n<img src='https://www.gmbinder.com/images/m2QdjNv.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:152px' />\n\n\n\n<h3>Life Support</h3>\n\n<h4>Aquatic Rebreather</h4>\n\n<p>Aquatic breathers are breath masks designed to operate underwater. While worn, the wearer can breathe both air and water.</p>\n\n<h4>Enviro-suit</h4>\n\n<p>Environment suits, atmospheric suits, or EVA suits, are pressure suits that enabled wearers to survive and operate in zero gravity space and other dangerous conditions.</p>\n\n<h4>Flight Suit</h4>\n\n<p>Flight suits, or jumpsuits, are a type of outfit worn by pilots. They are worn in conjunction with flight helmets. They come in a variety of different colors and provide life support, and protect from hostile environments.</p>\n\n<h4>Respirator</h4>\n\n<p>A respirator, or breath mask, is a portable device that allowed an oxygen-breather to survive in low-oxygen atmospheres. Although not suitable for use in outer-space, these hands-free masks were essential equipment for deep-space travel that might require activity outside of a starship.</p>\n\n<h3>Medical Supplies</h3>\n\n<h4>Antitoxkit </h4>\n\n<p>An antitoxkit contained a variety of wide-spectrum antidote hypospray injectors that were designed to neutralize all known poisons. A kit has five charges. As an action, you can administer a charge of the kit to cure a target of one poison affecting them or to give them advantage on saving throws against poison for 1 hour. It confers no benefit to droids or constructs.</p>\n\n<h4>Emergency Battery</h4>\n\n<p>All non-expendable droids need recharging as they are used. The battery has ten uses. As an action, you can expend one use of the battery to stabilize a droid that has 0 hit points, without needing to make an Intelligence (Technology) check.</p>\n\n<h4>Medpac</h4>\n\n<p>A medpac is a quick-acting syringe filled with a concentrated dose of kolto. As an action, you can use this medpac to restore hit points to a beast or humanoid within 5 feet. The creature rolls one die equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<h4>Poison</h4>\n\n<p>As an action, you can use the poison in this vial to coat one vibroweapon, one slug cartridge, or one wrist launcher dart. A creature hit by the poisoned weapon must make a DC 14 Constitution saving throw, taking 2d4 poison damage on a failed save or half as much on a successful one. Once applied, the poison retains potency for 1 minute before drying.</p>\n\n<h4>Repair Kit</h4>\n\n<p>A repair kit included the basic tools needed to repair a droid after being damaged in combat. The kit has three uses. As an action, you can expend one use of the kit to restore hit points to a droid or construct within 5 feet. The creature rolls one die equal to the size of their Hit Die and regains hit points equal to the amount rolled + their Constitution modifier (minimum of one hit point). If the creature has Hit Dice of different sizes, use whichever Hit Die size they have the most of.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Life Support</em></td><td></td><td></td></tr><tr><td>Aquatic rebreather</td><td>100 cr</td><td>2 lb</td></tr><tr><td>Enviro-suit</td><td>2,000 cr</td><td>15 lb</td></tr><tr><td>Flight suit</td><td>1,000 cr</td><td>5 lb</td></tr><tr><td>Respirator</td><td>200 cr</td><td>1 lb</td></tr><tr><td><em>Medical</em></td><td></td><td></td></tr><tr><td>Antitoxkit</td><td>600 cr</td><td>4 lb</td></tr><tr><td>Emergency battery</td><td>70 cr</td><td>5 lb</td></tr><tr><td>Traumakit</td><td>50 cr</td><td>3 lb</td></tr><tr><td>Medpac</td><td>300 cr</td><td>1/2 lb</td></tr><tr><td>Poison</td><td>125 cr</td><td>1/2 lb</td></tr><tr><td>Repair kit</td><td>750 cr</td><td>3 lb</td></tr><tr><td><em>Storage</em></td><td></td><td></td></tr><tr><td>Backpack</td><td>50 cr</td><td>5 lb</td></tr><tr><td>Canteen</td><td>10 cr</td><td>3 lb</td></tr><tr><td>Crate</td><td>20 cr</td><td>70 lb</td></tr><tr><td>Chest</td><td>50 cr</td><td>25 lb</td></tr><tr><td>Pouch</td><td>5 cr</td><td>1 lb</td></tr></tbody></table></div>\n\n\n\n<h4>Traumakit</h4>\n\n<p>A common traumakit can be stocked with bacta packs, and contains spray-bandages, bone stabilizers, antiseptics, and other essentials for the treatment of wounds. As an action, you can expend a use of the kit to stabilize a creature that has 0 hit points, without needing to make a Wisdom (Medicine) check. A traumakit can be used to stabilize 5 times before it must be restocked at its original cost.</p>\n\n<h3>Storage</h3>\n\n<h4>Backpack</h4>\n\n<p>A backpack stores 30 lb., not exceeding 1 cubic foot. </p>\n\n<h4>Canteen</h4>\n\n<p>A canteen stores 4 pints of liquid.</p>\n\n<h4>Crate</h4>\n\n<p>A crate stores 40 gallons of liquid or 4 cubic feet of solid.</p>\n\n<h4>Chest</h4>\n\n<p>A chest stores 300 lb., not exceeding 12 cubic feet. </p>\n\n<h4>Pouch</h4>\n\n<p>A pouch stores 6 lb., not exceeding 1/5 cubic foot. </p>\n\n<img src='https://www.gmbinder.com/images/GVHpzCM.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:140px' />\n\n\n\n<h3>Utilities</h3>\n\n<h4>Binders</h4>\n\n<p>Binders can be used to restrain a Small or Medium creature with appropriate appendages. Applying binders takes an action, and the target must make a DC 14 Strength or Dexterity saving throw (the target chooses the ability to use). A hostile creature makes this save with advantage. Breaking the binders requires a DC 20 Strength check. Escaping them requires a DC 20 Dexterity check. A set of binders comes with one key. Without the key, unlocking the binders requires a DC 15 security kit to force open. Binders have an AC of 10 and 15 hit points. Destroying the binders frees the creature without harming it.</p>\n\n<h4>Chronometer</h4>\n\n<p>A chronometer is a device that measures and keeps linear time.</p>\n\n<h4>Field Rations (One day's)</h4>\n\n<p>Ration packs consist of dry foods suitable for extended travel, and are used when other food is scarce. Each pack is divided into portions and can provide enough food for one person per day.</p>\n\n<h4>Fusion Cutter</h4>\n\n<p>A fusion cutter is a handheld cutting tool popular among technicians. It cut through almost any reinforced material, given enough time. The internal power cell supplies an hour's worth of continuous operation.</p>\n\n<h4>Glowrod</h4>\n\n<p>Glowrods create a beam of light illuminating the area around you in bright light for a 20-foot radius and dim light for an additional 20 feet. The glowrod lasts for 10 hours and can be recharged by connecting to a power source or by replacing the power cell. </p>\n\n<h4>Grappling Hook</h4>\n\n<p>A grappling hook allows a user to climb or ascend large objects. It can be mounted to a blaster, belt, or elsewhere. It has a 50-foot length.</p>\n\n<h4>Heat Generator</h4>\n\n<p>Heat generators are special devices typically worn on belts that function as a portable, personal heat supply. Activating or deactivating the generator requires a bonus action and, while active, you are adapted to cold climates, as described in chapter 5 of the Dungeon Master's Guide. The generator lasts for 10 minutes and can be recharged by a power source or replacing the power cell.</p>\n\n<h4>Homing Beacon</h4>\n\n<p>A homing beacon is a device used to track starships or any other entity being transported. Homing beacons transmit using non-mass HoloNet transceivers able to be tracked through hyperspace. Homing beacons are small enough that they can easily be hidden inside a ship, or tucked into some crevice on its exterior.</p>\n\n<h4>Macrobinoculars</h4>\n\n<p>Macrobinoculars are handheld viewing devices that allow users to observe distant objects. Some models are able to see into space from the surface of a planet.</p>\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Utilities</em></td><td></td><td></td></tr><tr><td>Bedroll</td><td>10 cr</td><td>7 lb</td></tr><tr><td>Blanket</td><td>5 cr</td><td>3 lb</td></tr><tr><td>Binders</td><td>50 cr</td><td>6 lb</td></tr><tr><td>Chronometer</td><td>100 cr</td><td>1 lb</td></tr><tr><td>Fibercord cable, 50 ft (rolled)</td><td>20 cr</td><td>2 lb</td></tr><tr><td>Field rations (one day's)</td><td>5 cr</td><td>1 lb</td></tr><tr><td>Fusion cutter</td><td>25 cr</td><td>2 lb</td></tr><tr><td>Glowrod</td><td>10 cr</td><td>2 lb</td></tr><tr><td>Grappling hook</td><td>50 cr</td><td>4 lb</td></tr><tr><td>Heat generator</td><td>400 cr</td><td>4 lb</td></tr><tr><td>Homing beacon</td><td>450 cr</td><td>1 lb</td></tr><tr><td>Hydrospanner</td><td>10 cr</td><td>2 lb</td></tr><tr><td>Macrobinoculars</td><td>750 cr</td><td>1 lb</td></tr><tr><td>Mess kit</td><td>20 cr</td><td>1 lb</td></tr><tr><td>Mirror</td><td>50 cr</td><td>1/2 lb</td></tr><tr><td>Ram, portable</td><td>40 cr</td><td>35 lb</td></tr><tr><td>Restraining bolt</td><td>350 cr</td><td>1 lb</td></tr><tr><td>Shovel</td><td>7 cr</td><td>5 lb</td></tr><tr><td>Tent, two-person</td><td>20 cr</td><td>5 lb</td></tr></tbody></table></div>\n\n\n\n<h4>Mess Kit</h4>\n\n<p>This box contains a cup and simple cutlery. The box clamps together, and one side can be used as a cooking pan and the other as a plate or shallow bowl.</p>\n\n<h4>Ram, Portable</h4>\n\n<p>You can use a portable ram to break down doors. When doing so, you gain a +4 bonus on the Strength check. One other character can help you use the ram, giving you advantage on this check.</p>\n\n<h4>Restraining Bolt</h4>\n\n<p>Restraining bolts are small, cylindrical devices that can be affixed to a droid in order to limit its functions and enforce its obedience. When inserted, a restraining bolt restricts the droid from any movement its master does not desire, and also forced it to respond to signals produced by a hand-held control unit. </p>\n\n<p>Installing a restraining bolt takes 1 minute. The droid must make a DC 14 Constitution saving throw. A hostile droid makes this save with advantage. On a successful save, the restraining bolt overloads and is rendered useless. On a failed save, the restraining bolt is correctly installed, and the control unit can be used to actively control the droid. While the control unit is inactive, the droid can act freely but it can not attempt to remove the restraining bolt. </p>\n\n\n\n<h3>Weapon and Armor Accessories</h3>\n\n<h4>Bandolier</h4>\n\n<p>A bandolier is worn across the chest. It has 12 pockets that can each hold a single item that weighs less than 2 lb, such as a vibrodagger, a fragmentation grenade, or a power cell. Once per turn, drawing an item from a bandolier does not require your object interaction.</p>\n\n<h4>Bipod</h4>\n\n<p>A bipod is a device mounted to a two-handed blaster weapon to offer increased stability while prone. As an action, you can deploy or collapse the bipod. While deployed, you ignore the Strength requirement on ranged weapons with the strength property while you are prone, and your speed is reduced to 0. Additionally, while deployed and prone, you have a +10 bonus to ability checks and saving throws to avoid being disarmed of the weapon.</p>\n\n<h4>Friction-Grip Gear</h4>\n\n<p>A special set of gloves and boots that allow the wearer to stick to and climb surfaces. While wearing these items, you gain the ability to move along vertical surfaces and ceilings while leaving your hands free. You also gain a climbing speed equal your walking speed.</p>\n\n\n\n<h4>Jetpack </h4>\n\n<p>Jetpacks are personal aerial transportation devices that allow the operator to fly into and through the air with great mobility. Activating or deactivating the jetpack requires a bonus action and, while active, you have a flying speed of 30 feet. The jetpack last for 1 minute per power cell (to a maximum of 10 minutes) and can be recharged by a power source or replacing the power cells.</p>\n\n<h4>Remote Detonator </h4>\n\nA small handhold device<br> with a single button, used<br> to activate explosives. Over<br> the course of 1 minute, you<br> can pair the detonator with<br> up to two mines within 10<br> feet. As an action, you can<br> remotely detonate all of the<br> paired mines. You must be<br> within 30 feet of the mines to<br> detonate them.\n\n<div class=\"sw5e-book-block\"><table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Weapon and Armor Accessories</em></td><td></td><td></td></tr><tr><td>Bandolier</td><td>100 cr</td><td>2 lb</td></tr><tr><td>Bipod</td><td>200 cr</td><td>2 lb</td></tr><tr><td>Friction-grip gear</td><td>2,000 cr</td><td>12 lb</td></tr><tr><td>Jetpack</td><td>4,500 cr</td><td>20 lb</td></tr><tr><td>Remote detonator</td><td>150 cr</td><td>1 lb</td></tr><tr><td>Rocket boots</td><td>2,500 cr</td><td>3 lb</td></tr><tr><td>Stealth field generator</td><td>8,000 cr</td><td>3 lb</td></tr><tr><td>Tracker utility vest</td><td>150 cr</td><td>3 lb</td></tr><tr><td>Tripod</td><td>450 cr</td><td>16 lb</td></tr></tbody></table></div>\n\n<h4>Rocket Boots</h4>\n\n<p>Rocket boots are a form of rocket propulsion system affixed to a pair of boots instead of being worn on the back like a standard jetpack. Activating or deactivating the boots requires a bonus action and, while active, you have a flying speed of 25 feet. The rocket boots last for 1 minute and can be recharged by a power source or replacing the power cells.\t</p>\n\n<h4>Stealth Field Generator</h4>\n\n<p>Stealth field generators are special devices typically worn on belts that function as a portable, personal cloaking device. Activating or deactivating the generator requires a bonus action and, while active, you have advantage on Dexterity (Stealth) ability checks that rely on sight. The generator lasts for 1 minute and can be recharged by a power source or replacing the power cell. This effect ends early if you make an attack or cast a force- or tech- power.</p>\n\n<h4>Tracker Utility Vest</h4>\n\nA utility vest is a sleeveless item of clothing that includes several evenly-distributed pockets, popular among hunters, smugglers, and adventurers. The vest is made of leathery, hide material to resist rips, corrosion and water. The wearer can carry up to 10 light items (up to 1 lb each) without increasing<br> their total encumbrance.\n\n<h4>Tripod</h4>\n\nA tripod is a device used<br> to mount a two-handed<br> blaster weapon to offer increased<br> stability. Over the course of 1 minute,<br> you can deploy or collapse the<br> tripod. While deployed, you ignore<br> the Strength requirement on blaster<br> weapons with the strength property,<br> and your speed is reduced to 0. <br>Additionally, while deployed, you<br> have a +10 bonus to ability checks<br> and saving throws to avoid being<br> disarmed of the weapon.\n\n<img src='https://www.gmbinder.com/images/cgGUzvl.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:320px' />\n\n<div class=\"sw5e-book-image-row\"><img src='https://www.gmbinder.com/images/TW0FhNf.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:265px' />\n\n<img src='https://www.gmbinder.com/images/VVpqaIT.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:280px' /></div><div class=\"sw5e-book-block\"><div class=\"sw5e-book-block\"><h5>Adventuring Gear</h5></div>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Ammunition</em></td><td></td><td></td></tr><tr><td>Dart</td><td>5 cr</td><td>�</td></tr><tr><td>Missile, fragmentation</td><td>100 cr</td><td>1/2 lb</td></tr><tr><td>Power cell</td><td>10 cr</td><td>1 lb</td></tr><tr><td>Projector canister, cryo</td><td>350 cr</td><td>2 lb</td></tr><tr><td>Projector canister, incendiary</td><td>325 cr</td><td>2 lb</td></tr><tr><td>Slug cartridge</td><td>2 cr</td><td>�</td></tr><tr><td><em>Clothing</em></td><td></td><td></td></tr><tr><td>Clothes, common</td><td>5 cr</td><td>3 lb</td></tr><tr><td>Clothes, costume</td><td>50 cr</td><td>4 lb</td></tr><tr><td>Clothes, dress uniform</td><td>100 cr</td><td>8 lb</td></tr><tr><td>Clothes, fine</td><td>150 cr</td><td>6 lb</td></tr><tr><td>Clothes, traveler's</td><td>20 cr</td><td>4 lb</td></tr><tr><td><em>Communications</em></td><td></td><td></td></tr><tr><td>Commlink</td><td>50 cr</td><td>1/2 lb</td></tr><tr><td>Comm jammer</td><td>450 cr</td><td>3 lb</td></tr><tr><td>Headcomm</td><td>200 cr</td><td>1 lb</td></tr><tr><td>Holocomm</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Holotrace device</td><td>1,000 cr</td><td>5 lb</td></tr><tr><td>Pocket scrambler</td><td>800 cr</td><td>1 lb</td></tr><tr><td><em>Data Recording and Storage</em></td><td></td><td></td></tr><tr><td>Code cylinder</td><td>20 cr</td><td>1/2 lb</td></tr><tr><td>Datacard</td><td>5 cr</td><td>�</td></tr><tr><td>Datacron</td><td>1,000 cr</td><td>2 lb</td></tr><tr><td>Datapad</td><td>100 cr</td><td>1/2 lb</td></tr><tr><td>Holocron</td><td>1,000 cr</td><td>2 lb</td></tr><tr><td>Holorecorder</td><td>100 cr</td><td>1 lb</td></tr><tr><td>Stylus pen</td><td>10 cr</td><td>1/2 lb</td></tr><tr><td>Wristpad</td><td>600 cr</td><td>2 lb</td></tr><tr><td><em>Explosives</em></td><td></td><td></td></tr><tr><td>Grenade, fragmentation</td><td>100 cr</td><td>1 lb</td></tr><tr><td>Grenade, gas</td><td>300 cr</td><td>1 lb</td></tr><tr><td>Grenade, ion</td><td>250 cr</td><td>1 lb</td></tr><tr><td>Grenade, plasma</td><td>125 cr</td><td>1 lb</td></tr><tr><td>Mine, fragmentation</td><td>200 cr</td><td>2 lb</td></tr><tr><td>Mine, gas</td><td>625 cr</td><td>2 lb</td></tr><tr><td>Mine, incendiary</td><td>550 cr</td><td>2 lb</td></tr><tr><td>Thermal detonator</td><td>2,000 cr</td><td>1 lb</td></tr><tr><td><em>Life Support</em></td><td></td><td></td></tr><tr><td>Aquatic rebreather</td><td>100 cr</td><td>2 lb</td></tr><tr><td>Enviro-suit</td><td>2,000 cr</td><td>15 lb</td></tr><tr><td>Flight suit</td><td>1,000 cr</td><td>5 lb</td></tr><tr><td>Respirator</td><td>200 cr</td><td>1 lb</td></tr></tbody></table>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Medical</em></td><td></td><td></td></tr><tr><td>Antitoxkit</td><td>600 cr</td><td>4 lb</td></tr><tr><td>Emergency battery</td><td>70 cr</td><td>5 lb</td></tr><tr><td>Traumakit</td><td>50 cr</td><td>3 lb</td></tr><tr><td>Medpac</td><td>300 cr</td><td>1/2 lb</td></tr><tr><td>Poison</td><td>125 cr</td><td>1/2 lb</td></tr><tr><td>Repair kit</td><td>750 cr</td><td>3 lb</td></tr><tr><td><em>Storage</em></td><td></td><td></td></tr><tr><td>Backpack</td><td>50 cr</td><td>5 lb</td></tr><tr><td>Canteen</td><td>10 cr</td><td>3 lb</td></tr><tr><td>Chest</td><td>50 cr</td><td>25 lb</td></tr><tr><td>Crate</td><td>20 cr</td><td>70 lb</td></tr><tr><td>Pouch</td><td>5 cr</td><td>1 lb</td></tr><tr><td><em>Utilities</em></td><td></td><td></td></tr><tr><td>Bedroll</td><td>10 cr</td><td>7 lb</td></tr><tr><td>Blanket</td><td>5 cr</td><td>3 lb</td></tr><tr><td>Binders</td><td>50 cr</td><td>6 lb</td></tr><tr><td>Chronometer</td><td>100 cr</td><td>1 lb</td></tr><tr><td>Fibercord cable, 50 ft (rolled)</td><td>20 cr</td><td>2 lb</td></tr><tr><td>Field rations (one day's)</td><td>5 cr</td><td>1 lb</td></tr><tr><td>Fusion cutter</td><td>25 cr</td><td>2 lb</td></tr><tr><td>Glowrod</td><td>10 cr</td><td>2 lb</td></tr><tr><td>Grappling hook</td><td>50 cr</td><td>4 lb</td></tr><tr><td>Heat generator</td><td>400 cr</td><td>4 lb</td></tr><tr><td>Homing beacon</td><td>450 cr</td><td>1 lb</td></tr><tr><td>Hydrospanner</td><td>10 cr</td><td>2 lb</td></tr><tr><td>Macrobinoculars</td><td>750 cr</td><td>1 lb</td></tr><tr><td>Mess kit</td><td>20 cr</td><td>1 lb</td></tr><tr><td>Mirror</td><td>50 cr</td><td>1/2 lb</td></tr><tr><td>Ram, portable</td><td>40 cr</td><td>35 lb</td></tr><tr><td>Restraining bolt</td><td>350 cr</td><td>1 lb</td></tr><tr><td>Shovel</td><td>7 cr</td><td>5 lb</td></tr><tr><td>Tent, two-person</td><td>20 cr</td><td>5 lb</td></tr><tr><td><em>Weapon and Armor Accessories</em></td><td></td><td></td></tr><tr><td>Bandolier</td><td>100 cr</td><td>2 lb</td></tr><tr><td>Bipod</td><td>200 cr</td><td>2 lb</td></tr><tr><td>Friction-grip gear</td><td>2,000 cr</td><td>12 lb</td></tr><tr><td>Jetpack</td><td>4,500 cr</td><td>20 lb</td></tr><tr><td>Remote detonator</td><td>150 cr</td><td>1 lb</td></tr><tr><td>Rocket boots</td><td>2,500 cr</td><td>3 lb</td></tr><tr><td>Stealth field generator</td><td>8,000 cr</td><td>3 lb</td></tr><tr><td>Tracker utility vest</td><td>150 cr</td><td>3 lb</td></tr><tr><td>Tripod</td><td>450 cr</td><td>16 lb</td></tr></tbody></table></div>\n\n\n\n<h2>Tools</h2>\n\n<p>A tool helps you to do something you couldn't otherwise do, such as craft or repair an item, pick a lock, or slice into a computer. Your species, class, background, or feats give you proficiency with certain tools, which lets you add your proficiency bonus to any ability check you make using that tool. Tool use is not tied to a single ability, since proficiency with a tool represents broader knowledge of its use. Like skills, proficiency with a tool allows you to add your proficiency bonus to checks you make with it. Unlike skills, you must have your tools present in order to make an ability check with them. </p>\n\n<p>The table shows examples of some of the most common types of tools. Each tool falls under one of four categories: artisan's implements, gaming sets, musical instruments, or specialist's kits. Each tool requires a separate proficiency. </p>\n\n<h4>Artisan's Implements</h4>\n\n<p>Artisan's implements are predominantly designed for building and crafting things of permanent nature. Each set of implements focuses on a specific craft. </p>\n\n<p><strong><em>Armormech's Implements.</em></strong> Armormech's implements are for crafting and repairing armor and shields.</p>\n\n<p><strong><em>Armstech's Implements.</em></strong> Armstech's implements are for crafting and repairing blasters and vibroweapons</p>\n\n<p><strong><em>Artificer's Implements.</em></strong> Artificer's implements are for creating lightweapons.</p>\n\n<p><strong><em>Artist's Implements.</em></strong> Artist's implements encompasses any set of tools designed to create art.</p>\n\n<p><strong><em>Astrotech's Implements.</em></strong> Astrotech's implements are for crafting and modifying droids.</p>\n\n<p><strong><em>Biotech's Implements.</em></strong> Biotech's implements are used to create cybernetic augmentations.</p>\n\n<p><strong><em>Constructor's Implements.</em></strong> Constructor's implements are for creating and fortifying structures.</p>\n\n<p><strong><em>Cybertech's Implements.</em></strong> Cybertech's implements are used for crafting and modifying wristpads.</p>\n\n<p><strong><em>Gadgeteer's Implements.</em></strong> Gadgeteer's implements are used for crafting many types of adventuring gear, such as jet packs or friction-grip gear.</p>\n\n<p><strong><em>Jeweler's Implements.</em></strong> Jeweler's implements are used to appraise gemstones and create jewelry.</p>\n\n<p><strong><em>Surveyor's Implements.</em></strong> Surveyor's implements are used to create both physical and digital maps.</p>\n\n<p><strong><em>Synthweaver's Implements.</em></strong> Synthweaver's implements create and modify articles of clothing.</p>\n\n<p><strong><em>Tinker's Implements.</em></strong> Tinker's implements are general use tools that can craft small and versatile trinkets.</p>\n\n<h4>Gaming Sets</h4>\n\n<p>This item encompasses a wide range of game pieces, including dice and/or decks of cards. A few common examples appear on the Tools table, but other kinds of gaming sets exist. </p>\n\n<h4>Musical Instruments</h4>\n\n<p>Several of the most common types of musical instruments are shown on the table as examples. Musical instruments can often be used in place of�or in addition to�a performance.</p>\n\n<h4>Specialist's Kits</h4>\n\n<p>Like artisan's implements, specialist's kits are need to pursue a craft or trade. Some specialist's kits are used to craft items that are impermanent, such as grenades, medpacs, or poisons while other tools are used to achieve a specific purpose, such as picking locks or creating a disguise.</p>\n\n<p><strong><em>Biochemist's Kit.</em></strong> Biochemist's kits are used to create and enhance medpacs and other healing implements.</p>\n\n<p><strong><em>Chef's Kit.</em></strong> Chef's kits are used to prepare food and identify food that might be spoiled or tampered with.</p>\n\n<p><strong><em>Demolitions Kit.</em></strong> Demolitions kits are used to create, enhance, and disarm explosives.</p>\n\n<p><strong><em>Disguise Kit.</em></strong> Disguise kits are used to modify a creature's appearance, to hide their appearance or to mimic the appearance of others.</p>\n\n<p><strong><em>Forgery Kit.</em></strong> Forgery kits create false document and certifications, both physical and digital.</p>\n\n<p><strong><em>Mechanic's Kit.</em></strong> Mechanic's kits are used to craft and repair vehicles and starships.</p>\n\n<p><strong><em>Poisoner's Kit.</em></strong> Poisoner's kits are designed to create and identify poisons.</p>\n\n<p><strong><em>Security Kit.</em></strong> Security kits are used to bypass physical locks.</p>\n\n<strong><em>Slicer's Kit.</em></strong> Slicer's kits can bypass computerized<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;defenses and locks.\n\n<img src='https://www.gmbinder.com/images/QEJECTy.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:800px' />\n\n\n\n\n\n<h5>Tools\t\t\t\t\t\t\t</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td><em>Artisan's implements</em></td><td></td><td></td></tr><tr><td>Armormech's implements</td><td>200 cr</td><td>8 lb</td></tr><tr><td>Armstech's implements</td><td>250 cr</td><td>9 lb</td></tr><tr><td>Artificer's implements</td><td>300 cr</td><td>5 lb</td></tr><tr><td>Artist's implements</td><td>100 cr</td><td>5 lb</td></tr><tr><td>Astrotech's implements</td><td>400 cr</td><td>12 lb</td></tr><tr><td>Biotech's implements</td><td>450 cr</td><td>6 lb</td></tr><tr><td>Constructor's implements</td><td>100 cr</td><td>7 lb</td></tr><tr><td>Cybertech's implements</td><td>500 cr</td><td>10 lb</td></tr><tr><td>Gadgeteer's implements</td><td>350 cr</td><td>7 lb</td></tr><tr><td>Jeweler's implements</td><td>250 cr</td><td>2 lb</td></tr><tr><td>Surveyor's implements</td><td>500 cr</td><td>6 lb</td></tr><tr><td>Synthweaver's implements</td><td>250 cr</td><td>2 lb</td></tr><tr><td>Tinker's implements</td><td>500 cr</td><td>10 lb</td></tr><tr><td><em>Gaming set</em></td><td></td><td></td></tr><tr><td>Chance cubes</td><td>1 cr</td><td>�</td></tr><tr><td>Dejarik set</td><td>300 cr</td><td>8 lb</td></tr><tr><td>Pazaak deck</td><td>100 cr</td><td>�</td></tr><tr><td>Sabacc deck</td><td>150 cr</td><td>�</td></tr><tr><td><em>Musical instrument</em></td><td></td><td></td></tr><tr><td>Bandfill</td><td>300 cr</td><td>2 lb</td></tr><tr><td>Chindinkalu horn</td><td>120 cr</td><td>7 lb</td></tr><tr><td>Drum</td><td>60 cr</td><td>3 lb</td></tr><tr><td>Fanfar</td><td>220 cr</td><td>4 lb</td></tr><tr><td>Fizzz</td><td>160 cr</td><td>3 lb</td></tr><tr><td>Flute</td><td>20 cr</td><td>1 lb</td></tr><tr><td>Kloo horn</td><td>330 cr</td><td>2 lb</td></tr><tr><td>Lute</td><td>350 cr</td><td>2 lb</td></tr><tr><td>Mandoviol</td><td>425 cr</td><td>1 lb</td></tr><tr><td>Ommni box</td><td>250 cr</td><td>10 lb</td></tr><tr><td>Slitherhorn</td><td>120 cr</td><td>2 lb</td></tr><tr><td>Shawm</td><td>20 cr</td><td>1 lb</td></tr><tr><td>Traz</td><td>300 cr</td><td>6 lb</td></tr><tr><td>Valahorn</td><td>340 cr</td><td>4 lb</td></tr><tr><td>Xantha</td><td>170 cr</td><td>7 lb</td></tr><tr><td><em>Specialist's kit</em></td><td></td><td></td></tr><tr><td>Biochemist's kit</td><td>500 cr</td><td>8 lb</td></tr><tr><td>Chef's kit</td><td>70 cr</td><td>8 lb</td></tr><tr><td>Demolitions kit</td><td>400 cr</td><td>4 lb</td></tr><tr><td>Disguise kit</td><td>250 cr</td><td>3 lb</td></tr><tr><td>Forgery kit</td><td>150 cr</td><td>5 lb</td></tr><tr><td>Mechanic's kit</td><td>650 cr</td><td>25 lb</td></tr><tr><td>Poisoner's kit</td><td>500 cr</td><td>2 lb</td></tr><tr><td>Security kit</td><td>650 cr</td><td>3 lb</td></tr><tr><td>Slicer's kit</td><td>800 cr</td><td>6 lb</td></tr></tbody></table>\n\n<h2>Trade Goods</h2>\n\n<p>Trade is an essential part of the galactic economy. Many spacers make their living buying and selling goods along hyperspace routes that connect the galaxy's major worlds.</p>\n\n<p>A merchant may be chartered by an individual or a corporation to deliver goods to a certain port, or move goods along a specified route. During times of war, opportunities abound in the shipping of ammunition and medical supplies. Some traders, seeking to earn a quick profit, may resort to smuggling illegal or restricted cargo on behalf of one of the galaxy's many crime syndicates. The Trade Goods table shows the value of commonly exchanged goods.</p>\n\n<h5>Trade Goods</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Cost</th><th></th><th>Goods</th></tr></thead><tbody><tr><td>100 cr</td><td></td><td>Animal, common</td></tr><tr><td>500 cr</td><td></td><td>Animal, livestock</td></tr><tr><td>2,000 cr</td><td></td><td>Animal, uncommon</td></tr><tr><td>100 cr</td><td></td><td>Art. common</td></tr><tr><td>1,000 cr</td><td></td><td>Art. quality</td></tr><tr><td>10,000 cr</td><td></td><td>Art, precious</td></tr><tr><td>400 cr</td><td></td><td>Bacta, 1 gal</td></tr><tr><td>10 cr</td><td></td><td>Food, common (5 lbs)</td></tr><tr><td>20 cr</td><td></td><td>Food. quality (5 lbs)</td></tr><tr><td>50 cr</td><td></td><td>Food. exotic (5 lbs)</td></tr><tr><td>10,000 cr</td><td></td><td>Gems, exotic (1 carat)</td></tr><tr><td>100 cr</td><td></td><td>Gems, semiprecious (1 carat)</td></tr><tr><td>1,000 cr</td><td></td><td>Gems, precious (1 carat)</td></tr><tr><td>10 cr</td><td></td><td>Holovid</td></tr><tr><td>2,500 cr</td><td></td><td>Metal, common (1 ton)</td></tr><tr><td>100 cr</td><td></td><td>Metal, semi-precious (1 lb)</td></tr><tr><td>5,000 cr</td><td></td><td>Metal, precious (1 lb)</td></tr><tr><td>1,500 cr</td><td></td><td>Ore. common (1 ton)</td></tr><tr><td>2,000 cr</td><td></td><td>Spice, common (1 lb)</td></tr><tr><td>5,000 cr</td><td></td><td>Spice, precious (1 lb)</td></tr><tr><td>10,000 cr</td><td></td><td>Spice, illicit (1 lb)</td></tr></tbody></table>\n\n<img src='https://www.gmbinder.com/images/mZ7inBg.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:430px' />\n\n\n\n<h2>Droids</h2>\n\n<p>One common way to spend wealth is to purchase droids. Some droids are built for scouting, while others offer advanced skillsets. Protocol droids help communicate with foreign bodies, and combat droids can help supplement a budding force. The Droids table offers some choices for purchase.</p>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Droid Designation</th><th>Cost</th></tr></thead><tbody><tr><td>3PO Series Protocol Droid</td><td>5,500 cr</td></tr><tr><td>B1-A Battle Droid</td><td>1,300 cr</td></tr><tr><td>B1-X Battle Droid</td><td>2,600 cr</td></tr><tr><td>Destroyer Droid</td><td>84,000 cr</td></tr><tr><td>DUM Series Pit Droid</td><td>650 cr</td></tr><tr><td>ID9 Seeker Droid</td><td>150 cr</td></tr><tr><td>IG-86 Assassin Droid</td><td>22,400 cr</td></tr><tr><td>HK Series Assassin Droid</td><td>212,000 cr</td></tr><tr><td>R2 Series Astromech Droid</td><td>2,800 cr</td></tr></tbody></table>\n\n<h2>Mounts and Vehicles</h2>\n\n<p>Mounts and vehicles are the two most common types of on-planet transport. </p>\n\n<h3>Mounts</h3>\n\n<p>A good mount can help you move more quickly through the wilderness, but its primary purpose is to carry the gear that would otherwise slow you down. The Mounts and Other Animals table shows each animal's speed and base carrying capacity.</p>\n\n<p>An animal pulling a cart or wagon can move weight up to five times its base carrying capacity, including the weight of the vehicle. If multiple animals pull the same vehicle, they can add their carrying capacity together.</p>\n\n<p>Mounts other than those listed here are available in the worlds of <em>Star Wars</em>, but they are rare and not normally available for purchase, like aiwhas from Kamino. Acquiring such a mount is often an adventure in-and-of itself.</p>\n\n<p>Mounts are governed by Animal Handling proficiency.</p>\n\n<h4>Barding</h4>\n\n<p>Barding is armor designed to protect an animal's head, neck, chest, and body. Any type of armor shown on the Armor table in this chapter can be purchased as barding. The cost and weight of barding varies based on the size of the creature, as shown in the Tack, Harness, and Drawn Vehicles table.</p>\n\n<h4>Saddles</h4>\n\n<p>A military saddle braces the rider, helping you keep your seat on an active mount in battle. It gives you advantage on any check you make to remain mounted. An exotic saddle is required for riding an exotic mount.</p>\n\n\n\n<h5>Mounts and Other Animals</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>&nbsp;&nbsp;</th><th>Speed</th><th>Carrying Capacity</th></tr></thead><tbody><tr><td>Tauntaun</td><td>500 cr</td><td></td><td>50 ft.</td><td>480 lb</td></tr><tr><td>Kaadu</td><td>450 cr</td><td></td><td>40 ft.</td><td>620 lb</td></tr><tr><td>Rancor</td><td>2,000 cr</td><td></td><td>40 ft.</td><td>3,320 lb</td></tr><tr><td>Sleen</td><td>500 cr</td><td></td><td>40 ft.</td><td>740 lb</td></tr><tr><td>Varactyl</td><td>750 cr</td><td></td><td>60 ft.</td><td>2,200 lb</td></tr><tr><td>Bantha</td><td>1,200 cr</td><td></td><td>40 ft.</td><td>8,000 lb</td></tr><tr><td>Dewback</td><td>900 cr</td><td></td><td>50 ft.</td><td>1,140 lb</td></tr></tbody></table>\n\n<h5>Tack, Harness, and Drawn Vehicles\t\t\t\t\t\t\t\t\t\t\t</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Weight</th></tr></thead><tbody><tr><td>Barding (Tiny)</td><td>x 1/3</td><td>x 1/2</td></tr><tr><td>Barding (Small or Medium)</td><td>x 1</td><td>x 1</td></tr><tr><td>Barding (Large)</td><td>x 3</td><td>x 2</td></tr><tr><td>Barding (Huge)</td><td>x 9</td><td>x 4</td></tr><tr><td>Barding (Gargantuan)</td><td>x 27</td><td>x 8</td></tr><tr><td>Bit and bridle</td><td>20 cr</td><td>1 lb</td></tr><tr><td>Cart</td><td>150 cr</td><td>200 lb</td></tr><tr><td>Feed (per day)</td><td>1 cr</td><td>10 lb</td></tr><tr><td><em>Saddle</em></td><td></td><td></td></tr><tr><td>Exotic</td><td>600 cr</td><td>40 lb</td></tr><tr><td>Military</td><td>200 cr</td><td>30 lb</td></tr><tr><td>Pack</td><td>50 cr</td><td>15 lb</td></tr><tr><td>Riding</td><td>100 cr</td><td>25 lb</td></tr><tr><td>Saddlebags</td><td>40 cr</td><td>8 lb</td></tr><tr><td>Stabling (per day)</td><td>5 cr</td><td>�</td></tr><tr><td>Wagon</td><td>350 cr</td><td>400 lb</td></tr></tbody></table>\n\n<h3>Vehicles</h3>\n\n<p>Vehicles are more common on civilized planets than animal mounts. Vehicles do not have access to barding and do not require saddles. Vehicles vary greatly based on price, speed, carrying capacity, personnel capacity, and armaments (if any). Below are some base costs for standard types of speeders. Vehicles are governed by Piloting proficiency.</p>\n\n<h5>Vehicles\t\t\t\t\t\t\t\t\t\t\t</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th><th>Speed</th></tr></thead><tbody><tr><td>Airspeeder</td><td>14,500 cr</td><td>750 mph</td></tr><tr><td>Landspeeder</td><td>10,000 cr</td><td>220 mph</td></tr><tr><td>Speederbike</td><td>6,000 cr</td><td>300 mph</td></tr></tbody></table>\n\n<img src='https://www.gmbinder.com/images/xMlAJr5.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:550px' />\n\n\n\n<h2>Expenses\t\t\t\t\t</h2>\n\n<p>When not descending into the depths of the earth, exploring ruins for lost treasures, or waging war against the encroaching darkness, adventurers face more mundane realities. Even in a fantastical world, people require basic necessities such as shelter, sustenance, and clothing. These things cost money, although some lifestyles cost more than others.</p>\n\n<h3>Lifestyle Expenses\t\t\t\t\t</h3>\n\n<p>Lifestyle expenses provide you with a simple way to account for the cost of living in a fantasy world. They cover your accommodations, food and drink, and all your other necessities. Furthermore, expenses cover the cost of maintaining your equipment so you can be ready when adventure next calls.</p>\n\n<p>At the start of each week or month (your choice), choose a lifestyle from the Expenses table and pay the price to sustain that lifestyle. The prices listed are per day, so if you wish to calculate the cost of your chosen lifestyle over a thirty-day period, multiply the listed price by 30. Your lifestyle might change from one period to the next, based on the funds you have at your disposal, or you might maintain the same lifestyle throughout your character's career.</p>\n\n<p>Your lifestyle choice can have consequences. Maintaining a wealthy lifestyle might help you make contacts with the rich and powerful, though you run the risk of attracting thieves. Likewise, living frugally might help you avoid criminals, but you are unlikely to make powerful connections.</p>\n\n<h5>Lifestyle Expenses\t\t\t\t\t</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Lifestyle</th><th>Price/Day</th></tr></thead><tbody><tr><td>Wretched</td><td>�</td></tr><tr><td>Squalid</td><td>1 cr</td></tr><tr><td>Poor</td><td>2 cr</td></tr><tr><td>Modest</td><td>10 cr</td></tr><tr><td>Comfortable</td><td>20 cr</td></tr><tr><td>Wealthy</td><td>40 cr</td></tr><tr><td>Aristocratic</td><td>at least 100 cr</td></tr></tbody></table>\n\n<h4>Wretched</h4>\n\n<p>You live in inhumane conditions. With no place to call home, you shelter wherever you can, sneaking into barns, huddling in old crates, and relying on the good graces of people better off than you. A wretched lifestyle presents abundant dangers. Violence, disease, and hunger follow you wherever you go. Other wretched people covet your armor, weapons, and adventuring gear, which represent a fortune by their standards. You are beneath the notice of most people.</p>\n\n<h4>Squalid</h4>\n\n<p>You live in a leaky stable, a mud-floored hut just outside town, or a vermin-infested boarding house in the worst part of town. You have shelter from the elements, but you live in a desperate and often violent environment, in places rife with disease, hunger, and misfortune. You are beneath the notice of most people, and you have few legal protections. Most people at this lifestyle level have suffered some terrible setback. They might be disturbed diseased.</p>\n\n<h4>Poor</h4>\n\n<p>A poor lifestyle means going without the comforts available in a stable community. Simple food and lodgings, threadbare clothing, and unpredictable conditions result in a sufficient, though probably unpleasant, experience. Your accommodations might be a room in a flophouse or in the common room above a cantina. You benefit from some legal protections, but you still have to contend with violence, crime, and disease. People at this lifestyle level tend to be unskilled laborers, peddlers, thieves, mercenaries, and other disreputable types.</p>\n\n<h4>Modest</h4>\n\n<p>A modest lifestyle keeps you out of the slums and ensures that you can maintain your equipment. You live in an older part of town, renting a room in a boarding house, inn, or temple. You don't go hungry or thirsty, and your living conditions are clean, if simple. Ordinary people living modest lifestyles include soldiers with families, laborers, students, and the like.</p>\n\n<h4>Comfortable</h4>\n\n<p>Choosing a comfortable lifestyle means that you can afford nicer clothing and can easily maintain your equipment. You live in a small domicile in a middle-class neighborhood or in a private room at a fine establishment. You associate with merchants, skilled tradespeople, and military officers.</p>\n\n<h4>Wealthy</h4>\n\n<p>Choosing a wealthy lifestyle means living a life of luxury, though you might not have achieved the social status associated with the old money of nobility or royalty. You live a lifestyle comparable to that of a highly successful merchant, a favored servant of the royalty, or the owner of a few small businesses. You have respectable lodgings, usually a spacious home in a good part of town or a comfortable suite at a fine inn. You likely have a small staff of servants.</p>\n\n<h4>Aristocratic</h4>\n\n<p>You live a life of plenty and comfort. You move in circles populated by the most powerful people in the community. You have excellent lodgings, perhaps a townhouse in the nicest part of town or rooms in the finest inn. You dine at the best restaurants, retain the most skilled and fashionable tailor, and have servants attending to your every need. You receive invitations to the social gatherings of the rich and powerful, and spend evenings in the company of the affluent. You must also contend with the highest levels of deceit and treachery. The wealthier you are, the greater the chance you will be drawn into political intrigue as a pawn or participant.\t</p>\n\n\n\n<h3>Food, Drink, and Lodging\t\t\t\t\t</h3>\n\n<p>The Food, Drink, and Lodging table gives prices for individual food items and a single night's lodging. These prices are included in your total lifestyle expenses.</p>\n\n<h5>Food, Drink, and Lodging\t\t\t\t\t</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Item</th><th>Cost</th></tr></thead><tbody><tr><td><em>Ale</em></td><td></td></tr><tr><td>Gallon</td><td>2 cr</td></tr><tr><td>Mug</td><td>1 cr</td></tr><tr><td>Banquet (per person)</td><td>100 cr</td></tr><tr><td>Bread, loaf</td><td>1 cr</td></tr><tr><td><em>Caf</em></td></tr><tr><td>Cup</td><td>2 cr</td></tr><tr><td>Pitcher</td><td>8 cr</td></tr><tr><td>Cheese, hunk</td><td>1 cr</td></tr><tr><td><em>Inn stay (per day)</em></td><td></td></tr><tr><td>Squalid</td><td>2 cr</td></tr><tr><td>Poor</td><td>4 cr</td></tr><tr><td>Modest</td><td>7 cr</td></tr><tr><td>Comfortable</td><td>15 cr</td></tr><tr><td>Wealthy</td><td>30 cr</td></tr><tr><td>Aristocratic</td><td>80 cr</td></tr><tr><td><em>Meals (per day)</em></td><td></td></tr><tr><td>Squalid</td><td>1 cr</td></tr><tr><td>Poor</td><td>2 cr</td></tr><tr><td>Modest</td><td>3 cr</td></tr><tr><td>Comfortable</td><td>7 cr</td></tr><tr><td>Wealthy</td><td>15 cr</td></tr><tr><td>Aristocratic</td><td>30 cr</td></tr><tr><td>Meat, chunk</td><td>3 cr</td></tr><tr><td><em>Wine</em></td><td></td></tr><tr><td>Common (pitcher)</td><td>2 cr</td></tr><tr><td>Fine (bottle)</td><td>100 cr</td></tr></tbody></table>\n\n<h5>Self-Sufficiency</h5>\n\n<blockquote><p>The expenses and lifestyles described in this chapter assume that you are spending your time between adventures in cities, availing yourself of whatever services you can afford� paying for food and shelter, paying townspeople to repair your equipment, and so on. Some characters, though, might prefer to spend their time away from civilization, sustaining themselves in the wild by hunting, foraging, and repairing their own gear.</p>\n\n<p>Maintaining this kind of lifestyle doesn't require you to spend any coin, but it is time-consuming. If you spend your time between adventures practicing a profession, as described in chapter 8, you can eke out the equivalent of a poor lifestyle. Proficiency in the Survival skill lets you live at the equivalent of a comfortable lifestyle.</p></blockquote>\n\n<h3>Services</h3>\n\n<p>Adventurers can pay nonplayer characters to assist them or act on their behalf in a variety of circumstances. Most such hirelings have fairly ordinary skills, while others are masters of a craft or art, and a few are experts with specialized adventuring skills.</p>\n\n<p>Some of the most basic types of hirelings appear on the Services table. Other common hirelings include any of the wide variety of people who inhabit a typical town or city, when the adventurers pay them to perform a specific task. For example, a fighter might commission an armstech to craft a special vibroblade, while a scholar might pay a tailor to make exquisite clothing for an upcoming meeting with a senator. </p>\n\n<p>Other hirelings provide more expert or dangerous services. Mercenary soldiers paid to help the adventurers take on a trandoshan army are hirelings, as are sages hired to research ancient or esoteric lore. If a high-level adventurer establishes a stronghold of some kind, he or she might hire a whole staff of servants and agents to run the place, from a castellan or steward to menial laborers to keep the facilities clean. These hirelings often enjoy a long-term contract that includes a place to live within the stronghold as part of the offered compensation.</p>\n\n<h5>Services</h5>\n\n<table class=\"sw5e-book-table\"><thead><tr><th>Service</th><th>Cost</th></tr></thead><tbody><tr><td><em>Speeder</em></td><td></td></tr><tr><td>Between towns</td><td>3 cr per mile</td></tr><tr><td>Within a city</td><td>2 cr</td></tr><tr><td><em>Hireling</em></td><td></td></tr><tr><td>Skilled</td><td>20 cr per day</td></tr><tr><td>Untrained</td><td>2 cr per day</td></tr><tr><td>Messenger</td><td>1 cr per mile</td></tr><tr><td>Tolls</td><td>1 cr</td></tr><tr><td>Interplanetary Travel</td><td>100 cr per day per person</td></tr></tbody></table>\n\n<img src='https://www.gmbinder.com/images/9zusebj.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:425px' />\n\n"
