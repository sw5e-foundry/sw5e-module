        <h3>Biology and Appearance</h3>

        <p>The Cathar have fur-covered bodies with thick manes as well as prominent, retractable claws that can deliver powerful killing attacks on foes and prey. Their bodies also possess rapid healing abilities. These traits make them the perfect hand-to-hand specialists.</p>

        <p>The Cathar species also has two subspecies, known as the Juhani and the Myr Rho. Both of these are notably less catlike than mainline Cathar. Cathar are born into a litter. The Cathar species is biologically similar to the Bothan species.</p>

        <h3>Society and Culture</h3>

        <p>On their homeworld, Cathar live in cities built into giant trees, and are organized into clans governed by elders. Stories of their great heroes were often carved into the trunks of these tree-homes for following generations to see. The Cathar mate for life, to the extent that when one mate dies, the survivor never has a relationship with another. Cathar clan society includes great pageants and celebrations, especially for their heroes. Their religion includes a ritual known as the "Blood Hunt," in which Cathar warriors individually engaged in combat against entire nests of Kiltik in order to gain honor and purge themselves of inner darkness. The native language of the Cathar is Catharese, which included the emphasis of some spoken words with a growl.</p>

        <h3>Names</h3>

        <p>Cathar names can sound both melodic and fairly gutteral, but they almost always sound strong and fierce. Female names are typically longer than male names. Surnames are usually one syllable.</p>

        <p><strong>Male Names.</strong> Crurbirr, Isyrr, Nynorr, Suro, Tukarr </p>

        <p><strong>Female Names.</strong> Cuwin, Jyvohr, Mulahr, Solyri</p>

        <p><strong>Surnames.</strong> Jin, Ki, Mak, Rhir, Ta</p>



        <h3>Cathar Traits</h3>

        <p>As a cathar, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Charisma score increases by<br> 1.

        <p><strong><em>Age.</em></strong> Cathar reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Cathar tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Cathar range from 5 to 7 feet tall, and can weigh up to 300 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Cat's Claws.</em></strong> You have a climbing speed of 20 feet. Additionally, your unarmed strikes deal 1d4 kinetic damage and have the finesse property.</p>

        <p><strong><em>Cat's Talent.</em></strong> You have proficiency in the Perception and Stealth skills.</p>

        <p><strong><em>Darkvision.</em></strong> You have a cat's keen senses, especially in the dark. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Leonine Agility.</em></strong> Your reflexes and agility allow you to move with a burst of speed. When you move on your turn in combat, you can double your speed until the end of the turn. Once you use this trait, you can't use it again until you move 0 feet on one of your turns.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Catharese.</p>

