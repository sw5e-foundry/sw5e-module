h</td><td>+6</td><td>Scout Routine (30-foot radius)</td><td>d12</td><td>20</td><td>17</td><td>5th</td></tr><tr><td>18th</td><td>+6</td><td>Supreme Awareness</td><td>d12</td><td>21</td><td>18</td><td>5th</td></tr><tr><td>19th</td><td>+6</td><td>Ability Score Improvement</td><td>d12</td><td>22</td><td>19</td><td>5th</td></tr><tr><td>20th</td><td>+6</td><td>Foe Slayer</td><td>d12</td><td>23</td><td>20</td><td>5th</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a scout, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d10 per scout level</li><li><strong>Hit Points at 1st Level:</strong> 10 + your Constitution modifier</li><li><strong>Hit Points at Higher Levels:</strong> 1d10 (or 6) + your Constitution modifier per scout level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> Light armor, medium armor</li><li><strong>Weapons:</strong> All blasters, all vibroweapons</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Strength, Dexterity</li><li><strong>Skills:</strong> Choose three from Animal Handling, Athletics, Insight, Investigation, Perception, Piloting, Stealth, Survival, and Technology</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background.</p>

        <ul><li><em>(a)</em> mesh armor or <em>(b)</em> a combat suit, blaster rifle or simple blaster, and two power cells</li><li><em>(a)</em> a vibroweapon and a light physical shield or <em>(b)</em> two simple vibroweapons</li><li><em>(a)</em> a hold-out and a power cell or <em>(b)</em> two vibrodaggers</li><li><em>(a)</em> a dungeoneer's pack or <em>(b)</em> an explorer's pack</li><li>A wristpad</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Scout</td><td>8d4 x 100 cr</td></tr></tbody></table>



        <h3>Ranger's Quarry</h3>

        <em><strong>Scout:</strong> 1st, 5th, 9th, and 17th level</em><br>

        <p>You learn how to effectively read and track your prey. Once on each of your turns, you can choose a creature you can see within 120 feet and mark it as your quarry (no action required). For the next hour, you gain the following benefits:</p>

        <ul><li>Once per turn, when you hit the target with a weapon attack, you can deal 1d4 additional damage to it of the same type as the weapon's damage. This die changes as you gain scout levels, as shown in the Ranger's Quarry column of the scout table.</li><li>You have advantage on any Wisdom (Perception) or Wisdom (Survival) check you make to find it while it's on the same planet as you.</li></ul>

        <p>You can only have one creature marked in this way at a time. Beginning at 5th level, you can use your reaction to mark a creature when it enters your line of sight, provided it is within range of your Ranger's Quarry.</p>

        <p>The duration increases to 8 hours at 9th level and 24 hours at 17th level.</p>

        <h3>Pathfinder</h3>

        <em><strong>Scout:</strong> 1st level</em><br>

        <p>You are skilled at navigating the untamed wilds. You ignore difficult terrain, and when traveling for an hour or more, you gain the following benefits:</p>

        <ul><li>Difficult terrain doesn't slow your group, provided they can see and hear you.</li><li>You can't become lost by unenhanced means.</li><li>Even when you are engaged in another activity while traveling (such as foraging, navigating, or tracking), you remain alert to danger.</li><li>If you are traveling alone, you can move stealthily at a normal pace.</li><li>When you forage, you find twice as much food.</li><li>You have advantage on Survival checks.</li></ul>

        <h3>Techcasting</h3>

        <em><strong>Scout:</strong> 2nd level</em><br>

        <p>You have derived powers from schematics with the aid of your wristpad. See chapter 10 for the general rules of techcasting and chapter 12 for the tech powers list.</p>

        <h4>Tech Powers Known</h4>

        <p>You learn 4 tech powers of your choice, and you learn more at higher levels, as shown in the Tech Powers Known column of the scout table. You may not learn a tech power of a level higher than your Max Power Level.</p>

        <h4>Tech Points</h4>

        <p>You have a number of tech points equal to your scout level, as shown in the Tech Points column of the scout table, + your Intelligence modifier. You use these tech points to cast tech powers. You regain all expended tech points when you finish a short or long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many tech powers can be overcharged, consuming </p>



        <p>more tech points to create a greater effect. You can overcharge these powers to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the scout table.</p>

        <p>You may only cast tech powers at 4th and 5th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Techcasting Ability</h4>

        <p>Intelligence is your techcasting ability for your tech powers. You use your Intelligence whenever a power refers to your techcasting ability. Additionally, you use your Intelligence modifier when setting the saving throw DC for a tech power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Tech save DC</strong> = 8 + your proficiency bonus + <br>your Intelligence modifier

        <hr>

        <strong>Tech attack modifier</strong> = your proficiency bonus + <br>your Intelligence modifier</div>

        <hr>

        <h4>Techcasting Focus</h4>

        <p>You use a wristpad (found in chapter 5) as a tech focus for your tech powers.</p>

        <h3>Fighting Style</h3>

        <em><strong>Scout:</strong> 2nd level</em><br>

        <p>You adopt a particular style of fighting as your specialty. Choose one of the fighting style options, detailed in Chapter 6. </p>

        <h3>Scout Routine</h3>

        <em><strong>Scout:</strong> 3rd, 7th, 9th, 15th, and 17th level</em><br>

        <p>You've developed one routine, as detailed at the end of the class description. You develop an additional routine at 7th and 15th level.</p>

        <p>At 9th level, the range of your routines increases to 15 feet, and at 17th level, the range of these routines increases to 30 feet</p>

        <h3>Scout Technique </h3>

        <em><strong>Scout:</strong> 3rd, 7th, 11th, and 15th level</em><br>

        <p>You choose to focus on a specific scout technique, which is detailed at the end of the class description.</p>

        <h3>Ability Score Improvement </h3>

        <em><strong>Scout:</strong> 4th, 8th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>

        <h3>Extra Attack</h3>

        <em><strong>Scout:</strong> 5th level</em><br>

        <p>You can attack twice, instead of once, whenever you take the Attack action on your turn.</p>

        <h3>Expertise</h3>

        <em><strong>Scout:</strong> 6th and 14th level</em><br>

        <p>Choose two of your skill proficiencies, or one of skill proficiencies and one of your tool proficiencies, or two of your tool proficiencies. You gain expertise in those skills or tools.</p>



        <p>&emsp;At 14th level, you can choose another two proficiencies (in skills or tools) to gain this benefit.</p>

        <h3>Commando </h3>

        <em><strong>Scout:</strong> 10th level</em><br>

        <p>You can take the Dash or Hide actions as a bonus action on each of your turns. Additionally, you can remain perfectly still for long periods of time to set up ambushes. </p>

        <p>When you attempt to hide on your turn, you can opt to not move on that turn. If you avoid moving, creatures that attempt to detect you take a -10 penalty to their Wisdom (Perception) checks until the start of your next turn. You lose this benefit if you move or fall prone, either voluntarily or because of some external effect. You are still automatically detected if any effect or action causes you to no longer be hidden. </p>

        <p>If you are still hidden on your next turn, you can continue to remain motionless and gain this benefit until you are detected.</p>

        <p>Finally, you can no longer be tracked by unenhanced means, unless you choose to leave a trail.</p>

        <h3>Combat Tech</h3>

        <em><strong>Scout:</strong> 14th level</em><br>

        <p>When you use your action to cast a tech power, you can make one weapon attack as a bonus action.</p>

        <h3>Supreme Awareness </h3>

        <em><strong>Scout:</strong> 18th level</em><br>

        <p>You gain preternatural senses that help you fight creatures you can't see. When you attack a creature you can't see, your inability to see it doesn't impose disadvantage on your attack rolls against it. </p>

        <p>You are also aware of the location of any invisible creature within 30 feet of you, provided that the creature isn't hidden from you and you aren't blinded or deafened.</p>

        <h3>Foe Slayer </h3>

        <em><strong>Scout:</strong> 20th level</em><br>

        <p>You become an unparalleled hunter. Your Strength or Dexterity score increases by 2, and your Intelligence score increases by 2. Your maximum for those scores increases by 2.</p>

        <p>Additionally, once on each of your turns, you can add your Intelligence modifier to the attack roll or the damage roll of an attack you make. You can choose to use this feature before or after the roll, but before any effects of the roll are applied.</p>

        <h3>Scout Routines</h3>

        <p>The routines are presented in alphabetical order. If multiple scouts grant the same routine, affected creatures can only benefit from it once. You must be conscious to grant the benefit of your routines.</p>

        <h4>Adaptability Routine</h4>

        <p>At the start of each of your turns, you can choose an ability score with a saving throw in which you are not proficient. Until the start of your next turn, you add half your proficiency bonus to saving throws you make with the chosen ability. Alternatively, </p>

        <p>you can choose to extend this benefit to friendly creatures within 5 feet of you, except for you.</p>

        <h4>Maven's Routine</h4>

        <p>At the start of each of your turns, you can choose to gain resistance to damage from tech powers until the start of your next turn. Alternatively, you can choose to extend this benefit to friendly creatures within 5 feet of you, except for you.</p>

        <h4>Mesmer's Routine</h4>

        <p>At the start of each of your turns, you can choose to have advantage on saving throws against effects that would incapacitate you or put you to sleep until the start of your next turn. Alternatively, you can choose to extend this benefit to friendly creatures within 5 feet of you, except for you.</p>

        <h4>Nomad's Routine</h4>

        <p>At the start of each of your turns, you can choose to gain advantage on Constitution saving throws to avoid exhaustion from unenhanced sources, as well as being naturally adapted to both hot and cold climates. Alternatively, you can choose to extend this benefit to friendly creatures within 5 feet of you, except for you.</p>

        <h4>Responder's Routine</h4>

        <p>When you roll initiative, you can choose to add your proficiency bonus to the initiative roll and have advantage on attack rolls against creatures that have not yet acted. Alternatively, you can choose to allow each creature within 5 feet of you, including you, to add half your proficiency bonus to the initiative roll and have advantage on the first attack roll they make against a creature that has not yet acted.</p>

        <h4>Sharpshooter's Routine</h4>

        <p>At the start of each of your turns, you can choose to gain a bonus to the first weapon attack roll you make before the start of your next turn equal to your Intelligence modifier. Alternatively, you can choose to allow each creature within 5 feet of you, including you, to add half your Intelligence modifier to the first weapon attack roll they make before the start of your next turn.</p>

        <h4>Strider's Routine</h4>

        <p>At the start of each of your turns, you can choose to have each slowed level only reduce your speed by 5 feet, unless it would reduce your speed to 0 until the start of your next turn. Alternatively, you can choose to extend this benefit to friendly creatures within 5 feet of you, except for you.</p>

        <h4>Warden's Routine</h4>

        <p>At the start of each of your turns, you can choose to gain a climbing and swimming speed equal to your walking speed until the start of your next turn. Alternatively, you can choose to extend this benefit to friendly creatures within 5 feet of you, except for you.</p>

        <h2>Scout Techniques</h2>

        <p>Scouts tend to share knowledge amongst them selves, focusing on specific techniques and honing them to perfection. Your technique grants you features at 3rd, 7th, 11th, and 15th level.</p>



        <h4>Bulwark Technique</h4>

        <p>Some scouts find themselves far from civilization not to hunt, gather intelligence, or escape danger, but to venture forth simply to defend those unable to defend themselves. Followers of the Bulwark Technique make use of advanced technology to contain those that threaten the undeserving.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Bulwark Technique:</strong> 3rd level</em><br>

        <p>You gain proficiency in heavy armor.</p>

        <h3>Personal Barrier</h3>

        <em><strong>Bulwark Technique:</strong> 3rd level</em><br>

        <p>You gain access to a powerful personal barrier. Whenever you complete a short or long rest, you create a barrier on yourself that lasts until you finish a short or long rest. That barrier has hit points equal to twice your scout level + your Intelligence modifier. Your barrier can never have hit points greater than twice your scout level + your Intelligence modifier.</p>

        <p>Whenever you take damage, the barrier takes the damage instead. If this damage reduces the barrier to 0 hit points, you take any remaining damage.</p>

        <p>While the barrier has 0 hit points, it can't absorb damage, but its power remains. Whenever you cast a tech power of 1st level or higher, your barrier regains hit points equal to the number of tech points spent.</p>

        <p>Additionally, for as long as your barrier has hit points, you gain the following benefits:</p>

        <ul><li>You are considered proficient in Constitution saving throws for the purpose of maintaining concentration on tech powers.</li><li>Hostile creatures that hit you with melee attacks take energy damage equal to your Intelligence modifier (minimum of one).</li></ul>

        <h3>Mark of the Bulwark</h3>

        <em><strong>Bulwark Technique:</strong> 3rd level</em><br>

        <p>When the target of your Ranger's Quarry feature makes a melee attack against a friendly creature within 5 feet of you, you can use your reaction to force the attack to target you instead. If the attack hits, and your Personal Barrier has hit points, the attacking creature takes bonus damage equal to your Ranger's Quarry Damage Die.</p>

        <h3>Projected Barrier</h3>

        <em><strong>Bulwark Technique:</strong> 7th, 11th, and 17th level</em><br>

        <p>You've learned how to manipulate your barrier to create new effects. As an action, you can spend three of your barrier's hit points to create a unique effect. You have three such effects: Projected Sphere, Projected Maelstrom, and Projected Wave. When you use your Projected Barrier, you choose which effect to create.</p>

        <p>Some Projected Barrier Effects require saving throws. When you use such an effect from this class, the DC equals your tech save DC.</p>

        <p>If your barrier's hit points are reduced to 0, any Projected Barrier features immediately end.</p>



        <h4>Projected Sphere</h4>

        <p>You create a protective spherical barrier in a 5-foot-radius sphere a point you can see within 30 feet that lasts until the start of your next turn. Creatures within the barrier have three-quarters cover from attacks originating from outside the barrier. You can maintain the barrier by spending an additional barrier hit point at the start of each of your turns (no action required).</p>

        <h4>Projected Maelstrom</h4>

        <p>You create an unstable energy maelstrom in a 5-foot cube at a point you can see within 30 feet that lasts until the start of your next turn. A creature takes 4d4 energy damage when it enters the area for the first time on a turn or starts its turn there. You can maintain the barrier by spending an additional barrier hit point at the start of each of your turns (no action required). </p>

        <p>This feature's damage increases by 1d4 when you reach 11th level (5d4) and 17th level (6d4).</p>

        <h4>Projected Wave</h4>

        You create a wave of barrier energy in a 15-foot cone. Each creature within the cone must make a Dexterity saving throw. On a failed save, a creature takes 2d6 energy damage and is pushed back to the edge of the cone. On a success, they take half damage and<br> aren't pushed.

        This feature's damage increases by 1d6<br> when you reach 11th level (3d6) and 17th<br> level (4d6).

        <h3>Regenerative Shielding</h3>

        <em><strong>Bulwark Technique:</strong> 11th level</em><br>

        When a hostile creature forces you to<br> make a saving throw and you succeed,<br> your personal barrier regains hit points<br> equal to your Intelligence<br> modifier.

        <h3>Adaptive Barrier</h3>

        <em><strong>Bulwark Technique:</strong> 15th level</em><br>

        When your personal barrier takes<br> damage, you can have it gain<br> resistance to subsequent<br> damage of that type until<br> the start of your next turn<br> (no action required). If it<br> takes damage of more<br> than one type<br> simultaneously,<br> you can choose<br> which type it gains<br> resistance to. Your<br> barrier can only have<br> resistance to one<br> type of damage at a time.

        <img src='https://www.gmbinder.com/images/MKEbu4z.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:270px' />



        <h4>Hunter Technique </h4>

        <p>Some scouts seek to master weapons to better protect civilization from the terrors of their enemies. Followers of the Hunter Technique learn specialized fighting techniques for use against the most dire threats, from an onslaught of soldiers to towering walkers.</p>

        <h3>Hunter's Prey</h3>

        <em><strong>Hunter Technique:</strong> 3rd level</em><br>

        <p>You gain one of the following features of your choice. </p>

        <h4>Colossus Slayer</h4>

        <p>Your tenacity can wear down the most potent foes. When you hit a creature with a weapon attack, the creature takes an extra 1d8 damage if it's below its hit point maximum. You can deal this extra damage only once per turn, and this damage is the same type as the weapon's damage. </p>

        <h4>Giant Killer</h4>

        <p>When a Large or larger creature within 5 feet of you hits or misses you with an attack, you can use your reaction to attack that creature immediately after its attack, provided that you can see the creature. </p>

        <h4>Horde Breaker</h4>

        Once on each of your turns when you make a weapon<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;attack, you can make another attack with<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;the same weapon against a different<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;creature that is within 5 feet of<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;the original target and within<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;range of your weapon, no action<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;required.



        <h3>Mark of the Hunter</h3>

        <em><strong>Hunter Technique:</strong> 3rd level</em><br>

        <p>When you use your Ranger's Quarry feature, the first time you make a tech or weapon attack against the target of your Ranger's Quarry each turn, roll your Ranger's Quarry die and add it to the roll.</p>

        <h3>Defensive Tactics </h3>

        <em><strong>Hunter Technique:</strong> 7th level</em><br>

        <p>You gain one of the following features of your choice. </p>

        <h4>Escape the Horde</h4>

        <p>Opportunity attacks against you are made with disadvantage.</p>

        <h4>Multiattack Defense</h4>

        <p>When a creature hits you with an attack, you gain a +4 bonus to AC against all subsequent attacks made by that creature for the rest of the turn. </p>

        <h4>Steel Will</h4>

        <p>You have advantage on saving throws against being frightened.</p>

        <h3>Multiattack </h3>

        <em><strong>Hunter Technique:</strong> 11th level</em><br>

        <p>You gain one of the following features of your choice. </p>

        <h4>Volley</h4>

        <p>You can use your action to make a ranged attack against any number of creatures within 10 feet of a point you can see within your weapon's range. You must have ammunition for each target, as normal, and you make a separate attack roll for each target. </p>

        <h4>Whirlwind Attack</h4>

        <p>You can use your action to make melee attacks against any number of creatures within 5 feet of you, with a separate attack roll for each target.</p>

        <h3>Superior Hunter's Defense </h3>

        <em><strong>Hunter Technique:</strong> 15th level</em><br>

        <p>You gain one of the following features of your choice. </p>

        <h4>Evasion</h4>

        <p>When you are subjected to an effect that allows you to make a Dexterity saving throw to take only half damage, you instead take no damage if you succeed on a saving throw, and only half damage if you fail.</p>

        <h4>&emsp;&emsp;Stand Against the Tide</h4>

        &emsp;When a hostile creature misses you with a melee attack, you can use your reaction to force that creature<br> &emsp;&emsp;&emsp;to repeat the same attack against another<br> &emsp;&emsp;creature (other than itself) of your choice. 

        <h4>Uncanny Dodge</h4>

        <p>When an attacker that you can see hits you with an attack, you can use your reaction to halve the attack's damage against you.</p>

        <img src='https://www.gmbinder.com/images/vyRjX3r.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:500px' />



        <h4>Slayer Technique</h4>

        <p>Some scouts seek to learn the most about their foes and to capitalize on that knowledge. Followers of the Slayer Technique focus on identifying the strengths and weaknesses of their prey, taking advantage of that knowledge to vanquish their foes.</p>

        <h3>Bonus Proficiencies</h3>

        <em><strong>Slayer Technique:</strong> 3rd level</em><br>

        <p>You gain proficiency in heavy armor.</p>

        <h3>Slayer's Pride</h3>

        <em><strong>Slayer Technique:</strong> 3rd level</em><br>

        <p>You have advantage on saving throws against being frightened.</p>

        <h3>Mark of the Slayer</h3>

        <em><strong>Slayer Technique:</strong> 3rd level</em><br>

        <p>You immediately learn if the target of your Ranger's Quarry feature has any damage immunities, resistances, or vulnerabilities and what they are. Additionally, the first time you hit the target of your Ranger's Quarry feature with a weapon attack each turn, it takes extra damage equal to your Ranger's Quarry Damage Die. The damage is of the same type as the weapon's damage.</p>

        <h3>Supernatural Defense</h3>

        <em><strong>Slayer Technique:</strong> 7th level</em><br>

        <p>Whenever the target of your Ranger's Quarry forces you to make a saving throw, or whenever you make an ability check to escape that targets grapple, you can use your reaction and roll your Ranger's Quarry Damage Die, adding it to the roll.  </p>

        <h3>Nemesis</h3>

        <em><strong>Slayer Technique:</strong> 11th level</em><br>

        When you score a critical hit or reduce a<br> creature to 0 hit points on your turn, you<br> can use your bonus action to force one<br> creature of your choice that you can see<br> within 30 feet of you to make a Wisdom<br> saving throw against your tech save DC.<br> On a failed save, a creature becomes<br> frightened of you for 1 minute. At the<br> end of each of the creature's turns it<br> repeats this saving throw, ending the effect on a success.

        <h3>Slayer's Counter</h3>

        <em><strong>Slayer Technique:</strong> 15th level</em><br>

        If the target of your Ranger's Quarry feature forces you to make a saving throw, you can use your reaction to make one weapon attack against it. You make this attack immediately before making the saving throw.<br> If your attack hits, you automatically succeed on<br> the saving throw, in addition to the attack's<br> normal effects.

        <img src='https://www.gmbinder.com/images/XQCbhQJ.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:935px' />



        <h4>Stalker Technique</h4>

        <p>Some Scouts become consumed by the thrill of the hunt. Only heard and never seen they revel in the violence of battle. Followers of the Stalker Technique hone their abilities to track others utilizing a variety of techniques: camouflage, infiltration, surveillance, and target acquisition.</p>

        <h3>Accomplished Ambusher</h3>

        <em><strong>Stalker Technique:</strong> 3rd level</em><br>

        <p>When you take the Attack action against a creature that is surprised, you can make one additional attack against that creature as a part of that action.</p>

        <h3>Mark of the Stalker</h3>

        <em><strong>Stalker Technique:</strong> 3rd level</em><br>

        <p>While you are hidden from the target of your Ranger's Quarry feature, the first attack roll you make each round against that creature does not automatically reveal your presence to that creature. Make a Dexterity (Stealth) check contested by your target's Wisdom (Perception) check. On a success, you remain hidden. If you are less than 30 feet from your target, the Dexterity (Stealth) check is made with disadvantage.</p>

        <h3>Concealment</h3>

        <em><strong>Stalker Technique:</strong> 7th, 9th, 13th, and 17th level</em><br>

        You've become adept at evading creatures that <br>rely on darkvision. While in darkness, you are<br> invisible to any creature that relies on darkvision<br> to see you in that darkness.

        Additionally, when you hit a creature with a ranged weapon attack while hidden, you can force that creature to make a Dexterity saving throw against<br> your tech save DC. On a failed save, the creature's speed is reduced to 0 until the end of your next turn. You can use this feature three times. You gain an additional use at 9th, 13th, and 17th level. You regain all expended uses when you finish a short or long rest.

        <h3>Stalker's Flurry</h3>

        <em><strong>Stalker Technique:</strong> 11th level</em><br>

        <p>If you have advantage on a weapon attack against a target on your turn, you can forgo that advantage to immediately make an additional weapon attack against the same target as a bonus action.</p>



        <h3>Stalker's Dodge</h3>

        <em><strong>Stalker Technique:</strong> 15th level</em><br>

        <p>Whenever a creature attacks you and does not have advantage, you can use your reaction to impose disadvantage on the creature's attack roll against you. You can use this feature before or after the attack roll is made, but it must be used before the outcome of the roll is determined.</p>

        <img src='https://www.gmbinder.com/images/2P5Z0ak.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:860px' />



        <h2>Sentinel</h2>

        <span style="font-variant: small-caps">Clad in black robes, the rattataki pulls his hood forward and</span> steps into the shadowy alcove, only to reappear further down the hall. As his quarry walks past, he presses the hilt of his lightsaber to the back of their head, quickly toggling it on-and-off. He is gone before the corpse hits the ground.

        <p>The togruta dashes across the battlefield, doublesaber deflecting blaster shots to the ground. She pulls her wounded padawan to her feet, and guides her away from the warzone.</p>

        <p>Green-bladed lightsaber a blur, the cathar ferociously presses the attack. With each strike, she guides her opponent closer to the ravine's edge. A flurry of blows followed by a quick <em>force push</em> and her foe tumbles over the edge.</p>

        <p>Sentinels are the masters of blending force powers with weapon attacks. They weave the two together so expertly that their foes have trouble predicting them.</p>



        <h3>The Middle of the Road</h3>

        <p>The sentinel uses stealth and subterfuge to accomplish the will of the Force. Where the consular focuses on mastery of the Force and the guardian focuses on the mastery of the lightsaber, the sentinel focuses on merging the two. </p>



        <h3>Solitary Action</h3>

        <p>Sentinels are notoriously independent, most comfortable acting alone and without backup; where some use a team to make up for their weaknesses, the sentinel uses the Force to overcome theirs. While some take this independent streak to the extreme, they are usually accepting of authority, as long as they are allowed to carry out directions using their preferred methods.</p>



        <img src='https://www.gmbinder.com/images/p6mjesQ.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:758px' />

        <h3>Creating a Sentinel</h3>

        <p>While creating your sentinel, consider your personal philosophy in regards to the Force and its most famous practitioners � the Jedi and the Sith.  Are you a member of one of the two orders, or do you walk a different path? Are you an operative tapping into a latent Force-sensitivity? Were you trained in the force from a young age, or did you discover it as an adult? How do you treat those weaker than you? What was your family like? Do you see the Force as light and dark, or an impartial river of gray?</p>

        <h4>Quick Build</h4>

        <p>You can make a sentinel quickly by following these suggestions. First, make Dexterity your highest ability score, followed by Wisdom or Charisma. Second, choose the Jedi or Sith background.</p>



