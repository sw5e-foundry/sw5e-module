><tr><td>&nbsp;81-<br>&nbsp;82</td><td>You can take one additional action immediately.</td></tr><tr><td>&nbsp;83-<br>&nbsp;84</td><td>Each creature within 30 feet of you takes 1d10 necrotic damage and you gain hit points equal to the damage.</td></tr><tr><td>&nbsp;85-<br>&nbsp;86</td><td>You cast <em>mirror image</em> without expending tech points.</td></tr><tr><td>&nbsp;87-<br>&nbsp;88</td><td>You are frozen in carbonite and paralyzed for 1 minute or until you take damage.</td></tr><tr><td>&nbsp;89-<br>&nbsp;90</td><td>You turn invisible and can't make sound for 1 minute, or until you attack or cast a power.</td></tr><tr><td>&nbsp;91-<br>&nbsp;92</td><td>If you die within the next minute, you immediately come back to life as if by the <em>defibrillate</em> power.</td></tr><tr><td>&nbsp;93-<br>&nbsp;94</td><td>Your size increases by one size category for the next minute.</td></tr><tr><td>&nbsp;95-<br>&nbsp;96</td><td>You and all creatures within 30 feet of you gain vulnerability to energy damage for the next minute.</td></tr><tr><td>&nbsp;97-<br>&nbsp;98</td><td>You are surrounded by faint, ethereal music for the next minute.</td></tr><tr><td>&nbsp;99-<br>&nbsp;100</td><td>You regain half your expended tech points.</td></tr></tbody></table></div>



        <h2>Fighter</h2>

        <span style="font-variant: small-caps">A Trandoshan runs frantically across rooftops, constantly</span> looking over his shoulder. As he prepares to leap a gap, a blaster bolt hits him in the back and renders<br> him unconscious. His blurry vision barely<br> makes out the figure of a masked woman<br> who casually approaches, ready to collect her<br> bounty.

        With his muscular arms held wide, a<br> grizzled-looking Wookiee grins to his<br> bloodthirsty crowd. He turns back to<br> his arena opponent just in time to<br> see the Besalisk take a swing. He<br> ducks, punching the four-armed<br> fighter in the gut. Two wild<br> haymakers later, and he stands<br> alone as the<br> gladiatorial<br> champion. 

        Taking a deep breath, a Republic<br> soldier looks out onto the war zone<br> waging across the frozen surface of<br> Ilum. He grips his blaster rifle tightly<br> then, with a nod to the dozen squad-<br>mates beside him, he charges onto<br> the battlefield. 

        Fighters combine discipline with<br> martial skills to become the best<br> pure warriors in the galaxy. Fighters<br> can be stalwart defenders of those in<br> need, cruel marauders, or brave advent-<br>urers. They fight for glory, honor, to right<br> wrongs, to gain power, to acquire wealth, or<br> simple for the thrill of battle.



        <h3>All in a Day's Work</h3>

        <p>Many fighters see adventures, raids on enemy strongholds, and dangerous missions as their jobs. Some want to defend those who can't defend themselves while others seek to use their muscle to carve their own place of importance in the galaxy. Fighters can take the form of guards, champions, bounty hunters, enforcers, mercenaries, freedom fighters, or simply armed explorers.</p>

        <h3>Code Red</h3>

        <p>Most fighters come to the profession after receiving at least some amount of formal training from a military organization. Some attend formal academies; others are self-taught and well tested. A fighter may have taken up his weapon to escape a mundane life while another may be following a proud family tradition. Whatever their origins, most fighters share an unshakeable loyalty. Fighters follow orders with little hesitation, as failure can often mean death.</p>



        <h3>Creating a Fighter</h3>

        While creating your fighter character, consider where<br> your loyalties lie. You could be part of a formal military,<br> one of countless troopers fighting for your enterprise.<br> Perhaps you are a gun-for-hire, traveling the galaxy in<br> search of your next gig. What weapons do you prefer<br> and specialize in? Who or what do you fight for? Do you<br> have aspirations of a life beyond the battlefield, or<br> have you been at war so long you know of nothing<br> else?

        <h4>Quick Build</h4>

        You can make a fighter quickly by following these<br> suggestions. First, make Strength or Dexterity your<br> highest ability modifier, depending on whether you<br> want to focus on melee combat or on ranged weapons<br> (or finesse weapons). Your next-highest score should<br> be Constitution. Second, choose the soldier<br> background.

