        <h4>Players as Droids</h4>

        <blockquote><p>Work with your GM to determine if playing as a droid is appropriate for your campaign. Droids are impervious to many effects and vulnerable to others. If your GM approves this choice of species, Work with them to determine your droids designation, name, and appearance. If you want to play a different type of droid, work with your GM to find suitable traits to realize your character.</p></blockquote>



        <h3>Appearance</h3>

        <p>Class I droids are typically vaguely human-like in both shape and size, standing at around 6 feet, although some are smaller. They are usually a polished metallic color, though this can vary based on tasks for which they are created, their affiliation, or quirks of their owner.</p>

        <h3>Utility</h3>

        <p>Class I droids are programmed for the mathematical, medical, or physical sciences. Subcategories of the first degree are medical droids, biological science droids, physical science droids, and mathematics droids.</p>

        <p>Medical droids, also known as meddroids, med droids, medical units or surgical droids are a type of droid designed to heal living beings, and are the most commonly found Class I droids.</p>

        <h3>Names</h3>

        <p>Droids are typically called by their designation, given to them when they are created, or some affectation given to them by their owner. Often this affectation is a play on their designation. Occasionally, noteworthy droids will earn monikers based on their accomplishments.</p>

        <p><strong>Designations (Names).</strong> 2MED2 (Toomedtoo), GH-7 (Geeaych-Seven), TX-20 (Tee-Ex Twenty)</p>



        <h3>Class I Droid Traits</h3>

        <p>As a class I droid, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Intelligence score increases by 2, and your Wisdom or Charisma score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Droids don't age, though they require maintenance to retain functionality.</p>

        <p><strong><em>Alignment.</em></strong> Droids tend toward no particular alignment. The best and worst are found among them.</p>

        <p><strong><em>Size.</em></strong> Class I droids stand between 5 and 6 feet tall and weigh about 170 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Type.</em></strong> Your creature type is droid.</p>

        <p><strong><em>Armor Integration.</em></strong> You can not wear armor, but you can have the armor professionally integrated into your chassis over the course of a long rest. This work must be done by someone proficient with astrotech's implements. You must be proficient in armor in order to have it integrated.</p>

        <p><strong><em>Droid Resistances.</em></strong> You are resistant to necrotic, poison, and psychic damage, and are immune to poison and disease.</p>

        <p><strong><em>Droid Systems.</em></strong> You do not need to eat or drink. Additionally, you no longer require a tech focus to cast tech powers.</p>

        <p><strong><em>Droid Vulnerabilities.</em></strong> You are vulnerable to ion damage. Additionally, you have disadvantage on saving throws against effects that would deal ion or lightning damage.</p>

        <p><strong><em>Force-Insensitive.</em></strong> While droids can be manipulated by many force powers, they can not sense the Force. You can not use force powers or take levels in forcecasting classes.</p>

        <p><strong><em>Knowledge Protocol.</em></strong> You have proficiency in two Intelligence, Wisdom, or Charisma skills of your choice.</p>

        <p><strong><em>Maintenance Mode.</em></strong> Rather than sleep, you must spend 3 hours performing routine maintenance during a long rest to gain its benefits, during which you have disadvantage on Wisdom (Perception) checks. Additionally, if your long rest would be interrupted, you only need to complete the long rest instead of restarting it.</p>

        <p><strong><em>Rapid Reconstruction.</em></strong> You are built with internal repair mechanisms. As a bonus action, you can choose to spend one of your Hit Dice to recover hit points. </p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and one language of your choice. You can understand spoken and written Binary, but you can not speak it.</p>

