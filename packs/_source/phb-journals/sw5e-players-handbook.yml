        <h3>Biology and Appearence</h3>

        <p>The mon calamari are a bipedal, amphibious species with high-domed heads, webbed hands and large, goggle-like eyes. In addition to being webbed, the mon calamari hand presents three suction-cup like holes on its palm, and featured five claw-tipped fingers: one opposable thumb, two long middle fingers, and two very short outer fingers. Although they are shaped like flippers, their feet can nevertheless fit into boots designed for human-like feet. The females are distinguished from the males by their more prominent chest areas.</p>

        <h3>Society and Culture</h3>

        The mon calamari have developed a very advanced<br> and civilized culture. Their art, music, literature, and<br> science show a creativity surpassed by few in the<br> galaxy. Mon calamari literature depicts stars as islands<br> in a galactic sea, showing a passionate longing to<br> explore space and discover other civilizations. Mon<br> Calamari are both soft-spoken and gentle, slow to<br> anger, and have the remarkable ability to maintain<br> their concentration without being distracted by<br> emotional responses. They are both inquisitive and<br> creative, and have a near-legendary quality of being<br> both determined and dedicated; once a mon calamari<br> decides on a course of action, they are not easily<br> swayed from that decision. They often fixate<br> themselves on "lost causes." 

        <h3>Names</h3>

        <p>Mon calamari names generally have a melodic feel.</p>

        <p><strong>Male Names.</strong> Creaz, Fior, Hurneerth, Nurrins, Sielpa</p>

        <p><strong>Female Names.</strong> Afwa, Lel, Mhirim, Ri, Theya</p>

        <p><strong>Surnames.</strong> Dualda, Gradi, Tua, Valec, Winab</p>



        <h3>Mon Calamari Traits</h3>

        <p>As a mon calamari, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Charisma score increases by 2, and your Intelligence or Wisdom score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Mon calamari reach adulthood in their late teens and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Mon calamaris' love of the arts cause them to tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Mon calamari stand between 5 and 6 feet tall and rarely weigh more than 150 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Amphibious.</em></strong> You can breathe air and water.</p>

        <p><strong><em>Darkvision.</em></strong> Accustomed to life underwater, you have superior vision in low light conditions. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Mon Calamari Resistance.</em></strong> You have advantage on saving throws against effects that grant the slowed condition and you have resistance against cold damage (explained in chapter 9).</p>

        <p><strong><em>Musical.</em></strong> You have proficiency in one musical instrument of your choice.</p>

        <p><strong><em>Swim.</em></strong> You have a swimming speed of 30 feet.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic, Mon Cal, and one language of your choice.</p>

