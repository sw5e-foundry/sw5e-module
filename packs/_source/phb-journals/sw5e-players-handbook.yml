        <h3>Biology and Appearance</h3>

        Jawas are easily identifiable by their traditional brown hooded robes, though it is not unheard of for them to wear other colors. Other notable features included<br> their glowing yellow eyes, small stature and high<br> pitched, quickly spoken language called Jawaese.<br> Underneath their robes, jawas appear to be gaunt,<br> rodent-like creatures, with shrunken faces and yellow<br> eyes. 

        <h3>Society and Culture</h3>

        <p>Jawas are a communal, compulsive scavenger species who spend most of their life devoted to scavenging the deserts of Tatooine in search of any scrap metal, droid or mechanical part left behind from millennia of star travel and technological advancement. Most non-jawas regard the jawas as scavengers and thieves, a description that most jawas actually find pleasing.</p>

        <p>The jawa's unofficial motto is <em>not to look for uses in a salvaged item, but rather to imagine someone else who might find a use for it.</em> This is evidenced in their endless search for wares with which to trade with almost any being jawas encounter. They have a kind of instinctive feel for machinery and electronics, notorious for knowing how to get a piece of equipment functioning just well enough to sell.</p>

        <h3>Names</h3>

        <p>Jawa names are quickly spoken, complex, and often misunderstood. Jawas who spend the majority of their time around other species respond well to nicknames. Male and female names do not significantly deviate. Surnames are clan based.</p>

        <p><strong>Male names.</strong> Bilvu, Mnak, Penk, Plin, Vih</p>

        <p><strong>Female names.</strong> Bahimos, Kola, Levu, Rhovi, Uvet</p>

        <p><strong>Surnames.</strong> Kkejenem, M'avoe, Tjoteelt, Wiamoel</p>



        <h3>Jawa Traits</h3>

        <p>As a jawa, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Intelligence score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Jawas are considered adults when they make their first sale and live less than a century.</p>

        <p><strong><em>Alignment.</em></strong> Jawas tendency to steal and swindle causes them to tend towards the dark side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Jawas stand around 3 to 4 feet tall and weigh about 40 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Darkvision.</em></strong> You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Grovel, Cower, and Beg.</em></strong> As an action on your turn, you can cower pathetically to distract nearby foes. Until the end of your next turn, your allies gain advantage on attack rolls against enemies within 10 feet of you that can see you. Once you use this trait, you can't use it again until you finish a short or long rest.</p>

        <p><strong><em>Tech Dabbler.</em></strong> You know the <em>ion blast</em> at-will tech power. When you reach 3rd level, you learn and can cast the <em>repair droid</em> tech power once per long rest. When you reach 5th level, you learn and can cast the <em>hold droid</em> tech power once per long rest. Your techcasting ability is Intelligence. You require use of a wristpad for these powers.</p>

        <p><strong><em>Thieves.</em></strong> You have proficiency in Sleight of Hand.</p>

        <p><strong><em>Tinker.</em></strong> You have proficiency with tinker's implements. You can use these and spend 1 hour and 100 cr worth of materials to construct a Tiny Device (AC 5, 1 hp). You can take the Use an Object action to have your device cause one of the following effects: create a small explosion, create a repeating loud noise for 1 minute, create smoke for 1 minute, cause a small electrical fire. You can maintain a number of these devices up to your proficiency bonus at once, and a device stops functioning after 24 hours away from you. You can dismantle the device to reclaim the materials used to create it.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Jawaese. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it. Jawaese blends quickly spoken, semi-meaningless syllables with scents to be understood.</p>

