        <h3>Biology and Appearance</h3>

        <p>Ewoks are sentient humanoid mammals, averaging about one meter in height, which can provide an advantage when trying to hide. They are covered in fur from head to toe, with brown and black the most common colors. Other Ewoks have near-white or reddish fur, but red fur is supposedly the rarest shade an Ewok can get. Most Ewoks have solid-colored fur, though a few sport stripes. Ewoks have large, bright eyes, small humanoid noses, and hands that possess two fingers and an opposable thumb. Despite their small size, Ewoks are physically strong enough to overpower combat-trained Humans. Their appearance has been likened to "little bears," though they are sometimes referred to as "mini Wookiees."</p>

        <h3>Society and Culture</h3>

        <p>Most Ewoks live high among the trees of the forest moon, in villages built between the closely spaced trees. The basic design of a tree village has a "Central Village" of thatched-roof huts on the primary limbs. These huts are high enough above the ground to be out of reach of predators. Suspended bridges connect the gaps between trees, adjoining distant huts. Knotted rope ladders allow access up or down.</p>

        <p>Ewoks enjoy singing and playing music during celebrations and rituals. They are resourceful and tend to make use of everything they get their hands on; they use a variety of crude drums, horns, flutes, and other instruments in their music.</p>

        <h3>Names</h3>

        <p>Ewok names are comprised of growled consonants. Female names always end in a vowel. Surnames are clan-based.</p>

        <p><strong>Male Names.</strong> Coostick, Erphek, Grarphil, Moodoo</p>

        <p><strong>Female Names.</strong> Booshi, Chela, Fesasha, Lipe, Ypezzi</p>

        <p><strong>Surnames.</strong> Fedrimra, Jellyng, Moomrack, Trantelaa</p>



        <h3>Ewok Traits</h3>

        <p>As an Ewok, you have the following special traits.</p>

        <p><strong><em>Ability Score Increase.</em></strong> Your Dexterity score increases by 2, and your Constitution score increases by 1.</p>

        <p><strong><em>Age.</em></strong> Ewoks reach adulthood in their early teens and live about 50 years.</p>

        <p><strong><em>Alignment.</em></strong> Ewoks are inherently accepting, albeit naive, and tend toward the light side, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Ewoks stand between 3 and 4 feet tall and weigh about 50 lbs. Regardless of your position in that range, your size is Small.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 25 feet.</p>

        <p><strong><em>Crude Weapon Specialists.</em></strong> Ewoks are used to making do with less. You can spend 1 hour, which you can do over the course of a short rest, crafting a weapon out of loose materials. You can craft any simple kinetic weapon, but the weapon's damage suffers a -1 penalty.</p>

        <p><strong><em>Keen Smell.</em></strong> You have advantage on Wisdom (Perception) checks that rely on smell.</p>

        <p><strong><em>Musical Culture.</em></strong> Ewoks incorporate music in their celebrations and rituals. You have proficiency in an instrument of your choice.</p>

        <p><strong><em>Natural Survivalist.</em></strong> You have proficiency in Nature and Survival.</p>

        <p><strong><em>Mask of the Wild.</em></strong> You can attempt to hide even when you are only lightly obscured by foliage, heavy rain, falling snow, mist, and other natural phenomena.</p>

        <p><strong><em>Treeclimber.</em></strong> You have a climbing speed of 25 feet. You have advantage on Strength saving throws and Strength (Athletics) checks that involve climbing.</p>

        <p><strong><em>Undersized.</em></strong> Your small stature makes it hard for you to wield bigger weapons. You can't use heavy shields. Additionally, you can't use martial weapons with the two-handed property unless it also has the light property, and if a martial weapon has the versatile property, you can only wield it in two hands.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Ewokese. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it.</p>

