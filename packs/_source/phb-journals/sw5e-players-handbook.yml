        <h1>Chapter 7: Using Ability Scores</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">ix abilities provide a quick description of</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; every creature's physical and mental<br> characteristics:<br>

        <hr>

        <ul><li><strong>Strength</strong>, measuring physical power</li><li><strong>Dexterity</strong>, measuring agility</li><li><strong>Constitution</strong>, measuring endurance</li><li><strong>Intelligence</strong>, measuring reasoning and memory</li><li><strong>Wisdom</strong>, measuring awareness and intuition</li><li><strong>Charisma</strong>, measuring force of personality</li></ul>

        <hr>

        <p>Is a character muscle-bound and insightful? Brilliant and charming? Nimble and hardy? Ability scores define these qualities�a creature's assets as well as weaknesses.</p>

        <p>The three main rolls of the game�the ability check, the saving throw, and the attack roll�rely on the six ability scores. The book's introduction describes the basic rule behind these rolls: roll a d20, add an ability modifier derived from one of the six ability scores, and compare the total to a target number.</p>

        <p>This chapter focuses on how to use ability checks and saving throws, covering the fundamental activities that creatures attempt in the game. Rules for attack rolls appear in chapter 9.</p>

        <h2>Ability Scores and Modifiers</h2>

        <p>Each of a creature's abilities has a score, a number that defines the magnitude of that ability. An ability score is not just a measure of innate capabilities, but also encompasses a creature's training and competence in activities related to that ability.</p>

        <p>A score of 10 or 11 is the normal human average, but adventurers and many monsters are a cut above average in most abilities. A score of 18 is the highest that a person usually reaches. Adventurers can have scores as high as 20, and monsters and villains can have scores as high as 30.</p>

        <p>Each ability also has a modifier, derived from the score and ranging from -5 (for an ability score of 1) to +10 (for a score of 30). The Ability Scores and Modifiers table notes the ability modifiers for the range of possible ability scores, from 1 to 30.</p>

        <p>To determine an ability modifier without consulting the table, subtract 10 from the ability score and then divide the total by 2 (round down).</p>

        <p>Because ability modifiers affect almost every attack roll, ability check, and saving throw, ability modifiers come up in play more often than their associated scores.</p>

        <h2>Advantage and Disadvantage</h2>

        <p>Sometimes a special ability or power tells you that you have advantage or disadvantage on an ability check, a saving throw, or an attack roll. When that happens, you roll a second d20 when you make the roll. Use the higher of the two rolls if you have advantage, and use the lower roll if you have disadvantage. For example, if you have disadvantage and roll a 17 and a 5, you use the 5. If you instead have advantage and roll those numbers, you use the 17.</p>

        <h5>Ability Scores and Modifiers</h5>

        <div class="sw5e-book-block"><table class="sw5e-book-table"><thead><tr><th>Score</th><th>Modifier</th></tr></thead><tbody><tr><td>1</td><td>-5</td></tr><tr><td>2-3</td><td>-4</td></tr><tr><td>4-5</td><td>-3</td></tr><tr><td>6-7</td><td>-2</td></tr><tr><td>8-9</td><td>-1</td></tr><tr><td>10-11</td><td>+0</td></tr><tr><td>12-13</td><td>+1</td></tr><tr><td>14-15</td><td>+2</td></tr></tbody></table>

        <table class="sw5e-book-table"><thead><tr><th>Score</th><th>Modifier</th></tr></thead><tbody><tr><td>16-17</td><td>+3</td></tr><tr><td>18-19</td><td>+4</td></tr><tr><td>20-21</td><td>+5</td></tr><tr><td>22-23</td><td>+6</td></tr><tr><td>24-25</td><td>+7</td></tr><tr><td>26-27</td><td>+8</td></tr><tr><td>28-29</td><td>+9</td></tr><tr><td>30</td><td>+10</td></tr></tbody></table></div>

        <p>&emsp;If multiple situations affect a roll and each one grants advantage or imposes disadvantage on it, you don't roll more than one additional d20. If two favorable situations grant advantage, for example, you still roll only one additional d20.</p>

        <p>If circumstances cause a roll to have both advantage and disadvantage, you are considered to have neither of them, and you roll one d20. This is true even if multiple circumstances impose disadvantage and only one grants advantage or vice versa. In such a situation, you have neither advantage nor disadvantage.</p>

        <p>When you make a roll with advantage or disadvantage, only the d20 is rolled twice. Any additional dice, such as the d4 granted by the <em>resistance</em> force power, are only rolled once.</p>

        <p>When you have advantage or disadvantage and something in the game, such as the iktotchi's Precognition trait, lets you reroll the d20, you can reroll only one of the dice. You choose which one. For example, if an iktotchi has advantage on an ability check and rolls a 1 and a 13, the iktotchi could use the Precognition trait to reroll the 1.</p>

        <p>You usually gain advantage or disadvantage through the use of special abilities, actions, or powers. Inspiration (see chapter 4) can also give a character advantage on checks related to the character's personality, ideals, or bonds. The GM can also decide that circumstances influence a roll in one direction or the other and grant advantage or impose disadvantage as a result.</p>

        <h3>Advantage on Other Rolls</h3>

        <p>Though less common, advantage and disadvantage can occur on other types of rolls as well. When you have advantage or disadvantage on a roll, as with a d20, you roll the dice twice, using the higher of the two results with advantage, and using the lower of the two results if you have disadvantage. If a roll has multiple dice, you roll the dice together and treat the results separately.</p>

        <p>For instance, the second bullet of the Weapon Expert feat grants conditional advantage on a weapon's damage roll once per turn, provided you meet the criteria for that advantage. If any additional dice would be added to the damage roll, such as the operative's Sneak Attack feature or the scout's Ranger's Quarry, those additional dice are only rolled once.</p>



        <p>&emsp;If granting advantage or disadvantage on a roll that would have negative consequences, rather than positive benefits, advantage and disadvantage should be reversed (as logic dictates). For instance, if a creature has a penalty die on a d20 roll, such as a d4 penalty die from the <em>denounce</em> force power, and they get disadvantage on that die roll, they should roll the d4 twice and take the higher roll, instead of the lower.</p>

        <h2>Proficiency Bonus</h2>

        <p>Characters have a proficiency bonus determined by level, as detailed in chapter 1. Monsters also have this bonus, which is incorporated in their stat blocks. The bonus is used in the rules on ability checks, saving throws, and attack rolls.</p>

        <p>Your proficiency bonus can't be added to a single die roll or other number more than once. For example, if two different rules say you can add your proficiency bonus to a Wisdom saving throw, you nevertheless add the bonus only once when you make the save.</p>

        <p>Occasionally, your proficiency bonus might be multiplied or divided (doubled or halved. for example) before you apply it. If a circumstance suggests that your proficiency bonus applies more than once to the same roll, you still add it only once and multiply or divide it only once.</p>

        <p>By the same token, if a feature or effect allows you to multiply your proficiency bonus when making an ability check that wouldn't normally benefit from your proficiency bonus, you still don't add the bonus to the check. For that check your proficiency bonus is 0, given the fact that multiplying 0 by any number is still 0. For instance, if you lack proficiency in the Lore skill, you gain no benefit from a feature that lets you double your proficiency bonus when you make Intelligence (Lore) checks.</p>

        <p>In general, you don't multiply your proficiency bonus for attack rolls or saving throws. If a feature or effect allows you to do so, these same rules apply.</p>

        <h3>Expertise</h3>

        <p>Certain features, such as the Expertise class feature or Ace Pilot feat, grant expertise in a skill or tool, letting you double your proficiency bonus with that skill or tool. As usual, you can only gain expertise in a skill or tool once.</p>

        <p>Far less common, though still possible, a creature can gain expertise in a saving throw. Creatures cannot gain expertise in weapons, however.</p>

        <h2>Ability Checks</h2>

        <p>An ability check tests a character's or monster's innate talent and training in an effort to overcome a challenge. The GM calls for an ability check when a character or monster attempts an action (other than an attack) that has a chance of failure. When the outcome is uncertain, the dice determine the results.</p>

        <p>For every ability check, the GM decides which of the six abilities is relevant to the task at hand and the difficulty of the task, represented by Difficulty Class (DC). The more difficult a task, the higher its DC. The Ability Check DCs table shows common DCs.</p>

        <p>To make an ability check, roll a d20 and add the relevant ability modifier. As with other d20 rolls, apply bonuses and penalties, and compare the total to the DC. If the total equals or exceeds the DC, the ability check is a success�the creature overcomes the challenge at hand. Otherwise, it's a failure, which means the character or monster makes no progress toward the objective or makes progress combined with a setback determined by the GM.</p>

        <h3>Contests</h3>

        <p>Sometimes one character's or monster's efforts are directly opposed to another's. This can occur when both of them are trying to do the same thing and only one can succeed, such as attempting to snatch up a ring that has fallen on the floor. This situation also applies when one of them is trying to prevent the other one from accomplishing a goal�for example, when a monster tries to force open a door that an adventurer is holding closed. In situations like these, the outcome is determined by a special form of ability check, called a contest.</p>

        <p>Both participants in a contest make ability checks appropriate to their efforts. They apply all appropriate bonuses and penalties, but instead of comparing the total to a DC, they compare the totals of their two checks. The participant with the higher check total wins the contest. That character or monster either succeeds at the action or prevents the other one from succeeding.</p>

        <p>If the contest results in a tie, the situation remains the same as it was before the contest. Thus, one contestant might win the contest by default. If two characters tie in a contest to snatch a ring off the floor, neither character grabs it. In a contest between a monster trying to open a door and an adventurer trying to keep the door closed, a tie means that the door remains shut.</p>

        <h5>Ability Check DCs</h5>

        <table class="sw5e-book-table"><thead><tr><th>Task Difficulty</th><th>DC</th></tr></thead><tbody><tr><td>Very easy</td><td>5</td></tr><tr><td>Easy</td><td>10</td></tr><tr><td>Medium</td><td>15</td></tr><tr><td>Hard</td><td>20</td></tr><tr><td>Very hard</td><td>25</td></tr><tr><td>Nearly impossible</td><td>30</td></tr></tbody></table>

        <img src='https://www.gmbinder.com/images/gwye6qA.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:1040px' />

        <h3>Additional Dice</h3>

        <p>When making an ability check, attack roll, or saving throw, some features grant an additional die when you make the d20 roll. If features would grant multiple additional dice in such a way, you can only benefit from one of them when you make the d20 roll (you choose which effect to use). For instance, if a creature is forced to make a saving throw, and it is benefiting from both a Potent Aptitude die and the <em>resistance</em> force power, it can only use the additional die granted by one of those effects. Conversely, the same is true for penalty dice.</p>

        <h4>Variant: Additional Die Teamwork</h4>

        <p>In some instances, a party might be relying on the outcome made by a single party member's ability check. If multiple party members could grant that character an additional die, while that character couldn't apply multiple dice to the roll, you might consider allowing them to use the larger die provided, and to roll the die with advantage.</p>

        <h3>Multiple Modifiers</h3>

        <p>As with additional dice, when making an ability check, attack roll, or saving throw, some features might allow multiple modifiers being added to the check. In these cases, only two modifiers may be added to a roll. For instance, if a friendly creature makes a Constitution saving throw within range of a guardian's Aura of Presence, and that creature is also the target of a scholar's Critical Analysis, and they chose to end that Critical Analysis on themselves, they could add either that guardian's Wisdom modifier or the scholar's Intelligence modifier to their Constitution save, but not both.</p>

        <h3>Skills</h3>

        <p>Each ability covers a broad range of capabilities, including skills that a character or a monster can be proficient in. A skill represents a specific aspect of an ability score, and an individual's proficiency in a skill demonstrates a focus on that aspect. (A character's starting skill proficiencies are determined at character ~ creation, and a monster's skill proficiencies appear in the monster's stat block.)</p>

        <p>For example, a Dexterity check might reflect a character's attempt to pull off an acrobatic stunt, to palm an object, or to stay hidden. Each of these aspects of Dexterity has an associated skill: Acrobatics, Sleight of Hand, and Stealth, respectively. So a character who has proficiency in the Stealth skill is particularly good at Dexterity checks related to sneaking and hiding.</p>

        <p>The skills related to each ability score are shown in the following list. (No skills are related to Constitution.) See an ability's description in the later sections of this chapter for examples of how to use a skill associated with an ability.</p>

        <ul><li><strong>Strength</strong>: Athletics</li><li><strong>Dexterity</strong>: Acrobatics, Sleight of Hand, Stealth</li><li><strong>Intelligence</strong>: Investigation, Lore, Nature, Piloting, Technology</li><li><strong>Wisdom</strong>: Animal handling, Insight, Medicine, Perception, Survival</li></ul>



        <ul><li><strong>Charisma</strong>: Deception, Intimidation, Performance, Persuasion</li></ul>

        <p>Sometimes, the GM might ask for an ability check using a specific skill�for example, "Make a Wisdom (Perception) check." At other times, a player might ask the GM if proficiency in a particular skill applies to a check. In either case, proficiency in a skill means an individual can add his or her proficiency bonus to ability checks that involve that skill. Without proficiency in the skill, the individual makes a normal ability check.</p>

        <p>For example, if a character attempts to climb up a dangerous cliff. the Dungeon Master might ask for a Strength (Athletics) check. If the character is proficient in Athletics, the character's proficiency bonus is added to the Strength check. If the character lacks that proficiency, he or she just makes a Strength check.</p>

        <h4>Variant: Skills with Other Abilities</h4>

        <p>Normally, your proficiency in a skill applies only to a specific kind of ability check. Proficiency in Athletics, for example, usually applies to Strength checks. In some situations, though, your proficiency might reasonably apply to a different kind of check. In such cases, the GM might ask for a check using an unusual combination of ability and skill, or you might ask your GM if you can apply a proficiency to a different check. For example, if you have to swim from an offshore island to the mainland, your GM might call for a Constitution check to see if you have the stamina to make it that far. In this case, your GM might allow you to apply your proficiency in Athletics and ask for a Constitution (Athletics) check. </p>

        <p>So if you're proficient in Athletics, you apply your proficiency bonus to the Constitution check just as you would normally do for a Strength (Athletics) check. Similarly, when your trandoshan berserker uses a display of raw strength to intimidate an enemy, your GM might ask for a Strength (Intimidation) check, even though Intimidation is normally associated with Charisma.</p>

        <h3>Passive Checks</h3>

        <p>A passive check is a special kind of ability check that doesn't involve any die rolls. Such a check can represent the average result for a task done repeatedly, such as searching for secret doors over and over again, or can be used when the GM wants to secretly determine whether the characters succeed at something without rolling dice, such as noticing a hidden monster.</p>

        <p>Here's how to determine a character's total for a passive check:</p>

        <p>10 + all modifiers that normally apply to the check. If the character has advantage on the check, add 5. For disadvantage, subtract 5. The game refers to a passive check total as a score.</p>

        <p>For example. if a 1st-level character has a Wisdom of 15 and proficiency in Perception, he or she has a passive Wisdom (Perception) score of 14.</p>

        <p>The rules on hiding in the "Dexterity" section below rely on passive checks, as do the exploration rules in chapter 8.</p>



        <h3>Working Together</h3>

        <p>Sometimes two or more characters team up to attempt a task. The character who's leading the effort, or the one with the highest ability modifier, can make an ability check with advantage, reflecting the help provided by the other characters. In combat, this requires the Help action (see chapter 9).</p>

        <p>A character can only provide help if the task is one that he or she could attempt alone. For example, trying to open a lock requires proficiency with security kits, so a character who lacks that proficiency can't help another character in that task. Moreover. a character can help only when two or more individuals working together would actually be productive. Some tasks, such as threading a needle, are no easier with help.</p>

        <h4>Group Checks</h4>

        <p>When a number of individuals are trying to accomplish something as a group, the GM might ask for a group ability check. In such a situation, the characters who are skilled at a particular task help cover those who aren't. </p>

        <p>To make a group ability check,  everyone in the group makes the ability check. If at least half the group succeeds, the whole group succeeds. Otherwise, the group fails.</p>

        <p>Group checks don't come up very often, and they're most useful when all the characters succeed or fail as a group. For example, when adventurers are navigating a swamp, the GM might call for a group Wisdom (Survival) check to see if the characters can avoid the quicksand, sinkholes, and other natural hazards of the environment. If at least half the group succeeds, the successful characters are able to guide their companions out of danger. Otherwise, the group stumbles into one of these hazards.</p>

        <h2>Using Each Ability</h2>

        <p>Every task that a character or monster might attempt in the game is covered by one of the six abilities. This section explains in more detail what those abilities mean and the ways they are used in the game.</p>

        <h3>Strength</h3>

        <p>Strength measures bodily power, athletic training, and the extent to which you can exert raw physical force.</p>

        <h4>Strength Checks</h4>

        <p>A Strength check can model any attempt to lift, push, pull, or break something, to force your body through a space, or to otherwise apply brute force to a situation. The Athletics skill reflects aptitude in certain kinds of Strength checks.</p>

        <p><strong><em>Athletics.</em></strong> Your Strength (Athletics) check covers difficult situations you encounter while climbing, jumping, or swimming. Examples include the following activities:</p>

        <ul><li>You attempt to climb a sheer or slippery cliff, avoid hazards while scaling a wall, or cling to a surface while something is trying to knock you off.</li><li>You try to jump an unusually long distance or pull off a stunt midjump.</li></ul>



        <ul><li>You struggle to swim or stay afloat in treacherous currents, storm-tossed waves, or areas of thick seaweed. Or another creature tries to push or pull you underwater or otherwise interfere with your swimming.</li></ul>

        <p><strong><em>Other Strength Checks.</em></strong> The GM might also call for a Strength check when you try to accomplish tasks like the following:</p>

        <ul><li>Force open a stuck, locked, or barred door</li><li>Break free of bonds</li><li>Push through a tunnel that is too small</li><li>Hang on to a wagon while being dragged behind it</li><li>Tip over a statue</li><li>Keep a boulder from rolling</li></ul>

        <h4>Attack Rolls and Damage</h4>

        <p>You add your Strength modifier to your attack roll and your damage roll when attacking with a melee weapon such as a vibrosword or doublesword. You use melee weapons to make melee attacks in hand�to�hand combat, and some of them can be thrown to make a ranged attack.</p>

        <h4>Lifting and Carrying</h4>

        <p>Your Strength score determines the amount of weight you can bear. The following terms define what you can lift or carry.</p>

        <p><strong><em>Carrying Capacity.</em></strong> Your carrying capacity is your Strength score multiplied by 15. This is the weight (in pounds) that you can carry, which is high enough that most characters don't usually have to worry about it.</p>

        <p><strong><em>Push, Drag, or Lift.</em></strong> You can push, drag, or lift a weight in pounds up to twice your carrying capacity (or 30 times your Strength score). While pushing or dragging weight in excess of your carrying capacity, your speed drops to 5 feet.</p>

        <p><strong><em>Size and Strength.</em></strong> Larger creatures can bear more weight, whereas Tiny creatures can carry less. For each size category above Medium, double the creature' carrying capacity and the amount it can push. drag, or lift. For a Tiny creature, halve these weights.</p>

        <h4>Variant: Encumberance</h4>

        <p>The rules for lifting and carrying are intentionally simple. Here is a variant if you are looking for more detailed rules for determining how a character is hindered by the weight of equipment. When you use this variant, ignore the Strength column of the Armor table in chapter 5.</p>

        <p>If you carry weight in excess of 5 times your Strength score, you are <strong><em>encumbered</em></strong>, which means your speed drops by 10 feet.</p>

        <p>If you carry weight in excess of 10 times your Strength score, up to your maximum carrying capacity, you are instead <strong><em>heavily encumbered</em></strong>, which means your speed drops by 20 feet and you have disadvantage on ability checks, attack rolls, and saving throws that use Strength, Dexterity, or Constitution.</p>



        <h3>Dexterity</h3>

        <p>Dexterity measures agility, reflexes, and balance.</p>

        <h4>Dexterity Checks</h4>

        <p>A Dexterity check can model any attempt to move nimbly, quickly, or quietly, or to keep from falling on tricky footing. The Acrobatics, Sleight of Hand, and Stealth skills reflect aptitude in certain kinds of Dexterity checks.</p>

        <p><strong><em>Acrobatics.</em></strong> Your Dexterity (Acrobatics) check covers your attempt to stay on your feet in a tricky situation, such as when you're trying to run across a sheet of ice, balance on a tightrope, or stay upright on a rocking spaceship's deck. The GM might also call for a Dexterity (Acrobatics) check to see if you can perform acrobatic stunts, including dives, rolls, somersaults, and flips.</p>

        <p><strong><em>Sleight of Hand.</em></strong> Whenever you attempt an act of legerdemain or manual trickery, such as planting something on someone else or concealing an object on your person, make a Dexterity (Sleight of Hand) check. The GM might also call for a Dexterity (Sleight of Hand) check to determine whether you can lift a wallet off another person or slip something out of another person's pocket.</p>

        <p><strong><em>Stealth.</em></strong> Make a Dexterity (Stealth) check when you attempt to conceal yourself from enemies, slink past guards, slip away without being noticed, or sneak up on someone without being seen or heard.</p>

        <p><strong><em>Other Dexterity Checks.</em></strong> The GM might call for a Dexterity check when you try to accomplish tasks like the following:</p>

        <ul><li>Control a heavily laden cart on a steep descent</li><li>Steer a chariot around a tight turn</li><li>Pick a lock</li><li>Disable a trap</li><li>Securely tie up a prisoner</li><li>Wriggle free of bonds</li><li>Play a stringed instrument</li><li>Craft a small or detailed object</li></ul>

        <h4>Attack Rolls and Damage</h4>

        <p>You add your Dexterity modifier to your attack roll and your damage roll when attacking with a ranged weapon. such as a blaster rifle or bowcaster. You can also add your Dexterity modifier to your attack roll and your damage roll when attacking with a melee weapon that has the finesse property, such as a vibrodagger or techblade.</p>

        <h4>Armor Class</h4>

        <p>Depending on the armor you wear, you might add some or all of your Dexterity modifier to your Armor Class, as described in chapter 5.</p>

        <h4>Initiative</h4>

        At the beginning of every combat, you roll initiative by making a Dexterity check. Initiative determines the order of creatures' turns in combat, as described in<br> &emsp;chapter 9.



        <h5>Hiding</h5>

        <blockquote><p>When you try to hide, make a Dexterity (Stealth) check. Until you are discovered or you stop hiding, that checks total is contested by the Wisdom (Perception) check of any creature that actively searches for signs of your presence.</p>

        <p>You can't hide from a creature that can see you, and if you make noise (such as shouting a warning or knocking over a vase), you give away your position. An invisible creature can't be seen, so it can always try to hide. Signs of its passage might still be noticed, however, and it still has to stay quiet.</p>

        <p>In combat, most creatures stay alert for signs of danger all around, so if you come out of hiding and approach a creature, it usually sees you. However, under certain circumstances, the Dungeon Master might allow you to stay hidden as you approach a creature that is distracted, allowing you to gain advantage on an attack before you are seen.</p>

        <p><strong><em>Passive Perception.</em></strong> When you hide, there's a chance someone will notice you even if they aren't searching. To determine whether such a creature notices you, the GM compares your Dexterity (Stealth) check with that creature's passive Wisdom (Perception) score, which equals 10 + the creature's Wisdom modifier, as well as any other bonuses or penalties. If the creature has advantage, add 5. For disadvantage, subtract 5.</p>

        <p>For example, if a lst-level character (with a proficiency bonus of +2) has a Wisdom of 15 (a +2 modifier) and proficiency in Perception, he or she has a passive Wisdom (Perception) of 14.</p>

        <p><strong><em>What Can You See?</em></strong> One of the main factors in determining whether you can find a hidden creature or object is how well you can see in an area, which might be <strong>lightly</strong> or <strong>heavily</strong> obscured, as explained in chapter 8.</p></blockquote>

        <img src='https://www.gmbinder.com/images/DiJI1UG.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:920px' />



        <h3>Constitution</h3>

        <p>Constitution measures health, stamina, and vital force.</p>

        <h4>Constitution Checks</h4>

        <p>Constitution checks are uncommon, and no skills apply to Constitution checks. because the endurance this ability represents is largely passive rather than involving a specific effort on the part of a character or monster. A Constitution check can model your attempt to push beyond normal limits, however.</p>

        <p>The GM might call for a Constitution check when you try to accomplish tasks like the following:</p>

        <ul><li>Hold your breath</li><li>March or labor for hours without rest</li><li>Go without sleep</li><li>Survive without food or water</li><li>Quaff an entire stein of ale in one go</li></ul>

        <h4>Hit Points</h4>

        <p>Your Constitution modifier contributes to your hit points. Typically, you add your Constitution modifier to each Hit Die you roll for your hit points.</p>

        <p>If your Constitution modifier changes, your hit point maximum changes as well, as though you had the new modifier from 1st level. For example, if you raise your Constitution score when you reach 4th level and your Constitution modifier increases from +1 to +2, you adjust your hit point maximum as though the modifier had always been +2. So you add 3 hit points for your first three levels, and then roll your hit points for 4th level using your new modifier. Or if you're 7th level and some effect lowers your Constitution score so as to reduce your Constitution modifier by 1, your hit point maximum is reduced by 7.</p>

        <h3>Intelligence</h3>

        <p>Intelligence measures mental acuity, accuracy of recall, and the ability to reason.</p>

        <h4>Intelligence Checks</h4>

        <p>An Intelligence check comes into play when you need to draw on logic, education, memory, or deductive reasoning. The Investigation, Lore, Nature, Piloting, and Technology skills reflect aptitude in certain kinds of Intelligence checks.</p>

        <p><strong><em>Investigation.</em></strong> When you look around for clues and make deductions based on those clues, you make an Intelligence (Investigation) check. You might deduce the location of a hidden object, discern from the appearance of a wound what kind of weapon dealt it, or determine the weakest point in a tunnel that could cause it to collapse. Poring through ancient materials in search of a hidden fragment of knowledge might also call for an Intelligence (Investigation) check.</p>

        <p><strong><em>Lore.</em></strong> Your Intelligence (Lore) check measures your ability to recall information about the Force, artifacts, histories, and religions.</p>

        <p><strong><em>Nature.</em></strong> Your Intelligence (Nature) check measures your ability to recall lore about terrain, plants and animals, the weather, and natural cycles.</p>

        <p><strong><em>Piloting.</em></strong> Your Intelligence (Piloting) check measures your ability to control vehicles, aircraft, and spaceships. Piloting governs your ability to maneuver through tight spaces and debris fields or dogfight with enemy craft. </p>

        <p><strong><em>Technology.</em></strong> Your Intelligence (Technology) checks measure your ability to recall information about droids, vehicles, spaceships, aircraft, and computers, as well as your ability to interface with them. Technology can also be used to stabilize a droid or construct.</p>

        <p><strong><em>Other Intelligence Checks.</em></strong> The GM might call for an Intelligence check when you try to accomplish tasks like the following:</p>

        <ul><li>Communicate with a creature without using words</li><li>Estimate the value of a precious item</li><li>Pull together a disguise to pass as a city guard</li><li>Forge a document</li><li>Recall lore about a craft or trade</li><li>Win a game of skill</li></ul>

        <h4>Techcasting Ability</h4>

        <p>Techcasters use Intelligence as their techcasting ability, which helps determine the saving throw DCs of power they cast.</p>

        <img src='https://www.gmbinder.com/images/WGUNR7f.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:860px' />



        <h3>Wisdom</h3>

        <p>Wisdom reflects how attuned you are to the world around you and represents perceptiveness and intuition.</p>

        <h4>Wisdom Checks</h4>

        <p>A Wisdom check might reflect an effort to read body language, understand someone's feelings, notice things about the environment, or care for an injured person. The Animal Handling, Insight, Medicine, Perception, and Survival skills reflect aptitude in certain kinds of Wisdom checks.</p>

        <p><strong><em>Animal Handling.</em></strong> When there is any question whether you can calm down a domesticated animal, keep a mount from getting spooked, or intuit an animal's intentions, the GM might call for a Wisdom (Animal Handling) check. You also make a Wisdom (Animal Handling) check to control your mount when you attempt a risky maneuver.</p>

        <p><strong><em>Insight.</em></strong> Your Wisdom (Insight) check decides whether you can determine the true intentions of a creature, such as when searching out a lie or predicting someone's next move. Doing so involves gleaning clues from body language, speech habits, and changes in mannerisms.</p>

        <p><strong><em>Medicine.</em></strong> A Wisdom (Medicine) check lets you try to stabilize a dying companion or diagnose an illness.</p>

        <p><strong><em>Perception.</em></strong> Your Wisdom (Perception) check lets you spot, hear, or otherwise detect the presence of something. It measures your general awareness of your surroundings and the keenness of your senses. For example, you might try to hear a conversation through a closed door, eavesdrop under an open window, or hear monsters moving stealthily in the forest. Or you might try to spot things that are obscured or easy to miss, whether they are orcs lying in ambush on a road, thugs hiding in the shadows of an alley, or candlelight under a closed secret door.</p>

        <p><strong><em>Survival.</em></strong> The GM might ask you to make a Wisdom (Survival) check to follow tracks, hunt wild game, guide your group through frozen wastelands, identify signs that rancors live nearby, predict the weather, or avoid quicksand and other natural hazards.</p>

        <p><strong><em>Other Wisdom Checks.</em></strong> The GM might call for a Wisdom check when you try to accomplish tasks like the following:</p>

        <ul><li>Get a gut feeling about what course of action to follow</li><li>Discern Whether a seemingly dead or living creature is undead</li></ul>

        <h4>Forcecasting Ability</h4>

        <p>Forcecasters use Wisdom as their forcecasting ability for their light side and universal powers, which helps determine the saving throw DCs of powers they cast.</p>



        <h5>Finding a Hidden Object</h5>

        <blockquote><p>When your character searches for a hidden object such as a secret door or a trap, the GM typically asks you to make a Wisdom (Perception) check. Such a check can be used to find hidden details or other information and clues that you might otherwise overlook.</p>

        <p>In most cases, you need to describe where you are looking in order for the GM to determine your chance of success. For example, a key is hidden beneath a set of folded clothes in the top drawer ofa bureau. If you tell the GM that you pace around the room, looking at the walls and furniture for clues, you have no chance of finding the key, regardless of your Wisdom (Perception) check result. You would have to specify that you were opening the drawers or searching the bureau in order to have any chance of success.</p></blockquote>

        <img src='https://www.gmbinder.com/images/dYUUytA.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:420px' />





        <h3>Charisma</h3>

        <p>Charisma measures your ability to interact effectively with others. It includes such factors as confidence and eloquence, and it can represent a charming or commanding personality.</p>

        <h4>Charisma Checks</h4>

        <p>A Charisma check might arise when you try to influence or entertain others, when you try to make an impression or tell a convincing lie, or when you are navigating a tricky social situation. The Deception, Intimidation, Performance, and Persuasion skills reflect aptitude in certain kinds of Charisma checks.</p>

        <p><strong><em>Deception.</em></strong> Your Charisma (Deception) check determines whether you can convincingly hide the truth, either verbally or through your actions. This deception can encompass everything from misleading others through ambiguity to telling outright lies. Typical situations include trying to fast-talk a guard, con a merchant, earn money through gambling, pass yourself off in a disguise, dull someone's suspicions with false assurances, or maintain a straight face while telling a blatant lie.</p>

        <p><strong><em>Intimidation.</em></strong> When you attempt to influence someone through overt threats, hostile actions, and physical violence, the GM might ask you to make a Charisma (Intimidation) check. Examples include trying to pry information out of a prisoner, convincing street thugs to back down from a confrontation, or using the edge of a broken bottle to convince a sneering vizier to reconsider a decision.</p>

        <p><strong><em>Performance.</em></strong> Your Charisma (Performance) check determines how well you can delight an audience with music, dance. acting, storytelling, or some other form of entertainment.</p>

        <p><strong><em>Persuasion.</em></strong> When you attempt to influence someone or a group of people with tact, social graces, or good nature, the GM might ask you to make a Charisma (Persuasion) check. Typically, you use persuasion when acting in good faith, to foster friendships, make cordial requests, or exhibit proper etiquette. Examples of persuading others include convincing a Chamberlain to let your party see the king, negotiating peace between warring tribes, or inspiring a crowd of townsfolk.</p>

        <p><strong><em>Other Charisma Checks.</em></strong> The GM might call for a Charisma check when you try to accomplish tasks like the following:</p>

        <ul><li>Find the best person to talk to for news, rumors, and gossip</li><li>Blend into a crowd to get the sense of key topics of conversation</li></ul>

        <h4>Forcecasting Ability</h4>

        <p>Forcecasters use Charisma as their forcecasting ability for their dark side and universal powers, which helps determine the saving throw DCs of powers they cast.</p>

        <h2>Saving Throws</h2>

        <p>A saving throw-also called a save-represents an attempt to resist a power, a trap, a poison, a disease, or a similar threat. You don't normally decide to make a saving throw; you are forced to make one because your character or monster is at risk of harm.</p>

        <p>To make a saving throw, roll a d20 and add the appropriate ability modifier. For example, you use your Dexterity modifier for a Dexterity saving throw.</p>

        <p>A saving throw can be modified by a situational bonus or penalty and can be affected by advantage and disadvantage, as determined by the GM.</p>

        <p>Each class gives proficiency in at least two saving throws. The operative, for example, is proficient in Intelligence saves. As with skill proficiencies, proficiency in a saving throw lets a character add his or her proficiency bonus to saving throws made using a particular ability score. Some monsters have saving throw proficiencies as well.</p>

        <p>The Difficulty Class for a saving throw is determined by the effect that causes it. For example, the DC for a saving throw allowed by a power is determined by the caster's force- or tech-casting ability and proficiency bonus.</p>

        <p>The result of a successful or failed saving throw is also detailed in the effect that allows the save. Usually, a successful save means that a creature suffers no harm, or reduced harm, from an effect.</p>

        <img src='https://www.gmbinder.com/images/z1tg6NJ.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:375px' />

