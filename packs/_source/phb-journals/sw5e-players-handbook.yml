        <h3>Biology and Appearance</h3>

        <p>Although a typical gamorrean is squat, green, and heavily built, not all shared these characteristics. Most gamorreans have a dark greenish coloration over a large portion of their bodies; however skin coloration does vary, particularly among females, with light skinned and two-toned pigmentation not uncommon. Black, brown, pinkish yellow, and even a rare white pigmentation are possible. Males tended to have less skin variation and had a greater tendency towards dark green skin perhaps because of their higher exposure to the radiation of the Gamorr Star. Eye coloration varied evenly between gold-yellow, blue, black and brown. The gamorreans generally put no importance on skin or eye coloration although there were some superstitions linked to certain markings.</p>

        <h3>Society and Culture</h3>

        <p>Gamorreans are organized into clans ruled by a male warlord and his wife, who was the most powerful of the clan matrons. While the warlord and his boars are solely concerned with preparing and participating in battle with rival clans, the matrons of the clan performed all the productive work including farming, hunting, manufacturing, and running businesses. Since the amount of available arable land on Gamorr is scarce, clans often lay claim to the same piece of land, and they spend their time fighting over possession. </p>

        <h3>Names</h3>

        <p>Gamorrean names are very gutteral and rough. Male names are typically one syllable while females are two. Surnames are based on clan affiliation rather than family. </p>

        <p><strong>Male Names.</strong> Ark, Blarrp, Blubrak, Cuab, Shos</p>

        <p><strong>Female Names.</strong> Dabrisz, Mernoos, Ogreb, Tagorq</p>

        <p><strong>Surnames.</strong> Doofnarq, Griks, Lurc, Poogmokk</p>



        <h3>Gamorrean Traits</h3>

        <p>As a gamorrean, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong>  Your Strength score increases by 2, and your Constitution score increases<br> by 1.

        <p><strong><em>Age.</em></strong> Gamorreans reach adulthood in their early teens and live no more than 70 years.</p>

        <p><strong><em>Alignment.</em></strong> Gamorrean culture causes them to tend toward chaos, though there are exceptions.</p>

        <p><strong><em>Size.</em></strong> Gamorreans typically stand between 5 and 6 feet tall and weigh up to 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Gamorrean Toughness.</em></strong> Your hit point maximum increases by 1, and it increases by 1 every time you gain a level. Additionally, you have advantage on Constitution saving throws.</p>

        <p><strong><em>Gamorrean Weaponry.</em></strong> You have proficiency with the vibroaxe, vibromace, and vibrosword.</p>

        <p><strong><em>Savage Attacks.</em></strong> When you score a critical hit with a melee weapon attack, you can roll one of the weapon's damage dice one additional time and add it to the extra damage of the critical hit.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Gamorrese. You can understand spoken and written Galactic Basic, but your vocal cords do not allow you to speak it. Gamorrese is characterized by its grunts and squeals, and its writing is a crude, pictographic style.</p>

