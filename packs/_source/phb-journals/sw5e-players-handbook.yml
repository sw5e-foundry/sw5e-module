/td><td>9th</td></tr><tr><td>20th</td><td>+6</td><td>One with the Force</td><td>40</td><td>80</td><td>9th</td></tr></tbody></table></div>

        <div class="sw5e-book-block"><h2>Class Features</h2>

        <p>As a consular, you gain the following class features.</p></div>

        <h4>Hit Points</h4>

        <hr>

        <ul><li><strong>Hit Dice:</strong> 1d6 per consular level</li><li><strong>Hit Points at 1st Level:</strong> 6 + your Constitution modifier</li><li><strong>Hit Points at Higher Level:</strong> 1d6 (or 4) + your Constitution modifier per consular level after 1st</li></ul>

        <h4>Proficiencies</h4>

        <hr>

        <ul><li><strong>Armor:</strong> None</li><li><strong>Weapons:</strong> Simple lightweapons, simple vibroweapons</li><li><strong>Tools:</strong> None</li></ul>

        <hr>

        <ul><li><strong>Saving Throws:</strong> Wisdom, Charisma</li><li><strong>Skills:</strong> Choose two from Deception, Insight, Intimidation, Investigation, Lore, Medicine, and Persuasion</li></ul>

        <h4>Equipment</h4>

        <p>You start with the following equipment, in addition to the equipment granted by your background:</p>

        <ul><li><em>(a)</em> a simple lightweapon or <em>(b)</em> a simple vibroweapon</li><li><em>(a)</em> a scholar's pack, <em>(b)</em> an explorer's pack, or <em>(c)</em> a diplomat's pack</li></ul>

        <h4>Variant: Starting Wealth </h4>

        <p>In lieu of the equipment granted by your class and background, you can elect to purchase your starting gear. If you do so, you receive no equipment from your class and background, and instead roll for your starting wealth using the criteria below:</p>

        <table class="sw5e-book-table"><thead><tr><th>Class</th><th>Funds</th></tr></thead><tbody><tr><td>Consular</td><td>5d4 x 100 cr</td></tr></tbody></table>



        <h3>Forcecasting</h3>

        <em><strong>Consular:</strong> 1st level</em><br>

        <p>In your meditations on the force, you have learned powers, fragments of knowledge that imbue you with an abiding force ability. See chapter 10 for the general rules of forcecasting and chapter 11 for the force powers list.</p>

        <h4>Force Powers Known</h4>

        <p>You learn 9 force powers of your choice, and you learn more at higher levels, as shown in the Force Powers Known column of the consular table. You may not learn a force power of a level higher than your Max Power Level, and you may learn a force power at the same time you learn its prerequisite.</p>

        <h4>Force Points</h4>

        <p>You have a number of force points equal to your consular level x 4, as shown in the Force Points column of the consular table, + your Wisdom or Charisma modifier (your choice). You use these force points to cast force powers. You regain all expended force points when you finish a long rest.</p>

        <h4>Max Power Level</h4>

        <p>Many force powers can be overpowered, consuming more force points to create a greater effect. You can overpower these abilities to a maximum level, which increases at higher levels, as shown in the Max Power Level column of the consular table.</p>

        <p>You may only cast force powers at 6th, 7th, 8th, and 9th-level once. You regain the ability to do so after a long rest.</p>

        <h4>Forcecasting Ability</h4>

        <p>Your forcecasting ability varies based on the alignment of the powers you cast. You use Wisdom for light side powers, Charisma for dark side powers, and Wisdom or Charisma for universal powers (your choice). You use this ability whenever a power refers to your forcecasting ability. Additionally, you use this ability modifier when setting the saving throw DC for a force power you cast and when making an attack roll with one.</p>

        <hr>

        <div class="sw5e-book-block"><strong>Force save DC</strong> = 8 + your proficiency bonus + <br>your forcecasting ability modifier

        <hr>

        <strong>Force attack modifier</strong> = your proficiency bonus + <br>your forcecasting ability modifier</div>

        <hr>

        <h3>Force Recovery</h3>

        <em><strong>Consular:</strong> 1st level</em><br>

        <p>You have learned to regain some of your energy by briefly meditating. When you finish a short rest, you can regain a number of force points equal to half your consular level + your Wisdom or Charisma modifier (your choice, minimum of one). Once you've used this feature, you must complete a long rest before you can use it again.</p>

        <h3>Force-Empowered Casting</h3>

        <em><strong>Consular:</strong> 2nd, 9th, and 17th level</em><br>

        <p>You gain the ability to twist your powers to suit your needs. When you cast a force power, you can expend additional force points to modify the power. You gain two of the following Force-Empowered Casting options of your choice, located at the end of the class description. You gain another one at 9th and 17th level.</p>

        <p>You can use only one Force-Empowered Casting option on a power when you cast it, unless otherwise noted.</p>

        <h3>Force Shield</h3>

        <em><strong>Consular:</strong> 2nd level</em><br>

        <p>You learn how to defend yourself purely through your strength with the Force. When you are hit by an attack, you can use your reaction to shroud yourself in Force energy. Until the start of your next turn, you have a bonus to AC equal to your Wisdom or Charisma modifier (your choice, minimum of +1). This includes the triggering attack.</p>

        <p>You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain all expended uses when you finish a long rest.</p>

        <h3>Force Affinity</h3>

        <em><strong>Consular:</strong> 3rd level</em><br>

        <p>You've developed an affinity for one of the three aspects of the Force: the Ashla, the Bendu, or the Bogan. Choose one from the following:</p>

        <h4>Ashla</h4>

        <p>When you successfully cast a light side power, either your or the target's (your choice) hit point maximum and current hit points increase by an amount equal to the power's level. This effect lasts for 1 minute. You can only have one instance of this effect active at a time.</p>

        <h4>Bendu</h4>

        <p>You can add both your Wisdom and Charisma modifier to your maximum number of force points, instead of just one.</p>

        <h4>Bogan</h4>

        <p>When you roll a 1 on a damage die for a dark side power, you can reroll the die and must use the new roll, even if the new roll is a 1. </p>

        <h3>Consular Tradition</h3>

        <em><strong>Consular:</strong> 3rd, 6th, 10th, 14th, and 18th level</em><br>

        <p>You choose a consular tradition, which is detailed at the end of the class description. </p>

        <h3>Ability Score Improvement</h3>

        <em><strong>Consular:</strong> 4th, 8th, 12th, 16th, and 19th level</em><br>

        <p>You can increase one ability score by 2, or you can increase two ability scores by 1. You can't increase an ability score above 20 using this feature.</p>



        <h3>One with the Force</h3>

        <em><strong>Consular:</strong> 20th level</em><br>

        <p>Your attunement to the Force is absolute. Your Wisdom or Charisma score increases by 4, and your maximum for this score increases by 4. Additionally, you gain mastery over a single force power, and can cast it with little effort. Choose one 3rd-level force power that you know as your signature power. You can cast it once at 3rd level without expending force points. When you do so, you can't do so again until you finish a short or long rest.</p>

        <p>If you want to cast it at a higher level, you must expend force points as normal.</p>

        <h3>Force-Empowered Castings</h3>

        <p>The castings are presented in alphabetical order.</p>

        <h4>Careful Power</h4>

        <p>When you cast a power that forces other creatures to make a saving throw, you can protect some of those creatures from the power's full force. To do so, you spend 1 additional force point and choose a number of those creatures up to your Wisdom or Charisma modifier (your choice, minimum of one). A chosen creature automatically succeeds on its saving throw against the power.</p>

        <h4>Distant Power</h4>

        <p>When you cast a power that has a range of 5 feet or greater, you can spend 1 additional force point to double the range of the power.</p>

        <p>Alternatively, when you cast a power that has a range of touch, you can spend 1 additional force point to make the range of the power 30 feet.</p>

        <h4>Extended Power</h4>

        <p>When you cast a power that has a duration of 1 minute or longer, you can spend 1 additional force point to double its duration, to a maximum duration of 24 hours.</p>



        <h4>Heightened Power</h4>

        <p>When you cast a power that forces a creature to make a saving throw to resist its effects, you can spend 3 additional force points to give one target of the power disadvantage on its first saving throw made against the power.</p>

        <h4>Improved Power</h4>

        <p>When you roll damage for a power, you can spend 1 additional force point to reroll a number of the damage dice up to your Wisdom or Charisma modifier (your choice, minimum of one). You must use the new rolls.</p>

        <p>You can use Improved Power even if you have already used a different Force-Empowered Casting option during the casting of the power.</p>

        <h4>Lingering Power</h4>

        <p>When you cast a power that requires concentration to maintain you can choose to spend 3 additional force points. If you do, when you lose concentration on the power, the power will not end until the end of your next turn.</p>

        <h4>Pinpoint Power </h4>

        <p>When you cast a power that allows you to force creatures in an area to make a saving throw you can instead spend 1 force point and make a ranged force attack against a single target that would be in the range. On a hit the target suffers the effects as though they failed their saving throw.</p>

        <h4>Quickened Power</h4>

        <p>When you cast a power that has a casting time of 1 action, you can spend 2 additional force points to change the casting time to 1 bonus action for this casting.</p>

        <h4>Refocused Power </h4>

        <p>When you are forced to make a Constitution saving throw to maintain concentration on a power you can use your reaction and spend 2 force points to automatically succeed on the saving throw.</p>

        <p>You can use Refocused Power even if you have already used a different Force-Empowered Casting option during the casting of the power.</p>

        <h4>Seeking Power</h4>

        <p>If you miss with a force power that calls for an attack roll, you can spend 2 force points to reroll the attack. You must use the new roll.</p>

        <p>You can use Seeking Power even if you have already used a different Force-Empowered Casting option during the casting of the power.</p>

        <h4>Twinned Power</h4>

        <p>When you cast a power that targets only one creature and doesn't have a range of self, you can spend a number of additional force points equal to the power's level to target a second creature in range with the same power (1 force point if the power is at-will).</p>

        <h2>Consular Traditions</h2>

        <p>Different consulars select different traditions, called Ways, to follow as they hone their powers. Your tradition grants you features at 3rd, 6th, 10th, 14th, and 18th level.</p>

        <img src='https://www.gmbinder.com/images/BYdyPsr.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:463px' />



        <h4>Way of Balance</h4>

        <p>There is serenity in balance, and no one knows this better than the consular. Those consulars who follow the Way of Balance focus on utilizing the Force to equalize the battlefield. They bend the Force to shield their allies and expose their foes.</p>

        <h3>Force Barrier</h3>

        <em><strong>Way of Balance:</strong> 3rd level</em><br>

        You can weave the Force around yourself for protection. When you cast a universal power of 1st level or higher, you can simultaneously manipulate the Force to create a barrier on yourself that lasts until you finish a long rest. The barrier has hit points equal to twice your consular level + your Wisdom or Charisma modifier (your choice). Your barrier can never have hit points greater than twice your consular level +<br> your Wisdom or Charisma modifier<br> (your choice).

        Whenever you take damage, the barrier<br> takes the damage instead. If this damage<br> reduces the barrier to 0 hit points, you take<br> any remaining damage.

        While the barrier has 0 hit points, it can't<br> absorb damage, but its power remains.<br> Whenever you cast a universal power of 1st level or higher, the barrier regains a number of hit points equal to twice the level of the power.

        <p>Once you create the barrier, you can't create it again until you finish a long rest.</p>

        <h3>Projected Barrier</h3>

        <em><strong>Way of Balance:</strong> 6th level</em><br>

        <p>When a creature that you can see within 30 feet of you takes damage, you can use your reaction to cause your Force Barrier to absorb that damage. If this damage reduces the barrier to 0 hit points, the warded creature takes any remaining damage.</p>

        <h3>At-Will Barrier</h3>

        <em><strong>Way of Balance:</strong> 10th level</em><br>

        <p>Your at-will universal powers grant a small boost to your Force Barrier. When you cast an at-will universal power, the barrier regains 1 hit point. You can't restore your barrier above half its maximum hit points in this way.</p>

        <h3>Improved Suppression</h3>

        <em><strong>Way of Balance:</strong> 14th level</em><br>

        <p>When you cast a force power that requires you to make an ability check as a part of casting that power, such as <em>sever force</em> or <em>force suppression</em>, you add your proficiency bonus to that ability check.</p>



        <h3>Force Resistance</h3>

        <em><strong>Way of Balance:</strong> 18th level</em><br>

        <p>You have advantage on saving throws against force powers. Additionally, you have resistance against the damage of force powers.</p>

        <img src='https://www.gmbinder.com/images/KuUWgUr.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:1063px' />



        <h4>Way of Lightning</h4>

        <p>Of all of the dark arts of the Force, little can match the spectacle and devastation of Force lightning. Those consulars who follow the Way of Lightning summon intense discharges of pure Force energy, overwhelming enemies with punishing damage from a distance, leaving them shaken and vulnerable -- if not dead.</p>

        <h3>Shocking Affinity</h3>

        <em><strong>Way of Lightning:</strong> 3rd level</em><br>

        <p>When you cast a force power that deals lightning damage, you can use Wisdom or Charisma as your forcecasting ability for it.</p>

        <p>Additionally, when you cast a damage-dealing force power that requires a force attack or saving throw, you can cause that power to instead deal lightning damage. If the power would call for a saving throw other than Dexterity, it instead calls for a Dexterity saving throw. If </p>



        <p>you hit with the power, or the target fails the power's saving throw, affected creatures become <em>shocked</em> until the start of your next turn. You can use this feature twice. You gain an additional use at 5th, 9th, 13th, and 17th level. You regain all expended uses when you finish a short or long rest.</p>

        <h3>Potent Lightning</h3>

        <em><strong>Way of Lightning:</strong> 6th level</em><br>

        <p>You add your governing ability modifier (minimum of +1) to any damage you deal with force powers that deal lightning damage that don't already include that modifier.</p>

        <h3>Blistering Rebuke</h3>

        <em><strong>Way of Lightning:</strong> 10th, 13th, and 17th level</em><br>

        <p>When a creature within 5 feet of you that you can see hits you with an attack, you can use your reaction to cause the creature to make a Dexterity saving throw against your universal force save DC. On a failed save, the creature takes 1d10 plus your consular level lightning damage, is pushed back 10 feet, and becomes <em>shocked</em> until the end of their next turn. On a successful save, the creature takes half as much damage and isn't moved or <em>shocked</em>.</p>

        <p>You can use this feature four times. You gain an additional use at 13th and 17th level. You regain all expended uses when you finish a long rest.</p>

        <h3>Electric Attunement</h3>

        <em><strong>Way of Lightning:</strong> 14th level</em><br>

        <p>You gain resistance to lightning damage, and force powers you cast ignore resistance to lightning damage.</p>

        <h3>Unlimited Power</h3>

        <em><strong>Way of Lightning:</strong> 18th level</em><br>

        &emsp;&emsp;You can increase the power of your simpler<br> &emsp;&emsp;lightning force powers. When you cast a<br> &emsp;&emsp;force power of 1st through 6th level that deals<br> &emsp;&emsp;&emsp;&emsp;&emsp;lightning damage, you can deal maximum<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;damage with that power.

        &emsp;&emsp;&emsp;&emsp;You can use this feature with no adverse<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;effects a number of times equal to<br> &emsp;&emsp;&emsp;your proficiency bonus, as shown in the consular table. If you use this feature<br> &emsp;&emsp;&emsp;&emsp;&emsp;beyond this before you finish a long rest,<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;you take 2d12 true damage for<br> &emsp;&emsp;&emsp;&emsp;&emsp;each level of the power, immediately after<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;you cast it. Each time you use this<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;feature again before finishing a long rest, the damage increases by 1d12. 

        <img src='https://www.gmbinder.com/images/6tuXtEr.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:565px' />



        <h4>Way of the Sage</h4>

        <p>The rejuvenating power of the Force is incredible, and the consular is the master of this usage. Those consulars who follow the Way of the Sage assist with an array of healing powers that grant allies the strength to continue through even the harshest of encounters. Separated from the heart of the fray, the sage can be an unfailing warden to those in need.</p>

        <h3>Disciple of Life</h3>

        <em><strong>Way of the Sage:</strong> 3rd level</em><br>

        <p>When you cast a force power that restores hit points, you can use Wisdom or Charisma as your forcecasting ability for it. </p>

        <p>Additionally, whenever you use a force power of 1st level or higher to restore hit points to a creature, the creature regains extra hit points equal to 2 + the power's level.</p>

        <h3>Preserve Life</h3>

        <em><strong>Way of the Sage:</strong> 6th level</em><br>

        <p>As an action, you can channel the Force and evoke healing energy that restores a number of hit points equal to five times your consular level. Choose any creatures within 30 feet of you, and divide those hit points among them. This feature can restore a creature to no more than half its hit point maximum. This feature has no effect on droids or constructs.</p>

        You can use this feature a<br> number of times equal to your<br> proficiency bonus, as shown in the consular table. You regain all<br> expended uses when you<br> finish a long rest.

        <h3>Blessed Healer</h3>

        <em><strong>Way of the Sage:</strong> 10th level</em><br>

        The healing powers you cast on others<br> heal you as well. When you cast a force<br> power that restores hit points to a<br> creature other than you, you regain hit<br> points equal to 2 + the power's level.



        <h3>Blessed by the Force</h3>

        <em><strong>Way of the Sage:</strong> 14th level</em><br>

        <p>You gain the ability to overcome grievous injuries. As a bonus action when you have fewer than half your hit points remaining, you can regain a number of hit points equal to half your hit point maximum.</p>

        <p>Once you've used this feature, you can't use it again until you finish a long rest.</p>

        <h3>Supreme Healing</h3>

        <em><strong>Way of the Sage:</strong> 18th level</em><br>

        <p>When you would normally roll one or more dice to restore hit points with a power, you instead use the highest number possible for each die. For instance, instead of restoring 2d6 hit points to a creature, you restore 12.</p>

        <img src='https://www.gmbinder.com/images/Aceclyv.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:700px' />



        <h4>Way of Suggestion</h4>

        <p>There is power in a light touch, and no one knows this better than the consular. Those consulars who follow the Way of Suggestion have honed their attunement to the Force, allowing them to disappear, despite being in plain sight.</p>

        <h3>Subtle Control</h3>

        <em><strong>Way of Suggestion:</strong> 3rd level</em><br>

        <p>You can befuddle a creature's mind with nothing but a gesture. As an action, you can cause a creature you can see within 30 feet to make a Wisdom saving throw against your universal force save DC. On a failed save, you can force the creature to believe or forget a single aspect of a conversation, observation or encounter it had that you were present for in the past 10 minutes. Whether the creature succeeds or fails their saving throw, you can't use this feature on them again until you finish a long rest. </p>

        &emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;Additionally, creatures who attempt to<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;detect your use of the Force have<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;disadvantage on ability checks to do so,<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;and if a creature has the <em>sense force</em> or<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;<em>force sight</em> power active, they must<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;succeed on a universal forcecasting<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;ability check against your universal force<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;save DC in order to notice your usage of<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;the Force, your alignment within the<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;Force, or how strong your connection<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;to the Force is. 

        <h3>&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;Out of Mind</h3>

        &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;<em><strong>Way of Suggestion:</strong> 6th level</em><br>

        &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;You can erase yourself<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;from a single creature's sight<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;momentarily. As a bonus action,<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;choose a creature within 60 feet<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;of you that you are aware of.<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;That creature must make a<br>  &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;Wisdom saving throw<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;against your universal<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;force save DC. On a<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;failed save, you<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;become invisible to<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;that creature for<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;1 minute, or until<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;you deal damage to it.

        &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;Once you've used this<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;feature, you can't use it<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;again until you finish a<br> &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;&nbsp;&nbsp;short or long rest.



        <h3>Delicate Potency</h3>

        <em><strong>Way of Suggestion:</strong> 10th, 13th, and 17th level</em><br>

        <p>Your mind-affecting powers are particularly potent. When you cast one of <em>cloud mind</em>, <em>dominate mind</em>, <em>mass coerce mind</em>, and <em>dominate monster</em>, you can choose to treat the power as if cast at your Max Power Level.</p>

        <p>You can use this feature four times. You gain an additional use at 13th and 17th level. You regain all expended uses when you finish a long rest.</p>

        <h3>Delayed Effect</h3>

        <em><strong>Way of Suggestion:</strong> 14th level</em><br>

        <p>When you cast a force power, you can delay the effects of the force power for up to a number of rounds equal to half your consular level. If you do so, the power immediately takes effect at the start of your turn, after the specified number of rounds have passed.</p>

        <p>Once you've used this feature, you can't use it again until you complete a long rest.</p>

        <h3>Subtle Presence</h3>

        <em><strong>Way of Suggestion:</strong> 18th level</em><br>

        <p>You've learned how to weave the Force around you in a cloak of your choice. As an action, you can focus the Force for 10 minutes. For the duration, you gain your choice of one of the following effects. </p>

        <p>You can use each feature once. You regain all expended uses when you complete a long rest.</p>

        <h4>Cloak of Fright</h4>

        <p>Each creature of your choice that is within 60 feet must succeed on a Wisdom saving throw against your universal force save DC or become frightened for 1 minute. A creature can repeat the saving throw at the end of each of its turns, ending the effect on itself on a success. </p>

        <h4>Cloak of Invisibility</h4>

        <p>You and everything you are wearing or carrying become invisible to creatures of your choice. If you damage a creature or affect it with a force power, it can make a Wisdom saving throw against your universal force save DC. On a success, you are no longer invisible to that creature.</p>

        <h4>Cloak of Memory</h4>

        <p>Creatures that see you or any allies within 30 feet of you during this time cannot recall your physical appearances, your mannerisms, or any other identifying features.</p>

        <p>Creatures that interact with you must make a Wisdom saving throw against your universal force save DC once the interaction ends. You can choose to exclude a creature from this effect. On a failed save, the creature forgets all details of the interaction, rationalizing any of its outcomes. </p>

        <img src='https://www.gmbinder.com/images/wOcpE22.png' class='sw5e-book-image sw5e-book-image--row' style='height:auto;margin:0;clear:none;width:385px' />



        <h2>Engineer</h2>

        <span style="font-variant: small-caps">Flinching occasionally as a blaster bolt hits the nearby</span> bulkhead, a Sullustan mechanic quickly solders a large wire. He peers through his tinted goggles, ignoring the shouts of his ship captain as the enemy descends on the hanger. Finally he shouts with pride as the repaired coupling powers up, causing the frigate to hum with energy. He gathers his tools and runs into the ship moments before it finally takes off.

        Inside, the human captain jumps into the cockpit. She nods to her droid co-pilot, who quickly begins charting a course home. Before the calculations can<br> be completed, enemy Starfighters scream in from the clouds. The pilot rolls the ship, nimbly evading incoming fire. She reroutes the power to shields, leaving just enough for astronavigation. Just as the energy reserves near depletion, the exosphere and stars beyond blur into streaks of light. In a flash, they warp to safety. 

        <p>A Cerean officer surveys the battlefield, looking for weaknesses. When he identifies a potential problem, he keys in a quick combination in his wristpad. In a blink, a custom suit of armor assembles itself around him. As the helmet locks into place, the officer leaps into the air, flying overhead and raining destruction on the opposition.</p>

        <p>Every machine needs an engineer to run it, and a living crew is no different. Engineers are the experts and professionals who rely on skill, bravery, and their tools to survive and keep others alive. While they do not claim to be fighters, their mere presence can turn the tide of battle or simply keep operations running.</p>



        <h3>Behind the Curtain</h3>

        <p>While perhaps not as intimidating as a heavily-armored trooper, or as exotic as a lighsaber-wielding guardian, engineers are no less vital to group dynamic. They are armorers and gunsmiths, electricians and welders, or any other facet to be found in facilities across the galaxy. Their work, often unsung, is what keeps starships (and their crew) intact.</p>



        <h3>Unflappable</h3>

        <p>It takes bravery for a soldier to enter a battlefield. It perhaps takes more for someone who is unarmed, and untrained in combat, to do the same. Engineers put their lives on the line for a living, whether by choice or acknowledging their plights as an occupational hazard. Whether they come from an elite training academy or learned their talents surviving in the slums, they are no strangers to danger and conflict.</p>



        <img src='https://www.gmbinder.com/images/aqHXyAc.png' class='sw5e-book-image' style='display:block;max-width:100%;height:auto;margin:1rem auto;clear:both;width:420px;mix-blend-mode:darken' />

        <h3>Creating an Engineer</h3>

        <p>While creating your engineer character, consider what your primary skill set is and how you use it. You could be a street-smart mechanic who taught yourself how to fix swoop bikes as a teenager. Perhaps you are the recent graduate of an esteemed medical college, or a rookie pilot in the fledgling Rebel Alliance. What is the number one skill you are known for? Why are you willing to enter battles when you have no combat training? How do you view the more adventurous members of your group, and how do they see you and your role?</p>

        <h4>Quick Build</h4>

        You can make an engineer quickly by following these<br> suggestions. First, make Intelligence your highest<br> ability score. Your next-highest score should be<br> Constitution. Second, choose the scientist<br> background.



