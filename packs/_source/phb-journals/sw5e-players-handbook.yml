        <h3>Biology and Appearance</h3>

        <p>Sith are a proud and violent species of humanoids that evolved on Korriban, a planet within the Horuset system in an isolated Outer Rim region called the Stygian Caldera. Sith have a larger than average number of individuals with potential to use the Force in their species, so high in fact that the entire species was considered strongly Force-sensitive. </p>

        <p>Sith purebloods are characterized by their expressive facial appendages, bone spurs, cranial horns, and predatory gaze.</p>

        <h3>Society and Culture</h3>

        <p>Sith culture is a rigid and stratified caste-based society. For the sith, war and violence are just as much a part of the natural order of life as peace or serenity. Though they are in an almost constant state of war, their civilization is quite sophisticated; they see these acts not as cruel or barbaric, but simply basic aspects of existence. Their constant warring led to a dwindling of the population on their original homeworld of Korriban as well as cultivated an intensely xenophobic society. </p>

        <h3>Names</h3>

        <p>Sith pureblood names are not conventional. They are often named for virtues in the Sith tongue. Sith rarely share surnames, since they do not value family ties. When a sith pureblood achieves a success or victory, they often change their name to match their perceived newfound status. Since Force-sensitivity is common in sith purebloods, and their culture is built around strength, most sith are called simply "My Lord," or some other epithet, by their underlings.</p>

        <p><strong>Male Names.</strong> Aqorzum, Khashai, Sihmot, Wirjol</p>

        <p><strong>Female Names.</strong> Aqurwia, Cliriu, Nupax, Ubhesosiuth</p>



        <h3>Sith Pureblood Traits</h3>

        <p>As a sith pureblood, you have the following special traits.</p>

        <strong><em>Ability Score Increase.</em></strong> Your Charisma score<br> increases by 2, and your Strength or Dexterity score<br> increases by 1.

        <p><strong><em>Age.</em></strong> Sith reach adulthood in their late teens and live less than a century.</p>

        <strong><em>Alignment.</em></strong> The cruelty of the Sith causes them to<br> tend toward chaotic dark side, though there are<br> exceptions.

        <p><strong><em>Size.</em></strong> Sith generally stand between 5 and 6 feet tall and weigh less than 200 lbs. Regardless of your position in that range, your size is Medium.</p>

        <p><strong><em>Speed.</em></strong> Your base walking speed is 30 feet.</p>

        <p><strong><em>Darkvision.</em></strong> Your vision can easily cut through darkness. You can see in dim light within 60 feet of you as if it were bright light, and in darkness as if it were dim light. You can't discern color in darkness, only shades of gray.</p>

        <p><strong><em>Force-Sensitive.</em></strong> You know the <em>denounce</em> at-will force power. When you reach 3rd level, you learn and can cast the <em>curse</em> force power once per long rest. When you reach 5th level, you learn and can cast the <em>darkness</em> force power once per long rest. Your forcecasting ability is Charisma for these powers.</p>

        <p><strong><em>Menacing.</em></strong> You gain proficiency in the Intimidation skill.</p>

        <p><strong><em>Sadistic.</em></strong> You have proficiency with saberwhips, vibrowhips, and nets.</p>

        <p><strong><em>Languages.</em></strong> You can speak, read, and write Galactic Basic and Sith. Sith is an agglutinative language, in which words or even phrases were made up of linears sequences of distinct meaningful units.</p>

