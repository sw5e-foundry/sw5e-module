        <h1>Chapter 8: Adventuring</h1>



        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-variant: small-caps">elving into an ancient Sith tomb, slipping through</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; the Black Sun territory of Coruscant, hacking a fresh trail through the thick jungles on the forest moon of Endor�these are the things that <em>Star Wars</em> adventures are made of. Your character in the game might explore forgotten ruins and uncharted lands, uncover dark secrets and sinister plots, and slay foul monsters. And if all goes well, your character will survive to claim rich rewards before embarking on a new adventure.

        <p>This chapter covers the basics of the adventuring life, from the mechanics of movement to the complexities of social interaction. The rules for resting are also in this chapter, along with a discussion of the activities your character might pursue between adventures.</p>

        <p>Whether adventurers are exploring a dusty dungeon or the complex relationships of a noble court, the game follows a natural rhythm, as outlined in the book's introduction:</p>

        <hr>

        <p>&emsp;<strong>1. The GM describes the environment.</strong></p>

        <p><strong>2. The players describe what they want to do.</strong></p>

        <p><strong>3. The GM narrates the results of their actions.</strong></p>

        <hr>

        <p>Typically, the GM uses a map as an outline of the adventure, tracking the characters' progress as they explore enclave corridors or wilderness regions.</p>

        <p>The GM's notes, including a key to the map, describe what the adventurers find as they enter each new area. Sometimes, the passage of time and the adventurers' actions determine what happens, so the GM might use a timeline or a flowchart to track their progress instead of a map.</p>

        <h2>Time</h2>

        <p>In situations where keeping track of the passage of time is important, the GM determines the time a task requires. The GM might use a different time scale depending on the context of the situation at hand. In an enclosed environment, the adventurers' movement happens on a scale of minutes. It takes them about a minute to creep down a long hallway, another minute to check for traps on the door at the end of the hall, and a good ten minutes to search the chamber beyond for anything interesting or valuable.</p>

        <p>In a city or wilderness, a scale of hours is often more appropriate. Adventurers eager to reach the lonely tower at the heart of the forest hurry across those fifteen miles in just under four hours time.</p>

        <p>For long journeys, a scale of days works best. Following the road from Tatooine to Kashyyk, the adventurers spend four uneventful days before a pirate ambush interrupts their journey.</p>

        <p>In combat and other fast-paced situations, the game relies on rounds, a 6-second span of time described in chapter 9.</p>

        <h2>Movement</h2>

        <p>Swimming across a rushing river, sneaking down a building corridor, scaling a treacherous mountain slope- all sorts of movement play a key role in D&amp;D adventures.</p>

        <p>The GM can summarize the adventurers' movement without calculating exact distances or travel times: "You travel through the forest and find the ruin entrance late in the evening of the third day." Even in a dungeon, particularly a large dungeon or a cave network, the GM can summarize movement between encounters: "After killing the guardian at the entrance to the ancient Jedi stronghold. you consult your map, which leads you through miles of echoing corridors to a chasm bridged by a narrow stone arch."</p>

        <p>Sometimes it's important, though, to know how long it takes to get from one spot to another, whether the answer is in days, hours, or minutes. The rules for determining travel time depend on two factors: the speed and travel pace of the creatures moving and the terrain they're moving over.</p>

        <h3>Speed</h3>

        <p>Every character and monster has a speed, which is the distance in feet that the character or monster can walk in 1 round. This number assumes short bursts of energetic movement in the midst of a life-threatening situation.</p>

        <p>The following rules determine how far a character or monster can move in a minute, an hour, or a day.</p>

        <h4>Travel Pace</h4>

        <p>While traveling, a group of adventurers can move at a normal, fast, or slow pace, as shown on the Travel Pace table. The table states how far the party can move in a period of time and whether the pace has any effect. A fast pace makes characters less perceptive, while a slow pace makes it possible to sneak around and to search an area more carefully (see the "Activity While Traveling" section later in this chapter for more information).</p>

        <p><strong><em>Forced March.</em></strong> The Travel Pace table assumes that characters travel for 8 hours in day. They can push on beyond that limit, at the risk of exhaustion.</p>

        <p>For each additional hour of travel beyond 8 hours, the characters cover the distance shown in the Hour column for their pace, and each character must make a Constitution saving throw at the end of the hour. The DC is 10 + 1 for each hour past 8 hours. On a failed saving throw, a character suffers one level of exhaustion (see appendix A).</p>

        <p><strong><em>Mounts, Speeders, and Vehicles.</em></strong> For short spans of time (up to an hour), many animals move much faster than humanoids. A mounted character can ride at a gallop for about an hour, covering twice the usual distance for a fast pace. If fresh mounts are available every 8 to 10 miles, characters can cover larger distances at this pace, but this is very rare except in densely populated areas. </p>



        <p>&emsp;Characters in shuttles, speeders, or other vehicles choose a pace as normal. Depending on the vessel and the size of the crew, ships might be able to travel for up to 24 hours per day.</p>

        <h5>Travel Pace</h5>

        <table class="sw5e-book-table"><thead><tr><th>Pace</th><th>Distance<br> per<br> Minute</th><th>Distance<br> per<br> Hour</th><th>Distance<br> per<br> Day</th><th>Effect</th></tr></thead><tbody><tr><td>Fast</td><td>400 feet</td><td>4 miles</td><td>30 miles</td><td>-5 penalty to passive Wisdom (Perception) scores</td></tr><tr><td>Normal</td><td>300 feet</td><td>3 miles</td><td>24 miles</td><td></td></tr><tr><td>Slow</td><td>200 feet</td><td>2 miles</td><td>18 miles</td><td>Able to use stealth</td></tr></tbody></table>

        <h3>Difficult Terrain</h3>

        <p>The travel speeds given in the Travel Pace table assume relatively simple terrain: roads, open plains, or clear enclosed corridors. But adventurers often face dense forests, deep swamps, rubble-filled ruins, steep mountains, and ice-covered ground�all considered difficult terrain.</p>

        <p>You move at half speed in difficult terrain�moving 1 foot in difficult terrain costs 2 feet of speed�so you can cover only half the normal distance in a minute, an hour, or a day.</p>

        <h3>Special Types of Movement</h3>

        <p>Movement through dangerous dungeons or wilderness areas often involves more than simply walking. Adventurers might have to climb, crawl, swim, or jump to get where they need to go.</p>

        <h4>Climbing, Swimming and Crawling</h4>

        <p>While climbing, swimming, or crawling, each foot of movement costs 1 extra foot (2 extra feet in difficult terrain), unless a creature has a climbing or swimming speed. At the GM's option, climbing a slippery vertical surface or one with few handholds requires a successful Strength (Athletics) check. Similarly, gaining any distance in rough water might require a successful Strength (Athletics) check.</p>

        <h4>Jumping</h4>

        <p>Your Strength determines how far you can jump.</p>

        <p><strong><em>Long Jump.</em></strong> When you make a long jump, you cover a number of feet up to your Strength score if you move at least 10 feet on foot immediately before the jump. When you make a standing long jump, you can leap only half that distance. Either way, each foot you clear on the jump costs a foot of movement.</p>

        <p>This rule assumes that the height of your jump doesn't matter, such as a jump across a stream or chasm. At your GM's option, you must succeed on a DC 10 Strength (Athletics) check to clear a low obstacle (no taller than a quarter of the jump's distance), such as a hedge or low wall. Otherwise, you hit it.</p>

        <p>When you land in difficult terrain, you must succeed on a DC 10 Dexterity (Acrobatics) check to land on your feet. Otherwise, you land prone.</p>

        <p>&emsp;<strong><em>High Jump.</em></strong> When you make a high jump, you leap into the air a number of feet equal to 3 + your Strength modifier if you move at least 10 feet on foot immediately before the jump. When you make a standing high jump, you can jump only half that distance. Either way, each foot you clear on the jump costs a foot of movement. In some circumstances, your GM might allow you to make a Strength (Athletics) check to jump higher than you normally can.</p>

        <p>You can extend your arms half your height above yourself during the jump. Thus, you can reach above you a distance equal to the height of the jump plus 1 1/2 times your height.</p>

        <h3>Activity While Traveling</h3>

        <p>As adventurers travel through a dungeon or the wilderness, they need to remain alert for danger, and some characters might perform other tasks to help the group's journey.</p>

        <h4>Marching Order</h4>

        <p>The adventurers should establish a marching order.</p>

        <p>A marching order makes it easier to determine which characters are affected by traps, which ones can spot hidden enemies, and which ones are the closest to those enemies when a fight breaks out.</p>

        <p>A character might occupy the front rank, one or more middle ranks, or the back rank. Characters in the front and back ranks need enough room to travel side by side with others in their rank. When space is too tight, the marching order must change, usually by moving characters to a middle rank.</p>

        <p><strong><em>Fewer Than Three Ranks.</em></strong> If an adventuring party arranges its marching order with only two ranks, they are a front rank and a back rank. If there's only one rank, it's considered a front rank.</p>

        <h4>Stealth</h4>

        <p>While traveling at a slow pace, the characters can move stealthily. As long as they're not in the open, they can try to surprise or sneak by other creatures they encounter. See the rules for hiding in chapter 7.</p>

        <h4>Noticing Threats</h4>

        <p>Use the passive Wisdom (Perception) scores of the characters to determine whether anyone in the group notices a hidden threat. The GM might decide that a threat can be noticed only by characters in a particular rank. For example, as the characters are exploring a maze of tunnels, the GM might decide that only those characters in the back rank have a chance to hear or spot a stealthy creature following the group, while characters in the front and middle ranks cannot. While traveling at a fast pace, characters take a -5 penalty to their passive Wisdom (Perception) scores to notice hidden threats.</p>

        <p><strong><em>Encountering Creatures.</em></strong> If the GM determines that the adventurers encounter other creatures while they're traveling, it's up to both groups to decide what happens next. Either group might decide to attack, initiate a conversation, run away, or wait to see what the other group does.</p>





        <p>&emsp;<strong><em>Surprising Foes.</em></strong> If the adventurers encounter a hostile creature or group, the GM determines whether the adventurers or their foes might be surprised when combat erupts. See chapter 9 for more about surprise.</p>

        <h4>Other Activities</h4>

        <p>Characters who turn their attention to other tasks as the group travels are not focused on watching for danger. These characters don't contribute their passive Wisdom (Perception) scores to the group's chance of noticing hidden threats. However, a character not watching for danger can do one of the following activities instead, or some other activity with the GM's permission.</p>

        <p><strong><em>Navigate.</em></strong> The character can try to prevent the group from becoming lost, making a Wisdom (Survival) check when the GM calls for it. (The <em>Dungeon Master's Guide</em> has rules to determine whether the group gets lost.)</p>

        <p><strong><em>Draw a Map.</em></strong> The character can draw a map that records the group's progress and helps the characters get back on course if they get lost. No ability check is required.</p>

        <p><strong><em>Track.</em></strong> A character can follow the tracks of another creature, making a Wisdom (Survival) check when the GM calls for it. (The <em>Dungeon Master's Guide</em> has rules for tracking.)</p>

        <p><strong><em>Forage.</em></strong> The character can keep an eye out for ready sources of food and water, making a Wisdom (Survival) check when the GM calls for it. (The <em>Dungeon Master's Guide</em> has rules for foraging.)</p>

        <h5>Splitting Up the Party</h5>

        <blockquote><p>Sometimes, it makes sense to split an adventuring party, especially if you want one or more characters to scout ahead. You can form multiple parties, each moving at a different speed. Each group has its own front, middle, and back ranks.</p>

        <p>The drawback to this approach is that the party will be split into several smaller groups in the event of an attack. The advantage is that a small group of stealthy characters moving slowly might be able to sneak past enemies that clumsier characters would alert. An operative and a monk moving at a slow pace are much harder to detect when they leave their guardian friend behind.</p></blockquote>

        <h2>The Environment</h2>

        <p>By its nature, adventuring involves delving into places that are dark, dangerous, and full of mysteries to be explored. The rules in this section cover some of the most important ways in which adventurers interact with the environment in such places. The Dungeon Master's Guide has rules covering more unusual situations.</p>

        <h3>Falling</h3>

        <p>A fall from a great height is one of the most common hazards facing an adventurer.</p>

        <p>At the end of a fall, a creature takes 1d6 kinetic damage for every 10 feet it fell, to a maximum of 20d6. The creature lands prone, unless it avoids taking damage from the fall.</p>

        <h3>Suffocating</h3>

        <p>A creature can hold its breath for a number of minutes equal to 1 + its Constitution modifier (minimum of 30 seconds).</p>

        <p>When a creature runs out of breath, it can survive for a number of rounds equal to its Constitution modifier (minimum 1 round). At the start of its next turn, it drops to 0 hit points and is dying.</p>

        <h3>Vacuum of Space</h3>

        <p>If a creature is exposed to the vacuum of space, or similar environments, it can survive for a number of rounds equal to its Constitution modifier (minimum 1 round). At the start of its next turn, it immediately dies without making death saving throws.</p>

        <h3>Vision and Light</h3>

        <p>The most fundamental tasks of adventuring�noticing danger, finding hidden objects, hitting an enemy in combat, and targeting a power, to name just a few�rely heavily on a character's ability to see. Darkness and other effects that obscure vision can prove a significant hindrance.</p>

        <p>A given area might be lightly or heavily obscured. In a <strong>lightly obscured</strong> area, such as dim light, patchy fog, or moderate foliage, creatures have disadvantage on Wisdom (Perception) checks that rely on sight.</p>

        <p>A <strong>heavily obscured</strong> area-such as darkness, opaque fog, or dense foliage-blocks vision entirely. A creature in or looking in a heavily obscured area effectively suffers from the blinded condition (see appendix A).</p>

        <p>The presence or absence of light in an environment creates three categories of illumination: bright light, dim light, and darkness.</p>

        <p><strong>Bright light</strong> lets most creatures see normally. Even gloomy days provide bright light, as do torches, lanterns, fires, and other sources of illumination within a specific radius.</p>

        <p><strong>Dim light</strong>, also called shadows, creates a lightly obscured area. An area of dim light is usually a boundary between a source of bright light, such as a torch, and surrounding darkness. The soft light of twilight and dawn also counts as dim light. A particularly brilliant full moon might bathe the land in dim light.</p>

        <p><strong>Darkness</strong> creates a heavily obscured area. Characters face darkness outdoors at night (even most moonlit nights), or within the confines of an unlit dungeon or a subterranean vault.</p>

        <h4>Blindsight</h4>

        <p>A creature with blindsight can perceive its surroundings without relying on sight, within a specific radius. Creatures without eyes, such as Miraluka, and creatures with echolocation or heightened senses, such as Togruta or Verpine, have this sense.</p>

        <h4>Darkvision</h4>

        <p>Many creatures in the worlds of Star Wars, especially those that dwell underground, have darkvision. Within a specified range, a creature with darkvision can see in darkness as if the darkness were dim light, so areas of darkness are only lightly obscured as far as that creature is concerned. However, the creature can't discern color in darkness, only shades of gray.</p>



        <h4>Truesight</h4>

        <p>A creature with truesight can, out to a specific range, see in normal and enhanced darkness, see invisible creatures and objects, automatically detect visual illusions and succeed on saving throws against them, and perceives the original form of a shapechanger or a creature that is transformed by a power.</p>

        <h3>Food and Water</h3>

        <p>Characters who don't eat or drink suffer the effects of exhaustion (see appendix A). Exhaustion caused by lack of food or water can't be removed until the character eats and drinks the full required amount.</p>

        <h4>Food</h4>

        <p>A character needs one pound of food per day and can make food last longer by subsisting on half rations. Eating half a pound of food in a day counts as half a day without food. A character can go without food for a number of days equal to 3 + his or her Constitution modifier (minimum 1). At the end of each day beyond that limit, a character automatically suffers one level of exhaustion. A normal day of eating resets the count of days without food to zero.</p>

        <h4>Water</h4>

        <p>A character needs one gallon of water per day, or two gallons per day if the weather is hot. A character who drinks only half that much water must succeed on a DC 15 Constitution saving throw or suffer one level of exhaustion at the end of the day. A character with access to less water automatically suffers one level of exhaustion at the end of the day. If the character already has one or more levels of exhaustion, the character takes two levels in either case.</p>

        <h3>Interacting with Objects</h3>

        <p>A character's interaction with objects in an environment is often simple to resolve in the game. The player tells the GM that his or her character is doing something, such a moving a lever, and the GM describes what, if anything happens. For example, a character might decide to pull a lever, which might, in turn, open a door, cause a room to flood with water, or open a secret door in a nearby wall. If the lever is rusted in position, though, a character might need to force it. In such a situation, the GM might call for a Strength check to see whether the character can wrench the lever into place. The GM sets the DC for any such check based on the difficulty of the task.</p>

        <p>Characters can also damage objects with their weapons and powers. Objects are immune to necrotic, poison, and psychic damage, but otherwise they can be affected by physical attacks and powers much like creatures can. Generally, objects are immune to any conditions that are illogical, such as charmed or frightened. The GM determines an object's Armor Class and hit points, and might decide that certain objects have resistance or immunity to certain kinds of attacks. (It's hard to cut a rope with a club, for example.) Objects always fail Strength, Dexterity, and Constitution saving throws, and they are immune to effects that require other saves. When an object drops to 0 hit points, it breaks. A character can also attempt a  </p>



        <p>Strength check to break an object. The GM sets the DC for any such check.</p>

        <h2>Social Interaction</h2>

        <p>Exploring dungeons, overcoming obstacles, and slaying monsters are key parts of D&amp;D adventures. No less important, though, are the social interactions that adventurers have with other inhabitants of the world.</p>

        <p>Interaction takes on many forms. You might need to convince an unscrupulous thief to confess to some malfeasance, or you might try to flatter a Hutt so that he will spare your life. The GM assumes the roles of any characters who are participating in the interaction that don"t belong to another player at the table. Any such character is called a <strong>nonplayer character</strong> (NPC).</p>

        <p>In general terms, an NPC's attitude toward you is described as friendly, indifferent, or hostile. Friendly NPCs are predisposed to help you, and hostile ones are inclined to get in your way. It's easier to get what you want from a friendly NPC, of course.</p>

        <p>Social interactions have two primary aspects: roleplaying and ability checks.</p>

        <h3>Roleplaying</h3>

        <p>Roleplaying is, literally, the act of playing out a role. In this case, it's <em>you</em> as a player determining how your character thinks, acts, and talks.</p>

        <p>Roleplaying is a part of every aspect of the game, and it comes to the fore during social interactions. Your character's quirks, mannerisms, and personality influence how interactions resolve.</p>

        <p>There are two styles you can use when roleplaying your character: the descriptive approach and the active approach. Most players use a combination of the two styles. Use whichever mix of the two works best for you.</p>

        <h4>Descriptive Approach to Roleplaying</h4>

        <p>With this approach. you describe your character's words and actions to the GM and the other players. Drawing on your mental image of your character, you tell everyone what your character does and how he or she does it.</p>

        <p>For instance, Chris plays Tordek the Nikto. Tordek has a quick temper and blames the Black Sun for his family's misfortune. At a bar, an obnoxious Twi'lek operative sits at Tordek's table and tries to strike up a conversation with the Nikto.</p>

        <p>Chris says, "Tordek spits on the floor, growls an insult at the Twi'lek, and stomps over to the bar. He sits on a stool and glares at the operative before ordering another drink."</p>

        <p>In this example, Chris has conveyed Tordek's mood and given the GM a clear idea of his characters attitude and actions.</p>

        <p>When using descriptive roleplaying, keep the following things in mind:</p>

        <ul><li>Describe your character's emotions and attitude.</li><li>Focus on your character's intent and how others might perceive it.</li><li>Provide as much embellishment as you feel comfortable with.</li></ul>





        <p>Don't worry about getting things exactly right. Just focus on thinking about what your character would do and describing what you see in your mind.</p>

        <h4>Active Approach to Roleplaying</h4>

        <p>If descriptive roleplaying tells your GM and your fellow players what your character thinks and does, active roleplaying <em>shows</em> them.</p>

        <p>When you use active roleplaying, you speak with your character's voice, like an actor taking on a role. You might even echo your character's movements and body language. This approach is more immersive than descriptive roleplaying, though you still need to describe things that can't be reasonably acted out.</p>

        <p>Going back to the example of Chris roleplaying Tordek above, here's how the scene might play out if Chris used active roleplaying:</p>

        <p>Speaking as Tordek, Chris says in a gruff, deep voice, "I was wondering why it suddenly smelled awful in here. If I wanted to hear anything out of you, I'd snap your arm and enjoy your screams." In his normal voice. Chris then adds, "I get up, glare at the Twi'lek, and head to the bar."</p>

        <h4>Results of Roleplaying</h4>

        <p>The GM uses your character's actions and attitudes to determine how an NPC reacts. A cowardly NPC buckles under threats of violence. A stubborn Jawa refuses to let anyone badger her. A vain Hutt laps up flattery.</p>

        <p>When interacting with an NPC, pay close attention to the GM's portrayal ofthe NPC's mood, dialogue, and personality. You might be able to determine an NPC's personality traits, ideals, flaws, and bonds, then play on them to influence the NPC's attitude.</p>

        <p>Interactions in D&amp;D are much like interactions in real life. If you can offer NPCS something they want, threaten them with something they fear, or play on their sympathies and goals, you can use words to get almost anything you want. On the other hand, if you insult a proud warrior or speak ill of a senator's allies, your efforts to convince or deceive will fall short.</p>

        <h3>Ability Checks</h3>

        <p>In addition to roleplaying, ability checks are key in determining the outcome of an interaction.</p>

        <p>Your roleplaying efforts can alter an NPC's attitude, but there might still be an element of chance in the situation. For example, your GM can call for a Charisma check at any point during an interaction if he or she wants the dice to play a role in determining an NPC's reactions. Other checks might be appropriate in certain situations, at your GM's discretion.</p>

        <p>Pay attention to your skill proficiencies when thinking of how you want to interact with an NPC, and stack the deck in your favor by using an approach that relies on your best bonuses and skills. If the group needs to trick a guard into letting them into a pavilion, the scoundrel who is proficient in Deception is the best bet to lead the discussion. When negotiating for a hostage's release, the force initiate with Persuasion should do most of the talking.</p>

        <h2>Resting</h2>

        <p>Heroic though they might be, adventurers can't spend every hour of the day in the thick of exploration, social interaction, and combat. They need rest time to sleep and eat, tend their wounds, refresh their batteries and spirits for force- and tech-casting, and brace themselves for further adventure.</p>

        <p>Adventurers can take short rests in the midst of an adventuring day and a long rest to end the day.</p>

        <h3>Short Rest</h3>

        <p>A short rest is a period of downtime, at least 1 hour long, during which a character does nothing more strenuous than eating, drinking, reading, and tending to wounds.</p>

        <p>A character can spend one or more Hit Dice at the end of a short rest, up to the character's maximum number of Hit Dice, which is equal to the character's level. Whenever a character spends a Hit Die to regain hit points, the player rolls the die and adds the character's Constitution modifier to it. The character regains hit points equal to the total. The player can decide to spend an additional Hit Die after each roll. </p>

        <h3>Long Rest</h3>

        <p>A long rest is a period of extended downtime, at least 8 hours long, during which a character sleeps for at least 6 hours and performs light activity, such as reading, talking, eating, or standing watch, for no more than 2 hours. If the rest is interrupted by a period of strenuous activity�fighting, casting powers, at least 1 hour of walking, or similar adventuring activity�the characters must restart the rest to benefit from it.</p>

        <p>At the end of a long rest, a character regains all lost hit points. The character also regains spent Hit Dice, up to a number of dice equal to half of the character's total number of them (minimum of one). </p>

        <p>A character can't benefit from more than one long rest in a 24-hour period, and a character must have at least 1 hit point at the start of the rest to gain its benefits.</p>

        <h4>Variant: Resting in Armor</h4>

        <p>Resting in armor makes it difficult to recover fully. At the end of a long rest, if you wore your armor, you only recover one-quarter your spent Hit Dice (minimum of one), instead of half.</p>

        <h2>Between Adventures</h2>

        <p>Between trips to dungeons and battles against ancient evils, adventurers need time to rest, recuperate, and prepare for their next adventure. Many adventurers also use this time to perform other tasks, such as crafting arms and armor, gambling, or spending their hard-earned credits.</p>

        <p>In some cases, the passage of time is something that occurs with little fanfare or description. When starting a new adventure, the GM might simply declare that a certain amount of time has passed and allow you to describe in general terms what your character has been doing. At other times, the GM might want to keep track of just how much time is passing as events beyond your perception stay in motion.</p>



        <h3>Lifestyle Expenses</h3>

        <p>Between adventures, you choose a particular quality of life and pay the cost of maintaining that lifestyle, as described in chapter 5.</p>

        <p>Living a particular lifestyle doesn't have a huge effect on your character, but your lifestyle can affect the way other individuals and groups react to you. For example, when you lead an aristocratic lifestyle, it might be easier for you to influence the nobles of the city than if you live in poverty.</p>

        <h3>Downtime Activities</h3>

        <p>Between adventures, the GM might ask you what your character is doing during his or her downtime. Periods of downtime can vary in duration, but each downtime activity requires a certain number of days to complete before you gain any benefit, and at least 8 hours of each day must be spent on the downtime activity for the day to count. The days do not need to be consecutive. If you have more than the minimum amount of days to spend, you can keep doing the same thing for a longer period of time, or switch to a new downtime activity.</p>

        <p>Downtime activities other than the ones presented below are possible. If you want your character to spend his or her downtime performing an activity not covered here, discuss it with your GM.</p>

        <h4>Crafting</h4>

        <p>You can craft unenhanced objects, including adventuring equipment and works of art. While you don't need to be proficient with tools related to the object you are trying to create (typically artisan's implements), without proficiency you will lack the knowledge of what objects you can create. You might also need access to special materials or locations necessary to create it. For example, someone proficient with armstech's implements needs a workstation in order to craft a vibrosword.</p>

        <p>For every day of downtime you spend crafting, you can craft one or more items with a total market value not exceeding 250 cr, and you must expend raw materials worth half the total market value. If something you want to craft has a market value greater than 250 cr, you make progress every day in 250-cr increments until you reach the market value of the item. For example, a heavy exoskeleton (market value 9,000 cr) takes 36 days to craft by yourself, at a total cost of 4,500 cr.</p>

        <p>Multiple characters can combine their efforts toward the crafting of a single item, provided that the characters all have proficiency with the requisite tools and are working together in the same place. Each character contributes 250 cr worth of effort for every day spent helping to craft the item. For example, three characters with the requisite tool proficiency and the proper facilities can craft a heavy exoskeleton in 12 days, at a total cost of 4,500 cr.</p>

        <p>While crafting, you can maintain a modest lifestyle, as discussed in chapter 5, without having to pay 10 cr per day. If you have expertise in your chosen tool, you can instead maintain a comfortable lifestyle without having to pay 20 cr per day.</p>



        <h4>Practicing a Profession</h4>

        <p>You can work between adventures, allowing you to maintain a modest lifestyle without having to pay 10 cr per day (see chapter 5 for more information on lifestyle expenses). This benefit lasts as long you continue to practice your profession.</p>

        <p>If you are a member of an organization that can provide gainful employment, such as a syndicate or guild, you earn enough to support a comfortable lifestyle instead.</p>

        <p>If you have proficiency in the Performance skill and put your performance skill to use during your downtime, you earn enough to support a wealthy lifestyle instead.</p>

        <h4>Recuperating</h4>

        <p>You can use downtime between adventures to recover from a debilitating injury, disease, or poison.</p>

        <p>After three days of downtime spent recuperating, you can make a DC 15 Constitution saving throw. On a successful save, you can choose one of the following results:</p>

        <ul><li>End one effect on you that prevents you from regaining hit points. </li><li>For the next 24 hours, gain advantage on saving throws against one disease or poison currently affecting you.</li></ul>

        <h4>Researching</h4>

        <p>The time between adventures is a great chance to perform research, gaining insight into mysteries that have unfurled over the course of the campaign. Research can include poring over dusty tomes and ancient datacrons in a library or buying drinks for the locals to pry rumors and gossip from their lips.</p>

        <p>When you begin your research, the GM determines whether the information is available, how many days of downtime it will take to find it, and whether there are any restrictions on your research (such as needing to seek out a specific individual, tome, or location). The GM might also require you to make one or more ability checks, such as an Intelligence (Investigation) check to find clues pointing toward the information you seek, or a Charisma (Persuasion) check to secure someone's aid. Once those conditions are met, you learn the information if it is available.</p>

        <p>For each day of research, you must spend 10 cr to cover your expenses. This cost is in addition to your normal lifestyle expenses (as discussed in chapter 5).</p>

        <h4>Training</h4>

        <p>You can spend time between adventures learning a new language or training with a set of tools. Your GM might allow additional training options.</p>

        <p>First, you must find an instructor willing to teach you. The GM determines how long it takes, and whether one or more ability checks are required.</p>

        <p>The training lasts for 250 days and costs 10 cr per day. After you spend the requisite amount of time and money, you learn the new language or gain proficiency with the new tool.</p>

