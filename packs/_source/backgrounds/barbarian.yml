system:
  description:
    value: >-
      <div class="background"><p>Though you might have only recently arrived in
      civilized lands, you are no stranger to the values of cooperation and
      group effort when striving for supremacy. You learned these principles,
      and much more, as a member of your tribe.</p><p>Your people have always
      tried to hold to the old ways. Tradition and taboo have kept your tribe
      strong while the kingdoms of others have collapsed into chaos and ruin.
      But for the last few generations, some bands among the tribes were tempted
      to settle, make peace, trade, and even to build towns. Perhaps this is why
      your tribe chose to raise up the totems among the people as living
      embodiments of his power. Perhaps they needed a reminder of who they were
      and from whence they came. The Chosen of your tribe led bands back to the
      old ways, and most of your people abandoned the soft ways of
      civilization.</p><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Animal Handling, Athletics,
      Nature, and Survival</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> One type of musical instrument or artisan's
      implements</p></div><div class="background"><p><strong>Languages:</strong>
      One of your choice</p></div><div
      class="background"><p><strong>Equipment:</strong> A hunting trap, a
      totemic token or set of tattoos marking your loyalty to your tribe, a set
      of traveler's clothes, and a pouch containing 100 cr</p><p></p></div><div
      class="background"><h2>Feature: Barbarian Heritage</h2></div><div
      class="background"><p>You have an excellent knowledge of not only your
      tribe's territory, but also the terrain and natural resources of the rest
      of the worlds. You are familiar enough with any wilderness area that you
      find twice as much food and water as you normally would when you forage
      there. Additionally, you can call upon the hospitality of other tribes in
      times of need.</p><p></p></div><h2>Background Feat</h2><p>As a further
      embodiment of the experience and training of your background, you can
      choose from the following feats:</p><div
      class="smalltable"><table><thead><tr><th>[[/r d8 #
      Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.fDTy7D6Anu41IleR]{Animal
      handler}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.qSXmQGXxdYTfY7JP]{Brawny}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.OOTZcS7bWg0Ltaha]{Naturalist}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.LzMxqm4eUJTrAcJQ]{Survivalist}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.f7d2Ishti7Ui7zdq]{Entertainer}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.m5OLxglJn9BrsqUx]{Crafter}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.wKpnpjOfwA7sF4WP]{Athlete}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.8174dh7FTAwkmsGW]{Weapon
      expert}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I'm driven by a wanderlust that led me away
      from home.</th></tr><tr class="rows"><th>2</th><th>I watch over my friends
      as if they were a litter of newborn pups.</th></tr><tr
      class="rows"><th>3</th><th>I once ran twenty-five miles without stopping
      to warn my clan of an approaching horde. I'd do it again if I had
      to.</th></tr><tr class="rows"><th>4</th><th>I have a lesson for every
      situation, drawn from observing nature.</th></tr><tr
      class="rows"><th>5</th><th>I place no stock in wealthy or well-mannered
      folk. Money and manners won't save you from a hungry rancor.</th></tr><tr
      class="rows"><th>6</th><th>I'm always picking things up, absently fiddling
      with them, and sometimes accidentally breaking them.</th></tr><tr
      class="rows"><th>7</th><th>I feel far more comfortable around animals than
      people.</th></tr><tr class="rows"><th>8</th><th>I was, in fact, raised by
      wampas.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Change: Life is like the seasons, in constant
      change, and we must change with it. (Chaotic)</th></tr><tr
      class="rows"><th>2</th><th>Greater Good: It is each person's
      responsibility to make the most happiness for the whole tribe.
      (Light)</th></tr><tr class="rows"><th>3</th><th>Honor: If I dishonor
      myself, I dishonor my whole clan. (Lawful)</th></tr><tr
      class="rows"><th>4</th><th>Might: The strongest are meant to rule.
      (Dark)</th></tr><tr class="rows"><th>5</th><th>Nature: The natural world
      is more important than all the constructs of civilization.
      (Neutral)</th></tr><tr class="rows"><th>6</th><th>Glory: I must earn glory
      in battle, for myself and my clan.
      (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I am too enamored of ale, wine, and other
      intoxicants.</th></tr><tr class="rows"><th>2</th><th>There's no room for
      caution in a life lived to the fullest.</th></tr><tr
      class="rows"><th>3</th><th>I remember every insult I've received and nurse
      a silent resentment toward anyone who's ever wronged me.</th></tr><tr
      class="rows"><th>4</th><th>I am slow to trust members of other species,
      tribes, and societies.</th></tr><tr class="rows"><th>5</th><th>Violence is
      my answer to almost any challenge.</th></tr><tr
      class="rows"><th>6</th><th>Don't expect me to save those who can't save
      themselves. It is nature's way that the strong thrive and the weak
      perish.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>My family, clan, or tribe is the most important
      thing in my life, even when they are far from me.</th></tr><tr
      class="rows"><th>2</th><th>An injury to the unspoiled wilderness of my
      home is an injury to me.</th></tr><tr class="rows"><th>3</th><th>I will
      bring terrible wrath down on the Darkdoers who destroyed my
      homeland.</th></tr><tr class="rows"><th>4</th><th>I am the last of my
      tribe, and it is up to me to ensure their names enter legend.</th></tr><tr
      class="rows"><th>5</th><th>I suffer awful visions of a coming disaster and
      will do anything to prevent it.</th></tr><tr class="rows"><th>6</th><th>It
      is my duty to provide children to sustain my
      tribe.</th></tr></tbody></table></div>
