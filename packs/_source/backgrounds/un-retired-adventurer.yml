system:
  description:
    value: >-
      <div class="background"><blockquote><p>"I'm getting too old for this
      stuff."</p></blockquote><p>You spent your life as an adventurer, learning
      the use of many skills and basic survival techniques, including how to
      stay alive in a hostile area. You might have been part of a famous
      adventuring party or a less renowned one.</p><p>When you choose this
      background, work with your GM to determine the details of your previous
      adventuring party, and what kind of experiences you had in your
      adventuring career. How famous was your previous adventuring party and how
      well known are you? What did you learn? What was your group's
      specialty?</p><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Athletics, Insight, Lore, and
      Survival</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> One type of artisan's implements</p></div><div
      class="background"><p><strong>Languages:</strong> One of your
      choice</p></div><div class="background"><p><strong>Equipment:</strong> A
      grappling hook, one tool with which you are proficient, a memento of an
      unsuccessful expedition (map to a never found treasure, lock of hair from
      a fallen companion, or another trinket), and a pouch containing your last
      50 cr</p><p></p></div><div class="background"><h2>Feature: Bridges Not Yet
      Burned</h2></div><div class="background"><p>Throughout your adventures you
      have established a multitude of contacts from all walks of life, but the
      intervening years have seen those relationships strained. You may use any
      feature of any other background, but once a particular feature is used,
      that feature can't be used again until one year has
      passed.</p><p></p></div><h2>Background Feat</h2><p>As a further embodiment
      of the experience and training of your background, you can choose from the
      following feats:</p><div class="smalltable"><table><thead><tr><th>[[/r d8
      # Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.qSXmQGXxdYTfY7JP]{Brawny}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.0ouvGghIhtufl2a9]{Empathic}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.dzDViHHT3aZ68eTz]{Loremaster}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.LzMxqm4eUJTrAcJQ]{Survivalist}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.m5OLxglJn9BrsqUx]{Crafter}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.bqcghDqZHiXg1VqF]{Linguist}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.wKpnpjOfwA7sF4WP]{Athlete}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.7diQN6VoqJhyYGtA]{Observant}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I'm always polite and respectful.</th></tr><tr
      class="rows"><th>2</th><th>I'm haunted by memories of war. I can't get the
      images of violence out of my mind.</th></tr><tr
      class="rows"><th>3</th><th>I've lost too many friends, and I'm slow to
      make new ones.</th></tr><tr class="rows"><th>4</th><th>I'm full of
      inspiring and cautionary tales from my adventuring experience relevant to
      almost every combat situation.</th></tr><tr class="rows"><th>5</th><th>I
      can stare down a rancor without flinching.</th></tr><tr
      class="rows"><th>6</th><th>I enjoy being strong and like breaking
      things.</th></tr><tr class="rows"><th>7</th><th>I have a crude sense of
      humor.</th></tr><tr class="rows"><th>8</th><th>I face problems head-on. A
      simple, direct solution is the best path to
      success.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Greater Good: Our lot is to lay down our lives
      in defense of others. (Light)</th></tr><tr
      class="rows"><th>2</th><th>Responsibility: I do what I must and obey just
      authority. (Lawful)</th></tr><tr class="rows"><th>3</th><th>Independence:
      When people follow orders blindly, they embrace a kind of tyranny.
      (Chaotic)</th></tr><tr class="rows"><th>4</th><th>Might: In life as in
      war, the stronger force wins. (Dark)</th></tr><tr
      class="rows"><th>5</th><th>Live and Let Live: Ideals aren't worth killing
      over or going to war for. (Neutral)</th></tr><tr
      class="rows"><th>6</th><th>Nation: My city, nation, or people are all that
      matter. (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r
      d6 # Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>The monstrous enemy we faced in battle still
      leaves me quivering with fear.</th></tr><tr class="rows"><th>2</th><th>I
      have little respect for anyone who is not a proven
      adventurer.</th></tr><tr class="rows"><th>3</th><th>I made a terrible
      mistake in battle cost many lives— and I would do anything to keep that
      mistake secret.</th></tr><tr class="rows"><th>4</th><th>My hatred of my
      enemies is blind and unreasoning.</th></tr><tr
      class="rows"><th>5</th><th>I obey the law, even if the law causes
      misery.</th></tr><tr class="rows"><th>6</th><th>I'd rather eat my armor
      than admit when I'm
      wrong.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I would still lay down my life for the people I
      adventured with.</th></tr><tr class="rows"><th>2</th><th>Someone saved my
      life when they could have left me. To this day, I will never leave a
      friend behind.</th></tr><tr class="rows"><th>3</th><th>My honor is my
      life.</th></tr><tr class="rows"><th>4</th><th>I'll never forget the
      crushing defeat my party suffered or the enemies who dealt
      it.</th></tr><tr class="rows"><th>5</th><th>Those who fight beside me are
      those worth dying for.</th></tr><tr class="rows"><th>6</th><th>I fight for
      those who cannot fight for themselves.</th></tr></tbody></table></div>
