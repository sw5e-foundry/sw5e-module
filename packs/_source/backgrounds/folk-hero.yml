system:
  description:
    value: >-
      <div class="background"><p>You come from a humble social rank, but you are
      destined for so much more. Already the people of your home village regard
      you as their champion, and your destiny calls you to stand against the
      tyrants and monsters that threaten the common folk
      everywhere.</p><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Animal Handling, Athletics,
      Nature, and Performance</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> One type of artisan's implements, biochemist's
      kit, or chef's kit</p></div><div
      class="background"><p><strong>Languages:</strong> One of your
      choice</p></div><div class="background"><p><strong>Equipment:</strong> A
      set of tools (one of your choice), a set of common clothes, and a belt
      pouch containing 100 cr</p></div><div
      class="background"><p></p><h3>Defining Event</h3><p>You previously pursued
      a simple profession among the peasantry, perhaps as a farmer or miner,
      servant or shepherd. But something happened that set you on a different
      path and marked you for greater things. Choose or randomly determine a
      defining event that marked you as a hero of the
      people.</p><table><thead><tr><th>[[/r d8 # Defining
      Event]]</th><th>Defining Event</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I stood up to a tyrant's agents.</th></tr><tr
      class="rows"><th>2</th><th>I saved people during a natural
      disaster.</th></tr><tr class="rows"><th>3</th><th>I stood alone against a
      terrible monster.</th></tr><tr class="rows"><th>4</th><th>I stole from a
      corrupt merchant to help the poor.</th></tr><tr
      class="rows"><th>5</th><th>I led a militia to fight off an invading
      army.</th></tr><tr class="rows"><th>6</th><th>I broke into a tyrant's
      castle and stole weapons to arm the people.</th></tr><tr
      class="rows"><th>7</th><th>I trained the peasantry to use farm implements
      as weapons against a tyrant's soldiers.</th></tr><tr
      class="rows"><th>8</th><th>A lord rescinded an unpopular decree after I
      led a symbolic act of protect against
      it.</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Feature: Rustic Hospitality</h2></div><div
      class="background"><p>Since you are of the common folk, you fit in among
      them with ease. You can find a place to hide, rest, or recuperate among
      other commoners, unless you have shown yourself to be a danger to them.
      They will shield you from the law or anyone else searching for you, though
      they will not risk their lives for you.</p></div><p></p><h2>Background
      Feat</h2><p>As a further embodiment of the experience and training of your
      background, you can choose from the following feats:</p><div
      class="smalltable"><table><thead><tr><th>[[/r d8 #
      Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.fDTy7D6Anu41IleR]{Animal
      handler}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.qSXmQGXxdYTfY7JP]{Brawny}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.OOTZcS7bWg0Ltaha]{Naturalist}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.17gBRGzWPRJiQvTs]{Performer}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.m5OLxglJn9BrsqUx]{Crafter}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.TonpRFhus7GQEe9u]{Specialist}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.bqcghDqZHiXg1VqF]{Linguist}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.D6Un07pgFu6I0ybW]{Healer}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I judge people by their actions, not their
      words.</th></tr><tr class="rows"><th>2</th><th>If someone is in trouble,
      I'm always ready to lend help.</th></tr><tr
      class="rows"><th>3</th><th>When I set my mind to something, I follow
      through no matter what gets in my way.</th></tr><tr
      class="rows"><th>4</th><th>I have a strong sense of fair play and always
      try to find the most equitable solution to arguments.</th></tr><tr
      class="rows"><th>5</th><th>I'm confident in my own abilities and do what I
      can to instill confidence in others.</th></tr><tr
      class="rows"><th>6</th><th>Thinking is for other people. I prefer
      action.</th></tr><tr class="rows"><th>7</th><th>I misuse long words in an
      attempt to sound smarter.</th></tr><tr class="rows"><th>8</th><th>I get
      bored easily. When am I going to get on with my
      destiny?</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Respect: People deserve to be treated with
      dignity and respect. (Light)</th></tr><tr
      class="rows"><th>2</th><th>Fairness: No one should get preferential
      treatment before the law, and no one is above the law.
      (Lawful)</th></tr><tr class="rows"><th>3</th><th>Freedom: Tyrants must not
      be allowed to oppress the people. (Chaotic)</th></tr><tr
      class="rows"><th>4</th><th>Might: If I become strong, I can take what I
      want—what I deserve. (Dark)</th></tr><tr
      class="rows"><th>5</th><th>Sincerity: There's no good in pretending to be
      something I'm not. (Neutral)</th></tr><tr
      class="rows"><th>6</th><th>Destiny: Nothing and no one can steer me away
      from my higher calling.
      (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>The tyrant who rules my land will stop at
      nothing to see me killed.</th></tr><tr class="rows"><th>2</th><th>I'm
      convinced of the significance of my destiny, and blind to my shortcomings
      and the risk of failure.</th></tr><tr class="rows"><th>3</th><th>The
      people who knew me when I was young know my shameful secret, so I can
      never go home again.</th></tr><tr class="rows"><th>4</th><th>I have a
      weakness for the vices of the city, especially hard drink.</th></tr><tr
      class="rows"><th>5</th><th>Secretly, I believe that things would be better
      if I were a tyrant lording over the land.</th></tr><tr
      class="rows"><th>6</th><th>I have trouble trusting in my
      allies.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I have a family, but I have no idea where they
      are. One day, I hope to see them again.</th></tr><tr
      class="rows"><th>2</th><th>I worked the land, I love the land, and I will
      protect the land.</th></tr><tr class="rows"><th>3</th><th>A proud noble
      once gave me a horrible beating, and I will take my revenge on any bully I
      encounter.</th></tr><tr class="rows"><th>4</th><th>My tools are symbols of
      my past life, and I carry them so that I will never forget my
      roots.</th></tr><tr class="rows"><th>5</th><th>I protect those who cannot
      protect themselves.</th></tr><tr class="rows"><th>6</th><th>I wish my
      childhood sweetheart had come with me to pursue my
      destiny.</th></tr></tbody></table></div>
