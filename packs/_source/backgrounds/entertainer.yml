system:
  description:
    value: >-
      <div class="background"><p>You thrive in front of an audience, knowing how
      to entrance them, entertain them, and even inspire them. Your poetics can
      stir the hearts of those who hear you, awakening grief or joy, laughter or
      anger. Your music raises their spirits or captures their sorrow. Your
      dance steps captivate, your humor cuts to the quick. Whatever techniques
      you use, your art is your life.</p><p></p></div><div
      class="background"><p><strong>Skill Proficiencies:</strong> Choose two
      from Acrobatics, Insight, Performance, and Sleight of Hand</p></div><div
      class="background"><p><strong>Tool Proficiencies:</strong> Disguise kit,
      one type of musical instrument</p></div><div
      class="background"><p><strong>Equipment:</strong> A musical instrument
      (one of your choice), the favor of an admirer (love letter, lock of hair,
      or trinket), a costume, and a belt pouch containing 150
      cr</p><p></p></div><div class="background"><h3>Entertainer
      Routines</h3><p>A good entertainer is versatile, spicing up every
      performance with a variety of different routines. Choose one to three
      routines or roll on the table below to define your expertise as an
      entertainer.</p><table><thead><tr><th>[[/r d10 # Entertainer
      Routines]]</th><th>Entertainer Routines</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Actor</th></tr><tr
      class="rows"><th>2</th><th>Dancer</th></tr><tr
      class="rows"><th>3</th><th>Fire-eater</th></tr><tr
      class="rows"><th>4</th><th>Jester</th></tr><tr
      class="rows"><th>5</th><th>Juggler</th></tr><tr
      class="rows"><th>6</th><th>Instrumentalist</th></tr><tr
      class="rows"><th>7</th><th>Poet</th></tr><tr
      class="rows"><th>8</th><th>Singer</th></tr><tr
      class="rows"><th>9</th><th>Storyteller</th></tr><tr
      class="rows"><th>10</th><th>Tumbler</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Feature: By Popular Demand</h2></div><div
      class="background"><p>You can always find a place to perform, usually in
      an inn or cantina but possibly with a circus, at a theater, or even in a
      noble's court. At such a place, you receive free lodging and food of a
      modest or comfortable standard (depending on the quality of the
      establishment), as long as you perform each night. In addition, your
      performance makes you something of a local figure. When strangers
      recognize you in a town where you have performed, they typically take a
      liking to you.</p><p></p></div><h2>Background Feat</h2><p>As a further
      embodiment of the experience and training of your background, you can
      choose from the following feats:</p><div
      class="smalltable"><table><thead><tr><th>[[/r d8 #
      Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.tRBTUPCE7z2NXh6t]{Acrobat}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.0ouvGghIhtufl2a9]{Empathic}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.17gBRGzWPRJiQvTs]{Performer}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.6zGzrbMZgT7eKupr]{Quick-fingered}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.TonpRFhus7GQEe9u]{Specialist}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.f7d2Ishti7Ui7zdq]{Entertainer}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.9omG0nGBGx7taBPS]{Practiced}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.VA4akALkS1kB8a7Z]{Actor}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I know a story relevant to almost every
      situation.</th></tr><tr class="rows"><th>2</th><th>Whenever I come to a
      new place, I collect local rumors and spread gossip.</th></tr><tr
      class="rows"><th>3</th><th>I'm a hopeless romantic, always searching for
      that —special someone.—</th></tr><tr class="rows"><th>4</th><th>Nobody
      stays angry at me or around me for long, since I can defuse any amount of
      tension.</th></tr><tr class="rows"><th>5</th><th>I love a good insult,
      even one directed at me.</th></tr><tr class="rows"><th>6</th><th>I get
      bitter if I'm not the center of attention.</th></tr><tr
      class="rows"><th>7</th><th>I'll settle for nothing less than
      perfection.</th></tr><tr class="rows"><th>8</th><th>I change my mood or my
      mind as quickly as I change key in a
      song.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Beauty: When I perform, I make the world better
      than it was. (Light)</th></tr><tr class="rows"><th>2</th><th>Tradition:
      The stories, legends, and songs of the past must never be forgotten, for
      they teach us who we are. (Lawful)</th></tr><tr
      class="rows"><th>3</th><th>Creativity: The world is in need of new ideas
      and bold action. (Chaotic)</th></tr><tr class="rows"><th>4</th><th>Greed:
      I'm only in it for the money and fame. (Dark)</th></tr><tr
      class="rows"><th>5</th><th>People: I like seeing the smiles on people's
      faces when I perform. That's all that matters. (Neutral)</th></tr><tr
      class="rows"><th>6</th><th>Honesty: Art should reflect the soul; it should
      come from within and reveal who we really are.
      (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I'll do anything to win fame and
      renown.</th></tr><tr class="rows"><th>2</th><th>I'm a sucker for a pretty
      face.</th></tr><tr class="rows"><th>3</th><th>A scandal prevents me from
      ever going home again. That kind of trouble seems to follow me
      around.</th></tr><tr class="rows"><th>4</th><th>I once satirized a noble
      who still wants my head. It was a mistake that I will likely
      repeat.</th></tr><tr class="rows"><th>5</th><th>I have trouble keeping my
      true feelings hidden. My sharp tongue lands me in trouble.</th></tr><tr
      class="rows"><th>6</th><th>Despite my best efforts, I am unreliable to my
      friends.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>My instrument is my most treasured possession,
      and it reminds me of someone I love.</th></tr><tr
      class="rows"><th>2</th><th>Someone stole my precious instrument, and
      someday I'll get it back.</th></tr><tr class="rows"><th>3</th><th>I want
      to be famous, whatever it takes.</th></tr><tr class="rows"><th>4</th><th>I
      idolize a hero of the old tales and measure my deeds against that
      person's.</th></tr><tr class="rows"><th>5</th><th>I will do anything to
      prove myself superior to my hated rival.</th></tr><tr
      class="rows"><th>6</th><th>I would do anything for the other members of my
      old troupe.</th></tr></tbody></table></div>
