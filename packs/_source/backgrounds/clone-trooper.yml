system:
  description:
    value: >-
      <div class="background"><p>You are one of millions; genetically
      engineered, identical specimens designed to be the perfect soldier.
      Created from a template provided by the legendary bounty hunter Jango
      Fett, you represent the latest and greatest evolution in galactic
      warfare.</p><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Athletics, Medicine, Perception,
      and Piloting</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> Your choice of demolitions kit, security kit, or
      slicer's kit</p></div><div
      class="background"><p><strong>Languages:</strong> One of your
      choice</p></div><div class="background"><p><strong>Equipment:</strong>
      Badge or emblem of your rank, your chosen tools, a set of common clothes,
      and a pouch containing 100 cr</p><p></p></div><div
      class="background"><h3>Clone Specialization</h3><p>While most clones serve
      as simple soldier, there are many specialized units. Roll a [[/r d8]] or
      choose from the options in the table below to determine your
      specialization:</p><table><thead><tr><th>[[/r d8 # Clone
      Specialization]]</th><th>Clone Specialization</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Trooper</th></tr><tr
      class="rows"><th>2</th><th>Commando</th></tr><tr
      class="rows"><th>3</th><th>Jet Trooper</th></tr><tr
      class="rows"><th>4</th><th>Medic</th></tr><tr
      class="rows"><th>5</th><th>Spec Ops</th></tr><tr
      class="rows"><th>6</th><th>Ordnance</th></tr><tr
      class="rows"><th>7</th><th>Officer</th></tr><tr
      class="rows"><th>8</th><th>Scout</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Feature: Republic Rank</h2></div><div
      class="background"><p>You are a soldier of the Republic. Those loyal to
      the Republic will respect your status and defer to you if they don't
      outrank you. You can invoke your position to exert influence over other
      soldiers, requisition simple equipment, and gain access to military
      compounds affiliated with the Republic.</p><p></p></div><h2>Background
      Feat</h2><p>As a further embodiment of the experience and training of your
      background, you can choose from the following feats:</p><div
      class="smalltable"><table><thead><tr><th>[[/r d8 #
      Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.qSXmQGXxdYTfY7JP]{Brawny}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.OkLgXUImHmCon0a0]{Medic}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.M6mC1d0JH6uVXgYu]{Perceptive}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.qvZ81yL3lMLBro0T]{Ace
      pilot}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.TonpRFhus7GQEe9u]{Specialist}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.xJ9X383Z2SHpFSio]{Alert}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.wKpnpjOfwA7sF4WP]{Athlete}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.0qyYeZcRK38SZExG]{Forceful
      vigor}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I always respect my commander.</th></tr><tr
      class="rows"><th>2</th><th>I can stare down a krayt dragon without
      flinching.</th></tr><tr class="rows"><th>3</th><th>I face problems
      head-on. A simple, direct solution is the best path to
      success.</th></tr><tr class="rows"><th>4</th><th>I have a sense of humor.
      This is rare among my brothers.</th></tr><tr class="rows"><th>5</th><th>I
      judge people by their actions, not their words.</th></tr><tr
      class="rows"><th>6</th><th>I've lost too many friends, and I'm slow to
      make new ones.</th></tr><tr class="rows"><th>7</th><th>I ask a lot of
      questions.</th></tr><tr class="rows"><th>8</th><th>I'll settle for nothing
      less than
      perfection.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6
      # Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Responsibility: I do what I must and obey just
      authority. (Lawful)</th></tr><tr class="rows"><th>2</th><th>Might:
      Strength, not compassion, wins battles. (Dark)</th></tr><tr
      class="rows"><th>3</th><th>Republic: My brothers, the Republic, or people
      are all that matter. (Any)</th></tr><tr class="rows"><th>4</th><th>Greater
      Good: We fight not for ourselves, but for countless of others that can't
      fight for themselves. (Light)</th></tr><tr
      class="rows"><th>5</th><th>Freedom: Tyrants must not be allowed to oppress
      the people. (Chaotic)</th></tr><tr class="rows"><th>6</th><th>Live and Let
      Live: Ideals aren't worth killing or going to war over.
      (Neutral)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I have little respect for anyone who is of a
      lesser rank.</th></tr><tr class="rows"><th>2</th><th>I obey orders without
      question, even if the orders cause misery.</th></tr><tr
      class="rows"><th>3</th><th>I'd rather eat my armor than admit when I'm
      wrong.</th></tr><tr class="rows"><th>4</th><th>I judge others harshly, and
      myself even more severely.</th></tr><tr class="rows"><th>5</th><th>I am
      inflexible in my thinking.</th></tr><tr class="rows"><th>6</th><th>I can't
      tell a lie for the life of
      me.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>My honor is my life.</th></tr><tr
      class="rows"><th>2</th><th>Someone saved my life on the battlefield. To
      this day, I will never leave a friend behind.</th></tr><tr
      class="rows"><th>3</th><th>Those who fight beside me are those worth dying
      for.</th></tr><tr class="rows"><th>4</th><th>I fight for those who cannot
      fight for themselves.</th></tr><tr class="rows"><th>5</th><th>I would
      still lay down my life for the people I serve with.</th></tr><tr
      class="rows"><th>6</th><th>A proud commander once gave me a horrible
      beating, and I will take my revenge on any bully I
      encounter.</th></tr></tbody></table></div>
