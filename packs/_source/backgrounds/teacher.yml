system:
  description:
    value: >-
      <div class="background"><p>You are an experienced teacher who knows how to
      best instruct others in an array of disciplines. Although you have a vast
      amount of knowledge yourself, pedagogy is the most important tool in your
      toolbox because it allows the rest of your knowledge to spread most
      efficiently.</p><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Lore, Nature, Performance, and
      Technology</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> One instrument or set of artisan's implements of
      your choice</p></div><div
      class="background"><p><strong>Languages:</strong> One of your
      choice</p></div><div class="background"><p><strong>Equipment:</strong> A
      set of common clothes, an instrument or set of tools with which you are
      proficient, a token from a former student, and a belt pouch containing 50
      cr</p><p></p></div><div class="background"><h2>Feature:
      Knowledge</h2></div><div class="background"><p>If you need information on
      something, you know if there is a book containing that information and
      where to find it. Further, when you hear a creature speaking or when you
      see language written down, you can identify exactly what language is being
      used even if you are not proficient in the language. Finally, when you
      hear music, you know which instruments are being used in the performance,
      even if you are not proficient in their
      use.</p><p></p></div><h2>Background Feat</h2><p>As a further embodiment of
      the experience and training of your background, you can choose from the
      following feats:</p><div class="smalltable"><table><thead><tr><th>[[/r d8
      # Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.dzDViHHT3aZ68eTz]{Loremaster}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.OOTZcS7bWg0Ltaha]{Naturalist}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.17gBRGzWPRJiQvTs]{Performer}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.5lrAx0UcSt2nSVId]{Techie}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.f7d2Ishti7Ui7zdq]{Entertainer}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.m5OLxglJn9BrsqUx]{Crafter}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.bqcghDqZHiXg1VqF]{Linguist}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.wanxyGoCxISxOFUg]{Feigned
      confidence}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Books are my everything.</th></tr><tr
      class="rows"><th>2</th><th>Knowledge is the most important thing in the
      world.</th></tr><tr class="rows"><th>3</th><th>I have quotes for every
      occasion.</th></tr><tr class="rows"><th>4</th><th>My vocabulary is vast
      enough I sometimes use words that are larger than necessary.</th></tr><tr
      class="rows"><th>5</th><th>I love working with kids.</th></tr><tr
      class="rows"><th>6</th><th>Because I understand why people can make
      mistakes, I am also patient with them.</th></tr><tr
      class="rows"><th>7</th><th>Sometimes I start explaining things at a level
      much to basic for the audience.</th></tr><tr class="rows"><th>8</th><th>I
      reward hard work and good
      manners.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Teach: I must spread what I have learned.
      (Lawful)</th></tr><tr class="rows"><th>2</th><th>Insatiable: When I find
      something new I must learn everything about it, no matter the cost.
      (Chaotic)</th></tr><tr class="rows"><th>3</th><th>Discovery: Every single
      piece of information is waiting to be discovered. (Light)</th></tr><tr
      class="rows"><th>4</th><th>Greed: Every piece of knowledge will be mine.
      (Dark)</th></tr><tr class="rows"><th>5</th><th>People: I will teach
      anybody anything. (Neutral)</th></tr><tr class="rows"><th>6</th><th>Power:
      Knowledge is power.
      (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Someone showing bad manners does not exist to
      me. I will never talk to or acknowledge that person.</th></tr><tr
      class="rows"><th>2</th><th>I overemphasize the importance of
      discipline.</th></tr><tr class="rows"><th>3</th><th>I invest so much time
      into planning that I can't bring myself to deviate from the plan, even
      when it is needed.</th></tr><tr class="rows"><th>4</th><th>I look down on
      uneducated adults.</th></tr><tr class="rows"><th>5</th><th>I'd give up my
      companions for a piece of secret information.</th></tr><tr
      class="rows"><th>6</th><th>I can't stand not reading at least one page of
      a book a day.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r
      d6 # Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I was picked on while growing up for being a
      bookworm.</th></tr><tr class="rows"><th>2</th><th>The world is such an
      open place, I feel like there is still so much to learn. I want to compile
      knowledge from different places.</th></tr><tr class="rows"><th>3</th><th>I
      like reading books and writing, but I'm no poet yet. It is just a hobby I
      want to share with others, looking for exotic inspirations.</th></tr><tr
      class="rows"><th>4</th><th>I will become the power behind the throne by
      controlling the information the throne receives.</th></tr><tr
      class="rows"><th>5</th><th>Children are our future, and I will mold
      them.</th></tr><tr class="rows"><th>6</th><th>I can't teach what I don't
      know. I will teach everything.</th></tr></tbody></table></div>
