system:
  description:
    value: >-
      <div class="background"><p>You are an acolyte of the Sith Order: an
      ancient order of Force-wielders devoted to the dark side of the Force.
      Emerging as a divergent faction to the Jedi Order, the Sith are mortal
      enemies of the Jedi and fight against them. Driven by emotions such as
      hate, anger, and greed, the Sith are deceptive and ultimately obsessed
      with amassing power no matter the cost. You follow the Sith
      Code:</p><blockquote><p>"Peace is a lie. There is only
      passion.</p><p>Through passion I gain strength.</p><p>Through strength I
      gain power.</p><p>Through power I gain victory.</p><p>Through victory my
      chains are broken.</p><p>The Force shall free
      me."</p></blockquote><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Deception, Insight, Intimidation,
      and Lore</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> Artificer's implements</p></div><div
      class="background"><p><strong>Languages:</strong> One of your
      choice</p></div><div class="background"><p><strong>Equipment:</strong> A
      copy of the Sith code, a set of common clothes including a robe, and a
      belt pouch containing 150 cr</p><p></p></div><div
      class="background"><h2>Feature: Feared</h2></div><div
      class="background"><p>As a Sith, you instill fear in those who are aware
      of your standing. When you are in a civilized environment, you can get
      away with minor criminal offenses, such as refusing to pay for food at a
      cantina or cutting through doors at a local shop, since most people will
      not report your activity to the
      authorities.</p><p></p></div><h2>Background Feat</h2><p>As a further
      embodiment of the experience and training of your background, you can
      choose from the following feats:</p><div
      class="smalltable"><table><thead><tr><th>[[/r d8 #
      Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.pXakrWdEv2BKYYW8]{Silver-tongued}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.0ouvGghIhtufl2a9]{Empathic}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.fY1YANOeKzcwN5Kh]{Threatening}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.dzDViHHT3aZ68eTz]{Loremaster}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.bqcghDqZHiXg1VqF]{Linguist}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.m5OLxglJn9BrsqUx]{Crafter}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.ts0p1NWYw0c4mycg]{Formfighting
      dabbler}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.AwYyIRPdlP1G3kRD]{Force-sensitive}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I idolize a particular Sith, and constantly
      refer to that person's deeds and example.</th></tr><tr
      class="rows"><th>2</th><th>I seek power above all else.</th></tr><tr
      class="rows"><th>3</th><th>I prefer using a lightsaber to solve my
      problems.</th></tr><tr class="rows"><th>4</th><th>I have a plan for any
      situation.</th></tr><tr class="rows"><th>5</th><th>I believe everyone is
      beneath me.</th></tr><tr class="rows"><th>6</th><th>I prefer to let
      someone else do my dirty work.</th></tr><tr
      class="rows"><th>7</th><th>Hatred and anger drive every decision I
      make.</th></tr><tr class="rows"><th>8</th><th>Lying and scheming are
      second nature to
      me.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Patience: I will defeat my enemies in the end,
      I'm in no rush. (Lawful)</th></tr><tr class="rows"><th>2</th><th>Disdain:
      I never try to help those in need, regardless of how simple it would be.
      (Dark)</th></tr><tr class="rows"><th>3</th><th>Knowledge: The path to
      power and self-improvement is through knowledge. (Neutral)</th></tr><tr
      class="rows"><th>4</th><th>Power: I hope to one day rise to the rank of
      Dark Lord of the Sith. (Dark)</th></tr><tr
      class="rows"><th>5</th><th>Might: If I become strong, I can take what I
      want—what I deserve. (Dark)</th></tr><tr
      class="rows"><th>6</th><th>Aspiration: I'll succeed in my goals at any
      cost. (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6
      # Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I am too merciful, and empathize with those I
      shouldn't.</th></tr><tr class="rows"><th>2</th><th>I put too much trust in
      those who rule over me.</th></tr><tr class="rows"><th>3</th><th>I will
      never fully trust anyone other than myself.</th></tr><tr
      class="rows"><th>4</th><th>I am inflexible in my thinking.</th></tr><tr
      class="rows"><th>5</th><th>My pride will probably lead to my
      destruction.</th></tr><tr class="rows"><th>6</th><th>Failure frightens me,
      and I get desperate if I think I might
      fail.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I would die to recover an ancient Sith relic
      that was lost long ago.</th></tr><tr class="rows"><th>2</th><th>I care
      only about myself.</th></tr><tr class="rows"><th>3</th><th>I owe my life
      to the Sith who took me in when my parents died.</th></tr><tr
      class="rows"><th>4</th><th>My enemies will be defeated, even if it costs
      me my life.</th></tr><tr class="rows"><th>5</th><th>Someone I love was
      killed. Some day soon, I'll have my revenge.</th></tr><tr
      class="rows"><th>6</th><th>My loyalty to my master is
      unwavering.</th></tr></tbody></table></div>
