system:
  description:
    value: >-
      <div class="background"><p>One day you awoke, perhaps in a forest or on a
      sandy beach, with no recollection of what happened to you. How did you get
      here? Who were you? These questions elude and boggle your mind. Some
      people wish for a fresh start, but you never even got a
      choice.</p><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Deception, Insight, Investigation,
      and Survival</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> Choose one from disguise kit, forgery kit, or
      tinker's implements</p></div><div
      class="background"><p><strong>Languages:</strong> One of your
      choice</p></div><div class="background"><p><strong>Equipment:</strong> A
      set of common clothes, a relic of your past which you do not remember, and
      a belt pouch containing 200 cr</p><p></p></div><div
      class="background"><h2>Feature: A Life Once Lived</h2></div><div
      class="background"><p>You once had a home, a family, relationships,
      possessions, but now you are left with nothing but the ability to start
      anew. You are unfamiliar with the world around you as well as the people
      in it. You may often need to ask for clarification on things other
      adventurers may know intrinsically. Some events, locations, names,
      phrases, or objects may also trigger you to recall small details which
      could relate to the life you once had, at the discretion of the
      GM.</p></div><p></p><h2>Background Feat</h2><p>As a further embodiment of
      the experience and training of your background, you can choose from the
      following feats:</p><div class="smalltable"><table><thead><tr><th>[[/r d8
      # Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.pXakrWdEv2BKYYW8]{Silver-tongued}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.0ouvGghIhtufl2a9]{Empathic}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.4O9ON0Km4QZ2ogZu]{Investigator}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.LzMxqm4eUJTrAcJQ]{Survivalist}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.TonpRFhus7GQEe9u]{Specialist}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.m5OLxglJn9BrsqUx]{Crafter}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.bqcghDqZHiXg1VqF]{Linguist}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.9omG0nGBGx7taBPS]{Practiced}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I don't know who you are but I'll try to help
      you.</th></tr><tr class="rows"><th>2</th><th>I will let nothing stop my
      quest for answers.</th></tr><tr class="rows"><th>3</th><th>Even if I never
      find out who I was before, I will know who I am now.</th></tr><tr
      class="rows"><th>4</th><th>I am sometimes clumsy when speaking. I must've
      not been very eloquent.</th></tr><tr class="rows"><th>5</th><th>I shy away
      from forging new relationships. I don't want to leave anyone behind
      again.</th></tr><tr class="rows"><th>6</th><th>Having no memories of the
      past has left me feeling free and happy.</th></tr><tr
      class="rows"><th>7</th><th>I am eager to learn and devour any knowledge I
      can.</th></tr><tr class="rows"><th>8</th><th>I am insightful and can often
      see things from other peoples point of
      view.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Conscience: I've forgotten before, I can forget
      again. I don't let my conscience get in the way of my actions.
      (Lawful)</th></tr><tr class="rows"><th>2</th><th>Freedom: With no past to
      tie me down I do was I will. (Chaotic)</th></tr><tr
      class="rows"><th>3</th><th>Respect: People deserve to be treated with
      respect. (Light)</th></tr><tr class="rows"><th>4</th><th>Past: I will
      destroy whatever I have to in order to reclaim what I once had.
      (Dark)</th></tr><tr class="rows"><th>5</th><th>Live and Let Live: Ideals
      aren't worth killing over or going to war for. (Neutral)</th></tr><tr
      class="rows"><th>6</th><th>Memory: Finding out my history drives every
      action I do.
      (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I've lost all hope since I woke
      up.</th></tr><tr class="rows"><th>2</th><th>I'm obsessed with the life I
      left behind.</th></tr><tr class="rows"><th>3</th><th>Sometimes I crack
      under the stress of starting new.</th></tr><tr
      class="rows"><th>4</th><th>I get tunnel vision when investigating my past
      life.</th></tr><tr class="rows"><th>5</th><th>I no longer care about
      anything. It could all be gone in an instant.</th></tr><tr
      class="rows"><th>6</th><th>I am constantly angry about forgetting
      everything.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6
      # Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I will never rest until I find out what
      happened to me.</th></tr><tr class="rows"><th>2</th><th>I have a family
      out there who's looking for me. I can't let them down.</th></tr><tr
      class="rows"><th>3</th><th>I was given a chance to start fresh, and I'm
      not taking it for granted.</th></tr><tr class="rows"><th>4</th><th>My
      entire life was lost in the blink of an eye. What's the point of all
      this?</th></tr><tr class="rows"><th>5</th><th>I've already lost
      everything. Now I do as I please.</th></tr><tr
      class="rows"><th>6</th><th>I will become something great so that even if I
      forget, others won't.</th></tr></tbody></table></div>
