system:
  description:
    value: >-
      <div class="background"><p>You worked to keep the holonet up and running,
      whether being employed directly by an institution or indirectly by people
      across the galaxy. Your work has allowed you to uncover secrets most would
      never know existed.</p><p></p></div><div
      class="background"><p><strong>Skill Proficiencies:</strong> Choose two
      from Insight, Investigation, Stealth, and Technology</p></div><div
      class="background"><p><strong>Tool Proficiencies:</strong> Choose two from
      mechanic's kit, security kit, and slicer's kit</p></div><div
      class="background"><p><strong>Equipment:</strong> A set of common clothes,
      an old transceiver antennae, two tools of your choice, and a belt pouch
      containing 50 cr</p><p></p></div><div class="background"><h3>Employment
      Type</h3><p>There are many people who service parts of the holonet, and
      many more who want to control the flow of information. Choose which best
      suits your character or roll on the table
      below.</p><table><thead><tr><th>[[/r d8 # Employment
      Type]]</th><th>Employment Type</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Inter-world Government</th></tr><tr
      class="rows"><th>2</th><th>Inter-world Corporation</th></tr><tr
      class="rows"><th>3</th><th>World Government</th></tr><tr
      class="rows"><th>4</th><th>Crime Syndicate</th></tr><tr
      class="rows"><th>5</th><th>Independent Contractor</th></tr><tr
      class="rows"><th>6</th><th>Broadcasting Service</th></tr><tr
      class="rows"><th>7</th><th>Small Corporation</th></tr><tr
      class="rows"><th>8</th><th>Darknet
      Broadcasting</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Feature: Holonet Access</h2></div><div
      class="background"><p>You have the codes to a distributor station which
      gives you access to all information sent through it. This information
      comes in the form of useful (and sometimes sensitive) information on a
      topic you choose each day to tune into; this information isn't always
      reliable or interesting. Regardless of the quality of the information,
      it's relevance most likely pertains to your
      locale.</p><p></p></div><h2>Background Feat</h2><p>As a further embodiment
      of the experience and training of your background, you can choose from the
      following feats:</p><div class="smalltable"><table><thead><tr><th>[[/r d8
      # Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.0ouvGghIhtufl2a9]{Empathic}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.4O9ON0Km4QZ2ogZu]{Investigator}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.26Ds7w8yALtifDq1]{Stealthy}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.5lrAx0UcSt2nSVId]{Techie}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.TonpRFhus7GQEe9u]{Specialist}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.bP2iKrNSUJyxFyMH]{Keen
      mind}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.9omG0nGBGx7taBPS]{Practiced}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.bO9twdBeV4PZJ2WS]{Tech
      dabbler}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I watch and record people secretly then review
      it later.</th></tr><tr class="rows"><th>2</th><th>I talk like I'm on a
      game show or am a holonet broadcaster at all times.</th></tr><tr
      class="rows"><th>3</th><th>I prefer to be left to my own
      devices.</th></tr><tr class="rows"><th>4</th><th>I like to record people
      dying and upload it to the holonet.</th></tr><tr
      class="rows"><th>5</th><th>There's no such thing as 'real
      news'.</th></tr><tr class="rows"><th>6</th><th>Information is a weapon
      that I've mastered.</th></tr><tr class="rows"><th>7</th><th>I am always
      interested in learning new things.</th></tr><tr
      class="rows"><th>8</th><th>I prefer interacting
      indirectly.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6
      # Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Duty: It is my duty to keep all people in
      contact so that everything will continue working as intended.
      (Lawful)</th></tr><tr class="rows"><th>2</th><th>Autonomy: Information is
      meant to confuse and overwhelm. I choose to control my own mind by
      controlling what information I have access to. (Chaotic)</th></tr><tr
      class="rows"><th>3</th><th>Happiness: The more hope and joy I spread, the
      more laughs I bring; that is why I do what I do. (Light)</th></tr><tr
      class="rows"><th>4</th><th>Popularity: I want to become the most renown
      being in all the galaxy, and I'll destroy the competition.
      (Dark)</th></tr><tr class="rows"><th>5</th><th>Knowledge: I don't care
      who's ideology is right, I care who's ideology will let me learn and
      document information. (Neutral)</th></tr><tr
      class="rows"><th>6</th><th>Self-Fulfillment: I'm just here for the fun of
      it, no matter what happens it'll make a great story one day.
      (Any)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I tend to think any broadcaster is a fraud
      immediately unless they prove otherwise.</th></tr><tr
      class="rows"><th>2</th><th>I tend to repeat the same mistake unless it is
      pointed out to me.</th></tr><tr class="rows"><th>3</th><th>I will ramble
      endlessly about a random holonet broadcast that I saw which I think was
      the best ever.</th></tr><tr class="rows"><th>4</th><th>I think everyone
      who works a normal job is a drone without the ability to think
      freely.</th></tr><tr class="rows"><th>5</th><th>I describe everything
      using references to obscure holonet recordings.</th></tr><tr
      class="rows"><th>6</th><th>I've become completely desensitized to violence
      and graphic imagery, to the point where I laugh in an off putting way
      whenever I see
      it.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I will do anything to free people from
      censorship.</th></tr><tr class="rows"><th>2</th><th>I can't let anyone
      know I work for a crime lord.</th></tr><tr class="rows"><th>3</th><th>I
      see truth in an ideology, and I must spread that ideal to
      all.</th></tr><tr class="rows"><th>4</th><th>I got a man killed by giving
      him a platform to speak, I can't let that happen again.</th></tr><tr
      class="rows"><th>5</th><th>I—m on the run from a government organization
      that I spread propaganda against and who's propaganda I
      destroy.</th></tr><tr class="rows"><th>6</th><th>I have a famous person's
      private logs, and I don't know what to do with
      them.</th></tr></tbody></table></div>
