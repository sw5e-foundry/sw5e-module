system:
  description:
    value: >-
      <div class="background"><p>You are haunted by something so terrible that
      you dare not speak of it. You've tried to bury it and run away from it, to
      no avail. Whatever this thing is that haunts you can't be slain, a ghost
      in the dark, a bloodcurdling nightmare, or a memory that refuses to die.
      The burden has taken its toll, isolating you from most people and making
      you question your sanity. You must find a way to overcome it before it
      destroys you.</p><p></p></div><div class="background"><p><strong>Skill
      Proficiencies:</strong> Choose two from Investigation, Lore, Survival, and
      Technology</p></div><div class="background"><p><strong>Tool
      Proficiencies:</strong> Your choice of artist's implements, biotech's
      implements, or brewer's kit</p></div><div
      class="background"><p><strong>Languages:</strong> One of your
      choice</p></div><div class="background"><p><strong>Equipment:</strong> A
      set of common clothes, one tool with which you are proficient, a tattered
      journal, and a belt pouch containing 100 cr</p><p></p></div><div
      class="background"><h3>Source of Dismay</h3><p>What dire event molded you
      into who you are today?</p><table><thead><tr><th>[[/r d6 # Source of
      Dismay]]</th><th>Source of Dismay</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Investigator</th></tr><tr
      class="rows"><th>2</th><th>Loremaster</th></tr><tr
      class="rows"><th>3</th><th>Survivalist</th></tr><tr
      class="rows"><th>4</th><th>Techie</th></tr><tr
      class="rows"><th>5</th><th>Crafter</th></tr><tr
      class="rows"><th>6</th><th>Specialist</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Feature: Heart of Darkness</h2></div><div
      class="background"><p>Those who look into your eyes can see that you have
      faced unimaginable horror and that you are no stranger to darkness. Though
      they might fear you, commoners will extend you every courtesy and do their
      utmost to help you. Unless you have shown yourself to be a danger to them,
      they may even take up arms to fight alongside you, should you find
      yourself facing an enemy alone.</p><p></p></div><h2>Background
      Feat</h2><p>As a further embodiment of the experience and training of your
      background, you can choose from the following feats:</p><div
      class="smalltable"><table><thead><tr><th>[[/r d8 #
      Feat]]</th><th>Feat</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>@UUID[Compendium.sw5e-module.feats.Item.4O9ON0Km4QZ2ogZu]{Investigator}</th></tr><tr
      class="rows"><th>2</th><th>@UUID[Compendium.sw5e-module.feats.Item.dzDViHHT3aZ68eTz]{Loremaster}</th></tr><tr
      class="rows"><th>3</th><th>@UUID[Compendium.sw5e-module.feats.Item.LzMxqm4eUJTrAcJQ]{Survivalist}</th></tr><tr
      class="rows"><th>4</th><th>@UUID[Compendium.sw5e-module.feats.Item.5lrAx0UcSt2nSVId]{Techie}</th></tr><tr
      class="rows"><th>5</th><th>@UUID[Compendium.sw5e-module.feats.Item.m5OLxglJn9BrsqUx]{Crafter}</th></tr><tr
      class="rows"><th>6</th><th>@UUID[Compendium.sw5e-module.feats.Item.TonpRFhus7GQEe9u]{Specialist}</th></tr><tr
      class="rows"><th>7</th><th>@UUID[Compendium.sw5e-module.feats.Item.bqcghDqZHiXg1VqF]{Linguist}</th></tr><tr
      class="rows"><th>8</th><th>@UUID[Compendium.sw5e-module.feats.Item.tmcJVroZ16061fl6]{Total
      reconstruction}</th></tr></tbody></table><p></p></div><div
      class="background"><h2>Suggested
      Characteristics</h2><table><thead><tr><th>[[/r d8 # Personality
      Trait]]</th><th>Personality Trait</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I don't run from evil. Evil runs from
      me.</th></tr><tr class="rows"><th>2</th><th>I like to read and memorize
      poetry. It keeps me calm and brings me fleeting moments of
      happiness.</th></tr><tr class="rows"><th>3</th><th>I spend money freely
      and live life to the fullest, knowing that tomorrow I might
      die.</th></tr><tr class="rows"><th>4</th><th>I live for the thrill of the
      hunt.</th></tr><tr class="rows"><th>5</th><th>I don't talk about the thing
      that torments me. I'd rather not burden others with my curse.</th></tr><tr
      class="rows"><th>6</th><th>I expect danger around every
      corner.</th></tr><tr class="rows"><th>7</th><th>I refuse to become a
      victim, and I will not allow others to be victimized.</th></tr><tr
      class="rows"><th>8</th><th>I put no trust in
      authority.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Ideal]]</th><th>Ideal</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>Honor: I try to help those in need, no matter
      what the personal cost. (Light)</th></tr><tr
      class="rows"><th>2</th><th>Vengeance: I'll stop the spirits that haunt me
      or die trying. (Any)</th></tr><tr class="rows"><th>3</th><th>Fury: I kill
      monsters to make the world a safer place, and to exorcise my own demons.
      (Light)</th></tr><tr class="rows"><th>4</th><th>Entitlement: I have a dark
      calling that puts me above the law. (Chaotic)</th></tr><tr
      class="rows"><th>5</th><th>Focus: I like to know my enemy's capabilities
      and weaknesses before rushing into battle. (Lawful)</th></tr><tr
      class="rows"><th>6</th><th>Selfish: I'm a monster that destroys other
      monsters, and anything else that gets in my way.
      (Dark)</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Flaw]]</th><th>Flaw</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I have certain rituals that I must follow every
      day. I can never break them.</th></tr><tr class="rows"><th>2</th><th>I
      assume the worst in people.</th></tr><tr class="rows"><th>3</th><th>I feel
      no compassion for the dead. They're the lucky ones.</th></tr><tr
      class="rows"><th>4</th><th>I have an addiction.</th></tr><tr
      class="rows"><th>5</th><th>I am a purveyor of doom and gloom who lives in
      a world without hope.</th></tr><tr class="rows"><th>6</th><th>I talk to
      spirits that no one else can
      see.</th></tr></tbody></table><p></p><table><thead><tr><th>[[/r d6 #
      Bond]]</th><th>Bond</th></tr></thead><tbody><tr
      class="rows"><th>1</th><th>I keep my thoughts and discoveries in a
      journal. My journal is my legacy.</th></tr><tr
      class="rows"><th>2</th><th>I would sacrifice my life to protect the
      innocent.</th></tr><tr class="rows"><th>3</th><th>My torment drove away
      the person I love. I strive to win back the love I've lost.</th></tr><tr
      class="rows"><th>4</th><th>A terrible guilt consumes me. I hope that I can
      find redemption through my actions.</th></tr><tr
      class="rows"><th>5</th><th>There's evil in me, I can feel it. It must
      never be set free.</th></tr><tr class="rows"><th>6</th><th>I have a child
      to protect. I must make the world a safer place for him (or
      her).</th></tr></tbody></table></div>
