    legacyStarshipMod:
      description:
        value: >-
          <p>As an action, a crew member can shoot a thin sheet of flames from
          the ship. Each ship in a 150-foot cone must make a Dexterity saving
          throw (DC = 8 + prof. bonus + ship's constitution modifier). A ship
          takes 3d6 fire damage on a failed save, or half as much damage on a
          successful one.</p><p>The fire ignites any flammable objects in the
          area.</p><p>This feature can be used a number of times equal to your
          ship's tier (a minimum of once). All expended uses are regained when
          the ship recharges.</p>
