    system:
      description:
        value: >-
          <section class="secret">

          <p>The scout throws a grenade, choosing a point within 35 ft. Each
          creature within 10 feet must make a DC 14 Constitution saving throw.
          On a failed save, a creature is stunned until the end of their next
          turn.</p>

          <p>Additionally, on a failed save, a creature is unconscious for 1
          minute, until it takes damage, or until someone uses an action to
          shake or slap the creature awake. At the end of an affected
          creature&rsquo;s turn, it can repeat this save, ending the effect on a
          success.</p>

