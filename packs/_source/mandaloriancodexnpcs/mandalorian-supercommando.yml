          <p>When making an attack with a weapon with this property, you use
          your choice of your Strength or Dexterity modifier for the attack and
          damage rolls. You must use the same modifier for both rolls.</p>

          <h3>Light</h3>

          <p>A weapon with this property is small and easy to handle, making it
          ideal for use when engaging in Double- or Two-Weapon Fighting. See the
          rules for Double- and Two-Weapon Fighting in chapter 9.</p>

          <h3>Thrown (range 20/60)</h3>

          <p>A weapon that can be used to make a ranged attack has this
          property. The range lists two numbers. The first is the weapon's
          normal range in feet, and the second indicates the weapon's long
          range. When attacking a target beyond normal range, you have
          disadvantage on the attack roll. You can't attack a target beyond the
          weapon's long range.</p>
