system:
  description:
    value: >-
      <p>As part of the action used to cast this power, you must make a ranged
      weapon attack against one creature within your weapon's range, otherwise
      the power fails. On a hit, the target suffers the attack's normal effects,
      and the creature gains 1 slowed level until the end of its turn as the air
      around it turns frigid. </p>

      <p>This power deals additional damage when you reach higher levels. At 5th
      level the ranged attack deals an extra [[/r 1d6]] cold damage. This damage
      increases by [[/r 1d6]] again at 11th level and 17th level.</p>
