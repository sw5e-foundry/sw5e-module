  description:
    value: >-
      <div class="background"><p>Though others must often endure extensive
      interviews and significant fees to gain access to even the most common
      archives in your library, you have free and easy access to the majority of
      the library, though it might also have repositories of lore that are too
      valuable, powerful, or secret to permit anyone immediate access. You have
      a working knowledge of your cloister's personnel and bureaucracy, and you
      know how to navigate those connections with some ease. Additionally, you
      are likely to gain preferential treatment at other libraries across the
      galaxy, as professional courtesy shown to a fellow scholar.</p></div>
