  description:
    value: >-
      <div class="background"><p>You have a military rank from your career as a
      soldier. Soldiers loyal to your former military organization still
      recognize your authority and influence, and they defer to you if they are
      of a lower rank. You can invoke your rank to exert influence over other
      soldiers and requisition simple equipment for temporary use. You can also
      usually gain access to friendly military encampments where your rank is
      recognized.</p></div>
