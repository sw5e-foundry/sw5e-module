  description:
    value: >-
      <div class="background"><p>You know the secret symbology of your cult,
      which can pop up in some surprising places. With a subtle gesture or
      knowing handshake you can discern who follows the ways of your dark lord.
      Cloisters of your cult may be hidden across the galaxy, identified by the
      secret signs and symbols designed to lead the faithful to places of dark
      worship. Such cloistered often contain enough lodging and food for at
      least ten people, for a week, and sometimes harbor eldritch treasures
      belonging to the cult.</p></div>
