  description:
    value: >-
      <div class="background"><p>Due to the corruption of the Jedi training done
      to the pre-Jensaarai, you have a unique insight into both the Light and
      Dark side of the Force, as well as its history, applications, and
      techniques in a scholarly manner. You are well versed in the above
      concepts, and can recall key information related to them. However, if the
      research was hidden from the public and you have not had experience
      working with it, you can only partially understand it. You also recognize
      well-known Jedi Masters and Sith Lords by their works and marks.</p></div>
