  description:
    value: >-
      <div class="background"><p>You can always find a place to perform, usually
      in a cantina or spice den but possibly in a fine dining establishment,
      culture center or even a noble's court. At such a place, you receive free
      lodging and food of a modest or comfortable standard (depending on the
      quality of the establishment), as long as you perform each night. In
      addition, your performance makes you something of a local figure. When
      strangers recognize you in a town where you have performed, they typically
      take a liking to you.</p></div>
