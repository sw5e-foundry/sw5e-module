  description:
    value: >-
      <div class="background"><p>You have a preternatural instinct for
      understanding the terrain, interpreting maps, and planning routes. You and
      your party can move at three-fourths your speed over difficult terrain
      during long-distance travel. Because of these skills, if you know your
      destination and the intervening terrain--either by reputation, by sight,
      or by maps you have seen--you are able to identify an effective short-cut,
      trimming your travel time by up to half. Your GM may rule that your
      short-cut entails significant danger or may be temporarily
      impassable.</p></div>
