    value: >-
      <div class="background"><p>Other Dathomir Witches know, and will look out
      for you. If you're ever in need of a place to stay, or a meal to eat,
      other Dathomir Witches will help you as long as your clans aren't feuding.
      This could be in the form of shelters, meals, even healing. If the
      Dathomir Witches are of your clan or a clan friendly to you, they may be
      willing to help you even at cost to themselves.</p></div>
