  description:
    value: >-
      <div class="background"><p>You've been from one end of the galaxy to the
      other. You know the most lucrative trade routes. You have expert knowledge
      of the various hyperlanes. In addition to this, you know a large number of
      the models and designs of common space ships that are found in the galaxy.
      Further, the bonds you formed with your crew are strong, and you can call
      on their aid even if you've been away from their side for some time. You
      can expect your former comrades to offer you passage aboard ship,
      reasonable aid, or shelter when you are in need. Keep in mind that this
      bond goes both ways, and they may come to you expecting the
      same.</p></div>
