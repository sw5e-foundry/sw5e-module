  description:
    value: >-
      <div class="background"><p>You are an established and respected member of
      an adventurer's faction, allowing you to rely on certain benefits that
      membership provides. If you are in a town with a headquarters for your
      adventurer's faction and you are in good standing with the faction, you
      will be allowed to look at the job postings and find adventuring work to
      earn money. factions often wield tremendous political power. If you are
      accused of a crime, your faction will support you if a good case can be
      made for your innocence or the crime is justifiable. You can also gain
      access to powerful political figures through the faction, if you are a
      member in good standing. You must pay dues of 50 cr per month to the
      faction. Your dues must be current to remain in the faction's good
      graces.</p></div>
