  description:
    value: >-
      <div class="background"><p>As a Jedi, you command the respect of those who
      are loyal to the Jedi Order. You and your adventuring companions can
      expect to receive free healing and care at any Jedi temple, and those who
      support your religion will support you (but only you) at a modest
      lifestyle. You might also have ties to a specific Jedi temple and have a
      residence there. This could be the temple where you trained, or a temple
      where you have found a new home. While near your temple, you can call upon
      the Jedi for assistance, provided the assistance you ask for is not
      hazardous and you remain in good standing with your temple.</p></div>
