  description:
    value: >-
      <div class="background"><p>The seclusion of your hermitage gave you access
      to a unique and powerful discovery. The nature of this revelation depends
      on the nature of your seclusion. You might have discovered a great truth
      about the cosmos or the Force, a fact that has long been forgotten, a
      relic of the past that could rewrite history, or a place unseen for ages.
      It might be information that would be damaging to the people who consigned
      you to exile, and hence the reason for your return to society. Work with
      your GM to determine the details of your discovery and its impact on the
      campaign.</p></div>
