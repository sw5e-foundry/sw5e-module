  description:
    value: >-
      <div class="background"><p>Some close brushes with the law have taught you
      that not every city guard can be bribed, and some people are simply too
      keen to miss minute discrepancies. This feature allows you to study a
      person and gain insight into whether or not they would accept a bribe, or
      to pick up on whether they are exceptionally more perceptive than you. It
      does not reveal how expensive a bribe may be for a given situation,
      however.</p></div>
