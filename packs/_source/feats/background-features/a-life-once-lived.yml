  description:
    value: >-
      <div class="background"><p>You once had a home, a family, relationships,
      possessions, but now you are left with nothing but the ability to start
      anew. You are unfamiliar with the world around you as well as the people
      in it. You may often need to ask for clarification on things other
      adventurers may know intrinsically. Some events, locations, names,
      phrases, or objects may also trigger you to recall small details which
      could relate to the life you once had, at the discretion of the
      GM.</p></div>
