  description:
    value: >-
      <div class="background"><p>Being a clone, you were born from the existence
      of another. Flashes of deeds you never did, of people you have never met
      and of information you have never learned sporadically appear. You may be
      confused with your DNA-Donor by others, being befriended by, or made
      enemies of, people you have never before met. The exact nature of these
      revelations depends on the nature of your DNA-Donor; they might lead to a
      site that only one other has ever seen, some long-forgotten fact, relic or
      weapon from the past that could reshape the present, or even information
      that would be damaging to the people who created you.</p></div>
