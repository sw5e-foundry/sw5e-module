    text:
      content: "<h2 id=\"-the-mandalorians\">THE MANDALORIANS</h2>\n<p>The Mandalorians—known in Mando'a as the Mando'ade, or \"Children of Mandalore\"—were a nomadic group of clan-based people consisting of members from multiple species and multiple genders, all bound by a common culture.</p>\n<section id=\"-the-mandalorians-history\">\n<h3 id=\"-the-mandalorians-history\">HISTORY</h3>\n<p>In their early years, Mandalorian culture revolved around battle, with war being a source of honor and pride in their community. The leader of the Mandalorians was known as the Mand'alor, translating to \"Sole Ruler\" and was rendered as \"Mandalore\" in Basic. Throughout their history, the Mandalorians were frequently allied with the Sith, perhaps most notably the Sith Lord Exar Kun, and held a certain distrust and general dislike for the Jedi Order. However, they would not hesitate to cooperate with the Jedi if a partnership between the two groups was mutually beneficial. In later years, they moved away from their obsessively war-like and conqueror ways and instead, most became bounty hunters and mercenaries, selling their skills to various individuals and factions in the galaxy. The Mandalorian Protectors sided with the Alliance to Restore the Republic in about 3 ABY and continued to serve the New Republic.</p>\n</section>\n<section id=\"-the-mandalorians-culture\">\n<h3 id=\"-the-mandalorians-culture\">CULTURE</h3>\n<p>Central to the Mandalorian culture were the Resol'nare, or the \"Six Actions\". These six tenets defined what it meant to be a Mandalorian, and any who wished to be considered as such was expected to abide by them. The Resol'nare consisted of wearing armor, speaking the Mandalorian language, defending oneself along with one's family, contributing to the welfare of your clan, rallying to the Mand'alor when summoned, and raising one's children in the Mandalorian ways. In order to retain their heritage in the face of outside influence, Mandalorians placed a high value on rigorously carrying out the Resol'nare's tenets in a daily manner.</p>\n<p>Many Mandalorian soldiers would become bounty hunters and mercenaries, selling their services to the highest bidder, many in the galaxy saw the Mandalorians as little else. While mercenary work and bounty hunting would be a primary means of income for the them, several Mandalorians earned their living as weaponsmiths, or bodyguards. Others toiled in workshops and factories, working the land as farmers, or as doctors. Despite the wide array of professions they took, every Mandalorian was combat trained and they could band together into an army on short notice. They were also considerably more sociable than many would expect. As long as individuals spoke their mind and said what they meant, looked them straight in the eye, paid their debts, never made a pass at a Mandalorian of the opposite sex unless they planned to become part of the culture, and respected the elderly—any Mandalorian who has reached such an age would be a renowned warrior—anyone who encountered a Mandalorian outside of combat was unlikely to come to harm.</p>\n<section>\n<section id=\"-the-mandalorians-armor\">\n<h3 id=\"-the-mandalorians-armor\">ARMOR</h3>\n<p>The most recognizable symbol of the Mandalorian culture, Mandalorian armor was a catch-all term for the sets of distinctive full-body armor worn by Mandalorian warriors and soldiers throughout galactic history. Known as beskar'gam in the Mandalorian language of Mando'a—a name which meant \"iron skin\" when translated into Basic—Mandalorian armor was central to the Mandalorian way of life. The wearing of armor was one of the Resol'nare, the six tenets that defined the Mandalorian culture. In an expansive community comprised of beings from numerous origins, the easily identifiable armor not only provided protection for the wearer, but a common visual identity for any and all Mandalorians, regardless of species or gender.</p>\n<p>The specific design of Mandalorian armor evolved over time, gaining more sophisticated features over the years, including the incorporation of advanced helmet heads-up displays, and armor-mounted weapon systems such as flamethrowers and wrist rocket launchers. However, one of the armor's most lasting features was the T-shaped visor that adorned the helmet's face across its various incarnations. Numerous materials were employed in the creation of Mandalorian armor through the millennia, from alum and durasteel, to stygian-triprismatic polymer and the nearly indestructible beskar iron. Mandalorian armor forged from beskar was highly prized for its incredible resilience, and while sets of armor were often passed down from one generation to the next, beskar armor was considered the most valuable. The appearance of a Mandalorian's armor was largely up to the individual, as the highly independent Mandalorian people customized their armor with different colored paint schemes, clan and unit sigils, personalized glyphs, or other marking patterns in accordance to their own tastes.</p>\n<div id=\"p4\">\n<blockquote>\n<h2 id=\"-mandalorians\">MANDALORIANS</h2>\n<p>Tier 17, lawful balanced</p>\n<hr />\n<table style=\"width:36.8966%;height:34px\">\n<thead>\n<tr style=\"height:17px\">\n<th style=\"width:17.0088%;height:17px\">STR</th>\n<th style=\"width:17.3021%;height:17px\">DEX</th>\n<th style=\"width:17.3021%;height:17px\">CON</th>\n<th style=\"width:17.0088%;height:17px\">INT</th>\n<th style=\"width:17.3021%;height:17px\">WIS</th>\n<th style=\"width:14.0762%;height:17px\">CHA</th>\n</tr>\n</thead>\n<tbody>\n<tr style=\"height:17px\">\n<td style=\"width:17.0088%;height:17px\">22 (+6)</td>\n<td style=\"width:17.3021%;height:17px\">12 (+1)</td>\n<td style=\"width:17.3021%;height:17px\">14 (+2)</td>\n<td style=\"width:17.0088%;height:17px\">12 (+1)</td>\n<td style=\"width:17.3021%;height:17px\">16 (+3)</td>\n<td style=\"width:14.0762%;height:17px\">8 (-1)</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<ul>\n<li>Assocation Proficiencies<br />Strength +18, Dexterity +7, Constitution +8, Wisdom +15,</li>\n</ul>\n</blockquote>\n<section id=\"-mandalorians-goals\">\n<h3 id=\"-mandalorians-goals\">GOALS</h3>\n<p>Mandalorian culture places heavy emphasis on strength and worthiness. The primary goal of the Mandalorians is to prove that their strength is greater than that of others.</p>\n</section>\n<section id=\"-mandalorians-beliefs\">\n<h3 id=\"-mandalorians-beliefs\">BELIEFS</h3>\n<p>The Mandalorian's beliefs are characterized by the Resol'nare, or the Six Actions:<br />A Mandalorian must wear armor.<br />A Mandalorian must speak Mando'a.<br />A Mandalorian must defend themself and their family.<br />A Mandalorian must contribute to the overall well- being of the clan.<br />A Mandalorian must raise their children as Mandalorians.<br />A Mandalorian must heed Mandalore's call and rally to their cause.</p>\n</section>\n<section id=\"-mandalorians-traits\">\n<h3 id=\"-mandalorians-traits\">TRAITS</h3>\n<p>Mandalorians often share member traits of being strong, hardy, resilient, and uncompromising.</p>\n</section>\n<section id=\"-mandalorians-insignia\">\n<h3 id=\"-mandalorians-insignia\">INSIGNIA</h3>\n<p>The Mandalorian insignia—the Kyr'bes—features the skull of a mythosaur. It is a badge of honor that Mandalorians wear openly.</p>\n</section>\n<section id=\"-mandalorians-headquarters\">\n<h3 id=\"-mandalorians-headquarters\">HEADQUARTERS</h3>\n<p>As a society of nomadic soldiers the Mandalorians have a myriad of headquarters throughout the galaxy. Their primary headquarters is their homeworld of Mandalore, with other planets in the Mandalore System, such as Akaan, Cheravh, Concord Dawn, Dxun, Mandallia, Ordo, and Shogun also falling under their control for much of their known history. There have also been times where they claim starships, such as the massive starship, the\_Spirit of Vengeance, their home.</p>\n<div>\_</div>\n</section>\n<section id=\"-mandalorians-becoming-a-mandalorian\">\n<h3 id=\"-mandalorians-becoming-a-mandalorian\">BECOMING A MANDALORIAN</h3>\n<p>Mandalorians are a large, galaxy-spanning faction, that doesn't rely on active recruitment. Instead, new members tend to seek out Mandalorian clans to join.</p>\n<p>In order to join the Mandalorians, new members must be proficient in at least one martial weapon and require at least one workweek of faction activity downtime a month to retain status. They must also learn the history and traditions of the Mandalorian people.</p>\n<p>Once they have shown their commitment to learning, they must then prove themselves to be an exceptional warrior. This can be done by fighting Mandalorians in unarmed combat or by accomplishing a feat of strength against a worthy opponent.</p>\n</section>\n<section id=\"-mandalorians-maintaining-membership\">\n<h3 id=\"-mandalorians-maintaining-membership\">MAINTAINING MEMBERSHIP</h3>\n<p>To remain a Mando'ade you must follow the Resol'nare, or Six Actions.<br />The Six Actions<br />A Mandalorian must wear armor.<br />A Mandalorian must speak Mando'a.<br />A Mandalorian must defend themself and their family.<br />A Mandalorian must contribute to the overall well-being of the clan.<br />A Mandalorian must raise their children as Mandalorians.<br />A Mandalorian must heed Manda'lor's call and rally to their cause.</p>\n</section>\n<section id=\"-mandalorians-the-ranks-of-the-mandoade\">\n<h3 id=\"-mandalorians-the-ranks-of-the-mandoade\">THE RANKS OF THE MANDO'ADE</h3>\n<section id=\"-mandalorians-the-ranks-of-the-mandoade-1st-rank-verd\">\n<h4 id=\"-mandalorians-the-ranks-of-the-mandoade-1st-rank-verd\">1ST RANK - VERD</h4>\n<p>The same word as \"warrior\", a Verd is a competant, highly trained soldier of Mandalore.</p>\n</section>\n<section id=\"-mandalorians-the-ranks-of-the-mandoade-2nd-rank-ruusalor\">\n<h4 id=\"-mandalorians-the-ranks-of-the-mandoade-2nd-rank-ruusalor\">2ND RANK - RUUS'ALOR</h4>\n<p>The Ruus'alor is a veteran soldier and warrior. He most frequently commands squads and patrols and is responsible for basic discipline as well as being a liason between higher ranking Mando'ade and the basic soldiers.</p>\n</section>\n<section id=\"-mandalorians-the-ranks-of-the-mandoade-3rd-rank-alorad\">\n<h4 id=\"-mandalorians-the-ranks-of-the-mandoade-3rd-rank-alorad\">3RD RANK - ALOR'AD</h4>\n<p>Alor'ade command a company strength unit. Usually, they are men and women with many years of service to their clan and the Mand'alor, and are veterans of many battles.</p>\n</section>\n<section id=\"-mandalorians-the-ranks-of-the-mandoade-4th-rank-aliitalor\">\n<h4 id=\"-mandalorians-the-ranks-of-the-mandoade-4th-rank-aliitalor\">4TH RANK - ALIIT'ALOR</h4>\n<p>Aliit'alor are both high ranking generals and the chieftains of their respective clans. Depending on the size of their clan, an Aliit'alor can expect to command anywhere from brigade size units, to whole divisions, to full corps and even whole armies.</p>\n</section>\n<section id=\"-mandalorians-the-ranks-of-the-mandoade-5th-rank-mandalor\">\n<h4 id=\"-mandalorians-the-ranks-of-the-mandoade-5th-rank-mandalor\">5TH RANK - MAND'ALOR</h4>\n<p>The singular and ultimate title of Mand'alor is bestowed upon only one man or woman at a time, and he or she commands the Mando'ade both in times of war and of relative peace. He or she is the end all be all of Mandalorian society, and is the commander-in-chief of all Mandalorian forces across all theatres of war. A legitimate wielder of The Darksaber is also considered the current Mand'alor.</p>\n<section>\n<div>The Mandalorians</div>\n<div>\_</div>\n</section>\n</section>\n</section>\n</div>\n<div id=\"p5\">\n<section>\n<section id=\"-mandalorians-faction-training\">\n<h3 id=\"-mandalorians-faction-training\">FACTION TRAINING.</h3>\n<p>Mandalorians have four faction training options. They have their faction-specific language,\_Mando'a. They also place heavy emphasis on crafting, with\_armormech's implements, armstech's implements, and\_gadgeteer's implements.</p>\n</section>\n<section id=\"-mandalorians-faction-activities\">\n<h3 id=\"-mandalorians-faction-activities\">FACTION ACTIVITIES.</h3>\n<p>Mandalorians have three faction activities:\_Bounty Hunting, Mercenary Contracting,\_and\_Pit Fighting.</p>\n</section>\n<section id=\"-mandalorians-enhanced-insignia\">\n<h3 id=\"-mandalorians-enhanced-insignia\">ENHANCED INSIGNIA.</h3>\n<p>Ruus'alor\_rank or higher Mandalorians have an enhanced insignia. While wearing their insignia, all Mandalorians can cast the combustive shot at-will tech power (Player's Handbook, page 230). Intelligence is their casting ability for this tech power.</p>\n</section>\n</section>\n</div>\n</section>\n</section>\n</section>"
