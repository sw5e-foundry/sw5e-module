name: The Darksaber
pages:
  - name: The Darksaber
    _id: '0000000000000000'
    text:
      content: >-
        <p><em>"Anyone can hold the Darksaber. The trick is keeping it, along
        with your head."</em><br />―Ursa Wren to Sabine Wren</p>

        <p>The Darksaber was an ancient and unique black-bladed lightsaber
        created by Tarre Vizsla, the first Mandalorian ever inducted into the
        Jedi Order, prior to 1019 BBY. The weapon was kept in the Jedi Temple
        after Vizsla's passing, but members of House Vizsla stole the saber in a
        conflict with the Jedi during the fall of the Old Republic. The
        Darksaber was passed down, generation to generation, by the ancestors of
        Pre Vizsla, who held onto the weapon even after the pacifist ideals of
        the New Mandalorians replaced the warrior ways of Mandalore.</p>

        <p>The Darksaber was an ancient black-bladed lightsaber. It had a unique
        blade that was shorter than that of most lightsabers, and shaped like a
        traditional sword. Its overall profile was distinctly Mandalorian with
        an angular pommel, hand guard, and slit-shaped blade emitter. The sound
        emitted by its blade was also higher pitched than other lightsabers.</p>

        <p>The Darksaber had a crystal which served as a conduit for Force
        energy. The wielder's thoughts and actions guided the blade's current of
        power, with the blade often producing an electrical effect in response
        to a heightened emotional state. The Darksaber was also capable of
        parrying lightsaber blades, with them being drawn to each other in an
        almost magnetic pull. It was respected by the Mandalorians as a symbol
        for the leadership of House Vizsla, and later Death Watch.</p>

        <p>According to Mandalorian custom, one could only obtain the Darksaber
        by defeating the previous owner in combat. Should they have claimed it
        any other way, their claim was considered illegitimate.</p>
