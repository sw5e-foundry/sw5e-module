  - name: Mandalorian Vestments
    _id: '0000000000000000'
    text:
      content: "<p>While you are attuned to and in contact with multiple enhanced items with this named property, you gain the following additional benefits:</p>\n<hr />\n<ul>\n<li>(2)\_You gain advantage on Wisdom (Perception) checks that rely on sight within 60 feet. Additionally, this set grants a +1 bonus to AC.</li>\n<li>(3) At least one item of prototype rarity or rarer\_You gain an additional attunement slot as well as advantage on Intelligence (Investigation) checks within 5 feet. Additionally, you have resistance to kinetic and energy damage from unenhanced sources and this set now grants a +2 bonus to AC, instead of +1.</li>\n<li>(4) At least one item of advanced rarity or rarer While you are wearing this armor, damage that you take from weapons is reduced by 6. If this would reduce the damage to 0, the damage is instead reduced to 1. Additionally, this set now grants resistance to kinetic and energy damage from enhanced sources, instead of unenhanced.</li>\n</ul>"
