    _id: '0000000000000000'
    text:
      content: "<h2 id=\"-the-mandoade\">THE MANDO'ADE</h2>\n<p>The Mandalorians—known in Mando'a as the Mando'ade, or \"Children of Mandalore\"—were a nomadic group of clan-based people consisting of members from multiple species and multiple genders, all bound by a common culture. Every Mandalorian was combat trained and they could band together into an army on short notice.</p>\n<p>History. In their early years, Mandalorian culture revolved around battle, with war being a source of honor and pride in their community. The leader of the Mandalorians was known as the Mand'alor, translating to \"Sole Ruler\" and was rendered as \"Mandalore\" in Basic. Throughout their history, the Mandalorians were frequently allied with the Sith, perhaps most notably the Sith Lord Exar Kun, and held a certain distrust and general dislike for the Jedi Order. However, they would not hesitate to cooperate with the Jedi if a partnership between the two groups was mutually beneficial. In later years, the Mandalorians moved away from their obsessively war-like and conqueror ways and instead, most became bounty hunters and mercenaries, selling their skills to various individuals and factions in the galaxy. The Mandalorian Protectors sided with the Rebel Alliance and the New Republic.</p>\n<p>Six Actions. These six tenets defined what it meant to be a Mandalorian: 1) wearing armor, 2) speaking the Mandalorian language, 3) defending oneself along with one's family, 4) contributing to the welfare of your clan, 5) rallying to the Mand'alor when summoned, and 6) raising one's children in the Mandalorian ways.</p>\n<p>Armor. Known as beskar'gam, meaning \"iron skin,\" Mandalorian armor not only provided protection for the wearer, but a common visual identity for any and all Mandalorians, regardless of species or gender.</p>\n<p>The specific design of Mandalorian armor evolved over time, gaining more sophisticated features over the years. However, one of the armor's most lasting features was the T-shaped visor that adorned the helmet's face across its various incarnations. While sets of armor were often passed down from one generation to the next, beskar armor was considered the most valuable. The appearance of a Mandalorian's armor was largely up to the individual, being customized with different colored paint schemes, clan and unit sigils, personalized glyphs, or other marking patterns.</p>\n<blockquote>\n<h5 id=\"-the-mandoade-adding-beskar-armor\">Adding beskar armor</h5>\n<p>To add the effects of Beskar'gam to any mandalorian, add the Absorptive 1-3 armor property to any statblock.<br />Absorptive 1-3: When a creature takes damage from weapons, it is reduced by an amount equal to the absorptive number. If this would reduce the damage to 0, the damage is instead reduced to 1.</p>\n<p>Alternatively give them resistance to unenhanced or enhanced energy and kinetic damage, however the CR for every Mandalorian will go up by 2-4 CR.</p>\n</blockquote>\n<hr />\n<h2 id=\"-mandalorian-warriors\">MANDALORIAN WARRIORS</h2>\n<p>Mandalorian warriors, sometimes known as Mandalorian commandos, were soldiers of Mandalorian warrior clans that were active throughout Mandalorian cultural history. Many Mandalorian warriors were part of Mandalorian organizations such as Death Watch, Mandalorian Protectors, Nite Owls, and the Children of the Watch, where they served as saboteurs, assassins, infantry, and bounty hunters.</p>\n<h2 id=\"-the-death-watch\">THE DEATH WATCH</h2>\n<p>The Death Watch was a Mandalorian terrorist splinter group of warriors that opposed the pacifist government of Mandalore. Following the end of the Mandalorian Civil War, the remaining Mandalorian martial traditionalists, who believed in the old warrior ways of Mandalore, were exiled to the moon of Concordia, where most of them were thought by the pacifistic New Mandalorians to have died out.</p>\n<section>\n<p>However, the survivors eventually regrouped and began calling themselves the Death Watch. Whereas the Old Mandalorians did not seek vengeance on the New Mandalorians, the Death Watch intended to overthrow the pacifist government and restore the traditional warrior ways of their people. They were then led in secret by Concordia's governor, Pre Vizsla of Clan Vizsla, who wielded the Darksaber, and Duchess Satine Kryze's sister, Bo-Katan Kryze.</p>\n<hr />\n<h3 id=\"-mandalorian-explosives-artiste-sabine-wren\">SABINE WREN</h3>\n<p>Though she was first and foremost a free-spirited artist, Wren had been trained as a Mandalorian<br />warrior from an early age, and had extensive<br />expertise and knowledge in weaponry, as<br />well as proficiency in numerous combat skills.<br />A prodigy of sorts, accomplished and acrobatic<br />warrior and saboteur, both Hera Syndulla and<br />Kanan Jarrus had the greatest respect for Wren's skills and trusted her expertise on the inner workings of the Imperial military, a remnant of her past as a cadet at the Imperial Academy on Mandalore. As munitions specialist of the Ghost crew, she maintained and tuned all weapons but her crewmates' lightsabers, but also created many of the explosive devices she and the team used.</p>\n<h3 id=\"-mandalorian-supercommando-mandalor\">MAND'ALOR</h3>\n<p>Mand'alor, rendered as Mandalore in Galactic Basic, was the title assumed by the sole leader of the Mandalorian people. Their Protectors established a balance of control in the Mandalorians' warrior clan society. At some point prior to the Clone Wars, a Mand'alor known as Mandalore The Great waged a series of conflicts against the Jedi Order. The Mandalorian Jedi, Tarre Vizsla, once ruled all of Mandalore, and a descendant, Pre Vizsla, leader of the Mandalorian splinter group Death Watch, took the title of Mand'alor during his takeover of Mandalore, the Mandalorian homeworld, but the title became vacant when Vizsla was killed in a duel with Maul.</p>\n<p>During the reign of the Galactic Empire, the former Mandalorian super commando Gar Saxon, had wished to be Mand'alor and rule over the Mandalorians. The leader of the Protectors, Fenn Rau, claimed Saxon had no honor, thus Saxon was unable to claim the title. He was, however, installed as Viceroy of Mandalore by Emperor Palpatine. After Gar Saxon's death, his brother, Governor Tiber Saxon, succeeded him and wished to gain control of all of Mandalore, but was killed before he could achieve his goal after Sabine Wren returned to Mandalore with her clan and the Darksaber to free her father.</p>\n<p>After Saxon's death, Sabine Wren passed down the Darksaber to Lady Bo-Katan Kryze, who accepted the Darksaber from Wren and with the support of clans Wren, Vizsla, Rook, Eldar, her own Clan Kryze, and the Protectors, represented by Rau, stepped into the role of Mand'alor to unite the Mandalorian people against the Empire.</p>\n<section id=\"-mandalorian-supercommando-prominent-mandalors\" style=\"box-sizing:border-box;-webkit-print-color-adjust:exact;display:contents\">\n<h3 id=\"-mandalorian-supercommando-prominent-mandalors\">PROMINENT MAND'ALORS</h3>\n<section id=\"-mandalorian-supercommando-prominent-mandalors-tarre-vizsla\">\n<h4 id=\"-mandalorian-supercommando-prominent-mandalors-tarre-vizsla\">TARRE VIZSLA</h4>\n<p>Tarre Vizsla was the first Mandalorian accepted into the Jedi Order of the Old Republic. During his time as a Jedi, Vizsla created the Darksaber, which was seen as a one of a kind lightsaber. Vizsla eventually became Mand'alor. After his passing, Vizsla was honored with a statue of himself on Mandalore. His darksaber was kept at the Jedi Temple on Coruscant. However, it was stolen by members of House Vizsla. It was used by members of the House and Clan Vizsla to unify the people and strike down their enemies.</p>\n<p>The Darksaber was an ancient and unique black-bladed lightsaber created by Tarre Vizsla, the first Mandalorian ever inducted into the Jedi Order, prior to 1019 BBY. The weapon was kept in the Jedi Temple after Vizsla's passing, but members of House Vizsla stole the saber in a conflict with the Jedi during the fall of the Old Republic. The Darksaber was passed down, generation to generation, by the ancestors of Pre Vizsla, who held onto the weapon even after the pacifist ideals of the New Mandalorians replaced the warrior ways of Mandalore.</p>\n</section>\n<section id=\"-mandalorian-supercommando-prominent-mandalors-pre-vizsla\">\n<h4 id=\"-mandalorian-supercommando-prominent-mandalors-pre-vizsla\">PRE VIZSLA</h4>\n<p>Pre Vizsla was the leader of the terrorist Mandalorian faction known as Death Watch. Following Mandalore's Civil War, Vizsla became leader of Death Watch and attempted to overthrow the New Mandalorians' leadership in order to restore Mandalore's warrior past, seeing Duchess Satine as a tarnish to Mandalorians.</p>\n<p>Vizsla's reign as Mand'alor was cut short when Maul and his brother broke out of prison with the former prime minister Almec. In the Sundari's Royal Palace's throne room, Maul challenged Vizsla for leadership, which Vizsla accepted and handled Maul his lightsaber. At first, Vizsla had the upper hand in his duel with Maul by using his jetpack and blasters. However, Maul was able to defeat Vizsla. Vizsla, accepting his defeat, gave Maul the darksaber and was beheaded in front of the Death Watch.</p>\n</section>\n<section id=\"-mandalorian-supercommando-prominent-mandalors-bo-katan-kryze\" style=\"box-sizing:border-box;-webkit-print-color-adjust:exact;display:contents\">\n<h4 id=\"-mandalorian-supercommando-prominent-mandalors-bo-katan-kryze\">BO-KATAN KRYZE</h4>\n<p>During the subsequent civil war and the siege, Kryze was named Lady of House Kryze and Regent of Mandalore by the Jedi. However, the Republic was reorganized into the Galactic Empire, and Kryze was forced out of power by Clan Saxon. However, in 2 BBY, Kryze chose to ally her House with Clan Wren when they chose to resist the Empire. However, when Sabine Wren gave her the Darksaber, Kryze refused due to her failing as Regent. With Clan Wren, she was able to free Sabine's father Alrich Wren. Unfortunately, Kryze learned that the Empire, under Governor Tiber Saxon, had rebuilt the Arc Pulse Generator (a weapon designed to attack mandalorian beskar) that Sabine had designed and codenamed the\_Duchess\_after Kryze's sister. Despite wanting to punish Wren for creating the Weapon, Kryze knew that they needed her help to destroy it. Thus, Kryze, Sabine, and their allies boarded Saxon's Star Destroyer. Despite being briefly captured by Saxon and Captain Hark who wanted Wren to improve the Duchess. Fortunately, Wren was able to make the\_Duchess\_target Stormtrooper armor. Despite this development, Kryze convinced Wren to destroy it instead of using it against the Empire.</p>\n<p>After the destruction of the Duchess and Saxon's star destroyer, Kryze regrouped with her forces. With support from the Protector Fenn Rau and the other clans, Kryze accepted the title Mand'alor and the Darksaber in honor of her people and her sister.</p>\n<p>\_</p>\n<section style=\"box-sizing:border-box;-webkit-print-color-adjust:exact;display:contents\">\n<section style=\"box-sizing:border-box;-webkit-print-color-adjust:exact;display:contents;font-family:'Open Sans', sans-serif;background-color:#ffffff\"></section>\n</section>\n</section>\n</section>\n</section>"
