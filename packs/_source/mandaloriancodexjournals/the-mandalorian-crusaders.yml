        <h2 id="to-do-list-the-mandalorian-crusaders">THE MANDALORIAN
        CRUSADERS</h2>

        <p>The Mandalorian Crusaders were the first documented type of
        Mandalorians, established by Mandalore the First, sometime after 24,000
        BBY and under the command of Mandalore the Conqueror, later Mandalore
        the Indomitable, they eventually became involved in the Great Sith War
        and fought for the Jedi Knight-turned-Dark Lord of the Sith Ulic
        Qel-Droma. The Crusaders were traditional Mandalorian warriors, placing
        highest value on gaining honor and glory in combat.</p>

        <p>According to legend, the Crusaders were first formed on the planet
        Mandalore around the year 24,000 BBY by Mandalore the First, who is said
        to have conquered the world by defeating the Mythosaur, the great beasts
        who dominated the planet. After conquering Mandalore, the Mandalorians
        ventured on crusades in the years leading up to the Great Sith War,
        gaining them valuable planets such as Ordo, Concord Dawn, Shogun and
        Gargon.</p>

        <section id="to-do-list-the-mandalorian-crusaders-history">

        <h3 id="to-do-list-the-mandalorian-crusaders-history">HISTORY</h3>

        <p>The Mandalorians began as the humanoid Taung species from the planet
        Coruscant. Intense fighting with the thirteen Human nations of Coruscant
        known as the Battalions of Zhell began millennia before the Republic,
        and when a powerful volcano nearly wiped out the humans and darkened the
        skies over Coruscant, the Taung came to call themselves the Dha Werda
        Verda—the "Warriors of the Shadow". Despite the volcano's devastating
        effect, the Taung were eventually driven off Coruscant and took refuge
        on the world of Roon. Led by the warlord known as Mandalore the First,
        they would conquer another planet in the Outer Rim in 7000 BBY, which
        they named Mandalore after their leader. The Taung took on the name
        Mandalorians and were seen by many as the most skilled fighters in the
        galaxy, thriving in battle. These Mandalorian Crusaders were known for
        their use of cutting-edge weaponry and held to a strict code of honor,
        and wore armor known simply as "Crusader Armor" that differed from one
        soldier to the next.</p>

        <p>In their early years, Mandalorian culture revolved around battle,
        with war being a source of honor and pride in their community. The
        leader of the Mandalorians was known as the Mand'alor, translating to
        "Sole Ruler" and was rendered as "Mandalore" in Basic. Throughout their
        history, the Mandalorians were frequently allied with the Sith, perhaps
        most notably the Sith Lord Exar Kun, and held a certain distrust and
        general dislike for the Jedi Order. However, they would not hesitate to
        cooperate with the Jedi if a partnership between the two groups was
        mutually beneficial. In later years, the Mandalorians moved away from
        their obsessively war-like and conqueror ways and instead, most became
        bounty hunters and mercenaries, selling their skills to various
        individuals and factions in the galaxy.</p>

        <p>In the decades since their defeat in the Great Sith War, many
        Mandalorians had become convinced that their once-prophesied "Great Last
        Battle" was soon to be at hand. Emboldened by an element of the "True
        Sith" in hiding, Mandalore the Ultimate launched a campaign into the
        Outer Rim, on the edge of Republic space. Conquering several independent
        planets outside of the Republic's interests, the Mandalorian
        Neo-Crusaders were able to amass a clan territory larger than that ruled
        by the Hutts in the short span of a decade.</p>

        <p>As the Republic refused to get involved in the Mandalorians'
        conquests, wary of being dragged into another war so soon after the
        last, the Mandalorians plundered resources from conquered worlds and
        stockpiled them in order to fuel the growing campaign. With each victory
        in this ongoing series of proxy wars and border skirmishes, the
        Mandalorian clans grew more powerful, conscripting conquered species
        into their ranks as they probed the Republic's military strength and
        resolve. Just as it appeared as though the Neo-Crusaders' appetite for
        conquest had been satisfied, with the Mandalorians having failed to
        conquer a populated system in over a year by 3964 BBY, the Mandalorians
        struck out in force against the Republic. Striking swiftly from their
        outpost on Dxun, Onderon quickly fell to the Mandalorians,[ and it
        wasn't long before the likes of Vanquo and Taris soon joined it.</p>

        <p>The Mandalorians seemed on the verge of victory, with the Republic
        outmatched and overwhelmed by the sheer ferocity of the Mandalorian
        tactics. Finally, when the Jedi Revanchists unveiled the true events of
        the Cathar genocide in a tragic vision, hundreds of Jedi followed the
        Knights Revan and Malak into the war against the Mandalorians, no longer
        able to stand back and watch without action. Revan proved to be an
        extremely capable commander in the field, masterminding a string of
        military victories, and rose swiftly through the ranks of the Republic
        Military; with his new-found authority to spearhead the Republic war
        effort, Revan spurred the all-but-defeated Republic Navy to push the
        Mandalorians back.</p>

        <p>In relatively short order, the Mandalorians were forced off of Taris,
        driven from Dxun—even Cassus Fett's victory at Jaga's Cluster could do
        little to halt the Republic's growing momentum. The year 3960 BBY would
        usher in the ultimate battle of the Mandalorian Wars, as Revan forced a
        confrontation with the Mandalorians in orbit over Malachor V. Drawing
        upon the dark side energies of Malachor, Revan faced off against
        Mandalore the Ultimate in single combat, slaying the Mand'alor. The
        experimental superweapon known as the Mass Shadow Generator was
        activated by one of Revan's Jedi Generals, destroying the Mandalorian
        fleet, but at the cost of a significant amount of the Republic fleet as
        well. With their fleet in ruins and their leader dead, the Mandalorians
        transmitted their unconditional surrender.</p>

        </section>
