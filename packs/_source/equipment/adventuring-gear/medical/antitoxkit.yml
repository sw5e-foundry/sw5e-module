system:
  description:
    value: >-
      <p>An antitoxkit contained a variety of wide-spectrum antidote hypospray
      injectors that were designed to neutralize all known poisons. A kit has
      five charges. As an action, you can administer a charge of the kit to cure
      a target of one poison affecting them or to give them advantage on saving
      throws against poison for 1 hour. It confers no benefit to droids or
      constructs.</p>
